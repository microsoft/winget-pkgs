id: moderatorTriggers
name: GitOps.PullRequestIssueManagement
description: Defines the users and permissions for the moderators
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    eventResponderTasks:
      - if:
          # If the activity sender is any one of the moderators, has Admin permission on the repo, or has Write permissions on the repo. . .
          - or:
              - activitySenderHasPermission:
                  permission: Admin
              - activitySenderHasPermission:
                  permission: Write
              - isActivitySender:
                  user: stephengillie
                  issueAuthor: False
              - isActivitySender:
                  user: ImJoakim
                  issueAuthor: False
              - isActivitySender:
                  user: ItzLevvie
                  issueAuthor: False
              - isActivitySender:
                  user: jedieaston
                  issueAuthor: False
              - isActivitySender:
                  user: KaranKad
                  issueAuthor: False
              - isActivitySender:
                  user: OfficialEsco
                  issueAuthor: False
              - isActivitySender:
                  user: quhxl
                  issueAuthor: False
              - isActivitySender:
                  user: Trenly
                  issueAuthor: False
              - isActivitySender:
                  user: mdanish-kh
                  issueAuthor: False
              - isActivitySender:
                  user: russellbanks
                  issueAuthor: False
        then:
          # If the payload is an issue_Comment or a Pull_Request_Review_Comment
          - if:
              - or:
                  - payloadType: Issue_Comment
                  - payloadType: Pull_Request_Review_Comment
            # Remove the Needs-Triage label
            # Take different actions based on the comment pattern
            then:
              - removeLabel:
                  label: Needs-Triage
              # Area-Bots
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Bots'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Bots
              # Area-Client
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Client'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Client
              # Area-External
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]External'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-External
              # Area-Manifest
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Manifest'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Manifest
              # Area-Matching
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Matching'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Matching
              # Area-Publish-Pipeline
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Publish(ing)?[\s-]Pipeline'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Publish-Pipeline
              # Area-Rebuild-Pipeline
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Rebuild[\s-]Pipeline'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Rebuild-Pipeline
              # Area-Scope
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Scope'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Scope
              # Area-Validation-Pipeline
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Validation[\s-]Pipeline'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Validation-Pipeline
              # Blocking-Issue
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Blocking[\s-]Issue'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-Attention
                  - addLabel:
                      label: Blocking-Issue
              # Dependencies
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Dependencies'
                      isRegex: True
                then:
                  - addLabel:
                      label: Dependencies
              # DriverInstall
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Driver[\s-]Install'
                      isRegex: True
                then:
                  - addLabel:
                      label: DriverInstall
              # DSC
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+DSC'
                      isRegex: True
                then:
                  - addLabel:
                      label: DSC
              # Error-Hash-Mismatch
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Error[\s-]Hash[\s-]Mismatch'
                      isRegex: True
                then:
                  - addLabel:
                      label: Error-Hash-Mismatch
              # Error-Installer-Availability
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Error[\s-]Installer[\s-]Availability'
                      isRegex: True
                then:
                  - addLabel:
                      label: Error-Installer-Availability
              # Hardware
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Hardware'
                      isRegex: True
                then:
                  - addLabel:
                      label: Hardware
              # Help-Wanted
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Help[\s-]Wanted'
                      isRegex: True
                then:
                  - addLabel:
                      label: Help-Wanted
              # Highest-Version-Removal
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Highest[\s-]Version([\s-]Removal)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: Highest-Version-Removal
              # Icon
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Icon'
                      isRegex: True
                then:
                  - addLabel:
                      label: Icon
              # In-PR
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+In[\s-]PR'
                      isRegex: True
                then:
                  - addLabel:
                      label: In-PR
              # Installer-Error
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Installer[\s-]Error'
                      isRegex: True
                then:
                  - addLabel:
                      label: Installer-Error
              # Installer-Issue
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Installer[\s-]Issue'
                      isRegex: True
                then:
                  - addLabel:
                      label: Installer-Issue
                  - addLabel:
                      label: Area-External
              # Interactive-Only-Download
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Interactive[\s-]Only[\s-]Download'
                      isRegex: True
                then:
                  - addLabel:
                      label: Interactive-Only-Download
              # Interactive-Only-Installer
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Interactive[\s-]Only[\s-]Installer'
                      isRegex: True
                then:
                  - addLabel:
                      label: Interactive-Only-Installer
              # Issue-Bug
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Issue[\s-]Bug'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Bug
              # Issue-Docs
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Issue[\s-]Doc(s)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Docs
              # Issue-Feature
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Issue[\s-]Feature'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Feature
              # Last-Version-Removal
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Last[\s-]Version([\s-]Removal)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: Last-Version-Removal
              # License-Blocks-Install
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+License[\s-]Blocks([\s-]Install)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: License-Blocks-Install
              # Manifest-Singleton-Deprecated
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+(Manifest[\s-])?Singleton[\s-]Deprecated'
                      isRegex: True
                then:
                  - addLabel:
                      label: Manifest-Singleton-Deprecated
              # Moderator-Approved
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Moderator[\s-]Approved'
                      isRegex: True
                then:
                  - addLabel:
                      label: Moderator-Approved
              # Needs-Attention
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]Attention'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-Attention
                  - addReply:
                      reply: >-
                        Your pull request requires attention from a repository administrator. It has been assigned to a developer for review.


                        Template: msftbot/manualReview
              # Needs-Author-Feedback
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]Author[\s-]Feedback'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-Author-Feedback
              # Needs-CLA
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]CLA'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-CLA
              # Needs-Manual-Merge
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]Manual[\s-]Merge'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-Manual-Merge
              # Needs-Review
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Needs[\s-]Review'
                      isRegex: True
                then:
                  - addLabel:
                      label: Needs-Review
              # Network-Blocker
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Network[\s-]Block(?:er|ed)'
                      isRegex: True
                then:
                  - addLabel:
                      label: Network-Blocker
              # Package-Metadata
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Package[\s-]Metadata'
                      isRegex: True
                then:
                  - addLabel:
                      label: Package-Metadata
              # Package-Request
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Package[\s-]Request'
                      isRegex: True
                then:
                  - addLabel:
                      label: Package-Request
              # Package-Update
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Package[\s-]Update'
                      isRegex: True
                then:
                  - addLabel:
                      label: Package-Update
              # portable-archive
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Portable[\s-]Archive'
                      isRegex: True
                then:
                  - addLabel:
                      label: portable-archive
              # portable-jar
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Portable[\s-]JAR'
                      isRegex: True
                then:
                  - addLabel:
                      label: portable-jar
              # PSA
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+PSA'
                      isRegex: True
                then:
                  - addLabel:
                      label: Public-Service-Announcement
              # Scripted-Application
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Script(ed)?[\s-]Application'
                      isRegex: True
                then:
                  - addLabel:
                      label: Scripted-Application
              # Testing
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Test(ing)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: Testing
              # Upgrade-Issue
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Upgrade[\s-]Issue'
                      isRegex: True
                then:
                  - addLabel:
                      label: Upgrade-Issue
              # Validation-Skip-Automations
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Validation[\s-]Skip[\s-]Automations'
                      isRegex: True
                then:
                  - addLabel:
                      label: Validation-Skip-Automations
              # Version-Parameter-Mismatch
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Version[\s-]Parameter[\s-]Mismatch'
                      isRegex: True
                then:
                  - addLabel:
                      label: Version-Parameter-Mismatch
              # Windows Features
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Windows[\s-]?Feature(s)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: WindowsFeatures
              # Zip-Binary
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Zip[\s-]Binary'
                      isRegex: True
                then:
                  - addLabel:
                      label: zip-binary
              # Unblocked
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Unblocked'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Blocking-Issue
              # Reset-Feedback
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Reset\s+Feedback'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Moderator-Approved
                  - removeLabel:
                      label: Changes-Requested
              # Reset-Labels
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Reset[\s-]+Labels'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Area-Bots
                  - removeLabel:
                      label: Area-Client
                  - removeLabel:
                      label: Area-External
                  - removeLabel:
                      label: Area-Manifest
                  - removeLabel:
                      label: Area-Matching
                  - removeLabel:
                      label: Area-Publish-Pipeline
                  - removeLabel:
                      label: Area-Rebuild-Pipeline
                  - removeLabel:
                      label: Area-Scope
                  - removeLabel:
                      label: Area-Validation-Pipeline
                  - removeLabel:
                      label: Blocked-InstallerType
                  - removeLabel:
                      label: Blocking-Issue
                  - removeLabel:
                      label: Changes-Requested
                  - removeLabel:
                      label: Dependencies
                  - removeLabel:
                      label: DriverInstall
                  - removeLabel:
                      label: DSC
                  - removeLabel:
                      label: Error-Hash-Mismatch
                  - removeLabel:
                      label: Error-Installer-Availability
                  - removeLabel:
                      label: Hardware
                  - removeLabel:
                      label: Help-Wanted
                  - removeLabel:
                      label: Highest-Version-Removal
                  - removeLabel:
                      label: Icon
                  - removeLabel:
                      label: In-PR
                  - removeLabel:
                      label: Installer-Error
                  - removeLabel:
                      label: Installer-Issue
                  - removeLabel:
                      label: Interactive-Only-Download
                  - removeLabel:
                      label: Interactive-Only-Installer
                  - removeLabel:
                      label: Issue-Bug
                  - removeLabel:
                      label: Issue-Docs
                  - removeLabel:
                      label: Issue-Feature
                  - removeLabel:
                      label: Last-Version-Removal
                  - removeLabel:
                      label: License-Blocks-Install
                  - removeLabel:
                      label: Manifest-Content-Incomplete
                  - removeLabel:
                      label: Manifest-Metadata-Consistency
                  - removeLabel:
                      label: Manifest-Singleton-Deprecated
                  - removeLabel:
                      label: Manifest-Version-Deprecated
                  - removeLabel:
                      label: Manual-Validation-Completed
                  - removeLabel:
                      label: Moderator-Approved
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-CLA
                  - removeLabel:
                      label: Needs-Manual-Merge
                  - removeLabel:
                      label: Needs-Review
                  - removeLabel:
                      label: Network-Blocker
                  - removeLabel:
                      label: New-Manifest
                  - removeLabel:
                      label: New-Package
                  - removeLabel:
                      label: Package-Request
                  - removeLabel:
                      label: Package-Update
                  - removeLabel:
                      label: portable-archive
                  - removeLabel:
                      label: portable-jar
                  - removeLabel:
                      label: Possible-Duplicate
                  - removeLabel:
                      label: Project-File
                  - removeLabel:
                      label: Public-Service-Announcement
                  - removeLabel:
                      label: Scripted-Application
                  - removeLabel:
                      label: Testing
                  - removeLabel:
                      label: Upgrade-Always-Available
                  - removeLabel:
                      label: Upgrade-Issue
                  - removeLabel:
                      label: Validation-Skip-Automations
                  - removeLabel:
                      label: WindowsFeatures
                  - removeLabel:
                      label: zip-binary
                  ## TODO: Dismiss All Pull Request Reviews
              # Duplicate of #
              - if:
                  - commentContains:
                      pattern: (?in)Duplicate\s+of\s+\#?\s*\d+
                      isRegex: True
                then:
                  - addReply:
                      reply: >-
                        Hello ${issueAuthor},


                        We've identified this as a duplicate of another issue or PR that already exists. This specific instance is being closed in favor of the linked issue. Please add your 👍 to the other issue to raise its priority. Thanks for your contribution!


                        Template: msftbot/duplicate/closed
                  - closeIssue
                  - removeLabel:
                      label: Needs-Triage
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Feedback-Hub
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - addLabel:
                      label: Resolution-Duplicate
              # Close with reason <>;
              - if:
                  - commentContains:
                      pattern: '(?sin)Close\s+with\s+Reason\s*:.+;'
                      isRegex: True
                then:
                  - closeIssue
                  - removeLabel:
                      label: Needs-Triage
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Feedback-Hub
                  - removeLabel:
                      label: Needs-Author-Feedback
              # Reopen with reason <>;
              - if:
                  - commentContains:
                      pattern: '(?sin)Reopen\s+with\s+Reason\s*:.+;'
                      isRegex: True
                then:
                  - reopenIssue
                  - removeLabel:
                      label: Resolution-Duplicate
                  - removeLabel:
                      label: No-Recent-Activity
          # If the payload is a Pull_Request_Review and an approval, add the Moderator-Approved label
          - if:
              - payloadType: Pull_Request_Review
              - isReviewState:
                  reviewState: Approved
            then:
              - addLabel:
                  label: Moderator-Approved
onFailure:
onSuccess:
