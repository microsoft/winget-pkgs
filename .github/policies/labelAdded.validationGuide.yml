id: labelAdded.validationGuide
name: GitOps.PullRequestIssueManagement
description: Handlers when "Validation-Guide" label is added
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    eventResponderTasks:
      - description: >-
          When the label "Validation-Guide" is added to a pull request
          * Add the PR specific reply notifying the issue author
        if:
          - payloadType: Pull_Request
          - labelAdded:
              label: Validation-Guide
        then:
          - addReply:
              reply: >-
                Thank you for your contribution ${issueAuthor}! There was an issue validating your pull request. Many common validation questions and issues can be resolved by reading through the [Validation Guide](https://github.com/microsoft/winget-pkgs/blob/master/doc/ValidationFailureGuide.md). Please review the guide and update your pull request if needed. If you have any questions, feel free to ask for help!


                Template: msftbot/validation/validationGuideAdded
        # The policy service should trigger even when the label was added by the policy service
        triggerOnOwnActions: true
onFailure:
onSuccess:
