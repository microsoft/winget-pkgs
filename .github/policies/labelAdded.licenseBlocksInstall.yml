id: labelAdded.licenseBlocksInstall
name: GitOps.PullRequestIssueManagement
description: Handlers when "License-Blocks-Install" label is added
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    eventResponderTasks:
      - description: >-
          When the label "License-Blocks-Install" is added to a pull request
          * Add the PR specific reply notifying the issue author of a blocking issue
          * Label the PR with Blocking-Issue
          * Label with Needs-Author-Feedback
          * Remove the Needs-Attention Label
        if:
          - payloadType: Pull_Request
          - labelAdded:
              label: License-Blocks-Install
        then:
          - addReply:
              reply: >-
                Hello ${issueAuthor},


                This package appears to require user to accept a license agreement before installation. If there is a way to pass the license agreement acceptance through the installer switches, please update your manifest and include the `Agreements` section with the Agreement Label and Agreement URL. If there is not a way to pass the license agreement acceptance through the installer switches, this PR is blocked until support for Interactive Installers is added to the community repository.


                Template: msftbot/blockingIssue/licenseBlocksInstall
          - addLabel:
              label: Needs-Author-Feedback
          - removeLabel:
              label: Needs-Attention
          - addLabel:
              label: Validation-Guide
        # The policy service should trigger even when the label was added by the policy service
        triggerOnOwnActions: true
onFailure:
onSuccess:
