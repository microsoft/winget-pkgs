ReleaseNotes: |-
  v1.400
  🚀 You know that one person who speaks SO MANY languages? And you're low-key jealous of them? That's Monaspace, now with expanded language support for Cyrillic, Greek, and Vietnamese!
  👉 Everything fixed in 1.4 👈

  Font Packages
  - Static Fonts - Individual OTF files for each weight and style
  - Variable Fonts - Modern variable font files with adjustable weight/width
  - Frozen Fonts - TTF files with all stylistic sets "baked in" by default for editors which do not support stylistic sets
  - NerdFonts - Monaspace patched with NerdFonts glyphs
  - Web NerdFonts - WOFF/WOFF2 files with NerdFonts icons for web use
  - Web Static - WOFF/WOFF2 static font files optimized for web use
  - Web Variable - WOFF/WOFF2 variable font files optimized for web use

  Enhancements
  - New support for Cyrillic, Greek, Vietnamese, and IPA character sets
  - New character variant sets: cv12 enables Bulgarian-specific Cyrillic alternates, and cv13 does the same for Serbian
  - ss06 now includes ligatures for ___, ‗‗‗ and ==== (for equal sign, only applies to strings of 4 or more)
