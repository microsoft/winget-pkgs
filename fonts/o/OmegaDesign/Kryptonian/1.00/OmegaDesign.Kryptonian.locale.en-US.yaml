Description: This is the code switching font you will find in the comic book. It shares a one-to-one correspondance with the 26 basic letters of the Roman alphabet (with no distinction between upper and lower cases). When DC wants to portray "Kryptonian", they display the character's dialog—written in the language of the publication (e.g., English, Spanish, French, etc.)—using this font. Kind of like if you typed a letter and then changed the font to Wingdings before printing.
