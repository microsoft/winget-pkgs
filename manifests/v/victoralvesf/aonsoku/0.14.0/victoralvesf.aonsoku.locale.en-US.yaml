ReleaseNotes: |-
  v0.14.0 Release Notes
  🚀 New Features
  - Animated Artworks: Added support for animated artworks fetched from Apple Music. (thanks to @m8tec)
  - Playback Context: Introduced playback context for the currently playing track (covering albums, artists, playlists, favorites, and songs). This includes animated equalizer bars to easily identify the active content visually. (thanks to @Paulooze)
  - Customizable Sidebar: Added new options in the content settings to hide specific sidebar items. (thanks to @ItsCynnamon)
  - Genres Page: Added a dedicated Genres page, featuring the ability to shuffle and play up to 500 random tracks from a selected genre. (thanks to @snptech2)
  - Performance Optimization: Implemented virtualized lists for large playlists and albums to significantly improve page rendering and performance.
  - Sticky Headers: Added a sticky header to the album, artist, and playlist pages so playback controls and content titles remain visible while scrolling.
  - Localization: Added language support for Traditional Cantonese. (thanks to @navellius)
  🛠️ Fixes
  - Login Validation: Adjusted username and password validation to allow single-character inputs. (thanks to @longnguyen2004)
  - Auto-Updater: Fixed an issue where the auto-updater was failing to download and install new updates.
