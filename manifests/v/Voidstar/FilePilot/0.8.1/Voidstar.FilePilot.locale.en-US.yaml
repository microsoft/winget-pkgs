ShortDescription: Next-gen file explorer.
Description: |
  Engineered entirely from scratch for light-speed performance, featuring a modern and robust interface.
ReleaseNotes: |-
  ## Highlights
  - Tree View: Browse nested folder structures inline.
  - List View: Browse files in File Explorer style vertical columns.
  - Group By: Organize files into clear and collapsible sections.
  - Hierarchical Folder Views: Save view settings per folder, across a folder hierarchy, or as a system-wide default.

  ## New
  - Added drag selection across file checkboxes for faster mouse-only multi-selection in all views.
  - Added empty meta columns in Details view for free space when right-clicking the folder background or starting rectangular selection.

  ## Improved
  - Improved handling of removable drives during eject and reconnect.
  - Popup UI rework: less intrusive hotkeys and proper physical sections.
  - Quick Access: proper physical sections.
  - Added soft fade transitions for newly loaded grid icons and thumbnails.
  - Name column can now be reordered in Details view instead of being fixed as the first column.
  - Open folder context menu when right-clicking non-interactive space within items.
  - Added a subtle fade-out animation for rectangle selection.
  - Moved recent file indicator right to fit better in all views.
  - Fixed a visual overshoot issue when adding or removing a header column in Details view.
  - Improved UI layout and resize animations by reducing rounding jitter and using rect-based animation more consistently.
  - Reduced grid view item spacing for a tighter layout.
  - Disabled stretching item widths in grid mode.
  - Emit File Pilot version into the log file.
  - Don't show File Pilot config files under the Places group in Quick Access.
  - More robust version installer present.

  ## Config changes
  - Warning: Config file version has been raised, so existing hotkeys, options, and color themes will be reset.
  - Old config files are backed up automatically, but making your own backup is still advised.
  - Alternating Row Colors by default.
  - Scroll Beyond Last Item now defaults to false.
  - Added a new color group for separator on surface.

  ## Fixed
  - Fixed the drive fill bar disappearing when spacing is small under the Places group in Quick Access.
  - Fixed changing inspector view settings for the inspected folder.
  - Fixed incorrectly saving and restoring open/closed groups in the command palette.
  - Fixed background file metadata tasks blocking folder sorting during rapid view changes.
  - Fixed thumbnail loading sometimes delaying folder updates and view changes.
  - Fixed a bug where config file paths could go missing from the sidebar.

