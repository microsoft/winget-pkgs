ReleaseNotes: |-
  Bill of Materials Can Be Filtered by Pages
  You can now filter the bill of materials not only by symbol names and layers, but also by pages.
  Procedure:
  - In the bill of materials, click the filter button .
  - A dialog box will appear. Select the "By Page" tab.
  - In the field "Show only objects from these pages", enter page numbers separated by a comma (e.g. 1, 6), or a page range (e.g. 15-20), or a combination of both (e.g. 1, 5-12).
