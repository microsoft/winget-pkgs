Description: |-
  Subloader is a Windows application for finding and downloading subtitles for movies and TV shows.
  It provides both a GUI (WPF) and a CLI tool that can batch-process entire directories of video files.
  It uses the OpenSubtitles API for searching and downloading subtitles with smart hash-based matching
  and filename similarity sorting.
