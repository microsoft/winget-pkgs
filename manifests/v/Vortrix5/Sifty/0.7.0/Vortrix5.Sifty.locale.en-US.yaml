ShortDescription: AI-assisted Windows maintenance CLI/TUI — sift junk, analyze disks, manage apps, updates and files.
Description: Sifty is an AI-assisted Windows maintenance tool. It cleans junk, analyzes disks, finds duplicates, manages installed apps and startup programs, applies updates via winget, prunes developer artifacts, and organizes files — from a scriptable CLI or a full-screen terminal UI. Deletions are dry-run by default and go to the Recycle Bin; the optional AI assistant runs locally via Ollama.
