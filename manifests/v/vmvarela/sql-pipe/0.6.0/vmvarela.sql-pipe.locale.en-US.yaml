ShortDescription: Read CSV from stdin, query with SQL, write CSV to stdout
Description: sql-pipe reads CSV from stdin, loads it into an in-memory SQLite database, runs a SQL query, and prints the results as CSV. No server, no schema files, no setup. If you know SQL and work with CSV in the terminal, this is the tool you have been reaching for.
