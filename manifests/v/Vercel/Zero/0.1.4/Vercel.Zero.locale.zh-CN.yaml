PackageIdentifier: Vercel.Zero
PackageVersion: 0.1.4
PackageLocale: zh-CN
ShortDescription: 智能体的编程语言
Description: |-
  Zero 是构建 Agent 优先编程语言的一次实验。
  该项目正在探索当 Agent 从第一天起就作为主要用户时会发生什么：一种可以即学即用的语言，一套能为调试和修复提供结构化事实的工具链，以及一个足够广泛、使得大多数程序无需从搜索依赖开始的标准库。
  Zero 目前处于 1.0 版本前的阶段，且特意保持了不稳定性。在探索最适合 Agent 的语言、库和工具模式的过程中，该项目将不断进行破坏性改动。请将现有的语法和 API 视为探索对象，而非需要记忆的内容。如果你觉得这很有用，欢迎加入我们：运行示例，检查结构化输出，并就如何帮助 Agent 更好工作提供反馈。
  应当预见到安全漏洞的存在。Zero 尚未准备好用于生产系统、敏感数据或受信任的基础设施。如果你计划运行或开发 Zero，请在隔离且可丢弃的环境中进行。
  Zero 的目标
  - Agent 优先的可学习性：精简且规律的语言表面，让 Agent 能够通过示例、文档和编译器反馈快速上手。
  - 标准库深度：常用能力应存在于文档齐全、连贯的库 API 中，而不是分散的依赖堆栈里。
  - 确定性工具链：诊断信息、图事实、大小报告、解释和修复方案应具备足够的结构化程度，以便 Agent 检查和执行。
  - 直接的开发者体验：检查、运行、格式化、检查和修复代码应当快速、可复制且可脚本化。
  - 规律性胜过语法：倾向于用一种显而易见的方式来表达大多数事物，即使这使得代码比人类在其他语言中选择的表达方式更加显式。
