ReleaseNotes: |-
  💡 Features:
  • Search bar for builds with version/date range filters and fuzzy matching
  • Chinese localization support
  • Setting to show PR label for Experimental builds
  • Setting to minimize or close the app when launching Blender
  • Allow fullscreen mode
  • Add GLIBC version warning on Linux when Blender fails to run
  🛠️ Fixes:
  • Fix some issues with Windows uninstall and registry key management
  • Fix launched Blender instances not being tracked correctly
  • Fix library reload duplication and favourites lifecycle
  • Fix window position clamped to screen so header stays reachable at high DPI
  • Fix macOS UI language detection via AppleLocale for Auto locale setting
  • Fix context menu first action firing on right-click
  • Fix saving and restoring sorting type
  • Fix search filter not restored on search bar reopen
  • Fix expired credentials warning message
  • Fix main window not showing when starting in compiled app mode
  • Fix installed button not showing on app restart in Downloads tab
  • Fix stable build status incorrectly bleeding to daily builds
  • Fix fork builds not being picked up in CLI launch mode
  • Fix generated .desktop files not conforming to original format (Linux)
  • Fix library build widget not getting shown after downloading a new build
  • Fix subversion and version edge cases with empty/None values
  • Fix minor translation issues and missing Japanese locale keys
  ⚙️ Others:
  • Multiple refactoring and code consolidation
  • Dependency updates
