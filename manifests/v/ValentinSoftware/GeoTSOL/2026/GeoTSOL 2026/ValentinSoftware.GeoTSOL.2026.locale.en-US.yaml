ReleaseNotes: |-
  The following new features and changes are included:
  - A more clear and modern design.
  - The database has been updated.
  The following bugs have been fixed:
  - When outdoor temperatures and flow temperatures were high, the heat pump’s COPs were sometimes too high.
  - MeteoSyn sometimes opened with the wrong climate dataset.
