ReleaseNotes: |-
  update vscode to 1.116.0
  What's Changed
  - build: bump Node version pins for loong64 and riscv64 by @CSharperMantle in #2760
  - docs: fix typo 'anouncements' → 'announcements' in telemetry.md by @bhaskarvilles in #2721
  - Add/docs windows build commands by @bhaskarvilles in #2722
  - docs: add Windows troubleshooting section (GPO, context menu, Defender) by @bhaskarvilles in #2723
  - Clarify incompatibility by @Chealer in #2601
  - build(deps): bump picomatch in /font-size by @dependabot[bot] in #2763
  - feat: update electron to 39.8.4 by @daiyam in #2764
  - Fix DEB issue with PowerPC64 Little Endian by @lex-ibm in #2766
  - Enable RPMs, DEBs, and CLI for PowerPC64 Little Endian by @lex-ibm in #2767
  - Enable PowerPC64 Little Endian to build with Electron 41.y.z by @lex-ibm in #2771
  - build(deps-dev): bump lodash-es from 4.17.23 to 4.18.1 in /font-size by @dependabot[bot] in #2773
  - build(deps-dev): bump lodash from 4.17.23 to 4.18.1 in /font-size by @dependabot[bot] in #2774
  - fix(ppc64): update sysroot checksum by @daiyam in #2775
  - refactor: split some scripts by os by @daiyam in #2776
  - Fix issue with RPMs and DEBs when packaging for PowerPC64 LE by @lex-ibm in #2778
  - Use vscode sysroot prefix -glibc-2.28 for ppc64le by @lex-ibm in #2785
  - fix(update): update isLatestVersion() to compare versions by @daiyam in #2777
  - ci: improve workflows by @daiyam in #2795
  - feat(1.116): update patches by @daiyam in #2796
  - build(deps): bump zizmorcore/zizmor-action from 0.5.2 to 0.5.3 by @dependabot[bot] in #2798
  - refactor: patches by @daiyam in #2797
  - feat: add cooldown setting to update by @daiyam in #2799
  - docs: replace old url with archived one by @daiyam in #2800
  - enable having space-separated args for terminal.external.linuxExec by @timkenhan in #2790
  - build(font-size): update and lock dependencies by @daiyam in #2803
  - build(win32): appx contextmenu by @daiyam in #2801
  - feat: disable onboarding screen by @daiyam in #2804
  - ci: update actions by @daiyam in #2805
  - fix: disable wip appx by @daiyam in #2807
  - feat(1.116): update apis by @daiyam in #2808
  New Contributors
  - @CSharperMantle made their first contribution in #2760
  - @bhaskarvilles made their first contribution in #2721
  - @Chealer made their first contribution in #2601
  - @timkenhan made their first contribution in #2790
