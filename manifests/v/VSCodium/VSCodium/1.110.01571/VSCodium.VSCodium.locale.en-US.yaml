ReleaseNotes: |-
  update vscode to 1.110.0
  With this version of VSCodium, you can use the following new settings:
  ─────────────────────────────────────────────┬──────┬───────┬─────────────────────────────────────────────────
  Setting                                      │Type  │Default│Description
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.experimental.fontSize              │number│13     │Global workbench font size (6-32px)
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.sideBar.experimental.fontFamily    │string│""     │Side bar font family (both primary and secondary)
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.sideBar.experimental.fontSize      │number│13     │Side bar font size
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.statusBar.experimental.fontFamily  │string│""     │Status bar font family
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.statusBar.experimental.fontSize    │number│12     │Status bar font size
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.tabs.experimental.fontFamily       │string│""     │Editor tabs font family
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.tabs.experimental.fontSize         │number│13     │Editor tabs font size
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.bottomPane.experimental.fontFamily │string│""     │Bottom panel font family
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.bottomPane.experimental.fontSize   │number│13     │Bottom panel font size
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.activityBar.experimental.fontFamily│string│""     │Activity bar font family
  ─────────────────────────────────────────────┼──────┼───────┼─────────────────────────────────────────────────
  workbench.activityBar.experimental.fontSize  │number│16     │Activity bar font size
  ─────────────────────────────────────────────┴──────┴───────┴─────────────────────────────────────────────────
  It's fixing an old issue of Visual Studio Code.
  What's Changed
  - feat: add per-area font customization (fontFamily + fontSize) by @xiaolai in #2626
  - feat(1.109): update patches by @daiyam in #2688
  - feat(windows): use versioned update by @daiyam in #2690
  - feat(windows): disable versioned update by @daiyam in #2691
  - fix(snap): re-add snap update service by @daiyam in #2697
  - feat(1.110): update patches by @daiyam in #2704
  - feat: add patch for workbench's font family by @daiyam in #2706
  - feat(1.110): update patches by @daiyam in #2715
  - fix: use correct org for admx by @daiyam in #2716
  - fix: scm panel by @daiyam in #2718
  - fix(font): button on extensions panel by @daiyam in #2719
  - build(deps): bump crazy-max/ghaction-import-gpg from 6 to 7 by @dependabot[bot] in #2726
  - build(deps): bump actions/download-artifact from 7 to 8 by @dependabot[bot] in #2727
  - build(deps): bump actions/upload-artifact from 6 to 7 by @dependabot[bot] in #2728
  - build(deps): bump docker/setup-qemu-action from 3 to 4 by @dependabot[bot] in #2729
  - feat: update patch by @daiyam in #2731
  New Contributors
  - @xiaolai made their first contribution in #2626
