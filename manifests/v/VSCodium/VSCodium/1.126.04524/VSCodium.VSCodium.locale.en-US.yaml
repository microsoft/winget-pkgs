ReleaseNotes: |-
  update vscode to 1.126.0
  What's Changed
  - feat(1.126): update patches by @daiyam in #2903
  - ci: update gh actions by @daiyam in #2907
  - build(deps-dev): bump js-yaml from 4.1.1 to 4.3.0 in /font-size by @dependabot[bot] in #2901
  - (fix): Don't set VSCODE_SKIP_SETUPENV on ppc64le by @lex-ibm in #2908
  - fix: overwrite update uses version number not commit id by @daiyam in #2909
  - ci: use macos-14 runner by @daiyam in #2910
  - fix(loong64): update electron by @daiyam in #2912
  - fix(update): use common function to normalize version by @daiyam in #2914
  - feat(ppc64le): Use GCC-10.5.0 for REH and BIN by @lex-ibm in #2915
