ReleaseNotes: |-
  update vscode to 1.121.0
  What's Changed
  - appimage - fix "no version information available" error by @DetachHead in #2740
  - feat(1.118): update patches by @daiyam in #2820
  - feat: remove update version since we use gh releases by @daiyam in #2821
  - Fixed arguments on appimage by @redsigma in #2818
  - feat: move secrets to environments by @daiyam in #2835
  - revert: #2821 by @daiyam in #2838
  - feat(1.120): update patches by @daiyam in #2837
  - fix: set state to idle by @daiyam in #2840
  - fix: remove all references to onboarding screen by @daiyam in #2841
  - feat: make sure that ai-coauthor is off by @daiyam in #2842
  - fix(msi): use .msi as extension for updater file by @daiyam in #2843
  - Fix codium invocation from wsl by @whoami730 in #2789
  - feat(reh): add flag to to disable client validation by @daiyam in #2847
  - refactor(update): move and merge log by @daiyam in #2848
  - fix(ui): resize find widget by @daiyam in #2849
  - fix(ui): show icons correctly by @daiyam in #2851
  - enhance(reh): add log for validation by @daiyam in #2852
  - fix(msi): install update by @daiyam in #2853
  - build(deps): bump actions-rust-lang/setup-rust-toolchain from 1.16.0 to 1.16.1 by @dependabot[bot] in #2859
  - feat(1.121): update patches by @daiyam in #2860
  - fix(ui): make sure that css variable is always created by @daiyam in #2862
  - feat: minAge in hours and add it to extensions by @daiyam in #2868
  - fix(msi): add msi install on second method... by @daiyam in #2867
  New Contributors
  - @redsigma made their first contribution in #2818
  - @whoami730 made their first contribution in #2789
