  - Add support for Terminal (litd) v0.15.1-alpha by @jamaljsr in #1248
  - Add support for Terminal (litd) v0.15.3-alpha by @jamaljsr in #1325
  - Add support for Terminal (litd) v0.16.0-alpha by @jamaljsr in #1330
