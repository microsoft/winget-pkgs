ShortDescription: 'Open/save as file dialog improvement: automatically opens path from any file manager.'
Description: "QuickSwitch automatically switches file dialog path. Save and open files with convenience and speed. \nIt has 2 modes\n. Menu: displays a list of opened tabs from file managers, allows to choose the path.\n. AutoSwitch: automatically opens the last active tab.   \nTo open the Menu press Ctrl+Q. You can also select Mouse buttons, Capslock, Space, Windows and other special keys in Menu settings\nDifferent paths available for different tasks\n. Pinned paths (that are always visible).\n. Favorite paths (with customizable icons and names).\n. Clipboard paths (copy any path and you will see it in the Menu).  \nThere are many customization options in Menu settings:\n. Apply dark theme and dark colors.\n. Change menu font and size.\n. Display short path, transform it as you want \n...and many more options are available!"
