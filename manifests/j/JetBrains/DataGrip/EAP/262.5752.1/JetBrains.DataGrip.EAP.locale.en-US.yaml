ReleaseNotes: |-
  SQL expressions in the data editor
  You can now set cell values using SQL expressions instead of being limited to literal values.
  Previously, when editing data in the grid, you could only enter static values or use the context menu to set a cell to NULL or its DEFAULT value. If you wanted to use a database function like NOW() or gen_random_uuid(), or perform a calculation, you had to manually write and execute an UPDATE statement in the console.
  With this update, we're introducing a new Expression mode in the data editor. When editing a cell, you can now right-click it and choose Edit as SQL Expression, or enable Expression mode using the fx button in the Value editor.

  Enter any valid SQL expression, and DataGrip will use the result as the new cell value.

  When you submit the changes, the IDE incorporates your expression directly into the generated UPDATE or INSERT statement without escaping it as a string.
  You can now use SQL expressions when editing multiple cells, too.

  Two-session mode
  Starting from this release, you'll be able to use a new mode, Two sessions: shared and introspection, in addition to the existing Single Session and Dedicated Sessions modes.
  Before, there were two separate modes:
  - Default: Each new client, such as a query console or data editor, creates a new connection to the database.
  - Single-session: Every time you work with a data source, you use one and only one connection. It can be turned on by selecting the Single session mode checkbox.
  Single-session mode exists to support scenarios where you want to share a single connection across multiple clients. However, this may be inconvenient because the same session is used by database introspection – the process of retrieving metadata.
  That's why the new mode creates two sessions: one for introspection and the other for everything else.

  Database colors: v2.0
  We've completely reworked the colors system.

  Now not only do database colors have a fresh and consistent UI, but they also add these new features:
  - Custom colors now work differently. Before, the fixed #RRGGBB hex code looked the same across all IDE themes, meaning it only looked right in either the light or the dark theme, but not both. Now, you can simply set the Hue, and the system handles the shades automatically.

  - Custom colors are available for folders, as well.
  - The submenu has been moved up a level, so it's easier to locate.
  - We've moved the color settings from the old dialog popup to the main Settings window.
  [Snowflake] Role and warehouse switcher
  Switching between database roles and warehouses just got a lot faster. For those working in Snowflake, you no longer need to manually execute SET ROLE commands or dig through connection settings to change your permissions for the current session.

  A new dropdown menu in the query console toolbar lets you swap between available roles and warehouses instantly.
