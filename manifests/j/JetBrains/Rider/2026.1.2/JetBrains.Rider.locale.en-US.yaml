ReleaseNotes: |-
  Rider 2026.1.2 is out with the following changes:
  Package Manager Console access update
  In Rider 2026.1.2, the Package Manager Console tab has been removed from the NuGet tool window. The functionality remains fully available via the predefined Package Manager Console session in the Terminal tool window.
  When we introduced NuGet PowerShell support in Rider 2026.1, we offered it in two places and planned to carry forward only one. Based on usage data and product fit, the Terminal workflow won.
  All NuGet PowerShell commands, including Entity Framework Core commands like Add-Migration, Update-Database, and Scaffold-DbContext, are available from the Terminal tool window.
  For the full list of changes, please refer to the release notes.
