ReleaseNotes: |-
  Rider 2026.1.0.1 comes with the following fixes:
  In the recent 2026.1 release, native Wayland support in Rider was prematurely enabled by default on Linux. This caused compatibility issues that prevented several key UI elements such as the Monitoring and dotMemory tool windows from rendering correctly.
  We are now temporarily disabling Wayland support to restore your full access to all monitoring and profiling tools while we continue to finalize our native Wayland support.
