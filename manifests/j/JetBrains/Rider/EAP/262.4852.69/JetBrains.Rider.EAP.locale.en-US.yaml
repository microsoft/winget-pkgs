ReleaseNotes: |-
  The Rider 2026.2 Early Access Program is here!
  The first early preview build comes with:
  - Major Roslyn performance improvements that make branch switching in large and complex solutions significantly faster.
  - Game development updates, including reworked handling of Unity asmdef references and improvements to GDScript support.
  - Azure Functions support for local development moving directly into Rider, with project and trigger creation, running, debugging, Azurite integration, and Docker debugging support.
  - Aspire improvements, including support for file-based AppHosts, improved dev certificate validation, and resource status indicators and commands in the editor gutter.
  This blog post has all the details.
  For the complete list of updates included in this build, please see our release notes.
