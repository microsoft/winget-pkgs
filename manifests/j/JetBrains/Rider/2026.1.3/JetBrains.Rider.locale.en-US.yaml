ReleaseNotes: |-
  Rider 2026.1.3 is out with the following changes:
  Wayland support on Linux
  Rider 2026.1.3 brings native Wayland support to Linux users in supported desktop configurations. This update follows the broader rollout of Wayland support, and brings Rider in line with the rest of the IntelliJ-based IDE family.
  When running in a Wayland-capable environment, Rider can now use the native Wayland toolkit instead of running as an X application. X11 remains supported, and users who need to switch back can still do so via custom VM options.
  Fixes for MAUI development
  This build resolves a range of MAUI and Android build, deployment, and debugging issues. Fixes address failures in evaluating deployment properties, uploading APKs, and building across .NET 9 and .NET 10 targets, along with several problems that prevented reliable Android debugging. Key issues resolved:
  - RIDER-137704 Deployment properties can now be evaluated when deploying or building MAUI Android apps.
  - RIDER-132927 Debugging in the Android Emulator no longer fails to start with a "Failed to parse Activity Name" error.
  - RIDER-132740 Resolved a failure when uploading the application APK file to the device.
  - RIDER-135767 MAUI .NET 10 Android deployment no longer breaks when adding the net10.0 target framework for unit testing.
  - RIDER-137441 MAUI apps now build correctly even with the ReSharper Build option disabled, addressing a missing 'net9.0' target in project.assets.json.
  - RIDER-137742 Addressed another case where the application APK file failed to upload to the device.
  - RIDER-136581 Running .NET 10 MAUI Android Release builds directly from Rider no longer crashes the app on launch due to missing symbols.
  - RIDER-138412 Restored the ability to debug Android apps.
  For the complete list of issues resolved, please see our release notes.
