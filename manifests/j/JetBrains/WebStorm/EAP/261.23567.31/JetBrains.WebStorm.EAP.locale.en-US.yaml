ReleaseNotes: |-
  What's fixed:
  - We've added support for TypeScript in Svelte 5 markup expressions (WEB-61819).
  - We've added support for {@each} blocks without items in Svelte (WEB-72160).
  - We've improved integration with the Angular TypeScript language service, so there is no need to restart it frequently (WEB-75092).
  - We've added an option to extract a React component to a separate file (WEB-45372).
  - We've got rid of false positive errors that were reported for valid async arrow functions (WEB-77381).
  - We've added support for multiple matching switch cases in Angular 21.1.0+ projects (WEB-76891).
  - We've got rid of duplicated suggestions of private TypeScript fields in the completion popup (WEB-68522).
  - We've fixed a problem with recognizing TypeScript-Go paths with Node.js in WSL and pnpm (WEB-76494).
  - Copyright headers now respect the shebang line (WEB-67161).
  - Inferred TypeScript types are now shown in the parameter info tooltip (WEB-60224).
  - Existing Angular dependencies are now mentioned on disabling the HTML Tools or the WebPack plugin (WEB-77477).
  - We've got rid of an excessive one-time rootsChanged event, thus boosting the IDE performance during project opening (WEB-77322).
  - We've fixed a freeze that occurred in CssCustomPropertiesScope.initialize (WEB-77272).
  - We've optimized module status detection in package.json (WEB-77261).
  - We've fixed an exception that was thrown in TypeScriptServerServiceImpl.closeLastEditor (WEB-77252).
  - We've disabled the Start debugging in browser button in the Terminal (WEB-77215).
  - The gray() function in Sass/SCSS and Less files is now marked as deprecated (WEB-77123).
  - We've restored the Choose/convert color intention action in SCSS/SASS and Less files (WEB-77109).
  - We've fixed calculation of the Convert to rgb() result (WEB-77107).
  - We've fixed the appearance of the Deno area in the JavaScript runtime page of the Settings dialog be getting rid of an abnormal scrollbar (WEB-77073).
  - We've optimized building of import graphs ( WEB-77062).
  - We've restored $event info in narrowed keydown/keyup handlers (WEB-77046).
  - We've fixed the appearance of TypeScript tooltips, so they are no longer trimmed (WEB-77042).
  - We've fixed an issue with rendering the <picture> tag from a package README in the Quick Documentation popup (WEB-77018).
  - We've enabled the --strict option by default (WEB-76951).
  - We've restored the correct sorting for Vue events in completion lists, so methods declared in the current file are shown above $-prefixed properties (WEB-76852).
  - We've fixed an issue with imports from the TanStack library in Next.js projects (WEB-76849).
  - We've fixed a problem with loading the file structure view (WEB-71158).
  - We've got rid of a false positive Unresolved variable diagnostics and a meaningless Create field quick-fix (WEB-57581).
  - We've fixed an issue with the IDE being suspended with a SIGTTIN signal when running in the background on Linux (IJPL-222867).
  - We've fixed a problem with symlinks in WSL being recognized as regular dereferenced files and directories (IJPL-226879).
  - We've fixed an issue with the Memory tab not being activated on pausing the debugger in the Split Debugger mode (IJPL-234300).
  - We've improved support for backend exceptions (IJPL-182368).
  - We've added installation and uninstallation options to the context menu of plugin descriptions (IJPL-194254).
  - We've added a possibility to first uninstall a split plugin from the client and after that from the host if the plugin requires restarting the IDE (IJPL-227690).
  - We've fixed the appearance of the RTL caret indicator with the new rounded caret (IJPL-235839).
  - We've got rid of infinite spinners in the Run Configurations widget that appeared after a branch switch or file save in the Remote Development mode (IJPL-235905).
  - We've restored the behavior of the Backup and Sync dialog, so it no longer gets stuck on closing the Settings dialog (IJPL-235925).
  - We've fixed a startup failure caused by a NullPointerException in PluginManagerCore (IJPL-237421).
  - We've got rid of a false positive freeze reporting for FileEditorManagerImpl.blockingWaitForCompositeFileOpen (IJPL-237522).
  - We've re-exposed ResolveConflictsLocally APIs as @ApiStatus.Experimental for third-party use (IJPL-237833).
  - We've implemented a Run tests tool for MCP Server (IJPL-199602).
  - We've added support for renaming symbols based on the data from the LSP server via a textDocument/rename request (IJPL-161013).
  - We've improved proxy authentication handling, so the IDE now prompts to enter authentication credentials again if the proxy server returns a 407 status code (IJPL-210659).
  - We've restored the correct text substitution on pressing Enter in the Find and Replace dialog or popup (IJPL-240373).
  - We've restored the correct menu hover colors in the Classic UI, with the Merge with Main Toolbar option enabled in the new UI before switching (IJPL-191620).
  - We've fixed a debugger API issue and thus restored access to action groups (IJPL-240698).
  - We've restored the Show Diff option for local changes in the Remote Development mode (IJPL-238790).
  - We've restored the Update all button in the Plugins area on the Welcome screen (IJPL-233678).
  - We've restored alias recognition by the GitLab and GitHub plugins when insteadOf is used together with pushInsteadOf (IJPL-241518).
  - We've restored the correct background and hover colors with the Islands Light, Islands Dark, or Darcula theme enabled (IJPL-239635, IJPL-239212).
  - We've restored the correct positioning of the focus and the cursor in the Merge Request diff viewer (IJPL-238945).
  - We've restored the connecting phase while attaching the LLDB debugger (IJPL-240713).
  - We've restored the behavior of the Revert Changes button on the Installed tab of the Plugins page, so the Disable / Enable All action text is updated after the action is applied (IJPL-238385).
  - We've restored the correct compatibility detection for Marketplace plugins with the backend and the frontend (IJPL-238367).
  - We've restored the correct size of the toolbar icons on the Main Menu (IJPL-238074).
  - We've restored the appearance of the Take a quick onboarding tour banner, so it has visible borders and stands out on the Welcome screen (IJPL-237843).
  - We've got rid of a visual artifact that appeared when dragging-and-dropping a project tab on macOS with an Islands theme enabled (IJPL-237627).
  - We've restored the correct positioning of the modal Welcome screen after rendering in the Remote Development mode on Ubuntu (IJPL-237205).
  - We've fixed an issue with the What's New page becoming blank after reordering (IJPL-200425).
  For more details, please see the release notes.
