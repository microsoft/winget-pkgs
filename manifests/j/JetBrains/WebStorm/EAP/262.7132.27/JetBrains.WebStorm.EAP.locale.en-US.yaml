ReleaseNotes: |-
  What's fixed:
  - We've fixed a problem with the Webpack and Post CSS plugins preventing Vue.js plugin from being automatically loaded (WEB-77487).
  - TypeScript autocompletion for get accessors no longer incorrectly inserts parentheses after the accessor's name as if it were a function call (WEB-77754).
  - WebStorm now correctly resolves the src directory in default Vite projects (WEB-75719).
  - We've got rid of a false positive Module is not installed error reporting (WEB-77622).
  - We've removed the dependency on the CSS plugin from the JavaScript plugin (WEB-77941).
  - We've restored the correct IDE behavior on detecting SQL in JavaScript/TypeScript literals and quoted strings (WEB-77972).
  - We've got rid of the Tokens were not inserted into the tree. Language: SvelteHTML exception (WEB-78125).
  - The CSS plugin is now treated as essential plugin in WebStorm and cannot be disabled (WEB-78157).
  - We've updated TS GO to skip LspServerImpl caches when getting pull diagnostics (WEB-78160).
  - We've got rid of the Can't find bundle for base name messages.PhoneGapBundle exception (WEB-78179).
  For more details, please see the release notes.
