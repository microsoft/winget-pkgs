ReleaseNotes: |-
  What's fixed:
  - We've replaced the obsolete Rhino JavaScript engine used by JSHint with the Node.js-based JSHint npm package (WEB-78069).
  - We've added special formatting for JSDoc @linkcode in the Documentation popup and tool window (WEB-70925).
  - We've restored the plugins' behavior, so disabling the CSS plugin results in disabling the JavaScript plugin (WEB-78109).
  - We've got rid of the ClassNotFoundException that was related to icons .JavaScriptCoreIcons$FileTypes (WEB-78096).
  - We've restored the possibility to run Cypress and Playwright tests from the IDE (WEB-78095).
  - We've added a builder DSL for PolySymbolCompoundScope (WEB-78044).
  - We've fixed a stack overflow that occurred during resolve in the Vue context (WEB-78012).
  - We've got rid of a false positive Selector is never used error reporting for <svelte:element> (WEB-68020).
  For more details, please see the release notes.
