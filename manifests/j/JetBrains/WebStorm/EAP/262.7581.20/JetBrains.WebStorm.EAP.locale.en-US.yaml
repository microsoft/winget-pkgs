ReleaseNotes: |-
  What's fixed:
  - We've added automatic detection of the Node.js runtime in Native Dev Containers, thus preventing failures of GUI test runners (WEB-77458).
  - We've got rid of a Netty event loop thread leak in unit tests that was caused by WipRemoteVmConnection (WEB-78316).
  - We've prevented UI freezes that could occur when accessing I/O from the EDT in NodePackageEditor.update (WEB-78285).
  - We've fixed a PsiLinkedPolySymbol hosts-related exception that was thrown in the context of a Vue component (WEB-78276).
  - We've updated the bundled Prisma language server to version 31.11.0 (WEB-78273).
  - We've fixed an issue in the Figma integration with the current selection being changed unexpectedly on clicking an action in the Layers pane (WEB-78248).
  - We've updated the bundled Svelte language server and the TypeScript-Svelte plugin to version 0.18.1 and version 0.3.52 respectively (WEB-78242).
  - We've updated the bundled Astro language server and the TypeScript-Astro plugin to version 2.16.10 and version 1.10.9 respectively (WEB-78241).
  - We've removed the unnecessary dependency of the Deno plugin on the CSS plugin (WEB-78220).
  - We've renamed PsiSourcePolySymbol to PsiLinkedPolySymbol and updated the related API terminology accordingly (WEB-78215).
  - We've improved the search and rename behavior for symbols, so PsiSourcedPolySymbol is handled consistently with its source PsiElement (WEB-78185).
  - We've changed the default TypeScript --target setting to the latest ECMAScript version for TypeScript 6 and TypeScript 7 (WEB-76678).
  For more details, please see the release notes.
