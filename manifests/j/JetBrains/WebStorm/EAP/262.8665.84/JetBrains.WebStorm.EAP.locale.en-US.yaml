ReleaseNotes: |-
  What's fixed:
  - We've upgraded the bundled TypeScript version to 6.0.3 (WEB-78250).
  - We've updated tsconfig and jsconfig schemas to support ES2025 and ES2026 (WEB-78158).
  - We've fixed the Figma plugin, so it allows for multiple design connections to %instance% at the same time (WEB-78481).
  - We've fixed the language ID sent for .mts files when using TypeScript-Go (WEB-78253).
  - We've enabled native WSL support for the Remote Development | WSL entry point (WEB-78067).
  - We've fixed highlighting for some types, for example, generic parameters of functions, in the Quick Documentation popup/tool window (WEB-77070).
  For more details, please see the release notes.
