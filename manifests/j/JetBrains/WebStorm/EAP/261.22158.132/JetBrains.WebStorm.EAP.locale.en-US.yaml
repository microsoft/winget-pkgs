ReleaseNotes: |-
  What's fixed:
  - We've fixed a freeze that occurred in Angular2ExpressionsCopyPasteProcessor.insertRequiredImport (WEB-74282).
  - We've restored the search for files, classes and symbols in the Search Everywhere functionality (IJPL-237895).
  - We've restored the possibility to install plugins and view their details in the Remote Development mode (IJPL-238525).
  - We've added a possibility to use RPC from plugins in the Remote Development mode (IJPL-238173).
  - We've restored the correct way of forming the suggestions' list in the Action tab of the Search Everywhere popup, so most ranked items are shown at the top (IJPL-236533).
  - We've fixed a problem with the Changes tree and commit details being loaded endlessly in WSL projects (IJPL-227071).
  - We've restored support for saving draft comments while reviewing gitlab merge requests (IJPL-237452).
  - We've disabled preloading of the JetBrains daemon (IJPL-237465).
  For more details, please see the release notes.
