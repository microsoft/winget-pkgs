ReleaseNotes: |-
  This build focuses on stabilizing core infrastructure, refining remote interpreter integration, and giving you better visibility into your workspace workflows:
  Code insight and type checking
  - Validate __init_subclass__ method arguments directly with the type checker - PY-79173.
  - View descriptive tooltips when hovering over variance inlay hints in the editor - PY-90356.
  Interpreter settings and package management
  - View your complete packages list when using custom repositories in the Python Packages tool window - PY-90351.
  - Use package inspections inside requirements.txt files normally when working with WSL or SSH remote interpreters - PY-90397.
  - Keep your configuration directory clean without automatic file generation when no default settings are changed - PY-90394.
  Debugger and performance
  - Start the debugpy engine instantly without initialization delays when debugging on WSL - PY-90406.
  - Profile your runtime execution sessions reliably without sudden infrastructure interruptions - PY-89916.
  User interface refinements
  - Navigate your editor space more intuitively with a distinct visual separation between the minimap panel and the code - PY-90183.

  Full release notes.
