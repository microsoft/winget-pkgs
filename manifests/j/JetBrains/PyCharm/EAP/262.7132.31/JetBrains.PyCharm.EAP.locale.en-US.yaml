ReleaseNotes: |-
  LSP tools
  - Executable path detection: Avoid false "Executable Path: Not found" errors when a tool is correctly installed within the current SDK environment - PY-89952.
  - Manual path configuration: Remove a manually selected "Executable Path" for external tools whenever needed, restoring the missing layout action - PY-89941.
  - Widget settings: Navigate directly to the configuration menu using the "Open Settings" icon in the LSP tool widget, resolving a regression where the action did nothing - PY-89943.
  - UI update: Interact with a more reliable and polished UI when using the "Click to try to update" option for external tools - PY-89945.
  Interpreter settings and platform
  - uv workspace dependency declarations: Work with nested uv projects without being forced to explicitly declare <package_name> = { workspace = true } inside every single pyproject.toml file - PY-89861.
  - File launching via macOS Finder: Avoid the unintended creation of a temporary PyCharmMiscProject when launching separate files directly from the macOS native file manager - PY-89170.

  Full release notes.
