ReleaseNotes: |-
  PyCharm 2026.2 EAP 1 introduces significant improvements to code intelligence, enhanced support for major Python frameworks, and a more robust Jupyter notebook experience.
  Python and code insight
  We have refined type inference and reduced false positives across several core inspection areas:
  - Support for unittest.mock: The IDE now provides dedicated support for the unittest.mock library, including better completion for class and module attributes - PY-78622.
  - Enhanced type narrowing: You can now benefit from more precise type narrowing using the intersection type - PY-87025.
  - Improved auto-import: PyCharm now supports auto-import for nested classes (PY-87970) and completion-triggered imports for nested class hierarchies (PY-87971).
  - Smart symbol qualification: When qualifying symbols, the IDE now reuses existing module imports (PY-87972) instead of adding new ones (PY-88016).
  - Pattern matching: Improved the reliability of pasting clauses (PY-49081) and moving entire case clauses within pattern matching structures (PY-48761).
  - Argument management: New quick-fixes allow you to add names to call arguments and remove argument names effortlessly - PY-47325.
  - Self type inference: Fixed an issue where the wrong type was inferred for class methods returning typing.Self in generic classes - PY-88691.
  Jupyter notebooks
  This build addresses high-priority rendering and layout issues to provide a more stable environment for data science:
  - Customizable outputs: You can now change cell output colors and markdown preview settings, as well as disable line counts for notebooks - PY-71671.
  - Output scrolling control: PyCharm Pro users can now adjust the maximum number of lines in an output cell before it begins scrolling - PY-72667.
  - Exception breakpoints: Improved debugging experience with support for exception breakpoints that activate on termination - PY-72449.
  - Visual consistency: Jupyter file icons are now more consistent with the active kernel state - PY-85816.
  Frameworks and libraries
  Major updates for popular Python frameworks improve validation and navigation:
  - Pydantic populate_by_name: The IDE now supports the populate_by_name configuration option, allowing you to pass field names in the constructor - PY-72077.
  - Django partials: You can now navigate directly to partials - PY-88305.
  - Flask template insight: Enhanced code insight for variables in templates (PY-78703) and improved access to View objects (PY-40677).
  Core platform and stability
  - WSL application settings: Resolved a critical issue where the IDE could get stuck at saving application settings when running in WSL - PY-87390.
  - LSP settings management: External type checker (LSP) settings are now stored in a separate configuration file - PY-86020.

  Check out all the new features in the release notes.
