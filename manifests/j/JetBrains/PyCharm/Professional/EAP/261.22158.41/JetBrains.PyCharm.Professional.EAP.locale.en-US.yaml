ReleaseNotes: |-
  This build introduces the Jupyter DAP debugger as an option and focuses on environment compatibility for upcoming Python releases.
  Jupyter and Data Science
  - Debugger Evolution: Added the Debug Adapter Protocol (DAP) as an optional debugging mode for Jupyter notebooks - PY-85606.
  - Data Library Support: Resolved a regression where pandas.DataFrame was incorrectly treated as Any when using pandas 3.0 or higher - PY-87890.
  Environment Management and uv
  - uv Integration: Fixed an issue where the uv interpreter would report missing packages in monorepo setups despite dependencies being synced - PY-87722.
  - Project Creation: Normalized project name generation and improved the general UX of the New Project wizard - PY-88099.
  - Python Support: Added support for creating virtual environments for the free-threaded version of Python on Windows (PY-84734) and resolved issues with Python 3.14, including executable selection for virtual environments (PY-87838) and "missing module" errors in the standard library (PY-87914).
  Type System and Code Insight
  - Type Engine UX: Refinements to the Type engine toolbar widget - PY-87763, PY-87740.
  - Variance Correctness: Resolved false variance errors on frozen dataclasses (PY-87859) and fixed invariant variance issues on the ReadOnly attribute (PY-87913).
  - Protocol Refinements: Fixed a type mismatch error when using an ellipsis as a default argument within a Protocol - PY-87730.

  Full release notes.
