ReleaseNotes: |-
  PhpStorm 2026.1.4 is now available
  PhpStorm 2026.1.4 is a minor update, and it includes a host of bug fixes and quality-of-life improvements.
  Here are the most notable changes and bug fixes in this build:

  - Fix: PHPStan plugin ignores baseline because it runs inspections on temporary files [WI-58890]
  - Fix: Generics stop working on using method chaining or a class property [WI-70865]
  - Fix: Incorrect Test Results Tool Windows content for Pest parallel tests [WI-83851]
  - Fix: JavaScript Debug is throwing error [WEB-75974]
  - New: Allow disabling source maps when debugging [WEB-61256]
  - Fix: Xdebug session is silently ignored if mappings are set incorrectly [IJPL-246514]
  The full list of changes in PhpStorm 2026.1.4 is available in the release notes.

  - Download PhpStorm
  - Tweet us
  - Report bugs to our issue tracker
