ReleaseNotes: |-
  PhpStorm 2026.2 Beta is now available
  This build brings a host of bug fixes and quality-of-life improvements.
  Here are the most notable changes and bug fixes in this build:

  - Fix: Higher CPU activity in 'controlFlow' and 'typeInference' on a big file with lots of conditions [WI-68818]
  - Fix: Auto-import of namespaced functions does not work if there an existing import for a class with the same name [WI-57142]
  - Fix: Declaration of 'Exception->__toString()' must be compatible with 'Throwable->__toString()' false-positive on class extending an exception while implementing a Throwable-derived interface [WI-85201]
  - Fix: #[FileReference] prohibit completion out-of-project [WI-85152]
  - Fix: #[FileReference] prohibit rename refactoring out-of-project [WI-85151]
  - Fix: Enable Native WSL support for Remote Development -> WSL entry point [WI-84885]
  - New: Add support to exclude individual files from a project [IJPL-9342]
  - Fix: Long read action in com.intellij.codeInsight.daemon.impl.HighlightInfoUpdaterImpl.addEvictedInfos [IJPL-235455]
  - Fix: WSL/Ijent: Project tool window right-click context menu freezes (ijent::-env_var::get_environment_variables) [IJPL-229839]
  - New: Markdown: handle line numbers fragments in links [IJPL-93490]
  - Fix: Build from a multistage Dockerfile fails when target stage is specified in Docker Compose [IJPL-182853]
  - Fix: The project tree gets fully collapsed after a successful sync [IJPL-236617]
  The full list of changes in PhpStorm 2026.2 is available in the release notes.

  - Download PhpStorm
  - Tweet us
  - Report bugs to our issue tracker
