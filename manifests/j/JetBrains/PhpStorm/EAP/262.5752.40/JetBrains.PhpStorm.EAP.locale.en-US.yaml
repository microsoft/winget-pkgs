ReleaseNotes: |-
  PhpStorm 2026.2 EAP #2 is now available
  This build brings a bunch of bug fixes and quality-of-life improvements.

  Here are the most notable changes and bug fixes in this build:

  - Fix: Markdown "cannot resolve anchor" warning when using HTML anchors [IJPL-92395]
  - Fix: Markdown preview doesn't render images from outside the project [IJPL-171896]
  - Fix: Terminal: Cursor is rendered above current line when inside tmux [IJPL-102697]
  - New: Markdown: handle line numbers fragments in links [IJPL-93490]
  - Fix: Window header disappears after opening more than one project (when isFullScreenSupported = false) [IJPL-43505]
  - Fix: Markdown table incorrectly marked as not correctly formatted [IJPL-92191]
  - New: Run Markdown commands from the project's root directory [IJPL-92401]
  - Fix: Deadlock caused by thread pool exhaustion due to VcsRepositoryManager lock contention [IJPL-243672]
  - New: Allow disabling source maps when debugging [WEB-61256]
  - Fix: Empty "threadDump-freeze" folders generated [IJPL-1184]
  - Fix: DevContainers plugin should depend on Remote Execution Agent plugin [IJPL-159130]
  - New: Markdown: Create link from selection [IJPL-93440]

  For the full list of changes in this build, please see the release notes.
