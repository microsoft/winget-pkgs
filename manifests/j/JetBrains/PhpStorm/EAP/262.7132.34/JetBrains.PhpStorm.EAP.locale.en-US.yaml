ReleaseNotes: |-
  PhpStorm 2026.2 EAP #5 is now available
  This build brings a bunch of bug fixes and quality-of-life improvements.

  Here are the most notable changes and bug fixes in this build:

  - Fix: Download From Default Server doesn't respect "Always" button [WI-38409]
  - Fix: Code style: Wrapping on assignment statement should create an indent level [WI-35221]
  - Fix: Annotation incorrectly converted to attribute [WI-83036]
  - Fix: Undefined class constant when there are spaces before the :: operator [WI-42830]
  - Fix: PHPStorm should throw an error on "$a instanceof instance::class" [WI-65093]
  - Fix: More accurate Blade PHP injection [WI-84279]
  - Fix: PhpUnit annotation can be converted to attribute: Colon in a plain string in test data is converted to => [WI-74231]
  - Fix: PhpStorm PhpClosureCanBeConvertedToShortArrowFunctionInspection is falsely triggered on property hook [WI-80774]
  - Fix: Single statement style foreach loop causing false positive "Condition is always false ..." [WI-83713]
  - Fix: Inconsistent rename refactoring via MCP [WI-84080]
  - Fix: Copy class name from declaration does not add import [WI-84159]
  - Fix: PHP parse error is not reported for instanceof agains enum case [WI-84204]
  - Fix: Settings | PHP | Composer is always marked as modified [WI-84233]
  - Fix: PER-CS 3.0: §6.4 binary operator placement issue [WI-84845]
  - Fix: PER-CS 3.0: §4.9 false-positive PhpPromotedPropertyLongSetHookInspection [WI-84846]
  - Fix: PER-CS 2.0: §2.3 soft 120-character line length format issue [WI-84850]
  - Fix: PER-CS 3.0: §2.5 if one of the types listed is null, it must come last [WI-84851]
  - Fix: PER-CS 3.0: §4.10 The operation block MUST be on the same line as the property. [WI-84855]
  - Fix: PER-CS 2.0: §6.1 extra spaces inside cast parentheses are not removed [WI-84857]
  - Fix: PER-CS 2.0: §6.1 reformat does not collapse line break between type cast and operand [WI-84858]
  - New: Full support for OSC8 terminal hyperlinks [IJPL-103740]
  - New: Support additional syntaxes to recognize Markdown TODO comments [IJPL-92221]

  For the full list of changes in this build, please see the release notes.
