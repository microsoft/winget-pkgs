ReleaseNotes: |-
  PhpStorm 2026.1 EAP #7 is now available
  This build brings a bunch of bug fixes and quality-of-life improvements.

  Here are the most notable changes and bug fixes in this build:

  - Fix: Support PHP 8.5 First Class Callables in constant expressions [WI-82660]
  - Fix: Rsync escaping quotes preventing --option="some thing" [WI-70186]
  - Fix: PhpStormBehatFormatter does not work with Symfony 8/future Behat versions [WI-83883]
  - Fix: PHPStorm: inappropriate PHPUnit hint for property hooks [WI-82720]
  - Fix: Codeception: Support Symfony 8 [WI-83707]
  - Fix: Endless indexing of a compiled template file: java.io.UTFDataFormatException: encoded string (#-#-#-#-...Access∆n) too long [WI-83565]
  - Fix: PHP 8.5 Pipe Operator: new inspection 'Pipe operator can be used' [WI-83144]
  - Fix: PHP 8.5 Pipe operator: completion suggests wrong options [WI-83122]
  - Fix: Improve type display in quick doc for template types [WI-83093]
  - Fix: Svelte 5 attachments (`@attach`) not recognized [WEB-73331]
  - Fix: Don't report ionic lifecycle hooks as unused [WEB-41604]
  - Fix: Menu bars are not reachable by pressing Alt button on Windows [IJPL-58454]
  - Fix: Angular signal effects being shown as unused [WEB-65078]
  - Fix: NgRx: Effects created by createEffect are being shown as unused [WEB-55172]
  - Fix: Alt key calls context menu on Windows [IJPL-47743]
  - Fix: 'Mismatched parameters' when using css variables [WEB-41093]
  - Fix: Running Vitest tests from Editor results in error in Angular projects [WEB-76536]
  - Fix: Terminal: shell application tab title doesn't work in Reworked engine [IJPL-221050]

  For the full list of changes in this build, please see the release notes.
