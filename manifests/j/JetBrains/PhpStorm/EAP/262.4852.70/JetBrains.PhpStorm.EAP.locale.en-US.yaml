ReleaseNotes: |-
  PhpStorm 2026.2 EAP #1 is now available
  This build brings a bunch of bug fixes and quality-of-life improvements.

  Here are the most notable changes and bug fixes in this build:

  - Fix: Method return type described with array shape isn't parsed in @method annotation [WI-62630]
  - Fix: ArrayShape: support nested arrays without keys [WI-65168]
  - Fix: Resolve path from "asset()" call in twig template according to AssetMapper [WI-76188]
  - Fix: Several actions aren't shown in Help menu in PhpStorm when running in remote dev mode [WI-84598]
  - Fix: Address low hanging fruits for excessive recursion [WI-84172]
  - Fix: Repeated low-memory signals during project indexing – 10+ compaction cycles in 2 minutes [WI-84075]
  - Fix: Inspection "missing 'break' statement" doesn't work if cases are in curly braces (Inspection ID: PhpMissingBreakStatementInspection) [WI-83944]
  - Fix: Unnecessary curly braces false positive for an array variable [WI-83937]
  - Fix: Getter/Setter can be replaced with hook: breaks with parent:: usage [WI-83915]
  - Fix: Parentheses around the 'new' call can be omitted with self-invoking function [WI-83913]
  - Fix: Short bursts of high coretemp.0 temperature while editing PHP source code [WI-79464]
  - Fix: Bookmarks lost on branch changes [IJPL-62074]
  - New: Support footnotes [IJPL-91141]
  - Fix: Allow to filter out usages in javadoc [IJPL-49945]
  - Fix: New UI/Run widget: do not collapse run configuration name [IJPL-61108]
  - Fix: Pinned temporary Run Configuration disappears if 'Temporary configurations limit' is exceeded [IJPL-61104]
  - Fix: Provide the ability to change the limit for "Too many results found" dialog when searching [IJPL-50012]
  - Fix: @vue/language-server ^3.0.0 Support [WEB-73932]
  - Fix: Plugins section Tabs are partially visible in Welcome page [IJPL-224007]
  - Fix: Long read action in com.intellij.codeInsight.daemon.impl.HighlightInfoUpdaterImpl.addEvictedInfos [IJPL-235455]
  - Fix: Menu bars are not reachable by pressing Alt button on Windows [IJPL-58454]
  - Fix: Scrolling speed is non-standard in markdown preview mode [IJPL-91133]
  - Fix: Git update is disabled on the active branch [IJPL-240184]
  - Fix: Split editor results in duplicated elements in switcher with Tab placement: None [IJPL-213603]
  - New: Ranking in Plugins search [IJPL-7519]
  - Fix: Non-modal setting tab uses only half Editor area [IJPL-178292]
  - Fix: Conflicting plugin dialog doesn't respond [IJPL-163412]
  - Fix: Alt key calls context menu on Windows [IJPL-47743]
  - Fix: IDE 2026.1 broke Live Templates with groovyScript() [IJPL-241581]
  - Fix: Paste removes leading dash in yaml [IJPL-171652]
  - Fix: Launch `wsl.exe -d Ubuntu` via ijent in WSL [IJPL-236576]
  - Fix: Digest authentication stopped working in the HTTP client as of 2024.1.1 [IJPL-149024]
  - Fix: Add -h and/or --help command line option to command line interface [IJPL-34974]
  - Fix: Cannot Show Diff In External Tool [IJPL-241256]
  - Fix: Drag-and-drop with mouse of code on its own spot makes the code disssapear [IJPL-235895]
  - Fix: Svelte 5 named snippets warn with Unused Function Title [WEB-70432]
  - Fix: IDE Freeze: FUS Telemetry Deadlock [IJPL-224542]
  - Fix: SpringBoot run failure: JMX port binding issue in WSL2 with mirrored networking mode [IJPL-211094]
  - Fix: Stop button may not appear with split debugger implementation [IJPL-190483]
  - Fix: Breakpoint shown on hover does not disappear after moving the mouse away [with always Showing code folding arrows] [IJPL-172340]

  For the full list of changes in this build, please see the release notes.
