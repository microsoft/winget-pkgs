ReleaseNotes: |-
  PhpStorm 2026.2 EAP #6 is now available
  This build brings a bunch of bug fixes and quality-of-life improvements.

  Here are the most notable changes and bug fixes in this build:

  - Fix: Implement PER-3 codestyle in PHP formatters [WI-81988]
  - Fix: Quality Tools: Cannot save path to the executable [WI-82117]
  - Fix: Single statement body with braces inspection removes comments [WI-84396]
  - Fix: Refactoring foreach to array_any gives TypeError [WI-84128]
  - Fix: Make it possible to run PHPUnit tests with Pest [WI-83682]
  - Fix: Native Dev Container: Node.js runtime not auto-detected (unlike JDK), causing GUI test runners to fail with virtual path errors. [WEB-77458]
  - Fix: Markdown: occurrences inside backticks are reported as usages in code [IJPL-245911]
  - New: Please make drag'n'drop file or directory into terminal insert its path [IJPL-103786]
  - New: Terminal: support files / folders drag-n-drop from other applications [IJPL-113990]
  - Fix: Xdebug session is silently ignored if mappings are set incorrectly [IJPL-246514]
  - Fix: Make Setting more fail safe: show Settings even in case of exceptions in plugins [IJPL-231363]

  For the full list of changes in this build, please see the release notes.
