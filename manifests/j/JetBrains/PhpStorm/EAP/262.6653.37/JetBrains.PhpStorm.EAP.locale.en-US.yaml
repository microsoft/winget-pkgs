ReleaseNotes: |-
  PhpStorm 2026.2 EAP #4 is now available
  This build brings a bunch of bug fixes and quality-of-life improvements.

  Here are the most notable changes and bug fixes in this build:

  - Fix: PHPStan timeout / not analyzing individual files / not killing abandoned processes. [WI-84884]
  - Fix: Incorrect Test Results Tool Windows content for Pest parallel tests [WI-83851]
  - New: Support searching and customizing shortcuts like Double-Shift/Control/Alt in Keymaps [IJPL-61450]
  - Fix: Incorrect Markdown table formatting with Chinese [IJPL-93388]
  - Fix: Detect powershell when it's installed from the windows store [IJPL-106244]
  - Fix: Suppress any Java warnings when opening from command line [IJPL-35314]
  - Fix: JSHint: replace obsolete Rhino JavaScript engine with Node.js (jshint npm package) [WEB-78069]
  - Fix: HTML Syntax Highlighting Not Applied in Markdown Files [IJPL-95818]
  - Fix: Using "Unsplit" on a file split multiple times doesn't remove corresponding entries from the list in Switcher [IJPL-61760]
  - New: Set for JVM flags to compact object headers by default [IJPL-212987]

  For the full list of changes in this build, please see the release notes.
