ReleaseNotes: |-
  PhpStorm 2026.1.2 Preview
  There's a preview available of PhpStorm 2026.1.2, the upcoming minor release of PhpStorm. It brings a number of bug fixes and quality-of-life improvements.
  Here are the most notable changes and bug fixes in this build:

  - Fix: Interface and type parameters are not colored in remote environment [WEB-75991]
  - Fix: Menu bars are not reachable by pressing Alt button on Windows [IJPL-58454]
  - Fix: Project cannot be opened via .ipr file generated by Gradle 'idea' task [IJPL-242321]
  - Fix: Alt key calls context menu on Windows [IJPL-47743]
  - Fix: Path aliases with wildcards in name aren't used for auto-import [WEB-62873]
  - Fix: IDE 2026.1 broke Live Templates with groovyScript() [IJPL-241581]
  - Fix: Cannot Show Diff In External Tool [IJPL-241256]
  - Fix: Drag-and-drop with mouse of code on its own spot makes the code disssapear [IJPL-235895]
  - Fix: IDE Freeze: FUS Telemetry Deadlock [IJPL-224542]
  The full list of changes in PhpStorm 2026.1.2 is available in the release notes. You can download this preview here:
  - PhpStorm-261.24374.36.exe
  - PhpStorm-261.24374.36.dmg
  - PhpStorm-261.24374.36-aarch64.dmg
  - PhpStorm-261.24374.36.tar.gz
  - PhpStorm-261.24374.36.win.zip

  That's all for today. Thanks for keeping up with the changes! We hope they improve your PhpStorm experience.
  - Download PhpStorm
  - Tweet us
  - Report bugs to our issue tracker
