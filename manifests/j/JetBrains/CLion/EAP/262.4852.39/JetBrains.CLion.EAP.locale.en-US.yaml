ReleaseNotes: |-
  The Early Access Program (EAP) for CLion 2026.2 has launched, and the first EAP build is out! Here are the highlights:
  - The debugger now automatically tracks fields and global variables, displaying them in the Threads & Variables pane. This feature is enabled by default. To disable it, go to Settings | Build, Execution, Deployment | Debugger | Data Views | C/C++ | Variables. We’d love to get your feedback on this update in CPP-4992.
  - You can now assign breakpoints to a specific debug configuration, making it easier to debug multi-process systems or multiple tests (CPP-34455).
  - Live watches now support arrays and structs, and a new button lets you clear the variable value history.
  Please try this build, share your feedback, and report any issues to issue tracker.
