ReleaseNotes: |-
  The latest CLion 2026.2 EAP build is out. CLion Classic, the legacy language engine, has been removed from the IDE and is now available as a separate plugin on JetBrains Marketplace. This update is the final step in our plan to make CLion Nova the default engine for everyone. To learn more about the reasoning behind this decision, read our blog post. To continue using CLion Classic, install the C/C+​+​ Language Support via Classic Engine plugin from Settings | Plugins | Marketplace.
  Try this build, share your feedback, and report any issues to our issue tracker.
