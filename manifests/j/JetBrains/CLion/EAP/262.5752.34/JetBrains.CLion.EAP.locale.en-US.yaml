ReleaseNotes: |-
  The latest EAP build for CLion 2026.2 includes the following major updates:
  - You can now rename targets in your CMakeLists.txt files automatically using the Rename refactoring action (Shift+F6). It will update all definitions and usages of the target name across your project.
  - We’ve updated the bundled CMake to v4.3 and GDB to v17.1.
  - You can now invoke the Inline refactoring on a function declaration to inline all its usages in a single step.
  - Dynamic memory allocations in constexpr and consteval code are now evaluated correctly. This also enables CLion to evaluate code that uses standard containers such as std::vector and std::string.
  - The Extract Method refactoring now works inside lambda bodies, letting you move complex lambda code into separate functions without manual edits.
  - CLion now detects C++ variables, functions, and classes that can be marked as static or moved into an anonymous namespace to enforce internal linkage.
  Please try this build, share your feedback, and report any issues to our issue tracker.
