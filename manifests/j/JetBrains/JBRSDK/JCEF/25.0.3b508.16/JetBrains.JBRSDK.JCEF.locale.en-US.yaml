Description: >
  JetBrains Runtime is a fork of OpenJDK available for Windows, Mac OS X, and Linux. It supports
  enhanced class redefinition (DCEVM), features optional JCEF, a framework for embedding
  Chromium-based browsers, includes a number of improvements in font rendering, keyboards support,
  windowing/focus subsystems, HiDPI, accessibility, and performance, provides better desktop
  integration and bugfixes not yet present in OpenJDK.
