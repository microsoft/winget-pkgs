ReleaseNotes: |-
  原理图
  - 修复编辑器件符号时，器件描述无法修改的问题
  - 修复从 2.2 版本升级到 3.2 后，原理图设置中的默认引脚长度和间距数值不正确的问题
  - 修复设置中修改矩形、圆形和椭圆线型无效，线型属性会被置空的问题
  - 修复使用扩展插件生成网络标签，保存后重新打开位置变了的问题
  - 修复网络树、全局网络名、原理图转 PCB 时，网络名全部被转成大写的问题
  - 修复修改默认引脚长度值后，新建符号放置引脚时长度未按设置显示的问题
  - 修复组合器件在封装管理器更新封装时触发异常警告的问题
  - 修复 eprj2 工程以 epro 格式另存为本地文件失败，提示编码错误的问题
  - 修复导入附件 epro 文件后左侧树空白的问题
  - 修复从个人库重复放置复用模块时，无法复用布局布线的问题
  - 修复更新原理图到 PCB 时，无法传递到另一个窗口打开的 PCB 的问题
  PCB
  - 修复无法复制附件 PCB、附件 PCB 上下图页无法复制的问题
  - 修复导出 Gerber 提示失败的问题
  - 修复 DRC 检查卡在 50% 的问题
  - 修复粘贴含有桥接铜的填充区域时，右侧桥接铜网络缺少一个网络的问题
  - 修复草图自动布线时，过孔没有按网络规则尺寸生成的问题
  - 修复多路布线时打孔后切层选项被置灰的问题
  - 修复待确定导线在鼠标搭上导线后空格旋转失效的问题
  - 修复物理堆叠修改层顺序后重新打开，内层线路错乱的问题
  - 修复从焊盘出发布线时没有显示实时长度的问题
  - 修复铺铜管理器中重建所有铺铜无法重建内电层的问题
  - 修复复制过孔粘贴后选择不同网络，右侧属性不更新，重新打开会变回原网络的问题
  - 修复设计规则弹窗点击网络-网络规则后弹窗关闭的问题
  - 修复裁剪后的铺铜区域复制粘贴，粘贴后铺铜名称重复的问题
  - 修复导出 IPC-2581C 查看封装名称时部分显示乱码的问题
  - 修复修改板子厚度后重新打开值不一致的问题
  - 修复焊盘布线连接到另一个焊盘后不会自动退出布线状态的问题
  - 修复勾选拖动封装时吸附原点，选择参考点后变成了原点移动的问题
  - 修复替换器件时勾选合并属性，替换后属性显示不对的问题
  - 修复编辑封装后保存，回到 PCB 后没有变化的问题
  - 修复多层焊盘内字体没有跟随“多层”激活的问题
  - 修复打开 PCB 进度条一直加载的问题（提升加载稳定性）
  - 修复复制带有网络的填充到多个网络图元上没有日志提示的问题
  - 修复编辑异形焊盘时无法撤销重做的问题
  格式转换
  - 修复简易模式下导入专业版符号库文件，导入符号没有自动创建器件、库导入弹窗为空的问题
  - 修复导入超过 1GB 文件时提示的数值不对的问题
  - 修复导入标准版工程到专业版中，不识别专业版图纸边框的问题
  - 修复导入 Altium 文件时：卡进度条 57%、焊盘形状/助焊拓展/旋转角度不正确、圆角矩形焊盘变直角、图片和铺铜填充边缘变尖锐、游离焊盘与封装内异形焊盘导入不一致等问题
  - 修复导入 Allegro 文件失败、提示格式不正确的问题
  - 修复导入 Protel 文件失败、PCB 元件未自动生成唯一 ID 的问题
    - 导出修复：
  - 修复导出 Altium 时符号内容不正确、原理图主题样式未导出（全黑色）的问题
  - 修复使用模板导出 BOM 时单元格被拆分、与模板不一致的问题
  - 修复通过 iframe 和通过独立脚本导出 BOM 的文件大小不一致的问题
  - 修复另存为符号为 epro 提示转换失败的问题
  - 修复导出 3D 外壳文件和预览不一致，导出后挖槽消失的问题
  其他
  - 工程与库管理：
    - 修复放置外部库器件到画布中，右侧属性 3D 模型为空的问题
    - 修复右键编辑符号修改引脚后保存，底部栏工程库中搜不到该符号的问题
    - 修复个人库的复用模块无法编辑器件的问题
    - 修复在工作区删除工程后通过 URL 打开提示“工程数据未找到”的问题
    - 修复器件另存为时点击取消仍提示“库另存为成功”的问题
    - 修复新建器件弹窗样式变化的问题
    - 修复只读模式的底部库在面板库新增时提示错误的问题
    - 修复团队库器件放置到画布后，工程库中归属显示错误的问题
    - 修复复用模块工程另存为弹窗保存置灰的问题
    - 修复右键 PCB 另存为复用模块时显示有问题（含长名称场景）
  - 3D 模型与预览：
    - 修复 3D 模型导入后显示黑色小块的问题
    - 修复加载其他模型时切换显示，切换后无法显示 3D 模型的问题
    - 修复本地 STEP 文件较大时底部 3D 模型预览无法加载的问题
    - 修复 3D 外壳预览与 3D 预览浮动工具显示不一致的问题
  - 界面与交互优化：
    - 修复左侧图页树搜索对象后右侧属性栏一直卡在工程页面的问题
    - 修复铺铜管理器中输入关联网络时使用方向键导致页面滚动的问题
    - 修复铺铜管理器中可修改铺铜网络名称有小写字母的问题
    - 修复引脚延迟管理器导入 CSV 文件提示格式错误的问题
    - 修复半离线模式下编辑封装保存时控制台报错的问题
    - 修复点击在线聊天图标页面显示错误的问题
    - 文档另存为新增分析底层图确认弹框
    - 软件名称根据授权显示（品牌授权相关）
    - DFM 拼版工具：增加图片缩放拖拽、滚轮缩放、邮票孔类型映射、V-cut 支持等功能优化
    - 新增 SMT 组装工具模块
    - 扩展 API：打开文件窗口支持多选文件和指定扩展名
