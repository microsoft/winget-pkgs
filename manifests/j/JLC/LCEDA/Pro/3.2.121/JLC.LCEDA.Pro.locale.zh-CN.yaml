ReleaseNotes: |-
  原理图
  - 修复导出 PDF 时内容错位的问题
  - 修复特殊属性器件（名称 ={value}）无法选中修改值的问题
  PCB
  - 修复工程历史还原后器件丢失的问题
  - 修复部分网络无法走线、桥接铜的“根据选择添加网络”功能失效的问题
  - 修复复制粘贴元件不显示/报错、粘贴失效导致画布卡住等问题
  - 修复全选 PCB 内容复制到新建 PCB 失败的问题
  - 修复阵列保存后重新打开 PCB，部分器件封装变化的问题
  - 修复自动布线（速度优先）后底层布线丢失的问题
  - 修复彩色丝印相关：圆形板框挖空显示异常、真彩图片拖动后导出 Gerber 残留旧图的问题
  - 修复从 Word 粘贴 PCB 的 SVG 显示错误
  - 修复添加批注后刷新提示“图元已删除”的问题
  - 修复导出 3D 模型时特定颜色（紫色）导致 STEP 文件错误，以及 3D 外壳预览中侧面实体异常移动的问题
  其他
  - 修复导入附件工程时进度条卡在 25% 的问题
  - 修复导入工程后放置元件无反应、工程闪退等问题
  - 修复半离线模式下器件库 3D 预览显示黑色方块的问题
  - 修复 PCB 左侧对象树搜索栏无法输入、高亮图标无法点击的问题
  - 修复导入 Altium 文件时爬电间距规则未导入、封装缺失的问题
  - 修复导入 DXF 文件无法显示（原理图部分）的问题
  - 修复导入工程后图纸变形的问题
