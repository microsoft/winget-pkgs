  - 修复阵列保存后重新打开 PCB，部分器件封装变化的问题
  - 修复自动布线（速度优先）后底层布线丢失的问题
  - 修复彩色丝印相关：圆形板框挖空显示异常、真彩图片拖动后导出 Gerber 残留旧图
  - 修复从 Word 粘贴 PCB 的 SVG 显示错误
  - 修复添加批注后刷新提示“图元已删除”
  - 修复复制真彩图片到新 PCB 首次粘贴不显示的问题
  - 修复开启吸附时编辑轮廓没有吸附栅格
  - 修复移动过孔靠近导线时错误吸附的问题
  - 修复编辑轮廓后双击边框无法继续编辑的问题
  - 修复网络名含小写字母时导线网络名显示灰色、悬浮显示长度为 0 的问题
  - 修复带自定义层的封装放置时出现图层错误的问题
  - 修复开启自动铺铜后添加泪滴导致引脚与铺铜连接丢失
  - 修复焊盘网络含小写时布线不会自动吸附焊盘
  - 修复封装编辑器中复制粘贴焊盘会丢失自定义属性
  - 修复批量复制铺铜时丢失网络
  - 修复复制 PCB 内容（含直连铺铜）到新建 PCB 后重建铺铜效果错误
  - 修复复制粘贴后丢失部分器件、锁定对象被解锁的问题
  - 修复 V2 工程导入 V3 后拼版设置改变
  - 修复拉伸导线时小写网络名变成大写且无法撤回恢复
  - 修复绘制相交异形焊盘自动拆分后两个焊盘 ID 相同的问题
  - 修复网格铺铜导出 3D 文件长时间加载不完的问题
