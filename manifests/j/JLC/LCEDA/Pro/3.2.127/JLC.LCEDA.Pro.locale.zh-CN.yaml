ReleaseNotes: |-
  原理图
  - 修复导出 PDF 时内容错位的问题
  - 修复特殊属性器件（名称 ={value}）无法选中修改值的问题
  - 修复导出的仿真网表（.dsnet）获取失败的问题
  - 修复复用图块符号编辑页按 PgDn 会错误新建部件的问题
  - 修复修改文档源码失败、无法替换器件的问题
  - 修复组合器件在封装管理器更新封装时触发异常警告
  - 修复导入附件工程后左侧树空白的问题
  - 修复隐藏网络标签后刷新会自动显示，以及历史预览/还原时网络名称未自动显示的问题
  - 修复右侧批注面板点击批注后跳转到属性面板的问题
  PCB
  - 修复还原最老的工程历史后器件丢失的问题
  - 修复部分网络无法走线、桥接铜“根据选择添加网络”功能失效的问题
  - 修复复制粘贴元件不显示/报错、粘贴彩色丝印失效导致画布卡住等问题
