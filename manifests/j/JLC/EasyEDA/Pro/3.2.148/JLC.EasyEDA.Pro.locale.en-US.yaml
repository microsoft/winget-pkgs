ReleaseNotes: |-
  desktop client coming soon.
  NOTICE: if your proejct was edited by V3, you will not open the lastest project status at V2.2, they are seperated!
  Common
  - Extension API: Open file window supports multi-file selection and specifying file extensions
  - Document save as adds bottom layer analysis confirmation dialog
  - Software name displays based on license (brand licensing related)
  - Redesigned schematic/footprint/3D model display window (store page), added Datasheet loading prompt, multi-language support
  - Panel supports right-click image to generate stroke
  - Panel supports processing images to PNG format in production files
  - Sensitive image detection integrated for uploaded images (security enhancement)
  - PCB one-click order copy adds FPC description
  - Color silkscreen export for single-layer board adds validation prompt
  Schematic
  - LED base parameter values adjusted
  - Add assembly variant configuration
  - Add bottom property list function
  - Support adding multiple net labels to a single wire
  - Add cross-page connector symbol
  - Support setting connection range for net labels and net identifiers
  - Support setting PCB design rules in schematic
  - Design rules support checking pin types and net types
  - Add schematic comparison function
  - Reusable module supports automatic reference designator assignment
  - Reusable module supports update synchronization
    PCB
  - Brand new auto placement (dual engine)
  - Brand new auto routing, dual engine, supports equal-length differential pair auto routing
  - Support editing pin length in footprint editor (Pin Delay Manager)
  - Support shorting operation between different net names (bridging copper)
  - Support dynamic copper pour rebuild
  - Add copper pour cropping and cutout function
  - Support wire cropping
  - Support setting net rules per layer
  - Support creating new PCB from template file
  - Support auto-add test points
  - Support placing castellated holes (mouse bites)
  - Footprint wizard supports creating 3D model library
  - Support setting footprint pad length
  - Support new highlight mode
  - Support adding reference designator map and BOM table in PDF export
  - Support creating footprints based on IPC-7351B naming standard
  - Support exporting IPC-D-356A format files
  - Support different color display inside/outside board outline
  Format Conversion (Import/Export)
  - Support importing associated project libraries
  - Support importing T/DISA format symbols and footprints
  - Support importing bus as-is, name restrictions removed
  - Support importing multi-layer pad solder mask and solder paste expansion
  - Add option to generate footprint with same name based on footprint type
  - Adjust file format selection dialog for project and library save-as-local
  - Drill symbol size and thickness increased to 1.4x
  - Add prompt for automatic image compression on import
  Extension API
  - Add SES routing file import interface
  - Schematic supports non-connected identifier placement API
  - React component-based popup window type passing
  - Add interface for modifying existing custom rules
  - Add default pin spacing setting
  - Add IPC-2581C file interface definition
  - Add schematic net-related interface definition
  - Add schematic BOM template operation interface definition
  - Add symbol and footprint rendering image interface definition
  - Update symbol and footprint image interface definitions, remove support for symbol/footprint files
  - Supplement missing type exports
  - Fix uninferrable type conversion in PCB device primitives
  - Fix partial code syntax and Lint errors
  - Change all categories to string array to support multi-level categories
  - Add name field to schematic device associated properties
  - Define and add DISA simulation netlist
  - Add netlist file support for DISA simulation netlist
  - Add symbol and footprint rendering image interface definition
  - Remove legacy document generation code
  - Disable alert inside extension
  - Add schematic embedded object primitive definition
  - Verify symbol and footprint rendering image interfaces
  Project & Library Management
  - New extension manager (Top menu - Advanced - Extension Manager)
  - New script manager (Top menu - Advanced - Script List - Script Manager)
  - Built-in version management, supports project version branch switching (Top menu - File - Version Control)
  - Support project and document history recording and rollback (Top menu - File - Project History)
  - Add project and library recycle bin (Top menu - File - Recycle Bin)
  - Add dark mode (Top menu - Settings - System - General)
  - New project archive format epro2 (Top menu - File - Save As - Save Project to Local)
  - Support exporting V2.2 format files epro and elibz
  - Support exporting T/DISA 4001-2025 format
  - Add bottom cursor bar, supports custom zoom ratio
  - Support searching standard edition public libraries for placement (Bottom - Library - Search - Standard Public Library)
  - Remove per-minute update check logic
  - Optimize memory usage
