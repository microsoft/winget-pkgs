ReleaseNotes: |-
  VoxDMR 0.13.2 🔧
  A small bugfix and polish release on top of 0.13.1.
  Platforms: Android (arm64-v8a, armeabi-v7a/32-bit) · Linux x86_64 · Windows x86_64
  > 📱 Which Android APK? Most people want arm64-v8a from the Play Store. The 32-bit (armeabi-v7a) APKs are built specifically for PoC radios and older Android phones: install those manually, not from the Play Store.

  🐛 Fixes
  - Scan notification tracks the active talkgroup [Android] - while scanning, the playback notification now updates to show the talkgroup you're actually hearing instead of the armed set. See Talkgroups.
  - Windows DMR ID database update [Desktop] - updating the offline DMR ID database no longer fails on Windows with "os error 5" (access denied). See Talkgroups.

  ✨ Polish
  - Accessibility disclosure [Android] - the About screen now surfaces the accessibility disclosure.
  - About blurb broadened [Desktop] - the About text now describes VoxDMR beyond BrandMeister, reflecting support for other DMR networks.
  No config, paths, or protocol semantics changed.
