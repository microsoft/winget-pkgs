Description: |-
  QuickView is a high-performance image viewer for Windows, built with Direct2D hardware acceleration
  and Google Highway SIMD optimization. It supports 80+ image formats including JPEG XL, AVIF, HEIC,
  WebP, and RAW files. Features include HDR display support, portable mode, and GPU-accelerated rendering.
