ShortDescription: 로컬 우선 PDF 데스크톱 앱
Description: |-
  LocalPDF Studio는 Tauri로 만든 로컬 우선 PDF 뷰어 및 도구 모음입니다.
  주요 기능:
  - PDF 보기 / 텍스트 검색 / 페이지 썸네일 / 목차
  - 병합 / 분할 / 암호화 / 압축
  - OCR (Tesseract 자동 설치), 검색 가능 PDF 생성
  - 페이지 편집(재정렬/삭제/회전/삽입)
  - 메타데이터 편집, 폼 채우기, 책갈피, 분할 뷰 비교
  - 워터마크 / 스탬프
  모든 처리는 로컬에서 수행됩니다 — 클라우드 업로드 없음.
