ReleaseNotes: |-
  Features
  - A customer notification banner has been added for an intermediate message from the OnSIP team.
  - Unread messages from the Messaging page now show up as a browser notification, if enabled.
  - 10-digit phone numbers for messages are automatically converted to contacts.
  - Unsaved phone numbers from the recent call table and conversation list now show up when searching for messaging recipients.
  - The conversation list’s dates now match the dates shown on a cellphone message list.
  - A tooltip displaying the phone number now appears over the Conversation list name if it is a contact name.
  Fixes
  - Issue where sending an initial message did not take the user to the correct conversation window has been fixed.
  - The message window has been increased to take up more of the visible screen.
  - The first conversation in the Conversation list is no longer automatically selected.
