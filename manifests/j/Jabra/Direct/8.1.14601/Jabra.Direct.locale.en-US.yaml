ReleaseNotes: |-
  New Features:
  - Added support for Jabra PanaCast U30.
  - Added a new user experience when no device is connected to Jabra Direct.
  Updated:
  - Removed support for Windows 32-bit client install. Please see supported OS versions at Jabra Direct.
  - Updated the user experience to make it easier to pair a new headset with a Link 370, Link 380 and Link 390 dongle.
  - Updated Zoom plugin for Windows and macOS.
  - Updated multiple subcomponents for Mac to support Apple Silicon processors.
  Fixed:
  - If accidently unplug a device during firmware update and reinserting the device to the USB port, Jabra Direct could continuously display error code 18.
  - Rosetta warning pop up on macOS has been resolved.
  Security Updates:
  - Addressed the vulnerability related to CVE-2025-22871
  - Addressed the vulnerability related to CVE-2024-24790
  - Addressed the vulnerability related to CVE-2023-24531
  - Addressed the vulnerability related to CVE-2023-29827
