ReleaseNotes: |-
  Version 2.0.0 - New installation system with WiX Toolset

  New Features:
  - Modern installation system with WiX Toolset v6
  - Role-based installation (Server/Client/Standalone)
  - Automatic migration from InnoSetup installations
  - Multi-language support (German/English)
  - Automatic prerequisite installation (.NET 8, WebView2)
  - Integrated JTL-Administrator setup

  Improvements:
  - Faster installation through optimized compression
  - Better error handling and logging
