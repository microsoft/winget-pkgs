ReleaseNotes: |-
  Version 2.0.0 - Neues Installationssystem mit WiX Toolset

  Neue Features:
  - Modernes Installationssystem mit WiX Toolset v6
  - Rollenbasierte Installation (Server/Client/Standalone)
  - Automatische Migration von InnoSetup-Installationen
  - Multi-Sprach-Support (Deutsch/Englisch)
  - Automatische Prerequisite-Installation (.NET 8, WebView2)
  - Integrierte JTL-Administrator-Einrichtung

  Verbesserungen:
  - Schnellere Installation durch optimierte Komprimierung
  - Bessere Fehlerbehandlung und Logging
