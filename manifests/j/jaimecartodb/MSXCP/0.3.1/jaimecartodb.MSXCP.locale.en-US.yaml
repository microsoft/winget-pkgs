ShortDescription: AI-powered governance report engine for Microsoft Sales (MCAPS) — the EMEA Digital Natives team's MSX/CRM pipeline assistant.
Description: |-
  MSXCP turns Microsoft Sales Experience (MSX) into a conversation. Instead of
  navigating dashboards, sellers and leaders describe what they need in natural
  language: "Generate my weekly report", "Update the milestone amount",
  "Which accounts are at risk?" — and MSXCP handles CRM reads, milestone
  updates, and publication-ready Word/HTML reports in one step.

  The engine repository (mcaps-microsoft/msxcp-engine) is Internal-visibility
  in the Microsoft EMU GitHub enterprise — every MCAPS employee can install
  and run MSXCP after authenticating with their @microsoft.com account. The
  canonical install one-liner is `irm https://aka.ms/msxcp | iex`.

  v0.3.1 fixes a silent hang in the bootstrap when it was invoked via
  `irm | iex` and the GitHub OAuth `read:org` scope was already granted (the
  bootstrap now skips the unnecessary `gh auth refresh` call). v0.3.x also
  introduces the canonical aka.ms/msxcp shortlink and migrates the working
  repo to mcaps-microsoft.
