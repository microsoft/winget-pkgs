ShortDescription: 一款基于 Electron 开发的现代化跨平台桌面级笔记应用，数据本地存储，让数据始终安全可控。
Description: |-
  一款基于 Electron 开发的现代化跨平台桌面级笔记应用，数据本地存储，让数据始终安全可控。
  功能特点
  - 极简界面：简单纯粹无广告
  - 跨平台：支持 Windows、macOS 和 Linux 系统
  - 便捷迁移：支持 Snaptium 专有格式 (.nwp) 完整导入导出，支持 Markdown (.md) 格式导入导出
  - 本地加密存储：所有笔记数据可加密 (AES-256-GCM 算法) 保存在本地，安全可控
  - Markdown 支持：实时预览 Markdown 渲染效果
  - AI 智能辅助写作：AI 智能辅助写作，让您的写作更轻松 (默认关闭)
  - 国际化：支持全球 19 种语言及地区设置
Tags:
- markdown
- 写作
- 文档
- 文稿
- 文章
- 编辑器
ReleaseNotes: |-
  本次更新主要围绕软件稳定性、云同步性能、版本更新流程及界面体验进行了优化。
  优化
  - 优化工作台模块布局
  - 提升知识库运行性能
  - 优化工作区笔记列表
  - 优化笔记收藏列表
  - 改善软件图标显示效果
  - 优化首选项界面交互
  - 优化软件更新与下载流程
  - 提升云同步传输速度
  修复
  - 修复部分情况下快捷键失效的问题
  - 修复部分情况下云同步失败的问题
  - 修复离线模式下授权验证失败的问题
  - 修复其他已知问题
