ReleaseNotes: |-
  更新内容
  1. 修复 Win 控制 macOS 时部分按键映射异常的问题
  2. 修复 Win 被控端处于后台时鼠标无法控制的问题
  3. 修复切换显示器后鼠标控制失效的问题
  4. 修复特定场景下可能出现的黑屏问题
  5. 修复被控端处于锁屏状态时键鼠控制异常的问题
  6. 修复网络状态中直连/中继状态显示异常的问题
  7. 修复便携版作为被控端时锁屏界面无法解锁的问题
  8. 新增组合键按钮
  9. 优化锁屏状态下的屏幕采集效率
  10. 便携版支持将配置和历史连接记录保存在运行目录
