ShortDescription: Improved version of the original JS8Call software for JS8 digital mode weak signal keyboard-to-keyboard messaging for ham radio.
ReleaseNotes: |-
  JS8Call 3.0.3 is a patch/bug fix release that fixes several minor bugs in the UI:
  - scrollbar in incoming MSG pane now stays where set when making program settings
  - fixed keyboard navigation for Windows/Linux in context menu for speed settings
  - fixed crash when attempting to import invalid waterfall palettes
  - fixed text alignment in Call Activity panel for Name and Comment fields
  - fixed failure to display multiple decodes in incoming MSG panel when making group queries
  - updated to Hamlib 4.7.2 to provide better support for extended CAT commands for the Icom IC-7300Mk2, clock command fixes for the IC-7600 and IC-7610, as well as enhanced support for certain Yaesu radios.
  Full Changelog: https://github.com/JS8Call-improved/JS8Call-improved/compare/v3.0.2...v3.0.3
  Note
  Important notes for the JS8Call 3.0.3 release:
  - The linux AppImages now require minimum glibc version 2.39. JS8Call can still be built on older glibc versions (i.e. Debian 12 or Ubuntu 22) but this will require compiling your own libraries from source code on the target glibc version
  - Debian .deb is no longer provided for arm64 due to reports of interference with KDE on certain linux desktop systems. It is recommended to use the Linux aarch64 AppImage for Raspberry Pi5 or newer
  - MacOS build for Intel architecture is no longer available after JS8Call 3.0.2. If you are still running an old Intel Mac you must build from source code. However, be warned this can be painfully slow and Qt 6.9.3 with the FFmpeg audio backend (which JS8Call requires) cannot be built on an Intel Mac at less than SDK version 14
  - Please see the rest of the release notes for JS8Call ver 3.0.1 for the 3.x-series releases
