ShortDescription: Improved version of the original JS8Call software for JS8 digital mode weak signal keyboard-to-keyboard messaging for ham radio.
ReleaseNotes: |-
  JS8Call 3.0.2 is a patch/bug fix release that fixes:
  - CQ notification in the call activity pane
  - APRS commands not checksumming properly
  - Auto Reply notification not functioning when ask for confirmation before sending is turned on
  The JS8Call arm64 .deb package is compatible with Raspberry Pi OS 6.2 or later (based on Debian 13 Trixie), released April 14, 2026 and running on a Pi 4 or Pi 5. The 32-bit version of Raspberry Pi OS is not supported.
  Please refer to the rest of the release notes for version 3.0.1 for more information
  What's Changed
  - fix CQ notification in call activity pane by @Chris-AC9KH in https://github.com/JS8Call-improved/JS8Call-improved/pull/296
  - Fix for #298 - APRS CMD not checksumming properly. by @punk-kaos in https://github.com/JS8Call-improved/JS8Call-improved/pull/300
  - Break confirmThenEnqueueMessage member function out of mainwindow.cpp by @Chris-AC9KH in https://github.com/JS8Call-improved/JS8Call-improved/pull/306
  Full Changelog: https://github.com/JS8Call-improved/JS8Call-improved/compare/v3.0.1...v3.0.2
