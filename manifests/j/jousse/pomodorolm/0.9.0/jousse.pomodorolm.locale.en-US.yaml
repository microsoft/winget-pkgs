Description: Pomodorolm is a simple, lightweight, good looking and configurable pomodoro tracker with tray icon built with Tauri. You can change its look and feel by using themes and you if none suits you, you can create your own theme. All sessions durations are configurable and you can choose to play sounds too (ticking sound, end of session and so on). You can even display notifications if you want to.
