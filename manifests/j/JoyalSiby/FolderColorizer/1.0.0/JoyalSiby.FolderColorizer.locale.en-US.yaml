ReleaseNotes: |-
    # 🎨 Folder Colorizer v1.0.0 — First Release
  
  > **This is the very first public release of Folder Colorizer for Windows 11.**
  > It's stable, lightweight, and built entirely with native Windows APIs and WinUI 3.
  
  ---
  
  ## ✨ What's New
  
  This is the initial release. Everything is new!
  
  - **Native WinUI 3 installer** with Fluent Design and Mica backdrop
  - **Right-click context menu integration** — colorize any folder in seconds
  - **No system restart required** — changes apply instantly without tedious reboots
  - **6 vibrant folder colors**: Red, Blue, Green, Purple, Orange, Black
  - **Restore Default** option to bring any folder back to its native Windows look
  - **Zero background services** — pure shell extension, no daemon, no tray icon
  - **Start Menu integration** — searchable and launchable from the Start Menu
  - **Clean uninstallation** via Windows Settings → Apps → Installed Apps
  
  ---
  
  ## 📥 Installation
  
  1. Download `FolderColorizerSetup-v1.0.0.exe` below
  2. Run the installer. If Windows SmartScreen appears, click **"More info"** → **"Run anyway"**
  3. Once installed, **right-click any folder** and select **Folder Colorizer** (No system restart needed!)
  
  ---
  
  ## ℹ️ Important Notes & Known Issues
  
  ### Note on Installer Size (282 MB)
  
  The current installer is **282 MB** because it is fully self-contained. It bundles all necessary .NET 8.0 and WinUI 3 dependencies inside the package, ensuring that **the user is required to install absolutely nothing else** to get the app running. 
  
  *Future Outlook:* I am actively working on optimization strategies to safely reduce this file footprint in upcoming updates without breaking any core functionalities.
  
  ### Folder icon may not appear immediately after colorizing
  
  In some cases on certain Windows 11 configurations, the colored folder icon may not appear right away in File Explorer after selecting a color due to aggressive OS caching.
  
  **Workaround:**
  1. Press `Ctrl + Shift + Esc` to open **Task Manager**
  2. In the **Processes** tab, find **Windows Explorer**
  3. Right-click it and select **Restart**
  4. File Explorer will relaunch and show the updated folder colors
  
  This is a native Windows icon cache behavior and not a bug in Folder Colorizer itself.
  
  **Alternate fix:**
  1. Select the folder 
  2. Press `F2` and rename it to something else 
  3. Press `Enter` to confirm the rename
  4. The folder icon should now be updated
  5. You can then rename it back to the original name
  
  ---
  
  ## 🔧 Requirements
  
  - Windows 11 (build 19041 or later)
  - x64 architecture
  - **Zero extra dependencies** — fully self-contained out of the box
  
  ---
  
  *Built with ❤️ using C# / .NET 8.0, WinUI 3, and the Windows Shell API.*
