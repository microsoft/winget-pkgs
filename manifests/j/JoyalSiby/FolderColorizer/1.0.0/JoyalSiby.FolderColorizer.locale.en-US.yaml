ShortDescription: A lightweight WinUI 3 utility to natively change folder colors in Windows 11 via the File Explorer context menu.
Description: Folder Colorizer for Windows 11 is a native, modern WinUI 3 utility designed to customize your workspace by changing individual folder icon colors. It integrates seamlessly into the Windows 11 File Explorer right-click context menu for instantaneous customization. The application updates folder visuals cleanly using standard Windows configuration methods (desktop.ini modification and the folder ReadOnly attribute) without relying on permanent background services, heavy system hooks, or continuous resource consumption. Easily assign distinct color accents to organize directories or completely reset any modified folder back to its default Windows layout.
