ShortDescription: A Lua code formatter
Description: |-
  A deterministic code formatter for Lua 5.1, 5.2, 5.3, 5.4, LuaJIT, Luau and CfxLua/FiveM Lua, built
  using full-moon. StyLua is inspired by the likes of prettier, it parses your Lua codebase, and
  prints it back out from scratch, enforcing a consistent code style.

  StyLua mainly follows the Roblox Lua Style Guide, with a few deviations.
