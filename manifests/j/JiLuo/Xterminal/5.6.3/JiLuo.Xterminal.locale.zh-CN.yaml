ReleaseNotes: |-
  v5.6.3 - 2026-04-09
  终端与连接
  - 终端与文件右键菜单支持自定义配置，设置项拆分为独立子菜单，便于快速调整。
  - 新增终端自动换行开关，关闭后可按固定列数显示，修复初始宽度计算与列锁定。
  - 多 SSH 会话布局新增保存与重置控制，支持全局布局保存，保存时已打开的会话不受影响。
  - 本地终端支持直接粘贴剪贴板中的文件。
  - 终端命令提示建议改为仅 Tab 键接受，避免误触替换当前输入。
  - 修复终端重新获取焦点时选中文本残留、macOS 下 Option+方向键单词跳转失效、命令工具面板尺寸异常等问题。
  - 恢复代码编辑器中的 Ctrl+/ 注释快捷键。
  - 多 SSH 会话中隐藏快速命令触发入口，减少误操作。
  - 修复 SSH 隐藏文件工作区恢复后丢失当前目录、锁屏后本地终端会话被意外关闭、Telnet 仅密码登录提示异常等问题。
  文件管理与传输
  - 传输列表支持将文件直接拖拽到系统桌面，修复 macOS 下拖拽到访达失败及预览图标遮挡问题。
  - 文件工作区搜索栏重新设计，视觉层级更清晰，焦点更稳定。
  - SFTP 目录树悬浮可查看文件详细信息。
  - 取消传输会话级并发上限，传输速度不再受固定限制。
  - 修复 rz 上传取消后无法继续使用、传输弹窗被遮挡、拖拽手柄事件响应异常等问题。
  - 当服务器不支持 SFTP 时，不再反复弹出警告。
  连接中心
  - 连接中心编辑按钮恢复为行内操作入口，"更多操作"菜单文案与顺序统一整理。
  - 连接批量操作栏在窄窗口下自动收缩，修复仓库切换时列表跳动、快捷搜索被遮挡、后台恢复后标签页消失等问题。
  远程桌面
  - 内置远程桌面新增全屏模式与快捷键控制。
  - 修复 Deepin 25 下连接失败的问题，优化连接失败时的错误提示。
  隧道
  - SSH 会话中新增隧道管理面板，可直接查看与编辑隧道规则；面板布局与标签样式统一优化。
  - 修复本地端口转发源地址绑定异常、隧道编辑弹窗重复打开的问题。
  监控
  - 服务器监控新增进程管理功能，可查看与结束远程进程；进程详情弹窗支持拖拽调整大小。
  - 监控卡片支持自定义显示，配置入口移至 SSH 布局设置中统一管理。
  - 监控面板卡片样式统一，视觉更整洁。
  - 修复监控进程中特殊字符导致信息显示异常的问题。
  - 新增 openSUSE Tumbleweed 及部分精简 Linux 环境的支持。
  AI 助手
  - 修复切换对话时历史记录偶尔串到其他对话的问题。
  - AI 聊天输入区样式优化，与当前主题更协调；精简面向用户的提示文案。
  启动与稳定性
  - 应用启动连接失败时新增防火墙相关提示，修复锁屏界面渲染异常。
  编辑器
  - 无扩展名的配置文件（如 Dockerfile、Makefile 等）支持内容语法高亮，修复浮动窗口顶部区域无法拖拽。
  会话回放
  - 修复部分压缩会话日志无法正常回放的问题。

  v5.5.9 - 2026-04-02
  终端与连接
  - 终端快捷输入模式已移至设置中统一管理，并新增命令提示触发控制；输入密码时会自动避开提示干扰。
  - 修复本地终端重连、清屏后重新新建，以及切回窗口后显示恢复异常等问题。
  - 恢复连接中心标题单击连接，并修复双击连接时的交互与错误提示。
  - 修复命令树在面板模式下右键执行无响应、Telnet 重连失败无提示，以及退出登录后页面未及时刷新的问题。
  文件管理与传输
  - SSH 文件传输支持分别设置上传和下载并发数，便于按需要调整任务数量。
  - 修复下载同名文件时的覆盖确认异常，并优化批量确认、中断处理和失败提示。
  - 修复上传完成后目录未及时刷新、文件夹下载目标路径判断异常，以及复制名称提示文案不准确的问题。
  - 当服务器不支持 SFTP 时，会提供更明确的原因说明与处理建议；终端仍可继续使用。
  远程桌面与安全
  - 连接中心支持将多台远程桌面以平铺会话方式同时打开，批量入口与不可用目标提示同步补齐。
  - 平铺会话会随窗口尺寸自动调整，头部显示更紧凑，相关显示选项也已简化。
  - SSH 新增主机指纹验证开关，可在设置中统一控制首次信任和变更告警。
  - RDP 文件上传后补充右键粘贴提示，减少后续操作时的困惑。
  界面与快捷键
  - 分屏布局补齐连接切换、关闭当前 Tab / 连接等快捷键，布局区操作更一致。
  - 修复浮窗标题、拖拽与部分布局下的显示细节问题。
  - 文件工作区工具栏刷新入口与位置已调整，减少重复操作。

  v5.4.29 - 2026-03-22
  终端与 SSH
  - 修复 SSH 重连后终端历史被覆盖的问题；现在会保留原有内容并继续追加输出。
  - SSH 重连提示改为右上角悬浮状态栏，并优化主题适配与显示样式。
  - 修复重连后光标跳到首行、切换会话后焦点异常，以及多会话切换时部分快捷键表现不稳定的问题。
  - 优化终端粘贴与命令补全体验，修复文本 / 图片粘贴判断异常，以及带空格路径等场景下的补全问题。
  - macOS 本地终端默认按登录环境启动，减少环境变量和启动行为不一致的问题。
  文件管理与传输
  - SFTP 目录树支持点击整行展开或收起文件夹，双击文件夹时的异常折叠问题也已修复。
  - 修复目录树 Shift 多选异常、点击文件后父目录不同步等问题，提升文件选择与定位稳定性。
  - 优化压缩包解压兼容性，提升部分 shell 环境下的可用性。
  - 外部编辑器支持命令检测与重启提醒，并优化问题诊断提示；同时修复打开文件误触发上传、监听上传策略异常等问题。
  连接中心与界面
  - 修复连接中心分组树在刷新或重新打开后展开状态无法恢复的问题。
  - 修复连接搜索输入空白内容时的筛选异常。
  - Telnet 列表新增备注列，便于区分和管理连接。
  - 终端快捷输入入口支持在右键菜单和“更多操作”中开关，面板布局、边距、文案与关闭手势也一并优化。
  设置、备份与兼容性
  - 支持保存并恢复浮窗布局；同时修复恢复后内容未初始化、偶发空白区域和边框残留等问题。
  - 优化备份导入弹窗布局，修复导入后协议数据恢复异常。
  - 修复部分主题下终端背景、编辑器弹层样式丢失等显示问题。
  - 修复云端仓库中新建内容时的异常，并减少应用启动过程中偶发的异常提示。
  - 修复多处异常场景下的稳定性问题，提升整体容错与恢复能力。

  v5.4.25 - 2026-03-19
  文件管理与传输
  - SSH 文件工作区调整为统一的单栏 / 双栏浏览方式；在较窄窗口下会自动切换为上下布局。
  - 列表模式支持直接返回上级目录；地址栏、路径栏、头部工具条和更多操作的位置同步调整。
  - 修复文件工作区悬浮面板被工具栏裁剪、书签与传输入口无法展开、书签下载与选中不同步等问题。
  - 恢复目录树图标，调整目录滚动、刷新、展开和缓存释放逻辑。
  - 文件列表的拖拽手柄单独显示，减少误触双击；支持拖拽跟随预览。
  - 修复双栏文件浏览中的拖拽、目录刷新、中间工具条定位和小窗口头部换行问题。
  - 本地文件支持右键打开；右键菜单中的刷新、压缩等常用操作顺序已调整。
  - 传输面板改为两行信息布局；操作按钮、进度条和详情区域的显示方式一并调整。
  - 修复上传目标路径记忆、SFTP 上传导入路径、多连接上传到 ~ 目录失败，以及上传后传输面板未及时显示的问题。
  - 下载前会自动展开传输面板，便于查看进度和结果。
  连接与 SSH
  - 连接中心左侧分组树支持拖拽整理；修复拖入分组后回弹、分组回根异常等问题。
  - 连接列表支持 Shift 多选，以及通过勾选列拖拽连续选择多项。
  - 修复连接列表在缩放、缩窗、拖拽列宽时出现的表头吸附异常、横向滚动条、操作列错位和备注列占位问题。
  - 调整顶部连接标签样式，去掉切换动画和外发光，补齐浅色主题下的颜色适配。
  - 调整仓库切换器宽度、间距和短文案显示规则，避免文字截断与布局粘连。
  - 修复云端仓库密码更新或重试后仍提示不匹配、错误状态未及时刷新的问题。
  - 调整 SSH 服务器快速切换区域的头部、图标和工具栏位置，减少遮挡和重叠。
  - 更新 SSH 工作区默认布局，重新整理历史命令、传输等侧边区域；旧版布局的迁移问题已修复。
  - 修复 SSH 功能区域拖拽后消失、无效历史面板残留、运行区在旧布局下不显示等问题。
  - 修复端口转发在参数切换和快速填充时的异常；Telnet 会话协商与连接流程也一并调整。
  终端与命令
  - 终端命令提示列表调整了宽度、高度、行高和底部说明区域的显示规则，减少输入时跳动。
  - 提示列表加载中会保留上一批候选，候选数量也做了调整，避免列表频繁抖动和过长。
  - 历史命令面板新增搜索，并重新整理了头部和筛选区布局。
  - 命令管理区域改为双行头部，常用操作位置重新排列。
  - 修复终端提示框顶部跳动、右键复制后选区丢失，以及右键菜单在不同会话类型下表现不一致的问题。
  - 修复终端粘贴确认弹窗与检测策略异常；关闭“允许粘贴”后，快捷键也会按设置生效。
  - 修复终端在闲置恢复、SSH 重连、连接切换后的尺寸、焦点和模式恢复问题。
  - 修复本地终端下部分复制场景无效的问题。
  AI 助手与界面
  - AI 助手的模式说明合并为单条提示语，名称和高频文案一并调整。
  - 调整 AI 模式下的风险提示与判断提醒。
  - 修复 AI 回复长时间无内容时的等待异常。
  - 修复终端内 AI 快捷入口在部分场景下的触发问题。
  - 自定义 AI 服务支持更多兼容格式。
  - 修复 AI 对话消息样式、背景图层、部分弹窗与顶部区域的显示问题。
  - 修复深浅色主题下表格、复选框、边框和常用操作区域的颜色不一致问题。
  - 登录保护相关提示文案已调整。
  监控与兼容性
  - 磁盘监控面板会隐藏 EFI 分区和临时文件系统，挂载点筛选规则同步调整。
  - 修复监控面板中部分内存信息换行异常。
  - Linux 新增 AppImage 与 pacman 安装包。
  - 修复部分安装包环境下的运行异常，并调整 Windows / Linux 打包兼容性。
  - 修复文件面板右键子菜单操作、分类树首次右键打开和菜单悬浮显示问题。
  - 修复部分侧边区域在刷新、展开、切换后的显示异常。

  v5.3.1 - 2026-03-05
  连接与远程
  - 新增远程桌面（RDP）设置项。
  - 支持双击使用系统远程桌面客户端快速发起连接。
  - SSH 编辑区布局支持“全局共用”或“按连接分别保存”。
  终端与稳定性
  - 修复 Ctrl+V 在部分场景下重复粘贴的问题。
  - 修复关闭 SSH 标签页后偶发黑屏的问题。
  - 修复 cd 复合命令解析异常，并优化 xedit 路径处理。
  设置与界面体验
  - 优化设置页中终端字体、终端高级选项、主题颜色与导航栏颜色的布局。
  - 优化外观与功能设置区域的拖拽布局与文案可读性。
  - 更新日志展示区域排版优化。
  - 新手引导与隐私说明文案精简，减少冗余提示。

  v5.2.47 - 2026-03-04
  AI 助手
  - 思考内容支持折叠展示。
  - AI 助手提示按当前界面语言显示。
  - 终端悬浮助手快捷入口逻辑调整，减少误触发。
  - 优化只读模式默认配置。
  终端与 SSH
  - 调整终端渲染与复制到剪贴板的兼容性（含 Windows）。
  - 修复部分系统/显卡环境下终端可能报错或显示异常的问题。
  - 修复大文件传输场景下可能导致终端卡死的问题。
  - 优化多行粘贴与粘贴快捷键的稳定性。
  - 新增 CMake 文件高亮支持。
  - 修复终端标签关闭按钮显示异常等界面问题。
  - 修复 SSH 代理连接与登录流程在部分场景下的异常。
  - SSH 编辑器：支持文件打开布局调整，支持复制与当前目录操作。
  - 命令补全建议调整，兼容更多提示符样式。
  - 优化 SSH 监控逻辑，减少资源占用。
  文件传输
  - 修复文件夹传输在部分环境下失败的问题。
  连接中心 / 隧道 / 远程桌面
  - 修复跨标签页时“最近连接”下拉异常的问题（SSH 连接、远程桌面）。
  - 修复登录凭证更新后隧道连接未同步的问题。
  - 顶部连接标签页：隐藏滚动条，修复拖拽/固定按钮布局等问题，减少挤压与溢出。
  设置、界面与其他
  - 支持系统设置弹框拖拽移动。
  - 新增 macOS 本地网络权限报错引导。
  - 快速命令支持中文变量名。
  - 修复 Windows 下少数场景启动崩溃。
  - 修复应用重启在少数场景可能卡住的问题。
  - 调整中英文双语相关逻辑：修复语言切换后设置菜单刷新问题，并修复相关稳定性问题；笔记模块补齐多语言适配。
  - 修复部分环境下资源文件缺失导致的异常。
  - 优化监控面板布局适配。
