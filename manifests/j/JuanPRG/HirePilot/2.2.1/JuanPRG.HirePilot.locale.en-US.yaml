ShortDescription: AI-assisted resume tailoring and cover-letter generation for Chrome.
Description: |-
  HirePilot combines a local Windows backend with a Chrome extension to tailor
  resumes, generate cover letters, create DOCX and PDF files, and assist with
  form filling. Users provide their own supported LLM API keys or local model.
Moniker: hirepilot
Tags:
- career
- chrome-extension
- cover-letter
- job-application
- job-search
- resume
Documentations:
- DocumentLabel: Installation and release documentation
  DocumentUrl: https://github.com/JuanPRG/hirepilot-releases#readme
ReleaseNotes: |-
  This release includes the packaged local backend, tray controls, updater,
  bundled PDF runtime, and unpacked Chrome extension files.
ReleaseNotesUrl: https://github.com/JuanPRG/hirepilot-releases/releases/tag/v2.2.1
InstallationNotes: |-
  Run "HirePilot Setup Console" from the Start Menu once to configure your
  profile, resume, and provider keys. Until the Chrome Web Store release is
  available, open "HirePilot - Extension Folder" from the Start Menu, visit
  chrome://extensions, enable Developer mode, choose "Load unpacked", and
  select C:\Program Files\HirePilot\extension.
ManifestType: defaultLocale
