ShortDescription: >
  OPUS Viewer is a free program that can open all kinds of Bruker's OPUS, JCAMP-DX and Galactic
  Grams files while data processing and evaluation is not possible.
Description: >
  It allows you to display spectral data (spectra, interferograms etc.) as well as other data saved
  together with the spectrum such as reports with evaluation results, measurement parameters, audit
  trails, signatures etc. There is no installer or setup program required. Just extract the contents
  of the zip archive to a directory of your choice, then directly run the executable Opus.exe from
  there.
InstallationNotes: |-
  IMPORTANT: If on the same computer there is already an existing installation of the full OPUS
  version, please do NOT install the OPUS Viewer.
