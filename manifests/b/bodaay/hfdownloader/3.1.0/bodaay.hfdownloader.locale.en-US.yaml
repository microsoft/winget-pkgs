ReleaseNotes: |-
  What's Changed in v3.1.0
  Features
  - serve: add --local-dir flag — run the web server in flat/local-file mode so all downloads are saved as real standalone files instead of the HF cache layout (#77)
  Bug Fixes
  - filter: add --exact segment matching so a filter like q6_k selects Q6_K without also pulling Q6_K_XL; Web UI quant selections use it automatically (#78)
  - cli: show help on a bare invocation instead of the cryptic missing REPO error (e.g. double-clicking the .exe on Windows) (#79)
  - analyze: populate the resolved commit SHA in analysis results (was always empty) (#80)
  Full Changelog: https://github.com/bodaay/HuggingFaceModelDownloader/compare/v3.0.4...v3.1.0
