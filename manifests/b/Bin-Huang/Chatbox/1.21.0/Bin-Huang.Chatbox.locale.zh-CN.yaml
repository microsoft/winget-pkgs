ReleaseNotes: |-
  1. 新增大文件附件问答能力，支持对上传的文本文件建立索引并按需检索。
  2. 优化附件上传、索引状态、失败重试和文件解析错误提示。
  3. 升级图片生成功能，支持动态图片模型列表和更清晰的错误提示。
  4. 新增 Vercel AI Gateway 模型提供商，优化模型提供商搜索与选择体验。
  5. 优化网页搜索和翻译稳定性，提升中国大陆网络环境下的可用性。
  6. 重做自动更新体验，支持更清晰的下载进度、失败重试和安装入口。
  7. 优化会话列表性能和稳定性，改善大量会话时的加载体验。
  8. 修复 DeepSeek V4 思考模式、附件处理、会话删除、代码块复制等多项问题。
