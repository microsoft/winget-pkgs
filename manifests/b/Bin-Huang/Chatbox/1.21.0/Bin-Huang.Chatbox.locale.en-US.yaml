ReleaseNotes: |-
  1. Added large-file attachment Q&A with indexing and on-demand retrieval for text files.
  2. Improved attachment upload, indexing status, retry flow, and file parsing errors.
  3. Upgraded image generation with dynamic image model lists and clearer error messages.
  4. Added Vercel AI Gateway provider and improved provider search and selection.
  5. Improved web search and translation reliability, especially for mainland China networks.
  6. Redesigned auto-update experience with clearer progress, retry, and install flows.
  7. Improved session list performance and stability for large chat histories.
  8. Fixed issues with DeepSeek V4 thinking mode, attachments, session deletion, and code block copying.
