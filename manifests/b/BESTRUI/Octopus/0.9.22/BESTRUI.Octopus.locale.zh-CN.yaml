Description: |-
  一个简单、美观且优雅的个人大模型 API 聚合与负载均衡服务

  ✨ 特性
  - 🔀 多渠道聚合 - 连接多个大模型服务商渠道，统一管理
  - 🔑 多密钥支持 - 单个渠道支持多个 API 密钥
  - ⚡ 智能选择 - 每个渠道多个端点，智能选择延迟最短的端点
  - ⚖️ 负载均衡 - 自动分配请求，确保服务稳定高效
  - 🔄 协议转换 - 无缝转换 OpenAI Chat / OpenAI Responses / Anthropic API 格式
  - 💰 价格同步 - 自动更新模型定价
  - 🔃 模型同步 - 自动同步各渠道可用模型列表
  - 📊 数据分析 - 全面的请求统计、令牌消耗和成本追踪
  - 🎨 优雅的界面 - 简洁美观的网页管理面板
  - 🗄️ 多数据库支持 - 支持 SQLite、MySQL、PostgreSQL
