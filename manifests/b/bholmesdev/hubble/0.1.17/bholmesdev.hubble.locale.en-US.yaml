ReleaseNotes: |-
  ### Added

  - Selecting text now shows a floating formatting toolbar for bold, italic, strikethrough, links,
    headings, lists, and quotes. Thanks @hwong103! #108
  - Copy selected editor content as Markdown from the Edit menu or editor context menu. Thanks
    @jambronner! #122
  - Terminal panel in the desktop app: toggle with Cmd+J to run shell commands in your workspace, with
    tabs, drag resize, and double click to rename. Thanks @israelvf! #131
  - Chat about the open note with your agent CLI: pick it from the note's ⋯ menu or press Cmd+Shift+J,
    and customize the command in Settings. #139
  - Add table support. Markdown tables now render as expected, and you can create new tables using
    `/table`. There are still editing features left to add, like adding and removing rows. Track progress
    on GitHub: #99. Thanks @israelvf! #130
  - Create HTML Apps from the new file dropdown, folder menus, and the File menu. #141
  - Empty HTML App files show a setup screen with the skill install command and a ready-to-copy agent
    prompt, with a check once the skills are detected. #141

  ### Changed

  - Keyboard shortcut hints now show the correct keys on Windows and Linux (Ctrl/Alt instead of macOS
    symbols). #137
  - More buttons and menus now show their keyboard shortcut, including the format and slash command
    menus. #137
  - The HTML Apps popup in new workspaces is gone; setup now happens when you create an HTML App. #141

  ### Fixed

  - Desktop saves no longer drop trailing content in notes with multibyte characters. #127
  - Relative Markdown file links now open the linked file instead of showing an invalid URL error. #145
  - Bold, italic, and strikethrough selections with boundary spaces now save as valid Markdown
    (`**bold** next`, not `**bold **next`). Thanks @luchopcerra! #128
ReleaseNotesUrl: https://github.com/bholmesdev/hubble.md/releases/tag/desktop-v0.1.17
