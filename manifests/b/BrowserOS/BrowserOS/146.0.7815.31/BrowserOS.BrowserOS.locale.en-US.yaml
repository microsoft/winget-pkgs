ReleaseNotes: |-
  ✨ What's new:
  - SOUL.md — Your assistant now has a soul. Tell it how you like to communicate, set boundaries, shape its personality — and it adapts on its own over time. The more you use it, the more it feels like your assistant. Inspired by OpenClaw — thanks to @steipete for the great concept. Docs →
  - Vertical tabs — One of the most requested features is here. BrowserOS now ships with vertical tabs by default. More screen space, better tab management, and a cleaner layout out of the box. Prefer horizontal? You can switch back anytime in settings. Docs →
  - Long-term memory — Your assistant finally remembers you. Your name, your projects, what you talked about last week — it carries context across every conversation so you never have to repeat yourself. All stored locally on your machine. Also inspired by OpenClaw. Docs →
  - Chromium 146 — Updated to the latest Chromium release with all recent upstream fixes and security patches.
