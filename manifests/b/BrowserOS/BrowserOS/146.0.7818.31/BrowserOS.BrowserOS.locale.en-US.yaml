ReleaseNotes: |-
  ✨ What's new:
  Skills — Define reusable instructions that teach your agent how to handle specific tasks. Ships with 12 built-in skills like deep research, price comparison, and form filling — and you can create your own. Docs →
  Memory — Your assistant now remembers you across conversations. Core memory stores permanent facts (your name, projects, preferences), while daily notes capture session context and auto-expire after 30 days. Everything stays local on your machine. Docs →
  Kimi K2.5 — in partnership with Moonshot AI — Kimi K2.5 is now the default model in BrowserOS. Open-source, multimodal, and great for browser automation. For a limited time, users get extended usage limits at no cost. Bring your own key from platform.moonshot.ai anytime.
  SOUL.md — Shape your assistant's personality, tone, and boundaries. It evolves on its own as you interact — the more you use it, the more it feels like yours. Docs →
