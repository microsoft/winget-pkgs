ShortDescription: Floating typing assistant for Windows. Sits as a transparent overlay above your active window, listens via UI Automation, and serves up smart suggestions — spelling corrections, AI next-word predictions, translation, and text actions.
Description: Plume uses Windows UI Automation (UIAutomation TextPattern/ValuePattern) to detect what you are typing. When you stop typing, it reads the last word from the focused text field, runs it through Hunspell for spelling corrections, sends the surrounding context to your chosen LLM for next-word suggestions, and shows the results in a floating transparent overlay. Click a chip to copy or insert.
