ShortDescription: A custom top bar for Windows 11 with acrylic glass, auto-hide, and media controls.
Description: |-
  LegendBar is a custom top bar for Windows 11 built with WinUI 3. 
  It replaces the native taskbar top area with an acrylic/mica frosted-glass bar 
  that auto-hides and spans dual monitors. Features include a Pomodoro timer, 
  quick notes, clipboard history, media controls, pinned app launchers, 
  and PowerToys integration.
