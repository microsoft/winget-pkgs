ReleaseNotes: |-
  Last step in the step submodel step list would get deleted when a file was saved, closed, then open.
  Gray outlines on black parts were too thin and dim on Windows 11 and Windows 10 when exporting from the Instruction Maker.
  At 2x and 4x export, black outlines on bricks appeared thin and broken on Instruction Maker exports.
  30076 Car base would rotate on POV rendering when on Medium, High, or Custom High Settings.
  Fixed a small UI issue with the camera lock icon when using Tab to expand the palette.
  Fixed a typo in "Physical Information".
  Part replacement recommendation would not display all replaced parts if multiples of the same element existed in different colors.
  Progress bar added so users know the status when using Instruction maker and multiple projects are being saved.
