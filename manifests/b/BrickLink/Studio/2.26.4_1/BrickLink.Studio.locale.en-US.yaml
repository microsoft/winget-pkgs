ReleaseNotes: |-
  Issue with flexible parts shrinking on POV renders, would cause visible gaps.
  .io file was not opening via double click from File system when Studio was default application selected.
  If flip symbol auto generation was set to ON, it would generate a icon each time something was flipped in the Instruction Maker.
  Auto Recovery would initiate after re-opening Studio if users had multiple projects open that were auto saved, then accessed the Instruction Maker in the active project and then closed Studio.
  Submodels could be de-referenced resulting in black tiles with ? If the user cloned and deleted submodels and then accessed Instruction Maker and returned back to build mode.
  An empty step would be created if you had more than 2 steps and you saved and opened the same file.
  Added Satin-Trans Yellow.
  Added 3 new rubber colors.
  Added 187 new parts.
