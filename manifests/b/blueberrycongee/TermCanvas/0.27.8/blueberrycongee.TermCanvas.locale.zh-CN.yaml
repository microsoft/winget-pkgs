ReleaseNotes: |-
  - 画布：召唤式标签拖拽，支持碰撞检测 — 拖拽 worktree 标签时自动避让重叠标签
  Fixed (zh-CN)
  - 画布：修复标签拖拽预览的无限更新循环
  - 画布：调整节点大小时保留节点位置
