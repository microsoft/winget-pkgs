ReleaseNotes: |-
  - 终端聚焦语义与视口缩放语义已拆分：
    - 点击终端仅保留聚焦高亮，不再强制缩放视口。
    - Cmd+E 改为切换缩放状态，同时保留终端聚焦高亮。
  - Cmd+T 与 Cmd+D 现在保持当前缩放比例，仅平移视口。
  - 在非放大模式下，Cmd+[ 与 Cmd+] 现在保持缩放比例，仅平移到上一个/下一个聚焦终端。
