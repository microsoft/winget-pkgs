ReleaseNotes: '- Left panel history and ⌘K session search appeared completely empty on 0.31.0 even when local session files existed, and replay could not resolve a session for any terminal. The Kimi CLI integration added in 0.31.0 called findKimiSessionFiles() inside electron/session-search-index.ts#listSessionFileCandidates without importing it, so every call to listSessionsForProjects / listSessionsForProjectsPaged threw a ReferenceError. The main-process IPC handlers had bare catch {} blocks that silently returned { entries: [], total: 0 }, making the regression look like "no sessions exist" instead of an error. Import restored; both IPC handlers now log the error instead of swallowing it so the next regression of this shape is not invisible. Two related type errors from the same Kimi commit were also fixed in session-scanner.ts (undefined wd.kaos fallback short-circuit) and session-watcher.ts (unnarrowed call.function.name access)'
