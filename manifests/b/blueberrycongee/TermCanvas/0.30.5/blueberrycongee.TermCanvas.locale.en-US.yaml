ReleaseNotes: "- Windows 11: resuming a session could crash the whole app with an A JavaScript error occurred in the main process dialog reading Error: Cannot resize a pty that has already exited. node-pty's Windows backend queues resize() calls in an internal _deferreds list until the named-pipe socket connects; if the underlying winpty agent has already exited by the time the queue is flushed, the replayed call throws from inside a Socket event handler, past any try/catch at the call site (see microsoft/node-pty#375). Main process now installs a narrow uncaughtException handler that swallows only that exact error (and the matching Cannot write to a pty that has already exited variant) and rethrows everything else. Note: this stops the crash dialog — the tab whose pty already died is still dead and needs to be closed and reopened; it does not fix the underlying node-pty race"
