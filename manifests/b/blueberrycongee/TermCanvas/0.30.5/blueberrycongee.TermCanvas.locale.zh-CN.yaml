ReleaseNotes: '- Win11 下续接会话时整个 app 会崩出 A JavaScript error occurred in the main process 弹窗，内容是 Error: Cannot resize a pty that has already exited。node-pty 的 Windows 后端会把 resize() 调用排进内部 _deferreds 队列，等命名管道 socket 连上之后再回放；如果此时底层 winpty agent 已经退出，回放的调用会从 Socket 事件回调里同步抛错，已脱离调用点的 try/catch(见 microsoft/node-pty#375)。主进程现在装了一个只针对这条错误(以及同类的 Cannot write to a pty that has already exited)的 uncaughtException handler,命中就 warn 一行吞掉，其他异常原样 rethrow。注意：这只阻止崩溃弹窗——那个已经死掉的终端 tab 还是死的，需要手动关掉重开；node-pty 本身的竞态没有修'
