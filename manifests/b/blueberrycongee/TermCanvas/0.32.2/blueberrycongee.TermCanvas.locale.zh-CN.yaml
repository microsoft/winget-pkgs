ReleaseNotes: '- macOS release build 现在使用 ad hoc 签名，不再完全跳过代码签名。这样 bundle identity 会保持为 com.blueberrycongee.termcanvas,并产出可通过 codesign --verify 的 app,避免未签名构建下录屏和辅助功能权限不稳定的问题。'
