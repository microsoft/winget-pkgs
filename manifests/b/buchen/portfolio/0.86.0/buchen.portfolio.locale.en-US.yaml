ShortDescription: Track and evaluate the performance of your investment portfolio across stocks, cryptocurrencies, and other assets.
ReleaseNotes: |-
  * New: Rebalancing view now lets you enter an additional amount to invest or withdraw, so it can tell you how to allocate an upcoming cash flow.
  * New: Import and export custom security attributes via CSV.
  * New: Added a profit/loss column based on the moving average cost basis.
  * New: Added an option to use moving average as the cost method in the payments view.
  * New: Added a PDF importer for St.Galler Kantonalbank.
  * Improvement: Enhanced PDF importers for KBC/Bolero, flatex, Scalable Capital, comdirect, Raiffeisenbank Gruppe, and Consorsbank.
  * Improvement: The payments-per-quarter matrix can now display the first year only.
  * Improvement: The transaction source field is now inline-editable, like the note field.
  * Improvement: You can now type the date directly in the Time Machine on the statement of assets.
  * Fix: CSV import no longer fails on empty columns when re-reading a file.
