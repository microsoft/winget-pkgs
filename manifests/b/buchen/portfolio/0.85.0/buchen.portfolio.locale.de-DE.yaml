ReleaseNotes: |-
  * Neu: Gruppierte Konten können jetzt mit einem Eigentumsanteil versehen werden, sodass ein gemeinsam gehaltenes Konto oder Depot nach Mitglied aufgeteilt werden kann.
  * Neu: Aktionen „Nach links/rechts verschieben“ zum Umsortieren von Dashboard-Ansichten und -Spalten hinzugefügt.
  * Neu: Bei nicht erkannten PDFs zeigt der Import-Assistent das Dokument jetzt neben einem Buchungseditor an, sodass du die Buchung manuell per Kopieren und Einfügen erfassen kannst.
  * Verbesserung: PDF-Importer für Interactive Brokers Flex, PostFinance, Trade Republic, UniCredit und WirBank verbessert.
  * Verbesserung: Symbole inaktiver Konten und Wertpapiere werden jetzt einheitlich als inaktiv gekennzeichnet – entweder durch ein graues oder ein blasses (halbtransparentes) Symbol.
  * Verbesserung: Option zum Deaktivieren der farblichen Hervorhebung von Werten in Kennzahlen- und Verhältnis-Widgets hinzugefügt.
  * Verbesserung: Taxonomie-Torten- und Ringdiagramme werden jetzt zur besseren Performance bei Bedarf erstellt.
