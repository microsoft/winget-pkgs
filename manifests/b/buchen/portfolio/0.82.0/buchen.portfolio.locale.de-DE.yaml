  - Fehlerbehebung: Das Quellenfeld bleibt erhalten, wenn in Transaktionsdialogen das Konto oder Portfolio geändert wird.
  - Fehlerbehebung: Rundungsfehler bei Aktiensplits mit Reverse Splits behoben.
