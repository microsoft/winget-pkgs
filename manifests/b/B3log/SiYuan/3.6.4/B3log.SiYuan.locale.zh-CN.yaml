ReleaseNotes: |-
  概述
  此版本改进了一些细节。
  变更记录
  以下是此版本中的详细变更。
  改进功能
  - 在文档块菜单中添加 复制全文 选项
  - 反向链接面板中的列表在粘贴后不再自动折叠
  - 改进粘贴链接
  - 改进当列表项包含块引用或提示块时的块标渲染
  - 改进包含反引号和与号的行级代码的粘贴
  - 改进按钮阴影效果
  - 改进集市列表卡片
  - 改进块引用导出
  - 优化排版 忽略全角字符
  - 将闪卡管理窗口中的分页和导航按钮移动到左上角
  - 支持显示完整的停靠栏面板标题和操作按钮
  - 改进块标的显示位置
  - 加载图标不再覆盖整个云端配置界面
  - 改进分屏布局
  - 已下载的集市包不再回退获取在线 README
  修复缺陷
  - macOS 上默认工作空间数据会丢失
  - 将块拖动到反向链接面板时会导致报错
  - 修复一些安全漏洞
  - Android 上导入 Markdown.zip 出错
  - 在提示块内部拖动块后整个块会消失
  开发者
  - 任务列表支持 data-task 状态属性
  - 为插件 API getAllTabs 添加 type 参数
  - 新增内核 API /api/file/workspaceCopyFiles
  - 新增内核 API /api/block/updateTaskListItemMarker
  - 新增内核 API /api/block/batchUpdateTaskListItemMarker
