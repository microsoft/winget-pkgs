ReleaseNotes: |-
  概述
  此版本改进了一些细节。
  变更记录
  以下是此版本中的详细变更。
  改进功能
  - 改进锁屏交互
  - 退出应用程序时浏览器被重定向到空白页
  - 改进任务列表导出为 .docx
  - 将 macOS 的初始工作区路径更改为 ~/Library/Application Support/SiYuan
  - 在数据库搜索框中粘贴为纯文本
  - 改进 Android 和 HarmonyOS 中 iframe 的键盘弹出
  - 在部分 HarmonyOS 设备上键盘会弹出后自动收起
  - 搜索和悬浮窗口支持显示文档标签
  - 改进某些 Linux 桌面系统的输入兼容性
  - 对 widgets、plugins 与 templates 等路径执行身份验证
  - 新增斯洛伐克语（sk_SK）支持
  - 支持配置触发浮窗延迟时间
  修复缺陷
  - 列表项取消缩进会导致数据库绑定块被删除
  开发重构
  - 升级至 Electron v39.7.0
  开发者
  - 支持在 Android 上发送通知
