ReleaseNotes: |-
  概述
  此版本改进了一些细节。
  变更记录
  以下是此版本中的详细变更。
  改进功能
  - 将标签、书签和资源的重命名视为数据历史中的 Replace 操作
  - 改进移动端行级文本的外观设置
  - 移动端点击编辑器外部时工具栏不会隐藏
  - 改进任务列表项中 data-task 标记的 Markdown 索引
  - 改进标签切换
  - 改进粘贴超链接时对锚文本的解码
  - 改进 kbd 字体 --b3-font-family-kbd
  - 将 macOS 上默认的重做快捷键改为 ⇧⌘Z
  - 改进表格中撤销后的光标定位
  - 优化代码块行号渲染以提升性能
  - 改进数据索引
  - 改进输入法兼容性
  - 改进剪藏扩展解决图片过大无法剪藏
  修复缺陷
  - 在 iOS 上点击编辑器可能导致页面跳到顶部
  - IFrame 块无法编辑
  - 将链接粘贴到数据库资源字段时会创建重复条目
  - 大纲不会自动刷新
  - 云端配置界面中事件缺失
  - 拆分标签页后出现空白区域
  - 修复一些安全漏洞
  - 启动时缺少 window.siyuan.config 会导致报错
  - 斜杠菜单中的 引用 选项无法搜索
  - 由于 Cookie 过长导致授权页验证失败
  - 修复预览模式下大纲的问题
  开发重构
  - 升级到 Electron v40.9.1
  开发者
  - 独立窗口中卸载插件报错
  - 为 openTab 添加文档打开模式参数 doc.mode
  - 为 Protyle 实例添加 switchMode 方法
