ReleaseNotes: |-
  Overview
  This version improves some details.
  Changelogs
  Below are the detailed changes in this version.
  Enhancement
  - Treat the renaming of tags, bookmarks and assets as a data history Replace operation
  - Improve appearance settings for inline text on mobile
  - Editor toolbar does not hide when clicking outside it on mobile
  - Improve task list item markdown indexing for data-task marker
  - Easy way to switch between tags
  - Improve decoding of anchor text when pasting hyperlinks
  - Improve kbd font --b3-font-family-kbd
  - Change default Redo shortcut to ⇧⌘Z on macOS
  - Improve cursor positioning after Undo in tables
  - Optimize code block line number rendering for better performance
  - Improve data indexing
  - Improve input method compatibility
  - Improve the clipping extension to resolve issues where images were too large to be clipped
  Bugfix
  - Click the editor may cause it to jump to the top on iOS
  - The IFrame block cannot be edited
  - Pasting links into database assets fields creates duplicate entries
  - The outline does not refresh automatically
  - Events are missing in the cloud configuration interface
  - A blank area appears after splitting the tabs
  - Fix some security vulnerabilities
  - Missing window.siyuan.config at startup causes an error
  - The Ref option in the slash menu is not searchable
  - Authentication failed due to an excessively long cookie
  - Fix outline issues in editor Preview Mode
  Refactor
  - Upgrade to Electron v40.9.1
  Development
  - Error occurs in standalone windows after uninstall plugins
  - Add the document opening mode parameter doc.mode to openTab
  - Add switchMode method to Protyle instance
