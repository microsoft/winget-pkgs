ReleaseNotes: |-
  概述
  这一版，思源全面焕新，带来更美观的界面、更强的扩展能力，并朝着智能化的方向更进一步。
  重新设计的用户界面
  整体更美观，视觉层级更清晰，让每次使用都赏心悦目。
  移动端速记
  灵感来时，长按应用图标即可即开即写。内容保存为带时间戳的笔记，保存路径可自定义，碎片想法不再溜走。
  内核插件系统
  插件常驻内核运行，作为单一数据源，使多个窗口和实例之间始终保持一致，彻底告别多窗口场景下的数据冲突。
  命令行接口
  无需启动思源即可直连内核数据层，可用于脚本与自动化任务，例如批量导入导出、定时处理、外部系统集成，一切尽在掌控。
  AI 知识库
  思源智能体与嵌入向量搜索开始公开测试。用自然语言与笔记对话，用语义检索管理知识，你的笔记从此会思考。
  变更记录
  以下是此版本中的详细变更。
  引入特性
  - 新的默认外观图标
  - 移动端速记
  - 新的默认外观主题
  - 支持内核插件系统
  - 命令行接口
  - 新的设置界面
  - 支持配置密钥和变量
  改进功能
  - 支持跨文档撤销
  - 改进外观底部停靠栏
  - 支持在超级块中拖拽调整块宽度
  - 根据字体文件自动调整编辑器字体字重
  - 支持数据库筛选器组合
  - 合并顶部标题栏和标签栏
  - 数据库条目支持 创建副本
  - 改进包含合并单元格的表格的粘贴体验
  - 为 mermaid/graphviz 图表添加缩放和平移选项
  - 支持在移动端进行多块选择
  - 改进数据库日期字段输入格式
  - 支持拖拽排序文档标签
  - 数据库多选字段值支持拖拽排序
  - 在表格中撤销编辑时保留水平滚动位置
  - 支持在移动端切换手机界面和桌面界面
  - 改进拖拽块时显示的工具提示
  - 数据库页脚字段计算支持基于模板的计算
  - 拖拽越过视口后再滚动回来时选择起点会发生偏移
  - 改进工作区丢失后的启动提示
  - 鼠标移离笔记本后工具提示不会隐藏
  - 改进通过 Alt+Enter 在列表末尾插入新项的体验
  - 使用动态滚动条跳转到底部时，内容应填满视口
  - 新增 Markdown 导出参数对话框
  - macOS 上 GPU 使用异常
  - 支持通过文件名搜索从数据快照中返回文件列表
  - 桌面端文件导出不再依赖浏览器下载
  - 不再向浏览器暴露绝对工作区路径
  - 改进空标题的边缘情况
  - 向编辑器粘贴大量 text/siyuan 内容时，渲染进程不再崩溃
  - 改进行级公式和图片的复制，并使剪切行为与复制保持一致
  - 改进字数统计
  - 移动端文件导出不再依赖浏览器下载
  - 表格中的键盘方向键导航不应绕过合并单元格
  - 新增乌克兰语支持
  - 为 Linux 新增 rpm 发布包
  - 为搜索新增标题和列表子类型筛选器
  - 改进微信助手批量消息的稳定性
  - 改进数据索引稳定性
  - 改进行级元素解析
  - 支持在平板上拖拽
  - 段落开头为自定义表情时键盘导航和 Delete 键失效
  - 推送通知标题变更后窗口标题未能更新
  - 支持在移动端使用 跟随系统锁屏
  - 支持将图片从收集箱拖拽到编辑器
  - 支持在移动端拖拽
  - 改进嵌入块中标题层级的导出
  - 三指选择后无法立即复制
  - 新增印地语支持
  - 新增印度尼西亚语支持
  - 新增荷兰语支持
  - 新增泰语支持
  - 改进 Android 上的内核后台进程
  - 添加递归折叠/展开块功能
  - 改进 IFrame 块
  - 通过发布服务提供在线用户指南
  - 改进 PDF 导出预览界面
  - 字体菜单支持搜索
  - 将“访问授权码”重命名为“锁屏密码”
  - 避免数据仓库清理过程中退出时的长时间等待
  - 防止关闭 Markdown 标记后输入时的样式泄漏
  - 改进删除块时的编辑器状态同步
  - 改进块标
  - 修复复制到微信公众号时列表的左缩进问题
  - 发布服务中禁用插件时侧边栏布局错乱
  - 改进导出预览的 HTML 复制
  - 嵌入块支持就地编辑
  - 在包卡片上将 data-obj 替换为 data-repourl，并从内存中查询信息
  - 本地 HTTPS + HTTP/2 支持
  - 改进数据库视图性能
  - 改进 HTML 浏览器剪藏扩展
  - 取消单元格合并 时将 <tbody> 中的 <th> 转换为 <td>
  - 新增简繁体中文敏感度选项
  - 改进剪切和粘贴
  - 支持在 iOS 上打开用户指南
  - 在 Windows 上自定义 select 元素样式
  - 所有编辑器共享同一个 Lute 实例，以降低多标签页内存占用
  - 改进列表和超级块中的拖放体验
  - 块标支持在上方或下方快速插入块
  - 侧边栏面板最小宽度未保存到布局，移动时无法维持宽度
  - Windows 上数据同步因 DNS 问题失败时，自动刷新本地 DNS 缓存并重试
  - 简化块标提示
  - 桌面端支持以安全模式启动
  移除功能
  - 不再支持直接将列表块插入到列表项块中
  破坏性变更
  - 内核服务现在需要显式使用 serve 子命令
  修复缺陷
  - 在聚焦块开头按 Enter 会将新块插入到错误的位置
  - 无外围块的表格中方向键失效
  - 移动端长按后“更多”菜单项无法点击
  - Mermaid 图表中的公式无法渲染
  - 导入 Markdown 后标签页自动关闭
  - 启动时缺少 window.siyuan.storage 会导致报错
  - 在搜索窗口中为文档添加标签时工作不正常
  - 修复一些安全漏洞
  - 在提示块内部删除块引用后撤销异常
  - 隔离 reconnectWebSocket 的 ping，以在 CONNECTING 套接字下保持存活
  - 当包含连续图片的内容被设置为行级元素样式时，图片会消失
  - 无法将笔记本拖拽到最末端
  - 修复任务列表复选框切换问题
  - 重新索引回退导致 sort.json 损坏
  - 页面加载完成前滚动会导致突然重新定位跳跃
  - 反向链接面板中 Shift+Click 多选失效
  - Android 上无法使用引用
  文档
  - 新增数据库 API 端点文档
  - 改进用户指南
  - 新增 .sy 格式规范文档
  开发重构
  - 升级至 Electron v42.5.0
  - 不再创建表 blocks_fts_case_insensitive
  - 升级至 highlight.js v11.11.2
  开发者
  - 提供用于导出文件的插件函数
  - 破坏性变更：一些内核 API 的破坏性变更
  - 从 API /api/history/rollbackDocHistory 端点中移除 notebook 参数
  - 改进 LocalStorage 相关 API
  - addDock 允许在任意生命周期阶段调用
  - 插件安装、卸载、启用或禁用后，全局快捷键注册/注销失效
  - 改进 Linux 构建脚本
  - 为 /api/query/sql 新增只读模式
  - 新增内核 API /api/lute/md2html
  - RTL 布局：为 .protyle 添加 .rtl 类，并修复提示块/块引用样式
  - 新增内核 API /api/history/createDocHistory
  - 修复构造函数 super() 调用中的 this 转义和上下文绑定问题
  - 破坏性变更：弃用 updateTransaction 并替换为 updateTransactionElement
  - 破坏性变更：修改 lang 值以符合 RFC 5646
