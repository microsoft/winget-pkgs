ReleaseNotes: |-
  概述
  此版本改进了一些细节。
  变更记录
  以下是此版本中的详细变更。
  改进功能
  - 支持设置通知开关
  - 移动端横向超级块中的列应占满全宽
  - 支持从左侧、右侧和底部内边距拖拽选择
  - 空闲时自动执行索引修复
  - blocks_fts 使用 FTS5 外部内容模式以与 blocks 去重
  - macOS 上删除未完成的拼音时光标意外跳到其他单元格
  - 通过 siyuan://bazaar/{type}/{name}/readme URI 打开集市资源说明
  - 改进 Markdown 导入以解析音频/视频标签
  - Electron 应用中禁用混合内容的自动 HTTPS 升级
  - Microsoft Store 版本隐藏自动更新选项
  - 改进移动端左侧栏顶栏
  - HarmonyOS 和 Android 上使用桌面模式时弹出屏幕键盘
  - 将块拖拽到浮动文档树时停靠面板未出现
  - 在带有固定表头的表格中输入数据不再重置滚动位置
  - iPhone 设置页面上从左到右选中文本会意外关闭页面
  - 移动端长按并垂直滚动不再触发多选模式
  - 移动端闪卡中缺少块标且 iPhone 上无法扩展选区
  - iOS 分享面板选项中缺少思源
  - 改进通过编辑器中的块引用创建新文档
  - 当块引用锚文本未更改时跳过持久化引用文档
  修复缺陷
  - 无法在 PDF 文件中搜索文本
  - 数据库分组后无法新增字段
  - 某些情况下启动时会卡在“Finishing boot”
  - 数据库滚动加载相关问题
  - 将列表块转换为段落后再撤销该操作会出现异常
  - iOS 上图片不显示
  - 部分 Android/iOS 设备上的索引问题
  - 数据库 创建时间 字段筛选不生效
  - 块标菜单在窗口左边缘处被裁剪
  - 两台设备同时打开时数据库视图无法同步
  - 修复一些安全漏洞
  文档
  - 新增工作区文件系统布局文档
