ReleaseNotes: |-
  Overview
  This version improves some details.
  Changelogs
  Below are the detailed changes in this version.
  Enhancement
  - Improve the input field within the AI edit floating window
  - Block reference candidate list sorted by most recently referenced
  - The Mermaid/chart/formula editor supports displaying line numbers
  - Improve status bar color parsing on mobile
  - Samsung Keyboard dismissed immediately on mobile browser
  - Improve shorthands on iOS
  - Document scrolls up when typing in a table after closing the window
  - Safely call kernel.destroy
  - Continue expanding the fold toggle click area in the file tree
  - Register shorthands as an App Shortcut with Siri integration on iOS
  - Brand-new built-in doc cover pictures
  - Improve scrolling, drag-and-drop, and long-press menu for Pad/Tablet outline panel
  - Improve parsing of pasted hyperlinks
  - UI improvements for the new layout
  - Page does not scroll when touching a list item icon on mobile
  - Fullscreen button is misaligned when Merge tabs into top bar is disabled
  - Image width adjustment inside an embed block is not synced in real-time
  - Inputting - inside an empty list item causes rendering anomaly
  - SiYuan app does not appear in the iOS Share Sheet when sharing URLs
  - Improve the keyboard popup behavior on Android and HarmonyOS
  - Support outline drag-and-drop on mobile
  - Enhance drag width percentage precision for sub-blocks within superblock
  - Improve settings page styles
  - Improve dragging of list blocks within the super block
  - Set folded block height based on font size
  - Standardize the User-Agent for outbound HTTP requests
  - "Copy as PNG" does not work in the browser when deployed via Docker
  - Improve copy-paste functionality for tables containing merged cells
  - Improve database virtual scrolling
  - Adjust list item hover style for different font sizes
  - Improve the menu scrollbar
  - Database card view and kanban view do not show the number of selected items
  - Database "Toggle Display Item Icons" ignores unbound blocks
  Bugfix
  - Normal exit misreported as port listen failure
  - Deleting a superblock containing a widget behaves abnormally
  - Other apps cannot share files to the shorthands on HarmonyOS
  - Abnormal status of newly created blocks after shorthands synchronization
  - Cut fails when multi-selecting blocks if the cursor accidentally focuses inside an embed block
  - UI layout anomaly for nested blocks inside Horizontal Super Blocks on mobile
  - Delete anomaly inside a list item/callout/block quote under specific conditions
  - Editing in the table resets the scroll position to the header
  - Data indexing issue in the Microsoft Store edition
  - Sub-blocks remain unfolded after undoing the heading unfold
  - Fix some security vulnerabilities
  - Issue with document reordering via drag-and-drop on mobile
  - Tabs cannot be dragged in merged top bar mode
  Document
  - Improve CLI installation guide
  Refactor
  - Upgrade to Electron v42.6.1
  Development
  - Plugin API updateProtyleToolbar does not work on mobile
