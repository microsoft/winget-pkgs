ReleaseNotes: |-
  概述
  此版本改进了一些细节。
  变更记录
  以下是此版本中的详细变更。
  改进功能
  - 改进 AI 编辑浮窗中的输入框
  - 块引用候选项列表按最近引用排序
  - Mermaid/图表/公式编辑器支持显示行号
  - 改进移动端状态栏颜色解析
  - 移动端浏览器上三星键盘弹出后立即收起
  - 改进 iOS 上的速记
  - 关闭窗口后在表格中输入会导致文档向上滚动
  - 安全地调用 kernel.destroy
  - 继续扩大文件树中折叠切换的点击区域
  - 在 iOS 上将速记注册为 App 快捷指令并集成 Siri
  - 全新的内置文档封面图片
  - 改进 Pad/平板大纲面板的滚动、拖拽和长按菜单
  - 改进粘贴超链接的解析
  - 新布局的 UI 改进
  - 移动端触摸列表项图标时页面不再滚动
  - 禁用「合并标签页到顶栏」后全屏按钮错位
  - 嵌入块中的图片宽度调整不会实时同步
  - 在空列表项中输入 - 会导致渲染异常
  - 分享 URL 时思源应用未出现在 iOS 分享面板中
  - 改进 Android 和 HarmonyOS 上的键盘弹出行为
  - 移动端支持大纲拖拽
  - 提高超级块内子块的拖拽宽度百分比精度
  - 改进设置页面样式
  - 改进超级块内列表块的拖拽
  - 根据字号设置折叠块的高度
  - 统一对外 HTTP 请求的 User-Agent
  - 通过 Docker 部署时浏览器中「复制为 PNG」不可用
  - 改进含合并单元格的表格的复制粘贴功能
  - 改进数据库虚拟滚动
  - 针对不同字号调整列表项悬停样式
  - 改进菜单滚动条
  - 数据库卡片视图和看板视图未显示选中项数量
  - 数据库「切换显示项图标」忽略未绑定的块
  修复缺陷
  - 正常退出被误报为端口监听失败
  - 删除包含挂件块的超级块时行为异常
  - HarmonyOS 上其他应用无法将文件分享到速记
  - 速记同步后新建块状态异常
  - 多选块时若光标意外聚焦到嵌入块内则剪切失败
  - 移动端横向超级块内嵌套块的 UI 布局异常
  - 特定条件下列表项/引述/引用块内的删除异常
  - 在表格中编辑会重置滚动位置到表头
  - Microsoft Store 版本中的数据索引问题
  - 撤销标题展开后子块仍保持展开状态
  - 修复一些安全漏洞
  - 移动端通过拖拽对文档重新排序的问题
  - 合并顶栏模式下标签页无法拖拽
  文档
  - 改进 CLI 安装指南
  开发重构
  - 升级到 Electron v42.6.1
  开发者
  - 插件 API updateProtyleToolbar 在移动端不可用
