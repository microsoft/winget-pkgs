ReleaseNotes: |-
  v2.5.0 - 2026-04-28
  ✨ 新功能
  - 添加后台预热功能以优化启动性能 (22f5cd0)
  - 支持 prompt cache 功能 (c3553e7)
  - 为 OpenAI 响应提供者添加提示缓存开关 (5f86315)
  - 引入通用异步动作管理和加载按钮组件 (b8c8d48)
  - 新增 Trae native 自定义模型路线支持 (71f7b43)
  - 实现稳定性层与运行时兼容性检查 (6bd3a42)
  - 新增官方 base_url 代理路线和运行时状态查询 (f724ae1)
  - 添加代理运行状态实时显示功能 (6150c88)
  - 实现日志通道以替代事件流 (f275ec7)
  - 添加端口顺延支持并显示实际 loopback 端口 (915c68e)
  - 添加前端就绪事件与延迟初始化逻辑 (7caff27)
  - 添加 macOS native 重写器后端和跨平台支持 (b682573)
  - 添加已结束任务清理机制 (51bbf0e)
  - 新增代理日志追踪面板与后端存储 (b28f6bb)
  - 将详情面板改为侧边抽屉式弹窗 (292e1ea)
  🐛 修复
  - 修正运行时检测逻辑并添加 Tauri 开发脚本 (0d219f6)
  - 清理 trae 启动环境变量以避免冲突 (09254c6)
  - 在 Windows 上修正 pnpm 入口点解析以支持 tauri dev (1589418)
  🎨 界面样式
  - 为提供商选择器添加全宽度样式 (01ef57c)
