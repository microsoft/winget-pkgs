ShortDescription: A tiny, fast, private PDF viewer. No ads, no accounts, no telemetry.
Description: |-
  No Bloat PDF is a free PDF viewer for Windows built for one job: opening
  documents instantly. A 4.6 MB installer delivers tabs for multiple
  documents, full text search, thumbnails and bookmarks, dark mode, high
  resolution printing, and highlighting and annotations, rendered by
  Mozilla's pdf.js engine in a lightweight native shell. It makes zero
  network calls: no telemetry, no accounts, no cloud, no upsells.
