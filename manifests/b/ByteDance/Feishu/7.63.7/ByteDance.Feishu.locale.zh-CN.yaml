ReleaseNotes: |-
  多维表格
  - 在多维表格的数据表中，你可以通过 AI 粘贴文本或图片的方式新增记录。粘贴时，系统会自动识别粘贴的文本或图片内容，并借助 AI 能力智能匹配填充为数据表记录。导入更高效，协作更便捷。
  - 飞书问卷新增 AI 语音录入功能。填写问卷时，如果开启语音录入，AI 可自动识别语音里的业务指令，并把语音内容实时转化为结构化的表单数据。问卷填写更高效，信息收集更便捷。
  系统设置
  - 在 Windows 系统中使用飞书桌面端时，如果出现内存不足、目录权限异常、白屏卡顿等问题，可使用 AHA 电脑医生进行故障排除与修复。
