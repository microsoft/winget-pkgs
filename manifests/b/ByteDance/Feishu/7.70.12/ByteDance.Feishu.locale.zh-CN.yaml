ReleaseNotes: |-
  多维表格
  - 借助多维表格 AI，你只需用文字描述需求，即可由 AI 自动完成问卷的智能创建与编辑，大幅降低问卷设计门槛，让业务开展更高效。此外，你还能与 AI 交流问卷设计思路，AI 将提供专业方案建议与设计参考，辅助问卷设计。
  - 借助多维表格 AI，你只需要用文字描述需求，AI 即可帮你完成多维表格内问数（数据检索）、统计计算、归因分析、趋势预测、分析报告生成、多维表格总结等各类问数与数据分析操作。
  - 在多维表格的筛选、分组、排序等需要选择字段的场景中，你可以在下拉框中直接搜索字段名称，快速定位目标字段，提升选择效率，尤其适用于字段数量较多的场景。
  云文档
  - 在飞书桌面端或网页版，你可以将飞书文档下载为 Markdown 格式的文件，方便在其他工具中编辑和使用。
