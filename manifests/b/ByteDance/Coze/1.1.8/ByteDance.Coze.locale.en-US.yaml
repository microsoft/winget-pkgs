ShortDescription: Next-generation AI teams start with Coze.
Description: |-
  Coze is a next-generation AI team collaboration platform designed for the Agent era.
  On Coze, humans and Agents work together like a real team. You can dispatch multiple Agents on your own, or collaborate with team members to coordinate multiple Agents to complete complex tasks—such as office work, programming, video creation, file processing, and industry research—all within the same project.
  Coze is more than just a chat tool; it is a collaboration platform capable of carrying projects, accumulating assets, scheduling Agents, and continuously delivering results. Every project can have its own independent dialogues, files, and assets. Task backgrounds, execution processes, and final outputs are continuously saved, making team collaboration clearer and ensuring that Agents understand you better over time.
  Whether you are a creator, developer, complex business worker, or a novice using Agents for the first time, you can quickly build your own AI team in Coze and let multiple professional Agents help you turn ideas into results.

  A Next-Generation AI Team Starts with Coze

  The all-new Coze is no longer just a clever chat tool, but an AI team workbench where humans and Agents collaborate to continuously advance tasks.
  - Multi-person & Multi-Agent Collaboration: Supports various collaboration modes, such as one person + multiple Agents or multiple people + multiple Agents. Different Agents perform their respective duties while team members share context to advance tasks together. Need someone to join? Just @ them, and the whole team is ready.
  - Independent Multi-project Management: Create different projects for different tasks. Dialogues, files, materials, and outputs within a project are continuously accumulated. Requirement discussions, task executions, and final results are no longer scattered across different chat windows, making team synchronization clearer.
  - Out-of-the-box Professional Partners: Coze Agents are always online, supporting free switching between mainstream models like Doubao-Seed, Kimi, GLM, and Minimax. Combined with long-term memory, skill invocation, and workbench capabilities, they can continuously understand your tasks, preferences, and project backgrounds.
  - Deep Upgrades for Programming and Video Projects: From developing websites, apps, and mini-programs to creating scripts, storyboards, videos, and music, Coze provides a project-level collaboration experience. Multiple people can advance a project together, and multiple sessions can be executed in parallel, making complex creation more efficient.
  - Define Your Own Agents: You can create industry expert Agents through professional templates, or connect Agents running on your local computer—such as Claude Code, Codex CLI, and OpenClaw—to be centrally hosted and scheduled within Coze.
  - One-click Loading of Industry Expert Skills: Skill sets for industries such as self-media, law, finance, internet, and healthcare provide Agents with more professional domain knowledge and execution capabilities, helping you solve complex problems in vertical industries.
  - Cross-platform Syncing for Mobile and PC: The desktop version supports authorizing Agents to process local files, while the mobile version allows you to check projects, schedule Agents, and continue advancing tasks at any time. Content is synced across platforms, allowing tasks to naturally hand off between different devices.

  What Coze Can Do

  Coze doesn’t just help you complete individual tasks; it works with you to drive entire projects. Whether you are a creator, developer, complex business worker, or a first-time Agent user, you can find a way of working that suits you in Coze.

  Multi-person & Multi-Agent Collaboration
  - Flexible Teaming: Supports one person + multiple Agents or multiple people + multiple Agents. Team members and Agents can share context and sync progress within the same project; just @ them to join the collaboration.
  - Division of Labor: Tasks such as data organization, proposal writing, industry analysis, code implementation, and video generation can be assigned to different Agents to be completed through a division of labor.
  - Asset Accumulation: Every project has an independent space for dialogues, files, and assets. Discussions, materials, and results are continuously stored for easy management and reuse.

  Build Your Exclusive Agent
  - Create Expert Agents: Select professional templates to create Legal Assistants, Content Creation Assistants, Industry Research Assistants, and other specialized Agents with one click, or create new long-term online cloud Agents.
  - Connect Local Agents: Local Agents such as Claude Code, Codex CLI, and OpenClaw can be connected to Coze with one click, entering projects and collaborating on tasks alongside cloud Agents.

  Vibe Coding Anytime, Anywhere
  Build websites, apps, and mini-programs anytime, even when away from your computer, without needing R&D tools or programming environments.
  - Multi-platform data synchronization, communicate whenever needed. Coze now supports desktop, web, and mobile platforms, with multi-device data synchronization and the ability to operate your local devices. When inspiration strikes, open your phone to let Coze help you manage files or execute scripts on your personal computer.
  - Remote Coze Programming; let AI write code for you. Coze supports invoking the AI programming capabilities of Coze IDE (code.coze.cn). Starting from a single idea, let the Agent help you break down requirements, generate code, preview effects, and deploy online with one click.
  - Collaborative AI Programming. The new programming projects support multi-person collaboration and parallel development across multiple sessions, allowing several tasks to proceed simultaneously. You can also import GitHub or local projects to continue development, naturally integrating existing projects into Coze’s Agent collaboration workflow.

  Content Creation and Creative Editing
  Coze is a high-level creation expert. Beyond basic capabilities like long-form writing, drafting outlines, and making PPTs, it can help you complete the entire video creation process from inspiration to the final cut.
  - Full-process Video Creation: Simple dialogue can generate well-structured, fast-paced scripts and screenplays, and further complete storyboard breakdown, material matching, video generation, and music generation. After generation, you can continue to edit via dialogue or manual adjustments and export CapCut project files, moving creativity from one-off generation to continuous production. Continuous dialogue can also create sequels for long-form series.
  - Collaborative Video Creation: Video projects support multi-person collaboration. Team members can work together on the same project to advance scripts, storyboards, characters, props, documents, and video content.
