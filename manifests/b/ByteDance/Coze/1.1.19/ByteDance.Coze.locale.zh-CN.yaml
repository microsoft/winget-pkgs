ShortDescription: 新一代 AI 团队，从扣子开始
Description: |-
  扣子是面向 Agent 时代的新一代 AI 团队协作平台。
  在扣子中，人和 Agent 可以像真正的团队一样共同工作。你可以一个人调度多个 Agent，也可以和团队成员一起协同多个 Agent，在同一个项目里完成办公、编程、视频创作、文件处理、行业研究等复杂任务。
  扣子不只是一个对话工具，而是一个能承载项目、沉淀资产、调度 Agent、持续交付结果的协作平台。每个项目都可以拥有独立的对话、文件和资产，任务背景、执行过程和最终产出会被持续保存，让团队协作更清晰，也让 Agent 越用越懂你。
  无论你是创作者、开发者、复杂业务工作者，还是第一次使用 Agent 的新手，都可以在扣子中快速组建自己的 AI 团队，让多个专业 Agent 和你一起把想法变成结果。

  新一代 AI 团队，从扣子开始

  全新扣子，不再只是一个聪明的对话工具，而是一个让人和 Agent 共同协作、持续推进任务的 AI 团队工作台。
  - 多人多 Agent 协作：支持一人+多 Agent、多人+多 Agent 等多种协作模式。不同 Agent 各司其职，团队成员共享上下文，一起围绕项目推进任务。需要谁加入，@ 一下，全员就位。
  - 多项目独立管理：不同任务可以创建不同项目，项目中的对话、文件、素材和产出会持续沉淀。需求讨论、任务执行和最终成果不再散落在不同聊天窗口里，团队同步更清晰。
  - 专业伙伴开箱即用：Coze Agent 持续在线，支持 Doubao-Seed、Kimi、GLM、Minimax 等主流模型自由切换。结合长期记忆、技能调用和工作台能力，它可以持续理解你的任务、偏好和项目背景。
  - 编程与视频项目深度升级：从网页、App、小程序开发，到剧本、分镜、视频、音乐创作，扣子都提供项目级协作体验。多人可以一起推进项目，多个会话可以并行执行，让复杂创作更高效。
  - 你的 Agent，你来定义：你可以通过职业模板创建行业专家 Agent，也可以接入本地电脑上的 Claude Code、Codex CLI、OpenClaw 等 Agent，在扣子中统一托管和调度。
  - 行业专家技能一键加载：自媒体、法律、金融、互联网、医疗健康等行业技能包，让 Agent 获得更专业的领域知识和执行能力，帮助你解决垂直行业中的复杂问题。
  - 手机电脑跨端同步：桌面端支持授权 Agent 处理本地文件，移动端支持随时查看项目、调度 Agent、继续推进任务。内容跨端同步，任务可以在不同设备之间自然接力。

  扣子能做什么

  扣子不仅能帮你完成单个任务，更能和你一起推进完整项目。无论你是创作者、开发者、复杂业务工作者，还是第一次使用 Agent 的新手，都可以在扣子里找到适合自己的工作方式。

  多人多 Agent 协作
  - 灵活组队：支持一人+多 Agent、多人+多 Agent。团队成员和 Agent 可在同一项目中共享上下文、同步进度，@ 一下即可加入协作。
  - 分工推进：资料整理、方案撰写、行业分析、代码实现、视频生成等任务，都可以交给不同 Agent 分工完成。
  - 资产沉淀：每个项目都有独立的对话、文件和资产空间，讨论、素材和成果持续沉淀，方便管理和复用。

  打造你的专属 Agent
  - 创建专家 Agent：选择职业模板，一键创建法务助手、内容创作助手、行业研究助手等专业 Agent，也可以新建长期在线的云端 Agent。
  - 接入本地 Agent：Claude Code、Codex CLI、OpenClaw 等本地 Agent 可一键接入扣子，和云端 Agent 一起进入项目、协同推进任务。

  随时随地 Vibe Coding
  无需研发工具和编程环境，即使不在电脑旁也能随时搭建网站、App 和小程序。
  - 多平台数据同步，有事随时沟通。扣子现已支持桌面端、网页端和移动端，多端数据同步、支持操作你的本地设备。灵感来了，打开手机就能让扣子帮你在个人电脑上管理文件、执行脚本。
  - 远程操作扣子编程，AI 帮你写代码。扣子支持调用扣子编程（code.coze.cn）的 AI 编程能力，从一句想法开始，让 Agent 帮你拆解需求、生成代码、预览效果，并一键部署到线上。
  - 多人协作 AI 编程。全新的编程项目支持多人协作和多会话并行开发，多个任务可以同时推进。你也可以导入 GitHub 项目或本地项目继续开发，让已有项目自然接入扣子的 Agent 协作流程。

  内容创作与创意编辑
  扣子是满级的创作专家，除了基本的长文写作、起草大纲、PPT 制作等基础能力以外，还能帮你完成从灵感到成片的完整视频创作。
  - 全流程视频创作：简单对话即可生成结构完整、节奏紧凑的剧本和脚本，并进一步完成分镜拆解、素材匹配、视频生成和音乐生成。生成后可继续对话剪辑或手动调整，并导出剪映工程文件，让创意从单次生成走向持续生产。持续对话还能创作续集，打造长篇连载。
  - 多人协作创作视频：视频项目支持多人协作，团队成员可以围绕同一个项目共同推进剧本、分镜、角色、道具、文档、视频等内容。
