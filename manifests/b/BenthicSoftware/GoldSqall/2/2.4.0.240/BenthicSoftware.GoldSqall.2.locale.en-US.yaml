ReleaseNotes: |-
  - New portable application mode via command-line options or marker file.
  - Several fixes to editing tables using a uuid primary key in PostgreSQL.
  - Improved database file selection for SQLite, DuckDB and Firebird local databases.
  - Fix for SQLBuilder refresh on Oracle cloud connections.
  - Version information added to DuckDB diagnostics.
  - Changes to Summarize and Pragma statements so no special handling is necessary.
  - Several changes for high DPI per monitor support.
  - Improvements to the login window for dark mode.
  - New export/import all options choices on the login window (useful for portable mode.)
