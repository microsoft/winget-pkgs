License: MIT
ShortDescription: Fullscreen overlay for instant snippet recall via global hotkey
Description: |-
  BrainRAM is a cross-platform desktop app that shows a fullscreen overlay of curated snippets when you hold a global hotkey. Click any snippet to copy it to clipboard. Release the hotkey to dismiss. Relies on spatial memory, not search. No database, no network, no telemetry. Entirely offline.
