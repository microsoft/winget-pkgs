Description: RBTray is a small Windows program that runs in the background and allows windows to be minimized to the system tray by:\n- Right-clicking its minimize button\n- Shift-right-clicking its title bar\n- Using the Control-Alt-Down hotkey\nNot all of these methods will work for every window, so please use whichever method works best for your needs. Also note that some types of windows can not be properly minimized at all, most notably Windows Store application windows such as WhatsApp.\nRBTray is free, open source, and is distributed under the terms of the GNU General Public Licence.
