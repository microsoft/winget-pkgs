Description: |-
  Bandizip is a powerful archiver which provides an ultrafast processing speed and convenient features. Available free of charge, and its paid editions support a variety of advanced features.
  - Supported OS: Windows 10/11 (x64/ARM64)
  - All-inclusive compression/decompression/browsing/editing Archiver
  - Extraction for 30+ formats, including RAR/RAR5/7Z/ZIP/ALZ/EGG
  - Compressing an archive with password and multi-volume
  - Fast compression with multi-core
  - Windows 10/11 Context Menu support
