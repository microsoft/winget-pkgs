ReleaseNotes: |-
  Bforartists 5 version 5.1.0 - The UV Nodes Version 🏁
  Bforartists 5 1 0 - Splash Large
  Bforartists 5 0 1 Screenshot
  This major point release is focused on new procedural UV Geometry Nodes assets that come out of the box, and much polish to the overall interface, keeping everything new in sync with the Bforartsits interface philosophy.
  This is part of all the latest from Blender 5.1.0 and 5.2.0 to the date - with 131 new features, fixes and polish with much stability from Blender!
  ℹ️ Linux and Mac builds are cooking and will come soon
  ✨What's new :
  - New procedural UV Nodes assets for Geometry Nodes
  bforartists_ijdY7L6cEw
  - Grease Pencil pressure sensistive distance to radius when drawing on surfaces
  - New Primitive Add gizmos mode operators exposed to a top level in the toolshelf in object and sculpt mode
  568167306-be6b571a-9b2b-4d6f-9a9d-a885b3684013
  - Updates to Grease Pencil asset thumbnails for consistency
  bforartists_I90XQOsTza
  - Major performance update and new features of the Smart Mesh Blend asset
  - Major refactor for the Add Node sidebar to improve consistency and order
  - Refactored Topbar customization and consistency settings panel pass for the Topbar editor, making this more accessible and usable and consistent
  566774956-577abdf3-41d5-4f56-9466-37d0da6d3cd6
  - Active Tool dropdown gets icons
  - More tabbed toolshelf icons get an update, notably the Annoation icons
  - Most Booleans checkboxes now dynamically float left, making these more consistent everywhere
  - Sidebars have improved alignment of labels and properties accross the board
  - Tabbed toolshelf has improved padding when in 3 columns mode
  - Improved selected channel legibility in Animation editors
  - Fixed Multi-GPU rendering hard crash
  - More Shelf Regions pie menu refinement
  🧡 Additional Features from this Blender 5.1.x and 5.2.x series:
  - Animation: New Subframes visibility
  - Animation: New Looping and playback modes
  - Graph: New Smooth (Gaussian) modifier
  - Shader: New raycast node
  - Shader: Support for DirectX and OpenGL toggles in the Normal node
  - Preferences: New Search
  - Preferences: New abiliity to toggle Asset library visibilities
  - Greasepencil: New Fills and Stroke mode with booleans
  - Greasepencil: New primitive gizmos
  - Grease Pencil: You can search in layers now
  - Geometry Nodes: New Grid Nodes like Gird Mean, Grid Median, Grid Dilate & Erode, Trim String node, Set NURBS Weight and Order, new Matrix SVD
  - Geometry Nodes: New Bundle orgnaization nodes in Geometry Nodes
  - Geometry Nodes: UV Pack node and Strings to Curves node is better
  - All Node editors: New Implicit conversion, and new consistent Input constant nodes, new Menu node
  - All Node editors: New Cut Nodes to paste between sessions opertoar
  - Weight Paint: New loop selections
  - Edit Mode: New delimiters on loop selections
  - Edit Mode: New "To Circle" operator
  - Text Object: Better drawing
  - Compositor: New Camera Info nodes and Integer Vectors, new Mask to SDF node
  - Compositor/Sequencer: Now compositor
  - Sculpting: New Scene Project brush, and Vertex Color operator
  - Data: Better Remap User experience
  - Outline: Scroll on rename has improved
  - Core: Undo is 30% faster
  - Core: Vulkan and Cycles Denoising is marginally much faster and stable, by leagues
  - Core: Stability is highest it has ever been with over 350+ fixes
  And many more features, bug fixes and more!
  Downloads available from both Github, the official Website, Windows store and Blender Launcher v2
