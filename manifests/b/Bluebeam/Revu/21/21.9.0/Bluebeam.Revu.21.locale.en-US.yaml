ReleaseNotes: |-
  Revu 21.9 - 3 March 2026
  What's Fixed
  - Printing to the Bluebeam PDF printer could cause other open instances of Revu to close unexpectedly.
  - Links to PDF files wouldn't open correctly in the Web tab.
  - When polyline editing, control points didn't respond correctly when using modifier keys.
  - File names in footers could change when converting Word documents to PDF using Stapler.
  - Restored expected behavior for temporarily disabling Snap to Grid using keyboard shortcuts with certain tools.
  - The Import Icon option was unavailable in Tool Sets.
  - Revu could become unresponsive when working with custom line styles and adjusting the Properties panel.
  - Some custom sequences couldn't be resumed.
  - Polygon Cutout didn't work properly on areas with curved segments.
  - Some images in PDFs didn't render correctly on ARM64 devices.
  - Markups didn't snap to grid correctly after rotating a PDF when using certain regional settings.
  - Additional improvements and fixes.
