  - Release 9.1.0 (2026-04-20)
  - Release 9.1.1 (2026-06-03)
  OSS:
  - ci(rbe): upgrade to ubuntu2404. (https://github.com/bazelbuild/bazel/… (#29589)
  - Fix: Prevent GitHub 'Latest' badge regression on maintenance releases… (#29595)
  - Disable sandbox tests on RBE (#29607)
  - don't fail test setup if file is not available (#29260) (#29652)
  Remote-Exec:
  - Verify the whole blob when downloading chunks (#29435) (#29593)
  - Support bounded parallel chunk transfers (https://github.com/bazelbui… (#29614)
  - Fix JVM crash from VerifyException in GrpcCacheClient.onNext() (#29316) (#29583)
  - Invalidate unresolved symlink info after deletion in the RAFS (#29495) (#29671)
