  - Fix NPE in ProgressInputStream (#29501) (#29579)
  - Partially revert PR #27877 (#29616)
  - downloader: fix opaque file URI names (#29549) (#29658)
  - Cache CAS interactions at lower layer to fix lost input handling (#29677)
