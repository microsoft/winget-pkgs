ReleaseNotes: |-
  What's New
  More rules, faster!
  Rules
  More Rules
  v1.7.0 focuses on speed and expanding the default config with more better rules. Here's the numbers for a GitLab dir (just the files) scan:
  ───────┬─────┬───────────────┬─────────
  Version│Rules│With validation│Wall time
  ───────┼─────┼───────────────┼─────────
  v1.6.1 │325  │106            │3.55s
  ───────┼─────┼───────────────┼─────────
  v1.7.0 │412  │187            │2.89s
  ───────┴─────┴───────────────┴─────────
