ReleaseNotes: |-
  This release addresses concerns about the overly restrictive trade amount limits introduced in the previous release and fixes a bug affecting BSQ swap trades.
  Release notes

  Trading And Wallet Safety
  - Maximum trade limits were increased to 0.250 BTC.
  - The risk-based reduction factors for the 4 risk classes were changed from 1, 2, 4, 8 to 1, 2, 3, 4. This results in trade limits of up to 0.250 BTC for Altcoins and up to 0.0625 BTC for higher-risk fiat payment methods such as SEPA or Zelle.
  - Fixed a bug in BSQ swap fee validation and added additional validation checks.
  - Trade statistics validation was adjusted for the reduced trade limits introduced in the previous release.

  UX And Settings
  - Updated the user agreement.
  - Trade rules are now shown when users create or take an offer for the first time.
  - Trade rules and the user agreement are now available from Settings → About.
  - The cold-storage reminder threshold is now configurable in preferences.

  Release Process And CI
  - Debian package dependency generation now relaxes t64 dependencies while preserving the original constraint or qualifier on the non-t64 alternative.
  See full release notes at: https://github.com/bisq-network/bisq2/tree/main/release-notes/2.1.11

  Installation

  macOS
  Bisq does not use Apple's notarization process (see why).
  For that reason you will see that (misleading) alert:
  Grant permissions by:
  - run sudo xattr -rd com.apple.quarantine /Applications/Bisq.app in a terminal (type Terminal in the Apple search box)
  - open Bisq again
  More details can be found here.

  Windows
  For similar reasons you will get that warning at Windows: Windows protected your PC
  - Click the More info button when prompted
  - Click the Run anyway button when prompted
  More details can be found here.

  Verify download
  See the verification and installation instructions in the Bisq Wiki.
