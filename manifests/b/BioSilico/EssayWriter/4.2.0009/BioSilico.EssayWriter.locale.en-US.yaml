ReleaseNotes: |-
  Which editions are affected?
  1. All editions: IdeaMapper Desktop Cloud, IdeaMapperPro, IdeaMapperK12, IdeaMapperHigherEd and EssayWriter.
  How to get this release?
  1. For desktop installations: Go to https://ideamapper.com, follow HelpDesk and download links for your platform, download the installer file, then install. The previous version will be upgraded.
  2. For the webapp: Clear the browser cache, then go to https://webapp.ideamapper.com, and log in with the same credentials.
  What’s New?
  - Text ideas can now be "joined" and "split". To join: right-click on an idea which has only text ideas connected and select "join". The sub-ideas are then added to the main idea and deleted. To split: right-click on a text idea which has no sub-ideas and select "split".
  - In addition to automatic ordering idea maps can now also be manually ordered.
  - Import and export of "Markdown" files (*.md) into idea maps.
  Bug Fixes?
  - Fixes a potential program crash when a link was created twice.
  - Fixes an issue with an extra space added for the author for the in-text reference when using Harvard Style bibliography.
  - For IdeaMapperPro, fixes an issue when using Ollama as local AI LLM engine.
  - Minor fixes.
