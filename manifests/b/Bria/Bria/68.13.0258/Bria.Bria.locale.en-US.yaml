ReleaseNotes: |-
  Windows 10: End of support by Microsoft
  After October 14, 2025, Microsoft will no longer provide free software updates from Windows Update, technical assistance, or security fixes for Windows 10. Move to Windows 11 now. Learn more.
  Resolved issues
  This version contains improvements to the overall stability and performance of Bria and miscellaneous bug fixes.
  - Resolved the known issue with starting Bria Windows version 6.8.6.
  - Includes updates to various third party libraries.
  Desktop API certificate info
  For the Bria Desktop API integration, this Bria version includes a TLS certificate which will expire on September 18, 2026.
  Known issues
  The cursor visibility issue on Bria Mac Version 6.8.6
  On devices using macOS 26 Tahoe, the cursor disappears once the user starts typing in a field, such as the call field and the search contacts field. This does not affect typing itself but it's inconvenient to lose track of the cursor. We are working on fixing this issue.
  Video call issues
  If the remote party tries to add video to an audio call on your Team Voice account, the call is dropped. If the caller tries to add video to an audio call, the call remains as an audio call. In order to use video, place the call as a video call.
