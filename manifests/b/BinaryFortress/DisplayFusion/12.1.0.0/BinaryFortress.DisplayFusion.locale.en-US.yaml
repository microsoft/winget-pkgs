ReleaseNotes: |-
  - Change: Updated to run on .NET 10, the new framework will be automatically installed during the update
  - Change: New Scripting Function to get taskbar size
  - Change: DisplayFusion now handles settings restore instead of passing to regedit, allowing a settings backup to restored by non-admin users
  - Change: Removed the Google Image Search wallpaper source as Google has removed the API authentication for it
  - Change: Added the ability to toggle HDR in Monitor Configuration and save it with Monitor Profiles (toggles HDR only, does not set HDR colour depth or format)
  - Change: Added an option to Custom Functions that allows them to be toggled (i.e. after running the function on a window, a second run will revert the window to its previous size/location)
  - Change: Improvements to existing "Span Window Across All Monitors" function (you can switch back to the old behaviour with an advanced setting if needed)
  - Change: Added a new "Span Window Across Specific Monitors" function that allows you to select the monitors to span
  - Change: Added a button in the Desktop Wallpaper window to delete the Windows transcoded wallpaper file
  - Fix: Taskbar no longer forced to bottom when running PowerToys Command Palette
  - Fix: Resolved a script download issue
  - Fix: Resolved an issue where wrong process name was sometimes detected for Triggers
  - Fix: AutoCAD 2027 now shows up on DisplayFusion taskbar
  - Fix: EssentialPIM Pro taskbar button no longer disappears on minimize
  - Fix: Resolved an issue where Settings on the Adjustments tab in the wallpaper window didn't apply correctly in some cases
  - Fix: Left-click now closes Alt+Tab window
  - Fix: Resolved a hook issue on Windows 11 21H2
  - Fix: Steam tray icon no longer cycles on and off of the DisplayFusion taskbar
  - Fix: Dropbox wallpaper source now uses the new Dropbox API
  - Fix: Reduced CPU and I/O usage
  - Fix: Resolved an issue where resuming from screen saver didn't work on some systems
  - Fix: Removed qlock from Alt+Tab handler
  - Fix: No longer sends minimized window to bottom of Alt+Tab order
  - Fix: Resolved an issue with blank taskbar buttons on Windows 10 with Open Shell and dark mode enabled
  - Fix: Resolved an issue where wrong taskbar buttons were sometimes combined
  - Fix: Resolved an issue with AutoCAD pop-out window not showing up on taskbar
  - Fix: Wallpaper no longer flickers if you're using Wallpaper Engine instead of DF wallpaper
  - Fix: Resolved some font scaling issues when display scaling and font scaling are both enabled in Windows
  - Fix: Functions now work on some borderless full screen windows
  - Fix: Alt+Tab no longer moves a minimized window to the bottom of the Alt+Tab order
  - Fix: Discord notification dot now shows up even if it's running as admin
  - Fix: Website wallpaper fixes and improvements
  - Fix: Video wallpaper fixes and improvements
  - Fix: TitleBar Buttons now show up on Bigasoft Video Downloader
  - Fix: Scripted Functions compile correctly on ARM systems again
  - Fix: Resolved an issue where the process icons on the Triggers tab were sometimes red boxes
  - Fix: Notepad++ no longer sticks to the bottom of the Alt+Tab order
  - Fix: Gemini now combines correctly with pinned taskbar button
  - Fix: With Alt+Tab set to show current windows, the list now gets refreshed correctly when the monitor config changes
  - Fix: New Outlook now combines correctly with pinned taskbar button
  - Fix: CheatEngine no longer shows two taskbar entries
  - Fix: Resolved an issue where the Monitor Configuration window sometimes duplicated the monitor previews
  - Fix: Terminal window now gets correctly moved to taskbar monitor when opened from a taskbar pinned button
  - Fix: Monitor Splitting no longer causes SuperPuTTY tabs to incorrectly resize
  - Fix: Resolved an issue where Alt+Tab sometimes selected the wrong window
  - Fix: Tray overflow icon no longer missing on Japanese Windows
  - Fix: Resolved an issue where Process Explorer sometimes only showed one tray icon
