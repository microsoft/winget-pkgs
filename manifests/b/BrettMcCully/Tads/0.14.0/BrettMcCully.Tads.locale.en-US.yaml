ShortDescription: Fast desktop viewer for Parquet, CSV, DuckDB, and SQLite files with a Stata-style command bar.
Description: Tads is a desktop viewer for huge Parquet, CSV, DuckDB, and SQLite files built on Tad and an embedded DuckDB engine. It adds a Stata-style command bar (browse, summarize, tabulate, keep/drop, sort, histogram, ...) with variable abbreviation and if-expressions, an append-only results pane, and the original Tad pivot table, filtering, and sorting GUI. All operations are strictly read-only.
