ShortDescription: Modern build system based on CMake and TOML.
Description: |-
  cmkr, pronounced "cmaker", is a modern build system based on CMake and TOML.

  cmkr parses cmake.toml files and generates a modern, idiomatic CMakeLists.txt for you.

  cmkr can bootstrap itself and you only need CMake and a C++ compiler to use it.
