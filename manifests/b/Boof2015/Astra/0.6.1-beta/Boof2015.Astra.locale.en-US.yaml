ReleaseNotes: |-
  Welcome to Astra 0.6.1-beta
  Lyrics
  - Initial XLRC support via @boof2015/xlrc 0.2.0 (#131)
  - XLRC sidecar scanning, manual import, and renderer support
  - Word timing, furigana, translations, voice labels, and translation-priority controls for XLRC
  - Fullscreen lyrics overhaul with additional layout polish
  - Manual lyrics editor with LRC, XLRC, and plain-text modes
  - Drag-and-drop lyrics import plus sync offset controls
  - Clickable synced lyrics for seeking, with popout and transport lyrics updates (#138)
  - Fixed lyrics info sidebar scrolling (#138)
  - Added a workaround for LRCLIB instability
  Metadata & Library
  - Metadata editor rebuilt as a side panel
  - Virtual DB metadata overrides and optional direct file tag writing
  - Bulk metadata editing for title, artist, album, album artist, genre, year, track/disc numbers, and artwork
  - Undo/redo support for virtual metadata edits
  - Clear overrides action and default save-mode preference
  - Artist page grid view added, with later design and sizing refinements
  - Improved Jump to Playing with smart source, queue, album, artist, and library track targets
  - Fixed smart source jump behavior
  Playlists
  - Fixed VLC-style M3U import failures (#127)
  - Added playlist export to M3U/M3U8 (#118)
  - Improved imported playlist path resolution and missing-entry preservation
  - Shuffle added to playlist pages (#121)
  - Remove tracks directly from playlist views (#128)
  - Fixed create-playlist-from-track modal closing when clicking inside it (#137)
  - Multi-select quality-of-life fixes
  - Right-click context menus no longer clear multiselections
  UI & Navigation
  - Fixed UI scaling regressions in sidebar and home surfaces (#122, #123)
  - Fixed transport bar regression (#126)
  - Fixed horizontal scrolling on Home and Library rails
  - Fixed artist grid sizing while searching
  - Updated playlist action buttons and related layout polish
  - Additional fullscreen lyrics visual adjustments
  Visualization
  - Scopes and visualizers now respect UI scaling settings (#155)
  - Added shared canvas sizing logic for correct DPR/backing-store behavior
  - Canvas sizing tests added for visualizer scaling regressions
  Discord RPC
  - Discord Rich Presence activity structure refactored
  - Compact status can prioritize title or artist
  - Profile info line can show file info or album
  - Title and artist links can target YouTube Music, Last.fm, or be disabled
  - Optional small Astra badge for cover-art presence
  - Configurable “clear when paused” timing
  - Added Discord activity tests
  Scrobbling
  - Fixed custom Last.fm2 API profiles being accidentally blocked
  - Expanded scrobbler profile protocol handling coverage
  Stability & Tests
  - Added/expanded tests for XLRC parsing, lyrics presentation, metadata editor state, playlist import/export path handling, artist grid layout, horizontal scrolling, canvas sizing, and Discord RPC activity building
  XLRCDB support will be coming in a future update
  Join the Discord server!
  What's Changed (auto generated by github)
  - Support for XLRC by @Boof2015 in #131
