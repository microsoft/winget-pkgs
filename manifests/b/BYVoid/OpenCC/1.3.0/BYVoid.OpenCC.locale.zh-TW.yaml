ReleaseNotes: |-
  2026年4月17日

  - 實驗性 Jieba 分詞插件：新增可載入式 Jieba 分詞插件（libopencc_jieba），並支援獨立打包發佈；插件 ABI 採用碼
    點長度；winget 可攜包一併包含插件（#1091, #1092, #1093, #1099, #1103, #1105, #1111）。
  - 詞典與詞條更新：新增臺灣 IT 用語及「巨集」術語、距離量詞繁體對應、「奥巴馬↔歐巴馬」、「公元→西元」、「福建面」
    等詞條；修正「乾/干/余/系/面」等字轉換、「移動資料→行動資料」錯誤、「倒霉→倒黴」錯誤、「文本→文字」過度轉換、
    「控制台」不應轉換、「背包→揹包」錯誤及「念佛→唸佛」錯誤；修正「星露谷物語」在 s2twp 模式下的錯誤分詞
    （#1075, #1079, #1080, #1088, #1089, #1090, #1094, #1096, #1097, #1100, #1106, #1110, #1117,
    #1122, #1123）。
  - 安全與穩定性修復：修復 UTF8Util 堆越界讀取（#794, #799）、二進制字典值邊界檢查、const_cast 未定義行為；轉換
    失敗時返回非零退出碼（#1072, #1073, #1083, #1098）。
  - Windows 支援改善：配置文件改用寬字符路徑檢查；Jieba 插件在 Windows 使用 Unicode 安全文件讀取；修復 Windows
    Bazel 構建與測試；改進 WinGet 可攜包內容與執行時布局（#1050, #1051, #1056, #1060, #1082, #1084, #1086,
    #1087, #1102, #1104）。
  - 構建與依賴更新：MARISA 升級至 0.3.1、更新 Bazel BCR 依賴、抑制第三方頭文件編譯警告、修復 PyPI 構建版本與環境
    變量問題、新增 Debian 包發佈工作流（#1065, #1068, #1078, #1081, #1107, #1113, #1116, #1118）。
  - 平台與 CI 調整：移除 EOL Python 3.9 支援；更新 Python/Node.js 測試與發佈矩陣；修復 GitHub Actions 權限與
    安全問題；補充 README、AGENTS/CLAUDE 文檔與相關資源（#1033, #1040, #1045, #1047, #1070, #1074, #1076,
    #1108, #1109, #1114, #1120）。
  - 其他維護性更新：改進配置查找、交互式命令行提示、安裝路徑可攜性與版本號維護；同步版權年份與若干文檔資源更新（#971,
    #1061, #1063, #1064, #1066, #1069）。
