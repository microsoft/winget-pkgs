ReleaseNotes: |-
  2026年5月9日

  - 辭典與詞條更新：新增古典音樂人物專有名詞譯名轉換近百名；修正「里、制、岩、净、炼、铲斗」、「拉链 / 拉鏈」、「以太网 / 乙太網路」等轉換問題；補充「汉坦病毒 / 漢他病毒」、「二𫫇英 /
    戴奧辛」等新詞彙；修正所有「査 (U+67FB)」詞條為「查 (U+67E5)」；修正「乾安县」等錯誤轉換；並移除或調整「通过 / 透過」、「范式 / 正規化」、「程序 / 程式」、「缺省 /
    預設」等若干會造成語義偏移的過度轉換。合計 .txt 詞典：共新增 294 行，刪除 72 行（#1140, #1155, #1157, #1162, #1168, #1171, #1173, #1177, #1181, #1184, #1185, #1189, #1191）。
  - s2twp 分詞修復：修復因分詞邊界導致 s2twp 未能正確轉換的 33 個詞組，例如「云计算 / 雲端計算」等（#1193）。
  - 轉換算法更新：重寫核心轉換算法，典型長文本基準測試中轉換速度提升 3-10 倍（#1130, #1156, #1180）。
  - npm package 全新升級：Node.js 原生模組改用 N-API 重寫，提升跨 Node.js 版本兼容性；新增可選 Jieba 分詞支持，提供簡易 opencc
    CLI，並更新預編譯包打包方式（#1142, #1145, #1149, #1151, #1153, #1195）。
  - 構建與發佈基礎設施更新：新增 golden test 覆蓋轉換結果回歸；加固 Python PyPI release 流程；更新 Node.js、Bazel 與跨平台
    prebuild/release 流程（#1043, #1128, #1158, #1159, #1166, #1169, #1190）。
  - 文檔更新：新增「OpenCC 設計思想」等說明文件，明確「避免過度轉換」等詞典維護原則（#1152）。
  - 下游協作：與 opencc-js 建立數據同步協作機制，提升 OpenCC 不同實作間的一致性。

  ## 首次參與的貢獻者

  歡迎以下貢獻者首次參與 OpenCC：

  - @XXXXRT666 made their first contribution in #1043
  - @black-desk made their first contribution in #1146
  - @TianSalt made their first contribution in #1157
