ShortDescription: A native Windows terminal built for AI coding agents
Description: "agwinterm is a fast, custom-drawn Win32 + Direct2D terminal that treats AI coding agents as first-class citizens: workspaces with per-session agent status (idle, active, blocked, completed), a scriptable control API (agwintermctl or JSON over a named pipe), splits, quick and scratch terminals, and multi-window support. It is a real Windows terminal (ConPTY, Default Terminal Application integration, Sixel and Kitty graphics, kitty keyboard protocol, ligatures), fully screen-reader accessible (UI Automation text document, announced output, keyboard-navigable UI), and themeable with about 580 bundled color schemes. A Windows homage to umputun's agterm."
