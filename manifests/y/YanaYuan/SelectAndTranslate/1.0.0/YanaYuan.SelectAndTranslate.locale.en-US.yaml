ShortDescription: AI-powered system-wide translation tool with vocabulary building and wallpaper learning.
Description: |-
  SelectAndTranslate is a free Windows desktop application that translates text system-wide using GPT-4o AI.
  Select any text in any application to get instant translation. Features include:
  - System-wide text selection translation (Alt+Q to toggle)
  - OCR translation for images, screenshots, and video subtitles (Alt+W)
  - AI-powered vocabulary extraction with IPA pronunciation and etymology
  - Desktop wallpaper learning with hourly vocabulary rotation
  - Anki CSV export for spaced repetition learning
  - Supports any language pair including dialects and minority languages
  - All data stored locally, privacy-first
  - Completely free with no ads, no account required
