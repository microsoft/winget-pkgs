ShortDescription: Minimal, calm antivirus with real-time safety score and built-in system tools.

Description: |
  Sera Antivirus 3.0 introduces a refined and minimal approach to system security.

  Built around clarity and performance, Sera replaces traditional noisy antivirus
  experiences with a calm, distraction-free interface and a real-time safety score
  that reflects your system's condition instantly.

  Beyond protection, Sera includes integrated system tools such as storage cleanup,
  device optimization, data monitoring, and battery management — all designed to
  work seamlessly without overwhelming the user.

  Sera is developed with a focus on trust, transparency, and usability, avoiding
  fear-based alerts while still maintaining strong protection capabilities.

