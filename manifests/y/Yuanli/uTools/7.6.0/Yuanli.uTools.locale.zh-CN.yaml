ReleaseNotes: |-
  【uTools 全新定位】人类与 AI Agent 共用的工具平台 👉 前往官网
  【升级】
  支持将插件应用能力以标准化工具（tools）形式暴露给 AI Agent（如 OpenClaw、Claude Code 等），使 Agent 在执行过程中能够自主决策并调用工具完成任务。
  通过以下方式接入：
  - 在 plugins.json 中配置 tools 👉 查看 tools 配置
  - 调用 API：utools.registerTool(name, handler) 👉 查看 registerTool API
  【插件应用新模式】AI Agent 专用插件应用，插件应用不包含 UI，仅通过 tools 向 AI Agent 提供可调用能力
  【新增】支持插件应用后台自动更新（会员专享）
  【API 优化】utools.runFFmpeg 支持第二参数传入 options = { onLog, onProgress }
  【修复】修复 Windows 10 个别设备崩溃问题
