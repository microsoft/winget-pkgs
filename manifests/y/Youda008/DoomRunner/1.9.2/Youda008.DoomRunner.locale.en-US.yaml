ReleaseNotes: |-
  This version brings long-awaited support for UZDoom along with a couple of quality-of-life features,
  and introduces a new type of Linux release - an AppImage (discussion here)
  New features:
  - added auto-detection and basic support for UZDoom, nugget-doom and cherry-doom
  - added an option to sort map files by name, type, size and date
  - added an option to wrap long lines in the WAD Description Viewer
  - added an ability to read the map names from pk3 files
  - added an ability to open WAD description file within a selected zip file
  - added support for Wolf3D data file types
  Changes in behaviour:
  - using command line parameter -merge instead of -file for loading files in ChocolateDoom and its forks
  - the state of the preset search bar is now restored on next start
  - engines are now internally indexed by a unique ID, so that their name and path can be changed without breaking existing presets
  Bug fixes:
  - fixed incorrectly highlighted engine directories when trying to edit a newly added engine
  - fixed invalid alternative paths in the "Data directories" tab when using the preset name and the preset is cloned
  - fixed the layout of the "Data directories" tab on Linux
