ShortDescription: A lightweight process supervisor for Windows desktop apps. Auto-restarts your apps when they crash.
Description: Resurrector is a lightweight tool for Windows that launches, monitors, and auto-restarts the applications you tell it to keep alive. It is designed to ensure that critical applications remain running within the Interactive Session (the desktop session where you are logged in), effortlessly resurrecting (restarting) them if they crash or terminate unexpectedly.
