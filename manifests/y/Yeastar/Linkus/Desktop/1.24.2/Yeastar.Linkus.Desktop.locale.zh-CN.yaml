ReleaseNotes: |-
  1. 新增界面语言 加泰罗尼亚语 (Catalan)。
  2. 支持通话质量监测。
     - 通话过程中，你可以从通话界面查看实时的通话质量数据。
     - 如果系统管理员已为你授予相应的客户端权限，你可以在 Linkus 上为自己的分机启用 监测通话质量 功能 (路径：设置→功能→监测通话质量)。
       启用后，Linkus 会在通话期间自动收集通话质量数据，并在通话结束后生成通话质量监测报告。你可以在对应的通话记录中查看报告。
  3. 优化 话务控制台：支持在 呼入和内部通话 与 外部通话 面板中，通过主叫或被叫号码搜索和筛选特定通话。
     注： 可输入单个或多个号码搜索通话。使用半角逗号 , 分隔多个号码 (如 1001,1002,1003)。
  4. 优化 通话记录 功能：当你停留在 通话记录 页面且有新的通话记录生成时，页面会显示横幅提示有新记录。点击 刷新 即可更新通话记录列表。
     注：仅在 Linkus 连接 P 系列硬件版/云 PBX 时支持此功能。
  5. 优化 拨号盘 功能：支持通过在拨号盘上长按数字 0 输入符号 +。
  6. 优化 TAPI 集成：支持多达 50 个用户同时使用 TAPI 集成。
