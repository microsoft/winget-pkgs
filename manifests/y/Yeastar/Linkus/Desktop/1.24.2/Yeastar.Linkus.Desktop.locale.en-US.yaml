ReleaseNotes: |-
  1. Added support for Catalan interface language.
  2. Added support for call quality monitoring.
     - During an active call, you can view the real-time call quality data from the call screen.
     - If the system administrator has granted you the relevant client permission, you can enable the Monitor Call Quality feature for your extension on Linkus (Path: Preferences→Features→Monitor Call Quality).
       When enabled, Linkus automatically collects the call quality data during a call and generates a call quality monitoring report after the call ends. You can view the report from the corresponding call log.
  3. Optimized the Operator Panel: Added support for searching and filtering specific calls by caller or callee number(s) in the Inbound & Internal Calls and Outbound Calls panels.
     Note: You can enter one or multiple numbers to search the desired calls. Use commas to separate multiple numbers (e.g., 1001,1002,1003).
  4. Optimized Call Log feature: When new call logs are generated while you staying on the Call Logs page, a banner appears prompting you the new record. You can click Refresh to update the call log list.
     Note: This feature is available when Linkus is connected to P-Series Appliance Edition/Cloud Edition.
  5. Optimized Dialpad feature: Added support for entering the character + by long pressing 0 on the dialpad.
  6. Optimized TAPI integration: Supports up to 50 users to use the TAPI integration at the same time.
