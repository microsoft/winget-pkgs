ReleaseNotes: |-
  1. 兼容以下系统层面的配置。
     - 支持在 Linkus 客户端与 P 系列云 PBX 连接时，使用分机号码登录 Linkus 客户端，取决于系统管理员配置的允许登录方式。
     - 当你收到从其他分机转接的来电时，Linkus 客户端将根据系统管理员配置的来电显示策略在通话窗口中显示原分机的名称和号码。
     - 当你在 SMS 渠道或 WhatsApp 渠道上创建会话，但渠道中已存在相同发送方和接收方的活跃会话时，Linkus 客户端将根据系统管理员配置的消息渠道设置弹出提示。如果你继续操作，你将从原会话处理人处接管带有完整聊天记录的会话。
  2. 优化 语音留言 功能：
     - 支持将语音留言转发到指定的分机。
     - 当你拨打特征码播放从其他分机转发来的语音留言时，Linkus 客户端会播放包括语音留言转发方的分机号码的提示音。
  3. 优化用户的界面使用体验：支持在输入框中通过鼠标右键复制、粘贴、剪切或全选内容。
  4. 优化 通话备注 功能：如果你在编辑通话备注时点击 发邮件，Linkus 客户端将自动保存当前最新的备注内容，并将其添加至邮件中一并发送。
