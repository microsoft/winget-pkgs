ReleaseNotes: |-
  发布日期：2026 年 5 月 25 日
  注： 要使用此功能，系统管理员需将 PBX 升级至 37.23.0.83 或更高版本。
  - 优化 内部聊天 功能：支持永久删除单个会话中的所有聊天记录。
    当你在某个会话上点击 清空聊天记录 时，可在弹窗中勾选 删除所有聊天记录，从而将聊天记录从 Linkus 客户端和服务器中永久删除。

  - 优化外部聊天功能：对于 WhatsApp 会话，若未匹配到有对应号码的联系人，将使用收件人的 WhatsApp 用户名称作为会话名称。
    注： 会话名称仅在对方回复消息后更新。
