ReleaseNotes: |-
  1. 兼容以下系统层面的配置。
     - 如果系统管理员已将 Linkus 桌面客户端同时注册数 设置为大于 1 的值，你可以同时登录多个 Linkus 桌面端。
     - 如果系统管理员在 PBX 服务器上为速拨码设置了备注，当使用特征码拨打速拨码时，备注将显示在通话窗口的电话号码下方。
  2. 支持管理你的分机所登录的所有 Linkus UC 客户端。
  3. 优化 Yeastar CTI 功能：你可以在 Linkus 桌面端上通过 CTI 控制 Linkus 手机端。
     在此模式下，Linkus 桌面端将作为可视化控制面板。你可以通过 Linkus 桌面端执行拨号、录音、挂断等通话操作，而语音流则通过绑定的 Linkus 手机端来传输。
  4. 优化 热键 功能：新增支持将功能键（F1～F12）单独或作为组合键的一部分设置为热键。
  5. 移除通过 MSI 包安装的 Linkus 桌面端的新版本检测功能。
     - 客户端启动时将不再显示新功能通知弹窗。
     - 关于 窗口中的 检查更新 按钮已移除。
