ShortDescription: 将您的计算机变为功能丰富的电话，并通过它拨打电话。
Description: Linkus 桌面客户端是一款兼容 Yeastar P 系列电话系统，适用于 Windows 和 Mac 用户的多功能且易于使用的软电话应用程序，可提供便捷的虚拟桌面电话体验和先进的通信功能。
