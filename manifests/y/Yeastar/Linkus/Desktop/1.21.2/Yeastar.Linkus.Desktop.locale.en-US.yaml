ReleaseNotes: |-
  1. Added compatibility with the following system-level configurations.
     - If system administrator has set Linkus Desktop Client Concurrent Registrations to a value greater than 1 for your extension, you can log in to multiple Linkus Desktop Clients simultaneously.
     - If the system administrator has configured remark for a speed dial number on the PBX server, when you dial the speed dial number using feature code, the remark will display below the phone number on the call window.
  2. Added support for managing all Linkus UC Clients logged into your extension.
  3. Optimized Yeastar CTI feature: You can use Linkus Desktop Client to control Linkus Mobile Client via CTI.
     In this way, the Linkus Desktop Client acts as a visual control panel on which you can perform the call operations such as dialing, recording, and hanging up, while the audio stream is transmitted through the connected Linkus Mobile Client.
  4. Optimized Hotkeys feature: Added support for setting function keys (F1 ~ F12) as hotkeys, either individually or as a part of a key combination.
  5. Removed the new version detection feature for Linkus Desktop Client installed via MSI packages.
     - The prompt window for new feature notifications will not appear upon launch.
     - The Check for updates button is removed from the About window.
