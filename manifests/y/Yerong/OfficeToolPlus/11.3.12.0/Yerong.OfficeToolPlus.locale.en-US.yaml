ReleaseNotes: |-
  Change log
  - Update Downloader to v5.2.0, fixed the issue of potential file corruption.
  - Fixed an issue that Office Tool Plus.Console failed to verify signature.
  - Fixed an issue where message notifications could cause keyboard focus to shift erratically.
  Homepage
  - The rendering quality of the icons has been improved.
  Deploy
  - To ensure system security, we will now enforce verification of the digital signature of Office installers.
  - Added support for the TenantId property.
  - Fixed an issue where Property elements in XML could not be read correctly.
  - Fixed an issue where system disk permissions were not correctly detected in some cases.
  - The Office Bitness identifier has been corrected to unify Office Bitness into x86 and x64, without distinguishing between ARM versions.
  Toolbox
  - When you remove Office, the registry key HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Cloud\Office will now be deleted.
  - When you remove Office, the registry key HKEY_USERS\<UserID>\Software\Microsoft\Office will now be deleted.
  Settings
  - Windows Server 2022 has been added as an optional Windows version for downloading Office.
  Packages
  We recommend that you download the package that includes the runtime for easier use.
  Office Tool Plus require .NET 10.0 Desktop Runtime to run:
  - .NET 10.0 Desktop Runtime x64
  - .NET 10.0 Desktop Runtime Arm64
