ReleaseNotes: |-
  Change log
  - Added support of AvailabilityTimestampUtc parameter.
  - Added support of OfficeTenantIds parameter.
  - Added support of IsSip parameter. But we don't know what it is, so this version of Office will always be skipped.
  - Other bugs fixed and improvements.
  Deploy
  - Added support of Tenant ID and Tenant Association Key (TAK) parameters.
  - The BestEffortCultureInstall parameter will be added when installing Office.
  - Fixed an issue where certain settings were unexpectedly disabled when deploying Microsoft 365 products.
  Toolbox
  - When you remove Office, the registry key HKEY_LOCAL_MACHINE\SOFTWARE\Wow6432Node\Policies\Microsoft\Cloud\Office will now be deleted.
