ReleaseNotes: |-
  Change log
  - The Markdown library now supports resizing images based on system DPI.
  - Added support for inserting base64-formatted images in Markdown.
  - Corrected the program's working directory to ensure compatibility with the winget environment. #1086 #1115
  - Other bug fixes and performance improvements.
  Deploy
  - Modified the logic for detecting local Office installation files.
  - When downloading files via the Downloader, the real-time download speed will be displayed instead of the average download speed.
  - When performing a clean installation of Office, we will now detect whether products have been correctly added.
  - Fixed an issue where the Office architecture would be forced to reset to 32-bit when importing a configuration file that lacks architecture information.
  - Fixed an issue where the taskbar progress bar would not reset after canceling an Office download.
  Settings
  - Added a tooltip for Windows versions to easily view the corresponding system build numbers.
  Packages
  We recommend that you download the package that includes the runtime for easier use.
  Office Tool Plus require .NET 10.0 Desktop Runtime to run:
  - .NET 10.0 Desktop Runtime x64
  - .NET 10.0 Desktop Runtime Arm64
