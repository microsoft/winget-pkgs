ReleaseNotes: |-
  Features
  - Added a Verified badge to the About page to better highlight product authenticity.
  - Added a master switch for image understanding in the visual model settings, turned off by default.
  - Added support for a separate visual model when the main model does not support image understanding.
  Bug Fixes
  - Fixed visual capability checks so they now correctly respect user override settings.
  - Improved how backup, export, and snapshot files are classified so they are correctly treated as final deliverables.
  - Fixed spacing and sizing issues around the About page branding and badge for clearer presentation.
  Improvements
  - Refined the About page branding layout, including multiple badge and logo presentation updates for a cleaner and more readable look.
