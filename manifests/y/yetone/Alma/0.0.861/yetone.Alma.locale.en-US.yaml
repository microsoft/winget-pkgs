ShortDescription: A beautiful desktop application that unifies your AI experience. Seamlessly switch between OpenAI, Anthropic, Google Gemini, and custom providers.
Description: |-
  Alma is a Local-First, Memory-First AI Agent app — zero barrier to entry, putting Agent capability in everyone's hands.
  Why Alma?
  Unified Experience
  Instead of switching between ChatGPT, Claude, and other AI interfaces, Alma lets you access all your AI providers from a single application. Switch between models with a single click.
  Privacy First
  Alma runs entirely on your desktop. Your API keys and conversation history stay on your machine - we don't operate any cloud servers that process your data.
  Powerful Features
  Beyond basic chat, Alma offers:
  - Memory First - The AI remembers important information across conversations
  - Tools - File operations, shell commands, web search, and more
  - Skills - Extend AI behavior with custom prompts and workflows
  - Workspaces - Associate chats with project directories for coding assistance
  - MCP - Extend capabilities with third-party integrations
  Beautiful Design
  A modern, clean interface with customizable themes, keyboard shortcuts, and attention to detail.
