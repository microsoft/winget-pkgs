ReleaseNotes: |-
  0.0.878
  Features
  - Auto-update now resumes interrupted downloads, making it more reliable on unstable connections.
  - The chat composer now accepts .tex files and other common text or code file types.
  - Subagents automatically retry (with a limit) if a subprocess crashes while running.
  - Added a setting to turn off diff previews when using Edit or Write tools.
  - Telegram: You can now delete threads in batches and clean up all inactive sessions with one click.
  Bug Fixes
  - Telegram: Messages in busy threads are now routed correctly instead of creating an unnecessary new thread each time.
