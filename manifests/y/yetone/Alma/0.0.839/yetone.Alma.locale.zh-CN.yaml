Description: |-
  Alma 是一款以本地为先、记忆为先的 AI Agent 应用——零门槛上手，让每个人都能轻松使用 Agent 功能。
  为什么选择 Alma？
  统一体验
  无需在 ChatGPT、Claude 和其他 AI 界面之间来回切换，Alma 让你通过一个应用程序访问所有 AI 服务提供商。只需单击一下即可切换模型。
  注重隐私
  Alma 完全在你的桌面运行。你的 API 密钥和对话历史都保留在本地设备中——我们不运营任何用于处理你数据的云服务器。
  强大功能
  除了基础聊天外，Alma 还提供：
  - 记忆优先 —— AI 能在不同对话间记住重要信息
  - 工具 —— 文件操作、shell 命令、网页搜索等
  - 技能 —— 通过自定义提示词和工作流扩展 AI 行为
  - 工作区 —— 将聊天与项目目录关联，辅助编程开发
  - MCP —— 通过第三方集成扩展能力
  精美设计
  现代简洁的界面，支持自定义主题、键盘快捷键，并注重每一个细节。
