ReleaseNotes: |-
  ADDED

  AI Rendering for storey views.

  FIXED

  Resolved an application crash that occurred when replacing luminaire types within calculated multi-room environments.
  Fixed an issue where the 'Sport Surface' chapter was missing from the print output.
  Resolved an issue that prevented the correct processing and calculation for specific complex luminaire types.
  Resolved an issue where the application's layout was not correctly saved and restored.
  Resolved an issue where customized illuminance classes were not visible in the summary window and printout.
  Resolved an issue within Enscape that prevented saving pictures to file paths containing diacritical or other special characters.
  Resolved an inconsistency in output luminous flux calculations by ensuring luminaire efficiency is consistently rounded to one decimal for reporting in both the main datasheet and the Product Selector info-panel.
  Resolved an issue that prevented images from saving correctly when using language settings that include special characters.
  Resolved an issue where image saving failed when the active language contained special characters.
  Fixed an issue that prevented GLDF files from correctly loading their associated photometry, geometry, and other resources due to an internal discrepancy in folder path handling.
  Fixed an issue causing LDC curves to be missing for GLDF products when selecting a configuration.
  Corrected an issue in the emergency configuration dialog by limiting percentage input to a single decimal place.
