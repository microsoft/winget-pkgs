ReleaseNotes: |-
  v0.6.1
  New Features
  - Kimi CLI support (#138, #153) — Clawd now supports Kimi CLI through auto-synced hooks in ~/.kimi/config.toml, shared session/state mapping, and permission-request signaling that preserves terminal fallback behavior
  - Sound controls in Settings (#148, #151) — per-theme sound effect overrides, a dedicated Sounds subtab alongside Animation Overrides, and a global sound-effect volume slider make theme polish much more configurable without editing files
  - Keep size across displays (#136) — optional size persistence now keeps the pet's pixel size stable when moving between monitors with different DPI / work-area characteristics
  - Permission bubble elicitation improvements — AskUserQuestion bubbles now support an "Other" custom input path and Enter-to-submit behavior for preset-radio flows, making the approval UI usable for more real agent prompts
  Bug Fixes
  - Windows Claude Code hook execution (#147) — Clawd now registers Claude Code hooks with shell: "powershell" on Windows, avoiding the bash/MSYS/WSL command-path failures that caused MODULE_NOT_FOUND hook errors for some users
  - Kiro CLI on Windows (#145) — Kiro hook execution and template sync now work on Windows instead of assuming Unix-like shell behavior
  - Startup position recovery — launch-time geometry recovery now checks the saved display snapshot before regularizing bounds, materializes fallback bounds earlier, and more reliably pulls an off-screen pet back into view after monitor changes or docking/undocking
  - Codex session rescue hardening — stale attach state, historical replay suppression, active-session windowing, and long-lived session detection were tightened so Codex polling is less likely to replay old work or miss slow sessions
  - Settings window reliability and polish (#130, #131, #133, #134, #135, #137, #144) — Windows taskbar icon/AppUserModelID handling is fixed, taskbar relaunch reopens Settings correctly, size-preview lag/alignment is cleaned up, and macOS shortcut labels render more reliably
  - Permission cleanup edge cases — terminal-approved permissions are cleared more precisely, cleanup matching is less aggressive, and hidden/stale permission UI is less likely to linger after the real workflow moved on
  - Calico position alignment — idle-follow, collapsing, sleeping, and waking offsets were retuned so the built-in Calico theme no longer visibly jumps during DND sleep transitions and wake-up
  - Sound override resilience — preview fallback, stale override reset, and user-picked filename display are now consistent even when an override file goes missing on disk
  Refactoring & Docs
  - Settings renderer split into focused modules — the large settings renderer was split into bootstrap/i18n/core plus tab modules, making future panel work easier to review and safer to change without cross-tab regressions
  - Docs refresh — AGENTS/runtime notes, supported-agent guidance, and Codex/WSL clarification were updated to match the current integration model
  Contributors
  Huge thanks to everyone who shipped code, reviewed behavior, or improved release quality for v0.6.1:
  - @hhhzxyhhh — Kimi CLI support groundwork (#138)
  - @Rladmsrl — per-theme sound effect overrides (#148)
  - @zeus6768 — sound effect volume slider (#151)
  - @YOIMIYA66 — Windows Settings window/taskbar polish and size bubble UI follow-ups (#130, #131, #133, #134, #144)
  - @JaeHyeon-KAIST — keep-size-across-displays and related Settings/runtime polish (#135, #136, #137)
  Known Limitations
  - Kimi permission classification is partly heuristic — explicit approval flags are honored directly, but some Kimi tool runs still rely on a short delay-then-promote heuristic to decide whether the pet should switch from working to notification
  - Codex on Windows still uses JSONL polling — Windows Codex CLI hooks remain unavailable, so Codex state updates there still carry the existing polling delay
