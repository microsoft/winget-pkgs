ReleaseNotes: |-
  v0.6.3
  New Features
  - Clawd Doctor - adds a diagnostics modal in Settings for local server health, agent integrations, permission bubble policy, theme health, and live hook connectivity checks. Doctor can copy a redacted diagnostic report, open the debug log, re-run checks, restart Clawd when the local server is unhealthy, and repair supported integration issues such as missing hooks or disabled Codex hook features.
  - Cloudling built-in theme - ships a third built-in theme with full state coverage, mini-mode assets, direct sleep/DND transitions, pointer-aware idle and mini-eye tracking, theme-specific hitboxes, reaction assets, preview GIFs, state-mapping docs, and bundled source/spec notes for future polish.
  - Japanese localization (#197) - adds Japanese UI strings across menus, Settings, Dashboard, permission bubbles, Doctor, and a new Japanese README.
  - Session HUD completion bell (#217) - completed sessions now show an unread bell in the HUD until the row is opened/focused, then the bell reappears on the next completed run.
  - iTerm2 tab-level focus (#216) - clicking a session can now switch to the matching iTerm2 tab on macOS instead of only raising the iTerm2 window.
  - Codex permission mode control (#200) - Codex can stay in native mode so AutoReview/native terminal approval remains in charge, or switch to intercept mode for Clawd Allow/Deny bubbles. DND, disabled agents, and disabled bubbles now return no-decision so Codex falls back to its native prompt.
  - Settings-native Claude hook confirmations (#180) - Claude hook disconnect/disable decisions now happen inside the Settings modal, keeping the hook management flow in one place.
  - Animation override preview improvements - Settings preview posters now render through an isolated async preview surface, and animation override data merging is split out for safer future changes.
  - Theme authoring upgrades (#207) - themes can define file-specific hitboxes, users can override wide-hitbox behavior per asset, a Clawd working-typing boss variant asset was added for future theme work, and the theme guide now documents Cloudling's built-in-only scripted SVG runtime boundary.
  Bug Fixes
  - AskUserQuestion and elicitation bubbles (#204, #206, #209, #223) - keyboard focus now lands in elicitation bubbles, ArrowUp/ArrowDown can move between preset options and the Other textarea, stale bubbles are dismissed when the user answers in the terminal, initial auto-selection was removed so Enter cannot submit an unread default choice, and Settings now shows the built-in bubble keyboard mappings.
  - Long permission tool names (#198) - long MCP tool labels now stack below the title, ellipsize cleanly, and marquee on hover instead of wrapping the bubble title into an unreadable column.
  - Codex desktop cleanup (#192) - stale Codex desktop sessions now emit SessionEnd, preventing long-lived desktop runs from accumulating idle zombie sessions until restart.
  - Codex subagent handling - official hook role extraction, fallback monitor classification, remote callback handling, and conservative default-role behavior now suppress subagent completion noise instead of incorrectly completing the main session.
  - Disabled agents during hook sync (#194) - startup integration sync, Claude hook watcher recovery, and hook ingress now respect the agent gate instead of re-syncing or accepting events for disabled agents.
  - Async Claude hook management (#219) - Claude hook installation, version probing, settings actions, and related UI pending states are now async/serialized to avoid blocking Settings or racing broadcasts.
  - Mini mode edge-pinned resizing (#213) - resizing now works while the pet is pinned in mini mode, including proportional sizes and cached work-area handling near screen edges.
  - Session HUD and bubble placement polish - fixes HUD anchoring, keeps update/permission surfaces better aligned with the pet, and avoids stale elicitation or permission UI lingering after terminal-side progress.
  - Cloudling polish - fixes scripted preview durations, DND sleep transitions, mini sleep glyph mirroring, compact card contrast, mini crabwalk layout, pointer bridge behavior, and several idle/mini eye-follow ranges.
  - CodeBuddy agent icon (#196) - CodeBuddy sessions now use the official app icon instead of the text fallback.
  Refactoring & Tests
  - Doctor internals - diagnostics are split into detector modules, IPC registration, report redaction, log helpers, connection-test activity tracking, and repair actions, with targeted Node tests for each path.
  - Codex official-hook coverage - adds tests for hook payloads, PermissionRequest behavior, remote monitor state forwarding, subagent field parsing, subagent classification, server callback handling, and ring-buffer diagnostics.
  - Theme/runtime coverage - expands tests around Cloudling assets, theme loader validation, display hints, file-specific hitboxes, renderer low-power behavior, mini mode, hit geometry, animation cycles, and async preview behavior.
  - Settings coverage - adds regression coverage for Doctor UI, Codex permission mode, Claude hook actions, shortcut labels, Japanese i18n parity, animation override previews, and controller/store side effects.
  Docs & Assets
  - Cloudling docs and previews - README variants now describe three built-in themes, include Cloudling GIF previews, update the state mapping tables, and bundle the multi-monitor demo video locally.
  - Theme guide refresh - documents built-in theme ids, file-specific hitboxes, updater anchors, mini-working fallback behavior, scripted SVG restrictions, and validation expectations.
  - Codex/WSL and architecture docs - clarify that Clawd uses Codex official hooks as the primary path with JSONL polling as fallback, explain native/intercept permission behavior, and preserve WSL/remote deployment caveats.
  - Contributor and README maintenance - contributor tables are collapsed behind localized <details> sections, new contributors are added across README variants and Settings About, and the Japanese README joins the English/Chinese/Korean set.
  - Artwork notice update - license text now explicitly covers bundled theme assets, including Cloudling.
  Contributors
  Huge thanks to everyone who shipped code, design, docs, testing, or review for v0.6.3:
  - @rullerzhou-afk - Clawd Doctor, Cloudling theme/art/runtime integration, Codex subagent handling, animation preview infrastructure, docs, tests, and release polish
  - @YOIMIYA66 - Settings-native Claude hook confirmations and async Claude hook management (#180, #219)
  - @Rladmsrl - Codex desktop stale-session cleanup (#192)
  - @tongguang2 - disabled-agent gating for startup hook sync and Claude watcher recovery (#194)
  - @Ziy1-Tan - CodeBuddy icon and AskUserQuestion keyboard/focus fixes (#196, #204, #206)
  - @tatsuyanakanogaroinc - Japanese UI localization (#197)
  - @yeonhub - long MCP tool-name permission bubble layout fix (#198)
  - @PeterShanxin - Codex native permission flow support (#200)
  - @joshua-wu - stale elicitation cleanup and iTerm2 tab-level focus switching (#209, #216)
  - @nmsn - mini mode resizing while edge-pinned (#213)
  - @sunnysonx - Session HUD unread completion bell (#217)
  Known Limitations
  - Codex hook coverage is still partial - official hooks are the primary path, but JSONL polling remains necessary for hook-disabled sessions and fallback-only events such as web search, compaction, and aborted turns.
  - Cloudling scripted SVG support is built-in only - external themes cannot depend on JavaScript inside SVG files; trustedRuntime.scriptedSvgFiles is ignored outside packaged/repo themes.
  - iTerm2 tab switching is macOS/iTerm2-specific - it depends on matching shell TTY information from the session process chain and falls back to the existing window-focus behavior when a tab cannot be resolved.
