Description: |-
  Ett Windows-program som ligger i systemfältet, upptäcker när ett
  SDXC-kort från en kamera sätts i och kopierar bilderna till rätt
  plats på datorn. Kameror känns igen via EXIF (modell + serienummer),
  varje kamera har en egen grundkatalog och ett konfigurerbart
  mappmönster (t.ex. ÅÅÅÅ/MM/ÅÅÅÅ-MM-DD), redan kopierade bilder
  hoppas över och minneskortet lämnas alltid helt orört.
