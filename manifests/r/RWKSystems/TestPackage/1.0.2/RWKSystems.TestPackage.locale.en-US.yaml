ShortDescription: A configurable Windows installation simulator for testing repackaging, virtualization, and deployment solutions.
Description: |-
  Test Package is a purpose-built Windows application that simulates real-world
  software installation behaviors. It is designed for testing repackaging tools
  (AdminStudio, PACE Suite, Advanced Installer), application virtualization
  solutions (App-V, ThinApp, Turbo.net), and deployment platforms (SCCM, Intune, PDQ).

  Every feature is independently toggleable through a single config.ini file,
  including registry writes, file associations, services, scheduled tasks,
  environment variables, shortcuts, firewall rules, and more.
