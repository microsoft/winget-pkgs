ShortDescription: A configurable Windows installation simulator for testing repackaging, virtualization, and deployment solutions.
Description: |-
  TestPackage Configurator lets you design and generate simulated Windows
  installers for testing repackaging tools, application virtualization
  solutions, and deployment platforms.

  Use the GUI to configure 15+ installer behaviors (registry, shortcuts,
  services, file associations, firewall rules, and more), then click
  Generate Installer to produce a ready-to-test setup EXE.
