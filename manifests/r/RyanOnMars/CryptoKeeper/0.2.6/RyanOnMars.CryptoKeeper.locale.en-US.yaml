ShortDescription: CLI encrypted storage manager for cryptocurrency private keys and seed phrases
Description: |-
  CryptoKeeper is a local-only, encrypted TUI vault for cryptocurrency private keys
  and seed phrases. It uses XChaCha20-Poly1305 authenticated encryption and
  Argon2id key derivation. No cloud, no network access — all data stays in
  ~/.cryptokeeper/ on your machine.
