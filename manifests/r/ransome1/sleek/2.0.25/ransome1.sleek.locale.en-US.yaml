ShortDescription: todo.txt manager for Linux, Windows and MacOS, free and open-source (FOSS)
Description: sleek is an open-source (FOSS) todo manager based on the todo.txt syntax. Stripped down to only the most necessary features, and with a clean and simple interface, sleek aims to help you focus on getting things done.
