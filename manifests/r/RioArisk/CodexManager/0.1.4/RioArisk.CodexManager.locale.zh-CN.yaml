ShortDescription: 一个用于管理多个 OpenAI Codex 账号的 Windows 桌面应用（Tauri + React）。
Description: |-
  本项目是一个本地 Codex 账号管理工具，支持多账号统一管理、快速切换当前使用账号，并可查询各账号的额度使用情况。目前仅支持官方渠道的 Codex 账号。

  功能特点
  - 🔄 一键切换账号：在多个 Codex 账号之间快速切换，自动写入 .codex/auth.json
  - 📊 用量监控：从本地 ~/.codex/sessions 解析 5 小时 / 周限额信息
  - 🎯 智能推荐：基于周限额剩余量自动推荐最充足账号
  - ⏰ 自动刷新：可设置自动刷新间隔（分钟）
  - 🧩 本地存储：账号与配置均保存到本地文件
Tags:
- codex
ReleaseNotes: |-
  ✨ 新增功能
  账号备份导入 / 导出
  - 新增本地 JSON 备份导出能力，方便迁移或留档
  - 支持从备份文件一键导入账号，减少手动重复导入成本
  - 顶部“添加账号”升级为组合菜单，可直接读取当前登录、导入备份、导出备份
  🐛 Bug 修复
  Plus 套餐误识别问题
  - 修复个人 Plus 账号在桌面端被错误显示为 Free 的问题
  - 个人空间套餐信息优先保留本地 auth/JWT 解析结果，不再被 workspace 元数据错误降级覆盖
  - 启动刷新账号元数据时，会自动纠正已保存账号的套餐显示
  Team / 工作空间名称显示
  - 团队账号卡片优先显示真实工作空间名称，而不是默认别名或邮箱前缀
  - 补充 workspace 元数据获取与存储，减少同邮箱多空间下的识别歧义
  - 启动后可刷新已保存账号的 workspace 元数据，历史账号也能逐步补齐显示信息
  ⚙️ 工程化
  CI / 自动发版
  - 新增 GitHub Actions CI，自动执行前端构建与 Rust 检查
  - 新增 tag 发版工作流，自动构建 macOS Apple Silicon、macOS Intel、Windows 产物
  - 同步修正版本号与锁文件，发版链路可直接落地
  📦 本次产物
