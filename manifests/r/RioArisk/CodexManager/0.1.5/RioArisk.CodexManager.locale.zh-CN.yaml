ShortDescription: 一个用于管理多个 OpenAI Codex 账号的 Windows 桌面应用（Tauri + React）。
Description: |-
  本项目是一个本地 Codex 账号管理工具，支持多账号统一管理、快速切换当前使用账号，并可查询各账号的额度使用情况。目前仅支持官方渠道的 Codex 账号。

  功能特点
  - 🔄 一键切换账号：在多个 Codex 账号之间快速切换，自动写入 .codex/auth.json
  - 📊 用量监控：从本地 ~/.codex/sessions 解析 5 小时 / 周限额信息
  - 🎯 智能推荐：基于周限额剩余量自动推荐最充足账号
  - ⏰ 自动刷新：可设置自动刷新间隔（分钟）
  - 🧩 本地存储：账号与配置均保存到本地文件
Tags:
- codex
ReleaseNotes: |-
  ✨ 新增功能
  账号订阅到期时间展示
  - 账号卡片新增订阅到期横条，直接读取 Token 中的订阅到期时间
  - 展示顺序统一为 5h、7d、代码审查、订阅到期，和现有限额样式保持一致
  - 自动区分已过期、24 小时内到期、7 天内到期、30 天内到期和未提供到期时间等状态
  账号列表筛选
  - 账号列表顶部新增同一行下拉筛选器，支持组合筛选
  - 套餐支持 Free、Plus、Team
  - 到期状态支持 已过期、24 小时内到期、7 天内到期、30 天内到期、未提供到期时间
  - 限额支持按周限额和 5h 限额分段筛选，便于快速定位低额度或可用账号
  ⚙️ 交互优化
  过期账号切换策略
  - 切换到已过期账号时，不再直接切换到失效 Token
  - 现在会自动同步当前 Codex 已登录账号，减少切换后无法立即使用的问题
  - 到期状态判断已统一复用于展示、筛选和切换流程，行为更一致
