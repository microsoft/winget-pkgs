ShortDescription: 一个用于管理多个 OpenAI Codex 账号的 Windows 桌面应用（Tauri + React）。
Description: |-
  本项目是一个本地 Codex 账号管理工具，支持多账号统一管理、快速切换当前使用账号，并可查询各账号的额度使用情况。目前仅支持官方渠道的 Codex 账号。

  功能特点
  - 🔄 一键切换账号：在多个 Codex 账号之间快速切换，自动写入 .codex/auth.json
  - 📊 用量监控：从本地 ~/.codex/sessions 解析 5 小时 / 周限额信息
  - 🎯 智能推荐：基于周限额剩余量自动推荐最充足账号
  - ⏰ 自动刷新：可设置自动刷新间隔（分钟）
  - 🧩 本地存储：账号与配置均保存到本地文件
Tags:
- codex
ReleaseNotes: |-
  ✨ 新增功能
  快速登录导入
  - 新增一键快速登录入口，可直接拉起 Codex 登录流程
  - 登录完成后自动检测新的 auth.json 并导入账号，减少手动复制粘贴成本
  - 设置页新增 Codex CLI 路径配置，便于自定义命令或绝对路径
  托盘后台运行
  - 新增系统托盘支持，可在关闭主窗口后继续后台运行
  - 可从托盘重新打开主界面、切换账号，并查看账号额度摘要
  - 后台会按配置周期刷新额度并同步托盘显示
  ⚙️ 交互优化
  关闭按钮行为配置
  - 支持“每次询问 / 最小化到托盘 / 直接退出”三种关闭策略
  - 首次关闭时可直接记住选择，并可在设置中随时修改
  - 托盘切换账号后会同步主界面状态，减少前后台状态不一致
  当前登录同步与稳定性修复
  - 快速登录、读取当前登录、缺失身份确认导入后会立即同步活动账号并刷新额度
  - 修复 Windows 下带引号的 Codex CLI 路径无法启动快速登录的问题
  - 补强关闭流程，避免关闭确认对话框被重复唤起
  📦 本次产物
  - Windows：Codex.Manager_0.1.6_x64-setup.exe、Codex.Manager_0.1.6_x64_en-US.msi
  - macOS：Codex.Manager_0.1.6_x64.dmg、Codex.Manager_0.1.6_aarch64.dmg
