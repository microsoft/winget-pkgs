PackageIdentifier: Ramplio.CatLight
PackageVersion: 3.10.0
PackageLocale: zh-CN
License: 专有软件
ShortDescription: 开发者操作中心
Description: |-
  使用 CatLight 随时掌控您的工作
  获取关于构建、任务和拉取请求的可操作提醒

  1. 选择要监控的项目
  CatLight 可监控您的 CI/CD 流水线、拉取请求（PR）和问题。
  有了 CatLight，您无需不断刷新服务器仪表板，也无需在大量邮件中翻找信息。

  2. 在系统托盘中查看当前状态
  CatLight 图标会显示您所监控项目的状态。
  当需要您关注时，图标颜色将发生变化。

  3. 接收变更通知
  当构建失败、有待您审查的拉取请求或出现紧急缺陷时，您将收到通知。

  4. 拥有优先排序的行动清单
  CatLight 仪表板将所有来源的行动项整合为一份统一的行动清单。您可以查看所有待处理的拉取请求、紧急问题、失败的构建或发布流水线。
  使用关注列表，持续跟踪您已启动的构建和已发出的拉取请求。

  5. 与团队协作
  让团队知道您正在调查问题，并通过评论提供状态更新。
