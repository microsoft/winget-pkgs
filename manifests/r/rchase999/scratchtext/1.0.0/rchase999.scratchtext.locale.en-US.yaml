ShortDescription: A text-based language that compiles to and decompiles from Scratch .sb3 projects.
Description: |-
  scratchtext is a command-line tool for working with Scratch projects as text.
  It compiles a readable .scratch source file into a Scratch .sb3 project, and
  decompiles any .sb3 back into .scratch source plus its images and sounds.
  You can drop your own PNG/JPG/SVG images into a folder and reference them as
  sprites and backdrops. Every block round-trips losslessly, including all
  built-in extensions (Pen, Music, Text to Speech) and custom TurboWarp
  extensions.
