ReleaseNotes: |-
  oc-claw v1.8.6
  Agents
  - opencode integration: session tracking, completion popup, and token stats from the local opencode.db
  - Windows: Codex hook integration
  Mascots
  - Multi-mascot mode: manage the main + extra mascots in one list (change pet in place, add/remove), with xiang-qi-e selectable as the main
  - Moved the mascot size slider into the pairing tab
  Fixes
  - Windows: opencode completion popup suppressed when its terminal is focused; char-safe truncation; various stability fixes
