ReleaseNotes: |-
  Fix #256: Zhipu coding base URL was missing the /coding/ path segment
  Fix #258: Config integer values like Discord intents were written as strings instead of integers
  Fix #247: Telegram formatter now escapes HTML entities before converting markdown
  Fix #259 and #238: All 30 bundled agent templates now inherit the kernel default_model instead of using hardcoded providers
  Fix #252 and #260: Kernel boots with a StubDriver when no API keys are configured so the dashboard stays accessible
  Fix #262: Autonomous hands now spawn with Continuous schedule mode and start their background loops immediately
