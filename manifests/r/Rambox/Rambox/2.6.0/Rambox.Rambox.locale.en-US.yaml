ReleaseNotes: |-
  Changelog
  New
  - Localization feature implemented 🌐.
    - Added: German, Spanish, French, Italian, Japanese, Korean, Portuguese (Brazil), Russian, Chinese (simplified)
  - Tour feature implemented 🧭.
  Improvements
  - Build and packaging process optimized, resulting in smaller installers and a cleaner internal structure.
  - Windows: improved app icon resolution on taskbar and system tray.
  - macOS: updated app icon to better match native macOS standards.
  - Extensions: update extensions feature to allow more and newer extensions (complying with Chrome Extension Manifest v3).
  - Extensions: improved popup positioning depending on apps tab bar position.
  - Extensions: better icon handling.
  - Improved tabs contrast colors for lighter themes.
  - Automatically scroll to active tab when adding/removing or selecting it in any way.
  - Now promotions show to eligible users only.
  - Improve security and fail-safe when using the "Inject JavaScript Code" app setting and other code injections.
  Fixes
  - Google Meet sharing screen randomly stops streaming.
  - Allowed instances of the same app were being incorrectly counted (only for Basic users).
  - Opening the Add drawer through a tile workspace was showing incorrect "pro" ribbon.
  - Apps tab popover was showing squared elements when tabs didn't fit inside the Tab Bar and scroll buttons were present.
  - Telegram (Option 1 only) showing blank page.
  - Fixed access Rambox Support page within Rambox.
  - Fixed DRM validations for Windows and MacOS, allowing Spotify (and other media players) to work as expected.
  - Snap package is included again in release files.
  - Ubuntu: fixed incorrect icon.
  - Ubuntu: fixed error where app couldn't be added to the dock bar.
  - Fix support link access from menu bar.
  - Some silent warnings and errors were mitigated.
  - Google Meet: Backgrounds and effects are now fixed.
  - Google Chat: unread counter working as expected.
  Chore
  - Extensions: removed some old/useless/duplicate extensions.
  - Extensions: added new extensions and update others to newer version.
