ShortDescription: AI text rewriter for Windows on a single global hotkey
Description: |-
  CapyBro is a Windows tray utility that brings AI to any text on your PC via a global hotkey.
  Select text in any application (Word, Telegram, Outlook, browser, code editor) and press
  Ctrl+Shift+E - AI rewrites it in place. Fix grammar, translate between languages, paraphrase,
  formalize tone, or run your own custom prompts.
  Two AI modes: cloud-based via OpenRouter (one API key gets you GPT, Claude, Gemini, DeepSeek
  and dozens of other models) or fully local via Ollama - your text never leaves your computer.
  The core application is open-source under the MIT license. A Pro tier (one-time payment)
  unlocks usage statistics, settings backup, history export, a model-switch hotkey, and curated
  prompt packs. Native .NET 8 WPF application - lightweight, no Electron. Available in English,
  Ukrainian, and Russian.
