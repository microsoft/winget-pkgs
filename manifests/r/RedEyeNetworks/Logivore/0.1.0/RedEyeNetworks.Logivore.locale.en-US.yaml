ShortDescription: Eats Logs. Returns Answers.
Description: |-
  Logivore is a cross-platform desktop log analyzer with an AI-powered assistant (LILA)
  that ingests structured and unstructured log files from firewalls, VPNs, servers, and
  network appliances. It correlates events across multiple sources, detects anomalies,
  and surfaces actionable findings — all locally, with no data leaving your machine.
