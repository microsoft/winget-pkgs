ReleaseNotes: |-
  💪【优化】支持对包含注释和语法错误的 JSON 进行格式化。
  💪【优化】API 请求测试头部等添加键值对复制按钮。
  💪【优化】API 请求测试中 JSON 请求体注释字段后将自动删除多余的逗号。
  💪【优化】从调试列表创建 API 测试时关闭自动 Cookie 功能。
  💪【优化】从 cURL 创建 API 测试时关闭自动 Cookie 功能。
  💪【优化】从调试列表复制的 cURL 将自动合并多个 Cookie 头部。
  💪【优化】Content-Type 缺失或者为二进制时自动推理类型。
  💪【优化】[MCP] Content 将返回 JSON 结构数据而不是提示文案。
  🐞【修复】SOCKS5 代理未正确处理同一 IP 对应多个不同域名查找优先级的 bug。
  🐞【修复】API 请求测试头部复制为 JSON 时未合并 Cookie 的 bug。
  🐞【修复】JSON 格式化浮点型数据可能丢失精度的 bug。
