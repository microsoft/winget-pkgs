ReleaseNotes: |-
  🚀【新功能】新增 API 文档相关功能。
  🚀【新功能】重做网关功能，支持网络层级 Layer4 和 Layer7 配置等新特性。
  🚀【新功能】重做 SSE 视图，支持查看原文和 Markdown 预览等新特性。
  🚀【新功能】支持管理远程设备。
  🚀【新功能】新增`调试`菜单栏。
  💪【优化】升级 OpenSSL 版本至 3.6.1。
  💪【优化】API 集合列表中 API 名称对齐显示。
  💪【优化】SSE 对话视图每条文本消息最多显示 4k 长度。
  💪【优化】SSE 列表可能由于长文本导致卡顿的问题。
  💪【优化】WebSocket 对话视图每条文本消息最多显示 4k 长度。
  💪【优化】更新 Magisk 模块模板。
  💪【优化】在环境变量切换菜单中可以直接打开指定环境。
  🐞【修复】服务端使用 X25519MLKEM768 等新算法导致抓包失败的 bug。
  🐞【修复】API 中携带非规范`Referer`请求头会导致应用闪退的 bug。
  🐞【修复】抓包详情总览中`Content-Type`显示不正确的 bug。
  🐞【修复】API 集合和文件夹设置未能正常云同步的 bug。
  🐞【修复】API 请求 Cookie 头部未自动更新的 bug。
  🐞【修复】调试列表复制 cURL 请求头顺序不正确的 bug。
  🐞【修复】重启应用后反向代理可能运行失败的 bug。
  🐞【修复】反向代理请求可能出现无响应的 bug。
