ReleaseNotes: |-
  💪【优化】限制 URL、请求参数、请求头部等输入框内容长度最大为 8k。
  💪【优化】禁止粘贴单行长度超过 64k 的文本，防止应用卡死。
  💪【优化】禁止压缩超过 64k 的 JSON，防止应用卡死。
  💪【优化】取消系统代理时自动恢复之前的配置。
  💪【优化】抓包应用信息获取更加准确。
  💪【优化】API 请求测试标签页右键菜单添加保存和另存选项。
  💪【优化】解决调试列表部分性能问题。
  💪【优化】导出分部内容使用正确的默认文件名称。
  💪【优化】[MCP] 超过 256k 的数据返回临时文件路径而不是直接返回内容。
  💪【优化】[MCP] 版本升级时自动关闭 Server 进程。
  🐞【修复】抓包详情中请求头部复制为 JSON 时未合并 Cookie 的 bug。
  🐞【修复】[MCP] 获取抓包列表 ID 不正确 bug。
  🐞【修复】调试列表按住 Ctrl 键向上选择时列表会自动滚动的 bug。
  🐞【修复】窗口顶部无法调整窗口尺寸的 bug。
