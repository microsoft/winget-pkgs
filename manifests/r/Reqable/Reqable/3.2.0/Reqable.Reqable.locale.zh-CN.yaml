ReleaseNotes: |-
  🚀【新功能】开放 Reqable 各项功能控制接口。
  🚀【新功能】提供官方 MCP 支持。
  💪【优化】重新登录账户后将从云端全量同步数据，避免出现云端与本地数据不一致的问题。
  💪【优化】规则名称长度限制由 32 调整到 64。
  💪【优化】环境变量添加`reqablePort`内置变量，表示当前代理端口。
  💪【优化】镜像规则字段添加名称。
  💪【优化】新建各项规则时不再自动开启相关功能。
  💪【优化】调试列表 URL 搜索默认匹配解码的数据无需手动启用。
  🐞【修复】WebSocket 测试无法从调试列表创建的 bug。
  🐞【修复】WebSocket 测试无法从调试列表添加到集合的 bug。
  🐞【修复】307 和 308 重定向将请求方法改为 GET 并丢弃请求体的 bug。
  🐞【修复】SOCKS 代理相关选项导致 cURL 导入失败的 bug。
  🐞【修复】WebSocket 请求生成代码会打开 HTTP 请求生成代码的 bug。
  🐞【修复】脚本编辑器控制台当显示时间戳时复制内容可能不正确的 bug。
  🐞【修复】调试历史记录双击打开不会固定标签页的 bug。
