ReleaseNotes: |-
  💪【优化】cURL 支持设置多行模式并默认采用多行模式。
  💪【优化】cURL 支持设置使用单引号还是双引号并默认采用单引号。
  💪【优化】socks5 代理支持 UDP。
  💪【优化】调试列表请求未完成时 URL 的 Scheme 不再使用代理协议名称。
  💪【优化】报告服务器 URL 添加语法高亮和自动补全功能。
  🐞【修复】某些情况下代理服务器可能无法连接的 bug。
  🐞【修复】API 测试中请求体内存泄露的 bug。
  🐞【修复】代理端口出现冲突并自动+1 后添加远程设备无法连接的 bug。
  🐞【修复】报告服务器规则无法禁用的 bug。
  🐞【修复】Android 证书安装 ADB 扫描不到设备一直显示 Loading 的 bug。
  🐞【修复】请求测试侧边历史记录复制 URL 和复制 cURL 时未解析环境变量的 bug。
