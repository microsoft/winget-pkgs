ShortDescription: Local voice dictation for Windows with global hotkey — Whisper STT + multi-provider LLM (Anthropic / OpenAI-compatible / Ollama).
Description: |-
  VOCIX (Voice Capture & Intelligent eXpression) is a local voice dictation app for Windows 11 with a global hotkey. Capture speech, transcribe it offline with faster-whisper, optionally transform it via the LLM of your choice (Business or Rage mode), and insert the result system-wide at the cursor position — in any application.
  Push-to-talk via Pause key (no standard binding in Windows / browsers / Office / IDEs — safe everywhere), three modes (Clean / Business / Rage), multi-provider LLM (Anthropic Claude, any OpenAI-compatible API, or local Ollama models — pick per mode), in-app settings dialog, system tray with colour-coded microphone icon, multilingual UI (German / English), optional offline translation to English (any Whisper-supported language → EN), RDP mode, fully portable — no Python required.
