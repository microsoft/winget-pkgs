ReleaseNotes: |-
  rc5 fixes the active session staleness bug (sessions closed 20-40 min ago no longer show
  as "active"), adds a Last Activity tooltip on session rows, fixes the tray widget header
  to "Claude Sessions" (was leftover "Claude Usage" from the rename), and tolerates malformed
  timestamps without dropping JSONL lines. See CHANGELOG.md for full details.
