ReleaseNotes: |-
  - Session Browser and the tray widget now prefer the session's slug for
    the Topic display, matching what the Claude Code CLI tab header shows
    on resume.
  - Per-session "Rename Topic" (right-click) with a manual override that
    survives Claude rewriting the live session-name file.
  - Resuming an Opus or Sonnet session keeps the 1M context window instead
    of dropping back to the 200k tier.
  - Session Browser context menu rebuilt with a unified dark theme.
  - The release build is now self-contained: the .NET 10 Desktop Runtime
    ships inside the installer, so it installs and launches on a machine
    with no runtime present.
