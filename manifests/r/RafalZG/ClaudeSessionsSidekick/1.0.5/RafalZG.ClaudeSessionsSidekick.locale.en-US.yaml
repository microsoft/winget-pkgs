ShortDescription: Tray sidekick for Claude Code — usage tracking, session browser, quick launchers, prompt library.
Description: |-
  Claude Sessions Sidekick is a Windows tray utility that complements Anthropic's Claude Code CLI.
  It provides a persistent at-a-glance view of usage limits (5-hour rolling block and weekly
  Sonnet/Opus utilization), a searchable browser for past Claude Code sessions across projects
  with per-session notes and color tags, project quick launchers with global hotkeys, a reusable
  prompt library, and an MCP server browser.

  The app reads only local Claude Code data and uses the user's own OAuth token for the official
  Claude Code usage API — no telemetry, no third-party servers.
