ReleaseNotes: |-
  - Project names in the Session Browser and the tray widget are now
    derived from each session's real working directory instead of the
    lossy encoded folder key, so two distinct folders no longer collapse
    to the same name and their sessions stay distinguishable.
  - A Claude Code /rename is now kept: it is no longer overwritten by the
    auto-generated session name, so the browser matches the CLI tab.
  - Agents & Skills: the Plugins & Skills source list now includes
    user-level skills (~/.claude/skills) alongside marketplace plugins
    and per-project skills.
