ReleaseNotes: |-
  Initial Release v1.0.0
  Welcome to the first release of SysMood — your chill, quirky, and lightweight CLI system monitoring tool built in C++!
  What’s inside v1.0.0?
  - Real-time CPU usage monitoring 🧠
  - Memory stats with clear, friendly output 🧮
  - Casual system messages to keep things fun 😎
  - Windows support (Linux version coming soon!)
  - Easy build instructions included
  How to use?
  Compile from source using:
  Powershell
  g++ main.cpp -o sysmood.exe
  ./sysmood.exe
  Or download the attached installer and install it !
  What’s next? ( Coming Soon )
  - Adding Linux support
  - Disk usage and process monitoring
  - Uptime and battery stats
  - Logging mode for historical insights
  Enjoy the vibes and keep your system’s mood in check with SysMood!
  Made with ❤️ and care by Samman Das.
