ShortDescription: Use Firefox's Remote Debugging Protocol via a CLI
Description: |-
  CLI for Firefox Remote Debugging Protocol — inspect, test, and automate Firefox from the
    terminal. Supports navigation, DOM queries, screenshots, accessibility audits, performance
    analysis, network monitoring, and more. Designed for both human users and AI agents.
