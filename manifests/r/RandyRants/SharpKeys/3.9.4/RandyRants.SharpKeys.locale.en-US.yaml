ShortDescription: SharpKeys is a Registry hack that is used to make certain keys on a keyboard act like other keys.
Description: |-
  SharpKeys is a utility that manages a Registry key that allows Windows to remap one key to any other key.
  Included in the application is a list of common keyboard keys and a Type Key feature to automatically recognize most keyboard keys.
