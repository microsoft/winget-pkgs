ShortDescription: Store reusable code snippets and stacks locally and in remote repositories.
Description: |-
  Boiler is a CLI tool to store and reuse code snippets and project templates locally and in remote .
  Features include automatic versioning, template variables, and zero configuration.
  Stop installing entire packages for one function. Stop copy-pasting code between projects.
