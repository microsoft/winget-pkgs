  7. 一键处理增加彩色贴图
  8. 优化 M 键菜单切换（短按 M 键进入/设置切换）
  9. 增加了激光线扫描模式下的深度相机自动曝光功能
  10. 新增大转台控制适配
  11. 新增了快捷键设置与说明
