ReleaseNotes: |-
  1. 新增模板测量功能，适用于批量测量单一模型的场景，支持用户自行创建模板
  2. 新增圆锥特征
  3. 新增从 CAD 批量创建特征的方式
  4. 新增 X,Y, Z 轴方向的距离测量
  5. 新增支持指定位置的点偏差测量
  6. 新增从参考网格模型创建特征的方式
  7. 新增模型单位设置，支持毫米、厘米、米、英寸、英尺
  8. 新增模型数据的小数点位数设置
  9. 新增套索选择器
  10. 修复了一些已知 bug
  11. 优化了部分功能的用户体验
