ReleaseNotes: |-
  Changelog:
  - Added support for the SNES prototype of Rayman 1
  - Added support for the bsnes emulator
  - Rayman 30th Anniversary Edition improvements:
    - Added support for modifying the assets using the Archive Explorer. Resource files (for sprites, sounds and text) can be exported as .zip files, but not currently imported. However sprites and sounds can both be replaced through mods.
    - Added a mod loader module which allows for replacing music in the MS-DOS versions
    - Added a mod loader module which allows for replacing sprites and sounds from resource files
    - Added GameBanana mod support
    - Added progression support
    - Added setup game actions, recommending mods to fix various issues
  - Added options to replace the icon and banner images for games
  - Added an option to freely change the app accent color
  - Added support for linebreaks when using the UBIART-LOC mod module
  - Added progression support for GBC games when using the SameBoy emulator
  - Removed the custom game icons for demos and prototypes, making them now use the same icons as the retail versions
  - Updated the order which games available on multiple platforms are shown to follow platform release order, while prioritizing PC platforms first
  - Changed the setup game actions for removing the Ubi Key requirement for Rayman (GBC) and Tonic Trouble (GBC) to be listed as recommended rather than optional actions
  - Improved the image scaling for mod thumbnails in the mod loader
  - Removing an emulator will no longer default the games which used it to now use the first available game client, avoiding issues where games such as Rayman Forever would get set to launch through Ubisoft Connect after removing DOSBox
  - Fixed a bug where temp files would not always get deleted when viewing a read-only file in the Archive Explorer
  - Bug fixes
ReleaseNotesUrl: https://github.com/RayCarrot/RaymanControlPanel/releases/tag/14.5.0
