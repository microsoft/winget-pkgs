ReleaseNotes: |-
  Changes since last beta:
  - Added a Ray1Map link for Rayman 30th Anniversary Edition
  Changelog:
  - Added support for Rayman 30th Anniversary Edition
  - Added support for Atari Jaguar games:
    - Rayman
    - Rayman Prototype
    - Rayman Demo
  - Added support for GameCube games:
    - Rayman Arena
    - Rayman 3
  - Added support for the fan-game Rayman Mystery of Polokus
  - Added support for the BigPEmu and Dolphin emulators
  - Added progression for Rayman 2 (GBC)
  - Added Discord Rich Presence support
  - Supported games now show when they're running and can be closed directly from the game's page
  - Archive Explorer changes:
    - You can now export/import UbiArt textures as their sub-types (for example for PS3 textures you can export/import as GTF)
    - Exporting a UbiArt texture from one of the console version where the sub-type is not DDS now preserves the original compression and mipmaps when exported as a DDS file (does not work for color remapped textures)
    - The image thumbnails now use mipmaps when available to avoid loading the full sized image
    - Improved the DXT decompression for textures where the sub-type is not DDS (such as PS3 and Xbox 360 textures)
    - Exporting as a PNG file now no longer includes the metadata, making it easier to compare files
    - Added more Just Dance game modes when opening an IPK archive
    - Indexed textures from the Tonic Trouble 1998 demo can now be correctly exported
  - Mod loader changes:
    - Added support for changing the localized audio when using the UBIART-LOC mod module
    - Added GameBanana mod support for Tonic Trouble (GBC)
  Other changes:
  - Added a serializer for Rayman 1 (Atari Jaguar) and Rayman 2 (GBC) save files
  - Removed the option to download demos and minigames directly through the Rayman Control Panel. The Rayman Minigames and Rayman 3 Print Studio no longer have the option to switch edition, meaning the different editions now have to be added as separate games instead. If you previously downloaded any of these games then they will automatically be split into separate games and still work.
  - The Per-level Soundtrack tool is now a downloadable mod, allowing it to be updated directly through GameBanana
  - Added a setting for joypad rumble to Rayman M/Arena
  - Added a recommended setup game action to Rayman 1 for installing the Rayman FMVs mod
  - Added an optional setup game action to Rayman 1 (GBC) and Tonic Trouble (GBC) for installing the Remove Ubi Key Requirement mod
  - Added a toggle when adding a new game for if the demos and prototypes should be shown
  - The message for the results of finding game ROMs now has a maximum length to avoid it being too long
  - Added links to the game pages on PCGamingWiki and updated the icons for external game links
  - Added an April Fools' easter egg
  - Rayman 2 now launches through the Twofold dll mod loader if available
  - Updated the app updater and created a custom dialog for new available updates
  - Web files are now only hosted either on GitHub or GameBanana, removing other external dependencies
  - Removed the option to manually handle file downloads
  - Renamed "Haruka Tavares" to "Haruka_VII" in the credits
  - Fixed showing archived GameBanana files for downloadable mods due to a change in the GameBanana API
  - Fixed a bug where Rabbids Go Home wouldn't launch from the right path
  - Fixed a bug where applying patches to the BF file in the Rayman Raving Rabbids Prototype Restoration tool wouldn't work
  - Bug fixes
