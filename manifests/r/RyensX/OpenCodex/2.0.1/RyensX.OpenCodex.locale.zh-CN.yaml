ShortDescription: 一个 Codex Desktop 中间层，可以让你使用手机、平板或另一台电脑通过浏览器里访问并操作目标机器上的 Codex，适合在局域网或远程局域网环境中持续 AI Coding。
Description: |-
  OpenCodex 是一个 Codex Desktop 中间层，它可以让你使用手机、平板或另一台电脑通过浏览器里访问并操作目标机器上的 Codex，适合在局域网或远程局域网环境中持续 AI Coding。

  特性
  - 通过浏览器访问目标机器上的 Codex，无需魔法网络和账号，支持手机、平板、电脑等多种设备。
  - 原汁原味 Codex 使用体验。
  - 支持本机访问、局域网访问和配合 Tailscale / ZeroTier / VPN 的远程局域网访问。
  - 支持设置访问密码，避免无认证暴露。
  - 提供桌面启动器，可可视化配置监听地址、端口和访问密码等。
  - 启动时会自动更新到本地 Codex Desktop 版本，自动兼容新版本功能。
  - 针对移动端提供优化。
