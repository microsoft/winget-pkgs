ReleaseNotes: |-
  Remio Host 1.9.1 — a smoother, steadier Windows host.

  - Improved pairing experience for quicker, more reliable first connections.
  - More stable sign-in and account handling.
  - Fresher, more accurate device thumbnails on your client devices.
  - Plus the usual under-the-hood polish for a calmer, more dependable stream.
