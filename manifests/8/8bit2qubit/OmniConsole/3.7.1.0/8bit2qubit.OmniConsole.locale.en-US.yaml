ReleaseNotes: |-
  v3.7.1.0: Nekomata Catches the Mouse, Then Waits Up for You
  > 🌐 Official Website — documentation, features overview, and installation guide.
  > 🐱 Teach Nekomata your language — she's all ears, so teach her a new language, or help her say it more naturally.
  > See the live translation status for the latest.
  As I'm writing this, Typhoon Bavi is sweeping over Taiwan and it's blowing hard outside my window. I'm praying Taiwan stays safe through the storm, and wherever you are, I hope you're keeping well too. Starting with this release, I'd love to sit down and tell you the little stories behind the work, beyond just a list of bullet points, so you can feel a little of the quiet fretting I did over all the tiny things tucked behind each feature. Like, why hadn't I let you customize the keyboard-and-mouse mapping for desktop Steam, browsers, the Epic Games Store, File Explorer, and Discord a little sooner? Well, you see, each of them has its own funny little temper. If I'd thrown the doors wide open before patiently getting to know them one by one and tucking away a workaround for every quirk, it'd only have left you frustrated, and I really didn't want that for you. So this release smooths over a few little rough edges, and then, halfway through the bug hunt, the mouse was ever so gently spirited away by Nekomata.
  So this time, sweet Nekomata came along to help. Mouse Mode's been gathered up into her arms, and with one soft little twirl she turned it into a simple switch: just On, or Off, all neat and tidy. Now whether it's desktop Steam, a browser, the Epic Games Store, File Explorer, or any dear app you're fond of, you can tune a keyboard-and-mouse feel that fits your gamepad just so. The OmniCharm widget has slipped into a new .NET 10 outfit too, moving off the soon-to-be-retired toolchain onto modern .NET 10 native AOT, and getting about more nimbly for it. And one more thing~ launching Steam now drops you straight into a clean Big Picture screen, with no desktop-Steam window or ad flashing by on the way, just tidy and calm from the start.
  A little postscript for v3.7.1.0: if you tend to press the power button, wander off to pour a drink, and come back to sign in, some machines quietly warm apps up behind the sign-in screen, which on those PCs kept nudging OmniConsole into starting Steam early behind the lock screen. That's smoothed over now: OmniConsole waits until you've signed in and unlocked before it launches anything.

  🔧 Improvements (v3.7.1.0)
  - Sign in first, launch after: OmniConsole now waits until you sign in and unlock Windows before launching your platform. Previously, when Windows preloaded apps during startup, your default platform such as Steam Big Picture could quietly start behind the sign-in screen — running in the background before you'd even signed in, where a gamepad could nudge it by accident, and by the time you did sign in OmniConsole itself might already have timed out waiting. Now it holds still and springs into action the moment you unlock. This applies to every platform, and waking from sleep at the sign-in screen is covered too.

  ✨ New Features (v3.7.0.0)
  - Nekomata Boost per app: each gamepad mapping profile can now raise the mapping service priority. Turn on Performance for a demanding game or app to reduce cursor stutter even when it pushes your CPU hard; it returns to Standard automatically when not in use.
  - Hold to repeat, per button: any input mapped to a keyboard key now has a Repeat toggle. Turn it on for a key and holding the button fires it over and over — handy for paging and scrolling in navigation apps — while leaving it off keeps a clean single press for games.
  - Customize any app, including the built-in ones: apps that already have built-in gamepad mapping (browsers, File Explorer, Discord, and more) can now be customized too. Open the editor from the OmniCharm widget and your profile takes over from the built-in mapping.

  🔧 Improvements (v3.7.0.0)
  - Pinpoint cursor control in Nekomata Mode: the stick-driven cursor now eases in with a precision curve — a light push moves the cursor slowly and steadily, so small targets such as a browser tab's close button are easy to land on, while a full push still sweeps across the screen.
  - Steadier cursor top speed: the maximum cursor speed has been retuned so that a full push feels controlled instead of overshooting. If you previously lowered the cursor speed in Settings to compensate, you may want to nudge it back up.
  - Simpler Nekomata Mode switch: Nekomata Mode is now a straightforward On / Off toggle. Your customized profiles and the built-in apps are always covered when it's on — no more choosing between modes.
  - One profile for every version of an app: gamepad mapping profiles for apps that ship in a versioned folder — such as Discord and GitHub Desktop — now stay bound across updates. Set it up once and your mapping keeps working after the app updates itself, instead of quietly falling off when the version changes.
    > ⚠️ If you customized one of these apps (such as GitHub Desktop) in an earlier version, its existing profile is still tied to the old version and will not apply. Open the app, then from the OmniCharm widget tap Customize gamepad mapping for this app… and press Save & return to bind it once for all future versions.
  - Polished Steam Big Picture launch, sign-in included: launching Steam brings up Big Picture in full screen right from the start — even the sign-in screen uses the full-screen Big Picture layout.
  - Home button restarts a pending launch: pressing the Game Bar home button while a platform launch is still waiting now restarts the launch flow immediately, instead of leaving you to wait out the timeout or force-close OmniConsole from Task View. When the platform is confirmed to be starting up (such as Steam applying an update before launch), OmniConsole keeps waiting for it rather than interrupting.
  - Smoother editor entry from the widget: opening the editor from the OmniCharm widget now lands the focus on the editor's header instead of the navigation menu button, so you can start adjusting right away.
  - OmniCharm widget upgraded to .NET 10: the OmniCharm Game Bar widget now runs on .NET 10, moving off the retired toolchain onto the modern foundation for a leaner, more responsive widget.
  - Security hardening: OmniConsole now verifies certain components before using them, an added check against tampering or hijacking to reduce the risk of malicious code running on your system.
  - A face for Nekomata: the Nekomata navigation menu, the Nekomata Mode entry on the Advanced page, and the Nekomata page title now wear a hand-drawn cat icon, so Nekomata is easy to spot at a glance.
  - Tidier About page: the loading spinner beside the environment snapshot no longer reserves a placeholder slot when idle — it appears only while a refresh is running, then tucks away when done.

