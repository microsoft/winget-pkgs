  v3.7.1.0：貓又捕鼠記・等門篇
  > 🌐 前往官方網站：完整文件、功能介紹與安裝指南。
  > 🐱 教貓又說你的語言：貓又正洗耳恭聽！教她一種新語言，或幫她說得更自然。
  > 最新進度請見即時翻譯狀態。
  寫這篇的時候，颱風巴威正過境台灣，窗外風雨很大——天佑台灣，也願你一切平安。從這一版起，我想試著在條列之外，也把開發路上的小故事說給你聽，讓那些藏在功能背後、我偷偷煩惱好久的地方，你或許也能感受到一點點。像是，為什麼一直沒把桌面版 Steam、瀏覽器、Epic Games Store、檔案總管、Discord 都開放讓你自訂鍵鼠呢？其實是因為它們各有各的小脾氣，要是我沒先耐著性子把它們一個個摸熟、幫你備好繞路的辦法就急著打開，用起來肯定會讓你很困擾的。所以這一版一邊把小地方打磨得更順手，然後呢，抓蟲抓到一半，滑鼠就被貓又輕輕叼走了。
  於是啊，這回換貓又來幫忙了。手把滑鼠模式被她收進懷裡，一轉身，就變成了簡簡單單的一個小開關（開，或關，就這麼清爽）；現在無論是桌面版 Steam、瀏覽器、Epic Games Store、檔案總管，還是任何你喜歡的應用程式，都能為你的手把調出最順手的鍵鼠手感。OmniCharm 小工具也悄悄換上了 .NET 10 的新裝束，從即將淘汰的舊架構搬到現代的 .NET 10 原生 AOT，跑起來更靈巧俐落。還有喔，往後啟動 Steam 會直接落進乾淨的大圖畫面，不再閃過桌面版視窗和廣告過場，清清爽爽的就好~
  v3.7.1.0 小補記：如果你習慣按下電源、晃去倒杯飲料、回來才登入，那有些電腦會在登入畫面後面偷偷把應用程式預熱起來，害 OmniConsole 在這些機器上被推了一把，早早就隔著鎖定畫面把 Steam 吹醒了。這一版把它撫平了，OmniConsole 會等你登入、解鎖之後才啟動平台。

  🔧 改進 (v3.7.1.0)
  - 先登入，再啟動：OmniConsole 現在會等你登入並解鎖 Windows 後才啟動平台。過去 Windows 開機預載應用程式時，你設定的預設平台（如 Steam 大圖）可能在登入畫面後面就悄悄啟動——你都還沒登入，平台已在背景執行，還可能被手把誤操作；等你真正登入時，OmniConsole 這頭又可能已經等到逾時。現在它會安靜待命，在你解鎖的那一刻立即接手啟動。所有平台一體適用，停在登入畫面進入睡眠再喚醒的情況也涵蓋在內。

  ✨ 新功能 (v3.7.0.0)
  - 為每個程式設定貓又衝刺：每份手把映射設定檔現在都能提高映射服務的優先順序。為吃資源的遊戲或程式開啟「效能優先」，即使它把 CPU 壓得很滿，也能減少游標卡頓；不用時就自動回到「標準」。
