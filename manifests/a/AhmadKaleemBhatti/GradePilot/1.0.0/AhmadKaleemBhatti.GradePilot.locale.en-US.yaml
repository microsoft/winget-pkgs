ShortDescription: Chrome extension installer for GradePilot
Description: GradePilot is a Chrome extension for Air University students. It calculates Semester GPA (SGPA) and Cumulative GPA (CGPA), applies university retake rules, simulates retakes, and helps students plan future semesters. All calculations are performed locally in the browser, and no academic data is transmitted.
