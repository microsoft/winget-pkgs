ReleaseNotes: |-
  Changelog
  More features in the Go implementation of kubectx/kubens! (It's been 2.5 years since the last release.)
  - New: kubectx --shell/-s <CONTEXT> spins up an isolated shell where only that context exists!
  - New: kubens -f <NAMESPACE> skips checking if namespace exists and switches into it.
  - Fix: kubectx and kubens binaries (go implementation) now respect $XDG_CACHE_HOME.
  - Fix: kubectx: skip launching fzf interactive selector when no contexts exist in the kubeconfig
