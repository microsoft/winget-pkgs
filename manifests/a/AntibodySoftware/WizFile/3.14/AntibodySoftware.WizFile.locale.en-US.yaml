ReleaseNotes: |-
  - Seer / QuickLook integration added
    Seer (https://1218.io/) and QuickLook (https://apps.microsoft.com/detail/9nv4bs3l1h4s) both provide a quick and easy way to preview files by simply pressing the space bar when a file is selected in Windows File Explorer. If you have either Seer or QuickLook active (running in the background), press space to quickly view the contents of the currently selected file within WizFile. Press space again to close the view. Note that you will have to click on the file first before pressing space otherwise the space will be typed into the search box.
  - New "Select Folder" function - select it from the drop down menu or press F3 to select a folder
  - Pressing WizFile HotKey (Ctrl+Win+W) will now hide WizFile if it's already the active window. This allows the hotkey to toggle WizFile on and off
  - Pressing TAB from the filter search will now auto focus the results list - use the arrow or pgup/pgdn keys to navigate the list after pressing TAB to navigate results
  - Filtering/searching by time now supported

    Example 1: To find files modified at exactly 1pm (any day):
    =13:00:00
    or use am/pm like this:
    =1:00pm

    Example 2: To find files modified at 3am or earlier (any day):
    <=3am

    Use the "NOW" filter variable for the current date/time.

    Example 3: To find files modified in the last 5 minutes, use filter:
    >NOW-5
    (find all files with modified date greater than time now minus 5 minutes)
    Use a 's', 'm' (default) or 'h' suffix to indicate seconds, minutes or hours.

    Example 4: To find files modified in the last 1 hour:
    >NOW-1h

    Example 5: Find files modified more than one hour ago, but less than 4 hours ago:
    <NOW-1h >NOW-4h

    Similar results can be achieved by subtracting seconds, minutes or hours from the "TODAY" filter variable:
    >TODAY-5m
    This will show all files modified in the last 5 minutes. Use an 'h', 'm' or 's' suffix to indicate hours, minutes or seconds

  - Fixed issues with selected items getting out of sync when files were created or deleted causing the displayed results to change
  - Improved scanning speed when in non admin mode and when scanning non NTFS drives/network drives/folders - up to 2x speed increase in certain cases
  - OneDrive folder was not being scanned correctly when using non admin mode or when scanning a folder containing the OneDrive folder - fixed
  - Folder/Network scanning on Windows XP will now return correct allocated size values
  - fixed possible security issue with illegal file names (e.g. containing a trailing space) that could cause the wrong file to be opened by WizFile when double clicked
  - Thai, Indonesian, Hebrew and some other characters typed into file search would not be displayed correctly - fixed
  - Fixed another possible issue with "start with windows" not working
  - WizFile would incorrectly display "internal corruption detected" error if running from a path containing non ansi characters (e.g. Chinese or Japanese) - fixed
  - WizFile CLI arguments are no longer quto quoted - this would previously break certain filters from working correctly
  - Deleting files is now fully asynchronous - previously WizFile would wait for the deletions to complete before continuing
  - Donate button will no longer wiggle
