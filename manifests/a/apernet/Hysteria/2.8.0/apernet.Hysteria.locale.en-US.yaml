ShortDescription: A powerful, lightning fast and censorship resistant proxy.
Description: |-
  Hysteria is a powerful, lightning fast and censorship resistant proxy.
  🛠️ Jack of all trades
  Wide range of modes including SOCKS5, HTTP Proxy, TCP/UDP Forwarding, Linux TProxy, TUN - with more features being added constantly.
  ⚡ Blazing fast
  Powered by a customized QUIC protocol, Hysteria is designed to deliver unparalleled performance over unreliable and lossy networks.
  ✊ Censorship resistant
  The protocol masquerades as standard HTTP/3 traffic, making it very difficult for censors to detect and block without widespread collateral damage.
  💻 Cross-platform
  We have builds for every major platform and architecture. Deploy anywhere & use everywhere. Not to mention the long list of 3rd party apps.
  🔗 Easy integration
  With built-in support for custom authentication, traffic statistics & access control, Hysteria is easy to integrate into your infrastructure.
  🤗 Chill and supportive
  We have well-documented specifications and code for developers to contribute and/or build their own apps. And a helpful community, too.
Tags:
- network
- proxy
- vpn
ReleaseNotes: |-
  - Added configurable congestion control: select between BBR and Reno, with three BBR profiles (standard, conservative, aggressive) for fine-tuning congestion control behavior
  - Added server-side UDP port range listening (Linux only): the server can now listen on a port range and automatically set up nftables/iptables redirect rules
  - Added random port hopping interval: use minHopInterval/maxHopInterval for a randomized hopping pattern instead of a fixed interval
  - Added xForwarded option to masquerade proxy for setting X-Forwarded-For/Host/Proto headers
  - Minor BBR fixes and improvements
  - Minor port hopping fixes and improvements
  - 新增可配置拥塞控制：可在 BBR 和 Reno 之间选择，并提供标准、保守、激进三种 BBR 预设 (standard, conservative, aggressive) 用于精细调节拥塞控制行为
  - 新增服务端 UDP 端口范围监听（仅 Linux）：服务器现在可以监听端口范围并自动设置 nftables/iptables 重定向规则
  - 新增随机端口跳跃间隔：使用 minHopInterval/maxHopInterval 实现随机化跳跃模式，替代固定间隔
  - 伪装代理新增 xForwarded 选项，用于设置 X-Forwarded-For/Host/Proto 头
  - BBR 小幅修复和改进
  - 端口跳跃小幅修复和改进
