ShortDescription: 强大、快速、抗审查的代理工具。
Description: |-
  Hysteria 是一个强大、快速、抗审查的代理工具。
  🛠️ 功能齐全
  SOCKS5、HTTP 代理、TCP/UDP 转发、Linux TProxy、TUN，更多模式不断添加中。
  ⚡ 快如闪电
  基于魔改的 QUIC 协议，Hysteria 即使在最不稳定和容易丢包的网络环境中也能提供无与伦比的性能。
  ✊ 抗封锁能力
  协议旨在伪装成标准的 HTTP/3 流量，无论中间人还是主动探测，都很难分辨和封锁。
  💻 跨平台
  我们为所有主要的平台和架构提供构建。随处部署，随处使用。还有许多兼容的第三方应用。
  🔗 易于集成
  内置对自定义验证、流量统计和访问控制的支持，Hysteria 很容易集成到已有的后端中。
  🤗 开放友好
  我们有详尽的文档、规范和代码，供开发者参考、贡献和构建自己的应用。以及一个友好的社区。
Tags:
- vpn
- 代理
- 网络
ReleaseNotes: |-
  - 为 Hysteria Realms 新增 UPnP/NAT-PMP 支持以加强 NAT 穿透能力
  - 为 Hysteria Realms 新增 ipMode 选项，可将连接限制为仅使用 IPv4 或 IPv6
  - quic-go 更新至 v0.60.0
  - 修复了解析 hysteria2:// 分享链接时密码中的 + 被错误转换为空格的问题
  - 修复了 HTTP 代理拒绝有效 Basic 验证凭据的问题
  - 修复了 HTTPS 代理出站将 host:port 而非主机名用作 TLS SNI 的问题
  - 修复了客户端 HTTP/SOCKS5 监听多路复用器中的线程安全问题
  - 修复了服务端绑定指定 IPv6 地址时 nftables 重定向失效的问题
  - DNS 解析器增加 CNAME 链长度限制，防止无限递归
