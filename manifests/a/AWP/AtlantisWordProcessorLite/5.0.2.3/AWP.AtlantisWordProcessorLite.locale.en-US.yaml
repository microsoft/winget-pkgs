Description: |-
  Atlantis Word Processor Lite is a free version of Atlantis Word Processor.
  It has plenty of great features that will help you create various types of documents: reports, novels, articles, letters, and more.

  Or just use it as a handy WordPad replacement.
  Atlantis Word Processor Lite is very fast, compact, and has a very small memory footprint.
  But above all, it is completely free. You can install it on your computer and use it free of charge!

  The user interface of Atlantis Word Processor Lite is available in multiple languages.
