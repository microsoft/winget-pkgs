ReleaseNotes: |-
  AtomCode v4.24.2 Release Notes
  发布日期：2026-06-04
  v4.24.2 聚焦于撤销（/undo）能力、缓存稳定性、同步（LiveSession）健壮性、WebUI 交互体验打磨，以及多项跨平台兼容性修复。

  ✨ 新增功能（Features）
  /undo 撤销命令
  - 核心实现：支持撤销到任意历史轮次，保留上下文完整性
  - 命令支持：/undo 命令，自动处理并发安全与边界情况
  - 事件支持：撤销成功/失败均有明确的事件反馈，headless CLI 同步适配
  - i18n：完整中英文文案与命令描述
  LiveSession 增强
  - 模型双向同步：WebUI ↔ TUI 实时同步当前模型，同步模式下拉框自动跟随
  - 审批通道稳固：审批通道整回合保持注册，修复同回合第二个工具被秒拒
  - 会话门控：同步模式按会话门控实时事件，避免实时输出串进当前打开的其它会话
  Session 恢复
  - 轮次统计还原：恢复对话时还原轮次分隔线与每轮 token 使用量 / 工具调用统计
  图形交互
  - 图片粘贴识别：TUI 输入时识别手敲 / Windows 粘贴的图片路径为图片附件
  - 构建工具升级：WebUI 升级 Vite 5 → 8（Rolldown），适配 HarmonyOS 构建
  遥测
  - 启动上报：进程内 webui 启动以 webui 模式上报 OpenAtomcode
  - Mode 区分：WebUI chat 上报 mode 区分为 webui
  Referral
  - 结算规则：更新为双周结算，优化 period 组件样式与文案
  - 品牌用语：品牌用语更新，周标签国际化

  🛠 修复（Fixes）
  WebUI
  - /webui 用 TUI 当前会话播种 LiveSession，续聊后直接落到该会话
  - 进程内 webui 默认端口错开到 13457，修复 VSCode 守护进程 / 首页 401 / 无响应
  - 清除对端 / 回合结束后残留的审批卡片，修复任务已完成 webui 仍卡住
  - 实时同步模式下会话门控，修复从侧栏打开其它历史会话时实时输出串页
  - 同步模式模型下拉实时跟随 TUI 切换
  缓存稳定性（前缀缓存）
  - 缓存稳定性优化：优化对话上下文管理策略，显著提升连续对话的响应速度与缓存效率
  Agent / 工具
  - 限流重试：采纳网关给出的冷却时长，避免过早重试反而延长冷却
  - Windows 路径转义：仅对单反斜杠路径生效，修复多行 content 换行被破坏
  - Windows 敏感路径保护：系统敏感路径写入拦截
  文件搜索
  - Glob：显式指向 .atomcode / .claude 等 skip 目录时能搜到文件
  - Grep：修复 Windows 路径分隔符导致的噪声目录跳过失效
  Headless CLI
  - 处理 ConversationTruncated 和 UndoFailed 事件
  Referral
  - 优化安装完成记录的持久化机制，防止数据丢失
