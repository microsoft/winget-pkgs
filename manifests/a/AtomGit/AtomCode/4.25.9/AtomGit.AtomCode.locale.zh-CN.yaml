ReleaseNotes: |-
  AtomCode v4.25.9 Release Notes
  发布日期：2026-07-04
  本版本聚焦于终端体验增强与稳定性改进：新增终端标签栏状态圆点，让您无需切换窗口即可一眼判断 Agent 状态；AI 会话自动命名功能上线，告别晦涩的 session-ts 占位符；同时修复了 Windows 平台的多项兼容性问题与 ACP 连接稳定性问题。

  ⚠️ Behavior Changes（注意行为变化）
  - 终端标签栏标题默认显示状态圆点：现在终端标签栏/窗口标题会默认显示 🟢（空闲）/ 🟡（忙碌）/ 🔴（待确认）状态圆点。如果您的终端渲染 emoji 为豆腐块，可通过 ui.terminal_status_glyph = false 关闭。
  - AI 会话自动命名默认开启：首次对话完成后，AI 会自动为会话生成一个可读的名称（如“修复登录报错”），替代原有的 session-时间戳 占位符。可通过 ui.ai_session_naming = false 关闭，或通过环境变量 ATOMCODE_AI_SESSION_NAMING=0 禁用。
  - Ctrl+O 提示时机调整：实时输出提示（"Press Ctrl+o to show real-time output"）现在在工具调用开始时显示，而非结束后，让您能在命令运行期间就开启实时输出。
  ✨ 新增功能（Features）
  终端渲染
  - 终端标签栏状态圆点：在终端标签栏/窗口标题前缀一个按状态变化的彩色圆点（🟢 空闲 / 🟡 忙碌 / 🔴 待确认），让您无需切换到 AtomCode 窗口即可感知任务状态。可通过 ui.terminal_status_glyph 配置开关（默认开启）。
  - 会话名显示在终端标题：终端标签栏标题现在会显示当前会话的名称（而非遗留的旧版本号），新窗口默认显示 atomcode v4.25.9。
  Agent / 工具
  - AI 会话自动命名：首次对话完成后，AI 会根据对话内容自动为会话生成一个简短、有意义的名称（最多 6 个词，40 字符），显示在 /resume 选择器和终端标题中。支持中英文，自动去除引号/标签/控制字符。可通过 ui.ai_session_naming 配置开关（默认开启）。
  - > nul 自动重写为 /dev/null：在 Windows Git Bash 环境下，模型常用的 > nul 输出丢弃写法会创建一个无法删除的 nul 文件。现在工具会自动将 > nul 重写为 >/dev/null，避免产生垃圾文件。bash 工具描述也已更新，引导模型使用正确的语法。
  WebUI
  - AI 会话重命名广播：AI 自动生成的会话名称会通过实时流广播到所有 WebUI 标签页，每个标签页仅当自己正在查看的会话被改名时才更新标题，避免串台。
  🛠 修复（Fixes）
  ACP 连接稳定性
  - 修复 catch-all 拦截审批响应导致会话崩溃：修复了 ACP 协议中 catch-all 消息处理器错误地拦截了 session/request_permission 的响应消息，导致每次审批（即使是“允许”）都返回“未处理消息”错误，进而断开整个 ACP 连接并清空客户端线程的严重问题。现在响应消息会正确路由到等待的审批处理器。
  - 审批失败不再断开连接：handle_approval 的往返失败（如用户取消/ESC/发送意外消息）现在会优雅地拒绝该工具调用并继续当前轮次，而不是传播错误导致整个 ACP 连接断开。
  终端渲染 / Windows 兼容
  - 修复 /cd 路径泄露 \\?\ 前缀：修复了 Windows 上 /cd 命令后工作目录、状态栏、WebUI 页脚显示 \\?\C:\... 原始路径的问题。现在所有路径都会统一去除 Windows 的 verbatim 前缀。
  - 修复 /cd 选择器重复显示相同目录：修复了 recent_dirs.txt 中同时存在 \\?\C:\... 和 C:\... 两种形式时，目录选择器会显示两个相同目录的问题。现在加载时会自动去重。
  - 修复浏览器打开失败（打开文件夹而非浏览器）：修复了 Windows 上 OAuth 登录时 explorer.exe <url> 在某些情况下（如冷启动浏览器）会打开一个文件资源管理器文件夹窗口而非浏览器的问题。现在使用 ShellExecuteW 直接调用默认浏览器，更可靠。
  - 修复 Git Bash 下 > nul 创建无法删除的文件：见新增功能说明。
  - 修复实时流 eprintln 污染 TUI：修复了 WebUI 实时同步路径中残留的 eprintln 调试输出写入终端，导致 TUI 界面被污染的问题。所有诊断输出已改用文件日志。
  会话管理
  - 修复 /compact 在思考模型上可能挂起：修复了使用思考模型（如 GLM-5.2）时，/compact 命令的摘要 LLM 调用可能因模型长时间隐藏推理而挂起 20 分钟以上的问题。现在设置了 120 秒的硬超时，超时后自动降级为温和的就地压缩策略，并提示用户超时原因。
  - 修复紧急溢出恢复在思考模型上冻结：修复了上下文溢出时的紧急恢复（Tier-2 摘要）同样可能被思考模型挂起的问题，现在也应用了 120 秒超时保护。
  其他修复
  - 修复 AI 会话重命名实际不生效：修复了 AI 会话重命名的守卫逻辑错误地拒绝了所有 AI 生成的名称（因为会话已被首次消息截断命名），导致该功能完全静默失效的问题。现在 AI 名称会正确覆盖首次截断的占位符名称。
  - 修复 /rename 在 WebUI 下作用域错误：修复了 WebUI 中 /rename 命令的 AI 重命名广播缺少 session_id，导致所有标签页的标题都被错误更新的问题。
  🔧 重构（Refactoring）
  - 终端标题逻辑提取为纯函数：将终端标题的生成逻辑（状态圆点映射、名称截断、控制字符清洗）提取到独立的 title.rs 模块，便于单元测试和维护。
  - AI 会话命名逻辑提取为核心模块：将 AI 会话命名的纯逻辑（提示词构建、输出清洗、守卫判断）提取到 atomcode-core 的 session_title.rs 模块，便于跨组件复用和测试。
  📚 文档（Docs）
  - 修复了 README 中捐赠二维码的图片路径（多余空格）和错误 alt 文本。
  - 新增了终端状态圆点的设计与实现文档。
