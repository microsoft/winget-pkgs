ReleaseNotes: |-
  AtomCode v4.23.3 Release Notes
  发布日期：2026-05-28

  ✨ 新增功能（Features）
  - npm：自动版本检测 —— 构建脚本支持从远端 Cargo.toml 自动识别版本号，发版无需再手改 package.json。
  - homebrew：发布打包脚本 —— 新增 package-tar-gz.sh，一键产出 Homebrew Tap 所需的归档。

  🛠 修复（Fixes）
  1. 终端渲染 / Windows 兼容
  - tuix：render_diff 包裹 DECSET 2026 + 隐藏光标，消除输入框闪烁。
  - tuix：CJK 区域下启用 width_cjk，修复 Windows + pwsh7 conhost 的字符重影。
  - tuix：将 width_cjk 自动探测范围收窄到「Windows + CJK ACP」，并彻底去掉 GetACP 自动投票，改为纯 opt-in。
  - tuix：用哨兵值回填失效的 prev_cells，避免宽度不一致时残留孤儿字符。
  - tuix：Pondering 等动画 tick 不再直写终端，改走 render_diff 的 BSU 包络。
  - tuix：1M token 窗口显示为 1m，不再是易引发误解的 1000k。
  - md：strip_md_for_width 与 render_inline 使用同一解析器，杜绝两处展开不一致。
  - md：表格分隔行按单元格数渲染，不再按字符数错位。
  - tool/bash：在 Windows 上以 OEM 代码页作为 fallback 解码子进程输出，修复中文乱码。
  2. 合并/login 与/codingplan，去除掉/codingplan
  - codingplan：月度配额耗尽时收敛为单行「本月用量已耗尽，等 Nd 后再使用」。
  - codingplan：/status 的时长单位与 /login 对齐，共用 format_duration_secs。
  - codingplan：legacy 路径下 window_quota_exhausted 时不再显示令人困惑的「0% 用量」一行。
  - codingplan：移除「领取」措辞，并隐藏各 tier 的失败行。
  - commands：/codingplan 已合并进 /login，统一入口。
  3. 工具与运行时
  - tool/read：自动剥离尾部 {…} 占位符，并扩大 “Did you mean” 模糊匹配范围。
  - tuix：斜杠命令进入输入历史，↑ 可重新调出。
  - web_search：drop 时 kill curl 子进程，并叠加 20s tokio 超时兜底。
  - turn：validate_args 拒绝工具调用时不再出现重复的 “Re-issue” 包装。
  - ctx：上下文压缩引入 token 感知的 keep-floor，限制 reasoning 密集回合的体积。
  - cli：uninstall 子命令启动时跳过自动更新，避免卸载流程被打断。

  📦 升级方式
  npm
  npm i -g @atomgit.com/atomcode@4.23.3
  Homebrew
  brew upgrade atomcode
  已安装版本可直接启动触发自动更新
  atomcode
