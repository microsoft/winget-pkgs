ReleaseNotes: |-
  AtomCode v5.0.1 Release Notes
  发布日期：2026-07-24
  v5.0.1 是一个里程碑版本，正式上线交互式多轮提问（request_user_input） 能力，Agent 可在关键决策点以选择/文本形式主动询问用户；子代理（Subagent） 新增作用域门控与并发配置；MCP 项目信任管理支持在项目层级信任/屏蔽 MCP 服务器；TUI 新增 /view 内联文件查看、/cost 命令、宽表渲染、欢迎吉祥物；WebUI 新增 Accept Edits 模式与 SSE 实时同步；引入 AtomGit 标签中间件自动标记 git push；插件钩子信任 通过内容哈希保护 CC hooks 安全；网络层支持 macOS/Windows 系统代理读取；完整退役 legacy bridge crate，完成 capabilities 迁移与原生 session 收敛。

  ✨ 新增功能（Features）
  交互式提问（Interactive Questions）
  - 多轮批处理提问：Agent 可将多个问题以批处理表单同时询问用户，Tab 导航切换，逐项回答后统一提交
  - TUI 面板：编号选项 + 逐项描述 + Enter 选择 + 独立提交行，支持单/多选/自由文本三种模式
  - WebUI UserInputCard：SSE 实时推送用户输入请求，支持单/多选/自由文本/批处理
  - Persona 桥接：Agent 在需要用户决策时自动引导至 request_user_input，脑暴式开放问题也纳入
  - Custom 标记：每个问题可配置是否显示自由文本行（custom flag），默认启用
  - Bypass 模式：ATOMCODE_REQUEST_USER_INPUT=0 可关闭此功能，自动跳过提问
  - Persona 批量引导：nudge 模型将同类用户问题合并为一次批处理提问
  子代理（Subagent）增强
  - WorkerScopeGate 作用域门控：子代理写入操作被限制在指定作用域内，防止越权修改
  - 作用域验证：每个子代理任务必须显式声明作用域，缺失即拒绝（fail closed）
  - 并发/超时配置：[subagent] max_concurrent/timeout 配置生效，控制子代理并行度与执行时限
  - 委派纪律：主 Agent 委派子任务时遵循纪律性 prompt，避免过度拆分
  - 默认开启：ATOMCODE_SUBAGENT task tool 默认启用
  MCP 项目信任管理
  - 项目级信任存储：MCP 服务器可按项目信任/屏蔽，未信任项目的 MCP 服务器永不连接/启动
  - /mcp trust|untrust 命令：TUI 和 CLI 均支持信任/取消信任操作，并显示被屏蔽的服务器
  - WebUI 信任按钮：项目 MCP 服务器旁增加信任按钮 + 被屏蔽提示
  - JSONC 注释支持：.mcp.json 支持 JSONC 格式（可加注释或临时禁用某服务器）
  - Live 重载：/live/mcp/trust 实时刷新信任状态，下一轮生效
  TUI 增强
  - /view 内联文件查看：模糊搜索文件 + 固定高度内联面板（类似 /diff 风格），Ctrl+C 退出，最多显示 5 个文件
  - /diff 增强：文件列表最多 5 行 + "更多文件"滚动指示器，面板自适应内容高度
  - /resume 重设计：插件风格 chrome + 双行条目，键盘图例显示删除/重命名快捷键
  - /usage 中轮次运行：作为滚动文字快照运行，跳过不必要的概览网关请求
  - /cost 命令恢复：独立命令显示本地 Token 消耗（不限模型）
  - /todo add <task>：确定性地追加任务，描述最多 2 行
  - 实时 Token 计数器：Spinner 区域显示实时 Token 计数，长轮次不再"看起来卡死"
  - 宽表渲染：收窄列 + 自动折行保住网格（借鉴 Codex 降级策略），修复无前导竖线 GFM 表格渲染
  - 欢迎吉祥物：13×6 高分辨率 ASCII 吉祥物 + 溢出安全双列布局，非现代终端模拟器自动隐藏
  - Ctrl+Alt+V：Windows Terminal 备选图片粘贴快捷键
  - 输入历史位置：上下键浏览历史时显示当前位置指示
  - QR 登录回退：优先显示链接供点击，按 c 复制完整 URL
  WebUI 增强
  - Accept Edits 模式：支持接受编辑模式切换 + SSE 实时同步
  - 批处理提问 Stepper：多问题顺序步骤器 → 单次批量回答
  - 搜索框重设计：支持字符高亮 + 固定定位，修复 IME 输入拦截
  - 外部模型 429 处理：不再误报为 CodingPlan 超额，渲染去 CodingPlan 化 + 时长本地化
  - 主题滚动条：深色模式下修复白色滚动条
  - 用户消息同步：TUI 用户输入实时同步到 WebUI 显示
  VS Code 集成
  - Todo 进度面板：新增 Todo 进度跟踪面板
  - 聊天字体：尊重 chat 字体设置，输入框使用等宽字体
  - 守护进程端口恢复：被卡住的守护进程退出后自动恢复端口
  AtomGit 标签中间件
  - GitPushLabelMiddleware：git push 后自动为仓库添加 atomcode 标签
  - Compound 命令检测：识别复合/环境前缀命令中的 git push
  - 标签工具：新增 repo_labels / set_labels / ensure_label 工具操作
  - 容错锁：poison-tolerant mutex，无 panic 合约
  网络与系统代理
  - macOS 系统代理读取：通过 scutil 读取系统静态代理配置
  - Windows 注册表代理读取：解析 Windows 注册表中的系统代理
  - FollowSystem 模式：proxy.mode = "FollowSystem" 自动跟随 OS 系统代理
  - ALL_PROXY 优先：显式 ALL_PROXY 环境变量高于系统代理
  - 代理策略扩展：Token 刷新客户端同样遵循代理策略
  插件钩子信任
  - 内容哈希信任存储：每个插件的 CC hooks 按内容哈希逐项信任
  - Hooks 解析：识别 hooks/hooks.json 中声明的文件钩子并去重
  - 升级兼容：已存在的插件钩子在升级后自动保留（不破坏内联钩子）
  - 启动通知：TUI 启动时显示未信任插件钩子提示
  - cli plugin trust/untrust：CLI 支持插件信任/取消信任操作
  Vision / OCR
  - VL 识别状态：表面 VL 识别状态信息 + 失败时恢复图片
  - 连续会话保留：图片预处理结果在会话恢复后保持
  - TUI VL 识别恢复：通过运行时 ImagePreprocessor seam 恢复 TUI 图片识别
  Skills 技能系统
  - SkillFirstHook：DeepSeek 等场景下首轮优先提示使用技能
  - 技能目录注入：技能目录注入 v2 coding prompt，同时保留 budget-gate 与 source-rank 双路径
  - 反绕过框架：codex 风格 prompt 框架，匹配技能时不再走临时方案
  内核与运行时
  - effective_input_limit：预留输出预算 + 估算边际，防止超限
  - SendSyntheticMessage：新增内核命令原语
  - 文件级 tracing：文件输出 tracing subscriber，用于可观测性
  - Overflow 守卫：收紧溢出 needle 消除假阳性，覆盖更多上游超限错误
  安装
  - MSYS/MinGW/Cygwin 支持：install.sh + 站点 Windows 标签页
  🛠 修复（Fixes）
  Provider / 网络
  - 401 错误原因透出：Claude/ollama HTTP 错误显示真实鉴权原因，而非 bare "HTTP 401:"
  - Reasoning Effort 拒后自愈：Gateway 拒绝 reasoning_effort 时给出友好错误 + session 自愈
  - 工具调用不丢失：Gateway 发送 finish_reason:"" 时不再丢弃空块的工具调用
  - Provider 卸载异步：create_provider 在异步运行时执行，避免阻塞 3 个调用方
  - 非 CodingPlan 429 透出：外部模型限流提示去 CodingPlan 化，标准化错误抽取
  - 限流暂停修正：只在真实 5h 窗口耗尽时暂停，不在健康窗口误触发
  - Provider 重载保护：阻塞式重载增加保护防止死锁
  TUI / 终端渲染
  - QR 码渲染修复：Windows 终端 QR 码渲染 + 对比度，block glyph 清理，强制重置 renderer 在 QR modal 绘制时
  - Bash 运行状态：恢复 bash 运行状态上方间距，spinner 时钟括号平衡
  - Streaming 渲染增强：Streaming 菜单选择遵守、输入输出渲染加固、live spinner 安全清理
  - 会话过渡：避免阻塞会话过渡，关闭文件提及菜单后清理
  - /status 静默崩溃：修复 TUI /status 静默崩溃 + 命令输出同步到 WebUI
  - 模态框缩放：Modal 激活时清屏防滚动污染，80 列终端向导面板宽度限制
  - GFM 表格：修复幽灵空列（按内容行定列）、无前导竖线表格渲染、竖线列表项误判
  - JediTerm 换行：保留输入列防止折行乱码
  - Welcome mascot：非现代终端不显示吉祥物
  - Windows TERM：忽略 TERM=dumb，使箭头键菜单在 Windows 上正常工作
  - /resume 图例：澄清删除需要按两次 Ctrl+D
  - 审批持久化：Always Allow 决定在活跃 TUI 会话中持久化
  Session / 会话
  - 会话占用独立分支：会话占用时创建独立分支
  - Resume 项目作用域：Resume 操作限定到项目作用域 + 事务保证
  - Legacy 边界修复：格式错误的 legacy turn 边界修复 + 老旧名称恢复
  - Sidecar 对齐：Legacy sidecar 与原生快照对齐
  - 作用域 ID 去重：重复作用域 ID 修复 + legacy 位置修复
  - 运行时原子化：Session 过渡原子化，防止状态不一致
  - 遗留边界越界：越界改为可修复而非直接报错
  WebUI
  - @文件菜单：鼠标点目录可进入子目录，点击外部关闭不误杀内部点击
  - Session 切换消息保留：Streaming turn 在 session 切换时不丢失
  - CWD/ActiveSession 同步：外部 /cd//resume 后同步当前目录和 session
  - MCP 连接列表：排除被屏蔽的服务器不显示在 "connecting" 列表中
  - 搜索修复：修复上下文对话搜索关键词功能失效
  Coding / Agent
  - SKILLS block 空目录：技能目录为空时不再假称存在技能
  - Git 提交语言统一：统一 Git 提交消息语言
  - use_skill plugin 技能：修复 TUI 无法识别已安装 plugin 贡献的技能
  - Persona 加载顺序：修复 DeepSeek 场景下技能加载顺序
  - Persona SKILLS 引用：保持 SKILLS cross-reference 工具无关性
  Edit 编辑
  - Block anchor 收紧：至多漂移一行 + 覆盖 outdent 路径
  - Block anchor 模糊匹配：引导模型远离 shell-editing
  Bash 安全性
  - Bash 审批绕过：闭合注释转义绕过（2 个）、grant-ride-along 绕过、转义命令绕过
  - Comment-aware 分类：感知注释的 bash 命令分类 + 稳定 per-command "always" + 真实标签
  - In-workspace mv 到 /tmp：移出工作区到 /tmp 视为删除 → 触发审批
  Provider
  - SSL_CERT_FILE：信任 OS 原生 TLS 根证书 + 优雅处理 SSL_CERT_FILE（#514）
  - TLS 构建修复：修复 certs move 后使用导致的构建错误
  - 模型切换：加固 Provider 和模型切换流程
  - Auth 状态：跨客户端调和认证和 Provider 状态
  Daemon / CLI
  - OAuth 异步：OAuth 登录在 OS 线程执行，避免阻塞异步运行时
  - 启动调试打印：消除 [engine] active 调试信息
  - CLI 头等：CLI headless 模式下 request_user_input fail-close
  - Live MCP 缓存失效：/live/mcp/trust 后刷新注册表
  MCP
  - Core registry 门控：未信任项目服务器永不连接/启动
  - Capabilities 双注册：同样门控 capabilities registry
  - Windows 路径前缀：去除 verbatim 前缀以兼容 Windows
  - 集成测试修复：删除第三份 project_trust_key 拷贝
  - "/mcp reload" 挂起：修复未信任项目上 reload 挂起
  - Browser 错误上下文：open_browser spawn 失败时附带 "Failed to open browser" 上下文
  Plugin
  - macOS Xcode CLT 缺失：探测 git 可运行性，无 CLT 时降级为黄色警告而非红错
  - 钩子信任修复：TUI banner、authoritative path、去重、安装提示范围 4 项修正
  - Content-hash 碰撞：length-prefix 哈希防止字段边界碰撞
  - 自定义 hooks 路径：支持 manifest 中声明的自定义 hooks 路径
  验证
  - Verify cadence：文档/数据写入（.md report, .csv, .log）不触发 verify-cadence
  🔧 重构（Refactoring）
  - Legacy bridge crate 退役：完整删除 atomcode-bridge crate（-3494 行），所有功能迁移至 capabilities
  - Core 依赖清理：process_utils、paths、plugin、auth、mcp trust 等模块从 core 剥离至 capabilities
  - CodingPlan 叶子 crate：提取 atomcode-codingplan 独立 leaf crate（crypto 保留在 auth），CLI/TUI/Daemon 直连
  - Native 运输收敛：LiveSession 原生传输通道完全收敛，跨客户端同步使用统一协议
  - 审批 round-trip 提取：共享审批往返逻辑，去重 cc-hooks forced-ask
  - Todo 去重：/todo add|clear reseed 路径去重，修复过期帮助
  - 引擎桥退役：Legacy engine bridge 完整退役
  📚 文档（Docs）
  - 交互式提问：完整中文文档页面（interactive-questions.html，158 行）
  - 子代理：子代理功能完整文档（subagents.html，158 行）
  - MCP 信任：MCP 文档增加信任管理章节
  - 插件信任流：插件信任流程文档（中英文），修复信任流锚点
  - Configuration：文档 ATOMCODE_SUBAGENT 配置示例
  - Slash 命令：更新 /cd 命令提示信息与文档描述
  - 版本发布报告：v5.0.1 变更与测试报告
  - Crate README：新增 kernel、capabilities、coding 三个 crate 的 README
  - 架构文档：对齐架构文档与 session 收敛规划
  - Tier 系统：更新 CodingPlan 层级引用（Free → Lite），新增层级系统文档
  🧹 工程 / 构建
  - MSYS/MinGW/Cygwin 安装支持：install.sh 新增 Windows 类 Unix 环境安装能力
  - 站点 Windows 标签页：官网新增 Windows 安装标签页
