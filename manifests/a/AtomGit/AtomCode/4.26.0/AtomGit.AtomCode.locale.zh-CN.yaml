ReleaseNotes: |-
  AtomCode v4.26.0 Release Notes
  发布日期：2026-07-09
  v4.26.0 引入了自主循环引擎（/loop）、子 Agent 并行执行（TaskTool）、通用于所有客户端的审批模式（Build/Plan/Bypass），大幅增强了 WebUI 的斜杠命令、项目管理、会话内搜索等交互能力，新增对话导出（/save）和任务清单系统（/todo），并深度优化了上下文压缩策略。

  ✨ 新增功能（Features）
  /loop 自主循环引擎
  - /loop 命令：支持自定步调和固定间隔两种循环模式，由模型自主控制执行节奏
  - TUI 循环控制：UI 底部状态行显示循环状态和轮数，支持 /loop stop 停止
  - 循环上限：支持配置最大循环轮数，防止无限执行
  Agent / 工具
  - TaskTool 子 Agent 执行：支持将子任务派发给隔离上下文的子 Agent，支持 Explore（只读）和 Worker（可编辑）两种模式，默认 3 个并发，15 分钟超时保护
  - 强/弱档位路由：按模型能力自动选择 fast/capable 档位，支持 /model 切换后重新解析
  - 子 Agent 实时进度：每个子任务在 TUI 上显示当前动作和描述，支持可配置超时
  - 敏感路径保护：子 Agent 自动拒绝访问凭据、~/.ssh、.env 等敏感路径
  - 子任务崩溃展示：子 Agent 崩溃（JoinError）不再静默吞掉，而是作为错误结果展示
  /save 对话导出
  - 对话导出：/save 命令将当前对话完整导出为 Markdown 文件
  - 路径保护：展开 ~ 路径、拒绝覆盖非 Markdown 文件
  /todo 任务清单系统
  - 任务清单工具：todowrite 工具以无状态全量列表方式管理任务，每轮自动注入当前清单作为 system-reminder
  - TUI 紧凑渲染：以字形列表块（glyph list）紧凑展示，底部 footer 显示 N/M 进度指示
  - /todo 命令：重新打印当前任务清单，循环模式下也持续显示进度
  - 环境开关：通过 ATOMCODE_TODO 环境变量或 config.ui.todo 控制启用
  审批模式（跨客户端通⽤）
  - 三种模式：Build（默认，需要审批）、Plan（只读探索和规划）、Bypass（自动审批所有工具调用）
  - Plan 模式系统提示：注入只读模式提示，自动拒绝所有改动类工具调用
  - WebUI 模式选择器：WebUI 内置 Build/Plan/Bypass 切换 UI
  - VSCode 模式支持：支持 Build 模式审批和 Plan 只读模式
  - 桌面↔App 双向同步：模式变更在桌面端和 App 端实时同步
  WebUI 交互能力增强
  - 斜杠命令系统：完整的斜杠命令解析、注册、分发机制，前台命令（/plan、/build、/model、/cd 等）和后端命令（/undo、/compact、/whoami、/status 等）均支持
  - 项目管理：侧边栏项目选择器，可浏览各项目的完整会话历史，支持"打开其他目录"操作
  - 会话内消息搜索：在当前会话中按关键词搜索消息并反查定位到原文
  - 消息发送时间标记：每条消息显示发送时间，智能格式（今天→HH:MM、昨天→昨天+时间、更早→月/日/年+时间）
  - CD 更新当前目录：/cd 命令更新工作目录并反馈确认
  - 滚动跟随优化：仅当位于底部时自动跟随流式输出，并提供跳到底部按钮
  - 技能菜单：/skills 打开仅显示技能的浏览器（而非重置到首页）
  守护进程（Daemon）斜杠命令
  - POST /command 执行器：统一的无状态斜杠命令后端，支持 /undo、/compact、/context、/whoami、/status、/config、/diff、/cost、/todo、/remember、/forget、/memory
  /context 上下文统计
  - /context 命令：支持查看当前会话的详细上下文使用统计
  Provider / 模型
  - 上下文窗口档位展示：在 prompt 中显示 128K/256K/512K/1M 等上下文窗口分档
  - /provider 编辑 context_window：/provider add & edit 支持设置 context_window
  - DeepSeek 执行纪律：强化验证钩子，git diff、ls、cat 等只读命令不再被视为有效的构建验证
  终端渲染 / TUI
  - Todo 进度指示器：底部专用 footer 行显示 task + N/M 进度（循环模式下持续可见）
  - 子任务渲染：清理后的子任务渲染——描述头 + 每个子任务的模型/状态行
  - 调整大小时保持 Markdown 状态：保留流式代码块的 fence 上下文
  Apple App（移动端）
  - 登录网关：App 登录门控 + 8h 滑动过期自动关机
  - 安全认证：App 端与桌面端间的安全认证与双向鉴权
  - 会话名显示：App 端正确显示当前会话名称
  - /app 命令：启用 /app 命令，退出时自动清理 App 服务器
  VSCode 扩展
  - 审批模式：支持 Build/Plan/Bypass 三种模式，包括审批卡片的 UI 同步
  - 环境检测与守护进程客户端：增强的守护进程连接管理和环境变量检测
  其他新特性
  - grep 流式处理：按文件流式读取而非一次性全读内存，匹配数上限准确报告
  - Locale 规范化：bash 子进程自动规范化 UTF-8 locale 设置
  - 路径归一化：Windows/macOS 路径大小写不敏感处理
  - 终端输出净化：bash 工具输出送到模型前做净化处理
  - 技能目录识别：插件和技能文件的所属路径识别更准确
  - 精选插件列表截断：TUI 首次安装时精选插件列表限制为 5 条

  🛠 修复（Fixes）
  WebUI
  - 侧边栏项目作用域：按物理项目桶而非可变 working_dir 划分侧边栏，正确显示各项目的完整会话历史
  - 模式切换通知：仅在模式成功切换后显示通知
  - /undo 命令：发送 project_hash，仅在撤销数 > 0 时重载，防止会话切换时误重载
  - CD 反馈：/cd 更新 cwd + 反馈，保护 dispatch/reload 失败，重置技能菜单查询
  - 滚动跟随：仅当在底部时自动跟随发送消息，不因仅排队消息而触发滚动
  - 审批卡片闪烁：修复 Plan 模式下切换审批模式时审批卡片闪烁的问题
  - Bot 审查修复：处理代码审查的多轮 P1~P3 反馈，包括搜索稳定性、时间戳格式、死代码删除等
  /loop 循环
  - 停不掉修复（P0）：修复 /loop stop 在 turn streaming 期间停不掉的问题
  - UI 卡死修复（P0）：修复自定步调停止或 round 上限后 UI 卡死在 Streaming 状态的问题
  - 完整停止路径：/loop stop、/clear、替换命令均正确清除循环状态
  - 间隔模式轮数上限：固定间隔模式正确遵守配置的 max_rounds
  缓存与压缩
  - 模型不再烦新对话：压缩后告知模型不要提示用户"开启新对话"
  - 窗口感知：针对当前模型窗口计算利用率压力，不是硬编码值
  - 上下文保留：保留最近工作上下文而非仅活跃轮，摘要输入规模有界
  SubAgent
  - 会话 ID 复用：子 Agent 复用父会话 ID，修复 GLM 并发 fan-out 的问题
  - 子任务完成渲染：修复子任务完成时不高亮重复渲染的问题
  Daemon
  - 桶对称保存：修复 undo/compact 写入与加载时桶不一致导致的幽灵副本问题
  - 前端排走索引修复：修复 /compact 对 display/turn 锚点做前移除时索引计算错误的问题
  TUI / 终端渲染
  - Tofu 渲染修复：ASCII 降级装饰性字形（□ tofu），支持 cell 级兜底
  - 恢复上下文表尺：重启对话后重新挂起上下文表尺，/context 不再卡在 100%
  - /save 路径规范化：展开 ~ + 拒绝覆盖非 Markdown 文件
  - Todo 渲染：todowrite 在 /resume 后正确渲染为样式块，进行中的 todo 不再显示为 ! 警告
  - 任务块拆分：按行首边界而非内联 <task 拆分任务块
  - Bash 提示：显示 !bash footer 提示 + 使 !cmd 可通过上箭头回叫
  - /copy msg：恢复转写后的最后回复
  - 双 Esc 撤销冷却：修复快速连按 Esc 造成多重撤销的问题
  Provider / 网络
  - 代理默认：默认跟随系统代理设置，环境代理开箱即用
  - 图片降级：修复纯文本模型对话中图片导致异常的问题，自动将图片转为文本描述
  - 上下文窗口：溢出恢复时仅保留活跃轮，最大限度压缩以适应
  会话管理
  - macOS 路径大小写折叠：修复 macOS 上路径大小写敏感导致的会话加载问题（带一次性桶迁移）
  - Session ID 绑定：修复 daemon v1、WebUI/Live 视觉预处理和辅助 LLM 调用的 session-id 绑定
  其他
  - Telemetry 隐私：从工具调用失败遥测中脱敏 secrets
  - Edit 缩进：统一缩进为字符数而非字节数
  - Grep 天花板统计：报告匹配数（而非总行数）的上限
  - 任务 JSON 拒绝提示：子 Agent dispatch JSON 被拒绝时给出更清晰的指导
  - 隐藏合成消息：在客户端隐藏系统合成的用户消息
  - 源构建启动文字：源构建启动不再看起来像崩溃（平静的通知）
  - Windows 渲染队列：绑定渲染队列，修复 Windows 上 OOM/abort 崩溃问题

  🔧 重构（Refactoring）
  - JetBrains 旧版 WebView Chat 移除：移除已废弃的 JetBrains 内嵌 WebView 聊天栈（JBCefMessageView 接替），JetBrains 插件使用统一的新渲染方式

  📚 文档（Docs）
  - 补充 GLM-5.2 模型套餐标识和套餐切换新手指引
  - 文档新增 CodingPlan Provider 配置示例和多人 Provider 配置示例
  - 完善缺失的斜杠命令文档
  - 补充双 Esc 撤销冷却的实现方案与规格说明
  - 补充 WebUI 功能注释和 bot 审查响应记录
  - 新增 Windows 路径归一化实机测试清单
