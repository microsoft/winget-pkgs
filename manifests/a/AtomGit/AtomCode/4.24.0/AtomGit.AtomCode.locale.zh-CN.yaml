ReleaseNotes: |-
  AtomCode v4.24.0 Release
  发布日期：2026-06-01
  ✨ 新增功能（Features）
  Hook 系统
  - hook：全面引入 Hook 扩展框架 —— 支持 13 个扩展点（Message / Turn / Tool / Session / System 级别），含 webhook 异步回调、脚本执行与异步批量处理；附带 hooks.toml 配置与示例脚本（auto_commit / code_review / log_tool_calls）。
  - hook：UserPromptSubmit hook 失败不再阻塞对话，降级为警告继续执行。
  Bash 后台模式
  - bash：一等公民后台模式 run_in_background —— 通过 setsid(2) 系统调用将命令摘到独立会话，不依赖 setsid 二进制，跨平台可用（Windows 用 DETACHED_PROCESS 对齐，鸿蒙 PC 自动用 sh）。返回 pid + 日志路径，dev server / watcher 直接走后台，不再自搓 nohup &。
  插件系统
  - plugin：交互式 /plugin 管理器模态框 —— 支持按名称安装/卸载插件，每次启动自动同步 marketplace。
  - plugin：多 marketplace 引导 + 自动安装 —— 官方 registry 作为默认 marketplace，支持 git-subdir 源，跳过未知源类型。
  - plugin：兼容 Claude Code 已安装插件 —— 读取 installed_plugins.json，自动发现 Claude Code marketplace 安装的 skills/commands，免重复安装；AtomCode 原生插件优先级更高。
  - plugin：已安装插件提示优化 —— 重复安装时给出友好重装指引，不再只报 "already installed"。
  - plugin：robust auto-install recovery —— 自动安装后正确触发 hook，手动删除插件目录后 installed_plugins.json 条目不再残留。
  项目指令文件
  - instructions：支持 AGENTS.md 开放标准 —— 在 .atomcode.md > ATOMCODE.md > AGENTS.md > CLAUDE.md > claude.md 查找链中新增 AGENTS.md，已有 AGENTS.md 的项目无需另建文件即可被 AtomCode 自动识别。
  /guide 向导命令
  - guide：新增 /guide 斜杠命令 —— 作为 /skills ask 的快捷入口，自动安装 ask skill，自动审批插件文件读取。
  - guide：英文知识库 + i18n 支持 —— 16 篇英文知识文件、命令菜单与工具定义多语言适配，/guide 按用户查询语言回复。
  /provider 提供商配置
  - provider：手动填写改为 Base URL 优先、类型自动预填。
  - provider：模板导入合并 —— /provider add 自动识别 curl / JSON / TOML 格式。
  CLI
  - cli：新增 -y 短选项，等价 --dangerously-skip-permissions；SKIP 徽章重命名为 BYPASS，颜色改为红色。
  VSCode 扩展
  - vscode：Add to Chat 支持可点击代码引用 —— 显示 file:line-range 格式，点击跳转到文件对应行，仅选中时添加上下文，发送选区内容而非整个文件。
  - site：新增 VSCode 插件专区页面 + Plugins 导航链接。
  🛠 修复（Fixes）
  终端渲染 / TUI
  - tuix：流式 / 工具执行时输入框不再闪动 —— 改用逐行 EL 取代整屏 ED 0 擦除，页脚由 render_diff 原子重绘全权负责。
  - tuix：含 Tab 缩进的粘贴文本输入光标错位修复 —— wrap_with_cursor 把 \t 按 SOFT_TAB_WIDTH 计列，与渲染端一致。
  - tuix：出错的轮次显示「✗ 已中断」而非「✓ Nailed it」成功横幅。
  - tuix：guide spinner 更新改走 BSU 包络，消除输入框闪烁。
  - tuix：guide 流式回答不再把 "Querying guide…" spinner 留在滚动区。
  - tuix：并行工具组子行在深色主题下变暗，恢复层次。
  - tuix：dark-theme 下 tool-call header 与 result line 色彩层级修正。
  - tuix：Esc 取消后斜杠命令回填输入框，且不弹出命令列表。
  - tuix：/provider 识别行显示 base_url，手动 Base URL 改为必填前置步。
  - tuix：/provider 名字优先取主域名而非子域。
  - tuix：/provider 把 $VAR / 环境变量名形式的 API key 视为占位符。
  - tuix：/provider 模板导入读取展开后的粘贴内容。
  - tui：AltScreenRenderer 缺失 pop_approval_prompt 导致 Windows "Waiting for approval" 残留行修复。
  - tui：剥离粘贴输入中的 shell prompt 字符。
  - tui：修复 handle_plugin_job_event 调用点 state 可变性不匹配导致编译失败。
  缓存与压缩
  - cache：稳定 prompt 前缀，缓存命中率 ~79% → ~96%；长对话不再逐轮跌至 ~10%。
  - ctx：token-aware 压缩 keep-floor —— 按 token 上限而非固定消息数截断，解决 reasoning 密集模型（deepseek-v4 / Kimi / Moonshot）在 128K 窗口下 reasoning 累积超限导致流式超时。
  安全
  - provider：OAuth access_token fallback 防御不可信 base_url —— 阻止恶意 base_url 窃取 Authorization 头。
  - ParallelEditFiles：审核安全漏洞修复 —— 与 edit_file 对齐两层审核检查（敏感路径检测 + 工作区外写入检测），敏感路径升级为 RequireApprovalAlways 防止 session grant 绕过。
  编码计划
  - coding-plan：月度额度耗尽时按 quota_exhausted 判定，抑制 0% 滚动窗口误导。
  Prompt 与 Agent
  - prompt：约束 agent 不越界扫兄弟目录、不再误写 ~/.claude。
  - Ctrl+C 现在可取消 guide subagent，即使输入框有内容。
  工具与运行时
  - bash：Windows 上不再预设 bash 语法，如实报告 shell（cmd.exe）。
  - auto-commit：commit 消息文件数改用实际 staged 文件数，与 git commit 真正提交的文件一致。
  - skill：允许名称包含大写字母和斜杠 —— normalize_skill_name() 统一转小写 + / 转 -，查找时大小写不敏感。
  - plugin：Claude Code bridge 改进 —— 作用域优先级、相对路径、可测试性。
  - self_update：HarmonyOS 自动升级取 ohos-arm64，不再被静态 linux-arm64 覆盖。
  - site：鸿蒙检测优先于 Windows；剪贴板复制更健壮。
