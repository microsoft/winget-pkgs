ReleaseNotes: |-
  AtomCode v4.25.2 Release Notes
  发布日期：2026-06-19
  v4.25.2 是 AtomCode 自 v2 引擎启用以来的重大里程碑版本：全新的 Engine v2 堆栈正式成为默认引擎，覆盖 plan mode、/undo、/goal、/background 等全场景能力；同时引入 /review 内置代码审查、AtomGit 平台原生集成等重量级新功能，并对 MCP 客户端、Compaction 等进行了系统性增强。

  ✨ 新增功能（Features）
  Engine v2 新引擎堆栈（里程碑新功能）
  - Engine v2 成为默认引擎：基于全新 atomcode-kernel 内核、atomcode-capabilities 能力层、atomcode-coding 编码代理与 atomcode-bridge 桥接层的 v2 堆栈正式切换为默认引擎
  - Plan mode 支持：v2 引擎下的 Plan 模式（原为 degraded warning）
  - /undo 支持：v2 引擎下的撤销操作（原返回 UndoFailed）
  - /goal 支持：v2 引擎下的持久化 goal 指令
  - /background 支持：v2 引擎下的后台任务
  - !cmd local-shell passthrough：v2 引擎下本地命令透传执行
  - Claude Code 兼容的 hook 合约：ToolMiddleware 决策与原子能力对齐
  /review 内置代码审查（里程碑新功能）
  - 内置代码审查：在 /review 命令中直接使用代码审查 agent，无需离开当前对话
  - 语言审查规则引擎：内置多语言审查规则（50+ 语言），随产品同步更新
  - 自定义任务与 JSON 输出：--append-system-prompt[-file] 追加模式、fix 建议字段、用量累加
  - diff 行号标注：审查结果直接标注 diff 行号，定位更精准
  - 变更文件清单驱动：自动识别变更文件并驱动覆盖面，内置 persona 单一来源强化
  AtomGit 平台集成
  - atomgit_repo 工具：仓库列表/查看/创建/删除/Fork 操作
  - atomgit_pr 工具：PR 管理（列表/查看/创建）及常用 client 方法
  - atomgit_issue 工具：Issue 管理（列表/查看/创建/标签），三件套统一注册
  /goal 命令增强
  - 持久化 goal 状态行：专属 footer 行显示当前 goal 轮次与状态
  - Engine v2 完整支持：v2 引擎下的 /goal 全流程支持
  - 可中断设计：通过 esc、ctrl+c、/goal clear 中断活跃 goal
  - 等待输入模式：/goal 等待显式输入文本而非直接运行选中内容
  MCP 客户端
  - MCP 客户端能力（L1）：支持 stdio / HTTP / OAuth 三种传输协议的 MCP 客户端
  - Streamable-HTTP 会话：Mcp-Session-Id 识别与 DELETE 关闭
  其他功能
  - memory 用户驱动记忆：用户驱动的持久化 recall/memory 能力（L1）
  - 会话持久化与跨会话 recall：session 持久化 + 跨会话记忆力（L1）
  - web_fetch 增强：markdown 输出格式、可选 max_chars（无默认截断）、real browser UA
  - 敏感路径读取防护：自动拦截 SSH keys / .env / credentials 等敏感文件读取
  - Compaction 溢出压缩：溢出时自动压缩旧轮次为 LLM 摘要（OverflowCompaction），加 focused summary、telemetry
  - codeintel 编码工具集：符号列表/读取（12 种语言，tree-sitter）、代码图分析、LSP diagnostics、blast radius 影响范围分析
  - 容量/令牌显示改进：K/M 后缀格式化令牌数
  - 并行编辑工具：edit_file ToolBatch 分组与事件回调
  - 编辑工具 compact diff 摘要：TUI 简化展示、快速理解修改内容
  - Plan mode per-turn 提醒：Plan 模式下轮次提示注入
  🛠 修复（Fixes）
  TUI
  - /clear 正确刷新新会话：不再是仅清屏
  - 图文混合发送：图片后文本不再延迟显示；登录后模型名即时更新
  - 图像附件去重：消除图片附件的冗余显示
  - 取消操作回滚：cancel = undo，不回填/保留
  - esc/ctrl+c 中断挂起：流打开阶段的挂起 turn 可中断
  - 用户文本+图片分组：阻止 viewport 溢出
  - streaming-stall 提示：20s 超时后显示"slow response"提示
  - footer 显示计费令牌+缓存命中：而非原始重发 context 量
  - markdown 表格暗色主题可见性：修复表格边框不可见
  - 输入框高度约束：长粘贴文本不会溢出屏幕，上限 6 行
  - /resume 闪烁消除：通过 DECSET 2026 信封消除闪烁
  - /goal 的 turn separator：仅当 goal 活跃时推迟 separator
  - footer 重绘：body scroll 后同 tick 刷新，无延迟
  - 键入草稿保留：取消 prompt 后恢复之前键入的内容
  - spinner 时钟稳定：batch 模式 + streaming-stall 提示下时钟不乱
  - VL 失败恢复：多图场景下丢失原文的问题
  WebUI
  - Tool call 行去重：修复 /live 订阅泄漏导致的行重复
  - SSE 连接重连：session_switched 后自动订阅新 LiveSession
  - 侧边栏刷新：发送消息后 200ms 侧边栏同步更新
  - 会话同步：新建会话时侧边栏自动同步
  i18n
  - /goal 命令输出本地化：help/status/clear 完整中英文
  - 引擎 v2 provider-init 错误本地化：网关鉴权错误信息中文化
  - atomcode --help 本地化：根据 config/env 语言设置显示
  Provider / 网络
  - stale keep-alive 连接恢复：修复"open failed"/"无法对话"类问题
  - stream timeout 提升：120s → 300s，环境可配置
  - 多系统消息合并：OpenAI-compat/Ollama 三端
  - reasoning 保留：所有 stream-end 路径保留 reasoning，去除占位符
  - DeepSeek V4 Flash 兼容：non-prose REASONING_PLACEHOLDER
  安全
  - web_fetch SSRF 修复：关闭 DNS-rebinding TOCTOU + IPv4-compatible IPv6 SSRF
  - atomgit clone 参数消毒：拒绝 leading-dash 参数注入
  - 越权路径防护：外部路径 Enumerate 操作需用户确认
  其他
  - 编辑工具重复调用：约束 edit_file 重复调用 + TUI 双条展示问题
  - /quit 需执行两次：添加 shutdown_requested 标志位修复流式处理时的问题
  - 技能递归发现：多级嵌套目录下的 SKILL.md 正确加载
  - approval 超时：交互式审批挂起等待应答（不再超时自动拒绝）+ 收起超时遗留审批行
  - 对话审批重触发：取消的 tool approval 在 /model 切换后不再重触发
  - truncate_generic 边界 panic：共创大赛反馈的边界条件修复
  - atomcode workspace 依赖对齐：fmt_tokens 实现回退与调用路径修复
