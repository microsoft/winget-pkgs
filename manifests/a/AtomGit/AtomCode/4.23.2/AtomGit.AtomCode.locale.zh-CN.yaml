ReleaseNotes: |-
  AtomCode v4.23.2
  发布日期：2026-05-27

  重点更新
  1. TUI 统一应用内滚动 + 宿主终端原生 scrollback
  2. npm 全平台分发： npm install -g @atomgit.com/atomcode

  新增
  - Qwen3 / OpenHands 风格的 XML function-tag 工具调用兼容——rescue 解析层认得 <function=...> 形态，弱模型不再因为返回 XML 风格而崩
  - Tab 切换 Plan ↔ Build 模式——补全菜单没弹出时，Tab 改成切模式
  - 代码块改用单色高亮——Terminal.app / Windows 默认配色下可读性显著提升（同时删除 dormant 的 syntect 依赖，二进制更小）
  - 启动加速——插件 bootstrap 后台化、OSC 11 背景查询超时缩短，冷启可感更快

  修复
  - OpenAI provider：tool_call 名字不再被 empty 的重复-id chunk 清空
  - markdown 表格：行分割正确识别 | 转义和内联 code span
  - plugin 后台任务 toast：与 MCP 连接消息列对齐
  - 启动鉴权：token 刷新失败按"鉴权缺口"对待，不再直接 crash startup
  - inflight tool 重写：narrow terminal 下 W iteF le(path) 类丢字伪影修复（prev_cells diff 缓存与 in-place 直写对齐）

  升级
  任选一种：
  curl（macOS / Linux / HarmonyOS PC）
  curl -fsSL https://atomgit.com/atomgit_atomcode/atomcode/releases/download/v4.23.2/install.sh | sh
  PowerShell（Windows）
  irm https://atomgit.com/atomgit_atomcode/atomcode/releases/download/v4.23.2/install.ps1 | iex
  npm（任意平台 + Node.js 18+）
  npm install -g @atomgit.com/atomcode
