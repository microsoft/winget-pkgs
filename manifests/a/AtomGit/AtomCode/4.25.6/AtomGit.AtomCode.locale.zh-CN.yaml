ReleaseNotes: |-
  AtomCode v4.25.6 Release Notes
  发布日期：2026-06-25
  v4.25.6 带来 WebUI 全面焕新（Landing 欢迎页、Skills/MCP 菜单、会话搜索、工具行内样式）、JetBrains 插件大幅增强（欢迎引导页、剪贴板图片、文件拖拽、JCEF 可选依赖）、TUI /cd 选择器实时过滤、并行编辑逐文件进度、LiveSession 同步全面强化，以及大量稳定性修复——Windows 兼容、Provider 重连、MCP 信任持久化、自动压缩升级等。

  ✨ 新增功能（Features）
  WebUI
  - Landing 欢迎页面：首次加载显示欢迎语与快捷操作 chip（/code-review、Explain code、Run tests），提升新用户引导体验
  - Skills 菜单：侧栏新增技能列表展示与点击插入
  - MCP 服务器面板：侧栏新增 MCP 按钮，弹出面板展示服务器名称、连接状态、工具数量
  - 会话搜索弹窗：侧栏搜索按钮打开居中模态弹窗，支持 Esc 关闭与点击遮罩关闭，打开自动聚焦输入框
  - Tool 调用行内极简样式：按工具类型（文件/搜索/编辑/终端/网页）显示图标与运行状态（完成✓ / 失败✗ / 进行中 spinner）
  - 会话列表按日期分组：今天/昨天/更早分组展示，移除旧 GroupBy
  - 新会话首发即时显示：发送首条消息立即以消息前 10 字作为临时标题出现在侧栏，落盘后刷新为真实标题
  - 输入区 subbar 键盘提示行：Enter 发送 · Shift+Enter 换行
  - 账号登录/退出整合：头像保留在侧栏底部，退出登录移入设置菜单
  - 同步图标对齐：sync 按钮改用 Lucide arrow-left-right SVG 图标
  - 工具审批弹窗 UI 统一：品牌色 + 菱形 logo + 衬线标题，按钮收敛为单色强调样式
  JetBrains 插件
  - 欢迎页面和启动引导：首次启动自动显示欢迎页（仅一次），包含快速开始、选中代码操作、输入命令、文档链接，支持中英文切换
  - 剪贴板图片粘贴为附件：支持多渠道提取剪贴板图片（AWT Transferable、CopyPasteManager、系统剪贴板、macOS NSPasteboard），统一转 PNG 格式并检测大小限制，支持缩略图预览与点击查看大图
  - 文件拖拽上传：支持从系统拖拽文件到输入区，优先尝试文件列表/uri-list
  - IDE 主题色动态跟随：面板背景/边框/前景色改用 UIUtil/UIManager 动态获取，跟随 IDE 主题切换
  - 轮次摘要：流式消息末尾显示本轮时长、tokens 用量、工具调用统计
  - Home 按钮：ToolWindow 标题栏 + Tools 菜单添加回到首页入口
  - 命令弹窗增强：编辑器 Action 重构，命令弹出体验优化
  - 中文本地化：界面中文文案补充与优化
  TUI
  - /cd 选择器实时过滤：打字即按 query（大小写不敏感子串）实时过滤最近目录列表，↑↓ 在过滤结果内移动；Enter 进入高亮最近目录，无匹配时回落为输入路径
  - /cd 选择器支持直接输入路径：支持直接键入路径而非仅从列表选择，resolve_cd 认 ~\ 反斜杠
  - 并行编辑逐文件实时进度：子代理按真实完成顺序实时显示 ↻/✓/✗ 状态，默认可见（不再需要 Ctrl+O 开启）
  LiveSession 同步增强
  - WebUI ↔ TUI 会话双向跟随：webui 切到已存在会话时，TUI 同步加载该会话历史与工作目录，三端落同一会话；发起端带 alreadyViewing 护栏避免广播回流抹掉本地历史

  🛠 修复（Fixes）
  Provider / 网络
  - v2 流式首个事件前断流透明重开：首个 SSE 事件到达前断流时自动重试一次，对齐 v1 行为
  - 连接重置加固重连：网关在读 SSE 响应体中途断连时（Windows os error 10054），重试次数 2→3 并加入短退避，失败时显示中文友好提示「网络连接中断…可重试」，不再裸抛原始错误链
  - 网关签名器每次请求现取 token：/login 后同步聊天不再报「认证已过期」
  - 区分 SSE 格式错误与空响应：重试提示文案更精确
  WebUI
  - Token cookie 按端口区分：多实例（如 VSCode + standalone）不再互相覆盖 cookie 致 401
  - 同步开关状态写回 URL ?sync 参数：刷新后保持开/关状态，不再关闭后刷新又被开启
  - 技能/MCP 下拉菜单无法滚动：scroll 事件捕获阶段过早关闭菜单——修复后正常滚动
  - 切换工作目录不再每次都新建会话：/cd 切换目录后保持当前会话
  - Sync 模式下 TUI /cd 同步到 webui 工作目录显示：新增 WorkingDir wire 事件，前端面包屑与侧栏路径跟随
  - 新会话落地页只在无 sessionId 时显示：避免已有会话时闪屏
  - 搜索弹窗加宽并适配手机端：移动端操作体验优化
  JetBrains 插件
  - 移除对 com.intellij.modules.jcef 的硬依赖：通过反射调用 JCEF API，JCEF 成为可选能力——不再因缺少 JCEF 导致插件加载失败，优雅降级不影响核心功能
  - 适配新版 JCEF API：移除已弃用方法和导入，兼容 IntelliJ 2026.x
  - UI 主题与签名配置优化：Plugin metadata、签名配置、settings 状态适配更新
  - 删除会话/无会话时恢复显示欢迎页：不再卡在空白页面
  Windows 兼容
  - edit_file/search_replace 容错 CRLF：read_file 抹掉的 \r 不再让编辑永久失配
  - Glob 识别 pattern 中的绝对路径：G:\path\to\* 等 Windows 绝对路径正确解析，不再误判「不存在」
  - Bash 输出按控制台 OEM 编码解码：中文 Windows 控制台 GBK 输出（如 keytool）正确显示而非 ◇◇◇
  - 控制台抑制扩展到全部 v2 spawn 点：不再每次对话闪控制台窗口，涉及 bash、cc_hooks、ast_grep、atomgit、open_file、LSP 客户端、skill 执行、MCP oauth 等所有子进程
  MCP
  - .mcp.json 的 trust/autoApprove 真正生效：v2 引擎补移植信任与自动批准子系统——受信服务器返回 Safe（不弹审批），autoApprove 按工具名而非 args 持久
  - 「总是」对 MCP 持久：always_grant_scope 按工具名固化，不再每次按 args 重弹
  - /setup 安装 MCP 写对路径：写到 .mcp.json（加载器读取路径），不再写进读不到的 .atomcode/mcp.json
  TUI 稳定性
  - Resize 无条件清 scrollback：长会话不再叠重复输出（#709 收尾）
  - /cd 后重建 SessionManager：/resume 正确列出新项目的历史会话
  - /quit 退不出去修复：退出链加 watchdog（8s deadline）+ bridge 内核 teardown 有界（5s 超时 + abort），任一环卡死不再阻止退出
  - 超窗/空白轮可观测性：上下文利用率 >=90% 时显示百分比（如 170%）；空白推理轮提示「按 Ctrl+O 查看推理」；发送前对 >= 窗口的请求预警，节省后续多次空重试
  - 限定自定义命令文件大小：防止启动时 OOM
  缓存与压缩
  - 自动压缩高水位升级为抽干+摘要：利用率 >=85% 时自动执行与 /compact 相同的抽干+摘要策略，不再只折叠工具结果——长会话上下文不再一路爬升
  - 自动压缩防抖：超窗粘贴场景下预估算抽干后残留是否仍超窗口 85%，是则退回廉价 stub，不再付 LLM 摘要代价
  - 压缩进度提示：Auto/Overflow 压缩时显示「compacting…」进度
  - 自动降量后立即刷新上下文用量：用量百分比即时更新
  Agent / 工具
  - 停止时彻底中止多轮 turn 循环：Cancel 不再仅中断当前步骤，而是中止整轮循环
  - Edit 移植 v1 空白容错 fuzzy 回退：tab/空格不一致也能改成功，不再逼模型写脚本
  - Read 移植 v1 GBK 解码 + 二进制恢复提示：兼容 GBK 编码文件，二进制文件给出恢复建议
  - Web_fetch 回填 forge 源码页主导代码块抽取：提升代码托管平台页面抓取质量
  - 统一宽松数字解析策略：拒绝负数/NaN 而非静默归零
  - 使用 SHA-256 替代 DefaultHasher：获取进程间稳定的缓存键
  - PreToolUse hook allow 跳过审批：已授权插件不再重复弹审批
  - 处理预发布版本号后缀：version_check 正确识别 pre-release 版本
  - 审批 parse 失败时要求重新 review：避免错误批准
  -  -y bypass 跨 v1 runtime 传播：Relaunch 后仍保持无需确认
  其他
  - Session 重命名后发送对话名称不被覆盖：重命名后保留自定义名称
  - 冻结天粒度日期锚点进 persona：补齐 round-1 日期信息（对齐 v1）
  - TUI /cd 选择器 trim 与输入校验：~// 不逃逸 home、输错不关选择器
  - 审批 channel 异常可观测：区分内部故障与用户拒绝，输出 stderr 日志
  - 并行编辑 Windows 构建校验真正可用：v2 补全 + v1 去 head/tail 替代依赖
  - EOL 规约只在兜底路径做：拒空串、规约后 no-op 不执行

  🔧 重构（Refactoring）
  JetBrains 插件
  - JCEF 初始化抽离为 Java 桥接类：将 JBCefBrowser/JBCefJSQuery 初始化逻辑从 Kotlin 移至 Java 桥接类，避免 IntelliJ 2026.2 中 AWT 反射无法解析 Kotlin 闭包签名
  WebUI
  - Cookie 名解析收口到 AppState：去掉按请求 format! 与裸常量陷阱，统一管理

  📚 文档（Docs）
  - JetBrains 插件隐私政策：新增 PRIVACY.md 隐私说明文档
  - JetBrains 插件使用文档重构：README.md 重写，新增 docs/jetbrains.md 详细使用指南
  - Docker 部署文档更新：README.md 内容补充
  - 英文/中文站文档同步：approvals、basic-usage、configuration、faq、getting-started、headless-daemon、webui 等全量同步至 v4.25.6

  🧹 工程 / 构建
  - Telemetry surface 维度：新增 surface 维度归因 review token 消耗，提升可观测性
  - JetBrains 构建配置更新：Gradle 配置适配新版 JCEF 依赖结构
