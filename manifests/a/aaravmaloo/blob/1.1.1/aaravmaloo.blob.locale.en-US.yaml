ReleaseNotes: |-
  Release Notes
  This release aims to introduce quality-of-life plugins and create an interactive trash UI.

  Added
  - Introduces a interactive UI for trash, opened with t.
  - Create the export plugin, used to export PDFs and .docx from your notes.
  Note
  The export plugin relies on the machine having pandoc. Hence, please make sure you have pandoc installed and running.
  - Create open-dir plugin, used to open the directory where notes and config files are stored
  - Add reminders plugin to send push notification to the machine on a specified time (still in testing, may be changed)
  - Create words plugin, used to analyze and provide stats for words, character count, etc.
