ShortDescription: Institutional-grade audio scheduler and multi-zone PA system.
Description: |-
  Multilarm is an offline-first audio scheduler and multi-zone public-address
  system for Windows, Linux and Raspberry Pi. It fires scheduled audio to the
  exact second, fully offline — school bells, factory shift announcements,
  care-home and hotel zone PA, museum timed narrations, community-radio shuffle,
  prayer-time Adhan and more.

  Optional extras: a cloud dashboard for remote control from anywhere, browser
  and console push-to-talk, MQTT and webhook integration, and an external
  trigger HTTP API for nurse-call / BMS / timetable systems. Bundled Kokoro
  neural text-to-speech works offline on first launch. Runs as a Windows
  Service with a system-tray companion.

  Free for personal, non-commercial use; a commercial licence is required for
  any business or institutional deployment.
