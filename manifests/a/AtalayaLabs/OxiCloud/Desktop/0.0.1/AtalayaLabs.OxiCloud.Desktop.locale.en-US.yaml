ShortDescription: >
  Native desktop-first client for OxiCloud - fast files, adaptive UI, and offline-aware local
  caching.
Description: |-
  OxiCloud Desktop Client is the native Flutter application for OxiCloud, the self-hosted cloud
  platform written in Rust. It is built for desktop workflows first: drag-and-drop uploads, real
  file pickers, local downloads, secure token storage, and a desktop shell that feels like an
  application instead of a browser tab.

  The same codebase also targets iOS and Android, but this repository focuses on the native desktop
  experience for macOS, Linux, and Windows.
