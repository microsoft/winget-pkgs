ReleaseNotes: |-
  Changelog
  - cf. full changelog here
  Installation on Windows:
  - download SetupJFXChess_500_win_x64.exe and execute it
  - The executable may trigger Windows Smartscreen. On the resulting blue Smart Screen Defender window
    - click on "More info" (upper left corner) and then
    - click on "Run anyway" (lower right corner)
  - or download jfxchess_500_win_x64.zip, unzip and run jfxchess.exe
  Installation on Linux
  - Install from Snap Store JFXChess
  - Debian/Ubuntu: download the jfxchess_1.0-5.0_amd64.deb and install with sudo dpkg -i jfxchess_1.0-5.0_amd64.deb
  - other Linux: install Java JRE, download jfxchess_linux_generic.tar.gz, unzip and run java -jar jfxchess-5.0-jar-with-dependencies.jar. Adapt and install jfxchess-jfxchess.desktop file for inclusion in your start menu/desktop
  You need a 64 bit OS both for Windows and Linux!
