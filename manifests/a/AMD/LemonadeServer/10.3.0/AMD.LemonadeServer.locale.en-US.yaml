ReleaseNotes: |-
  Headline
  - OmniRouter unifies the best backend engines to give you true omni-modal LLM chat. Make and edit images, generate speech, and more with natural language. Open AI-compliant.
  - The desktop app is now based on Tauri instead of Electron, so it is 10x smaller.
  - Easily update to specific llama.cpp versions, or enable auto-update.
  - The GUI has a light mode theme!
  - ROCm 7.2 stable release, 7.12 preview release, and TheRock nightly builds are all supported. Preview is now the default.
  Breaking Changes
  - lemonade_server.service is now lemond.service.
  - The amd_igpu and amd_dgpu fields in system-info have been consolidated to amd_gpu. nvidia_dgpu renamed to nvidia_gpu for consistency.
  - ROCm channel default changed from nightly to preview.
