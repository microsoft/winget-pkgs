ShortDescription: A holographic system control deck for Windows. One machine, three modes.
Description: >-
  NeonPrime is a holographic system control deck for Windows: a more powerful,
  better-looking take on the all-in-one tweak-and-debloat utility. Monitor live
  telemetry, apply reversible tweaks and debloat backed by a rollback history,
  switch system modes and power plans, manage processes, services, startup, and
  the firewall, score and harden your privacy, clean caches and browser data, and
  build a debloated Windows ISO with MicroWin. On top sits a full IT and helpdesk
  toolkit: compliance and posture, one-click support bundles, event logs, local
  users, printers, disks, drivers, certificates, and Group Policy. All from a
  single cyan-and-ember HUD.
