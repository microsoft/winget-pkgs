ShortDescription: A TCP, UDP, and SCTP network bandwidth measurement tool.
Description: iperf is a tool for active measurement of the maximum achievable bandwidth on IP networks. It supports tuning of various parameters related to timing, protocols, and buffers. For each test it reports the measured throughput / bitrate, loss, and other parameters.
