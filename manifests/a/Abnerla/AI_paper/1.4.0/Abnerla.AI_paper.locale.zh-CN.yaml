ReleaseNotes: |-
  重大更新：本次版本核心更新为新增 skills，覆盖多场景需求，操作便捷、体验流畅，同时优化现有功能，修复已知问题，提升版本稳定性。
  一、界面与交互体验优化
  1. 修复开关组件动画卡顿、残留重绘、内存占用未清理问题
  2. 修复下拉选择、标签点击、页面布局溢出等界面异常
  3. 优化搜索框重置逻辑，解决占位文字和输入内容冲突问题
  4. 优化窗口管理，支持窗口复用置顶，退出程序不再弹窗报错、窗口位置不再丢失
  5. 适配高分屏缩放，修复缩放后字体显示错乱问题
  二、文案润色 & AI 功能优化
  1. 修复翻译、润色功能自定义提示词不生效问题
  2. 补齐 AI 降重、查重必备配置参数，功能更稳定
  3. 优化提示词加载逻辑，减少重复读取磁盘，运行更流畅
  三、稳定性 & 性能提升
  1. 修复多处代码报错、变量命名错误、程序崩溃无提示问题，增加全局异常保护
  2. 优化网络资源加载缓存逻辑，修复本地缓存和远程数据不一致问题
  3. 优化并发任务加载状态，多任务同时运行时加载提示不再提前消失
  4. 清理多处无效冗余死代码，减少资源占用
  5. 完善配置保存、工作区状态保存的异常容错，避免异常扩散
  四、细节问题修复
  1. 修复日志文字乱码问题
  2. 优化程序退出时定时器、后台任务自动清理，杜绝残留回调报错
  3. 优化文档字数统计、PDF 导出路径兼容性，Windows 端 Office 适配更稳定
  4. 统一公共组件实例复用，减少重复创建资源开销
  更新建议：
  建议所有用户及时更新至本次版本，解锁新增 skills，充分体验更全面、更便捷的功能服务。后续我们将持续收集大家的使用反馈，不断优化、新增更多实用功能，感谢大家的支持与陪伴！
