ShortDescription: One-stop AI academic writing assistant · Supports AIGC reduction, plagiarism checking, polishing, and intelligent error correction, among other features
Description: |-
  AI Paper is a desktop application for Windows that integrates five core functions: academic writing, AI detection reduction, plagiarism reduction, academic polishing, and intelligent proofreading. All data is stored locally, API keys are encrypted, and no registration or internet login is required—ready to use out of the box.

  Features
  Academic Writing
  - AI-assisted outline generation with step-by-step chapter drafting
  - Automatic generation of abstracts, keywords, and references
  - Paragraph optimization and rewriting
  - Support for GB/T 7714, APA, and MLA citation formats
  - Built-in rich text editor (bold, italic, underline, color, indentation, etc.)
  AI Detection Reduction
  - Three rewriting intensities: Light / Deep Rewrite / Academic Style
  - Segment-by-segment AI feature scanning and intelligent rewriting
  - Support for importing AIGC detection reports (DOCX/PDF) with paragraph-level risk labeling and color-coded display
  Plagiarism Reduction
  - Three rewriting intensities: Light (20-30%) / Medium (40-50%) / Deep (60-80%)
  - Local duplicate fragment detection + AI rewriting
  - Support for importing plagiarism reports for precise duplicate content localization
  Academic Polishing
  - Text-type-based polishing: Abstract / Introduction / Body / Conclusion / Outline
  - Four polishing modes: Grammar Correction / Vocabulary Enhancement / Logic Optimization / Comprehensive Polishing
  - Four execution methods for flexible adaptation to different needs
  Intelligent Proofreading
  - 8 proofreading categories: Basic Text, Grammar & Syntax, Academic Formatting, Citation Standards, Data Expression, Logical Rigor, Compliance Risks, AI Writing Traces
  - Three severity levels: Notice / Warning / Error
  - One-click auto-fix support
  Highlights
  - History: Up to 200 operation records saved, with filtering, difference comparison, and one-click rollback
  - Word Import/Export: Direct .docx file import for editing and export upon completion
  - LaTeX Conversion: Bidirectional conversion between text and LaTeX formats
  - Auto-Save: Real-time editing state preservation with automatic recovery on next launch
  - Usage Statistics: Token consumption and cost tracking by model
