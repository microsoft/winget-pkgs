- wallpaper
- wordpress
ReleaseNotes: |-
  SitePix 1.0.1
  Windows
  - SitePix-Setup-1.0.1.exe — installer (recommended)
  - SitePix-1.0.1-win-x64-portable.zip — portable
  - winget install AlexReich.SitePix
  - choco install sitepix
  macOS
  - SitePix-1.0.1-osx-arm64.tar.gz (Apple Silicon)
  - SitePix-1.0.1-osx-x64.tar.gz (Intel)
  - brew install alexreich/tap/sitepix
  - Or one-liner: curl -fsSL https://github.com/alexreich/SitePix/releases/latest/download/install.sh | sh
  Linux
  - SitePix-1.0.1-x86_64.AppImage (universal, single file)
  - sitepix_1.0.1_amd64.deb / _arm64.deb (Debian, Ubuntu, Mint)
  - sitepix-1.0.1-1.x86_64.rpm / .aarch64.rpm (Fedora, RHEL, openSUSE)
  - SitePix-1.0.1-linux-x64.tar.gz / -linux-arm64.tar.gz (portable tarballs)
  - Or one-liner: curl -fsSL https://github.com/alexreich/SitePix/releases/latest/download/install.sh | sh
  Profiles
  The bundled profile is kadampa.org. Six sample profiles ship in
  samples/ — file basename is the source domain:
  petapixel.com, atlasobscura.com, fstoppers.com,
  thephoblographer.com, smashingmagazine.com, kadampa.org.
  Point SitePix at any of them on the command line:
  sitepix samples/petapixel.com.json
  See README.md for the schema.
  Scheduling
  On first run SitePix registers a daily task using whatever scheduler the
  host OS provides (Task Scheduler / launchd / cron). Run
  sitepix-install-schedule to swap a Linux cron entry for a systemd user
  timer, change the time, or remove the schedule entirely.
ReleaseNotesUrl: https://github.com/alexreich/SitePix/releases/tag/v1.0.1
