ReleaseNotes: |-
  功能更新
  - Agent 会话支持独立窗口打开：支持将 Agent 会话以新窗口形式打开，便于在多会话并行场景下更高效地处理任务，进一步提升使用体验。
  - Quest 模式支持已发送消息二次编辑：在 Quest 模式下，现已支持对已发送消息进行再次编辑，方便随时调整对话内容，提升交互灵活性。
  - 灵码 IDE 新增 AKSK 认证方式：支持通过 Access Key/Secret Key 登录。
  - Spec/plan 预览面板新增文件检索功能，支持快速定位目标文件。
  体验优化
  1. 灵码专属版离线部署能力增强：新增 IDE 插件离线安装和 Remote SSH 组件离线下载能力，提升企业专属版在隔离网络环境下的部署体验。
