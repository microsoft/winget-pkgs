ShortDescription: 为您的小型活动和演出定制的专属声效板
Description: |-
  您是否正想寻找音效来活跃节目的广播主持人？是在播报过程中需要快速简便播放人群欢呼声的体育解说员？还是希望通过身临其境的音效为战役注入活力的桌面游戏玩家？无需再苦苦寻觅！

  我们简单直观的界面让您可以轻松地即时播放、暂停和循环声音。何必再等待？立即下载 Podcast Soundboard，让您的音频体验更上一层楼。

  浏览由 Voicy 提供的包含超过 500,000 种音效的海量曲库，提升您的音频项目水平。

  支持以下文件格式：.mp3, .wav, .ogg, .webm, .wav, .flac

  完美适用于您的创意项目：
  - 桌面游戏
  - 广播
  - 播客
  - 电话会议
  - 戏剧
  - 体育播报
  - 宗教仪式
  - 游戏

  功能特点：
  - 支持 MIDI 设备
  - 通过键盘或鼠标触发声音
  - 灵活、响应迅速的用户界面
  - 自动避让（Duck）控制
  - 导入/导出声卡配置
  - 同时使用多个声卡
  - 全局、声卡及单个声音层级的音量控制
  - 循环及多次触发功能
  - 设置音轨的开始/结束时间
