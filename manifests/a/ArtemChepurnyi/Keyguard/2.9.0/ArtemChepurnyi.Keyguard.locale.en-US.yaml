ReleaseNotes: |-
  This update introduces initial support for Wear OS, featuring optimized screens for manual Bitwarden login, the password generator, and updated layouts for the 'About' and 'Data Safety' sections. The description text from the biometric prompt has been removed. For desktop users, the application now periodically checks for and applies system theme changes.
