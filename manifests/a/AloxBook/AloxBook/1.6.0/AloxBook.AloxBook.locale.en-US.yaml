ShortDescription: Privacy-first personal double-entry bookkeeping
Description: |-
  AloxBook is a personal finance application that brings real double-entry bookkeeping to your desktop. It is fast to learn, quick to use, and your data stays entirely on your machine in encrypted local storage.
  Features include a hierarchical account tree, CSV import with configurable profiles, transaction templates, period close and carry forward, and full English, German and French language support with live switching.
