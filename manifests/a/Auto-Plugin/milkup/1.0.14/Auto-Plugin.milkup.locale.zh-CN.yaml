ShortDescription: 免费 & 所见即所得 & 桌面端 markdown 编辑器
Description: |-
  一个现代化的桌面端 Markdown 编辑器
  ✨ 特性
  - 🎯 所见即所得编辑 - 基于 Milkdown 的实时预览编辑体验
  - 📝 双模式编辑 - 支持所见即所得和源码编辑模式切换
  - 🎨 多主题支持 - 多种简约主题，支持主题编辑器，导入导出
  - 📁 本地文件管理 - 支持打开、编辑和保存本地 Markdown 文件
  - 🔖 多文件打开 - 支持 Tab 栏多文件打开
  - ⌨️ 快捷键支持 - 丰富的快捷键提高编辑效率
  - 📋 大纲导航 - 自动生成文档大纲，快速导航
  - ️🖼️ 图片上传 - 支持自定义图床配置
  - ✅ 拼写检查 - 内置拼写检查功能
  - 🌐 跨平台支持 - 支持 Windows、macOS、Linux
  - 🔧 高度可定制 - 支持自定义 CSS 和插件扩展
Tags:
- markdown
- 编辑器
