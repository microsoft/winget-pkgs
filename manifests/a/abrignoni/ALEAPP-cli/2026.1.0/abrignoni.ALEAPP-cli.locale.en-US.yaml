ShortDescription: Android Logs Events And Protobuf Parser
ReleaseNotes: |-
  ALEAPP v2026.1.0
  - Massive LAVA migration: 150+ artifacts converted to the @artifact_processor decorator (Firefox, BitTorrent, Chrome/Chromium family, the full Garmin suite, Fitbit, WhatsApp, Facebook Messenger, Snapchat, Skype, Viber, Teams, ChatGPT, Life360, TikTok, offline GPS trackers, and many more), with UTC timestamp normalization and extraction-relative source paths.
  - New parsers: HONOR Media Library/Gallery, Samsung Secure Folder HistoryLog, Rema 1000/Scan Selv (Denmark), and a developer-only App Inventory module for parsing-coverage analysis.
  - Full refactor of the Waze, MeWe, and Life360 parsers, plus threaded conversation views added to a dozen SMS/chat artifacts (Burner, Google Messages, TikTok, Google Chat, Discord, LinkedIn).
  - Visual identity overhaul: adoption of Tabler icons (as webfonts) for HTML reports, migrating legacy icon names to native Tabler names.
  - Numerous stability fixes: hardened XML parsing against invalid tokens (4 batches), resolved LAVA duplicate-name collisions, fixed Windows MAX_PATH crashes on long report paths, migrated legacy media artifacts to check_in_media, and added a Windows CI smoke test to validate all module imports.
