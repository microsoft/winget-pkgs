ReleaseNotes: |-
  Install bdinfo-rs 1.2.0
  Install prebuilt binaries via shell script
  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/agentjp/bdinfo-rs/releases/download/v1.2.0/bdinfo-rs-installer.sh | sh
  Install prebuilt binaries via powershell script
  powershell -ExecutionPolicy Bypass -c "irm https://github.com/agentjp/bdinfo-rs/releases/download/v1.2.0/bdinfo-rs-installer.ps1 | iex"
  Install prebuilt binaries via Homebrew
  brew install agentjp/tap/bdinfo-rs
