ShortDescription: Monitor não oficial de uso do Claude Code na bandeja do Windows — um ícone nítido e com reconhecimento de DPI mostra seu % de uso, projeta quando vai esgotar, fica vermelho antes do limite e comemora os resets de cota com toasts temáticos.
Description: 'O Claude Code Tray é um monitor não oficial, feito pela comunidade, do seu uso de cota do Claude Code, que fica na bandeja do sistema do Windows. Ele desenha um ícone vetorial nítido e com reconhecimento de DPI mostrando a porcentagem de uso atual com uma barra de preenchimento no estilo do Gerenciador de Tarefas, e projeta quando você vai atingir 100% — uma linha de ritmo proporcional para a janela semanal e uma regressão por taxa de consumo para as janelas de sessão de 5h e extra — deixando a barra vermelha quando você está no ritmo de esgotar antes da janela ser renovada. Troque qual janela o ícone acompanha (sessão 5h, semana 7d ou extra) pelo menu do botão direito. Quando uma janela devolve sua cota, um toast colorido e exclusivo desliza na tela para avisar: Surpresa! (reset semanal antecipado), Bônus! (crédito no meio da janela), Nova semana! e Sessão renovada! — cada um pode ser ativado ou desativado nas Configurações. O submenu Insights de uso (24h) mostra um detalhamento local, ponderado por preço, do seu uso (de subagentes, fatia de contexto grande e divisão por modelo) calculado a partir das suas próprias transcrições de sessão do Claude Code — sem chamadas extras à API e sem nunca ler o conteúdo das mensagens. O app reaproveita o token OAuth que o Claude Code já guarda, então não há nada para configurar, e ele se atualiza sozinho a partir das Releases do GitHub.'
