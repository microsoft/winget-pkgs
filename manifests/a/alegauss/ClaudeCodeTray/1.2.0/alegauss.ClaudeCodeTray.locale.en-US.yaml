ShortDescription: Unofficial native Windows tray monitor for Claude Code usage — shows your rate-limit %, projects when you'll run out, and turns the icon red before you hit the limit.
Description: Claude Code Tray is an unofficial, community-built Windows system-tray monitor for your Claude Code rate-limit usage. It draws a crisp, DPI-aware icon showing the current usage percentage, tracks your burn rate to project when you'll hit 100%, and turns the icon red when you're on pace to run out before the window resets. A right-click submenu shows a local 24h usage breakdown (from subagents, large-context share, and a by-model split) computed from your own Claude Code session transcripts — no extra API calls. It reuses the OAuth token Claude Code already stores, so there is nothing to configure.
