ShortDescription: 在同一界面内即可实现安装、监控、设施及人员管理
Description: |-
  Ajax PRO Desktop 是用于监控和管理 Ajax 系统的应用程序，支持配置与测试设备、管理用户访问权限，可监控并处理不限数量的 Ajax 系统的事件和告警。
  Ajax PRO Desktop 可与 PRO 移动端应用并行使用。安装及服务公司可使用该应用设置并接入安防系统，安保及监控公司可借助它搭建中央监控站（CMS）。
