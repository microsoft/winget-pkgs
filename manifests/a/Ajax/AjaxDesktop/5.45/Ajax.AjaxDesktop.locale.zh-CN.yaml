Description: Ajax Desktop 可将终端用户的桌面设备转变为功能完备的安全管控中心。用户既能为特定群组或整个场所配置安全模式、监控每台设备的运行状态，也可查看多路系统摄像头的实时画面，所有操作都可在一个直观便捷的统一界面内完成。系统会推送信息丰富的实时通知，确保不会遗漏任何警报或现场事件。
