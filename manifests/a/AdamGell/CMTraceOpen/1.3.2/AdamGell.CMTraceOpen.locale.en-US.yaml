ReleaseNotes: |-
  CMTrace Open v1.3.2
  Patch release with managed update-check controls and a Secure Boot scan polish fix.
  Added
  - Startup update checks are now disabled by default and can be enabled from Settings > Updates.
  - Managed Windows deployments can force-disable all app update checks:
    - NSIS: CMTrace-Open_*_x64-setup.exe /S /DisableUpdateChecks
    - MSI: msiexec /i CMTrace-Open_<version>_x64.msi /qn DISABLEUPDATECHECKS=1
  Fixed
  - Secure Boot scan PowerShell checks no longer flash a console window.
