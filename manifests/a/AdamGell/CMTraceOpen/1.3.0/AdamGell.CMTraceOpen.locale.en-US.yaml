ReleaseNotes: |-
  CMTrace Open v1.3.0
  Final 1.3.0 release. This replaces the 2026-04-27 prerelease and includes the final PR #180 hardening plus release-build dependency alignment.
  Highlights
  - Unified multi-file timeline workspace with incident detection and swim lanes
  - DNS/DHCP workspace for DNS debug logs, DNS audit EVTX, and server collection
  - Parser crate extraction for sharing with cmtraceopen-web
  - Design system polish across tokens, icons, ARIA, spacing, and theme coverage
  - Cross-platform release builds restored for macOS, Linux, and Windows
  Final hardening
  - Tailing no longer duplicates partial trailing records
  - Date/time filters accept whole-second ISO/US inputs, validate up front, and treat timezone-less values as local time
  - Session restore handles partial file-load failures without losing successfully restored tabs
  - Aggregate-folder row markers now read and write against each entry's own file path
  - Column auto-fit now works from the full column header and includes the message column
  - Tauri JavaScript packages are aligned with Rust tauri 2.11.0 for release builds
  See CHANGELOG.md for full details.
