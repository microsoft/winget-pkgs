ReleaseNotes: |-
  CMTrace Open 1.2.1
  A maintenance release rolling up five community-reported fixes, a ProcMon-style context-menu filter, and signed builds for Windows (x64 + arm64), macOS (arm64), and Linux (x64).
  Full changelog: CHANGELOG.md
  Added
  - Context menu filter from selection (#53) — right-click a log row with text selected for Include/Exclude filter items scoped to the selection, mirroring ProcMon's "exclude all events with this value" workflow.
  - WDAC Managed Installer examples — new PowerShell tools under scripts/powershell/CmtLog/examples/ for detecting, remediating, and restoring WDAC Managed Installer configurations (CIP files, SiPolicy, AppLocker MI rules, CiTool integration), plus a sample .cmtlog output.
  Fixed
  - Hidden console windows for background spawns on Windows (#138) — background diagnostics no longer flash visible powershell.exe/cmd.exe/reg.exe windows during collection runs. A new helper applies CREATE_NO_WINDOW to DNS/DHCP probes, dsregcmd /status, registry exports, schtasks, nltest, AD lookups, and the collector's reg.exe export.
  - File association status reflects reality (#113) — the Settings → File Associations tab now queries the current .log handler on mount and switches to a "currently registered" view when CMTrace Open is the active handler, instead of always rendering the "Associate" button.
  - Folder open skips inaccessible files (#136) — parse_files_batch and open_log_folder_aggregate no longer abort the entire load on the first per-file error (e.g. permission denied); the failure is logged and the rest of the folder still opens.
  - Ctrl+L mapped to Error Lookup (#137) — restores legacy CMTrace muscle memory. Filter moves to Ctrl+Shift+L; Ctrl+E remains an Error Lookup alias.
  - Clippy warnings blocking CI (#140) — resolved unnecessary_sort_by, collapsible_match, and related lints to keep cargo clippy -- -D warnings green.
  Changed
  - CI build matrix: dropped macOS and Linux from the CI Tauri build matrix — the project targets Windows as its primary platform. Release artifacts are still produced for all three OSes.
  - Komac v2 winget publishing: release workflow now uses the portable Komac binary with dynamic latest-release lookup and GITHUB_TOKEN env var.
  - Playwright E2E scaffolding: added Playwright test configuration, Vite-served test harness, and a Rust IPC bridge so end-to-end tests can drive the app against the real backend.
