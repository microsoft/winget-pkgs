  - 修复部分场景下窗口超出显示器边界的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/903 (f0c12)
  - 修复切换模型时按键图片显示异常的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/916 (db1e8)
  - 修复高鼠标回报率导致模型抖动的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/926 (1e241)
  - 修复 Windows 平台窗口被任务栏遮挡的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/930 (6b46e)
