ShortDescription: "\U0001F431 跨平台桌宠 BongoCat，为桌面增添乐趣！"
Description: |-
  🐱 跨平台桌宠 BongoCat，为桌面增添乐趣！
  功能介绍
  - 适配 macOS、Windows 和 Linux (x11)。
  - 根据据键盘或鼠标操作，同步移动鼠标或敲击键盘。
  - 支持导入自定义模型，自由打造专属猫咪形象。
  - 完全开源，代码公开透明，绝不收集任何用户数据。
  - 支持离线运行，无需联网，保护用户隐私。
ReleaseNotes: |-
  🚀 Features
  - 新增「猫咪设置 > 模型设置 > 动作音效」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/893 (dacbe)
  - 移除「猫咪设置 > 窗口设置 > 窗口位置」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/902 (844b1)
  - 新增「猫咪设置 > 窗口设置 > 保持在屏幕内」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/904 (48e00)
  - 新增「猫咪设置 > 模型设置 > 动作与表情」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/908 (a703d)
  - 移除「猫咪设置 > 模型设置 > 单键模式」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/909 (20479)
  - 新增「通用设置 > 应用设置 > 显示托盘图标」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/910 (cdfd0)
