ShortDescription: "\U0001F431 跨平台桌宠 BongoCat，为桌面增添乐趣！"
Description: |-
  🐱 跨平台桌宠 BongoCat，为桌面增添乐趣！
  功能介绍
  - 适配 macOS、Windows 和 Linux (x11)。
  - 根据据键盘或鼠标操作，同步移动鼠标或敲击键盘。
  - 支持导入自定义模型，自由打造专属猫咪形象。
  - 完全开源，代码公开透明，绝不收集任何用户数据。
  - 支持离线运行，无需联网，保护用户隐私。
ReleaseNotes: |-
  🚀 Features
  - 新增「猫咪设置 > 窗口设置 > 窗口位置」配置项 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/764 (57892)
  - 设置窗口尺寸最大值为 500 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/778 (d6966)
  - 新增繁体中文翻译 - by @chlbc in https://github.com/ayangweb/BongoCat/issues/872 (a5cc0)
  - 支持使用快捷键触发模型动作与表情 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/881 (3825b)
  🐞 Bug Fixes
  - 修复切换模型时报 undefined 的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/775 (2fc6e)
  - 修复 JSON 格式错误导致模型不可用的问题 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/790 (ef17b)
  🏎 Performance
  - 移除 Windows 下拖拽到屏幕边缘的放大效果 - by @ayangweb in https://github.com/ayangweb/BongoCat/issues/771 (50803)
