ReleaseNotes: |-
  [New Feature]
  File Sharing
  Share files with other participants directly within alfaview meeting rooms. Upload files using a file picker or drag-and-drop, and download shared files to your device. Moderators can manage file visibility and upload permissions per group. File sharing is available on all platforms including Windows, macOS, Linux, Android, iOS, and the web client.

  [Feature Update]
  Native Text Context Menu
  All text fields and labels on Windows and macOS now provide a native right-click context menu with standard options such as copy, paste, cut, and select all.

  [Technical Update]
  Managed Configuration Policies
  IT administrators can now enforce client-side restrictions through managed configuration policies. On Windows, policies are deployed via Group Policy (ADMX templates included); on macOS and Linux, policies are deployed through file-based configuration. The first supported policy allows administrators to completely disable file sharing for all users in their organization.

  [Fixes in v9.26.2]
  Web Client Stability
  Fixed an issue where the web client would freeze when rejoining a passcode-protected room.

  [Fixes in v9.26.3]
  Web Client Performance
  Fixed background blur appearing weaker on Firefox in the web client compared to other browsers.
  Improved background blur performance in the web client through more efficient image processing.
  Fixed an issue where audio connections failed in large meetings on the web client when many participants were active at the same time.

  [Fixes in v9.26.4]
  Screen Share
  Fixed an issue where shared screen audio would stop working if the user turned off their microphone during screen sharing.
