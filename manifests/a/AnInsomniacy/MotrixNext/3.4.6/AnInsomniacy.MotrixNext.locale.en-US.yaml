ReleaseNotes: |-
  What's Changed
  A major quality release bringing a redesigned Add Task dialog, macOS-style window controls, comprehensive filename decoding, full menu localization, and critical cross-platform stability fixes — battle-tested through 10 beta iterations.
  ✨ New Features
  - Redesigned Add Task dialog — New dual-tab layout with integrated torrent upload, batch item animations via Web Animations API, and improved modal positioning
  - macOS-style window controls — Optional traffic light buttons with cross-fade transitions, pop-in animations, and a preference toggle
  - Filename decoding & sanitization — Auto-decodes URL-encoded filenames, sanitizes special characters, and displays human-readable names across the UI
  - Comprehensive menu localization — Dynamic native menu labels with expanded language support across all 26 locales
  - Directional slide animations — File selection counts animate with Material 3 directional slides
  - RPM download options — Linux RPM packages now available alongside AppImage and .deb
  - Linux .deb package signatures — Signed metadata for Debian package verification
  🛠 Improvements
  - Proxy configuration defaults — Proxy settings now default to all scopes; empty strings properly clear engine settings
  - Enhanced language selection UI — Dual-language prompts for intuitive locale switching
  - Preference form layout — Standardized label width (260px) for consistent alignment
  - Refined torrent panel animation — Tuned transition durations, easing curves, and transform offsets
  - CSS-based progress transitions — Replaced v-if with class bindings for smoother show/hide animations
  - Engine config path resolution — Uses Tauri's resource directory for correct cross-platform paths
  🐛 Bug Fixes
  - Cmd+W on macOS — Close menu item now respects minimize-to-tray and exit dialog preferences
  - macOS minimize/zoom — Custom menu handlers for frameless window support
  - Linux NVIDIA EGL crash — Disabled WebKitGTK DMABuf renderer to prevent crashes on NVIDIA GPUs
  - Diagnostic export UX — Added minimum loading duration for smoother export transitions
