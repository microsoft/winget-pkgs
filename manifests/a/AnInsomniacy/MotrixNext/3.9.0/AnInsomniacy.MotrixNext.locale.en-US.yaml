ReleaseNotes: |-
  [!IMPORTANT]
  This is a major version update. Motrix Next has fully moved from the legacy aria2 engine to the maintained Aria2 Next engine, fixing many long-standing engine issues and adding native ED2K support.
  What's Changed
  Motrix Next 3.9.0 upgrades the download engine foundation, adds native ED2K support, improves external download workflows, and strengthens release signing automation.
  ✨ New Features
  - Aria2 Next engine — Replaced the legacy aria2 binaries with maintained Aria2 Next engine binaries across supported platforms.
  - Native ED2K support — Added ED2K link handling, preferences, search flow, validation, and localized search feedback.
  - Extension silent start — Added silent auto-submit for extension downloads and an option to auto-select all files from extension-created tasks.
  - Task notifications — Added task start, completion, error, and external-input notification handling.
  - Port conflict recovery — Added configurable recovery options for engine, BT, and Extension API ports.
  - Thunder link decoding — Decode Thunder links before sending tasks to the engine.
  🛠 Improvements
  - Updated README and website copy for the Aria2 Next engine.
  - Improved protocol association guidance and Advanced Settings navigation.
  - Refined ED2K search button animation and status feedback.
  - Reworked cleanup preferences into individual toggle switches.
  - Improved locale coverage and error messages.
  - Added Windows signing workflow and updater JSON refresh automation.
  - Improved release asset handling, signing JSON writing, and public signature extraction.
  - Removed outdated Aria2 Next binary refresh tests.
  🐛 Bug Fixes
  - Fixed fresh-install database schema version handling and added regression coverage.
  - Fixed repeated Extension API port auto-switching during engine restarts.
  - Fixed engine restart port reconciliation so Motrix Next does not treat its own Extension API listener as an external conflict.
  - Fixed release resolution logic and Windows signing workflow edge cases.
  - Fixed protocol association dialog copy and destination.
  - Fixed Thunder links being passed to aria2 before decoding.
