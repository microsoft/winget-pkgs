ReleaseNotes: |-
  What's Changed
  Motrix Next v3.9.6 graduates the 3.9.6 beta line to stable with improvements across download input compatibility, clipboard auto-detection, BitTorrent networking, task display, file category matching, and desktop integration behavior.
  ✨ New Features
  - Clipboard management — App-owned copy actions no longer trigger the Add Task auto-detect popup.
  - aria2 input compatibility — Multi-line aria2-style task input is supported for URLs with per-task options such as out=.
  - BitTorrent IPv6 DHT — Added IPv6 DHT support and related configuration.
  - File category URL patterns — File category rules can match URL patterns with validation and localized hints.
  - Task status tags — Added clearer waiting and sharing states for task cards.
  - Download event bridge — Added an aria2 WebSocket event bridge for faster download notifications.
  🛠 Improvements
  - Improved task list transitions and preserved task state during tab switches.
  - Kept RPC origin access enabled for local integrations.
  - Restored AppImage stripping in release builds after beta validation.
  - Added localized preference guidance across supported languages.
