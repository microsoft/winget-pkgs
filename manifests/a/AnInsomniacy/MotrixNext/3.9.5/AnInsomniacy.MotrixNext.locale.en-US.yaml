ReleaseNotes: |-
  What's Changed
  Motrix Next 3.9.5 promotes the beta series to a stable release, with task-detail performance work, task-list pagination, safer local RPC defaults, refreshed Aria2 Next binaries, tray icon stability fixes, UPnP compatibility improvements, and clearer contributor templates.
  ✨ New Features
  - Task details — Split heavy detail views and improved large-content handling for sources, files, peers, trackers, and activity.
  - Task pagination — Added native pagination controls with configurable page size for large task lists.
  - Remote access setting — Added an explicit setting for allowing remote engine RPC access, disabled by default.
  - ED2K search state — Added session-scoped search state management.
  🛠 Improvements
  - Updated bundled Aria2 Next engine binaries for multiple desktop architectures.
  - Improved technical text wrapping for task cards and related UI text.
  - Adjusted task pagination control positioning and visual styling.
  - Improved issue and PR templates for clearer reports and review requirements.
  - Updated hardware rendering descriptions in localization files.
  - Improved ESLint, Prettier, pnpm, and signing workflow configuration.
  🐛 Bug Fixes
  - Fixed Windows DNS behavior through the updated Aria2 Next engine.
  - Fixed local Aria2 RPC client behavior so it ignores system proxy settings.
  - Fixed macOS tray icon refresh behavior and template handling.
  - Fixed UPnP port mapping behavior for gateways that require permanent leases.
  - Fixed task pagination page count and transition behavior.
