ReleaseNotes: |-
  What's Changed
  This release improves BitTorrent post-download cleanup, adds safeguards for advanced settings, and modernizes Linux build dependencies.
  ✨ New Features
  - Move to Trash — Completed .torrent source files are now moved to the system trash instead of permanently deleted, with a toast notification on success
  - High Connection Warning — Setting more than 64 connections per server now shows a confirmation dialog explaining potential risks
  🛠 Improvements
  - ESLint Architecture Guards — Replaced custom Vitest line-count tests with standard ESLint max-lines and max-lines-per-function rules for uniform enforcement across all files
  - Linux Dependency Update — Migrated CI from deprecated libappindicator3-dev to libayatana-appindicator3-dev, matching Tauri 2 official prerequisites
  - Race Condition Fix — Torrent source path tracking now uses infoHash instead of gid, preventing path loss when small torrents complete before GID assignment
