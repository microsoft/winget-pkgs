ReleaseNotes: |-
  New Features
  Section titled “New Features”
  - Create User - Display Name Format: New dropdown to control the display name and AD Name (CN) format independently from the logon name format
  - Scheduled Tasks - Domain Health Check: Domain controller selection added to the schedule dialog, with a Discover button to auto-populate available DCs
  Improvements
  Section titled “Improvements”
  - Create User - Label clarity: “Name Format” label renamed to “User Logon Name (sAMAccountName)”
  - Create User - UPN Format: “Same as Name Format” option renamed to “Same as Logon Name”
  - Create User - Group error logging: Group membership failures now log the group name and AD extended error message for easier diagnosis
  Bug Fixes
  Section titled “Bug Fixes”
  - Scheduled Tasks - Inactive Accounts / Disable Accounts: Multiple OU selections from the browse button were not being saved
  - Soon to Expire Passwords report: Password Expiry Date column was sorting alphabetically instead of by date
