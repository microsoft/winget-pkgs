ReleaseNotes: |-
  Improvements
  Section titled “Improvements”
  - Multi-OU selection now works across all scanning tools.
  - Scan tools now skip disabled and non-Windows computers.
  - CN is now selectable as its own attribute in the Report Builder and the built-in column pickers, separate from Name.
  - Object type icons in the OU, Group, and User browse dialogs.
  Bug Fixes
  Section titled “Bug Fixes”
  - “User cannot change password” now reads and saves correctly in Modify User and Bulk Update Users.
  - Scheduled reports can save to a mapped drive again. The path is converted to a UNC path and the task credentials are used for the write.
  - NTFS Permissions filters now apply to Tree and Split views, not just the grid.
  - Report Builder conditions using “is not Never” on date fields no longer return an empty report.
  - Scheduled Tools > Update Users now shows the custom AD credentials option.
  - AD Cleanup filters can now match blank values.
  - Modify User fields no longer stretch when the text is longer than the box.
  - The license key is now masked on the License page.
