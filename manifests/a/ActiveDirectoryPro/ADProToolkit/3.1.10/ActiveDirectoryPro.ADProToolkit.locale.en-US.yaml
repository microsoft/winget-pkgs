ReleaseNotes: |-
  New Features
  Section titled “New Features”
  - True Last Logon Computers Report - New report under Reports → Computers that queries all domain controllers to determine the most accurate last logon time for each computer. Includes per-DC breakdown toggle, filtering by logon age, status, and machine type.
  Bug Fixes
  Section titled “Bug Fixes”
  - Bulk Update Users - Case change not shown in preview - Changing only the capitalization of a field (e.g. MRoberts@activedirectorypro.com → mroberts@activedirectorypro.com) was not appearing in the preview but was being applied on update. Preview now correctly detects case-only changes.
  - Maximize display issue - On Windows 11, maximizing the app caused other windows to show through the title bar area. Fixed by removing the DWM frame conflict with the custom window chrome.
