ReleaseNotes: |-
  v0.4.1 - The Precision Polish Update
  Released: 2026-04-12
  HalalDL v0.4.1 is a focused polish release shaped by real user feedback. It tightens daily download flow, makes finished results more informative, fixes settings persistence, and adds more control over preset-based filenames.
  Thank you to @Coll147 for opening the reports that directly shaped this release:
  - #5 - Configure filename variables in presets
  - #6 - Improve quick panel usability
  - #7 - Some settings are not saved
  HalalDL 0.4.1 hero - light
  HalalDL 0.4.1 hero - dark
  Community-Reported Fixes
  Preset filename templates - fixes #5
  @Coll147 asked for filename variables to be configurable directly inside presets, instead of only as a per-download option.
  - Custom presets can now include their own filename template.
  - Preset naming works without repeating the same template every time you download.
  - Templates that omit %(ext)s are made safe automatically so downloaded files keep a proper extension.
  - The filename handling applies across the regular yt-dlp path and the Instagram fallback path.
  Preset filename templates - light
  Preset filename templates - dark
  Cleaner quick downloads - fixes #6
  @Coll147 pointed out that the quick panel had too much repeated information and could push the download action out of reach on smaller screens.
  - The quick panel is now more compact.
  - Save location, start mode, subtitles, and preset details are summarized instead of repeated loudly.
  - The main download action stays easier to reach.
  - Keyboard-first quick downloads are smoother, especially on compact Windows layouts.
  Compact quick panel - light
  Compact quick panel - dark
  Settings now stay saved - fixes #7
  @Coll147 reported that some settings could revert after leaving Settings, including tray left-click and tray double-click behavior.
  - Settings now commit automatically when changed.
  - Tray click behavior persists after navigating away and reopening Settings.
  - The Settings screen no longer depends on draft state that can be lost during navigation.
  - Existing settings still carry forward normally.
  Settings persistence fix - light
  Settings persistence fix - dark
  More Improvements
  Better finished download cards
  - Finished downloads now show total output size directly on the card.
  - Multi-output jobs, such as videos with subtitle sidecars, total their output size instead of only showing one file.
  - Video and audio jobs can show media duration when metadata is available.
  - Image-only downloads stay clean and do not show fake timeline details.
  Download details - light
  Download details - dark
  Clip download mode
  - Timed media downloads can now use optional clip start and end values.
  - Time input supports seconds, mm:ss, and hh:mm:ss.
  - Invalid clip ranges are blocked before starting a job.
  - Clip controls stay out of the way for image-only downloads.
  Better latest-result spotlight
  - Notification-routed results now get a finite glow animation.
  - The newest finished result gets a subtle latest marker.
  - Older opened results no longer pretend to be the newest result.
  Latest result spotlight - light
  Latest result spotlight - dark
  Fixes & Cleanup
  - Fixed settings persistence for behavior controls, including tray click settings.
  - Fixed extensionless output risk when filename templates do not include %(ext)s.
  - Tightened quick-download layout and reduced repeated metadata.
  - Added total output size and media duration display for finished results.
  - Improved latest-result attention routing from notifications.
  - Cleaned up React hook lint issues in the attention/spotlight paths.
  - Removed a leftover startup console log.
  Choosing Your Version
  - Full (Recommended): Best for most users. HalalDL manages its local tool bundle for you.
  - Lite: Best for power users who prefer to manage tools such as yt-dlp and FFmpeg themselves.
  Known Notes
  - Clip mode depends on yt-dlp download-section behavior, so exact cut behavior can depend on the source, format, and available tooling.
  - Duration appears when HalalDL can get reliable media metadata. Some sources may not expose it.
  - Release images include dedicated light and dark variants.
  Upgrade Notes
  - Existing settings, presets, downloads, and history should carry forward normally.
  - If tray behavior previously reverted for you, set it once after updating to v0.4.1 and it should persist.
  - Custom preset filename templates do not require %(ext)s; HalalDL adds the extension token when needed.
  Note from the Developer
  This release is small by version number, but it lands exactly where daily use was getting rough. Thanks again to @Coll147 for the clear reports in #5, #6, and #7. That kind of feedback makes HalalDL better in the places people actually touch.
  Full Changelog: v0.4.0...v0.4.1
  Built with ❤️ using Tauri, React, and Rust.
