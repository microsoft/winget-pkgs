ShortDescription: A Windows 'which' command that locates executables on the PATH.
Description: which is a Windows implementation of the Unix which command. It scans every directory on the PATH and reports matching executables, honoring PATHEXT so extensionless queries match .exe, .cmd, .bat, and .com. By default it prints the first match; pass -a/--all to list every instance. Output is color-coded.
