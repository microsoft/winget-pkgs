ReleaseNotes: |-
  Znote 4.2.2
  Small bugfix.
  - 🩹 No more content loss on a fresh note: pasting into a just-created note and switching away immediately could lose the pasted content — every edit is now reliably saved, including a single paste right after creation.
  - 💾 Edits survive a quick quit: a change made in the very last second before closing the app is now flushed to disk.
  - 🔄 Sync-friendly closes: closing Znote no longer rewrites the active note when nothing changed — sync tools (iCloud, git, Obsidian Sync…) stop seeing a phantom modification on every close.
  - 🔗 "Reveal in Treeview" works on linked files: it now expands the "Linked files" group and highlights the file.
