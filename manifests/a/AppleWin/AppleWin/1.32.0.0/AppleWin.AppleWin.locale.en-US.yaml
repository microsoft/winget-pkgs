ReleaseNotes: |-
  Note: AppleWin-x64.exe is now full release.
  - [Change #853] Improve the Configuration GUI
    - Add a new "Slots" configuration page so that each slot can have any card inserted.
      - Some cards have an extra configuration page to support specific card configuration.
      - Add a 'Reset to Default' to just reset the slots to their default card or empty state.
    - Add a 'Reset all to Default' on the main configuration page.
    - Add 'No-Slot clock' checkbox to the "Advanced" configuration page.
    - Remove the "Sound" and "Disk" configuration pages.
    - Update AppleWin.chm help doc.
      - [PR #1478] Help: Fix scroll lock's link to configuration help. [@xotmatrix]
  - [Change #1449] Rename references of Apple II+ to Apple II Plus (and related).
  - [Change #1467] Update to zlib-1.3.2. [@kiyolee]
  - [Change] Mockingboard/Phasor: default to SSI263AP in socket-1 and socket-0 empty.
  - [Bug #1382] Debugger: follow target uses wrong address for DA.
  - [Bug #1425] AppleWin very slow to start due to CSuperSerialCard::ScanCOMPorts().
  - [Bug #1433] Disk II: read write-protect to detect presence of disk in drive.
  - [Bug #1443] PAL Color TV video mode should kill color-burst for longer.
  - [Bug #1456] Debugger: right arrow doesn't follow RTS & RTI.
  - [Bug #1457] Debugger: doesn't show stack wrap around address in info window.
  - [Bug #1460] Debugger: Ctrl-Right Arrow doesn't update targets.
  - [Bug #1469] Fix edge case when formatting a 32 MB ProDOS volume from right-button context menu.
  - [Bug #1482] Fix regression for loading .apl image files.
  - [Bug #1444] Disk II: Improve when track is written back to floppy image file (also for motor off & power-cycle).
  - [Bug #1451] Debugger: right-arrow not correct for some relative branch opcode targets.
  - [Bug #1486] Fix clash with CUI & new Config GUI for Saturn card after a restart.
  - [Bug #1491] CUI: Fix odd behaviour of inserting disks & specifying empty slots.
  - [Bug #1495] Fix issue with multiple LC or Saturn cards (and power-cycle now reset LC's WRTCOUNT).
  - [Bug #1499] Fix save-state issue when image file includes the '#' character (regression at 1.30.20.0).
ReleaseNotesUrl: https://github.com/AppleWin/AppleWin/releases/tag/v1.32.0.0
