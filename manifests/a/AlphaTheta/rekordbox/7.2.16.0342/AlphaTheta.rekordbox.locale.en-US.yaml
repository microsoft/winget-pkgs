ShortDescription: A DJ software that enables a comfortable DJ workflow with AI, cloud, and automation tech. Supporting multiple music streaming services.
Description: rekordbox is composite software that manages music files and DJ performances. With this music management software, you can manage music files in computers and mobile devices (this includes analysis, changing settings, creating files, and saving playback histories). It allows you to produce great DJ performances by combining music files managed by rekordbox and DJ equipment.
