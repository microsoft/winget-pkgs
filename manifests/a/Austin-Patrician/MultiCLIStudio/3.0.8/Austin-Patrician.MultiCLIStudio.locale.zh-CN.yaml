Description: |-
  Multi CLI Studio 是一个基于 Tauri 的桌面工作台，面向那些不想被单一 AI 编码 CLI 或单一模型厂商绑定的用户。
  它把这些能力放进同一个本地桌面工作区里：
  - Codex、Claude、Gemini 的 CLI 工作流
  - OpenAI Compatible、Claude、Gemini 的 Provider 模型对话
  - 本地自动化任务与工作流
  - 终端、对话、自动化共享的本地状态
