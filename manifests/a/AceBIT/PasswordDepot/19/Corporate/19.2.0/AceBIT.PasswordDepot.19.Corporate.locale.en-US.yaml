Description: Password Depot is a powerful, technically mature, and, most importantly, secure application for managing your passwords and access data. Unlike conventional freeware and shareware utilities, Password Depot provides sophisticated security mechanisms and a well-conceived, wide range of functions. It was developed for operation in professional environments with strict security standards.
