ReleaseNotes: |-
  - New databases now use AES-GCM authenticated encryption by default via Windows CNG. The classic AES-CBC mode remains available, and existing databases continue to open unchanged.
  - The password and passphrase generators now draw every generated character and word from a cryptographically secure random source via Windows CNG, providing stronger and unbiased results.
  - Creating an entry type that is not allowed by the database policy is now blocked.
  - Server databases now refresh automatically when the connection returns to online mode after being offline.
  - Fixed an issue where offline changes were not sent to the server correctly if the database remained open during connection and disconnection events.
  - Fixed an issue where the password generator could occasionally fail or stall with certain character-set options.
  - Added import from Microsoft Edge Password Manager CSV files.
  - Refreshed the user interface with a modernized design, new scalable SVG icon sets, and built-in Light and Dark themes.
  - Restored the “Show database selector” option for the top bar.
  - Improved report printing: fixed blurry or incorrectly scaled text on HiDPI displays and printers, and increased line spacing for better readability.
  - Fixed several other minor issues.
