ShortDescription: The Visual Controls software supports design and specification with Acuity Controls. You can quickly determine device quantities for a budgetary bid and generate a comprehensive professional submittal.
Description: |-
  The Visual Controls software supports design and specification with Acuity Controls. You can quickly determine device quantities for a budgetary bid and generate a comprehensive professional submittal.
  - Import PDF/DWG or background images
  - Decrease design time importing from Visual Lighting software
  - Searchable product database with quick access to Acuity products
  - Intelligent wire connections between devices
  - Automate SOO generation based on devices in the room
  - Automate Riser generation based on your design
  - Reduce errors with design auditing
  - Work with multiple designs in one project file
  - Customize output to your design requirements
