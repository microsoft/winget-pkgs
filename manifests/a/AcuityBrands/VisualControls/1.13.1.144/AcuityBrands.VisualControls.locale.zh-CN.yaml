ShortDescription: Visual Controls 软件支持使用 Acuity Controls 进行设计和规范制定。您可以快速确定初步投标所需的设备数量，并生成全面且专业的提交文件。
Description: |-
  Visual Controls 软件支持使用 Acuity Controls 进行设计和规范制定。您可以快速确定初步投标所需的设备数量，并生成全面且专业的提交文件。
  - 导入 PDF/DWG 或背景图像
  - 通过从 Visual Lighting 软件导入来缩短设计时间
  - 可搜索的产品数据库，快速获取 Acuity 产品
  - 设备间智能布线连接
  - 根据空间内的设备自动生成控制逻辑说明 (SOO)
  - 根据您的设计自动生成系统立面图 (Riser)
  - 通过设计审核减少错误
  - 在一个项目文件中处理多个设计方案
  - 根据您的设计要求定制输出内容
