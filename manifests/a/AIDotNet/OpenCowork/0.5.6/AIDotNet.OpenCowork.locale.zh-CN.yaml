ShortDescription: 开源桌面平台，专为多智能体协作打造。通过本地工具、并行团队协作以及无缝的工作场所集成，赋能 AI 智能体。
Description: |-
  传统的 LLM 界面往往是“与环境隔离的孤岛”。开发者不得不将 50% 的时间耗费在聊天窗口与 IDE 之间复制粘贴代码、终端日志和文件内容。
  OpenCowork 通过以下方式解决这一痛点：
  - 本地智能体能力：经您授权，智能体可直接读写文件并执行 Shell 命令。
  - 上下文感知：无需再手动提供上下文，智能体可自主探索您的代码库和日志。
  - 任务编排：复杂任务（例如“重构此模块并更新测试”）会被拆解并由专门的子智能体协同处理。
  - 人在回路：通过透明的工具调用审批机制，让您始终掌控全局。
