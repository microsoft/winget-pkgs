ShortDescription: 在系统上引导 conda 的最简单方法。仅包含 conda 及其依赖项。
Description: Miniconda 是一款免费的用于 conda 的最小安装程序。它是 Anaconda 的一个小型引导版本，只包含 conda、Python 及其依赖，以及少量其它有用的软件包（如 pip、zlib 和其它一些软件包）。如果需要更多软件包，可以使用 conda install 命令从 Anaconda 公共软件仓库中的数千个包中安装，或者从 conda-forge 或 bioconda 等其它渠道安装。
