ReleaseNotes: |-
  Available Python versions: 3.13.13, 3.12.13, 3.11.15, 3.10.20

  User-facing changes
  - conda has been updated to v26.3.2. See the conda blog post for highlights about the conda 26.3.x releases.
  - Updated the macOS PKG installer error message that appears when the target install directory already exists. The error message now includes a link to the uninstall instructions.
  - The option to choose an install location has been removed from the macOS PKG installers for this release due to a bug with macOS Tahoe (version 26).

  Docker
  - The continuum.io Docker images have been deprecated. They are now published in the anaconda repository instead.
  - Unnecessary system dependencies have been removed from the Docker images to reduce their overall size by about 40%.

  Bug fixes
  - The ~/.anaconda directory is now deleted when you choose to remove user data during uninstallation.
  - Fixed an issue where macOS PKG installers would fail when file ownership in $HOME could not be changed.
