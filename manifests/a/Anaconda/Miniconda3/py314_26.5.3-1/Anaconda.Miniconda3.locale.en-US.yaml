ReleaseNotes: |-
  Available Python versions: 3.14.6, 3.13.14, 3.12.13, 3.11.15, 3.10.20

  User-facing changes
  - conda has been updated to v26.5.3. See the conda blog post for highlights about the conda 26.5.x releases.
  - Miniconda now provides a Python 3.14 variant. This is the default Python version.
  - This release includes the anaconda-channel-guide plugin, which notifies users when packages not found in their configured channels are available through other Anaconda channels, including the new main-x channel.
  - EXE installers now employ more reliable checks to avoid extraction errors if the path is too long. Users are now prompted to choose a shorter path before the installation starts.
  - Each installation now contains an .installer.info file with information about the Miniconda installer to simplify diagnostics.

  Bug fixes
  - Fixed a bug for EXE installers that caused package extraction to fail with Windows Defender Application Control.
