ShortDescription: Rule-driven Input Method Status Manager · Instant · Powerful · Productive
Description: |
  An instant, powerful, and productive rule-driven input method status manager.
  1. Status Tip: Out-of-the-box support for Chinese, English, Japanese, Korean, and CapsLock, leveraging multiple highly customizable visual schemes such as Mouse Cursor, Overlay Popup, Caret Symbol, Mouse Symbol, and Window Border.
  2. Rule Scheduling: Integrates window/hotkey rules with text/hotkey monitoring to continuously evaluate active contexts, precisely executing defined action workflows—such as status switching, keyboard layout switching, dynamic hotkey registration, and window pinning—upon matching predefined rules.
  Written in AutoHotkey, it guarantees instant responsiveness without capturing window focus, delivering a fully automated, friction-free typing experience for multilingual power users.
