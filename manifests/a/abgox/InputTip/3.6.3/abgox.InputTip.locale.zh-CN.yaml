ShortDescription: 规则驱动的输入法状态管理器 · 即时 · 强大 · 高效
Description: |
  一个即时、强大、高效的，规则驱动的输入法状态管理器。
  1. 状态提示：支持中、英、日、韩及大写锁定，提供鼠标样式、悬浮小窗、光标符号、鼠标符号、窗口边框等多种高度可定制的视觉方案。
  2. 规则调度：集成窗口/热键规则与文本/热键监控，持续检测当前窗口和热键上下文，命中预设规则后精准执行特定的行为调度，如状态切换、键盘切换、热键动态注册、窗口置顶等。
  软件使用 AutoHotkey 编写，响应即时且不抢占焦点，为多语言开发者与文字工作者打造全自动、零干扰的纯净输入体验。
