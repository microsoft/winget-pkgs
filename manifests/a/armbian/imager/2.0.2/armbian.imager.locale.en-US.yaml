ReleaseNotes: |-
  Armbian Imager 2.0.2 can flash to a UFS module, not just an SD card.

  ## Flash to a UFS module

  Some Qualcomm boards, like the Radxa Dragon Q6A, can take a UFS module for storage. Now you can
  write to it from the app itself, without opening a terminal.

  Attach the UFS module and put the board into download mode. The app tells you how, a button on the
  Q6A, a jumper on other boards. Then pick a UFS image the way you would pick any other, and Armbian
  Imager writes it straight to the module over USB. If the module is fresh and has never been set up,
  the app sets it up for you on the first flash, so even a blank one just works.

  First-boot profiles come along for the ride. Set your user, SSH key, Wi-Fi and locale once, and the
  board boots already configured, the same as it does from an SD card. The SD card still works exactly
  like before, this just adds the UFS module as a target.

  ## Also in this release

  - Flash failures now tell you what actually went wrong instead of leaving you on a blank screen
  - The first-boot profile picker updates the moment you add or edit a profile
  - Dependency updates

  ## What's Changed

  - Surface flash write failures instead of a blank error screen by @SuperKali in #150
  - Update build dependencies by @dependabot in #152
  - Update js-yaml by @dependabot in #155
  - Keep the flash profile picker in sync with Settings by @SuperKali in #156
  - Flash UFS images to Qualcomm boards over EDL by @SuperKali in #158
