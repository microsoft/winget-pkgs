ShortDescription: Free open-source YouTube downloader (GUI for yt-dlp) for Windows, macOS, Linux. 4K, 1080p60, HDR, Shorts. No ads, no tracking, no cookies, no login. Available in 9 languages.
Description: 'Arroxy is a free, open-source desktop GUI for yt-dlp that downloads YouTube videos in full quality — up to 4K, 1080p60, HDR, including Shorts. It runs entirely on your machine: no ads, no tracking, no telemetry, and no Google account, login, or browser cookies are ever required, so there is zero risk of YouTube account bans from cookie-based automation. The app exposes yt-dlp''s format selection, container choice, subtitle download, and download queue through a simple wizard-style interface. It is built on Electron and works on Windows, macOS, and Linux, with the interface available in nine languages: English, Spanish, German, French, Japanese, Chinese, Russian, Ukrainian, and Hindi.'
