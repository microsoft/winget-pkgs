ShortDescription: Quick reactions for Microsoft Teams meetings using global keyboard shortcuts.
Description: >-
  Heart It is a Windows desktop application that sends reactions in Microsoft Teams meetings
  via global hotkeys. It runs in the system tray and supports Like, Love, Applause, Laugh,
  and Surprised reactions using Ctrl+Alt+1 through Ctrl+Alt+5. The app uses Windows UI
  Automation to interact with Teams, so it works without switching windows.
