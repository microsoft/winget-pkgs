ShortDescription: 一款专为职场打造的 AI 助手，将问题转化为答案，将答案转化为行动，将行动转化为成果——助力您和您的整个团队。
Description: |-
  你的工作分散在几十个工具中——Slack、Microsoft Outlook、Salesforce、桌面上的电子表格以及 Gmail 中的邮件。Quick 是一款连接所有这些工具的 AI 办公助手，它能学习对你重要的内容，并代表你采取行动。几分钟即可完成设置。到今天结束时，你会惊讶于以前没有它时是如何工作的。

  将碎片化信息转化为完整的交付成果
  你的电脑里有一份电子表格，Slack 频道里有最新的数据，邮箱里还有经理的反馈。让 Quick 把这些内容整合到 Microsoft Word 文档、Excel 模型或演示文稿中。过去需要一个下午反复复制粘贴的工作，现在只需一次对话即可完成。

  告别从零开始
  Quick 记得你的项目、联系人和最近的对话，因此当你要求它进行总结或撰写跟进邮件时，它已经掌握了背景信息。无需重新开始，无需填补信息差。只需从你上次离开的地方继续。

  一个 AI 助手，连接你所使用的一切
  支持任何文件、任何应用、任何设备
  Amazon Quick 同时连接你电脑上的文件、电子邮件（Microsoft Outlook 或 Gmail）、团队聊天工具（Slack 或 Microsoft Teams）、CRM 系统以及数据库。只需提出问题，Quick 就能从任何存放数据的地方提取答案。无需上传，无需切换应用。
  在一天开始前掌握核心要点
  Amazon Quick 在后台运行，跨工具监控你的日历、电子邮件和消息。它会主动呈现你需要的会议准备资料、你错过的跟进事项以及你尚未察觉的日程冲突。你无需检查五个不同的工具，Quick 已经为你处理好了。
  对工作的理解日趋深入，越用越聪明
  Amazon Quick 会构建一个涵盖你的联系人、项目以及跨工具、对话和文件的个人知识图谱。它不局限于单一供应商的生态环境。你使用得越多，需要向它解释的就越少。由于它构建于 AWS 之上，这些理解内容对你个人是私密的，并符合你所在组织信任的企业级安全标准。
