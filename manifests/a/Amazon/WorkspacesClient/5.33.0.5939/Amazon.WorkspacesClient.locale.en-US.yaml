ReleaseNotes: |-
  - [Windows] Fixed an issue that prevented logging in via SAML 2.0 when the client was launched with Administrator privileges.
  - [Windows] Fixed an issue that prevented transferring files with multibyte file names (common for some non-English languages).
  - [macOS] Fixed an application crash that occurred when using a YubiKey for signing under certain conditions.
  - [macOS] Fixed an issue that prevented connecting to a WorkSpace via custom proxy when credentials are not stored locally.
  - [Windows and macOS] Added support for URL redirection, enabling administrators to configure certain websites to be redirected from the streaming session to the local device's web browser.
  - [Windows and macOS] Added the display of battery level from the local device inside the streaming session, helping you know when your battery is running low when on-the-go.
  - [Windows and macOS] Fixed an issue with the username not being pre-populated in the new user login flow when “Remember me” is selected.
  - [Windows and macOS] Fixed an issue that prevented changing the registration code when there is no network connectivity.
  - [Windows and macOS] Updated the DCV SDK.
  - [Windows and macOS] Additional bug fixes and enhancements.
