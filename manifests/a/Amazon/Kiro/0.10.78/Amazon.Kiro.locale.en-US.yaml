ReleaseNotes: |-
  This patch adds a context usage banner and fixes chat reliability issues including session history loss, supervised mode and more.
  Improvements
  - Context usage: Kiro now shows a breakdown of context usage so you can see what's consuming your model's context window. A warning appears when any single category (such as MCP tools or steering files) exceeds 30% of available context. The estimate is model-aware and updates in real time as MCP servers connect.
  - Terminal focus control: The terminal panel no longer steals focus when the agent runs commands
  Fixes
  - Fixed session history loss on window reload and when closing multiple windows
  - Applied a critical Chromium security patch (CVE-2026-2441)
  - Fixed a race condition with supervised mode silently falling back to autopilot
  - Fixed the spec explorer not refreshing when a new spec is created
  - Fixed the show terminal option for long-running processes
  - Standardized bugfix spec documents terminology (Fault Condition --> Bug Condition)
  - Fixed subagents skipping spec tasks or marking them complete prematurely
  - Fixed context selection shortcuts. Cmd+Shift+L (Ctrl+Shift+L on Windows/Linux) now correctly adds selected content to a new session, while Cmd+L (Ctrl+L) adds it to the active chat.
