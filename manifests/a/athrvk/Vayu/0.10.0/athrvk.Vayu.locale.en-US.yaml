ReleaseNotes: A UI and consistency release. Rebuilt welcome screen as a split launcher, OAuth 2.0 in the collection Auth tab, per-request redirect policy (followRedirects / maxRedirects), ramp-up from a chosen concurrency, two new accent schemes, and broad keyboard operability. Fixes across header bulk-edit, the Cookies tab, restored tabs on cold start, and dark-mode form fields. Almost entirely app-side; the engine is unchanged apart from formatting.
