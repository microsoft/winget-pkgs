Description: |-
  桌面连接器可无缝集成到您的设备中，轻松实现本地文件与云端文件的同步、管理和访问。它能够保留文件之间的关联和引用关系，确保设计完整性并减少错误。使用桌面连接器，您可以：
  - 直观查看复杂的文件引用关系
  - 保持项目信息实时更新
  - 简化团队间的协作流程
