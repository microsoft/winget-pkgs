PublisherUrl: https://www.autodesk.com.cn/
PublisherSupportUrl: https://www.autodesk.com.cn/support
License: 专有软件
ShortDescription: 一款桌面应用程序，通过将文件同步到云端并理解设计文件之间的关系，从而简化文件管理。
Description: |-
  桌面连接器可无缝集成到您的设备中，轻松实现本地文件与云端文件的同步、管理和访问。它能够保留文件之间的关联和引用关系，确保设计完整性并减少错误。使用桌面连接器，您可以：
  - 直观查看复杂的文件引用关系
  - 保持项目信息实时更新
  - 简化团队间的协作流程
ReleaseNotes: |-
  重要信息：
  如果您是从早期主要版本升级（例如，17.x 升级到 2027.x），我们建议您运行重置实用程序，进行卸载，然后重新安装。对于次要版本升级，可以就地升级。有关完整的说明，请参见更新 Desktop Connector。

  新特性
  - 现在支持 Forma Document Management Essentials：Desktop Connector v2027.0 及更高版本完全支持 Forma Document Management Essentials，使您可以直接从桌面管理文件。详细了解 Forma Document Management Essentials。
  增强的用户体验
  - 对无法访问产品的用户有帮助的主屏幕：现在，如果您没有所需的授权，或者无权访问任何项目，则登录后，Desktop Connector 会显示一个专用主屏幕，说明为什么没有连接的驱动器可用，而不是显示空白屏幕。对于没有授权或没有可用项目的用户，“选择项目”对话框也不会再意外显示。详细了解连接的驱动器和访问要求。
  - 从文件资源管理器复制可共享的 Web 链接：现在，可以在文件资源管理器中的文件、文件夹或项目上单击鼠标右键，然后选择“复制 Web 链接”，以将可共享链接复制到其在 Forma 或 Fusion 中的联机位置。该链接遵循现有的联机权限，因此具有访问权限的收件人可以直接在 Web 中打开它。
  - 有关锁定文件的错误消息更清晰：现在，当您尝试移动、重命名或删除被其他用户锁定的文件时，Desktop Connector 会显示一条指示文件已锁定的特定消息，而不是显示一般错误。这使用户可以更轻松地了解操作失败的原因，以及下一步该做什么。
  诊断改进
  - 自动详细日志记录：Desktop Connector 现在会自动维护滚动详细日志，因此在您需要支持时，诊断信息始终可用。最多可存储 100MB 的日志数据（在典型使用情况下约为 1-2 周），并且会自动删除较旧的日志以管理磁盘空间。在重现问题之前，不再需要手动启用详细日志记录功能。
  文件类型支持更新
  现在，Desktop Connector 支持为其他应用程序自动锁定文件。文件打开时会自动锁定，并在关闭时解锁，从而防止多个用户使用同一文件时发生冲突。新支持的应用程序包括：
  - Adobe InDesign：InDesign 文件 (.indd)
  - Bentley OpenRoads/MicroStation：图纸索引文件 (.dgnsi) 和工作集文件 (.dgnws)
  - Rhino：Rhino 文件 (.3dm)。请注意，Rhino 可能会自动从其最近使用列表中下载文件，即使您尚未将这些文件下载到计算机也是如此。
  - Trimble SketchUp：SketchUp 文件 (.skp)。备份文件 (.skb) 也会添加到排除列表中，并且不会上传到云。请注意，SketchUp 可能会自动从其最近使用列表中下载文件，即使您尚未将这些文件下载到计算机也是如此。
  错误修复和稳定性
  改进了稳定性
  - 修复了删除文件时发生崩溃的问题：解决了删除文件时可能发生崩溃的问题。
  - 修复了工作空间扫描期间发生崩溃的问题：解决了区分大小写的路径比较导致工作空间扫描仪发生崩溃的问题，该问题可能会导致扫描无法完成。
  - 修复了在使用空数据库的情况下启动时发生崩溃的问题：Desktop Connector 在遇到尚未完全初始化的固定期限的使用许可数据库时，不再发生崩溃。
  - 修复了启动崩溃：解决了在某些情况下可能导致 Desktop Connector 在启动时发生崩溃的问题。
  - 修复了因数据库损坏而发生崩溃的问题：当固定期限的使用许可数据库无效或损坏时，Desktop Connector 不再发生崩溃。现在，应用程序可以处理这些情况并继续运行。
  - 改进了扫描期间的长路径处理：现在，在扫描工作空间中的更改时，Desktop Connector 可以更好地处理路径很长的文件和文件夹，从而减少同步操作期间的错误。
  - 提高了安装程序安全性：现在，安装程序可以处理 AppData 中 Desktop Connector 文件夹权限受限的情况，从而防止因权限问题而导致的安装失败。
  同步可靠性
  - 修复了在 Forma 中更改文件名大小写时同步会失败的问题：现在，在 Forma 中重命名文件以仅更改其大小写（例如，“report.txt”更改为“Report.txt”）时，可以正确同步到本地工作空间。
  - 修复了涉及大小写更改的重命名操作：解决了对于涉及更改大小写（例如，“X”更改为“y”、“Y”更改为“z”、“Z”更改为“x”）的循环重命名多个文件或文件夹操作，可能因 Desktop Connector 未正确检测到重命名循环而失败的问题。
  - 修复了文件夹重组后扫描失败的问题：解决了在删除文件夹及其子文件夹，然后重新添加它们后，可能导致工作空间扫描卡住并阻止同步完成的问题。
  - 修复了 Forma 中受限制文件夹的误导性错误：当您尝试在仅具有查看权限的文件夹中移动、重命名或删除某个文件时，Desktop Connector 错误地报告不允许该文件的扩展名。现在，该错误可以正确指示权限不足。
