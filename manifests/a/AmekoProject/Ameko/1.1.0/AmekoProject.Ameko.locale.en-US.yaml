ReleaseNotes: |-
  ## New Features

  - Key Names & Terms (KNP) support in Project files
  - Partial or full language support for: English (GB), Polish, German, Spanish (LATAM), Vietnamese,
    and Chinese (Traditional)
  - Support ASS v4.00 and v4.00++
  - Scripting: New SDK for developing with IntelliSense and type hinting
  - Scripting: Call scripts from scripts
  - Scripting: Mutable Tag & Block API

  ## Fixes

  - Fixed broken dylibs on macOS
  - Fixed crash when using Styles Manager buttons
  - Fixed CPU compatibility build issue
  - Use correct encoding for spellcheck dictionaries
  - Force OpenAL on macOS to avoid memory leak (thanks @5fish!)
  - Fixed issue where frames might not be displayed when seeking while paused
  - Fixed issue where frames might not be displayed when playback ends
  - Added I/O permissions error handling
  - Fixed culture issues when writing files

  Huge thanks to everyone who's contributed to the localization efforts! If you're interested in
  helping out, head over to the Crowdin project page!

  You can submit bugs and feature requests to the issue tracker directly, or head over to the Discord
  server or discussions page for a conversation.

  I hope you continue to enjoy using Ameko!
