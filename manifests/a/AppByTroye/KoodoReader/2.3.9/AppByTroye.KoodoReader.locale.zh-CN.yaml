ReleaseNotes: |-
  新增
  - 支持导入本地字体和下载开源精选字体，请前往设置-字体管理
  - 高亮样式新增删除线和波浪线
  - 支持自定义听书和书中搜索时文字高亮样式，请前往设置-外观
  - 支持自定义快捷键用于翻页、记笔记、高亮等 20 多项操作，请前往设置-快捷键
  - 支持通过拖拽图书的方式，将图书添加到书架，我的喜爱和回收站
  - 新增火山引擎（豆包）TTS 语音插件
  - 新增 Merriam-Webster 词典插件
  - 新增仿真翻页动画，请在右侧阅读选项面板开启
  - 图片查看器支持连续浏览书中的所有图片
  - 剪藏的网页文章中的图片支持内嵌，将以 base64 格式保存在 HTML 文件中
  - AI 问书支持记忆和导出聊天记录
  - 支持搜索图书目录
  - 支持使用替换规则和删除规则对图书内容进行编辑，请前往设置-文本规则
  - 优化在线匹配图书封面和元数据的准确性
  - 新增保留 PDF 原始背景的选项，请在右侧阅读选项面板开启
  - 新增强制覆盖书中背景样式的选项，请前往设置-阅读
  - 支持通过图书详情中的所在书架跳转到该书架
  - 现在复制日文时将不再复制注音
  - 现在备份图书库功能迁移至设置-同步和备份中，软件顶部不再展示独立的入口
  - 支持自定义全文翻译（AI 百科）的目标语言
  - 免费用户支持使用 WebDAV, SFTP, FTP, S3 兼容和 Docker 备份和恢复图书库
  - 免费用户支持从 WebDAV, SFTP, FTP, S3 兼容导入图书
  - 支持代码高亮功能，请在右侧阅读选项面板中开启
  - 新增 20 个阅读主题色，请在右侧阅读选项面板中开启
  - 支持标记图书的阅读状态为已读和未读
  - 支持 PDF 裁边功能，请点击右上角的裁剪按钮
  -（移动版）支持跨页选择文字
  -（移动版）高亮样式新增删除线和波浪线
  -（移动版）图片查看器支持连续浏览书中的所有图片
  -（移动版）AI 问书支持记忆和导出聊天记录
  -（移动版）支持使用替换规则和删除规则对图书内容进行编辑
  -（移动版）优化在线匹配图书封面和元数据的准确性
  -（移动版）新增保留 PDF 原始背景的选项
  -（移动版）现在复制日文时将不再复制注音
  -（移动版）支持自定义全文翻译（AI 百科）的目标语言
  -（移动版）支持代码高亮功能
  -（移动版）支持 PDF 裁边功能
  -（移动版）新增 PDF 文字选择优化功能，用于修复安卓上选择 PDF 文字时的异常
  修复
  - 修复部分情况下生词释义功能开启失败的问题
  - 修复部分情况下开启以引用的方式导入图书之后，无法打开图书的问题
  - 修复部分图书不同段落文字重叠的问题
  - 修复剪藏的网页中的超链接跳转问题
  - 修复书中表格溢出到下一页的问题
  - 修复网页版中安装浏览器扩展之后无法使用 S3 兼容的问题
  - 修复全文翻译对部分段落不生效的问题
  - 修复书中代码被截断显示不全的问题
  -（移动版）修复部分图书不同段落文字重叠的问题
  -（移动版）修复书中表格溢出到下一页的问题
  -（移动版）修复全文翻译对部分段落不生效的问题
  -（移动版）修复代码被截断显示不全的问题
  -（移动版）修复中国区发送到 Kindle 的报错
  -（移动版）修复阅读页面中笔记，高亮，书签的排序问题
  -（移动版）修复听书时部分章节被跳过的问题
  Note
  此版本由于功能已经稳定，bug 也基本修复，被选为下个稳定版候选。如果您对此有任何顾虑，可以下载上一个稳定版.
  Tip
  我们还提供了高速下载镜像，您也可以从 自托管镜像 下载此版本的安装包
