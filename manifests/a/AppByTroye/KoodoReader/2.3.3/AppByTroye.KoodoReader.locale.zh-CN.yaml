ReleaseNotes: |-
  新增
  - 新增阅读统计功能，支持阅读时长热力图，柱状图，折线图等
  - 新增生词释义功能，开启之后将直接在文中生词旁展示释义，无需再手动查询，您可以根据自己的语言水平设置不同的生词级别，支持英语，日语和中文
  - 支持自定义文字菜单的选项
  - 支持选择文字之后问 AI 和从此开始朗读，需要您在文字菜单中手动开启
  - 书中搜索结果增加章节信息
  - 新增在书架名旁显示书架中图书数量的选项，请前往设置-外观
  - 阿里云盘支持秒传功能
  - 听书插件新增阿里云千问 TTS，Open AI TTS, ElevenLabs, Grok TTS, 智谱 TTS, MiMo TTS, Minimax TTS，需要您自行配置 API Key
  - Koodo Sync 数据默认将加密之后存储
  - OPDS 支持测试连接
  - 支持自定义图书的原始路径，请在图书上右键-编辑图书
  - 支持自定义 TXT 目录解析器，并给每本书单独设置
  - 支持对图书按文件大小排序
  - 网页版支持任意厂商的 WebDAV 和 S3 兼容服务，包括坚果云的 WebDAV，需要您额外安装我们的浏览器扩展
  - 优化官方 AI OCR 的识别速度
  - 优化部分未解析出目录的 TXT 的性能问题
  - 支持给每本书单独设置图书样式，不使用全局的样式，请在右侧阅读选项面板中启用
  - PDF 转文本支持给每本书单独设置
  - 支持置顶图书，请在图书上右键-置顶
  - 优化文中表格样式
