ReleaseNotes: |-
  亮点 🎖️
  我们所有的翻译、词典、听书插件已经正式开源，您可以根据我们提供的示例和教程编写自己的插件。仓库地址和插件教程：koodo-reader/plugins: Plugins list for Koodo Reader
  新增
  - 支持导出笔记高亮为 PDF 和 HTML 格式
  - 现在听书功能将在一个单独窗口中展示，并新增暂停，上一句，下一句功能，请点击图书右下角的听书按钮
  - 出于安全原因，默认禁用图书中的 JS 代码执行，您可以在右侧阅读选项面板中手动启用
  - 图书页眉新增当前时间和阅读进度
  - 新增 7 个应用主题色，并支持自定义应用主题色
  - 现在所有的翻译、词典、听书插件将内置在应用中，无需前往帮助文档获取
  - 新增书中搜索（Ctrl + F）和打开目录（Ctrl + B）的快捷键
  - 支持设置默认书架，打开应用之后将自动切换到该书架，请前往设置-通用
  - 支持文字竖排，请前往右侧阅读选项面板-文字方向
  - 新增板框功能，开启之后将在图书周围展示板框，请前往右侧阅读选项面板开启
  - 支持导出图书封面，请在图书上右键-更多操作
  - 新增启用连字符功能，请前往右侧阅读选项面板开启
  - 新增允许孤行和寡行功能，请前往右侧阅读选项面板开启
  - 新增 AI 百科功能，每次查词之后将在词典窗口中展示
  - 翻译插件新增 Deepl，Azure 翻译和 Amazon 翻译插件，需要您自行配置 API Key
  - 听书插件新增 Azure TTS 和 Amazon Polly，需要您自行配置 API Key
  - 当您在书中笔记上悬停鼠标时，将自动展示笔记的内容
  - AI 语音新增 559 个来自 Azure 的真人语音，支持的语言数量增加到 82 门，由于 Azure TTS 高昂的成本，使用 Azure TTS 的额度消耗速度是 Kokoro 82M 的 5 倍
  - 设置新增删除图书之后同时删除图书的原始文件，请前往设置-通用
  - 支持修改图书封面和描述，请在图书上右键-编辑图书
  - UI 细节优化
  -（移动版）AI 翻译支持的语言数量增加到 94 门
  -（移动版）现在下载精选字体后将自动应用，您无需手动设置
  -（移动版）支持文字竖排，请在阅读菜单的设置中开启
  -（移动版）新增启用连字符功能，请在阅读菜单的设置中开启
  -（移动版）新增允许孤行和寡行功能，请在阅读菜单的设置中开启
  -（移动版）新增 AI 百科功能，每次查词之后将在词典窗口中展示
  -（移动版）AI 语音新增 559 个来自 Azure 的真人语音，支持的语言数量增加到 82 门，由于 Azure TTS 高昂的成本，使用 Azure TTS 的额度消耗速度是 Kokoro 82M 的 5 倍
  修复
  - 修复 ChatTTS 等听书插件当音频生成时间较长时，出现重复发送单个句子的问题
  - 修复部分图书无法记录阅读进度的问题
  -（移动版）修复使用 Docker 作为数据源，添加图书之后同步报错的问题
  -（移动版）修复部分情况下使用兑换码之后，添加数据源报错的问题
  -（移动版）修复部分图书无法记录阅读进度的问题
  -（移动版）修复安卓上使用 Koodo Reader 作为图书打开方式之后的报错
  -（移动版）修复部分 Oppo 和 OnePlus 设备上听书功能闪退的问题
  -（移动版）修复使用手势退出阅读之后，不自动同步的问题
  -（移动版）修复 iOS 17 上 AI 语音无法使用的问题
  -（移动版）修复 iOS 26 上音量键翻页失效的问题
  -（移动版）修复已经下载的字体可以重复下载的问题
  [!NOTE]
  此版本由于功能已经稳定，bug 也基本修复，被选为下个稳定版候选。如果您对此有任何顾虑，可以下载上一个稳定版.
  [!TIP]
  我们还提供了高速下载镜像，您也可以从 自托管镜像 下载此版本的安装包
