ReleaseNotes: |-
  Highlights 🎖️
  All of our translation, dictionary, and TTS plugins are now officially open source. You can use the examples and tutorials we provide to develop your own plugins. Repository and plugin tutorials: koodo-reader/plugins: Plugins list for Koodo Reader
  New Features
  - Support for exporting highlights and notes to PDF and HTML formats
  - The TTS feature now opens in a separate window and includes new controls for pause, previous sentence, and next sentence. Click the TTS button in the bottom-right corner of the book
  - For security reasons, JavaScript execution within books is disabled by default. You can manually enable it in the reading options panel on the right
  - Added current time and reading progress to the book header
  - Added 7 app theme colors and support for custom app themes
  - All translation, dictionary, and TTS plugins are now built into the app; no need to access the documentation to obtain them
  - Added shortcut keys for searching within the book (Ctrl + F) and opening the table of contents (Ctrl + B)
  - Support for setting a default bookshelf; the app will automatically switch to this bookshelf upon launch. Go to Settings > General
  - Support for vertical text layout. Go to the Reading Options panel on the right > Text Direction
  - Added border feature. When enabled, a border will appear around the book. Go to the Reading Options panel on the right to enable it
  - Support for exporting book covers. Right-click on the book > More Actions
  - Added hyphenation feature. Go to the Reading Options panel on the right to enable it
  - Added “Allow Orphan and Widow Lines” feature. Go to the Reading Options panel on the right to enable it
  - Added AI Encyclopedia feature. Results will be displayed in the dictionary window after each lookup
  - Added Deepl, Azure Translation, and Amazon Translation plugins to the translation tools. You will need to configure your API key
  - Added Azure TTS and Amazon Polly to the TTS plugins. You will need to configure your API key
  - When you hover your mouse over a note in a book, the note’s content will automatically be displayed
  - AI Voice now includes 559 new human voices from Azure, increasing the number of supported languages to 91. Due to the high cost of Azure TTS, usage quotas are consumed 5 times faster than Kokoro 82M
  - Added an option in Settings to delete a book’s original file when deleting the book. Go to Settings > General
  - You can now edit book covers and descriptions. Right-click on the book and select “Edit Book”
  - UI detail optimizations
  - (Mobile) The number of languages supported by AI translation has increased to 90
  - (Mobile) Downloaded featured fonts are now automatically applied; no manual setup is required
  - (Mobile) For security reasons, JavaScript execution within books is disabled by default. To enable it, go to Settings in the Reading menu
  - (Mobile) Vertical text layout is now supported; enable it in the Settings under the Reading menu
  - (Mobile) A hyphenation feature has been added; enable it in the Settings under the Reading menu
  - (Mobile) A feature allowing orphaned and widowed lines has been added; enable it in the Settings under the Reading menu
  - (Mobile) An AI Encyclopedia feature has been added; results will be displayed in the dictionary window after each lookup
  - (Mobile) AI Text-to-Speech now includes 559 new human voices from Azure, increasing the number of supported languages to 82. Due to the high cost of Azure TTS, the rate at which Azure TTS quotas are consumed is 5 times that of Kokoro 82M.
  Fixes
  - Fixed an issue where TTS plugins like ChatTTS would repeatedly send a single sentence when audio generation took a long time.
  - Fixed an issue where adding a data source resulted in an error after redeeming a code in certain cases
  - (Mobile) Fixed an issue where adding a book caused a synchronization error when using Docker as the data source
  - (Mobile) Fixed an issue where adding a data source resulted in an error after redeeming a code in certain cases
  - (Mobile) Fixed an issue where reading progress was not recorded for some books
  - (Mobile) Fixed an issue where the TTS feature would crash on some Oppo and OnePlus devices
  - (Mobile) Fixed an issue where reading progress was not automatically synced after exiting reading via a gesture
  - (Mobile) Fixed an issue where AI voice was not working on iOS 17 or lower
  - (Mobile) Fixed an issue where page turning via volume keys did not work on iOS 26
  - (Mobile) Fixed an issue where already downloaded fonts could be downloaded again
  [!NOTE]
  This version has been selected as the stable release candidate. It should work fine in most cases. If you have any concerns, please download the previous stable version
  [!TIP]
  You can also download the installation package for this version from the our self-hosted mirror.
