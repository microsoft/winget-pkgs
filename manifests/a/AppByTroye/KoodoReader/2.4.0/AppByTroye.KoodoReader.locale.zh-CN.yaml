ReleaseNotes: |-
  新增
  - 官方 AI OCR 新增高精度模式，支持保留 PDF 的排版和图片
  - Windows 和 macOS 支持调用系统自带的 OCR 引擎识别文字
  - 扫描版 PDF 支持划线功能，请点击右下角的笔画按钮
  - 同步数据源新增本地文件夹，无需修改数据存储位置即可配合 Syncthing 等同步工具实现跨平台数据同步
  - 现在默认隐藏图书周围的按钮，需要将鼠标移动到边缘才会显示
  - 记笔记之后支持使用回车键保存
  - 新增同步时隐藏同步进度条的选项，请前往设置-同步和备份
  -（移动版）阅读时自动隐藏同步进度条
  修复
  - 修复多看电子书的图片样式问题
  - 修复文字竖排时，下划线，删除线和波浪线的样式问题
  - 修复 PDF 中的文字菜单位置异常问题
  - 修复搜索图书目录时，面板意外退出的问题
  - 修复文字段落之间额外的间距问题
  - 修复滚动模式下全文翻译翻译不全的问题
  -（移动版）修复部分情况下 PDF 中的高亮不展示的问题
  -（移动版）修复部分情况下 PDF 记录的阅读进度异常
  -（移动版）修复多看电子书的图片样式问题
  -（移动版）修复文字竖排时，下划线，删除线和波浪线的样式问题
  -（移动版）修复文字段落之间额外的间距问题
  -（移动版）修复滚动模式下全文翻译翻译不全的问题
  Note
  此版本由于功能已经稳定，bug 也基本修复，被选为下个稳定版候选。如果您对此有任何顾虑，可以下载上一个稳定版.
