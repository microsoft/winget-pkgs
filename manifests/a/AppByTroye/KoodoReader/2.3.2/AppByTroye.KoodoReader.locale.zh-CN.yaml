ReleaseNotes: |-
  新增
  - 听书功能支持 AI 多角色朗读，支持给男声，女声和童声分别设置声音
  - 支持全文翻译功能，包括双语对照翻译和全文替换翻译
  - 支持自定义 AI 模型用于 AI 翻译，AI 词典，AI 问书，请前往设置-AI 服务
  - 多选图书支持使用 Shift 键批量选择
  - 支持自定义图书 CSS 和应用 CSS
  - 支持导入本地图片用于图书和应用背景
  - 支持无极调节图书封面大小，使用图书列表底部的滑块
  - 支持清除设置的图书样式，位于右侧阅读选项面板的右上角
  - 支持根据图书的阅读状态筛选图书，请点击图书列表右下角的下拉菜单
  - 支持自动同步笔记和高亮到 Notion, Readwise, 语雀，Obisidian, Joplin, 思源等，请前往设置-数据
  - 支持 Discord Rich Presence，开启之后将在您的 Discord 主页显示您的阅读状态和正在阅读的图书，请前往设置-数据
  - 支持 OPDS 协议，请点击导入图书按钮旁的下拉菜单
  - 翻译插件新增火山翻译、彩云翻译、小牛翻译、谷歌翻译、阿里云翻译、腾讯云翻译、百度翻译、有道翻译。需要您自行配置 API Key
  - 支持关闭软件之后最小化到托盘，请前往设置-通用开启
  - 支持查看每日剩余 AI 语音额度，请前往设置-账户
  - 支持试听 TTS 语音
  - 优化 S3 协议的兼容性，新增强制使用路径样式的选项
  - 支持对已高亮文本进行选择
  - AI 百科将根据词条在原文中含义生成释义
  - 查词历史新增单词所在的原文句子
  - 支持自定义选择文字后的动作，支持选择文字之后立即查词、翻译、高亮、记笔记，请在右侧阅读选项面板中设置
  - 优化部分 MOBI 和 AZW3 格式图书的脚注展示
  - UI 细节优化
  -（移动版）支持对已高亮文本进行选择
  -（移动版）听书功能支持 AI 多角色朗读，支持给男声，女声和童声分别设置声音
  -（移动版）支持全文翻译功能，包括双语对照翻译和全文翻译
  -（移动版）支持自定义 AI 模型用于 AI 翻译，AI 词典，AI 问书，请前往设置-AI 服务
  -（移动版）支持自动同步笔记和高亮到 Notion, Readwise, 语雀，请前往设置-同步选项
  -（移动版）支持 OPDS 协议
  -（移动版）支持查看每日剩余 AI 语音额度，请前往设置-账户
  -（移动版）优化 S3 协议的兼容性，新增强制使用路径样式的选项
  -（移动版）支持对已高亮文本进行选择
  -（移动版）AI 百科将根据词条在原文中含义生成释义
  -（移动版）支持自定义选择文字后的动作，支持选择文字之后立即查词、翻译、高亮、记笔记，请前往设置-阅读选项开启
  -（移动版）优化部分 MOBI 和 AZW3 格式图书的脚注展示
  -（移动版）支持编辑图书元数据中的出版社和描述
  -（移动版）书架内图书支持排序
  -（移动版）现在将默认开启平滑翻页动画
  -（移动版）iOS 版支持调用本地已经安装的欧路词典、有道词典、MOJI 词典、Meriam-Webster、Google 翻译、 Yandex 翻译、捧读进行查词和翻译，请前往设置-三方服务
  -（移动版）点击目录、笔记、高亮、书签跳转之后，支持点击右下角的返回按钮返回之前的位置
  修复
  - 修复修改窗口大小后，页面刷新的问题
  - 修复固定右侧阅读选项面板之后，听书窗口被遮挡的问题
  - 修复 115 网盘授权丢失的问题
  -（移动版）修复 iOS 版部分情况下的闪退问题
  -（移动版）修复 115 网盘授权丢失的问题
  -（移动版）修复平滑翻页在部分情况下的异常
  [!NOTE]
  此版本由于功能已经稳定，bug 也基本修复，被选为下个稳定版候选。如果您对此有任何顾虑，可以下载上一个稳定版.
