ReleaseNotes: |-
  DesktopGo v1.0.3 🧭
  v1.0.3 是一次聚焦 Windows Shell 集成体验的补丁更新，重点补上图标右键菜单，同时把打开启动台时的默认焦点行为做成可配置项。
  本次更新 🔧
  Windows Shell 原生右键菜单接入 🪟
  - 为桌面图标、搜索结果图标和 Dock 图标接入 Windows Shell 原生右键菜单能力，常见文件操作可以直接走系统菜单链路。
  - Dock 继续保留 DesktopGo 自己的快捷操作，同时新增“系统菜单”入口，避免把项目原有交互完全替换成 Windows 默认菜单。
  Launchpad 焦点与打开体验 ⚡
  - 新增“打开启动台时默认焦点”设置，用户可以在“搜索栏”和“直接打开”之间切换。
  工程与验证 🧪
  - 为 Shell 右键菜单的行为策略补充 Rust 单测，覆盖命令分类和菜单文案回退识别。
  - 本次发布前已完成 cargo check、cargo test、pnpm -s tsc --noEmit 和 pnpm test 校验。
ReleaseNotesUrl: https://github.com/Aixbox/DesktopGo/releases/tag/v1.0.3
