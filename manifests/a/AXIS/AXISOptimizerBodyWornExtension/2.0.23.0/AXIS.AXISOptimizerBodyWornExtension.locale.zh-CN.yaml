ShortDescription: 将 Axis 执法仪与 XProtect 无缝连接
Description: |-
  这一完整的自托管解决方案让您能够在 XProtect 中流式传输来自 Axis 执法记录仪的实时视频。此外，您还可以收集证据并存储录像以供法庭调查使用。它完全集成在 XProtect 中，确保所有硬件和软件无缝协作。

  实时流传输与事后分析
  AXIS Body Worn for XProtect 可将 Milestone XProtect 中所有的执法记录仪和固定摄像机画面无缝连接。外勤警员、安保人员及其他用户可与办公室人员实时共享双向态势感知。这简化了实时突发事件和活动的管理，同时能够收集证据并存储录像和证物，用于事后分析和归档。您可以记录所有事件，并对视频和数据进行存储、查看、回放、导出，以及共享证据或报告。该方案采用本地部署，以年度订阅形式提供，无需额外的视频处理协议。这同时也确保了没有任何内容会暴露于互联网。

  在 XProtect 中连接一切
  XProtect 的单一界面可显示多个摄像机视图，同时展示执法记录仪和固定摄像机的录像画面。通过 XProtect 规则引擎触发事件非常简单，以便通过 Milestone SmartClient 或移动应用对实时事件做出自动响应。该成本效益方案通过 AXIS Optimizer 与 XProtect 深度集成，确保所有硬件和软件无缝协作。它支持 Axis 执法记录仪的全系列产品，包括 Axis 执法记录仪、工作站、系统控制器以及 AXIS Optimizer Body Worn Extension 插件。您可以轻松搜索数据以查找并调取证据。您还可以从任何移动设备或 XProtect Smart Client 查看并标记您的录像。

  高效且安全
  基于开放标准，AXIS Body Worn for XProtect 确保了与第三方系统的互操作性。低成本的工作站和独立的系统控制器使系统扩展变得简单且极具成本效益。此外，Axis 执法记录仪中的 Zipstream 技术在不损失图像质量的前提下，降低了带宽和存储需求。该方案在设计时充分考虑了网络安全，提供端到端加密并支持 FBI 官方标准。
