ShortDescription: Seamlessly connect Axis body worn cameras with XProtect
Description: |-
  This complete self-hosted solution lets you stream live video from Axis body worn cameras in XProtect. And you can collect evidence and store footage for forensic use. Fully integrated into XProtect, it ensures all hardware and software work together seamlessly.

  Live streaming and post-event
  AXIS Body Worn for XProtect seamlessly connects all body worn and fixed camera footage in Milestone XProtect. In-field oﬃcers, guards, and other users share two-way situational awareness with desk-based staff during in real-time. This streamlines managing live incident and events while also collecting evidence and storing footage and evidence for post-event analysis and documentation. You can record all events and store, view, replay, and export video and data as well as share evidence or reports. Deployed on-premise, it’s available as an annual subscription with no additional data processing agreements. This also ensures nothing is exposed to the internet.

  Connect it all in XProtect
  A single interface in XProtect shows multiple camera views, displayed footage from both body worn and fixed cameras. It is easy to trigger events via XProtect rules engine to respond automatically to live events via Milestone SmartClient or mobile app. Well-integrated into XProtect through AXIS Optimizer, this cost-efficient solution ensures all hardware and software work together seamlessly. It supports the entire Axis body worn portfolio including Axis body worn cameras, docking stations, system controllers, and AXIS Optimizer Body Worn Extension plugin. It's easy to search through the data to find and retrieve evidence. You can also view and label your footage from any mobile device or XProtect Smart Client.

  Efficient and secure
  Based on open standards, AXIS Body Worn for XProtect ensures interoperability with third-party systems. Low-cost docking stations and a separate system controller make it easy and cost-efficient to scale. And Zipstream in Axis body worn cameras reduces bandwidth and storage requirements without compromising image quality. Designed with cybersecurity in mind, it offers end-to-end encryption and supports official FBI standards.
