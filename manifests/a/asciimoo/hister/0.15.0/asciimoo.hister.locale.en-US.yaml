ShortDescription: Your own search engine – Full-text search across your files, visited sites and beyond.
Description: |-
  Hister is a versatile, privacy-focused web search engine designed to index the full content of visited web pages locally. Unlike traditional search engines, it allows you to find specific information within your own browsing history using full-text indexing.
ReleaseNotes: |-
  New Features
  - Document Versioning: track changes to documents upon re-indexing with diff changelogs in the preview panel.
  - Priority Rules: re-introduced rules to pin matched URLs to the top of search results.
  - PDF Indexing: full-text extraction for local PDFs and support for direct upload via the browser extension.
  - Faceted Filtering: filter results by language or domain with live updating counts.
  - Embedded Video Extractor: detects and renders embedded videos (YouTube, Vimeo) directly in the preview panel.
  - Notion Extractor: clean text extraction from public Notion URLs.
  - Optimized Storage: HTML content and favicons are now stored gzip-compressed externally to reduce Bleve index size.
  - User-Specific Directory Indexing: bind indexed local paths to specific users for shared instances.
  - Inline Label Editing: manage document labels directly from search result cards.
  - Browser Import: added Ladybird support and automatic history database detection.
  - File Deletion Tracking: automatic index cleanup when a watched local file is deleted.
  - MCP Preview: added Model Context Protocol endpoint for document previews.

  Enhancements
  - Added a copy-to-clipboard button next to result URLs.
  - Added a preview extractor selector to switch views without re-indexing.
  - Rules table improvements (sortable columns, filterable values, and regex validation).
  - New CLI flags (--delay, --timeout, --user-agent) directly on hister index.
  - Standardized config file discovery lookup order across platforms.
  - Improved yt-dlp diagnostic messages and debug logging.
  - URLs found during recursive crawls are now inserted in batches.

  Bug Fixes
  - Fixed Docker BASE_URL override logic via config file.
  - Fixed search results behavior to enforce all queried terms instead of any.
  - Fixed history page infinite scrolling and result paging sort keys.
  - Prevented HTML from being redundant written during re-indexing.
  - Fixed timezone display handling to respect browser configuration.
ReleaseNotesUrl: https://github.com/asciimoo/hister/releases/tag/v0.15.0
