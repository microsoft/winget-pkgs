ShortDescription: Your own search engine – Full-text search across your files, visited sites and beyond.
Description: |-
  Hister is a versatile, privacy-focused web search engine designed to index the full content of visited web pages locally. Unlike traditional search engines, it allows you to find specific information within your own browsing history using full-text indexing.
ReleaseNotes: |-
  New Features
  - Semantic search via sentence-embedding models (SQLite/sqlite-vec or PostgreSQL/pgvector backends).
  - OAuth 2.0 / OpenID Connect authentication support.
  - MCP (Model Context Protocol) server endpoint at /api/mcp.
  - Persistent crawler state: recursive crawl jobs survive interruptions and can be resumed by job ID.
  - New extractors: Wikipedia, GitHub project, Lobste.rs, yt-dlp, JSON-LD.
  - OpenSearch suggestions endpoint (/api/suggest) for browser search-as-you-type completions.

  Enhancements
  - --backend flag available on hister index, hister index -r, and hister import-browser (headless Chrome support).
  - Per-invocation header and cookie injection for index commands.
  - CLI search: --limit, --fields, --html flags; paging support; list-urls --offline mode.
  - Quoted field queries (e.g. url:"file:///C:/path with spaces").
  - Preview panel: clickable title, maximised content width, JSON-LD metadata, dark theme fixes.
  - NixOS module improvements: systemd/launchd hardening, environmentFile option, openFirewall opt-in.
  - Executable size reduced ~70 MB via trimmed lingua-go fork.
  - Timezone data bundled into the binary.

  Bug Fixes
  - file:// URLs handled correctly in the UI.
  - URLs no longer lowercased during query building.
  - History view correctly filtered per-user in multi-user mode.
  - File indexing fixed on Windows.
  - Various crawler, extension, and Nix module fixes.
ReleaseNotesUrl: https://github.com/asciimoo/hister/releases/tag/v0.13.0
