ShortDescription: Your own search engine – Full-text search across your files, visited sites and beyond.
Description: |-
  Hister is a versatile, privacy-focused web search engine designed to index the full content of visited web pages locally. Unlike traditional search engines, it allows you to find specific information within your own browsing history using full-text indexing.
ReleaseNotes: |-
  New Features
  - Mastodon Extractor: dedicated support for indexing toots as separate documents with specific metadata.
  - UI Improvements: full-screen preview mode, infinite scroll for search results, and image lightbox.
  - History Page: added interactive preview panel and keyboard navigation (consistent with search page).
  - WebDriver BiDi: new crawler backend using W3C protocol to drive existing browser sessions efficiently.
  - Management: direct deletion of all search results, keyboard shortcuts for deletion, and editable rules/aliases in the UI.
  - Search: support for exact phrase matching and metadata-specific query filtering (metadata.key:value).
  - Robots.txt: the crawler now respects robots.txt rules by default.

  Enhancements
  - Resizable split-screen preview panel with persistent width.
  - Improved semantic search relevance via punctuation-based text chunking.
  - OIDC/OAuth improvements, including configurable userinfo endpoints and password login toggle.
  - CLI: clearer error messages and version strings in server logs.
  - Duplicate prevention for skip/priority rules and search aliases.

  Bug Fixes
  - Fixed search term escaping and phrase query application logic.
  - Resolved API deletion issues from the browser extension.
  - Fixed OIDC scope forwarding and TUI client access token handling.
  - UI layout fixes for the authentication page on small screens.
  - Fixed field inclusion (text, html, language) in search results.
ReleaseNotesUrl: https://github.com/asciimoo/hister/releases/tag/v0.14.0
