ReleaseNotes: |-
  [3.4.1] - 2026-04-05
  FTPS implicit fix, Azure health check, SourceForge in About
  Fixed
  - FTPS implicit TLS on port 990: Connections to CerberusFTP and other implicit FTPS servers were timing out because the client used the explicit TLS upgrade path (AUTH TLS) instead of establishing TLS immediately on connect. Switched to connect_secure_implicit() which wraps the connection in TLS right after TCP (#80)
  - Azure Blob health check: The probe URL blob.core.windows.net is not a valid hostname (requires account prefix). Replaced with Microsoft OpenID discovery endpoint in both backend and Discover panel
  Added
  - SourceForge links in About dialog: Support tab now includes SourceForge repo button and review link, matching the existing GitHub button style (47 languages)
  Downloads:
  - Windows: .msi installer, .exe, or .zip portable (no installation required)
  - macOS: .dmg disk image
  - Linux: .deb, .rpm, .snap, or .AppImage
  Download AeroFTP
