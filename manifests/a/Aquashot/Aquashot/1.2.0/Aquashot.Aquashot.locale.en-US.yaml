ShortDescription: A fast windows-native snipping tool for screenshots and screen recording, with support for annotation, color picking, copy to clipboard + save to disk, and OCR text extracting. Supports output to PNG, JPG, GIF, and MP4.
Description: Aquashot is a fast, native Windows snipping tool for screenshots and screen recording. Capture a region, a window, or a whole monitor; annotate with arrows, shapes, text, and numbered steps; pick colours from the screen; and extract on-screen text with OCR. Captures copy to the clipboard and save to disk, with output to PNG, JPG, animated GIF, or MP4. Includes delayed capture, a desktop freeze, a searchable history with OCR text search, and pin-to-screen. Self-contained with bundled FFmpeg — no extra runtime to install.
