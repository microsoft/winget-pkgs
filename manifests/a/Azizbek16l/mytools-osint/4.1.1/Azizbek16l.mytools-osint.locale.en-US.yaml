ShortDescription: OSINT CLI with entity-graph correlation, auto-pivot, active recon and AI explain
Description: |
  mytools-osint is a personal-use OSINT toolkit:
   * 39 modules across passive (Shodan InternetDB, crt.sh, ThreatMiner, …) and active recon (route_discover, port_scan, WAF/CMS/GraphQL fingerprinting).
   * v4.0 entity graph (19 entity types, 33 edge types) + bounded BFS auto-pivot.
   * SIEM exporters (Splunk HEC, Elasticsearch, syslog, MISP).
   * Optional AI explain (Claude haiku/sonnet, disabled in --opsec mode).
   * Free APIs only, no paid keys required.
   * Authorised security testing only.
