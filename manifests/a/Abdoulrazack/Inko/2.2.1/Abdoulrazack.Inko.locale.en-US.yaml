ShortDescription: Local-first manga, light novel and book reader with an extension system.
Description: Inko is a personal, local-first reader for manga, light novels and books, in the spirit of Mihon/Tachiyomi. No account, no ads - your library, progress and reading journal stay on your machine. Built on an open extension system with new-chapter notifications, a private reading journal, AniList sync and EPUB/CBZ/PDF import. Ships with its own embedded server and database - no prerequisites.
