PackageIdentifier: Anthropic.Ant
PackageVersion: 1.15.0
PackageLocale: zh-CN
ShortDescription: 通过 ant 命令行工具直接从终端与 Claude API 交互
Description: |-
  ant CLI 可让你通过终端访问 Claude API。每个 API 资源都以子命令的形式暴露，支持输出格式化、响应过滤，并可使用 YAML 或 JSON 文件输入，适用于交互式探索和自动化操作。
  与使用 curl 调用 API 相比，ant 允许你通过类型化的标志或管道传入的 YAML 来构建请求体，而无需手动编写 JSON；通过 @path 引用将文件内容内联到字符串字段中；并使用内置的 --transform 查询从响应中提取字段（无需额外的 JSON 工具）。列表接口会自动分页。Claude Code 能够原生理解如何使用 ant。
