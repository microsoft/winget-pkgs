ReleaseNotes: |-
  - [Feature] Support for Liquid Glass (macOS) (#17459
  - [Feature] AWS IAM Identity Center Support (S3) (#13377)
  - [Feature] Connect with credentials from credential_process configuration directive in ~/.aws ( S3) (#11664)
  - [Feature] Add preference to include previous versions of files in browser (S3) (#18020)
  - [Feature] Retrieve credentials from instance metadata using IMDSv2 (S3) (#16104)
  - [Feature] Disable versioned listing by default (S3) (#18031)
  - [Feature] Add option in Preferences to enable versioned listing (S3) (#18031)
  - [Feature] Display file details for file transfers as popover (macOS)
  - 
  - [Feature] Display "Bookmark" window as popover (macOS)
  - 
  - [Feature] Hide controls for unavailable options in "Bookmark" window (macOS)
  - [Feature] Display labels of bookmarks in list view (macOS)
  - [Feature] Add "Connect" button in "Bookmark" window (macOS)
  - [Feature] Make available all configuration options in "Connection" window (macOS)
  - [Feature] Add "More Options" as tab in "Connection" and "Bookmark" windows (macOS)
  - [Feature] Add "Connect" and "Disconnect" items to "Go" menu (macOS)
  - [Feature] Only show navigation bar in list and outline view of "Browser" window (macOS)
  - [Feature] Display progress indicator in browser view (macOS)
  - [Feature] Display progress indicator in bookmark view (macOS)
  - [Feature] Index of connection profiles allows instant display in Preferences → Profiles
  - [Bugfix] Error downloading file from unlocked vault (Cryptomator) (#17935)
  - [Bugfix] No trailing delimiter for path style requests with bucket name only (#17901)
  - [Bugfix] Repeating file transfer in vault fails after restart (Cryptomator) (#17974)
  - [Bugfix] Do not write file header to placeholder files for folders (Cryptomator, Mega.nz S4)
  - [Bugfix] Remove /Default symbolic link (Sharepoint) (#17918)
  - [Bugfix] Map all SSL failures to network error and await server response on control connection (FTP) (#17946)
  - [Bugfix] Browser window does not show up in Exposé & Mission Control (macOS) (#17703)
  - [Bugfix] Compare public key blob instead of comment when retrieving key from agent (SFTP)
  - [Bugfix] Support "Include" directive when reading from OpenSSH config (SFTP) (#10451)
  - [Bugfix] Exclude trashed folders in list by default (Backblaze B2) (#18101
  - [Bugfix] Support "Match Host" and "Match User" directive in OpenSSH configuration (SFTP) (#10451
  - [Bugfix] Interoperability with IdentityAgent from 1Password (SFTP, Windows)
