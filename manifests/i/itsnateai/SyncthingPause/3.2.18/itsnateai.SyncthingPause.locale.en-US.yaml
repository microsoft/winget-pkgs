ShortDescription: Pause Syncthing from your tray. One click. Resume when you're done.
Description: |-
  Lightweight Windows tray companion for Syncthing focused on the actual headline use-case: pausing when you need bandwidth. One-click pause and resume from the tray menu, per-folder and per-device pause with partial-pause icon, dark-themed UI, network auto-pause on public Wi-Fi (WMI-based), and self-update with SHA256-verified releases.

  Built with C# (.NET 8 WinForms), self-contained single-exe distribution. Runs Syncthing hidden in the background and exposes its state through a configurable tray icon and dark-themed context menu.

  Renamed from itsnateai.SyncthingTray at v3.0.0 to avoid confusion with Martchus's Syncthing Tray (Qt-based, established in the Syncthing ecosystem since 2016). Existing SyncthingTray installs auto-migrate pause state, settings, and Startup shortcut on first launch — no manual steps required.
