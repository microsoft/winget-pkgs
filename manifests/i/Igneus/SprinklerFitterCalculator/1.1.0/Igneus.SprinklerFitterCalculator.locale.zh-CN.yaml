ShortDescription: 一款专业、易用的英制（英尺和英寸）计算器
Description: |-
  Sprinkler Fitter Calculator (SFC) 是一款专业、易用的英制（英尺和英寸）计算器。SFC 专为自动喷水灭火系统安装工及相关领域的专业人员设计，方便其在现场使用。Sprinkler Fitter Calculator 的功能包括：
  - 英尺和英寸计算器，支持 100 条历史记录
  - 支持米、厘米和毫米
  - 支持分数，步长为 1/8 英寸
  - 提供常用管件和阀门的扣除值
  - 适用于 90、45、22.5 和 11.25 度管道偏移的角计算器
  - 具有分享功能的记事本（分享功能仅限移动端）
  - 浅色和深色主题界面
