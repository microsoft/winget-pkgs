ShortDescription: 一个简单的消火栓流量测试报告程序，能够打印并保存专业水准的报告
Description: |-
  Igneus Hydrant Flow Test 是一款简便的消火栓流量测试报告程序，能够打印并保存令您引以为傲的专业级报告。Igneus Hydrant Flow Test 依据 NFPA 291（2007 版）《消火栓流量测试及标记推荐做法》计算流量及皮托管压力。Igneus Hydrant Flow Test 甚至可以处理多个出水口同时出水的情况。
  一旦输入流量测试信息，即可预览、打印一份专业的单页报告，并将其保存为 pdf 文件。
