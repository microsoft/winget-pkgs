ShortDescription: 功能强大、灵活且全能的自动喷水灭火系统水力计算计算机软件。专为自动喷水灭火系统设计师和工程师从头打造。
Description: |-
  SHC 是一款功能强大、灵活且全方位的自动喷水灭火系统水力计算软件。SHC 从底层设计之初，便是为自动喷水灭火系统设计人员和工程师量身打造的。

  计算
  SHC 采用 Hazen-Williams 和/或 Darcy-Weisbach 摩擦损失方程，按照 NFPA 标准的要求对喷淋系统进行水力计算。软件可计算任何管路配置——包括树状、环状、格栅状以及完全自定义的布局。同时支持消防泵、防倒流防止器和多个水源。SHC 还拥有评估计算所需的所有工具：
  计算结果窗口是评估喷淋模型的主要工具。该窗口以清晰的表格形式显示所有相关的管道、节点和系统信息。管道和节点可按选定数值进行排序。此外，在您继续编辑输入数据时，该窗口仍可保持可见。
  在数据输入窗口顶部，“实时查看”栏会在您的文本光标或鼠标指针经过编辑器中的项目时，显示单个管道和节点的关键计算数值。该功能非常适合对单个管道或节点进行快速抽查。
  此外，系统需水量曲线图和压力损失饼图也可以显示或保存为图片，以便在其他文档中使用。

  数据录入
  SHC 的数据输入方式优于许多其他流行的水力计算软件。SHC 没有将您束缚在死板的电子表格界面中，而是采用了基于命令的数据录入方式，并配备了具有高级语法高亮功能的数据录入编辑器。这种录入方式比表格化输入更灵活、更强大，且在积累一定经验后，速度也更快。该编辑器还内置了许多辅助数据输入的工具：
  “弹出式”助手让您无需死记硬背管件代码、材料代码和 C 系数。
  智能“建议”功能可预测您的下一个命令或参数值。只需按下键盘上的“Enter”键即可接受该值，或者继续输入以忽略建议值。通常情况下，只需按住“Enter”键，即可完成一组节点或管道的录入。
  组合编辑功能让修改选定范围内的所有 K 系数、标高、长度等操作变得快速且轻松。
