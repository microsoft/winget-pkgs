ReleaseNotes: |-
  v1.0.2 — rebrand display name to IDEAgentHub + UI polish

  - Start-menu shortcut + Add/Remove Programs entry now read "IDEAgentHub"
    so Windows Start search ("IDEAgentHub") finds the app immediately.
  - Product Name in File Explorer Properties matches.
  - Account dashboard: self-service device revoke (soft tombstone, 1-trial-
    per-machine still enforced) + Polar Customer Portal handoff for billing.
  - License sign-in: email + license key form (no magic-link round trip).
  - Status-bar license chip with days-left countdown.
  - Trial gate hardening: HWID Tier-1 mandatory + Polar customer_id dedup +
    lifetime HWID cap (10 distinct machines per license).
  - Daily anti-abuse scan flags suspected sharing rings.

  No breaking changes for existing 1.0.1 installs — auto-update via Velopack
  preserves the license cache and the trial timer.
