ShortDescription: lossless cropping and rotation of JPEG files
Description: 'You simply select a frame in the displayed image and save it as new file without recompression (see also right mouse popup menu).\nThe left and upper border of the cropped frame are automatically restricted to the MCU boundaries (16*8 in most digicam pics, 16*16 or 8*8 otherwise) by the program in all selection processes, so you see directly the effective crop area. This automatic adaption is actually the main feature regarding the lossless cropping. The visible block margin grid (toggle by menu/button) in the displayed image is also an important feature in this regard.\nIn the status bar the actual selection coordinates are tracked, in the same format as used iwth the commandline \"jpegtran\" utility (\"-crop WxH+X+Y\" : width, height, x-offset, y-offset).\nThe \"Jpegcrop\" program uses the original transformation support code of the IJG software, with direct function calls.\n(Note that the \"Save Frame As\" action will cause the file to be re-read and processed in \"jpegtran\" manner which avoids the recompression.)\nThe source code of the program (MS VC++ 6.0 with MFC) is freely available for download from the JPEGclub.org site.'
