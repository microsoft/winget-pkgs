ReleaseNotes: |-
  - Tech refresh of ElectronJS (v40.8.0), NodeJS (v24.14.0), Chromium (v144.0.7559.236), V8 engine (v14.4.258.32), and related modules
  - General: introduced ability to manually move and adjust size of dialog boxes
  - Documentation generation: fixed a potential race condition causing the process to hang
  - ERD View: included graph position of containers and entities when duplicating ERDV
  - Excel: enriched forward-engineering with all possible values in conditional columns, such as data type synonyms
  - PowerDesigner: added reverse-engineering of technical names for constraints
  - PowerDesigner: enabled reverse-engineering of stand-alone symbols with text into Studio rectangle
  - PowerDesigner: added support for mapping of interval Oracle data type
  - Workgroup: added support to review changes in pull requests from forked repositories to upstream repo
  - Workgroup: enhanced support for cloning over SSH on Mac and Linux 64-bit systems
  - Avro: added handling for multiple duplicated external definitions during forward-engineering
  - BigQuery, CockroachDB, MariaDB, Oracle, PostgreSQL, Snowflake, SQL Server/Azure SQL, YugabyteDB: enhanced forward-engineering of delta model when converting a single PK/UK constraint to a composite PK/UK constraint
  - Teradata:  enabled flexibility in script generation for controlling constraints in CREATE scripts (3 choices: "In CREATE statement", "In separate statement" or "Ignore"), controllable from Tools > Options > Forward-Engineering parameters, plus from forward-engineering lower tab and via Tools > Forward-Engineer menu
  - Teradata: added support for forward- and reverse-engineering of comments at database, table, view, and column levels
  - Teradata: added support for constraint and index changes in ALTER script of delta mode
