ReleaseNotes: |-
  - DBML: added support for reverse-engineering of TablePartial
  - dbt: enabled data tests, whether package-based or custom
  - dbt: added support for forward-engineering of custom YAML fragments for additional dbt data tests at the column level
  - dbt: added support for forward-engineering of 4 built-in data tests at the column level
  - dbt: enabled custom header and footer injection in forward-engineering for integration with CI/CD pipelines and support of project-specific configurations
  - dbt: added new optional arguments in Command-Line Interface for generating data tests from constraints
  - ERD: enhanced resize box behavior to ensure all attribute names are fully visible, including post-reverse-engineering processes
  - Excel forward- and reverse-engineering: added support for the pipe "|" character
  - Glossaries: ensured transitive inheritance of bound terms for external references and Polyglot derived objects (more than 1 level).
  - JSON Schema: enhanced reverse-engineering multi-type fields in the example keyword
  - Workgroup Open From: added support for opening larger GitHub files (up to 100 MB)
  - Workgroup Open From: improved error handling for files exceeding 25 MB during Save To operations.
  - Workgroup: added the required organization in Azure DevOps API URL calls
  - Workgroup: enhanced authentication with Bitbucket Server regular API tokens by requiring a username for validation via the REST user endpoint
  - CosmosDB-with-Gremlin-API, CosmosDB-with-Mongo-API, CosmosDB-with-SQL-API, Hive: updated axios, basic-ftp, thrift, and uuid libraries
  - Oracle: avoided double carriage return (\r\r) in scripts on Windows
  - PostgreSQL: added v18.x to list of versions
