ReleaseNotes: |-
  - Tech refresh of ElectronJS (v42.4.0), NodeJS (v24.16.0), Chromium (v148.0.7778.254), V8 engine (v14.8.178.29), and related modules
  - ERD: strengthened anchors of non-auto-positioned relationships so they remain fixed on canvas when attributes are added to connected entity boxes
  - Glossary: added support for updating assigned glossaries and bound terms of derived models in impact analysis
  - DeltaLake/Databricks: added support for reverse-engineering from Databricks DDL in any target -- warning: this new plugin version requires v8.11.6 or higher of Hackolade Studio core application
  - DeltaLake/Databricks: moved reverse-engineering of HQL Files to Tools > Reverse-Engineer > Data Definition Language Files... (DDL)
  - Hive: added support for reverse-engineering from Hive DDL in any target
  - SQL Server/Azure SQL: improved reverse-engineering logging with detailed query metadata and enhanced query reliability
  - SQL Server/Azure SQL: introduced reverse-engineering option to toggle fetching of procedures
