ReleaseNotes: |-
  - Tech refresh of ElectronJS (v41.3.0), NodeJS (v24.15.0), Chromium (v146.0.7680.188), V8 engine (v14.6.202.33), and related modules
  - Glossaries: added possibility to assign one or more glossaries of business terms to a data model -- see more details at https://hackolade.com/help/Glossariesofbusinessterms.html
  - Glossaries: added the possibility to bind any modeling object to one or more business terms from one or more glossaries, and copy glossary definition to model object description/comment
  - DBML: added possibility to import (reverse-engineer) models in Database Markup Language, often created from GenAI prompts -- see more details at https://hackolade.com/help/GenAI-createdDBML.html
  - dbt: added support for generating sources.yml files -- see more details at https://hackolade.com/help/dbtschemamodels.html#dbt%20sources
  - dbt: added config.incremental_strategy property to specify how new data is loaded into incremental models
  - ERD: added possibility to display value of (custom) properties in ERD box
  - JSON Schema: enhanced reverse-engineering for $comment of multi-type fields
  - Toolbar: added icon to Check for Remote Changes when model opened directly from remote repo
  - PowerDesigner: enhanced reverse-engineering to use Index Code instead of Index Name
  - PowerDesigner: enhanced reverse-engineering to respect individual supertype/subtype membership in Diagram Views
  - BigQuery, DeltaLake/Databricks, PostgreSQL, Redshift, Snowflake, SQLServer: added config.incremental_strategy property to specify how new data is loaded into incremental models
  - Cassandra, CosmosDB-with-Gremlin-API, CosmosDB-with-Mongo-API, CosmosDB-with-SQL-API, CouchbaseV7Plus, DocumentDB, EventBridge, Glue, Hive, JanusGraph, Neptune-Gremlin, Protobuf, Redshift, Snowflake, SQLServer, Synapse, Tinkerpop: updated libraries fast-xml-parser, follow-redirects, protobufjs, uuid, and xmldom
  - DeltaLake/Databricks: added support for COLLATE clause in column definitions
  - OpenAPI: added support for enriching nested properties of a derived component
  - Oracle: enhanced default behavior to clear the index logging property
  - Teradata: improved handling of index properties for compliance with Compare & Merge
