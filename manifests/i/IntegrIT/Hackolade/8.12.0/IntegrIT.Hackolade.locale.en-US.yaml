ReleaseNotes: |-
  - Tech refresh of ElectronJS (v42.4.1), NodeJS (v24.16.0), Chromium (v148.0.7778.265), V8 engine (v14.8.178.31), and related modules
  - Grid View: introduced an tabular layout for modeling objects at entity and model level, allowing to sort, filter, and edit properties -- more features in upcoming releases
  - Licensing: added ability for admin to hide last segment of a license key in the License Status screen and log files -- on desktop only for now -- browser will also benefit from this feature in an upcoming release
  - PowerDesigner: set default table format to "Standard" when reverse-engineering Snowflake PDM files
  - Connections: removed Test button at bottom of connection list
  - CosmosDB-with-Gremlin-API: updated form-data and ws libraries
  - CosmosDB-with-Mongo-API, CosmosDB-with-SQL-API, MarkLogic, Snowflake: updated form-data library
  - DeltaLake/Databricks: added support for reverse-engineering global view
  - DeltaLake/Databricks: added reverse-engineer of varchar and char column lengths from DDL scripts
  - DeltaLake/Databricks: disabled OR REPLACE and IF NOT EXISTS for temporary tables and views
  - DeltaLake/Databricks: ensured a new container is created when reverse-engineering object without schema from DDL script
  - EventBridge, OpenAPI, Swagger: updated js-yaml library
  - Hive, JanusGraph, Neptune-Gremlin, Tinkerpop: updated ws library
  - Oracle: added support for cross-schema indexes in properties, plus forward- and reverse-engineering
  - Oracle: improved robustness by ignoring empty constraints during forward-engineering
  - Oracle: added support for cross-schema indexes ON TABLES
  - Protobuf: updated protobuf library
  - SQLServer: limited reverse-engineering of procedures only for the selected tables and schema
