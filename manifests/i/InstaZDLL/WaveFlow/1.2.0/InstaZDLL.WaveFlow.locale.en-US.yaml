ReleaseNotes: |-
  1.2.0 (2026-05-21)
  ✨ What's new in v1.2.0
  WaveFlow 1.2.0 is a polish release focused on profiles, localisation, and the parts of the UI you touch every day.
  👥 Profiles
  - Delete a profile from the selector modal — pop into "Manage" mode in the top-left, tap the red trash badge on any non-active profile, confirm. The active profile and the last remaining one are locked to keep the app usable.
  - Onboarding rebuilt as a multi-step wizard (welcome → language → privacy → folder → Last.fm → scan → done). The Discord step was retired and a language picker now lives right at the start, so the rest of the wizard runs in your language from step 2.
  - Onboarding re-triggers on every brand-new profile, even when created from a populated one.
  🌍 Languages
  - All 17 locales got a top-to-bottom quality pass: French standardised on vouvoiement, English / German / Spanish / Italian / Portuguese (PT + BR) / Dutch / Russian / Turkish / Indonesian / Arabic / Hindi / Japanese / Korean / Chinese (CN + TW) reviewed for terminology, tone, plural rules and faux-amis. Keyboard-shortcut labels are now translated everywhere too.
  🎛️ Settings
  - Reorganised into seven category tabs (Library / Playback / Integrations / Appearance / Data / Shortcuts / Diagnostics) — only the active panel mounts, so opening Settings is instant even when EQ, backups or the shortcuts editor are heavy.
  🖥️ 1080p & player polish
  - Tighter chrome density across the whole app for 1920×1080 laptops.
  - Immersive Now Playing no longer overlaps the visualizer with the title block.
  - Sidebar (Ma musique + Playlists) shares a single scroll at narrow heights — no more invisible playlists when Spotify is enabled.
  - Player bar densified to Spotify / Lokal-style proportions.
  - Switch directly between Immersive Now Playing ↔ Fullscreen Lyrics without going through the main window.
  📚 Library & UX
  - Local artist images (artist.jpg / <artist_name>.jpg) now show up on the main Artists grid, not just on the detail page.
  - Add to playlist lives right inside the track row + popover — no more hopping into the playlist view.
  - Album / artist popovers render through a portal with clamp + flip placement, so they never get clipped or stuck behind other rows.
  - Cover upload preserves the real image extension (PNG stays PNG instead of being saved as a renamed temp file).
  - Sort labels: directions and "Recently added" wording fixed.
  - VS Code style zoom with Ctrl/Cmd +/-/0, persisted across launches.
  - Artwork lightbox + interactive rows are fully keyboard-accessible.
  🔧 Stability
  - Migrations self-heal from line-ending drift (no more boot crash if core.autocrlf rewrote your .sql files at clone time).
  - Atomic guard against deleting the last remaining profile in a race.
  - Library context drops stale writes after a profile switch.
  - Native window drag no longer hijacks the volume slider.
  👋 Community
  - GitHub Discussions wired up.
  - Discussions link in About / Settings now points at the right place.
  📦 Recommended install
  Use your distro's package manager so updates flow through the same tool you already use for the rest of your system.
  Windows
  winget install InstaZDLL.WaveFlow
  Arch / Manjaro / EndeavourOS / CachyOS
  yay -S waveflow-bin
  # or: paru -S waveflow-bin
  Fedora / RHEL / Rocky / Alma / CentOS Stream
  sudo dnf copr enable instazdll/waveflow
  sudo dnf install waveflow
  Debian / Ubuntu / Mint / Pop!_OS
  The Debian package is wave-flow (kebab-case, required by the Debian naming spec — Tauri bundles it that way from the WaveFlow product name).
  sudo install -d -m 0755 /etc/apt/keyrings
  curl -fsSL https://packages.buildkite.com/instazdll/waveflow/gpgkey \
    | sudo gpg --dearmor -o /etc/apt/keyrings/waveflow.gpg
  echo "deb [signed-by=/etc/apt/keyrings/waveflow.gpg] https://packages.buildkite.com/instazdll/waveflow/any/ any main" \
    | sudo tee /etc/apt/sources.list.d/waveflow.list
  sudo apt update && sudo apt install wave-flow
  macOS
  No package manager yet — grab the .dmg from the assets below. The bundle is not Apple-Developer-signed; right-click → Open the first time, or run xattr -cr /Applications/WaveFlow.app to clear the quarantine flag.
  Standalone download
  Everything is also available as a raw bundle in the assets below — .AppImage, .deb, .rpm, .exe, .msi, .dmg for users who'd rather skip the repo.
