ReleaseNotes: |-
  1.3.0 (2026-05-26)
  ✨ What's new in v1.3.0
  WaveFlow 1.3.0 is the theming & motion release — every panel, modal and
  overflow menu animates now, with 10 brand-new theme presets to pick from.
  Plus a substantial round of audio-quality surfacing, smart-playlist
  additions, and 1080p polish.
  🎨 Themes & motion
  - 10 new theme presets picked from the Settings → Appearance card —
    Émeraude (default), Midnight, Sunset, Lavender, Crimson, Ocean and friends.
    Each ships an OKLCH accent palette plus an ambient background tint that
    re-skins the whole app, including dark-only OLED and Neon variants.
  - Panels, modals and menus animate in/out with framer-motion springs —
    the queue, lyrics, now-playing right panels slide, modals fade with
    backdrop blur, the overflow menu pops smoothly. No more snap-on / snap-off.
  🎤 Lyrics
  - Auto-discover sidecar .lrc / .txt files next to your tracks (or in
    a sibling Lyrics/ folder, case-insensitive). Runs before LRCLIB, so your
    K-Pop / J-Pop rips with embedded lyrics never need a network call.
  - One-tap switch between Immersive Now Playing ↔ Fullscreen Lyrics — the
    new icon in the lyrics header swaps to the cover view without going through
    the main window.
  - Word-synced lyrics: spacing between tokens restored on Enhanced LRC sources
    that omit spaces between word stamps.
  - Fullscreen lyrics rendered through a portal so the opacity transition no
    longer bleeds through during the open/close animation.
  🎛️ Audio quality
  - Audio pipeline popover on hover over the quality footer — shows the
    full Source → Processing → Output chain (DSD → PCM, Resample, Downmix,
    EQ, ReplayGain, Normalize, Mono, Speed) with a green "Bit-perfect" pill
    when nothing is touching the stream.
  - Resampling arrow surfaced directly in the quality strip when the
    source rate differs from the device rate.
  - Hi-Res badge + Spotify-style label in the player bar with their own
    visibility toggles in Settings → Appearance.
  - About: Rubato version corrected (1.0 → 2.0, was lagging behind the
    Cargo.toml bump).
  🎵 Player polish
  - Unified player-bar layout panel in Settings → Appearance — every
    player button (Mini-player, Immersive, Lyrics, Queue, Device, A-B, Sleep,
    EQ presets, Audio-quality strip) is toggleable from one place. The cover
    click action is configurable too: Immersive (default) / Now Playing panel
    (Spotify-style toggle) / none.
  - EQ presets for 20 musical styles, accessible from the player bar
    popover or the overflow menu.
  - Scroll wheel on the volume slider adjusts the level — Apple Music /
    Spotify gesture.
  - Mini-player remembers its window position and size across launches,
    with offscreen-fallback to the bottom-right if a monitor disconnected.
  📻 Smart playlists
  - New "On Repeat" smart family — single playlist of your top ~30 tracks
    from the last 30 days by play count, deterministic ordering. The cover is
    an indigo→black branded tile with a rainbow infinity-loop motif rasterised
    from SVG via resvg/usvg/tiny-skia at runtime.
  - Daily-Mix cover compositor: dedupes identical inputs so a 1-artist
    playlist no longer renders the same picture four times.
  🔗 Integrations
  - Native OS track-change notifications — toast in Windows Action Center,
    macOS Notification Center, and libnotify on Linux. Opt-in (off by default).
  - Similar artists: Last.fm's getSimilar returns placeholder pictures
    since their image API was killed in 2019. We now backfill with Deezer
    search_artist for every cache miss, in parallel, before responding.
  ⚡ Performance
  - Library tab prefetch in parallel with skeleton on first load — Songs,
    Albums, Artists, Genres, Folders feel instant after the first paint.
  - Bulk list payloads trimmed via a shared artwork_base so 6000-track
    libraries don't ship 6000 copies of the same hash prefix over IPC.
  - Skeletons and lazy-chunk prefetch generalised across every view.
  🛠️ Queue, Wrapped & 1080p polish
  - Queue: manual additions stack in your user queue instead of being
    appended at the absolute end — matches how Spotify queue works.
  - Up Next list now fills the available height in the queue panel
    instead of being capped to a thin window.
  - WaveFlow Wrapped banner is gated to its season (Dec 1 → Jan 31) by
    default, with auto / always / never toggle in Settings →
    Appearance and a per-year dismiss button.
  - Overflow menu caps its height + scrolls at 1080p (was overflowing the
    viewport on short screens).
  - Daily Mix grid switches to flex-wrap with capped basis so the row no
    longer jumps to two columns awkwardly.
  - Modal scrims get backdrop blur for better separation from the page
    behind.
  - Artist tiles drop the violet halo on dark portraits.
  - Onboarding: 1080p layout rescued + new profile-name step.
  - Playlist edit modal: stop freezing after cover upload.
  📦 Recommended install
  Use your distro's package manager so updates flow through the same tool
  you already use for the rest of your system.
  Windows
  winget install InstaZDLL.WaveFlow
  Arch / Manjaro / EndeavourOS / CachyOS
  yay -S waveflow-bin
  # or: paru -S waveflow-bin
  Fedora / RHEL / Rocky / Alma / CentOS Stream
  sudo dnf copr enable instazdll/waveflow
  sudo dnf install waveflow
  Debian / Ubuntu / Mint / Pop!_OS
  The Debian package is wave-flow (kebab-case, required by the Debian
  naming spec — Tauri bundles it that way from the WaveFlow product
  name).
  sudo install -d -m 0755 /etc/apt/keyrings
  curl -fsSL https://packages.buildkite.com/instazdll/waveflow/gpgkey \
    | sudo gpg --dearmor -o /etc/apt/keyrings/waveflow.gpg
  echo "deb [signed-by=/etc/apt/keyrings/waveflow.gpg] https://packages.buildkite.com/instazdll/waveflow/any/ any main" \
    | sudo tee /etc/apt/sources.list.d/waveflow.list
  sudo apt update && sudo apt install wave-flow
  macOS
  No package manager yet — grab the .dmg from the assets below. The
  bundle is not Apple-Developer-signed; right-click → Open the first
  time, or run xattr -cr /Applications/WaveFlow.app to clear the
  quarantine flag.
  Standalone download
  Everything is also available as a raw bundle in the assets below —
  .AppImage, .deb, .rpm, .exe, .msi, .dmg for users who'd
  rather skip the repo.
