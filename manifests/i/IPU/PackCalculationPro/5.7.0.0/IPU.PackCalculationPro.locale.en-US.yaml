ReleaseNotes: |-
  - Improvements to pump power consumption calculation, for instance secondary systems and dry coolers
  - Fix to Export to Excel wrapper
  - Add R454A as supported refrigerant, one compressor model included.
  v5.6 (From October 2024):
  Download Pack Calculation Pro – v5.6.5 – (Aug 29th, 2025)
  - Ejector cycles:
    - Dimensioning of vapour ejectors, low-pressure-lift and high-pressure-lift.
    - Major improvements to all ejector cycle calculations.
  - Rating points UI:
    - State point diagrams, table and log(p)-h diagrams fully implemented for most cycles. Supporting flooded evaporators.
    - Log(p)-h diagram shows all available properties at mouse cursor position.
  - Refrigerant data:
    - R290 (propane) data updated, to allow operating at high condensing temperatures in heat pumps.
  v5.5 (June-September 2024):
  Download Pack Calculation Pro – v5.5.6 – (September 4th 2024)
  - Cycle designs:
    - Heat pumps:
      - One-stage transcritical heat pump model, with water-cooled gas cooler.
      - Auxiliary heater for heat pumps, or standalone boiler system / district heating connection.
    - Refrigeration: Two-stage transcritical with open intercooler, with/without parallel compression.
  - Components:
    - Condenser models: Improved model for hybrid cooler / adiabatic gas cooler.
    - Pre-release: Water-cooled evaporator, allowing for custom source temperature profile.
    - Full update of Bitzer product catalogue.
    - Full update of Bock product catalogue.
    - Dorin: Larger CD600 models, and LSPM motor models.
    - Frascold: Full update of hydrocarbon compressor data. SRC, CX, FVR series.
  - Control options:
    - Transcritical operation of gas cooler fans can now be estimated at part load. Transition zone of gas cooler control now also slides fan control approach.
    - Pre-release: Limit on potential/available cooling capacity for heat pumps.
  - Improvements for water consumption / rainwater tank calculation tool, now respects unit system.
  - Rating points UI extended:
    - Pre-release: Displaying state points and log(p)-h diagram for most single-refrigerant systems.
  v5.3 (Jan-Nov 2023):
  Download Pack Calculation Pro – v5.3.10 – (Nov 6th 2023)
  - Rating points UI added – now possible to calculate at user-specified part load conditions
  - More ejector cycles added:
    - Two-stage transcritical ejector with/without parallel compression
    - One-stage transcritical ejector with parallel compression
  - Auto-generated generic compressors with fixed efficiency for all cycles, allowing to do rough initial calculations before choosing compressors
  - More than 1800 new Dorin compressor polynomials from CD, CDS, H, HEX series
