ReleaseNotes: |-
  What's new in this release?
  - Wireless device support: Yes, you can now connect to your iDevice wirelessly
  - iOS 17+ support: Previously, you could not use virtual location and other features on iOS 17 and above, but now you can!
  - Status Balloon: We have added a status widget that shows ongoing operations (exporting, importing, etc.) and their progress
  - Moved to Rust: We have moved the backend to Rust, which has improved performance and stability.
  - New UI: We have huge UI improvements for Windows 11 (Mica effect), we will be improving the UI for other platforms in the future.
  Since we moved to a Rust backend, old device support (iOS 10 and below) isn't as good as it used to be but we will be improving it in the future.
