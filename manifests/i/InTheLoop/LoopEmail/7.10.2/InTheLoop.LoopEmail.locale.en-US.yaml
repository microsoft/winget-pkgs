ReleaseNotes: |-
  This release delivers a powerful new admin control, smarter notifications, and a long-requested usability improvement.
  📋 Copy & Paste Multiple Recipients
  You can now copy and paste multiple email addresses at once directly into the To and CC fields in the composer — saving time when addressing emails to larger groups.
  🔔 Bundled System Notifications
  When multiple rules trigger at once, system messages are now grouped into a single summary in the conversation — keeping your emails and chats clean and easy to read.
  🗑️ Retention & Purge Rules (New Admin Feature)
  Community admins can now set up and manage purge rules directly from the admin panel — defining how long messages and content are retained before being automatically removed. A powerful tool for compliance, privacy, and keeping your workspace clean.
  If you have any feedback or run into issues, reach out at support@intheloop.io or from within the app.
  Thanks for staying in the Loop! 🚀
