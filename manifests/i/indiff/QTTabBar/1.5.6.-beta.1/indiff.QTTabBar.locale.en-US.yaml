  - 去掉勾选是关闭
  - 勾选中是打开

  默认忽略掉无法打开的路径
  有时候有一些路径无法打开，会弹出这个提示。默认是这个路径不存在或者失效就提示，暂忽略掉不提示

  Intellij Idea 打开并定位文件
  由于已知软件捕获进程的方式，导致外包打开并选中文件无法正常工作；这里给出一个兼容qttabbar版本的实现方式如下。参考命令行的实现方式

  命令方式打开并选中文件
  explorer /n, /e, /select, "C:\Demo\Demo.java"
  explorer /n, /e, /select, "C:\Windows\System32
  otepad.exe"

  打开相应目录，修复自动选择文件问题
  这里虽然功能实现了，但是第三方软件兼容还要观察。目前测试兼容微信、qq、钉钉打开所在文件.
  需要勾选 Capture Selection
  并不是一种好的实现方式，所以有可能导致崩溃。所以这个选项酌情考虑

