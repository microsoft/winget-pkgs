PackageIdentifier: IObit.DriverBooster
PackageVersion: 13.4.0.234
PackageLocale: en-IN
PackageName: Driver Booster
ShortDescription: No.1 free driver updater. Automatically scan and update 95,00,000+ device drivers for a smoother PC.
Description: Driver Booster is a free Windows software that scans your computer and updates over 9.5 million device drivers to improve performance. This software detects and installs newer versions of outdated, missing, or faulty drivers, and can also uninstall and reinstall problematic display drivers. The software includes a Game Boost feature to optimise your computer for better gaming and creates a restore point before making major updates.
