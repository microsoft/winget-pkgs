ShortDescription: lzbench is an in-memory benchmark of open-source compressors
Description: |-
  lzbench is an in-memory benchmarking tool for open-source compressors. It integrates all compressors
  into a single executable. Initially, an input file is loaded into memory, after which each
  compressor is used to compress and decompress the file, ensuring the decompressed output matches the
  original. This method provides the advantage of compiling all compressors with the same compiler and
  optimizations. However, it requires access to the source code of each compressor, meaning e.g. Slug
  and lzturbo are not included.
