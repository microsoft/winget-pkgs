ReleaseNotes: |-
  更新内容
  - 修复今日任务计数与列表筛选不一致的问题
  - 支持在新建任务弹窗中删除误选标签
  - 修复同步状态区的按钮与时间显示冲突
  - 更新 Windows 安装包图标，替换默认 Electron 图标
  验证
  - node --test tests\today-view.test.js tests\index-html.test.js tests\selected-tags.test.js
  - npm run build
