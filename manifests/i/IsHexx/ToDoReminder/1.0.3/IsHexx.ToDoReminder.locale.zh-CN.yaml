ShortDescription: Windows 待办事项管理应用 - Obsidian 同步支持
Description: |-
  Windows 待办事项管理应用 - Obsidian 同步支持
  ✨ 功能特性
  📋 任务管理
  - 创建、编辑、删除任务
  - 优先级设置（高/中/低）
  - 任务完成状态追踪（横线划掉效果）
  - 任务延迟/重复设置
  📅 多视图展示
  - 今日视图 - 专注当天任务
  - 即将到来 - 未来 7 天任务预览
  - 日历视图 - 月度任务概览，彩色标签区分
  🏷️ 标签系统
  - 自定义标签分类
  - 自定义标签颜色（支持任意颜色选择）
  - 标签快速筛选
  🔗 Obsidian 同步
  - 自动同步任务到 Obsidian 笔记库
  - Markdown 格式导出
  - 按日期归档
  ⚡ 快捷操作
  - 全局快捷键 Ctrl+Shift+O 快速录入
  - 系统托盘常驻
  - 最小化到托盘
Tags:
- obsidian
