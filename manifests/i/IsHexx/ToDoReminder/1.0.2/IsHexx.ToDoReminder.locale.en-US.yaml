PackageIdentifier: IsHexx.ToDoReminder
PackageVersion: 1.0.2
PackageLocale: en-US
License: Freeware
ShortDescription: Windows To-Do Management App - Obsidian Sync Support
Description: |-
  Windows To-Do Management App - Obsidian Sync Support
  ✨ Features
  📋 Task Management
  - Create, edit, and delete tasks
  - Priority settings (High/Medium/Low)
  - Task completion tracking (strikethrough effect)
  - Task delay/repeat settings
  📅 Multiple Views
  - Today View - Focus on current day tasks
  - Upcoming - Preview tasks for the next 7 days
  - Calendar View - Monthly task overview with color-coded labels
  🏷️ Tag System
  - Custom tag categorization
  - Custom tag colors (supports arbitrary color selection)
  - Quick tag filtering
  🔗 Obsidian Sync
  - Automatically sync tasks to Obsidian vault
  - Export in Markdown format
  - Archive by date
  ⚡ Quick Actions
  - Global shortcut Ctrl+Shift+O for quick entry
  - System tray persistence
  - Minimize to tray
