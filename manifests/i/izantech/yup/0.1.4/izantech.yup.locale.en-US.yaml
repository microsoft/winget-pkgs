ShortDescription: Safe, cross-platform updater for development tools
Description: |-
  yup detects how each tool was installed (Homebrew, asdf, nvm, pyenv, rbenv, conda, etc.)
  and updates using the correct manager. On first run, it shows an interactive configuration
  wizard to select which managers to update. Subsequent runs execute directly with saved preferences.
Tags:
- cli
- developer-tools
- package-manager
- rust
- updater
ReleaseNotes: |-
  What's Changed
  🔴 CRITICAL Bug Fix
  Version 0.1.3 was completely broken for first-time users. The configuration wizard showed "No package managers with available actions detected" even when package managers were installed, making the tool unusable.
  If you installed v0.1.3, please upgrade immediately.
  Fixed
  - CRITICAL: Configuration wizard showing "No package managers with available actions detected" for first-time users
    - Bug introduced in v0.1.3 refactor where actionable_managers was left empty
    - First-time users (without saved config) could not use the tool at all
    - Existing users with saved configs were not affected
  Added
  - Comprehensive test suite for scan module (7 new tests)
    - Regression tests to prevent actionable_managers bug from recurring
    - Validation of manager detection, implementation, and action availability
    - Consistency and determinism tests for scan results
  Installation
  # Cargo (recommended)
  cargo install yup
  # Homebrew (macOS/Linux)
  brew upgrade yup
  # winget (Windows)
  winget upgrade izantech.yup
  # Chocolatey (Windows)
  choco upgrade yup
  Full Changelog
  View full changelog
