ShortDescription: 通过连接到一台电脑的键盘/鼠标控制多台 Windows 系统
Description: |-
  Input Director 允许通过一台电脑连接的键盘/鼠标控制多台 Windows 系统
  可通过热键切换控制权，或将光标移至屏幕边缘使其跳转至相邻电脑
  支持共享剪贴板功能——在一台电脑复制内容，切换控制权后即可在另一台电脑粘贴
