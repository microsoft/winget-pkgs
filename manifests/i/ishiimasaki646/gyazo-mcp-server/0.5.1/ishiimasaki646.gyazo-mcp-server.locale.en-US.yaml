ShortDescription: Local MCP server for Gyazo with HTTP and stdio transport support
Description: A local MCP (Model Context Protocol) server for Gyazo. Provides image listing, searching, uploading, deleting, and oEmbed metadata retrieval. Supports both streamable HTTP and stdio transports with MCP standard OAuth authentication.
