Description: Intel® oneAPI Toolkit is a comprehensive set of tools and libraries for building high‑performance, data‑centric applications across diverse architectures using SYCL*. It combines an industry‑leading C++ compiler, optimized domain‑specific libraries, and advanced analysis tools to build, optimize, and scale workloads ranging from traditional HPC to AI and machine learning.
InstallationNotes: |-
  The default installation pass following switches to the installer:

  `-a --silent --eula accept -p=NEED_VS2019_INTEGRATION=0 -p=NEED_VS2022_INTEGRATION=0 -p=NEED_VS2026_INTEGRATION=0`

  It WILL NOT integrate this toolkit to VSIDE 2019/2022/2026. If you need this, please
  reinstall this package with `--override` switch and override `NEED_VSXXXX_INTEGRATION`
  as value 1.
