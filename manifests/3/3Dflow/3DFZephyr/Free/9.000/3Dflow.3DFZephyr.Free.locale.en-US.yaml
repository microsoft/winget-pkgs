ReleaseNotes: |-
  3DF Zephyr 9.0 (Nespola) - Changelog

  - Added Gaussian Splatting generation
  - Faster photoconsistency on large point counts
  - Added satellite and hybrid map tiles in render
  - New tripod-style camera controller
  - Unified selection tools with consistent target selector
  - Volume of interest selection in all subtools
  - Point filtering tool now accepts meshes
  - New antialiased grid object on viewport
  - Added ESRI i3s tiled mesh export
  - Added custom reference system conversion on export
  - Added Video Stream / walkthrough preset
  - Added pseudo mercator support
  - Search and download projected reference systems online
  - Added Gaussian Splatting export and workspace merge
  - Fixed crash merging unstructured dense clouds
  - Fixed PLY loader skipping valid files
  - Fixed STL import with non-Latin filenames
  - Fixed laser scan color toggle in mixed projects
  - Fixed circular marker detection count
  - Fixed pivot camera in Ground Extraction dialog
  - Masquerade mode to cut meshes from orthophoto
  - Added AI masking/classification training prep tools
  - Fixed SelectByPlane dialog selection
  - Fixed 3D picking with quad buffer stereo
  - Fixed High DPI / scaling layout issues
  - Fixed save dialogs to use open project folder
  - Save As disabled on empty workspace
  - Fixed OBJ texture loading with spaces in filename
  - Fixed FlowSaM undistortion scale factor mismatch
  - GSD exposed as orthophoto property
  - Added CSV export for Camera Stats
  - Added CSV export for Camera Visible Points report
  - Added polyline surface area to properties
  - Dataset-independent multicamera settings
  - Improved input options dialog (hotkeys, search)
  - Clarified GCP / Check Point terminology and report
  - Consistent geographic coordinate header labels
  - Added optional FPS overlay (off by default)
  - Added network drive warning
  - Updated ffmpeg (adds HEIF video support)
  - Improved labeled slider widget
  - Reorganised advanced settings panels
  - Added grid startup effect
  - Brand new bugs: Ad maiora semper!
