ReleaseNotes: |-
  Improvement: AI Helper - Disabled AI Helper by default for all users, following an update to the opt-in messaging.
  Improvement: AI Helper - Improved prompt structuring to increase the Anthropic prompt cache hit rate
  Improvement: AI Helper - Responses now stream in live as they are generated, with a Stop button to cancel anytime.
  Improvement: AI Helper - Added an option to Delete Conversation in the Global AI Helper.
  Improvement: AI Helper - Multiple conversations are now available.
  Fix: Vulnerabilities - Upgrade third-party dependencies to fix CVE-2026-54512.
  Fix: Aggregation Editor - Fixed a crash that could occur when closing the application while opening an aggregation tab.
  Fix: SQL Tab - Fixed a crash that could occur when opening an SQL tab.
  Fix: Collection Menu - Removed the misplaced option to show and hide AI Helper.
  Fix: Aggregation Editor - Typing in large aggregation pipelines froze the editor because autocomplete blocked the UI thread waiting for proposals.
  Fix: AI Helper - Fixed an issue where clicking the Context button closed the Global AI Helper while its pane was collapsed.
  Fix: Intellishell - Fixed the buttons appearing reversed in the Client certificate dialog.
  Fix: General - Fixed a crash that could occur when expanding and collapsing tree panel.
  Fix: Preferences - Fixed an issue where some options in the Online tab were clipped on Ubuntu.
