ShortDescription: A portable, offline-first Markdown editor with live preview, Typst PDF export, and SQLite persistence.
Description: |-
  Inkwell is a lightweight, offline-first Markdown editor built for focused writing. No cloud, no accounts, no telemetry.
  Features include split-view live preview, command palette, 4 built-in themes plus a custom theme creator, Mermaid
  diagrams, KaTeX math, workspace file tree, find & replace, typewriter mode, focus mode, file tabs, templates,
  version history with diff viewer, file association handling, auto-save on focus loss, and SQLite-backed persistence.
  Typst-powered PDF export and standalone HTML export are unlocked with a one-time Pro license.
  Part of the 4Worlds anti-SaaS portable app suite.
