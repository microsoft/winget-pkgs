Description: Seanime is a media server with a web interface and desktop app for watching anime, reading manga, and managing your local library. Seanime provides a collection of features to enhance your watching and reading experience. Local library management, transcoding, Bittorrent or Debrid downloading and streaming, offline viewing, and more.
