ShortDescription: 3D model viewer, visual debugger, and validator
Description: |
  Solarxy is a cross-platform 3D model viewer, visual debugger, and
  validator built in Rust with wgpu (WebGPU). Inspect 3D models in a
  real-time graphical viewer with PBR rendering, multiple inspection
  modes (Material ID, Texel Density, Depth, Overdraw, AO Preview),
  validation overlays, and split-viewport comparison. Includes a CLI
  companion (`solarxy-cli`) for terminal-based analysis.
