ShortDescription: A modern, high-performance GUI for the scrcpy
Description: >
  ScrcpyGUI v4 is a modern, feature-rich GUI for scrcpy, completely rebuilt from the ground up using
  Tauri v2, React 19, and Rust. It transforms your Android device into a professional tool for
  gaming, development, and content creation.
ReleaseNotes: |-
  ### scrcpy v4.0 Native UI Controls:

  - Flex Display (-x): Dynamic software desktop resizing in Desktop Mode.
  - Camera Torch & Zoom: Full slider and toggle capabilities for device sensors.
  - Keep Active: Non-intrusive wake locks to prevent screen sleep.
  - Background Color: Swatch-preview custom border/letterbox colors.

  ### Dynamic Update Manager:

  - Asynchronous mount-time update comparisons of scrcpy --version against official GitHub
    /releases/latest APIs.
  - Stunning, side-by-side dark glassmorphic confirmation prompt offering dynamic auto-upgrades and
    custom path hot-swaps.

  ### Failsafe Camera Lens Launcher:

  - Full-width, auto-populating specific device camera lens lists (back vs. front sensors,
    resolutions, zoom, FPS) via dynamic Refresh Lenses triggers.
  - Auto-maps resolutions to standard formats and injects a failsafe 1080p camera-size default
    (1920x1080), completely preventing hardware encoder crashes on high-megapixel sensors (such as
    your native 4080x3060 back lens).
  - Added Auto / Default select mapping to dynamically omit both --camera-fps and --max-fps CLI
    parameters.

  #### Security Auditing & Hardening:

  - Pinned exact dependencies to secure package installations.
  - Secured recursive path traversal vectors inside directory duplication helpers.
  - Hardened the translation lookup keys against prototype pollution vectors.

  #### Multi-Language Support:

  - Added fully-translated locale assets across English, French, Portuguese, Russian, Simplified
    Chinese, and Traditional Chinese.
