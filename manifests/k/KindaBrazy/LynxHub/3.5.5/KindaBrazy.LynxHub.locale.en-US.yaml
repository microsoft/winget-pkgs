ReleaseNotes: |-
  💫 3.5.5
  LynxHub: 3.5.5, Build: 52, Chromium: 148.0.7778.271
  This version connects your entire account to the website, providing better and easier access to artifacts, tier management, and account customization. It also brings live plugin download counts, commit history logs in the Git modal, and a high-density compact list layout option for the Plugins page. Additionally, this update delivers redesigned notifications, polished dashboard elements, and smoother native scrolling, alongside an upgrade to latest Electron and underlying API optimizations.
  Warning
  Non-main windows on Linux have been disabled and replaced with native windows where possible. Some features, including in-browser search, link previews, and a few others, are temporarily disabled until find a way to support custom window positioning under the new Wayland display server in Ubuntu 26.
  ✨ New Features
  - Added live plugin download counts in the plugins page.
  - Added repository commit log displays and commit history retrieval directly within the card Git modal.
  - Added a compact list layout option to the Plugins page for high-density navigation.
  ⚡ Improvements
  - Split browser-specific storage configuration into the standalone configuration file.
  - Redesigned and refined the Credits and Patreon supporters dashboard sections.
  - Redesigned the changelogs UI on the Plugins page.
  - Replaced account login and settings with website integration.
  - Redesigned notifications with clean border styling, customizable placement, and action button support.
  - Replaced custom scrollbars with native scrolling and scroll shadows to make the app lighter and animations smoother.
  - Redesigned the plugin version dropdown to look cleaner, with warnings for incompatible plugin versions.
  - Improved incompatible checks and reason tooltip in plugins.
  - Added warnings and alert popups when a plugin fails to load.
  - Added descriptive labels to icon-only buttons to improve screen reader accessibility.
  - Added a settings option to limit browser history size and save memory.
  🐛 Bug Fixes
  - Fixed a bug preventing terminal-only tabs from attempting to open links in a non-existent browser.
  - Fixed the close button of the top toast was not clickable.
  - Fixed disabled state styling and behaviors for switches.
  - Fixed header plugin image loading and updated the image border radius to lg for better aesthetics.
  - Fixed the app update window may show multiple times.
  - Fixed cards background colors may overflow.
  - Fixed browser url preview had extra solid background.
  - Fixed right-click menus showing up in the wrong place or size, and updated exit button styles.
  - Fixed Linux screen sharing not working and switched to standard window controls on Linux.
  - Fixed crashes caused by terminal outputs and loading invalid image links.
  - Fixed occasional errors when loading the terminal.
  - Fixed layout display glitches when a page has no cards to show.
  - Added safety checks for external links opened in the built-in browser.
  - Limited history and list sizes to keep the app fast and prevent slowdowns.
  - Fixed changing plugin versions not working correctly.
  - Fixed updating plugin lists and versions info was not fetching the latest data.
  📌 Minor Changes
  - Simplified accent style logic and smoothed out card hover animations.
  - Added padding around card avatars for installed items.
  - Removed heading sections and updated warnings/confirm checkbox styles in the right-click menu.
  - Updated Theme selection default values.
  - Enlarged the Launch Config modal's body size and added smooth scrolling behavior.
  - Updated style of update-available badge on cards.
  - Updated internal libraries to their latest stable versions.
  - Show your profile picture on the dashboard button when logged in.
  - Replaced some default icons with cleaner alternatives.
  - Updated About and Profile pages with social links and a direct button to manage your account on the web.

  ⚙️ API and Backend Changes
  - Added getLastPathItem utility method.
  - Replaced hardcoded dynamic import strings with inline paths and variable path strings.
  - Replaced path aliases in tsconfig to use standard relative paths.
  - Unified Spinner components to use color="current" and size="sm" across layouts.
  - Integrated useCardOverlayState into the card Wrapper and passed state cleanly down to ReplaceComponent.
  - Cleaned up unused imports, listener subscriptions, and redundant props.
  - Upgraded Electron to ^42.4.0 and bumped node-pty and electron-vite versions.
  - Added @icons-pack/react-simple-icons to project dependencies.
  - Updated package dependencies to their latest stable releases.
  - Simplified the allowScripts script execution permissions in package.json.
  - Enabled extensions to trigger native toasts via the extension API.
  - Added a file IPC method to select multiple files via native system dialogs.
  - Enhanced the LynxScroll custom scrollbar component to accept React refs.
  - Added a dedicated startup script to execute the dev environment on Windows without bypass (--noSandbox).
  - Updated card headers to support custom ReactNode icons or icon URL paths.
  - Implemented action logging middleware and IPC routing for a unified event log.
  - Dynamically retrieve and cache the Sentry DSN from the LynxHub API.
  - Replaced storageUtilsIpc with sendToMain for unified IPC storage.
  - Removed deprecated native configuration from electron.vite.config.ts.
  - Exported HeroUIToastOptions and ToastPromiseOptions interfaces.
  - Reordered imports in browser and IPC files for consistency.
  - Added validate:ext script in package.json for extension type-checking.
  - Added custom image selection support with local caching and custom protocols for cards/avatars.
  App
  - Replaced keytar with file-based token and channel storage.
  - Added caching with time-based invalidation for notification stats and pull requests.
  - Configured native Linux window settings (desktopName and syncDesktopName) in electron-builder.
  Plugins
  - Separated extensions and modules configs into dedicated storage files.
  - Centralized development folder path resolution.
  - Integrated dynamic cache sizing and automatic cleanup intervals.
  - Consolidated page mappings into AppPages.tsx to remove duplicates.
  Extensions
  - Added a build post-script (fixExtension.js) to clean up redundant files and folders after extension builds.
  - Updated fixExtension.js post-build script to clean up residual files when packaging extensions.
  - Added avatarClassName to ToolsCard prop for avatar styling customization.
  - Fixed title bar customizations.

  💖 Amazing Supporters
  A huge “Thank You” to patrons! Your contributions keep LynxHub alive.

  Resolita Lis Carter Rowan Jalinos WarnDer
  Gold Early Access Early Access Early Access Early Access
