ShortDescription: A high-performance API written in Go and React, designed to convert OpenCode into a Claude Code compatible format.
Description: opencode-cc is a high-performance Go proxy that exposes both the Anthropic Messages API and the OpenAI Chat Completions API, with streaming and non-streaming support, and forwards requests to the OpenCode Zen gateway. Zen provides 49 models across four protocols. The proxy automatically selects the correct protocol translator based on the target model ID, allowing Claude Code to run transparently with GLM, Kimi, DeepSeek, Qwen, Claude, GPT, Gemini, and other models.
