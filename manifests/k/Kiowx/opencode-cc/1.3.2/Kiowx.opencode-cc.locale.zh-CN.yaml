ShortDescription: 将 OpenCode 转换成 Claude code 兼容的格式的高性能 API，使用 Go+React 编写
Description: opencode-cc 是一个高性能 Go 代理，对外暴露 Anthropic Messages API 和 OpenAI Chat Completions API（均支持流式与非流式），并将请求转发到 OpenCode Zen 网关的原生协议。Zen 上有 49 个模型分属 4 种协议——本代理按目标 model id 自动路由到正确的协议翻译器，让 Claude Code 透明地跑在 GLM / Kimi / DeepSeek / Qwen / Claude / GPT / Gemini 等模型上。
ReleaseNotes: |-
  更新内容
  修复
  - 修复 Claude Code 长会话或 compaction 恢复后发送 thinking.type: adaptive 时，GLM/Alibaba 上游因枚举不兼容返回 400 的问题；转换路径现在映射为 auto，原生 Anthropic 路径仍保留 adaptive。(#11)
  兼容性与测试
  - 新增 GLM thinking 类型映射单元测试。
  - 新增 adaptive + tools 的流式与非流式端到端测试。
  - 新增原生 Anthropic 请求保持 adaptive 的回归测试。
  - 同步后端健康接口、Web 包和中英文 README 的版本号到 1.3.2。
  跟进中
  - Claude Code 偶发 Console Go: Upstream request failed 400 仍在收集完整上游响应、模型和 compaction 信息，本版本不将其标记为已修复。(#12)
