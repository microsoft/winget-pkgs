ShortDescription: Revisit your Kindle highlights, delivered to your Kindle.
Description: |-
  Relego is a self-hosted tool that delivers Kindle highlight recaps to your Kindle
  via Amazon's Send-to-Kindle service. It imports highlights from "My Clippings.txt",
  selects a daily or weekly subset using spaced repetition, and ships a native EPUB
  recap to your device. The CLI also opens an interactive TUI when launched without
  arguments, letting you browse highlights, manage exclusions, and configure the server.
