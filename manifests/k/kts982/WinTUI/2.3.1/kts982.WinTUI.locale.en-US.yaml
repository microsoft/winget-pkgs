ReleaseNotes: |-
  - Live execution feedback: running batch items now show the latest winget output line and elapsed time instead of just a spinner.
  - Progress bar when winget emits explicit percentages.
  - Process-in-use failures are detected and the result modal advises closing the app and pressing Ctrl+E to retry.
  - Ctrl+E retry now covers process-blocked items (no UAC required when only those need retrying).
  - Fixed blank terminal window during portable-package self-upgrade, including the elevated-helper path.
  - 0x8A150066 now shows a friendly "one or more versions failed to uninstall" message.
