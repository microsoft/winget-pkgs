- cli
ReleaseNotes: |-
  - UI polish: detail overlay now applies the workspace accent / muted palette to field labels, version values, and the package URL consistently. Settings detail panel hint and description word-wrap to the inner panel width on narrow terminals. New state-accent (mint-cyan, distinct from structural pink) used for intent elements like chips, establishing a consistent two-axis color system across the workspace.
  - Packaging: built with -trimpath and -buildvcs=false to strip embedded local build paths and VCS metadata from the binary, reducing the static feature surface that Defender's cloud ML scored as Wacatac.C!ml on v2.6.0 for a small number of users. No runtime behavior change; version string still injected via ldflags.
