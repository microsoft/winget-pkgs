ReleaseNotes: |-
  History tab — the action-history log introduced in v2.10.0 gets its browsing surface inside the TUI. A new History tab (4) lists every batch WinTUI has run — including headless `wintui upgrade` runs from Task Scheduler — newest first, with per-batch drill-down (per-package record, from/to versions, status, error text) and a cross-batch timeline per package. Failed-only filter on `f`, reload on `r`, and the tab re-reads the log on switch so concurrent CLI runs appear. Settings moves from key 4 to key 5.

  - Cleanup: opt-in "WinTUI action history" target. A default-unchecked privacy reset that clears %APPDATA%\wintui\history.json, with an explicit warning that it erases the audit trail the History tab renders. The cleanup allowlist admits only WinTUI's own roaming dir.
  - doctor: the "winget MCP" row now also detects the MCP server binary via its %LOCALAPPDATA% alias path, fixing a false "not present" on standard installs.
  - Toolchain/deps: Go 1.26.5 (2026-07-07 security release; both CVEs evaluated, unreachable in WinTUI), bubbletea 2.0.8, lipgloss 2.0.5 (closed-wrap-writer crash fix), fuzzy 0.1.3 (NUL-rune panic fix), x/sys 0.46.0. Zero new Win32 surface — the syscall symbol set is identical to v2.10.0.
ReleaseNotesUrl: https://github.com/kts982/wintui/releases/tag/v2.11.0
