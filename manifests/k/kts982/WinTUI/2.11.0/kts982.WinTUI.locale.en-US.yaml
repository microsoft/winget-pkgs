ShortDescription: Terminal UI for winget on Windows.
Description: WinTUI is a terminal user interface for Windows Package Manager featuring a split-panel workspace for browsing, searching, installing, upgrading, and managing packages. Includes disk-persistent cache for instant startup, background refresh, integrated search with install queue, batch operations with a single UAC prompt, per-package rules and ignore filters, live command preview, system health checks, registry-driven cleanup tab with per-target sizing and elevated-helper integration, an in-TUI history tab for browsing past install/upgrade/uninstall batches, package list export and import for moving installs across machines, eight curated color themes with light/dark adaptive variants, and a polished headless CLI — themed help and errors, shell completions, a release-notes viewer, action history, portable-package PATH protection, CLI theme switching, self-upgrade, and package filtering — for scripting and CI.
