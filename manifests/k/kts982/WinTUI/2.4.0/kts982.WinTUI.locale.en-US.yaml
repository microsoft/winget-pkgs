- package-manager
- cli
ReleaseNotes: |-
  - Headless CLI: hybrid root + subcommands shape. New commands: wintui check, wintui list, wintui show <id> [--source winget|msstore] [--json], wintui upgrade --all. Old root flags --check / --list still work for one minor release with a deprecation warning. wintui show is read-only and prints the install/upgrade args WinTUI would pass to winget plus any per-package overrides.
  - wintui upgrade --all honors per-package ignore rules and skips the running WinTUI binary (use the TUI for self-upgrade, where the v2.3.x handoff is verified).
  - Package list navigation: PgUp / PgDn jump 10 rows; Home / End jump to top / bottom of the cursor's current section (Updates or Installed).
  - Bug fix: cursor no longer jumps to the upgraded package after a batch completes; lands on the next remaining update or the top of Installed.
  - Bug fix: wintui check / --check now honor per-package ignore rules, matching the TUI; a hidden package no longer flips the exit code.
  - Internal: shared upgrade planner extracted (selectUpgrades) so the TUI and headless CLI never disagree on "which upgrades count?"; --check/--list mutual-exclusion uses Cobra's MarkFlagsMutuallyExclusive.
