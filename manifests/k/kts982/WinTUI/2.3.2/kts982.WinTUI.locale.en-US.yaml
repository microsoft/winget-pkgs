ReleaseNotes: |-
  - Self-upgrade no longer drops an EXE into %TEMP%; handoff now runs from a short-lived PowerShell script under %LOCALAPPDATA%\wintui\self-update\ that waits for the parent to exit, runs winget, and self-deletes. Fewer AV false positives.
  - Self-upgrade now requires an already elevated WinTUI session; non-admin sessions show Ctrl+A to relaunch as admin, with a manual administrator PowerShell command fallback when UAC relaunch is blocked. After the handoff finishes, WinTUI no longer reopens itself automatically.
  - Atomic settings persistence: settings.json is now written via temp file + rename so a crash mid-save cannot leave a partial JSON file.
  - Settings > Default Source detail text corrected: the setting affects searches and installs, not upgrade queries.
  - Documentation: docs/elevation.md now correctly describes four elevation paths.
ReleaseNotesUrl: https://github.com/kts982/wintui/releases/tag/v2.3.2
