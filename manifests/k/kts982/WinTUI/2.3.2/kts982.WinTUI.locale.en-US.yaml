ShortDescription: Terminal UI for winget on Windows.
Description: WinTUI is a terminal user interface for Windows Package Manager featuring a split-panel workspace for browsing, searching, installing, upgrading, and managing packages. Includes disk-persistent cache for instant startup, background refresh, integrated search with install queue, batch operations with a single UAC prompt, per-package rules and ignore filters, live command preview, system health checks, temp cleanup, and a headless CLI mode for scripting.
