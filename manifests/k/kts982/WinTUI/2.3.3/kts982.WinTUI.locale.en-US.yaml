ReleaseNotes: "- Fixed: \"Include Unknown Versions\" setting no longer empties the package lists. WinTUI was passing --include-unknown to winget list and winget search, but that flag is only valid for winget upgrade; winget rejected it with a usage error and the parser saw no rows. The flag is now only attached to upgrade scans, matching the setting's UI copy."
