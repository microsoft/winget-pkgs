ReleaseNotes: |-
  Action history — WinTUI now logs the install/upgrade/uninstall operations it runs, including headless `wintui upgrade` and `wintui import`, so scheduled and CLI-only runs are no longer invisible, and exposes them via a new `wintui history` command. Also adds `wintui fix --portable`, a targeted fix for a winget bug that drops portable CLIs from PATH on upgrade. Pure Go: no new Win32 imports and no new dependencies; settings.json and cache.json load unchanged.

  - Action history (#4). Every batch WinTUI runs is recorded to %APPDATA%\wintui\history.json with per-package from/to versions and status. `wintui history` lists recent batches; `wintui history <id>` shows one package's timeline. Flags: --limit, --since, --failed-only, --json. Records WinTUI-originated actions only — winget exposes no event feed for external changes.
  - wintui fix --portable. Pins portable winget packages to user scope (scope=user, elevate=false) so a future upgrade can't strip them from PATH (winget-cli #4044/#5099). Idempotent, with --dry-run and --json; `wintui upgrade` also nudges toward it when an at-risk portable package is about to upgrade.
  - Ride-alongs. `wintui doctor` gains a neutral "winget MCP" detection row, and headless `wintui upgrade` prints a periodic "still working (Nm elapsed)" heartbeat so a slow installer isn't mistaken for a hang.
