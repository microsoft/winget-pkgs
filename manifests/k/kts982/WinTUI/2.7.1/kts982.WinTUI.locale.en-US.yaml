ReleaseNotes: |-
  - Bug fix: wintui list and wintui check returned "0 packages" on systems whose Windows display language is not English. The parser searched the table header for hardcoded English column names, so localized headers (Italian Nome / Versione / Disponibile / Origine, German Verfügbar / Quelle, Japanese 名前 / バージョン / ソース, etc.) were not recognised and the parser returned an empty list silently.
  - The new parser recognises localized headers via a vendored dictionary built from microsoft/winget-cli's own resource files for the 11 official winget locales (en-US, de-DE, es-ES, fr-FR, it-IT, ja-JP, ko-KR, pt-BR, ru-RU, zh-CN, zh-TW), falls back to a positional schema for unknown locales, walks the header by display cells so CJK characters do not desync from ASCII rows, and surfaces a clear parse error when a table is present but no required column can be mapped.
  - The same fix also unblocks WinTUI's auto-self-update path on localized systems.
  - No behavior changes for English users. No setting changes, no breaking changes, no new Win32 surface.
