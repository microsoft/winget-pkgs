- terminal
- package-manager
- cli
ReleaseNotes: |-
  - Cleanup tab redesign: registry-driven multi-target cleanup with grouped panels (Core Temp, Caches, Developer caches, GPU vendor caches), per-target sizing, age-aware scrubbing, and elevated-helper integration for admin-only paths (Windows Temp, system minidumps). New cleanup_auto_scan setting (safe / all / off); developer caches default off and opt-in toggles persist across sessions.
  - Export / Import: new wintui export and wintui import CLI commands with versioned JSON envelope, dry-run preflight, and name-collision detection. TUI integration on the Packages tab — press e to export, Shift+I to open the import overlay (scans Desktop / home / cwd for export files, with row-level toggling).
  - Bug fix: toast notifications on uninstall batches now correctly say "uninstalled" instead of "upgraded".
