ReleaseNotes: |-
  - Fixed the self-upgrade completion modal so `Enter` now exits WinTUI and launches the temporary helper reliably.
  - Detached the self-upgrade helper from the caller's console and relaunches WinTUI in a new console window after the portable-package upgrade completes.
  - Cleared stale package cache after successful self-upgrade so WinTUI does not reopen still showing itself as upgradeable.
  - Added helper-side logging and regression coverage for the self-upgrade handoff path.
