ReleaseNotes: |-
  - Per-package update policy: Ask / Auto / Hold. Press `t` on a focused winget/msstore row to cycle the policy, or use the Package Rules editor (`p`) on the detail view. Existing ignore / ignore_version settings keep working — the planner treats them as Hold, so settings.json stays backward compatible.
  - wintui upgrade --auto: upgrade only Auto-policy packages from the headless CLI. Lower blast radius than --all for cron jobs and scheduled tasks. Mutually exclusive with --all.
  - wintui upgrade --id <pkg> [--id <pkg>...]: upgrade named packages from a pipeline. Held IDs error out (exit 1), unknown IDs are no-ops, the running WinTUI binary is skipped.
  - On-launch auto-update: if any Auto package has an update available, a 5-second cancelable countdown modal appears before the upgrade batch starts. Enter to start now, Esc to cancel for the session. The WinTUI self-package is deferred to the regular Updates flow with a banner explaining why.
  - Removed: deprecated root flags wintui --check / --list (deprecation promised in v2.4.0). Use wintui check / wintui list.
  - Bug fix: refresh no longer stalls on packages with long winget IDs. Truncated-ID recovery now runs lazily at action time instead of during every listing, so launch and `r` no longer pay a per-row cost for IDs that winget abbreviated with `…` in its table output.
ReleaseNotesUrl: https://github.com/kts982/wintui/releases/tag/v2.5.0
