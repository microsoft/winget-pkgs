ReleaseNotes: |-
  Features
  - 聊天待办现在可以设置提醒时间，到点会引用原消息并提醒相关人员，避免遗漏重要事项。
  - 团队管理支持管理员创建或批量导入员工账号，并可填写部门、职位等信息，添加成员更方便。
  - 系统设置新增聊天待办权限控制，可限制其他人员设置或取消聊天待办。
  Bug Fixes
  - 设置内容没有变化时不再重复保存，减少无效操作，让使用更稳定。
  Documentation
  - 补充路由使用限制说明，帮助使用者更清楚地了解规则。
  - 统一回复语言偏好说明，确保整段回复使用简体中文。
