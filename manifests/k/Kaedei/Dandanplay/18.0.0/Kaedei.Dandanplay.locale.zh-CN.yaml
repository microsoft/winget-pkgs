ReleaseNotes: |-
  更新内容：
  1. 新增 mpv 播放器内核，支持 OpenGL 渲染、超分辨率、补帧增强等高级功能，提供更流畅的播放体验和更广泛的格式支持。
  2. 新增 MonoTorrent v3+（测试版）下载器内核。原生 AOT 编译，使用进程隔离技术，相比旧版下载器，性能提升显著，资源占用更低。
  3. FFmpeg 内核新增硬件加速选项，支持 D3D11VA（默认）、DXVA2。
  4. 优化了日志查看窗口的性能，提升了日志加载和显示的速度。支持复制日志内容到剪贴板，方便用户分享和分析日志信息。
  5. 下载器初始化和操作时增加了等待提示。
  6. 优化了下载器停止任务的体验，优化了批量停止任务时的响应速度。
  7. 修复了在线观看功能加载时可能导致界面卡住的问题。
  8. 修复了访问 WebDAV 服务器时可能因路径包含非法字符导致文件列表无法加载的问题。
  9. 修复了播放部分 M3U8 文件时可能出现的解析错误，提升了在线播放的稳定性。
