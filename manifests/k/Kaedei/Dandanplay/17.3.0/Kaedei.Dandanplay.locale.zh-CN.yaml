ReleaseNotes: |-
  更新内容：
  1. 新增用户界面多语言切换功能，支持简体中文、繁体中文（香港）、繁体中文（台湾）、日文等多种语言；
  2. 个人中心新增 bangumi.tv 授权管理功能；
  3. 支持加载 MKV 视频中的内封字体文件；
  4. 支持加载 VTT 格式的字幕文件；
  5. 支持收录和加载 STRM 格式的媒体库文件；
  6. 为播放器内置 http 透传代理增加了动态限速功能，减少了断连等问题；
  7. 更新了设置中的字体选择功能，增加显示字体原名，将中日韩字体优先显示；
  8. 登录窗口新增“记住密码”选项；
  9. 使用快捷键（N）跳转章节时将显示章节标题提示；
  10. 优化了 Emby/Jellifin 媒体库文件列表的展示效果；
  11. 升级了所有"选择文件夹"的对话框样式，改为使用现代风格的文件夹选择界面；
  12. 升级了媒体库底层存储，兼容更多类型的数据库条目；
  13. 优化了“评论区”头像显示，现在将正确显示为圆形；
  14. 优化了添加第三方弹幕时浏览器窗口的选择界面，由弹出确认框改为顶部提示；
  15. 自动下载页面支持自动保存排序规则；
  16. 放宽了“自动下载”规则的名称长度限制；
  17. 修复播放器标题区域二级列表可能出现滚动条的问题；
  18. 修复了一个并发访问数据库的潜在问题；
  19. 修复了媒体库中收录空文件名可能导致的报错问题；
  20. 修复了在访问 Emby/Jellyfin 媒体库的文件夹时可能报错的问题；
  21. 修复了 EVR 内核在播放结束后未正常释放文件占用的问题；
  22. 修复了媒体库文件列表中点击刷新按钮无反应的问题。
