ReleaseNotes: |-
  1. 个人中心新增 Bangumi.tv 授权功能，授权后可在播放时同时自动更新 Bangumi.tv 上的观看进度。
  2. 播放列表支持添加、显示远程媒体库中的文件。
  3. 媒体库、番剧详情页新增“评论区”功能。
  4. 新版字幕渲染器中新增“允许字幕渲染在视频外部”的选项。
  5. 远程媒体库连接 Plex 时支持显示作品、文件缩略图，支持显示来自 Plex 的刮削信息。
  6. 优化了远程媒体库播放时文件识别的速度。
  7. 播放器外观设置中，新增毛玻璃效果强度的调整选项。
  8. 修复了使用『弹幕外挂』时，直接关闭外部播放器窗口可能出现错误弹窗的问题。
  9. 修复了在特殊分辨率下，字幕渲染可能与实际画面比例不符的问题。
  10. UWP（微软商店）版本中，修复了因缺少组件导致的无法显示视频缩略图、无法转码视频、无法使用部分内核播放视频等问题。
  11. 修复了媒体库中，未看剧集无法手动标记为已看的问题。
  12. 修复了点击重新播放可能会跳转至错误剧集的问题。
  13. 修复了启用新版字幕渲染器并加载视频时，部分提示对话框可能会自动关闭的问题。
  14. 修复了启用新版字幕渲染器时，EVR 内核可能与 SVP 等滤镜冲突的问题。
