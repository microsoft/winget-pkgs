ShortDescription: Your handy, infinite brainstorming tool!
Description: >
  Drawy lets you create ideas, diagrams, and visual notes on an infinite whiteboard with a smooth
  and responsive canvas. You can draw with pressure-sensitive tablet support, add text, insert
  images, and use basic shapes such as rectangles, ellipses, arrows, and lines to organise your
  content clearly. You can choose your own color palette and export your work as image files
  whenever needed. Drawy is built to stay lightweight and fast, making it easy to capture ideas and
  work freely without distractions.
