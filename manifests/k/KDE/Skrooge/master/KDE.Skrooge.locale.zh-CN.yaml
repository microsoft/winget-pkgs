ShortDescription: 管理您的财务
Description: |-
  Skrooge 是一款由 KDE 提供支持的个人理财管理软件，旨在简单直观。Skrooge 可帮助您记录支出和收入，对它们进行分类，并生成相应的报表。
  功能：
  - 支持 QIF、CSV、SKROOGE、KMYMONEY 的导入/导出
  - 支持导入 Microsoft Money、OFX、QFX、MT940、GNUCASH、GRISBI、HOMEBANK 和 MONEY MANAGER EX
  - 高级图形报表
  - 多标签页，便于组织工作
  - 无限次撤销/重做（即使文件已关闭！）
  - 对交易和报表进行即时筛选
  - 无限层级的分类
  - 交易批量更新
  - 定期交易
  - 追踪支出退款
  - 基于搜索条件自动处理交易
  - 支持多种货币
  - 预算管理
  - 仪表盘
  - 理财建议
