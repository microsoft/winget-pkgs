ShortDescription: Rolisteam 服务器客户端
Description: |-
  Rolisteam 是一款虚拟桌面游戏软件。它可以帮助您与远程的朋友/玩家管理桌面角色扮演游戏。它提供了许多功能来共享地图、图片，还包括与朋友/玩家交流的工具。我们的目标是让使用 Rolisteam 管理的 RPG 游戏体验尽可能接近在现实中围桌进行的 RPG 游戏。为实现这一目标，我们正在努力为您提供越来越多的功能。
  功能
  - 角色卡
  - 音乐播放器
  - 绘图工具（可即时绘制地图）
  - 矢量地图
  - 名称生成器
  - 单位转换器
  - 角色卡
  - 富文本编辑器
  - 掷骰子功能
  - 秘密掷骰子功能
  - 图片共享
  - 地图共享
  - 地图上的战争迷雾
  - 可玩角色或玩家身份（在聊天中）
  - 玩家角色和非玩家角色在地图上的定位
  - 一对一/多对多/全体聊天通信
  - 客户端/服务器架构
  - 以及其他诸多功能……
