ShortDescription: A classic 9 × 9 sudoku game
Description: |-
  PuMoKu is a classic, 9 × 9 Sudoku solving game aimed for Plasma Mobile. It comes with flexible highlighting options and (touch) input methods, full undo stack and more.
  - Input methods: Cell first, Number first or Hybrid
  - Built in sudoku generator
  - Automatic undo when the same action is repeated
