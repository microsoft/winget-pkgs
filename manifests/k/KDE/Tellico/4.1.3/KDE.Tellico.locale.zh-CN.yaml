ShortDescription: 收藏管理器
Description: |-
  Tellico 是一个用于整理收藏品的应用程序。它提供了针对图书、参考文献、视频、音乐、电子游戏、硬币、邮票、集换卡、连环画和葡萄酒的默认模板。它允许您将收藏品录入目录数据库中，保存包括标题、作者等在内的多种不同属性。
  功能：
  - 支持图书、参考文献、视频、音乐、电子游戏、连环画、硬币、邮票、集换卡、葡萄酒、棋盘游戏和文件目录等默认收藏类型
  - 支持用户自定义收藏类型
  - 支持任意数量的用户自定义字段，字段类型包括：文本、段落、列表、复选框、数字、网址（URL）、日期、图像及组合类型
  - 支持包含多位作者、多种类型、多个关键词等的条目处理
  - 自动格式化标题和姓名
  - 支持收藏品搜索和视图筛选
  - 可按多种属性对收藏品进行排序和分组
  - 通过 XSLT 实现自定义条目模板
  - 支持导入 MODS、Bibtex、RIS、CSV、PDF 元数据以及多种其他格式
  - 支持导出为 Bibtex、ONIX、CSV、HTML 等多种格式
  - 可直接从 Amazon.com、IMDb、z39.50 服务器、PubMed、SRU 服务器、CrossRef.org 等众多网站以及外部脚本导入信息
  - 支持导入 CDDB 数据以编目音频 CD
  - 可扫描并导入音频文件收藏，如 mp3 或 ogg 文件
