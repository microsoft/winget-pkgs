ShortDescription: Media Player
Description: |-
  Open source media player built with Qt/QML and libmpv.
  Features
  - play online videos, through youtube-dl
  - supports youtube playlists
  - toggle playlist with mouse-over, playlist overlays the video
  - auto skip chapter containing certain words
  - configurable shortcuts and mouse buttons
  - quick jump to next chapter by middle click on progress bar
Tags:
- audio
- media
- mpv
- multimedia
- music
- player
- video
ReleaseNotes: |-
  Features
  - open multiple files from command line, allows to open only the selected files in the file manager
  - stop action, available in the playback
  - setting to enable taskbar progress
  - show filename/title in OSD when opening a file
  - mpris: find and set cover from external image file for audio files without internal covers
  - custom loading animation
  - setting for mpv's sub-border-style property
  - Playlist: menu item to open file in MediaInfo app (if installed)
  - Playlist: allow sorting ascending/descending for None option
  - Playlist: indicator for resume playback position under the duration
  - Playlist: item drag handle is now shown on hover
  Bugfixes
  - hide chapters menu button when there are no chapters
  - font family reset button not saving the setting
  - Playlist: restore last active playlist only if opening without a file
  - Playlist: slow scroll to playing item on startup
  - Playlist: clicks triggering playlist item under the tab
  - Playlist: no menu on tabs
