ShortDescription: Local invoicing software for freelancers and small businesses – e-invoicing, quotes, dunning, DATEV export.
Description: |-
  BILLEVO is local desktop invoicing software for Windows – built for freelancers and small
  businesses in Germany.

  - E-invoicing in ZUGFeRD, Factur-X and XRechnung – the underlying XML stays visible.
  - Invoices, quotes, delivery notes, recurring & collective invoices.
  - Customers, items with simple inventory, expenses & incoming invoices, time tracking.
  - DATEV export (SKR03/SKR04) for a clean handover to your tax advisor.
  - GoBD-oriented, small-business §19-ready, IBAN check, dunning.
  - Local-first: your data stays on your device, no forced cloud.

  One-time purchase instead of a subscription: try free for 30 days, then activate with a
  license key from billevo.de. No recurring fees.
