ShortDescription: Modern open-source Windows uninstaller with silent uninstall, leftover scan and safe cleanup with undo.
Description: |-
  Vanish is a modern, open-source uninstaller for Windows built with WinUI 3.
  It lists classic desktop programs and MSIX/Store apps, derives silent uninstall
  switches for MSI, Inno Setup, NSIS and Squirrel installers, uninstalls apps in
  a batch queue, and fingerprints each app before uninstalling to find leftover
  files, folders and registry entries afterwards. Every cleanup is reversible:
  files go to the Recycle Bin and registry keys are backed up to .reg files with
  one-click undo. No ads, no bundles, no telemetry.
