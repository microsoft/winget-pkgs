ShortDescription: 现代开源 Windows 卸载器——静默卸载、残留扫描、可一键撤销的安全清理。
Description: |-
  Vanish 是一款基于 WinUI 3 构建的现代开源 Windows 卸载器。
  完整列出传统桌面程序与 MSIX/商店应用，自动为 MSI、Inno Setup、NSIS、
  Squirrel 安装器推导静默卸载参数，支持批量队列卸载；卸载前先对应用做
  指纹采集，卸载后据此扫描残留的文件、目录与注册表项。所有清理均可撤销：
  文件进回收站，注册表项自动备份为 .reg，一键还原。无广告、无捆绑、无遥测。
