ReleaseNotes: |-
  Highlights
  - haus helper — first-class UI helper creation. Per-kind subcommands (create-boolean, create-text, create-number, create-select, create-datetime, create-counter, create-timer) plus list and delete. Removes the "drop to the HA UI mid-deploy" gap.
  - haus template — render a Jinja2 template against current state via HA's /api/template endpoint. Inline arg, --from-file, or stdin. Catches Jinja bugs before they reach an automation.
  - automation create --config-id — when you set the config id explicitly, the resulting entity_id is now aligned to automation.<config-id> instead of being derived from the alias. No more entity rename-id cleanup after creation.
  - automation enable / automation disable — idempotent alternatives to automation toggle for scripting.
  - Trace IDs no longer truncated. automation trace now shows the full 32-char run ID stacked 4×8 in the pretty table, so you can use the displayed ID directly with --run.
  Breaking changes
  - Flag rename on create commands. --id is now --config-id (automation, scene) or --object-id (script). Update any scripts that called the old flag.
