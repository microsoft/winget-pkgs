ReleaseNotes: |-
  Keeper Commander release version v18.0.0
  KeeperDrive
  - New command suite for working with KeeperDrive folders, records, and sharing (display, folder, record, and sharing subcommands).
  PAM
  - pam project export — emits a JSON document for a PAM project that is directly re-importable via pam project import.
  - pam project kcm-import / pam project kcm-cleanup — import connections directly from a KCM/Guacamole database into Keeper PAM.
  - pam tunnel automation modes — new non-interactive modes for CI/CD, systemd, and scripts.
  - pam launch UX improvements.
  - pam rotation info --format=json — structured JSON output (status, gateway, complexity, schedule, etc.)
  Secrets Manager
  - secrets-manager token add <APP_UID_OR_NAME> — add one-time access tokens to an existing KSM application without recreating it.
  Fixes
  - pam project import now rejects JSON files containing duplicate uid values across resources and nested users.
