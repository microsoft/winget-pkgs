ReleaseNotes: |-
  1. Fixed an issue where User-Agent adjustments in Karing caused incorrect matching for some proxy providers. #1729
  2. Added support for specifying an override DNS list for proxy servers via the outbound-dns parameter when importing a subscription using the karing://install-config (e.g., karing://install-config?url=https%3A%2F%2Fxxxxx.com%2Fclash%2Fconfig&outbound-dns=udp%3A%2F%2F8.8.8.8%2Cudp%3A%2F%2F5.5.5.5).
