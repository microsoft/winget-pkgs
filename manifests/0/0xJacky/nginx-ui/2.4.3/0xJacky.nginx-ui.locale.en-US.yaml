ReleaseNotes: |-
  Features
  - Add site-level access and error log entry points from the site list and configuration editor.
  - Add MiniMax OpenAI-compatible provider presets, regional endpoints, and model suggestions (#1739).
  Bug Fixes
  - Allow settings saves to round-trip redacted IP whitelist values without validation failures (#1741).
  - Harden automatic backup filenames against path traversal and unsafe cross-platform names.
  - Improve Nginx log analytics, indexing, parsing, rotation handling, pagination, and race stability.
  - Simplify the Nginx log implementation by removing unused optimization paths.
  - Narrow sensitive settings redaction so operational settings remain visible while credentials still require 2FA reveal.
