ShortDescription: Grunt is a powerful add-in for PowerPoint that lets you create stunning visualizations.
ReleaseNotes: |-
  # Version 2026.1

  ## What's new

  - Formulas in Data Editor is the long awaited functionality that enables ability to write formulas
    directly in the Grunt data editor in PowerPoint. This new feature lets you use common spreadsheet
    formulas directly in your tables. Quickly calculate values without leaving Grunt.
  - Improving Excel connection. In a huge rewrite of how data and connections are handled, implementing
    WYSIWYG references in the Data Editor, the actual cell address will be displayed with a formula,
    along with the introduction of a read-only tab referencing the cell values. There are now two tabs
    visible to the user when connection is established.
  - Improved Mac Stability. This release includes significant stability improvements for macOS users.
    We've addressed several crash scenarios, including issues that could occur when closing documents or
    updating connected Excel files. These fixes provide a more reliable and smooth experience when
    working with Grunt on Mac.

  ## Revision 10

  > 2026-March-20

  - Fixed an issue on Mac where number format reading from Excel could fail.
  - Fixed a bug in the floater where bold state could appear incorrectly.
  - Fixed an issue in Agenda where added chapters could be invisible.
ReleaseNotesUrl: https://app.grunt.pro/release-notes/version/2026.1-r10-6118
InstallationNotes: |-
  Since it's an add-in for Microsoft PowerPoint, you HAVE TO prepare a valid PowerPoint installation
  in advanced. Supported versions are Microsoft 365 or Microsoft PowerPoint 2021 / 2019 / 2016.
