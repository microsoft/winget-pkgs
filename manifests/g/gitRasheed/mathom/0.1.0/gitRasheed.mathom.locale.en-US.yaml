ShortDescription: Fast, open-source disk space analyzer for Windows
Description: >-
  Scans a drive or folder and shows where the space went: a live-updating
  tree, a squarified treemap, file-type breakdown, and instant search.
  Reads the NTFS MFT directly for WizTree-class scan speed when run as
  administrator, with a portable parallel walker as fallback.
