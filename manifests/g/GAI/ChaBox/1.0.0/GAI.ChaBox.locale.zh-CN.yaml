ShortDescription: ChaBox - 离线文件安全箱
Description: |-
  ChaBox 是一款 100 % 离线、基于 ChaCha20‑Poly1305 标准 的文件加解密工具。我们刻意采用 极简 UI， 仅三件工具新人即可快速上手；

  - 1️. 一键加/解密 – 直接在工作台拖入文件即可完成加密或恢复明文。
  - 2. 安全日记 – 支持富文本(Markdown)，所有文字与图片均在本地加密，写完即锁。
  - 3. 安全删除（Wipe） – 多次随机覆写，彻底抹除敏感文件。

  应用内部的 文件保险箱 使用原生文件夹组织加密文件，用户可以在系统的文件管理器、U 盘或网盘之间自由搬迁，保留完整的目录结构，确保跨平台/跨设备的流通性。

  为了让用户在 “使用‑>‑学习‑>‑掌握” 的闭环中自然提升安全意识，ChaBox 还提供防截屏/防录屏、闲时自动锁屏、剪贴板定时清理等 主动防御功能。所有防护均在本地完成，不收集任何个人数据，也不依赖云服务。
  
