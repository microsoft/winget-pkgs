License: LGPL-2.1

Author: crown.hg
ShortDescription: A high-performance, open source cli tool for file management and workflow automation.
Description: |-
  It excels at precision file discovery using glob patterns, 
  file states (time, size), and MIME-type detection. 
  
  Beyond discovery, ft supports regexp-based search-and-replace, 
  and enables complex batch processing via built-in subcommands 
  or by orchestrating native system CLI applications as a universal shell task runner.
  
  Using ft
  General Help: ft help
  Command Specific Help: ft help <command> (e.g., ft help list)
  Begin your ft journey!
  
  To learn more about how ft empowers you to bypass the limitations of 
  standard shell scripts and toolchains, please explore our FAQ: 
  https://github.com/huanguan1978/ft/blob/main/doc/en/FAQ.md
  
