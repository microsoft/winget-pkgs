ReleaseNotes: |-
  What's changed
  - Fix a bug where the UI can end up in an inconsistent state after removing a Wi-Fi profile
  - Fix a silent crash when renewing the certificate credential in the background
  - Fix a problem where pressing the Toast notification would not do anything
  - When renewing, try using a refresh token; if that fails, initiate a new authorization flow
  - Improve URL detection in the discovery search field
  - Improve handling command line arguments
  - Show warning symbol when loading discovery fails

  Known bugs
  - Error messages in other languages than English may not wrap
  - Network errors after selecting an institution may not be handled properly
