ShortDescription: A lightweight PowerShell toolkit for frontend developers — project manager and local CORS proxy.
Description: |-
  FrontNox is a pure-PowerShell toolkit for frontend developers with zero external dependencies.
  It ships two tools:
    - proj: save, switch, and launch your projects from the terminal.
    - corsproxy: a local HTTP proxy that adds CORS headers to any response.
  After installation, restart your terminal and use 'proj' and 'corsproxy' directly.
