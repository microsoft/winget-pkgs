ShortDescription: 直接在您的代码库中使用 Antigravity。在终端中完成构建、调试和发布。只需描述您的需求，剩下的交给 Antigravity 即可。
Description: |-
  Antigravity CLI 是 Antigravity 的轻量级终端用户界面（TUI）。它将 Antigravity 2.0 的核心智能体能力——包括多步推理、多文件编辑、工具调用和对话历史——直接带入您的终端。
  该 CLI 是以键盘为中心的开发者和远程 SSH 工作流的理想工具，并针对速度和低资源占用进行了优化。
