ReleaseNotes: |-
  v55.3 is a point release of Perfetto v55 which relaxes embedded proto descriptor loading to allow wire-compatible extensions re-declared under renamed packages and defaults the UI to the Heap Dump Explorer view for traces with heap graph data. It also includes the fix from v55.2 which addressed an issue with how the "classic" CLI interface of trace_processor worked on Windows, preventing breakage of the Python API on that platform.
