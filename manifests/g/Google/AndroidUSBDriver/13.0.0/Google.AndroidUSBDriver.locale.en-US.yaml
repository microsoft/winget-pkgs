  - pixel
  - usb
  - windows-driver
ReleaseNotes: |-
  Driver revision r13:
  - Adds support for Android 13+ devices
  - Updated hardware IDs for newer Pixel models
  - Compatibility with Windows 11
ReleaseNotesUrl: https://developer.android.com/studio/releases/platform-tools
