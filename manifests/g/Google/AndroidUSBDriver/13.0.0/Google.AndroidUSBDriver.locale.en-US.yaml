Author: Google LLC
PackageName: Google USB Driver
PackageUrl: https://developer.android.com/studio/run/win-usb
License: Apache-2.0
LicenseUrl: https://developer.android.com/license
Copyright: Copyright 2024 Google LLC
ShortDescription: Official USB driver for Google Pixel and Android devices on Windows.
Description: |-
  The Google USB Driver is required for Windows if you want to perform adb
  debugging with Google devices. It enables communication between your Windows
  PC and Android devices (Google Pixel, Nexus, and other Android devices) via USB.

  This package downloads the official driver (r13) from Google's servers,
  verifies its integrity, and installs it system-wide using pnputil so your
  device is automatically recognized when connected via USB.

  After installation, Android devices will appear in Device Manager and be
  accessible via adb, fastboot, and Android Studio.
Moniker: google-usb-driver
