ReleaseNotes: |-
  Release 2.50 introduces the following new features:
  - Global connection settings: You can now configure connection settings that apply to all projects by right-clicking Google Cloud in the Project Explorer window and selecting Connection settings. Global connection settings are inherited across all projects, zones, and VM instances.
  - SSH shortcuts: The terminal now additionally supports Ctrl+Shift+C and Ctrl+Shift+V for copying and pasting text.
  - Connecting to databases: IAP Desktop now supports SQL Server Management Studio 22 and more versions of the MySQL, MariaDB, and PostgreSQL clients, including the latest ones.
  In addition, the release includes several stability improvements and fixes for the following issues:
  - Copying or pasting text to the terminal could work unreliably.
  - Checking for updates sometimes failed because of rate limit exhaustion.
  - Certain display scaling configurations could cause IAP Desktop to crash when initiating an RDP connection.
  IAP Desktop is developed and maintained by jpassing.
