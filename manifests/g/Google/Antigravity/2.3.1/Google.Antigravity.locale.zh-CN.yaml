ShortDescription: 体验次世代智能体平台，开启飞跃之旅
Description: |-
  Antigravity 2.0 是您 AI 智能体的中央指挥中心，提供了一个统一的平台来启动、监控和编排它们的活动。与前身 Agent Manager 不同，Antigravity 2.0 是一个独立于 IDE 运行的应用程序。
  通过该界面，您可以同步或异步地编排智能体，以实现以下功能：
  - 执行系统命令
  - 进行文件读写操作
  - 开展网页搜索
  - 通过技能（Skills）和 MCP 服务器集成外部工具
  - 管理子智能体（Subagents）
  - 与 Chrome 浏览器交互
  - 创建制品（Artifacts）/ 实施计划
  无论您是进行深入研究还是构建新应用，Antigravity 都能为各类知识型工作提供流线型的操作界面。
