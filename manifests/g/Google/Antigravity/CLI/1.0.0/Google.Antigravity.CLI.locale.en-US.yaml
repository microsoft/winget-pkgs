ShortDescription: Lightweight terminal interface for invoking, monitoring, and interacting with Antigravity agents directly from the command line. It brings Antigravity’s core agentic development capabilities to fast, keyboard-first workflows.
Description: Google Antigravity CLI is a terminal-first companion to Google Antigravity 2.0, designed for developers who prefer speed, low overhead, and keyboard-centric workflows. It lets users run and manage Antigravity agents from the command line while retaining the same core agent harness used by the broader Antigravity platform. The CLI supports agentic coding workflows such as multi-step reasoning, multi-file editing, tool calling, and conversation history, making it useful for local development, remote SSH sessions, and streamlined terminal-based automation. Conversations and settings can work across Antigravity surfaces, allowing developers to start in the CLI and move into the full Antigravity 2.0 experience when a richer visual interface is needed.
