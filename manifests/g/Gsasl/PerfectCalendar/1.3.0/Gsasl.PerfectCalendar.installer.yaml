PackageIdentifier: Gsasl.PerfectCalendar
PackageVersion: 1.3.0
PackageLocale: en-US
Publisher: Gsasl
PublisherUrl: https://github.com/Gsasl
PublisherSupportUrl: https://github.com/Gsasl/WinOptimizer_exe/issues
PackageName: PerfectCalendar
PackageUrl: https://github.com/Gsasl/WinOptimizer_exe/tree/main/Calender_noBloat
License: MIT
LicenseUrl: https://github.com/Gsasl/WinOptimizer_exe/blob/main/LICENSE
ShortDescription: >-
  Zero-bloat Win32 taskbar calendar (~230 KB). Dark mode, flat-file
  events, bold day highlighting, global hotkey, idle transparency.
Description: >-
  PerfectCalendar is a pure C / Win32 API taskbar calendar that boots
  silently to the system tray and weighs ~230 KB on disk — no .NET,
  no WebView2, no background sync daemon.

  Key features:
  • Flat-file event scheduling (events.dat — plain text, always yours)
  • MCM_SETDAYSTATE bitmask highlighting — days with events appear bold
  • Wildcard recurring events: ****-12-25 (yearly), ****-**-01 (monthly)
  • Global hotkey (Ctrl+Shift+Space default) — summons to your cursor
  • Conflict-safe hotkey: shows tray notification instead of crashing
  • Idle fade transparency via WS_EX_LAYERED
  • ISO week-number column (MCS_WEEKNUMBERS)
  • Multi-format date copy (ISO 8601, US, long form)
  • UTC clock alongside local time
  • HiDPI / 4K aware, mouse-wheel font zoom
  • Explorer crash resilience (TaskbarCreated)
  • All settings persisted to HKCU registry

Moniker: perfectcalendar
Tags:
  - calendar
  - taskbar
  - tray
  - clock
  - events
  - scheduler
  - win32
  - lightweight
  - dark-mode
ReleaseNotes: |-
  v1.3.0 — Full feature release

  NEW
  • Add-Event: inline subclassed EDIT control (Enter = save, Esc = cancel)
  • Recurring events: ****-MM-DD (yearly) and ****-**-DD (monthly)
  • Hotkey submenu in tray: 3 presets + Disabled, all check-marked
  • MOD_NOREPEAT on RegisterHotKey prevents key-repeat flooding
  • Tray balloon on hotkey conflict — app keeps running normally
  • MCN_GETDAYSTATE bitmask bold-day highlighting (MCS_DAYSTATE)
  • ISO week-number column (MCS_WEEKNUMBERS)
  • Multi-format copy: ISO / US / long form via NM_RCLICK
  • UTC clock label (GetSystemTime)
  • Smooth idle transparency fade (WS_EX_LAYERED, TID_FADE timer)
  • Owner-drawn LISTBOX: recurring events in accent blue
  • F5 hot-reload events without restart

  FIXED
  • Silent tray boot: ShowWindow removed from WinMain — no more
    aggressive popup on every system startup when Run on Startup enabled
  • SetWindowSubclass replaces legacy SetWindowLongPtr subclassing
  • hFontSmall / hSelBrush / hListBrush fully cleaned in WM_DESTROY
  • All timers explicitly KillTimer'd in WM_DESTROY
  • Mutex name versioned to avoid collision with older installs

ReleaseNotesUrl: https://github.com/Gsasl/WinOptimizer_exe/releases/tag/v1.3.0

ManifestType: defaultLocale
ManifestVersion: 1.6.0

