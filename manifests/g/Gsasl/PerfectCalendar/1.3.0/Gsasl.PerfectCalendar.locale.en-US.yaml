ReleaseNotes: |-
  v1.3.0 — Full feature release [future updates required suggestions welcome]

  NEW
  • Add-Event: inline subclassed EDIT control (Enter = save, Esc = cancel)
  • Recurring events: ****-MM-DD (yearly) and ****-**-DD (monthly)
  • Hotkey submenu in tray: 3 presets + Disabled, all check-marked
  • MOD_NOREPEAT on RegisterHotKey prevents key-repeat flooding
  • Tray balloon on hotkey conflict — app keeps running normally
  • MCN_GETDAYSTATE bitmask bold-day highlighting (MCS_DAYSTATE)
  • ISO week-number column (MCS_WEEKNUMBERS)
  • Multi-format copy: ISO / US / long form via NM_RCLICK
  • UTC clock label (GetSystemTime)
  • Smooth idle transparency fade (WS_EX_LAYERED, TID_FADE timer)
  • Owner-drawn LISTBOX: recurring events in accent blue
  • F5 hot-reload events without restart

  FIXED
  • Silent tray boot: ShowWindow removed from WinMain — no more
    aggressive popup on every system startup when Run on Startup enabled
  • SetWindowSubclass replaces legacy SetWindowLongPtr subclassing
  • hFontSmall / hSelBrush / hListBrush fully cleaned in WM_DESTROY
  • All timers explicitly KillTimer'd in WM_DESTROY
  • Mutex name versioned to avoid collision with older installs
   
