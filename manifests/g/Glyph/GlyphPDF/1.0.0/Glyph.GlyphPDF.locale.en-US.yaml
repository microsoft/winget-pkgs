ShortDescription: A privacy-first PDF workstation for Windows — no telemetry, no cloud, no subscription.
Description: GlyphPDF is an open-source PDF workstation for Windows. It edits, annotates, signs (PAdES B-LT/B-LTA), redacts (true content-stream excision, not black rectangles), OCRs (Tesseract + RapidOCR ROVER ensemble, fully offline), and compresses (MRC) PDF documents entirely on your machine. No telemetry, no cloud upload, no subscription. Documents never leave your computer.
