ShortDescription: 简单、多功能且免费的定向越野课程设置软件
Description: |-
  Purple Pen 是一款用于定向越野的路线设计软件。Purple Pen 可轻松设计定向越野路线及其对应的检查点说明。
  直观地在任何 OCAD 地图、OpenOrienteering 地图或 PDF 地图上直接设计您的路线。可同时查看路线和检查点说明，只需点击检查点说明即可为每个检查点设置正确的描述。Purple Pen 会自动完成所有繁琐工作：
  - 直接打印带有路线覆盖的地图（无需使用 OCAD），或将路线地图导出至 OCAD 或 OpenOrienteering Mapper 进行最终打印，或生成供印刷店使用的 PDF 文件。
  - 支持使用 OCAD 地图（支持 OCAD 版本 6 至 12）、OpenOrienteering Mapper 地图、PDF 地图或位图地图（JPG、GIF、PNG、TIFF、BMP）。
  - 打印格式完美的检查点说明表，支持符号描述、文字描述或两者结合。文字描述将自动生成。说明表可直接放置在地图上。
  - 自动计算每条路线的长度。
  - 确保共用检查点的代码和描述保持同步。
  - 查看或打印所有检查点的地图。
  - 轻松逐一或批量更改检查点代码。
  - 计算访问某个检查点或跑某一段路线的参赛者人数。
  - 打印主打卡卡片，便于检查控制卡。
  - 将路线数据导出至赛事管理或电子打卡软件（支持 IOF 标准 XML 格式，版本 2 或版本 3）。
  - 查看或打印多种关于路线和检查点的不同报告。
  - 将检查点位置下载到您的移动 GPS 设备。
  - 支持 IOF 2000、2018 和 2024 检查点描述标准。
  最重要的是，Purple Pen 完全免费。
  Purple Pen 支持 Windows 7 至 Windows 10 系统。在 Mac 或 Linux 上运行时，需要使用 Parallels 或 VirtualBox 等 Windows 模拟器。更多信息请参见此处。
  Purple Pen 提供英语、法语、德语、瑞典语、西班牙语、挪威语（书面挪威语和新挪威语）、芬兰语、波兰语、匈牙利语、保加利亚语、罗马尼亚语、爱沙尼亚语和日语版本。文档仅提供英语和挪威语。

  直接使用 OCAD 地图、OpenOrienteering 地图和 PDF 地图
  Purple Pen 可直接加载并显示您赛事所用的 OCAD 地图。支持 OCAD 版本 6 及以上。对于使用 OpenOrienteering Mapper 的用户，Purple Pen 也完全支持其文件格式（.omap/.xmap）。您可在 OCAD 或 OOM 地图上直接设计路线，地图可按任意细节级别显示。您也可使用 TIFF 或 JPEG 等位图文件作为地图，或使用 PDF 文件作为地图。

  简洁的用户界面
  Purple Pen 采用简洁的用户界面，单窗口同时显示路线和检查点说明。大多数修改只需点击要更改的内容并直接编辑即可完成。无需特殊“预览”模式——所有内容始终实时更新。所有操作均可撤销，最多支持 100 级撤销和重做。简洁性是 Purple Pen 设计的核心原则。

  符合 IOF 标准
  Purple Pen 完全支持 IOF 2004 和 2018 检查点描述标准。可创建标准 IOF XML 交换文件（支持版本 2 和版本 3），以便将路线数据直接传输至电子打卡或赛事管理程序。

  高级功能
  尽管设计简洁，Purple Pen 同样满足您的高级需求：
  - 为路线添加地图交换，并打印单独或合并的地图与检查点说明。
  - 为路线添加变化（例如接力赛或分段路线）。
  - 在地图上添加额外的文字、线条或图像。
  - 获取每个检查点及其所用路线的完整交叉引用。
  - 计算所有检查点和路段的参赛者负荷。
  - 创建针式打卡的主打卡模板。
  - 导出用于电子计分系统或赛事管理系统中的 IOF XML 文件。
  - 自动以 18 种支持语言中的任意一种生成检查点说明的文字版本，并可自定义文本。
  - 在检查点说明前、后或中间添加额外文字。
  - 以及更多功能……
