ReleaseNotes: |-
  新增
  1. GPU 显存监控 — TitleBar 显示 GPU 型号及显存使用率环形图
  2. 单实例保护 — 同一时间只允许运行一个 OpenSpeedy 实例
  3. Bridge 失败提示 — bridge64/bridge32 启动失败时弹出错误通知，提示检查文件是否在同一目录
  改进
  1. 窗口按钮保护 — 缩放窗口时窗口按钮始终可见，不会因宽度不足被隐藏
  2. 系统状态自适应 — 窗口宽度 < 720px 时自动隐藏 CPU/RAM/GPU 统计
  3. 编译文档简化 — 移除旧 wiki 链接，替换为 npm run tauri dev 前置要求说明
  4. CI 签名拆分 — build / sign-msi / sign-portable 三个独立 job，签名失败可单独重试
  5. TitleBar 最小化按钮换为 — 符号
