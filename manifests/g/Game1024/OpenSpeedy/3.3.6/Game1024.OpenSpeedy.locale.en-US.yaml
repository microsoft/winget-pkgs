ReleaseNotes: |-
  修复
  - 闪现窗口：由于获取显卡信息失败，导致不断闪现窗口。改为运行命令时设置 CREATE_NO_WINDOW 标志来禁止展现窗口
  - nvidia-smi 节能模式超时阻塞：GPU 深度睡眠时 nvidia-smi 可能卡住数秒，阻塞 tokio 线程。改为 spawn + channel + recv_timeout，1 秒超时后标记不可用，后续不再重试
  新增
  - 主题持久化：新增 theme 设置项（"light" / "dark"），关闭应用后保持主题选择
  - 进程表内存列：PID 模式下新增内存列，支持 GB/MB/KB 格式化显示
  - 列排序：所有列标题可点击排序（PID/名称/内存/加速状态），PID 模式默认按加速状态降序排列，已加速进程置顶
  - README 徽章更新：新增 star-history 排名徽章（自动适配暗色/亮色模式），更新底部图表链接，新增巴西葡萄牙语 README，更新 zh-TW 翻译
