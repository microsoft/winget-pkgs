ReleaseNotes: |-
  🐛 修复
  - 注入状态查询: 新增 Bridge STATUS 命令，通过枚举目标进程已加载模块判断是否注入，结合 SP_IsEnabledById 获取真实启用状态，解决管理员权限进程误报"已注入"
  - ENABLE 幂等化: 重复启用已启用的进程不再返回错误，do_enable 先检查 SP_IsEnabledById，已启用则直接返回 OK
  - Toggle 乐观更新: 开关操作即时响应 UI，后端调用失败后自动回滚并弹出 Snackbar 错误提示
  🔧 改进
  - Bridge pipe 通信添加调试日志，方便排查问题
  - Snackbar 通知位置调整为顶部居中
