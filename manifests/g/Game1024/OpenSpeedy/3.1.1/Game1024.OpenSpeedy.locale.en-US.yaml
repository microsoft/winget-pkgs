ReleaseNotes: |-
  修复
  - 快捷键回调控件闭包 — get() 动态读取缓存，切换档位/步长后立即生效
  - init() 初始化缓存 — getAll() 确保快捷键回调能读到真实保存值
  重构
  - useSettings 精简 — 直接返回响应式 settings，各组件自行管理状态
  - useSettingsValue / useSpeed — 封装响应式配置订阅和速度管理
  - emit + subscribe — set() 自动通知所有订阅者，跨组件状态同步
