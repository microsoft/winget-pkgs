ReleaseNotes: |-
  ✨ 新增
  - 进程名模式（Name Tab） — 进程列表新增 PID / 名称两种加速模式
    - PID 模式：按进程 PID 独立加速（原有功能）
    - 名称模式：按进程名分组，一键开关同名所有进程
  - 进程名记忆 — 通过名称模式加速的进程名会自动保存，下次启动时自动注入
    - 定时检测（5 秒），新启动的已保存进程自动加速
  🏗️ 重构
  - ProcessTable 组件内聚 Tabs，不再需要独立组件
  - useInterval 替代 useEffect 实现定时自动注入
  - 新增 src/store/process.ts 持久化加速进程名
