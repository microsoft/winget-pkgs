ReleaseNotes: |-
  This is a maintenance release.
  - Fixed an issue wherein auto-launch applications may not have started together with the game under certain conditions.
  - Fixed an issue wherein it was impossible to create desktop shortcuts for accounts from the account switcher menu. (by @nathanctech)
  - Fixed an issue wherein the launcher would not be able to install game patches if the chosen game directory was a root directory.
  - Fixed an issue wherein confusing warning messages may have appeared when detecting badly set-up save data folder permissions. (by @reiichi001)
  - Fixed an issue wherein some files may not have been written correctly when installing game patches. The files aren't necessary for game operation and will be repaired during the next patch.
  ⚠️ Attention!
  If you receive errors during the installation or if the launcher doesn't work correctly, make sure to check your antivirus first and disable it for XIVLauncher. Many commercial antivirus programs detect XIVLauncher as a false positive. Please also see this FAQ entry with more information: https://goatcorp.github.io/faq/xl_troubleshooting#q-how-do-i-whitelist-xivlauncher-and-dalamud-so-my-antivirus-leaves-them-alone
  Please download Setup.exe from below to install XIVLauncher, if you have not used it before.
