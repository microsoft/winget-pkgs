ShortDescription: A faster code formatter for GDScript and Godot 4
Description: |-
  A fast code formatter for Godot's GDScript programming language built with Tree Sitter GDScript and
  Topiary.

  The goal of this project is to provide a simple GDScript code formatter that runs fast enough and
  that's both easy to contribute to and to maintain while an official one built into the engine
  remains unavailable. Making it in user space allowed us to get a production-ready tool quickly and
  to update it anytime from here on.

  This project aims to follow the official GDScript style guide
