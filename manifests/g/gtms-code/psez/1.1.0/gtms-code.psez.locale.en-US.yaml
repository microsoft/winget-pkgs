ShortDescription: Modeless CUI text editor safe for Japanese/CJK in Windows PowerShell and SSH (ConPTY)
Description: psez is a modeless CUI text editor that runs safely in Windows PowerShell, Command Prompt, and SSH (ConPTY) environments. It fully avoids the known crash caused by backspace-deleting CJK characters in ConPTY by using a full-redraw approach. Features include search, replace all, undo, cut/copy/paste with system clipboard, tab, word wrap, horizontal scroll, and auto-detection of UTF-8/Shift-JIS/EUC-JP/CRLF encodings.
