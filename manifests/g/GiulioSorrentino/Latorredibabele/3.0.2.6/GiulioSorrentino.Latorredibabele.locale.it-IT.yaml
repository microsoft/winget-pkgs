ShortDescription: Un solitario che riesce sempre
Description: >
  Lo scopo, come già detto, è allineare in senso discendente per seme su una stessa colonna le nove
  carte. Sul tableau si costruisce in senso discendente spostando una sola carta per volta, purché
  la carta ricevente sia di valore maggiore della carta collocata. Solo l''ultima carta di ciascuna
  fila è disponibile. Non si può spostare più di una carta alla volta. Nella casella vuota si può
  mettere una carta di qualsiasi valore. (fonte:
  http://www.solitariconlecarte.it/gioca_on_line15.htm)
