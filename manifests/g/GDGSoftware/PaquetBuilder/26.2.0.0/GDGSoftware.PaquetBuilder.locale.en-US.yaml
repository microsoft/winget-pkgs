ReleaseNotes: |-
  - New New per-file Override Archive Filename option: store a file inside the 7-Zip archive under a different name or relative path than its source file, without keeping a manually renamed copy on disk. Configured from a new Archive Name tab in the File Properties dialog, with the final packaged name shown in italics in the File Manager
  - New New Uninstall a Previous Version custom action: automatically removes a previously installed version before installing the new one, waiting for the uninstall to actually finish and reporting its outcome in %PBPREVUNINSTRESULT% so the project can react conditionally (for example, to defer a reboot until installation completes)
  - New New Before Welcome Screen custom action event, running after the setup language has been selected (so %SELLANG% and %PBLANGID% are resolved) but before the welcome screen is displayed. Ideal for language-dependent logic that must run before the first screen appears
  - New Directive files (.pbd) can now set the Modern Interface header image through the new WizHeaderImage key in the [General] section; the WizSplash, WizBanner, and WizHeaderImage paths may also be given relative to the directive file's folder
  - Improved Updated the embedded 7-Zip / LZMA SDK to version 26.02 across both extraction engines
  - Fixed Fixed digital signing failing on large packages (roughly 300–400 MB and above), where the signing tool was terminated before it could finish hashing and timestamping the file. The signing timeout is now configurable in Environment Options → Code Signing (in seconds; default 300; 0 = no timeout)
  - Fixed Fixed a crash when opening a directory-based .pbpx project whose _pbprojdata folder was empty or incomplete; Paquet Builder now reports a clear error naming the missing file instead of crashing
  - Fixed Fixed extension-less files (such as Adobe CMap resources) being dropped from packages compiled on the command line when a folder was added with a *.* wildcard. Command-line builds now include exactly the same files as the graphical interface
  - Fixed Fixed the insert=start position being ignored when adding a custom action through the MCP server or the built-in AI assistant (actions were appended at the end instead of inserted at the start)
