ReleaseNotes: |-
  - New Native parsing of the /LCID <num> command-line switch in both installer and uninstaller for multi-language projects — no longer requires the language-from-command-line.xml custom action template
  - New Native parsing of the /s and /silent command-line switches in both installer and uninstaller with exact token matching (no sub-string false positives), enabled by default and toggleable from the Progress Monitor settings
  - New Pre-compile validation for component references in shortcuts and registry entries — missing or misspelled component names are reported immediately with a complete list of bad references instead of after several minutes of code generation
  - New New "Don't Show Again" button in the Additional Packages startup dialog so optional addons stop reappearing every session until a newer version is released
  - Improved Enriched runtime crash diagnostics: error messages now include the exception code, resolved fault address, and a stack trace of the calling frames
  - Fixed Fixed a critical regression in 2026.0 that caused error -5 (can't open archive) when extracting multi-volume installers
  - Fixed Fixed a critical regression in 2026.0 causing random Access Violation crashes at runtime in 64-bit installers (typically right after extraction, when writing uninstall entries or component registry values) — root cause was format-string injection
  - Fixed Fixed empty "Available Scripts" dropdown in the Call C Function custom action editor when the Developer Options page had not been opened yet in the session
  - Fixed Fixed hyperlinks in installer screens (License Agreement, WebView2 and Markdown content) opening a blank Edge window under UAC Over-The-Shoulder elevation
