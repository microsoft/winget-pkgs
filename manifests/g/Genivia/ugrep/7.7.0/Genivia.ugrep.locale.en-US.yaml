ReleaseNotes: |-
  What's new?
  - support TUI search on slow and incomplete standard input pipes e.g. from tail -f #540
  - update options -m (--max-count) and -K (--max-line) to stop reading input upon reaching the stopping criterium, then exit without draining the standard input pipe like GNU grep #538
  - improve binary file detection for huge mixed files #537
  - add new option ./build.sh --disable-avx512 #534
  - local config files located in the working directory are only read when owned by the user running the ugrep process
  - fix lzma 7zip api memory leak
