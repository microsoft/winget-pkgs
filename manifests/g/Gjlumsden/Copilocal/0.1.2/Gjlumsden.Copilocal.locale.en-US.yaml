ShortDescription: Pick a local LLM (Ollama / Foundry Local / LM Studio) from a TUI and launch GitHub Copilot CLI against it.
Description: copilocal discovers the models you already have in Ollama, Foundry Local, and LM Studio, lets you choose one in an arrow-key terminal UI, ensures that provider's OpenAI-compatible server is running, then launches GitHub Copilot CLI with the right BYOK environment variables set only on the Copilot child process. If a provider isn't installed, copilocal can install it (with links to each tool's docs). copilocal is an independent, unofficial tool and is not affiliated with, endorsed by, or sponsored by GitHub, Microsoft, Ollama, or LM Studio; it launches the GitHub Copilot CLI that you install separately.
