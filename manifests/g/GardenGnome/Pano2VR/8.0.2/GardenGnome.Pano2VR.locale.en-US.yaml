ReleaseNotes: |-
  We are excited to announce Pano2VR 8.0. This version brings
  - 3D Models and Gaussian Splats
  - Project Wizard
  - New Skins and more styling options
  - Refreshed user interface
  - New project file format
  Please see our blog post for more details. Fixes in 8.0.2:
  - Read correct image size for WebP pinned images
  - Ignore a missing or broken ICC monitor profile
  - Avoid crashes on large tours on iOS/Safari
  - Fix for context menu table
  - Fix for too strong lens flares compared to 7.x
  - Don't load extra tiles for flat panos
  - Fix for pinned sounds and crossfade
