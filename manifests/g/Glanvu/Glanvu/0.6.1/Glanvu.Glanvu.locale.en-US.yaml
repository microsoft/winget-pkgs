ShortDescription: Fast, keyboard-driven, cross-platform universal image viewer and converter
Description: |-
  Glanvu is a fast, GPU-accelerated image viewer and converter for Linux, macOS and
  Windows. It loads instantly, navigates entire folders by keyboard, and includes a real
  batch-convert pipeline (crop, rotate, resize, re-quality, rename). Supports JPEG, PNG,
  WebP, GIF, BMP and TIFF via pure-Rust codecs — no system C libraries.
