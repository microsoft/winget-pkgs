ReleaseNotes: |-
  - Added the ability to delete firewall rules directly from an app's details popup.
  - Windows system apps now show an Ask to Connect prompt the first time they try to connect, instead of being allowed by default.
  - Firewall rules can now only be created for apps that actually use the network, so you'll no longer end up with rules you can't see or manage.
  - Firewall profiles now work independently. Switching to a more restrictive profile blocks apps until you allow them again, so nothing slips through unnoticed when you change profiles.
  - You can now run VirusTotal scans on system apps from the app details popup, matching the behavior already available on the Firewall tab.
  - Fixed an issue where network scanning did not return results.
  - Fixed an issue where VirusTotal scan results disappeared from the GlassWire Protect tab and app popups after restarting the service.
  - Fixed an issue where app details were missing from the Ask to Connect popup.
  - Fixed an issue where the Alerts list with the "All time" filter selected could show less than a week of history.
  - Fixed a delay when removing multiple apps at once on the Firewall tab.
  - Fixed an issue with the process popup on the Hardware Resources tab.
  - Fixed an issue where the main window could not be moved when GlassWire was disconnected.
  - Fixed an issue where GlassWire opened in a small window instead of full screen the first time you launched it after restarting your PC.
  - Updated the bundled Windows Kernel Driver with stability improvements, including fixes for rare crashes.
  - Fixed installer errors and the occasional "Untrusted publisher" warning for the kernel driver when updating from an older version.
