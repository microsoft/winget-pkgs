ReleaseNotes: |-
  New features
  - Show which apps and programs are generating network traffic (#1056 — fixes #170)
  - Add charts to preview network adapters traffic in Initial page (#1026 — fixes #556)
  - Support custom IP blacklists (#1055 — fixes #729)
  - Enhance favorites: support services, programs, and persistence (#1109 — fixes #839)
  - New command line option --config_path to print the path of the app configuration file
  Improvements
  - Migrate to Iced 0.14 (#1032 — fixes #589, #639, #653, #656, #675)
  - Add animated welcome screen (#1002)
  - Support search prefixes ! and != in Inspect page filters to allow searching values that don't contain or aren't equal to a given string
  - Added various sanity checks when loading app configurations from file (window properties, scale factor, themes, notifications volume)
  - Updated some of the existing translations to v1.5:
    - Romanian (#942)
    - Japanese (#1020)
    - Turkish (#1074)
    - Simplified Chinese (#1021)
    - Traditional Chinese (Taiwan) (#1021)
  Fixes
  - Fix app configurations backward-compatibility when an existing field is updated or invalid
  - Return a PCAP error when trying to start a capture from an unknown adapter name
  Thanks to:
  - @recallai, @ipinfo, @Cthulu201, @ZEROF, @wahn, @orhun, @3kh0 for sponsoring Sniffnet 💖
  - NLnet for supporting the development of this version via the NGI Zero Commons Fund
  - @paco1127, @shu-kitamura, @MelcuGoa, @DeeEffAre for updating the existing translations
