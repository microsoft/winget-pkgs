ReleaseNotes: |-
  Added
  - Meru Pro: Added ability to copy Gmail message link (when inside a message) that can open the message again in Meru
    - "Copy Message Link" is accessible from menu bar (macOS)/app menu (Windows/Linux) under "Messages" and context menu (right-click) inside a message
    - Useful to share the link with other Meru users that have the same Gmail account set up or to bookmark/reference the message in your productivity tools
    - Shortcut: Cmd/Ctrl + Shift + C
    - Format: meru://<email>/message/<message_id>
  Changes
  - Upgraded Electron to v40.6.1
