ReleaseNotes: |-
  Changed
  - If using Gmail inbox with categories, only messages from the Primary tab are now shown as new email notification and included in unified inbox
    - Previously, all categories were monitored, which wasn't the expected behaviour
    - A new option is now available to choose which categories should be monitored (Primary or All)
      - Settings... → Gmail → Inbox → Categories to Monitor
      - Default is Primary
  - Clicking on menu bar/system tray icon doesn't automatically select the first account with unread messages anymore
    - A new option is now available to change the behaviour
      - Settings... → Appearance → Select Account with Unread on Click
      - Default is Disabled
  Fixed
  - Fixed Google Drive downloads links not opening in Meru
  - Fixed new email notifications sometimes not showing
  - Fixed keyboard shortcuts for selecting accounts not working when in unified inbox
