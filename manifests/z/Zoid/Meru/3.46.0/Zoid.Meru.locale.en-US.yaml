ReleaseNotes: |-
  Added
  - Added a navigation toolbar to Google App windows (Calendar, Docs, Meet, etc.)
    - Back / forward / reload (spinner while loading; click during load to stop)
    - Account badge and live page title
    - Find in page (Cmd+F on macOS, Ctrl+F on Windows/Linux), copy URL, and open in default browser
  - Added the download history button to Google App window titlebars
    - Same Download button and recent-completion popover as the main window, anchored to the window that triggered it
  - Added an "Open in Folder" button to the custom CSS setting
    - Settings... → Gmail → Custom CSS
  - Update and download notifications now play the system notification sound
  Changed
  - Clicking a download notification now reveals the file in its folder instead of opening it directly
    - Notification title and body now include the file name
  - Download notifications now only appear once the download has completed
  - Removed the inline "recently downloaded" pill from the titlebar; completed downloads now surface via the system notification and the Download button popover
  - Removed the Notification Delay setting for updates introduced in v3.45.0
    - Update prompts now appear immediately again when an update is downloaded
    - Meru is moving to a weekly release cadence, which removes the patch-burst this setting was designed to absorb
