ReleaseNotes: |-
  Added
  - The Unified Inbox now has a close button
  Changed
  - Accounts can now be reordered with drag-and-drop instead of up/down buttons
    - Settings... → Accounts
  - Saved searches now use a drag-and-drop list instead of a table, and the add button has moved to the header
    - Settings... → Saved Searches
  Fixed
  - Window position no longer resets after restarting your computer
  - macOS: The main window now reopens when switching to Meru via Cmd+Tab after it was closed
  - Zooming Gmail in or out is now clamped to the minimum and maximum levels, so it can no longer be zoomed past the limits
  - Unified Inbox keyboard navigation no longer preselects the first row until the ↑/↓ shortcuts are pressed, and a stale-selection issue while navigating has been fixed
  - The menu button popup now opens and closes reliably after the menu is rebuilt (e.g. after adding or changing accounts)
  - Windows: Fixed the application executable missing from the build
