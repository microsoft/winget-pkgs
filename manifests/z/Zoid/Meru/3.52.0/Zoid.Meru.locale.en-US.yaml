ReleaseNotes: |-
  Added
  - Meru Pro: Google Groups, Sites, and Voice can now be pinned to the titlebar
    - Settings... → Google Apps → Pinned Apps
  - New "About Meru" settings section showing the app version, operating system, and machine ID — each with a copy button — plus an "Export Logs" button to save application logs to a file for troubleshooting
    - Settings... → About Meru
  Changed
  - Hardware acceleration is now enabled by default for better performance. Upgrading turns it on for all existing users, including anyone who had previously disabled it — you can turn it off again if needed
    - Settings... → Advanced → Hardware Acceleration
  Fixed
  - The Developer Tools keyboard shortcut has been removed; Ctrl+Shift+I on Windows/Linux now opens the Unified Inbox, which previously conflicted with it
  - New windows no longer briefly flash a mismatched background color when opening; window backgrounds now match the current light or dark theme
  Internal Changes
  - Upgraded Electron to v42.5.0
