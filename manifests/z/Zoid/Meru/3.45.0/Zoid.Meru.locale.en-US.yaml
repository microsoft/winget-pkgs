ReleaseNotes: |-
  Added
  - Meru Pro: Added spellchecker with additional language selection (Windows/Linux)
    - Settings... → Languages
    - System language is always spellchecked; select additional languages to spellcheck alongside it
  - Meru Pro: Added configurable notification time windows
    - Settings... → Notifications → Notification Times
    - Define daily time windows when email notifications are active; outside these windows, notifications are silenced
    - Supports multiple non-overlapping windows with overlap detection
    - Each window can be restricted to specific days of the week
  - Meru Pro: Added Unified Inbox settings page
    - Settings... → Unified Inbox
    - New Enabled toggle to turn off the unified inbox entirely
    - New Show Sender Icons toggle for sender avatars in the unified inbox
  - Added drag-and-drop reordering for pinned Google Apps
    - Settings... → Google Apps → Pinned Apps
    - Titlebar renders pinned apps in the chosen order
  - Added ability to exclude specific Google Apps from opening in Meru
    - Settings... → Google Apps → Excluded Apps
    - Pick individual apps to always open in the external browser while the rest still open in Meru
  - Added Notification Delay option to avoid multiple update prompts in a short period
    - Settings... → Updates → Notification Delay
    - Default: Next day (recommended)
    - Options: Next day / After a few hours / Immediately
    - A newer version arriving while a prompt is pending replaces it and resets the timer, so a burst of patches collapses into a single prompt for the latest version
  Changed
  - Do Not Disturb and notification times now only apply to email notifications
  - Renamed Google Apps option Open Google Apps in New Window to Always Open in New Window
  Fixed
  - New Google App and compose windows no longer open stacked on top of each other
