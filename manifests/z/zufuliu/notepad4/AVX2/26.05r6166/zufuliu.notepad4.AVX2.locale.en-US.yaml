ReleaseNotes: |-
  * Scintilla updated to 5.6.2 see https://www.scintilla.org/ScintillaHistory.html for the changes.
  * Support Erlang and Elixir, issue #376.
  * Support PowerBuilder, issue #1095.
  * Support Typst, issue #640.
  * Add ability to calculate math expression (with menu "Tools -> Action on Selection -> Calculate Expression") and evaluate JavaScript expression (with menu "Tools -> Web Tools -> Evaluate JS Expression"), discussion #631, contributed by @Matteo-Nigro in PR #1230 and PR #1233
  * Add menu "File -> Save with Original Time" to save current file with original timestamp, issue #1199.
  * Add menu "Edit -> Special -> Show Character Info" to show character information for first selected character or character after caret, issue #1220.
  * Add `UrlThreshold` property (in `[Settings2]` section) to configure URL highlighting threshold (in MB, set the value to zero to disable URL highlighting), issue #1212.
  * Lexer and API updates: CoffeeScript, CSS, Fortran, Go, HTML, JavaScript, LaTeX, Ruby, Texinfo.
  * Improve Russian translation, contributed by @Dimmitrius in PR #1215 and PR #1214.
  * Fix wrong INI file location for Chocolatey installation, issue #1200.
  * Other bug fixes and improvements.

  Expression Evaluation
  Expression (can be arbitrary JavaScript code) evaluation is provided by system's JavaScript engine (Chakra or JScript), `Math.` prefix can be omitted when using menu "Tools -> Action on Selection -> Calculate Expression", e.g. `exp(PI*sqrt(163))` or `pow(E, PI*sqrt(163))` for $e^{\pi\sqrt{163}}$. JavaScript code can be used to do complex computing, e.g. calculate Fibonacci sequence and factorial with following recursion functions:
  ```js
  function fib(n) {
      return (n <= 1) ? n : fib(n - 1) + fib(n - 2);
  }
  function factorial(n) {
      return (n <= 1) ? 1 : n*factorial(n - 1);
  }

  [fib(10), factorial(10)]
  ```

  See https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators/Operator_precedence and https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Math for document on operators, Math functions and constants (system's outdated JavaScript engine may not support all of them).

  Behavior Changes
  Behavior for `Tab` and `Enter` key in multiline edit boxes on "Enclose Selection", "Enclose HTML/XML Tag", "Insert HTML/XML Tag" and "Modify Lines" dialogs were changed (issue #1197), see following table:

  | Key | Behavior |
  |--|--|
  |`Tab` | Move to next dialog control (same on other dialogs) |
  |`Shift + Tab` |Enter tab character (`\t`) |
  |`Enter` | Apply changes (same as click OK button)|
  |`Shift + Enter` | Enter newline (`\r\n`)|
