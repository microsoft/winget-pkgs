ReleaseNotes: |-
  Highlights
  - Added IRCv3 support for message tags, echo-message, typing notifications, and replies.
  - Restored the accept invalid SSL certificates bypass behavior.
  - Replaced legacy IPv4 APIs and added compatibility for OpenSSL 4.
  - Improved Python plugin unload safety by snapshotting hooks during shutdown.
  - Fixed Windows GtkStatusIcon tray menu popup behavior.
  - Fixed self-echoed private messages so they route to the intended target tab.
  - Fixed the lag ping timeout window.
