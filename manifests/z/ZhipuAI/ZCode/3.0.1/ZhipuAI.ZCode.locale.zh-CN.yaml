ReleaseNotes: |-
  新功能
  - 新增 ZCode V2 历史会话恢复能力，旧版本会话可以更顺畅地找回和继续使用。
  - 登录时新增获取 API Key 的入口，同时支持跳过相关设置，首次使用流程更灵活。
  - 新增状态面板显示模式选项，你可以按自己的习惯切换信息展示方式。
  - 远程工作区可以显示更多目录信息，任务列表里也会展示更易识别的远程连接名称。
  问题修复
  - 修复了主题切换后代码高亮不能及时刷新的问题，界面显示更一致。
  - 修复了用量、额度和重置时间等信息显示不一致的问题，相关提示现在更清晰。
  - 修复了运行中任务的交互，支持重命名，恢复任务后界面状态也更正常。
  - 修复了快捷键在不同系统下适配不一致的问题，常用操作更符合本机习惯。
  - 修复了流式输出和工具执行时更新不连贯的问题，回复和执行结果的展示更顺畅。
  - 修复了时间线视图在恢复、切换和连续使用时的若干显示异常，阅读上下文更稳定。
  - 修复了目录浏览偶发读取过期内容的问题，远程文件查看结果更可靠。
  - 修复了历史会话恢复不完整、来源不稳定的问题，旧会话找回更可靠。
  - 修复了 Linux 下标题栏按钮点击和窗口显示异常的问题，桌面端操作更顺手。
