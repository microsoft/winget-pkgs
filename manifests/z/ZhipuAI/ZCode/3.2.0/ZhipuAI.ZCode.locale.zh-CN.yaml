Author: 北京智谱华章科技有限公司
License: 专有软件
ShortDescription: Z Code 将最佳的 AI 代理与您现有的工具相结合，让您能够顺畅地进行规划、编码、审查和部署。
Description: Z Code 是一款轻量级的 AI 代码编辑器，旨在解决命令行 AI 编程工具（如 Claude Code、Codex、Gemini 等）操作门槛高的问题。它通过提供一个统一、友好的可视化桌面，将这些 Agent 的能力无缝集成，仅使用一个 api key 就能丝滑切换体验多个 Agent 编程工具。此外，还提供安全的文件版本管理、高效代码审查、任务 Agent、MCP 协议管理等一系列特性，为你打造一站式的 AI 辅助开发体验。
