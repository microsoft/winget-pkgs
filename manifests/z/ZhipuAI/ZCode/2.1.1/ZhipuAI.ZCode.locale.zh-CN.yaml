ReleaseNotes: |-
  问题修复
  - 优化了模型与服务提供方切换时的稳定性，切换不同登录方式或服务时更顺畅，不容易出现异常。
  - 改进了任务计划与待办事项的同步，相关状态更新更及时、更一致。
  - 修复了切换命令行环境时草稿模式可能遗留异常状态的问题，减少使用中的干扰。
  - 修复了 Windows 上更新安装后部分内置功能可能失效的问题，更新过程更稳定可靠。
  - 在 Windows 启动时检测到可安装更新后，会先提示你确认，避免未经确认自动安装带来的打扰。
  - 减少了部分服务会话与历史记录异常的问题，提升了对话内容、会话绑定和结果恢复的稳定性。
  - 修复了代码查看区域的部分显示问题，包括注释边距、内容溢出间距等，阅读体验更一致。
  - 修复了 SSH 连接信息显示不一致的问题，账号与认证方式展示更清晰。
  - 修复了某些差异预览可能卡顿或无响应的问题，并提升了大文件或特殊内容预览时的流畅度。
  - 修复了 Markdown 文件链接的处理问题，相关链接现在可更正常地打开和跳转。
  - 修复了移动端查看差异内容时无法正常横向滚动的问题。
  - 改进了繁忙状态下的任务处理稳定性，减少排队请求或当前任务受影响的情况。
  - 修复了部分任务中模型显示或实际使用不一致的问题。
