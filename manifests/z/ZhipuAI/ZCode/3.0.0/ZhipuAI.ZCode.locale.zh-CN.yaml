ReleaseNotes: |-
  新功能
  - v3.0.0 带来一批核心升级：整体对话与任务能力更统一，启动、连接远端工作区和执行任务都更顺畅。
  - 新增工作区分组视图，可以按工作区整理任务，并支持折叠、排序、重命名等更清晰的管理方式。
  - 新增分支切换与 Git 提交关系图，查看和切换代码分支更直观。
  - 支持生成仓库 Wiki，可为项目自动整理目录、状态和说明内容，方便快速了解项目结构。
  - 新增插件管理入口，也支持导入外部命令、技能和插件，扩展能力更方便。
  - 模型与服务提供方管理全面升级：可更灵活地查看、选择和配置可用模型，切换体验更清晰。
  - 新增试用/套餐相关入口与用量展示，剩余额度、使用趋势和升级入口更容易找到。
  - 支持从其他工具导入历史会话，迁移到新版本更方便。
  - 支持设置网络代理，兼容更多受限网络环境。
  - 新增远程/移动端联动能力，手机或网页端查看和继续任务更方便。
  - 支持查看更直观的调用与使用统计，帮助了解任务进度和资源消耗。
  问题修复
  - 大幅提升了对话、流式输出和长任务的稳定性，减少卡住、中断、停止无响应等情况。
  - 优化了网络异常、限流和临时服务错误时的处理，失败后更容易自动恢复。
  - 修复了登录、登出、切换账号后状态不同步的问题，账号连接体验更稳定。
  - 修复了任务、会话、模型选择和历史记录恢复不准确的问题，重新打开后状态更可靠。
  - 修复了部分远端工作区、移动端和网页远控场景下的同步、连接和恢复问题。
  - 修复了代理和证书相关问题，减少某些网络环境下无法连接服务的情况。
  - 修复了若干界面崩溃、闪烁、按钮无响应和显示异常问题，整体操作更顺手。
  - 修复了用量统计、上下文占用和额度展示不准确的问题，信息显示更可信。
