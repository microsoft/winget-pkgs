ReleaseNotes: |-
  新功能
  - 全新机器人功能上线：支持飞书、Lark、微信等多个平台，可创建机器人，并在聊天中直接获得代码帮助。
  - 机器人支持更完整的消息回复和任务卡片体验，代码帮助过程更连贯、更容易跟进。
  - 聊天支持添加文件附件，提问时可以带上相关文件，让回答更准确。
  - 任务内容支持实时同步，在不同窗口或客户端查看时状态更一致。
  - 侧边栏标签管理体验优化，切换和整理更顺手。
  - Windows 菜单新增更新下载进度展示，更新状态更直观。
  - Windows 菜单新增用户社群入口，方便快速加入交流。
  问题修复
  - 修复机器人绑定、回调和消息回复中的多个问题，提升飞书、Lark、微信等平台的连接稳定性。
  - 优化机器人创建和选择流程，减少创建后不可用、选择状态异常等情况。
  - 修复机器人任务卡片更新和草稿激活问题，让聊天中的任务反馈更准确。
  - 修复模式切换后未正确保存的问题。
  - 修复部分助手切换不生效的问题。
  - 修复任务查找弹窗的交互问题，查找任务更稳定。
  - 修复窄窗口内容无法横向滚动的问题，长内容查看更方便。
  - 修复拖拽取消后界面状态残留的问题。
  - 优化设置项布局，减少控件显示过宽或排版异常。
  - 修复 MCP 与技能设置的排序问题。
