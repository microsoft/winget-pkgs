ReleaseNotes: |-
  新功能
  - 反馈入口现在会根据你选择的问题类型，自动预填更合适的内容模板，填写起来更省事。
  - 提交反馈时会自动带上当前本地时间，减少手动补充信息的麻烦。
  - 反馈表单新增了可选的联系方式字段，你可以留下邮箱或其他联系方式，方便后续沟通。
  问题修复
  - 优化了部分模型相关能力的兼容性与稳定性，减少切换、使用过程中出现异常或行为不一致的问题。
  - 修复了模型切换后部分选项没有及时刷新的问题，使用体验更加连贯。
  - 改善了已取消请求的处理，减少对话过程中卡住或状态异常的情况。
  - 优化了资源更新与下载流程，提升更新过程的稳定性，降低更新失败或异常的概率。
  - 修复了编程套餐授权与配额同步相关的问题；当授权失效或填写不正确时，现在会给出更明确的提示，并引导你重新连接。
  - 修复了复杂环境下可能出现的滚动异常，页面浏览和操作更加顺畅。
