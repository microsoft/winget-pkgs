ReleaseNotes: |-
  新功能
  - 现在可以直接查看和编辑产品协议内容，处理相关信息时更方便。
  - 连接远程工作区时，新增了对 WSL 环境的支持，配置过程更顺手。
  - 设置中支持导入更多技能内容，方便你快速迁移和使用。
  - 新增了用量与额度说明入口，套餐信息、剩余额度和续期时间看得更清楚。
  - 支持导出日志，遇到问题时更方便自助排查和反馈。
  - 在代码评审场景下，针对文件新增了快捷操作入口，常用操作更省步骤。
  问题修复
  - 修复了部分会话过期后无法顺畅继续的问题，现在会更明确地引导你开始新任务。
  - 修复了远程连接、SSH/WSL 等场景下的一些启动与连接异常，整体连接成功率和稳定性更高。
  - 修复了技能导入、迁移后识别不全或需要重启才生效的问题，更新后可更快正常使用。
  - 修复了额度、折扣、续期时间等信息显示不准确或不够清晰的问题，相关信息现在更易读、更一致。
  - 优化了达到并发或额度限制时的提示方式，尽量不打断当前输入和操作。
  - 修复了聊天、搜索和任务列表中的一些界面问题，包括按钮提示、文本显示不全、布局拥挤等，日常使用更顺畅。
  - 修复了斜杠命令选择后文本被覆盖、只读内容可误改等编辑体验问题。
  - 修复了表格、标题等内容展示异常的问题，长内容阅读体验更稳定。
  - 修复了日志导出、反馈复用等相关问题，提交问题时更省事。
  - 修复了 macOS 上部分系统监控显示不对齐的问题，并调整了窗口最小尺寸，界面表现更自然。
