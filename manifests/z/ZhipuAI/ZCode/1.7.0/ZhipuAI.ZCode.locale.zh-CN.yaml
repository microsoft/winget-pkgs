ReleaseNotes: |-
  新功能
  - 现在可以在设置中直接管理常用命令，按自己的使用习惯进行增删和调整。
  问题修复
  - 优化了后台任务的状态展示与异常中断后的恢复体验，减少使用过程中状态不清晰或中断后难以继续的问题。
  - 修复了部分 Python 运行场景下输出内容显示异常的问题，文字结果现在更稳定、更完整。
  - 修复了触发输入时文件提及内容不显示的问题，相关文件引用现在能正常出现。
  - 优化了界面中的标签和说明文字，减少干扰信息，整体显示更清晰易懂。
  - 修复了模型选择区域在特定情况下显示不完整的问题，避免出现空白或异常显示。
