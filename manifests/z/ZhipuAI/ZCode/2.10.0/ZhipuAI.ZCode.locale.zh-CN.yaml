ReleaseNotes: |-
  新功能
  - 现在把鼠标移到代码旁的评论标记上时，可以直接看到提示信息，查看上下文更方便。
  - 新增对话搜索功能，查找历史聊天内容更快捷。
  问题修复
  - 提升了会话启动和请求处理的稳定性，减少等待超时、停止后消息异常等问题。
  - 优化了配额与重置时间的显示逻辑，避免出现不准确或容易误解的信息。
  - 修复了首次收到消息时部分聊天无法及时激活的问题。
  - 修复了部分情况下套餐升级资格判断不准确的问题。
  - 改进了 Linux 环境下的链接唤起处理，打开应用相关链接时更稳定；同时补充了对部分安装方式的支持。
  - 修复了反馈列表可能重复刷新的问题。
  - 优化了远程工作区中的模型与配置同步，减少同步异常，提高多端使用的一致性。
  - 提升了 Windows 环境下会话数据保存的稳定性，降低异常情况下的数据写入问题。
  - 优化了助手回复的流式输出表现，减少内容显示不稳定的情况。
  - 修复了设置中部分技能/工具显示不完整的问题。
