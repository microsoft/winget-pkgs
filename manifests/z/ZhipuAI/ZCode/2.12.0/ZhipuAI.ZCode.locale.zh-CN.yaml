ReleaseNotes: |-
  新功能
  - 现在可以直接删除已归档的任务，清理历史内容更方便。
  - 现在可以查看编码方案的续费状态，订阅信息更清晰。
  - 登录与相关服务状态会更稳定地保持，减少重复操作带来的打断。
  - 跨设备或跨环境使用会话时，消息同步能力有所增强，协作更顺畅。
  问题修复
  - 优化了部分模型的自动模式与回退逻辑，在不支持的情况下会更稳妥地处理，减少异常和误用。
  - 改善了启动失败后的恢复体验，相关设置项会更完整地保留和恢复。
  - 修复了 Windows 环境下部分启动与运行时更新问题，提升了稳定性。
  - 优化了远程连接断开时的处理逻辑，现在能更及时识别断线，并尽量保留任务状态，减少任务意外丢失。
  - 改善了远程任务与主机会话之间的状态同步，任务列表和状态显示会更准确。
  - 修复了会话消息在部分情况下显示异常、重复或边界不清的问题，阅读上下文更自然。
  - 优化了移动端和远程任务列表展示，固定任务的显示与保留更稳定，图标重叠的问题也已修复。
  - 现在界面缩放设置会被正确记住，下次打开时无需重复调整。
  - 修复了已归档反馈内容的状态处理问题，历史记录显示更准确。
  - 优化了上传压缩内容时的兼容性，减少因系统附带信息导致的问题。
