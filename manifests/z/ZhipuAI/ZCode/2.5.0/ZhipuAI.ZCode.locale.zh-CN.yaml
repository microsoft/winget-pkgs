ReleaseNotes: |-
  新功能
  - 长聊天记录和历史详情加载更流畅，打开大量对话时更不容易卡顿。
  - 优化了侧边栏的用量与剩余额度展示，查看当前使用情况更直观。
  - 改进了用量统计图表和套餐分析展示，帮助你更清楚地了解消耗情况。
  - AI 回复中的 Markdown 内容会更平滑地逐步显示，阅读体验更自然。
  问题修复
  - 修复了切换模型或智能体后，部分设置、快捷命令或任务模型可能丢失的问题。
  - 提升了自定义服务商和 Claude 相关配置的稳定性，切换模型时更不容易出现配置异常。
  - 修复了 Linux 上登录授权链接无法正确唤起应用的问题。
  - 改进了远程工作区的初始化和配置同步，减少插件、技能、命令不可用或配置不同步的情况。
  - 修复了部分远程运行环境不完整或缓存异常导致功能不可用的问题。
  - 修复了窗口缩放后界面可能没有及时刷新的问题。
  - 优化了套餐与用量相关文案和展示逻辑，避免显示不准确或标签含义不清。
  - 修复了插件启用状态保存不稳定的问题，重启后状态更可靠。
  - 改进了内置命令行工具的识别与加载，减少找不到工具的情况。
  - 修复了移动端远程输入时 Enter 键行为不符合预期的问题，现在更适合输入换行。
  - 修复了聊天时间线和流式回复展示中的一些边界问题，消息分隔和操作入口更清晰。
  - 禁止部分工具自动更新，避免后台更新带来不可预期的变化。
