ReleaseNotes: |-
  新功能
  - 新增子智能体功能，现在可以更方便地创建、编辑和管理子智能体。
  - 支持快捷入口，可更快使用文件搜索、会话搜索等常用功能。
  - 远程控制界面支持可拖拽的导航把手，操作更灵活。
  - 移动端远程控制支持按工作区查看任务，并可在单个桌面窗口中切换不同工作区。
  - 支持将文件夹直接拖入对话中，便于更快提供上下文内容。
  问题修复
  - 优化了登录流程，提升了账号登录的稳定性，减少登录失败或登录状态异常的问题。
  - 修复了模型与模式切换时的多项问题，减少切换失败、状态回退或提示不清晰的情况。
  - 改进了对更多模型与服务的兼容性，相关功能使用更加稳定。
  - 优化了远程控制在移动端和小屏设备上的布局与交互，浏览、切换和操作更加顺畅。
  - 改善了远程任务切换时的加载体验，界面反馈更清晰。
  - 修复了工作区文件树的多项交互问题，文件浏览与操作更加顺手。
  - 修复了快捷导航命令的异常行为，常用跳转操作更加准确。
  - 修复了本地工作区使用和目录选择中的问题，打开与管理目录更加稳定。
  - 修复了远程控制布局、差异对比显示以及子智能体返回入口等问题，整体使用体验更完整。
  - 优化了工具栏、顶部操作区和空状态界面的显示效果，界面更清晰紧凑。
  - 修复了消息顺序异常等问题，聊天过程中的内容展示更加正确。
  - 增强了异常场景下的稳定性，减少部分页面报错或界面异常对使用的影响。
