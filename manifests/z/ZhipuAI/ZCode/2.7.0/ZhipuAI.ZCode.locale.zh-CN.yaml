ReleaseNotes: |-
  新功能
  - 新增 Gemini 和 OpenCode 相关命令来源，使用这些工具时更方便。
  - 新增应用内问题反馈流程，遇到问题可以直接在应用里提交反馈。
  - 侧边栏时间线任务现在会按日期分组，查找历史任务更清晰。
  问题修复
  - 优化问题反馈体验：日志上传进度更准确，上传内容更完整，也支持暂停上传；工单更新会及时提醒，反馈流程更稳定。
  - 修复本地错误场景下无法方便上报的问题，现在遇到错误时更容易提交问题反馈。
  - 改进聊天与任务加载体验，减少连续更新带来的卡顿和闪烁，消息流加载状态更自然。
  - 修复不同会话之间聊天滚动位置丢失的问题，切换回来后能保留之前阅读的位置。
  - 修复 Claude、Codex 等模型相关设置在恢复任务或切换状态后可能丢失、显示不正确的问题。
  - 改进 OpenCode 冷启动兼容性，降低首次启动或环境初始化时失败的概率。
  - 修复命令目录不存在时无法正常打开的问题，并提升命令信息保留与展示的稳定性。
  - 优化 Markdown 消息展示效果，列表、颜色和整体排版更一致。
  - 优化用量统计文案和展示，让信息更清楚易懂。
  - 预览文件缺失时的提示更友好，减少不必要的错误打扰。
  - 修复技能加载规则相关问题，并支持查看子代理详情。
  - 改进 Windows 环境下 Codex 的默认运行兼容性。
