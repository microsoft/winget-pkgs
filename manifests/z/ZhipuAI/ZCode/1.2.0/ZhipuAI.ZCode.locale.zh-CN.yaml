ReleaseNotes: |-
  新功能
  - 现在可以直接在应用内发起 Git 提交，常用代码提交流程更顺手。
  - 连接远程环境时，支持自动识别并补全 SSH 配置中的别名，连接更省事。
  - 新增了内置命令行工具的管理入口，安装和使用相关能力更方便。
  - 支持显示并记住窗口缩放比例，调整一次后下次打开也会保持你的设置。
  - 社区入口现在支持按需配置，访问相关资源更灵活。
  问题修复
  - 修复了新建会话时 commands 列表不显示的问题，并优化了 skills 与 plugins 的配合体验。
  - 优化了 SSH 连接相关体验，包括别名选择、历史建议、滚动操作和输入补全，连接远程主机时更稳定顺畅。
  - 连接远程环境时会显示上传进度，等待过程更清晰。
  - 修复了部分情况下收不到消息回复的问题，提升对话稳定性。
  - 修复了恢复历史会话后部分设置不同步的问题，切回历史记录时状态更一致。
  - 修复了模型与提供方相关的一些异常，包括刷新后本地模型配置丢失、默认格式识别不准确等问题，配置使用更稳定。
  - 修复了 Git 相关的一些问题，包括提交操作异常、预处理超时报错以及 Windows 下处理大文件时的异常。
  - 修复了顶部 Git 信息显示异常的问题。
  - 修复并优化了界面缩放相关设置，显示与操作更加一致。
  - 修复了迁移历史数据时可能出现的无效工作区记录问题。
  - 修复了 Windows 环境下 SSH 配置路径识别异常的问题。
  - 修复了不同工作区之间状态互相影响的问题，使用多个项目时更可靠。
  - 修复了社区入口在某些情况下无法正常加载的问题。
