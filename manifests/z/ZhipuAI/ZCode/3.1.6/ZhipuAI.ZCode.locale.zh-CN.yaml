ReleaseNotes: |-
  新功能
  - 添加反馈验证技能
  - 上传附件时自动折叠反馈对话框
  - 非视觉模型自动忽略图片输入
  - 会话迁移扫描不再限制数量
  - 新增分组任务支持移动至顶部
  - 支持消息级撤回及预览确认
  问题修复
  - 修复目标状态异常，优化运行时的发送控制和草稿保留
  - 改善在重命名期间，输入法 Enter 直接提交的问题
  - 保留远程连接日志滚动位置
  - 稳定助手掌机渲染
  - 修复立即发送前未停止活跃目标
  - 刷新失败时保留编程计划预览
  - 发现符号链接的工作区技能
  - Windows 安装程序正确扫描嵌套数据目录
  - 修复 Git 提交消息失败的问题
  - 优化流式输出打字机效果，改善闪烁问题
