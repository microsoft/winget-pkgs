ReleaseNotes: |-
  新功能
  - 支持从 ZIP 链接安装插件。
  - 聊天区拖拽文件的可放置范围更大。
  - 拖拽文件时会显示更清晰的提示。
  - 优化助手回复的 Markdown 阅读体验。
  问题修复
  - 提升 OpenAI 兼容模型的请求稳定性。
  - 修复部分模型无法处理多媒体内容的问题。
  - 模型不可用时提示更清楚，并提供正确入口。
  - 提升插件下载、安装和缓存的可靠性。
  - 修复插件授权状态可能不更新的问题。
  - 修复反馈提交可能失败的问题。
  - 后台任务失败时会显示更明确的原因。
  - 修复后台任务计时和控制按钮异常。
  - 修复聊天搜索跳转和重复查找问题。
  - 修复移动端任务搜索无法操作的问题。
  - 修复文件树刷新失败或状态卡住的问题。
  - 修复任务列表在删除或成员变更后不同步。
  - 修复规划同步失败后无法重试的问题。
  - 切换会话后会保留规划输入内容。
  - 修复验证码恢复可能用错服务的问题。
  - 修复排队消息可能过早发送的问题。
  - Markdown 表格预览宽度更合理。
  - 改善 Linux 下图标、标题栏和窗口对齐。
  - 远程控制页面现在会正确显示图标。
