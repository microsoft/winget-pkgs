ReleaseNotes: |-
  新功能
  - 新增文件树，浏览和定位项目文件更加直观，也能更方便地在不同文件间切换。
  - 新增代码高亮，查看代码内容时层次更清晰，阅读体验更好。
  - 新增图片预览，遇到图片文件时可以直接查看内容，无需额外打开其他工具。
  - 优化代码查看体验，代码内容展示更加清晰，预览更顺手。
  - 新增上下文压缩按钮，帮助你更方便地整理和精简对话上下文。
  问题修复
  - 修复了切换模型或服务提供方后，模型状态可能不同步的问题，减少异常和误切换情况。
  - 修复了某些启动和鉴权场景下的并发问题，提升整体稳定性和自恢复能力。
  - 修复了自定义模型切换后可能需要异常重启、界面被错误锁定的问题。
  - 修复了文件新增后无法通过 @ 引用的问题，文件引用更稳定。
  - 修复了文件树加载、刷新以及跨工作区使用时的一些异常，文件浏览和切换更顺畅。
  - 修复了多文件修改预览、纯文本预览和长内容预览时可能卡死、冻结或崩溃的问题。
  - 修复了多行 diff、补丁预览和变更对比在部分场景下无法正常显示的问题，预览结果更稳定。
  - 修复了代码块渲染可能引发死循环或溢出的问题，并补充了右键操作能力。
  - 修复了消息摘要在部分情况下卡死的问题。
  - 修复了部分错误信息页面无法顺畅滚动查看的问题。
  - 修复了配置写入时可能出现的数据丢失问题，设置保存更可靠。
  - 修复了 Windows 环境下部分文件操作失败的问题，提升跨平台稳定性。
  - 修复了日志导出时敏感信息脱敏不完整的问题，进一步加强隐私保护。
  - 修复了图片、文本和代码预览相关的一些兜底显示问题，异常情况下也能尽量正常查看内容。
