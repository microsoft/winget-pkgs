ReleaseNotes: |-
  新功能
  - 优化 Command/Ctrl + K 搜索体验，查找操作、任务和文件更方便。
  - 新增会话分支功能，便于从当前进度继续。
  - 新增可直接编辑待发送内容，修改更顺手。
  - 新增变更摘要和源码预览的快捷打开方式。
  - 新增更清晰的状态空间图展示。
  - 新增任务列表「分组 / 项目」视图切换，便于快速查看不同任务组织方式。
  - 新增支持@文件夹和循环选择。
  问题修复
  - 修复会话分支后目标状态和历史记录丢失的问题。
  - 修复恢复会话后已读状态不一致的问题。
  - 修复任务队列、等待队列和压缩流程中的卡顿与丢消息问题。
  - 修复命令中心、侧边栏和任务视图的一系列显示与文案问题。
  - 修复移动端历史恢复、模型提示和错误提示残留问题。
  - 修复 Windows 下的安装、更新、测试和 shell 兼容问题。
  - 修复文件提及、目录显示和差异预览中的若干展示问题。
  - 修复提交消息生成、模型选择和继续对话时的异常情况。
