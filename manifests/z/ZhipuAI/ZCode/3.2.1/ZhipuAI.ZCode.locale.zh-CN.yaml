ReleaseNotes: |-
  问题修复
  - 修复远程工作区刷新后会话未恢复的问题。
  - 修复 Linux 版本更新源不正确的问题。
  - 修复反馈创建取消后状态异常的问题。
  - 修复符号链接目录可能导致文件树卡死的问题。
  - 修复 Mermaid 图表渲染可能导致窗口崩溃的问题。
  - 修复知识库生成状态和结果显示不及时的问题。
  - 修复知识库模型选择不一致的问题。
  - 修复远程连接失败时诊断信息丢失的问题。
  - 修复应用升级后远程模型缓存未刷新的问题。
  - 修复远程目录中符号链接显示不完整的问题。
  - 修复技能扫描可能导致输入框卡顿的问题。
  - 修复粘贴大段文本时附件处理不稳定的问题。
  - 修复助手回复流式内容可能丢失的问题。
  - 修复聊天滚动到底部时可能卡顿的问题。
  - 修复自定义回答按回车无法提交的问题。
  - 修复模型选择器中编辑模式丢失的问题。
