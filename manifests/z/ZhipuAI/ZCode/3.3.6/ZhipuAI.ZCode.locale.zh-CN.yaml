ReleaseNotes: |-
  问题修复
  - 优化代码库 Wiki 生成能力，同时支持多语言。
  - Markdown 表格支持更好地横向滚动。
  - 修复启动时工作区不可用导致的异常。
  - 修复插件安装和同步失败后的残留问题。
  - 修复登录授权异常时无法恢复的问题。
  - 修复模型不可用时提示不清或选择丢失的问题。
  - 修复自定义模型重启后未保留的问题。
  - 修复聊天查找、历史切换等快捷操作异常。
  - 修复文件树刷新失败或显示状态不准的问题。
  - 修复 Markdown 表格滚动方向和边界问题。
  - 修复后台任务计时、控制按钮丢失问题。
  - 修复 SQL 差异预览可能崩溃的问题。
  - 修复 Linux 图标和标题栏显示问题。
  - 修复未读标记重启后丢失的问题。
