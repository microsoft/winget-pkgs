ReleaseNotes: |-
  新功能
  - 新增桌面端硬件加速开关。
  - 支持将本地 MCP 配置同步到 SSH 远程环境。
  - 新增团队套餐，支持登录使用。
  - 新增 Markdown 表格的下载、复制和预览功能。
  问题修复
  - 优化系统原生添加附件支持多文件。
  - 提升 Windows 自动更新安装稳定性。
  - 修复 WSL 路径打开和重连问题。
  - 修复 macOS 图形启动时命令路径异常。
  - 修复模型连接选择丢失或闪烁的问题。
  - 优化 Git 提交与推送操作面板。
  - 修复大图附件导致的显示或恢复异常。
  - 修复远程附件路径和空格处理问题。
  - 修复压缩后计划丢失的问题。
  - 优化远程连接性能。
  - 修复聊天滚动位置偶尔丢失的问题。
  - 修复网页读取超时和访问安全提示不清晰的问题。
  - 修复计划模式中审批状态和工具结果异常。
  - 修复会话标题生成偶尔超时或显示异常。
