ReleaseNotes: |-
  New Features
  - 支持可编辑双栏差异预览
  - add last-config quick option for AI commit message generation
  - improve session titles and thread row display
  - authenticate the askuser MCP server with a bearer token
  - add MCP servers settings panel
  - localize the native menu bar in the saved UI language
  - reach AskUserQuestion in non-plan modes via in-process MCP
  Fixes
  - keep slash-command user prompts with args visible
  - keep exit-plan dedupe intact across identity-level recompute
  - anchor AskUserQuestion card to its own request, not the assistant head
  - sync zh toggle_git_sidebar label with i18n source
  - remove 120s wall-clock cap that killed large /compact runs
  - 修复 WebView 图片粘贴
  - 修复本地开发前置检查
  Performance Improvements
  - memoize @-mention autocomplete to fix keystroke stall
  - reduce streaming lag with four targeted fixes
