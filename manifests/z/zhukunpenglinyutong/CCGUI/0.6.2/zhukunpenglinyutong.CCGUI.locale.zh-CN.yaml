ReleaseNotes: |-
  New Features
  - attribute frame drops to react-scan renders and gate web-vitals at runtime
  - enable lightweight streaming for claude and add frame-drop attribution
  - 接入 react-scan 渲染诊断面板并支持设置页开关
  - 新增分支徽章并打磨输入框与消息时间线
  - 新增切换开发者工具菜单项
  - collapse subagent trees by default and reorder thread list
  - 迁移到 shadcn 默认 zinc 样式并统一组件库到 radix
  Fixes
  - rename dmg volume to ccgui to avoid EPERM on macOS 26
  - 优化 Mermaid 卡片操作按钮
  - 补齐 HTML 序列化依赖声明
