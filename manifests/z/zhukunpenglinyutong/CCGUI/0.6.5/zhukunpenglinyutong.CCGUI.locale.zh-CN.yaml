ReleaseNotes: |-
  New Features
  - 侧栏底部新增可点击版本号标签
  - 优化快捷键录入交互并统一供应商面板配色
  Fixes
  - 顶栏图标放不下时按优先级裁进「更多」菜单
  - 面板不再因 live 状态强制外显，仅按激活/勾选常驻
  - 收到 result 后按宽限期结算回合并强杀残留进程组
  - harden realtime turn lifecycle and refine settings styling
  Performance Improvements
  - 轻量流式/纯代码块跳过 heavy-islands 每 token 重扫
  - 压制长对话流式渲染的 O(L²) 与全历史开销
