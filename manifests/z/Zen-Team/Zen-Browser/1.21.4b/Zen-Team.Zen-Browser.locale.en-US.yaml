ReleaseNotes: |-
  Zen Stable Release

  New Features
  - Updated to Firefox 152.0.2 and 152.0.3
  - Added 'Edit pinned tab' context menu item to manually set a pinned tab's URL
  - Added 'Add Route for Domain' context menu item to quickly add a tab's domain to the Space Routing settings

  Fixes
  - Prevent sidebar from flickering when moving a tab (#14131)
  - Full-screening while on a glance tab will now expand the glance tab to a normal tab (#11766)
  - Fixed space routing tabs opening in background when it should be in foreground (#14183)
  - Other minor bug fixes and improvements.
