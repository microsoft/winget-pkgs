ReleaseNotes: |-
  Zen Stable Release

  Fixes
  - Fixed compact mode toggle being appear checked incorrectly (#12973)
  - Zen now respects more 'reduce motion' system settings to disable or simplify non-essential animations
  - Switching spaces will not be blocking anymore, meaning you can switch to another space while the current one is still animating (#8206)
  - Fixed website notifications not being clickable when using the right sidebar (#12104)
  - Improved low-FPS performance on certain occasions, such as when playing videos or using glance on low-end devices (#12979)
  - Fixed restoring a pinned tab also scrolling the website to it's original position (#13024)
  - Fixed some toolbars having unreadable text colors when using certain themes (#13024)

  Changes
  - Reverted to Firefox's old search bar due to compatibility issues with the new one
  - Context menu for split tabs has now been renamed to 'Join tabs' to be more intuitive
