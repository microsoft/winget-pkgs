ReleaseNotes: |-
  Zen Stable Release

  New Features
  - Updated to Firefox 151.0.4
  - Added 'Space Routing', a new feature that allows you to route links to a specific Space. To get started, click on the three dots in your Space name and click on 'Space Routing Settings'.

  Fixes
  - Fixed extension-opened tabs not being created with the correct container (#14100)
  - Fixed a bug with the Boosts editor having the wrong theme colors (#14099)
  - Improved overflowing space icons being inaccessible and improved the feeling when hovering over them (#13747)
  - Other minor bug fixes and improvements
