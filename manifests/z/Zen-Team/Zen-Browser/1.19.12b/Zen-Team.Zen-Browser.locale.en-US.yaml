ReleaseNotes: |-
  Security
  - Various security fixes (https://www.mozilla.org/en-US/security/advisories/mfsa2026-40/)
  - CVE-2026-44658 (https://github.com/zen-browser/desktop/security/advisories/GHSA-cc9c-mmmf-c5j6)
  - CVE-2026-44659 (https://github.com/zen-browser/desktop/security/advisories/GHSA-7p2r-fp29-9w69)

  New Features
  - Updated to Firefox 150.0.2
  - Improved space swiping feel and performance
  - The option for 'Create new space' keyboard shortcut has been added to the keyboard shortcuts settings.
  - Desktop files on linux should now ship with translations for desktop entries.

  Fixes
  - Fixed search engines not being visible in settings (#13522)
  - Fixed Previous Space in MacOS menu bar not working (#13583)
  - The loading indicator should now show on-top of the webview for double toolbar mode (#13516)
  - Fix macos crash when native popovers are closed on some occasions (#13294)
  - Fixed glance having wrong image preview when zoomed in
  - Other minor bug fixes and performance improvements.
