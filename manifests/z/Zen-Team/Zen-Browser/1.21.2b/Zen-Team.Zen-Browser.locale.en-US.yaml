ReleaseNotes: |-
  Zen Stable Release

  Security
  - https://www.mozilla.org/en-US/security/advisories/mfsa2026-57/

  New Features
  - Updated to Firefox 152.0
  - Improved support for more advanced cursor movement commands, including those relating to paragraph boundaries, on macOS.
  - On Windows and Linux, you can now copy links via the tab context menu by right-clicking a tab and selecting Share > Copy Link, making it easy to copy a link without switching to the tab first.

  Fixes
  - Fixed space routing overriding tabs with an explicit container (#14242)
  - Fixed background tabs focusing on routed tabs (#14165)
  - Fixed opening glance on links while selecting text in links (#8391)
  - Other minor bug fixes and improvements

  Changes
  - Site zooming via keyboard or mouse now offers more zoom levels in smaller increments than before.
  - When a PDF or other file that Zen opens directly finishes downloading, it now opens in a background tab if you've switched tabs or closed the original page.
