ReleaseNotes: |-
  Zen Stable Release

  New Features
  - Updated to Firefox 151.0.2
  - You can now type New Boost in the urlbar to quickly create a new boost for the current site!

  Fixes
  - Fixed pressing u duplicating tabs. (#13851)
  - Fixed video controls going under the screen when in fullscreen mode. (#10594)
  - Fixed boosts not working for certain websites. (#13844)
  - Fixed an issue on macOS where smart cards and security keys could fail to load certificates automatically
  - Other minor bug fixes and performance improvements.
