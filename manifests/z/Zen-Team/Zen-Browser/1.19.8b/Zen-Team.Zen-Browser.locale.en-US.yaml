ReleaseNotes: |-
  Zen Stable Release
  Please see the 1.19.7b release for more details on the fixes included in this release.
  
  Fixes
  - Fixed some animations inside Zen not respecting the 'reduce motion' system setting (#13140)
  - Fixed compact mode not hiding the sidebar or toolbar when a site has permissions disabled (#13121)
  - Fixed accessibility issues with some toolbars such as 'find on page' in private windows
  
  Changes
  - Modified sidebar context menu to be more intuitive and simplified, removing some options and moving others to more appropriate places.
  - Live folders option has been moved to the sidebar context menu
