ReleaseNotes: |-
  🎨 Komi Store 1.9.2 — Meet Manga, a whole new look
  > 🖌️ New: Manga personality
  >
  > Komi Store can now wear a completely different skin. Manga is a bold, inked, comic-panel look — loud display type, paper-textured Day / Night / Nord themes, and hand-drawn energy across the whole app. Switch between the classic Material look and Manga anytime in settings; your accent color and theme come along for the ride.
  ✨ Also New
  - Explore tab — a fresh daily feed of installable apps for your platform that loads more as you scroll, so there's always something new
  - Top Charts tab — see what's trending, just released, and most popular, ranked across the whole store
  🐛 Bug Fixes
  - App downloads now auto-pick the build that matches your device's CPU (like aarch64) instead of defaulting to a larger universal APK
  - Windows: GitHub sign-in works again — the desktop app reliably opens and finishes login after you authorize in your browser
  - Linux: fixed the app not launching from the menu on some setups (like Arch/KDE), caused by a mismatched desktop-shortcut name
  Full Changelog: 1.9.1...1.9.2
  🌐 Website | 💬 Discord
