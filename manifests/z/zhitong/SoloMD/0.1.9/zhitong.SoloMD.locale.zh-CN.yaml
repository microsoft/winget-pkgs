PackageIdentifier: zhitong.SoloMD
PackageVersion: 0.1.9
PackageLocale: zh-CN
Publisher: zhitong
PackageName: SoloMD
License: MIT
ShortDescription: 一款轻量跨平台的 Markdown 与纯文本编辑器
Description: |-
  SoloMD 是一款免费开源的 Markdown + 纯文本编辑器，基于 Tauri 2 + Vue 3 +
  CodeMirror 6 构建，安装包仅 15 MB。

  v0.1.9 新增: 拖入 DOCX、PDF、XLSX、PPTX、HTML、CSV 文件秒转 Markdown，零配置。

  支持实时预览、Vim 模式、8 种主题、KaTeX 数学公式、Mermaid 图表、
  一键清除 AI 格式、一键复制、导出 PDF/DOCX/HTML/PNG、GBK/Big5 编码自动识别。
