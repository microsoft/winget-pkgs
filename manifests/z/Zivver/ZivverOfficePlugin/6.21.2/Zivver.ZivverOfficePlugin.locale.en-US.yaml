ReleaseNotes: |-
  ## Release highlights

  ### Bug fixes

  - ENG-15250 - Link to webapp placed in Zivver message sent from a shared mailbox is incorrect and
    results in a "Could not find conversation" warning.
  - ENG-15258 - Table formatting is not properly displayed for Zivver messages that are sent using the
    Zivver WebApp.
  - ENG-16000 - In some cases, Outlook can crash when opening a Zivver message, with an
    "IndexOutOfRangeException" error in the CSS parser.
  - ENG-16300 - Error message is displayed when repeatedly opening or renaming msg files.
  - ENG-17601 - The Zivver Office Plugin causes typing delays and skipped characters when paired with
    the NetDocuments Add-in.
  - ENG-17687 - Replying to a Zivver conversation moves the CC recipients to the TO field.
  - ENG-17841 - Print Message functionality wraps lines incorrectly in Outlook Classic.
  - ENG-18538 - Made logging less verbose.

  ### Known issues

  - ENG-8502 - The sign sidebar spills over the right side of the screen when the display scale is set
    to 150% or higher.
  - ENG-8509 - The font in Zivver messages sent using Plugin Assisted Mail Submission (PAMS) may
    appear blurry.
  - ENG-13256 - Inline images disappear when forwarding Zivver messages unsecurely.
  - ENG-13662 - Error when opening .OFT file after saving draft email with active Zivver plugin.
  - ENG-14504 - Activating Zivver breaks RTF message formatting.
    Workaround: Choose HTML as default formatting or enable Zivver before composing the email.
  - ENG-14881 - Sometimes a reply to a sent PAMS message can result in a SendAsDeniedException.
  - ENG-15414 - eSignatures: Handwritten signatures shifts the assigned fields.
  - ENG-15996 - Outlook is freezing when accepting internal calendar invites.
  - ENG-16133 - When changing the personal access code within the Zivver plugin, this change is not
    reflected in the preview until Outlook is restarted.
  - ENG-16631 - When replying to an insecure message in a new window (pop-out), the Zivver eSignatures
    button is available, but not functional.
  - ENG-16978 - Zivver messages sent with the Zivver OWA add-in cannot be viewed in the Sent Items of
    the (classic) Outlook desktop application.
  - ENG-17374 - Switiching between folders makes Outlook unresponsive when Zivver plugin is installed.
  - ENG-17476 - The Zivver Office Plugin selects the wrong Sent Items folder when sending a Zivver
    email.
  - ENG-17568 - Attachments order changes to Alphabetical order when using the Zivver Office Plugin.
  - ENG-17788 - If the Outbox folder is active, the first insecure message remains in the Outbox
    folder and is not sent.
  - ENG-17826 - Normal emails with delayed sending in Outlook Classic fail to send when the Zivver
    Office plugin in active.
  - ENG-17838 - Outlook may become unresponsive when performing certain actions with delegated
    mailboxes or shared calendars.
  - ENG-17869 - Outlook may crash when sending an email from a shared mailbox to a specific recipient.
  - ENG-17892 - Unable to forward sent Zivver messages from the Sent Items list initially.
  - ENG-18089 - Signature images may not be visible in the Zivver Office Plugin when viewing a secure
    message that was sent using the Zivver OWA Add-in.
  - ENG-18352 - Sent messages may not appear immediately in the Zivver message view in Outlook Classic
    when sent via Plugin Assisted Mail Submission (PAMS).
  - ENG-18463 - Cache files created by the Zivver Office Plugin are not automatically removed from the
    local system.
  - ENG-18466 - Outlook Classic requires a restart before the Zivver Office Plugin recognizes a change
    to a recipient's mobile phone number.
  - ENG-18518 - Outlook may become unresponsive when the Quick Add bar is used to search for
    recipients more than once in the same session.
  - ENG-18674 - Some DLL files in the Zivver Office Plugin are not digitally signed. This may trigger
    security warnings on systems that enforce strict code signing policies.
