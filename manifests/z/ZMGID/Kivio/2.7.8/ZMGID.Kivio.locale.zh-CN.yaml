PackageIdentifier: ZMGID.Kivio
PackageVersion: 2.7.8
PackageLocale: zh-CN
ShortDescription: 轻量桌面 AI 客户端与屏幕级 Agent：聊天、工具、翻译、OCR、视觉问答，放进一个小应用。
Description: |-
  Kivio 是一个小体积桌面 AI 客户端，内置 Agent 运行时。常驻托盘或菜单栏，需要时再出现，比浏览器里的 AI 工作台更轻。
  - Kivio Agent —— 聊天、项目、助手、记忆、文件/图片附件、MCP、Skills、本地工具（文件操作、终端、网页抓取/搜索、Pyodide run_python）。
  - Lens —— 基于截图的视觉问答、OCR、公式提取、文本优化，可选联网来源回答。
  - 快速翻译 —— 输入文本、选中文本、窗口、任意屏幕区域。
  - 自带模型选择权 —— 支持 OpenAI 兼容接口与 Anthropic Messages，可按功能分别路由模型，多 Key 故障转移。
  - 文档可直接用 —— PDF / Word / Excel 工作流跑在随包的离线 Pyodide 沙箱，不依赖首次运行从 CDN 下载。
  - 默认安静 —— 无遥测；API Key 与对话数据留在本机
Tags:
- 人工智能
- 大语言模型
- 聊天机器人
ReleaseNotes: |-
  Kivio v2.7.8
  桌面 AI 助手 · macOS (Apple Silicon) + Windows。Desktop AI assistant for macOS (Apple Silicon) and Windows.
  下载 / Downloads
  - Windows — Kivio_2.7.8_x64-setup.exe(NSIS 安装包 / installer)
  - macOS — Kivio_2.7.8_aarch64.dmg(Apple Silicon,未签名 / unsigned)
    - 首次启动：右键 → 打开，或运行 xattr -cr /Applications/Kivio.app
    - First launch: right-click → Open, or run xattr -cr /Applications/Kivio.app
  新版本亮点 / What's New
  - 替换翻译重建 / Replace translation, rebuilt — 原位画布覆盖层把译文重绘在原截图上，支持原文/译文一键切换，拖拽框选复制任意区域。An in‑place canvas overlay redraws the translation over the original screenshot, with an original/translated toggle and drag‑select to copy any region.
  - 翻译结果卡可缩放 / Resizable translate result card — 拖右下角调整大小，宽度跨会话记忆。Drag the corner to resize; the width is remembered across sessions.
  - 模型库更新 / Model library refreshed — 补入 2026 年中旗舰(GPT‑5.6、Grok 4.5、Claude Fable 5 / Sonnet 5、Gemini 3.2 Pro、GLM‑5.2、Kimi K2.7),带上下文 / 定价 / 能力元数据用于自动填充。Added mid‑2026 flagships (GPT‑5.6, Grok 4.5, Claude Fable 5 / Sonnet 5, Gemini 3.2 Pro, GLM‑5.2, Kimi K2.7) with context / pricing / capability metadata for auto‑fill.
  - OfficeCLI 插件中心 / OfficeCLI plugin center — OfficeCLI Skill / MCP 的一键安装与实时预览。One‑click install and live preview for the OfficeCLI Skill / MCP.
  - MCP 工具图片直达视觉 / MCP tool‑result images to vision — MCP 工具返回的图片直接喂给模型做视觉审查。Images returned by MCP tools are fed straight to the model for visual review.
  - 对话工作台与产物 / Conversation workbench & artifacts — 普通对话工作台、显式 present_artifacts 把生成或已有文件放进回复、语义消息导航器，以及对话导出为 Markdown。An ordinary‑chat workbench, explicit present_artifacts to place generated or existing files in the reply, a semantic message navigator, and Markdown export.
  - Windows — run_command 优先使用 Git Bash,回落 PowerShell。run_command now prefers Git Bash and falls back to PowerShell.
  - 修复 / Fixes — Anthropic 工具 schema 在 Bedrock 上的兼容性、选中专家 / 项目的工具栏图标改为高亮色、RapidOCR 双档(PP‑OCRv5 mobile / PP‑OCRv6 medium)恢复。Anthropic tool‑schema compatibility on Bedrock, selected expert / project toolbar icons now shown in accent color, and RapidOCR dual tier (PP‑OCRv5 mobile / PP‑OCRv6 medium) restored.

  完整变更 / Full changelog: https://github.com/ZMGID/kivio/compare/v2.7.7...v2.7.8
