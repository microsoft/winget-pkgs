PackageIdentifier: ZMGID.Kivio
PackageVersion: 2.8.2
PackageLocale: zh-CN
ShortDescription: 轻量桌面 AI 客户端与屏幕级 Agent：聊天、工具、翻译、OCR、视觉问答，放进一个小应用。
Description: |-
  Kivio 是一个小体积桌面 AI 客户端，内置 Agent 运行时。常驻托盘或菜单栏，需要时再出现，比浏览器里的 AI 工作台更轻。
  - Kivio Agent —— 聊天、项目、助手、记忆、文件/图片附件、MCP、Skills、本地工具（文件操作、终端、网页抓取/搜索、Pyodide run_python）。
  - Lens —— 基于截图的视觉问答、OCR、公式提取、文本优化，可选联网来源回答。
  - 快速翻译 —— 输入文本、选中文本、窗口、任意屏幕区域。
  - 自带模型选择权 —— 支持 OpenAI 兼容接口与 Anthropic Messages，可按功能分别路由模型，多 Key 故障转移。
  - 文档可直接用 —— PDF / Word / Excel 工作流跑在随包的离线 Pyodide 沙箱，不依赖首次运行从 CDN 下载。
  - 默认安静 —— 无遥测；API Key 与对话数据留在本机
Tags:
- 人工智能
- 大语言模型
- 聊天机器人
ReleaseNotes: |-
  Kivio Desktop v2.8.2
  桌面 AI 助手 · macOS (Apple Silicon) + Windows。Desktop AI assistant for macOS (Apple Silicon) and Windows.
  下载 / Downloads
  - Windows — Kivio.Desktop_2.8.2_x64-setup.exe（NSIS 安装包 / installer）
  - macOS — Kivio.Desktop_2.8.2_aarch64.dmg（Apple Silicon，未签名 / unsigned）
    - 首次启动：右键 → 打开，或运行 xattr -cr "/Applications/Kivio Desktop.app"
    - First launch: right-click → Open, or run xattr -cr "/Applications/Kivio Desktop.app"
  新版本亮点 / What's New
  - 笔记中心升级 / Notes center upgrade — 笔记中心加入文件夹式管理和 Milkdown 实时预览编辑器，可把卡片移动到文件夹、用内联弹框管理文件夹。The notes center gains folder-based organization and a Milkdown live-preview editor; move cards into folders and manage folders from an inline popover.
  - 消息区交互增强 / Richer message interactions — 划词可「添加到聊天」直接引用进输入框，内置右键菜单支持复制选中/复制整条消息，并重构了跟随滚动，修复流式不跟随与钉底闪动。Select text to "add to chat" as a quote in the input, a built-in right-click menu copies the selection or the whole message, and follow-scroll was rebuilt to fix streaming-not-following and pin-to-bottom flicker.
  - 界面更个性化 / More personalization — 可自定义 UI 字号、界面字体与代码字体；头像改为本地图片上传；记住上次使用的模型与思考等级作为默认（移除「默认模型」设置），并精简翻译/资料设置。Customize UI font size, interface font, and code font; upload a local avatar image; the last-used model and reasoning level are remembered as the default (the "default model" setting is gone), and translate/profile settings were trimmed.
  - 连接测试更可靠 / More reliable connection testing — 测试连接按供应商 api_format 分派正确协议，改为模型批量测试，密码框去掉重复的原生眼睛图标。Test connection now dispatches the correct protocol per provider api_format, tests models in batch, and password fields no longer show a duplicate native reveal icon.
  - 外部 Agent 与体验细节 / External agents & polish — 本地 CLI 可接收图片/文件附件，可用性探测与模型探测拆分（不再频繁重复检测），移除 Kivio Code 终端 agent；修复暗色模式下运行时图标与模型列表的可见性；优化检索面板与知识库 tab；Lens 输入栏置于截图选区之上；激活/托盘点击聚焦当前窗口。Local CLIs accept image/file attachments, availability and model probing are split (no more constant re-detection), and the Kivio Code terminal agent was removed; dark-mode visibility fixes for the runtime logo and model list; a polished retrieval panel and knowledge-base tab; the Lens input bar sits above the capture selection; activating or clicking the tray focuses the current window.

  完整变更 / Full changelog: https://github.com/ZMGID/kivio/compare/v2.8.1...v2.8.2
