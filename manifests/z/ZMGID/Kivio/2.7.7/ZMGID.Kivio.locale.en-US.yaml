  新版本亮点 / What's New
  - 多模型协作 · 混音器 / Multi-model collaboration (Mixer) — 按任务难度分配模型：子代理用便宜/快的模型，配一个更强的模型作为顾问(Advisor),主模型遇到困难时用 advisor 工具主动咨询；再加编排(Orchestrate)模式，主模型只做规划、把 token 重活派给 worker 子代理。Assign models by task weight: a cheap/fast model for sub‑agents, a stronger on‑demand Advisor the main model consults via the advisor tool when stuck, and an Orchestrate mode where the main model plans and delegates token‑heavy work to worker sub‑agents.
  - 知识库增强 / Knowledge base upgrades — 第三方文档解析服务(MinerU / LlamaParse)、拖拽导入 + 索引进度条、会话级「强制检索」开关，embedding 调用计入用量统计。Third‑party document parsing (MinerU / LlamaParse), drag‑and‑drop import with an indexing progress bar, a per‑conversation "force retrieval" toggle, and embedding calls counted in usage stats.
  - 离线高精度 OCR / High‑precision offline OCR — RapidOCR 新增高精度档(PP‑OCRv6 medium,50 语言),按场景选择。RapidOCR gains a high‑accuracy tier (PP‑OCRv6 medium, 50 languages), selectable per scenario.
  - 用量统计重做 / Usage stats rework — token 口径对齐服务商真实计数，模型分布环形图 + 多序列趋势，支持 当天 / 1d / 7d / 30d。Token accounting anchored to real provider counts, with a model‑distribution donut and multi‑series trend chart across today / 1d / 7d / 30d.
  - Chat 界面 / Chat UI — 统一的「来源」弹层(知识库 / 连接器 / 网络搜索)、一问多答叠放头像组、对话内独立的顾问 / 子代理卡片。A unified Sources popover (knowledge base / connectors / web search), stacked multi‑model avatars for one‑question‑many‑answers, and standalone Advisor / sub‑agent cards in the conversation.
  - macOS — 关闭对话窗口后 Dock 图标重新隐藏。The Dock icon now hides again when the chat window is closed.
  - 代码瘦身 / Leaner codebase — 前端、chat core、终端 agent 的一轮大规模死代码清理。A large dead‑code sweep across the frontend, chat core, and terminal agent.

