PackageIdentifier: ZMGID.Kivio
PackageVersion: 2.7.9
PackageLocale: zh-CN
ShortDescription: 轻量桌面 AI 客户端与屏幕级 Agent：聊天、工具、翻译、OCR、视觉问答，放进一个小应用。
Description: |-
  Kivio 是一个小体积桌面 AI 客户端，内置 Agent 运行时。常驻托盘或菜单栏，需要时再出现，比浏览器里的 AI 工作台更轻。
  - Kivio Agent —— 聊天、项目、助手、记忆、文件/图片附件、MCP、Skills、本地工具（文件操作、终端、网页抓取/搜索、Pyodide run_python）。
  - Lens —— 基于截图的视觉问答、OCR、公式提取、文本优化，可选联网来源回答。
  - 快速翻译 —— 输入文本、选中文本、窗口、任意屏幕区域。
  - 自带模型选择权 —— 支持 OpenAI 兼容接口与 Anthropic Messages，可按功能分别路由模型，多 Key 故障转移。
  - 文档可直接用 —— PDF / Word / Excel 工作流跑在随包的离线 Pyodide 沙箱，不依赖首次运行从 CDN 下载。
  - 默认安静 —— 无遥测；API Key 与对话数据留在本机
Tags:
- 人工智能
- 大语言模型
- 聊天机器人
ReleaseNotes: |-
  Kivio Desktop v2.7.9
  桌面 AI 助手 · macOS (Apple Silicon) + Windows。Desktop AI assistant for macOS (Apple Silicon) and Windows.
  下载 / Downloads
  - Windows — Kivio.Desktop_2.7.9_x64-setup.exe（NSIS 安装包 / installer）
  - macOS — Kivio.Desktop_2.7.9_aarch64.dmg（Apple Silicon，未签名 / unsigned）
    - 首次启动：右键 → 打开，或运行 xattr -cr "/Applications/Kivio Desktop.app"
    - First launch: right-click → Open, or run xattr -cr "/Applications/Kivio Desktop.app"
  新版本亮点 / What's New
  - 更名为 Kivio Desktop / Renamed to Kivio Desktop — 应用、安装包、窗口、首次引导、关于页面、网站和 Release 统一使用新名称；kivio CLI、Bundle ID 与现有 ~/Kivio 数据路径保持兼容。App, installer, window, onboarding, About, website, and release branding now use Kivio Desktop, while the kivio CLI, Bundle ID, and existing ~/Kivio data paths stay compatible.
  - 点击托盘打开 AI 客户端 / Tray click opens the AI client — 左键点击菜单栏/托盘图标会先关闭活动中的 Lens 系浮窗，再打开 Chat，避免置顶浮窗遮住客户端。A left-click closes any active Lens-family overlay before opening Chat, so an always-on-top overlay cannot cover the client.
  - 修复 macOS 输入翻译闪退 / macOS translator crash fixed — 中文输入法会话仍挂在输入框时提交翻译，也会安全拆除 WebView，不再因 AppKit/IME 原生异常导致整个进程退出。Submitting input translation with an attached Chinese IME session now tears down the WebView safely instead of aborting on an AppKit/IME exception.
  - 稳定 macOS 浮窗生命周期 / macOS overlays stabilized — Lens、截图翻译、替换翻译和选中文本翻译不再闪烁或重排桌面窗口；Escape/取消时的销毁流程进一步加固。Lens, screenshot translation, replace translation, and selected-text translation no longer flash or reorder desktop windows; Escape/cancel teardown is hardened.
  - 远程 MCP OAuth / Remote MCP OAuth — 远程 MCP 服务器新增 OAuth 授权入口、PKCE/动态注册，并兼容 2025-11-25 协议版本。Remote MCP servers gain an OAuth authorization entry, PKCE/dynamic registration, and compatibility with protocol version 2025-11-25.
  - 首次引导与 Lens 改进 / Onboarding and Lens improvements — 首次引导可选择 OCR 引擎；无截图的纯文本 Lens 对话也会写入历史。The first-run wizard can select the OCR engine, and text-only Lens conversations are preserved in history.
  - AI 客户端细节优化 / AI client refinement — 重写内置专家助手，拓宽对话列，消息导航贴近滚动条，Plugin/Skill/请求调试面板更紧凑统一。Built-in expert assistants were rewritten, the conversation column is wider, navigation docks to the scrollbar, and Plugin/Skill/Request Debug panels are visually tightened.
  - 发版可靠性 / Release reliability — 模型匹配、上下文压缩、工具名大小写与 MCP 取消通知的确定性回归均已补齐测试，前后端全量测试通过。Deterministic model matching, context compaction, case-insensitive tool-call, and MCP cancellation regressions are covered by the full passing frontend and Rust suites.

  完整变更 / Full changelog: https://github.com/ZMGID/kivio/compare/v2.7.8...v2.7.9
