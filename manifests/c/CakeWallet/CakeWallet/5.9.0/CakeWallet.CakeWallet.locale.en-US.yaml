ReleaseNotes: |-
  Release Notes
  v5.9.0: Strengthening the Privacy Ecosystem — Welcome BNB Smart Chain & Zcash Upgrades
  At Cake Wallet, Monero is our foundation, but our mission is to bring privacy to the entire crypto landscape. Version 5.9.0 expands your reach by adding BNB Smart Chain (BSC) support and delivering critical privacy refinements for Zcash and EVM chains.
  What’s New:
  🟡 BNB Smart Chain (BSC) Support: You can now manage BNB and your favorite BEP-20 tokens directly within Cake. Whether you’re swapping or holding, you now have a secure, non-custodial home for your BSC assets.
  🛡️ Zcash Privacy Refinements: Following our ZEC launch, we’ve optimized synchronization and shielded transaction reliability. We remain committed to implementing Zcash the right way—shielded by default to protect your metadata.
  ⚡ Enhanced EVM Experience: We’ve tuned our Ethereum Virtual Machine (EVM) engine for better performance across all supported networks (Ethereum, Base, Arbitrum, and now BSC). Expect faster balance updates and smoother transaction handling.
  🔧 Network Stability & Bug Fixes: We've improved node connectivity and squashed several bugs to ensure your Monero, Bitcoin, and altcoin wallets are always ready when you are.
  Update now to manage your BSC assets with the privacy-first interface you trust.
