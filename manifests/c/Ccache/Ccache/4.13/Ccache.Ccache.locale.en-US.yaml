ReleaseNotes: |-
  Upgrade notes:
  - A C++20-capable compiler is now required to build ccache from source. Minimum supported compiler versions are GCC 10, Clang 12 and Apple Clang 10.
  - Caching MSVC (cl.exe) compilations is now officially supported.

  New deliverables:
  - Added Linux binary releases statically linked with musl. (contributed by Joel Rosdahl)

  Removed deliverables:
  - Discontinued 32-bit Windows binary releases. (contributed by Joel Rosdahl)

  New features and improvements:
  - Added support for remote storage helpers: long-lived local helper processes spawned on demand for communicating with remote storage servers. Storage helpers allow support for new storage protocols to be developed and released independently of ccache. Built-in support for HTTP and Redis will likely be removed in a future release. (contributed by Joel Rosdahl)
  - Added support for directory-specific configuration files. Ccache now looks for a ccache.conf file in the current working directory and its parent directories, enabling per-project configuration without modifying the user’s cache-specific config file. (contributed by Joel Rosdahl)
  - Added msvc_utf8 config option to allow disabling /utf-8 for MSVC when using the fallback method of parsing preprocessed output. (contributed by Max Winkler)
  - Added support for caching distributed ThinLTO for Clang. (contributed by GitHub user zcfh)
  - Added support for caching MSVC /sourceDependencies file. (contributed by Joel Rosdahl)
  - Added handling of Apple Clang’s -index-unit-output-path option. (contributed by Joel Rosdahl)
  - Improved compiler detection on macOS by resolving the actual compiler via $DEVELOPER_DIR or xcode-select when /usr/bin/clang(++) shims that redirect to different compilers are used. (contributed by Joel Rosdahl)
  - Added support for rewriting -fcoverage-compilation-dir and -fcoverage-prefix-map absolute paths (similar to existing base_dir rewriting). (contributed by Evgeniy Isaev)
  - Added support for rewriting absolute paths in -fsanitize-blacklist option arguments. (contributed by Diego Alonso)
  - Added support for multi-line configuration values. (contributed by Joel Rosdahl)
  - Improved file copy performance by using copy_file_range(2) when available. (contributed by Oleg Sidorkin)
  - Added h, m and ms as accepted time unit suffixes for --evict-older-than (in addition to the existing d and s). (contributed by Joel Rosdahl)
  - Merged --recompress-threads and --trim-recompress-threads options into --threads. The old options are still accepted for backward compatibility. (contributed by Joel Rosdahl)
  - Improved performance of -x/--show-compression and -X/--recompress by using threads in parallel. (contributed by Joel Rosdahl)
  - Added logging of errors and file size changes when recompressing cache files. (contributed by Joel Rosdahl)

  Bug fixes:
  - Fixed use of monotonic clock for spin locks in the inode cache code. (contributed by Joel Rosdahl)

  Build improvements:
  - Fixed conditional enabling of the assembler language in CMake to avoid enabling both ASM and ASM_MASM on the same platform. (contributed by Steffen Winter)
  - Fixed inclusion of config.h to only apply to C and C++ compilation units, not assembler files. This avoids a problem when building with Clang on Windows. (contributed by Joel Rosdahl)
  - Disabled legacy ZSTD support when compiling ZSTD from source to avoid -Wmaybe-uninitialized warnings. (contributed by Joel Rosdahl)
  - Removed check for (on POSIX) mandatory spawn.h header. (contributed by Joel Rosdahl)

  Documentation improvements:
  - Added generation of documentation in Markdown format. (contributed by Joel Rosdahl)

  Test improvements:
  - Added a basic integration test suite for MSVC. (contributed by Joel Rosdahl)
  - Added an integration test for --serialize-diagnostics. (contributed by Joel Rosdahl)
  - Added support for Valkey in the remote_redis test suite. (contributed by Joel Rosdahl)
  - Fixed -march=native test to work reliably on hybrid CPU systems. (contributed by Joel Rosdahl)
