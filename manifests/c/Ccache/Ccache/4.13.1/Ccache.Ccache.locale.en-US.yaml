ReleaseNotes: |-
  Bug fixes and improvements
  - Fixed handling of extensionless input files passed with -x assembler (regression in 4.13). [contributed by Joel Rosdahl]
  - Fixed a crash when searching for a storage helper next to the ccache executable. [contributed by Joel Rosdahl]
  - Fixed atime restoration when the recompressor fails to read a file. [contributed by Joel Rosdahl]
  - Improved storage helper lookup order to prefer libexec directories over PATH. [contributed by Joel Rosdahl]
  - Improved reliability of finding the ccache executable path by using OS-specific APIs instead of relying on argv[0], which is not guaranteed to reflect the actual executable location. [contributed by Joel Rosdahl]
  - Improved handling of -fstack-usage and -fcallgraph-info output files when LTO is used: ccache now correctly skips looking for .su and .ci files that are not generated during compilation with LTO. [contributed by Kristian Sloth Lauszus]

  Build fixes
  - Fixed build on systems that have utimes(2) but not utimensat(2). [contributed by Joel Rosdahl]
  - Fixed mktemp(1) calls in build scripts to pass a template argument for portability to macOS/BSD. [contributed by Joel Rosdahl]
