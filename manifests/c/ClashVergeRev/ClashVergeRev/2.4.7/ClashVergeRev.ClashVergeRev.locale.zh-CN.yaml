  - 修复进入轻量模式后无法返回主界面
  - 切换配置文件偶尔失败的问题
  - 修复节点或模式切换出现极大延迟的回归问题
  - 修复代理关闭的情况下，网站测试依然会走代理的问题
  - 修复 Gemini 解锁测试不准确的情况
  - 修复删除订阅后状态栏未更新的问题
  ✨ 新增功能
  - 升级 Mihomo 内核
  🚀 优化改进
  - 优化订阅错误通知，仅在手动触发时
  - 隐藏日志中的订阅信息
  - 优化部分界面文案文本
  - 优化切换节点时的延迟
  - 优化托盘退出快捷键显示
  - 优化首次启动节点信息刷新
  - Linux 默认使用内置窗口控件
  - 实现排除自定义网段的校验
  - 移除冗余的自动备份触发条件
  - 恢复内置编辑器对 mihomo 配置的语法提示
  - 网站测试使用真实 TLS 握手延迟
  - 系统代理指示器(图标)使用真实代理状态
  - 系统代理开关指示器增加校验是否指向 Verge
  - 系统代理开关修改为乐观更新模式，提升用户体验
