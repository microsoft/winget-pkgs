  v2.4.7
  Important
  继2.4.6以来继续优化修复问题，是 bug 问题最少的版本；建议所有用户立即升级。
  关于版本的说明：Clash Verge 版本号遵循 x.y.z：x 为重大架构变更，y 为功能新增，z 为 Bug 修复。
  🐞 修复问题
  - 修复 Windows 管理员身份运行时开关 TUN 模式异常
