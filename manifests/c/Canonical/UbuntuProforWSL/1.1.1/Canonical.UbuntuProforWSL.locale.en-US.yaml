ReleaseNotes: |-
  Fixing auto updates regression since we started publishing ARM64 buids
  The versioning scheme of the msixbundle package changed when we implemented the multi architecture bundle (to publish ARM64 and x64 builds), causing a regression in the App Installer file based auto update. This is fixed now.

  What's Changed
  - docs: structure streamlining by @edibotopic in #1709
  - fix(ci): Improvements to dependabot and publish workflows by @CarlosNihelton in #1717
  - fix(msix): Pin to a patched winappCLI from their CI builds by @CarlosNihelton in #1723
  - More updates to dependencies and translations
