ReleaseNotes: |-
  v0.10.5 — Claude Sonnet 5
  Features
  - Claude Sonnet 5 now available — Anthropic's newest Sonnet-class model (claude-sonnet-5, released 2026-06-30) is now selectable in the model picker, with a 1M-token context window and adaptive thinking. It joins the lineup as the primary Sonnet, with Sonnet 4.6 kept available as the previous generation. Bedrock routing (US / EU / Global inference profiles) and connection defaults are wired up so it works across both Anthropic and Amazon Bedrock connections. The default model is unchanged (Opus 4.8). (5bf361b6)
  Improvements
  - Claude Agent SDK uplifted to 0.3.197 — the bundled SDK moves from 0.3.170 to 0.3.197 (Claude Code v2.1.197 parity), so the bundled CLI is itself aware of Sonnet 5 (the sonnet alias, context-window, and effort defaults). Includes upstream fixes since 0.3.170, including a Windows CLI subprocess console-flash fix. Full typecheck and shared test suites pass clean. (5bf361b6)
  Bug Fixes
  - None.
  Breaking Changes
  - None.
