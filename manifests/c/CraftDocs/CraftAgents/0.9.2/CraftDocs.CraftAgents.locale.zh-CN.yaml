ShortDescription: 与全球最顶尖的智能体共事，给他们配得上的用户体验
Description: Craft Agents 将 Claude 的编码能力引入您的整个数字工作流程。它通过增强的用户界面、审查功能和自动执行功能，大幅改进了编码与非编码工作流程。它构建在与 Claude Code（Claude 智能体开发工具包）相同的基础之上，可将模型的推理能力扩展到您所有的工具中：GitHub、Linear、Slack、Craft 文档、本地文件，以及任何您能够接入的应用程序接口。
