ShortDescription: A unified CLI and 20+ production-ready MCP servers for AI agent workflows
Description: |-
  Universal MCP Toolkit (umt) is the canonical open-source distribution of
  production-ready Model Context Protocol (MCP) servers, packaged as a single
  CLI for discovering, configuring, running, and diagnosing MCP integrations.

  What is MCP?
  The Model Context Protocol is an open standard that lets AI agents and LLM
  hosts (Claude Desktop, Cursor, VS Code, and others) connect to external tools
  and data sources through a common transport layer.

  What the toolkit provides:
  23 independently runnable MCP servers covering collaboration, productivity,
  commerce, data, cloud platforms, and research — all built on a shared
  TypeScript core with Zod validation, structured errors, and pino logging.

  Included servers:
    Collaboration: GitHub, Notion, Slack, Linear, Jira, Discord, Trello
    Productivity:  Google Calendar, Google Drive
    Commerce:      Spotify, Stripe
    Data:          PostgreSQL, MongoDB, Redis, Supabase, Airtable
    Platforms:     Vercel, Cloudflare Workers, Docker, npm Registry
    Research:      Hacker News, arXiv
    Local:         FileSystem

  CLI commands (umt):
    umt list    — Show every available server grouped by category
    umt install — Interactive setup: pick servers, choose transport, write config
    umt config  — Generate host config snippets for Claude Desktop, Cursor, etc.
    umt run     — Launch any server locally with stdio or HTTP+SSE transport
    umt doctor  — Check build output, config, and required environment variables
    umt profile — Save and restore install configurations

  ContextCore Integration:
  Pair with MemOS (github.com/Markgatcha/memos) for persistent, graph-based
  memory across agent sessions.
