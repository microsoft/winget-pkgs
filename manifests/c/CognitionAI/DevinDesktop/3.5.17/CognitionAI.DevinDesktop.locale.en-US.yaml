ReleaseNotes: |-
  Devin Desktop
  - @-mention pills in Cascade now show type-specific icons.
  - Restyled the command palette in the Agent Command Center.
  - Hiding the status bar by default in the Agent Command Center (set "workbench.statusBar.visible": true in user settings to restore it).
  - New worktree-backed sessions now open instantly and stay interactive while the worktree is created in the background.
  - “View usage” now opens eligible Devin users’ personal analytics page directly.
  - The devin.* settings for gitignore access, completion mode, and auto-continue are now honored.
  - Resuming an agent session now uses its original working directory, so Claude sessions started in another folder can be reloaded.
  - Fixed a crash when opening the Recent Chat History modal in Cascade.
  - On Windows, the auto-updater now clears stale Devin.exe processes before applying updates.
  Devin Cloud
  - Long Devin Cloud sessions render, scroll, and type faster and stay responsive while streaming.
  - A brief remote-connection drop no longer flashes a “disconnected” banner.
  - You can now configure a session’s network policy and grant or deny network access requests inline from the chat, without switching to the web app.
  Devin Local
  - Devin Local customizations and the sidebar skills count now span all open workspace folders.
  - The Hooks tab in Devin Local Customizations now lists configured hooks with their source and trigger events.
  - Added a command to migrate Windsurf hooks into Devin hooks across every workspace folder.
  - Added a subtle timeline navigator for Devin Local sessions.
  - Added Fast Context support in Devin Local sessions.
