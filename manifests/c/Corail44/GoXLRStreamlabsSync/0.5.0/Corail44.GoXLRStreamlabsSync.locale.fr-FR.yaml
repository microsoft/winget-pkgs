ShortDescription: Pilote tes sources audio Streamlabs Desktop avec les faders physiques de ton GoXLR.
Description: Synchronise en temps reel les faders et boutons mute du GoXLR avec les sources audio de Streamlabs Desktop, via l'API websocket du GoXLR Utility et l'API JSON-RPC de Streamlabs. Concu pour l'enregistrement multipiste, ou chaque canal GoXLR (micro, jeu, musique, chat, systeme) est capture comme source Streamlabs separee. Inclut un dashboard web local (niveaux en direct, reglages, journal), une icone de zone de notification, le demarrage avec Windows et la notification de mise a jour.
