ShortDescription: Control your Streamlabs Desktop audio sources with your GoXLR's physical faders.
Description: Syncs GoXLR faders and mute buttons to Streamlabs Desktop audio sources in real time, through the GoXLR Utility websocket API and the Streamlabs JSON-RPC API. Designed for multi-track recording setups where each GoXLR channel (mic, game, music, chat, system) is captured as a separate Streamlabs source. Ships with a local web dashboard (live levels, settings, logs), a system tray icon, autostart with Windows and update notifications.
