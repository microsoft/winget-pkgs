ShortDescription: 基于大模型的文档校对、格式调整与降低 AI 率软件
Description: |-
  AutoDocxProofread（智能校对）是一款专为长文档校对和论文格式优化而设计的桌面应用程序。它能够帮助用户有效检测 Word 文档中的错别字、标点符号错误、语法问题和文本一致性问题，并提供修改建议。此外还支持文字润色以降低 ai 检出率。并且还能进行跨文档格式克隆，一键修改全文格式。
  针对大模型在处理长文档时存在的遗忘和幻觉问题，软件设计了专门的架构来增强校对的准确性，并能一键导出校对修改后的文档。并且软件采用了并行处理架构，显著提升大模型处理长文档的速度。此外还引入了本地知识库功能，支持 RAG 功能给模型校对参考。
  针对降低 AI 率功能，软件采用分段并行操作形式，根据自然段对文档划分，然后调用大模型并行处理。

  核心优势
  为什么需要使用这个软件？
  1. 相比使用 Claude Code 调用 skill 来对文档校对、降低 AI 率和格式调整，这个软件可视化效果好，可以直观检视生成效果，并且速度更快，更省 token。
  2. 相比使用 ChatGPT、豆包等网页 AI 应用，这个项目提供一键执行的工作流，操作便捷，省去了和大模型反复交流的精力，并且操作更快。
  3. 相比于 MS Office 和 WPS 等软件自带的校对系统，这个项目校对更加智能，对错误识别的种类更多样。
  4. 格式调整无需用大模型，速度更快。
