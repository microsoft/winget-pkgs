Description: The Webex App VDI plugin extends the Cisco collaboration experience to virtual deployments so that users can use the full messaging, meeting, and calling functionality that the Webex App provides. To reduce latency and to enhance media quality, the VDI plugin optimizes the media workflows by streaming media directly between users on thin client endpoints and leverages the hardware of the thin client machines to handle media processing. This media path does not go through the hosted virtual desktops (HVDs). The result is a stable and full-featured calling and meeting experience for your VDI users.
