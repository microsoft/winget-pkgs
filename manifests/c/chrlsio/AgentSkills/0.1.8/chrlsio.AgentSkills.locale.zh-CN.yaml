ShortDescription: 跨平台桌面应用，用于管理 AI 代理技能。通过统一界面浏览、安装、同步和编辑 16 个代理的技能。
Description: |-
  跨平台桌面应用，用于管理 AI 代理技能。
  通过统一界面浏览、安装、同步和编辑 16 个代理的技能。

  支持的 AI 工具
  - Claude Code
  - Cursor
  - Codex
  - Gemini CLI
  - GitHub Copilot CLI
  - Kiro
  - OpenCode
  - Antigravity
  - CodeBuddy
  - OpenClaw
  - Trae
  - Windsurf
  - Cline
  - Factory
  - Warp
  - Qoder
  功能
  - 仪表盘 — 查看已安装的代理及每个代理的技能数量
  - 技能管理 — 查看、编辑、卸载技能，跨代理同步
  - 市场 — 从 skills.sh 和 ClawHub 浏览并安装技能
  - 技能编辑器 — 在应用内直接编辑 SKILL.md 文件
  - 文件监听 — 磁盘上技能变化时自动刷新
  - 跨代理同步 — 一键将技能从一个代理同步到所有其他代理
