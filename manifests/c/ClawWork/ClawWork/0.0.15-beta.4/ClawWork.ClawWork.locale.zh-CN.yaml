PackageIdentifier: ClawWork.ClawWork
PackageVersion: 0.0.15-beta.4
PackageLocale: zh-CN
ShortDescription: 将 ClawWork 连接至您自己的 OpenClaw，解锁 10 倍多会话生产力。
Description: |-
  OpenClaw 的桌面工作区。
  支持并行任务、实时可见的工具活动，以及日后轻松查找的文件。

  为何选择 ClawWork
  通过 Telegram、Slack 或普通聊天界面使用 OpenClaw，处理简单任务尚可。但一旦工作变得复杂，体验就会大打折扣。
  状态信息淹没在消息流中；运行多个任务时，不得不在多个标签页间切换，努力回忆哪个会话使用了哪个模型；文件出现在回复中，随后又消失在历史记录里。
  ClawWork 通过将每个任务视为独立的工作区来解决这一问题。您将获得一个桌面界面：任务彼此隔离，工具活动在执行过程中清晰可见，输出文件始终与生成它们的工作关联在一起。

  为何体验更佳
  - 每个任务在独立的 OpenClaw 会话中运行，让您能在并行作业间自由切换而不会混淆上下文。
  - 流式回复、工具调用卡片、进度信息和产出物集中呈现，不再埋没于聊天记录中。
  - 网关、智能体、模型及思维设置均按任务单独配置。
  - 智能体生成的文件保存至本地工作区，便于后续浏览。
  - 高风险的执行操作可在运行前暂停并等待批准。
