ReleaseNotes: |-
  ✨ What's New
  - ⏰ Cron task management UI (beta) — Full scheduling panel to create, edit, toggle, run, and monitor recurring agent tasks. Includes cron expression presets (every 5 min, hourly, daily, weekdays, weekly), human-readable previews via cronstrue, interval unit selector, advanced options (model, thinking, delivery, failure alerts), per-job run history with expandable summaries, and a scheduler status indicator. Accessible from the left nav with a beta badge. by @samzong in #161
  - 🔔 Native OS notifications — Get notified via Electron Notification API when tasks complete, approvals are requested, or gateways disconnect — even when ClawWork is minimized or unfocused. Three independent toggles in Settings → General, all enabled by default. by @samzong in #157
  - 📂 Live context folder file watching — Context folders now auto-refresh when files change on disk via fs.watch with 500ms debounce (max 10 watchers per task). Live file count badges appear on context folder pills. Includes race-condition guards and cleanup on task switch/unmount. by @samzong in #156
  - 🏷️ Server version badge in Gateway settings — Each gateway now displays its OpenClaw server version extracted from the WebSocket hello-ok handshake payload. by @samzong in #159
  🐛 Bug Fixes
  - Fixed titlebar drag — removed global fixed z-50 overlay from App.tsx; each panel header now owns its own drag region via titlebar-drag class, eliminating recurring z-index conflicts by @samzong in #161
  - Fixed cron deleteAfterRun — explicitly send false to prevent server from defaulting one-shot jobs to auto-delete by @samzong in #161
  - Fixed cron "All" filter — send enabled: 'all' explicitly to server instead of undefined (server defaults to enabled-only) by @samzong in #161
  - Fixed cron session identity — cron jobs now use store-key format (agent:main:clawwork:<deviceId>:task:<uuid>) and register a local task on creation, so cron-created conversations appear in the task list by @samzong in #161
  🔧 Engineering
  - Simplified notification code — extracted maybeNotify() helper, unified navigateToTask callback, merged three useState booleans into single state object, data-driven notification toggle UI by @samzong in #158
  - Removed buildSessionRequestKey and request-key regex infrastructure from @clawwork/shared — store-key format is now used consistently by @samzong in #161
  - Added Switch UI component (Radix UI) and cronstrue dependency for cron expression rendering by @samzong in #161
  - Added 192 lines of shared Cron types (CronSchedule, CronPayload, CronJob, etc.) and 7 Gateway cron.* RPC methods by @samzong in #161
  📖 Docs
  - Added keynote slides workspace with Slidev by @samzong in #160
  - Updated README, architecture diagrams, website, and keynote slides by @samzong in #162
  - Added Thanks slide and deployed keynote to GitHub Pages by @samzong in #163
