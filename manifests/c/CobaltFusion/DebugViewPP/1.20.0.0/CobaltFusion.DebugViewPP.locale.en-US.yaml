ReleaseNotes: |-
  Debugview 1.20.0.0 [stable release for 2026]
  New features
  - initial support for for messages from UWP applications
  - capture kernel messages, verbose mode and pass-through mode.
  - new commandline argument /tab: to select a tab that get focus at startup
  Bug fixes
  - unicode (UTF-16) messages where messed up (depending on windows configuration)
  - every 5000th line was not visible in the view (fixed) since version 1.9.0.28
  Detailed changes
  - Fix typos in README.md by @justanotheranonymoususer in #397
  - Use a statically-linked runtime library by @m417z in #399
  - Update comments docs section link by @guspan-tanadi in #403
  - Add necessary permissions for packaged applications (fixes #365) by @m417z in #398
  - force wstringbuilder to return a wstring via WStr method by @saltybelajo in #408
  New Contributors
  - @m417z made their first contribution in #399
  - @guspan-tanadi made their first contribution in #403
  - @saltybelajo made their first contribution in #408
  Full Changelog: v1.9.0.28...v.1.20.0.0
