PackageIdentifier: Core.AXON
PackageVersion: 1.0.0
PackageLocale: en-US
Publisher: AXON Core Team
PublisherUrl: https://runaxon.xyz
PackageName: AXON
PackageUrl: https://runaxon.xyz
License: Proprietary
ShortDescription: Agentic AI terminal assistant for Windows with tools, skills, and a local control panel.
Description: |
  AXON is a local-first, agentic terminal assistant powered by OpenRouter.
  It ships with markdown skills, sub-agent delegation, multi-command chains,
  project memory, and a bundled Zenith web control panel.

  The installer adds axon.exe to your user PATH. Sign in at runaxon.xyz and
  configure your OpenRouter API key from the local /config panel.
Moniker: axon
Tags:
  - ai
  - terminal
  - agent
  - cli
  - automation
  - developer-tools
InstallationNotes: |
  After install, open a new terminal and run `axon`. Configure your OpenRouter
  API key at http://127.0.0.1:3000/config or sign in with `axon login`.
