PackageIdentifier: Core.AXON
PackageVersion: 1.0.0
PackageLocale: en-US
PackageName: AXON Terminal Assistant
Publisher: AXON Core Team
ShortDescription: Ultra-detailed AI agentic terminal companion with sub-agent architecture and multi-command pipelines.
Description: |
  AXON is a local-first, agentic terminal assistant powered by OpenRouter.
  It ships with markdown skills, sub-agent delegation, multi-command chains,
  project memory, and a 3-language documentation knowledge base (EN/RU/UA).

  This package installs a standalone axon.exe via Inno Setup and adds the
  install directory to your user PATH so you can run `axon` from any terminal.
