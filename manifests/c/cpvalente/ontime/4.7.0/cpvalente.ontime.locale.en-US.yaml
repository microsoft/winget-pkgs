  - chore: demo multiple parallel rundowns by @cpvalente in #2009
  - refactor: introduce codemirror for CSS editor by @cpvalente in #2039
  - chore: tooling by @alex-Arc in #2040
  - fix: prevent hide index column from leaking between cuesheet and editor by @cpvalente in #2041
  - refactor: add confirmation dialogs for destructive actions by @cpvalente in #2042
  - fix: start does not reflow when playback starts by @cpvalente in #2043
  - fix: resolve path to public assets in cloud by @cpvalente in #2044
