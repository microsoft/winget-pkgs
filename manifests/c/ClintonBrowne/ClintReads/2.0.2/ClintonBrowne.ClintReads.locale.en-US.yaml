ShortDescription: Free read-aloud screen reader for Windows - highlight text, press a hotkey, hear it in a natural offline neural voice.
Description: >-
  ClintReads is a free, lightweight read-aloud screen reader for Windows 10 and 11. Highlight
  text in any app - browser, PDF, Word, email, even code - press a hotkey, and it reads it aloud
  in a natural voice. The built-in Kokoro neural engine runs fully offline (about 8x faster than
  real-time on an NVIDIA GPU) and it also speaks through any installed Windows SAPI5 voice. A
  floating mini-player adds play/pause, 0.5x-3x speed, volume, live word highlighting and WAV
  export. It is clipboard-safe and lives in the system tray. Free, no account, no ads, nothing
  phones home.
