ReleaseNotes: |-
  ## This is the FOURTEENTH Release of Lamina ✦ !

  ### Release Notes:

  - Renamed Scripted Actions to Scripties.
  - Any Results in Scripties is now a POPUP.
  - Made Error Messages Red.
  - Changed the TextBoxes to NumberBoxes with an Adjuster.
  - Made the NumberBoxes 300px in width in Comparisn to 230 or 200 or ANYTHING.
  - Removed the Square Brackets [ ] in favour of Round Brackets ( ).
  - Added a Swap Button to Currency Converter and Unit Converter.
  - Using Shortened Units / Names in Currency Converter and Unit Converter.
  - Added a Copy Button in the Popups to quickly copy the value.
  - Removed 40+ .xaml files with their corresponding .xaml.cs by Making Every Option in the Dropdown a Part of its Frame. Say Rectangle's Area is now a Part of AreaPage not it's own XAML and C# Class with AreaPage.xaml acting as a Frame.
  - Revamped the Date Calculator to be FEATURE RICH.
  - Serious Improvements in Launch Times.
  - Fixed the Update Checker.
  - Removed the need of TMM.exe in Inno Setup.
  - Updated Copyright Date in MIT License.
  - Added Recurring Deposit.
  - Installer now supports both x64 and ARM64 ( Sorry because the Setup.exe is 172 MB NOW! )
