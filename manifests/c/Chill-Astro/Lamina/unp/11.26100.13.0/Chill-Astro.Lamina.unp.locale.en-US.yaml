ReleaseNotes: |-
  This is the THIRTEENTH Release of Lamina!
  Release Notes :
  - Changed Display Name from Lamina to Lamina ✦.
  - Moved Calculator's Logic to CalculatorViewModel.cs thus fixing incorrect results. So closes #3.
  - Brand New Onboarding Experience for New Users!
  - Brand new Icon Set for the Scripted Actions!
  2026-03-27.20-54-06.mp4
  - Revamped Settings Menu ( Inspired from FOSS Root Checkcer ).
  - Added Button for Showing MIT License.
  - Added an Update Check Button in Settings Page ( Strictly Opt -in ).
  - Made the Theme into a ComboBox instead of Radio Buttons.
  - Made the Backdrop Option a ComboBox instead of a dumb toggle.
  - Added Mica to Backdrop Settings.
  - Added option to disable Splash Screen ( Hooooray for people with 0 attention span! 💀💀💀💀 ).
  - Removal of Discount Calculator, Factorial Calculator, Approximation, Prime Number Checker and Right Triangle Checker.
  - Changed the Inno Setup Script to install the Msix after importing certificate.
  - Clubbed Simple Interest and Compound Interest under Finance Calculator.
  - Reduced Corner Radius of Calculator Buttons.
  - Slightly Larger Window.
  - Serious Bug Fixes.
  Install Lamina ✦ from Winget :
    winget install Lamina.unp
  Installation :
  1. Download the .msix and .cer files from here.
  2. Import the .cer file to the Trusted Root Certificates Store. ( First Run ONLY! )
     Alternatively use this Command after Downloading TMM.exe from Releases :
      .\tmm --i <Certificate>
  3. Install the .msix file.
  --------------------- OR ---------------------
  - Download the Setup.exe that does the Importing and Installation FOR YOU!
  Requirements :
  - Operating System: Windows 11.
  - For Building from Source:
    - Visual Studio with the WinUI and .NET development workloads.
    - .NET 10.0 SDK
    - Windows App SDK 26100.xxxx or Higher.
