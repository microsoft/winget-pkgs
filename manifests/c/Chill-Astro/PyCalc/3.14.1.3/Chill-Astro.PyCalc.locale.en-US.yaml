ReleaseNotes: |-
  This is the FOURTH Release of PyCalc!
  Changes :
  - New Name PyCalc ( Instead of PyCalc-GUI as the OG CLI PyCalc is DEAD ).
  - Brand New Logo.
  - Overhauled Rounder and Darker UI.
  - Removed the Nordic Theme and Removed Borders.
  - Update Check is no longer Automatically Done on Launch.
  - New About Page has been introduced!
  - Update Check has been moved to About and is called On Demand ONLY.
  image
  - Lazy Loading has now been implemented. ( Every Page doesn't Load At Once ).
  - Faster Loading TImes.
  - Removal of Discount Calculator, Factorial Calculator, Approximation, Prime Number Checker and Right Triangle Checker.
  - Centre Aligned every single Scripted Actions Page.
  - Added Keymaps back to the Calculator Buttons that were missing previously.
  - Replaced x^y with %.
  - Made the Window slightly Larger.
  - Removed the Ugly Seperator in Sidebar frame.
  - Added the Formula on Top of Every Scripted Actions Page.
  - New Version Naming System ( {Python Version}.{App Version} )
  - Deprecated MacOS version as HELL YEAH I AM NOT DOING IT!
  - Removed Redundant code for Switching to Light Theme on GNOME Desktop Environment.
  - Linux Theme Switching is now KDE ONLY ( Else specefic Settings that I try to get ).
  - MacOS Theme Switching has been removed.
  - Multiple Useless Lines of Code have been removed
  - Removed Gist Commit for Fetching an Always Up to Date Version.
  - Updated Version Checking Logic.
  - Will try to Upload as .deb and .rpm VERY SOON.
  - Various Bug Fixes.
  Installing PyCalc from Winget :
  winget install Chill-Astro.PyCalc
  Installing Dependencies ( For Python File ) :
   pip install -r Reqs.txt
  Running on Linux :
   ./PyC-Linux
  Preview :
  PyCalc Promo
