ShortDescription: 只需一条命令，即可解决发布者证书验证失败错误！
Description: |-
  Trust My Msix! 是一款简单的命令行应用，旨在通过几次按键即可将 .cer 文件导入 Windows 的“受信任的根证书颁发机构”存储区！这加快了 Windows 上自签名 Msix 包的证书导入过程，对非技术型用户非常有帮助。
  .msix 格式非常出色，留下的痕迹更少，且不需要点击一百次“是”。但只有当证书由证书颁发机构 (CA) 签名时，.msix 才被允许安装，而从 CA 获取证书需要花钱 💵。
  通常情况下，用户必须经历自签名证书的导入过程，这非常繁琐且令人困惑，尤其是对于新手而言。这款工具让该过程仅需 1 秒钟即可完成！
