ReleaseNotes: |-
  This is the THIRD Release of Trust My Msix!
  Changes :
  - New Name Trust My Msix! ( Instead of the Boring MsixCertImportTool ).
  - Better CLI Usage with Arguments.
  - Better CLI Experience with Emojis.
  - Faster Performance and More Reliable thanks to certutil
  - Various Bug Fixes.
  - Humanization of Code by Shedding of AI Generated Code.
  - New Version Naming System ( {Python Version}.{App Version} )
  Installing Trust-My-Msix! from Winget :
  winget install Chill-Astro.TMM
  Installing Dependencies ( For Python File ) :
   pip install requests
  Usage :
  - Trust My Msix! can be easily used by just running the Portable .exe
  - Trust My Msix!'s entire CLI can be bypassed by using the argument '--i' :
    tmm --i <path>
    # python tmm.py --i <path> if using Python File.
  - Help, Version and Update Check can be accessed as follows :
    tmm --h
    # python tmm.py --h if using Python File.
    tmm --v
    # python tmm.py --v if using Python File.
    tmm --uc
    # python tmm.py --uc if using Python File.
  Preview :
  image
