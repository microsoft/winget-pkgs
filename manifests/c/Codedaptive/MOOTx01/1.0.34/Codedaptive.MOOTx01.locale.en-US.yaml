ShortDescription: A persistent, private, on-device memory for your AI clients.
Description: MOOTx01 gives your AI tools a persistent memory that lives on your own machine. It runs as a local background service and connects to AI clients (Claude, Cursor, and others) over the Model Context Protocol, so your assistants can capture, recall, and reason over what you have told them across sessions. All estate data stays local under %LOCALAPPDATA%\MOOTx01; nothing is sent to a cloud.
