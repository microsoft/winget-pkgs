InstallationNotes: |
  To enable PowerShell tab-completion, register the completions from your
  PowerShell profile ($PROFILE). The first command ensures the profile's
  parent directory exists (Add-Content creates the file but not the folder);
  the second appends the registration line:

    New-Item -ItemType Directory -Path (Split-Path $PROFILE) -Force | Out-Null
    Add-Content -Path $PROFILE -Value 'circleci completion powershell | Out-String | Invoke-Expression'
