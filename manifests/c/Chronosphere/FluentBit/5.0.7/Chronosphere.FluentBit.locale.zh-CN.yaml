ShortDescription: 快速且轻量级的日志、指标和追踪处理器
Description: |-
  Fluent Bit 是一款开源的遥测代理工具，用于处理日志、指标、追踪和分析。它旨在高效应对在从受限系统到复杂云基础设施的各类环境中搜集和处理遥测数据的挑战。管理来自不同来源和格式的遥测数据往往是一项持续的挑战，尤其是在性能作为关键因素时。
  Fluent Bit 并非旨在作为替代方案，而是为了增强您基础设施的遥测策略。它能够适配并优化您现有的日志层，并增加对指标和追踪处理的支持。Fluent Bit 支持厂商中立的方案，具备原生的 OpenTelemetry (OTLP) 摄取与分发能力，并能与 Prometheus 等生态系统无缝集成。Fluent Bit 能够有效管理多样化的数据源和格式，并保持极高的性能与极低的资源消耗，因此深受各大云服务商、银行以及需要即插即用型遥测代理的企业的青睐。
  Fluent Bit 既可以作为边缘代理部署，用于本地化的遥测数据处理，也可以作为中央聚合器/收集器，用于管理跨多个数据源和环境的遥测数据。
