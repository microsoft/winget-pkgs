ShortDescription: Local security agent for law firms
Description: |-
  LexAI Agent is a locally running agent that protects client data in law firms.
  All client data is stored in an encrypted database (AES-256, SQLCipher) on your
  machine. AI analysis uses only anonymized text — personal names, SSNs, and other
  identifiers are replaced with placeholders like [PERSON-1] before anything is sent
  to the server.

  No installation required — download and run.
