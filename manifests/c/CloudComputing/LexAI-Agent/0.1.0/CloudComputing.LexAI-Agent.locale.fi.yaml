Description: |-
  LexAI Agent on paikallisesti toimiva agentti joka suojaa asiakastiedot asianajotoimistossa.
  Agentti tallentaa kaikki asiakastiedot salattuun tietokantaan (AES-256, SQLCipher) omalla
  koneellasi. AI-analyysi tapahtuu vain anonymisoidulla tekstillä — henkilönimet, henkilötunnukset
  ja muut tunnistetiedot korvataan tunnisteilla kuten [HENKILÖ-1] ennen kuin mitään lähetetään
  palvelimelle.

  Ei vaadi asennusta — lataa ja käynnistä.
