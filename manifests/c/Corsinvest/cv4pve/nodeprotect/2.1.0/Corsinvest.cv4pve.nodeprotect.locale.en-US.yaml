ShortDescription: Backup tool for Proxmox VE node configuration via SSH
Description: |-
  cv4pve-node-protect backs up Proxmox VE node configuration files over SSH.
  It connects to one or more nodes, archives the paths you choose into a tar.gz per node,
  organises the archives into timestamped folders and applies a retention policy automatically.

  Features:
  - Multi-node backup in a single run
  - Selectable backup paths
  - Configurable retention policy
  - SSH key or password authentication (with password-from-file support)
  - Custom SSH port per host
  - No agents installed on the nodes — only SSH access required
