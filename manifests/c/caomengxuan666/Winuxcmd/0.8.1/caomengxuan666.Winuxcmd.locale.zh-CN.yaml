ShortDescription: 为 Windows 带来 Linux 命令 × 跨平台管道
Description: |-
  WinuxCmd 的开发只有一个实用目标：让常用 Linux 命令工作流在 Windows 终端上自然运行。
  - 原生 Windows 可执行文件（winuxcmd.exe），无需 WSL
  - 提供 Linux 风格的命令与选项（ls、grep、sed、ps、lsof 等）
  - 启动速度快，资源占用小
  - 可良好适配 AI 生成的 shell 命令
  - 支持 Windows 与 Linux 风格命令之间的跨工具管道
