Description: |-
  Cryptographic Triangles (TRI) is a privacy-focused cryptocurrency wallet featuring Proof-of-Stake consensus with 33% annual staking rewards, Tor v3 onion routing, and built-in encrypted peer-to-peer messaging.
  
  Key Features:
  - Hybrid PoW/PoS consensus (scrypt + X17 algorithms)
  - 33% annual staking rewards for active wallets
  - Tor v3 onion routing for enhanced privacy
  - Encrypted peer-to-peer messaging built into the wallet
  - IRC peer discovery with fallback to DNS seeders
  - Low supply: 1 TRI per block
