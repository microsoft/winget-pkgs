ReleaseNotes: |-
  > [!IMPORTANT]
  >
  > On Linux, usbmuxd must be installed on your system. Don't worry though, it comes with most popular
  > distributions by default already! However, due to some distributions udev rules usbmuxd may stop
  > running after no devices are connected causing Impactor to not detect the device after plugging it
  > in. You can mitigate this by plugging your phone first then restarting the app.
  >
  > Auto-refresh will not work the same on Linux as it would on other platforms like macOS/Windows, due
  > to usbmuxd lacking WiFi connectivity so it will attempt to do it automatically only when a device is
  > plugged in, we are looking for a proper solution though.
  >
  > On Windows, iTunes must be downloaded so Impactor is able to use the drivers for interacting with
  > Apple devices.

  > [!NOTE]
  >
  > Pairing file installation is only available for devices plugged in via USB.

  > [!TIP]
  >
  > `chmod +x /path/to/AppImage` after downloading may be required for Linux.

  > This project is still very new! Expect bugs to occur :)

