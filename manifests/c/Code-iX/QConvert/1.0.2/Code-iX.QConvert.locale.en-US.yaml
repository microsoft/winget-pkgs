ShortDescription: Fast image conversion and editing from Windows Explorer.
Description: QConvert is a Windows desktop tool for fast image conversion and editing directly from Explorer. It adds configurable per-user context menu actions for converting formats, resizing, cropping, compressing JPG files, optimizing PNG files, removing metadata, creating favicon bundles, exporting square avatars, and saving clipboard images as JPG or PNG. QConvert keeps the original files untouched and writes converted copies next to the source.
