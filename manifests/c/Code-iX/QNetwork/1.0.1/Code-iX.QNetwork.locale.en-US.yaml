ShortDescription: Live per-process network traffic monitor.
Description: QNetwork is a Windows desktop tool for live per-process network traffic monitoring using ETW. It shows active process totals, in/out rates, session totals, peaks, and active connections, plus a 60-second traffic history chart with process-level grouping and filtering. It also supports CSV export, tray minimization, adapter filtering, and alert thresholds. Per-process collection uses ETW kernel tracing and requires administrator rights.
