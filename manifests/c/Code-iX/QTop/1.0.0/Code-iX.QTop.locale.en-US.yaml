ShortDescription: Elevated Windows process manager.
Description: QTop is a Windows desktop process manager focused on quick triage. It shows all processes as an expandable parent/child tree with icons, CPU %, CPU time, memory, and instance counts, and categorizes them into Apps, Background, Services, and Windows/System with filter pills showing live match counts and total CPU %. It supports fast search across process name, PID, executable path, and service names, a detail panel with command line, user/session, integrity level and version metadata, and a safe kill flow with graceful close for apps, force kill with process tree, and PID-reuse protection. The app requires administrator rights when launched.
Moniker: qtop
