- taskmgr
ReleaseNotes: |-
  Initial release of QTop.
  Highlights
  - Expandable parent/child process tree with icons and per-process details.
  - Category filter pills (Apps, Background, Services, Windows/System, Unknown) with live match counts and total CPU %.
  - Per-process CPU % sampling, memory, threads, handles, integrity level, command line, and hosted services.
  - Fast search across process name, PID, executable path, and service names.
  - Safe kill flow: graceful close for apps first, force kill with process tree, PID-reuse protection, optional confirmation.
  Packaging
  - Self-contained win-x64 MSI installer, machine-wide, with Start menu shortcut.
