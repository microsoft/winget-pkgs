ShortDescription: Windows-native screen / application / region recorder with an NVIDIA NVENC pipeline, multi-track audio, and diagnostics.
Description: ExoSnap is a Windows-native screen / application / region recorder built around a high-performance NVIDIA NVENC pipeline, flexible container/codec profiles, multi-track audio routing, a webcam overlay, and built-in diagnostics. It captures an application window, a monitor, or a screen region at CFR 60 fps, records to MKV, WebM, or MP4, and blocks invalid recordings before start. ExoSnap 0.7.0 adds HEVC video (NVENC) in MKV and MP4 (hvc1), 10-bit P010 output for HEVC Main10 and AV1 (SDR), BT.709 color metadata with a selectable Full/Limited color range, a modal recording-error dialog, and a full v10 design pass across the app. Requires an NVIDIA GPU with supported NVENC.
