ReleaseNotes: |-
  cdxgen v12.3.0
  Full changelog: v12.2.1...v12.3.0
  v12.3.0 is a big release for cdxgen. It expands the project beyond BOM generation with new capabilities for upstream dependency risk prioritisation, SPDX conversion/export, runtime and container risk analysis, and broader ecosystem/source intelligence.
  Highlights
  New: cdx-audit
  > Let's try to predict your supply-chain attacks before they happen!
  v12.3.0 introduces cdx-audit, a new command for upstream supply-chain risk prioritisation for CycloneDX BOMs.
  cdx-audit can:
  - analyse a single BOM or a directory of BOMs with advanced heuristics to explain your supply-chain risks
  - support severity-based gating for CI and review workflows
  - ATT&CK-aware audit and workflow analysis
  This helps teams answer a practical question quickly:
  > Which dependencies in your supply-chain is likely to be attacked and why?
  SPDX support for the first time
  cdxgen now supports SPDX output format!
  - new cdx-convert command to convert from CycloneDX 1.6/1.7 to SPDX
  - SPDX is also supported in server mode
  New container and runtime risk intelligence
  This release expands BOM audit and OBOM analysis with:
  - GTFOBins-backed container risk analysis
  - expanded OBOM runtime rules
  - improved Windows LOLBAS / ATT&CK triage context
  - stronger SOC / IR / compliance guidance
  Broader ecosystem and source intelligence
  v12.3.0 also improves real-world package and source coverage with:
  - PEP 751 pylock.toml support
  - purl source resolution for GitHub, Bitbucket, Maven, and Composer
  - improved JAR manifest heuristics for Maven group/name detection
  - better handling for CocoaPods Podfile.lock
  - correct npm classification for devOptional dependencies
  Chrome extension scanning
  This release adds support for:
  - direct Chrome extension path scanning with -t chrome-extension
  - extension security property extraction
  - dedicated extension BOM audit rules
  Release engineering and docs
  - Expand standalone binary build/publish support
  - Improve docs across CLI, audit, REPL, EVINSE, SPDX, and OBOM workflows
  - Migrate build images to GitHub-hosted infrastructure and split runners for image builds
  🔍 Selected pull requests
  - #3944 Adds cdx-audit command
  - #3946 cdx-audit with ATT&CK support
  - #3947 Add GTFOBins-backed container risk analyser and BOM audit rules
  - #3939 Expand SPDX export to preserve advanced CycloneDX semantics and add /sbom SPDX format support
  - #3943 Bundle the official SPDX 3.0.1 schema and align export validation/output
  - #3940 Add PEP 751 pylock.toml support
  - #3937 Add purl source resolution for GitHub, Bitbucket, Maven, and Composer
  - #3931 Add direct Chrome extension path scanning and extension BOM audit rules
  - #3932 Strengthen OBOM analyst experience and runtime audit rules
  - #3936 Improve JAR manifest heuristics for Maven group/name detection
  - #3934 Handle Podfile.lock checks in CocoaPods scan without false missing-lock failures
  - #3928 Mark npm package-lock devOptional dependencies correctly
  - #3929 Update uuid to 14.0.0 to address a CVE
  - #3930 Align VS Code extension purlType in OS query configs
  🙌 Thank you
  Thanks to everyone who contributed code, review, tests, docs, and ideas across this release range.
