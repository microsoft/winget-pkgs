ReleaseNotes: |-
  This release focuses on Node.js dependency accuracy, server-side submission hardening, and CI/build maintenance.
  lang:node
  #3920 added WASM and WASI detection in the JS analyzer with test coverage updates.
  #3924 fixed npm component deduplication to preserve lockfile hashes when combining minified JS and package-lock inputs.
  #3925 now sets cdx:npm:package:development=true for npm devDependencies, improving metadata fidelity for policy and filtering workflows.
  server and submission integration
  #3922 enhanced Dependency-Track BOM submit flow with configurable autoCreate and isLatest, plus strict parent mode validation across CLI and server paths.
  #3918 hardened gitClone handling against malicious hook execution scenarios in server contexts.
  build and release tooling
  #3919 removed dependency on table, reducing runtime dependency surface and simplifying display/reporting internals.
  #3911 updated CycloneDX spec version references across release-relevant configs and entry points (package.json, deno.json, pyproject.toml, bin/cdxgen.js, lib/cli/index.js).
  compliance and compatibility
  #3926 normalized object-form license data to CycloneDX-compliant fields in getLicenses.
  Full Changelog: v12.2.0...v12.2.1
