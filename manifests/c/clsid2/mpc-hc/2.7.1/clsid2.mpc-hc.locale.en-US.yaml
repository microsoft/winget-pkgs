ShortDescription: MPC-HC is an extremely light-weight, open source media player for Windows. It supports all common video and audio file formats available for playback.
Description: Media Player Classic - Home Cinema (MPC-HC) is a free and open-source video and audio player for Windows. It is famous and loved for its simple and effective user interface, providing an excellent user experience. It offers a huge amount of functionality. Being a DirectShow player, it also allows flexibility and extensibility through third party filters.
