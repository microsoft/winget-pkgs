ReleaseNotes: |-
  Summary of Changes
  Minor Changes:
  - cilium-cli: bump minimum Cilium version to v1.16 (cilium/cilium#46803, @julianwiedmann)
  - cilium-dbg: add table-json format to bgp/peers and bgp/routes (cilium/cilium#45858, @martonra)
  - gatewayapi: add listenersets to sysdump (cilium/cilium#46851, @asauber)
  CI Changes:
  - cilium-cli/connectivity: explain conn-disrupt restart on failure (cilium/cilium#46854, @aanm)
  - cilium-cli/connectivity: retry curl in echo-ingress-l7-named-port (cilium/cilium#46855, @aanm)
  - cilium-cli/connectivity: wait for realized policy revision per endpoint (cilium/cilium#46877, @aanm)
  - cilium-cli/connectivity: write JUnit report atomically (cilium/cilium#46835, @aanm)
  - cilium-cli: fix EGW perf node selection, and raise scale-egw masq thresholds (cilium/cilium#46866, @aanm)
  - cilium/json-mock is updated to v1.4.1 to resolve ci test flakes. (cilium/cilium#47058, @jrajahalme)
  - Improved cilium-cli connectivity test resilience to transient service synchronization delays and pod-exec transport errors. (cilium/cilium#46859, @aanm)
  Misc Changes:
  - Add support for hybrid routing mode (routing-mode: hybrid), allowing Cilium to dynamically choose between native routing and tunnel encapsulation based on subnet topology. Traffic between pods in directly connected subnets is routed natively for improved throughput, while cross-subnet traffic is tunneled. (cilium/cilium#45001, @vanessachammas)
