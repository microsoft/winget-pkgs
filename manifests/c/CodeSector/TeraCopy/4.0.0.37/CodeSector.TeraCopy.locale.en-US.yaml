ReleaseNotes: |-
  New Features
  - New multi-threaded copy engine.
  - Enhanced speed graph.
  - New multi-threaded copy engine.
  - Support for copying to multiple targets.
  - Queue system for managing multiple copy operations.
  - Support for receiving files via the LocalSend protocol.

  Enhancements
  - Improved database operations.

  Fixed Bugs
  - Removed the confirmation prompt when merging folders during a move operation.
  - When moving a folder within the same drive, it no longer retries the folder in the second pass.
  - Fixed rare crashes that could occur during concurrent file operations.
  - Fixed issues when copying or moving files to a large number of destinations.
  - Fixed a crash when a LocalSend transfer was cancelled before being accepted.
  - Minor UI fixes.
