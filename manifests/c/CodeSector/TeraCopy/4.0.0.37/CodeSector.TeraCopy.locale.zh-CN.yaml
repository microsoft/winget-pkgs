ShortDescription: 更快、更安全地复制文件。
Description: TeraCopy 是一款旨在更快、更安全地复制文件的实用程序。它能验证复制的文件，确保它们完全相同；它能在复制过程中跳过错误文件，而不是终止整个传输过程；并与 Windows 资源管理器无缝集成。
