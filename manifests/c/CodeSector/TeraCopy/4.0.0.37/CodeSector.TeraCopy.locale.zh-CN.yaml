ReleaseNotes: |-
  - 全新多线程复制引擎。
  - 支持同时复制到多个目标。
  - 队列系统，用于管理多个复制操作。
  - 支持通过 LocalSend 协议接收文件。
  - 在现代 Windows 资源管理器右键菜单中添加 TeraCopy 入口。
  - 标题栏内置工具栏。
  - 增强的速度图表。
  - 移动操作合并文件夹时，不再弹出确认提示。
  - 在同一驱动器内移动文件夹时，第二轮不再重试该文件夹。
  - 修复了并发文件操作时可能发生的偶发崩溃。
  - 修复了将文件复制或移动到大量目标时出现的问题。
  - 修复了在接受前取消 LocalSend 传输时发生崩溃的问题。
  - 改进了数据库操作。
  - 修复了若干界面细节问题。
