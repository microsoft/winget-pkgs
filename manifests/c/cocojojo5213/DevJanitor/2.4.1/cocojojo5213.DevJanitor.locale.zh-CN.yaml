ReleaseNotes: |-
  Release Patch | 发布补丁
  - Remove the unused custom AI endpoint setting and stale persisted store fields so Settings only exposes working preferences. 移除未实际接入的自定义 AI 端点设置和旧的持久化 store 字段，让设置页只保留可用偏好项。
  - Route Chat History through the shared typed IPC helpers instead of direct invoke calls, keeping command error handling consistent with other views. 将聊天记录页面切换到统一 typed IPC 封装，不再直接调用 invoke，让命令错误处理与其它页面保持一致。
  - Add Cline CLI support across AI CLI detection, lifecycle commands, service monitoring, chat-history cleanup, AI junk cleanup, and security scanning. 新增 Cline CLI 支持，覆盖 AI CLI 检测、生命周期命令、服务监控、聊天记录清理、AI 垃圾清理和安全扫描。
  - Update Amp lifecycle commands to the current direct installer and @ampcode/cli npm package, replacing the old @sourcegraph/amp package name. 将 Amp 生命周期命令更新为当前直装脚本和 @ampcode/cli npm 包名，替换旧的 @sourcegraph/amp 包名。
  - Set the app, bundle, crate, and localized display versions to v2.4.1 for this patch release. 将应用、安装包、Rust crate 和本地化显示版本同步为本次补丁发布的 v2.4.1。
