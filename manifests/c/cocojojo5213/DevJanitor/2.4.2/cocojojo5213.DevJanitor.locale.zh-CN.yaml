ReleaseNotes: |-
  AI Tool Coverage & Scan Hardening | AI 工具覆盖与扫描加固
  - Add Goose CLI, OpenHands CLI, Auggie CLI, Kilo Code CLI, and Junie CLI support across AI CLI detection, lifecycle commands, service categorization, config discovery, security scanning, and localized tool names. 新增 Goose CLI、OpenHands CLI、Auggie CLI、Kilo Code CLI 和 Junie CLI 支持，覆盖 AI CLI 检测、生命周期命令、服务分类、配置发现、安全扫描和本地化工具名称。
  - Add Goose/OpenHands history cleanup targets and GitHub Copilot CLI session cleanup targets while keeping active project customization/config files out of deletable cleanup and chat-history results. 新增 Goose/OpenHands 历史清理目标和 GitHub Copilot CLI 会话清理目标，同时避免将仍在使用的项目定制/配置文件识别为可删除清理项或聊天记录。
  - Narrow GitHub Copilot cleanup from the broad .copilot directory to official CLI session paths: .copilot/session-state and .copilot/session-store.db. 将 GitHub Copilot 清理范围从宽泛的 .copilot 目录收窄到官方 CLI 会话路径：.copilot/session-state 和 .copilot/session-store.db。
  - Stream AI cleanup scans instead of collecting every filesystem entry up front, prune whitelisted or already-matched directories, and report matched junk directories once without descendant duplicates. AI 清理扫描改为流式遍历，不再预先收集全部文件系统条目；对白名单目录和已命中目录进行剪枝，并只报告一次命中的垃圾目录，避免重复列出其子项。
  - Prune dependency/build directories during chat-history project discovery and per-project scans, while extending project scan depth enough to catch nested Goose history/log locations. 聊天记录项目发现和项目内扫描会剪枝依赖/构建目录，同时扩展项目内扫描深度以覆盖嵌套 Goose 历史和日志路径。
  - Set the app, bundle, crate, and localized display versions to v2.4.2 for this patch release. 将应用、安装包、Rust crate 和本地化显示版本同步为本次补丁发布的 v2.4.2。
