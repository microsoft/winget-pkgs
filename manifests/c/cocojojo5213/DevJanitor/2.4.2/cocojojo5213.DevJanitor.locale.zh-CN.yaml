Description: |-
  管理开发工具、AI 编程助手和依赖包的跨平台桌面应用
  🔍 工具检测：自动检测 39+ 开发工具（Node.js、Python、Docker、Git 等）
  🤖 AI CLI 管理：一键安装/更新/卸载 Codex、Claude Code、Gemini CLI、OpenCode、iFlow
