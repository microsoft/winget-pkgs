ReleaseNotes: |-
  AI CLI Refresh | AI CLI 刷新
  - Refresh the AI CLI matrix with current package names and lifecycle commands for Codex, Claude Code, Sourcegraph Cody, GitHub Copilot CLI, Qwen Code, Amp, Crush, and Amazon Q Developer CLI. 刷新 AI CLI 矩阵，更新 Codex、Claude Code、Sourcegraph Cody、GitHub Copilot CLI、Qwen Code、Amp、Crush、Amazon Q Developer CLI 的包名与生命周期命令。
  - Extend tool detection, service categorization, config discovery, chat-history cleanup, and AI junk cleanup to cover the new CLI tools while keeping active project config directories out of deletable junk results. 扩展工具检测、服务分类、配置发现、聊天记录清理和 AI 垃圾清理，覆盖新增 CLI 工具，同时继续避免把仍在使用的项目配置目录当成可删除垃圾。
  - Align AI security scan rule IDs with the AI CLI IDs and add conservative checks for plaintext provider keys, GitHub tokens, AWS credentials, and exposed local helper ports. 将 AI 安全扫描规则 ID 与 AI CLI ID 对齐，并新增针对明文提供商密钥、GitHub token、AWS 凭证和本地辅助端口暴露的保守检查。
  - Add pnpm and Yarn global package manager support, restore bounded npm outdated checks, and update the project toolchain/dependencies to pnpm 11.5, Rust 1.95, Tauri 2.11, Vite 8, TypeScript 6, React 19.2, and i18next 26. 新增 pnpm 与 Yarn 全局包管理支持，恢复有超时保护的 npm outdated 检查，并将项目工具链和依赖更新到 pnpm 11.5、Rust 1.95、Tauri 2.11、Vite 8、TypeScript 6、React 19.2 和 i18next 26。
  - Set the app, bundle, crate, and localized display versions to v2.4.0 for this release. 将应用、安装包、Rust crate 和本地化显示版本同步为本次发布的 v2.4.0。
