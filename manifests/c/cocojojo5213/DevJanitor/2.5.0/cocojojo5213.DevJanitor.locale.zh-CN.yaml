ReleaseNotes: |-
  AI CLI Ecosystem | AI CLI 生态
  - Refresh the AI CLI matrix against current official sources, adding Factory Droid, Mistral Vibe, Qoder CLI, and Pi Coding Agent while correcting Claude, OpenCode, Cody, and Amazon Q lifecycle guidance. 按当前官方资料刷新 AI CLI 矩阵，新增 Factory Droid、Mistral Vibe、Qoder CLI 和 Pi Coding Agent，并修正 Claude、OpenCode、Cody 与 Amazon Q 的生命周期指引。
  - Mark legacy Amazon Q installations and provide a direct Kiro migration path instead of presenting obsolete install and uninstall actions as current support. 标记旧版 Amazon Q 安装，并提供直接迁移到 Kiro 的路径，不再把过时的安装和卸载动作当作当前支持。
  - Add a maintained AI CLI catalog with local metadata drift checks and a weekly official documentation/registry audit. 增加可维护的 AI CLI 目录、本地元数据漂移检查，以及每周官方文档和 registry 审计。
  Runtime Responsiveness | 运行时响应
  - Move filesystem scans, process queries, package operations, security checks, and CLI lifecycle actions to Tauri blocking workers so the UI thread stays responsive. 将文件扫描、进程查询、包管理、安全检查和 CLI 生命周期动作移到 Tauri blocking worker，保持界面线程响应。
  - Probe AI CLI installations in parallel and avoid rescanning every tool before a single install, update, or uninstall action. 并行探测 AI CLI 安装状态，并避免在单个安装、更新或卸载动作前重复扫描全部工具。
  Dependencies & Hygiene | 依赖与整理
  - Update the Node, pnpm, Rust, Tauri, Vite, TypeScript, and related dependency baselines, and remove unused template assets and Radix packages. 更新 Node、pnpm、Rust、Tauri、Vite、TypeScript 及相关依赖基线，并删除未使用的模板资源和 Radix 包。
  Updates & Delivery | 更新与交付
  - Show the installed app version in Settings and the sidebar, add manual update checks with clear status and download progress, and automatically relaunch after a signed update is installed. 在设置页和侧栏显示已安装版本，新增带状态与下载进度的手动更新检查，并在签名更新安装完成后自动重新启动应用。
  - Keep automatic startup update checks while adding retryable error handling and an install action that remains available after dismissing the initial prompt. 保留启动时自动检查更新，同时增加可重试的错误处理，并让用户关闭首次提示后仍可从设置页安装更新。
  Build & Test Performance | 构建与测试性能
  - Separate the Tauri desktop shell behind the default desktop Cargo feature, allowing core unit tests to skip Tauri, GTK, and WebKit compilation without changing normal app builds. 将 Tauri 桌面壳层放到默认启用的 desktop Cargo feature 后，使核心单元测试无需编译 Tauri、GTK 和 WebKit，同时保持普通应用构建行为不变。
  - Add the fast pnpm test entry point, replace per-commit release builds with platform compile checks, remove redundant checks, and cache Rust CI and release builds per target. 新增快速 pnpm test 入口，以跨平台编译检查替代每次提交时的 release 构建，移除重复检查，并按目标平台缓存 Rust CI 与发布构建。
  - Use a parallel-friendly release profile without cross-crate LTO, prioritizing GitHub build time over a small installer-size reduction. 使用适合并行编译的 release profile，关闭跨 crate LTO，优先缩短 GitHub 构建时间，不再追求有限的安装包体积减少。
