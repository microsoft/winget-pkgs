ReleaseNotes: |-
  这一版本带来了焕然一新的笔记体验，并进一步提升了整体稳定性与可用性。
  本次更新
  - 全新优化笔记模块，记录、编辑与浏览体验更加统一流畅
  - 新增全局搜索，支持 Command + K 快速唤出
  - 支持笔记多图展示，详情页可轮播查看
  - 新增经典列表样式与滑块评分，笔记浏览更灵活
  - 新增备注显示设置与咖啡豆风味标签预览
  - 新增自定义识别咖啡豆 API，并修复识图可用性问题
  - 新增 PWA 安装引导、安卓下载提示与在线版更新提示
  优化与修复
  - 优化笔记表单、评分表单与变动记录表单体验
  - 优化图片流、分享图片、水印与打印预览效果
  - 优化日期选择、咖啡豆详情编辑与多处界面文案
  - 优化实时同步逻辑，改进首次同步、重连与刷新时机
  - 修复快速保存重复创建笔记、列表滑动抖动等问题
  - 修复多处表单布局、评分显示、计时器、统计与更新提示异常
  - 修复庄园、烘焙商、脱水率等字段在部分场景下的显示与输入问题
