Description: |-
  Arcade Maze Chomper is a modern, educational arcade maze chase game.
  Features include:
  - Classic single-player with 3 progressively difficult levels
  - Online multiplayer for up to 5 players
  - Global Top 10 leaderboard
  - Creative Mode to design and share custom levels
  - Custom keybindings

  Built with .NET 9.0 and Avalonia UI.
