ReleaseNotes: |-
  Devin Review & Quick Review
  All Windsurf IDE users now have access to Devin Review and Quick Review with your existing subscription.

  Agent Command Center
  - Added list display option for the agent inbox
  - Improved sessions sidebar sorting and filtering
  - Performance improvements for loading and switching sessions

  Windows updates
  We have fixed a bug preventing updates for some users on Windows. To upgrade to this version, you may need to:
  1. Wait for the update to download.
  2. Once it is downloaded, open Windows Task Manager and close all devin.exe processes
  3. Proceed with installing the update and restarting Windsurf

  Bug fixes and improvements
  - Fixed bugs with some MCP servers
  - Improved reliability of Devin Local agent
