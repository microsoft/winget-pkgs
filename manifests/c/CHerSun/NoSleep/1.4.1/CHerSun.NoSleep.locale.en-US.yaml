ShortDescription: Lightweight Windows utility to prevent screen locking
Description: >
  NoSleep is a lightweight tool that prevents Windows from automatically activating the screen
  saver, sleep mode, or lock screen. It's designed for situations where you can't change these
  settings yourself—for example, due to corporate-enforced policies. Inspired by Linux Caffeine.

  Windows PowerToys includes a tool called Awake that does the same thing, but PowerToys may require
  administrator privileges and is quite large. NoSleep aims to be as minimal as possible and runs
  without any extra permissions.
