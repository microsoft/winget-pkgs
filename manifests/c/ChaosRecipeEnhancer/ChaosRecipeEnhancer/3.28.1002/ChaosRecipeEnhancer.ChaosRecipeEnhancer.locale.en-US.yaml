ReleaseNotes: |-
  (Aggregating Patch notes from v3.28.1000, v3.28.1001, and this v3.28.1002 release)
  Howdy hey, exiles! 🤠
  I am so pumped for the 3.28 launch. I'm still unsure of what I'm logging in as. I'll between Kinetic Fusillade Totems and Righteous Fire.
  This release has been cooking across three patches released this week (v3.28.1000 → v3.28.1001 → v3.28.1002), and I'm now confident calling it stable. Here's everything that's new, fixed, and improved since v3.27.
  ⚠️ Important: This release changes how CRE is installed and updated. We've moved from the old MSI installer to Velopack, which means automatic updates going forward — no more manually downloading and re-running installers. If you're upgrading from v3.27 or earlier, uninstall your old CRE installation first, then run the new ChaosRecipeEnhancer-win-Setup.exe. Your settings will be migrated automatically on first launch.
  You also no longer need to install the .NET Desktop Runtime separately — it's bundled with the app now.
  As always, all variants of the new leagues will populate on the League dropdowns automatically when the new leagues launch. You can download this now, do your testing and customizations, and be ready to go when you hit late campaign / early maps! 🟡📈
  Mario
  P.S. Check out our new site!
  image image image image image image image
  New Features:
  - Exalted Orb Recipe — Full support for the exalted orb vendor recipe, including filter manipulation and set tracking
  - Chance Orb Recipe — Full support for the chance orb vendor recipe, including filter manipulation and set tracking
  - Filter Sound Customization — You can now assign custom alert sounds to each item class (rings, amulets, belts, boots, gloves, helmets, body armours, weapons) directly from the Filter Style Editor. Three modes are available:
    - Normal — Pick from all 16 built-in PoE alert sounds (AlertSound 1–16) with an adjustable volume slider
    - Custom — Point to any .mp3 file on your system
    - Community — Browse and preview bundled sound packs from popular community creators (Asuzara, BexBloopers, Brittleknee, Chistor, GhazzyTV, Gilbertamie, Golaya, Gollum/Zizaran, Holly, ItsYoji, Kermit/Zizaran, Lolcohol, Mathil, Mathil Vulgarity, Maven with 100+ voice lines, SlipperyJim, StefanGold, Veskara, and Zizaran)
    - Community/custom sounds are automatically copied to your filter folder when the filter is generated — no manual setup needed
  - Automatic Updates via Velopack — The app now updates itself automatically in the background. No more manually downloading MSI installers for future releases.
  - Apply & Reload Filter Button — New button at the top of the Filter Style Editor to regenerate and reload your loot filter in one click, without leaving the settings page
  - Redesigned Overlay Toggle — The Run/Stop Overlay button is now a large, prominent toggle with green (start) and red (stop) states, dynamic icons and subtitle text, and proper disabled styling
  - Prioritize Recently Stashed Items (Experimental 🧪) — New toggle in the Advanced settings tab. When enabled, recipe sets are built starting from the most recently stashed items (bottom-right of your stash) instead of the default top-left order. This reduces stash tab fragmentation over time by consuming newer items first, keeping your older items consolidated. Disabled by default.
  UX Improvements:
  - Settings now auto-save — the old "Save Settings" button has been removed
  - Added a visual callout in the Filter Style Editor reminding that style changes take effect after a filter reload
  Bug Fixes:
  - Fixed settings not carrying over when upgrading from the old MSI installer to the new Velopack installer — your league, stash tab selections, filter styles, and other preferences are now automatically migrated on first launch
  - Fixed auth tokens being cleared after every update, forcing users to re-login
  - Fixed a one-time data migration from v3.25 incorrectly re-running on every version bump, resetting league name, stash tab identifiers, and active recipe type back to defaults
  - Fixed stash tab overlay being unintentionally resized when dragged near screen edges (Aero Snap)
  - Fixed resize indicator not following window movement on the stash tab overlay
  - Fixed stash tab overlay background color not preserving alpha channel (transparency)
  - Fixed clipboard access failures in the error window copy button and filter reload
  - Fixed notification sound not playing when individual item types reach their threshold
  - Fixed network errors in PoE API calls not being handled gracefully (crashes)
  - Fixed sound file paths not resolving correctly in certain install configurations
  - Fixed index overflow crash in stash tab preselection diagnostic logging
  - Fixed crash when encountering invalid hex color strings in filter style parsing
  - Fixed null reference crash in stash tab metadata index resolution
  - Fixed crash when saved screen index for stash tab overlay was out of bounds
  - Fixed set generation infinite loop in certain edge cases
  Under The Hood:
  - Upgraded from .NET 8 to .NET 10 (LTS, supported through November 2028) — brings faster JIT, improved GC, snappier WPF rendering, and reduced memory allocations
  - App now ships as fully self-contained — users no longer need to pre-install the .NET Desktop Runtime
  - Migrated from MSI installer to Velopack for install/update lifecycle
  - Removed the legacy Visual Studio Setup Project (.vdproj / MSI installer) from the solution
  - New automated CI/CD release pipeline, updated to .NET 10 SDK
  - Refactored item composition pipeline for better maintainability
  - Added comprehensive unit test coverage for settings migration pipeline, set generation logic, and set management state
