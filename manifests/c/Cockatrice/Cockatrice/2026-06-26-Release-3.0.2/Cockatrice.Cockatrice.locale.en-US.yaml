ReleaseNotes: |-
  Available pre-compiled binaries for installation:
    Windows
     • Windows 10+
    macOS
     • macOS 15+ Sequoia Apple M
     • macOS 14+ Sonoma Apple M
     • macOS 13+ Ventura Intel
    Linux
     • Ubuntu 26.04 LTS Resolute Racoon
     • Ubuntu 24.04 LTS Noble Numbat
     • Debian 13 Trixie
     • Debian 12 Bookworm
     • Fedora 44
     • Fedora 43
  We are also packaged in Arch Linux's official extra repository, courtesy of @FFY00.
  General Linux support is available via a flatpak package at Flathub!
  We provide a Docker image for "Servatrice" in GHCR. You can docker pull it or use our Docker Compose files!
  General Notes
  We're pleased to announce the newest official release: Cockatrice 3.0.2: Graduation Day
  We hope you enjoy the changes made! All improvements with their corresponding tickets since the last version of Cockatrice are listed in the changelog below.
  If you ever encounter a bug, have a suggestion or idea, or feel a need for a developer to look into something, please feel free to open a ticket. (How to create a Ticket for Cockatrice)
  For basic information related to the app and getting started, please take a look at our official site: https://cockatrice.github.io
  If you'd like to help and contribute to Cockatrice in any way, check out our README.
  We're always available to answer questions you may have on how the program works and how you can provide a meaningful contribution.

  Upgrading Cockatrice
  Run the internal software updater: Help → Check for Client Updates
  Don't forget to update your card database right after! (Help → Check for Card Updates...)

  Changelog

  🔖 Highlights:
  - Show colored icons in counters menu and game log (#6948)

  ✨ New Features:
  - Add setting to save downloaded images to local storage instead of the QNetworkManager cache (#6620)
  - Add option to ignore private messages from non-buddy users (#6966)
  - Add setting to restore the old in-game chat autofocus behavior (#6992)

  🐛 Fixed Bugs / Resolved Issues:
  - Add confirmation dialog before kicking a player (#6987)
  - Add shortcut for load deck from website (default: Ctrl+Shift+O) (#7002)
  - Printing selector now adds tokens to the tokensboard (#6971)
  - Reorganize the settings menu
  - Respect disabled sets when loading v3 card databases (#7004)
  - Fix cards not being able to moved to the sideboard if deck didn't start with sideboard (#7001)
  - Fix facedown predefined tokens leaking tablerow (#7000)
  - Prevent deck loss when saving to a full disk (#6978)
  - Change basic lands exception to regex to deal with snow basics (#6931)
  - Fix card stacking overflow when vertical zone has many cards (#6925)
