ShortDescription: Quickly log movies, series, and books without sign-up, then revisit them in your personal timeline.
Description: |-
  Ottline is built for fast and lightweight logging of movies, series, and books.

  Start without creating an account — save what you are watching or reading and keep short notes alongside each record.
  Your records are collected into a personal timeline so you can easily look back on what you watched or read over time.
  Connect multiple devices with pairing codes and keep using the same timeline across devices.

  Key features:
  · Fast logging for movies, series, and books
  · Personal timeline of all your records
  · Save notes, dates, and watch status together
  · Connect multiple devices with pairing codes
  · Works as an installable PWA from your browser
