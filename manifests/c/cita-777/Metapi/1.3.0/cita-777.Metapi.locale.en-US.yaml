ShortDescription: Aggregating decentralized AI relay sites into a unified gateway
Description: |-
  Nowadays, there are more and more aggregation relays based on the New API / One API series within the AI ecosystem. Managing balances, model lists, and API keys across multiple sites is often fragmented and time-consuming.
  Metapi acts as a meta-aggregation layer above these relays, unifying multiple sites into a single entry point (with support for configuring multiple downstream API keys per project)—enabling all downstream tools (Cursor, Claude Code, Codex, Open WebUI, etc.) to seamlessly access all models. The current scope of supported upstream sources now extends beyond traditional aggregation panels to include:
  - Aggregation panels: New API, One API, OneHub, DoneHub, Veloera, AnyRouter, Sub2API
  - Generic compatible interfaces: OpenAI / Claude / Gemini compatible endpoints, as well as cliproxyapi / CPA
  - Official presets: Alibaba Cloud / Zhipu / Doubao Coding Plan, DeepSeek, Moonshot (Kimi), MiniMax, ModelScope
  - OAuth connections: Codex, Claude, Gemini CLI, Antigravity
