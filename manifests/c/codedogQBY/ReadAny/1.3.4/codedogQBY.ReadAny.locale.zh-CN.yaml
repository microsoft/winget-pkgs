ShortDescription: 一款 AI 驱动的电子书阅读器，支持智能聊天、语义搜索、标注和知识管理。
Description: |-
  一款 AI 驱动的电子书阅读器，支持智能聊天、语义搜索、标注和知识管理。

  核心功能
  🤖 AI 驱动阅读
  - 智能聊天 - 就书籍内容提问，AI 知晓你的阅读位置、选中文本和高亮内容
  - 语义搜索 - 超越关键词，支持向量检索 + BM25 混合搜索
  - 即时翻译 - 支持 AI 翻译或 DeepL，涵盖 19 种语言
  - 多种 AI 提供商 - OpenAI、Claude、Gemini、Ollama、DeepSeek
  - 技能系统 - 内置技能（摘要生成、概念解释、人物追踪等）+ 自定义技能创建
  📝 标注与知识管理
  - 五色高亮 - 黄/绿/蓝/粉/紫，悬停预览笔记
  - Markdown 笔记 - 带工具栏的富文本编辑器，所见即所得
  - 多格式导出 - 支持 Markdown、HTML、JSON、Obsidian、Notion
  🔊 文本转语音 (TTS)
  - 多引擎支持 - Edge TTS、浏览器 TTS、DashScope（通义千问）
  - 语音选择 - 支持 100 多种多语言语音
  - 速度调节 - 可调整播放速度
  - 后台播放 - 可在进行其他操作时继续收听
  📊 阅读统计
  - 阅读热力图 - 类似 GitHub 贡献图，可视化阅读习惯
  - 趋势图表 - 追踪每日/每周/每月阅读时长
  - 连续阅读天数 - 记录最长连续阅读天数
  - 书籍统计 - 统计每本书阅读时长及完成率
  ☁️ 跨设备同步
  - WebDAV 支持 - 在不同设备间同步书库、高亮和笔记
  - 自动同步 - 后台自动同步
  - 冲突解决 - 并发编辑时智能合并
  📚 多格式支持
  EPUB · PDF · MOBI · AZW · AZW3 · FB2 · FBZ · CBZ
  🎨 个性化体验
  - 5 种字体主题（专为中日韩优化）
  - 昼/夜模式
  - 分页/连续滚动
  - 键盘快捷键
  - 中英文界面
Tags:
- epub
