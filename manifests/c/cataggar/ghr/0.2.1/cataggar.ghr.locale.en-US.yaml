ReleaseNotes: |-
  A toolkit for GitHub releases.
  Highlights
  - CLI help follows the Zig convention: every subcommand now accepts a positional help (e.g. ghr download help, ghr install help). The previous -h / --help flags have been removed. (#71)
  - New dedicated usage printers for install, uninstall, and list, plus a Run 'ghr <COMMAND> help' to show help for a specific command hint in the top-level usage and README.md. (#71)
  - The unimplemented ghr upgrade stub has been removed from the binary and the help/README.md. (#70)
  Install:
  pipx install ghr-bin==0.2.1
  uv tool install ghr-bin==0.2.1
  winget install ghr --version 0.2.1
  brew install cataggar/ghr/ghr
