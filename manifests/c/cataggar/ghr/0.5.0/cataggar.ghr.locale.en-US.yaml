ReleaseNotes: |-
  A toolkit for GitHub releases.
  Highlights since v0.4.1
  - ghr link / ghr unlink from WSL. Link Windows-PATH executables (.exe/.cmd/.bat) into WSL with ghr link <name>, and remove them with ghr unlink, using a lowercase tool-dir layout. A clearer "not installed" error covers the missing-target case. (#110, #112, #114)
  - Windows installer. New install.ps1 one-liner for Windows; self-install now pins pre-release tags. (#113)
  - ghr path add. Renamed from ghr path ensure; the install scripts now run it automatically to add ghr's bin dir to PATH. (#115)
  - Broader asset auto-selection. Recognize Rust target triples (riscv64, gnu/musl) when picking a release asset. (#117)
  - Clearer verification output. Verification timestamps print as ISO datetimes, and the per-PE Authenticode log lines on zip downloads collapse into a single summary. (#109, #111)
  Full changelog: v0.4.1...v0.5.0
