ReleaseNotes: |-
  A toolkit for GitHub releases.
  Highlights
  - Wasm modules install as independent per-module units. Each wasm module installs to tools/<owner>/<repo>/<stem>/ with its own tag, while archives stay repo-level. So different releases of the same repo coexist — e.g. ghr install cataggar/wabt@v3.0.0-dev.19 (the wabt archive) and ghr install cataggar/wabt@petstore-0.1.0 (the petstore wasm components) no longer clobber each other. ghr list shows each module as owner/repo/stem@tag. (#140)
  - ghr uninstall <owner/repo> leaves wasm modules in place. Plain <owner/repo> now removes only the repo-level (archive) install; remove an individual wasm module with <owner/repo/stem>. (#141)
  Full changelog: v0.6.3...v0.6.4
