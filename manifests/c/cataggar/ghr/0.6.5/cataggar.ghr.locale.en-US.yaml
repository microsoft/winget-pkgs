ReleaseNotes: |-
  A toolkit for GitHub releases.
  Highlights
  - Fixed bare-binary command name derivation for <name>-<os>-<arch> assets. Installing a repo whose release assets follow the <name>-<os>-<arch> naming convention (e.g. mer-macos-aarch64 from justrach/merjs) previously linked the binary under the repo name instead of its own name, so ghr install justrach/merjs linked merjs even though the shipped binary is mer. ghr now recognizes this ordering (as well as cosign-linux-amd64-style names) and links the correct command. (#145)
  Full changelog: v0.6.4...v0.6.5
