ReleaseNotes: |-
  A toolkit for GitHub releases.
  Highlights
  - Support SHA-512 aggregate/sidecar checksum files. Some releases (e.g. caddyserver/caddy) publish checksums.txt with 128-hex SHA-512 digests rather than SHA-256, despite the generic filename. ghr previously assumed any *checksum* file was SHA-256, so every entry silently failed to parse and installs aborted with checksum file 'X' has no entry for 'Y' even though the file did cover the asset. ghr now detects SHA-256 vs SHA-512 per entry (GNU and BSD formats) and also recognizes .sha512/.sha512sum(s)/SHA512SUMS sidecar and aggregate file names. (#149, fixes #148)
  Full changelog: v0.6.5...v0.6.6
