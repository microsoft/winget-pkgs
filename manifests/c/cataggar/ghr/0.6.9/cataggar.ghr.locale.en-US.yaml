ReleaseNotes: |-
  A toolkit for GitHub releases.
  Highlights
  - Cross-filesystem installs: Download caches and tool storage can now live on different devices. Staging occurs beside the destination, preventing CrossDevice/EXDEV failures.
  - Safer upgrades: Existing installs are retained through a recoverable backup transaction and restored if replacement fails.
  - Reliable Wasm coexistence: Independently installed Wasm modules are preserved without modifying the live installation before commit, and legacy transaction backups are recovered automatically.
  Note
  When upgrading from 0.6.8 or earlier with cache and tool storage on different filesystems, use a one-time same-filesystem cache override because the currently installed version performs the update:
  GHR_CACHE_DIR="$HOME/.cache/ghr" ghr install cataggar/ghr@v0.6.9 RWSbsumpaHb+N3KCEt/EUXQ5y6Kkk8r/zCb5Z4jhEuEX8x2/U5wr5QC0
  Install:
  pipx install ghr-bin==0.6.9
  uv tool install ghr-bin==0.6.9
  winget install ghr --version 0.6.9
  curl -fsSL https://raw.githubusercontent.com/cataggar/ghr/main/install.sh | GHR_VERSION=v0.6.9 sh
  $env:GHR_VERSION = 'v0.6.9'; iwr -useb https://raw.githubusercontent.com/cataggar/ghr/main/install.ps1 | iex
  ghr install cataggar/ghr@v0.6.9 RWSbsumpaHb+N3KCEt/EUXQ5y6Kkk8r/zCb5Z4jhEuEX8x2/U5wr5QC0
