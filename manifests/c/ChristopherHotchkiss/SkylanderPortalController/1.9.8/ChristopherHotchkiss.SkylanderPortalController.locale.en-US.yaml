ShortDescription: Phone-driven control of the RPCS3-emulated Skylanders portal over Wi-Fi.
Description: >-
  A Windows app that wraps RPCS3 (the PS3 emulator) so kids can manage the
  emulated Skylanders portal from a phone or iPad over the local Wi-Fi. Launch it
  from Steam Big Picture: a QR code appears on the TV, phones scan in, pick a
  profile (PIN-gated) and a game, and drive the portal slot by slot from the
  family's figure collection. You supply your own RPCS3 install plus firmware and
  game backups; the app ships no game or firmware content.
