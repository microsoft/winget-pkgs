ReleaseNotes: |-
  What's Changed
  🚨 Breaking Changes
  - Don't allow pipelines or teams containing / to be set with the set_pipeline step by @taylorsilva in #9537
    - Teams or pipelines with / wouldn't display in the web UI. If you have teams or pipelines that have a /, rename them before upgrading.
  - Semver resource has a breaking change for users of the swift driver. We migrated the driver from using rackspace/gophercloud to gophercloud/gophercloud, which dropped the api_key field. We added all new AuthOptions from the new SDK.
  ✈️ Features
  - Add --team flag to fly pipelines command by @izabelacg in #9488
  - Add --team flag to fly execute command by @izabelacg in #9491
  - Enable hot-reloading of ATC HTTPS listener by @jghiloni in #9472
  - Opaque User Data Feature (Issue #8426) by @alicul in #9489
  - Smarter resource checking - Only check triggering resources by @taylorsilva in #9492
  - Add UserData field to pipeline API responses by @alicul in #9505
  - Make the Broadcast Message feature UI operable by @ceco556 in #9484
  - Worker healthcheck endpoint returns a detailed json response by @taylorsilva in #9529
  - feat(ui): display non-zero tasks exit codes in pipeline UI by @arakakimarcelo in #9527
  - feat(atc): natively inject BUILD_STATUS into resource metadata by @arakakimarcelo in #9523
  - Add TTL/expiry for task caches and CONCOURSE_DEFAULT_TASK_CACHE_TTL by @taylorsilva in #9533
  - Cache Vault KV version by mount path to reduce preflight calls (CONCOURSE_VAULT_ENABLE_KV_MOUNT_CACHE) by @IvanChalukov in #9530
  - atc: add base64 and hex encryption key flags by @samuelBarreto in #9542
  - Enable operators to pause/unpause web components by @taylorsilva in #9544
  - web: add next steps to download fly page by @samuelBarreto in #9545
  - Add Gitea as authentication provider by @taylorsilva in #9558
  - Add SimpleIcons support in pipeline resources by @jghiloni in #9564
  🐞 Bug Fixes
  - return BreakoutError when symlink does not link to a path inside the destination by @taylorsilva in #9486
  - Make the set_pipeline step respect the CONCOURSE_DISABLE_REDACT_SECRETS setting by @taylorsilva in #9497
  - Finish wiring up the concourse_builds_check_finished_total metric by @taylorsilva in #9500
  - Fix missing volumesStreamedViaFallback Prometheus metric by @alicul in #9503
  - worker/runtime: wrap containers from NewContainer and Containers with request timeout by @Kump3r in #9509
  - Allow pending builds in paused pipelines to be aborted and automatically abort pending builds in archived pipelines by @taylorsilva in #9521
  - Don't error if the overlaysDir does not exist during orphan volume cleanup by @taylorsilva in #9528
  - fix(atc): retain var_sources visibility inside across interpolation steps by @arakakimarcelo in #9525
  - fix resource types query returning duplicate resource types by @taylorsilva in #9534
  - fix fly's [yN] prompt by @taylorsilva in #9540
  - fix: redact secrets from task config in build events by @pierluigilenoci in #9551
  🛠️ Misc. Changes
  - [chore] regenerate counterfeiter fakes by @alicul in #9483
  - db: optimize IsFirstOccurrence query for jobs with many builds by @analytically in #9422
  - nit: TSA cleanup by @taylorsilva in #9516
  - nit: use idiomatic "for range" over channel by @taylorsilva in #9518
  - nit: API cleanup by @taylorsilva in #9517
  - Database cleanup and optimizations by @taylorsilva in #9522
  - log container placement strategies being used by web node by @taylorsilva in #9538
  - Bump tedsuo/ifrit by @taylorsilva in #9539
  - Import concourse/flag package into main repo by @taylorsilva in #9541
  - Bump go dependencies and fix Dex signing key setup by @taylorsilva in #9549
  - Have lidar check non-triggering input resources that have no versions or errored by @taylorsilva in #9552
  - Upgrade fly to charm v2 by @taylorsilva in #9553
  - Update to containerd v2.3.0 by @taylorsilva in #9562
  - Emit a more useful error if we get the "rootfs empty" error by @taylorsilva in #9563
