ReleaseNotes: |-
  @oh-my-pi/pi-ai
  Added
  - Added support for Baseten as an AI provider
  Changed
  - Improved Claude usage reliability by removing proactive hard-blocking for Fable and Mythos tiers
  Fixed
  - Fixed Anthropic OAuth account rotation to exclude unreliable model-scoped Fable/Mythos weekly caps from proactive hard-blocking, ensuring they act only as ranking priority hints while still allowing reactive 429-fallback to rotate and reach serviceable siblings.
  @oh-my-pi/pi-catalog
  Added
  - Added Baseten as a supported model provider
  - Added support for new models from Baseten, including DeepSeek V4 Pro and Kimi series
  - Added new Devin agent models: Claude 5 Fable variants
  - Added new Github Copilot models: Kimi K2.7 Code and MAI-Code-1-Flash
  - Added Poolside Laguna XS 2.1 models via Kilo and OpenRouter providers
  - Added support for Claude Fable 5 (Free) via Zenmux provider
  Changed
  - Updated priority ordering to include Baseten
  - Updated pricing and limits for various existing models in the catalog
  @oh-my-pi/pi-coding-agent
  Fixed
  - Fixed omp usage hiding sibling-only limits such as Claude 7 Day (Fable) on accounts whose current report omitted that scoped bucket; the account now renders an explicit not reported row instead of looking like the usage refresh skipped the column.
  What's Changed
  - fix(mnemopi): preserve empty structured extraction by @roboomp in https://github.com/can1357/oh-my-pi/pull/4391
