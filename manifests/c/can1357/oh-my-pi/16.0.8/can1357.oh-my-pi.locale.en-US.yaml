  - fix(ai): preserve Cursor tool-call ordering by @roboomp in https://github.com/can1357/oh-my-pi/pull/2927
  - fix(ai): purge superseded API-key credential rows by @roboomp in https://github.com/can1357/oh-my-pi/pull/2943
  - fix(providers): detect LM Studio VLM image input by @roboomp in https://github.com/can1357/oh-my-pi/pull/2948
  - fix(tui): require space after python prompt sigil by @roboomp in https://github.com/can1357/oh-my-pi/pull/2949
  - fix(ai): prune optional empty tool params by @roboomp in https://github.com/can1357/oh-my-pi/pull/2983
