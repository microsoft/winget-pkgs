  - fix(lsp): suppress orphan TypeScript project diagnostics by @roboomp in https://github.com/can1357/oh-my-pi/pull/4404
  - fix(mcp): surface a short launch URL and log Windows opener failures for OAuth by @roboomp in https://github.com/can1357/oh-my-pi/pull/4420
  - fix(task): auto-skip empty cherry-picks during task-branch merges (#4438) by @roboomp in https://github.com/can1357/oh-my-pi/pull/4440
  - fix(lsp): dedupe identical replacement edits by @roboomp in https://github.com/can1357/oh-my-pi/pull/4460
  - fix(ai): trim whitespace around enum tool args by @roboomp in https://github.com/can1357/oh-my-pi/pull/4465
  - fix(mcp): carry OAuth scopes from challenge and resource metadata by @roboomp in https://github.com/can1357/oh-my-pi/pull/4468
  - fix(read): guard large artifact raw reads by @roboomp in https://github.com/can1357/oh-my-pi/pull/4483
  - fix(ai): preserve explicit tool.strict:false on OpenAI-family payloads by @roboomp in https://github.com/can1357/oh-my-pi/pull/4340
