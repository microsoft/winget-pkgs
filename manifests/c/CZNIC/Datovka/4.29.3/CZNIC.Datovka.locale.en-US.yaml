PackageIdentifier: CZNIC.Datovka
PackageVersion: 4.29.3
PackageLocale: en-US
ShortDescription: Datovka is a multi-platform desktop application for accessing data boxes and permanently storing data messages in a local database.
Description: Datovka is a cross-platform desktop application for accessing data boxes. The application's user interface is inspired by email clients. Datovka is free software protected by the GNU GPL version 3 license. Installation packages for Linux, Windows, and macOS are freely available for download.
ReleaseNotes: |-
  * Sharing code for generating correspondence overviews with mobile app.
   * Updated application logo and icon.
   * Disabled donations dialogue when having more than 5 production accounts or
     when having records management configured.
   * Added more explanatory texts into the change password dialogue.
   * Offering to download Arm package on macOS when running Intel package in
     Rosetta mode.
   * Fixed disappearing dock icon in Gnome 49. Fixed organisation domain an
     renamed desktop and metainfo files.
