PackageIdentifier: CZNIC.Datovka
PackageVersion: 4.29.0
PackageLocale: en-US
ShortDescription: Datovka is a multi-platform desktop application for accessing data boxes and permanently storing data messages in a local database.
Description: Datovka is a cross-platform desktop application for accessing data boxes. The application's user interface is inspired by email clients. Datovka is free software protected by the GNU GPL version 3 license. Installation packages for Linux, Windows, and macOS are freely available for download.
ReleaseNotes: |-
  * Aborting PIN request dialogue when halt required.
   * Able to directly (without explicit conversion) read data from message
     databases as they are used in the version 2.6.0 of the mobile application.
   * Can drag downloaded messages from main window's message list.
   * Can drag downloaded messages from list of found messages from the search
     message dialogue.
   * Fixed data import from mobile application.
   * Enabled Delete and Command+Backspace shortcuts to delete content in views.
   * Enabled Ctrl+C on message lists and attachment list.
   * Enabled Ctrl+V on attachment list in send message dialogue.
   * Displaying more detailed information about the state of the MEP wait loop.
   * Closing the about dialogue after a short delay when the donate button is
     pressed.
   * Showing survey dialogue for users with more than 6 data boxes.
   * Whole locally stored content can be scanned for timestamp expiration and
     sent for restamping.
   * Using bundled QuaZIP-1.5 when compiling with Qt-6.
