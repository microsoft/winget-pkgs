PackageIdentifier: CZNIC.Datovka
PackageVersion: 4.29.1
PackageLocale: en-US
ShortDescription: Datovka is a multi-platform desktop application for accessing data boxes and permanently storing data messages in a local database.
Description: Datovka is a cross-platform desktop application for accessing data boxes. The application's user interface is inspired by email clients. Datovka is free software protected by the GNU GPL version 3 license. Installation packages for Linux, Windows, and macOS are freely available for download.
ReleaseNotes: |-
  * Added a default global option into settings whether to automatically
     download a message immediately after it has been sent. This option can be
     overridden for individual messages.
   * Apply timestamp expiration notification interval settings in the tracked
     timestamps widget and also the restamping dialogue. Default value has been
     increased to 30 days.
   * Added options whether to automatically enable timestamp tracking for freshly
     downloaded messages.
   * Fixed compilation warnings about deprecated cstdbool.
   * Disabled the survey.
   * Mobile key login status retrieval method can be configured to use the old
     or new version.
