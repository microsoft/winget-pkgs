ShortDescription: Datovka je multiplatformní desktopová aplikace pro přístup k datovým schránkám a k trvalému uchovávání datových zpráv v lokální databázi.
Description: Datovka je multiplatformní desktopová aplikace pro přístup k datovým schránkám. Uživatelské rozhraní aplikace se inspiruje poštovními klienty. Datovka je svobodný software chráněný licencí GNU GPL verze 3. Instalační balíčky pro Linux, Windows a macOS jsou volně ke stažení.
ReleaseNotes: |-
  Byla vydána Datovka 4.29.1.
  Vylepšení
  - Do nastavení byla přidána globální výchozí volba, zda se mají stahovat podepsané datové zprávy ihned po jejich odeslání. Toto nastavení lze pro jednotlivé datové zprávy změnit.
  - Do nastavení byla přidána možnost, zda pro čerstvě stažené zprávy má být zapnuto sledování expirace časových razítek.
  Opravy chyb
  - Opravena chyba, kdy při sledování expirace časových razítek byla ignorována volba počtu dní, kdy se má zobrazit upozornění před vypršením délky časového razítka.
  Ukončeno zobrazování výzvy k vyplnění dotazníku.
