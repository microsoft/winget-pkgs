ReleaseNotes: |-
  Nieuwe functies:
  - Externe kolommenbalans (met mapping) kan worden ingelezen. Standaard is de mapping van Caseware Working Papers geimplementeerd. Je kunt daarmee makkelijk per jaarrekeningpost zien wat de onderliggende transacties zijn. Daarnaast zijn er ook analyses toegevoegd waarmee aansluiting koba met auditfile gemaakt kan worden en beginbalans met koba van het voorgaande boekjaar.
  - Er is een auto-exportoptie toegevoegd waarmee standaard overzichten en transacties per jaarrekeningpost makkelijk in een keer kunnen worden ge-exporteerd.
  - Er kunnen risicoclassificaties worden berekend zodat aan iedere transactieregels een risicoclassificatie kan worden gehangen op basis dat het een outlier is, een rond bedrag is, bepaalde zoektermen raakt, weekend boeking is of boeking op feestdag.
  - Met name bij transacties views kunnen nu kolommen worden toegevoegd o.a. CPI index op basis relatie land.
  - Export naar VisionPlanner excel template (tbv inlezen in VP)
  - Diverse analyses toegevoegd zoals transacties op feestdagen en rondebedragen
  - Bij manuele import kunnen nu ook opgedeelde excel of csv bestanden worden geimporteerd.
  - Sommige standaard analyses zoals proefsaldibalans worden gecached, bij grote auditfiles zijn deze dan zeer snel te raadplegen na de eerste keer geopend te zijn geweest.

  Diverse verbeteringen doorgevoerd. O.a. een veel snellere RGS kolommenbalans analyse. Daarnaast diverse bugfixes doorgevoerd.
