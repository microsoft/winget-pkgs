  Release Notes
  Enhancements & New Features
  - Support Intel Nova Lake + ES, Bartlett Lake, Emerald Rapids, Wildcat Lake
  - New NVIDIA limit sensors
  - Per-game VRAM sensors
  - AMD GPU fan duty sensor
  - SSD sensors
