ReleaseNotes: |-
  ## What's Changed

  - Improved Chinese translation, thanks to @batecam79
  - Fixed font selector popup showing up behind Pointer Settings
  - Removed unused icons
  - Improved compatibility with current versions of KDE's Kirigami framework and ExtraCMakeModules
  - Fixed contextual page actions not showing on context drawer on mobile Linux distros
  - Fixed Appdata metadata, credit for this and for helping review the build goes to @yakushabb
  - Fixed errors with markers list that would lead to undefined behavior and assertions on debug builds
  - Fixed error with handle bars that would lead to an assertion on debug build for iOS
