# winget-pkgs default-locale manifest for OpenASR Desktop.
# See Caelum.OpenASRDesktop.yaml's header comment for what this directory is.
#
# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json

PackageIdentifier: Caelum.OpenASRDesktop
PackageVersion: 0.1.8
PackageLocale: en-US
# "Caelum Inc." is the Authenticode signer (see apps/desktop/SIGNING-WINDOWS.md
# and the website's troubleshooting docs, which tell users to confirm the
# publisher shows "Caelum Inc." in the SmartScreen/signature dialog) -- kept
# identical to what Windows itself will show for this installer.
Publisher: Caelum Inc.
PublisherUrl: https://openasr.org
PublisherSupportUrl: https://github.com/QuintinShaw/openasr/issues
PackageName: OpenASR Desktop
PackageUrl: https://openasr.org/download
License: Proprietary
# No standalone public license/EULA page exists yet (only /privacy) -- see
# SUBMITTING.md's "before you submit" checklist. LicenseUrl intentionally
# left unset rather than pointed at the private openasr-app repo, which
# winget-pkgs reviewers and end users cannot reach.
PrivacyUrl: https://openasr.org/privacy
ShortDescription: >-
  Private, offline speech-to-text and dictation for Windows, powered by the
  open-source OpenASR engine -- no cloud, no telemetry, fully local.
Description: >-
  OpenASR Desktop brings system-wide dictation and audio/meeting
  transcription to Windows, running entirely on-device on top of the
  Apache-2.0 OpenASR speech-recognition engine (ggml-backed, eleven model
  families, CPU and GPU inference). Nothing is uploaded: no cloud fallback,
  no telemetry, no account required. Models are downloaded once from a
  signed catalog and then run fully offline.
Moniker: openasr
Tags:
  - speech-recognition
  - speech-to-text
  - transcription
  - dictation
  - offline
  - privacy
  - accessibility
  - productivity
ManifestType: defaultLocale
ManifestVersion: 1.12.0
