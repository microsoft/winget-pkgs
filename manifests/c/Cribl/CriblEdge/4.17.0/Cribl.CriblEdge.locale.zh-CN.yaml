ShortDescription: 在边缘端采集并处理可观测性数据
Description: |-
  Cribl Edge 可帮助您实时采集并处理可观测性数据——日志、指标、应用数据——支持从您的 Linux、Windows、macOS 设备、应用或微服务中获取上述数据，并将其发送至 Cribl Stream 或任意受支持的目标端。
  借助 Cribl Edge，您可以：
  - 自动发现并采集端点上的主机、容器、应用指标及日志
  - 通过函数与流水线处理数据
  - 将数据转发至众多受支持目标端中的任意一个
  - 轻松管理配置，同时保留版本控制能力
  - 跳转至边缘端进行本地预览和配置验证
