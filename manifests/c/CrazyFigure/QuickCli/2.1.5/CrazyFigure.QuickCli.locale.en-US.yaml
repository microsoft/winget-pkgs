PackageIdentifier: CrazyFigure.QuickCli
PackageVersion: 2.1.5
PackageLocale: en-US
License: Freeware
ShortDescription: Lightweight Windows Command Line Launcher · Swiftly Switch Between Common Project Directories and Launch Terminals
Description: |-
  Lightweight Windows Command Line Launcher · Swiftly Switch Between Common Project Directories and Launch Terminals

  Features
  - Fast directory switching — Select local directories and open terminals in one click
  - Multi-command support — Built-in preset commands: claude / codex / iflow, with support for freely adding custom commands
  - History records — Automatically saves used directory and command combinations, supports single entry deletion and one-click clearing
  - Command sorting — Drag to adjust the display order of commands in settings
  - System tray — Minimize to the tray, quickly switch the main command and open historical directories via the right-click menu
  - Automatic updates — Support checking for new versions on GitHub Release and one-click updating
  - Modern UI — Built with customtkinter, featuring rounded cards and soft color schemes
