ShortDescription: Extends the desktop when a new monitor appears, instead of duplicating it.
Description: |-
  Windows duplicates the desktop the first time it meets a monitor it has never seen, and you
  fix it by hand every time. DisplayDefaults watches for display changes, remembers which
  monitors it has already seen, and switches to Extend only when an unknown one arrives.

  It can also place the new display above, below, left or right of the primary and save that
  arrangement, so Windows restores it on every later reconnect.

  Runs from the notification area. No admin rights and nothing machine-wide.
