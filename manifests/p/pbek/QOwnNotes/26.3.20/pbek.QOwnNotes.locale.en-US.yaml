ReleaseNotes: |-
  26.3.20
  - Fixed XML/HTML code blocks in the QLiteHtml preview having their tags
    stripped and showing only text content; indented lines inside fenced code blocks
    were incorrectly masked as indented code blocks, bypassing the syntax highlighter,
    and the XML highlighter now also properly escapes closing angle brackets
    (for #3521)
  - Added a new Read-only mode panel to the General settings with an Enable
    read-only mode master checkbox; all read-only related settings (Start application
    in read-only mode and When inactive, enter read-only mode automatically after)
    are now grouped inside this panel and are disabled when the master checkbox is
    unchecked — the Disallow note editing toolbar/menu action is hidden and the
    Escape key no longer enters read-only mode when the feature is disabled
    (for #3519)
  - Fixed intermittent database table is locked: note warnings (SQLite error 262)
    caused by background threads (backlink navigation, note relation scene) contending
    with main-thread writes on the shared-cache in-memory database; each connection
    now sets PRAGMA busy_timeout = 5000 and PRAGMA read_uncommitted = 1 so that
    read-only workers skip table-level shared-cache locks instead of immediately
    returning SQLITE_LOCKED (for #3520)
  - Improved the Failed to get index git warning to include the actual libgit2
    error message for easier diagnosis (for #3520)
  - Fixed a crash in the update dialog caused by QAbstractScrollArea::viewport()
    being called on a not-yet-initialized scroll area during setupUi construction;
    the event filter now guards against a null viewport before dereferencing it
    (for #3518)
  - Added optional wiki-style link support — enable it in the Editor settings
    with the new Enable wiki-style link support [[note name]] checkbox
    (for #3512)
    - Write [[Note Name]] to link to a note by name; subfolder-qualified links
      like [[subfolder/Note Name]] and heading anchors like [[Note#Heading]]
      are also supported, as well as display-text aliases like [[Note|My Label]]
    - Resolved links are highlighted in the editor with a dotted underline using
      the link color; broken (unresolved) links use a dashed underline with the
      broken-link color
    - Clicking a wiki link in the note preview navigates to the target note;
      if the note does not exist you are asked whether to create it
    - Ctrl+Click on a wiki link in the note editor navigates to the target
      note (or offers to create it); Ctrl+Shift+Click opens it in a new tab
    - The Insert link dialog (Ctrl+L) gains a Create wiki-style link
      [[...]] checkbox (visible only when wiki-link support is enabled) to
      insert the selected note as a [[Note Name]] link instead of a Markdown link
    - Typing [[ in the editor triggers auto-complete with a filtered list of
      all note names (including subfolder-qualified paths); a suggestion can also be
      triggered via the normal auto-complete shortcut inside an open [[
    - Wiki links are included in backlink detection and shown in the backlinks
      panel; when a subfolder is renamed all qualified [[subfolder/...]] links
      across all notes are updated automatically
