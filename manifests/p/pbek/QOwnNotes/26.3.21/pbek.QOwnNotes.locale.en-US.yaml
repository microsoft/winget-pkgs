ReleaseNotes: |-
  26.3.21
  - Fixed emoji characters (e.g. 🚫) rendering as incorrect glyphs (such as the
    Bitcoin ₿ symbol) in the QLiteHtml preview on Windows — the root cause was
    that litehtml's internal utf8_to_wchar silently truncated codepoints above
    U+FFFF to 16 bits when appending to std::wstring (since wchar_t is 16-bit
    on Windows), so e.g. U+1F600 (😀, UTF-8 F0 9F 98 80) became U+F600
    (UTF-8 EF 98 80); the conversion functions now correctly produce and consume
    UTF-16 surrogate pairs (for #3517)
  - Removed the emoji font appending workaround from the QLiteHtml preview that
    was no longer needed after the litehtml UTF-16 surrogate pair fix and caused the
    note preview to be rendered in the wrong font (for #3522)
  - Search results in the Settings dialog are now highlighted directly on the
    matched widgets — QLabel text gets the search term wrapped in a yellow
    background highlight, while QCheckBox, QRadioButton, QGroupBox and
    QPushButton widgets receive a yellow background color; highlights are cleared
    when the search text is removed (for #3523)
ReleaseNotesUrl: https://github.com/pbek/QOwnNotes/releases/tag/v26.3.21
