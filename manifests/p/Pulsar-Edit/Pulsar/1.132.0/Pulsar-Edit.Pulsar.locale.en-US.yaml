ReleaseNotes: |-
  This release delivers something that we hope will make most users’ lives easier, whether they’re veteran Pulsar users or brand-new users giving us a try: a [new core terminal package](/posts/20260510-savetheclocktower-terminal-package/)!

  Also on offer: a new experimental setting that we think will improve the experience of switching Git branches. When enabled, core.promptOnConflict will recognize when you’ve made edits against a file whose contents changed on disk _after_ you started making the edits, and will warn you when you try to save your edits! This is one step toward improving the experience of users who often switch branches in version control.

  We’ve also added a setting that might make life easier for those who routinely edit large files, quality-of-life improvements for Pulsar contributors and package authors, better window management when opening projects from the command line, new configurable behavior for autocomplete-plus, and a handful of improvements to syntax highlighting.

  As always, a huge thank you to our community, contributors, and donations.
  Happy coding, and see you amongst the stars!
  - The Pulsar Team

  ---

  ## 1.132.0

  - New terminal package!
  - New editor.largeFileThreshold setting that allows the user to configure the file-size threshold of the “large file mode” present in TextMate-style grammars.
  - New experimental setting: core.promptOnConflict. When enabled, Pulsar will ask for confirmation if you try to save an item while it’s in a “conflicted” state. You may decide whether to cancel or proceed with overwriting the file on disk. (For an editor, the “conflicted” state occurs if you open a file and make changes, but another program writes different contents to the file on disk before you can save your changes in Pulsar.) Since this setting is experimental, it is disabled by default… but we encourage users to enable it and help us test it!
  - Minor Electron version increase to v30.5.1.

