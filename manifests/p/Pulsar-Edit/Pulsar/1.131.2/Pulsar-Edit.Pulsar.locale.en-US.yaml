ReleaseNotes: |-
  Hello again, everyone! This release has a focus on bug fixes since our big Electron 30 upgrade! We've been busy addressing the issues our community has found since the release of v1.131.0.

  Thanks to [@asiloisad](https://github.com/asiloisad), we've got a new way to add multiple roots to a project at once via atom.project.addPaths. We're also excited to see a contribution from [@catb0t](https://github.com/catb0t), their first ever contribution to the project!

  > **Note for .rpm users:** _(There is an issue with the postuninstall scriptlet from the Pulsar 1.131.0 and 1.131.1 .rpms, causing the unintended removal of pulsar and ppm from /usr/bin/, specifically during upgrade installs. See [#1482](#1482) for details.)_
  >
  > For pulsar and ppm to remain on your PATH, please uninstall any prior version of the Pulsar 1.131 .rpm before installing this release's .rpm, or alternatively you can dnf install and then dnf reinstall this release's updated .rpm.
  > 
  > Otherwise the old postuninstall scriptlet will run, removing pulsar and ppm from /usr/bin/ and thus from your PATH. This release has an updated postuninstall scriptlet with the fix, so this is a one-time workaround.

  ---

  ## 1.131.2

  - [settings-view] Fix issue that closes project windows when the user clicks on a badge in a package card.
  - [find-and-replace] Fix issue that prevents searches with patterns from working properly in projects with multiple roots.
  - Fix issue affecting keybinding interpretation on non-QWERTY keyboards in Linux/X11 environments.
  - Fix Linux issue causing the menu bar to hide immediately after a project window opens.
  - Fix macOS issue causing buffer contents to fail to update for some users when modified by another program.
  - Fix issue causing the .deb installation to refuse to launch because of improper permissions/AppArmor profile.
  - Fix issue causing the .rpm installation to run the wrong script when upgrading (restore pulsar and ppm to PATH).
  - Fix issue causing the --package switch not to work correctly when invoked directly on the Pulsar binary, rather than on pulsar.sh/pulsar.cmd.
  - Fix issue that prevents ppm from being symlinked or un-symlinked correctly in Linux install/uninstall scripts.
  - Add atom.project.addPaths method for adding multiple project roots at once.

  ### Pulsar

  - script: Fix pulsar and ppm removal from PATH during upgrade with .rpms [@DeeDeeG](#1482)
  - Fix pulsar --package usage when APM_PATH is not set [@savetheclocktower](#1388)
  - [settings-view] Prevent weird half-crash when clicking on a badge such as an "Archived" badge next to a package card [@savetheclocktower](#1481)
  - [find-and-replace] Fix project search path pattern interpretation when the project has more than one root directory [@savetheclocktower](#1455)
  - Update to a version of pathwatcher that uses kqueue on macOS instead of FSEvents [@savetheclocktower](#1471)
  - Fix inability to use require('clipboard') and its other deprecated siblings [@savetheclocktower](#1474)
  - Re-assert core.setAutoHideMenuBar after a call to setFullScreen so that the menu bar isn't automatically hidden on Linux [@savetheclocktower](#1472)
  - settings-view: rebrand README and Restart notification [@catb0t](#1476)
  - Bump atom-keymap to v9.0.3 [@savetheclocktower](#1475)
  - Update the post-install.sh script to set permissions properly after .deb and .rpm installations [@savetheclocktower](#1466)
  - Cirrus: Update Rolling release token [@DeeDeeG](#1470)
  - script: Fix ppm symlinking issues in Linux install/uninstall scripts [@DeeDeeG](#1464)
  - Cirrus: Update brew uninstall node@20 to brew uninstall node@24 [@DeeDeeG](#1465)
  - Fix deprecated electron.remote usage in reopen-project-menu-manager [@asiloisad](#1424)
  - Add Project.addPaths to batch multiple root folders with a single event [@asiloisad](#1454)
  - [meta] Exclude blockmaps again [@confused-Techie](#1443)
  - Migrate Renovate config [@renovate](#1444)
  - Update whitespace package [@renovate](#1445)

  ### @pulsar-edit/pathwatcher

  - Introduce an alternative macOS implementation that uses kqueue to better match this library's pre-v9 behavior [@savetheclocktower](https://github.com/pulsar-edit/node-pathwatcher/pull/4)

  ### @pulsar-edit/atom-keymap

  - Bump @pulsar-edit/keyboard-layout to 3.0.5 [@savetheclocktower](https://github.com/pulsar-edit/atom-keymap/commit/37a68fe1cf4d66174b8dd16f75ebf017e55a6d83)

  ### @pulsar-edit/keyboard-layout

  - Stop considering XInputContext in X11 when translating keys to characters [@savetheclocktower](https://github.com/pulsar-edit/keyboard-layout/pull/5)
