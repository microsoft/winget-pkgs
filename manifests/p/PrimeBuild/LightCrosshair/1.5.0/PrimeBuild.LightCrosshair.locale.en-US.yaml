ShortDescription: Lightweight gaming crosshair overlay for Windows.
Description: LightCrosshair is a lightweight crosshair overlay for competitive gaming on Windows 10/11. It includes a customizable crosshair builder, profile workflow, lightweight performance overlay modes, ultra-lightweight mode, crosshair visibility presets, and a Frame Cap Assistant that provides guidance only. LightCrosshair does not inject into games, does not include a PresentMon runtime provider, and does not enforce a real frame limiter backend.
