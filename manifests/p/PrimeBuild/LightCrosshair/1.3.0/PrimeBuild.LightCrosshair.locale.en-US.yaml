ShortDescription: Lightweight gaming crosshair overlay with FPS counter and color management
Description: >-
  LightCrosshair is a professional-grade crosshair and telemetry overlay for competitive gaming on Windows 10/11.
  
  Features:
  • Custom crosshair builder with full shape control (size, thickness, gap, edge, inner layers)
  • Integrated FPS overlay with ETW/PresentMon anti-cheat safe telemetry
  • Process-aware display color management (per-profile gamma, contrast, brightness, vibrance)
  • Modern profile workflow with immutable defaults and up to 10 profile slots
  • Pixel-perfect centering on all displays with multi-monitor support
  • Low CPU footprint optimized for minimal gameplay impact
  • Screen recording detection for streaming/recording
  • DPI awareness and proper scaling on high-DPI displays

  Requires .NET 8.0 Runtime (automatically installed if needed).
