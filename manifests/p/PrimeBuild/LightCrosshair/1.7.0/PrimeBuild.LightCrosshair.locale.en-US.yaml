ReleaseNotes: >-
  LightCrosshair 1.7.0 fixes NVIDIA FPS cap profile binding for selected
  application profiles, adds NVIDIA profile audit information, adds per-app
  NVIDIA Low Latency and VSync controls, and displays read-only NVIDIA G-SYNC
  and Low Latency CPL state. It also isolates NVIDIA profile operations in a
  helper process, polishes GPU Driver tab layout, initializes Frame Cap Assistant
  recommendations from safe primary-display refresh-rate data, and preserves
  safe asInvoker operation.
