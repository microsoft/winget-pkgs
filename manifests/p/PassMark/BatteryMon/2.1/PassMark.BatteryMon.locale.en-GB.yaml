# yaml-language-server: $schema=https://aka.ms/winget-manifest.locale.1.12.0.schema.json

PackageIdentifier: PassMark.BatteryMon
PackageVersion: '2.1'
PackageLocale: en-GB
Description: |-
  BatteryMon can graph your batteries charge levels in real time, alongside an extrapolated trend line and comparison trend line.

  A log file is maintained of the battery charge level and other statistics for later analysis.

  Typical users include portable computer repair centres, system integrators, server administrators who must manage laptops and, home users trying to diagnose battery problems.
ManifestType: locale
