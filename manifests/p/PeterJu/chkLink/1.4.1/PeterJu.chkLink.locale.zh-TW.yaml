  chkLink 是一套 Windows 網站失效連結掃描工具，提供 GUI 與 CLI 兩種使用方式。
  它會根據掃描層數遞迴掃描站內頁面、驗證內部連結的有效性、檢查圖片是否缺少 alt，並輸出 Excel 報告與 log 紀錄。
