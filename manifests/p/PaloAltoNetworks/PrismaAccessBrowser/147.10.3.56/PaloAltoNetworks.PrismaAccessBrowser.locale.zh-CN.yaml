ShortDescription: 唯一一款原生基于 SASE（安全访问服务边缘）架构的安全浏览器，支持任意用户、任意设备、任意应用在任意地点实现安全办公。
Description: |-
  Prisma 浏览器旨在提升托管设备与非托管设备的安全性。它提供原生集成的企业级浏览器，可将防护范围扩展至非托管设备，通过直接在浏览器内部落地安全机制，助力保障业务应用和数据安全。
  Prisma 浏览器支持多种使用场景，包括：
  - 第三方访问：支持承包商、合作伙伴、客户或学生使用非托管设备安全访问 SaaS 或私有 Web 应用。
  - 自带设备（BYOD）访问：支持承包商、合作伙伴、客户或学生使用非托管设备安全访问 SaaS 或私有 Web 应用。
  - 临时安全访问：在代理部署、网络合并等系统过渡阶段，为人力资源、薪资核算等关键应用提供访问支持。
  - 托管设备安全访问：为使用办公设备处理高敏感数据的员工提供安全防护。
  Prisma 浏览器专为企业环境设计，内置的安全功能可防范网络钓鱼、恶意软件、窃听、数据泄露等风险。它保留了谷歌 Chrome 用户熟悉的界面和功能，同时集成了额外的安全措施应对潜在漏洞，在易用性和防护能力之间实现了平衡。
