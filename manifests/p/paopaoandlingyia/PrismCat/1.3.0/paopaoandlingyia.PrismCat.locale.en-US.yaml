ReleaseNotes: |-
  v1.3.0 brings a more polished UI, a faster log-detail experience, and a more consistent debugging workflow.
  - Fixed a legacy global CSS reset that was collapsing spacing and hurting the overall visual polish
  - Improved log detail performance by parsing large bodies on demand, reducing lag when opening details
  - Unified request/response inspection with Pretty / Raw views, plus Merged for streaming responses, while keeping Raw as the source of truth
  - Upgraded Playground with the same response views and automatic gzip / deflate / br decoding for easier debugging
  - Added frontend code-splitting and snappier drawer motion to improve perceived responsiveness and reduce initial bundle pressure
