ShortDescription: 一款面向大语言模型 API 的自托管透明代理与调试控制台。
Description: PrismCat 是一款可自行部署的、面向大语言模型 API 的透明代理与调试控制台。只需修改一行代码——你的 base_url（基础请求地址），即可即时查看你的应用与 OpenAI/Claude/Gemini/Ollama 等任意大语言模型 API 之间的所有请求和响应，包括流式传输（SSE）内容。
