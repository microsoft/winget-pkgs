ReleaseNotes: |-
  v1.5.0 improves PrismCat's debugging workflow with request overrides, per-upstream outbound proxy settings, and cURL export from log details.
  - Added request overrides with per-upstream JSON Patch bindings, including original/final request views and diff inspection
  - Added per-upstream outbound proxy settings, supporting environment proxies, direct connections, and custom proxy URLs
  - Added Copy as cURL in log details so recorded requests can be shared or replayed easily
  - Refined the log detail experience with persisted expansion state, better request body placement, and polished toolbar actions
  - Improved stream merging by preserving reasoning_content in OpenAI chunks
  - Improved logging support for image generation and other large-content requests
  Full Changelog: https://github.com/paopaoandlingyia/PrismCat/compare/v1.4.0...v1.5.0
