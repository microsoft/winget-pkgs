- 大语言模型
- 聊天机器人
ReleaseNotes: |-
  v1.4.0 新增了进行中请求的实时查看能力，并重构了日志持久化前的处理流程，以减少代理热路径上的额外开销。
  - 新增日志详情实时更新支持，进行中的请求现在可以在 UI 中持续看到状态、响应头和响应内容变化
  - 调整日志处理链路，将请求体/响应体的展示格式化移出代理热路径，降低普通请求上的额外性能负担
  - 默认关闭“提前保存请求体快照”，实时查看已覆盖大多数提前查看场景，同时保留该开关供需要时使用
  - 优化日志详情页的交互与展示细节，包括工具栏、操作入口和实时状态呈现
  English
  v1.4.0 adds live updates for in-flight requests and moves body formatting work out of the proxy hot path to reduce request-time overhead.
  - Added live log detail updates so in-flight requests can now show status, response headers, and response body changes directly in the UI
  - Refined the logging pipeline by moving request/response body formatting out of the proxy hot path, reducing extra overhead on normal requests
  - Disabled Early Request Body Snapshot by default, since live viewing now covers most early-inspection scenarios while keeping the option available when needed
  - Polished the log detail experience, including toolbar actions, UI flow, and live-state presentation
  Full Changelog: https://github.com/paopaoandlingyia/PrismCat/compare/v1.3.1...v1.4.0
