ReleaseNotes: |-
  v1.7.0 brings major improvements to observability and usage tracking in PrismCat, adding Trace correlation with dedicated pages, a Usage extraction rule library, Body keyword search, and a smarter storage strategy for large bodies.
  - Added Trace correlation along with Traces / Trace Detail pages for reviewing multiple logs across a full call chain
  - Added Usage / token extraction with per-upstream binding rules, managed via a rule library on the settings page
  - Expanded built-in Usage templates to OpenAI compatible, OpenAI Responses, Anthropic, and Gemini, covering Responses API, Codex, and other newer workflows
  - Added keyword search to the request / response Body viewer
  - Improved storage and display of large Bodies, keeping a readable preview in the database while storing full content separately
  - Wired Usage extraction results into log detail and summary views
  - Continued refinement of text rendering and readability on the log detail page
  - Improved handling of formatted Bodies and separately-stored Bodies
  - Updated the manual binary release workflow default tag to v1.7.0
  - Note: this version changes the Body log storage format. Large-Body logs produced by older versions may fail to load their detached full content after upgrading — please back up or export important historical logs beforehand
  Full Changelog: https://github.com/paopaoandlingyia/PrismCat/compare/v1.6.0...v1.7.0
