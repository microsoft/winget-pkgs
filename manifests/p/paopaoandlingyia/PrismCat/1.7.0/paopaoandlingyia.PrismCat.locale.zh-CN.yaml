PackageIdentifier: paopaoandlingyia.PrismCat
PackageVersion: 1.7.0
PackageLocale: zh-CN
ShortDescription: 一款面向大语言模型 API 的自托管透明代理与调试控制台。
Description: PrismCat 是一款可自行部署的、面向大语言模型 API 的透明代理与调试控制台。只需修改一行代码——你的 base_url（基础请求地址），即可即时查看你的应用与 OpenAI/Claude/Gemini/Ollama 等任意大语言模型 API 之间的所有请求和响应，包括流式传输（SSE）内容。
Tags:
- 人工智能
- 代理
- 大语言模型
- 聊天机器人
ReleaseNotes: |-
  v1.7.0 让 PrismCat 在可观测性与用量统计上有了显著增强，新增 Trace 关联与详情页、Usage 提取规则库、Body 关键词搜索，以及更合理的大 Body 存储策略。
  - 新增 Trace 关联能力以及 Traces / Trace Detail 页面，可从完整调用链回看多条日志
  - 新增 Usage / token 用量提取能力，支持按上游绑定规则并在设置页管理规则库
  - 内置 Usage 模版扩展为 OpenAI compatible、OpenAI Responses、Anthropic、Gemini，适配 Responses API、Codex 等新工作流
  - 请求 / 响应 Body 查看器新增关键词搜索能力
  - 优化大 Body 的存储与展示，数据库保留可读预览，完整内容按分离存储处理
  - Usage 提取结果已接入日志详情与汇总展示
  - 持续优化日志详情页的文本展示与阅读体验
  - 改进格式化 Body 与分离存储 Body 的处理方式
  - 手动二进制发布 workflow 的默认标签已更新为 v1.7.0
  - 注意：本版本调整了 Body 日志存储格式，旧版本生成的大 Body 日志升级后可能无法正确加载分离内容，如有重要旧日志请提前备份或导出
