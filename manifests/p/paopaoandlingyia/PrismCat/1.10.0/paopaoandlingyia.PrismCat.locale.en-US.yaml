ReleaseNotes: |-
  v1.10.0
  新增
  - 为仅透传的反向代理用法添加每个上游的日志控制。
  - 支持在请求和响应正文中折叠 Base64URL/Fernet 风格的长载荷。
  修复
  - 避免将客户端取消的流式响应标记为代理错误。
  - 过滤上游 CORS 响应头，使 PrismCat 保持 CORS 策略控制。
  - 在请求覆盖失败时保留原始请求正文详情。
  v1.10.0
  Added
  - Add per-upstream logging controls for pass-through-only reverse proxy usage.
  - Support Base64URL/Fernet-style long payload folding in request and response bodies.
  Fixed
  - Avoid marking client-canceled streaming responses as proxy errors.
  - Filter upstream CORS response headers so PrismCat keeps CORS policy control.
  - Preserve original request body details when request override fails.
