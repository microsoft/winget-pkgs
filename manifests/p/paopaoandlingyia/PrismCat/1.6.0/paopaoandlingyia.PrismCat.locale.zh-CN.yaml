PackageIdentifier: paopaoandlingyia.PrismCat
PackageVersion: 1.6.0
PackageLocale: zh-CN
ShortDescription: 一款面向大语言模型 API 的自托管透明代理与调试控制台。
Description: PrismCat 是一款可自行部署的、面向大语言模型 API 的透明代理与调试控制台。只需修改一行代码——你的 base_url（基础请求地址），即可即时查看你的应用与 OpenAI/Claude/Gemini/Ollama 等任意大语言模型 API 之间的所有请求和响应，包括流式传输（SSE）内容。
Tags:
- 人工智能
- 代理
- 大语言模型
- 聊天机器人
ReleaseNotes: |-
  v1.6.0 让 PrismCat 更适合长期部署和日常使用，新增控制台登录保护、日志标记能力、资源/存储占用查看，以及应用内检查更新。
  - 新增控制台登录与初次密码设置，保护日志、配置和调试界面
  - 改进服务器 / Docker 部署场景下的 UI、API 与代理路由处理
  - 新增日志保存、处理状态、备注和标签能力，便于后续追踪重要请求
  - 改进日志内容加载，支持更稳定地查看大请求 / 大响应内容
  - 优化日志详情布局和交互体验
  - 改进 Playground 重放能力，支持从历史日志更方便地构造调试请求
  - 新增设置页资源占用面板，可查看进程 CPU、内存、运行时间和系统内存
  - 新增手动存储占用统计，可查看数据库、Blob 文件和总占用大小
  - 新增应用内检查更新，可查看最新版本并跳转下载对应平台构建
  - Release 二进制文件名现在包含版本号，例如 prismcat-v1.6.0-linux-amd64
