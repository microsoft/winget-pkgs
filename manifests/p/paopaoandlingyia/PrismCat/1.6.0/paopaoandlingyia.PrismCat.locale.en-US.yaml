ReleaseNotes: |-
  v1.6.0 makes PrismCat better for long-running local, server, and Docker deployments with console authentication, log annotations, resource/storage visibility, and in-app update checks.
  - Added console login and first-time password setup to protect logs, settings, and debugging tools
  - Improved UI/API/proxy routing for server and Docker deployment scenarios
  - Added log annotations, including saved state, review status, notes, and labels
  - Improved large log content loading for request and response bodies
  - Refined the log detail layout and interaction flow
  - Improved the replay Playground for debugging requests from historical logs
  - Added a resource usage panel showing process CPU, memory, uptime, and system memory
  - Added manual storage usage calculation for database files, Blob files, and total storage size
  - Added in-app update checks with links to the latest release and matching platform asset
  - Release binary assets now include the version in their filename, e.g. prismcat-v1.6.0-linux-amd64
  Full Changelog: https://github.com/paopaoandlingyia/PrismCat/compare/v1.5.0...v1.6.0
