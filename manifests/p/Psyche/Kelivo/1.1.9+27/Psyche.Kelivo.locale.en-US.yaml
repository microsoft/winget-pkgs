ReleaseNotes: |-
  What's Changed
  - feat: Add context compression feature with customizable model and prompt.
  - feat: Add global search mode for conversations.
  - feat: Add S3 backup support.
  - feat: Add support for DashScope built-in search and reasoning tools.
  - feat: Add custom API URL support for Exa and Tavily search services.
  - feat: Add support for Google Vertex AI Claude models and Claude 4.6 adaptive thinking.
  - feat: Add support for GPT-5 series models and reasoning levels.
  - feat: Add support for Moonshot Kimi thinking models and kimi-k2.5 reasoning echo.
  - feat: Add support for multimodal LongCat Omni models.
  - feat: Add reordering support for World Books and entries.
  - feat: Add setting to toggle Markdown rendering for assistant messages.
  - feat: Add "Show Provider" option to chat messages.
  - feat: Add assistant name and avatar display options for chat titles.
  - feat: Add confirmation dialogs for message regeneration and topic deletion.
  - feat: Add log management settings and auto-cleanup.
  - feat: Add customizable summary refresh frequency for assistants.
  - feat: Increase maximum context message size to 1024.
  - feat: Add scroll-to-bottom button in mini map.
  - refactor: Improve chat auto-scroll.
  - refactor: Improve citation display with card-style search results.
  - perf: Optimize frosted chat bubble rendering performance.
  - perf: Optimize backup and restore memory usage.
  - fix: Fix several other known bugs.
  Full Changelog: https://github.com/Chevey339/kelivo/compare/v1.1.8...v1.1.9
