ReleaseNotes: |-
  * Improvements

  - Databases update
  - Optimizers, Huawei: updated max power for MERC1100 and MERC1300 optimizers
  - Shadings: diffuse shading factor tables are stored to avoid recalculation.

  * Corrections

  - Backtracking: custom reference for backtracking parameters now marks the main tracker in green and the secondary tracker in orange
  - Bifacial: corrected the weighted averages of intermediate results for backside irradiances. This impacts cases where multiple sub-arrays or orientations have bifacial models.
