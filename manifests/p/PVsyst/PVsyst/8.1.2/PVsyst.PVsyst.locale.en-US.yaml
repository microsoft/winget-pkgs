ReleaseNotes: |-
  ** Improvements

  - Bifacial: ground albedo can now be defined from a CSV file containing a time series
  - Project: improved message handling in the main project form to display project settings and variant messages
  - Storage: updated battery model, allowing for a more consistent energy balance tracking (*).

  ** Corrections

  - 3D scene: object selection is now correctly synchronized between the object tree and group editor
  - Economic evaluation: action icons in the "Investment and Costs" tab are visible again
  - Horizon: fixed incorrect azimuth handling in Meteonorm horizon import
  - Import Time Series: loading certain types of time series no longer causes crashes
  - Optimizers: fixed issue that could attribute the full inverter power to each string when the inverter was modified and saved after the system was designed
  - Optimizers, SolarEdge: systems with two sub-arrays, one with SolarEdge optimizers and one without, no longer cause crashes
  - Report: added an alternative rendering mode in settings to work around a crash caused by AMD Adrenalin GPU drivers on large scenes when printing the 3D scene
  - Standalone simulation: fixed issue triggering the backup generator when the battery SOC was high
  - Storage, power shifting: charging power is now correctly taken into account when the units are displayed in MW
  - Weather data, custom file: added validation for variable column assignments to prevent potential crashes.

  (*) More detailed information are available in PVsyst Forum (topic "Announcements - main changes - PVsyst 8.1.2").
