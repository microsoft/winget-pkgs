ReleaseNotes: |-
  - Improvement: Cleaner "Explorer Menu" submenu, with duplicate entries from other shell extensions removed
  - Improvement: Pane splitters in text comparison and merge now resize panes live while dragging when Windows' "Show window contents while dragging" setting is on, instead of only after releasing the mouse
  - Fix: ExamDiff Pro context menu did not appear in Total Commander, Everything, and other third-party file managers on Windows 11
  - Fix: Line Inspector could show a stray gray square when first displayed in merge mode
  - Fix: In directory comparison, the color codes bar was slightly misaligned with the scrollbar at the bottom of long lists
