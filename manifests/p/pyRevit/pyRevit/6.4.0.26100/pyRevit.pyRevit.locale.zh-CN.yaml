PackageIdentifier: pyRevit.pyRevit
PackageVersion: 6.4.0.26100
PackageLocale: zh-CN
ShortDescription: 面向 Autodesk Revit® 的快速应用程序开发（RAD）环境，为 Revit 高级用户和开发者提供自动化工具、脚本支持以及可扩展的工作流。
Description: |-
  pyRevit 助您在 Revit 环境及其 API 中，以您最熟悉的语言快速构思自动化与插件创意。它还附带一套功能强大的工具集，充分展现其作为开发环境的卓越能力。下载并安装 pyRevit，启动 Revit，即可看到新增的 pyRevit 选项卡，其中包含这些工具。此外，pyRevit 还提供便捷的命令行工具（CLI），用于自定义配置和部署您的工具，以及遥测服务器，以便监控团队内 pyRevit 的使用情况。

  pyRevit 可帮助您：
  - 为您的 Revit 工作流程增添一套强大的免费工具。
  - 使用 Python 快速勾勒自动化创意。
  - 使用 Python（IronPython 或 CPython）、C#、VB.NET 编写自己的 Revit 插件。
  - 通过统一界面轻松将您的工具（pyRevit、Dynamo 或 Grasshopper）分发给团队。
  - 与社区共享您的工具。
