ReleaseNotes: |-
  【赛季】2026S1 赛季“共游韶光”将于 3 月 6 日 16:00 正式开启！本赛季极大优化各分段玩家反馈的匹配体验问题，新赛季平台也将加入更多练习玩法，更有针对性帮助新手玩家及老手玩家提升游戏实力，平台将继续努力提供更好的竞技体验！

  【活动】CS 国服 X 完美平台全新推出“国服战令”，前往平台活动页 -“S1 国服战令 · 上”参与活动！
  - 您的每次国服开箱都将获得平台丰富道具收益！
  - 大会员、改名卡、双倍卡助力天梯冲刺！
  - 关注平台提醒，国服将限时放出限量武器箱兑换，即换即得！
  - 多倍概率 Roll 房，更高高概率 Roll 中千元饰品！

  【新增】天梯匹配机制：段位置信度系统实装，玩家将获得不会随赛季重置的隐藏分，并根据当前段位的置信度影响匹配，减少高实力玩家碾压局的概率；
  【新增】天梯匹配机制：新增连胜/连续高表现的上分加速功能，玩家将会在表现优异时更快速达到自己真实实力所在段位，减少上分过程的“炸鱼”比赛；
  【新增】道具训练模式迎来新纪元，平台联动多位道具主播\up 主共同录制一系列 CS 最新道具。同时道具训练模式新增游戏内投掷教学回放、投掷点位展示、效果展示、爆弹细节文字描述和语音讲解，大神主播帮您解读更多职业道具投掷/控图思路，做到真正的保姆级教学！你可通过平台赛前准备中查看截图进行学习，也可直接启动游戏直达点位身临其境进行学习；
  在此感谢 Tatukuun、伊莱文 CS2 以及小天 Freezing 的辛苦付出٩(๑´3｀๑)۶

  【优化】跑图模式新增指令墙、道具全屏跟镜以及智能预览视角功能；
  【优化】修复部分场景投票未弹出等异常场景；
  【优化】绿色认证算法优化，提升审核准确性；

  【反作弊】新增封禁反馈报告，可视化向各位玩家汇报反作弊系统封禁后追查结果，欢迎各位玩家持续监督完美反作弊工作～
