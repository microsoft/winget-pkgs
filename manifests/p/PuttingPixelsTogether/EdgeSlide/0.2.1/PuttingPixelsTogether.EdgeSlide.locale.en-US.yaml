ShortDescription: Turn your Precision Touchpad's left and right edges into brightness and volume sliders.
Description: |-
  EdgeSlide is a tiny Windows system-tray utility that turns the left and right edge
  strips of a Precision Touchpad into continuous sliders: slide the left edge to change
  screen brightness and the right edge to change master volume. It is single-finger only,
  so normal two-finger scrolling and other gestures pass through untouched, and it ignores
  edge touches while you are typing. It runs from the system tray with no main window.
