ReleaseNotes: |-
  Largely a bug-fix release: three audit passes over the whole app polished up many of the rough edges that had crept in across GUARD's development, alongside a few additions that round out existing features.
  Sturdier day to day
  - Several ways GUARD could crash or lock up are gone: a settings save that fails (for example, GUARD run from a read-only folder) now shows an error instead of crashing, double-clicking Run Now can no longer start two backups at once, a failed folder picker no longer takes the app down, and an error during a reinstall or settings restore no longer leaves the App Management buttons disabled for the rest of the session.
  - A hung winget or PowerShell no longer pins its page for the whole session (a scan stuck on "Scanning...", a save that never finished): background helpers now have a hard deadline and are stopped and reported when they exceed it.
  - Save Settings now blocks setups that could never produce a good backup: Mirror-mode folders that share or nest their destination subfolders (each run purged the other's files), and a fully-unticked folder list that would "succeed" while copying nothing.
  - Settings files, generated scripts, and app-list exports are written crash-safe, so a crash or power cut mid-save can no longer leave a truncated file behind.
  - Only one backup runs at a time: a scheduled run firing during an in-app run (or vice versa) now skips cleanly instead of interleaving two passes over the same log, and a second GUARD.exe launched from the same folder brings the open window to the front instead of running twice.
  - Elevated actions (System Image, Recovery Media, task registration) are more reliable and safer: the script now travels inside the PowerShell command rather than through a temp file, fixing corrupted non-ASCII account and install paths and closing a brief tampering window; an apostrophe in GUARD's folder path no longer breaks Create Image Now.
  - A moved or renamed GUARD folder no longer silently breaks scheduled backups: the tasks re-register against the new location at the next launch or save.
  - Skipping an offered update now really skips it: it also cancels a copy that auto-install had already staged, and each portable copy of GUARD stages updates in its own folder so two copies can no longer apply each other's update. An update also now refuses to install when the release lacks its SHA256SUMS checksum file.
  Quieter and more honest
  - Scheduled and on-connect backups now run with no visible window: the on-connect check (every 15 minutes) no longer flashes a console while you are signed in. Existing tasks migrate automatically.
  - The backup size estimate now honours exclusions, so large excluded trees (like node_modules) no longer trigger false "space may be too low" warnings, and Preview writes its own log instead of overwriting the real backup log.
  - The app scan is more truthful: Microsoft Store apps are labelled "Store" instead of "Winget", apps whose names winget truncated no longer show up twice, and the scan now works on localized (non-English) Windows, where every app was previously reported as "Manual".
  - Fresh installs no longer pre-tick the "Developer folders" exclusion preset, whose folder names ("bin" especially) can carry real user data.
  Screen-reader polish
  - Toggling a checkbox or radio button with its Alt access key is now announced by NVDA: the access key toggled the control without moving focus to it, so every access-keyed toggle now moves focus first.
  - Keyboard focus starts on the navigation at launch instead of the empty pane, so a screen-reader user is no longer left on "GUARD, pane" needing an extra Tab.
  - Silent status repaints from a background page no longer disturb the active page's announcements, which could re-announce an unchanged status or drop a changed one.
  New in this release
  - GUARD can now install winget itself on PCs that lack it (LTSC, Server editions, or no Microsoft Store): an "Install winget" notice appears when the app scan finds it missing (Ctrl+I), the Settings page has the same button, and reinstalling from a saved list offers it first. GUARD sideloads Microsoft's signed App Installer package; no Administrator approval needed, and Windows verifies the signature.
  - Backup health in the status bar: the File Backup and System Image pages now report how and when the last run ended (for example "Last backup succeeded yesterday at 02:00"), with an amber status dot when the last run failed, a scheduled run is overdue, or an on-connect backup has not run in over a week.
  - Windows toast notifications for unattended backups: failures notify by default, successes are opt-in (Settings > Notifications). Runs started from inside GUARD stay silent.
  - The backup destination now follows its drive if the letter changes: saving records the volume's serial number and the generated script re-finds the drive by serial at run time.
  - Update All Apps on the App Management page runs winget upgrade --all with one upfront Administrator approval, so all-user and Store-delivered packages (like WSL) can update too.
  - Ctrl+1 to Ctrl+4 switch pages from anywhere in the window, and a new List Images button shows the existing system images on a destination.
  - The offline manual now ships as a styled USER_GUIDE.html that follows light/dark mode, so Help (F1) opens it in the browser instead of a "how do you want to open this file?" prompt.
  These notes are the highlights; the complete list of additions, changes and fixes is in the changelog.
  Install: download GUARD.zip below, extract, and run GUARD.exe; or winget install PlanetLinux98.GUARD. Requires Windows 10 version 1809 or later. Existing installs can update from the in-app update notice.
