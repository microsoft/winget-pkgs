ShortDescription: A portable, screen-reader-first backup, system-imaging and app-inventory utility for Windows that requires no installation.
Description: |-
  GUARD is a portable, fully accessible backup and data-protection utility for Windows. It backs up your chosen folders to any destination (a local drive, an external disk, or a network share), creates full bare-metal system images with Windows' built-in wbadmin, and keeps an inventory of your installed apps so they are easy to reinstall after a clean OS install - optionally with their settings.

  The release ships as a self-contained portable folder with the .NET 10 runtime and Windows App SDK bundled in, so there is nothing to install. GUARD is built screen-reader-first, with native dark-mode theming, and keeps itself current with a built-in checksum-verified updater.

  Features include additive and mirror copy modes (built on Robocopy), one-tick and custom exclusions, dated backup versions with pruning, a dry-run preview, scheduled and run-on-connect backups, scheduled or on-demand system images with a recovery-media wizard, and app-list export/reinstall through winget.
