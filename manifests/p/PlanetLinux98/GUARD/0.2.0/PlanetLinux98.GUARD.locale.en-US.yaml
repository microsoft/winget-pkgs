ShortDescription: A portable, self-contained backup and data-protection utility for Windows that requires no installation.
Description: |-
  GUARD is a portable, fully accessible backup and data-protection utility for Windows. It backs up your chosen folders to any destination — a local drive, an external disk, or a network share — and keeps an inventory of your installed apps so they are easy to reinstall after a clean OS install.

  The release ships as a self-contained GUARD.exe inside a portable folder, with the .NET 10 runtime and Windows App SDK bundled in, so there is nothing extra to install. This WinUI 3 edition is built for strong screen-reader support and native dark-mode theming.

  Features include additive and mirror copy modes (built on Robocopy), folder- and file-name exclusions, a dry-run preview, an optional daily scheduled backup, and an App Inventory that marks which installed apps winget can reinstall and exports the list as JSON.
