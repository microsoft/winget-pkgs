ReleaseNotes: |-
  Taking the hassle out of PC maintenance
  - Recycle Bin shortcuts We've added two new options to your Recycle Bin right-click menu: clean your Recycle Bin instantly or launch a Custom Clean analysis - without opening CCleaner first.
  - Smoother browser handling during cleaning Browsers now close gracefully when CCleaner needs to clean browser data, so you won't see "browser did not close properly" errors anymore.
  - Scheduled Health Check now respects your exclusions We fixed an issue where scheduled Health Check cleans could delete temporary files you'd excluded. Your exclusions are now honored in every cleaning mode.
  Expanding our cleaning
  - Google Mail cleaning in Cloud Drive Cleaner You can now clean your Google Mail directly from Cloud Drive Cleaner. Free up space in your Gmail account alongside your other cloud storage.
  Helping you to keep your PC running fast and smooth
  - Menu badges for updates and optimizations Software Updater, Driver Updater, and Performance Optimizer now show badges with the number of available actions, so you can see at a glance what needs attention.
  - Sort drivers by date Driver Updater now lets you sort by Released date and Installed date, and tables are sorted by date automatically when you open them.
  Keeping you safe
  - Stronger scheduling security We've strengthened the security of our scheduling system to ensure scheduled tasks can only be managed by the account that created them.
  Fixing bugs
  - Software Updater accessibility improvements Tabs and sortable column headers now have proper hover and focus styles for easier keyboard and mouse navigation.
  - Health Check tables now sort by size Health Check results are now sorted by size (largest first) by default, making it easier to spot what's taking up the most space.
  - Consistent terminology in Uninstaller We've unified the label from "Space" to "Size" throughout the Uninstaller for a clearer, more consistent experience.
  - Fixed app window appearing off-screen If your monitor setup changes, CCleaner now resets its window to the center of your screen instead of opening where you can't see it.
  - Fixed Driver Updater getting stuck after cancellation Resolved an issue where canceling a driver update could cause Driver Updater to stop offering that update entirely.
  - Fixed a Performance Optimizer crash We resolved a rare crash that could occur in Performance Optimizer during scanning.
  - Fixed French localization in Driver Updater The French version of Driver Updater now correctly says "Searching for outdated drivers" instead of "Searching for outdated software."
  - Fixed notification overlap during shutdown Promotional offers no longer appear on top of the shutdown-after-clean confirmation dialog.
  - Other stability and reliability improvements We've fixed several additional issues to make CCleaner more stable and accurate across the board.
