ReleaseNotes: |-
  PixPin 3.1 在 3.0 的基础上带来了更多实用功能与体验优化
  3.1.4.0 更新说明
  【设置】增加贴图取消置顶时是否显示任务栏图标的设置
  【修复】标注时无法使用 ctrl+滚轮调整透明度
  【修复】长截图标记输入文本的时候可能会有文本光标残留
  【修复】保存文件路径时 title 变量不生效
  【修复】MacOS 在长截图编辑界面闪退
  【修复】从截图进入长截图时会有放大镜干扰
  3.1.3.1 更新说明
  【优化】减少截图时开启截图音效的卡顿
  【优化】保存对话框新增“同名覆盖”确认弹窗，避免误操作导致的文件覆盖
  【修复】旧版本 MacOS 的兼容问题，现支持 MacOS10.15 及以上版本
  【修复】会员配置界面的设备管理信息显示不全
  【修复】保存对话框中的质量设置没有保存到配置中
  【修复】标注工具栏恢复默认配置时丢失自动马赛克图标
  【修复】鼠标穿透工具栏移出屏幕后导致无法移回来
  【修复】序号标注的箭头样式不再跟随序号主体样式变化，而是统一按固定箭头样式绘制
  【修复】刷新截图后，放大镜内容不跟随更新
  【修复】视频录制回放时鼠标移动到屏幕右边会消失
  【修复】在编辑长截图时复制图像会有标注控制点残留
  3.1.0.6 更新说明
  功能
  【标注】增加自动马赛克标注工具
  【贴图】贴图菜单增加鼠标穿透，可在配置-快捷键/动作，设置开启/关闭鼠标穿透快捷键
  【贴图】可以在贴图上按下 Tab 将焦点转移到另一个贴图
  【贴图】增加默认置顶或者不置顶的设置，配置-贴图-贴图窗口置顶
  【录制】增加快速录制模式，大大提高导出速度
  【聚光灯】Ctrl+滚轮可以调整聚光灯描边
  【MacOS】MacOS 也支持文件贴图了
  【翻译】翻译对话框可选择是否显示原文
  【会员】增加多种工业条码识别功能，包括但不限于 Code128，EAN13，UPCA，Code39，DataMatrix，PDF417
  【会员】自动马赛克可以设置同步操作，开启后可以对相同内容同时增加/删除马赛克
  优化
  【截图】在开启圆角截图时，鼠标移动到截图区域的角点附近会出现圆角控制点
  【贴图】现在在 VSCode 上复制的文件也能贴图了
  【贴图】在贴图没有置顶的时候，会在任务栏显示图标
  【标注】序列号标注增加手动设置序号
  【录屏】延时截图/录制的时候会有明确的倒计时指示
  【录屏】优化快速播放时的声音效果
  【保存】新版保存对话框在弹出时焦点默认在文件名上，可快速修改后按下回车保存
  【保存】保存对话框的路径标签增加编辑按钮
  【二维码】优化二维码识别的体验
  【会员】MacOS 系统的翻译快捷键修改为 Option+Q
  【会员】提高表格识别的准确性
  修复
  【截图】截图区域较小情况下，刷新截图按钮与其他按钮重叠
  【截图】识别文字时快速按下复制键会导致复制失败
  【截图】无法从左上角开始截图
  【截图】历史截图无法撤销标注
  【截图】长按刷新截图按钮时图标没有稳定居中旋转
  【贴图】文字贴图在某些场景下会看不到文字
  【贴图】连续关闭贴图的时候焦点转移到其他窗口
  【标注】配置中"删除序列号时修改其他项"功能不生效
  【标注】配置中橡皮擦启用二次编辑无效
  【标注】矩形标注中旋转矩形会有大量锯齿
  【录屏】录制暂停后开始会丢失暂停前的键盘录制
  【长截图】长截图无法调整选区
  【配置】某些场景下配置没有保存
  【悬浮球】悬浮工具栏移动位置后一段时间返回了主屏幕中间上方
