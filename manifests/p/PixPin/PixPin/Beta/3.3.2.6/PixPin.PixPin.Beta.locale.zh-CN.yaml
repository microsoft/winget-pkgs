ReleaseNotes: |-
  3.3.2.6
  【修复】文本标注打字后会卡住未响应
  【修复】Macos27 版本点击托盘图标会导致程序崩溃
  【修复】重置密码的界面无法使用
  【修复】点击“使用经典对话框”后重启程序会导致选项失效
  3.3.1.7
  PixPin 3.3 优化了截图、贴图、文字识别等功能的使用体验，并增加了会员功能表格识别的预览编辑和打印支持。
  【文字识别】优化文字识别的准确率和流畅性
  【文字识别】排版菜单增加去除空格选项
  【悬浮球】悬浮球右键菜单可设置悬浮球在哪个程序上隐藏
  【快捷键】快捷键支持设置全局的忽略列表：在指定进程下所有热键将不被触发
  【贴图】缩略图模式下支持 shift+滚轮 上下滑动
  【MacOS】截图和贴图支持隔空投送
  【修复】隐藏/显示所有贴图后，贴图的堆叠顺序错乱
  【修复】在贴图上选中文本后再复制贴图，复制的图像会有选中的痕迹
  【修复】编辑工具栏无法使用 ESC 退出
  【修复】某些场景下文本标注的字体列表下拉框会被遮挡
  【设置】「外观」-「工具栏图标大小」可设置工具栏的图标大小
  【修复】录制选择不同画质会导致实际编码的帧数错误
  【修复】开始录制时系统麦克风音量会错误设置到 100
  【修复】无法设置 menu 为快捷键
  【优化】关闭当前显示器后显示器上的贴图会自动移动到其他显示器上
  【优化】截图时选框切换增加动画（可在「设置」-「外观」关闭）
  【优化】颜色选择器会记住上次选择的颜色格式
  【优化】“贴图当前选择文件”功能支持 QDir
  会员功能
  【翻译】翻译窗口支持修改源文后重新翻译
  【翻译】翻译窗口支持指定源语言
  【公式识别】公式识别现在会自动删除空格，提升识别结果的可用性
  【表格识别】支持在表格识别窗口预览和编辑识别结果
  【表格识别】支持复制然后粘贴到 Excel
  【表格识别】增加打印支持
  【表格识别】MacOS 系统可以隔空投送
