ReleaseNotes: |-
  3.4.2.1
  功能
  -【文字识别】识别窗口增加自动关闭设置，可分别选择在“复制全部文本”和“复制选中文本”后自动关闭窗口
  设置
  -【全局鼠标】macOS 默认快捷键调整为空，避免与其他软件的快捷键冲突
  优化
  -【截图】优化 macOS 截图选区切换动画的性能
  -【文字识别】优化倾斜文字的识别效果
  -【贴图】优化 macOS 关闭或销毁贴图时的显示效果
  修复
  -【贴图】修复 macOS 在某些情况下文本选中位置错位的问题
  -【文字识别/公式识别】修复 macOS 上识别窗口无法拖动的问题
  -【长截图】修复无法直接通过快捷键将长截图贴图的问题
  -【朗读】修复 macOS 上朗读功能不生效的问题
  -【导出/导入】修复“不加粗非默认配置项”对内置快捷键不生效的问题
  -【文字识别】修复在某些情况下识别结果排版异常的问题
  -【悬浮球】修复全屏隐藏在某些软件中失效的问题
  会员功能
  -【表格识别】修复部分表格识别结果错误的问题
  -【翻译】修复 macOS 上“图片到图片”翻译模式的结果显示异常问题
