ReleaseNotes: |-
  3.4.1.3
  功能
  -【系统】软件崩溃后支持自动重启
  -【长截图】编辑界面支持删除选定区块
  -【快速录制】支持选择录制画质
  -【录制】摄像头画面支持旋转和镜像
  -【录制】关闭录制工具栏时增加确认弹窗
  -【截图】增加相对坐标显示，按 P 可切换显示
  -【长截图】工具栏增加文字识别按钮
  -【长截图】增加部分快捷键支持，可在内置快捷键中修改
  -【贴图】文本菜单增加删除线样式
  -【标注】自动马赛克状态下支持双击空白区域复制并关闭
  -【悬浮球】悬浮球颜色可跟随外观设置
  -【悬浮球】支持设置悬浮球透明度
  -【窗口】各个窗口增加最小化按钮
  -【标注】鼠标位于线条样式等区域时，支持通过滚轮切换样式
  -【录制】回放预览时切换窗口增加 PixPin 图标（macOS）
  -【标注】增加更多箭头样式
  设置
  -【截图】「配置」-「截图」增加“点击选区外时自动扩展选区”选项
  -【标注】「配置」-「标注」-「序号」增加“序号默认从 0 开始”选项
  -【导出/导入】增加“不要加粗非默认配置项”选项
  -【保存】增加图片格式列表选择
  -【脚本】增加“截取当前窗口并复制”预设
  优化
  -【保存】现代保存对话框的保存格式与配置保持同步
  -【标注】文字标注输入时自动隐藏四角菜单
  -【GIF】原始画质导出时增加抖动效果，改善渐变色彩过渡表现
  -【贴图】“贴图当前选择文件”功能适配 Directory Opus
  修复
  -【贴图】修复按下默认快捷键 0 时，未能重置所有贴图的问题
  -【macOS】修复隔空投送图标显示错误的问题
  -【稳定性】修复部分可能导致软件崩溃的问题
  -【标注】修复复制、移动相关快捷键功能缺失的问题
  -【录制】修复回放预览的进度条颜色设置未生效的问题
  -【颜色】修复使用滚轮调整透明度后未正确应用的问题
  -【macOS】修复截图卡顿的问题
  -【长截图】修复 Windows 10 系统某些版本可能出现黑色区块的问题
  -【保存】修复更改图片保存路径时未补充默认文件名，导致 Windows 因文件名为空无法保存的问题
  会员功能
  -【公式识别】支持复制为 Typst 和 AsciiMath 代码
  -【公式识别】增加行内公式、块级公式、带编号公式等 LaTeX 格式选择
  -【公式识别】支持移除空格
  -【公式识别】支持单窗口模式，新识别的公式可替换原公式窗口
  -【表格识别】增加识别结果格式选择
  -【翻译/表格识别】优化识别失败时的界面显示
  -【翻译】修复源语言将繁体中文识别为简体中文的问题
