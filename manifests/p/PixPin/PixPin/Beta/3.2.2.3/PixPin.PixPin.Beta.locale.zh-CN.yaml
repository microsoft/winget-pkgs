ReleaseNotes: |-
  PixPin 3.2 增加了超长截图模式，多选贴图增加了对齐功能，屏幕录制增加了 30FPS 的选项，还增加了许多配置选项，帮助用户打造一个更适合自己的截图工具，同时也修复了许多已知的 bug。
  3.2.2.3
  【配置】「标注」-「水印」-「截图时自动添加水印」
  【配置】保存变量增加时间戳，包括秒级和毫秒级两种格式
  【配置】「保存」-「快速保存」-「通知按钮：定位文件/复制文件/复制路径」
  【修复】 无法隐藏截图工具栏的“...”按钮
  【优化】视频回放窗口不再置顶
  【优化】在配置的保存页面可以查看当前支持的保存变量列表和说明
  【修复】录屏导出为 webp 可能会出现卡顿
  【修复】关闭截图时会误触发记录历史截图
  【修复】长截图预览窗位置不正确
  【修复】鼠标动画速率过低
  【修复】截图「未选区域颜色」没有在长截图中生效
  【会员】鼠标动画可以设置速率
  3.2.1.3
  【长截图】增加超出截图模式，最大可支持截取 200 万像素长度的图片
  【屏幕录制】增加 30FPS 的录制选项
  【贴图】多选贴图后可以右键菜单选择“自动对齐”功能
  【贴图】现在隐藏/显示贴图窗口时会记住相贴图的层级
  【标注】水印增加居中显示选项
  【标注】箭头文本增加方向和文字背景颜色的配置选项
  【标注】文字标注增加箭头
  【保存】MacOS 图像保存界面增加支持触摸板双指缩放的功能
  【配置】「贴图」-「启用鼠标穿透时显示工具栏」
  【配置】「标注」-「箭头」-「双击箭头不出现评论」
  【配置】「系统」-「文本识别」-「语言」-增加轻量简体中文模型选项，此选项会提高识别速度但可能会降低识别准确率
  【配置】「截图」-「元素检测边距」
  【配置】「标注」-「快速标注内边距」
  【配置】自动保存增加保存类型选项，可以设置自动保存的时机
  【配置】「动作/快捷键」-增加“清除所有快捷键”按钮
  【配置】账号页面可以隐藏个人信息
  【配置】「截图」-「平滑缩放显示放大镜内容」
  【配置】增加识别二维码并复制的预设动作
  【配置】「截图」-「二维码检测模式」增加直接显示内容的选项
  【配置】「标注」-「自动马赛克」-「自动处理隐私马赛克」
  【优化】悬浮球可以收缩一半至屏幕边缘，以免阻挡屏幕
  【优化】设置贴图透明度之后，保存和复制的图片也会带上透明度
  【优化】适配录制移动窗口时边框会变细以避免边框被录进画面中
  【优化】快速录制在保存时默认路径改为上一次保存路径
  【会员】屏幕录制时可以画中画的形式录制摄像头
  【会员】保存为 PDF 增加页边距
  【会员】保存为 PDF 增加分页选项
  【会员】支持翻译为“印尼文”、“马来文”、“意大利文”、“俄罗斯文”、“泰文”、“越南文”、“阿拉伯文”、“土耳其文”八种语言类型
  【修复】录制编码点击最小化后无法重新打开界面
  【修复】在录制视频回放的时候无法调用截图功能
  【修复】二维码识别无法复制部分内容
  【修复】切换贴图组时缩略图重新展开后内容位置异常
  【修复】MacOS 配置界面中图标在高 DPR 显示屏上模糊
  【修复】设置快捷键时 ui 显示异常
  【修复】Opacity 的翻译不正确
