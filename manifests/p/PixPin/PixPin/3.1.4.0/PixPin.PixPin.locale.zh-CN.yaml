ReleaseNotes: |-
  3.1.4.0
  PixPin 3.1 正式版重点加入了自动马赛克、贴图鼠标穿透、快速录制、工业条码识别等能力，适合经常做信息打码、需要连续处理多张贴图、想更快导出录屏内容，或需要识别快递单、商品码、设备标签等场景的用户。除此之外，保存、翻译、截图和 macOS 体验也同步补充了一批更顺手的更新。
  功能
  -【标注】自动马赛克标注工具
  -【贴图】贴图鼠标穿透
  -【录制】快速录制模式
  -【会员】工业条码识别能力
  -【贴图】在贴图上按下 Tab，可将焦点快速切换到另一张贴图
  -【贴图】现在在 VS Code 上复制的文件也能贴图了
  -【标注】自动马赛克支持同步操作，可对相同内容同时增加或删除马赛克
  -【翻译】翻译对话框可选择是否显示原文
  -【MacOS】MacOS 也支持文件贴图了
  -【聚光灯】Ctrl + 滚轮可以调整聚光灯描边
  设置
  -【贴图】增加贴图默认置顶或不置顶的设置，配置 - 贴图 - 贴图窗口置顶
  -【贴图】支持在贴图非置顶时显示任务栏图标，并新增对应显示设置，配置 - 贴图 - 贴图取消置顶时显示任务栏图标
  优化
  -【标注】序列号标注增加手动设置序号
  -【录制】延时截图或录制时会有明确的倒计时指示
  -【录制】优化快速播放时的声音效果
  -【截图】减少截图时开启截图音效的卡顿
  -【保存】新版保存对话框在弹出时焦点默认位于文件名上，可快速修改后按下回车保存
  -【保存】保存对话框的路径标签增加编辑按钮
  -【保存】新增“同名覆盖”确认弹窗，避免误操作导致文件被覆盖
  -【翻译】MacOS 系统的翻译快捷键调整为 Option + Q
  -【表格识别】提高表格识别的准确性
  -【识别】优化二维码识别的体验
  -【截图】在开启圆角截图时，鼠标移动到截图区域的角点附近会出现圆角控制点
