ShortDescription: A modern, native Windows port of the GNOME Papers document viewer for PDFs, DjVu, Comic Books, and TIFFs.
Description: 'GNOME Papers is a modern document viewer designed for the GNOME desktop environment, now ported natively to Windows. It supports viewing multiple document formats, including PDF, DjVu, TIFF, and Comic Book Archives (CBR/CBZ). Features: - Native Windows Integration: Compiled natively using the UCRT64 toolchain. - Platform Abstraction Layer: Custom Win32 platform integration for smooth gestures, scroll adjustments, and window rendering. - File Associations: Automatically registers with Windows Default Apps for seamless double-click opening. - Suppressed Console: Launches directly as a native GUI application without command prompt windows. - Self-Contained: Includes all necessary GTK4, Libadwaita, Poppler, and icon assets.'
