ReleaseNotes: |-
  错误修复
  - 修复在支持 IP Range Ban 能力的下载器上，处理 IPV4-Mapped-IPV6 地址 (如 ::ffff:223.5.5.5) 存在的多个问题，导致此类地址封禁失效的问题 @paulzzh @Ghost-chu
