  改进
  - 使用压缩 IPV6 地址进行存储，以节约占用的空间 @paulzzh @Ghost-chu
  - 默认禁用 Sentry SDK 的性能分析快照捕获，节约 CPU 和磁盘空间资源 @Ghost-chu
