ReleaseNotes: |-
  [!NOTE]
  有关近期卡巴斯基安全软件(Kaspersky)报告 VHO:Trojan.Win32.Convagent.gen 类型威胁的说明：
  经调查，此类报毒均来自 “启发式分析”，PBH-BTN 经过检查后已确认为误报，并反馈至 Kaspersky OpenTIP。在此版发布前，开发组已收到来自 Kaspersky AntiVirus Lab 的邮件回复，相关误报已经修复并解除。如果您遇到了类似情况，请您更新 Kaspersky 病毒库至最新版本即可解决。
  由于已被删除的文件负责 PBH 的版本自动更新部分，且即使更新病毒库文件也不会自动还原。因此需要您手动恢复从隔离区相关文件 (updater.exe) 才能恢复版本自动升级能力。覆盖安装/手动升级不会修复被删除的 updater.exe 文件。对于非卡巴斯基安全软件用户，不受此公告影响。
  错误修复
  - 修复 PostgreSQL 数据库驱动中在添加旧数据渐进数据删除时引入的 SQL 语法错误 @Ghost-chu
  - 修复 PostgreSQL 数据库驱动中 InetAddress 没有转换为 inet 类型而是 varchar 类型，导致出现 SQL 数据转换错误的问题 @Ghost-chu
  - 修复 RuleSubLog 特定情况下报告 SQL 异常的问题 @Ghost-chu
  - 修复 FreeBSD 软件包要求 JAVA_VERSION = 21 但实际需要 JAVA_VERSION = 25 的问题 @Ghost-chu
  默认值更改
  - 对于新安装的 PeerBanHelper 用户，拒绝服务攻击保护模块现在默认处于禁用状态 @Ghost-chu
  杂项
  - pnpm 升级 @Gaojianli @paulzzh
  - pnpm 构建错误修复 @paulzzh
