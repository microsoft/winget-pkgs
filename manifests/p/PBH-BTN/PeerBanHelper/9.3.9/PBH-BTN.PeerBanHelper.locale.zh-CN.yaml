  下载器兼容性
  - 支持 BitComet 的长效种子反吸血 @Ghost-chu
  优化
  - 优化 ProgressCheatBlocker 的进度回退检测算法，改善因网络不稳定，BIT_FIELD 包未来得及同步导致的误封禁问题。现在观察期设置也应用到进度回退功能上 @Ghost-chu
  错误修复
  - 从 v9.2 及更早版本迁移时可能遇到 SQL 主键冲突的问题导致表迁移失败 @Ghost-chu
  - 当请求的模块被禁用时，不要注册其路由；当请求的路由不存在或不可用时，返回标准错误响应，避免前端报错 @Ghost-chu
  - 优化了网络类型页面的文案，避免理解偏差导致用户误操作将所有网络类型全部封禁 @Gaojianli
  - 优化了 WebUI 被禁用的模块交互逻辑，现在被禁用的模块按钮将置灰 @Gaojianli
  - 修复已读单条警报发生的 SQL 查询错误 @paulzzh
  - 修复规则订阅的提示信息 @paulzzh
  其它
  - 整理翻译键 @paulzzh
