ShortDescription: Self-hosted bare-metal systems programming language and compiler
Description: KernRift is a self-hosted bare-metal systems programming language and compiler. It compiles to native x86_64 and ARM64 binaries for Linux, Windows, macOS, and Android. The compiler is written entirely in KernRift itself and produces ELF, PE, Mach-O, and fat binaries.
