ReleaseNotes: |-
  ## What's Changed

  - Ranked Play: Make cards draggable and reorderable by @minetoblend in #37157
  - Fix replay/spectator scroll text not toggling with Ctrl+H by @peppy in #37027
  - Fix song select dropdowns not being navigable with keyboard by @Joehuu in #37158
  - Fix multiplayer spectator player names being too small with new scrolling text by @peppy in #37164
  - Update room state on card played in TestMultiplayerClient by @LiquidPL in #37172
  - Implement background music for ranked play by @nekodex in #37166
  - Fix osu!mania editor not zooming playfield to match timeline by @peppy in #37176
  - Add "Synesthesia" mod for osu!catch ruleset by @Tenexxt in #37011
  - More tooling updates & fixes by @bdach in #37177
  - Adjust multiplayer logic to accommodate for referees spectating in-game by @bdach in #37152
  - Fix race condition in beatmap difficulty cache invalidation flow by @bdach in #37178
  - Fix ranked play test failures from adding null playlist items by @bdach in #37189
  - Assorted test deflaking by @bdach in #37191
  - Add osu! (Debug, Second Client) launch option for VS Code by @Tenexxt in #37197
  - Add SFX to ranked play results screen by @nekodex in #37193
  - Display beatmap state in RankedPlayUserDisplay by @LiquidPL in #37188
  - Add current stage overlay to ranked play by @LiquidPL in #37202

  ## New Contributors

  - @Tenexxt made their first contribution in #37011
