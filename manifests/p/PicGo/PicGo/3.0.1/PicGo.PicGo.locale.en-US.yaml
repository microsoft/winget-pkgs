ReleaseNotes: |-
  Features
  PicGo v3 is here! A brand-new UI, light & dark theme, built-in PicGo Cloud uploader (free tier on sign-up), cloud album management, and more major updates, along with a bunch of feature improvements and bug fixes!
  And we provide PicGo Skills — A new skill package for AI Agents to integrate with PicGo for uploading images and files! Enjoy!
  v3.0.1 brings i18n support for Japanese and Korean, title bar layout refinements, mini window fixes, and several UI polish improvements.
  - ✨ Japanese (ja) translation — Full Japanese translation for PicGo GUI with 593 keys. Switch to 日本語 in Settings > General > Language. (#1422)
  - ✨ Korean (ko) translation — Full Korean translation for PicGo GUI with 556 keys. Switch to 한국어 in Settings > General > Language. Thanks @moduvoice for the contribution! (#1420)
  image
  UI Improvements
  - Refine title bar layout: remove centered version text from the title bar and display it next to the sidebar logo instead (#1421)
  - Restore mini window toggle button (Shrink icon) in the Windows/Linux title bar controls (#1421)
  image
  - Improve tray window button styling: change "Open Main Window" from full-width bar to rounded pill button, fix white border in dark mode (#1416)
  image
  - Fix rename dialog vertical padding and button overflow issue (#1416)
  Bug Fixes
  - Fix: Mini window ignores startup HIDE mode on Linux — the mini window no longer shows unexpectedly when startup mode is set to "Hide" (#1417), Thanks @CtrlKismet for the contribution!
  - Fix: Mini window showing opaque corners on Windows by enabling window transparency (#1421)
  - Fix: File picker being triggered after dragging the mini window on Windows (#1421)
  - Fix: History panel date grouping using OS locale instead of the app's language setting (#1421)
  Features
  PicGo v3 来了！全新 UI、明暗主题、内置 PicGo Cloud 图床（注册即享免费额度）、云相册管理等重磅更新，还有一系列功能改进与问题修复！
  并且我们提供了 PicGo Skills — 一个给 AI agent 使用的 skills 技能包，方便你的 AI Agent 接入 PicGo 并上传图片、文件！
  v3.0.1 新增日语和韩语翻译、优化标题栏布局、修复迷你窗口相关问题，以及多项 UI 改进。
  - ✨ 日语翻译 — PicGo GUI 完整日语翻译（593 个 key）。在 设置 > 通用 > 语言 中切换到日本語即可使用。（#1422）
  - ✨ 韩语翻译 — PicGo GUI 完整韩语翻译（556 个 key）。在 设置 > 通用 > 语言 中切换到한국어即可使用。感谢 @niceplugin 的贡献！（#1420）
  image
  UI 优化
  - 优化标题栏布局：移除标题栏中央的版本号文字，改为在侧边栏 logo 旁显示（#1421）
  - 恢复 Windows/Linux 标题栏控制区域的迷你窗口切换按钮（Shrink 图标）（#1421）
  - 优化托盘窗口按钮样式：「打开主窗口」从全宽按钮改为圆角药丸按钮，修复暗色模式下的白色边框问题（#1416）
  image
  - 修复重命名弹窗的垂直间距和按钮溢出问题（#1416）
  Bug Fixes
  - 修复：Linux 下迷你窗口无视启动模式为「隐藏」的设置 — 迷你窗口不再在启动模式设为隐藏时意外显示（#1417），感谢 @CtrlKismet 的贡献！
  - 修复：Windows 下迷你窗口显示不透明圆角，通过启用窗口透明度解决（#1421）
  - 修复：Windows 下拖拽迷你窗口后会意外触发文件选择器（#1421）
  - 修复：历史面板的日期分组使用了系统区域设置而非应用语言设置（#1421）
