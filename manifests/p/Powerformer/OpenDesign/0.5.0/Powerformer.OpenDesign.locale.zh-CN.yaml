ShortDescription: Claude Design 的开源替代品。你现有的编程智能体 — Claude · Codex · Cursor · Gemini · OpenCode · Qwen — 可成为设计引擎，由 31 个可组合技能与 72 个品牌级设计系统驱动。
Description: |-
  Claude Design 的开源替代品。本地优先、可部署到 Vercel、每一层都 BYOK —— 16 套 coding-agent CLI 在 PATH 上自动检测（Claude Code, Codex, Devin for Terminal, Cursor Agent, Gemini CLI, OpenCode, Qwen, Qoder CLI, GitHub Copilot CLI, Hermes, Kimi, Pi, Kiro, Kilo, Mistral Vibe, DeepSeek TUI）就是设计引擎，由 31 个可组合 Skills 和 72 套品牌级 Design System 驱动。

  为什么要做这个
  Anthropic 的 Claude Design（2026-04-17 发布，基于 Opus 4.7）让大家第一次看到：当一个 LLM 不再写废话、开始直接交付设计成品，会是什么样子。它瞬间出圈 —— 然后保持闭源、付费、只跑在云上、绑定 Anthropic 的模型和 Anthropic 的内部 skill。没有 checkout，没有自托管，没有 Vercel 部署，也换不了自己的 agent。
  Open Design（OD）就是它的开源替代品。 同一套 loop、同一种「artifact-first」心智模型，但没有锁定。我们不做 agent —— 你笔记本上最强的 coding agent 已经装好了。我们要做的，是把它接进一个 skill 驱动的设计工作流：本地用 pnpm tools-dev 跑完整本地闭环，云端可单独部署 Web 层，每一层都 BYOK（自带 Key）。
  输入「帮我做一份杂志风的种子轮 pitch deck」。在模型挥洒第一个像素之前，初始化问题表单已经先跳出来。Agent 从 5 套精挑的视觉方向里选一个。一张活的 TodoWrite 计划卡片实时流入 UI。Daemon 在磁盘上构建出一个真实的项目目录，里面有 seed 模板、布局库、自检 checklist。Agent 强制 pre-flight 读取它们，对自己的输出跑一轮五维评审，几秒后吐出一个 <artifact>，渲染在沙盒 iframe 里。
  这不是「AI 试图做点设计」。这是一个被提示词栈训练得像高级设计师一样工作的 AI —— 有可用的文件系统、有确定性的色板库、有 checklist 文化 —— 也就是 Claude Design 立下的那条线，只是这次它开源、归你。
  OD 站在四个开源项目的肩膀上：
  - alchaincyf/huashu-design（花叔的画术） —— 设计哲学的指南针。Junior-Designer 工作流、5 步品牌资产协议、anti-AI-slop checklist、五维自评审、以及方向选择器背后的「5 流派 × 20 种设计哲学」思路 —— 全部蒸馏进 apps/daemon/src/prompts/discovery.ts。
  - op7418/guizang-ppt-skill（歸藏的杂志风 PPT skill） —— Deck 模式。原样捆绑在 skills/guizang-ppt/ 下，原 LICENSE 保留；杂志版式、WebGL hero、P0/P1/P2 checklist。
  - OpenCoworkAI/open-codesign —— UX 北极星，也是我们最接近的同类。第一个开源的 Claude-Design 替代品。我们借鉴了它的流式 artifact 循环、沙盒 iframe 预览模式（自带 React 18 + Babel）、实时 agent 面板（todos + tool calls + 可中断生成）、5 种导出格式列表（HTML / PDF / PPTX / ZIP / Markdown）。我们刻意在形态上分流 —— 它是桌面 Electron 应用，把 pi-ai 打包进去做 agent；我们是 Web 应用 + 本地 daemon，把 agent 运行时委托给你已经装好的 CLI。
  - multica-ai/multica —— Daemon 与运行时架构。PATH 扫描式 agent 检测，本地 daemon 作为唯一的特权进程，agent-as-teammate 的世界观。
