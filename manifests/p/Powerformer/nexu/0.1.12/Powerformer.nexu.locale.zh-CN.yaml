ShortDescription: OpenClaw 极简桌面客户端 🦞 — 一键将你的 Agent 连接至微信、飞书、Slack 和 Discord。支持 Claude Code、Codex 及任何大语言模型。自带密钥，支持 OAuth，本地优先，手机随时随地 24/7 聊天。
Description: |-
  nexu（next to you）是一款开源的桌面客户端，可将你的 OpenClaw 🦞 Agent 直接运行在微信、飞书、Slack、Discord 等即时通讯渠道中。
  支持微信 + OpenClaw —— 兼容微信 8.0.7 的 OpenClaw 插件。点击连接，用微信扫码，即可开始与你的 AI Agent 聊天。
  下载即用 —— 图形化配置，内置飞书技能，支持多种模型（Gemini 等），并可使用你自己的 API Key。
  一旦连接到即时通讯工具，你的 Agent 将全天候在线 —— 随时随地通过手机聊天。
  所有数据保留在你的设备上，隐私完全由你掌控。
