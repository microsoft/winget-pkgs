ReleaseNotes: |-
  New features
  - NOTE: This version is now also available with native ARM64 support, which can be downloaded separately from the Picotech website.
  - NOTE: From this version, PicoScope 7 will no longer support the PS2205MSO device
  - Capture Playback functionality has been added to the Waveform Navigator. This feature allows captured waveforms to be replayed, enabling review in both the forwards and backwards directions, with adjustable playback speed.
  - Added NMEA2000 serial protocol decoder.
  - Time at Ch Levels measurement added.
  - Added Atan2 maths function.
  - The Auto trigger timeout has been reduced so the scope is more responsive when waiting for trigger events.
  - User Offset correction added to the Settings options panel for PS3000E devices. This can allow correction of any offset drift that has occurred since the last full calibration of the device, and saves those adjustments to the device for future use.
  - File loading now shows a better indication of progress.
  - Fine-adjust numeric values by holding the SHIFT key while using the +- buttons or mouse wheel.
  - Transparency added to zoom and ruler windows.

  Bug fixes
  - Issue where SINAD measurement was giving incorrect results has been resolved.
  - Measurement values now update if the user changes hysteresis or threshold settings or moves the signal rulers, even if capture is stopped.
  - Fixed issue where an unncessary extra scope view was sometimes created when adding a measurement.
  - Fixed issue where the measurements standard deviation reading would sometimes not equal 0 when measured over 1 waveform.
  - A software hang that occurred during the export of large captures containing math channels to CSV format has been resolved.
  - For applicable devices, when coupling mode is set to IEPE, this setting is now correctly saved and loaded.
  - An issue where ranges were potentially not updating correctly on PicoScope 4262 devices has been resolved.
  - Resolved trigger jitter on some triggers within the PicoScope 4000a device driver.
  - Resolved a level below trigger issue on 8-channel devices using the PicoScope 4000a device driver.
  - Resolved an issue with level drop out triggers on PicoScope 4824A and 4823 devices.
  - Fixed issue where within Actions, the save callback would not save all waveforms when used with Rapid trigger.
  - A software hang that occurred during the export of large captures containing math channels to CSV format has been resolved.
  - Fixed an issue where the graph would appear blank when accessing an opened PicoScope 7 session on a Remote Desktop.
  - Fixed an issue where the graph would appear blank if changing the DPI scaling of a screen while PicoScope 7 is running on that screen.
  - Keyboard shortcuts no longer activate when used with extra modifier keys.
  - Memory usage improvements when restarting captures over long periods.
  - Resolved a latching relay speed issue on PicoScope 4444 devices.
  - Fix crash on startup with discontinued PicoScope 3204/5/6 devices.
  - Fixed TA511 probe sometimes crashing PS7 on plug/unplug.
  - Fixed missing overvoltage warning affecting some ps2000a and ps3000a devices.
  - Fixed potential failure fetching data when certain buffers are set on 4000a.
  - Some general stability fixes and capture rate perfromance improvements.
