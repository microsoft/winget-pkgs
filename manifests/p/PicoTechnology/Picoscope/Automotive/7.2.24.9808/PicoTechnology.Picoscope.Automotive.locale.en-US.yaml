ReleaseNotes: |-
  New features
  - Channel at trigger, Channel at channel level, Channel at Channel Edge and Time at Channel Edge measurements added to Measurements.
  - A new Action callback has been added to discard waveforms based on a set Action Event, so you capture only what matters and the waveform navigator includes only relevant results.
  - Added HDF5 file exporting.
  - [PicoDiagnostics] Time to save NVH data to file has been improved.

  Bug fixes
  - Fixed an issue with the Parity and CRC selection for the PSI5 decoders.
  - Various stability improvements.
  - [PicoDiagnostics] Microphone audio playback now works reliably with BNC+ microphone.
  - [PicoDiagnostics] Tachometer input now correct when BNC+ NVH accessories are present.
  - [PicoDiagnostics] Data is no longer lost if a probe is disconnected mid-NVH test.
