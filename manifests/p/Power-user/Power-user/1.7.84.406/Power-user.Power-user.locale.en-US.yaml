ReleaseNotes: |-
  - [Cleaner] New feature added to find and compress Large Media
  - [Library] New Shapes item in the Library, including the previous Diagrams
  - [Library] Templates renamed into Slides / Workbooks / Documents
  - [Library] Fixed issue with layouts getting duplicated
  - [Tombstones] Minor bug fixed
  - [Links] Fixed an issue with text links
  - [Links] Links now support map charts
  - [Links] Links now support custom Excel decimal separators
  - [Agenda] Support added for text outlines and gradient colors
  - [Agenda] New interface for managing design options
  - [Agenda] Slide titles are now hidden by default in the agenda tree view
  - [Organize] Interface and behavior simplified
  - Multiple enhancements and bug fixed
