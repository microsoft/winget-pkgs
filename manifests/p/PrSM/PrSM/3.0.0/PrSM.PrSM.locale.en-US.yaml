ShortDescription: Unity-first scripting language that compiles to C#
Description: |-
  PrSM (Pragmatic Reduced Syntax for Metascript) is a Unity-first scripting language toolkit.
  It compiles .prsm scripts to readable C# with syntax sugar for components, coroutines,
  event listeners, input handling, interfaces, generics, singleton, object pooling,
  pattern matching, async/await, state machines, and reactive bindings.
  Language 5 adds general yield, attribute targets, preprocessor directives, ref/out/vararg
  parameters, nameof, advanced patterns (relational/combinator/positional/property),
  with expressions, ref locals, partial declarations, and a DAP debugger adapter.
  Includes VS Code extension and Unity Editor package.
