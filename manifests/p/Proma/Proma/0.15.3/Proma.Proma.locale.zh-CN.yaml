ReleaseNotes: |-
  Proma v0.15.3 更新
  新功能
  - 查看 ChatGPT Codex OAuth 订阅额度 — 在 Agent 上下文用量和渠道卡片中展示 Codex 的滚动额度、剩余百分比与重置时间，支持 5 小时、每周及其他实际限额窗口。(#1188)
  - 新增 ChatGPT Codex 快速模式 — Pi Runtime 下使用受支持的 Codex 模型时，可在会话工具栏切换「快速」模式，以优先响应换取更高的额度消耗；该设置会随会话保存。(#1190, #1192)
  Bug 修复
  - 修复 Pi 写文件参数不完整问题 — 明确要求 write 在同一次调用中提供路径和完整 content，避免仅传路径导致写入失败。(#1184)
  - 优化 Pi 工具调用流式预览 — 预览阶段不再重复传输累计的工具参数，大文件写入时可明显降低 IPC 与渲染压力，最终帧仍保留完整参数。(#1185)
  - 修复历史记录中的相对路径预览 — 为历史工具调用补充会话工作目录作为解析上下文，使 .context/plan/*.md 等相对路径能正确打开。(#1186)
  - 修复飞书 Pi 流式消息重复或乱序 — 正确处理累计 partial 帧并按内容块计算增量，避免卡片中的文本、思考内容和工具状态重复或错位。(#1187)
  - 修复 Codex OAuth 代理支持 — 授权码换取与刷新 Token 请求现在复用 Proma 的全局代理设置，网络受限环境中也能完成登录和续期。(#1189)
  - 优化 Pi 流式输出性能 — 将高频、累计式的 partial 消息合并为最高 20 fps 的最新快照，同时确保最终内容立即送达，减少长回复时的 IPC 与渲染压力。(#1191)
