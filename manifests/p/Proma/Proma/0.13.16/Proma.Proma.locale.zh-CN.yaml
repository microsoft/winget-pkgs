ReleaseNotes: |-
  Proma v0.13.16
  对比基准：v0.13.15
  这是一个稳定性与体验打磨的小版本：让 Agent 派出去的子任务结果能更完整地带回，修好了 DeepSeek / Kimi 在 Chat 模式下报错的问题，并修复了子任务在重启后的恢复、Markdown 工具条、文件树等多处细节。
  新功能
  - 子任务返回的结果更完整 — 之前 Agent 帮你跑完一个子任务、把结果汇报给主会话时，内容超过约 1.2 万字就会被从中间截断，导致结果不全。现在上限提到 5 万字，绝大多数情况都能完整带回。(#955)
  - 支持更多类型的 MCP 服务器 — 新增对 Streamable HTTP 方式的 MCP 服务器的支持，能接入的工具范围更广了。(#952)
  Bug 修复
  - 修复 DeepSeek / Kimi 在 Chat 模式下报错 — 之前这几个渠道在 Agent 模式能正常用，但切到 Chat 模式会报 404 错误。现在两种模式行为一致，都能正常对话。(#951)
  - 重启后子任务能正确恢复 — 修复了重启或恢复会话后，派出去的子任务可能找不回来、接不上的问题。(#944)
  - 派子任务更稳定 — 修复了 Agent 分叉（fork）派发子任务时的稳定性问题。(#945)
  - 自动任务派出的子任务，正确归到自动任务区 — 自动任务运行时派出的子任务，之前会跑到普通会话列表里，现在会正确收纳在它所属的自动任务下面。(#943)
  - Markdown 编辑工具条不再随滚动消失 — 编辑长文档时，顶部那排格式工具按钮会固定在原位，往下滚也不会被带走。(#953)
  - 文件树与 minimap 细节优化 — 优化了文件树选中项的高亮显示 (#947)；调整了 minimap 的间距与滚动条宽度，看起来更舒服 (#946)。
