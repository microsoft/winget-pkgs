ReleaseNotes: |-
  Proma v0.15.6 更新
  新功能
  - Pi 会话分叉与回退 — 支持从指定消息分叉 Pi 会话，或将会话回退到历史节点后继续对话。(#1203)
  - 实时任务进度浮层 — Agent 执行多步骤任务时，可在消息区查看任务状态与当前进度。(#1205)
  - 会话级 OpenAI 推理控制 — 对支持的 OpenAI 模型，可按会话单独调整推理强度设置。(#1201)
  - 通义千问 Token Plan — 新增 Token Plan 渠道，支持 Qwen3.8 Max Preview、Qwen3.7 Max、Qwen3.6 Flash 等模型用于 Agent。(#1210)
  Bug 修复
  - 修复 Pi Codex 代理请求 — Pi Runtime 下的 Codex 模型请求现在正确复用全局代理设置。(#1196)
  - 修复 Codex OAuth 认证与自动续期 — 恢复 ChatGPT Codex 的运行时鉴权，并在 Token 刷新后保存新凭据，避免重启后需要重新登录。(#1213, #1217)
  - Pi 自动重试更可靠 — 网络波动重试会延续原会话上下文，避免重放请求导致重复创建协作子 Agent 或重复执行工具。(#1209)
  - 限制火山引擎 GLM-5.2 输出长度 — 为模型设置合理的最大输出 Token，避免请求超出服务端限制。(#1206)
  - 优化 Agent Core 兼容性提示 — 在渠道设置中更清晰地说明模型与 Agent Core 的兼容关系。(#1207)
  - 脱敏渠道桥接日志 — 避免在日志中记录敏感配置与认证信息。(#1204)
  其他优化
  - 精简 Agent 输入工具栏 — 移除「输出完成后保持展开」显示选项和上下文用量「新鲜度」提示，减少界面干扰。(#1202, #1211)
