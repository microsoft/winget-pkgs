ReleaseNotes: |-
  Proma v0.14.6
  对比基准：v0.14.5
  新功能
  - 输入框 Markdown 渲染开关 — 在「设置 → 通用设置」中可以开启输入框的 Markdown 实时渲染，写文字时所见即所得。(#1080)
  - 自动重试不再频繁弹窗 — 网络瞬时波动时，前 5 次自动重试会静默进行，不再反复弹提示打扰你。(#1078)
  Bug 修复
  - 网络切换后消息不再静默失败 — 切换 WiFi 或代理后，消息发送失败现在会正确提示并支持重试，而不是卡住不动。(#1088)
  - 侧边栏会话级联操作修复 — 关闭、归档、置顶父会话时，子会话现在会同步操作，不会留在一半的状态。(#1030)
  - 通知音修复 — 蓝牙设备播放通知音不再破音，也不会播到一半被截断。(#1082, #1083)
  - 修复会话迁移到当前工作区失败 — 之前无法把会话迁移到你当前所在的工作区，现已修复。(#1029)
  - Agent 中可直接使用 proma 命令 — Agent 子会话现在能正确找到 Proma CLI，不用再配路径。(#1090)
  - Windows 路径 Chip 完善 — Windows 下 Agent 输出的文件路径现在能正确识别为可点击的文件标签，反斜杠路径也能正常显示。(#1026, #1085)
  - 终端主题下右键菜单可见 — 暗色终端主题中文件标签的右键菜单不再被覆盖层遮挡。(#1027)
  - Windows 跨工作区迁移更稳定 — 修复了 Windows 下迁移会话目录时偶发的文件占用报错。(#1028)
  - 纯文本模式下复制保留格式 — 输入框关闭 Markdown 渲染时，复制内容不再出现多余的转义符。(#1092)
  依赖升级
  - Agent SDK 0.3.197 → 0.3.201 — 修复了多个底层问题，包括 MCP 服务器超时控制、工作流进度追踪等。(#1087)
