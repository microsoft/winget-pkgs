ReleaseNotes: |-
  Proma v0.14.9 更新
  新功能
  - 左侧边栏支持拖拽调整宽度 — 会话列表中工作区 badge、子任务缩进等信息常挤压标题空间，现在可以向右拖拽侧边栏右缘扩展宽度（300~420px），宽度会自动记住，折叠态自动隐藏拖拽手柄。(#1094)
  - Agent 上下文支持选中引用 — 在 Agent 回复或历史消息中选中文本后，可通过弹出菜单将选中内容作为上下文引用发送给 Agent，让追问更精准。(#1102)
  - 本地 Skills 分组显示 — Agent 配置中的本地 Skills 列表现在按来源分组展示，浏览和管理更清晰。(#1099)
  Bug 修复
  - 侧边栏归档视图排序修复 — 归档会话列表现在与活跃视图一致，按最近更新优先排列，不再乱序。(#1103)
  - 自动任务子会话级联操作完善 — 将自动任务父会话置顶或归档时，其派出的子会话现在会正确跟随操作，不会遗留；归档视图也改为树形渲染，子会话嵌套在父会话下方。(#1096)
  - 修复引用选中文本在排队中丢失 — Agent 忙碌时选中的引用文本现在会正确暂存，轮到下一轮时发送，不会静默丢失。(#1104)
  - 飞书绑定管理优化 — 改进了飞书绑定的管理界面和解绑逻辑，操作更可靠。(#1101)
  - 分屏预览模式 UI 微调 — 左侧面板增加了 2px 右边距，避免滚动条与分割线粘连。(#1100)
  - Chat 模式 Tavily 搜索认证修复 — Chat 模式下使用 Tavily 联网搜索现在使用正确的 Bearer 认证方式，搜索功能恢复正常。(#1098)
  - 渠道兼容模型发现优化 — 改进了渠道管理中兼容模型的发现逻辑，减少不必要的 API 调用。(#1097)
