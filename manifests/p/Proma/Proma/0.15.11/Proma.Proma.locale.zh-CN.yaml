ReleaseNotes: |-
  Proma v0.15.11 更新
  新功能
  - Git/PR 标识 — Agent 代为提交 commit 或创建 PR 时默认附加 Made-with: Proma 与官网链接，可在「设置 → 通用」随时关闭；不再使用 Co-Authored-By 归因。(#1275)
  - Pi 会话上下文压缩 — 支持主动压缩当前 Pi 会话上下文，并在任务进度浮层中展示处理状态。(#1246)
  - 项目内新建会话入口 — 将 Agent 新会话创建入口收敛到对应项目，Chat 分区保留独立的新建对话入口。(#1252)
  - OpenCode Go 渠道 — 新增 OpenCode Go（OpenAI 协议）渠道，预置 Grok、GLM、Kimi、DeepSeek 与 MiMo 等模型。(#1263)
  - macOS 终端快捷操作 — 文件浏览器中可直接在 Terminal 中打开文件夹。(#1254)
  - 模型渠道提示 — 悬停模型选择器即可查看当前使用的渠道名称。(#1264)
  - GPT-5 能力识别 — 为同名 GPT-5.x 模型统一识别上下文窗口与推理档位，GPT-5.6 支持「最大」推理强度。(#1250)
  - Codex OAuth 会话标题 — 使用 Codex OAuth 时自动生成更具语义的会话标题。(#1248)
  - 第三方渠道风险确认 — 添加第三方模型渠道时会提示相关风险，帮助用户确认配置来源。(#1253)
  Bug 修复
  - 优化 Scratch Pad 图片体验 — 图片支持单击预览、右下角缩放与复制成功提示；修复保存后尺寸丢失、图片后正文粘连及复制段落间距异常的问题。(#1183, #1274)
  - 记住 OpenAI/Codex 推理强度 — 新建 Agent 会话会沿用上次选择的推理档位，并正确保留「关闭」设置。(#1241)
  - 修复本地 Markdown 文件链接展示 — 本地 .md 文件链接现在可正确渲染为文件标签。(#1234)
  - 保留 Pi 异常前的输出 — Pi 会话遇到终端错误时，已生成的部分回复不会丢失。(#1268)
  - 增强 Pi 流式重试 — HTTP chunked/SSE 连接中断会被识别为网络异常并自动恢复，失败提示也更准确。(#1267)
  - 修复 Windows Shell 默认值 — Windows 默认使用 Git Bash，提升 Agent 执行命令的兼容性。(#1272)
  - 修正模型上下文与输出限制 — 修复 OpenCode Go 的 Kimi K3 上下文窗口，并限制火山方舟 GLM-5.2 的最大输出 Token。(#1271, #1243)
  - 修复 Pi 压缩后的上下文显示 — 压缩完成后显示估算上下文用量，刷新时不再丢失额度信息。(#1256, #1245)
  - 修复文件默认应用操作 — 文件浏览器与差异视图中的「使用默认应用打开」始终可用。(#1258)
  - 改善 Pi Provider 兼容性 — 自定义渠道的 developer 消息会正确映射为系统消息。(#1257)
  - 减少无关完成通知 — 被委派的子会话完成后不再额外弹出完成通知。(#1251)
  - 修复跨视图教程跳转 — 教程可正确跳转至目标设置或功能页面。(#1249)
  - 优化侧边栏布局 — 对齐项目、Chat/Agent 分区及日期分组的视觉布局。(#1259)
  其他优化
  - 精简上下文用量展示 — 移除分隔线和仅输入上下文等干扰信息，让 Agent 输入区更聚焦。(#1255, #1261)
