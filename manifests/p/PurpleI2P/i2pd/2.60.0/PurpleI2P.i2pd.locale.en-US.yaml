ShortDescription: i2pd (I2P Daemon) is a full-featured C++ implementation of I2P client.
Description: |-
  i2pd (I2P Daemon) is a full-featured C++ implementation of I2P client.
  I2P (Invisible Internet Protocol) is a universal anonymous network layer.
  All communications over I2P are anonymous and end-to-end encrypted, participants don"t reveal their real IP addresses.
Tags:
- encryption
- network
- privacy
ReleaseNotes: |-
  1.  Implemented "i2cp.closeIdleTime" and "i2cp.newDestOnResume" client tunnel and proxy params
  2.  Use ML-KEM-768 crypto type by default if openssl >= 3.5
  3.  Binding to ipv6 ULA address
  4.  Set default bandwidth=O for x86_64 and bandwidth=P for x86_64 with more than 4 cores
  5.  Forward ipv4 and ipv6 connections to usptream SOCK5 proxy
  6.  New routers profiling algorithm
  7.  Fixed incorrect private signing key size for offline signatures
  8.  Generate ECIESx25519 session tags faster
  9.  More I2PControl RouterInfo metrics
  10. Localization to Persian
  11. Fixed incorrect new session reply for session with post-quantum crypto
  12. Fixed Inverted value of "i2cp.dontPublishLeaseSet"
  13. Recreate zero and one hop tunnels after being offline
  14. Updated reseeds list
ReleaseNotesUrl: https://github.com/PurpleI2P/i2pd/releases/tag/2.60.0
