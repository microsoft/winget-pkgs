ReleaseNotes: |-
  - 🌟 支持在 Linux 平台使用系统 OpenAL 与 GLFW 启动游戏。#1336 @xunying123 @UNIkeEN
  - 🐛 修复 Windows 和 Linux 平台下运行路径检查可能失效的问题。#1347 #1363 @pangbo13 @UNIkeEN
  - 🐛 修复资源搜索对话框中，标签列表重复显示的问题。#1354 @SundayChen
  - 🐛 修复部分场景下，本地 Java 信息识别错误的问题。#1360 @UNIkeEN @HsxMark
  - 🐛 修复实例名称的有效性检查。#1364 @hbz114514 @UNIkeEN
  - ⚡️ 优化游戏日志窗口的渲染，减少日志内容较多时的窗口卡顿。#1256 @baiyuansjtu
  - ⚡️ 优化中文的资源搜索体验，新增资源作者信息展示、并支持资源版本列表的刷新。#1354 @SundayChen @funkthesky-ops @RobertZhang0901
  - ⚡️ 优化 CurseForge 资源的搜索体验，综合考量相关性与热度进行结果展示。#1354 @SundayChen
  - 🛠 重置实例特定游戏设置时进行二次确认。#1337 @icgnos
  - 🛠 游戏崩溃窗口现在将显示实例的客户端与加载器版本，而非实例名称。#1352 @UNIkeEN
  - 🛠 移除启动器内的开发者列表页面。 @UNIkeEN
  - 📦 更新多项依赖至补丁版本。#1356 #1357 @dependabot[bot]
  - 📦 降级至 Ubuntu 22.04 进行版本发布，以支持 glibc 低于 2.39 的部分 Linux 发行版。#1361 @pangbo13 @Minecrafter-Pythoner
