Description: "SAGA's first objective is to give (geo-)scientists an effective but easy learnable platform for the implementation of geoscientific methods. This is achieved by SAGA's unique Application Programming Interface (API). The second is to make these methods accessible in a user friendly way, what is first of all done by its Graphical User Interface (GUI). Together this results in SAGA's true strength: a fast growing set of geoscientifc methods ready to be used in numerous applications."
