ShortDescription: 适用于终端与编辑器的前沿编码智能体。
Description: |-
  Amp 是适用于终端与编辑器的前沿编码智能体。
  - 多模型支持：Opus 4.7、GPT-5.4、速型模型——Amp 会调用所有模型，各展所长。
  - 去芜存菁：你始终能用到 Amp 的核心优质功能。如果我们自己不用、也不喜欢某个功能，就会直接砍掉它。
  - 前沿迭代：Amp 跟随大模型的发展持续更新。不保留向后兼容，不遗留老旧功能。
  - 会话管理：你可以保存并分享你和 Amp 的交互记录。写代码总离不开版本控制，不是吗？
  Amp 共有三种工作模式：智能模式（调用无限制的最先进模型）、快速模式（速度更快、成本更低，适合定义清晰的小型任务），以及深度模式（针对复杂问题提供带扩展思考的深度推理）。
