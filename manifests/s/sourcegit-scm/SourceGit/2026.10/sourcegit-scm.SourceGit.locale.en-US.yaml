ReleaseNotes: |-
  What's Changed
  - Auto-select branch for Branch Selector control in custom action.
  - Fix the issue that app may crashes when user are trying to close a repository with an action that is still running.
  - Add Use button back to apply AI generated message.
  - Add a context menu entry Enable Auto-Fetch to selected remote which allows user to disable some remotes from auto-fetching.
      - Note: this context menu item is visible only when user has enabled the Fetch remotes automatically feature in Preferences.
  - Fix the issue that Askpass does not support non-ASCII characters.
  - Fix the issue that Initialize Repository does not apply bookmark from Open Repository popup.
  - Fix the issue that sometimes user settings are lost because the configuration file is broken.
  - Disable thinking mode in AI assistant.
  - Linux: Fix the issue that some linux distros have a newer version of libicu which is a dependency of this app.
  - Fix the issue that sometimes NullReferenceException occurs.
  - Supports to preview PSD as image.
  - Shows the git source revision when compiling this project in About dialog.
  - Fix the issue that fixup!/squash! commits' positions sometimes are incorrect.
  - Change the DateSeparator and TimeSeparator to prevent / or : being replaced by culture in DateTime.ToString().
  - Keep selection in HISTORY page if user only selected one or two commits.
  - Thanks to @gadfly3173, we have anothor deb package repository.
  - Several other UI/UX changes.

  New Contributors
  - @Zguy made their first contribution in #2304
  - @Nietod made their first contribution in #2307
