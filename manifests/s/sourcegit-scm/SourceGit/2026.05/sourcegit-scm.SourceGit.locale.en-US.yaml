ReleaseNotes: |-
  What's Changed
  - Show current caret column in commit message textbox.
  - Remember last selection of new tag's type in Create Tag popup.
  - Reset desktop.ShutdownMode to ShutdownMode.OnExplicitShutdown before calling desktop.Shutdown manually.
  - Fix the issue that app crashed when availableSize is Infinity in MeasureOverride.
  - Linux: Add Ghostty as integrated terminal tool.
  - Add hotkey Alt/⌥+Up to goto child of selected commit.
  - Add a context menu entry to run interactive rebasing on non-current branch.
  - Revert commit ceea4a1. Currently, only pressing OK button in Commit Message Editor will apply modified message.
  - Try to fix the issue that sometimes changes list did not update in commit CHANGES page (can not reproduce).
  - Enable word-wrap and disable horizontal scrollbar for text in notification window.
  - Add a context menu entry Apply Changes to only apply changes of selected files from stash.
  - Fix the issue that highlighting selected revision lines in Blame window did not work.
  - Unify the behavior of Reveal in File Explorer when the selected is a folder across all platforms
  - Several other UI/UX changes.
