ReleaseNotes: |-
  What's New in v3.2.1
  The Clean CLI & Streamlined Logging update. v3.2.1 brings simplified arbscan logs, cleaner metadata layouts, and documentation alignments.
  Highlights
  - Streamlined arbscan Output: Displays only the filename being analyzed (for example, Analyzing: xbl_config.img), keeping logging clean by hiding long local paths and query-heavy remote CDN URLs.
  - Polished Firmware Banner: Refined the CLI metadata summary to display the Product Model and Android Version, while removing the redundant Update Type and confusing internal build tags.
  What's Changed
  - feat(extractor): clean up firmware metadata layout and hide update type
  - feat(arbscan): streamline CLI printing to only show the analyzed file name
  - docs: align README, TECHNICAL, and CHANGELOG specifications for v3.2.1
  Full Changelog: v3.2.0...v3.2.1
