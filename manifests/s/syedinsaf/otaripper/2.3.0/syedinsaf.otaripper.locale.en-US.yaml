ReleaseNotes: |-
  What’s New in v2.3.0
  A massive performance and reliability overhaul. v2.3.0 introduces "Zero-Copy" extraction for ZIP-based payloads and deep kernel-level I/O optimizations that push the limits of NVMe and high-speed storage.
  Highlights
  - Zero-Copy ZIP Extraction: By utilizing direct memory mapping for STORED entries within ZIP files, otaripper now bypasses traditional extraction buffers entirely. This leads to near-instantaneous mapping and extreme throughput for modern Android OTA zips.
  - Kernel-Level Zero-Fill Bypass: Optimized the handling of empty blocks by bypassing user-space zeroing. On supported filesystems, this drastically reduces CPU cycles and disk wear when encountering sparse partitions.
  - Atomic Pipeline Refactor: The extraction engine has been decomposed into focused, method-driven stages. This architectural change hardens error recovery, ensuring that partial extractions are cleaned up gracefully and diagnostics are more precise.
  - Enhanced I/O Caching: Implemented OS-level sequential caching hints. This pre-warms the system's page cache during extraction, resulting in significantly faster SHA-256 validation passes.
  Performance & Core Improvements
  Pushing I/O Boundaries
  - posix_fallocate Integration: On Linux, we now use posix_fallocate to pre-allocate disk space. This eliminates file fragmentation and reduces write contention on highly-parallel extraction tasks.
  - Modernized Dependencies: Updated sysinfo to v0.39.0 for more accurate hardware detection and thread-scaling logic.
  - Hardened Recovery: Improved lock-poisoning handling and transactional cleanup logic to ensure the filesystem remains consistent even if a process is interrupted.
  What's Changed
  - feat: instant zip extraction via direct memory mapping by @ArKT-7
  - perf: bypass user-space zeroing for empty blocks by @ArKT-7
  - perf: add OS-level sequential caching to speed up I/O and SHA-256 validation by @ArKT-7
  - perf: use posix_fallocate on Linux to fix write contention by @ArKT-7
  - refactor: decompose extraction pipeline into focused methods with hardened error recovery by @syedinsaf
  - build(deps): update sysinfo to 0.39.0 by @syedinsaf
