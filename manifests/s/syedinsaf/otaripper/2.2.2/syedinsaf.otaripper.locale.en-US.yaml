ReleaseNotes: |-
  What’s New in v2.2.2
  A feature-packed quality-of-life update that completely integrates the standalone arbscan utility into the otaripper engine, allowing for blazingly fast OEM bootloader analysis directly from full OTA payloads.
  Highlights
  - Unified CLI: The standalone arbscan binary is now fully integrated as a native subcommand: otaripper arbscan or otaripper arb.
  - Direct Payload Analysis (Exclusive Feature): Unlike the standalone tool which could only read raw .img files, the integrated arbscan is smart enough to accept firmware.zip or payload.bin files directly! It automatically hooks into otaripper's high-speed extraction engine to silently dump xbl_config.img into a temporary directory, scan it, and clean up automatically.
  - Streamlined Usage: Added convenient shorthand aliases otaripper arb and a new -n short flag to quickly skip JSON prompts.
  - Quiet Mode: Added an internal suppression flag to the extraction engine to allow completely silent operations when extracting single files in the background.
  Tool Consolidation & UX
  Expanding the otaripper Toolset
  - Zero-Cost Payload Scanning: By integrating arbscan directly into the otaripper crate, we instantly give it the superpower to crack open .zip files. It re-uses the highly parallelized rayon threadpool and memory-mapped file architecture to extract the bootloader partition in a fraction of a second, without requiring the user to manually unzip or extract the OTA payload first.
  - Intelligent File Detection: The CLI dynamically reads file magic bytes to determine the correct workflow. Passing a raw xbl_config.img analyzes it instantly, while passing an update.zip triggers the silent extraction pipeline automatically.
  What's Changed
  - feat: integrate arbscan as a native subcommand
  - feat: add direct payload analysis and extraction support to arbscan
  - feat: add CLI aliases (arb) and short flag (-n) for JSON suppression
