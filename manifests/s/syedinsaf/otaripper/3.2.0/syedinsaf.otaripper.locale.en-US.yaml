ReleaseNotes: |-
  What's New in v3.2.0
  The Smart Firmware Metadata & UX Refinements update. v3.2.0 brings automated firmware metadata extraction, dynamic output folder naming, intelligent ARB auto-detection, and terminal noise reduction to improve command-line usability.
  Highlights
  - Smart Firmware Metadata Extraction: Automatically parses META-INF/com/android/metadata and payload_properties.txt from OTA zips. Before extraction, otaripper displays a clean "Firmware Information" banner detailing OS Version, Security Patch level, and OTA target versions directly in the terminal.
  - Dynamic Output Folder Naming: The output directory is now dynamically named using the actual OS version string if found (for example, extracted_CPH2573_15.0.0.860(EX01)_2026-05-25...) instead of a generic timestamp, making extracted files much easier to locate.
  - Intelligent ARB Auto-Detection: The arb subcommand automatically inherits the firmware metadata parsing logic. It auto-detects the device model and OS version to securely skip manual user prompts and directly format the JSON output filename (for example, CPH2573_15.0.0.860(EX01)_ARB(0).json).
  - Silenced GUI Spams: When spawning GUI file managers (such as Dolphin) post-extraction on Linux, stdout and stderr are redirected to null to completely silence Qt-related terminal warnings like QPixmap::scaled: Pixmap is a null pixmap.
  What's Changed
  - feat(metadata): add ZIP metadata extraction logic for Android firmware properties
  - feat(extractor): print firmware metadata banner and name output folder dynamically
  - feat(arbscan): auto-populate JSON metadata and filenames from parsed firmware information
  - fix(extractor): silence Dolphin file manager terminal stdout/stderr warnings
  - refactor: improve code formatting and organization across multiple files
  - docs: update README feature comparison matrix and technical specifications with metadata details
