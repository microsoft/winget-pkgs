ReleaseNotes: |-
  What’s New in v3.1.0
  The Resilience & Throughput update. v3.1.0 overhauls the remote extraction engine to saturate high-speed connections through parallel chunking while introducing industrial-grade network recovery for unstable environments.
  Highlights
  - Parallel Chunked Streaming: A massive speed boost for remote extraction. otaripper now splits large partitions into parallel 8MB chunks, issuing multiple simultaneous HTTP Range requests to fully saturate high-bandwidth connections and bypass CDN-level throttling.
  - Network Resilience & Offline Recovery: Unstable network? No problem. Implemented an infinite retry loop with exponential backoff. If your connection drops mid-stream, otaripper now waits and resumes exactly where it left off, with the UI dynamically notifying you of the status.
  - Dedicated Bandwidth Monitor: A new persistent "Network:" progress bar has been added to the multi-progress view. It provides a global, real-time view of aggregate download speed, data retrieved, and total remaining bytes across all worker threads.
  - Smart Rate Limit (429) Handling: Optimized for aggressive CDNs. The engine now explicitly detects HTTP 429 (Too Many Requests) status codes and automatically triggers a cooldown period before retrying, preventing IP bans during massive remote extractions.
  - Security Hardening: Added a 256MB manifest size limit and server-side Range-request validation to protect against malicious or misconfigured remote servers.
  What's Changed
  - feat: implement multi-threaded parallel chunked HTTP streaming for massive throughput
  - feat: add global bandwidth monitor and dedicated network progress bar
  - feat: implement stateful connection recovery with exponential backoff
  - feat: add smart handling for HTTP 429 rate limiting and server-side range validation
  - security: enforce strict 256MB metadata size limit to prevent OOM attacks
