  All releases now utilize a dual-checksum standard. You can verify the compressed archives using the master checksums.txt file attached to this release:
  sha256sum -c checksums.txt
  Once extracted, an internal otaripper.sha256 file is also provided to verify the raw executables:
  sha256sum -c otaripper.sha256
