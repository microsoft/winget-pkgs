ReleaseNotes: |-
  What’s New in v3.0.0
  A massive architectural evolution. v3.0.0 introduces Remote HTTP Streaming, allowing you to instantly extract specific partitions directly from an OTA URL without downloading the massive 3GB+ firmware archive.
  Highlights
  - Remote HTTP Streaming: Skip the download. Pass an HTTP URL directly to otaripper, and it will intelligently stream only the bytes required to extract your requested partitions over the internet.
  - Remote ARB Inspection (Zero-Download): The arbscan engine has been globally integrated. You can now instantly check a device's Anti-Rollback (ARB) index by passing an OTA URL directly to otaripper arb <url> -n—it pulls the metadata in seconds without downloading the firmware.
  - Network Stability & DNS Fallbacks: Implemented a dynamic DNS resolution stack using hickory-dns with native Android fallbacks. This fixes major JNI networking crashes and ensures flawless performance inside Termux environments.
  - "Gold Standard" Release Verification: otaripper now strictly separates distribution hashes. A master checksums.txt validates the zip archives, while an internal otaripper.sha256 protects the integrity of the binary inside.
  - The "Lite" Build: For highly constrained environments that do not need network streaming, we now distribute otaripper-lite binaries that strip out the async networking stack for a drastically smaller footprint.
  What's Changed
  - feat: implement remote HTTP stream-based partition extraction
  - feat: integrate global arbscan capabilities for zero-download remote metadata parsing
  - fix: pin reqwest and overhaul DNS resolution to fix Android JNI crashes in Termux
  - refactor: migrate CI/CD release infrastructure to generate atomic master checksums
  - chore: introduce cargo lite and cargo full native build aliasing
  Full Changelog: v2.3.0...v3.0.0
