ReleaseNotes: |-
  What’s New in v3.1.1
  The Qualcomm ARB & CI Hardening update. v3.1.1 brings crucial compatibility updates for modern Snapdragon secure bootloader scanning, robust cross-platform URL parsing, and structural CI/CD pipeline hardening to protect forks.
  Highlights
  - Modern Qualcomm ARB Scan Support: Solved a major limitation with modern Snapdragon bootloaders. The secure boot hash table size validation check has been relaxed from requiring a multiple of 32 (SHA-256) to a multiple of 16. This adds seamless support for modern Qualcomm bootloaders using SHA-384 (48-byte digests) and future-proofs the engine for SHA-512 (64-byte digests).
  - Supercharged JSON Output UX & Naming:
    - Zero-Crash URL Parsing: Implemented robust, platform-independent, and URL-aware file stem parsing to prevent crashes on Windows when analyzing remote OTA URLs.
    - Input Sanitization: Automatically trims white spaces, trailing slashes, and backslashes from user-supplied device inputs ("Device model" and "Update / build") to prevent ugly duplicate underscores in filenames.
    - Scannable ARB Suffix: Scanned outputs are now automatically suffixed with _ARB(N).json (where N is the detected anti-rollback level) for instant filesystem scannability.
  - CI/CD Fork Prevention: Protected workflow secrets and eliminated build spams on forks. All automated deployment pipelines (Crates.io, AUR, Winget, manual, and release builds) now explicitly check github.event.repository.fork == false so they never auto-run on forks or spam fork owners with failed scheduled cron runs.
  - Dependency Upgrades: Bumped sysinfo to v0.39.2 in the Rust dependencies group to ensure optimal platform telemetry accuracy.
  What's Changed
  - fix(arbscan): relax hash table size check to multiple of 16 to support SHA-384/384-bit Qualcomm bootloaders
  - fix(arbscan): implement robust URL-aware stem parsing & input-sanitization for JSON generation
  - ci: prevent GitHub Action workflow secrets exposure and resource drain on forks
  - build(deps): bump sysinfo from 0.39.1 to 0.39.2 in production dependencies
  - docs: add Winget upgrade command guide to README and details of the modern ARB architecture in technical specifications
