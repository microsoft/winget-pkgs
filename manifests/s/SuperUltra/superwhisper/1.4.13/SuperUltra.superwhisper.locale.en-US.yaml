ReleaseNotes: |-
  New Features
  - Use Opus audio format with compatible voice models for substantially faster cloud transcriptions
  - Per-mode auto-capitalize insert / smart capitalization toggle
  - Support for streaming language model responses
  - Region routing for cloud transcriptions — requests are now routed to the lowest-latency region for faster turnaround
  Improvements
  - Implement smooth scrolling for long transcription results in recording window
  - History list performance enhancements
  - Make vocabulary input inner buttons clickable
  - Superwhisper S1 transcriptions now display word-level segments correctly in the history view
  Bug fixes and cleanup
  - Migrate user config files from Roaming to Local in prep for Filesync feature implementation
  - User can now use enter key to close/accept error windows
  - Fix per-mode shortcut triggering
  - Fix per-mode shortcut active mode revert issue
