  Improvements
  - Brought v2 visibility settings to the web app
  - Refreshed the oc-2 color theme (@arvsrn)

  Bugfixes
  - Made the terminal resize gutter easier to grab
  - Faded overflowing titlebar tabs instead of clipping them abruptly
