ReleaseNotes: |-
  Core
  - Added HTTP API routes to list sessions from the experimental API.
  - Added HTTP API routes to search files.
  - Added HTTP API routes to read catalog data.
  - Added HTTP API routes to read experimental data.
  - Added HTTP API routes to read worktrees.
  - Added HTTP API routes to dispose instances.
  - Added HTTP API routes to update worktrees.
  - Fixed config parsing to preserve permission rule order.
  - Added HTTP API routes to update config.
  - Added HTTP API routes to initialize project Git repos.
  - Added HTTP API routes to update projects.
  - Added HTTP API routes to manage MCP servers.
  - Added HTTP API routes for MCP OAuth flows.
  - Added HTTP API routes for experimental tools.
  - Fixed OpenRouter DeepSeek reasoning output handling.
  - Sent an opencode/<version> User-Agent header with HTTP requests.
  - Added HTTP API routes to update workspaces.
  - Added HTTP API routes for sync state.
  - Added HTTP API routes to read sessions.
  - Added HTTP API routes for session lifecycle actions.
  - Added HTTP API routes to edit session messages.
  - Added HTTP API routes for the remaining session actions.

  TUI
  - Added Zed editor selection support for editor context.
  - Show a /connect tip when no models are configured.
  - Fixed editor lock detection to ignore locks from unrelated workspaces. (@jjjermiah)
  Thank you to 2 community contributors:
  - @ariane-emory:
    - fix: correct typo in comment (#24420)
  - @jjjermiah:
