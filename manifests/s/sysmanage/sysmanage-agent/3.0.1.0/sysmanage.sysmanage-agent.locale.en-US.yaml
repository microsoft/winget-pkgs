  Start-Service SysManageAgent
  FreeBSD
  # Download and install
  fetch https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0.pkg
  sudo pkg add sysmanage-agent-3.0.1.0.pkg
  # Configure and start
  sudo nano /etc/sysmanage-agent.yaml
  sudo sysrc sysmanage_agent_enable=YES
  sudo service sysmanage_agent start
  NetBSD
  # Download and install
  ftp https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0.tgz
  sudo pkg_add sysmanage-agent-3.0.1.0.tgz
  # Copy rc.d script and configure
  sudo cp /usr/pkg/share/examples/rc.d/sysmanage_agent /etc/rc.d/
  sudo vi /usr/pkg/etc/sysmanage-agent/config.yaml
  # Enable and start
  sudo sh -c 'echo sysmanage_agent=YES >> /etc/rc.conf'
  sudo /etc/rc.d/sysmanage_agent start
  Alpine Linux
  # Download the pre-built package for your Alpine version (3.19, 3.20, or 3.21)
  # For Alpine 3.21:
  wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-alpine321.apk
  doas apk add --allow-untrusted sysmanage-agent-3.0.1.0-alpine321.apk
  # For Alpine 3.20:
  # wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-alpine320.apk
  # doas apk add --allow-untrusted sysmanage-agent-3.0.1.0-alpine320.apk
  # For Alpine 3.19:
  # wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-alpine319.apk
  # doas apk add --allow-untrusted sysmanage-agent-3.0.1.0-alpine319.apk
  # Configure and start
  doas cp /etc/sysmanage-agent/sysmanage-agent.yaml.example /etc/sysmanage-agent/sysmanage-agent.yaml
  doas vi /etc/sysmanage-agent/sysmanage-agent.yaml
  doas rc-update add sysmanage-agent default
  doas rc-service sysmanage-agent start
  OpenBSD (Pre-built Package - Recommended)
  # Download the pre-built package for your OpenBSD version (7.5, 7.6, or 7.7)
  # For OpenBSD 7.7:
  ftp https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-openbsd77.tgz
  doas pkg_add sysmanage-agent-3.0.1.0-openbsd77.tgz
  # For OpenBSD 7.6:
  # ftp https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-openbsd76.tgz
  # doas pkg_add sysmanage-agent-3.0.1.0-openbsd76.tgz
  # For OpenBSD 7.5:
  # ftp https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-openbsd75.tgz
  # doas pkg_add sysmanage-agent-3.0.1.0-openbsd75.tgz
  # Configure and start
  doas cp /usr/local/share/examples/sysmanage-agent/sysmanage-agent.yaml /etc/sysmanage-agent.yaml
  doas vi /etc/sysmanage-agent.yaml
  doas rcctl enable sysmanage_agent
  doas rcctl start sysmanage_agent
  OpenBSD (Build from Port)
  # Download the port tarball
  ftp https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-openbsd-port.tar.gz
  # Extract to ports tree
  cd /usr/ports/sysutils
  doas rm -rf sysmanage-agent
  doas tar xzf ~/sysmanage-agent-3.0.1.0-openbsd-port.tar.gz
  doas mv openbsd-port sysmanage-agent
  # Install Python dependencies (avoids gcc conflicts)
  doas pkg_add py3-websockets py3-yaml py3-aiohttp py3-cryptography py3-sqlalchemy py3-alembic
  # Build and install
  cd sysmanage-agent
  doas make makesum
  doas make install
  # Configure and start
  doas cp /usr/local/share/examples/sysmanage-agent/sysmanage-agent.yaml /etc/sysmanage-agent.yaml
  doas vi /etc/sysmanage-agent.yaml
  doas rcctl enable sysmanage_agent
  doas rcctl start sysmanage_agent
  Checksum Verification
  All packages include SHA256 checksums. Download both files and verify:
  Linux (Ubuntu/CentOS/OpenSUSE/SLES):
  sha256sum -c <package>.sha256
  macOS:
  shasum -a 256 -c <package>.sha256
  Windows:
  $expectedHash = (Get-Content "<package>.sha256").Split()[0]
  $actualHash = (Get-FileHash "<package>" -Algorithm SHA256).Hash.ToLower()
  if ($expectedHash -eq $actualHash) { Write-Host "Checksum verified!" } else { Write-Host "Checksum mismatch!" }
  FreeBSD/NetBSD/OpenBSD:
  sha256 -C <package>.sha256 <package>
  Alpine Linux:
  sha256sum -c <package>.sha256
