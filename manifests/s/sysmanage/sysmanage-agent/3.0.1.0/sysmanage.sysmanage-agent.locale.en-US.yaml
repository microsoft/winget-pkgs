  sudo zypper install ./sysmanage-agent-3.0.1.0-1.opensuse.tumbleweed.x86_64.rpm
  # Configure and start
  sudo nano /etc/sysmanage-agent.yaml
  sudo systemctl enable --now sysmanage-agent
