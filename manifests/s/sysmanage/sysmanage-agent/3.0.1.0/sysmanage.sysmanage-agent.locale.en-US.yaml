ShortDescription: Cross-platform system management agent for SysManage.
Description: SysManage Agent is the host-side daemon for the SysManage open-source fleet management platform. It registers the host with a SysManage server, reports inventory, applies declarative deployment plans (package install, firewall config, antivirus deployment, VM lifecycle), and surfaces real-time health metrics.
Moniker: sysmanage-agent
ReleaseNotes: |-
  SysManage Agent v3.0.1.0
  New build for new logging and API feature
  Multi-platform system management agent with support for Linux, BSD, macOS, and Windows.
  Installation Instructions
  Ubuntu/Debian
  # Download and install
  wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent_3.0.1.0-1_amd64.deb
  sudo apt install ./sysmanage-agent_3.0.1.0-1_amd64.deb
  # Configure and start
  sudo nano /etc/sysmanage-agent.yaml
  sudo systemctl enable --now sysmanage-agent
  Flatpak (Universal Linux)
  # Add SysManage repository
  flatpak remote-add --if-not-exists sysmanage https://sysmanage.org/sysmanage.flatpakrepo
  # Install the agent
  flatpak install sysmanage org.sysmanage.Agent
  # Run service installation script
  flatpak run --command=sysmanage-service-install org.sysmanage.Agent
  # Or download and install the bundle directly:
  wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0.flatpak
  flatpak install --user sysmanage-agent-3.0.1.0.flatpak
  CentOS/RHEL 9
  # Download and install
  wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-1.el9.x86_64.rpm
  sudo dnf install ./sysmanage-agent-3.0.1.0-1.el9.x86_64.rpm
  # Configure and start
  sudo nano /etc/sysmanage-agent.yaml
  sudo systemctl enable --now sysmanage-agent
