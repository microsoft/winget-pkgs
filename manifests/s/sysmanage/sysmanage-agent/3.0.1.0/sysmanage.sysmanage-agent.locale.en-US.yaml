  SUSE Linux Enterprise Server (SLES) 15
  # Download and install
  wget https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-1.sles.x86_64.rpm
  sudo zypper install ./sysmanage-agent-3.0.1.0-1.sles.x86_64.rpm
  # Configure and start
  sudo nano /etc/sysmanage-agent.yaml
  sudo systemctl enable --now sysmanage-agent
  macOS
  # Download and install
  curl -LO https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-macos.pkg
  sudo installer -pkg sysmanage-agent-3.0.1.0-macos.pkg -target /
  # Configure and start
  sudo nano /etc/sysmanage-agent.yaml
  sudo launchctl load /Library/LaunchDaemons/com.sysmanage.agent.plist
  Windows (x64)
  # Download and install (PowerShell as Administrator)
  Invoke-WebRequest -Uri "https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-windows-x64.msi" -OutFile "sysmanage-agent-3.0.1.0-windows-x64.msi"
  Start-Process msiexec.exe -ArgumentList "/i sysmanage-agent-3.0.1.0-windows-x64.msi /qn" -Wait -Verb RunAs
  # Configure and start
  notepad C:\ProgramData\SysManage\sysmanage-agent.yaml
  Start-Service SysManageAgent
  Windows (ARM64)
  # Download and install (PowerShell as Administrator)
  Invoke-WebRequest -Uri "https://github.com/bceverly/sysmanage-agent/releases/download/v3.0.1.0/sysmanage-agent-3.0.1.0-windows-arm64.msi" -OutFile "sysmanage-agent-3.0.1.0-windows-arm64.msi"
  Start-Process msiexec.exe -ArgumentList "/i sysmanage-agent-3.0.1.0-windows-arm64.msi /qn" -Wait -Verb RunAs
  # Configure and start
