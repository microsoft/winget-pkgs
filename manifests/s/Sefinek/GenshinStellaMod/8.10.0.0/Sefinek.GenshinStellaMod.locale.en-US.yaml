ReleaseNotes: |-
  New version of the application API
  In this release, we are introducing a new version of the Application API v9 (preview). It is an interface designed for internal communication between the application and the remote server. The new version brings improvements in performance, security, and overall ecosystem stability. It offers an optimized request architecture, shorter response times, and more efficient resource management. The updated authorization mechanism also ensures a higher level of data protection.
  Important information for Stella Plus subscribers
  API v9 is not compatible with version v8. Due to the updated authorization mechanism, subscribers will need to reclaim their benefits on the patrons.sefinek.net website.
  Important information regarding ReShade
  This update allows quick switching between the standard version of ReShade and the version with full add-on and depth buffer support. The default setting is the standard version. For Stella Plus subscribers, the full add-on support version will be enabled automatically after launching 'Stella Plus App.exe'.
  New Official Homepage Design
  A completely new design for the official Stella Mod homepage will be released soon.
  🚀 New Features
  1. NEW! Implemented new API v9 (preview). This update introduces it on the client side.
  2. NEW! Added the option to switch from the standard ReShade to ReShade full add-on support in the Settings window. The full add-on support version is required for Stella Plus subscribers.
  3. NEW! Added a new option Keep benefit ZIP files as backup for Stella Plus subscribers in the Settings window.
  ✨ Improvements
  1. Improved and added tooltips in the Settings window.
  2. Improved the file download, extraction, and cleanup process.
  3. Improved integration with WebView2. The component is now automatically disposed when launching the game, followed by forced garbage collection to immediately free up RAM.
  4. Increased the size of the changelog browser window.
  5. Improved byte conversion logic and corrected the function responsible for displaying download speed.
  6. Various quality improvements in Genshin Stella Mod.
  7. Updated Turkish translations.
  8. Updated dependencies in the FPS Unlocker and improved the localization system.
  🛠️ Fixes
  1. Fixed an issue where the progress bar disappeared after the file download finished instead of showing the actual extraction progress.
  2. Fixed an issue where the Status label: Update size: <> and Downloading file... <> / <> labels displayed inconsistent values.
  3. Fixed an issue where the YouTube player in the Gameplay window was throwing error 153.
  4. Fixed broken links.
  5. Corrected the year from 2025 to 2026 in certain cases.
  6. Various internal code fixes and cleanup.
  🔄 Updates
  1. Updated ReShade to the latest version.
  2. Updated Windows Terminal to the latest version.
  3. Updated libraries to the latest versions.
  ✅ Setup
  1. The installation directory selection page is now always shown, even when updating.
  2. The uninstaller now correctly detects a running launcher instance and prompts the user to close it before proceeding.
  3. Added support for the dark theme in both the installer and the uninstaller.
  4. Other improvements and fixes.
