ShortDescription: 允许用户无需登录操作系统，只需点击登录界面上的专用链接即可重置密码。
Description: |-
  Adaxes 自助服务客户端允许用户无需登录操作系统，只需点击登录屏幕上的专用链接即可重置密码。用户点击该链接后，将以匿名身份访问在 Microsoft Edge 或 Safari 浏览器中打开的 Adaxes 密码自助服务站点。
  用于访问该服务的网页浏览器会话受到限制，可防范不安全操作。应用于该会话的最显著限制包括：
  - 无法从密码自助重置页面跳转至其他站点的链接
  - Windows 系统下的右键菜单功能受限
  - macOS 系统下的右键菜单已禁用
  - 快捷键已禁用
  - “在新窗口打开”选项已禁用
