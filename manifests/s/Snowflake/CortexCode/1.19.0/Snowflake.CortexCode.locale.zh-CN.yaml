PackageVersion: 1.19.0
PackageLocale: zh-CN
License: 专有软件
ShortDescription: 借助 Snowflake 原生 AI 编码智能体 Cortex Code，加速您的数据生命周期。使用自然语言简化数据工程、机器学习和智能体构建。
Description: |-
  作为专为支持您整个数据栈而构建的 AI 编码智能体，Cortex Code 将复杂的数据工程、分析、机器学习和智能体构建任务转化为简单、精准且基于自然语言的交互。

  加快您数据栈上的端到端开发
  - 借助对 dbt 和 Apache Airflow®¹ 等主流数据系统的支持，轻松构建、管理和优化复杂的数据工作流。
  - 快速构建并部署 Snowflake Intelligence 智能体，通过自然语言指令直接与企业数据交互。
  - 自主生成可完全执行的机器学习流水线，并可直接在 Snowflake Notebook 中运行。

  充分利用您独特的 Snowflake 上下文
  - 深度理解您专属的数据目录，通过自然语言简化数据发现与管理。
  - 根据您的特定 Snowflake 环境、表和视图，获得智能建议，快速调试和重构代码。
  - 使用对话式指令执行复杂的管理任务，例如管理目录、设置权限、创建用户以及优化成本。

  利用内置的可扩展性、互操作性和定制化能力
  - 通过集中化配置和强大的管理控制功能，管理权限和使用策略。
  - 借助开箱即用的模型上下文协议（MCP）支持，连接 Jira、GitHub 及开发工具链中的其他智能体。
  - 构建、共享和优化专用智能体技能，或使用开源的 agents.md 框架迁移来自其他编码智能体的现有工作流。
  - 灵活选择模型（包括 Claude Opus 4.6、Claude Sonnet 4.5 和 GPT 5.2），在质量、延迟和成本之间实现最优平衡。
