ShortDescription: "BUtil cria backups incrementais, sincronização incremental e importa multimídia em seu PC com desduplicação e suporte a transportes FTPS, SFTP, SMB/CIFS para Windows e Linux."
Description: |
  Faça backup/sincronize seus dados Windows, Linux.
  Importe fotos do telefone via WI-FI e muito mais.
  
  Suporta idiomas: inglês, árabe, bengala, chinês, francês, alemão, hindi, indonésio, italiano, japonês, marata, pidgin nigeriano, português, russo, espanhol, tâmil, telugu, turco, ucraniano, urdu, vietnamita, chinês yue
  
  Recursos:
  - Backup incremental com desduplicação de arquivos e suporte a transportes SFTP, FTPS, SMB/CIFS;
  - Sincronização de arquivos entre dispositivos utilizando armazenamento centralizado e suporte a versionamento;
  - Importar mídia - Importar áudios, fotos, vídeos do cartão SD da câmera, gravador; fotos e vídeos do seu telefone via WI-FI através do aplicativo FTPS Server usando nomes de arquivos de modelo ou via MTP;
  - Transferência de arquivos P2P com criptografia entre dispositivos;
  - Console para agendamento de automação;
  - Criptografia AES-256.
  
  Plataformas: Windows 11 x64, ARM64 ou Ubuntu 24+.
