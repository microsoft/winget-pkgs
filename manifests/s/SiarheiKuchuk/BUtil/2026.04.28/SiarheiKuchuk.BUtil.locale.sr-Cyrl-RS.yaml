ShortDescription: "BUtil креира инкременталне резервне копије, инкременталну синхронизацију и увози мултимедију на вашем рачунару са дедупликацијом и подршком за FTPS, SFTP, SMB/CIFS транспорт за Windows и Linux."
Description: |
  Направите резервне копије/синхронизујте своје податке на систему Windows, Linux.
  Увезите фотографије са телефона путем WI-FI и још много тога.
  
  Подржани језици: енглески, арапски, бенгалски, кинески, француски, немачки, хинди, индонежански, италијански, јапански, маратхи, нигеријски пиџин, португалски, руски, шпански, тамилски, телугу, турски, украјински, урду, вијетнамски, кантонски
  
  Функције:
  - Инкрементална резервна копија са дедупликацијом датотека и подршком за SFTP, FTPS, SMB/CIFS транспорт;
  - Синхронизација датотека између уређаја коришћењем централизованог складишта и подршком за верзионирање;
  - Увоз медија - увоз аудија, фотографија, видео записа са SD картице камере, рекордера; фотографије и видео записи са вашег телефона путем WI-FI кроз FTPS серверску апликацију користећи шаблоне назива датотека или путем MTP;
  - P2P пренос датотека са шифровањем између уређаја;
  - Конзола за аутоматизацију планирања;
  - AES-256 шифровање.
  
  Платформе: Windows 11 x64, ARM64 или Ubuntu 24+.
