ShortDescription: "BUtil krijon kopje rezervë inkrementale, sinkronizim inkremental dhe importon multimedia në PC-në tuaj me deduplikim dhe mbështetje transporti FTPS, SFTP, SMB/CIFS për Windows dhe Linux."
Description: |
  Kopjoni/sinkronizoni të dhënat tuaja në Windows, Linux.
  Importoni foto nga telefoni përmes WI-FI dhe më shumë.
  
  Gjuhët e mbështetura: anglisht, arabisht, bengalisht, kinezisht, frëngjisht, gjermanisht, hindi, indonezisht, italisht, japonisht, marathi, pidgini nigerian, portugalisht, rusisht, spanjisht, tamilisht, telugu, turqisht, ukrainisht, urdu, vietnamisht, kinezishte kantoneze
  
  Veçoritë:
  - Kopje rezervë inkrementale me deduplikim skedarësh dhe mbështetje transporti SFTP, FTPS, SMB/CIFS;
  - Sinkronizim i skedarëve ndërmjet pajisjeve duke përdorur ruajtje të centralizuar dhe mbështetje versionimi;
  - Import mediash - Importoni audio, foto, video nga karta SD e kamerës, regjistruesit; foto dhe video nga telefoni juaj përmes WI-FI nëpërmjet aplikacionit të Serverit FTPS me emra skedarësh shablloni ose përmes MTP;
  - Transferim skedarësh P2P me kriptim ndërmjet pajisjeve;
  - Konsol për planifikimin e automatizimit;
  - Kriptim AES-256.
  
  Platformat: Windows 11 x64, ARM64 ose Ubuntu 24+.
