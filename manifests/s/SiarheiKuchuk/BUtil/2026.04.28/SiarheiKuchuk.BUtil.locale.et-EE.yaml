ShortDescription: "BUtil loob inkrementaalseid varukoopiaid, inkrementaalset sünkroniseerimist ja impordib multimeediat teie arvutisse deduplikeerimise ning FTPS, SFTP, SMB/CIFS transpordi toega Windows-i ja Linux-i jaoks."
Description: |
  Varundage/sünkroniseerige oma andmeid Windows-is, Linux-is.
  Importige fotosid telefonist WI-FI kaudu ja palju muud.
  
  Toetatud keeled: inglise, araabia, bengali, hiina, prantsuse, saksa, hindi, indoneesia, itaalia, jaapani, marathi, nigeeria pidžin, portugali, vene, hispaania, tamili, telugu, türgi, ukraina, urdu, vietnami, kantoni hiina
  
  Funktsioonid:
  - Inkrementaalne varundamine failide deduplikeerimisega ning SFTP, FTPS, SMB/CIFS transpordi toega;
  - Failide sünkroniseerimine seadmete vahel tsentraliseeritud hoidla ja versioonimise toega;
  - Meedia import - importige helisid, fotosid, videoid kaamera, diktofoni SD-kaardilt; fotosid ja videoid telefonist WI-FI kaudu FTPS-serveri rakenduse abil mallifailinimedega või MTP kaudu;
  - P2P failiedastus krüpteerimisega seadmete vahel;
  - Konsool automatiseerimise ajastamiseks;
  - AES-256 krüpteerimine.
  
  Platvormid: Windows 11 x64, ARM64 või Ubuntu 24+.
