ShortDescription: "BUtil veido inkrementālās rezerves kopijas, inkrementālu sinhronizāciju un importē multividi jūsu datorā ar deduplikāciju un FTPS, SFTP, SMB/CIFS transporta atbalstu sistēmām Windows un Linux."
Description: |
  Dublējiet/sinhronizējiet savus datus sistēmā Windows, Linux.
  Importējiet fotogrāfijas no tālruņa, izmantojot WI-FI, un vēl vairāk.
  
  Atbalstītās valodas: angļu, arābu, bengāļu, ķīniešu, franču, vācu, hindi, indonēziešu, itāļu, japāņu, maratu, Nigērijas pidžins, portugāļu, krievu, spāņu, tamilu, telugu, turku, ukraiņu, urdu, vjetnamiešu, kantoniešu
  
  Funkcijas:
  - Inkrementālā rezerves kopija ar failu deduplikāciju un SFTP, FTPS, SMB/CIFS transporta atbalstu;
  - Failu sinhronizācija starp ierīcēm, izmantojot centralizētu krātuvi un versiju atbalstu;
  - Multivides importēšana - importējiet audio, fotogrāfijas, video no kameras, diktofona SD kartes; fotogrāfijas un video no tālruņa, izmantojot WI-FI caur FTPS servera lietotni ar veidņu failu nosaukumiem vai caur MTP;
  - P2P failu pārsūtīšana ar šifrēšanu starp ierīcēm;
  - Konsole automatizācijas plānošanai;
  - AES-256 šifrēšana.
  
  Platformas: Windows 11 x64, ARM64 vai Ubuntu 24+.
