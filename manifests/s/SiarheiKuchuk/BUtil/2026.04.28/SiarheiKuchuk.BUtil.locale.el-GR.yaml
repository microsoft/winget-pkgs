ShortDescription: "Το BUtil δημιουργεί σταδιακά αντίγραφα ασφαλείας, σταδιακό συγχρονισμό και εισάγει πολυμέσα στον υπολογιστή σας με αποδιπλασιασμό και υποστήριξη μεταφορών FTPS, SFTP, SMB/CIFS για Windows και Linux."
Description: |
  Δημιουργία αντιγράφων ασφαλείας/συγχρονισμός των δεδομένων σας σε Windows, Linux.
  Εισαγωγή φωτογραφιών από τηλέφωνο μέσω WI-FI και πολλά άλλα.
  
  Υποστηριζόμενες γλώσσες: Αγγλικά, Αραβικά, Βεγγαλικά, Κινεζικά, Γαλλικά, Γερμανικά, Χίντι, Ινδονησιακά, Ιταλικά, Ιαπωνικά, Μαράθι, Νιγηριανό Πίτζιν, Πορτογαλικά, Ρωσικά, Ισπανικά, Ταμίλ, Τελούγκου, Τουρκικά, Ουκρανικά, Ουρντού, Βιετναμέζικα, Καντονέζικα
  
  Χαρακτηριστικά:
  - Σταδιακό αντίγραφο ασφαλείας με αποδιπλασιασμό αρχείων και υποστήριξη μεταφορών SFTP, FTPS, SMB/CIFS·
  - Συγχρονισμός αρχείων μεταξύ συσκευών με χρήση κεντρικού αποθηκευτικού χώρου και υποστήριξη εκδόσεων·
  - Εισαγωγή πολυμέσων - Εισαγωγή ήχων, φωτογραφιών, βίντεο από κάρτα SD κάμερας, εγγραφέα· φωτογραφίες και βίντεο από το τηλέφωνό σας μέσω WI-FI μέσω εφαρμογής FTPS Server με ονόματα αρχείων προτύπου ή μέσω MTP·
  - P2P μεταφορά αρχείων με κρυπτογράφηση μεταξύ συσκευών·
  - Κονσόλα για αυτοματοποίηση προγραμματισμού·
  - Κρυπτογράφηση AES-256.
  
  Πλατφόρμες: Windows 11 x64, ARM64 ή Ubuntu 24+.
