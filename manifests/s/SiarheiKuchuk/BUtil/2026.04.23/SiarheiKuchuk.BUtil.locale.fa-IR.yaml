ShortDescription: BUtil پشتیبان‌های تدریجی، همگام‌سازی تدریجی ایجاد می‌کند و چندرسانه‌ای را در رایانه شما با حذف تکراری و پشتیبانی از انتقال FTPS، SFTP، SMB/CIFS برای Windows و Linux وارد می‌کند.
Description: |
  پشتیبان‌گیری/همگام‌سازی داده‌های شما در Windows، Linux.
  وارد کردن عکس‌ها از تلفن از طریق WI-FI و موارد دیگر.
  
  زبان‌های پشتیبانی‌شده: انگلیسی، عربی، بنگالی، چینی، فرانسوی، آلمانی، هندی، اندونزیایی، ایتالیایی، ژاپنی، مراتی، پیجین نیجریه‌ای، پرتغالی، روسی، اسپانیایی، تامیلی، تلوگو، ترکی، اوکراینی، اردو، ویتنامی، کانتونی
  
  ویژگی‌ها:
  - پشتیبان‌گیری تدریجی با حذف تکراری فایل‌ها و پشتیبانی از انتقال SFTP، FTPS، SMB/CIFS؛
  - همگام‌سازی فایل‌ها بین دستگاه‌ها با استفاده از فضای ذخیره‌سازی متمرکز و پشتیبانی از نسخه‌بندی؛
  - وارد کردن رسانه - وارد کردن صداها، عکس‌ها، ویدیوها از کارت SD دوربین، ضبط‌کننده؛ عکس‌ها و ویدیوها از تلفن شما از طریق WI-FI با استفاده از برنامه FTPS Server با نام فایل‌های الگو یا از طریق MTP؛
  - انتقال فایل P2P با رمزنگاری بین دستگاه‌ها؛
  - کنسول برای زمان‌بندی خودکار؛
  - رمزنگاری AES-256.
  
  پلتفرم‌ها: Windows 11 x64، ARM64 یا Ubuntu 24+.
