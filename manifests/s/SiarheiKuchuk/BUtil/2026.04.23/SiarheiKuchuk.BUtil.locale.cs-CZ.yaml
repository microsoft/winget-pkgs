ShortDescription: BUtil vytváří přírůstkové zálohy, přírůstkovou synchronizaci a importuje multimédia na vašem PC s deduplikací a podporou přenosů FTPS, SFTP, SMB/CIFS pro Windows a Linux.
Description: |
  Zálohujte/synchronizujte svá data ve Windows, Linux.
  Importujte fotografie z telefonu přes WI-FI a další.
  
  Podporované jazyky: Angličtina, Arabština, Bengálština, Čínština, Francouzština, Němčina, Hindština, Indonéština, Italština, Japonština, Maráthština, Nigerijský pidžin, Portugalština, Ruština, Španělština, Tamilština, Telugština, Turečtina, Ukrajinština, Urdština, Vietnamština, Kantonština
  
  Funkce:
  - Přírůstková záloha s deduplikací souborů a podporou přenosů SFTP, FTPS, SMB/CIFS;
  - Synchronizace souborů mezi zařízeními pomocí centralizovaného úložiště a podpora verzování;
  - Import médií - Import zvuků, fotografií, videí z SD karty fotoaparátu, rekordéru; fotografií a videí z telefonu přes WI-FI prostřednictvím aplikace FTPS Server s použitím šablonových názvů souborů nebo přes MTP;
  - P2P přenos souborů se šifrováním mezi zařízeními;
  - Konzole pro plánování automatizace;
  - Šifrování AES-256.
  
  Platformy: Windows 11 x64, ARM64 nebo Ubuntu 24+.
