ShortDescription: BUtil 建立增量備份、增量同步並在您的電腦上匯入多媒體，支援去重複和 FTPS、SFTP、SMB/CIFS 傳輸，適用於 Windows 和 Linux。
Description: |
  在 Windows、Linux 上備份/同步您的資料。
  透過 WI-FI 從手機匯入照片等。
  
  支援語言：英語、阿拉伯語、孟加拉語、中文、法語、德語、印地語、印尼語、義大利語、日語、馬拉地語、奈及利亞皮欽語、葡萄牙語、俄語、西班牙語、泰米爾語、泰盧固語、土耳其語、烏克蘭語、烏爾都語、越南語、粵語
  
  功能：
  - 增量備份，支援檔案去重複和 SFTP、FTPS、SMB/CIFS 傳輸；
  - 使用集中式儲存空間在裝置之間同步檔案，並支援版本控制；
  - 匯入媒體 - 從相機、錄音機的 SD 卡匯入音訊、照片、影片；透過 WI-FI 使用 FTPS Server 應用程式以範本檔案名稱從手機匯入照片和影片，或透過 MTP；
  - 裝置之間的 P2P 加密檔案傳輸；
  - 自動化排程主控台；
  - AES-256 加密。
  
  平台：Windows 11 x64、ARM64 或 Ubuntu 24+。
