ShortDescription: BUtil ustvarja inkrementalne varnostne kopije, inkrementalno sinhronizacijo in uvaža multimedijo na vašem računalniku z deduplikacijo in podporo za FTPS, SFTP, SMB/CIFS prenos za Windows in Linux.
Description: |
  Varnostno kopirajte/sinhronizirajte svoje podatke v sistemu Windows, Linux.
  Uvozite fotografije iz telefona prek WI-FI in še več.
  
  Podprti jeziki: angleščina, arabščina, bengalščina, kitajščina, francoščina, nemščina, hindijščina, indonezijščina, italijanščina, japonščina, maratščina, nigerijski pidžin, portugalščina, ruščina, španščina, tamilščina, telugščina, turščina, ukrajinščina, urdujščina, vietnamščina, kantonščina
  
  Funkcije:
  - Inkrementalna varnostna kopija z deduplikacijo datotek in podporo za SFTP, FTPS, SMB/CIFS prenos;
  - Sinhronizacija datotek med napravami z uporabo centralizirane shrambe in podporo za različice;
  - Uvoz medijev - uvozite zvočne posnetke, fotografije, videoposnetke s SD kartice kamere, snemalnika; fotografije in videoposnetke iz telefona prek WI-FI prek FTPS strežniške aplikacije z uporabo predlog imen datotek ali prek MTP;
  - P2P prenos datotek s šifriranjem med napravami;
  - Konzola za avtomatizacijo razporejanja;
  - AES-256 šifriranje.
  
  Platforme: Windows 11 x64, ARM64 ali Ubuntu 24+.
