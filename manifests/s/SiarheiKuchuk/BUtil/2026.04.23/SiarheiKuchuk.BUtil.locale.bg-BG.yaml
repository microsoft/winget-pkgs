ShortDescription: BUtil създава инкрементални архиви, инкрементална синхронизация и импортира мултимедия на вашия компютър с дедупликация и поддръжка на FTPS, SFTP, SMB/CIFS транспорт за Windows и Linux.
Description: |
  Архивирайте/синхронизирайте вашите данни под Windows, Linux.
  Импортирайте снимки от телефон чрез WI-FI и още.
  
  Поддържани езици: английски, арабски, бенгалски, китайски, френски, немски, хинди, индонезийски, италиански, японски, маратхи, нигерийски пиджин, португалски, руски, испански, тамилски, телугу, турски, украински, урду, виетнамски, кантонски
  
  Функции:
  - Инкрементално архивиране с дедупликация на файлове и поддръжка на SFTP, FTPS, SMB/CIFS транспорт;
  - Синхронизация на файлове между устройства с централизирано хранилище и поддръжка на версии;
  - Импортиране на медия - импортиране на аудио, снимки, видеоклипове от SD карта на камера, рекордер; снимки и видеоклипове от телефон чрез WI-FI чрез FTPS сървър приложение с шаблонни имена на файлове или чрез MTP;
  - P2P трансфер на файлове с криптиране между устройства;
  - Конзола за автоматизирано планиране;
  - AES-256 криптиране.
  
  Платформи: Windows 11 x64, ARM64 или Ubuntu 24+.
