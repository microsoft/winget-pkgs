ShortDescription: BUtil opretter inkrementelle sikkerhedskopier, inkrementel synkronisering og importerer multimedier på din PC med deduplikering og FTPS-, SFTP-, SMB/CIFS-transportunderstøttelse til Windows og Linux.
Description: |
  Sikkerhedskopier/synkroniser dine data på Windows, Linux.
  Importér fotos fra telefon via WI-FI og mere.
  
  Understøttede sprog: Engelsk, arabisk, bengalsk, kinesisk, fransk, tysk, hindi, indonesisk, italiensk, japansk, marathi, nigeriansk pidgin, portugisisk, russisk, spansk, tamil, telugu, tyrkisk, ukrainsk, urdu, vietnamesisk, kantonesisk
  
  Funktioner:
  - Inkrementel backup med fildeduplikering og SFTP-, FTPS-, SMB/CIFS-transportunderstøttelse;
  - Synkronisering af filer mellem enheder med centraliseret lager og versioneringsunderstøttelse;
  - Medieimport - Importér lyd, fotos, videoer fra SD-kort i kamera, optager; fotos og videoer fra din telefon via WI-FI gennem FTPS Server-applikationen med skabelonfilnavne eller via MTP;
  - P2P-filoverførsel med kryptering mellem enheder;
  - Konsol til automatiseringsplanlægning;
  - AES-256-kryptering.
  
  Platforme: Windows 11 x64, ARM64 eller Ubuntu 24+.
