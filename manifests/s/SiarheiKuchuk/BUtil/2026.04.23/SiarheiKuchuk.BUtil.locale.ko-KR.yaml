ShortDescription: BUtil은 Windows 및 Linux에서 중복 제거 및 FTPS, SFTP, SMB/CIFS 전송을 지원하는 증분 백업, 증분 동기화 및 멀티미디어 가져오기를 수행합니다.
Description: |
  Windows, Linux에서 데이터를 백업/동기화하세요.
  WI-FI를 통해 휴대폰에서 사진을 가져오는 등 다양한 기능을 제공합니다.
  
  지원 언어: 영어, 아랍어, 벵골어, 중국어, 프랑스어, 독일어, 힌디어, 인도네시아어, 이탈리아어, 일본어, 마라티어, 나이지리아 피진어, 포르투갈어, 러시아어, 스페인어, 타밀어, 텔루구어, 터키어, 우크라이나어, 우르두어, 베트남어, 광동어
  
  기능:
  - 파일 중복 제거 및 SFTP, FTPS, SMB/CIFS 전송 지원을 통한 증분 백업;
  - 중앙 저장소 및 버전 관리 지원을 사용한 장치 간 파일 동기화;
  - 미디어 가져오기 - 카메라, 레코더의 SD 카드에서 오디오, 사진, 동영상 가져오기; FTPS 서버 앱을 통해 WI-FI로 또는 MTP를 통해 템플릿 파일 이름으로 휴대폰에서 사진과 동영상 가져오기;
  - 장치 간 암호화된 P2P 파일 전송;
  - 자동화 예약을 위한 콘솔;
  - AES-256 암호화.
  
  플랫폼: Windows 11 x64, ARM64 또는 Ubuntu 24+.
