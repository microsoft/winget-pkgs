ShortDescription: BUtil stvara inkrementalne sigurnosne kopije, inkrementalnu sinkronizaciju i uvozi multimediju na vaše računalo s deduplikacijom i podrškom za FTPS, SFTP, SMB/CIFS prijenos za Windows i Linux.
Description: |
  Sigurnosno kopirajte/sinkronizirajte svoje podatke na sustavu Windows, Linux.
  Uvezite fotografije s telefona putem WI-FI i još mnogo toga.
  
  Podržani jezici: engleski, arapski, bengalski, kineski, francuski, njemački, hindi, indonezijski, talijanski, japanski, marathijski, nigerijski pidžin, portugalski, ruski, španjolski, tamilski, telugu, turski, ukrajinski, urdu, vijetnamski, kantonski
  
  Značajke:
  - Inkrementalno sigurnosno kopiranje s deduplikacijom datoteka i podrškom za SFTP, FTPS, SMB/CIFS prijenos;
  - Sinkronizacija datoteka između uređaja koristeći centraliziranu pohranu i podršku za verzioniranje;
  - Uvoz medija - uvoz audija, fotografija, videozapisa s SD kartice kamere, snimača; fotografije i videozapisi s vašeg telefona putem WI-FI kroz FTPS poslužiteljsku aplikaciju koristeći predloške naziva datoteka ili putem MTP;
  - P2P prijenos datoteka s enkripcijom između uređaja;
  - Konzola za automatizaciju raspoređivanja;
  - AES-256 enkripcija.
  
  Platforme: Windows 11 x64, ARM64 ili Ubuntu 24+.
