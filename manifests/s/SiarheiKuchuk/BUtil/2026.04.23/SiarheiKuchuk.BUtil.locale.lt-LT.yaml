ShortDescription: BUtil kuria inkrementines atsargines kopijas, inkrementinę sinchronizaciją ir importuoja multimediją jūsų kompiuteryje su deduplikacija ir FTPS, SFTP, SMB/CIFS transporto palaikymu, skirtu Windows ir Linux.
Description: |
  Kurkite atsargines kopijas/sinchronizuokite savo duomenis sistemoje Windows, Linux.
  Importuokite nuotraukas iš telefono per WI-FI ir daugiau.
  
  Palaikomos kalbos: anglų, arabų, bengalų, kinų, prancūzų, vokiečių, hindi, indoneziečių, italų, japonų, marathų, Nigerijos pidžinas, portugalų, rusų, ispanų, tamilų, telugų, turkų, ukrainiečių, urdu, vietnamiečių, kantoniečių
  
  Funkcijos:
  - Inkrementinė atsarginė kopija su failų deduplikacija ir SFTP, FTPS, SMB/CIFS transporto palaikymu;
  - Failų sinchronizacija tarp įrenginių naudojant centralizuotą saugyklą ir versijų palaikymą;
  - Medijos importavimas - importuokite garso įrašus, nuotraukas, vaizdo įrašus iš fotoaparato, diktofo SD kortelės; nuotraukas ir vaizdo įrašus iš telefono per WI-FI naudojant FTPS serverio programą su šabloniniais failų pavadinimais arba per MTP;
  - P2P failų perdavimas su šifravimu tarp įrenginių;
  - Konsolė automatizavimo planavimui;
  - AES-256 šifravimas.
  
  Platformos: Windows 11 x64, ARM64 arba Ubuntu 24+.
