ShortDescription: BUtil kreira inkrementalne sigurnosne kopije, inkrementalnu sinhronizaciju i uvozi multimediju na vašem računaru s deduplikacijom i podrškom za FTPS, SFTP, SMB/CIFS transport za Windows i Linux.
Description: |
  Napravite sigurnosnu kopiju/sinhronizujte svoje podatke na Windows, Linux.
  Uvezite fotografije s telefona putem WI-FI i više.
  
  Podržani jezici: engleski, arapski, bengalski, kineski, francuski, njemački, hindi, indonezijski, italijanski, japanski, marati, nigerijski pidžin, portugalski, ruski, španski, tamilski, telugu, turski, ukrajinski, urdu, vijetnamski, kantonski kineski
  
  Funkcije:
  - Inkrementalna sigurnosna kopija s deduplikacijom datoteka i podrškom za SFTP, FTPS, SMB/CIFS transport;
  - Sinhronizacija datoteka između uređaja koristeći centraliziranu pohranu i podršku za verzioniranje;
  - Uvoz medija - Uvezite audio, fotografije, video zapise sa SD kartice kamere, snimača; fotografije i video zapise s vašeg telefona putem WI-FI kroz FTPS Server aplikaciju koristeći nazive datoteka šablona ili putem MTP;
  - P2P prijenos datoteka s enkripcijom između uređaja;
  - Konzola za zakazivanje automatizacije;
  - AES-256 enkripcija.
  
  Platforme: Windows 11 x64, ARM64 ili Ubuntu 24+.
