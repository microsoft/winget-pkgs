ShortDescription: "Bidh BUtil a’ cruthachadh cùl-taic mean air mhean, sioncronadh mean air mhean agus a’ toirt a-steach ioma-mheadhan air do PC le deduplication agus FTPS, SFTP, SMB / CIFS a’ giùlan taic airson Windows agus Linux."
Description: |
  Dèan cùl-taic / sioncronaich an dàta agad Windows, Linux.
  Cuir a-steach dealbhan bhon fhòn tro WI-FI agus barrachd.
  
  Feartan:
  - Cùl-taic mean air mhean le dùblachadh fhaidhlichean agus taic còmhdhail SFTP, FTPS, SMB / CIFS;
  - Sioncronadh fhaidhlichean eadar innealan a’ cleachdadh stòradh meadhanaichte agus taic dreach;
  - Cuir a-steach meadhanan - Cuir a-steach clàran-fuaim, dealbhan, bhideothan bho chairt SD camara, inneal clàraidh; dealbhan agus bhideothan bhon fhòn agad tro WI-FI tro thagradh FTPS Server a’ cleachdadh ainmean faidhle teamplaid no tro MTP;
  - Gluasad faidhle P2P le crioptachadh eadar innealan;
  - Console airson clàradh fèin-ghluasad;
  - crioptachadh AES-256.
  
  Àrd-ùrlaran: Windows 11 x64, ARM64 no Ubuntu 24+.
