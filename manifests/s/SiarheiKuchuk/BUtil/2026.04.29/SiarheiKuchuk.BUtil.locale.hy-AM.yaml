ShortDescription: "BUtil-ը ստեղծում է հավելյալ կրկնօրինակումներ, աստիճանաբար համաժամացում և ներմուծում է մուլտիմեդիա ձեր համակարգչի վրա կրկնօրինակման միջոցով և FTPS, SFTP, SMB/CIFS-ն ապահովում է Windows-ի և Linux-ի համար նախատեսված աջակցություն:"
Description: |
  Կրկնօրինակեք/համաժամացրեք ձեր տվյալները Windows, Linux:
  Ներմուծեք լուսանկարներ հեռախոսից WI-FI-ի միջոցով և ավելին:
  
  Առանձնահատկություններ:
  - Ավելացվող կրկնօրինակում ֆայլերի կրկնօրինակմամբ և SFTP, FTPS, SMB/CIFS փոխադրումների աջակցությամբ;
  - Կենտրոնացված պահեստավորման և տարբերակների աջակցությամբ սարքերի միջև ֆայլերի համաժամացում;
  - Ներմուծեք մեդիա - Ներմուծեք աուդիոներ, լուսանկարներ, տեսանյութեր տեսախցիկի, ձայնագրիչի SD քարտից; լուսանկարներ և տեսանյութեր ձեր հեռախոսից WI-FI-ի միջոցով FTPS Server հավելվածի միջոցով՝ օգտագործելով ձևանմուշ ֆայլերի անունները կամ MTP-ի միջոցով;
  - P2P ֆայլերի փոխանցում սարքերի միջև գաղտնագրմամբ;
  - Ավտոմատացման պլանավորման վահանակ;
  - AES-256 կոդավորումը:
  
  Պլատֆորմներ՝ Windows 11 x64, ARM64 կամ Ubuntu 24+:
