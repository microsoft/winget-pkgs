ShortDescription: "BUtilは、WindowsおよびLinux向けの重複排除とWebDAV, S3-compatible, NFS, Azure Blob, SFTP, FTPS, SMB/CIFSトランスポートサポートを備えた増分バックアップ、増分同期、マルチメディアインポートをPCで作成します。"
Description: |
  Windows、Linuxでデータをバックアップ/同期します。
  WI-FI経由で電話から写真をインポートなど。
  
  機能：
  - ファイルの重複排除とWebDAV, S3-compatible, NFS, Azure Blob, SFTP, FTPS, SMB/CIFSトランスポートサポートを備えた増分バックアップ；
  - 集中ストレージとバージョン管理サポートを使用したデバイス間のファイル同期；
  - メディアインポート - カメラ、レコーダーのSDカードからオーディオ、写真、ビデオをインポート；テンプレートファイル名を使用したFTPSサーバーアプリケーション経由 WI-FIを通じて電話から写真とビデオ;
  - 自動化スケジューリング用コンソール；
  - AES-256暗号化。
  
  プラットフォーム：Windows 11 x64、ARM64またはUbuntu 24+。
