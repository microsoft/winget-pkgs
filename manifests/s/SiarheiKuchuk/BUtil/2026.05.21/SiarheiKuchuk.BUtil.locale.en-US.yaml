ShortDescription: "BUtil creates incremental backups, synchronization, and media imports on Windows and Linux with deduplication and support for WebDAV, S3-compatible, NFS, Azure Blob, SFTP, FTPS, and SMB/CIFS storages."
Description: |
  Backup/synchronize your data on Windows and Linux.
  Import photos from phone via Wi-Fi and more.
  
  Features:
  - Incremental backup with deduplication and support for local folders, WebDAV, S3-compatible, NFS, Azure Blob, SFTP, FTPS, SMB/CIFS storages;
  - Synchronization of files between devices using centralized storage with versioning support;
  - Import media — import audio, photos, videos from SD cards, cameras, recorders; import photos and videos from your phone via Wi-Fi through the FTPS Server companion app using template file names;
  - Console for automation and scheduling;
  - AES-256 encryption.
  
  Platforms: Windows 11 x64, ARM64 or Ubuntu 24+.
