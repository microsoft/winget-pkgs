ShortDescription: Програма для анотації знімків екрана для Windows і Linux.
Description: |
  Програма для анотації знімків екрана для Windows і Linux.

  Можливості:
  - **Стрілки** - Привертайте увагу до ділянок за допомогою налаштовуваних стрілок
  - **Виноски** - Додавайте «хмаринки» з текстом, який можна редагувати
  - **Нотатки** - Створюйте текстові поля для додаткової інформації
  - **Виділення рамкою** - Підсвічуйте області прямокутниками з контуром
  - **Розмиття** - Приховуйте чутливу інформацію
  - **Інструмент виділення** - Виділяйте частини зображення для копіювання (Ctrl+C) або видалення (Delete)
  - **Вирізання вертикальних і горизонтальних смуг** - Вирізайте вертикальні або горизонтальні ділянки зображення
  - **Маркер** - Підсвічуйте цікаві області
  - **Керування проєктами** - Автозбереження та мініатюри попереднього перегляду
  - **Кросплатформність** - Працює на Windows і Linux

