ShortDescription: Logiciel d'annotation de captures d'écran pour Windows et Linux.
Description: |
  Logiciel d'annotation de captures d'écran pour Windows et Linux.

  Fonctionnalités :
  - **Flèches** - Attirez l'attention sur des zones avec des flèches personnalisables
  - **Bulles** - Ajoutez des bulles de dialogue avec texte modifiable
  - **Notes** - Créez des zones de texte pour des informations supplémentaires
  - **Sélection avec bordure** - Mettez en évidence des zones avec des rectangles bordés
  - **Flou** - Masquez les informations sensibles
  - **Outil de sélection** - Sélectionnez des parties de l'image à copier (Ctrl+C) ou supprimer (Suppr)
  - **Découpe verticale et horizontale** - Découpez des bandes verticales ou horizontales
  - **Surligneur** - Surlignez les zones d'intérêt
  - **Gestion de projets** - Enregistrement automatique et miniatures d'aperçu
  - **Multiplateforme** - Fonctionne sur Windows et Linux

