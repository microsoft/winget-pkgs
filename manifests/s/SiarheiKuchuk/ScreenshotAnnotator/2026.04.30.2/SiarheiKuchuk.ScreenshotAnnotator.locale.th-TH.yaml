ShortDescription: "ซอฟต์แวร์เพิ่มคำอธิบายประกอบบนภาพหน้าจอสำหรับ Windows และ Linux"
Description: |
  ซอฟต์แวร์เพิ่มคำอธิบายประกอบบนภาพหน้าจอสำหรับ Windows และ Linux
  
  คุณสมบัติ:
  - **ลูกศร** - ดึงความสนใจไปยังพื้นที่เฉพาะด้วยลูกศรที่ปรับแต่งได้
  - **คำอธิบาย** - เพิ่มคำอธิบายประกอบแบบฟองคำพูดพร้อมข้อความที่แก้ไขได้
  - **บันทึก** - สร้างกล่องข้อความสำหรับข้อมูลเพิ่มเติม
  - **การเลือกเส้นขอบ** - เน้นพื้นที่ด้วยสี่เหลี่ยมที่มีเส้นขอบ
  - **เบลอ** - ซ่อนข้อมูลที่ละเอียดอ่อนด้วยเอฟเฟกต์เบลอ
  - **เครื่องมือเลือก** - เลือกส่วนของรูปภาพเพื่อคัดลอก (Ctrl+C) หรือลบ (ปุ่ม Delete)
  - **ตัดชิ้นส่วนแนวตั้งและแนวนอน** - ตัดพื้นที่แนวตั้งหรือแนวนอนของรูปภาพ
  - **ไฮไลต์** - เน้นพื้นที่ที่น่าสนใจ
  - **การจัดการโปรเจกต์** - บันทึกโปรเจกต์อัตโนมัติและภาพขนาดย่อสำหรับดูตัวอย่าง
  - **ข้ามแพลตฟอร์ม** - ใช้งานได้ทั้ง Windows และ Linux
