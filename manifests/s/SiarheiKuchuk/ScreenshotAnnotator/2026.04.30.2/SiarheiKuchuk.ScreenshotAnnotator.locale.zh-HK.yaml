ShortDescription: "適用於 Windows 同 Linux 嘅截圖標註軟件。"
Description: |
  適用於 Windows 同 Linux 嘅截圖標註軟件。
  
  功能：
  - **箭嘴** - 用可自訂箭嘴引導注意特定區域
  - **標註框** - 加入可編輯文字嘅對話氣泡標註
  - **備註** - 建立文字框添加額外資訊
  - **邊框選擇** - 用有邊框嘅長方形突顯範圍
  - **模糊** - 用模糊效果遮掩敏感資料
  - **選取工具** - 揀選圖像部分以複製（Ctrl+C）或刪除（Delete）
  - **裁剪直向同橫向區域** - 裁剪圖像嘅直向或橫向範圍
  - **醒目提示筆** - 標示重點範圍
  - **專案管理** - 自動儲存專案同預覽縮圖
  - **跨平台** - 支援 Windows 同 Linux
