ShortDescription: "កម្មវិធីសរសេរចំណាំរូបថតអេក្រង់សម្រាប់ Windows និង Linux។"
Description: |
  កម្មវិធីសរសេរចំណាំរូបថតអេក្រង់សម្រាប់ Windows និង Linux។
  
  លក្ខណៈពិសេស:
  - **ព្រួញ** - ទាក់ទាញការយកចិត្តទុកដាក់ទៅតំបន់ជាក់លាក់ដោយប្រើព្រួញដែលអាចប្ដូរតាមបំណង
  - **ចំណាំ** - បន្ថែមចំណាំស្ទីល bubble ដែលមានអត្ថបទដែលអាចកែបាន
  - **កំណត់ចំណាំ** - បង្កើតប្រអប់អត្ថបទជាមួយព័ត៌មានបន្ថែម
  - **គូសបញ្ជាក់បន្ទាត់ព័ទ្ធ** - គូសបញ្ជាក់តំបន់ជាមួយចតុកោណព័ទ្ធ
  - **ព្រិល** - លាក់ព័ត៌មានរសើបជាមួយឥទ្ធិពលព្រិល
  - **ឧបករណ៍ជ្រើសរើស** - ជ្រើសរើសផ្នែករូបភាពសម្រាប់ចម្លង (Ctrl+C) ឬលុប (គ្រាប់ Delete)
  - **កាត់ឈរ និងផ្តេក** - កាត់តំបន់ឈរ ឬផ្តេករូបភាព
  - **គូសបញ្ជាក់** - គូសបញ្ជាក់តំបន់ដែលចាប់អារម្មណ៍
  - **ការគ្រប់គ្រងគម្រោង** - រក្សាទុកគម្រោងដោយស្វ័យប្រវត្តិ និងរូបភាពបង្ហាញតូច
  - **ឆ្លងប្រព័ន្ធ** - ដំណើរការនៅលើ Windows និង Linux ទាំងពីរ
