Description: |
  Windows اور Linux کے لیے اسکرین شاٹ نوٹسازی سافٹ ویئر۔

  خصوصیات:
  - **تیر** - حسب ضرورت تیروں سے مخصوص علاقوں پر توجہ مرکوز کریں
  - **کال آؤٹ** - قابل ترمیم متن کے ساتھ تقریر کے بلبلے شامل کریں
  - **نوٹس** - اضافی معلومات کے لیے متن خانے بنائیں
  - **بارڈر انتخاب** - بارڈر والے مستطیلات سے علاقے نمایاں کریں
  - **دھندلاپن** - حساس معلومات چھپائیں
  - **منتخب آلہ** - نقل (Ctrl+C) یا حذف (Delete) کے لیے تصویر کے حصے منتخب کریں
  - **عمودی اور افقی سلائس کاٹیں** - تصویر کے عمودی یا افقی حصے کاٹیں
  - **نمایاں کار** - دلچسپی کے علاقے نمایاں کریں
  - **پروجیکٹ مینجمنٹ** - خودکار محفوظ اور تھمب نیل پیش نظارے
  - **کراس پلیٹ فارم** - Windows اور Linux پر چلتا ہے

