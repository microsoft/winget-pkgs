ShortDescription: Cross-platform battery monitoring and notification app
Description: |-
  BatteryNotifier monitors your laptop battery and sends desktop notifications when the battery is fully charged or running low.
  Features include customizable charge thresholds, notification sounds (built-in, bundled, or custom), system tray integration,
  theme support (Light/Dark/System), Do Not Disturb awareness, and launch-at-startup.
