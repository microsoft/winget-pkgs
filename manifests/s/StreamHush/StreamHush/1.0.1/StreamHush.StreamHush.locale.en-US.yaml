ShortDescription: Copyright shield for OBS - automatically mutes copyrighted music off your live stream.
Description: StreamHush runs next to OBS, listens to your desktop audio, and mutes copyrighted songs off your broadcast in about two seconds - before they reach your stream or VOD - then un-mutes when the music stops. It only mutes the music source, never your microphone. Works with OBS on Twitch, Kick and YouTube. Requires a StreamHush account; free to try.
