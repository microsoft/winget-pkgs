PackageIdentifier: Shinokada.SvelteNext
PackageVersion: 1.0.1
PackageLocale: en-US
Publisher: Shinokada
PackageName: svelte-next
PackageUrl: https://github.com/shinokada/svelte-next
License: MIT
LicenseUrl: https://github.com/shinokada/svelte-next/blob/main/LICENSE
ShortDescription: Automate Svelte 5+ version updates across multiple project directories
Description: |
  svelte-next scans a target directory, detects Svelte 5+ projects, and runs
  package updates, svelte installs, integration/e2e tests, and git commits —
  all in one command. It supports bun, pnpm, yarn, and npm via automatic
  lock-file detection, and ships as a single static binary with no runtime
  dependencies.
