ShortDescription: Hardware-backed identity for developers
Description: |-
  Vouch is a hardware-backed authentication system that issues short-lived
  credentials only after a human touches a YubiKey. One touch, one PIN, one
  8-hour session — then SSH, AWS, Kubernetes, and more just work.

  Vouch requires physical presence for every credential issuance, replacing
  long-lived API keys and password-plus-push MFA with FIDO2-verified, time-
  bounded credentials.
