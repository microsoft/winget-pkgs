ShortDescription: Professional PowerShell tools for IT technicians — 32 scripts plus a WPF launcher.
Description: |
  SouliTEK All-In-One Scripts is a curated collection of PowerShell tools for IT technicians.
  After installation, you get a WPF launcher (`SouliTEK Launcher`) plus 32 individual tools
  covering PC setup (one-click provisioning, essential tweaks, preinstalled-bloatware removal,
  software installation and updates), performance analysis (startup, battery, storage, memory,
  and disk usage), security (drive-encryption status, multi-engine file reputation scans,
  browser add-on checks, USB device history, local-administrator audit), cloud productivity
  administration (license expiration, user listing, collaboration-site inventory, mail
  administration, calendar permissions, mailbox-export discovery), networking (saved Wi-Fi
  credential viewer, connection monitor, connectivity tests, adapter configuration), and
  general support (print spooler repair, event log analysis, crash history, cloud-storage sync
  repair, third-party antivirus removal, system restore points, temporary file cleanup, and
  product key retrieval).

  Default installation path is `C:\SouliTEK`. The installer creates a Desktop shortcut and
  downloads all scripts from GitHub. After running `winget install Soulitek.AllInOneScripts`,
  invoke the installer with the `Install-SouliTEK` command from any shell. Pass `-Silent` for
  unattended installs.

  Requires Windows 10 build 17763 (1809) or later. Most tools require Administrator privileges.
