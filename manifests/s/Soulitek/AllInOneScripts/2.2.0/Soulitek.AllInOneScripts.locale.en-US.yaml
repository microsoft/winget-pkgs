ShortDescription: Professional PowerShell tools for IT technicians — 32 scripts plus a WPF launcher.
Description: |
  SouliTEK All-In-One Scripts is a curated collection of PowerShell tools for IT technicians.
  After installation, you get a WPF launcher (`SouliTEK Launcher`) plus 32 individual tools
  covering PC setup (1-Click PC Install, Essential Tweaks, Win11 Debloat, software installation
  and updates), performance analysis (startup, battery, storage, RAM, disk usage), security
  (BitLocker status, VirusTotal scans, browser plugin checks, USB device history, local admin
  audit), Microsoft 365 administration (license expiration, user list, SharePoint inventory,
  Exchange Online, calendar permissions, PST finder), networking (WiFi password viewer, WiFi
  monitor, network test, network configuration), and general support (printer spooler repair,
  event log analysis, BSOD history, OneDrive sync, McAfee removal, system restore points, temp
  cleanup, product key retrieval).

  Default installation path is `C:\SouliTEK`. The installer creates a Desktop shortcut and
  downloads all scripts from GitHub. After running `winget install Soulitek.AllInOneScripts`,
  invoke the installer with the `Install-SouliTEK` command from any shell. Pass `-Silent` for
  unattended installs.

  Requires Windows 10 build 17763 (1809) or later. Most tools require Administrator privileges.
