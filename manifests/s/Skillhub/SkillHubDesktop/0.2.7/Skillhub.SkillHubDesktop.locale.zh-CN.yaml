ShortDescription: 一个桌面端即可管理您的智能体技能
Description: |-
  一款用于跨多种工具管理 AI 编程技能（Skill）的桌面应用程序。在 Claude Code、Cursor、OpenCode 等工具之间浏览、安装并同步技能。

  功能特点
  - 发现技能 - 浏览并搜索 SkillHub 目录中的 AI 编程技能
  - 一键安装 - 同时将技能安装到多个 AI 编程工具中
  - 创建技能 - 利用 AI 驱动生成自定义技能
  - AI 增强 - 使用 AI 对选定文本进行扩充、简化、重写或翻译
  - 同步技能 - 在不同的 AI 编程工具之间同步技能
  - 集合管理 - 组织并管理技能集合
  - 多语言支持 - 支持英文和中文

  支持的工具
  - Claude Code
  - Cursor
  - OpenCode
  - Windsurf
  - Cline
  - Roo Code
  - Aide
  - Augment
  - TRAE IDE
