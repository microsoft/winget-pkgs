ShortDescription: Maintain a separate "shadow" Git repository alongside your main repository.
Description: |-
  Git Shadowtree is a Git extension that lets you maintain a separate "shadow" repository
  alongside your main Git repository. It tracks a defined set of files and directories
  (for example agent docs) in that shadow repository, decoupled from the main remote,
  while excluding them from the working repository. Any command other than
  init/clone/add/commit/pull is forwarded to git against the shadow repository.
