PackageIdentifier: StablyAI.Orca
PackageVersion: 1.4.152
PackageLocale: zh-CN
ShortDescription: 使用 Agent IDE 提升 100 倍交付速度
Description: |-
  Orca 是一款用于并行运行多个 AI 编程智能体（Agents）的桌面端 IDE。每一项任务都会获得独立的 git worktree、智能体终端和浏览器标签页——因此你可以将工作分发给 Claude Code、Codex、Cursor CLI 等工具，而无需进行 stash、频繁切换分支或打断思路。

  何时使用 Orca
  - 你想让三个智能体并行尝试修复同一个 bug，并从中择优。
  - 你希望在发布 AI 生成的代码差异（diffs）之前对其进行严格审查。
  - 你已经付费订阅了 Claude Code、Codex 或 Cursor CLI，并希望有一个统一的地方来编排它们。
  - 你希望智能体通过 SSH 在远程运行，同时又不放弃你的 IDE 体验。

  适用人群
  Orca 为那些以写代码为生、并希望将 AI 作为杠杆而非替代品的开发者设计。它假设你会阅读代码差异、在意提交规范（commits），并保持工作区整洁。如果你在寻找无代码工具，Orca 并不适合你。

  Orca 不是什么
  - 不是模型。Orca 运行你已经在使用的智能体——请使用你自己的 Claude、Codex 或 OpenCode 订阅。
  - 不是 Git 的替代品。每一个工作区（worktree）都是真实的 git worktree。你可以随时 cd 进去使用原生 git 命令。
  - 不仅限于云端。Orca 在本地运行。远程智能体通过 SSH 连接到你拥有的机器。
