ShortDescription: Utility that fixes Windows sRGB to scRGB "gamma" by patching DWM shaders
Description: |-
  An alternative implementation of the same idea that is behind dwm_eotf.

  It has additional features, such as system tray controls, autostart and shader dumping. This version
  is also more reliable, as it does not require multiple tries for it to work (as far as I can tell).

  dwm_eotf_rs works by reading memory of the loaded dwmcore.dll module, patching shaders that are
  responsible for incorrect SDR to HDR conversions there and writing it back.
ReleaseNotes: |-
  ## What's Changed

  - feat: added automatic startup on user logon (uses PowerShell to create Task Scheduler entry
    \Users\<USER>\dwm_eotf_rs)
  - feat: reworked CLI: moved secondary functionality to subcommands and improved help output
  - feat: added configurable delay to initial patching in tray mode (to prevent crashes when using
    autostart, presumably)

  ## Notes

  - This app requires admin rights (it is somewhat of a debugger, after all).
  - Starting with this release, the PowerShell is used, making the app look even more suspicious to AVs.
