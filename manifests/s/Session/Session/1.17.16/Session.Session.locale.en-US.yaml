ReleaseNotes: |-
  Release Overview
  - Session won't trim spaces from password inputs anymore #1906
  - Emojis now use the Noto Color Emoji font on all platforms #1921
  Other Changes
  - Saving a file no longer creates a temporary file #1922
  - A new "Show Reactions" option is now available in the message context menu #1909
  Bug Fixes
  - Make sure we cannot invite ourselves to a group #1905
  - Opening a conversation from the list of contacts resets the left pane state #1911
  - Fixed a crash happening on "Clear All" reacts #1912
  - Prevent some groups from receiving the same message multiple times #1914 #1908
  - Fixed a bug where a contact reacting to their own message would trigger a notification #1916
  - Allow deleting groups that we cannot leave #1917
  - Always show the status of the last outgoing read message #1920
