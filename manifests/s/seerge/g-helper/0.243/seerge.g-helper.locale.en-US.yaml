ReleaseNotes: |-
  Changes since the last final release 0.241
  🖱️Improved mouse support
  - Mouse button bindings
  - More frequent battery charge/discharge sensor readings
  - More robust ROG Omni receiver mouse detection #5116 #4321
  - Added ROG Polling Rate Booster detection and support #5116
  - Other minor improvements for ROG mouse controls
  Other changes
  - Init HDR Control on app start #5122
  - XGM 2025 backlight toggle #5008
  - Backlight timeout fix #5103
  - Skip hardware sensor refresh on minimized app start #5143
  - Removed Aura controls for M6500X #5100
  - Ignore ambient colors when session is locked #5106
  - Apply fan curves alongside power limits for FA608P #5020
  - Improved exception handling #5117
  - Init keyboard on tablet mode event #4701
  - Exception handling #5178
  - Toggle to Disable PCIe Link State Power Management under Extra
  - Improved config writing to prevent config file loss in some cases
  - UI Tweaks
