ShortDescription: CLI Windows theme switcher for scripts, hotkeys, and scheduled tasks
Description: |-
  ThemeToggle is a lightweight command-line utility for switching Windows
  between light and dark themes. It is designed for shortcuts, scripts, and
  scheduled automation, with typical execution around 10-15 ms on a test
  system.

  Features:
  - CLI operations for /toggle, /light, and /dark
  - Silent, shortcut-friendly direct execution without wrapper scripts
  - Useful automation flags such as /quiet, /passthru, and /exitcode
  - Task Scheduler and hotkey friendly invocation
  - Compatibility handling for apps that ignore standard theme broadcasts
  - Multi-monitor taskbar support
  - Windows 10 and Windows 11 support
  - Installer and portable package variants
  - No runtime dependencies
