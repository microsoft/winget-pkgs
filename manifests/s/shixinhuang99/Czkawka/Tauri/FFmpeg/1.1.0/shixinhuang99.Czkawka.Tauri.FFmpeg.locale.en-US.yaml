ReleaseNotes: |-
  New version changes
  - Upgrade czkawka_core to 10.0.0 (#14). Thanks @jhult.
  - Disable right-click context menu (#15). Thanks @jhult.
  - All settings are unified into a single settings pop-up window.
  - Move tool settings to the bottom bar as a tab.
  - The scan results table supports independent sorting and searching.
  - Display total count, selected count and found count.
  - Provide a visual cue when a include directory conflicts with an excluded directory.
  - Do not clear the table after deleting, moving, or renaming files.
  - The height of the bottom bar can be adjusted by dragging.
  - New UI style.
  Demo video
