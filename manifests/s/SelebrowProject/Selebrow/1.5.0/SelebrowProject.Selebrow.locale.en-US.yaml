Description: Selebrow is an open-source tool that simplifies running UI tests with WebDriver-based frameworks like Selenium, Selenide, WebdriverIO (wdio), and Playwright. It can serve as a drop-in replacement for the discontinued Selenoid project allowing running browsers in Docker containers or Kubernetes pods. Selebrow allows running tests in multiple browsers concurrently using prebuilt browser images, ensuring reliable results both locally and in CI.
