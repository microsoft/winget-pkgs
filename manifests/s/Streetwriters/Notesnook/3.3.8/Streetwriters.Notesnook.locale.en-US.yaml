ReleaseNotes: |-
  Expiring notes (Pro): Notes can now expire automatically after a set date. When a note expires it is moved to trash. Set an expiry date in the note properties.

  Export/import tables as CSV (Pro): Tables can be exported to CSV files and CSV files can be imported as tables directly in the editor. Use the right‑click menu on a table to export or import.

  Customizable editor line height: Adjust the spacing between lines in the editor with a new line‑height setting (float‑level precision). Find it under Settings > Editor > Line height.

  Android home launcher shortcuts (Pro): Add shortcuts for notebooks, tags, notes, and colors to the Android home screen. Long‑press the Notesnook app icon and drag a shortcut to the home screen.

  Day & week format settings: Choose the first day of the week and date format. New $day$ title format and /day command for daily notes.

  Edit note creation date: The creation date of a note can now be edited from the properties panel.

  New keyboard shortcuts:
  1. Move line up/down – Alt+Up/Down (Windows/Linux) or Option+Up/Down (Mac)
  2. Clear current node – Ctrl+Backspace (Windows/Linux) or Cmd+Backspace (Mac)
  3. Save note – click the status icon or use the tab menu
  4. Copy images – Ctrl+C (Windows/Linux) or Cmd+C (Mac)
  5. Command palette – now accessible via a button in the status bar

  Title in note history: Note history now includes the title for each session, making it easier to track title changes over time.

  Other improvements:
  1. Multipart uploads on mobile – improved reliability for large file uploads on iOS and Android
  2. Customizable monograph title – set custom titles for published monographs
  3. Preview attachments – preview attachments directly in the attachment manager before downloading
  4. Conflicts on locked notes – sync conflicts now properly show on locked notes
  5. Improved sync reliability – various enhancements for more reliable syncing
  6. Collapsible heading performance – significantly faster when working with many collapsible headings

  Fixes and improvements:
  1. Fixed file picker and PDF preview issues on iOS and Android
  2. Fixed iOS crash when using biometric unlock
  3. Fixed keyboard opening on app launch if a locked note is opened
  4. Fixed sidebar close gesture on iOS
  5. Fixed color picker wheel images not loading
  6. Fixed notification notes being created on every app launch
  7. Fixed app crash when restoring invalid backup files
  8. Fixed wrong trial end date shown in settings
  9. Fixed editor and note title resizing when window resizes
  10. Fixed table of contents headings alignment
  11. Fixed empty command palette/quick open when a locked note is active
  12. Fixed duplicate block‑id on splitting nodes
  13. Fixed desktop starting minimized on auto‑startup
  14. Fixed YouTube embeds erroring with code 153
  15. Fixed icons not aligning in lists and callouts with custom line height
  16. Fixed hidden collapse/expand icon when callout title is empty
  17. Fixed web clip on mobile not including URL & date clipped
  18. Fixed shortcuts not updating in side menu
  19. Fixed share sheet bottom padding
  20. Fixed search scroll not working on switching editors
  21. Fixed reminder sorting and dialog formatting
  22. Fixed themes not installing and improved theme server performance
  23. PDF previews now work correctly on iOS
  24. Cleanup downloaded cache files on startup
