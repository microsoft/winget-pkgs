ShortDescription: Course-availability monitor and auto course-swap tool for Shanghai Jiao Tong University students.
Description: |-
  交我选 (SJTU Monitor) monitors course seat availability on i.sjtu.edu.cn for
  enrolled Shanghai Jiao Tong University students. It supports priority-based
  course plans, automatic course swapping that never downgrades, seat/rating
  lookups, and desktop/email notifications.

  Sign-in requires a university-issued JAccount (https://jaccount.sjtu.edu.cn);
  non-SJTU users can preview the full UI offline via the built-in demo mode.
  This app is not an official SJTU product.
