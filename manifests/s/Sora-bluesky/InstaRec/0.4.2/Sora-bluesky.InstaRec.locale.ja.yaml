PackageVersion: 0.4.2
PackageLocale: ja
Publisher: Sora-bluesky
PackageName: InstaRec
License: MIT
ShortDescription: Windows 10 向けの軽量な画面録画ツール（GIF出力対応）
Description: |-
  Windows 11 には Snipping Tool に録画機能が内蔵されていますが、Windows 10 にはありません。
  InstaRec はその不足を補う軽量な画面録画ツールです。
  範囲指定キャプチャ、一時停止/再開、システム音声・マイク録音、トリミング付きプレビュー、MP4保存、GIF出力（品質・フレームレート設定対応）。
