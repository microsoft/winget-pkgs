ShortDescription: Lightweight screen recording tool for Windows 10 with GIF export
Description: |-
  InstaRec is a lightweight screen recording tool for Windows 10.
  Windows 11 has a built-in screen recording feature via Snipping Tool, but Windows 10 does not. InstaRec fills that gap.
  Features: region-based capture, pause/resume, system audio and microphone recording, video preview with trim, MP4 save, and GIF export with quality/frame rate options.
