ShortDescription: Smart AI coding proxy that cuts Claude Code costs by 90%
Description: |-
  AISmush is a transparent proxy that sits between Claude Code and AI providers.
  It intelligently routes each turn to the cheapest model that can handle it,
  compresses context with file caching and command-aware patterns, manages
  memory across sessions, and tracks every dollar saved. Supports Claude,
  DeepSeek, OpenRouter (290+ models), and local models (Ollama, LM Studio, etc.).
