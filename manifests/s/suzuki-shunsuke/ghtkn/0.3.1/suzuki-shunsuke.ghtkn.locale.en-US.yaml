ReleaseNotes: |-
  Features
  #475 Support copying the device flow one-time code to the clipboard on ghtkn auth
  ghtkn auth can copy the one-time code to the system clipboard for you.
  This is only available on ghtkn auth, the explicit, interactive authentication command - not on ghtkn get or ghtkn git-credential, which must not start the device flow on your behalf.
  It is disabled by default; enable it with the -clipboard (-p) flag, the GHTKN_CLIPBOARD environment variable, or the clipboard.enable config field.
  ghtkn auth -p
  export GHTKN_CLIPBOARD=true
  clipboard:
    enable: true
  $ ghtkn auth -p
  The application uses the device flow to generate your GitHub User Access Token.
  Copy your one-time code: 0000-0000
  (The one-time code has been copied to your clipboard.) <= New!
  ...
  Warning
  When pasting the code from the clipboard into the web form, please verify that it matches the one displayed in the output.
  Note that this feature doesn't work in some environments such as containers.
  foo@c4f18eb0cebe:~/workspace$ GHTKN_BACKEND=text ghtkn auth
  initialize the clipboard: clipboard unavailable: Failed to connect to the X11 display, so the clipboard
  package will not work properly. Make sure an X server is running and the
  DISPLAY environment variable is set.
  If the clipboard package runs in an environment without a frame buffer,
  such as a cloud server, it may be necessary to install xvfb:
          apt install -y xvfb
  and initialize a virtual frame buffer:
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          export DISPLAY=:99.0
  Then this package should be ready to use.
  Jun 28 04:53:57.549 WRN Failed to copy the one-time code to the clipboard automatically. Please copy it manually program=ghtkn version="" app_name=szksh-lab-2/none
  The application uses the device flow to generate your GitHub User Access Token.
