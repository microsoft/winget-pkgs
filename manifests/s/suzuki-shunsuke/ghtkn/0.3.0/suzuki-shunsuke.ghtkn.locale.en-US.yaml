ReleaseNotes: |-
  ⚠️ Breaking Changes
  #477 Disable the automatic device flow by default
  Part of #474, phase 1 of the rollout.
  ghtkn get, ghtkn git-credential, and SDK don't start the device flow automatically by default anymore.
  You need to run ghtkn auth explicitly to start the device flow.
  This reduces the risk of device code phishing.
  If you prefer the previous behavior, you can still export GHTKN_ENABLE_DEVICE_FLOW=true and ghtkn get's -d option.
  But at v0.4.0, these options will be removed.

  Features
  #469 Add ghtkn revoke --all to revoke every app's stored token
  ghtkn revoke --all
  This is useful for the incident response.
  When the environment running ghtkn is compromised, you can revoke all stored tokens immediately.
  #471 Support min_expiration in the config file
  #472 Support backend.type in the config file
  min_expiration: 1h
  backend:
    type: agent # One of agent, keyring, and text

