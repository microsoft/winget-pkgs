ShortDescription: Keep your PC awake when it matters — hook-based AI integration, app watching, manual toggle.
Description: |-
  Insomnia is a lightweight Windows app that prevents your computer from sleeping while AI coding tools are working.
  It supports hook-based integration with Claude Code and OpenAI Codex (stays awake only during active work, not just when the tool is open),
  process-based watching for Cursor, Aider, and Ollama, custom app watching, and a manual toggle.
  Lives in the system tray and gets out of your way.
Tags:
- ai
- coding
- sleep
- windows
- electron
- claude
- codex
- caffeine
ReleaseNotes: |-
  - OpenAI Codex integration is now hook-based (was process-based)
  - Codex CLI: uses notify hook in ~/.codex/config.toml
  - Codex VS Code extension / standalone app: watches session transcript files for active turn detection
  - Renamed integration: "OpenAI Codex CLI" -> "OpenAI Codex"
  - Bug fixes: removed false-positive synthetic activity, startup cleanup of stale sessions
ReleaseNotesUrl: https://github.com/stanley-projects/Insomnia/releases/tag/v1.4.2
