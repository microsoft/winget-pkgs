ReleaseNotes: |-
  Notable Changes
  - Dropping a .patch or .diff file on any view opens a Text Patch view.
  - Updated third party libraries.
  - General stability and polish improvements.
  Appearance
  - Fixed Tools > Options > Appearance > Theme not reverting when cancelling the dialog while "Preview" is checked.
  - Improved default size for Home view and comparison windows.
  - Fixed dialogs sizing larger than they should the first time they're shown on a high DPI display.
  - Fixed Media Compare crosshatching not aligning between rows.
  - Increased default width for the "File Formats" dialog.
  Folder Compare
  - Fixed log panel not opening to previously set height on high DPI displays.
  - Fixed log panel flickering over the top two lines in the comparison treeview when trying to resize it too large.
  Hex Compare
  - Added horizontal scrolling using mouse wheel.
  Installer
  - Windows: Automatic updates no longer show the installer's initial prompt for the install type.
  Misc
  - Dropping a .patch or .diff file on any view opens a Text Patch view.
  Picture Compare
  - Improved shutdown speed after using the Picture Compare on a system with many CPU cores.
  Settings
  - "Export Settings" dialog checkbox to include passwords and authentication tokens is now on the first page instead of below the profiles list.
  - "Export Settings" option to export passwords and access tokens is now disabled if the DisableSavedPasswords admin policy is in effect.
  Table Compare
  - Fixed poor behavior when picking "Unimportant Column" from the header right-click menu followed by picking "Standard Column".
  Third Party Libraries
  - Windows: Updated ZipForge's zlib to 1.3.1. (SVN rr32125).
  - Windows: Updated bzip2 to v1.0.8. Fixes CVE-2019-12900.
  - Windows: Updated LZMA decoder to 7-zip SDK v26.0.
  - Windows: Replaced PPMd decoder with one from 7-zip SDK v26.0.
  - Windows: Updated WavPack to v5.9.0.
  - Windows: Updated UnRAR DLLs to v7.22.100.1950.
  - macOS/Linux: Updated UnRAR source to 7.2.6.
  - Updated 3delite FlacTagLibrary to v2.0.30.85.
  - Updated 3delite ID3v2Library to v2.1.95.215.
  - Updated 3delite MP4TagLibrary to v1.0.68.140.
  Crashes
  - Fixed Text Compare crash when using "Increase Ident" while "Word Wrap" is enabled.
  - Fixed Table Compare crash when pressing [Enter] in an empty editor pane.
  - Windows: Fixed Explorer shell extension crash.
  - macOS/Linux: Fixed crash in "File Formats" dialog when using an external conversion file format originally created on Windows.
  - macOS: Fixed crash when toggling a checkbox in a listbox when nothing is selected (e.g., Tools > Export Settings).
  - macOS: Fixed some listboxes with checkboxes incorrectly allowing a half-checked state.
