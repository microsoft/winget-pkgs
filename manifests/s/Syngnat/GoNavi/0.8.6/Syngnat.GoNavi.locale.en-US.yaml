ShortDescription: GoNavi is a modern, high-performance, cross-platform database client built with Wails (Go) and React. It delivers native-like responsiveness with low resource usage.
Description: GoNavi is a modern, high-performance, cross-platform database client built with Wails (Go) and React. It delivers native-like responsiveness with low resource usage.Compared with many Electron-based clients, GoNavi is typically smaller in binary size (around 10MB class), starts faster, and uses less memory.
ReleaseNotes: |-
  ✨ 新功能
  - ✨ feat(theme): 新增自定义主题与多套低刺激预设
  - ✨ feat(sql-analysis): 完善慢 SQL 监控与执行计划诊断
  - ✨ feat(data-grid): 支持表头整列选择
  - ✨ feat(redis): 支持 List 单个值删除
  - ✨ feat(milvus): 新增 Milvus 向量数据库支持
  - ✨ feat(web-auth): 支持六位密码与环境变量托管
  - feature(query-result): 支持SQL执行结果差异比对
  - ✨ feat(query-editor): 结果页列元数据跨库加载并实心化保存按钮
  - ✨ feat(datagrid): 完善左固定列体验并统一选中主题色
  - ✨ feat(datagrid): 数据预览与 SQL 结果支持行号显示及设置开关
  - ✨ feat(update): 下载进度到 100% 后由用户点击「重启应用更新」
  - ✨ feat(update): dev 通道同步生成 latest-dev.json 静态清单
  - ✨ feat(update): 检查更新优先静态 latest.json，避免用户撞 GitHub API 限流
  - ✨ feat(ai-chat): 支持侧栏/独立窗默认打开、双向切换与尺寸记忆
  - ✨ feat(ai-chat): 思考强度移入聊天面板并按次请求下发
  - ✨ feat(ai): 支持 MCP 少量查数与分服务商思考强度，修复 DeepSeek Anthropic
  - ✨ feat(web-server): 支持 Docker 部署浏览器 Web UI
  - ✨ feat(tab/window): 完善Tab拖出独立窗口跟手预览与入场动效
  - ✨ feat(tab/window): 支持主工作区与结果Tab拆出为应用内浮动窗口并还原
