  - 🐛 fix(web): 补齐浏览器端连接导入导出
  - 🐛 fix(datagrid): 修复结果横向滚动条拖拽卡顿
  - 🐛 fix(query-editor): 修复快捷执行与 Windows 输入丢字
  - 🐛 fix(query-results): 修复复杂查询固定列失效
  - 🐛 fix(update): 修复 Windows 在线更新中文路径失效
  - 🐛 fix(window): 修复 Windows 后台可见时输入卡顿
  - 🐛 fix(docker): 修复容器驱动重装提示不消失
  - 🐛 fix(mcp): 修复在线更新后外部客户端连接失效
  - 🐛 fix(query-editor): 修复 Oracle 查询自动限行语法
  - 🐛 fix(db): 优化 SQLServer 首次查询耗时
  - 🐛 fix(window): 修复 mac 窗口恢复越界
