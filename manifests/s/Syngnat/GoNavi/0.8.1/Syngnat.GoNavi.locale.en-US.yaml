ShortDescription: GoNavi is a modern, high-performance, cross-platform database client built with Wails (Go) and React. It delivers native-like responsiveness with low resource usage.
Description: GoNavi is a modern, high-performance, cross-platform database client built with Wails (Go) and React. It delivers native-like responsiveness with low resource usage.Compared with many Electron-based clients, GoNavi is typically smaller in binary size (around 10MB class), starts faster, and uses less memory.
ReleaseNotes: |-
  ✨ 新功能
  - ✨ feat(schema): 支持模式编辑删除及按模式导出备份
  - ✨ feat(query-editor): 为 Postgres 兼容方言补全增加标识符自动引用
  - ✨ feat(datagrid): 为表格编辑增加单元格级撤销能力
  - ✨ feat(icons): 补齐新增数据源品牌图标资源
  - ✨ feat(rocketmq): 新增 RocketMQ 数据源连接与测试发消息支持
  - ✨ feat(mqtt): 新增 MQTT 数据源连接与测试发消息支持
  - ✨ feat(rabbitmq): 新增 RabbitMQ 数据源连接与测试发消息支持
  - ✨ feat(goldendb): 新增 GoldenDB 数据库连接支持
  - ✨ feat(kafka): 新增 Kafka 数据源连接支持
  - ✨ feat(gaussdb): 新增 GaussDB 数据库连接支持
  - ✨ feat(iotdb): 新增 Apache IoTDB 时序库连接支持
  - ✨ feat(qdrant): 新增 Qdrant 向量库连接支持
  - ✨ feat(chroma): 新增 Chroma 向量库连接支持
  🐛 问题修复
  - 🐛 fix(query-editor): 修复事务提交按钮缺少悬浮反馈
  - 🐛 fix(query-editor): 修复小窗口下 SQL 编辑器工具栏换行问题
  - 🐛 fix(query-editor): 修复切换查询页后 SQL 美化方言误判
  - 🐛 fix(sql-editor): 修复存储过程与返回结果写语句的结果识别
  - 🐛 fix(query-editor): 优化事务工具栏排版并修复 Wails 开发页加载
  - 🐛 fix(sqlserver): 修复托管事务下 UPDATE 误报执行失败
  - 🐛 fix(tdengine): 修复旧版 TDengine 元数据查询与驱动版本选择异常
  - 🐛 fix(query-editor): 修复跨库查询字段补全缺失
  - 🐛 fix(mysql): 兼容 MyCAT 场景下数据库列表解析逻辑
  - 🐛 fix(query-editor): 修复 SQL 美化未按数据库方言选择格式化器
  - 🐛 fix(database-icons): 替换数据源官方图标并修正透明底展示
  - 🐛 fix(icons): 替换 RabbitMQ 为官方标识
  - 🐛 fix(connection-modal): 修复 MQTT 无认证用户名误判必填
  - 🐛 fix(sql-editor): 修复事务执行会话与工具栏布局交互
  ⚡ 性能优化
  - ⚡️ perf(database): 优化查询元数据加载和连接释放
  完整变更: v0.8.0...v0.8.1
