ShortDescription: GoNavi is a modern, high-performance, cross-platform database client built with Wails (Go) and React. It delivers native-like responsiveness with low resource usage.
Description: GoNavi is a modern, high-performance, cross-platform database client built with Wails (Go) and React. It delivers native-like responsiveness with low resource usage.Compared with many Electron-based clients, GoNavi is typically smaller in binary size (around 10MB class), starts faster, and uses less memory.
ReleaseNotes: |-
  ✨ 新功能
  - ✨ feat(sql-files): 支持外部 SQL 目录树与双击打开
  - ✨ feat(ui): 优化侧边栏设置中心与数据表交互
  - ✨ feat(sync): 新增 SQL 结果集数据同步能力
  🐛 问题修复
  - 🐛 fix(driver): 明确JDBC Jar导入限制并补充Kingbase指引
  - 🐛 fix(export): 修正带注释的 JOIN 查询结果导出校验
  - 🐛 fix(mongodb): 支持 Mongo shell 快捷查询命令
  - 🐛 fix(dameng): 修正表格更新无法识别主键列
  - 🐛 fix(redis-viewer): 修正 Redis 值自动与 UTF-8 展示不一致
  - 🐛 fix(window): 修正启动窗口恢复到不可见区域
  - 🐛 fix(sqlserver): 修正 uniqueidentifier 展示为十六进制字节
  - 🐛 fix(redis): 修正 hash 详情读取依赖 HGETALL
  - 🐛 fix(sync): 同步 SQL 结果集同步前端模型绑定
  - 🐛 fix(redis): 同步 hash 字段删除接口前端绑定
  - 🐛 fix(table-designer): 修正 MySQL 列改名预览 SQL
  - 🐛 fix(ai): 修正 SQL 代码块 Markdown 换行渲染
  - 🐛 fix(window): 修正最大化窗口恢复焦点后重复动画
  - 🐛 fix(datagrid): 修正日期字段设置值被误存为 NULL
  - 🐛 fix(query): 修正新建查询未引用 PostgreSQL 大写表名
  - 🐛 fix(query): 修正查询结果同名列被覆盖问题
  - 🐛 fix(tdengine): 补齐超级表元数据查询
  - 🐛 fix(redis): 修正 hash 字段删除参数序列化错误
  - 🐛 fix(sync): 修正仅同步结构未生效
  - 🐛 fix(clickhouse): 修正 8132 端口连接失败
  - 🐛 fix(update): 修正 Linux 变体自动更新失效
  - 🐛 fix(ai): 修正 Anthropic 兼容供应商问答失败
  - 🐛 fix(frontend): 修复 Redis 搜索匹配与输入交互体验
  - 🐛 fix(driver): 修复可选驱动在线安装回归问题 Refs #388
  - fix(custom+mysql):CustomDB(driver=mysql)路径没有同步修改，custom链接打开时schema报错，双击表查询报错 refs bug#385
  - fix(import connect)：统一测试用例文案；仅判断mysql-workbench-xml
  - fix(ui): 表概览排除视图 refs bug#375
  - fix(mysql): 表列表排除视图 refs bug#375
  - fix(import connect)：修改导入时提示，而不是在连接时提示
  - fix(mysql): 修复视图编辑时的DDL头部兼容
  - fix: Oracle/DM数据库侧边栏不显示'默认模式'节点
  🔧 其他变更
  - - 背景与问题 ：以前没有支持官方工具mysqlworkbench的xml导入，现在支持了 - 变更点：新增mysqlworkbench的xml文件导入，并当没有密码时，提示用户，而不是直接使用空密码进行直接连接，更友好 - 影响范围：仅导入受到影响 - 验证方式：点击导入，用mysqlworkbench的xml进行导入即可
  完整变更: v0.6.8...v0.6.9
