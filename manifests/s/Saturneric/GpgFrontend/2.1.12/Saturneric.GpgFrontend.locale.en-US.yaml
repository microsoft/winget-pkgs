ReleaseNotes: |-
  ## Improvements & Fixes

  - Enhanced built-in text editor with line numbers, current-line highlighting, richer status
    information, and more reliable document recovery.
  - Improved file panel usability, including drag-and-drop operations, file/folder creation, Trash
    support, and better navigation.
  - Refreshed startup wizard and onboarding experience.
  - Appearance changes now take effect immediately without restarting.
  - Improved window restoration and multi-screen behavior.
  - Improved key generation workflows and algorithm selection.
  - Enhanced key database management dialogs and interactions.
  - Improved output filename handling for encryption, decryption, signing, and verification operations.
  - Fixed potential crashes (AppImage) caused by conflicts between project-built OpenSSL and Qt’s
    OpenSSL usage.
  - Fixed editor recovery and tab restoration issues.
  - Various UI and stability fixes.

  ## Localization

  - Added Russian language support. (#249)
  - Completed many previously missing translations across supported languages using automated
    translation and automated review.
  - Translation quality may still need community refinement. If you notice inaccurate or unnatural
    translations, contributions are welcome.

  ## Build & Signing

  - Added build coverage for macOS 16 Intel environments.
  - No longer uses a project-built OpenSSL in official builds and now relies on the system OpenSSL
    provided by the target environment. Downstream packagers should make sure OpenSSL is provided by
    the system or packaging environment.
  - This is the final release signed with the Windows code signing certificate serial
    785a00b7985a7078fb1913c7b93b05e6. A new signing certificate will be used starting from the next
    release.

  > [!NOTE]
  >
  > Many improvements in this release were synchronized from the main branch. For the 2.1 maintenance
  > series, only UI enhancements and bug fixes have been backported. No major core functionality changes
  > are included.
