ReleaseNotes: |-
  New
  Automatic Branch Management: You can now archive fully merged and stale branches manually or let Tower handle them automatically. The sidebar and History view now highlight stale and fully merged branches, with review controls and archive actions integrated into the branch workflow. Pinned Branches: Important branches can now be pinned to a dedicated sidebar section and managed from branch context menus, multi-selection, drag and drop, and branch creation. Working Copy: Untracked files now display their contents directly in the diff view, including text, binary, and image files.
  Improved
  Updates: Tower now uses Velopack for app updates and packaging. Runtime: Tower has been updated to .NET 10. Sidebar: Branch view settings such as grouping refs and stacking branches now live in the sidebar gear menu, making them easier to find while working with branches. Diff View: Long diffs now keep text clear of the overlay scrollbar, so wrapped lines remain readable. History: Branch selection remains responsive while commit history loads.
  Fixed
  Working Copy: Fixed an issue where large diffs could appear truncated until the window was resized. Diff View: The Collapse All button now collapses every file in large commits. History: Compare Branches now handles detached HEAD correctly instead of building an invalid revision range. Repositories: Fixed a crash when opening a freshly initialized empty repository. Branches: Undoing a branch rename now refreshes the sidebar correctly. Branches: Multi-branch delete undo now reports restore failures instead of failing silently. Tags: Multi-tag delete undo now restores all tags correctly and reports any restore failures. Tags: Fixed incorrect context menu items for multi-tag selections. Submodules: Fixed tag checkout and folder picker handling in submodule workflows. Working Copy: The interactive rebase and merge icons in the sidebar now use the correct color in the light theme, making them easier to see when the Working Copy row is not selected.
