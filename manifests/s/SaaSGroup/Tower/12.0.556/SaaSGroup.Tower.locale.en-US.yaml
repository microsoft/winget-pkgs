ReleaseNotes: |-
  New
  Custom Workflows: Define and automate your Git branching strategy with fully customizable workflows. Create parent-child branch relationships, keep branches in sync automatically, and control how changes are merged—whether you're using git-flow or your own approach. Custom Workflows bring structure and consistency to complex branching setups, making collaboration easier across your team. Working Copy: Added “Copy File Path” and “Copy Relative Path” options to context menus in the Working Tree, Changeset, and Tree views. Toolbar: Customize the top bar layout, including split and left-aligned options. Preferences: Added a dedicated Appearance tab for UI-related settings.
  Improved
  Stacked Branches: Now compatible with Custom Workflows, allowing more flexible integration with your branching strategy. File History: Now shows changes only for the selected file instead of the full commit changeset. Toolbar: Updated button layout to better align with Tower for Mac. Portable Git: Updated to version 2.54.0 for improved compatibility and performance. Preferences: Improved alignment and background consistency across tabs.
  Fixed
  Rebase: Fixed an issue where the toolbar button could do nothing when a local branch was selected. Submodules: Fixed a crash when a submodule had no origin remote configured. Toolbar: Fixed an issue where buttons remained active while a modal dialog was open. Working Copy: “Reveal in Explorer” now opens the file location instead of the file itself. Working Copy: Fixed issues when staging many files with long paths by improving command batching and handling command-line length limits. Working Tree: Fixed an issue where diff chunks could appear cut off after staging selected lines. Tooltips: Truncated content now shows its full value on hover. Preferences: Fixed an issue where Git binaries could appear twice in the dropdown after unzipping Portable Git. Services: Fixed a Bitbucket Cloud issue that could prevent repositories from appearing after Atlassian retired the /2.0/workspaces endpoint.
