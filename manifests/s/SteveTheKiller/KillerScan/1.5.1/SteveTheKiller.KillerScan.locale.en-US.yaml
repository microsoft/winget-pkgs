ReleaseNotes: |-
  bug-fix release focused on scanning reliability over VPNs.
  Fixed
  - VPN / routed scans no longer collapse every device to one MAC and vendor. ARP can't resolve hosts across a tunnel (e.g. FortiClient SSL VPN), so SendARP returns the next-hop adapter's MAC for every remote IP. A MAC returned for more than two distinct IPs is now treated as that artifact and discarded, so those hosts classify by their port and fingerprint signals instead of being mislabelled as the VPN's vendor.
  - Discovery no longer misses hosts that block ICMP. A host that doesn't answer ping now gets a quick TCP-connect probe on common ports (445, 3389, 80, 443, 22) and counts as alive if any responds, closing the large undercount seen when scanning over a VPN.
  - Install dialog now matches the KillerDialog style - transparent title bar that blends into the window with the shared film grain, carrying the KillerScan wordmark and a drop shadow, instead of a flat solid bar.
