ReleaseNotes: |-
  KillerScan v1.5.3
  Rescan selected hosts
  Right-click any device in the results and choose Rescan to re-probe just that host, or hold Shift/Ctrl to select several and rescan them together. Each refreshed result drops back into its row in place.
  Behind it is a new deep probe that's far more thorough than the fast subnet sweep:
  - Checks every well-known port (1-1024) plus KillerScan's curated list of higher service ports
  - Gives each port a longer timeout with a retry, so slow or busy devices that the fast sweep skipped still show up
  - Refreshes MAC, hostname, and TTL from scratch
  - Widens the HTTP and TLS fingerprinting to every open port, so admin panels and certificates on non-standard ports get identified
  - Re-scores the device type and updates the row in place
  It runs independently of the subnet scan.
  Other changes
  - Open Ports tooltip: the full port list now shows on hover, so a long list no longer needs the column widened to read
  - Footer: the scan progress bar no longer crowds the PORTABLE install button, and the corner version/copyright text is slightly smaller
  - Vendor database: refreshed from the current Wireshark OUI list (57,644 entries, up from 57,591)
