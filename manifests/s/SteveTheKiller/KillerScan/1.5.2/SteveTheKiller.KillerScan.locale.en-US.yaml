ReleaseNotes: |-
  KillerScan v1.5.2
  Added
  - Japanese (ja-JP) interface translation.
  - Status-bar messages now follow the selected language across all nine locales (scan progress, scan complete/cancelled, export confirmations, device-type overrides, and the PORTABLE badge).
  - Columns are resizable again, size to their content, and KillerScan now remembers your column order, widths, and window size/position between launches.
  - The window can be dragged from anywhere on the title bar or toolbar's empty space.
  Changed
  - Bundled MAC vendor database refreshed from the current Wireshark OUI list: 57,591 entries. The app now loads whichever list is larger - the bundle or your last in-app refresh - so a fresher bundled database takes effect immediately.
  - Small UI adjustments.
  Fixed
  - The window no longer renders black over console-session screen-sharing tools (ScreenConnect, Kaseya LiveConnect, VNC, TeamViewer); rendering is forced to software mode at startup.
