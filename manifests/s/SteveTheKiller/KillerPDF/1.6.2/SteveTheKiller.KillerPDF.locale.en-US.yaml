ReleaseNotes: |-
  KillerPDF v1.6.2
  Added
  - Page Up / Page Down navigate to the previous / next page, consistently regardless of what has focus. Page reordering stays on the toolbar Move Up / Move Down buttons (#117).
  - Japanese (ja-JP) interface translation, selectable from the language picker (#118, thanks coolvitto).
  Changed
  - Ctrl+scroll zooming is smooth: each wheel notch zooms by a constant ratio, the view scales instantly without flicker while the wheel is moving, and the crisp re-render happens once when the wheel rests. Precision touchpads glide proportionally.
  - Up / Down arrows now scroll the view like the mouse wheel, flipping to the previous / next page at the top or bottom edge. At fit-to-page zoom they flip pages exactly as before; zoomed in or in Continuous view they scroll instead of jumping a whole page. Left / Right and PgUp / PgDn remain hard page jumps.
  - Status-bar and dialog messages that were still shown in English now follow the selected language.
  - Small UI and dialog box tweaks.
  Fixed
  - Importing images with broken DPI metadata (common in WhatsApp photos and some scans) produced pages Adobe Reader refuses to display ("The dimensions of this page are out-of-range", shown as blank). Imported image pages are now kept within Adobe's supported range, and saving a document that already contains out-of-range pages offers to scale them to a supported size (thanks Richard Lam for the report).
  - Switching view modes now cross-fades instead of cutting instantly, and no longer flashes page 1 when entering Continuous view.
  - The in-app self-updater reads SHA256SUMS.txt from the release assets, so the checksum can no longer drift from the binary.
  SHA256 (KillerPDF.exe): 2359788134CCAEA2B9EE4EDF681C3A79386DE50ABF990A4B0BCC952A2F5167B4
