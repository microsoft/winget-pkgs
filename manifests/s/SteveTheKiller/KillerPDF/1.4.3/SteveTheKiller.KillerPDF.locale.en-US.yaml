ReleaseNotes: |-
  Fixed
  - Encrypted PDFs (owner-restricted RC4) no longer fail with \Unexpected token 'xref'\ when rotating pages. PdfSharpCore can silently produce a broken cross-reference entry after saving encrypted files; KillerPDF now pipes the file through PDFium to repair the XRef and retries automatically.
  - Page view now fits to page after a rotation so the full rotated page is visible without manual rezoom.
  - Mailto and other link annotations with visible borders (colored rectangles that looked like strikethroughs) no longer render those borders in saved PDFs.
  - Right-click a link annotation to remove it from the PDF entirely (\Remove Link from PDF\). Previously, clearing annotations only removed the KillerPDF overlay while the native PDF link remained active.
  - Right-click a mailto link to copy just the email address; right-click an http/https link to copy the URL.
