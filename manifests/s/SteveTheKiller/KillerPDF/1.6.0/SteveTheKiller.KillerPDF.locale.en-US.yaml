ReleaseNotes: |-
  A big release: major new features, a full visual refresh, and an internal rewrite.
  New
  - Tabbed documents - open several PDFs at once, each restoring its page, zoom, and view
  - OCR built into the exe (Tesseract) - OCR a page or dragged region to the clipboard, make a scan searchable, or extract all text; extra languages download on demand
  - Digital signatures with a cloud certificate (Certum SimplySign), reusable signatures, and click-to-sign form fields
  - Transform tool - rotate, scale, flip, and straighten a crooked scan, with live preview
  - Edit existing text by double-clicking a line (the original is cleanly covered)
  - Line tool, refreshed draw/highlight bars, resizable word-wrapping text boxes, and a full RGB color picker with eyedropper
  - Print options (scale, position, margins, two-sided), page-number stamping, folder/.zip import, Document Info (F12), and recent files with file-type icons
  Changed
  - New logo, icons, fonts, and colors throughout
  - Six themes with per-theme accent colors; sidebar docks left or right; toolbar style picker
  - Internal rewrite: the ~15,000-line main window split into ~40 focused files (no behavior change)
  Fixed
  - True 300 DPI printing, encrypted/damaged PDFs open on a background thread with a repair fallback, form fields render in every view mode, and undo is one item per press
  Install
  winget install killerpdf, or download KillerPDF.exe below
  New translations: Bengali, Turkish, Simplified Chinese, German, French.
