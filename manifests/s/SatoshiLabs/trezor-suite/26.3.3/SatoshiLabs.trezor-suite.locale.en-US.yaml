ReleaseNotes: |-
  🎨 Improvements
  - Solana account data inconsistencies have been resolved, ensuring more accurate account information and balances.
  - Cardano staking has been enhanced. Users can now update their delegation preferences directly within the staking interface.
  - Decentralized exchanges (DEXs) are now highlighted at the top of the comparison page, helping you more easily discover non-custodial trading options.
  - The country picker has been refined for a smoother and more intuitive selection experience. U.S. users can now also select their state.
  - The trading flow with BTC Direct has been simplified for a more streamlined experience.

  🔧 Bug fixes
  - Fixed transaction simulation in Connect Popup for EVM transactions requiring higher than default gas limit.
  - Minor issues have been resolved, along with general usability improvements for a more stable and seamless experience.
