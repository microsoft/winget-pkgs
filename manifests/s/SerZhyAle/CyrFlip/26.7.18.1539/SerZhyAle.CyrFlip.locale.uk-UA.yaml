Description: 'CyrFlip - крихітна утиліта в системному треї для Windows з двома функціями: показує активну розкладку клавіатури (EN/RU/UK) прямо поруч із миготливим курсором введення, і транслітерує виділений текст між QWERTY та ЙЦУКЕН прямо на місці за гарячою клавішею. Усі налаштування - у меню трею: перемкнути оверлей каретки або індикатор миші, увімкнути точковий стиль маркера, або змінити гарячу клавішу без перезапуску. Один портативний exe, без встановлення та залежностей.'
