Description: 'CyrFlip - крошечная утилита в трее для Windows с двумя функциями: показывает активную раскладку клавиатуры (EN/RU/UK) прямо рядом с мигающим курсором ввода, и транслитерирует выделенный текст между QWERTY и ЙЦУКЕН прямо на месте по нажатию горячей клавиши. Все настройки - в меню трея: переключить оверлей каретки или индикатор мыши, включить точечный стиль маркера, или сменить горячую клавишу без перезапуска. Один портативный exe, без установщика и без зависимостей.'
