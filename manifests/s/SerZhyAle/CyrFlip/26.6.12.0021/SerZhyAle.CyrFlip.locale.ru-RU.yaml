ShortDescription: Исправляет текст, набранный в неправильной раскладке (EN ↔ RU / ЙЦУКЕН), по горячей клавише.
Description: CyrFlip — крошечная фоновая утилита для Windows, которая транслитерирует выделенный текст между раскладками QWERTY и ЙЦУКЕН прямо на месте. Выделите испорченный текст, нажмите горячую клавишу (по умолчанию Ctrl+Shift+F12) — и он будет исправлен там, где вы печатаете. Единственный UI — кастомный курсор мыши с индикатором текущей раскладки (EN/RU/UK).
