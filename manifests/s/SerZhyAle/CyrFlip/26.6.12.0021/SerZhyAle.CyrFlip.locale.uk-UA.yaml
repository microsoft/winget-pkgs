Description: CyrFlip — крихітна фонова утиліта для Windows, що транслітерує виділений текст між розкладками QWERTY та JCUKEN прямо на місці. Виділіть зіпсований текст, натисніть гарячу клавішу (за замовчуванням Ctrl+Shift+F12) — і його буде виправлено там, де ви друкуєте. Єдиний UI — кастомний курсор миші з індикатором поточної розкладки (EN/RU/UK).
