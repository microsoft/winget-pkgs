ShortDescription: Live EN/RU/UK layout indicator at the caret, plus one-key transliteration between QWERTY and ЙЦУКЕН.
Description: 'CyrFlip is a tiny Windows tray utility with two features: it shows the active keyboard layout (EN/RU/UK) right next to the blinking text caret so you always know which layout you are typing in, and it transliterates selected text between QWERTY and ЙЦУКЕН in place via a global hotkey. All settings live in the tray menu: toggle the caret overlay or the cursor indicator, switch to a coloured dot style, or reassign the hotkey without restarting. Ships as a single portable exe with no installer and no runtime dependencies.'
