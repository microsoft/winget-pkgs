ShortDescription: Утилита автоматического переключения Windows-ПК на телевизор при подключении геймпада.
Description: |-
  Маленькая Windows-утилита для тех, кто пользуется одним ПК и за столом, и в зале.

  Подключил геймпад — картинка ушла на ТВ, звук туда же, открылся Steam Big Picture (или любой ваш лаунчер). Отключил геймпад — дисплей, звук и лаунчер вернулись к рабочему столу.

  Возможности:
  - Автоматическое переключение дисплея (только цель, расширение или клон)
  - Автопереключение аудио, авто-определение HDMI после смены экрана
  - Опционально: запуск Steam Big Picture или любого кастомного лаунчера
  - Опционально: HDMI-CEC через адаптер Pulse-Eight USB-CEC
  - Комбо активации (последовательность кнопок) от случайных подключений
  - Восстановление топологии дисплеев при загрузке после нештатного выключения
  - 30 дней бесплатной триал-версии, далее разовая бессрочная лицензия на shiftpad.ru/pro
