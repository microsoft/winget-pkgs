ReleaseNotes: |-
  What's Changed

  Improvements:
  - Switched from embedded browser to default system browser for Dropbox authorization
  - Added folder support to Dropbox script
  - Added account and album support for upload.ee
  - Enhanced Server List Popup with OK button, search icon, and help button icon
  - Added help button icon to Screen Recording Settings Page
  - Disabled uninstallation before install to prevent conflicts
  - Performance optimizations
  - Bulgarian translation by @jekovcar

  Bug Fixes:
  - Fixed thumbnail width setting not being applied correctly
  - Resolved unicode output problems in CLI mode
  - Fixed default thumbnail bug in the file list
  - Fixed upload functionality for directupload.eu accounts
  - Prevented crash after login changes
  - Fixed Yandex.Disk upload not working in CLI
  - Fixed upload on prntscr.com
  - Corrected issues with postimages.org and getapic.me image hosting services
  - Fixed crash when selecting server folder
  - Fixed installed app version to prevent WinGet issues

  Maintenance:
  - Removed dead hosting services
  - Changed domain from vk.com to vk.ru

  New Contributors
  - @jekovcar made their first contribution in #415
ReleaseNotesUrl: https://github.com/zenden2k/uptooda/releases/tag/1.4.6
