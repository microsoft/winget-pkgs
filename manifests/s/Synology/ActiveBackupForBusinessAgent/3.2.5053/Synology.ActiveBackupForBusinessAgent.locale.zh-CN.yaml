ShortDescription: Active Backup for Business 是 Synology NAS 的多合一备份解决方案，专为简化和强化企业不同 IT 环境的资料保护而设计。
Description: Active Backup for Business 代理必须安装在每个要保护的 Windows 设备、Mac 计算机和 Linux 物理服务器上。您可以在 Active Backup for Business 控制台中执行一系列管理操作，包括任务管理和模板配置。
