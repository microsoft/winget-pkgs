ShortDescription: Run native DOOM inside an AWS Lambda MicroVM, streamed to a browser tab
Description: |-
  Hellbox is a playable systems demo: a Rust CLI that builds a MicroVM image
  running native ARM64 Chocolate Doom, streams video/audio/input to your
  browser through a loopback proxy, and can suspend/resume the whole machine
  on a live memory snapshot. Requires an AWS account; see the project README.
