ShortDescription: Opens iCloud Notes in a dedicated Microsoft Edge app-mode window with its own taskbar identity.
Description: |-
  Notes for iCloud is a small launcher that spawns Microsoft Edge in --app mode
  pointing at iCloud Notes (https://www.icloud.com/notes), with its own isolated
  user-data directory. The window appears in the taskbar with a distinct identity
  instead of merging with regular Edge.

  Links inside notes that point outside icloud.com / apple.com are re-routed to
  your system's default browser via Chrome DevTools Protocol — so user-content
  links open in your normal browser profile with your usual history, password
  manager, and extensions, while Apple's own sign-in / 2FA / help domains stay
  inside the app window so authentication keeps working.

  Not affiliated with Apple Inc. iCloud is a registered trademark of Apple Inc.
Moniker: notes-for-icloud
Tags:
  - apple
  - edge
  - icloud
  - launcher
  - notes
  - pwa
ReleaseNotes: |-
  - Inno Setup installer with proper Start Menu integration and a Start Menu
    shortcut whose System.AppUserModel.ID matches what the launcher sets at
    runtime, so the Start Menu, taskbar pin, and the running window share one
    identity instead of splitting.
  - Out-of-app links (anything not on *.icloud.com / *.apple.com) are now
    routed to the system default browser via Chrome DevTools Protocol; the
    in-app popup is closed before it paints.
ReleaseNotesUrl: https://github.com/slohmaier/notes-for-icloud/releases/tag/v0.3.0
