ReleaseNotes: |-
  - The dedicated app-mode Edge profile now starts free of any
    user-installed or Edge-bundled extras (Read Aloud, Coupons, Cashback,
    etc.). Implemented by scrubbing the profile's Extensions directory
    before launch rather than passing --disable-extensions, which in
    --app mode would also disable the bookmark-app shell and leave the
    window black. Component extensions (PDF viewer etc.) are unaffected.
  - Forces light theme via CDP so the window is readable for sighted
    users and screen-share/screenshot scenarios even on systems with
    Windows dark theme. Apple's iCloud web apps have incomplete
    dark-mode CSS; the launcher pins prefers-color-scheme: light
    browser-wide and also injects a tiny matchMedia shim before any
    iCloud script runs, so Apple's JS takes the light-theme code path
    from the first frame. NVDA workflow is unaffected.
  - (0.3.0) Inno Setup installer with proper Start Menu integration and a
    Start Menu shortcut whose System.AppUserModel.ID matches what the
    launcher sets at runtime, so the Start Menu, taskbar pin, and the
    running window share one identity instead of splitting.
  - (0.3.0) Out-of-app links (anything not on *.icloud.com / *.apple.com)
    are now routed to the system default browser via Chrome DevTools
    Protocol; the in-app popup is closed before it paints.
ReleaseNotesUrl: https://github.com/slohmaier/notes-for-icloud/releases/tag/v0.3.2
