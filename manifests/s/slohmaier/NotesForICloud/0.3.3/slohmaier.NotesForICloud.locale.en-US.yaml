ReleaseNotes: |-
  - External links are now reliably routed to the user's main Edge
    profile instead of the dedicated app-mode Notes profile. Previously,
    ShellExecute(url) invoked Edge's HTTP handler without
    --user-data-dir, and Edge's IPC delivered the URL to whichever
    msedge.exe was already live — ours, with the Notes profile. The
    launcher now explicitly launches msedge.exe with
    --user-data-dir=%LOCALAPPDATA%\Microsoft\Edge\User Data and
    --profile-directory=Default, so Edge's process singleton routes the
    URL to the main-profile Edge instance (new tab if it's running, new
    window if not). Non-Edge default browsers fall back to ShellExecute,
    which never had this issue.
  - The light-theme override is no longer forced on every launch. Notes'
    dark mode is fully working, so the launcher now lets Edge inherit
    the user's OS theme — dark Windows users get dark Notes again,
    light Windows users get light Notes. No more visual override or
    CDP shim overhead.
  - (0.3.2) Scrubs the profile's Extensions directory before launch so
    the dedicated profile stays free of user-installed or Edge-bundled
    extras (Read Aloud, Coupons, Cashback, etc.). Component extensions
    (PDF viewer etc.) are unaffected.
  - (0.3.0) Inno Setup installer with proper Start Menu integration and
    a Start Menu shortcut whose System.AppUserModel.ID matches what the
    launcher sets at runtime, so the Start Menu, taskbar pin, and the
    running window share one identity instead of splitting.
  - (0.3.0) Out-of-app links (anything not on *.icloud.com /
    *.apple.com) are routed to the user's default browser via Chrome
    DevTools Protocol; the in-app popup is closed before it paints.
ReleaseNotesUrl: https://github.com/slohmaier/notes-for-icloud/releases/tag/v0.3.3
