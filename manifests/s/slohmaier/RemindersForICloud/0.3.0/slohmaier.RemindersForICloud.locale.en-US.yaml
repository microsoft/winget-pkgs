  - todo
ReleaseNotes: |-
  - Inno Setup installer with proper Start Menu integration and a Start Menu
    shortcut whose System.AppUserModel.ID matches what the launcher sets at
    runtime, so the Start Menu, taskbar pin, and the running window share one
    identity instead of splitting.
  - Out-of-app links (anything not on *.icloud.com / *.apple.com) are now
    routed to the system default browser via Chrome DevTools Protocol; the
    in-app popup is closed before it paints.
