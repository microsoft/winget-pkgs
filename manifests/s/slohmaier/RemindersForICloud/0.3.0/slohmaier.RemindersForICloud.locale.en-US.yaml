ShortDescription: Opens iCloud Reminders in a dedicated Microsoft Edge app-mode window with its own taskbar identity.
Description: |-
  Reminders for iCloud is a small launcher that spawns Microsoft Edge in --app
  mode pointing at iCloud Reminders (https://www.icloud.com/reminders), with
  its own isolated user-data directory. The window appears in the taskbar with
  a distinct identity instead of merging with regular Edge.

  Links inside reminders that point outside icloud.com / apple.com are
  re-routed to your system's default browser via Chrome DevTools Protocol —
  so user-content links open in your normal browser profile with your usual
  history, password manager, and extensions, while Apple's own sign-in / 2FA /
  help domains stay inside the app window so authentication keeps working.

  Not affiliated with Apple Inc. iCloud is a registered trademark of Apple Inc.
