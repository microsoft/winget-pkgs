ReleaseNotes: |-
  Quick fixes for file permission issues in docker and some nice file UI selection improvements for file handling across tools
  Also contains some dependency updates
  What's Changed
  Minor Enhancements
  - Add specific View Scope For Selected Files by @EthanHealy01 in #6050
    - Running a tool in the viewer only runs the tool on the viewed file.
    - Running a tool in active files runs the tool on all selected files (as before)
    - UX improvements to the compare tool, merge tool and more
  - Possible fix permission issues and fix thread timing issues by @Frooodle in #6061
  - Line seperator fix for redaction drift by @reecebrowne in #6064
