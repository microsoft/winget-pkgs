ReleaseNotes: |-
  This release is for security fixes and removal of unused dependencies within our docker
  It also contains
  - UI performance fix for desktop users!
  - stopping update notices appearing to usecases it shouldn't!
  - Fixes for desktop mac not running correctly
  - Some build issues for certain desktop builds
  What's Changed
  Bug Fixes
  - fix(frontend): correctly display the current user role in the edit dialog by @Ludy87 in #6758
  - Make pre-commit scripts more OS-agnostic by @jbrunton96 in #6724
  - fix(team): hide users already assigned to the selected team by @Ludy87 in #6760
  Enhancements
  - Upgrade to TypeScript 6 by @jbrunton96 in #6772
  - Redesign tool config types to avoid any typing by @jbrunton96 in #6582
  - Remove ffmpeg from published Docker images by @Frooodle in #6791
  - fix update notification visibility and install flicker by @Frooodle in #6776
  - fix desktop bundles by @Frooodle in #6773
  - build(deps): bump astral-sh/setup-uv from 8.1.0 to 8.2.0 + translation files by @dependabot[bot] in #6748
  - fast-path local PDF transport and reduce chat re-renders by @EthanHealy01 in #6798
  - chore: update svg conversion and database import handling by @Frooodle in #6796
  Minor Enhancements
  - chore(build): centralize Gradle dependency version management by @Ludy87 in #6499
  - chore(ci): upgrade Gradle to 9.6.0 across workflows, Docker builds, and wrapper by @Ludy87 in #6790
  Other Changes
  - Build Rust cache on nightlies by @jbrunton96 in #6768
  - Add JUnit tests to raise coverage across all modules by @Frooodle in #6782
  - 🌐 Sync Translations + Update README Progress Table by @StirlingBot[bot] in #6739
