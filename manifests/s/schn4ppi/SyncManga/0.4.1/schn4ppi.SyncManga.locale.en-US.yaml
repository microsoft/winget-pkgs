ShortDescription: Your manga reading list, on autopilot - built from your browser history.
Description: >-
  SyncManga reads your browser history (read-only), detects which manga series
  you read and which chapter you are on, and builds an interactive reading list
  with verified continue-reading links, ratings, filters, favorites, day/night
  mode, import/export (MyAnimeList/AniList) and recommendations. Everything runs
  locally; your history never leaves your PC.
