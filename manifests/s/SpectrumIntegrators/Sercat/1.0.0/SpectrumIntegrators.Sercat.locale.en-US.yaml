ShortDescription: netcat for serial ports — a command-line serial terminal.
Description: |-
  sercat is a command-line serial terminal in the spirit of netcat: everything is set on
  the command line, and the terminal sends what you type and prints what's received. It
  supports configurable display of nonprintable bytes (raw, dots, escaped, or full hex),
  sending files with optional escape parsing and pacing, and clean piping to and from
  stdin/stdout.
