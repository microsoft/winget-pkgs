ReleaseNotes: |-
  Local folder takeover, memory, and Browser Use
  - [New] Added local folder takeover: batch read and write local files while keeping data in-domain for stronger privacy.
  - [New] Added the Gemini-3.5-flash model for faster responses on lightweight tasks.
  - [New] Opened model selection for all models, so every member can choose freely.
  - [New] Added memory: Skywork can remember your habits and preferences, so you do not need to repeat them every time.
  - [New] Added Browser Use for smooth automated web actions such as clicking and filling forms.
  - [Improved] You can now interrupt while generation is in progress and add new instructions as soon as inspiration strikes.
  - [Improved] Improved insufficient-credit prompts with one-click top-up.
  - [Improved] Added app hot updates, so new features can take effect immediately without downloading and installing again.
  - [Fixed] Fixed an issue where feedback could not be submitted after a runtime environment error.
  - [Fixed] Fixed an issue where messages could fail to send after the network disconnected and reconnected.
  - [Fixed] Fixed abnormal context handling in long conversations.
