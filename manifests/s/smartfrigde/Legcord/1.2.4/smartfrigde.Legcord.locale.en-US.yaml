ReleaseNotes: |-
  What’s New in Legcord v1.2.4 ✨
  
  Highlights & Improvements
  - 🐧 Huge streaming performance improvements on Linux
    Screensharing and streaming should now feel significantly smoother.
  - 🔄 Separate “No Bundle Updates” setting for each client mod
    Control updates individually for your installed mods.
  - 💾 Backup & Restore added
    Easily back up and restore Legcord settings and client mod data.
  - 🎮 Improved macOS game detection
    Games like Roblox are now detected correctly.
  - 🛡️ New CSP options setting
    Added advanced Content Security Policy controls: https://github.com/Legcord/Legcord/wiki/CSP-Options
  - 🪟 Window material setting added for supported systems (#1025 by @passionvine).
  - 📦 OPTIONAL automatic Linux updates added (#1027 by @KarboXXX).
  - 🎛️ Support banner popup added
    Added popup support banner (#1044 by @youtsuhodev)
    Restyled support banner (#1058 by @MahmodZE)
  
  Fixes & Quality of Life
  - 🖥️ Fixed Linux StartupWMClass to legcord (#1021 by @khancyr).
  - 📺 Fixed screensharing quality, FPS, and audio (#1026 by @KarboXXX).
  - 🎚️ Fixed scrollbar styling on file preview (#1024 by @MahmodZE).
  - 🔊 Fixed mute toggle sound effect playback (#1031 by @psw01).
  - 🎮 Fixed RPC status not disappearing properly (#1032 by @Adrigamer2950).
  - 🔐 Fixed security prompt appearing with no passkey (#1033 by @dequeues).
  - 🇫🇷 Added missing French translations for settings categories (#1028 by @youtsuhodev).
  - ⌨️ Polished keybinds UI (#1038 by @youtsuhodev).
  - 🎥 Fixed camera/mic device switching not working (#1051 by @narasaka).
  - ⚙️ Fixed settings shortcut behavior (#1046 by @KirobotDev).
  - 📏 Fixed dropdown height limit in Games settings (#1045 by @youtsuhodev).
  - 📐 Fixed dropdown max height calculation (#1059 by @MahmodZE).
  - 🧹 Cleanup of old fix-me notes and code polish (#1060 by @KirobotDev).
  - 📂 Fixed restore zip path traversal issue (#1061 by @youtsuhodev).
  - 🛡️ Added stricter CSP, better permission handling, and mod validation (#1069 by @KirobotDev).
  - Fixed first time setup
  
  New Contributors 👋
  - @psw01 – first contribution (#1031)
  - @Adrigamer2950 – first contribution (#1032)
  - @dequeues – first contribution (#1033)
  - @youtsuhodev – first contribution (#1028)
  - @narasaka – first contribution (#1051)
  - @KirobotDev – first contribution (#1046)
  
  Special Thanks ❤️
  Big shoutout to @FlintSH, @fluffypony and @youtsuhodev for their generous donations!
