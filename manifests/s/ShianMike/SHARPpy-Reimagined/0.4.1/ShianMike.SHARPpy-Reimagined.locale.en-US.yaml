Description: SHARPpy Reimagined - Modern sounding analysis and SHARPpy-style rendering for Python 3.11+. SHARPpy Reimagined is a modernized, standalone fork of SHARPpy, focused on packageable Python 3.11+ workflows, Qt6/PySide6 rendering, and reproducible point-sounding tools. It keeps the familiar SPC-style skew-T, hodograph, hazard, and derived-parameter views while adding clean command-line entry points, bundled resources, and a test-backed decoder/extractor layer.
