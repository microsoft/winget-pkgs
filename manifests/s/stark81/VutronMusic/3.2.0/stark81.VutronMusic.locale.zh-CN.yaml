ShortDescription: 高颜值的第三方网易云播放器
Description: 高颜值的第三方网易云播放器；支持流媒体音乐，如 navidrome、emby；支持本地音乐播放、离线歌单、逐字歌词、桌面歌词、Touch Bar 歌词、Mac 状态栏歌词显示、Linux-gnome 桌面状态栏歌词显示；支持降调降速等。支持 Windows / macOS / Linux。
