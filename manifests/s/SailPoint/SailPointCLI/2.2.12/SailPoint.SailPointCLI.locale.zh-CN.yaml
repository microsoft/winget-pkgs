ShortDescription: 通过编程方式轻松地与 SailPoint 的 SaaS 平台进行交互。
Description: |-
  SailPoint CLI 是一个基于终端的工具，可用于与您的 Identity Security Cloud (ISC) 租户进行交互。CLI 提供了一个基于文本的环境，您可以在其中运行称为“命令”的操作，以按需与租户进行交互。
  您可以使用 CLI 执行许多过去需要使用 Postman 或自定义脚本才能完成的功能。例如，您可以使用 CLI 调用 SailPoint API，在您的 ISC 租户中执行任何操作，并且所有这些都可以直接在命令行上完成，且几乎无需配置。
