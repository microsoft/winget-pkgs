ReleaseNotes: DXC path line smart filtering (continent, mode, time) with cascading fallback. DXCC badge case-insensitive matching fix. Hamlib mode recognition (PKTUSB, PKTLSB, CWR, RTTYR). Band plan SAT false-positive fix. Cross-platform branding consistency — unified descriptions, desktop entries, AUR metadata, Windows installer, and CI validation. New branding-check CI workflow (6 jobs).
