ShortDescription: Fast, offline-first terminal logger for amateur radio operators.
Description: CQOps is a small, fast, offline-first amateur radio logger for the terminal. It supports keyboard and WSJT-X logging, multiple operators and logbooks, SOTA/POTA/WWFF references, contest workflows, rig control, GPS, APRS, Wavelog synchronization, and a read-only live dashboard. It is designed for portable operations, club stations, SSH sessions, and low-power computers.
