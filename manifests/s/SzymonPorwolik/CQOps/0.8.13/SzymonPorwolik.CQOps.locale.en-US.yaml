ReleaseNotes: Added a live contest statistics panel with rate, peak, activity chart, and accurate QSO totals. Improved REF search with diacritic- and case-insensitive matching. Standardized keybindings and help labels. Added contest-aware ADIF export filenames. Expanded release packaging with RPM support, Cloudsmith publishing, checksums, and updated installation documentation.
