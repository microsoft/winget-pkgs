PackageIdentifier: SomePythonThings.ElevenClock
PackageVersion: 4.4.1.1
PackageLocale: en-GB
Description: |-
  The whole point of ElevenClock is to have a customisable clock on your Windows 11 taskbars.
  When Microsoft’s engineers were creating Windows 11, they forgot to add a clock on the secondary screen taskbar.
  So I did that.
  ElevenClock was an app designed to return this functionality back, but it has evolved and it can now replace your system clock in order to let you customise it, adding seconds, moving it around, changing its colour and much more, like in the good old days.
Moniker: elevenclock
