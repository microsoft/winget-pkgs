ShortDescription: Agent-native SSH security daemon with 7 RFC-standardized defense plugins
Description: |-
  Saki Agent Secure Stream (SASS) is an application-layer overlay protocol for
  authenticated remote command execution between AI agents. Features 7
  RFC-standardized defense plugins: ChaCha20-Poly1305 cognitive challenge,
  TLS Exporter channel binding, zero-allocation tarpit, ED25519 audit chain,
  Vi Swap terminal decoy, transparent symlink branching, and volatile
  environment redirection. Reference implementation of IETF Internet-Draft
  draft-sakistudio-sass-06.
