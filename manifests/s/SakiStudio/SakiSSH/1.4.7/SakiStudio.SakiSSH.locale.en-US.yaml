ShortDescription: Agent-native SSH security suite with 7 RFC-standardized defense plugins
Description: |-
  Saki Agent Secure Stream (SASS) is an application-layer overlay protocol for
  authenticated remote command execution between AI agents. This package is
  the 7th release in the SASS protocol v1.4 line, shipping both daemon and client.
  Features Total Response Mapping for complete output capture, Safety Gradient
  for progressive permission escalation, Transparent Branching for parallel
  execution paths, and 7 RFC-standardized defense plugins including
  ChaCha20-Poly1305 cognitive challenge, zero-allocation tarpit, ED25519 audit
  chain, Vi Swap terminal decoy, and more. Reference implementation of IETF
  Internet-Draft draft-sakistudio-sass-07.
