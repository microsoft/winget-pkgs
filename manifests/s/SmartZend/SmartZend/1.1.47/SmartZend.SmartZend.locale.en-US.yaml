ShortDescription: Bulk WhatsApp messaging for B2B sales teams.
Description: |-
  Smart Zend is a desktop application that helps B2B sales teams send personalized
  bulk WhatsApp messages without using the official Meta API. It includes contact
  management, templates, scheduled campaigns, drip sequences, A/B testing,
  analytics, and a Sales Intelligence Hub with pipeline, prospects, and AI-assisted
  meetings. All processing happens locally on your machine — your contacts and
  WhatsApp session never leave your computer.
