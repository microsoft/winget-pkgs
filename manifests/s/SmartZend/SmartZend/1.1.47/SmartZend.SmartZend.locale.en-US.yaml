ReleaseNotes: |-
  Round of UX/UI improvements across Logs, Analytics, Campaigns, Knowledge
  and Nurturing sections. Bug fix in Send progress (BAD_NUMBER status no
  longer overflows the log grid). Sidebar redesigned with uniform pills for
  theme / language / sound. Cumulative fixes from v1.1.42-1.1.46:
  Anthropic Claude integration, AI usage tracking dashboard, telemetry
  Live Sessions, glass mode v3 with green+black palette.
