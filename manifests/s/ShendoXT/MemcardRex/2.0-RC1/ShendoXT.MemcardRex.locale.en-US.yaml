ReleaseNotes: |-
  - Autodetect dark or light mode based on Windows user settings.
  - Allows switching from WinUSB driver to LibUSB for PS3 MC Adaptor if "libusb-1.0.dll" is placed in the same directory.
  - Added support for PocketStation MCIcons and APIcons in Save information dialog.
  - Upgraded icon editor:
    - Added bucket fill tool and eraser tool.
    - Added static previews for each frame and animated composite.
    - Brightness of the grid can be adjusted or turned off all together.
  - Fixed tab overflow glitches present from the beta version.
  - More HiDPI fixes throughout the application.
