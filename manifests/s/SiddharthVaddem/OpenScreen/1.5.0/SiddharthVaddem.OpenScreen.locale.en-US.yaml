ReleaseNotes: |-
  Final Release (v1.5.0)
  ** this project wil be archived soon **
  when i started this project 9 months ago, it was really just a side project to help indie devs make better demos and share what they were building. i never expected it to get anywhere close to where it is today. somehow it ended up at 120k+ downloads and almost 40k stars, which is still kind of crazy to me.
  i've genuinely enjoyed building it, but i also feel like i've achieved everything i originally set out to do with the project. i guess that's also part of why i'm comfortable ending it.
  there are already plenty of successors and forks carrying the torch in their own way and I highly encourage you to check them out.
  thanks to everyone who contributed 🙏 , used the app and helped maintain the project, making it truly community first.
  even though i'm stepping away, i'd still love to see what people continue building with OpenScreen. if you're using it for your demos, products, walkthroughs, feel free to tag me on X and share what you've made. seeing how people used OpenScreen was always one of the most rewarding parts of working on it.
  Changes
  - Native Capture in MacOS & Windows (sorry Linux folks 😢)
  - Much improved camera animation (Auto-focus cursor tracking) - check video here; manual is still an option
  - Custom Cursors (size, type, effects, post recording path smoothening)
  - Auto Captioning for voiceovers.
  - New and improved UI.
  - Improved stability for longer recordings.
  - Disable webcam post processing.
  - Timeline Snapping guides.
  - Annotation text animations.
  - Language support: English, Arabic, Spanish, French, Italian, Japanese, Korean, Russian, Turkish, Vietnamese, Portuguese (Brazil), Chinese (Simplified), Chinese (Traditional)
  - Audio waveform for easier hinting.
  - deprecated Blurs.
  - Vertical HUD layout (toggle)
