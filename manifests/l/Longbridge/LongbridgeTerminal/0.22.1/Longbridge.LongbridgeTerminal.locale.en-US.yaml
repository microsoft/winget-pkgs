ShortDescription: AI-native CLI for Longbridge Securities — real-time market data, portfolio, and trading for HK/US/A-share/SG markets
Description: |-
  Longbridge Terminal is an AI-native command-line tool for the Longbridge Securities platform.
  It provides real-time market data, portfolio management, and trading across HK, US, A-share, and
  Singapore markets. Outputs structured JSON for AI-agent tool-calling and also ships a full-screen
  TUI for interactive monitoring.

  Key capabilities:
  - Real-time quotes, depth, K-lines, options, and warrants
  - Account balances, stock and fund positions
  - Order submission, modification, cancellation, and execution history
  - Designed for scripting, AI-agent integration, and daily trading workflows
