ShortDescription: Terminal-aesthetic media vault for downloading and organizing videos from YouTube, TikTok, and Instagram.
Description: |-
  ClipVault is an Electron-based media vault with a retro CRT terminal aesthetic.
  Download, organize, and manage videos from YouTube, TikTok, and Instagram.
  Features include cross-platform creator groups, chapter navigation, SponsorBlock integration,
  smart filtering, playlist management, and batch thumbnail export.
  All dependencies (yt-dlp, FFmpeg, gallery-dl) are installed automatically during setup.
