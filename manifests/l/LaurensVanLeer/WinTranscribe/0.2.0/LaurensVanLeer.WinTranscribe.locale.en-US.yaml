ShortDescription: Voice transcription for Windows. Push-to-talk dictation, meeting recording, and AI summaries.
Description: |-
  WinTranscribe captures audio from your microphone and system, transcribes
  it in real-time using AI, and pastes the text wherever your cursor is.
  Includes push-to-talk dictation in any app, meeting recording with live
  transcription, AI-powered summaries (Overview / Decisions / Action items),
  AI checklists for talking points, custom dictionary, and multi-language
  support (Dutch, English, German, French, Spanish).
