ReleaseNotes: |-
  New Features：
  • Highlight drivers with anomalously newer dates when select old drivers：Suspicious driver dates are now visually flagged in the UI.
  • «Copy Folder Path» context menu：Right-click a driver entry to copy its store folder path.
  • Enhanced search box：New search control with search icon, placeholder text, clear button, and better DPI/RTL support.
  • Improvements to the French translation.
