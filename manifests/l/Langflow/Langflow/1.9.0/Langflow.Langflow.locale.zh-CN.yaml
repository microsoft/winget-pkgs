ShortDescription: 一款用于构建和部署人工智能驱动智能体与工作流的强大工具。
Description: |-
  Langflow 是一个基于 Python 的开源可定制框架，用于构建人工智能应用。它支持智能体和模型上下文协议（MCP）等重要人工智能功能，且不要求使用者必须使用特定的大语言模型（LLM）或向量数据库。
  它的可视化编辑器简化了应用工作流的原型设计，能够帮助开发人员将想法快速转化为实用的成熟解决方案。
