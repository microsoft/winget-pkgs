ShortDescription: A cross-platform TUI playground for learning relational databases.
Description: 'rdbms-playground is a cross-platform terminal app for learning relational database concepts - tables, columns, primary and foreign keys, relationships, indexes, queries, and query plans - in a safe sandbox. It''s a teaching tool, not a database administration tool: it meets beginners with guided, keyword-based commands (simple mode) and grows with them to raw SQL (advanced mode), so the same playground works from "what is a primary key?" through to writing real queries and reading their execution plans.'
