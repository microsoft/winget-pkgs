ReleaseNotes: |-
  Features
  - UI: Added Xray-core "raw" and "hysteria" transport configuration pages
  - UI: Added support for configuring congestion control for hysteria2
  - UI: Network speed and connectivity test URL is now configurable in the Tools menu (Issue #153)
  - UI: Proxy bypass addresses are now configurable in the Tools menu (Issue #154)
  - Settings: Added "Force To 127.0.0.1 When Setting Local Proxy" option (useful when the local proxy address is set to 0.0.0.0)
  - Subscription: Added support for updating subscriptions from remote plain text sources (Issue #145)
  - URI: Added import/export support for Xray-core "raw", "pcs", "vcn", and "fm" URI schemes
  Fixes
  - TUN: Fixed an issue where setting the interface DNS could fail in some cases
  - Server: Fixed an issue where the network speed test always showed 0 (Issue #153)
  - Other minor fixes
  Improvements
  - UI: Added "Activate Selected Server" option to the right-click context menu (Issue #155)
  - Assets: The application now detects whether the assets folder is writable before performing updates (Issue #146)
  - Other minor improvements
  Dependencies
  - Python 3.13.12
  - Go 1.26.1: Xray-core v26.3.27
  - Go 1.26.1: hysteria2 v2.8.1
  - Go 1.26.1: tun2socks with latest main branch changes
