PackageIdentifier: lyswhut.AnyListen
PackageVersion: 0.7.0
PackageLocale: zh-CN
License: 免费软件
ShortDescription: 跨平台私人音乐播放服务
Description: |-
  跨平台私人音乐播放服务
  功能
  - 添加并播放本地歌曲（标准播放列表和本地列表）
  - 添加并播放存储在 WebDAV 上的歌曲（远程列表）
  - 在线歌曲元数据匹配（封面、歌词；通过扩展管理器安装相关扩展）
  - 实验性音频效果
  - 卡拉 OK 歌词和标题栏歌词
Tags:
- 专辑
- 播放器
- 歌单
- 歌手
- 歌曲
- 音乐
- 音频
ReleaseNotes: |-
  新增
  - 新增 「在线资源」 板块，位于 设置 > 在线资源，默认关闭。
  - 新增 「忽略本地歌曲的同名及内嵌歌词」 选项，位于 设置 > 播放设置。启用后会忽略本地歌曲同名 LRC 歌词及文件内嵌歌词，并尝试从其他渠道获取歌词。
  - 新增 「音频输出设备」 设置，位于 设置 > 播放设置（#161）。
  - 歌曲切换模式新增 「禁用歌曲切换」 选项（#161）。
  - 新增 「优先播放音质」 选项，位于 设置 > 播放设置，默认 128k。
  - 新增 「扩展程序详情信息」 界面，点击扩展列表的扩展项将显示该扩展的详细信息。
  - 新增 「歌词右键菜单」，可用于调整歌词大小与歌词偏移。
  - 新增 「歌曲评论显示」 功能，可在歌曲列表右键菜单与播放栏中使用。
  - 新增 「添加歌曲到列表时的位置」 选项，位于 设置 > 列表设置，默认顶部。
  - 新增 「显示列表操作按钮」 设置，默认开启。
  - 播放栏新增 「收藏歌曲」 按钮，点击可切换当前播放歌曲的收藏状态。
  - 歌曲列表项新增歌曲序号与 「播放」、「收藏」 操作按钮。
  - 新增桌面歌词。
  优化
  - 优化歌曲列表内封面加载机制，加快已加载过封面的显示速度 (#156)。
  - 不再将 _ 认为是多个歌手名字的分隔符（#191）。
  - 优化上下文菜单分割线实现效果（#198）。
  - 优化自定义滚动条在各平台上的显示效果。
  - 为 Windows Legacy 版本添加安全提示（#206）。
  - 允许通过弹窗头部拖动窗口。
  - 移除 「我的列表」 条目前新增二次确认（#234）。
  修复
  - 修复正在播放的 「稍后播放」 歌曲在重新加载播放器时被意外从播放列表移除的问题。
  - 修复全屏模式下仍可更新 「窗口大小设置」 的问题。
  - 修复全屏模式下更新 「字体设置」 不生效的问题（#189）。
  - 修复代理服务校验带参数 URL 异常的问题。
  - 修复缓存被清空后，本地歌曲封面未优先从本地重新读取的问题。
  - 修复读取某些 WebDAV 服务时，丢失第一项内容的问题（#180）。
  - 修复在 Windows 下使用系统原生窗口样式时，更改窗口大小设置后无法进入全屏的问题（#190）。
  - 修复配置了代理时下载扩展文件未使用代理的问题（#194）。
  - 修复存在弹出层时的窗口可拖动区域仍然会工作的问题（#200）。
  - 修复播放列表在某些情况下与歌单不同步更新的问题。
  安全
  - 安装扩展包时新增 hash 值校验。

  Shortcut links (快捷链接)
  - Windows x64: any-listen-0.7.0-x64-Setup.exe
  - MacOS arm64: any-listen-0.7.0-arm64.dmg
  - Linux amd64 deb: any-listen_0.7.0_amd64.deb
