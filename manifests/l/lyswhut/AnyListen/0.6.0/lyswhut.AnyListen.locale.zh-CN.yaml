PackageIdentifier: lyswhut.AnyListen
PackageVersion: 0.6.0
PackageLocale: zh-CN
License: 免费软件
ShortDescription: 跨平台私人音乐播放服务
Description: |-
  跨平台私人音乐播放服务
  功能
  - 添加并播放本地歌曲（标准播放列表和本地列表）
  - 添加并播放存储在 WebDAV 上的歌曲（远程列表）
  - 在线歌曲元数据匹配（封面、歌词；通过扩展管理器安装相关扩展）
  - 实验性音频效果
  - 卡拉 OK 歌词和标题栏歌词
Tags:
- 专辑
- 播放器
- 歌单
- 歌手
- 歌曲
- 音乐
- 音频
ReleaseNotes: |-
  新增
  - 新增 “道法自然”主题。勾选该主题时，应用会根据当前系统的亮/暗模式，在之前选定的亮色主题与 “黑灯瞎火” 主题之间切换。(#136)
  - 本地列表设置新增 “使用轮询监听文件变动” 选项，用于解决挂载的远程驱动器读取问题 (#142)。
  - 在 歌单列表 中初步添加 封面显示（暂不支持自定义封面，自动取列表内第一首歌的封面作为歌单封面）与 歌曲数量 显示。
  优化
  - 优化歌单内歌曲搜索结果排序。
  - 完善扩展管理系统，现在扩展加载失败或者有新版本时会有气泡提示。
  修复
  - 修复 wav 文件的艺术家标签信息解析为乱码的问题（#132）。
  - 修复 WebDAV 列表 最多只能添加 1000 首歌曲的问题（#134）。
  - 修复由于 文件扩展名大小写敏感 导致的播放或文件读取失败的问题（#141）。
  - 修复 WebDAV 元数据 读取错误。
  - 修复播放封面与列表内歌曲封面加载逻辑冲突的问题。
  - 修复播放历史列表中的歌曲信息在原始列表歌曲更新时未随之更新的问题。
  - 修复 “启动软件时是否恢复上次播放进度” 设置不生效的问题（#150）。
  - 修复某些表单项在禁用状态仍可通过键盘编辑的问题。
  其他
  - 更新安装包构建流程，新增了更多类型的安装包。
  - 专门用于 Windows 7 的发布包从 win7 重命名为 win_legacy（#145）。
ManifestType: locale
ManifestVersion: 1.12.0
