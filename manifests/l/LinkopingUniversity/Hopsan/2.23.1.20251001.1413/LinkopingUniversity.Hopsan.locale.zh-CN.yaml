ShortDescription: 由林雪平大学流体与机电系统系开发的免费多领域系统仿真工具。
Description: |-
  Hopsan 是由林雪平大学（Linkoping university）流体与机电系统系开发的一款免费开源多领域系统仿真工具。
  主要功能包括：
  - 仿真核心库
    - 纯 C++ 库，便于集成
    - 支持多核以实现更快的仿真
    - 可使用 C++ 创建自定义组件模型库
      也支持使用 Modelica 的子集
    - 内嵌简单的数值脚本语言（numhop）
  - 命令行应用程序
    - 可从外部软件调用，将结果保存到文件
    - 自动执行批量仿真
    - 运行模型验证或生成验证数据集
  - 图形用户界面
    - 拖放式/基于功率端口的建模，支持可重用的子系统
    - 强大的仿真结果分析功能
    - 能量损耗计算
    - 数据导出至 CSV、XML、Gnuplot、HDF5 和 Matlab 格式
    - 被仿真系统的交互式动画（实时和回放）
    - 模型变量灵敏度分析
    - 频域分析（基于仿真结果）
    - 数值优化
    - 使用 HCOM 或 Python 语言进行脚本编程
    - 支持通过协同仿真 FMU 导入/导出功能模型接口（FMI）模型
    - 模型导出至 Matlab/Simulink
  - 并行仿真与优化
    - 在本地机器上利用多个处理器核心运行
    - 在网络计算机上使用 Hopsan 仿真服务器应用程序运行
