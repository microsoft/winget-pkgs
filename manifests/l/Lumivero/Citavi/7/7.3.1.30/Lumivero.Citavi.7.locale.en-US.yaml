ReleaseNotes: |-
  Overview

  Citavi 7.3.1 smoothes the rough edges in the redesigned Desktop UI and resolves issues with the AI configuration, the Picker, and the Word Add-In among others. All users on 7.3.0 should upgrade.

  What's fixed

  Desktop — UI and 7.3 redesign cleanup

  - Red and blue labels now update immediately when their status changes.
  - The 7.3 redesign is now applied consistently — outdated icons and incorrect colors have been corrected across the interface.
  - The names of the purple color scheme are now correct in all interface languages.
  - The blue color scheme can be selected again.
  - The Citavi icon in the login window no longer appears squeezed.
  - The spacing between the expand triangle and the category name has been reduced to the intended size.
  Desktop — Functional fixes

  - Routine tasks can be added to References again.
  - Components in the citation editor can be moved again.
  - The Overview tab once again displays the section headings "Abstract", "Keywords", "Categories" and "Groups".
  - Knowledge items can again be reordered by drag-and-drop.
  - The category tree now refreshes element counts immediately when items are added or removed.
  - Newly created categories are again assigned a number automatically.
  - Switching the interface language now behaves correctly.
  - The status bar updates correctly when a selection is active.
  - Quick Search is no longer inactive after start-up, and the selection highlight is restored.
  - The "Show in PDF" link works again after a PDF search has been used.
  Desktop — Platform and infrastructure

  - Installation of Citavi no longer takes longer than expected.
  - Logging works again — Citavi 7.3 had stopped producing log files.
  - User settings are now persisted correctly between sessions.
  - Cloudflare Bot Protection challenges that were blocking some requests have been resolved.
  - Active FIPS compliance policies on Windows no longer break Citavi features. Customers with FIPS-enforced environments are unblocked.
  Desktop — AI configuration

  - Japanese is now available in the AI language options under Tools > Options > Artificial Intelligence.
  - Summary languages in the AI options are now listed in the user's interface language instead of always in English.
  - The AI deactivation flag set via the MSI Assistant is honoured again. MSI deployments that disabled AI now work as expected.
  - DBServer users can use AI features without needing a separate Citavi account.
  Citavi Picker

  - TThe login flow for the RightFind screen in the Picker (Chrome, Edge, Firefox) has been corrected.
  Word Add-In / Citavi Assistant

  - When a Word document is open and connected to a project, changes made in that project are now loaded into Word.
  - Superscript is now rendered correctly when the Citavi Assistant is used.
