ShortDescription: Fast, private, on-device dictation for Windows. Push to talk and type anywhere.
Description: Whisperstream is a Windows dictation app that turns speech into text entirely on your device. Hold a push-to-talk key, speak, and your words are typed into whatever window is focused. Transcription runs locally on your CPU with NVIDIA Parakeet, so audio never leaves your machine. Includes a custom dictionary, optional AI cleanup, and searchable transcript history.
