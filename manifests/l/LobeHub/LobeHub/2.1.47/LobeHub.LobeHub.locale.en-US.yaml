ReleaseNotes: |-
  This release was automatically published from PR #13330.
  Changes
  See PR description: https://github.com/lobehub/lobehub/pull/13330
  Commit Message
  🚀 release: 20260326
  This release includes 91 commits. Key updates are below.
  - Agent can now execute background tasks — Agents can perform long-running operations without blocking your conversation. #13289
  - Better error messages — Redesigned error UI across chat and image generation with clearer explanations and recovery options. #13302
  - Smoother topic switching — No more full page reloads when switching topics while an agent is responding. #13309
  - Faster image uploads — Large images are now automatically compressed to 1920px before upload, reducing wait times. #13224
  - Improved knowledge base — Documents are now properly parsed before chunking, improving retrieval accuracy. #13221
  Bot Platform
  - WeChat Bot support — You can now connect LobeChat to WeChat, in addition to Discord. #13191
  - Richer bot responses — Bots now support custom markdown rendering and context injection. #13294
  - New bot commands — Added /new to start fresh conversations and /stop to halt generation. #13194
  - Discord stability fixes — Fixed thread creation issues and Redis connection drops. #13228 #13205
  Models & Providers
  - GLM-5 is now available in the LobeHub model list. #13189
  - Coding Plan providers — Added support for code planning assistant providers. #13203
  - Tencent Hunyuan 3.0 ImageGen — New image generation model from Tencent. #13166
  - Gemini content handling — Better handling when Gemini blocks content due to safety filters. #13270
  - Claude token limits fixed — Corrected max window tokens for Anthropic Claude models. #13206
  Skills & Tools
  - Auto credential injection — Skills can now automatically request and use required credentials. #13124
  - Smarter tool permissions — Built-in tools skip confirmation for safe paths like /tmp. #13232
  - Model switcher improvements — Quick access to provider settings and visual highlight for default model. #13220
  Memory
  - Bulk delete memories — You can now delete all memory entries at once. #13161
  - Per-agent memory control — Memory injection now respects individual agent settings. #13265
  Desktop App
  - Gateway connection — Desktop app can now connect to LobeHub Gateway for enhanced features. #13234
  - Connection status indicator — See gateway connection status in the titlebar. #13260
  - Settings persistence — Gateway toggle state now persists across app restarts. #13300
  CLI
  - API key authentication — CLI now supports API key auth for programmatic access. #13190
  - Shell completion — Tab completion for bash/zsh/fish shells. #13164
  - Man pages — Built-in manual pages for CLI commands. #13200
  Security
  - XSS protection — Sanitized search result image titles to prevent script injection. #13303
  - Workflow hardening — Fixed potential shell injection in release automation. #13319
  - Dependency update — Updated nodemailer to address security advisory. #13326
  Bug Fixes
  - Fixed skill page not redirecting correctly after import. #13255 #13261
  - Fixed token counting in group chats. #13247
  - Fixed editor not resetting when switching to empty pages. #13229
  - Fixed manual tool toggle not working. #13218
  - Fixed Search1API response parsing. #13207 #13208
  - Fixed mobile topic menus rendering issues. #12477
  - Fixed history count calculation for accurate context. #13051
  - Added missing Turkish translations. #13196
