ReleaseNotes: |-
  This release was automatically published from PR #13626.
  Changes
  See PR description: https://github.com/lobehub/lobehub/pull/13626
  Commit Message
  🚀 release: 20260407
  This release includes 148 commits. Key updates are below.
  - Response API tool execution is more capable and reliable — Added hosted builtin tools + client-side function tools and improved tool-call streaming/completion behavior. #13406 #13414 #13506 #13555
  - Input and composition UX upgraded — Added AI input auto-completion and multiple chat-input stability fixes. #13458 #13551 #13481
  - Model/provider compatibility improved — Better Gemini/Google tool schema handling and additional model updates. #13429 #13465 #13613
  - Desktop and CLI reliability improved — Gateway WebSocket support and desktop runtime upgrades. #13608 #13550 #13557
  - Security hardening continued — Fixed auth and sanitization risks and upgraded vulnerable dependencies. #13535 #13529 #13479
  Models & Providers
  - Added/updated support for glm-5v-turbo, GLM-5.1 updates, and qwen3.5-omni series. #13487 #13405 #13422
  - Added additional ImageGen providers/models (Wanxiang 2.7 and Keling from Qwen). #13478
  - Improved Gemini/Google tool schema and compatibility handling across runtime paths. #13429 #13465 #13613
  Response API & Runtime
  - Added hosted builtin tools in Response API and client-side function tool execution support. #13406 #13414
  - Improved stream tool-call argument handling and response.completed output correctness. #13506 #13555
  - Improved runtime error/context handling for intervention and provider edge cases. #13420 #13607
  Desktop App
  - Bumped desktop dependencies and runtime integrations (agent-browser, electron). #13550 #13557
  - Simplified desktop release channel setup by removing nightly release flow. #13480
  CLI
  - Added OpenClaw migration command. #13566
  - Added local device binding support for lh agent run. #13277
  - Added WebSocket gateway support and reconnect reliability improvements. #13608 #13418
  Security
  - Removed risky apiKey fallback behavior in webapi auth path to prevent bypass risk. #13535
  - Sanitized HTML artifact rendering and iframe sandboxing to reduce XSS-to-RCE risk. #13529
  - Upgraded nodemailer to v8 to address SMTP command injection advisory. #13479
  Bug Fixes
  - Fixed image generation model default switch issues. #13587
  - Fixed subtopic re-fork message scope behavior and agent panel reset edge cases. #13606 #13556
  - Fixed chat-input freeze on paste and mention plugin behavior. #13551 #13415
  - Fixed auth/social sign-in and settings UX edge cases. #13368 #13392 #13338
