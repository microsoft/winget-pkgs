ReleaseNotes: |-
  MX Creative Console & Actions Ring
  - General Bug Fixes.
  - Added a popup message with detailed compatibility requirements when trying to add an .svg file for icons.
  New Features
  - Enhanced Easy-Switch
    - Logi Options+ now supports enhanced Easy-Switch. With the enhanced Easy-Switch your Logitech mouse will automatically follow your paired keyboard when you switch between computers. This simplifies your workflow by synchronizing your devices. This feature is now available with MX Keys S, MX Keys for mac and MX Keys Mini(All Variants) keyboards. Click here for the full list of supported mice and to know more about the enhanced Easy-Switch feature.
  - Add a “Customize” button to the Camera Settings overview on the camera page for webcams.
  - Update the field of view selector on the crop tab for webcams.
