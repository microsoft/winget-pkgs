PackageIdentifier: liliMozi.HanaAgent
PackageVersion: 0.416.44
PackageLocale: zh-CN
ShortDescription: 一个拥有记忆、个性和自主性的个人 AI 智能体。
Description: |-
  HanaAgent 是一个比传统编码智能体更易用的个人 AI 智能体。它具备记忆、个性，并能自主行动。多个智能体可在你的设备上协同工作。
  作为助手，它温和友好：无需复杂的配置文件，没有晦涩的术语。HanaAgent 不仅为程序员设计，也适合所有使用电脑工作的人。作为工具，它功能强大：能记住你说过的每一句话，操作你的计算机，浏览网页，搜索信息，读写文件，执行代码，管理日程，甚至可以自主学习新技能。

  功能
  记忆 —— 自定义的记忆系统，让近期事件清晰留存，旧记忆自然淡化。
  个性 —— 并非通用的“AI 助手”。每个智能体通过个性模板拥有独特的语气和行为。智能体以独立文件夹形式存在，便于备份与管理。
  工具 —— 支持读写文件、运行一次性命令或持久化终端会话、浏览网页、通过浏览器或 API 提供商进行网络搜索、截取屏幕及分段长截图、预览媒体内容、检查网页结构。覆盖绝大多数日常工作的使用场景。还提供面向服务器的命令行接口（CLI），可连接到同一 HanaAgent 服务端，查看状态、列出会话并从终端继续聊天。
  技能 —— 原生兼容社区技能生态系统。智能体可以从 GitHub 安装技能，也可以自行编写技能。默认启用严格的安全审查机制。
  角色卡与技能包 —— 可将智能体导出或导入为本地优先的角色卡 ZIP 包，包含白名单身份、头像、可选记忆和技能。技能包是独立的技能打包架构：可对技能进行分组，自由拖拽移动，为智能体整体启用或关闭整套技能包，并将技能包导出为独立 ZIP 文件用于迁移或共享。
  多智能体 —— 可创建多个智能体，各自拥有独立的记忆、个性和计划任务。智能体可通过频道群聊协作，或相互委托任务。
  工作台（Desk）—— 每个智能体都拥有一个用于存放文件和笔记（Jian）的工作台。支持拖放操作、文件预览以及监控工作区文件树的变化，是你与智能体之间异步协作的空间。
  全屏媒体查看器 —— 点击聊天记录或工作台中的任意图片、SVG 或视频，即可在暗色遮罩层中打开查看器，支持滚轮缩放、拖拽平移、+ / − / 0 快捷键，以及在同一会话或文件夹内左右切换相邻媒体。
  会话管理 —— 侧边栏支持搜索聊天历史，优先匹配标题，再搜索消息内容。旧会话可在设置中归档、恢复或永久删除。选中聊天消息中的文字后，会自动转为编辑器引用卡片，使后续提问保留原始上下文。
  定时任务与心跳机制（Cron & Heartbeat）—— 智能体可运行计划任务，并定期检查工作台上的文件变更。当前的自动化执行器将“何时运行”与“做什么”分离：复杂任务仍作为后台智能体会话运行，轻量提醒可直接发送通知，插件操作也可被安排调度。
  沙箱 —— 双层隔离机制：应用级 PathGuard（四层访问权限） + 操作系统级沙箱（macOS Seatbelt / Linux Bubblewrap / Windows 受限令牌）。智能体可读取普通系统文件，但写入和删除操作仅限于工作区和受管数据文件夹。在 Windows 上，命令沙箱采用写入隔离模型：读取使用当前用户的正常权限，网络访问保持当前用户的网络权限。macOS 和 Linux 继续使用其平台沙箱后端提供的网络行为。外部网络访问可选择使用系统智能体、手动智能体或直连模式。
  插件 —— 可扩展的插件系统，采用约定优先的架构。社区插件支持拖放安装。插件可提供工具、技能、命令、智能体模板、HTTP 路由、Pi SDK 扩展、LLM 提供商、页面、小组件、配置模式和后台任务。路由可直接访问核心服务（通过 PluginContext 注入），并通过会话总线与智能体会话交互；插件卡片与内置卡片一样，流经相同的消息块和历史回放流程。两级权限模型（受限 / 全权限）保障高级功能安全：extensions/、routes、providers、pages 和生命周期钩子仅对全权限插件加载。
  跨平台桥接 —— 单个智能体可同时连接 Telegram、飞书、QQ 和微信机器人。从任一平台聊天即可远程操作你的电脑。桥接会话携带平台上下文，通知也可回传至当前外部平台。
  移动端与局域网前端 —— HanaAgent 服务端可托管 /mobile/ PWA 页面。手机可通过设备访问密钥或本地账户登录，查看会话、聊天并管理工作台文件。另一台桌面设备也可通过局域网 URL 和访问密钥连接到现有的局域网 HanaAgent 服务端。
  国际化（i18n）—— 界面支持 5 种语言：简体中文、英语、日语、韩语和繁体中文。
