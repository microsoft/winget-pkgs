ReleaseNotes: |-
  更新内容
  ✨ 新功能
  - 独立思考强度控制 — 群聊中，每个 AI 参与者现在可以单独设置思考强度。点击参与者行上的按钮，在 默认 → 无 → 最低 → 低 → 中 → 高 → 最高 之间循环切换。单聊保持原有的头部选择器不变。
  - Enter 键行为切换（@KanTakahiro 贡献）— 桌面端用户现在可以自定义 Enter 键在输入框中的行为：
    - Enter 发送（默认）：Enter 发送消息，Shift+Enter 换行
    - Enter 换行：Enter 换行，⌘Enter / Ctrl+Enter 发送消息
    在 设置 → 对话 → Enter 键发送 中切换。
  🐛 Bug 修复
  - 修复 CI 流程在所有平台正确使用 pnpm
