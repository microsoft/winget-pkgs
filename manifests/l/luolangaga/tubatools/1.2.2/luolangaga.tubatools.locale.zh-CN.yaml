ReleaseNotes: |-
  图吧工具箱WinUI3 v1.2.2
  下个版本会在便携版加入兼容版本的程序，支持pe和win7，可以期待一下！！
  Gitcode：https://gitcode.com/gcw_uDDNaqJw/tubatool/releases/v1.2.0
  Github下载地址：https://github.com/luolangaga/tubatool/releases
  夸克网盘下载地址：https://pan.quark.cn/s/e593f9c60aa9
  百度网盘下载地址：https://pan.baidu.com/s/1bEZ2aDgPGgfBRtHMwQ_ilg?pwd=twgm
  ✨ 新功能
  - 电池消耗分析：内置工具中新增“电池消耗分析”页面。可查看电池健康度、实时充放电功率、当前电量、预估续航时间；展示天级电量变化趋势图（支持 1/3/7/14 天切换），并动态播放绘制动画；显示 CPU 占用排行 Top 12 的高耗电进程，帮助定位电池杀手；支持导出为 HTML 报告。
  - 硬件详情页：新增完整的硬件参数一览页面。按 CPU、主板、内存（及每个插槽）、显卡、磁盘（含分区）、显示器、声卡、网卡分类展示详细规格；参数支持点击复制，Intel 处理器会显示“CPU‑Z”验证标识。
  - 硬件信息配置修改器：新增独立窗口，允许临时修改注册表中对外显示的 CPU、GPU、系统、BIOS、主板等信息（可用于特定软件环境测试）。提供当前值预览、备份、一键恢复功能，并明确警告修改风险。
  - 帧率分析报告：在硬件监控页开启 FPS 检测并运行游戏/应用后，可进入“帧率详细分析”页面。按应用统计当前 FPS、平均/最低/最高帧率、1%/0.1% Low、总帧数，同时附带当前硬件信息和状态快照。
  - 意外崩溃报告窗口：当应用发生未处理异常时，不再在内嵌页面显示错误，而是弹出独立窗口。窗口中可查看异常堆栈、系统版本、硬件概要等诊断信息，并可填写复现步骤；支持一键复制错误/系统信息，或直接跳转 GitHub 提交 Issue。
  - “新机开荒”内置工具：新增一站式新电脑初始化向导。包含常用软件批量安装（基于 winget，按日常/开发/游戏/设计四种角色推荐）、系统服务优化（含服务说明与建议）、启动项管理（默认不推荐禁用系统关键项）等功能；安装进度实时显示，支持跳过已安装项。
  - 工具包自动下载与更新：从 Microsoft Store 安装的 MSIX 打包版在首次启动时会自动提示下载内置工具包；之后若检测到工具包新版本，会弹出更新提醒。
  - 新增工具：工具库中新增 y‑cruncher 圆周率烤机工具（远程下载，极致 CPU/内存压力测试）；Geek Uninstaller 支持在线下载。
  🎨 界面改进
  - 硬件显示单行排版：在简洁视图模式下，多核 CPU、多内存插槽等设备信息改为单行紧凑排列，避免多设备时排版拥挤；运行时间区域采用固定宽度，彻底消除因秒数跳变引起的界面缩放抖动。
  - 电池分析页设计：概览卡片使用彩色图标、实时迷你火花线图；趋势图带动画填充和指针悬浮提示；进程排行带彩色进度条。
  - 硬件详情页：卡片式布局，支持自动背景图，顶部有返回、刷新按钮，信息区域可滚动。
  - 错误窗口：现代化设计，带半透明错误图标、异常详情可滚动代码区域、可展开/收起的系统信息面板、复现步骤输入框；窗口大小自适应屏幕比例。
  - 内置工具页和收藏页：支持显示与主界面一致的自定义背景图（半透明），增强视觉统一性。
  - 导航流畅度：主窗口内容Frame 启用页面缓存（CacheSize=10），切换页面不再重复创建，响应更快；收藏页加载工具列表改为后台异步，界面不再卡顿。
  ⚡ 性能优化
  - 页面缓存：主窗口导航 Frame 设置 CacheSize=10，减少页面重复创建开销，切换更流畅。
  - 工具列表加载优化：收藏页和内置工具页切换为后台线程加载工具数据，避免阻塞 UI 线程。
  - 工具目录缓存：提供缓存的全部工具列表方法，减少文件系统重复扫描。
  - 监控页加载加速：进入硬件监控页不再强制等待驱动检查弹窗，直接加载。
  - 图表动画自适应：图表动画在“快速模式”下跳过动画，渲染更高效。
  🐛 问题修复
  - 自定义工具管理器图标错误：“烤鸡”分类图标由缺失/错误改为正确显示。
  - 配置管理对话框重启时空引用：增加空检查，避免特定环境下重启崩溃。
  - MSIX 打包版管理员权限检查：修正打包应用提升权限逻辑，避免误弹 UAC。
  - 其他修复：修复“三大金刚按键”偶发性功能异常；修复收藏页偶尔闪黑屏问题；优化安装包体验，移除触发杀软误报的可疑文件。
  🔧 其他改进
  - 新增 WinUI 3 开发技能包文档及代码片段，包含控件、模式、布局等示例，方便开发者参考。
  - 更新 .gitignore，排除文档目录、生成的 msixbundle 包和 Store 无关目录。
  - 清理未使用的引用和代码，提升项目可维护性。
