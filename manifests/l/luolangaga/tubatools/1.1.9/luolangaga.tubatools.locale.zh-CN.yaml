ReleaseNotes: |-
  ## 图吧工具箱WinUI3 v1.1.9

  ### ✨ 新功能

  - 自定义工具管理：新增「自定义工具管理」窗口，可以自由创建工具分类、为分类选择图标（支持从预设图标选取或手动输入
    Unicode 图标字符），并通过拖拽灵活排序分类。支持从 ZIP 压缩包导入自定义工具，导入时可自行指定工具名称、所属
    分类、主程序、目标架构、简介和标签。
  - 工具右键功能增强：在工具列表上右键（或长按）现在可以直接「打开工具所在目录」或「删除工具」，删除时会自动清理相
    关文件和缓存数据。
  - 硬件信息品牌 Logo：硬件信息页面现在会在 CPU 和 GPU 项目前显示对应的品牌图标（Intel、AMD、NVIDIA、Apple、
    Qualcomm），方便快速识别硬件厂商。可在设置中选择关闭此显示。
  - 性能监视悬浮窗增强：新增磁盘读写速度实时显示及曲线图，新增网络上传/下载速度详细数值展示，内存信息增加「已用/总
    量」的具体数值。你可以更全面地监控系统状态。
  - 配置管理中心：新增「配置管理」功能，支持在 AppData 与程序目录之间切换配置存储位置，支持一键导出/导入所有配置文
    件（保存为 ZIP 文件），可清除图标缓存，并直接查看配置目录大小。
  - 默认启动页面选择：可在设置中自定义应用启动后首先显示的页面，例如直接进入「硬件信息」「常用工具」或「硬件监控」。
  - 驱动安装与卸载：设置中新增硬件监控驱动（PawnIO）的安装与卸载入口，用于获取更准确的传感器数据（温度、风扇转速等）。
  - 窗口最小尺寸限制：应用程序窗口现在不会缩小到 800x600 以下，避免界面内容被挤压或变形。
  - Ventoy 多架构选择：Ventoy 工具现在支持根据系统架构自动选择或手动选择对应的程序版本（x86、x64、ARM、ARM64）。

  ### 🎨 界面改进

  - 设置页面重新组织：增加了「配置管理」「硬件监控」等分组，使设置选项更清晰直观。
  - 性能监视悬浮窗设置对话框升级：各监测项（CPU、GPU、FPS、内存、磁盘、网络、电池）使用清晰的分组和子项控制，设置项层
    次更分明。
  - 自定义工具管理窗口界面：采用卡片式分类布局，工具以可视化网格排列，支持拖拽移动分类和工具顺序。
  - 工具右键菜单：新增带有图标和分隔线的菜单，包含「发送到桌面快捷方式」「以管理员身份运行」「打开工具所在目录」「删除
    工具」等选项，操作更便捷。
  - 硬件信息品牌小图标：在各硬件信息行的最右侧显示 20x20 的品牌 Logo，风格精致。
  - 配置管理对话框：提供简洁的配置目录切换、导出/导入、缓存清理功能界面，位置清晰、操作方便。

  ### 🐛 问题修复

  - 修复 MemTest5 工具无法正常运行的问题：补充了缺少的配置文件和运行库，现在 TM5 可以正常启动并使用不同的内存测试方案。
  - 修复 FurMark 启动失败的问题：正确指定了 FurMark 的启动文件（FurMark_GUI.exe），避免因入口不明导致的无法启动。
  - 修复部分配置无法保存或读取的异常：调整了配置路径与读写逻辑，避免因路径问题导致的设置丢失。
  - 修复窗口拖动在部分场景下失效的问题（性能监视悬浮窗）：改用标准标题栏拖动方式，提升悬浮窗移动的稳定性。

  ### 🔧 其他改进

  - 优化打包流程：改进了安装包生成脚本，使版本发布更稳定、体积更合理。
  - 优化工具元数据管理：新增工具元数据服务，支持更灵活的工具描述和分类信息维护。
  - 优化图标缓存机制：可通过配置管理直接清除缓存，避免因图标缓存旧导致显示错误。
