ReleaseNotes: |-
  图吧工具箱WinUI3 v1.4.1
  > 官方网站：https://tubawinui3.cn
  > 官方下载：https://tubawinui3.cn/download
  > GitHub 仓库：https://github.com/luolangaga/tubatool
  >
  > ⚠️ 请认准上述官方渠道下载。任何其他网站提供的所谓"破解版"、"绿色版"、"精简版"均非官方发布，可能包含恶意软件！
  ✨ 新功能
  - 品牌壁纸彩蛋：自动检测你的 CPU、GPU 等硬件品牌，并为你下载对应的专属壁纸作为应用背景。如果不需要，可随时在设置中禁用或通过顶部提示条关闭。
  - 硬件信息“戏称模式”：在硬件信息页面点击标题“硬件信息”，会以动画形式切换显示各硬件的趣味戏称（例如根据品牌显示网络梗），再次点击即可恢复正常名称。
  - 晕3D辅助器“精简模式”：开启后可关闭主窗口，仅保留屏幕准星覆盖层，内存占用降至最低。退出辅助器时不会关闭主程序。
  - 准星强制置顶模式：在全屏游戏中可开启强制置顶，确保准星始终显示在最上层，不受游戏窗口模式影响。
  - 屏幕测试工具：新增内置显示器测试功能，无需联网即可检测屏幕坏点、色彩和灰阶表现。
  - 服务中心：新增系统服务管理工具，方便查看和调整 Windows 服务状态。
  - 性能测试云端排行榜增强：
    - 支持切换数据来源（GitHub / GitCode），遇到网络问题时可以更换源。
    - 对比功能大幅升级：现在最多可同时对比 6 份历史报告，支持雷达图、柱状图、数据表格三种视图，直观比较各项得分。
  - 工具使用教程：为 CPU-Z、GPU-Z、AIDA64、DDU、FurMark 等几十款常用工具添加了官方教程链接，右键工具卡片即可快速打开学习。
  🎨 界面改进
  - 全新启动动画：应用启动时会显示 Logo、版本号和加载动画，启动过程更流畅，不再出现窗口长时间空白。
  - 全局背景统一优化：背景壁纸不再仅显示在个别页面，而是统一在窗口全局层展示，所有页面内容透明显示，视觉更沉浸。
  - 品牌壁纸下载通知：当成功下载品牌专属壁纸后，窗口顶部会显示横幅通知，你可以选择保留或移除该壁纸。
  - 晕3D辅助器界面升级：
    - 新增“精简模式”和“强制置顶模式”独立卡片，操作更清晰。
    - 准星样式新增 T 字形、X 字形、空心圆、十字+大圆点、缺口十字、米字、双圆圈、间隙十字等样式。
    - 边缘标记新增三角形、加号、短线、X形、星形、空心圆等样式。
    - 新增全屏游戏兼容提示，指导用户使用无边框窗口模式。
    - 准星和边缘标记支持透明度和尺寸调节。
  - 错误报告流程完善：提交错误报告时，“复现步骤”已设为必填项，帮助开发者更快定位问题。
  - 硬件信息页交互提升：点击标题可切换戏称模式，状态栏会显示提示信息。
  - 性能测试排行榜优化：
    - 列表项直接显示 CPU、GPU、内存、硬盘各项分数，无需进入详情。
    - 对比页面增加视图切换按钮，可自由在雷达图、柱状图、数据表格间切换。
  - 字体更换：全应用字体由 HarmonyOS Sans / JetBrains Mono 更换为更清晰易读的 MiSans（小米字体）。
  - 导航栏视觉调整：导航项字体不再强制加粗，整体观感更协调。
  - MSIX 打包版适配：从微软应用商店安装的版本将不再显示“社区”入口，避免因沙盒限制导致功能异常。
  - 工具右键菜单增强：收藏工具页和工具列表中，已支持“打开教程”菜单项（仅对有教程的工具显示）。
  ⚡ 性能优化
  - 启动速度提升：硬件信息改为异步后台预加载，工具箱主界面几乎立即响应，不再等待硬件数据采集完成。
  - 工具目录加载优化：工具列表采用缓存机制和延迟填充，切换页面速度明显提升。
  - 内存信息获取优化：修复了部分情况下的内存容量检测问题，信息展示更稳定可靠。
  - 背景壁纸响应速度：壁纸切换和对设置变更的响应改为实时生效，无需重启应用。
  - 云排行榜数据缓存：排行榜数据会缓存到本地，再次打开时加载更快。
  🐛 问题修复
  - 修复晕3D辅助器多项问题：解决了某些游戏中准星不显示、样式切换异常、窗口关闭后覆盖层残留等问题。
  - 修复内存容量显示错误：部分大容量内存用户不会再看到不准确或显示为 0 的问题。
  - 修复“常用”页面报错闪退：打开常用工具页不会再触发异常崩溃。
  - 修复 gitcode 数据源链接错误：切换排行榜数据源至 GitCode 时可正常加载。
  - 修复性能测试和 HWiNFO 启动流程：某些情况下性能测试工具或 HWiNFO 无法正常打开的 Bug 已解决。
  - 修复背景壁纸设置：优化了壁纸加载逻辑，解决了某些页面背景不显示或残留的问题。
  - 修复多个界面报错：包括硬件详情页、收藏页在内的一些页面，在特定分辨率或主题下不再随机崩溃。
  - 修复 3D 眩晕工具精简模式下的兼容性：精简模式退出后再进入不再异常。
  🔧 其他改进
  - 工具更新：内置 Everything 搜索升级至 1.5.0.1416b，Ventoy 更新至 1.1.16。
  - 汉化与教程：多个工具描述汉化，并新增了详细的使用教程入口。
  - 新增工具：微软 HDR 校准工具加入显示器工具列表，可通过 Winget 安装。
  - 新增代理与排名优化：工具下载及排行榜数据获取支持自定义代理，网络环境较差时更稳定。
  - 崩溃日志记录：应用发生异常时会自动将错误日志保存到临时文件夹，便于手动提交诊断。
  - 新增反馈按钮：方便用户快速反馈意见或问题。
  - 工具元数据完善：补充了 HWMonitor ARM64 架构支持，并修复了部分工具启动项配置。
  - 移除多显示器相关功能：简化了显示器检测逻辑，避免部分多屏配置下的异常行为。
