ReleaseNotes: |-
  ## 图吧工具箱WinUI3 v1.4.0

  ### ✨ 新功能

  - 性能测试：侧边栏新增“性能测试”入口，可一键运行内置跑分工具，快速评估电脑性能
  - AI 服务配置：现在可以在设置页面自行配置 OpenAI 兼容的 API 地址、模型和密钥，启用 AI 智能功能。支持测试连接是否正常
  - 鼠标侧键导航：支持使用鼠标侧键（X1后退、X2前进）在已访问页面间快速切换，操作更便捷
  - 导出当前软件：设置中新增“导出当前软件”功能，可将程序目录及工具一键打包为压缩包，方便分享或备份
  - 背景图片高级管理：可自由调节背景图透明度，并能查看和管理所有曾导入过的背景图片历史
  - 新增内容入口：设置页新增“新增内容”卡片，点击可查看各版本更新日志与新功能介绍
  - 开源引用详情：设置页新增开源项目抽屉面板，详细展示本项目使用的所有开源库及许可信息
  - 防晕3D 工具：集成防晕3D 测试工具，帮助检测显示设备是否存在引起眩晕的频闪等问题
  - 脚本管理器与 UUP 镜像下载：新增统一的命令执行窗口，并支持通过脚本管理器运行自定义脚本，以及直接从 UUP 源下载 Windows 系统镜像

  ### 🎨 界面改进

  - 搜索体验大幅升级：搜索框改为弹出式结果列表，支持键盘上下键选择、回车确认、Esc 关闭，搜索时自动防抖，显示更流畅
  - 设置页面全新布局：设置项按“常规”“外观”“硬件与 AI”“工具与社区”“关于与鸣谢”等分组折叠显示，减少滚动，查找更方便
  - 标题栏下载队列：标题栏右侧新增“下载队列”按钮，显示当前待下载项数量，有新任务时会出现脉冲动画提醒
  - 字体整体优化：调整了应用程序内多处的字体样式，文字显示更加清晰统一
  - 硬盘信息展示优化：硬盘信息页面的数据显示更规整，多硬盘信息排版更清晰，方便查看
  - 侧边导航图标更新：侧边栏“社区”入口变更为“性能测试”，对应的图标也做了调整

  ### ⚡ 性能优化

  - 搜索响应更快：搜索输入现在采用防抖机制，避免频繁触发查询，降低 CPU 占用
  - AI 服务响应优化：优化了 AI 服务的调用逻辑，配置后 AI 功能响应更及时
  - 更新检查提速：优化了更新检测流程，检查新版本的速度明显提升
  - 启动与页面切换更顺滑：经过底层框架升级和资源管理优化，应用启动及页面导航更加流畅

  ### 🐛 问题修复

  - 修复了软件更新在某些情况下失败或无法检测到新版本的问题
  - 修复了安装包在特殊系统环境下可能出现无法完成安装的报错
  - 修复了社区登录及工具提交功能异常，现可正常关联 GitHub 账号并提交社区工具
  - 修复了使用鼠标侧键导航时，侧边栏选中项不同步的问题
  - 修复了程序架构选择（32位/64位）在某些设备上判断错误，导致工具不兼容的情况
  - 修复了主窗口关闭或更新时可能出现的多个崩溃隐患，提升了整体稳定性

  ### 🔧 其他改进

  - 底层 Windows App SDK 更新至最新版本，获得更稳定的系统支持和性能改进
  - 优化了内部下载逻辑，多个文件并发下载时队列管理更合理，减少卡顿
  - 设置页中“硬件信息数据源”选项的描述更清晰，方便用户理解如何切换 CPU-Z 等数据读取方式
