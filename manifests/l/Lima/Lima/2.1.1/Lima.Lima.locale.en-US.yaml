InstallationNotes: |
  To permanently configure your Lima environment, copy and paste this entire block into PowerShell and press Enter:
  
  $userPath = [Environment]::GetEnvironmentVariable("PATH", "User")
  [Environment]::SetEnvironmentVariable("PATH", "C:\Program Files\qemu;$userPath", "User")
  [Environment]::SetEnvironmentVariable("MSYS2_ENV_CONV_EXCL", "HOME_HOST;HOME_GUEST;_LIMA_WINDOWS_EXTRA_PATH", "User")
  [Environment]::SetEnvironmentVariable("_LIMA_WINDOWS_EXTRA_PATH", "C:\msys64\usr\bin", "User")
  
  Restart your terminal completely to apply these changes.
