ReleaseNotes: |-
  Linux release assets
  - CLIProxyAPI_<version>_linux_<arch>.tar.gz is the default Linux build. It supports dynamic library plugins and is built against a GLIBC 2.17 baseline.
  - CLIProxyAPI_<version>_linux_<arch>_no-plugin.tar.gz is the portable Linux build for musl-based or older systems such as OpenWrt. It does not support dynamic library plugins.
  FreeBSD release assets
  - CLIProxyAPI_<version>_freebsd_aarch64_no-plugin.tar.gz is the FreeBSD arm64 build. It is built without CGO and does not support dynamic library plugins.
  Changelog
  - feat(config): improve config reload handling and introduce async management save hook (1d0551a9)
  - feat(translator): drop apply_patch custom tool in OpenAI responses (c020e2d0)
  - feat(translator): normalize service_tier in Codex requests and add tests (893412e9)
  - feat(translator): support namespace tools in OpenAI response transformations (4926630a)
  - feat(auth): add transient error cooldown configuration and adjust retry logic (d33ac5e1)
  - feat(auth): add persistent cooldown state management with file-backed store (07c297a5)
  Full Changelog: https://github.com/router-for-me/CLIProxyAPI/compare/v7.2.18...v7.2.19
