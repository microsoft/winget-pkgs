ShortDescription: Real-time tactical companion for Valorant — opponent intel, tactical death maps, AI coaching, and smurf detection.
Description: |-
  AgainstMe is a desktop companion for Valorant that turns the seconds
  between rounds into a tactical edge. Click any enemy to see their top
  agents, K/D, win rate per map, and smurf risk; read aggregated death
  heatmaps across the lobby's recent matches; and get round-by-round
  coaching tuned to your rank.

  100% local: match data and in-game stats are processed on your PC and
  never transmitted. The narrow exceptions (AI coaching, opt-in Party
  Sync, account sign-in) are documented in the privacy policy.

  Free tier covers enemy intel, round timeline, and basic coaching.
  Premium and Premium+ unlock AI debriefs, win-probability, tactical
  death map overlay, party sync, and higher coaching quotas.
