PackageIdentifier: Lime.Lime
PackageVersion: 1.101.0
PackageLocale: en-US
License: Proprietary
ShortDescription: An open-source AI content workbench built for Chinese creators.
Description: |-
  Lime is an open-source Electron desktop AI content workbench designed for Chinese creators, brand operators, research-oriented writers, and small teams. It covers AI writing, topic research, asset management, prompt accumulation, knowledge bases, and multi-model creative workflows.

  You can think of it as an AI workspace better suited for long-term creation:
  - It’s not just about single questions and answers; it’s about making continuous progress on a project.
  - It’s not about finding references and rewriting prompts every time; it’s about accumulating references, styles, and methodologies.
  - It’s not about results getting lost in chat history after generation; it’s about saving results so they can be reused next time.
  - It’s not tied to a single AI service; it allows you to use the model capabilities you have already configured.
  If you frequently switch between bookmarks, documents, chat tools, image tools, and model backends, Lime aims to consolidate these actions into a single creative space.

  What you can do with Lime:
  - AI Writing and Content Creation: Write WeChat Official Account articles, Xiaohongshu notes, video scripts, podcast outlines, and livestream scripts.
  - Research and Knowledge Organization: Organize webpages, notes, screenshots, interviews, and historical materials to generate reports or briefs.
  - Topic Analysis and Content Review: Deconstruct viral cases, competitor content, publishing cadences, and expression styles.
  - Prompt Management and Style Reuse: Save common writing styles, brand tones, topic selection methods, and team templates.
  - Multimodal Creative Preparation: Generate image prompts, cover directions, presentation structures, or webpage drafts.
  - Multi-Model Workflow: Use your own configured AI providers and models to continuously edit, expand, compress, or cross-post within the same task.
