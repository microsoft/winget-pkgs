ShortDescription: Lightweight replacement of Lenovo Vantage for Lenovo Legion laptops.
Description: Lenovo Legion Toolkit (LLT) is a utility created for Lenovo Legion laptops, that allows changing a couple of features that are only available in Lenovo Vantage or Legion Zone.
