ReleaseNotes: |-
  Release Notes
  New Features
  - Added Discrete GPU Management window with configurable monitoring delays.
  - Added support for Motorola variants.
  - Added ThermalMode debug logging for improved diagnostics.
  Enhancements
  - Refactored packaging scripts and manifest files to improve build reliability and error handling.
  - Improved MSIX packaging process, including icon plating reliability.
  - Refactored legacy code for better maintainability.
  - Improved browser launch behavior by de-elevating via explorer.exe to prevent crashes when running elevated.
  - Added temporary workaround for Smart Fn feature due to an issue originating from the Lenovo driver.
  Bug Fixes
  - Fixed fan curve issue.
  - Fixed LampArray probe functionality.
  - Fixed hardcoded enum usage in LampArray.
  - Fixed duplicate Start Menu entry.
  - Fixed issue where JSON backup files were missing file extensions.
  - Fixed Ambient control visibility issue.
  - Fixed issue where Legion Y-series devices lacked LegionSeries property.
  - Fixed Legion_Legacy compatibility issues.
  - Fixed missing cases in switch statements.
  - Fixed Smart Fn log spamming issue.
  - Fixed issue where app would not start from pinned taskbar icon.
  - Fixed issue where UAC prompt appeared even when the app was already running.
  - Fixed issue where app did not reliably start on boot.
  Localization
  - Applied latest localization updates.
