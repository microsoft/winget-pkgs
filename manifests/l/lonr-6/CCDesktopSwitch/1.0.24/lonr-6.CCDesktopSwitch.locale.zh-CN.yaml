ShortDescription: 用于在 Claude 桌面版中配置 DeepSeek、Kimi、智谱 GLM 和 百炼 提供商的轻量级桌面工具。
Description: |-
  CC Desktop Switch 是一款轻量级桌面应用，专为官方 Claude 桌面客户端设计。它可帮助您管理第三方兼容 Anthropic API 的服务提供商，例如 DeepSeek、Kimi、智谱 GLM、阿里云百炼、小米 MiMo，并一键应用正确的 Claude 桌面端第三方配置。
  本项目专注于 Windows 和 macOS 平台上的 Claude 桌面客户端，与 farion1231/cc-switch 等以命令行为主的工具不同，其目标是为普通桌面用户提供一个简洁的用户界面，用于服务商设置、模型映射、健康检查以及本地网关兼容性管理。
  自 v1.0.18 版本起，Claude 桌面客户端默认配置为调用位于 127.0.0.1 的本地 CC Desktop Switch 网关。当使用第三方服务商时，请保持 CC Desktop Switch 在后台运行。关闭窗口后，程序仍将在 Windows 系统托盘中驻留，或在 macOS 的程序坞生命周期中保持隐藏运行。

  功能说明
  - 支持管理 DeepSeek、Kimi、智谱 GLM、阿里云百炼、小米 MiMo 及自定义第三方服务商。
  - 在 Windows 和 macOS 上应用 Claude 桌面端的第三方推理配置。
  - 使用本地网关，将模型映射、协议兼容性、额外请求头及上游密钥等控制在本地。
  - 仅在 Claude 桌面客户端中显示明确映射的、安全的 Claude 模型路由。
  - 对未映射的 Claude 模型路由直接拒绝访问，而非静默回退至内部默认设置。
  - 支持导入兼容 Anthropic 格式的 CC-Switch 配置，而 OpenAI 格式条目需手动启用。
  - 提供服务商连接检测、模型可用性检查、SSE 流式传输，以及自定义上游 HTTP/SOCKS 代理支持。
  - 防止 Windows 上重复启动应用程序实例：再次运行快捷方式将激活已存在的窗口。
