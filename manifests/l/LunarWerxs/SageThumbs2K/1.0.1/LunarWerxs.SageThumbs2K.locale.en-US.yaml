ReleaseNotes: |-
  A small patch that fixes convert output size for vector graphics.
  Fixed
  - Small vector graphics now convert to a usable size. Right-clicking Convert into PNG on a small SVG icon (or a small .emf clip art) used to produce a tiny image at the file's built-in size (as small as 24 pixels). Since these are vectors with no fixed resolution, SageThumbs now renders them up to a crisp, usable size. Larger files are unchanged.
  Install
  Download SageThumbs2K-Setup-1.0.1.exe below and run it (Windows 11).
