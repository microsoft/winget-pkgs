ReleaseNotes: |-
  What changed
  - Large solid .7z archives no longer trigger huge decompression work just to make a thumbnail. Images near the front still preview; deeply buried images fall back to the normal archive icon.
  - ZIP and 7z archives containing SVG images can now build the usual cover/contact-sheet thumbnail.
  - The classic right-click menu stays readable in Windows dark mode when the image preview is enabled.
  - Settings now uses Save and Close labels that match what the buttons actually do.
  - All 35 non-English translations now contain the complete Settings text, with a new release check preventing missing keys and placeholders.
  Thanks to Bruno for reporting the dark-menu and Settings-button problems.
