ReleaseNotes: |-
  Select text in the Quick preview and copy it out.
  Added
  - Select and copy text in the Quick preview. Drag to select in text, code, log and rendered Markdown previews — double-click grabs a word, Shift+arrows (with Home/End/PgUp/PgDn, and Ctrl for whole words) select from the keyboard, and Ctrl+A takes everything.
  - Ctrl+C copies the selection, or the whole document if you haven't selected anything. On a Markdown file you get the text as you see it rendered — tables come out tab-separated, so they paste into a spreadsheet as columns — and Ctrl+Shift+C copies the original Markdown source instead.
  - Ctrl+C works on the other previews too: an image copies the picture itself (including the exact PDF page or animation frame you're looking at), and the file-info card copies its details. The toolbar's copy button still copies the file's path.
  - Plain Home/End jump to the top or bottom of a document.
  Fixed
  - A Markdown file with an empty heading could close the preview instantly instead of showing the file.
  Install
  Download SageThumbs2K-Setup-1.1.0.exe below and run it (Windows 11).
