ReleaseNotes: |-
  SageThumbs 2K is out of beta. Version 1.0 refines the Quick preview and Settings and smooths out the rough edges found in real-world use.
  What's new
  - The preview opens in front, then stays out of your way. Press Space and the preview jumps to the front of your other windows, then behaves like a normal window you can click past or cover. The old "always on top" behavior is gone. You can still pin a preview on top from its toolbar. On by default.
  - Local HTML files render as pages. Open an .html file and the preview shows the real page instead of its source, locked down (WebView2 with scripts off and no network). On by default.
  - Smoother text, code, and log scrolling. No flicker or stutter, big files stay smooth, line numbers are shown, and there is a scroll position indicator.
  - Smoother Markdown scrolling. Large Markdown documents scroll cleanly instead of lagging.
  - A crisper Settings window. The toggles, icons, and buttons are now smoothly anti-aliased.
  Install
  Download SageThumbs2K-Setup-1.0.0.exe below and run it (Windows 11).
