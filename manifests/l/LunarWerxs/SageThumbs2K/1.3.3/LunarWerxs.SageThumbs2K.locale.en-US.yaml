ReleaseNotes: |-
  What changed
  - The Quick preview scrollbar for long text, code and rendered Markdown is now interactive:
    drag the thumb to move through the document, or click the track to move one page.
  - High-resolution mouse-wheel and touchpad deltas now accumulate smoothly instead of occasionally
    being lost below a full wheel notch.
  - The built-in updater now requires GitHub's SHA-256 digest, accepts installers only from the
    canonical SageThumbs 2K release path, verifies the file written to disk, and protects it from
    replacement through the Windows elevation hand-off.
  - Additional malformed-input and URL validation was added across several document/image readers
    and screenshot-upload handling.
  - Compatible locked dependencies were refreshed, the declared Rust 1.93 minimum is now exercised
    in CI, and GitHub Actions are pinned to immutable revisions.
  Install
  Download SageThumbs2K-Setup-1.3.3.exe below and run it. Existing settings are preserved when
  upgrading.
  Verify the download
  SHA-256:
  1FB02D54DF9E1D81B261340E9066A18A4996F4B1C033B8025FB3B79BF17226BA
  Check it locally with:
  Get-FileHash .\SageThumbs2K-Setup-1.3.3.exe -Algorithm SHA256
