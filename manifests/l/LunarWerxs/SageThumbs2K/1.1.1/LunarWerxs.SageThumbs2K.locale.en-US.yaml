ReleaseNotes: |-
  Fixed
  - On some Windows 11 systems, uninstalling SageThumbs 2K could stop with a "Resource TSetupForm not found" runtime error and refuse to continue (#3). The uninstaller now completes cleanly.
  Installing 1.1.1 over an older version also replaces the old uninstaller, so upgrading is enough to fix it going forward.
  If you're stuck on 1.1.0 or earlier and just want to remove it, run the old uninstaller in silent mode from an elevated terminal (this skips the broken step and removes everything):
  & "$env:ProgramFiles\SageThumbs2K\unins000.exe" /VERYSILENT
