ShortDescription: Explorer thumbnails for 316 file types Windows can't show on its own — camera RAW, Photoshop PSD, HEIC/AVIF, video, ebooks, comics and more.
Description: A modern, crash-isolated, source-available Rust rebuild of the classic SageThumbs. Adds File Explorer thumbnails for 316 file types Windows leaves as blank icons (camera RAW, PSD, HEIC/AVIF, JPEG XL, video frames, ebook/comic covers, CAD/3D project files), plus a right-click image toolkit (convert, resize, OCR, eyedropper) and an st2k CLI/MCP tool. Runs inside Explorer but is sandboxed with a panic guard at every COM boundary, so a malformed file can't crash the shell.
