ReleaseNotes: |-
  New
  - Press Space to preview any file, QuickLook-style. An instant full-size popup for anything SageThumbs can decode — videos and audio play, GIFs animate, code is syntax-highlighted, and Markdown, Jupyter notebooks, CSVs and archives all render. Arrow-key through a folder, F11 for full-screen. Off by default (Settings ▸ Quick preview).
  Improved
  - Markdown previews render GitHub-style: outline sidebar, inline images, real tables, and clickable links.
