ReleaseNotes: |-
  What's new in 1.3.1
  "Show quick actions in the menu" works again. Turning it on puts Convert into, Convert…, Resize and Rotate right on the right-click menu instead of one level deep in the submenu. On many setups it was doing nothing: if your right-click menu is the classic full one (a very common Windows 11 choice), the quick actions were being hidden with nothing to replace them. They now show up whenever the option is on.
  Menu changes take effect right away. Toggling a menu option in Settings and hitting Save now refreshes Explorer's menu, so you see the change on your next right-click instead of having to restart Explorer.
  Big files and big folders thumbnail much faster. Large Photoshop (.psd/.psb), AutoCAD (.dwg) and 3D-printer G-code files used to be read in full just to pull out the small preview stored near the start, so a folder of them filled in slowly, one at a time. SageThumbs now reads only the part of the file that holds the preview, which is a tiny fraction of a large document. Very large AutoCAD files that previously showed no thumbnail at all now get one.
  Big EPUB books now show their real cover instead of a random picture from inside them.
  Tested with a clean-room install on real Windows 10 Home 22H2 (install, registration and thumbnail decode all verified).
