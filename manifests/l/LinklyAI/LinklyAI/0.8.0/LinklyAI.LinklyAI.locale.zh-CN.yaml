ReleaseNotes: |-
  🚀 你硬盘里吃灰的录音和视频，AI 全能用了💡 Tips：Linkly AI 新增本地语音转写能力，可将音频、视频中的说话内容转成文字并建立索引，让它们和文档一样可被搜索、可被 Chatbot 引用。全程在本机完成不会上传。在「设置 → 索引」中开启音频解析 / 视频解析即可使用。🚀 新功能：
  - 新增 本地语音转写：内建轻量转写模型，把音视频中的对话转为文本并索引，支持中文 / 粤语 / 英文 / 日文 / 韩文。
    - 音频支持 mp3、wav、m4a、flac、aac、ogg；视频支持 mp4、mov、mkv、webm
    - 音频解析与视频解析可分别开关，按需开启（转写较消耗资源）
  - 新增独立 外观设置：可调整主题，字体大小、macOS Dock 图标显示。
  - 新增 云端知识库自动同步：开启后可每 5 分钟检查并自动推送新内容到云端。
  - Linkly AI 空间位置可更改：可将默认空间目录，改到自定义位置（原「Linkly AI 文件夹」更名为「Linkly AI 空间」）。
  - 新增 拖拽添加文件夹：把文件夹直接拖到监听列表或知识库详情页即可添加。
  - Chatbot 新增 下载回复：可将 AI 回复整体或回复中的表格保存到下载目录。
  - Chatbot 侧边栏底部新增 索引状态指示：随时了解索引进度。
  ⚡ 改进：
  - Chatbot 会话标题改为收到消息后立即生成。
  - 启动器筛选新增「音频」「视频」文档类型。
  - 入门引导更换全新样例知识库。
  - 删除类确认对话框统一使用醒目的警示样式，降低误操作风险。
  - 官网：中文区新增支付宝 / 微信支付。
  - 知识库探索页支持一键收藏知识库，优化热度排序。
  - 优化了官网访问速度。
  🐛 Bug 修复：
  - 修复文件被高频改动时（如云盘同步目录）索引反复中断，导致长时间索引不完的问题。
  - 修复 Embedding 模型休眠卸载后，语义搜索失效的问题。
  - 修复 macOS 上安装更新时可能崩溃的问题：更新改为下次重启时安装；安装失败也会保留已下载的更新包，无需重新下载。
  - 修复 Free 用户查询云端知识库时被误判为 Pro 功能而遭拦截的问题。
  - 修复部分用户数据库字段缺失导致索引与云端推送静默失效的问题。
  - 修复知识库分享链接可能产生 404 / 308 跳转风暴的问题。
