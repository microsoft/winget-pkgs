ReleaseNotes: |-
  🚀 Linkly AI Pro 计划发布！💡 Tips：经过 4 个月的迭代，Linkly AI 现已发布 Pro 付费计划，提供更多的云端能力、更多的精选模型。🚀 新功能：
  - 新增 官方模型配额：可在 Chatbot 和 Web Dashboard 中查看更详细的模型配额、剩余额度等。
  - 新增 Free / Pro 模型权限：Free 用户可继续使用基础模型，Pro 用户可陆续解锁 DeepSeek V4 Pro、Qwen3.7 Plus 等精选的前沿模型。
  - 云端知识库接入套餐配额：Pro 支持更多云端知识库、更高文件上限和更多调用额度。
  - 浏览器剪藏能力完成桌面端接收链路，浏览器扩展现可将网页内容直接保存到 Linkly AI 文件夹被索引。
  - Chatbot 侧边栏新增设置、官网和配额入口，常用操作更容易找到。
  - 云端知识库新增一键生成知识库简介
  ⚡ 改进：
  - 定价页和 Dashboard 更新 Pro 权益说明，补充模型、云端知识库、MCP 隧道等能力解释。
  - Web Dashboard 优化 API Key 创建入口、知识库筛选、收藏和连接状态展示。
  - 接受云端知识库邀请后，可直连到自己的 MCP 服务。
  - 改进索引与设置保存稳定性，减少重复重试、状态覆盖和配置不同步的问题。
  🐛 Bug 修复：
  - 修复托盘菜单在部分情况下可能崩溃或状态不同步的问题。
  - 修复 MCP 配置变更、端口刷新和本地服务状态相关的稳定性问题。
  - 修复索引器在删除、重试和扫描并发场景下可能异常中断或反复重试的问题。
  - 修复浏览器剪藏保存、删除和扫描过程中的若干边界问题，提升文件安全性与可靠性。
