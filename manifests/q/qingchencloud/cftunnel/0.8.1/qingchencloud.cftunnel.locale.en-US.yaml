ShortDescription: Full-Protocol Intranet Penetration CLI — Free HTTP/WS Tunneling in Cloud Mode + Self-Hosted Full-Protocol TCP/UDP Relay in Relay Mode | Dual Engine Powered by Cloudflare Tunnel + frp
Description: |-
  All-Protocol Intranet Tunneling Tool — Cloud Mode Free HTTP/WS Tunneling + Relay Mode Self-Hosted TCP/UDP All-Protocol Relay.

  Features
  Cloud Mode (Cloudflare Tunnel):
  - No-Domain Mode — cftunnel quick <port>, generates *.trycloudflare.com temporary public address with zero configuration
  - Access Protection — --auth user:pass enables password protection with one click, built-in authentication proxy middleware
  - Minimalist Operation — init → create → add → up, set up custom domain tunneling in 4 steps
  - Automatic DNS — Automatically creates CNAME records when adding routes, automatically cleans up when deleting
  Relay Mode (Self-Hosted Relay):
  - All-Protocol Tunneling — TCP / UDP / HTTP, game servers, databases, SSH, remote desktop
  - One-Click Deployment — Server side curl | bash or Docker Compose, client side relay init to connect immediately
  - Quick Tunneling — cftunnel quick <port> --relay, no pre-configured rules required
  General:
  - Cross-Platform — macOS (Intel/Apple Silicon) + Linux (amd64/arm64) + Windows (amd64/arm64)
  - Process Hosting — Automatically downloads engine binaries, supports macOS launchd / Linux systemd / Windows Service
  - Automatic Updates — Built-in version check and one-click self-update
  - Portable Mode — Place an empty file named portable in the program's directory; configs/logs/binaries are stored locally
  - Desktop Client — cftunnel-app provides a visual GUI
  - AI Friendly — Built-in Claude Code / OpenClaw Skills, AI assistants can manage tunnels directly
