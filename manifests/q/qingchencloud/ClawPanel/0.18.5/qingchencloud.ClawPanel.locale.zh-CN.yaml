ReleaseNotes: |-
  修复 (Fixes)
  - Hermes 文件管理路径安全 — 文件读写/列表入口拒绝 .. 路径穿越，并通过 canonical path 校验新文件父目录，避免访问 ~/.hermes 之外的路径
  - 配对 token 撤销后不再复活 — 自动配对升级遇到已撤销的 operator token 时会生成新 token，不再复用带 revokedAtMs 的旧 token
  - Linux Gateway 清理更保守 — 清理端口占用时会先确认进程命令行属于 openclaw gateway，并在 /health 连续无响应后才终止，避免误杀同端口其他服务或健康 Gateway
  - 校准不再恢复用户已删配置 — 继承模式优先使用当前非空配置，只有当前配置为空时才从 .bak 回退，避免旧备份把用户主动删除的 provider/channel 恢复回来
  测试与验证 (Testing)
  - 已通过 node --test tests/calibration-source-policy.test.js tests/gateway-linux-cleanup-policy.test.js tests/patch-gateway-origins.test.js tests/hermes-web-config.test.js
  - 已通过 npm run build
  - 已通过 node -e "import('./scripts/dev-api.js').then(()=>console.log('dev-api import ok'))"
  - 已通过 cd src-tauri && cargo fmt --check
  - 已通过 cd src-tauri && cargo check
  - 已通过 cd src-tauri && cargo test normalize_existing_pairing_rotates_revoked_operator_token --lib
  - 已通过 cd src-tauri && cargo test select_calibration_source --lib
  - 已通过 cd src-tauri && cargo test hermes_fs_path --lib
  - 已通过 cd src-tauri && cargo clippy --all-targets -- -D warnings
  - 已通过 git diff --check
