ShortDescription: Connect to your QNAP devices via VPN.
Description: The QVPN Device Client is a powerful tool that allows VPN connections directly to your QNAP devices via multiple protocols including QNAP’s proprietary QBelt. With a built-in speed test, you can also easily know the VPN connection speed, and query all the historical connection records at any time.
