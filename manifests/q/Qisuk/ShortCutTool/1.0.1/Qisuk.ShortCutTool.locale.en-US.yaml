ShortDescription: Keyboard shortcut manager using Meh and Hyper keys
Description: |-
  ShortCut Tool is a Windows keyboard shortcut manager that uses Meh (Ctrl+Alt+Shift) and Hyper (Ctrl+Alt+Shift+Win) key combinations to launch and cycle through application windows.

  Features:
  - Launch or cycle applications with a single keyboard shortcut
  - Cycle through multiple windows of the same application
  - Reverse cycling using Hyper key combination
  - Visual popup shows window list while cycling
  - Lightweight tray application
  - Easy configuration via GUI or JSON file
