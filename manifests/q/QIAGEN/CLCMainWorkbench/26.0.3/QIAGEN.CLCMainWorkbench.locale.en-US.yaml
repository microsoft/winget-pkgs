ReleaseNotes: |-
  QIAGEN CLC Main Workbench
  Note: Due to a problem with the Java version included in version 26.0.3, installers for this version are not available. Please download a more recent version instead.
  Improvements
  - The order of the buttons in dialogs offering the options "Yes", "No", and "Cancel", has been updated. On Windows, the order is now "Yes", "No", "Cancel", and on Mac, the order is now "No", "Cancel", "Yes". The default choice remains Yes, as in earlier releases.
  - Using Quick Search or Local Search to find elements based on boolean attribute values, the terms "Yes" and "No" can be used. Data Locations should be reindexed before searching using these terms. The earlier supported terms "True" and "False" can still be used.
  - Folder table view improvements
    - Subfolder names can be changed from within the table.
    - The Show option is included in the right-click menu for folders in the table.
    - Improved messaging when updating a value for multiple elements.changed.
    - History entries for changes to descriptions and other attribute values made from the table view use the terminology: "Column <columnname>, allowing changes made this way to be differentiated from those made directly in the Element info view of an element.
  - Various minor improvements
  Bug fixes
  - Fixed an issue where sequence annotations of type Regulatory were included in feature tables with the key misc_feature and a qualifier 'feature_type="Regulatory"'. Such annotations are now assigned the key "regulatory". This affects Genbank and EMBL format exports of sequences with Regulatory type annotations, as well as the Text view of such sequences in CLC Workbenches.
  - Fixed an issue where Update Sequence Attributes could update the content of location specific, custom attributes when the name of an attribute in the source file matched the name of a custom attribute for the CLC Location an element is stored in.
  - Fixed a rare issue that could cause Maximum Likelihood Phylogeny to fail with a persistence error.
  - Various minor bug fixes
  - Vulnerabilities fixed in this release include:
    - CVE-2026-33870
    - CVE-2026-33871
    - CVE-2026-1225
    - CVE-2026-42583
    - CVE-2026-42584
    - CVE-2026-42587
    - CVE-2026-41417
    - CVE-2026-42580
    - CVE-2026-42581
    - CVE-2026-42585
    - CVE-2026-42587
    - GHSA-72hv-8253-57qq
  Reference data related
  - Effective May 18, 2026, Download Pfam Database downloads Pfam 38.1. This update affected downloads using this version and earlier versions of the software.
  CLC Genomics Cloud notes
  AWS will end support for Amazon ECS Amazon Linux 2-optimized AMIs on June 30, 2026.  AWS Batch environments created later than April 1, 2026 are expected to have supported images (imageType: ECS_AL2023). However, those created before the default at AWS was updated will include images for which support will be ending (imageType: ECS_AL2). These will continue to work, but they will stop receiving software updates, security patches, or bug fixes from AWS.
  Recommendation: If the the EC2 configuration in AWS Batch environments in your CLC Genomics Cloud setup have "imageType: ECS_AL2", we recommend creating new AWS Batch queues to use moving forward, as described in Adding more AWS Batch queues for CLC jobs. Queues that are no longer needed can be deleted, as described in Deleting or redeploying CLC Genomics Cloud infrastructure on AWS.
  Changes
  The bundled Java version is Java 21.0.11, where we use the JRE from the Azul OpenJDK builds.
  Advanced notice
  - The legacy Workbench policy property 'run_on_workbench_when_server_is_available' will not be supported from version 27.0. The workbench_save_to_server policy property, available since version 25.0, should be used instead.
