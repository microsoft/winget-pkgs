PackageIdentifier: QingJ01.Pebble
PackageVersion: 0.1.3
PackageLocale: zh-CN
ShortDescription: 一款面向希望拥有更安静、更私密收件箱的用户的本地优先桌面邮件客户端。
Description: |-
  Pebble 是一款使用 Rust、Tauri 和 React 构建的桌面邮件客户端。默认情况下，它将邮件数据、搜索索引、附件、规则以及应用设置保存在您的设备上。
  该应用围绕几个实用理念设计：
  - 您的邮箱应保持可读、快速且安静。
  - 邮件工作流应优先本地处理，而非优先依赖云端仪表板。
  - 隐私控制应明确、可见，并可轻松按消息进行覆盖。
  - 搜索、延迟提醒、规则和看板功能应协同工作，而不是分散在不同工具中。
  Pebble 目前支持 Gmail、IMAP 以及实验性 Outlook 账户。

  亮点

  本地优先的隐私保护
  - 使用本地 SQLite 数据库存储消息、文件夹、标签、规则和设置。
  - 使用本地 Tantivy 全文索引实现快速搜索。
  - 附件存储在应用程序数据目录下的磁盘中。
  - OAuth 令牌和凭据使用每台设备唯一的密钥加密。
  - 无任何遥测数据收集。
  - 网络请求仅限于您配置的功能：邮件同步、翻译以及可选的 WebDAV 设置备份。

  邮件工作流
  - 支持多个账户的统一收件箱。
  - 支持 Gmail、IMAP 以及实验性 Outlook 账户。
  - 提供会话式视图和消息列表视图。
  - 支持归档、删除、加星标、标记已读、批量操作和恢复操作。
  - 可延迟消息并在稍后重新显示。
  - 支持全文搜索和高级筛选器。
  - 内置规则引擎，用于自动整理邮件。

  生产力工具
  - 带有“待办”、“等待”和“完成”列的看板。
  - 快捷命令面板和以键盘优先的导航方式。
  - 内置翻译服务，支持双语阅读。
  - 支持深色和浅色主题。
  - 支持英文和中文用户界面。
  - 可选 WebDAV 备份，用于保存设置、规则、看板卡片和看板笔记。
