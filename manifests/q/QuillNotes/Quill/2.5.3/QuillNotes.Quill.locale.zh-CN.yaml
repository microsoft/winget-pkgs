ShortDescription: Quill 助你全天保持井然有序 —— 私密、精准，且无机器人干扰。它能记录笔记、发现关联并执行操作，让你专心于重要事务。
Description: |-
  Quill 是可信赖的 AI 会议助手。它可以记录、转录并总结您的会议，并将它们存储在您的设备上，因此它们完全属于您，随时随地可用，哪怕是在数年之后。
  有了 Quill 的陪伴，您可以全身心地投入对话，并确信细节绝无遗漏。

  Quill 的独特之处
  三点特性使 Quill 在众多会议工具中脱颖而出。
  1. 信任：您的会议，在您的设备上
  - 默认情况下，音频和转录稿保留在您的电脑中。无上传，无服务器端录音。
  - 您可以自主选择处理笔记的 AI：本地模型、您自己的 API 密钥、私人推理服务器或 Quill 云端。
  - 分享功能需主动开启，按会议独立设置，且经过端到端加密。
  2. 准确：捕捉每一处细节
  - 高质量的本地转录，能够应对各种口音和会议形式。
  - 说话人识别功能会随着时间的推移，在不同的会议中学习辨认身份。
  - 多语言支持，适用于混合语言的对话。
  - 通过笔记中的修改记录学习行业术语、姓名和缩写，自定义专属词库。
  - 搜索您录制过的所有会议。
  3. 自定义与集成：适配您的工作流
  - 专为您的会议量身定制的模板，如 1:1 面谈、客户会议、销售电话、董事会。
  - 自动应用正确模板的会议类型。
  - 结构化输出并集成到您已有的工具中。

  工作原理
  1. 在您的 Mac 或 Windows 电脑上安装 Quill。
  2. Quill 会检测您日历中即将开始的会议（或者您也可以点击“录制”）。
  3. 音频在您的设备上本地捕捉并转录。
  4. 笔记、待办事项、说话人身份和完整的转录稿将在几分钟内生成，并存储在您的设备上。
  5. 您可以随时阅读、编辑、搜索或有选择地分享它们。

  团队协作？共享空间由您选择：自主决定哪些会议进入共享视图，哪些保持私密。

  Quill 的适用人群
  Quill 适用于几种常见的模式。您可能会在其中发现自己的身影：
  - 个人从业者和顾问：拥有机密客户关系的教练、咨询师、注册投资顾问（RIA）、碎片化高层管理人员。
  - 运营者和领导者：管理团队并在众多会议中跟踪承诺的创始人、合伙人、总经理。
  - 高级用户和极客：希望掌控自己的模型、数据以及数据如何流向其余工具栈的人。
  - 需要共享语境的团队：希望获得跨会议情报，同时又不放弃数据所有权的销售、产品和执行团队。

  Quill 不是什么
  - 不是视频录制器。Quill 仅限音频。
  - 不是日历应用。Quill 会读取您的日历，但不会取代它。
  - 不是视频会议工具。Quill 与 Zoom、Teams、Google Meet 等协同工作。甚至是线下会议。
  - 不是云优先的 SaaS。您的数据存储在您这里，而不是我们的服务器上。
