ShortDescription: Fast and lightweight log viewer for large files that supports columns definition and JSON.
Description: |-
  QLogExplorer is a free and open source log files viewer with advanced features.
  Main features:
  - Fast and lightweight
  - Can handle huge files
  - Never locks the log file
  - Supports plain text and JSON
  - Allows to define columns even for plain text files
  - Allows to define different templates for each kind of log file
  - Customizable highlighters
  - Predefined search parameters
  - Advanced search with regular expression and multi-parameters
