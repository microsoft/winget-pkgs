ReleaseNotes: |-
  📦 v1.14.0 – Better Exports & Improved Activity Overview
  This release improves export transparency, refreshes the activity overview with a cleaner design, and fixes several usability issues across the app.
  ✨ New Features
  - 📄 Export absences and holidays #100
    Vacation days, sick days, and holidays can now be included in exports for better transparency and hour tracking documentation.
  - 📊 Redesigned app activity overview
    The app activity view has received a visual overhaul and is now easier to understand and navigate.
  🛠 Improvements
  - 💾 Export filter preferences are now remembered
    The selected time entry types (work time / break time) are now saved and preselected for future exports.
  🐛 Bug Fixes
  - Fix: Using the “Fill with” feature to fill time gaps always jumped back to the current day afterwards.
    The view now correctly stays on the selected day. #107
  - Fix: In certain setups with external displays, the tray menu window could unexpectedly change its size.
    This issue has now been resolved. #89
  - Fix: The week view in the date range picker incorrectly started on Sunday, causing weekday mismatches. #105
  Thanks again to everyone reporting bugs, suggesting improvements, and helping make TimeScribe better with every release! 🙌
