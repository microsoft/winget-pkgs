ReleaseNotes: |-
  📦 v1.12.0 – Project Insights & Export Enhancements
  This release improves project transparency and enhances the export workflow with additional flexibility and usability improvements.
  ✨ New Features
  - 📊 Project breakdown in overview (#90)
    A new popup next to the total working time in the overview now shows a detailed breakdown of tracked time per project.
  - 🏷️ Project metadata support (#86)
    You can now define custom metadata for each project.
    These metadata fields can also be included in exports.
  🛠 Improvements
  - 📄 Export preferences remembered
    The selected paper format and orientation are now saved and reused for future exports.
  - 🎨 Minor UI refinements for a cleaner and more consistent experience.
  - 🔒 Security and framework updates to keep TimeScribe up to date.
  Thanks to everyone who continues to suggest improvements and contribute ideas! 🙌
