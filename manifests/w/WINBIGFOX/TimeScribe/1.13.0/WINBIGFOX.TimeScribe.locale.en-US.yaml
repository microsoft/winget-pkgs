ReleaseNotes: |-
  📦 v1.13.0 – 1 Year of TimeScribe 🎉
  TimeScribe turns one year old today! 🥳
  Exactly one year ago, version 1.0 was released — and what a journey it has been.
  A huge thank you to everyone who contributed to this project and to all of you using TimeScribe every day. ❤️
  To celebrate the occasion, TimeScribe now comes with a special birthday app icon 🎂
  ✨ New Features
  - 📦 WinGet support (Windows)
    TimeScribe is now officially available via the Windows Package Manager (WinGet) and can be installed directly from there.
  🛠 Improvements
  - 📊 Enhanced project view
    Time entries in the project view now also display their time range and notes. #95
  - ⌨️ Extended shortcut support
    Function keys (F-keys) are now supported when configuring keyboard shortcuts. #76
  🐛 Bug Fixes
  - Fix: On macOS, no app icon was shown in the Dock when opening the main window.
    This has now been resolved. #96
  - Fix: Various minor UI issues have been addressed.
  Thank you for being part of the journey — here’s to many more releases to come! 🚀
