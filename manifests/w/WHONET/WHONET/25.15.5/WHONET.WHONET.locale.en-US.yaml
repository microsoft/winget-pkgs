ReleaseNotes: |-
  Improves an issue where BacLink would not close properly after processing an Excel file.
  Sort directory names in the file selection form.
  Fix for mapping organisms when a single result is returned in the search box.
  CAESAR department and patient type updates.
  Improves the algorithm to guess dates based on two digits in BacLink.
  Skip lines in BacLink text input that don't have at least two fields according to the delimiter when scanning for the header.
  Refinements to the Vitek KERN MIC and MAESTRIA formats.
