ReleaseNotes: |-
  What’s New
  • This is expected to be the final release of the 3.6 branch.
  • This is also the final release with support for 32-bit Windows. Updates will no longer be available after May 22, 2024 for that platform. Issue 17779.

  Bug Fixes
  • The following vulnerabilities have been fixed:
  •• wnpa-sec-2024-09 The editcap command line utility could crash when injecting secrets while writing multiple files. Issue 19782. CVE-2024-4855.
  • The following bugs have been fixed:
  •• Wireshark crashes on exit when using wmem_register_callback in a plugin Issue 19579.
