ShortDescription: 全球最受歡迎的網絡協議分析工具
Description: |-
  Wireshark 是全球頂尖的網絡協議分析工具，能讓您以微觀視角洞察網絡中的一切動態。作為多行業及教育機構實際（甚至法定）的通用標準，其地位無可撼動。
  這款軟件的蓬勃發展得益於全球網絡專家的持續貢獻，其前身項目可追溯至 1998 年，至今仍在不斷演進。
