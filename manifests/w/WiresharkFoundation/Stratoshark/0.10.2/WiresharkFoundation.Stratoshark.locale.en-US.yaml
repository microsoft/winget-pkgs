Description: Stratoshark lets you explore and analyze applications at the system call level using a mature, proven interface based on Wireshark. Stratoshark lets you explore and investigate the application-level behavior of your systems. You can capture system call and log activity and use a variety of advanced features to troubleshoot and analyze that activity.
