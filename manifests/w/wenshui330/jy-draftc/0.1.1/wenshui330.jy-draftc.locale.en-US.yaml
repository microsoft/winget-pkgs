ShortDescription: A tool for decrypting and re-encrypting Jianying Windows draft files.
Description: jy-draftc is a decryption and re-encryption tool for Jianying (CapCut) Windows draft JSON files. It can decrypt draft_content.json and draft_meta_info.json within a draft into plain text JSON, and re-encrypt them after modifications have been made.
