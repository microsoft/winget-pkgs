# WinPcap Installer Manifest
PackageIdentifier: WinPcap.WinPcap
PackageVersion: 4.1.3
Installers:
  - Architecture: x64
    InstallerType: exe
    InstallerUrl: https://www.winpcap.org/install/bin/WinPcap_4_1_3.exe
    InstallerSha256: fc4623b113a1f603c0d9ad5f83130bd6de1c62b973be9892305132389c8588de
    InstallModes:
      - silent
    SilentSwitch: "/S"
    Switches:
      Silent: "/S"
      SilentWithProgress: "/S"
    ProductCode: ""
    UpgradeBehavior: install
    Scope: machine
    InstallLocation: "C:\\Program Files (x86)\\WinPcap"
    # Note: WinPcap installer does not support standard silent switches officially; using /S based on community reports.
