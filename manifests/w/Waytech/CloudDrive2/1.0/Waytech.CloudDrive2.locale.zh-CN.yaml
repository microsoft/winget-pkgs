ReleaseNotes: |-
  1. 修复对挂载盘上文件直接编辑时，截断文件大小后上传可能失败的问题
  2. 修复通过挂载盘直接覆盖百度网盘上的文件时文件名会被百度网盘加上日期时间的问题
  3. 修复添加或者编辑备份时，备份文件过滤规则中扩展名和文件名列表被错误地添加了一个前置空格的问题，已经添加过并且有问题的请删除后重新添加
  4. 修复从网页上传大量文件时，页面刷新后恢复上传，每个任务单独弹出授权提示需逐一点击的问题，只显示一条“全部授权”提示
  5. 修复当浏览器缩放至 250%时，添加备份向导底部按钮被隐藏不可见的问题
  6. 修复在某些情况下右键菜单"播放到……"子菜单与主菜单之间存在间隙，鼠标移向子菜单时经过间隙会导致子菜单消失的问题
