ReleaseNotes: |-
  1. 增加日志大小和保留数量设置：设置页面日志标签下新增文件日志和备份日志的单文件最大大小及最大保留文件数设置，最大文件大小提供"无限制"、"不记录日志"、"自定义"三个选项
  2. Web 界面复制文件后不再清除选中状态，方便连续复制当前选择的文件到多个目标位置
  3. 修复一些文件夹选择器根目录无法选中的问题
  4. 修复备份列表加载失败：修复备份数据量较大时 gRPC 消息超过 4MB 默认限制导致加载失败的问题，上限调整为 64MB
  5. 修复一些从 web 界面上传文件页面被刷新后续传的问题
  6. 修复移动端排序菜单未保存偏好的问题
  7. 网格视图缩略图：显示所有可用缩略图，不再限制为可预览文件类型
  8. 其它 bug 修复和界面优化
