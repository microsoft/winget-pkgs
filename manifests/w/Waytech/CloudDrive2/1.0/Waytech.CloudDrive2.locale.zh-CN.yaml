ReleaseNotes: |-
  1. 全新的 WebUI 3.0: 从.NET 7 Blazor Wasm 改为 Rust Wasm，发布包大小从 36MB 降至 8MB，原生 WASM 运行时，响应速度有很大提升；全新设计的移动端界面，移动设备访问更方便；新增支持显示最新访问文件；新增支持右键菜单；全面的无障碍化适配；以及其它多项新特性和界面功能改进。注意：古老版本的浏览器可能不再支持或者不能完全支持，推荐 Chrome 75+、Firefox 79+、Safari 15+、Edge 79+ 以获得最佳体验。
  2. 跨云复制/移动源文件变更检测：本地文件作为复制/移动任务源文件时，启动文件系统监控检测上传期间的文件修改。若文件在哈希计算后（预处理/排队/传输阶段）被修改，自动取消上传并重新计算哈希后重传。支持目录和单文件任务，支持系统重启后自动恢复监控
  3. OneDrive 实现全盘搜索，并且支持全盘内容搜索，搜索结果最多返回 1000 条
  4. 本地文件缓存规则调整：本地文件缓存开关从按云存储帐号配置改为按文件夹配置，支持子文件夹继承和覆盖，新增缓存规则：文件大小上下限、文件扩展名白名单/黑名单
  5. 在添加云存储阶段可设置 API 代理和数据代理
  6. 修复下载任务列表中访问进程显示可能不全的问题
  7. 修复在极个别情况下 API Token 可能丢失的问题
  8. 修复一个可能会导致 Google Drive 上传失败的 bug
  9. 其它 bug 修复和性能改进
