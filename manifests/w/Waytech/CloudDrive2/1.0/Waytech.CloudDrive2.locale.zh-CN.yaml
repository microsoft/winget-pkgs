ReleaseNotes: |-
  1. 安全加固：修复一个部署在公网的 clouddrive2 服务在某些情况下可能存在的安全漏洞，强烈建议所有用户升级以避免可能的信息泄露
  2. 修复 Web 界面在宽屏显示器上布局不合理的问题
  3. Web 界面媒体查看器鼠标滚轮平滑导航：鼠标滚轮切换图片时不再瞬间跳转，改为类似拖拽的滑动过渡效果，支持触控板和鼠标滚轮
  4. 仪表盘最近文件折叠功能：最近文件区域支持展开/折叠
  5. 全面无障碍访问审计：修复某些组件的无障碍属性缺失的问题
  6. 其它界面优化
