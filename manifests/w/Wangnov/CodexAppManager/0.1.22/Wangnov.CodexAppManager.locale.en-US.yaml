ReleaseNotes: |-
  Codex App Manager
  > 这一版修复了应用内更新在老版 Windows curl 和 macOS Gatekeeper 文件句柄耗尽时的失败提示与兼容性。
  > This release fixes in-app update compatibility and messaging when older Windows curl builds or macOS Gatekeeper file limits get in the way.
  🐛 修复 · Fixes
  - Windows 下载兼容性:更新器仍优先使用现代 --no-progress-meter,但当系统里的老版 curl 明确不支持这个参数时,会自动用兼容参数重试,避免安装/更新在真正联网前就中断。
    Windows download compatibility: the updater still prefers modern --no-progress-meter, but if an older system curl rejects that flag it retries with a compatible silent mode instead of stopping before the download really starts.
  - macOS 安全校验更稳:Gatekeeper 校验前会尝试提高当前进程的文件句柄软限制,减少大型 .app 校验时遇到 Too many open files 的概率。
    macOS security checks are more resilient: before running Gatekeeper assessment, the app now tries to raise its process file-descriptor soft limit, reducing Too many open files failures for larger .app bundles.
  - macOS 失败提示更准确:如果 Gatekeeper 仍然报文件句柄耗尽,提示会说明是系统校验资源不足且不会替换文件,不再误写成 bundle 本身被拒绝。
    macOS failure messaging is clearer: if Gatekeeper still reports file-descriptor exhaustion, the error now says the assessment could not complete and no files were replaced, instead of incorrectly saying the bundle was rejected.
  📦 安装与升级 · Install & Upgrade
  已经安装? 打开应用即可收到本次更新——macOS 只下载版本间的增量,校验失败自动回滚。
  Already installed? The app offers this update in-app — macOS pulls only the delta, with automatic rollback.
