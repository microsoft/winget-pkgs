PackageIdentifier: wipedlifepotato.kekulen-i2p-chat
PackageVersion: alpha-v0.1.1
PackageLocale: en-US
Publisher: WipedLifePotato
PackageName: Kekulen I2P Chat (Fix Edition)
License: WTFPL
ShortDescription: Optimized I2P messenger with legacy support.
Description: >
  A decentralized messenger for the I2P network. 
  Unlike other versions, this one is optimized for low memory usage 
  and supports Windows XP (x86). Supports JSON-RPC on /swagger-ui page
  Also, for normal webserver, download https://github.com/wipedlifepotato/Kekulen-I2P-Messanger/blob/SAM/server/index.html and put in server/ directory near exe package
  For web-interface, run in app directory:
  mkdir server
  curl -L https://github.com/.../index.html -o server/index.html

