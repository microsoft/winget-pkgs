Description: >
  A decentralized messenger for the I2P network.
  Unlike other versions, this one is optimized for low memory usage
  and supports Windows XP (x86). Supports JSON-RPC on /swagger-ui page. 
  To use the web-interface, create a 'server' directory and download index.html:
  mkdir server && curl -L https://raw.githubusercontent.com/wipedlifepotato/Kekulen-I2P-Messanger/SAM/server/index.html -o server/index.html
