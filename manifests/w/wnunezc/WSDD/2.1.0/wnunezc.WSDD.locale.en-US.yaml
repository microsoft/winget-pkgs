ShortDescription: Local Docker stack manager for PHP development on Windows.
Description: WSDD is a Windows desktop application for provisioning and operating local Docker PHP stacks, with Classic Bind, Native Linux, Managed Native Linux, and Fast Sync storage modes, optional ngrok publishing, bundled resources, and environment helpers.
Moniker: wsdd
Tags:
- docker
- php
- laravel
- development
- windows
- ngrok
ReleaseNotes: Adds Managed Native Linux Storage with validated ZIP snapshot conversion, automatic WSL runtime recovery, Linux runtime permission repair, and mixed-DPI multi-monitor window fixes.
ReleaseNotesUrl: https://github.com/wnunezc/wsdd-rust/releases/tag/v2.1.0
InstallationNotes: WSDD requires administrator privileges and is intended for Windows desktop development environments with Docker Desktop, WSL 2 backend support, PowerShell 7.5 or newer, Chocolatey, mkcert, and a compatible desktop graphics environment for the eframe/egui UI. The MSI installs WSDD; first-run checks validate and guide the local runtime setup.
