ReleaseNotes: |-
  1. Create Path Animations Faster with Pen Tool Presets
  New keyframe presets let you create Linear, Ease In, Ease Out, and Ease In-Out path animations with one click.

  2. Record Smoother Narrations with the New Teleprompter
  Screen Recording now lets you type or import scripts, auto-scroll text, and adjust speed or font size while recording.

  3. Improve Video Clarity with Generative AI
  Generative Enhance helps improve clarity and detail in low-resolution, compressed, or older footage.

  4. Control Object Orientation Along a Path
  Choose whether an object rotates with the path direction or keeps a fixed angle, giving you more control over path animations.
