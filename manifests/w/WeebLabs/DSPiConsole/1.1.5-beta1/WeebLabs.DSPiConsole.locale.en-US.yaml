ShortDescription: A WinUI 3 control application for the DSPi audio processor. Supports both RP2040 and RP2350 platforms.
Moniker: dspiconsole
ReleaseNotes: |-
  Beta release for testing.
  What's new
  - Crossover filters — per-output high-order crossovers (Linkwitz-Riley, Butterworth, Bessel), edited by Family / Type / Slope / Frequency, and now rendered in the frequency-response graph (matching the device's actual filter design). New translucent filter status bar with PEQ⇄XO tabs and Enable All / Bypass All; the output gain/delay card and the status bar stay pinned while the filter list scrolls.
  - I2S input — selectable as an input source, with a new Hardware → I2S Input settings page (conflict-aware RX data pin picker + master sample rate of 44.1 / 48 / 96 kHz).
  - Preset "Save to…" — right-click a preset with unsaved changes to save the current (modified) state into another slot and switch to it, leaving the original untouched. The clean-state "Copy to…" is unchanged.
  - Settings: Globals — the former Volume, Startup, and Output-configuration (Inclusion) pages are consolidated into a single General → Globals page.
  Fixes
  - Fixed a crash on connect caused by the device reporting an input source the app didn't recognize.
  > Requires DSPi firmware with crossover / I2S input support (bulk wire format V11/V12).
