ShortDescription: A WinUI 3 control application for the DSPi audio processor. Supports both RP2040 and RP2350 platforms.
Moniker: dspiconsole
ReleaseNotes: |-
  Hotfix release on top of v1.1.5-beta5.
  What's new
  - Matrix mixer multichannel support: the mixer now shows one routing row per active input (up to 8, tracking the selected source's channel count) instead of the fixed stereo pair, with rows labelled by the sidebar channel names and a tighter layout when many inputs are shown. Routes on inputs 3-8 sync from the device, update live, and register in preset dirty tracking.
  - Channel Identify: right-click an output channel in the sidebar and choose Identify to play a short ID chirp on just that output, making it easy to find the physical speaker.
  - Graph: "Gain affects displayed level": new Graphing > Style toggle (default on) controlling whether each channel's response curve is offset by its output gain or input preamp. Input preamp is now reflected in the graph for the first time; turn the toggle off for the pure filter response.
  - Filter lists: Ctrl to scroll-edit: the mouse wheel over PEQ and crossover value fields now only changes the value while Ctrl is held. A bare wheel scrolls the filter list, so no more accidental edits while scrolling.
  - Source picker: a disabled ADAT input is now hidden from the source list entirely (previously shown greyed out), and the list updates immediately when ADAT is enabled or disabled.
  Known issues
  - Output channel pairs cannot yet be linked.
  - The routing preview for output channels currently only displays the first two routed input channels.
  - The system master-mode sample rate setting is currently located on the I2S Configuration page, despite affecting other systems.
  > Requires up-to-date DSPi firmware (ADAT / psychoacoustic bass / control-surface support).
