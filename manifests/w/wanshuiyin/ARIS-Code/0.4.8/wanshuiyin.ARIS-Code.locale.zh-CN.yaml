ShortDescription: 一款为学术研究人员打造的、基于终端的人工智能研究助手
Description: |-
  ARIS-Code（Auto Research in Sleep）是一款为学术研究人员打造的、基于终端的人工智能研究助手。它的核心理念如下：
  - 🤖 执行者：作为核心大语言模型，可完成代码编写、文献调研、论文草拟、实验规划工作
  - 🔍 审核者：独立的大语言模型，通过 LlmReview 工具对执行者的输出提出对抗性批评意见
  - 🔄 迭代：执行者编写→审核者批评→执行者修改，循环往复直至输出质量达标
  ARIS 捆绑了 42 项研究技能，覆盖从想法发起到论文投稿的完整研究流程。
