ReleaseNotes: |-
  A new release of Igor Pro 10 is now available. A list of notable changes for this release is included below. Go to the Downloads page or select the Help→Updates for Igor Pro menu item within Igor Pro 10 to get the latest release. If you've reported an issue to us and we've told you it's been fixed, the fix will be included in this release, even if it's not mentioned below.
  Notable Changes in Igor Pro 10.02
  IGOR APPLICATION
  NEW FEATURES
  - PlaySound added /PAUS and /GO flags for pausing and resuming asynchronous sound playback.
  - FUNCREF can now be properly passed by reference and returned from functions.
  CHANGED BEHAVIOR
  - The /UNATTENDED command line flag now skips the license activation dialog.
  - In 10.01, bitwise operators (&, |, and %^) returned incorrect large negative values when either operand was NaN. Bitwise operators are now defined to treat NaN, Inf, and -Inf operands as 0, matching the behavior in Igor 9 and 10.00.
  BUG FIXES
  - Fixed a bug (introduced in 10.01) where layout draw objects selected a phantom object after drawing.
  - FuncFit and FuncFitMD now support user-defined fit functions with complex independent variables in multidimensional curve fitting.
  - Fixed a Qt library bug that resulted in a crash/exception during startup on machines running old versions of Windows 10.
  - Fixed a crash in FuncFit when the fit function had no parameters.
  - Fixed line continuation anomalies in the compiler.
  - Fixed various Ctrl+F (Find), Ctrl+R (Replace), and Ctrl+G (Go To Line) bugs in procedure windows, the command window, and notebooks.
