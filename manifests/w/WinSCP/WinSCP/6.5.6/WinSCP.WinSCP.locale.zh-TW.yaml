ShortDescription: 適用於 Windows 的免費/自由 SFTP、SCP、S3 和 FTP 客戶端
Description: WinSCP 是一款開源免費/自由的 Windows 平台 SFTP 客戶端、FTP 客戶端、WebDAV 客戶端、S3 客戶端和 SCP 客戶端以及文件管理器。其主要功能是在本地計算機與遠程計算機之間傳輸文件。此外，WinSCP 還提供腳本支持和基本的文件管理功能。
