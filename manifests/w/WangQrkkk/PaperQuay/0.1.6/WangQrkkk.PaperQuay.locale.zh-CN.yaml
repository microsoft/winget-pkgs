PackageIdentifier: WangQrkkk.PaperQuay
PackageVersion: 0.1.6
PackageLocale: zh-CN
ShortDescription: 桌面端优先的 AI 辅助文献管理软件，面向 PDF 阅读、全文翻译、论文概览和 Agent 工作流。
Description: |-
  PaperQuay 不只是一个 PDF 阅读器，也不只是 Zotero 的附属工具。 它是一款本地优先的桌面端文献管理软件，面向学生、研究人员和论文写作者，目标是在同一个工作区完成文献管理、PDF 阅读、批注笔记、全文翻译、论文速读和 Agent 辅助管理。
  很多论文工具会把工作流拆得很碎：一个软件读 PDF，一个工具做翻译，一个聊天窗口生成论文概述，再用另一个文献管理器维护元数据。PaperQuay 希望把这些操作合并到一个桌面端流程中，同时保留 Zotero 兼容能力，但不把 Zotero 作为必要依赖。
Tags:
- 学术
- 引用
- 文献
- 研究
- 论文
ReleaseNotes: |-
  - 新增 WebDAV 手动远程备份与增量恢复：使用 SQLite 在线备份生成本地暂存副本，远端对象采用临时上传后原子切换，支持 latest 备份查看与设置页操作入口。
  - 改进 WebDAV 恢复逻辑：可从最新远程备份补回缺失的 PDF，以及 MinerU 解析、翻译、总结等派生缓存，同时不会删除本地额外内容。
  - 修复阅读器 workspace 切换问题：在文库中打开 PDF 后，切到 Agent 再切回文库，不会再出现 PDF 变空白。
  - 重做“文档问答”独立窗口：现在会以真正的问答窗口打开，而不是再套一层右侧侧栏壳，停靠行为和窗口 UI 也更清晰。
  - 收紧文档问答独立窗口语义：只有聊天面板支持弹出为独立窗口，停靠回去后也会稳定回到聊天面板。
