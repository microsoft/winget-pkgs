PackageIdentifier: WangQrkkk.PaperQuay
PackageVersion: 0.1.24
PackageLocale: zh-CN
ShortDescription: 桌面端优先的 AI 辅助文献管理软件，面向 PDF 阅读、全文翻译、论文概览和 Agent 工作流。
Description: |-
  PaperQuay 不只是一个 PDF 阅读器，也不只是 Zotero 的附属工具。 它是一款本地优先的桌面端文献管理软件，面向学生、研究人员和论文写作者，目标是在同一个工作区完成文献管理、PDF 阅读、批注笔记、全文翻译、论文速读和 Agent 辅助管理。
  很多论文工具会把工作流拆得很碎：一个软件读 PDF，一个工具做翻译，一个聊天窗口生成论文概述，再用另一个文献管理器维护元数据。PaperQuay 希望把这些操作合并到一个桌面端流程中，同时保留 Zotero 兼容能力，但不把 Zotero 作为必要依赖。
Tags:
- 学术
- 引用
- 文献
- 研究
- 论文
ReleaseNotes: |-
  - 综述 Word 导出支持可编辑 OMML 公式、缺失图片容错、本地化节标题、480 twip 首行缩进、更完整参考文献信息，以及根据模型输出在正文中插图。
  - 综述生成更稳健：单个写作任务失败不会中止整个队列，更多检索论文可参与深度 RAG 上下文。
  - 知识图谱支持同步 Crossref 参考文献数据，只为文库内论文生成引用关系，并补充共同作者关系、边颜色图例、图谱导出、关系目标搜索和节点右键交互。
  - MinerU 解析支持配置 API Base URL，便于使用本地部署的 MinerU；未配置时仍默认使用官方地址。
  - 修改默认文献存储目录时，会迁移已有目录结构和附件路径到新位置。
  - 阅读与笔记流程新增划词翻译高亮、本地文库导航栏拖动调整宽度、文献列表排序，并修复本地保存后误提示外部更新的问题。
