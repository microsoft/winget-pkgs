PackageIdentifier: wuxiran.CC-Panes
PackageVersion: 0.9.39
PackageLocale: zh-CN
ShortDescription: Claude Code 的多实例分窗管理器 —— 基于 Tauri 2 构建的跨平台桌面应用
Description: |-
  CC-Panes 让您在分屏终端布局中并排运行多个 Claude Code CLI 实例。通过单个桌面应用，即可使用工作区、项目和任务来组织您的 AI 驱动开发工作流。

  功能特性
  - 分屏终端 — 在灵活的横向/纵向分屏布局中运行多个终端，支持拖拽调整大小
  - 工作区管理 — 将项目组织到工作区中，支持固定、隐藏和重新排序
  - 内置终端 — 功能完整的终端（xterm.js + PTY），支持多标签页
  - Claude Code 集成 — 启动 Claude Code 会话、恢复对话、管理提供商，以及自对话模式
  - Git 集成 — 分支状态、拉取/推送/获取/贮藏、工作树管理，以及 git 克隆
  - 会话管理 — 通过最近启动面板跟踪启动历史、清理损坏会话、恢复之前的工作
  - 本地历史 — 文件版本跟踪，支持差异视图、标签、分支感知快照和恢复
  - 文件浏览器 — 项目文件树，支持搜索、创建、重命名、删除、复制和移动操作
  - 代码编辑器 — 基于 Monaco 的编辑器，支持 60 多种语言、Markdown 预览和图片预览
  - 快速搜索 — 跨所有工作区项目的全局文件搜索（Ctrl+K）
  - 截图 — 区域捕获，支持全局快捷键、多显示器和剪贴板复制
  - 会话日志 — 工作区级别的会话记录
  - 待办与计划 — 任务管理，支持优先级、子任务和计划归档
  - 记忆与技能 — 管理 Claude 记忆和每个项目的自定义技能
  - MCP 服务器配置 — 为每个项目配置 MCP 服务器
  - 钩子/工作流 — 工作区级别的钩子系统，用于自动化
  - 提供商管理 — 多 API 提供商支持（Anthropic、Bedrock、Vertex、代理、配置配置文件）
  - 目录扫描导入 — 从目录批量导入 Git 仓库
  - 主题支持 — 浅色/深色模式，采用玻璃拟态设计
  - 无边框、迷你与全屏 — 无边框窗口模式、紧凑迷你视图，以及 F11 全屏切换
  - 系统托盘 — 最小化到托盘并支持状态监控
  - 桌面通知 — 会话退出、等待输入和待办提醒警报，支持防抖
  - 键盘快捷键 — 可自定义所有主要操作的快捷键
  - 国际化 — 英文和简体中文界面
