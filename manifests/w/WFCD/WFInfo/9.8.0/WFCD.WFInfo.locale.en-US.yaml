ReleaseNotes: |-
  Feature release
  Add/change support of all Warframe languages except of Thai, Japanese and Turkish (they are missing locales on Warframe.market).
  - Change: English - many various corrections to reduce false positives
  - Add: French
  - Add: Italian
  - Add: German
  - Add: Spanish
  - Add: Portuguese
  - Add: Russian
  - Add: Polish
  - Add: Ukrainian
  - Add: Chinese (Simplified)
  - Add: Chinese (Traditional)
  - Change: Korean language had significant quality issues in previous releases so its support have been rewritten - results are way more promising.
  Dependencies got updated with security patches, few minor patches have been done to SnapIt, minor QOL improvements (optimizations to UI, few tweaks to logic).
