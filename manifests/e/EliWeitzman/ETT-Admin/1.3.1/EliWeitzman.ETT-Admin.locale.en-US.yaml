ReleaseNotes: |-
  A few new tools 🧰
  With this build, we're rolling out some new tools! New Outlook repair tools kick off the means of remving or blocking a premature upgrade to the new Outlook PWA Version (from Outlook Desktop App). As well, the Windows Repair tools include SFC, and DISM tools to help clean up a buggy Windows install.

  A quick bit of bug fixes!
  ETT 1.3 introduced a massive re-architecting of how ETT currently runs, and so, we inherently ran into a few bugs out the gate. As a result, here come the fixes with 1.3.1!
  New Features:
  - Outlook Repair Tools have arrived! Don't like that new Outlook PWA? Simply revert to legacy outlook, or even block the upgrade! (#97 )
  - Enhanced Windows Repair tools! Added sfc /scannow and DISM cleanup as toolbox functions (#95 )
  Bugs Fixed:
  - Installed-version Auto-Updates had some funky GUI issues when updating (#93 )
  - Fixed an issue with the misorganization of Host File integrity (#87 )
  - Fixed a bug with Clear Last Login missing error handling [thanks @TheDeadGPU!] (#96 )
  - ...and many more bugs and code cleanup under-the-hood!

  Install using Winget!
  Standard Install:
  winget install --id=EliWeitzman.ETT
  Note: ETT Installs using Winget will be in Machine-Wide context, and saved to Program Files. For installs in a User-based context, use the self-extracting installers attached in the release
