ReleaseNotes: |-
  Introducing the ETT Toolbox!
  The ETT Toolbox will be your one-stop-shop for your system and windows administrative needs! Rather than keeping all the different tools sorted into a maze of tab windows, we've now relocated them to the primary interface, towards the right.
  Settings Config files, and GUI!
  Want to deploy ETT in your environment, while also keeping branding, themes, and customizations perpetual? ETT now uses a config file (ETTConfig.json), which can be used to customize every aspect of ETT (and even add custom functions!). Don't like using config files? ETT as well has a new "Settings" UI, which will allow end-users to modify and adjust theming and other features of ETT easily!
  Custom Functions just got easier!
  Thanks to the amazing efforts of @TheDeadGPU, ETT now supports the use of a config file, and with it, easier ways to add your own custom scripts! Take a peek at the Wiki for more documentation and information!
  What's New
  - Find Windows activation key type (#67)
  - Any exports can now be saved using a Windows File Save Dialog (#73)
  - Anime Mode has been added (#58)
  - New Toolbox UX Added! (#63)
  - Added config file for custom functions and ETT customization (#24 , #68)
  - Added the ability to automatically generate config file (if missing) (#76)
  - Added a GUI to maintain the configuration file (#81)
  - Added ability to disable ETT update checking (#64)
  - Some fun code review and cleanup (#78)
  Bugs Resolved
  - Fixed the fun button (#71)
  - Fixed an issue where a random 0 was occasionally printed to the command line (#74)
  - Fixed a storage check error that broke at 20GB of RAM free (#84)
  - Fixed a bug where the Windows activation key was not copying to clipboard (#86)
  Install using Winget!
  Standard Install:
  winget install --id=EliWeitzman.ETT
  Note: ETT Installs using Winget will be in Machine-Wide context, and saved to Program Files. For installs in a User-based context, use the self-extracting installers attached in the release
  Additionally, we're seeing reports of Defender potentially false-positive quarantining some installs. An appeal for a false positive is currently underway.
