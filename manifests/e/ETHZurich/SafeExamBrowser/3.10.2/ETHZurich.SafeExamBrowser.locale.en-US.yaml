ReleaseNotes: |-
  Summary
  This patch update improves security and integrity aspects, resolves an issue with the display monitoring and provides other minor bug fixes and improvements.
  Note
  Safe Exam Browser for Windows requires a minimum operating system version of Windows 10 version 1803.
  Important
  The Browser Exam Key of Safe Exam Browser for Windows is platform-specific, i.e. its value is different for the 32-bit (x86) and 64-bit (x64) build of the same version!
  Changes
  - Fixed issue with display monitoring by acquiring session lock.
  - Improved window monitoring.
  - Improved remote session detection.
  - Added terminal service client to default list of prohibited applications.
  - Implemented basic runtime integrity verification.
  - Added ToDesk to default list of prohibited applications (#1441).
  - Browser engine version 147.0.100 (Chromium version 147.0.7727.118).
  The following optional features and changes are disabled by default and need to be configured individually:
  - Ensured that also the server API endpoint is correctly sanitized.
  Known Issues
  - Screen readers NVDA and JAWS are not compatible with kiosk mode Create New Desktop. If their usage is required, please use kiosk mode Disable Explorer Shell where they should work as expected.
  Requirements
  SEB 3.10.2 requires the prerequisites listed below in order to work correctly. These are automatically installed with the setup bundle and need only be manually installed when using the MSI packages.
  - .NET Framework 4.8 Runtime: https://dotnet.microsoft.com/download/dotnet-framework/net48
  - Visual C++ 2022 Redistributable: https://learn.microsoft.com/en-us/cpp/windows/latest-supported-vc-redist
  Installation
  Please use the setup bundle for installation! The platform-specific setups are mainly provided for system administrators who require MSI packages for their automated installation procedures.
