ShortDescription: A borderless desktop widget that shows drive space as a circular gauge.
Description: |-
  Disk Space Monitor is a borderless desktop widget that sits behind your other
  windows like a wallpaper gadget and shows remaining space on your drives as
  circular gauges, with the drive, free space, and percentage free in the middle.
  Show one drive or several, each as its own window you can place and size
  independently. Hold Ctrl to move, resize, and configure it.
