ShortDescription: A fast Node.js package manager
Description: |-
  aube is a package manager for Node.js projects. It uses pnpm-style isolated node_modules for fast, disk-efficient installs.

  Existing projects keep their lockfile format. aube reads and writes pnpm-lock.yaml, package-lock.json, npm-shrinkwrap.json, yarn.lock, and bun.lock in place. New projects without a supported lockfile get aube-lock.yaml.

  Why Try It
  - Fast installs. Warm installs are about 8x faster than pnpm and about 5x faster than Bun in the current benchmarks. Repeat test commands run up to 35x faster than pnpm and up to 5x faster than Bun.
  - Existing lockfiles. Reads and writes pnpm-lock.yaml, package-lock.json, npm-shrinkwrap.json, yarn.lock, and bun.lock in place.
  - Cheap repeat commands. aubr test, aube test, and aube exec vitest auto-install when dependencies are stale, then skip that work when nothing changed. aubx uses a local binary when one is installed, or a throwaway environment for one-off tools.
  - Less disk use. A global content-addressable store lets projects share package files instead of keeping a full copy of the same dependencies in every checkout.
  - Secure defaults. Out of the box, exotic transitive deps are blocked, lifecycle scripts wait for approval, trust downgrades fail at resolve, and brand-new releases sit in a 24h cooling window. One paranoid: true line adds the build jail and turns the soft gates into hard fails.
Moniker: aube
ReleaseNotes: |-
  A small parity release: aube outdated learns how to check global installs, and aube audit --json finally emits the pnpm-shaped report its docs have always promised.
  Added
  - aube outdated -g / --global (#910 by @jdx) — outdated can now scan globally installed packages instead of a project's workspace, reusing the same table/JSON output and exit-code-1-on-drift behavior as project mode. An optional PATTERN argument filters by alias prefix (including multi-package global installs), and --global is mutually exclusive with --filter/--recursive. Global installs without a lockfile are skipped with a dedicated WARN_AUBE_GLOBAL_OUTDATED_NO_LOCKFILE warning and a checked: false JSON shape. render_json also now promotes duplicate package names to an array instead of overwriting. Closes the gap reported in discussion #906.

  Fixed
  - aube audit --json now matches pnpm's AuditReport shape (#900 by @colinhacks) — Previously --json printed the raw npm bulk-endpoint response ({ "<pkg>": [advisory, …] }), so the bundled help example aube audit --json | jq '.advisories | length' could never work. Output is now reshaped to:
    {
      "advisories": { "<id>": { /* advisory */ } },
      "metadata": {
        "vulnerabilities": { "info": 0, "low": 0, "moderate": 0, "high": 0, "critical": 0 },
        "dependencies": 0, "devDependencies": 0, "optionalDependencies": 0, "totalDependencies": 0
      }
    }
    Advisories are re-keyed by numeric npm id (collapsing a single advisory affecting multiple packages into one entry); vulnerabilities counts unique ids across the five always-present severity buckets before the audit-level filter, while the advisories map is additionally level-filtered, matching pnpm's ordering. Dependency counts reflect the active --prod/--dev/--no-optional gating. --audit-level, --ignore/auditConfig, --ignore-unfixable, the default table output, and the --ignore-registry-errors {status,reason} sentinel are all unchanged. The "no dependencies to audit" path now also returns a well-formed empty report.

