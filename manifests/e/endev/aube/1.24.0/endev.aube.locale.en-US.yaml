ShortDescription: A fast Node.js package manager
Description: |-
  aube is a package manager for Node.js projects. It uses pnpm-style isolated node_modules for fast, disk-efficient installs.

  Existing projects keep their lockfile format. aube reads and writes pnpm-lock.yaml, package-lock.json, npm-shrinkwrap.json, yarn.lock, and bun.lock in place. New projects without a supported lockfile get aube-lock.yaml.

  Why Try It
  - Fast installs. Warm installs are about 8x faster than pnpm and about 5x faster than Bun in the current benchmarks. Repeat test commands run up to 35x faster than pnpm and up to 5x faster than Bun.
  - Existing lockfiles. Reads and writes pnpm-lock.yaml, package-lock.json, npm-shrinkwrap.json, yarn.lock, and bun.lock in place.
  - Cheap repeat commands. aubr test, aube test, and aube exec vitest auto-install when dependencies are stale, then skip that work when nothing changed. aubx uses a local binary when one is installed, or a throwaway environment for one-off tools.
  - Less disk use. A global content-addressable store lets projects share package files instead of keeping a full copy of the same dependencies in every checkout.
  - Secure defaults. Out of the box, exotic transitive deps are blocked, lifecycle scripts wait for approval, trust downgrades fail at resolve, and brand-new releases sit in a 24h cooling window. One paranoid: true line adds the build jail and turns the soft gates into hard fails.
Moniker: aube
ReleaseNotes: |-
  A round of supply-chain hardening alongside two new CycloneDX scopes and a long-awaited aube install --dry-run.
  Added
  - Managed hardening config (#935 by @jdx) — Admins can drop a /etc/aube/managed.toml (and optional additive AUBE_MANAGED_CONFIG_PATH) that can only make settings stricter than the user/env/project resolution. Each setting now declares a managedPolicy (max, trueWins, falseWins, managedWins, ranked:…); when a weaker local value is overridden, aube emits WARN_AUBE_MANAGED_CONFIG_ENFORCED. dangerouslyAllowAllBuilds is resolved through this pipeline too, so a managed config can shut off --dangerously-allow-all-builds across a fleet. aube config get / list show the effective merged values.
  - aube install --dry-run (#927 by @jdx) — Resolve and print what would happen without writing aube-lock.yaml, creating node_modules, running preinstall, or touching install state. Unlike --lockfile-only, an explicit --frozen-lockfile still fails when no lockfile exists, while CI-style dry-runs can resolve without one. The two flags are mutually exclusive.
  - aube sbom --exclude-peers (#934 by @jdx) — CycloneDX-only flag that trims components reachable only via peer edges (and drops root direct deps that are peer-only unless they also appear in dependencies). The BOM records cdx:npm:package:excludePeers. As a bonus, CycloneDX output now adds externalReferences (issue-tracker) for the root and each component when bugs is an http(s) URL.
  - CycloneDX dev-only scoping (#926 by @jdx) — Packages reachable only through devDependency edges (across all workspace importers) are emitted with scope: "excluded" and the cdx:npm:package:development property. Anything reachable as a runtime dep in any importer stays unscoped, including cycles and packages linked as dev in one workspace and prod in another. SPDX output is unchanged.
  - aube view infers the package name (#925 by @jdx) — Running bare aube view reads name from the nearest package.json and shows registry metadata for it; a missing name now produces a clear error rather than a confusing positional failure.

  Fixed
  - Trust policy enforced on lockfile reuse (#929 by @jdx) — Previously, aube update could write a lockfile and subsequent installs could reuse it (or warm install state) without re-checking trust evidence. Installs that reuse aube-lock.yaml now walk reachable registry packages, fetch packuments, and run check_no_downgrade before fetch/link. The warm/fast path is skipped entirely when trust-policy=no-downgrade or paranoid=true is active (outside offline mode), and rm aube-lock.yaml now actually triggers a re-resolve instead of being silently restored from .aube-state.
  - Persist computed tarball integrity (#933 by @jdx) — Registry packages fetched without a lockfile integrity field now have SHA-512 SRI derived from the tarball (streaming when possible) and threaded back into the in-memory graph via apply_computed_integrities, including peer-contextualized entries, before the lockfile is written.
  - Exact pins skip name-only OSV gate (#923 by @jdx) — Pre-resolve supply-chain checks would block aube add nx@23.0.0 whenever OSV had a name-level MAL-* hit on nx, even when the pinned version was unaffected. Full semver pins (including via npm: aliases) now go through fetch_malicious_advisories_versioned; ranges, dist-tags, and bare names still use the name-only query, and download-count checks remain name-based. Add-time failures now also read "refusing to add" instead of "refusing to install".
  - Recursive --no-bail (#928 by @jdx) — aube run -r --no-bail now matches pnpm: a failing script (or .bin fallback) no longer stops the sequential fanout, later matched packages still execute, and the process exits with the first failing code. Default behavior is unchanged.

  💚 Sponsor aube
  aube is part of jdx.dev — an independent developer-tooling studio run by @jdx, also behind mise. Work on aube is funded entirely by sponsors.
  If aube is saving your team install time or CI minutes, please consider sponsoring at jdx.dev. Individual and company sponsorships are what keep the project fast, free, and independent.
