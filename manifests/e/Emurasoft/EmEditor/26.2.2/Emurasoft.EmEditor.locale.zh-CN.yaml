ReleaseNotes: |-
  EmEditor v26.2.2 现已发布。本次更新侧重于稳定性，并包含以下修复与改进。我们建议更新到最新版本以获得最佳体验。
  修复了在打开文件后立即可能发生的崩溃问题。
  修复了 Store 版和 MSIX 版的打开对话框。
  如果您使用桌面安装程序（Desktop Installer）版本，请选择 帮助 > 检查更新 来更新 EmEditor。如果更新无法进行，请下载最新版本并手动运行安装程序。
  Microsoft Store 版本预计将在未来几天内上线。如果您直接下载 MSI 文件，请确认其数字签名由 Emurasoft, Inc. 签署。
