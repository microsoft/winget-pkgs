ReleaseNotes: |-
  EmEditor v26.2.3 is now available. This release focuses on stability and includes the fixes and improvements below. We recommend updating to the latest version for the best experience.
  - Fixed an issue that could cause the wrap mode to change to No Wrap after opening a file.
  - Fixed a potential crash when starting EmEditor while checking for conflicts with other versions.
  - Fixed an issue with Markdown/HTML style updates.
  If you use the legacy MSI installer, select Help > Check for Updates to update EmEditor. If the update does not complete successfully, please download the latest version and run the installer manually.
  The Microsoft Store version is expected to be available within the next few days. If you download the MSI installer directly, please verify that its digital signature is issued by Emurasoft, Inc.
  We recommend using the Microsoft Store version or the new MSIX installer. Updates for the legacy MSI installer are currently scheduled to end in March 2027. For more information, see FAQ: Store Version and New Installer (MSIX).
