ReleaseNotes: |-
  EmEditor v26.2.3 现已推出。本次发布重点提升稳定性，并包含以下修复与改进。我们建议更新到最新版本以获得最佳体验。
  - 修复了打开文件后可能导致自动换行模式变为 不换行 的问题。
  - 修复了在启动 EmEditor 并检查与其他版本的冲突时可能发生的崩溃问题。
  - 修复了 Markdown/HTML 样式更新相关的问题。
  如果您使用旧版 MSI 安装程序，请选择 帮助 > 检查更新 来更新 EmEditor。若更新未能成功完成，请下载最新版本并手动运行安装程序。
  Microsoft 商店版预计将在未来几天内上线。如果您直接下载 MSI 安装程序，请确认其数字签名由 Emurasoft, Inc. 颁发。
  我们建议使用 Microsoft Store 版本或新的 MSIX 安装程序。旧版 MSI 安装程序的更新目前计划于 2027 年 3 月结束。更多信息请参阅 FAQ：商店版与新安装程序（MSIX）。
