ReleaseNotes: |-
  EmEditor v26.1.1 is now available. This update focuses on stability and includes the fixes and improvements listed below. We recommend updating to the latest version for the best experience.
  - Fixed an issue in v26.1.0 where the scroll position might not be restored when restoring a workspace.
  - Improved the behavior when toggling word wrap.
  - Improved comparison behavior while editing.
  - Fixed an issue where EmEditor could crash when loading corrupted settings.
  - Enabled the Move Line Up and Move Line Down commands in Markdown Design View.
  - Updated the dialog box UI.
  - Fixed the Find toolbar UI in dark mode.
  - Improved the behavior when using LM Studio/OpenAI compatible with the Chat with AI plugin.
  If you use the Desktop Installer edition, you can update EmEditor by selecting Help > Check for Updates. If the update does not work, please download the latest version and run the installer. The Microsoft Store version is expected to be available in the next few days. If you download the MSI file directly, please confirm that the digital signature is signed by Emurasoft, Inc.
