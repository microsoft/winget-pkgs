ReleaseNotes: |-
  此版本让可信 MCP 服务器以更少配置可靠连接，让本地与远程会话中的待办进度保持权威一致，并改进工作区导航和选中内容预览，同时强化 Auto 决策、配置持久化、市场审核与 Windows 打包。
  English → · 网页版完整更新日志 →
  使用攻略
  - 工具审批模式 — 了解更新后的 Auto 行为，以及仍需要用户明确选择的决策边界。
  概览
  Reasonix v1.17.19 — 零配置 MCP、可靠待办与更顺手的桌面体验
  此版本让可信 MCP 服务器以更少配置可靠连接，让本地与远程会话中的待办进度保持权威一致，并改进工作区导航和选中内容预览，同时强化 Auto 决策、配置持久化、市场审核与 Windows 打包。
  发布日期：2026-07-22
  重点内容
  - 可信 MCP 服务器开箱即用 — 已安装并授权的 MCP 服务器现在会立即注册缓存工具、按需启动、展示更清晰的运行状态，并在关闭时等待 schema 缓存写入完成。 (#6819, #6829, #6840)
  - 待办进度保持权威一致 — 桌面端待办面板现在会在完成、恢复、回滚、会话切换和远程工作台快照中遵循服务端规范状态，不再复活历史记录里的过期待办。 (#6774)
  - 更强的工作区浏览体验 — 文件树现在会记住有用的展开状态、折叠连续目录、显示 Seti 文件图标和层级引导线；选中的聊天或代码上下文也会以可展开卡片保留在消息中。 (#6807, #6813)
  - Auto 只在真正的计划边界介入 — 常规且已获允许的工作会继续自动执行；真正涉及策略或范围变化时，桌面端、CLI 与 Bot 会显示中立的计划对比供用户选择。 (#6817)
  新功能
  - 社区市场支持提交插件 — 发布者现在可以像提交 Skill 和 MCP 服务器一样提交插件包，并使用经过校验的元数据和安装路由。 (#6816)
  - 消息中的选中上下文卡片 — 加入提示词的聊天摘录和代码在发送后仍会以可展开卡片显示，同时不会重复注入模型上下文。 (#6813)
  改进
  - 更可靠的 MCP 安装与生命周期 — 快速安装、手动配置与 JSON 配置现在共用一套流程；启用、停用、重试、子 Agent 继承、启动去重、项目相对命令和关闭清理均遵循一致的宿主侧规则。 (#6819, #6829, #6840)
  - 工作区文件树导航 — 展开状态记忆、连续目录折叠、层级引导线和内置 Seti 图标，让 macOS 与 Windows 上的大型工作区更易浏览。 (#6807)
  - 主题编辑器可用性 — 设置中的主题编辑器现在能一致处理保存操作、键盘焦点、Escape、忙碌状态和窄窗口布局。 (#6821)
  - 更安全的市场审核 — 发布者更新会重新进入审核、清除旧的认证状态，并要求针对精确修订批准，让并发变更以安全方式失败。 (#6830)
  - 更清晰的 MiniMax 内容审查错误 — MiniMax 内容审查失败现在会保留上游诊断，并说明完整对话上下文可能相关，不再建议无效重试。 (#6824)
  - ACP 会话启动后的命令可用性 — 新建、加载或恢复会话时，命令更新现在会在会话响应之后发送，让客户端有机会先完成订阅。 (#6803)
  修复
  - 权限更新保留完整策略 — 记住新的允许规则时不再丢失 mode、ask、deny、注释或未知权限字段，并会跨进程序列化并发写入。 (#6784)
  - Windows 便携包保留图形启动器 — 内置 CLI 现在使用独立的内部文件名，避免不区分大小写的打包目录把 Reasonix.exe 图形启动器替换成控制台程序。 (#6806)
  - 待办面板不再复活已完成任务 — 规范 Todo 快照现在优先于历史记录重建，并正确处理权威空列表和受保护的异步刷新。 (#6774)
  升级提醒
  - 无需手动迁移 — 现有 Provider、会话、项目和 MCP 定义会继续正常加载。MCP 启用或停用选择在发生更改后会写入新的独立 activation 文件；文件缺失时仍保留旧版 auto_start 行为。 (#6829)
  风险提示
  当前没有需要额外操作的已知风险。
