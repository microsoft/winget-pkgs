  概览
  Reasonix v1.17.14 — Reasonix 1.17.14
  本次发布提升了桌面端体验：MCP 错误信息更清晰，修复了 Windows 插件 Hook 兼容性问题，增加了可执行程序图标，并引入了中英双语更新日志。
  发布日期：2026-07-16
  重点内容
  - 中英双语更新日志 — 更新日志现经审阅后以中英双语发布，并配有独立版本页面。桌面更新横幅将直接链接到对应版本。 (#6576)
  - MCP npm 连接端点可见性 — MCP 连接失败时，错误摘要现在会显示注册表主机和端点，方便诊断代理或网络问题。 (#6559)
  - Windows 插件 Hook 兼容性 — Windows 插件 Hook 现在能正确展开 $ 等别名，支持 bash Hook，并能处理非 UTF-8 输出。 (#6550)
  - Windows 可执行程序图标 — Windows 启动器、守护程序和更新程序现在显示 Reasonix 图标，并包含版本元数据。 (#6549)
  - 桌面更新下载链接 — 手动桌面更新现在会打开桌面下载页面，并高亮显示正确的操作系统。 (#6553)
  新功能
  - 中英双语更新日志 — 新增经审阅、版本化的中英双语发布目录；网站现在提供更新日志和版本页面，桌面更新横幅会链接到对应版本。 (#6576)
  改进
  - Windows 可执行程序图标 — 启动器、守护程序和更新助手现具有 Reasonix 图标及版本元数据。 (#6549)
  修复
  - MCP npm 连接端点可见性 — MCP 错误摘要现在会显示 npm 注册表主机和端点，便于排查连接问题。 (#6559)
  - Windows 插件 Hook 兼容性 — Windows 上的插件 Hook 现在可展开别名、兼容 bash 并处理旧编码。 (#6550)
  - 桌面更新下载链接 — 手动更新现在会打开桌面下载页面并高亮操作系统。 (#6553)
  升级提醒
  本版本无需手动迁移。
  风险提示
  当前没有需要额外操作的已知风险。
