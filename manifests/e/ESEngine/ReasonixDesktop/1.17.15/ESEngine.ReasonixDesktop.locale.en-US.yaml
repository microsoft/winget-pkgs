ReleaseNotes: |-
  本次发布带来全新的 Desktop 官方主题体验，提升长任务与会话切换的可靠性，恢复 MCP 持久会话，并集中打磨 CLI 工作流。
  English → · 网页版完整更新日志 →
  使用攻略
  - 主题包指南 — 创建、校验、导入、导出和分享 Theme Pack V2 主题。
  - 主题包指南（中文） — 中文指南：创建和分发 Theme Pack V2 主题。
  - CLI 指南 — 输入区、剪贴板快捷键、模型选择器和响应式状态栏参考。
  - CLI 指南（中文） — 更新后 CLI 工作流的中文参考。
  概览
  Reasonix v1.17.15 — Reasonix 1.17.15
  本次发布带来全新的 Desktop 官方主题体验，提升长任务与会话切换的可靠性，恢复 MCP 持久会话，并集中打磨 CLI 工作流。
  发布日期：2026-07-18
  重点内容
  - 官方主题与 Theme Pack V2 — Desktop 现内置八套官方主题、统一主题画廊、可撤销预览，以及支持独立明暗配色和主页/工作区场景的自定义编辑器。 (#6614)
  - 长任务与会话切换更可靠 — 代理错误正文卡住时不再冻结重试；更快的会话快照与过期激活防护减少切换卡顿和内容丢失。 (#6613)
  - MCP 持久会话恢复 — 兼容的信任回执会安全迁移，stdio 服务器可跨调用复用同一进程；服务器身份变化时，Desktop 提供直接的重新验证入口。 (#6612, #6605)
  - 更从容、更完整的 CLI — 输入区可滚动长草稿，剪贴板操作区分文本与图片，状态栏会适配窄终端，模型选择也能可靠完成。 (#6591, #6585)
  - 更简洁的 Agent 执行链 — 已退役的 Memory v5 执行编译器被移除；DeepSeek 明确结束的仅推理响应也不再触发多余的重复思考。 (#6615, #6618)
  新功能
  - Desktop 官方与自定义主题 — 新增八套内置主题、六种语义基础样式、主题画廊、自定义编辑器，以及经过安全加固的 Theme Pack V2 导入导出。 (#6614)
  - 官网深色模式 — reasonix.io 现支持跟随系统、浅色和深色主题，以前缀缓存方块统一视觉母题，并用更紧凑的更新日志展示高频补丁版本。 (#6627)
  改进
  - 响应式 CLI 输入区与状态栏 — 长草稿会在输入区内滚动，复制粘贴反馈更明确，窄终端下完整状态分组会重排而不是被截断。 (#6591)
  - 历史时间戳与更简洁的导航 — 重新加载的用户消息会恢复原始发送时间；项目搜索、会话搜索和回收站取代了重复的独立“历史”入口。 (#6586)
  - 稳定版发布只需一次审批 — CLI、npm 与 Desktop 稳定发布现在会校验同一组原子标签，并在一次受保护的 GitHub 审批后并行执行。 (#6626)
  修复
  - 重试卡死与会话切换丢内容 — 无响应的错误正文现在有明确边界；无变化快照不再反复重写；乱序完成的 Desktop 激活也不会覆盖最近选择的会话。 (#6613)
  - MCP 信任、持久连接与重新验证 — 兼容的信任状态会自动迁移；已授权服务器无需重复确认；stdio 会话可跨调用保持；身份漂移时会显示专用的重新验证操作。 (#6612, #6605)
  - 快速选择器模型切换 — 从 CLI 选择器选择模型或 Provider 后，现在会真正启动并完成控制器切换，不再永久阻塞输入。 (#6585)
  - DeepSeek 仅推理完成响应 — 包含推理内容并以 finish_reason=stop 结束的响应会被正确视为完成，不再触发最多三次多余重试。 (#6618)
  - 生成内容保持原样 — 代码、工具输出、会话记录、恢复分支和任务产物中形似密钥的标识符不再被启发式脱敏误改。 (#6583)
  - Windows 外部打开与工作区偏好 — Desktop 现在可发现 App Paths 安装项，启动 Shell 时不再重新解析路径元字符，选择可渲染的终端图标，并恢复工作区面板的展开状态。 (#6588)
  升级提醒
  - Memory v5 设置会自动退役 — 无需手动迁移。旧的 [agent].memory_compiler 设置会在启动时一次性移除，历史会话与引用仍可正常读取。 (#6615)
  风险提示
  - 分享会话前请主动脱敏 — 普通模型与工具内容现在会原样写入私有本地文件。如果工具输出了真实凭据，分享前请运行 reasonix doctor redact-sessions 或人工检查相关文件。 (#6583)
  - MCP 持久进程边界 — 持久 stdio 服务器的所有 RPC 共用其常规写入者沙箱；Plan 模式过滤、工具策略、显式拒绝规则和破坏性操作审批仍会在分发时生效。 (#6612)
  致谢
  感谢本版本的贡献者：@SivanCola、@billycat、@xianyu-sheng
