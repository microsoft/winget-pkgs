ReleaseNotes: |-
  本次发布重点带来远程 SSH 与并行子智能体舰队，同时新增分区域字体和可自定义输入快捷键，并提升会话导出、会话恢复与 MCP 可靠性。
  English → · 网页版完整更新日志 →
  使用攻略
  - 远程 SSH 指南 — 配置远程主机，通过 CLI 或 Desktop 连接、浏览远程文件并管理端口转发。
  - 远程 SSH 指南（中文） — 远程 SSH 主机配置、连接、文件浏览与端口转发的中文指南。
  - 子智能体配置文件与舰队 — 了解如何定义和使用子智能体配置文件、配置舰队并管理并发。
  - 主题包 — 自定义面板透明度并探索主题包制作。
  - 命令行界面 — 查看最新的 CLI 功能，包括中键粘贴和改进的消息布局。
  概览
  Reasonix v1.17.16 — Reasonix 1.17.16
  本次发布重点带来远程 SSH 与并行子智能体舰队，同时新增分区域字体和可自定义输入快捷键，并提升会话导出、会话恢复与 MCP 可靠性。
  发布日期：2026-07-20
  重点内容
  - 远程 SSH — 通过 SSH 连接到远程主机并远程运行完整的 Reasonix 智能体与工具。包含主机管理、文件浏览、端口转发和自动重连。 (#6673)
  - 子智能体舰队 — 以可配置的并发度并行运行最多 64 个独立子智能体任务，支持基于配置文件的系统提示。通过写入路径协调避免冲突。 (#6636)
  - 分区域字体设置 — 独立调整界面、对话、输入框和代码区域的字体与大小，支持实时预览。 (#6634)
  - 简化的 MCP 授权 — 简化了 MCP 服务器安装与工具批准流程。直接添加连接，按项目授予启动权限，移除了旧版信任管理。 (#6669)
  - 可靠的会话导出 — 图片和 PDF 导出现在在所有平台上均可可靠运行，长篇对话会自动拆分为多个文件。 (#6685)
  新功能
  - 远程 SSH 模块 — 完整的 VS Code Remote‑SSH 风格体验：连接到远程主机，在那里运行智能体，浏览和编辑文件，端口转发，并自动重连。 (#6673)
  - 子智能体舰队 — 支持配置文件的并行子智能体执行，具备并发限制、写入路径协调和后台任务支持。 (#6636)
  - 逐模型上下文窗口 — 为共享提供程序端点后的各个模型设置自定义上下文窗口。 (#6677)
  - 自定义发送与换行快捷键 — 为发送消息和在输入框中插入换行分别配置快捷键。 (#6503)
  - CLI 中键粘贴 — 在 Reasonix CLI 中恢复中键粘贴功能（tmux 缓冲区或 PRIMARY 选择区）。 (#6589)
  改进
  - 分区域字体控制 — 精细调整界面、对话、输入框、代码/工具等不同区域的字体和大小。 (#6634)
  - 可配置的对话宽度 — 在标准宽度（960px）和全宽（90%）之间选择聊天区域宽度。 (#6590)
  - 面板透明度与主题包修复 — 新增主界面/工作区场景的面板透明度控制；修复保存设置后活动主题回退的问题。 (#6645, #6694)
  - 简化的 MCP 安装与授权 — 移除了旧版信任状态机；用户添加的服务器现在直接连接，工具批准遵循明确的安装授权。 (#6669)
  - 插件 Skill 的 MCP 工具绑定 — 导入的 skill 现在能正确映射到实时的 MCP 工具，即使它们使用原始或上游名称。 (#6705)
  - 崩溃诊断强化 — 将发布版崩溃与开发信号分离；减少误报提示；修复了虚拟列表和 Mermaid 渲染错误。 (#6678)
  - CLI 终端交互改进 — 改进了复制粘贴处理，恢复右键粘贴，并优化了消息布局和间距。 (#6632)
  修复
  - 可靠的会话图片/PDF 导出 — 修复了跨域画布污染和内存问题；导出现在可在任何地方使用，并自动分割长对话。 (#6685)
  - 中断轮次显示保留 — 取消或出错的轮次现在在切换会话和重载后仍保留其可见输出。 (#6703, #6666)
  - 限制会话保存锁等待 — 会话保存现在在 5 秒后超时而不是挂起，并在关闭时保存恢复分支。 (#6667)
  - Windows 批处理插件 Hook 引号修复 — 在 Windows 上正确调用带引号路径的 .bat/.cmd 插件。 (#6668)
  - 数字开头的自定义提供程序凭据 — 以数字开头的自定义提供程序名称现在会生成有效的环境变量名。 (#6701)
  - SSH 主机密钥多算法检查 — 具有多个有效主机密钥的服务器不再导致误报的密钥不匹配错误。 (#6699)
  - 远程 SSH 错误恢复交互 — 连接错误现在显示在状态弹出窗口中，并带有重试和主机管理操作。 (#6700)
  - Linux WebKit 启动信号修复 — 通过在 WebKit 启动期间重新应用信号处理程序标志来防止 Linux 崩溃。 (#6655)
  - 最大化窗口光标卡死 — 桌面窗口最大化时光标不再卡死在调整大小形状。 (#6610)
  - LongCat‑2.0 上下文窗口 — 将预设修正为官方的 1,048,576 令牌限制，推迟过早压缩。 (#6690)
  - Windows 会话文件名安全 — 创建会话文件时将冒号等保留字符替换为连字符。 (#6684)
  - 技能市场发布按钮布局 — 修复了技能市场工具栏中发布按钮显示为窄竖条的问题。 (#6630)
  升级提醒
  - 简化的 MCP 授权 — 旧版信任状态机已被替换为按项目的启动授权。现有的 MCP 服务器继续工作；手动信任管理选项已被移除。 (#6669)
  风险提示
  - 远程主机支持范围 — 远程 SSH V1 支持 Linux 与 macOS 远程主机；Windows 远程主机暂不支持，并会返回明确错误。 (#6673)
  - 一次性提示缓存冷启动 — 新的 fleet 工具与扩展后的 task schema 会在升级后触发一次提示缓存冷启动；此后工具顺序与 schema 保持稳定。 (#6636)
  致谢
