ReleaseNotes: |-
  此版本新增由本机 Provider 驱动的 Windows 到 Linux 远程工作台，以 Auto Guard 强化自动模式，简化已安装 MCP 的授权，并改进文件预览、首次引导、更新流程与会话安全。
  English → · 网页版完整更新日志 →
  使用攻略
  - 远程工作台指南 — 将桌面客户端连接到 Linux SSH 主机，同时让模型访问继续留在本机。
  - 工具审批模式 — 了解本地与远程工作流使用的工具审批选项。
  概览
  Reasonix v1.17.18 — 远程工作台、Auto Guard 与更顺畅的桌面体验
  此版本新增由本机 Provider 驱动的 Windows 到 Linux 远程工作台，以 Auto Guard 强化自动模式，简化已安装 MCP 的授权，并改进文件预览、首次引导、更新流程与会话安全。
  发布日期：2026-07-22
  重点内容
  - 基于 SSH 的远程工作台 — 可用 Windows 桌面客户端操作 Linux 工作区，同时由本机 Provider Broker 将模型凭据与推理保留在客户端。 (#6728, #6790)
  - 自动模式新增 Auto Guard — 自动模式现在会更审慎地评估恢复决策，并保留足够上下文，让被打断的工作可以安全继续。 (#6732)
  - 更简单的已安装 MCP 授权 — 已安装 MCP 服务器现在采用更清晰的信任与授权路径，不再依赖已退役的目录工作流。 (#6767)
  - 可搜索的文件预览 — 桌面端文件预览新增行号与文件内搜索，更便于浏览源码和文本文件。 (#6574)
  新功能
  - 远程工作区运行时 — 远程工作台新增 SSH 主机发现、信任提示、远程运行时挂载、文件与 Git 投影、重连处理以及本机 Provider 转发。 (#6728, #6790)
  - Auto Guard 恢复决策 — 自动模式新增确定性恢复规则、审查记录与受保护的继续执行流程。 (#6732)
  - 带行号和搜索的文件预览 — 新增面向大文件的预览组件，支持行号、文本搜索与键盘导航。 (#6574)
  改进
  - 首次 Provider 接入引导 — 首次启动体验现在会以更清晰的选项和状态反馈引导用户完成 Provider 配置。 (#6757)
  - Windows 更新进度与恢复 — Windows 更新现在会显示进度，并在更新中断时使用更稳健的交接与启动恢复流程。 (#6751, #6764)
  - 已安装 MCP 信任流程 — MCP 包与服务器现在使用已安装注册表和显式信任对话框，不再经过旧的签名目录路径。 (#6767)
  - VS Code 扩展安装入口 — 项目文档和官网现在提供 Reasonix VS Code 扩展的直接安装入口。 (#6735)
  修复
  - 活动会话不会被归档 — 归档操作现在会拒绝活动会话和活动主题，避免正在运行的对话从运行时下方消失。 (#6761, #6776)
  - 远程工作台重连与清理 — 真实 Windows 到 Linux 验收中发现的 SSH 生命周期、重连、Provider 目录和关闭清理等发版阻断问题已修复。 (#6790)
  升级提醒
  - 无需手动迁移 — 现有本地工作区、Provider 和桌面偏好会正常继续加载。远程工作台为可选功能，需要一台可访问且兼容 OpenSSH 的 Linux 主机。
  风险提示
  当前没有需要额外操作的已知风险。
  致谢
  感谢本版本的贡献者：@SivanCola、@par73e、@JesonChou
