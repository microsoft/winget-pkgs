  概览
  Reasonix v1.17.17 — Reasonix 1.17.17
  此版本带来 ACP 回合中引导、改动面板工作区差异、退役自动计划模式以及多项界面和生命周期修复。
  发布日期：2026-07-21
  重点内容
  - ACP 回合中引导 — 客户端现在可使用 _reasonix.io/session/steer 供应商扩展在活动会话中引导，支持完整的能力协商。 (#6715)
  - 改动面板显示工作区差异 — 改动面板现在显示从 Git HEAD 开始的完整工作树差异，支持语法高亮和行号。 (#6733)
  - 退役自动计划模式 — 已移除自动计划模式以简化工作流程；现在始终显式启动计划。 (#6734)
  - 要求显式启动目标模式后再启用自动研究 — 自动研究现在需要显式选择目标或使用 /goal 命令，避免意外激活研究模式。 (#6731)
  新功能
  - ACP 回合中引导 — 支持 _reasonix.io/session/steer ACP 供应商扩展，允许客户端在活动会话中引导。 (#6715)
  - 改动面板显示工作区差异 — 新增只读 API，显示完整的 Git HEAD 到工作树的差异，支持语法高亮和行号。 (#6733)
  改进
  - 退役自动计划模式 — 已退役自动计划模式；现在计划需要显式手动激活。现有配置将自动迁移。 (#6734)
  - 要求显式启动目标模式后再启用自动研究 — 自动研究现在仅在显式选择目标或使用 /goal 命令后才可用，移除了自动分类器并防止意外激活。 (#6731)
  修复
  - 控制器关闭时取消前台任务 — 修复了生命周期缺陷：Controller.Close() 现在会取消活动的前台上下文和待处理等待，避免遗留操作和错误空闲状态。 (#6679)
  - 防止模型列表选项重叠 — 修复了 CSS 网格布局，当供应商有很多模型或长名称时，模型选项卡片不再视觉重叠。 (#6539)
  - Windows 打开菜单始终保持在上方 — 修复了 Windows 上外部打开菜单可能被对话内容遮挡的问题。 (#6737)
  - CC Switch MCP 导入遵循 enabled_reasonix — 现在使用 enabled_reasonix 标志正确导入 CC Switch 的 MCP 服务器，并为旧架构提供兼容回退。 (#6730)
  - WebView2 启动隔离系统代理 — WebView2 外壳在无代理模式下启动，避免因不可达代理而停滞，并提供 15 秒看门狗和恢复提示。 (#6727)
  - 远程 SSH 配置与 OpenSSH 对齐 — SSH 连接解析现在使用完整的 OpenSSH 配置堆栈，并对齐了认证行为，包括 IdentityFile 和 IdentitiesOnly 的处理。 (#6716)
  - 工作区文件树行重叠修复 — 通过使用稳定的文件路径作为键，修复了目录展开后文件树中虚拟行重叠的问题。 (#6717)
  升级提醒
  - 自动计划模式已退役 — 自动计划模式已移除。首次启动时将自动迁移配置：auto_plan 将被设为 off 并移除旧键。现在必须显式启动计划（例如通过 Shift+Tab）。 (#6734)
  风险提示
  当前没有需要额外操作的已知风险。
