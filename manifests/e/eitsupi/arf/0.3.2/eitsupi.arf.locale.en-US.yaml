ReleaseNotes: |-
  Release Notes
  Added
  - Shell mode now supports path completion (#170)
  Fixed
  - (Windows) Set .Platform$GUI to "arf-console" to avoid Rgui-only code paths that can break behavior under arf (#169)
  - Experimental: Ensure ARF_IPC_SESSIONS_DIR override is consistently honored in headless/IPC paths across platforms (#173)
  Install arf-console 0.3.2
  Install prebuilt binaries via shell script
  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/eitsupi/arf/releases/download/v0.3.2/arf-console-installer.sh | sh
  Install prebuilt binaries via powershell script
  powershell -ExecutionPolicy Bypass -c "irm https://github.com/eitsupi/arf/releases/download/v0.3.2/arf-console-installer.ps1 | iex"
