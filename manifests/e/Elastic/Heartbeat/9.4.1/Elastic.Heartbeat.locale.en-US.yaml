ReleaseNotes: |-
  Features and enhancements
  Libbeat
  - Cache add_locale processor and refresh only when zone or offset changes. #50343 #50322
  Fixes
  All
  - Update go-ntlmssp to v0.1.1. #50497
  - Fix a deadlock between shutdown and metrics collection in the OpenTelemetry telemetry bridge. #50528
  - Fix OTel Beat processor to honor when conditions. #50555 #50549
  Filebeat
  - Fix a race condition during multiline parser shutdown. #49980
  - Fix Okta entity analytics OAuth2 config unpacking for jwk_json and jwk_pem fields. #50406
  - Fix Active Directory entity analytics to emit device attributes under activedirectory.device. #50472 #50471
  - Fix handling of OAuth2.0 timeouts in CrowdStrike streaming input. #50492 #49988
  Libbeat
  - Fix OTel map conversion for []time.Duration fields to avoid dropping duration slices. #50486 #50474
  Winlogbeat
  - Fix Long.decode failures in the Painless script for the Windows security ingest pipeline. #49869
  - Disable Winlogbeat record ID gap detection when using xml_query so filtered queries do not loop on non-contiguous record IDs. #50443
