ReleaseNotes: |-
  - New
    1. Add the "Disk Speed Test" feature.
    2. Add the "Windows Boot Repair and Conversion" feature.
    3. Add the BMB21-2019 erase standard to the "Erase Sectors" feature.
    4. Add support for restoring an individual partition from a PMFX disk image file.
  - Enhanced
    1. The "Verify Or Repair Bad Sectors/Blocks" feature displays disk read speed in the detection window during scanning.
    2. The "Quick Partition" dialog box allows users to quickly select the number of partitions by pressing the numeric keys 1, 2, 7, 8, or 9.
    3. The "Set Volume Name" dialog box supports selecting preset volume labels provided by the software.
    4. The "Copy Sectors" feature supports resuming copy tasks after modifying the number of skipped bad sectors.
    5. Add the "TRIM Optimization" option to the format dialog box.
    6. The "Clone Partition" and "Clone Disk" features perform TRIM optimization on target partitions or disks before cloning.
    7. Add support for Not Equal To search conditions (prefixed with "!") when searching hexadecimal data in the sector editor.
    8. Optimize the display of capacity values in the program interface to show two decimal places.
    9. Add a minimize button to dialogs that may require long processing time.
    10. Enhance support for the ReFS file system.
    11. Enhance support for newer HIF and MP4 formats when recovering files by type.
    12. Enhance support for the EXT4 file system.
    13. Enhance compatibility of the "File Recovery" feature with special data structures.
  - Fixed
    1. Fixed the issue that the selected file system type automatically reverted to NTFS after changing it to exFAT or EXT4 in the "Quick Partition" dialog box.
    2. Fixed inaccurate Unicode string search results in the "Sector Editor" feature.
    3. Fixed the issue that exceptions might occur when adding multiple disks in the "Erase Sectors" feature.
    4. Fixed the issue that insufficient target disk space was incorrectly reported in some cases when cloning, backing up, or restoring disks.
    5. Fixed the issue that folder modification timestamps were not preserved when copying files from ReFS partitions.
    6. Fixed the issue that Excel-format reports generated by features such as file copying or bad sector checking could not be opened when the report contained more than one million rows.
    7. Fixed the issue that folders were not displayed in the exclude-folder dialog box when backing up partitions to image files.
    8. Fixed the issue that the "Erase Sectors" feature could not be executed in some cases.
