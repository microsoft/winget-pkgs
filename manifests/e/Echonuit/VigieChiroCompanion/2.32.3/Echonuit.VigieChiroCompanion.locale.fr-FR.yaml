ShortDescription: Préparer et déposer les nuits d'enregistrement acoustique de chauves-souris
Description: >-
  VigieChiro Companion accompagne l'observateur naturaliste dans le traitement d'une nuit de
  capture acoustique de chauves-souris, depuis la carte SD de l'enregistreur de terrain jusqu'au
  dépôt des données sur la plateforme nationale Vigie-Chiro. L'application importe les
  enregistrements, vérifie leur qualité, prépare et suit le dépôt, puis permet de relire les
  espèces identifiées. Les données restent sur l'ordinateur de l'utilisateur.
