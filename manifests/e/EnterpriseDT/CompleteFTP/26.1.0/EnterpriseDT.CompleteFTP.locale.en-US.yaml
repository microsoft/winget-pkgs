ShortDescription: Secure file server for Windows
Description: CompleteFTP is a high performance Windows file server supporting secure file transfer via FTPS (FTP over SSL), SFTP (FTP over SSH), HTTP, HTTPS, SCP and SSH. CompleteFTP also supports web applications written in Javascript, and collaborative file sharing.
