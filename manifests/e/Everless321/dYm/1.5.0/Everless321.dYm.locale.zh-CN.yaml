  - 批量修复 — 扫描结果弹窗中可一键标记所有损坏文件重新下载
  改动文件
  - 新增 download-validator.ts 校验工具
  - 更新 downloader.ts / syncer.ts 增加校验层
  - 更新 database/index.ts 新增 deletePostByAwemeId
  - 更新 HomePage / FilesPage 右键菜单
  - 更新 IPC 层和类型定义
