ShortDescription: PII Crawler 在您自己的硬件上扫描文件、网络共享和数据库。发现 SaaS 工具无法触及位置中隐藏的社会安全号码、地址、姓名和电子邮件。没有任何数据会离开您的网络。
Description: |-
  PII Crawler 是一款以本地优先的扫描工具，可扫描您的文件、邮箱、数据库导出内容和网络共享，查找个人身份信息（PII）及其他敏感数据。可用于：
  - 在数据泄露前进行保护、加密或脱敏
  - 调查安全事件并了解暴露范围
  - 构建数据防泄漏（DLP）工作流程
  - 满足数据合规要求（如 GDPR、CCPA 等）
  PII Crawler 受到 Unix 哲学影响，专注于做好一件事：以较低的误报率发现敏感数据。它并非完整的 DLP 工具——不会自行发送警报或推送通知——但可以很好地与其他 DLP 工具配合使用。扫描完全在您的设备上运行，结果永远不会离开您的设备。
