ShortDescription: PII Crawler scans your files, network shares, and databases on your own hardware. Surface the SSNs, addresses, names, and emails hiding where SaaS tools can’t reach. Nothing ever leaves your network.
Description: |-
  PII Crawler is a local-first scanner that looks through your files, mailboxes, database exports, and network shares for Personal Identifiable Information (PII) and other sensitive data. Use it to:
  - Secure, encrypt, or redact data before it leaks
  - Investigate an incident and understand exposure
  - Build a Data Leak Prevention (DLP) workflow
  - Meet data compliance obligations (GDPR, CCPA, and similar)
  PII Crawler is influenced by the Unix Philosophy and tries to do one thing well: find sensitive data with a low false-positive rate. It is not a complete DLP tool — it doesn't send alerts or push notifications on its own — but it composes well with one. Scans run entirely on your machine; results never leave it.
