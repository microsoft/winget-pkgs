ReleaseNotes: |-
  New Features:
  - Added an option for wrapped packages that allows waiting for package processing to complete (subject to certain limitations).
  - Added support for wrapped packages for setups built with the Squirrel setup framework.
  - Improved cancellation and reboot handling during wrapped package installation.
  
  Improvements:
  - Improved support for paths longer than 260 characters.
  
  Bug Fixes:
  - Fixed a problem with re-enumerating VMware virtual machines on the Profiles form.
  - Fixed problems when reverting online snapshots in VMware Workstation.
  - Fixed a potential application crash during operations on local VMware machines.
  - Fixed UAC notifications appearing in inactive user sessions during operations on virtual machines.
  - Fixed errors occurring during installation and uninstallation of wrapped MSI packages.
