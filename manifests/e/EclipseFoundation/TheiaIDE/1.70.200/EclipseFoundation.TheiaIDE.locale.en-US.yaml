  Breaking Changes:
  - [core] ended support for Node.js 20 #17079 - Contributed on behalf of STMicroelectronics
  - [core] extension host debugging in Electron #15686
  - [debug] BreakpointManager no longer extends MarkerManager. Calls to findMarkers(), setMarkers(), getMarkersByUri(), cleanAllMarkers() must use the new direct methods (getBreakpoints(), setBreakpoints(), getUris(), removeBreakpoints()) #17083
  - [debug] DebugSessionManager breakpoint proxy methods removed. Callers must use BreakpointManager directly #17083
  - [debug] DebugSession no longer maintains breakpoint state (_breakpoints, getSourceBreakpoints(), getFunctionBreakpoints(), etc.). All breakpoint state lives in BreakpointManager #17083
  - [debug] DebugBreakpoint.update() signature changed from update(data: DebugBreakpointData) to update(sessionId, data?). DebugBreakpointData type removed #17083
  - [debug] BreakpointMarker, BREAKPOINT_KIND, and the Marker import removed from breakpoint-marker.ts #17083
  - [debug] getBreakpoints() and getFunctionBreakpoints() now return readonly arrays #17083
  - [debug] BreakpointsChangeEvent<T> generic constraint changed from T extends BaseBreakpoint to T extends object #17083
  - [plugin-ext] raised compatibility to webview content #17117
  - [workspace] implemented user configurable search exclusion patterns preference #17011
  - [workspace, search-in-workspace, file-search] refactored some protected fields that can break subclasses as part of #16775:
    - SearchInWorkspaceResultTreeWidget: removed filesystemPreferences property (FileSystemPreferences), replaced by searchFilterService (WorkspaceSearchFilterService). The getExcludeGlobs method now accepts an additional useExcludeSettings parameter.
    - SearchInWorkspaceWidget: renamed includeIgnoredState to useExcludeSettingsState with inverted semantics (now enabled: true means exclusions are applied). Removed FileSystemPreferences injection, replaced by searchFilterService (WorkspaceSearchFilterService).
    - QuickFileSelectService: removed fsPreferences property (FileSystemPreferences), replaced by searchFilterService (WorkspaceSearchFilterService). Exclusion patterns are now provided via a new getExcludePatterns method.
