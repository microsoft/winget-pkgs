ReleaseNotes: |-
  一、全新手绘思维导图模式上线！
  告别千篇一律的冰冷框架，带你重温思维导图创始人东尼 · 博赞（Tony Buzan）笔下最自然、有机的思维绽放！
  我们为您带来了全新的【手绘模式】，让每一次灵感记录都成为兼具知识沉淀与高颜值的艺术创作。
  （1）功能入口：在产品首页左下角，点击【手绘模式】切换按钮，即可切换到手绘模式。
  （2）功能说明：您可以随时切换回【专业模式】，在手绘模式下产品界面会发生改变，创建的手绘思维导图文件是全新的文件格式。
  二、升级云笔记编辑体验
  1. 新增文本浮动快捷菜单，选中文字即可快速设置格式
  2. 输入 "/" 即可唤起快捷指令面板，标题、列表、表格等一键添加
  3. 支持将常用笔记固定到分屏页面，边看边写更高效
  4. 编辑器新增公式输入能力，学习笔记与技术文档中的公式表达更专业
  三、「AI 解析」功能入口搬新家
  原「AI 解析」入口已整合至首页左侧边栏-万兴脑图 AI。点击界面输入框旁的附件按钮即可上传并解析文件。支持自定义要求总结内容和持续对话。
  附件一键生成 PPT。万兴脑图 AI 支持上传 PDF、Word、Excel、图片等多格式文件，AI 自动提取内容并生成完整 PPT。调研报告、会议资料、课程文档都能快速变成演示文稿。

  四、AI 创作首页全新升级

  首页 UI 与 AI 创作入口优化，思维导图、PPT、文件总结等能力更集中，打开首页即可快速开始创作。
  新增扣点标准说明和附件上传引导，支持格式、文件大小、点数消耗等信息更透明，使用更放心。
  AI 对话中的历史输入支持一键复制，也可带回输入框重新编辑，常用提示词复用更方便。

  五、桌面端 AI 悬浮球上线

  新增桌面端 AI 悬浮球，支持随时唤起万兴脑图 Agent。划词后即可快速生成导图，灵感闪现即刻成图。

  六、搜索功能上新

  新增功能搜索，输入关键词即可快速找到并使用功能。
