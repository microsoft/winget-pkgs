ReleaseNotes: |-
  一、AI 导出：导出手绘脑图
  "对导出界面进行了升级，新增【AI 导出】，通过 AI 能力将您的思维导图一键变成手绘思维导图！
  功能入口：编辑完思维导图后，点击右上角的【导出 - AI 导出 - 手绘思维导图】；
  （1）方式 1：转为手绘格式，生成一个手绘思维导图文件，适合二次编辑；
  （2）方式 2：通过图像大模型能力，直接生成手绘脑图的图片，适合直接交付。"

  二、手绘模式：AI 艺术字
  在手绘模式中：输入文案或选中节点文案，即可一键生成更有设计感的艺术字，让导图重点内容更醒目。
  （1）顶部工具栏和节点快捷条均可快速唤起，选中节点后自动带入文案。
  （2）支持手绘涂鸦、国风书法、未来科技、可爱卡通、金属质感等多种风格。
  （3）生成结果可预览后插入画布，并支持重新生成、下载和历史复用。

  三、手绘模式：AI 智能背景
  在手绘模式中：新增「AI 智能背景」，可根据导图主题自动生成清新克制的手绘背景，让画布整体更统一。
  （1）在手绘模式中，选择「美化-画布背景」中即可生成并应用；
  （2）背景风格更轻量、留白更充足，适合承载手绘导图内容。
  （3）背景自动置底，不影响节点、连线、艺术字等内容的编辑。

  四、Agent 支持生成手绘导图
  Agent 新增「手绘导图」模式，输入主题即可生成创意手绘风格导图，灵感成图更快。
  （1）支持「专业导图」与「手绘导图」模式切换，满足不同表达场景。
  （2）手绘导图模式下提供提示词灵感和模板内容，创作更容易开始。
  （3）生成结果支持预览、缩放、拖拽和继续编辑。

  五、AI 对话支持同时上传多个文件
  一次对话可上传多份资料，AI 综合解析后生成思维导图、PPT 或看板，资料整理更高效。

  六、AI PPT 生成与编辑体验优化
  （1）PPT 大纲支持新增章节、添加要点、调整层级、拖拽排序、撤销与重做，优化快捷键显示。
  （2）PPT 模板支持收藏，常用模板可在「我的收藏」中快速使用。
  （3）生成前可选择页数范围，让 PPT 长度更符合使用场景。功能入口：首页  > 左侧导航栏 > 万兴脑图 AI > PPT 模式

  七、万兴脑图 AI 历史对话支持管理
  历史对话支持更完整的整理与查找，重要内容不再容易被淹没。
