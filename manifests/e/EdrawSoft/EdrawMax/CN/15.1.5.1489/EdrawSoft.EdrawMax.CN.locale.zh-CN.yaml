ReleaseNotes: |-
  云文件相关的优化
  1. 云文件支持直接在标签页处双击修改名字
  2. 支持设置为默认新建云文件
  3. 独立出云文件菜单入口

  网络图（弱电行业场景）相关的优化
  1. 支持直接导入机架图图形，并能自动吸附至软件内机架外框
  2. 支持设置在符号下方直接显示符号名称或提示
  3. 支持图片拖出的大小限制在一定范围内

  符号库相关的优化
  1. 自定义符号库支持创建自定义分组
  2. 支持对导出的符号库进行加密
