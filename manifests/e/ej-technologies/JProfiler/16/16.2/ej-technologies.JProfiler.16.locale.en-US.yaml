ReleaseNotes: |-
  New features:
  - Offline profiling can now be configured directly in the -agentpath VM parameter with common profiling settings and a complete automated recording sequence, without requiring a JProfiler config file, the controller API or jpcontroller
  - jpenable can now configure offline profiling with common profiling settings and a complete automated recording sequence, interactively or with command line options, without requiring a JProfiler config file
  - The Gradle and Ant profiling tasks can now configure offline profiling with common profiling settings and a complete automated recording sequence directly with task attributes, without requiring a JProfiler config file
  - MCP server: Made the profiling workflow more robust for weaker models and added support for the Antigravity AI coding tool
  - jpexport: Added a -maxEvents parameter for the ProbeEvents export to limit the maximum exported file size for huge event counts. The default is 100000
  - JPA/ Hibernate probe: Added support for Hibernate stateless sessions and Hibernate Data Repositories
  - Improved stack trace hints in the monitor views and for the thread creation stack trace
  - The embedded agent controller API can now be shaded into your application with the -Djprofiler. controllerPackage= [renamed package] system property
  Bug fixes:
  - JProfiler executables did not exit if the native profiling library could not be found
  - Fixed a memory leak in the frontend when recording probe events
  - Fixed a race condition when exporting probe events
  - Fixed a startup race condition in the MCP server
