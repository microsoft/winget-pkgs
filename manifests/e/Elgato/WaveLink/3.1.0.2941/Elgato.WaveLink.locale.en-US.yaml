ReleaseNotes: |-
  What's new in Wave Link 3.1?

  🎛️ More control over your audio effects
  You can now rename, copy, paste, and reorder your audio effects across channels and devices. Give each effect a name that makes sense to you, and your custom names will carry through to the Wave Link Stream Deck plugin so everything stays organized exactly how you set it up.

  🔇 Hide audio devices you don't need
  Monitors, webcams, and peripherals often bring extra audio inputs and outputs along for the ride. You can deactivate those unused devices directly within the app, removing them from your system-wide audio settings without digging through Windows Sound settings.

  🔌 Inline Boost Compatibility
  Using a Cloudlifter or FetHead in your signal chain? A new Inline Boost Compatibility toggle keeps the XLR input active and prevents the auto-mute behavior that can occur when an inline booster is detected. Find it in your device settings.

  Smarter app routing
  The "Add app to channel" dropdown now organizes apps into categories making it easier to find what you're looking for.

  Improved drag-and-drop
  Channel and mix reordering now has a clearer visual drag handle, making it easier to rearrange your layout.

  VST Audio Effect Plugin scan overhaul
  Plugin scans now show a progress indicator so you always know what's happening in the background. Broken plugins are handled gracefully without repeated crashes, and you'll be notified which plugins caused issues when the scan completes. Wave Link also warns you if your configured VST2 directory path looks non-standard before scanning begins.

  Wave Link updates won't reset your audio apps
  Wave Link no longer reinstalls the driver on every update — so apps like OBS Studio and Voicemeeter keep their audio device configuration intact. When an update does include a driver change, we'll give you a heads up.

  🐛 Bug Fixes and performance improvements
  - Last viewed tab - Wave Link will now remember if you were on the Mixer or Device view and open to that tab.
  - Device name tooltips - Long channel names now truncate with an ellipsis, and hovering over them reveals the full name.
  - Muted mix indicator - When an entire virtual mix is muted, the mix header now shows a visual indicator so it's always clear at a glance.
  - Double monitoring warning restored - The warning that appears when a Wave device is added to a currently monitored mix and the Mic/PC ratio is adjusted has been restored.
  - Better sleep/wake recovery - Wave Link recovers more reliably after your system wakes from sleep.
  - Wave Link は日本語に対応しました - If your system language is set to Japanese, Wave Link will automatically appear in your language.
  - Fixed a crash that could occur when a second Wave Link instance was launched before the first had fully started.
  - Fixed Wave Link failing to start when installed on a drive other than C.
  - Fixed the "Driver Issue" screen appearing in a loop even after running Repair Driver.
  - Fixed the Wave Link window opening behind other apps when launched from the system tray after a silent start.
  - Fixed output channel effects (Expander and Compressor) not saving their on/off state between sessions.
  - Fixed a crash that could occur when manually scanning VSTs in certain scenarios.
  - Fixed the output volume slider continuously drifting instead of staying at the set value.
  - Fixed the VST include/exclude direct monitor toggle for self-monitoring not working.
  - Fixed output volume resetting to 100% after restart on ARM64 devices.
  - Fixed firmware updates not starting on ARM64 devices.

