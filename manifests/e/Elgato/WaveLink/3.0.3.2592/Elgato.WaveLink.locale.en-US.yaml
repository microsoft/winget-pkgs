ReleaseNotes: |-
  What's new in Wave Link 3.0.3?
  This hotfix addresses further stability issues, including crashes when closing routed applications and a freeze related to audio device notifications.
  🛠️ Fixes & performance improvements
  - Fixed an issue where disabling a VST effect was not taking effect on Wave and external input channels
  - Improved stability when closing a routed application
  - Fixed a freeze that could occur when the volume or mute state of an audio device was changed outside of Wave Link

