ReleaseNotes: |-
  What's new in Wave Link 3.0.2?
  This release brings support for the all-new Wave Next lineup, a major update to the Wave Link Stream Deck plugin, and a wave of stability improvements and bug fixes to keep your audio setup running smoothly.

  🎙️ Introducing Wave Next — The future of creator audio starts here
  Wave Link 3.0 is the software backbone of Wave Next — built from the ground up to unlock everything the Wave FX Processor makes possible. Whether you're setting up the Wave:3 MK.2, Wave XLR MK.2, XLR Dock MK.2, or the all-new Wave XLR Pro, Wave Link 3.0 gives you full control over your hardware's Clipguard 2.0 protection, onboard DSP effects, , and VST Insert capabilities — all from one place.
  Pair it with a Stream Deck + XL and you've got hands-on control over your entire audio setup without ever leaving your workflow.
  Discover Wave Next
  Watch the Wave Next announcement

  🎛️ Updated Wave Link Stream Deck Plugin — Press and Hold for effects
  The Wave Link plugin for Stream Deck has been updated with a powerful new trick: press and hold. Assign any audio effect — like a voice changer — to a key and hold it down to activate it only while you're pressing. Release and you're instantly back to your normal sound. Perfect for those moments when you want a quick effect without committing to it.
  Get the Wave Link plugin for Stream Deck

  🔀 Smarter mixer, cleaner experience
  We've made a number of improvements to how the mixer behaves day-to-day. Output mix level meters now only show activity when audio is actively routed, apps within input channels are now sorted alphabetically, and inactive channels display more accurately than before. We've also improved handling for renamed devices so your custom names stick around the way you'd expect.

  🛠️ Performance improvements & bug fixes
  Stability
  - Fixed a crash when closing a routed application
  - Fixed a crash when adding a VST effect after reconnecting a device
  - Fixed a crash when allowing microphone access immediately after installing
  - Fixed a crash when connecting XLR Dock MK.2 if Wave XLR MK.2 was already set up
  - Fixed a crash after waking from sleep
  - Fixed a crash when using the main monitor volume slider on XLR Dock MK.1
  - Fixed the app not shutting down properly
  - Fixed a crash occurring after the driver installation step during onboarding
  - Fixed multiple Wave Link processes starting at the same time, causing routing and mixer conflicts
  - Fixed the background audio service crashing and restarting unexpectedly on some systems
  - Fixed a crash when adding an audio effect to an input channel
  - Fixed a crash when switching between active applications
  - Fixed a crash when output device configuration was updated
  Audio Routing
  - Fixed audio not being routed correctly after reconnecting a second Wave device
  - Fixed application input signal continuing to be routed after removal
  - Fixed Wave:3 not being detected after disconnect and reconnect
  - Fixed Wave Link being unable to add a Wave device after unplugging and deleting its channel
  - Fixed muting output volume on a Wave device not working
  - Fixed the monitoring device not working after a Wave Link restart
  - Fixed new mixes not appearing in the UI after opening via the tray icon
  - Fixed apps being routed to the wrong virtual device channel after being closed and reopened
  Audio Effects & VST
  - Fixed a VST effect remaining active after removal
  - Fixed VST insert for MK.2 devices sometimes becoming unavailable after reconnect
  - Fixed an inability to add audio effects to an unavailable Wave channel
  - Fixed the effect UI window not opening in the foreground
  Device-Specific
  - Fixed the device recovery screen not appearing for devices stuck in DFU mode after a failed firmware update
  - Fixed Clipguard toggle not working for legacy Wave devices
  - Fixed Clipguard always re-activating after restarting Wave Link
  - Fixed Wave XLR MK.2 headphone output not appearing as a monitor output option
  - Fixed the "Add microphone to a Mix" option missing for Wave XLR MK.2
  - Fixed Wave:3 being audible when adjusting the volume slider while muted in a mix channel
  - Fixed the High Power Mode toggle being inverted for Wave XLR MK.2
  - Fixed Wave XLR MK.2 input gain displaying as a float instead of a whole number dB value
  - Fixed firmware version displaying incorrectly in My Devices for Wave XLR MK.2
  - Fixed crackling audio in Wave Link 3.0
  - Fixed a Wave device reappearing after Wave Link restart when it should not
  Windows Driver
  - Fixed a memory leak in audiodg.exe
  - Fixed Wave Link driver update not properly uninstalling the previous driver
  - Fixed Wave Link driver update not working correctly on some systems
  - Wave Link now detects missing drivers and prompts you to reinstall them, instead of getting stuck on the loading screen
  - Wave Link 3 now repairs its driver if uninstalling Wave Link 2 removes shared components
  Sound Check
  - Fixed Sound Check recordings sometimes not being audible
  - Fixed Sound Check playback not stopping when navigating away from the device page
  - Fixed the Wave output device not being pre-selected after reconnect in Sound Check
  UI
  - Fixed external input device name not being displayed
  - Fixed the output level meter showing less signal than the input level meter
  - Fixed the virtual mix level meter continuing to show signal after muting or turning volume to zero
  - Fixed the "Start app at login" setting not syncing if changed via the OS
  - Fixed the firmware update progress popup not closing after completion
  - Fixed the "Check for plugins" button showing nothing when no VST plugins are installed
  - Fixed the loading screen getting stuck when a driver update was available on startup
  - Fixed mix channel name updating after the first character typed instead of when confirmed

