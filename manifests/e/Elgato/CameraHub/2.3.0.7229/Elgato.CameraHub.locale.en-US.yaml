ReleaseNotes: |-
  What’s new in Camera Hub 2.3?

  🎥 New Facecam 4K Firmware — Sharper, Cleaner, More Accurate Video
  Facecam 4K is getting a major firmware update, adding tint control and big improvements to image quality. The enhancements in firmware 2.49 include:
  - Improved 2D and 3D noise reduction resulting in less noise
  - Less motion blur
  - Better color accuracy (especially for red and pink)
  - Less noise in uniform colors
  - Better contrast
  - Improved overall sharpness
  - Increased target luma for grightness, fine tuned gamma
  - Reduced flatness and improved dynamic range in HDR
  - Enhanced facial details in both SDR and HDR modes
  We’ve also added manual Tint control. Alongside the existing white balance (orange/blue) adjustment, you can now fine-tune the magenta/green balance for even more precise color.
  Learn how to update your Facecam 4K firmware.

  Introducing Elgato Studio 2.0 Beta for Prompter
  We’re excited to introduce the next version of Elgato Studio, bringing an entirely new software experience for Prompter. Inside you’ll find a new script editor, a new Voice Sync engine, and studio operator view, all designed around your creative workflow. Available now for Windows and coming soon for Mac.
  Get the Elgato Studio 2.0 Beta today and let us know what you think on our Reddit megathread.

  🛠️ Improvements & bug fixes
  - Facecam 4K: the hardware revision now appears in the correct position in the Device dialog.
  - Facecam 4K: the USB transfer mode is now shown in the Device dialog for easier troubleshooting.
  - Facecam MK.2: fixed an issue where the 768x576 p30 and p60 video modes couldn’t be selected.
  - Prompter: fixed an issue where a display setting could silently stop working.
  - Added and updated localization across the app.
  - Fixed a crash that could occur when switching from one camera to another.
  - Fixed a crash that could occur in Voice Sync when no language could be detected.

  Want to share feedback on Camera Hub 2.3? Connect with us:
  - Leave a comment on our Subreddit
  - Chat with fellow community members on Discord
  - Hit up @elgato on X
  - Discover more on Explorer
  - Contact our Support Team
