ReleaseNotes: |-
  What’s new in Stream Deck 7.5?

  🖱️ Introducing CORSAIR NIGHTSWORD v2
  The NIGHTSWORD v2 WIRELESS SD is the first gaming mouse with a dedicated Stream Deck Launch Button. Launch your favorite game, access your go-to tools and take command of your setup with infinite options, always one button away.
  🔗 Discover NIGHTSWORD v2

  Improvements & bug fixes
  - This update includes a firmware update for Galleon 100 SD, with stability and performance improvements.
  - Stream Deck now only claims the keys on certain connected CORSAIR devices that have actions assigned to them. Keys without a Stream Deck action remain available for CORSAIR software to handle as intended.
  - When importing a profile, Stream Deck now clearly distinguishes when a required plugin version isn’t available on Marketplace — rather than showing a generic error message.
  - Resolved an issue where NIGHTSWORD v2 would stop appearing in Stream Deck after waking from sleep.
  - Resolved an issue where a NIGHTSWORD v2 could lose its Stream Deck connection when switching between wireless and wired modes.
  - (macOS) Resolved an issue where the “Open automatically at login” checkbox in Preferences could appear enabled even when macOS had blocked the app from launching at login.

  Want to share feedback on Stream Deck 7.5? Connect with us:
  - Leave a comment on our Subreddit
  - Chat with fellow community members on Discord
  - Hit up @elgato on X
  - Discover more on Explorer
  - Contact our Support Team
