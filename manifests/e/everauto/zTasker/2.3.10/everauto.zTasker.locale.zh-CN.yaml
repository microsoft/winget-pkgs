- 自动化
ReleaseNotes: |-
  新增：
  任务编辑，高级选项，增加热键、快捷短语触发时的条件处理
  工具栏按钮可以定制文字显示，用法：工具栏上点右键菜单或者选项->界面显示
  新增文件关联(.ztt 和.ztb 文件)，现在可以直接双击打开，如果在文件上点选右键，打开方式，zTasker 会排第一个。可在选项里查看定制，默认安装版已经注册，绿色版需自己注册
  图像->截图工具，增加可选的复制到剪贴板和保存到指定文件名功能
  主程序增加 recovery 参数，格式-recovery:ztb 文件名，用于恢复手动备份文件

  改进：
  数据->数据库->sqlite3 查询，可以自动处理 UTF8 编码的中文了
  热键选择鼠标方式时，如果选择修饰键->win 键，win 键不再弹出干扰操作
  拖放快捷方式时，自动新建的运行程序任务，现在可以获取工作目录了

  修复：
  复合任务，测试运行后，点击确定，一些任务参数比如热键丢失的问题
  复合任务里，子任务->运行程序，如果执行快捷方式，勾选捕获输出时，无法正确执行的问题
  自动触发，每年，按照日选择时，可能跳到下一年的问题

  其它细节、易用性改进修复
