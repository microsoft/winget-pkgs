- 快捷键
- 热键
- 自动化
ReleaseNotes: |-
  本版本在架构、稳定性、可靠近、易用性、界面多方面做了较大改善
  新增：
  **复合任务，UI 改进，增加调试运行功能
  *自动触发计划设置增加了热键开关，等同于内置分类中的->启用|禁用任务计划，现在更简便一些
  复合任务，高级选项，增加变量清理设置
  任务->提醒->任务栏通知，增加选项：“使用 zTasker 内置的通知系统”
  快捷短语，进程内有效，现在支持多个进程，支持部分匹配和通配符
  复合任务，变量判断里面的内容为数值时，作为对比的内容增加支持与变量对比
  任务->数据->字符串处理->分割字符串，增加返回分割后列表的长度

  改进：
  **变量展开可以处理嵌套了，比如：{var:{var:xxx}}这样的形式
  *日志系统全面改进，改善稳定性和性能
  *崩溃时如果出现错误报告，可以更可靠的自动重启主程序了
  任务->图像->屏幕截图，任意保存方式可以指定文件名了
  任务->图像->截图工具，仅允许同时运行一个，防止报错问题
  启动后如果任务文件出错，自动恢复机制更加智能，不再机械的询问

  修复：
  *绿色版弹框协议提示后，首次运行，提示加载资源文件失败的问题
  *任务->内置->启用禁用任务里，无法显示列表的问题
  *任务->文件分类中，几个功能无法显示 UI 的问题
  拖动选择窗口、颜色、区域等时的窗口残留和右键崩溃问题
  邮件监测，某些邮箱可能重复触发的问题
  内置->启用禁用任务计划，无法生效的问题
  当 zTasker 目录中包含空格时，后台方式执行 ahk 代码可能失败的问题
  复合任务列表的描述预览中，放置到的变量名称可能显示错误的问题
  复合任务如果有提醒弹窗正在运行，编辑窗口点确定时报错的问题
  一处内存泄露问题

  其它细节、易用性改进修复
