ShortDescription: 一键式效率倍增器
Description: |-
  zTasker 是一个自动化任务工具，不仅仅是定时或者热键，它可以采用多种触发方式执行多种自动化任务
  zTasker 的目标是用图形化的方式取代大部分自动化场景操作
  支持 100+ 种任务类型，30+ 种定时/条件执行方法
  任务列表随意编辑、排列、移动、更改类型，支持任务执行日志，支持任务列表等数据的备份
  支持任务日志，支持自动更新等
Tags:
- 任务
- 任务计划
- 定时
- 快捷键
- 热键
- 自动化
ReleaseNotes: |-
  新增：
  ****自动触发，增加邮箱监测类型，可以用做新邮件提醒工具 或者 可以发送特殊的标题邮件，触发与之对应的任务，用做远程遥控器
  **复合任务->导入任务，增加了导入复合任务功能
  **OCR 识别，支持返回文字的坐标到变量
  **复合任务->条件判断，增加端口开放判断
  任务->内置分类，增加启用|禁用任务热键
  任务->内置分类，增加启用|禁用任务快捷短语
  任务->输入分类，增加屏蔽键盘鼠标功能
  任务->提醒分类，挡屏休息，增加鼠标穿透选项
  任务->提醒分类，挡屏休息，增加提示文字字号和颜色设置
  任务->程序->运行程序，增加不重复运行选项
  任务->数据->字符串处理，增加生成随机数功能

  改进：
  **自动变量替换的环境变量，在系统新增或者修改环境变量时，可以立即生效了
  *在任务列表主界面时，按 Ctrl+F 可以聚焦搜索框
  *在任务列表主界面时，按 Ctrl+D 可以切换选中任务的收藏状态
  录制键鼠动作，点击开始录制时，增加是否清空原有内容询问
  改善了稳定性

  修复：
  新建|编辑任务时的搜索功能，失去焦点后，无法及时关闭的问题
  自动升级在某些电脑上可能无法自动启动新程序的问题
  窗口->设置窗口位置，移动窗口功能可能无法移动到其它显示器的问题
  显示->显示器亮度调节，特定的系统上无法调节的问题
  网络->翻译，翻译引擎连接失败后主程序可能崩溃的问题
  图像->截图，可能导致的崩溃问题
  网络->http 请求，返回空时，可能的崩溃问题
  其它可能的崩溃问题

  其它改进和修复
