ReleaseNotes: |-
  新增：
  任务->输入->文本输入，列表方式，增加列表框自动关闭可选项
  复合任务->对话框->列表框，增加显示位置选项

  改进：
  改善一些系统条件下的稳定性
  减小日志量，但任务的高级选项，选择了时间段限制时

  修复：
  自动计划，整点半点，任务可能执行两次的问题
  U 盘插入检测，卷标和序列号条件可能无法正确匹配的问题

  其它细节、易用性改进修复
