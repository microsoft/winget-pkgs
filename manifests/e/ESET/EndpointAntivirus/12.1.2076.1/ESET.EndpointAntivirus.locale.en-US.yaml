  ESET Endpoint Antivirus represents a new approach to truly integrated computer security. The most recent version of the ESET LiveGrid® scanning engine utilizes speed and precision to keep your computer safe. The result is an intelligent system that is constantly alert for attacks and malicious software endangering your computer.
