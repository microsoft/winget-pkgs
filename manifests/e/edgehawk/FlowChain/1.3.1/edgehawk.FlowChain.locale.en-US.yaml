ShortDescription: Sequential clipboard and keystroke auto-feed tool for Windows.
Description: |-
  FlowChain is a Windows resident tool for sending captured text to another app one line at a time. It is built for workflows where order matters, such as terminal commands, SSH/RDP work, QA form entry, SQL snippets, network device configuration, migration steps, and other repetitive operations that should not be pasted all at once.

  FlowChain can capture clipboard or selected text, split it into list items, track sent and unsent progress, lock the target window, use paste-based or literal keystroke delivery, send Enter or Tab after each line with AUTO ENTER, manage tabs, apply template variables, export send logs to CSV, and run as a portable Windows app.
