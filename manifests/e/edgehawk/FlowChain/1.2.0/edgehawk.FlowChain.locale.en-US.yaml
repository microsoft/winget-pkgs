ShortDescription: Sequential clipboard/keystroke auto-feed tool for engineers running SSH runbooks, RDP sessions, and legacy terminals.
Description: >-
  FlowChain is not another clipboard history tool - it's a sequential auto-feed
  tool built for engineers. Capture a block of multi-line commands or text
  once, then send it into a target window one line at a time, in order, on
  demand. Choose clipboard paste or literal keystroke delivery, so it still
  works over RDP/VNC and in environments where a normal paste doesn't reach
  the target. Visual sent/unsent tracking, target-window locking, up to 10
  tabs, and a global hotkey keep you focused on the terminal, not on
  FlowChain itself.
