ReleaseNotes: |-
  Features:
  - Opening a new tab now triggers the search modal.
  - Added inline code entry points to both the slash menu and the insert menu.
  - The AI Assistant can now create and update recurring tasks, as well as set or change reminders from natural-language requests.
  - The AI Assistant can now change the title of your note directly.
  - You can now turn selected text into a toggle title when creating a toggle.
  - Refreshed the highlight and callout color palette.

  Fixes:
  - Fixed a bug where printing a note on the web caused the AI Assistant pane to overlap the note.
  - Fixed a crash that could occur when switching accounts.
