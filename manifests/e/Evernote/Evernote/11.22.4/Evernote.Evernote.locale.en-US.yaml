ReleaseNotes: |-
  Features:
  - Inline Tags let you add tags directly within your note content. Type # to add them.
  - The AI Assistant can now list your notebooks, with clickable entries to jump directly to a notebook. The AI Assistant can also list your note reminders sorted by due time.
  - You can now hand off a live transcription to the AI Assistant during a recording to ask questions or get a recap of the conversation so far.
  - Adding a calendar event to an untitled note now automatically sets the note's title.

  Fixes:
  - Fixed a bug where note links created with @ did not open correctly in a new window.
  - Fixed a bug where text was duplicated in the task description editor when inserting a link with prefilled display text.
