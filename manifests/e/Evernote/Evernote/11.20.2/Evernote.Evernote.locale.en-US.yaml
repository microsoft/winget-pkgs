ReleaseNotes: |-
  Features:
  - You can now mention a notebook, stack, or space from a note using @
  - Note links in notes can be opened in a new tab with Cmd+Click.
  - You can now view your tasks grouped by Space

  Fixes:
  - Improved translations across all supported languages.
  - Fixed a bug where pressing Backspace when a table is selected wouldn't delete it.
  - Fixed a bug where copying notes with inline comments resulted in incorrectly pasted content.
  - Fixed a bug where audio recording failed when system audio was unavailable, now falling back to microphone-only.
  - Fixed a bug where note comments lost their position when reopening notes with tasks.
