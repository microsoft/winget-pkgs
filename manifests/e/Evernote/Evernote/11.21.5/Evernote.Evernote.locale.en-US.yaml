ReleaseNotes: |-
  Features:
  - Introducing AI Prompts, where you can create custom prompts from an empty note, selected text, during an audio recording, or after a transcription.
  - A new floating inline toolbar that appears while editing.
  - Redesigned audio recording experience with two modes: Meeting recorder and Voice note, designed for different use cases.
  - You can now view a live transcription in a floating, draggable panel while recording.
  - You can now dictate directly into a note and have your speech converted to text.
  - Rich text editing for task descriptions with headings, bold, italic, underline, strikethrough, lists, and links.
  - Mention people in notes using the Insert menu, slash menu, or by typing @.
