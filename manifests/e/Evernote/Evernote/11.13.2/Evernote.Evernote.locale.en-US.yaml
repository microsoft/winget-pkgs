ReleaseNotes: |-
  Features:
  - Pin and unpin tabs.
  - Images can now be wrapped in text.
  - AI Assistant usage now only applies to total monthly usage and no longer includes chat usage.
  - AI Assistant can now manage your tags: create, rename, delete, and remove from notes.
  - Specify a time range when transcribing audio attachments.
  - Create and link a new note directly from the @ note picker, or with a keyboard shortcut (⇧⌥⌘N on Mac, Ctrl+Alt+Shift+N on Windows).
  - YouTube live stream URLs now display as embedded previews.
  - Typing **text** or *text* and pressing Enter now automatically formats it as bold or italic.

  Fixes:
  - Fixed a bug where the Tasks Kingdom wasn't refreshing.
  - Fixed a bug where applying filters while searching in a notebook triggered a new search.
  - Fixed a bug where tag nesting wasn't available in Team accounts.
  - Fixed a bug where recordings and transcription may fail.
  - Fixed a bug where moving the data folder would cause an error.
