ReleaseNotes: |-
  Features:
  - You can now access your Table of Contents from within in your note!
  - The AI Assistant can now create and update tasks, including due dates, priorities, descriptions, and flags;
  - Customize the AI Assistant icon from the Settings page;
  - Use a keyboard shortcut to create new linked notes;
  - Enjoy an improved YouTube rich link preview with multiple size options;
  - Insert quote blocks inside table cells;

  Fixes:
  - Fix note editor becoming readonly after navigating away and back to Notes view;
  - Fix first note in list not being selected after returning to the notes list;
  - Fix tasks search: clearing the search box after navigating away and back now correctly shows all tasks again.
