ShortDescription: A lightweight, native Markdown viewer for Windows with live reload and syntax highlighting.
Description: |-
  PrettyMark is a native Markdown viewer for Windows built with .NET 8 and WebView2.
  Features include GitHub-flavored Markdown rendering, syntax highlighting, live reload
  on file save, dark mode, multi-tab support, drag and drop, find bar, print support,
  and multi-language UI (12 languages).
