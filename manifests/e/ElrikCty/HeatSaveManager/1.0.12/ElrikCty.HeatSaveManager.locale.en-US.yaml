ReleaseNotes: |-
  Highlights
  - Added themed dropdowns across the main profile flows, so profile switching, save destination selection, import/export, diagnostics, and delete actions now match the app UI instead of falling back to native system menus.
  - Improved profile deletion so the active profile can be deleted safely after choosing which remaining profile should become active next.
  - Updated the Winget manifest workflow to publish the standard installer package instead of the old portable-style distribution.
