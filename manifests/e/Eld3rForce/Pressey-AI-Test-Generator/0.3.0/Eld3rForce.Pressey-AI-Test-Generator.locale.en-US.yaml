Description: |-
  Pressey is a desktop app that turns a topic, a document, or a webpage into a practice test you can edit, take, and save. Pick the AI service you already use, choose how many questions you want, and Pressey writes the questions, grades your answers, and exports the result as a PDF. Everything you create stays on your computer.

  Features:
  - Works with the AI you already use. If you have an account with OpenAI, Anthropic, Google Gemini, or you run a local AI on your computer, Pressey works with it.
  - Build a test from anything. Type a topic, upload a file (.txt, .md, or .pdf), or paste a URL. Pressey reads the source and turns it into questions.
  - Edit anything before you save. Every question, answer choice, model answer, and explanation is editable in place.
  - Show answers when you're ready. A "Show Answers" button reveals the model's answer and explanation for each question on demand.
  - Take a test, leave, come back. Your in-progress answers are saved automatically.
  - Smart grading for short answers. Short-answer questions are graded against the model answer using AI similarity.
  - Export to PDF. Save the finished test (with or without an answer key) as a PDF in one click.
  - Everything stays on your computer. All your tests and answers are stored locally.
  - Customize the AI's personality. Pick a tone, add custom instructions, and optionally let the AI search the web for fresh material.
  - You control the difficulty. Pick the number of questions (1 to 50), choose the mix of multiple-choice vs. short-answer, and set the difficulty to Easy, Medium, or Hard.
