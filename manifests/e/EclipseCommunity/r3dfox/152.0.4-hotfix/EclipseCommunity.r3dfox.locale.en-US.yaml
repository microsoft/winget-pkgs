ReleaseNotes: |-
  Not required but highly recommended.
  After installing this release go to about:support, and click the Clear startup cache... button.

  Please read
  Hello, one of my friends, known as Tech Stuff or teknixstuff has had financial troubles recently, and needs donations so he can keep a roof over his head and have food to eat. If you have any spare money, please donate it to him, he would appreciate it. Click this paragraph to see the methods to donate.
  Paypal - https://www.paypal.com/donate/?hosted_button_id=5S4JFGA9FM9UC
  Arrives instantly, generally the best and most available option.
  Buy me a coffee - https://buymeacoffee.com/teknixstuff
  Takes days to arrive, uses stripe as their payment processor.
  Remitly - https://www.remitly.com/
  Arrives up to 2 hours, small fees.
  GoCardless - https://teknixstuff.com/Network/GoCardless/
  Shouldn't require a debit/credit card to use. limited country support.
  Ads - https://teknixstuff.com
  There are ads on the website, if you cannot afford to donate at this time, you can help out simply by just disabling your adblocker.

  Release notes
  Join the Eclipse Community Discord server!
  https://discord.gg/ecx
  The portable builds are fully portable, the profile directory is inside the browser folder. It does not touch appdata at all.
  Requirements to use the browser on a given OS:
  Vista: Service Pack 2 + KB971644 Platform Update
  7 RTM/SP0 and later: Should just work.
  Notable bugs:
  The 32 bit build is built with --disable-sandbox. With the sandbox enabled under Vista, the browser fails to open multiple processes which breaks the browser. The 64 bit build is fine. Considering Mypal68 globally disables the sandbox, I don't think it's that bad. If this really is a big issue then please pr a fix.
  Cairo/GDI backend ignores system cleartype settings and causes crashes on older versions of Windows and crashes without e10s.
  New r3dfox specific changes in this build:
  Missing native titlebar fix, #177. Thank you @IS4Code for the fix.
  Removed missing calls from other javascript files that were resulting in useless warnings.
  Previous 152.0.4 release notes:
  Same as Plasmafox 153 due to me just being too busy to really add too much. Had some time to quickly make this and went for it. Maybe new 140 ESR soon idk.
  Release notes from Plasmafox 153.0a1:
  Fixed theme colors not being applied to some pages or buttons in the browser.
  Menu accuracy improvements.
  Renamed two preferences to be a bit more generic for forks for people wanting to use them in other projects, (Restore classic View Image context menu options) r3dfox.view.image -> browser.menu.viewImage, and (Use the classic about:config page) r3dfox.ui.oldaboutconfig -> browser.ui.oldaboutconfig. This does mean these options will be reset, so you will have to reapply your preferences for them if you changed them.
  New, darker private mode background color.
  Mostly just backend changes and making sure stuff works more properly for this release.
  Haven't tested on XP (OCAPI) nor have I extensively stability tested.
  Please let me know what bugs or issues you encounter with it.
