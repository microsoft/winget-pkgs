ShortDescription: 终极投资追踪器
Description: |-
  Delta 是一款投资追踪应用，可帮助您在一个地方查看所有已投资的项目。

  由 eToro 推出的 Delta 是下一代投资追踪工具。它专为希望清晰掌握整体投资组合情况的投资者打造，即使您的投资分散在不同资产类型和多个平台，也能轻松实现统一管理。

  Delta 支持广泛的各类投资，包括：
  - 加密货币
  - NFT（非同质化代币）
  - 股票和基金
  - 外汇货币及指数
  我们的目标非常简单：只要是有价值的投资，我们都希望您能在 Delta 上进行追踪。

  全面的投资组合概览
  Delta 不仅帮助您了解自己拥有哪些资产，还能清晰展示投资的分布情况。您可以按资产类别查看投资组合构成，将所有资产合并查看，或专注于特定部分的细节。

  无论您投资个股、跟踪主要指数、持有加密资产，还是混合多种资产类型，Delta 都能将所有信息整合成一个简洁明了的视图。

  Delta 适合哪些人使用？
  Delta 专为以下人群设计：
  - 在多个平台拥有资产的投资者
  - 希望获得洞察而不愿手动管理电子表格的人
  - 长期投资者以及活跃的市场关注者
  Delta 并不会取代您的投资平台，而是为您提供跨平台的清晰视角与全局洞察，帮助您全面掌握自己的整体财务状况。
