ReleaseNotes: |-
  We are glad to announce the immediate availability of Help+Manual and Translation Assistant v10.2. This update includes an important bug fix for secondary TOCs, LibreOffice compatibility and an update of the DeepL plugin.
  Help+Manual 10.2 Changes
  - Secondary TOCs: when a project was refreshed (in multi-user mode or after synchronize from VCS), new secondary table of contents created by other users did not show up. It was required to close the project and re-open it again to make the new TOCs visible.
  - Secondary TOCs: the source XML file names for secondary TOCs are no longer enumerated, but created with a unique file name ID.
  - Topic Editor / Program Options: the setting for editor ruler units has a 5th option: NONE/HIDE to hide the ruler completely.
  - Paste image from clipboard: the suggested screenshot name no longer includes a number or the username, it follows a naming convention of date+time, similar to the naming of screenshots on macOS.
  - Webhelp Export: Sitemap now has a more detailed <lastmod> entry that includes a UTC time stamp.
  - DOCX / Word Export: full compatibility with LibreOffice.
  - Robohelp Import: error when importing old-style keyword index fixed.
  - Close project: when pressing the ESC key in the “Do you want to save” dialog, the dialog took this as a “no” instead of “cancel”.
  - Insert Variable: OK button was initially enabled despite no variable was selected.
  - ChatGPT Plugin: attaching .TXT files did not work.
  - DeepL Plugin: several new languages implemented, including Croatian, Serbian, Bosnian, Maltece, Irish, Swiss German and a dozen more.
  - SnipSVG 2.2 included (features OCR in Windows 10/11).
  Translation Assistant 10.2 Changes
  - ChatGPT Plugin: attaching .TXT files did not work.
  - DeepL Plugin: several new languages implemented, including Croatian, Serbian, Bosnian, Maltece, Irish, Swiss German and a dozen more.

  All updates are available from our download page.
