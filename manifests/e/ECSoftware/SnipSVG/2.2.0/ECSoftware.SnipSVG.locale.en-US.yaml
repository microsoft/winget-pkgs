ShortDescription: Free Screen Capture and Image Editing Utility.
Description: |-
  SnipSVG is a screen capture and graphics editor that uses SVG vector images as its primary format.
  SVG images can be used directly in HTML and many other applications. They give you the same sharp quality at all zoom settings, and unlike JPG or PNG images you can always edit all the elements of the image separately.
