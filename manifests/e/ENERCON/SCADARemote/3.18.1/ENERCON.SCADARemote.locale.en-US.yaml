ShortDescription: Real-time Communication with your Wind Farm
Description: The ENERCON SCADA Server is the central component of the ENERCON SCADA system and is connected to the wind turbines via the wind farm's fiber optic data bus system. It fulfills a variety of functions with regard to communication, data recording and control in the wind farm. With the ENERCON SCADA Remote software solution, you have the option of establishing a secure connection to the ENERCON SCADA server of your wind farm. This allows you to retrieve real-time information as well as historical data.
