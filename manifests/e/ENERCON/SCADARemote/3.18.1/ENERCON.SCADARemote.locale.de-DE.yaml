ShortDescription: Echtzeit-Kommunikation mit Ihrem Windpark
Description: Der ENERCON SCADA Server ist die zentrale Komponente des ENERCON SCADA Systems und über das Lichtwellenleiter-Datenbussystem des Windparks mit den Windenergieanlagen verbunden. Er erfüllt eine Vielzahl von Funktionen hinsichtlich Kommunikation, Datenaufzeichnung und Steuerung im Windpark. Mit der Softwarelösung ENERCON SCADA Remote haben Sie die Möglichkeit, eine gesicherte Verbindung zum ENERCON SCADA Server Ihres Windparks herzustellen. So können Sie Echtzeit-Information als auch historische Daten abrufen.
