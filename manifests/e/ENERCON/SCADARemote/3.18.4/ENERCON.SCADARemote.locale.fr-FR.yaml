Description: L’ENERCON SCADA Server (serveur ENERCON SCADA) est le composant central du système ENERCON SCADA. Connecté aux éoliennes via le système de bus de données à fibre optique du parc éolien, il assure de nombreuses fonctions en matière de communication, d’enregistrement des données et de commande du parc éolien. La solution logicielle ENERCON SCADA Remote vous permet d’établir une connexion sécurisée avec l’ENERCON SCADA Server (serveur ENERCON SCADA) de votre parc éolien. Vous pouvez ainsi accéder aux informations en temps réel ainsi qu’aux données historiques.
