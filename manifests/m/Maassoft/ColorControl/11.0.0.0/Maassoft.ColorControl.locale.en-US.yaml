ReleaseNotes: |-
  General
  - updated to .NET 10. Be sure to install the new .NET 10 runtimes: .NET Desktop Runtime 10 and .NET ASP.NET Core Runtime 10
  LG controller
  - added new device setting for webOS 26 compatibility (#576). Toggle the checkbox "Enable webOS 26 compatibility" to enable this functionality (default it is off and legacy handshake is performed to prevent reduced functionality on older webOS)
  Samsung controller
  - improved service menu wizard:
    - changed delays between buttons
    - opening the 'Advanced' part now requires you to first manually navigate to the item
    - closing the service menu should now be more reliable (sending FACTORY-button 2 times in a row too fast won't stop the full screen color slides)
  New UI
  - default UI is reverted back to WinForms UI
  - the new UI now runs in a separate process (ColorControl.UI.exe)
  - summaries will now automatically refresh when the (embedded) browser regains the focus
