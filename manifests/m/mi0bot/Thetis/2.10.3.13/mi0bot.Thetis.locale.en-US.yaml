ShortDescription: Updated Thetis with support for Hermes Lite 2 functionality
ReleaseNotes: |-
  This is the final release of v2.10.3.13 of Thetis for the HL2.

  Updated to release status

  This release will require an update of the database by holding the Ctrl key while booting. Backup
  your database first.

  See details of official release of v2.10.3.13 - https://www.youtube.com/watch?v=LQlAEiWw3h4

  NB - The legacy spot support and code has been removed as it was not being maintained as had many
  issues. Use a 3rd party app via TCI such as Cluster-TCI-Bridge by OE3IDE to provide spots to the
  spectrum

  This release contains the database manager. If you have other Anan radios, this release will work with them, but you must define separate databases and select the correct database with the -dbid:
  option. This release creates the shortcut with -dbid:HL2. As the official release of Thetis for
  the Anan series of radios is not HL2 aware, there may be issues if you try to use the official
  Thetis with a database that is HL2 aware. Please back up your databases.

  There is no need for the official Thetis release to be installed before this release. If you have
  the official release installed, this release will not overwrite it.

  No warranty or guarantee, use at your own risk. Do a backup of your current Thetis database just in
  case and ensure correct power output.
