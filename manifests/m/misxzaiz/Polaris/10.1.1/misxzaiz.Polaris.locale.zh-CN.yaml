  Polaris 10.1.1 发布说明
  本次发布包含 Tauri 桌面端 + Web 独立服务双端产物。
  优化与变更
  - a542f522 chore: release v10.1.1
  - 151afbbc fix(git): 采用 AI 提交建议时去除首尾空白
