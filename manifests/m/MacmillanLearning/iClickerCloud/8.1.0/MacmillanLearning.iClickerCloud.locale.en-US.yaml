ReleaseNotes: |-
  - NEW Core Feature Management Upgrade: Modernized the application’s infrastructure by migrating to a unified feature management platform, removing dependency on a legacy SDK.
  - NEW Late Attendance Tracking: Added native support for displaying check-in times and LATE status in the class roster view.
  - NEW Accessibility Enhancements: Improved keyboard navigation, focus indicators, and screen reader compatibility across multiple in-class elements, including the Results Chart, open tools menu, and session-resume screens.
  - FIXED Screen Capture: Resolved an issue where the screen capture selection tool was unable to properly handle specific multi-monitor setups, and implemented a one-second timeout when selecting application windows to prevent intermittent desktop app freezes.
  - FIXED Sleep Connection Recovery: Improved connection recovery following a Mac sleep event, ensuring the Results Chart continues to update in real-time upon waking.
  - FIXED: Quiz Short Answer Grading: Resolved an issue where grading a short answer question for a pre-created quiz during class caused the application to crash.
