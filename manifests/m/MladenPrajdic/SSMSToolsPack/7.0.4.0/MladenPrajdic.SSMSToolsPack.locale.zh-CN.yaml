ShortDescription: 一款 Microsoft SQL Server Management Studio (SSMS) 的插件扩展，通过高度集成且易于使用的功能显著提升您的工作效率。
Description: |-
  SSMS Tools Pack 是一款 Microsoft SQL Server Management Studio (SSMS) 的插件扩展，通过高度集成且易于使用的功能显著提升您的工作效率。
  功能
  - 常用连接：保存连接以便未来一键快速打开编辑器窗口或连接到对象资源管理器。
  - 对象资源管理器自定义文件夹：在对象资源管理器的任意位置添加自定义文件夹；在可能的情况下还可按架构优先进行分组。
  - 列数据统计：根据结果网格中各列的数据类型，提供多种数据统计信息。
  - 连接着色：基于服务器/数据库名称或正则表达式，为已连接的窗口、对象资源管理器及“已注册服务器”工具窗口设置颜色。
  - 导出到 Excel：将结果集、一个或多个表乃至整个数据库导出为 Excel 文件。
  - SQL 编辑器增强：包括展开 SELECT *、在光标处运行脚本、防止意外数据破坏等编辑器改进功能。
  - 格式化 SQL：将对象名称转换为大写、小写或适当大小写，并在 SQL 脚本末尾添加分号。
  - SQL 历史记录：将查询或窗口历史记录安全地保存在本地文件或数据库中。
  - SQL 代码片段：通过您自定义的快捷键，随时访问常用的语句片段。
  - 搜索数据库、表、视图中的数据：凭借强大的过滤功能，在一个或多个数据库、表和视图中搜索数据。
  - 执行计划分析器：分析执行计划并提出可能的优化建议。
  - 脚本数据生成器：从结果集、表或数据库生成 INSERT 语句，并从选定的结果集单元格生成 CSV 文件。
  - 在多目标上运行脚本：在同一服务器的多个数据库上运行单个脚本。
  - 全局替换文本：在四项不同功能中为您的脚本添加自定义替换文本。
  - 新建查询模板：使用您选择的模板自定义“新建查询”窗口。
  - 复制执行计划到剪贴板/文件：将一个或所有执行计划复制到剪贴板或保存为文件。
  - 网格模式下的搜索结果搜索：在查询的结果集中进行搜索。
  - 区域与调试段落：向代码中添加区域和/或调试段落。
  - 从对象资源管理器运行自定义脚本：从对象资源管理器中选定的节点运行自定义脚本。
  - CRUD 存储过程生成：快速为整个数据库或单个表生成 CRUD 存储过程。
  - 其他次要功能：不属于主要类别的其他小型功能。
