ShortDescription: ModMii is a tool to help you modify ANY Wii
Description: |-
  - ModMii is able to download all the files needed to modify ANY Wii, WiiU or vWii; it can generate
    custom guides based on your console's specifications, and save the files in their appropriate
    locations for easy offline softmodding where possible. Sample guides for illustrative purposes only
    are available HERE.
  - It is also capable of performing many other Wii\vWii hacking functions like setting up a usb-loader
    and creating an emulated NAND. ModMii was also the very first official installer for the widely
    adopted d2x cIOS.
  - Even if your Wii's SD Card reader is broken or you just don't have an SD Card, you can use a Hard
    Drive formatted as FAT32 in place of an SD Card to complete the majority of ModMii's functions (SD
    Card notably required for Bootmii and making a NAND backup). In fact ModMii can help users softmod a
    Wii even without an SD Card or Hard Drive (as long as it has internet), but unless one or the other
    is eventually incorporated there probably isn't much point.
  - ModMii only works on Windows, and ModMii v8.0.0 and higher requires 64-bit Windows 8.1 or later. If
    you do not have a Windows PC and are unable to run ModMii you can try running Windows in a virtual
    machine or just use wii.hacks.guide or wiiu.hacks.guide instead.
