ReleaseNotes: |-
  - If ModMii were a car, this update would be topping off the windshield washer fluid and wiping down
    the dashboard.
  - Switched to a self-compiled version of UWUVCI so that ModMii can provide free updates.
  - Added BlueMii to Download Page 2, thanks Zarithya!
  - Updated bundled version of WiiPy which fixes a bug when collecting info on cIOS WADs. Thanks
    NinjaCheetah!
  - Worked with the Homebrew App Store team to resolve issues with their database (repo.json &
    repo.summary) that were leading ModMii to report some apps were older or newer than the latest
    official release when in-fact they were up to date. Issue impacted only about 20 apps in the HBAS
    WiiU library, most of which are not used by ModMii's core features\wizards. ModMii now also
    retrieves HBAS' database from wiiu.cdn.fortheusers.org instead of wiiubru.com.
  - Improved ModMii's legacy cIOS construction mode to avoid using WiiPy to unpack WADs; only relevant
    for users running older\unsupported versions of Windows allowing them to build cIOSs (provided
    that they already have base IOSs cached).
  - Updated download link for Open Shop Channel from oscwii.org to github.com.
  - Fixed TinyWiiBackupManager download by aligning with new releases' naming convention; also
    adjusted it to install portably.
  - Fixed Aroma update checks and removed PayloadLoaderInstaller.wuhb from CleanList.
  - Other minor changes.
