  Publisert 24.03.2026

  Høydepunkt

  - Versjonen inneholder en rekke feilrettinger og forbedringer for årets skattemelding

  Eiendom
  Vi har utbedret et oppdaterings/visningsproblem som kunne oppstå ved bytting av fastsettelsesmetode for eiendom.

  Vannkraft
  Det er lagt til mulighet for henting og innsending av produksjonsdata fra Elhub. Les mer her.
  Skatteetaten har oppdatert listen for vannkraftverk med flere løpenumre.

  Landbasert vindkraft
  Det er lagt til mulighet for henting og innsending av produksjonsdata fra Elhub. Les mer her.

  Diverse feilrettelser
  Vi har utbedret en feilmelding som gjorde seg gjeldende dersom det ikke var valgt anvendelse på Resultatregnskap eller Balanse i rapportgeneratoren. Feilen kunne medføre at enkelte datasett ble lukket ved åpning, eller at man ikke fikk åpnet Kontroll av data.
  Vi har også gjort forbedringer i lagring av enkelte filer som benyttes av Maestro årsoppgjør.

  Kontroll av data
  Kontrollen mellom nedlastede A-meldingsoppgaver og beløp i lønn og pensjonskostnader, slo i noen få tilfeller ut i en advarsel selv om man ikke hadde lastet ned A-meldinger i inneværende år. Dette er nå fikset.

  Analyse
  Fikset et problem ved import av analyseoppsett fra et datasett til et annet.
