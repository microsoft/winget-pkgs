ReleaseNotes: |-
  Publisert 22.04.2026

  Høydepunkter

  - Det er klargjort for årsskifte fra denne versjonen
  - Det er lagt inn funksjonalitet for avstemming av skattetrekk og skyldig skattetrekk

  Generelt om denne versjonen

  Regnskapsdokumentasjon og avstemming
  I denne versjonen er funksjonalitet for avstemming av skattetrekk og skyldig skattetrekk gjeninnført, etter å ha vært utilgjengelig som følge av endringer i avstemmingsrapporter fra A-ordningen (A-07) og endring av opplegget rundt avsetting av skattetrekk og betalingen av denne.
  Avstemmingen baseres fortsatt på nedlasting av A-ordningsoppgaver, men det er nå krav om å knytte betalinger til lønnsdato for å kunne kontrollere at skattetrekk er innbetalt til riktig tid. Løsningen gir dermed grunnlag for å verifisere både korrekt beløp og rettidig betaling.
  Som tidligere overføres summen av skattetrekk for siste termin til hovedsiden for avstemming. For kontroll av kontosaldo må det foreløpig registreres en manuell linje for betaling, eller hente betalingsbilaget fra regnskapet dersom man bruker regnskapsintegrasjon, for å kunne kontrollere en ev. differanse. Da vil man få avstemt saldo på konto.

  Verdipapirregisteret
  Skattemessige formuesverdier, Verdipapirfond har fått et eget formuesvalg for aksjefond der det kan angis at fondets eiendeler kun er investert i aksjer. Dersom denne settes PÅ vil formuesverdien flyttes fra Andre verdipapirer til Aksjer i formuesoppstillingen, verdiene vil da behandles på samme måte som aksjer i forhold til bl.a. verdsettingsrabatt.

  Vannkraftverk - Deltakermelding og deltakers andel
  Grunnrenteinntekt rapporteres nå før samordning i deltakermelding og deltakers andel. Skjermbildet har derfor fått to felter både i deltakerregister og i deltakers andel, den positive og den negative grunnrenteinntekten før samordning.

  Avskrivninger
  Ved avvikling tillater vi nå at det fradragsføres mer enn 20% av saldoen på gevinst- og tapskonto.

  Skattepliktig inntekt
  Skatteetaten har nå gjort en endring, slik at “Underskudd som kreves tilbakeført til tidligere inntektsår“ nå påvirker sum underskudd til fremføring i deres beregning. Vi har tilpasset dette hos oss og flyttet feltet inn i beregningen av underskudd til fremføring. Verdien vises også i tabellen for fremføring av underskudd fra tidligere år. Videre er feilen som gjorde at tabellen for fremføring av underskudd låste deg i enkelte datasett, nå løst.

  Import av fjorårstall
  Import av fjorårstall fra fjorårets skattemelding (funksjonalitet tilgjengelig fra klientopplysninger) er nå oppdatert for inntektsår 2025.

  Merket utskrift
  Utskrift av Ytelser er gjort tilgjengelig fra Merket utskrift selv om den kun inneholder nullverdier.

  Programmodus
  Skjermbildet til disponeringer er forbedret for Kun offentlig regnskap. Disponeringen påvirkes ikke lenger av skalering dersom dette er valgt i offentlig regnskap. Disponeringene fremkommer nå på riktig måte.

  Ytelsesforbedringer
  Det er gjort en del arbeid for å forbedre ytelsen i datasett med svært mye data. Disse vil kunne merke forbedringer i åpning og lukking av enkelte skjermbilder, samt import og eksport.
