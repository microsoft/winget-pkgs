ShortDescription: Maestro Årsoppgjør er komplett utstyrt med likningspapirer, skatteberegning og noter.
ReleaseNotes: |-
  Publisert 18. juni 2026

  Høydepunkter

  - Systembruker er nå implementert i Maestro årsoppgjør. Systembruker må opprettes for innsending av Aksjonærregisteroppgave, samt nedlastning av A-meldingen, og det vil senere komme mer funksjonalitet som krever bruk.
  - Kunder og leverandører er nå tilgjengelig i årsoppgjør.

  Generelt om denne versjonen

  Øvrige innsendinger
  Aksjonærregisteroppgaven er lagt til i veiviser for innsendelse i Altinn 3. Dette er samme veiviser som Offentlig regnskap sendes via. Skatteetaten har fjernet signeringssteget for Aksjonærregisteroppgaven. Innsendinger vil sendes direkte til Skatteetaten, uten å gå via Altinn. Maestro jobber med å lage en løsning for klientsignering via Maestro Varde, men dette vil bli klart i en senere versjon.
  Innsending via gammelt forsendelsesbilde er skrudd av, det samme er funksjonaliteten i skjermbildet Dokumenter fra Altinn. De utgåtte skjermbildene er fremdeles tilgjengelig i programmet for å gi tilgang til innsendinger som allerede er foretatt for inntektsåret, og dokumenter som allerede er hentet.

  Kunder og leverandører
  Kunder og leverandører er nå tilgjengelig i årsoppgjør. Valget aktiveres i klientopplysninger i fanen for andre opplysninger.

  Eiendommer og anleggsmidler
  Eksport av prognose til Excel er forbedret. Kolonneoverskriftene er mer intuitive og det er større grad av overlapp mellom utskrift og eksport.

  Deltakermelding
  Under knappen Innskudd/uttak har vi rehabilitert valget som ligger under Andre funksjoner som handler om å fordele beløp på deltakerne. Denne fungerer nå slik den skal.

  Rentebegrensning
  Alle felter tilknyttet rapportering av konsernbidragskjeder er nå skjult for Selskapsmelding etter at Skatteetaten konkluderte med at disse feltene ikke er aktuelle for SDF. Følgelig skal ikke SDF som inngår i konsern lenger opplyse om hvilket foretak i konsernet som rapporter konsernbidragskjeder på vegne av konsernet.

  Verdipapirregister
  Varsel ved import dersom importfilen nærmer seg eller overskrider kapasitet for innlesning.

  Klage på skjønnsfastsetting
  Selskaper som har avviklet i 2025 og blitt skjønnsfastsatt, kan nå velge både forhåndsfastsetting og klage på skjønnsfastsetting som innsendingsformål i klientopplysninger.

  Årsskifte
  Årsskifte for selskaper med skatteplikt for formue er forbedret. Alle verdier som inngår i beregningen av formue blir nå med ved årsskifte.
  Det er også gjort en endring slik at innsendingsformål tilbakestilles til egenfastsetting ved årsskifte.

  Personregisteret
  Logikken som beregner fødselsdato til personer registrert i personregisteret er forbedret.

  Regnskapsdokumentasjon og avstemming

  A-melding og Merverdiavgift
  Åpnet opp for nedhenting av A-meldingen og merverdiavgift fra Altinn3.
  Nedlastning av A-melding krever opprettelse av Systembruker.

  Avstemming av skattetrekk
  Vi har nå utvidet denne slik at man nå også har mulighet til å avstemme bokført skattetrekk mot hva som er sendt inn via A-ordningen. Dette vil fremkomme som en egen tabell inne i A-ordningsbildet.
  Som tidligere overføres summen av skattetrekk for siste termin til hovedsiden for avstemming. For kontroll av kontosaldo må det foreløpig registreres en manuell linje for betaling, eller hente betalingsbilaget fra regnskapet dersom man bruker regnskapsintegrasjon, for å kunne kontrollere en ev. differanse. Da vil man få avstemt saldo på konto

  Utskrifter
  Det har i de siste versjonene blitt lagt til flere nye avstemmingstyper. Disse avstemmingene har nå fått egne utskrifter:
  - Avstemming av kostnadsført AGA
  - Kontroll av AGA grunnlag
  - Avstemming av skyldig AGA av skyldig FP
  - Avstemming av feriepenger
  - Kontroll av kundefordringer
  - Kontroll av leverandørgjeld
  - Kontroll av MVA-koder
  - Kontroll av spesielle transaksjoner

  Vi har også fikset et problem hvor sum i utskriften linjevis avstemming enkelte ganger ikke stemte med skjermbildet.

  Ikke-periodespesifikke dokumenter (informasjon og endringer)
  Ikke-periodespesifikke dokumenter er ment for dokumentasjon med fast innhold over tid. Valget kan også benyttes for enkelte avstemminger som bruker samme dokument og som bare skal utvides over flere perioder (eksempelvis avstemming av periodisering), men ikke for dokumenter hvor man skal erstatte tidligere innlagt informasjon. Ikke-periodespesifikke dokumenter vil derfor normalt være skrivebeskyttet i påfølgende perioder. Endringer i slike dokumenter kan påvirke alle perioder dokumentet er knyttet til, siden samme dokument benyttes på tvers av periodene.
  Periodespesifikk dokumentasjon er låst til perioden den er satt opp for. Den er tiltenkt for dokumentasjon som oppdateres jevnlig.
  For eksempel for bankavstemming og transaksjonsavstemming hvor man ofte ønsker å videreføre åpne poster mellom perioder, samtidig som dokumentasjonen skal kunne redigeres videre, anbefales det å benytte periodespesifikk dokumentasjon sammen med funksjonen «Overfør til neste periode». I denne versjonen har vi lagt inn flere hint og informasjonstekster for å tydeliggjøre forskjellene i disse to valgene.
  Enkelte avstemminger manglet skrivebeskyttelsen for ikke-periodespesifikke dokumenter, dette er nå på plass. Derfor vil også disse dokumentasjonselementene nå være låst for redigering i påfølgende perioder etter man oppretter dem. I kolonnen “redigerbar i" ser man hvilken periode avstemmingen er opprettet og kan redigeres i.

  SAF-T eksport
  Kunder og leverandører, og eiere er lagt til i eksporten. Annen informasjon som er lagt til i eksporten er selskapets adresse og kontaktinformasjon, MVA-nummer “Not Available”, kunde- og leverandørID på posteringer og bilagsart “Diverse”.
