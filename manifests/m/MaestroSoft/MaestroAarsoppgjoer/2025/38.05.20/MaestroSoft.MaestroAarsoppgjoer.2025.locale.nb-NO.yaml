ReleaseNotes: |-
  Publisert 01. juli 2026

  Generelt om denne versjonen

  Systembruker for byrå
  Det er nå klargjort for Systembruker for byrå i Maestro årsoppgjør. Funksjonaliteten er tilgjengelig fra Innstillinger i Maestro årsoppgjør. Brukere av Maestro Sky kan også opprette Systembruker for byrå i kontoinnstillinger. For å utføre opprette Systembruker for byrå må du ha rollen Tilgangsstyrer eller Hovedadministrator for byrået. Det er typisk Daglig leder hos byrået som har disse rollene i Altinn. Etter at Systembruker for byrå er opprettet må det delegeres klienter til Systembrukeren, dette gjøres i Altinn.
  Du kan lese mer om Systembruker og Systembruker for byrå på hjelpesidene våre.

  Øvrige innsendinger
  Det er gjort forbedringer i listen over forsendelser og nedlastning, slik at det kommer tydeligere frem hva et element i listen gjelder og hvilket år det gjelder.

  Aksjonærregisteroppgave
  Det er nå rettet slik at man igjen kan benytte «Angi kalenderår for aksjonærregisteroppgaven» som vanlig for innlevering av aksjonærregisteroppgave for tidligere år.

  Forskning og utvikling
  Rettet en feil der kombinasjonen av "stort selskap", "utviklingsprosjekt", finansskatt og ikke siste prosjektår utløste en valideringsfeil som stoppet innsendelse.

  Validering: Tilbakemeldinger fra Skatteetaten
  Det er nå lagt inn mulighet for å eksportere tabellen med tilbakemeldinger fra Skatteetaten til Excel.

  Offentlig regnskap
  Det er gjort noen mindre tilpasninger, samt rettelser for RR-0005
