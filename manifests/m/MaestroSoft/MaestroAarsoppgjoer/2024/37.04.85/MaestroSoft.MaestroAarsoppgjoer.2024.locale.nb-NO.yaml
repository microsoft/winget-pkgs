  Publisert 14.11.2025

  Klage
  Vi har lagt til muligheter for «klage på skjønnsfastsetting» og «klage på myndighetsfastsetting» i klientopplysninger. Vedtaket klienten har mottatt på Altinn bestemmer hvilken av klagemulighetene som skal benyttes. Valget skrus på i klientopplysninger.
  Ved klage på myndighetsfastsetting må det legges ved vedlegg. Vær også oppmerksom på at det kun er mulig å benytte «Klage på myndighetsfastsetting» dersom fastsettingen er vedtatt. Er det kun gitt varsel om myndighetsfastsetting må det gis et tilsvar i en egen løsning på mine sider på skatteetaten.no.
  Her kan du lese mer om klage på skjønns- og myndighetsfastsetting.
