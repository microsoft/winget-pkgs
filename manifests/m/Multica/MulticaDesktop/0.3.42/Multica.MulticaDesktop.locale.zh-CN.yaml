ShortDescription: 开源托管智能体助手平台。将编程智能体转化为真正的团队伙伴 —— 分配任务、跟踪进度、复用技能。
Description: |-
  Multica 将代码智能体转变为真正的团队伙伴。你可以像给同事分配任务一样给智能体分配 Issue —— 它们会自动接手工作、编写代码、报告阻碍并自主更新状态。
  无需再反复复制粘贴提示词，也无需再盯守运行过程。你的智能体将出现在任务看板上，参与对话，并随时间积累可复用的技能。将其视为受管智能体的开源基础设施 —— 厂商中立、支持私有化部署，专为“人+AI”团队设计。兼容 Claude Code、Codex、GitHub Copilot CLI、OpenClaw、OpenCode、Hermes、Gemini、Pi、Cursor Agent、Kimi 和 Kiro CLI。
  对于更大的团队，Squads（小队）增加了一个稳定的路由层：将工作分配给一个由智能体领导的小组，领导者会将其委派给最合适的成员。
