ReleaseNotes: |-
  mdr v1.2.0
  A terminal Markdown renderer/pager for .NET. This release brings a new interactive file picker, faster and more robust rendering, an upgrade to .NET 10, and a hardened CI/CD pipeline.
  ✨ Features
  - Interactive terminal file picker — run mdr with no file argument and pick a file from an interactive terminal browser instead of getting an error (#17).
  - Faster Markdown rendering — syntax-highlight regexes are now compiled once and cached as static fields rather than recompiled on every render pass; rendering also handles terminal resizing correctly (#15).
  🐛 Fixes & Robustness
  - Graceful I/O error handling — file reads and stdin reads are wrapped to catch IOException / UnauthorizedAccessException, so permission errors and locked files produce a clean message and exit code 1 instead of a raw stack trace.
  - Clean Ctrl+C handling — Console.CancelKeyPress is registered before the interactive pager starts, restoring cursor visibility and clearing the screen on cancel so the terminal is never left in a broken state.
  - Correct syntax-highlight ordering — keyword highlighting is now applied against the plain line before ANSI codes for strings/comments are added, fixing corrupted word boundaries and double-highlighted tokens inside string/comment spans.
  - List item wrapping — long list-item text now wraps to the available width with continuation lines indented to align with the item text (previously only paragraphs were wrapped).
  ⬆️ Platform & Dependencies
  - Enabled immutable releases.
  - Upgraded target framework to .NET 10 (from .NET 9).
  - Bumped Markdig 1.2.0 → 1.3.2 and Spectre.Console 0.55.2 → 0.57.1.
  - Added a NuGet lock file (packages.lock.json) and RestorePackagesWithLockFile for reproducible restores.
  🔧 Build, CI/CD & Quality
  - Added Qodana static analysis CI checks and resolved the resulting warnings (#10, #16).
  - Fixed the release pipeline: restore with RID before self-contained publish, pin CycloneDX, deduplicate the SBOM, and correct winget permissions.
  - Bumped GitHub Actions: checkout v3→v7, setup-dotnet 5.3.6.2→7.0.1, download-artifact v4.2.1→v8.0.1,attest-build-provenance 4.1.0→4.1.1, and cosign-installer v3.8.2→v4.1.2.
  - Added Dependabot configuration and a Ko-fi funding link.
  Full Changelog: v1.0.1...v1.2.0
