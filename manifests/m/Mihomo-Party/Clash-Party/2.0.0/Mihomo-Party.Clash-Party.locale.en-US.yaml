ReleaseNotes: |-
  2.0.0
  新功能 (Feat)
  - 机场插件机制，服务商请参考：docs/plugin/机场服务端对接指南-v2.md
  - 插件安装支持拖拽插件文件
  - 新增按状态自定义托盘图标
  - 新增更多 GitHub 下载代理
  - 新增记住所选侧边卡片开关
  - 新增锁定侧边卡片位置开关
  - 新增内核启动检测方式，可选择使用 Post Up 启动钩子
  性能优化 (Performance)
  - 优化大型订阅下代理组延迟测试的更新性能，减少界面卡顿
  - 修复连接图标和应用名称缓存未限制大小的问题，避免内存持续增长
  修复 (Fix)
  - 部分场景下的白屏问题
  - Linux (GNOME Wayland) 下窗口尺寸无法记忆、每次启动都最大化的问题，同时保持 Windows 高 DPI 下窗口不再逐次变大
  - IP 信息来源下拉切换延迟和请求竞态的问题
  - 更新下载多代理重试时进度条抖动的问题
  - Windows PowerShell 5.1 版本检测误判的问题
  - 生成配置使用非 info/debug 日志等级导致内核启动检测异常的问题
  - macOS 自定义托盘图标未使用模板图标的问题
  - 悬浮窗流量文本被裁切的问题
  - 订阅刷新提示位置遮挡的问题
  - Mihomo API 变更后 provider 节点无法完整显示或测速的问题
  - 配置热重载后 Gist 同步未更新的问题
  - Windows 下 Post Up 启动检测钩子路径异常的问题
  - TUN 排除网段可保存非法 CIDR、且非法项会阻止其它设置保存的问题
  1.9.6
  新功能 (Feat)
  - 新增 Tunnel 编辑器
  - 新增代理组标题显示当前节点
  - 新增 IP 信息来源选择记忆
  - 新增关闭应用日志输出选项
  - 新增网络信息卡片排序
  - 新增记忆侧边栏卡片选中状态
  - 新增 Age 加密配置和 Gist 同步支持
  - 新增轻量模式行为开关
  性能优化 (Performance)
  - 重构简化连接页
  - 优化软件启动和退出速度
  - 收敛软件配置，提升渲染性能
  - 优化代理组延迟测试结果展示
  - 优化核心和 Sub-Store 日志轮转及大小限制截断性能
  修复 (Fix)
  - 修复修改 Mihomo 设置（如日志等级、端口等）后未应用到运行中内核的问题
  - 修复托盘菜单可能被回收导致不可用的问题
  - 修复 Mihomo 安全路径缺少工作目录的问题
  - 修复流量卡片初始尺寸异常的问题
  - 修复不允许 IP 段占位符错误的问题
  - 修复本地配置显示更新超时时间的问题
  - 修复规则集搜索清空后列表不可见的问题
  - 修复 Mihomo 重启期间 WebSocket 重连异常的问题
  - 修复便携版数据目录未保持在应用目录下的问题
  - 修复搜索过滤条件未持久化的问题
  - 修复窗口宽度在每次重启后逐渐变大的问题
  - 修复生成配置未允许全部有效日志等级的问题
  - 修复 Windows 管理员启动时 GPU 沙盒异常的问题
  - 修复已有 DNS 配置时 dns-hijack 未保留的问题
  - 修复配置自动补全输入为空时的异常
  - 修复关闭流量日志后未立即停止记录的问题
  - 修复 Mihomo WebSocket 命名管道路由丢失的问题
  - 修复远程订阅拉取兼容性问题
  - 修复过期开机自启注册表回退项未清理的问题
  - 修复静默启动恢复最大化窗口时仍显示窗口的问题
  - 修复侧边栏设置分隔线缺失的问题
  其他 (Chore)
  - 调整 DNS 覆写默认关闭
  - 更新俄语翻译
  - 优化流量时间范围显示格式
