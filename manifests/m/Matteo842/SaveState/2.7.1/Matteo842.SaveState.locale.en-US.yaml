ReleaseNotes: |-
  # SaveState v2.7.1 - The "Gotta Go Fast" Update

  This hotfix focuses entirely on under-the-hood performance, drastically reducing the application's
  startup time through a complete import restructuring.

  ## Changelog:

  ### Startup Time Optimization (Lazy-loading)

  - Deferred Cloud API Initialization: Google Drive modules (google_drive_manager) are now loaded
    on-demand only when interacting with cloud features, removing the main startup bottleneck.
  - Deferred GUI & Worker Imports: Heavy interface elements, dialogs, emulator managers (like PCSX2),
    and the update manager's requests module have been moved inside their respective functions or
    dedicated threads. The main interface now opens almost instantly.

  ### Dependency Management & Resilience

  - Dynamic Windows Module Detection: winshell and pywin32 imports are no longer mandatory at module
    startup. The app now uses importlib.util to check for library availability and loads them
    locally only when needed (e.g., during desktop shortcut creation).
  - Crash Prevention: The absence or corruption of optional external libraries will no longer cause
    sudden application crashes on launch, making SaveState much more robust.
