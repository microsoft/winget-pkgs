ReleaseNotes: |-
  TempestData v1.0.0
  Self-contained Windows executable — no .NET installation required.
  What's included
  - Live station discovery via Tempest API
  - Flexible field selection and time range filters
  - Timezone-aware display and date parsing
  - Export to CSV, JSON, Excel, and PDF
  - Numeric column sorting
  - Persistent settings
  How to use
  Download TempestData.exe below and double-click it. No installation needed.
  You'll need a free Tempest API token to connect to your station.
