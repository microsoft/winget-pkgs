ReleaseNotes: |-
  TempestData v1.0.3
  This release improves first-time usability and makes date-range validation clearer and safer.
  Highlights
  Added a prominent Load Stations action in the Connection and Station area so station discovery is no longer hidden in the menu.
  Added smarter onboarding guidance text that updates based on your current setup state.
  Added auto station discovery triggers:
  When API token field loses focus
  After Save Settings
  Added duplicate-load protection so auto-discovery does not repeatedly reload when token and station state are unchanged.
  Updated API Token Help instructions to a direct, simplified flow:
  Navigate to [https://tempestwx.com/settings/tokens]
  Log in
  Create token
  Copy token
  Paste token
  Click Load Stations
  Updated range-limit handling:
  Requested range violations now show a warning with OK only
  Load is blocked until user adjusts resolution or time window
  Removed wording that implied user could continue anyway
  Removed the extra “station selected” helper text once a station is already selected to reduce UI noise.
  Clarified menu wording from Refresh Station to Refresh Station List.
