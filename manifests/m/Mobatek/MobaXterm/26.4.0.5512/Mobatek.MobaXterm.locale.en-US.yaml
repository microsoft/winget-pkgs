ReleaseNotes: |-
  - New feature: added support for smart card certificate authentication in SSH sessions using Microsoft CryptoAPI
  - New feature: added a smart card management interface (add/remove smart card certificates, retrieve the OpenSSH public key, ...)
  - New feature: added a right-click option on SSH sessions to open an SFTP session with the same parameters
  - New feature: you can now choose the SSH browser location by clicking the SSH browser title icon, allowing you to display your sessions and the SSH browser simultaneously
  - Improvement: added a new option in SSH session expert settings to select a smart card certificate
  - Improvement: added a new option in the global settings to add a smart card to MobAgent
  - Improvement: multiplex mode is now automatically applied for the SSH browser when the SSH session uses a smart card
  - Improvement: deferred the creation of system and toolbar icons to increase startup speed
  - Improvement: deferred the creation of item lists with checkboxes to increase startup speed
  - Improvement: added caching in graphical components to prevent unnecessary recalculation of their dimensions
  - Improvement: prevented core components from triggering unnecessary Windows messages when invisible at startup
  - Improvement: improved management of embedded fonts in memory at MobaXterm startup
  - Improvement: added a default openssl.cnf configuration file for the local terminal "openssl" command
  - Improvement: added the "linux" terminal type to terminal-based session settings
  - Improvement: install embedded fonts into Windows to prevent rendering issues when the Windows embedded fonts feature is disabled
  - Improvement: the master password prompt no longer stays on top of all windows after unlocking the Windows desktop
  - Improvement: improved the appearance of the remote monitoring bar by preventing double borders when the bar is adjacent to another
  - Improvement: column sizes in the SSH browser are now saved and restored upon MobaXterm restart
  - Improvement: added a confirmation prompt before overwriting files downloaded or uploaded with the SSH browser
  - Improvement: the default WSL shell can now use native authentication with the "DefaultWslUsesNativeAuth=1" directive in the "Misc" section of the configuration file
  - Improvement: improved the management of PNG image files and PNG icons by handling files without alpha layers
  - Improvement: when selecting a session folder in the "Quick connect" bar, it is now automatically selected and expanded
  - Improvement: increased MobaTextEditor performance when replacing multiple occurrences of a pattern or undoing many actions in a file
  - Improvement: updated the embedded OpenSSH client, the OpenSSL library and the X server to their latest versions
  - Improvement: switched the default compression setting to "no" in SSH sessions and in the local terminal
  - Bugfix: when updating MobaXterm, clean the previous "AdmSlash" folder if it exists
  - Bugfix: prevented "mobagrep" from creating a blank file when using the "-i" command-line switch
  - Bugfix: hidden modal windows are no longer displayed in the Aero Peek preview when hovering over the MobaXterm taskbar button
  - Bugfix: disabled bracket characters in the credentials creation window
  - Bugfix: when quickly switching tabs with the "Follow terminal" feature enabled, the SSH browser could appear empty
  - Bugfix: prevented MobaXterm from launching the wrong session when double-clicking a session if the second click occurred over another session
  - Bugfix: fixed a potential freeze when pasting clipboard content into the terminal if the clipboard owner became unresponsive
  - Bugfix: prevented mobagrep from stopping the search thread if one of the searched files fails to open
  - Bugfix: cleaned the MobaXterm temporary folder at startup in "portable" mode if it already exists
  - Bugfix: prevented MobaTextEditor, Xorg, MoTTY and the Cygwin library from loading some unused libraries at startup (fixes CVE-2026-11879 reported by Pedro J. Nunez-Cacho Fuentes @tunelko)
  - Bugfix: prevented MobaXterm from trying to load the "winspool.drv" file at startup (fixes CVE-2026-11967 reported by Pedro J. Nunez-Cacho Fuentes @tunelko)
