ShortDescription: A privacy-first BitTorrent client with movie & game cover art, six themes, and zero ads.
Description: >-
  BATorrent is a free, open-source BitTorrent client for Windows, macOS, and Linux,
  built in C++/Qt 6 on the libtorrent engine. It shows your downloads as a grid of real
  movie, series, and game cover art (TMDB + IGDB) and can be themed six ways. It is
  privacy-first: VPN interface binding with a kill switch that drops all traffic if the
  tunnel dies, a Tor preset, anonymous handshake, and anti-leecher blocking. It also
  includes a browser WebUI with QR pairing, built-in search, RSS auto-download,
  stream-while-downloading, and Plex/Jellyfin/Emby library refresh. No ads, no
  telemetry, no "Pro" tier, and no account required.
