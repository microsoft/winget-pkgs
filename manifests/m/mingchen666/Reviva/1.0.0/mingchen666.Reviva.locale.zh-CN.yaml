ReleaseNotes: |-
  Reviva v1.0.0 正式发布
  这是 Reviva 的首个稳定版本。Reviva 是一个以 Agent 为核心、本地优先的 AI 学习工作台，将对话、文档、知识库、笔记、学习工
  具和创作输出整合在同一个桌面应用中。
  你可以围绕自己的资料与 Agent 对话，并将理解、复习、研究和创作结果持续沉淀为个人知识资产。

  ✨ 本次更新
  1. 新增媒体解析功能，新增语音识别服务商支持，支持音频和视频解析导入
  2. 新建本地网关，可通过 http 接入深度集成 Reviva 功能，支持通过 openai 的 chat 和 response 格式调用 agent
  3. 文档模块支持子目录创建
  4. 新增笔记内置绑定工具 note_tool
  5. 新增音视频内置绑定工具 media_tool
  6. 新建快捷输入功能，支持用户在输入框通过@快速调用指令等
  7. 模型服务相关数据进行迁移新建表
  8. 修复对话标题生成逻辑
  9. 修复 paddleocr 调用逻辑，改成异步
  10. 调整文档引用逻辑，发送对话不再引用原文档
  11. 优化文档页面相关组件
  12. 其他更新……
  🚀 主要能力
  - 以 Agent 为核心的本地 AI 学习工作台
  - 支持切换 Agent、共享上下文和自定义 Agent
  - 支持本地文档、文件夹和 Wiki 知识库对话
  - 支持 Office、PDF、图片、URL、音视频等资料处理
  - 支持音视频转录、关键帧提取和媒体内容问答
  - 支持测验、闪卡、思维导图、知识图谱、图表、PPT、播客和深度研究
  - 支持笔记、Wiki 知识沉淀和全局 Agent 记忆
  - 支持自定义模型、OCR、语音识别、权限控制和数据备份
  📦 下载安装
  请根据自己的系统和处理器架构下载对应安装包：

  | 平台            | 文件                                 | 下载                      |
  | --------------- | ------------------------------------ | ------------------------- |
  | Windows x64     | Reviva-Windows-1.0.0-x64-Setup.exe   | GitHub Release · 夸克网盘 |
  | Windows ARM64   | Reviva-Windows-1.0.0-arm64-Setup.exe | GitHub Release · 夸克网盘 |
  | macOS Intel x64 | Reviva-Mac-1.0.0-x64-Installer.dmg   | GitHub Release · 夸克网盘 |

  macOS 当前仅提供支持 Intel x64 版本。
  夸克网盘链接会打开安装包目录，请选择与系统和处理器架构对应的文件。
  完整安装说明请查看项目 README。
  升级前建议先通过 Reviva 的备份功能保存重要数据。
  从旧版本升级时：
  1. 退出正在运行的 Reviva
  2. 建议备份本地数据库和重要资料
  3. 下载并安装 v1.0.0
  4. 启动后检查模型、工作目录和 Agent 配置
  💬 反馈与交流
  感谢所有参与测试、反馈问题和提供建议的用户。
  Reviva 仍会持续更新维护。如果遇到问题，请提交 GitHub Issue
  Reviva 用户交流群
