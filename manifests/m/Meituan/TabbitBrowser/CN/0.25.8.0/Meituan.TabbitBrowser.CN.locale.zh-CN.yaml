ReleaseNotes: |-
  1. 优化了 AI Chat 回复链路，响应体验有所提升；​
  2. 网页翻译功能回归。支持双语对照、仅显示译文两种模式，可通过悬停翻译、快捷键触发等方式触发；
  3. 首页对话侧边栏新增入门指南，点击此处可查看 Tabbit 核心功能介绍，了解它能为你做些什么；
  4. 优化了数据导入功能，支持预览导入的数据，增加进度条与提醒，让数据迁移过程更清晰；
  5. 优化了标签组自动整理的动画效果及文案；
  6. 优化了妙招创建和编辑的部分体验。
