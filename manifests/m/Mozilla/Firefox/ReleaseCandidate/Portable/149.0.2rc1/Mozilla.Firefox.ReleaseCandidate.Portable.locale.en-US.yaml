PackageIdentifier: Mozilla.Firefox.ReleaseCandidate.Portable
PackageVersion: 149.0.2rc1
PackageLocale: en-US
Publisher: Mozilla
PackageName: Mozilla Firefox (Portable)
PackageUrl: https://archive.mozilla.org/pub/firefox/candidates/
License: MPL-2.0
ShortDescription: A free and open source web browser software, built by a community of thousands from all over the world.
Description: |-
  A free and open source web browser software, built by a community of thousands from all over the world.

  As of March 11, 2026, this Winget package is mostly a proof-of-concept of that official portable Firefox versions do exist. As such, only 5 installer locales are in it to begin with: en-US, en-GB, en-CA, fr(-FR), and hi-IN. By default, which of the 5 that are downloaded depends on the Windows system settings, but it can be overrid with « winget install Mozilla.Firefox.Portable --locale __-__ ».

  The "Candidates" builds of Firefox, which are likely between Stable and Beta on Firefox's release schedules, are the ones closest to stable to have official Mozilla portable builds for them.
