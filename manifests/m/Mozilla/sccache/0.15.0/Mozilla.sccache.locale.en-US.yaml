ShortDescription: Sccache is a ccache-like tool. It is used as a compiler wrapper and avoids compilation when possible. Sccache has the capability to utilize caching in remote storage environments, including various cloud storage options, or alternatively, in local storage.
ReleaseNotes: |-
  sccache 0.15.0

  Summary
  sccache 0.15.0 brings several notable improvements:
  - Multi-tier caching: New support for layered caches with fallback and automatic backfilling between tiers (#2581).
  - C++20 modules: Initial (partial) support for compiling C++20 modules (#2516).
  - Expanded MSVC support: New flags handled including d1nodatetime, await:strict (#2617), Y-, YI, Zf (#2663), and the default .pdb extension for /Fd (#2621).
  - New platforms: loongarch64 support (#2669) and crt-static for riscv64 musl targets (#2683).
  - ccache interop: Avoid double-caching when ccache is also installed in PATH (#2524).
  - Cargo integration: CARGO_ENCODED_RUSTFLAGS is now excluded from the env var hash to prevent spurious cache misses (#2651), and dep-info handling correctly skips directories (#2676).
  - Distribution: cargo-binstall metadata for prebuilt binary installation (#2647).
  - Reliability fixes: GCS initialization (#2637), Windows Win32_Security feature (#2627), and retries for dist docker image builds (#2677).
  This release also includes a large round of clippy-driven cleanups and several CI fixes. Welcome to 7 new contributors!

  Features
  - Avoid double-caching when ccache is installed in PATH by @avikivity in #2524
  - partial c++20 module support by @TroyKomodo in #2516
  - Add support for d1nodatetime & await:strict MSVC flags by @AJIOB in #2617
  - msvc: Append the default .pdb extension for the /Fd argument by @ikolomiko in #2621
  - msvc: add support for Y-, YI, Zf flags by @AJIOB in #2663
  - Implement multiple tiers caching with fallback and backfilling by @Felixoid in #2581
  - feat: Add loongarch64 support by @wojiushixiaobai in #2669
  - Add cargo-binstall metadata for prebuilt binary installation by @sylvestre in #2647

  Fixes
  - fix: add Win32_Security feature to windows-sys dependency by @JulienCote in #2627
  - Fix GCS initialization by @msuozzo in #2637
  - fix: exclude CARGO_ENCODED_RUSTFLAGS from env var hash by @weihanglo in #2651
  - fix: handle directories in dep-info source file hashing by @mmastrac in #2676

  CI
