ShortDescription: MortgageTech SmartClient Bridge - per-user launcher for ICE Mortgage Technology Encompass company-server lanes (Desktop, Form Builder, Admin Tools).
Description: |-
  Per-user WPF launcher that opens ICE Mortgage Technology Encompass(R) SmartClient channels
  (Desktop, Form Builder, Admin Tools) for the user's four licensed company-server lanes.
  Bootstraps each lane folder, then invokes Encompass's own AppLauncher.exe with the correct
  server URL + username. On the embedded WebView2 PingFederate login form it uses Windows UI
  Automation + clipboard paste to fill the user's DPAPI-stored Encompass credentials.

  This is internal tooling for the MortgageTech team only.
