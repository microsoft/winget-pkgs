Description: |-
  mfsr は、複数のファイル内の複数の文字列を一括置換するコマンドラインツールです。
  文字エンコーディングの変換や、改行コードの変換、BOM（Byte Order Mark）の制御も可能です。
  .NET 10 Native AOT でビルドされたネイティブ実行ファイルで、.NET ランタイムは不要です。
