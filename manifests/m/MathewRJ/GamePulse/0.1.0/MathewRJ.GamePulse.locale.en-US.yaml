ShortDescription: Gaming performance telemetry agent for Elasticsearch
Description: |-
  GamePulse is a real-time gaming performance telemetry agent that captures
  CPU, GPU, memory, storage, network, audio, power, and frame-timing metrics
  while you play, streaming them to Elasticsearch for live dashboards and
  historical analysis. Supports Steam, Proton, Lutris, Heroic, and Bottles.
