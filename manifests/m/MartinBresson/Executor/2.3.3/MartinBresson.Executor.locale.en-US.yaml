ReleaseNotes: |-
  Improvements
  - In settings pressing "Index now" will pickup any related settings that might have been changed before doing the indexing.
  - Added the command-line parameter -i to Executor. This will open and set the input text in Executor without executing it (-r will also execute it).
    Example "c:\program files\Executor\Executor.exe" -i hello there. This works regardless if Executor is already running or not. -I will do the same but also select the entire text.
  Other notes
  - Added a guide on how to trigger Executor input from a Stream Deck. Stream Deck Guide.
