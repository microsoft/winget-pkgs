ReleaseNotes: |-
  Improvements
  - Added more Input Assist (Ctrl+Space) workflow customization (good old Danish-engineered, building-block design for more freedom and control).
    - Input Assist now supports another contextual keyword tag fast. If added to a keyword then when using Input Assist and selecting this keyword it will instantly be executed instead of selected for the input.
    - In case you in the Input Assist drop-down menu always want any keyword not supporting parameters to fast launch, you can instead of giving all those keywords the fast tag, use the new setting inputassistenter (set it to 2). See more details here.
    - Per default using left and right arrows in the Input Assist menu will just select items and disregard any "fast" or contextual instant launch, but you can configure this with the setting inputassistarrow. For example set the arrows to have same functionality as the enter key. More details here.
