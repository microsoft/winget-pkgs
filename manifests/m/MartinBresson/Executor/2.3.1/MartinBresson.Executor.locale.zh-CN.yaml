Description: |-
  Executor 是一款面向 Windows 的桌面工作流应用程序。加速您的日常操作，快速打开和执行各项任务。

  主要功能：
  - 在毫秒级内启动应用程序、文件、文件夹、网站、网络服务（支持参数）和快捷指令。
  - 通过单一文本命令和/或热键触发多项操作。
  - 致力于让您成为高效开启世界工具的大师，而非像某些替代方案那样试图将整个塞入 Executor。
  - 将剪贴板功能提升至新高度：快速执行系统命令、进行即时计算、管理正在运行的应用等。
  - 自定义关键词、外观、热键及行为模式，完美契合您的日常工作流。
  - 提供多种皮肤与主题选项，灵活定制界面风格，以匹配您的桌面环境。
