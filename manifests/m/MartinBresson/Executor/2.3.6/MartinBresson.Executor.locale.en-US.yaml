ReleaseNotes: |-
  What's new
  - Input Assist updated so you can press Ctrl+Space on a filesystem path or a URL and get a list of keywords to execute that filesystem or URL input as a parameter to the selected keyword. An example: You have four browsers and/or browser profiles as keywords that takes a URL parameter $P$ with the tag url, you type google.com and press Ctrl+Space which will show the four browsers and/or browser profiles in a selectable list and will launch instantly when selected.
    - This works by giving a keyword that handles URL's as a parameter the tag url, or a keyword that handles filesystem paths as a parameter the tag filesystem.
    - The "add to history" setting of the keyword will be respected when executing it from Ctrl+Space.
    - The listed Input Assist keywords will be sorted by history (if available).
    - You can still keep pressing Ctrl+Space to see other Input Assist options.
  - Added a new setting for Input Assist to always list tag keywords by keyword editor order instead of using order in history (if any). See the setting inputassistsorting by clicking here.
  Improvements
  - Improved auto calculation detection, could collide with certain url styles.
  Other notes
  - Added some new keywords to the imports file extras.exc. Type imports to find these.
  - dark - Toggle Windows dark/light mode
  - uptime - Show system uptime
  - diskspace - Show disk usage for all drives
  - env - Open environment variables editor
  - wt - Open Windows Terminal with CMD at a folder path
  - wtps - Open Windows Terminal with PowerShell at a folder path
  - wtu - Open Windows Terminal with Ubuntu at a folder path
