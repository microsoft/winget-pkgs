ShortDescription: Cross-platform (macOS / Linux / Windows) process resource monitor written in Rust.
Description: >
  zoio lets you pick running processes via a checkbox list or match them with regex patterns, then
  watches their CPU, memory, disk I/O, and network I/O in real time. All matched subprocesses are
  followed automatically. Metrics are drawn as four live plots (one per resource) that can be viewed
  per-process, combined, or grouped. When you stop the session, the full capture is exported to CSV.
