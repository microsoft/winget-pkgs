PackageIdentifier: Makeblock.xToolStudio
PackageVersion: 1.6.8
PackageLocale: zh-CN
License: 专有软件
ShortDescription: xTool 激光切割雕刻机设计与管理系统软件
Tags:
- 激光
- 激光切割
- 激光雕刻
ReleaseNotes: |-
  V1.6.6 之后的更新
  - 针对 1.6.6 发布后发现的部分问题进行修复，并进一步提升整体稳定性
  - 修复偶发的项目打开失败问题
  - 修复复制的嵌套分组可能被粘贴回原父级分组的问题
  - 优化在旧版 macOS 系统上的算法兼容性

  V1.6.8 新功能
  编辑器
  - 支持文字变形与自定义路径排布，增强文字设计表现力
  - 支持嵌套编组：支持复杂设计结构的层级管理，提升批量操作与图层组织效率
  - 新增常用快捷键：支持快捷复制、反色、布尔运算等快捷键，提升操作效率
  - 输入框支持运算：数值输入框支持加减乘除运算，尺寸输入框额外支持毫米与英寸跨单位换算
  - 支持调整图像透明度
  - 拓展应用新增背景色敲除工具：支持以半调样式敲除背景颜色，改善打印效果并节省墨水
  - 浮雕模式中新增 AI 浮雕功能，支持将图片一键转换为适用于浮雕的深度图

  材料参数与加工
  - 元素参数一键复制粘贴：支持通过右键菜单快速复用元素加工参数
  - 优化跨项目复制体验，粘贴元素时将同步保留其原始加工参数
  - 画布属性自动同步：新建画布时自动应用已有的加工模式、背景图及测距等数据
  - 材料参数自定义：支持手动输入参数并为不同加工模式设置默认值，切换材料时自动应用
  - 参数方案存储：支持自定义方案命名与保存，实现材料与加工模式的快速关联复用
  - AI 智能排障引导：支持系统报错与设备问题的智能诊断，通过对话式引导完成故障排除
  - 新增 AI 加工结果智能分析，在加工完成页面基于加工参数与机内实拍图精准诊断效果问题，一键获取优化建议

  设备
  - F 系列选择高反材料时增加安全提醒
  - 支持 F2 Ultra UV 水晶球在使用非官方治具的情况下进行内雕加工
  - F2 支持丝网制版加工模式
  - Apparel Printer 新增白墨缩孔和刀切异常 2 个自助排障功能，帮助用户快速解决常见问题
  - Apparel Printer 新增图像输出质量选择功能，支持用户选择更高质量的输出图像，提升线条打印边缘平滑度
  - P2S 批量模式支持设置同方向加工，确保双面耗材加工的一致性

  软件通用
  - 调整安装流程，新增安装前的协议确认环节
  - 问题反馈表单优化：报告问题时自动填入相关信息，并支持一键上传日志

  Bug 修复：
  - 解决了关闭项目时概率性错误提示“正在保存中”，导致关闭进程缓慢的问题
  - 修复了 3D Photo 生成的模型边缘杂质问题
  - 修复其他已知问题
