ReleaseNotes: |-
  Updates Since V1.7.22
  1. Fixed some known bugs.

  What’s New in V1.7.24
  1. Major File Format Upgrade (Please Read)
  Starting with v1.7, new projects are saved in the new .xs format by default, delivering better stability for saving, syncing, and handling large projects. Cloud projects also gain Version History — view, restore to any version, or duplicate from any historical version.
  - .xcs files saved in earlier versions can still be opened and edited in Studio v1.7 and above.
  - .xs files cannot be opened in earlier versions of Studio. To stay compatible with older versions, export your project as .xcs.

  2. Editor
  - Template Library — built-in templates for composition, layout, and style. Ready to use out of the box.
  - Measurement tool upgrade — shortcut-key switching, multiple measurements shown at once, and a new angle measurement mode. Measure and adjust on the fly.
  - Array improvements — edit any parameter (count, spacing, radius, arrangement) after the array is created; grid arrays now support two spacing modes (edge-to-edge / center-to-center); circular arrays let you click directly on the canvas to set the center point.
  - Smarter Invert — for images with transparency, fill the transparent area with black or white in one click before inverting. Great for stamp negatives.
  - Boolean operations now support real-time preview — see the union / difference / intersection result before applying.
  - Path text can now be placed inside, on, or outside the path.
  - Shadow effects — add shadows to images and text (for print-capable devices).
  - Save canvas elements to My Space with a right-click.
  - Set the default mouse-wheel behavior to either pan or zoom the canvas.
  - The editor toolbar and left panel are now resizable by dragging.

  3. Material Parameters
  - When a material has multiple parameter presets, you can now set a default preset.
  - The title of a material test array can now be customized.

  4. Devices
  - Manual tab editing — add, drag, and delete tabs directly on the canvas to handle complex contours.
  - Set the start point and direction for any individual closed path.
  - Focus lift in laser vector engraving and vector fill — achieve varied effects with different depths and light/dark or solid/dashed styles.
  - Custom line density for laser vector fill and bitmap engraving.
  - Add Bitmap mode description
  - xTool M2 is now supported
  - P2S / P2: Close-up Stitching — take multiple close-up shots in one go and let Studio stitch them into a single high-resolution image.
  - P3: Processing Video Recording — record the machining process and save the video to your computer.
  - F2 Ultra now supports Auto Mode — close the lid and the machine auto-focuses, refreshes the background, recognizes the material QR code, and centers your canvas elements within the material outline. Truly place-and-create. (Requires firmware v021 or above.)

  5. Bug Fixes
  - Fixed: tapping View More in the homepage's Recent section incorrectly opened cloud storage.
  - Fixed: an occasional failure when opening projects.
  - Fixed: pasting a copied nested group placed the paste inside the original group.
  - Fixed: device algorithm compatibility issues on older macOS versions.
  - Fixed other known bugs.
