ShortDescription: AirPods companion for Windows — battery, notifications, auto-pause and more.
Description: |-
  PodOwl shows your AirPods battery for both earbuds and the case, with smart
  low-battery notifications, automatic pause/resume when you remove an earbud,
  battery history, a themed light/dark app window in English and Turkish, and
  a status-colored tray icon. It listens passively over Bluetooth LE — no
  pairing and no driver required. Free and open source.
