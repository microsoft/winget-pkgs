ShortDescription: The MuteMe companion application for your MuteMe
Description: |-
  MuteMe is peripheral device used for those that engage in virtual meetings:
  - MuteMe uses our patent-pending technology and is the first illuminated button to both control your microphone AND sync with the conference application tool of your choice.
  - MuteMe lets you and others around you know when you are in a meeting and when you are muted/unmuted. This is ideal when working from home or when you get numerous interruptions.
  - MuteMe allows you to customize your color selection for each status. We are keeping folks preferences and visual impairments in mind. Today, there are 8 color options (including LED off).
  - MuteMe has numerous other features like sleep mode, brightness control, push-to-talk, push-to-mute, etc which make it the #1 tool ensuring you sound professional and are responsive when you want to be in virtual meetings.
ReleaseNotes: |-
  This maintenance release focuses primarily on bug fixes, performance, and stability improvements. Please update to see the following fixes.
  #396 – Microsoft Teams Accessibility Fix
  Improved macOS Accessibility permission setup required by the native Microsoft Teams controller as Teams moves away from the legacy API integration. Moving away from the Teams API requires that accessibility is enabled on macOS.
  #403 – Controller Memory Management Performance
  Fixed a bug in the recently added controller memory monitoring that could create repeated PowerShell processes and cause high CPU usage on Windows. Other improvements to various controllers also. We have fixed that issue with this release.
  #333 – MuteMe Click Device Stability
  Fixed device enumeration and reconnection issues related to MuteMe Click support. These changes prevent duplicate device entries, repeated reconnection attempts, and device dropouts.
  #403 – WebEx QT6 Compatibility and Performance
  Updated the Windows WebEx controller for WebEx's new QT6 interface. Also significantly reduced CPU usage when WebEx is open, idle, or minimized. WebEx uses a new interface now and we made improvements to sync with it, improved logging also.
  #405 – OBS Studio Stability and Security
  Fixed an issue where changing OBS connection settings could permanently stop the integration on Windows and Linux. Also improved the handling of OBS credentials in diagnostic logs.
  #400 – macOS Microphone Detection Accuracy
  Fixed false microphone-in-use reports on macOS caused by speaker playback, virtual audio devices, and devices that provide both microphone and speaker functionality.

  Update your software today to enjoy these improvements!
