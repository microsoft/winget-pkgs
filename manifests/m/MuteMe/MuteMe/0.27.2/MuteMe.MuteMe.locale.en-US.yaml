ShortDescription: The MuteMe companion application for your MuteMe
Description: |-
  MuteMe is peripheral device used for those that engage in virtual meetings:
  - MuteMe uses our patent-pending technology and is the first illuminated button to both control your microphone AND sync with the conference application tool of your choice.
  - MuteMe lets you and others around you know when you are in a meeting and when you are muted/unmuted. This is ideal when working from home or when you get numerous interruptions.
  - MuteMe allows you to customize your color selection for each status. We are keeping folks preferences and visual impairments in mind. Today, there are 8 color options (including LED off).
  - MuteMe has numerous other features like sleep mode, brightness control, push-to-talk, push-to-mute, etc which make it the #1 tool ensuring you sound professional and are responsive when you want to be in virtual meetings.
ReleaseNotes: |-
  We're pleased to announce the release of MuteMe version 0.27.2. This release introduces OBS Studio integration, FaceTime support, a standalone Copilot hotkey, and critical stability improvements across WebEx, Zoom, and Microsoft Teams.
  #396 – Microsoft Teams Updates
  Microsoft has been phasing out the legacy Teams API that MuteMe relied on for synchronization. We've completely re-engineered the Teams controller to use native UI automation instead, ensuring MuteMe continues to work reliably with the latest Teams versions. This update also brings improved support for Free and Legacy Microsoft Teams versions, along with foundational work for upcoming hardware releases.
  #403 – WebEx Stability Fixes
  Users on both macOS and Windows were experiencing a severe memory leak when using WebEx, which would cause MuteMe's memory usage to grow unboundedly over time and eventually impact system performance. We've resolved both the sync issues and the memory leak to ensure a smoother and more stable WebEx meeting experience.
  #401 – Zoom Controller Memory Leak Fix
  Similar to WebEx, the Zoom controller on macOS had a memory leak that could gradually consume system resources during extended Zoom sessions. This fix targets the root cause in the Zoom controller's event handling and resource management, ensuring stable performance over time.
  #400 – macOS Microphone Detection
  macOS Voice 2 Text and dictation features weren't triggering microphone-in-use detection because Apple's system dictation uses a different audio path than traditional apps—it registers as a process-level audio client rather than opening a standard IOProc on the hardware device. We've updated the mic-in-use monitoring to use process-level APIs in addition to device-level checks, so dictation is now properly detected. .
  #405 – OBS Studio Integration
  We've added dedicated OBS Studio integration across macOS, Windows, and Linux using OBS WebSocket 5.x protocol. You can now monitor your OBS mute state, control recording and streaming, and manage scene switching directly from the MuteMe client—perfect for content creators who need seamless audio control during live streams.
  #390 – FaceTime Support
  MuteMe now works with FaceTime calls on macOS. The controller uses macOS Accessibility APIs to detect the FaceTime window and monitor mute state through the menu bar item checkmark. We've also laid the groundwork for upcoming hardware releases with improved controller architecture.
  #406 – Standalone Copilot Hotkey
  Added a standalone global hotkey feature to trigger Microsoft Copilot outside of meetings. Whether you're working on a document, browsing the web, or just need quick AI assistance, you can now access Copilot instantly with a single key combination—no need to switch windows or interrupt your workflow.
  #395 – Improved Auto-Updater Stability
  When software updates failed, the previous implementation would fail silently, leaving users unaware that their update hadn't completed successfully. We've improved the update mechanism to fail gracefully and display clear user-facing messages when something goes wrong, so you're never left wondering what happened during the update process.
  #394 – MuteSync Firmware Compatibility
  MuteSync devices weren't being recognized properly on Windows due to an incorrect firmware revision number being reported. This prevented correct device reporting. We've fixed the firmware revision detection so MuteSync devices now connect reliably.
  #398 – Screenshot Fix for Minimized Windows
  The "Not In Meeting" screenshot action wasn't working sometimes. We've updated the screenshot logic to work better.
  #371 – Skype Deprecation
  Microsoft has deprecated Skype and our usage data shows the user base has declined significantly. We're officially dropping support for Skype to focus our development efforts on the platforms our users rely on most. We encourage Skype users to migrate to supported platforms like Microsoft Zoom/Teams.
  #364 – Enhanced Feedback System
  Support tickets often lacked the device information needed to diagnose issues quickly. We've added automatic device information collection to the feedback form, including device type, firmware version, and connection status. This helps our team resolve issues faster with better context from the start. We've also migrated our telemetry from MixPanel to OpenPanel for more reliable analytics

  Update your software today to enjoy these improvements!
