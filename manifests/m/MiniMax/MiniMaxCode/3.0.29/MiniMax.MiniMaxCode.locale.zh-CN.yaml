ReleaseNotes: |-
  功能上新
  - 会话内搜索（Cmd+F / Ctrl+F）：在对话中按快捷键即可搜索当前会话内容，支持关键词高亮和上下导航。
  - MCP 工具原生暴露：指定的 MCP 工具可注册为模型原生工具，提升调用效率和成功率。
  - Windows 回收站支持：文件删除操作现通过系统回收站执行，支持恢复误删文件。
  - 权限审查理由展示：权限卡片现展示 LLM 审查理由，帮助用户理解为何需要确认。
  - 聊天滚动进度条：长对话中新增滚动进度指示，直观了解当前位置。

  体验优化
  - 权限模式下拉框排序调整为：主动询问 → 智能授权 → 始终授权。
  -「永远允许」统一为「始终允许」，对齐系统原生措辞。
  - 临时目录和家目录读操作自动放行，减少不必要的权限弹窗。

  安全加固
  - 建立 HARD / SOFT 双级风险注册表，高危命令直接拦截，中风险交由 LLM 上下文判定。
  - 新增 Windows 删除命令、磁盘擦除、反向 Shell、解释器内联删除等多类危险操作检测。

  修复
  - 修复 Daemon 版本号在遥测数据中显示为 0.0.0 的问题。
  - 修复搜索高亮在打包版中不生效的问题。
  - 修复 Telegram 渠道权限回调 ID 截断导致卡片无法响应的问题。
