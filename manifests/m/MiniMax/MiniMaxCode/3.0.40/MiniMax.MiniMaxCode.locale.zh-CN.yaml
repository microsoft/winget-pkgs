ReleaseNotes: |-
  ​

  功能上新
  - IM /stop 命令：在微信、飞书、Telegram 频道中发送 /stop 即可中断 Agent 回复，与桌面端「停止」按钮一致。
  - IM 排队提示：微信等文本频道在消息排队时显示队列位置，不再让用户猜测消息是否送达。
  - 定时任务自动推送：定时任务完成后，结果自动推送到所有绑定该 Agent 的 IM 频道，无需额外配置。
  - IDE 快速打开：聊天顶栏新增 IDE 选择器，支持一键在 Cursor、VS Code、WebStorm、Zed 等 20+ 编辑器中打开项目。
  - 代码变更悬停预览：鼠标悬停文件改动行即可弹出 diff 预览，无需打开完整审查面板。
  - Skill 中文化：内置 Skill 在斜杠命令面板中显示中文名称和描述，搜索同时支持中英文。
  - Deep Research 快捷入口：「+」菜单和斜杠面板顶部新增 Deep Research 直达入口。
  - 问题反馈群入口：侧边栏用户菜单新增扫码加入飞书反馈群。
  ​

  体验优化
  - 用量面板重设计，展示 5 小时窗口用量、每周用量、视频配额和积分余额。
  - 侧边栏历史默认按项目分组，状态点替代文件夹图标，项目组可折叠。
  - 模型选择器旁新增独立 Thinking 切换按钮。
  - 工具栏下拉菜单统一组件，靠近屏幕边缘自动翻转。
  - 提交反馈后展示社群二维码和上传 ID，方便追踪问题。
  - Markdown 链接在系统浏览器打开，锚点支持页内跳转。
  - 首屏 HTTP 请求合并缓存，减少并发尖峰。
  - 长对话代码块懒渲染，滚动到可视区时才高亮，不再卡顿。
  ​

  修复
  - 修复 Windows 安装路径含中文字符时 CLI 无法启动。
  - 修复 Windows mavis-trash 误跟随 junction 删除目标数据。
  - 修复 Windows「在文件管理器中显示」无法选中文件。
  - 修复 Windows Intel 核显设备 GPU 崩溃导致应用无法启动。
  - 修复定时任务删除后侧边栏仍残留显示。
  - 修复 OpenCode 会话重启后状态丢失。
  - 修复深色模式下 tooltip 文字不可读。
  ​

  安全
  - 工作目录外文件读取纳入权限模式审查。
