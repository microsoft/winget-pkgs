ReleaseNotes: |-
  新功能
  - Worktree 基准分支选择：新建 Worktree 时可手动选择 base ref，跨聊天界面统一校验。

  体验优化
  - 上下文压缩（/compact）全流程状态反馈：思考指示器 → pending 状态 → 自动刷新历史。
  - TurnDiffCard 按用户回合展示，Agent Team 多 turn 只在回合末尾出卡；scratchpad/memory 变更不再污染 diff。
  - 侧边栏视觉细节对齐 Figma，项目排序持久化，归档时分组位置稳定。
  - Agent Team 切换为显式用户开关，深度研究 Skill 退役（需 /team 显式触发）。
  - Skill Hub 去重、Workspace 面板滚动修复、Slash 命令幽灵条目修复。
  - 用户图片正确渲染为图片，问卷内部协议文本不再泄漏。

  Bug 修复
  - 流式卡死心跳检测与恢复机制、工具调用黑洞被动恢复、SSE 心跳扩展。
  - Windows：Team plan EPERM rename、插件目录冒号兼容、悬空 junction 启动崩溃、TLS 根证书信任。
  - macOS 更新竞态修复、GUI 启动器 ENAMETOOLONG 容错、Daemon 健康检查超时提升。
  - MCP JSON 损坏优雅恢复、Cron 孤儿会话清理、bash 超时描述一致性。
  - /resume 续传判断、Compaction 回归修复、Session 恢复加载器闪烁优化。

  安全
  - mavis-trash 全面加固：标志解析、路径安全检查、根目录保护绕过修复。
  - Telegram/IM 首次私信发送者强制验证，非 p2p 事件硬阻断。
