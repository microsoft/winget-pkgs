PackageIdentifier: MiTeC.ExeExplorer
PackageVersion: 3.7.5
PackageLocale: en-GB
PackageName: MiTeC EXE Explorer
ShortDescription: Executable file info explorer for OS/2, NE, PE32, PE32+ and VxD file types.
Description: |-
  This application is based on MiTeC Portable Executable Reader. It reads and displays executable file properties and structures. It is compatible with PE32 (Portable Executable), PE32+ (64bit), NE (Windows 3.x New Executable) and VxD (Windows 9x Virtual Device Driver) file types. .NET executables are supported too.

  It enumerates introduced classes, used units and forms for files compiled by Borland compilers.
  It contains a powerful Resource Viewer that is able to analyse and display all basic resource types and some extra ones as JPEG, PNG, GIF, AVI, and REGISTRY. It contains an excellent Type Library viewer that enumerates all objects and creates an import interface unit in Object Pascal language. Every type of resource can be saved to file.
  EXE Explorer produces a text report with all important information about the selected file.
  Searching capability is also available. It searches all resources that can be interpreted as text.

  Here are enumerated structures that are evaluated：
  • DOS, File, Optional, Rich and CLR headers
  • CLR Metadata streams
  • Sections, Directories
  • Imports, Exports
  • Resources
  • ASCII and Unicode Strings
  • .NET Metadata
  • Load Config
  • Debug, Thread Local Storage
  • Exceptions, Units, Forms
  • Classes, Certificates
  • Packages, Package Flags
  • Version Info
  • Hexadecimal File Content View
  • TypeLib Viewer
  • Form Preview
  • VirusTotal scan report
  • Compiler and installer/packer/protector identification

  Free to use for private, educational and non-commercial purposes. For other usage you should buy a commercial licence.
