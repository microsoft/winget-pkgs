ReleaseNotes: |-
  ## Features
  - Added Linux-specific udev guidance when USB permission is denied (Linux only)
  - Added `--stop` command for best-effort capture stop on connected PXLogic devices to reduce accidental continuous acquisition risk
  - Hardened stop reliability: explicit stop register writes on normal completion, error unwind, and SIGINT/SIGTERM interruption paths
  - Release pipeline now auto-updates formula URL and SHA256 in `molqzone/homebrew-pxlobster`
