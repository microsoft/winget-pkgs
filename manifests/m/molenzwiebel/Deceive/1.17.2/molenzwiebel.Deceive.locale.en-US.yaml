ReleaseNotes: |-
  Welcome to Deceive v1.17.2! This release has some small fixes and changes a few things to hopefully prevent Deceive from being flagged by Windows Defender. If Deceive's already working fine for you, you can skip this update.
  Bug Fixes/Improvements
  - [v1.17.0] Fixed chat interception and restores proper usage of the friends list
  - [v1.17.0] Added a new tray option for choosing your chat status on startup. By default, this uses the status you last used.
    - IMPORTANT: This has a slight difference in behavior. If you previously set Deceive to "online" and restarted it, it would default back to offline. It now defaults to "Remember Last", which properly restores the online status. If you want to be absolutely sure you're always offline when you start Deceive, choose the "offline" option from the "Default Status on Startup" submenu.
  - [v1.17.2] Automatically detect if the localhost domain does not resolve and give advice on how to fix it.
  - [v1.17.2] Remove some possibly sensitive information from the logs that Deceive creates.
  This version of Deceive should work properly for standard/unmodified installs of League of Legends, Legends of Runeterra, VALORANT, and 2XKO. If you encounter any issues, please let me know on the Discord.
  As always, Windows may complain about the executable coming from an untrusted source. You can mitigate this warning by pressing More Info, followed by Run Anyway. If you want to be completely sure that Deceive is safe, you can also download Visual Studio and compile from source yourself.
  If your antivirus blocks Deceive, please let us know in the Discord so we can submit a sample. Deceive contains no viruses (obviously), but some virus scanners may incorrectly detect common pieces of code that are also used in malware.
