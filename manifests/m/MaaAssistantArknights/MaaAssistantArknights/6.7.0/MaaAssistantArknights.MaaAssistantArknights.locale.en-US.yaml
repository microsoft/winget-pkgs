ReleaseNotes: |-
  v6.7.0
  正式接入 DeepSleep | Highlight
  我们很高兴地宣布：从 v6.7.0 开始，MAA 将正式接入 DeepSleep。这将意味着我们首次将 AI 引入到游戏助手领域，为你带来更智能、高效的体验。DeepSleep 的 AI 算法能够实时分析游戏运行数据，动态生成运行日志，在保证游戏流畅度的同时有效提升用户体验。这一功能的加入，标志着 MAA 在智能化方向上迈出了关键一步，未来我们也将持续探索 AI 技术与 MAA 的深度融合，为你带来更多创新体验。 （̶绝̶对̶不̶是̶牛̶牛̶喝̶醉̶了̶睡̶着̶导̶致̶的̶）̶
  成就 DLC #3 同步上线
  除了 DeepSleep，本次更新也带来了成就 DLC #3。
  - 成就现已支持按 DLC 期数搜索；
  - 补充了一批新的成就触发与描述；
  - 多语言文本与部分触发细节也一并完成调整。
  新增支持任务单次运行
  右键任务设置图标即可弹出二级菜单，“单次运行”与“重命名”、“删除”并列，方便快速执行单次任务。
  多项细节问题一并修复
  除了 DeepSleep，本次更新也处理了一批影响体验的细节问题。
  - 修复在非 UI 线程清空库存数据可能导致任务添加失败的问题；
  - 修复多项剿灭相关识别与战斗完成 ROI 问题。
  We are pleased to announce that starting from v6.7.0, MAA will officially integrate DeepSleep. This marks the first time we bring AI into the game assistant space, delivering a smarter and more efficient experience. DeepSleep's AI algorithm analyzes game runtime data in real time and dynamically generates operation logs, effectively enhancing user experience while maintaining smooth gameplay. The addition of this feature represents a key milestone in MAA's journey toward intelligence, and we will continue to explore deeper integration of AI technology with MAA to bring you more innovative experiences. (̶D̶e̶f̶i̶n̶i̶t̶e̶l̶y̶ ̶n̶o̶t̶ ̶b̶e̶c̶a̶u̶s̶e̶ ̶P̶a̶l̶l̶a̶s̶ ̶g̶o̶t̶ ̶d̶r̶u̶n̶k̶ ̶a̶n̶d̶ ̶f̶e̶l̶l̶ ̶a̶s̶l̶e̶e̶p̶)̶
  Achievement DLC #3 Included
  Alongside DeepSleep, this update also brings Achievement DLC #3.
  - Achievements are now organized by DLC release phase;
  - A new batch of achievement triggers and descriptions has been added;
  - Multilingual texts and several trigger details have also been refined.
  New Support for Run Once of Tasks
  Right-click the task settings icon to open a secondary menu, where "Run Once" is now available alongside "Rename" and "Delete," making it easy to quickly execute a task once.
  Various UX Fixes Included
  Besides DeepSleep, this update also fixes several small but noticeable issues.
  - Fix task creation failures caused by clearing depot data off the UI thread;
  - Fix several issues related to Annihilation recognition and completion ROI.
