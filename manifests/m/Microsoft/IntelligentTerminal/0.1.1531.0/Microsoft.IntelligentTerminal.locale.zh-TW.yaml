ShortDescription: 智慧終端機是一個具有原生智慧代理整合的實驗性終端機，由 Windows 終端機 分支而來。主要功能包括在專用窗格中的智慧代理，可以看到您的 shell 內容、實時捕捉錯誤，並幫助您修正它們而無需複製貼上。要求它解釋失敗、產生命令或處理多步驟工作，同時您的 shell 保持暢通。
