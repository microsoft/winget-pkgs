ShortDescription: インテリジェント ターミナルは、Windows ターミナル からフォークされたネイティブ エージェント統合を備えた実験的なターミナルです。主な機能には、専用ペインで実行されるエージェントが含まれます。これは shell コンテキストを認識し、エラーをリアルタイムで捕捉し、コピー アンド ペーストなしで修正するのに役立ちます。エージェントに失敗を説明させたり、コマンドを生成させたり、複数ステップのタスクに取り組ませたりできます。その間、shell はブロックされません。
