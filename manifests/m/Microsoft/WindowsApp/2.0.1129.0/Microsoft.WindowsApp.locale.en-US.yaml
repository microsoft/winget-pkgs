ReleaseNotes: |-
  - Stability and performance improvements for Windows 365 Boot.
  - Improved handling of networks requiring captive portal in Windows 365 Boot.
  - Improved handling of auto-reconnect to remote sessions when undocking from a docking station and changing display configurations and network for Windows 365 Boot.
  - Improved client logging, diagnostics, and error classification to help admins troubleshoot connection and feed issues.
