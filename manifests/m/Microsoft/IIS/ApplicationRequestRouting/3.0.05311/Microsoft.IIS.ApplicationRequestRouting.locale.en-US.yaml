Description: >
  IIS Application Request Routing (ARR) 3 enables Web server administrators, hosting providers, and
  Content Delivery Networks (CDNs) to increase Web application scalability and reliability through
  rule-based routing, client and host name affinity, load balancing of HTTP server requests, and
  distributed disk caching. With ARR, administrators can optimize resource utilization for
  application servers to reduce management costs for Web server farms and shared hosting
  environments.
