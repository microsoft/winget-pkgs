ShortDescription: 确保 Windows 365 云电脑的输入安全
Description: |-
  Windows 365 云电脑已对会话进行加密，并强制执行基于身份的多重身份验证（MFA）等方法，以防止会话劫持和中间人攻击。然而，针对 Windows 云会话的端点设备驻留威胁（如键盘记录器）仍可能窃取敏感数据，导致合规风险和财务损失。
  Windows Cloud IO 保护通过内核级驱动程序和系统级加密填补了这一安全缺口，它将键盘输入直接安全路由至云电脑，绕过易受恶意软件攻击的操作系统层。当在云电脑或 Azure 虚拟桌面会话主机上启用此功能时，系统将强制执行严格的信任模型：
  - 仅受保护的物理端点设备可以连接。
  - 端点必须安装 Windows Cloud IO Protect MSI 才能受到保护。
  若未安装该 MSI，连接将被阻止并显示错误消息。这确保了 Windows 应用程序与云电脑/Azure 虚拟桌面会话主机之间的安全通道，提供无妥协的输入保护。
