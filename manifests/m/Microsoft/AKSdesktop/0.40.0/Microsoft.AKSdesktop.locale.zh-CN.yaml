ShortDescription: Azure Kubernetes Service (AKS) 桌面应用程序。
Description: |-
  Kubernetes 工作流通常需要编写和维护 YAML，切换不同的工具（如 kubectl、仪表板、监控工具），并理解底层基础设施概念。
  AKS 桌面版通过“项目”简化了这一过程，“项目”将应用程序所需的一切整合为一个可管理的单元，并提供引导式工作流，用于部署、监控、扩展和排查应用程序问题。
  AKS 桌面版可在您现有的环境和工具中运行，包括 Visual Studio Code、GitHub 和 CI/CD 管道。它能够连接到您现有的 AKS 集群，并支持跨开发、测试、预发布和生产环境的多环境场景，包括 Azure 混合云和边缘部署。
