ShortDescription: This DirectXMesh sample is an implementation of the meshconvert command-line texture utility from the legacy DirectX SDK utilizing DirectXMesh rather than D3DX.
Description: |-
  Meshconvert is a command-line mesh conversion tool developed by Microsoft as part of the DirectXMesh library. It is designed for processing a Wavefront OBJ file and converting it to a CMO, SDKMESH, or VBO with support for generating normals and tangent frames as well as performing vertex-cache optimization.

  Input format: Wavefront OBJ
  Output formats:
  - CMO (Compiled Mesh Object)
  - SDKMESH (DirectX SDK Mesh)
  - VBO (Vertex Buffer Object)
