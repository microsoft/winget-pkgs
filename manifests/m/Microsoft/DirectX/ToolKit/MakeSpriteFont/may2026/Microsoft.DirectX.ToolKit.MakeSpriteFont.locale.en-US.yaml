ShortDescription: Command line tool used to generate binary resources for use with SpriteFont.
Description: MakeSpriteFont is a command line tool used to capture a TrueType font into a sprite sheet and accompanying metadata for use with the SpriteFont class. It is part of the DirectX Tool Kit, a collection of helper classes for writing Direct3D 11 / Direct3D 12 applications in C++.
