ShortDescription: Remote Help is an enterprise application that works with Intune and enables information and front-line workers to get assistance from support staff over a secure remote connection.
Description: |-
  Remote Help is an application that works with Microsoft Intune and enables your information and front-line workers to get assistance when needed over a remote connection. With this connection, your support staff can remote connect to the user's device. During the session they can view the device's display and, if permitted by the device user, take full control. Full control enables a helper to directly make configurations or take actions on the device.

  Remote Help uses Microsoft Entra ID for authentication and requires an eligible Intune add-on license. It is intended for managed enterprise environments.
