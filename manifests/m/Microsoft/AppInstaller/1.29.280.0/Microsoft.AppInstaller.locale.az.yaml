PackageName: Proqram Quraşdırıcısı
ShortDescription: Eyni zamanda, Windows 10 və Windows 11 cihazlarında proqramları aşkarlamaq, quraşdırmaq, yeniləmək və konfiqurasiya etmək üçün güclü əmr sətri aləti olan Windows Paket Meneceri (WinGet) üçün çatdırılma vasitəsi kimi xidmət edir.
Description: |-
  Eyni zamanda, Windows 10 və Windows 11 cihazlarında proqramları aşkarlamaq, quraşdırmaq, yeniləmək və konfiqurasiya etmək üçün güclü əmr sətri aləti olan Windows Paket Meneceri (WinGet) üçün çatdırılma vasitəsi kimi xidmət edir.

 عینی زاماندا، ویندوْوس ۱۰ و ویندوْوس ۱۱ جیهازلارؽندا پروْقراملاری آشکارلاماق، قۇراشدیرماق، یئنیلهمک و کوْنفیقوراسییا ائتمک اۆچون گۆجلو امر ستری آلتی اوْلان ویندوْوس پاکئت مئنئجئری اۆچون چاتدؽریلما واسیطهسی کیمی خیدمت ائدیر.

  Ејни заманда, Windows 10 вә Windows 11 ҹиһазларында програмлары ашкарламаг, гурашдырмаг, јениләмәк вә конфигурасија етмәк үчүн ҝүҹлү әмр сәтри аләти олан Windows Пакет Менеҹери (WinGet) үчүн чатдырылма васитәси кими хидмәт едир.
