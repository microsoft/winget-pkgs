PackageName: ئەپ ئورناتقۇچ
ShortDescription: Windows بولاق باشقۇرغۇچىسى (WinGet) نىڭ يەتكۈزۈش ۋاستىسى سۈپىتىدە خىزمەت قىلىدىغان بولۇپ، ئىشلەتكۈچىلەرنىڭ Windows 10 ۋە Windows 11 ئۈسكۈنىلىرىدە پىروگراممىلارنى بايقاش، قاچىلاش، يېڭىلاش ۋە تەڭشەش ئىمكانىيىتىگە ئىگە قىلىدۇ.
Description: |-
  Windows بولاق باشقۇرغۇچىسى (WinGet) نىڭ يەتكۈزۈش ۋاستىسى سۈپىتىدە خىزمەت قىلىدىغان بولۇپ، ئىشلەتكۈچىلەرنىڭ Windows 10 ۋە Windows 11 ئۈسكۈنىلىرىدە پىروگراممىلارنى بايقاش، قاچىلاش، يېڭىلاش ۋە تەڭشەش ئىمكانىيىتىگە ئىگە قىلىدۇ.
  
  Windows bolaq bashqurghuchisi (WinGet) ning yetküzüsh wastisi süpitide xizmet qilidighan bolup, ishletküchilerning Windows 10 we Windows 11 üsküniliride pirogrammilarni bayqash, qachilash, yéngilash we tengshesh imkaniyitige ige qilidu.

  Windows болақ башқурғучиси (WinGet) ниң йәткүзүш вастиси сүпитидә хизмәт қилидиған болуп, ишләткүчиләрниң Windows 10 вә Windows 11 үскүнилиридә пирограммиларни байқаш, қачилаш, йеңилаш вә тәңшәш имканийитигә игә қилиду.
