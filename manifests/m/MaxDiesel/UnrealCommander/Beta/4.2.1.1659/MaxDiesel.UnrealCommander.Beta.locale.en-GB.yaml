PackageIdentifier: MaxDiesel.UnrealCommander.Beta
PackageVersion: 4.2.1.1659
PackageLocale: en-GB
PackageName: Unreal Commander (Beta)
ShortDescription: Unreal Commander v4.21 beta 20 (build 1659) − is a freeware file manager for Windows® Vista/7/8/10/11.
Description: |-
  Unreal Commander's characteristics：

  • Two-panel interface
  • UNICODE support
  • Extended search of files
  • Multi-rename tool
  • Synchronisation of directories
  • Support of archives ZIP, 7Z, RAR, CAB, WIM, TAR, GZ, TGZ, BZ2, TBZ2, LHA, ARJ
  • Built-in FTP client
  • Thumbnail mode
  • Folder tabs
  • Support of WLX/WCX/WDX plugins
  • Built-in viewer and quick view function
  • Network support
  • Drag and Drop Support
  • History and Hotlist functions
  • Copy/move/delete files background mode support
  • Deleting files with WIPE
  • Background pictures support
  • Visual styles：colour categories of files, fonts for all interface elements
  • and more.
