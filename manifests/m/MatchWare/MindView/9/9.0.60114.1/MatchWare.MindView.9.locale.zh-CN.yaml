ShortDescription: 一款专业的思维导图软件，具有 6 种可互换视图，并可与 MS Office 无缝集成。
Description: |-
  MatchWare® MindView™ 是组织信息的完美工具！简单易学，易于使用，MindView 是一种高效、可视化的方式，用于头脑风暴、发展和构建思路。它同样适用于教育、商业和各类组织机构。

  这是你的主意。你想怎么处理？
  MindView 基于思维导图 ® 的概念。一张思维导图以一个中心主题为核心，周围围绕着与该中心主题相关联的其他主题。通过以可视化且非层级化的方式组织信息，思维导图帮助个人和企业实现更高水平的表现。
  使用 MindView，您可以快速创建、编辑和设计思维导图，以组织您的想法。但您并不仅限于使用思维导图，您还能访问大量功能，为您开发和利用信息提供丰富多样的选择。其核心理念非常简单：这是您的创意。您想对它做什么？

  快速开发和编辑您的想法
  您可以基于一个中心主题快速创建新文档，并插入包含更多信息的其他主题。MindView 提供了丰富的现成模板可供选择，您也可以从零开始并快速获得成果。您可以通过拖放方式快速重新组织您的想法。
  您可以插入图标和图片，帮助您全面掌握文档内容。您可以从任意来源捕获图像和文字，并使用麦克风口述想法。您可以为主题添加数值，并插入公式，自动对这些数值进行计算。MindView 提供了内置的设计和格式化选项，帮助您快速完善文档的视觉效果，同时还提供多种导航和查看功能，使您能深入到最细微的层面浏览文档。
  编辑主题如同使用文字处理软件一样简单。您可以添加注释和文字备注以提供更多细节，并可为文档创建参考文献并插入引文。如果您需要更详细的资料或参考资料，还可以将任意类型的文件作为附件添加。当您在创建或编辑文档过程中缺乏灵感时，内置的 AI 功能可帮助您快速生成、编辑和翻译内容，极大加快您的头脑风暴进程。

  以您想要的方式查看内容
  有时候，将想法以不同的视图呈现会让理解更加清晰。使用 MindView，您可将内容以思维导图（包括上下结构、WBS、左右结构等视图）或时间轴、大纲、看板、年轮图、甘特图等方式呈现。
  每种视图都有其独特优势。例如，思维导图视图非常适合头脑风暴，看板和年轮图视图非常适合任务管理，而甘特图视图则非常适合复杂的项目管理。但无论您切换到哪种视图，文档内容本身不会受到影响（少数情况下切换至甘特图视图除外；更多信息请参见“使用不同视图”）。不确定您的内容应该是任务列表、时间轴还是组织结构图？全部尝试一遍即可：使用 MindView，您无需立刻做出最终决定。

  连接与协作
  MindView 支持您将文档存储在 Google Drive 或 Microsoft OneDrive 等在线工作区，并与其他 MindView 用户共享，也可以通过电子邮件将文档发送给其他用户。如果您从 MindView 登录 MatchWare 账户，即可完全访问 MindView 套件提供的强大协作功能：
  - 您可通过将文档保存在专用于 MatchWare 的工作区 MindView Drive，与其他用户实时协作。存储在此处的文件还可通过 MindView Online 和 Mac 版 MindView 打开。
  - 您可将文档发布到公共的 MatchWare 思维导图库中。
  - 您可使用任务系统，轻松与其他 MindView 用户共享任务。
  - 您可使用 MindView Assist 智能手机应用程序创建调研笔记和任务，并将它们插入到您的 MindView 文档中。

  以您自己的方式使用 MindView
  MindView 的辅助技术功能帮助每位用户更好地使用该应用程序。除了鼠标和键盘操作外，您还可以使用笔、触控和语音输入。您可向应用程序口述内容，也可在输入时让 MindView 提供建议；您可以使用快捷键访问所有重要命令，设置文本备注的背景颜色，并让应用程序朗读主题和备注中的内容。
  其中部分功能仅在 AT 版本中提供。
  MindView 已通过数字无障碍中心审计，符合 WCAG 2.2 AA 标准。

  导入和导出您的文档
  想从现有的 Microsoft Office 文件开始新项目？或者从 Outlook 导入任务列表？没问题。使用 MindView，您可以轻松地从多个 Microsoft Office 应用程序、XML 文件以及其他思维导图软件中导入文档和任务列表。
  只需选择您需要的文件，其余工作由 MindView 自动完成。文字、数字、图片、幻灯片及其他内容将自动转换为 MindView 中的主题和其他元素。
  当您完成 MindView 文档的编辑后，可使用多种创意模板将其导出至 Microsoft Office，或导出为 PDF、RTF 或 XML 文件、图片，或一个功能完整的基于 HTML 的网站，并可直接从 MindView 上传至 FTP 服务器。您还可以在 MindView 与 Outlook 之间同步任务信息，避免重复。如果您正在制作甘特图，还可将其导出至 Microsoft Project，以充分利用该软件强大的项目管理功能。
