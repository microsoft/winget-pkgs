ShortDescription: A professional Mind Mapping software application with 6 interchangeable views and seamless integration with MS Office.
Description: |-
  MatchWare® MindView™ is the perfect tool for organizing information! Easy to learn and easy to use, MindView is a highly effective way of brainstorming, developing and structuring ideas visually. It is equally well suited for use in education, business and organizations.

  It's your idea. What do you want to do with it?
  MindView is based on the concept of using mind maps®. A mind map consists of a central topic surrounded by other topics with relevant information related to the subject of the central topic. By organizing information in a visual and non-hierarchical manner, mind maps help individuals and businesses achieve higher levels of performance.
  Using MindView, you can quickly create, edit and design mind maps to organize your ideas. But you are not limited to using only mind maps, and you have access to a wide range of features that give you a world of options for developing and using information. The premise is very simple: It's your idea. What do you want to do with it?

  Quickly develop and edit your ideas
  You can quickly create a new document based on a central topic and insert more topics with additional information. MindView contains a wide selection of ready-made templates, but you can also work from scratch and get results fast. You can quickly reorganize your ideas by dragging and dropping them.
  You can insert icons and pictures that help you get an overview of your document. You can capture images and text from any source and dictate ideas using your microphone. You can add numerical values to your topics and insert formulas that automatically carry out calculations on those values. MindView gives you built-in design and formatting options that help you quickly develop the visual aspect of your document, and you have many options for navigating and viewing your document down to the smallest detail.
  Editing your topics is as easy as using a word processor. You can add comments and text notes with additional detail, and you can create a bibliography for your document and insert citations. If you need even more detail or reference material, you can add any file type as an attachment. And if you should run out of inspiration when creating or editing your document, the built-in AI feature helps you quickly create, edit and translate content, greatly speeding up your brainstorming processes.

  View your content the way you want
  Sometimes ideas simply make better sense when seen in a different view. With MindView, you can view your content as a mind map (including Top Down, WBS, Left and Right views) or as a timeline, an outline, a Kanban board, a year wheel or a Gantt chart.
  Each view has its particular advantages. For example, the mind mapping views are great for brainstorming, the Kanban and Year Wheel views are ideal for task management, and the Gantt view is well suited for complex project management. But no matter which view you switch to, the content of your document is not affected (except in some cases when you switch to the Gantt view; for more information, see "Using different views"). Not sure if you need to use your content as a task list, a timeline or an organization chart? Try them all out: With MindView, you do not need to make a final decision.

  Connect and collaborate
  MindView lets you store your documents in online workspaces such as Google Drive or Microsoft OneDrive and share them with other MindView users, and you can send your documents to other users via e-mail. If you log into your MatchWare account from MindView, you get full access to the extensive collaboration features available through the MindView suite:
  - You can collaborate with other users in real time by storing documents on the MatchWare-specific workspace MindView Drive. Files stored here can also be opened from MindView Online and from MindView for Mac.
  - You can publish your documents on the public MatchWare map library.
  - You can use the Task System to easily share tasks with other MindView users.
  - You can use the MindView Assist smartphone app to create research notes and tasks, and insert them in your documents in MindView.

  Use MindView your way
  The assistive technology features in MindView help any user use the application. In addition to using mouse and keyboard, you can use the application using pen, touch and speech input. You can dictate content to the application, you can let MindView provide suggestions as you type, you can access all important commands using shortcut keys, you can set the background color used in text notes, and you can have the content of topics and notes read aloud.
  Some of these features are only available in the AT Edition.
  MindView is audited by the Digital Accessibility Centre in line with WCAG 2.2 AA standards.

  Import and export your documents
  Would you like to start working on a project from an existing Microsoft Office file? Or import a task list from Outlook? No problem. Using MindView, you can easily import documents and task lists from several Microsoft Office applications, from an XML file and from other mind mapping applications.
  Simply select the file you want and let MindView do the rest. Text, numbers, images, slides and other content are automatically converted to topics and other elements in MindView.
  When you have finished working on your MindView document, you can export it to Microsoft Office using a variety of creative templates, as a PDF, RTF or XML file, as a picture, or as a fully functional HTML-based web site that you can upload to an FTP server directly from MindView. You can synchronize task information between MindView and Outlook to eliminate redundancies. And if you are working on a Gantt chart, you can export it to Microsoft Project to take full advantage of the advanced project management capabilities of that application.
