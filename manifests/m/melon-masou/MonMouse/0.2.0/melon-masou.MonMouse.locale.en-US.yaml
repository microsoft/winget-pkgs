ShortDescription: Seamless switching between multiple mouses on multiple monitors.
Description: |-
  Seamless switching between multiple mouses on multiple monitors.
  The initial motivation behind MonMouse was reducing mouse movement when primarily working on the primary monitor and occasionally utilizing a pen tablet on the secondary monitor. The need to repeatedly move the mouse back to the primary monitor when switching to writing is tedious.
  Additionally, MonMouse integrates features aimed at enhancing mouse workflow across multiple monitors.
  NOTE：MonMouse is different from mouse multiplexer designed for multiple users "sharing" one PC with their own mouse. Instead, it remembers the cursor's position when you switch to another mouse, eliminating the need to reposition the cursor each time. Please note that MonMouse is not intended for use with two mouses simultaneously.
