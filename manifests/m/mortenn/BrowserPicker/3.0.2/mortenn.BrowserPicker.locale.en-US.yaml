ShortDescription: Smart browser selector for Windows
Description: |-
  A default browser replacement for windows to let you pick your preferred browser on the fly or in
  accordance with your own rules.

  You can easily configure it to use Firefox for github.com and slashdot.org, but leave Edge to
  handle microsoft.com and even let Internet Explorer handle that old internal LOB app you'd rather
  not use but must.
ReleaseNotes: |-
  Highlights
  - Fixed browser sort mode persistence so manual, usage-based, and alphabetical ordering survives restarts again.
  - Fixed clipped browser icons in settings dropdowns.
  - Prevented removing built-in browsers and polished the browser editor layout, sizing, and path handling.
  Changed
  - Normalized repository line endings with .gitattributes for cleaner cross-platform diffs.
  Resolved issues
  - Fixed browser sort mode resetting after restart. Resolves #221.
  - Fixed browser icon clipping in settings dropdowns. Resolves #222.
  - Fixed removable controls appearing for well-known browsers. Resolves #223.
  Included pull requests
  - #224 Persist browser sort mode across restarts
  - #225 Fix browser icon clipping in settings dropdowns
  - #226 Prevent removing well-known browsers and polish the browser editor
