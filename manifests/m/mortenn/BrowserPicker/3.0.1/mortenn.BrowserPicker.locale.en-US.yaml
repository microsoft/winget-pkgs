ShortDescription: Smart browser selector for Windows
Description: |-
  A default browser replacement for windows to let you pick your preferred browser on the fly or in
  accordance with your own rules.

  You can easily configure it to use Firefox for github.com and slashdot.org, but leave Edge to
  handle microsoft.com and even let Internet Explorer handle that old internal LOB app you'd rather
  not use but must.
ReleaseNotes: |-
  Highlights
  Feedback and diagnostics
  - Added an in-app Feedback tab with a live application log viewer, log filtering, and GitHub-ready bug report generation.
  - Added a direct Feedback shortcut from the picker window so diagnostics are easier to reach when something goes wrong.
  - Added viewer polish on top of the new feedback tooling, including better scrolling behavior, clearer formatting, log level filtering, and design-time/runtime fixes.
  Settings and backup improvements
  - Added clipboard-based settings copy/paste alongside file export/import.
  - Added generated JSON schema support for settings documents, plus schema-aware validation during import.
  - Hardened settings import/export so invalid or non-BrowserPicker JSON is reported cleanly instead of failing silently.
  - Clamped persisted window dimensions to sane rounded values and improved config-window sizing behavior.
  UI polish
  - Made settings links readable in dark mode and made the active tab easier to spot.
  - Aligned footer actions in the settings window for a more consistent layout.
  - Prefilled the Test Defaults URL box from the launch URL when appropriate.
  - Fixed designer/runtime issues around the feedback tab and sample data.
  Resolved issues
  - Fixed add-browser dialog theme colors. Resolves #215.
  - Fixed disabled browsers reappearing after launch. Resolves #213.
  - Fixed the configuration window expanding unexpectedly on the Defaults tab. Resolves #212.
  - Added the Auto close on focus lost behavior setting. Resolves #214.
  Included pull requests
  - #216 Fix add-browser dialog theme colors
  - #217 Fix disabled browser persistence on launch
  - #218 Fix config startup width on Defaults tab
  - #219 Add auto-close-on-focus-lost setting
  - #220 Add feedback diagnostics and settings import improvements
  Full Changelog: v3.0.0...v3.0.1
