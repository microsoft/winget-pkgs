ShortDescription: Virtual PDF printer for Windows - print to PDF and hand it to a configurable target application.
Description: |-
  miPDFconvert is a virtual PDF printer for Windows. Install it, print to the
  miPDFconvert printer from any application, and get a PDF - either handed
  automatically to a configurable target application or saved through a dialog.
  Based on clawPDF/mfilemon, uses Ghostscript. Installer and binaries are
  Authenticode-signed.
