ReleaseNotes: |-
  I'm excited to announce that we've released the NanaZip 6.0 Update 7, now available for download.
  Note: The next 6.5 Preview has been delayed to May or June because my boss asked me to wrestle with the ugly media player implementation before June, and I'll need a little time afterward to recover what’s left of my sanity.
  Starting with NanaZip 6.0 Update 5 (6.0.1698.0), we have fixed some security vulnerabilities reported by JarLob (Jaroslav Lobačevski):
  Note: It seems the CVE numbers are not available, use the GHSL number instead.
  Note: The current NanaZip 6.5 Preview has not fixed these issues. Please wait for the next 6.5 Preview.
  - GHSL-2026-125, CVE-2026-44215
  - GHSL-2026-128, CVE-2026-42446
  - GHSL-2026-130, CVE-2026-42442
  - GHSL-2026-131, CVE-2026-42443
  - GHSL-2026-132, CVE-2026-42445
  - GHSL-2026-133, CVE-2026-42355
  - GHSL-2026-134, CVE-2026-42444
  Release Notes
  - Fix parsing issues for the UFS/UFS2 file system image readonly support.
  - Update Mile.Mobility to 1.1.544.

