ReleaseNotes: |-
  I'm excited to announce that we've released the NanaZip 6.0 Update 5, now available for download.
  Note: The next 6.5 Preview has been delayed to May or June because my boss asked me to wrestle with the ugly media player implementation before June, and I'll need a little time afterward to recover what’s left of my sanity.
  Starting with NanaZip 6.0 Update 1 (6.0.1638.0) and 6.5 Preview (6.5.1638.0), we have fixed some security vulnerabilities reported by JarLob (Jaroslav Lobačevski):
  Note: It seems the CVE numbers are not available, use the GHSL number instead.
  - GHSL-2026-125
  - GHSL-2026-128
  - GHSL-2026-130
  - GHSL-2026-131
  - GHSL-2026-132
  - GHSL-2026-133
  - GHSL-2026-134
  Release Notes
  - Fix several issues for codecs. (Contributed by dinhngtu and JarLob.)
  - Fix the Sponsor Dialog is unavailable issue.
  - Update the installation instructions document. (Suggested by gentrydeng.)
  - Update the system requirements document.
  - Update Mile.Windows.Internal to 1.0.3586.

