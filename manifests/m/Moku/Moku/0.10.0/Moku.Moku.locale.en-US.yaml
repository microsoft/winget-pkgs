ReleaseNotes: |-
  # Moku v0.10.0
  **Released:** June 12, 2026
  > "New foundation, new possibilities, new bugs."
  
  ## Highlights
  
  Moku has been fully rewritten in **SvelteKit**, bringing a new **WebUI** mode, a dedicated **Recent tab** with unread state, and a longstrip reader. Flatpak and static build targets are also new in this release.
  
  ## New Features
  
  ### SvelteKit Rewrite
  - Full port to SvelteKit with improved performance throughout
  - New **WebUI** mode — access Moku from a browser without the desktop app
  
  ### Reader
  - **Longstrip viewer** — scroll-based reading mode for webtoons and vertical manga
  - Longstrip bookmark and progress bar support
  
  ### Recent Tab
  - Dedicated updates page with unread state tracking
  - Read chapters are dimmed; status bar added
  - Updates integrated into the Recent activity view
  
  ### Distribution
  - **Flatpak** packaging support
  - **Static build** workflow for standalone web deployment
  - Improved NixOS fetcher (FetcherVersion 3)
  
  ## Bug Fixes
  
  - Fixed reader closing to the wrong page on exit
  - Fixed longstrip bookmark not saving
  - Fixed browse bugs and library mapping issues
  - Fixed library filtering and `libraryShowAllInSaved` sync
  - Fixed home screen recommendations
  - Fixed WebUI and Tauri auth flows
  - Fixed splash screen memory leak and idle exit animation
  - Fixed manga detail page showing stale cover image
  - Fixed page blob URLs not being revoked on chapter change (memory leak)
  - Fixed settings scroll parallax and `will-change` layering
  - Fixed app-pin flow and download filesystem handling
  
  ## Notes
  
  - Touchscreen and gesture improvements ongoing (#29, #50)
  - Windows Hello still under evaluation (#49)
  
  **Full Changelog:** https://github.com/moku-project/Moku/compare/v0.9.4...v0.10.0
