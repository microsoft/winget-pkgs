ReleaseNotes: |-
  # Moku v0.10.1
  **Released:** June 14, 2026
  
  > "We fixed the bugs we knew about. The ones we didn't are your problem now."
  
  ## Bug Fixes
  - Fixed folder manga count not displaying correctly in settings (#101)
  - Fixed library multi-select bulk removal from folders (#100)
  - Fixed dropdown menus opening in wrong position (#102)
  - Fixed extension page failing to load (#98)
  - Fixed app data export broken on native (#97)
  - Fixed updates truncation in library view
  - Fixed filesystem platform-based folder open buttons
  - Fixed null extension handling on extension library
  
  ## Improvements
  - Replaced Rust file store with native TypeScript implementation (#97)
  - Library toolbar scroll now scales with gesture input
  - Grid rendering optimizations
  - Cleaner icon set across library views (#100)
  
  ## Notes
  - Dropdown menu portal rework in progress (#102)
  - "Update All" button issue under investigation (#105)
  - App data wipe on update under investigation (#104)
  - Downloads recognition on open under investigation (#103)
  
  **Full Changelog:** https://github.com/moku-project/Moku/compare/v0.10.0...v0.10.1
