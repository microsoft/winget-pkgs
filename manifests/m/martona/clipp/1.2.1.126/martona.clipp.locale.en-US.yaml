ShortDescription: Peer-to-peer clipboard sync for Windows, macOS, and iOS over your LAN.
Description: |-
  Clipp is a free, open-source, peer-to-peer clipboard sync utility for Windows, macOS,
  and iOS (with a terminal-only Linux client). It shares clipboard text and images
  directly between devices you trust on a network you control -- never through the cloud.
  Connections are mutually authenticated and encrypted with libsodium primitives; devices
  pair with a shared group name and passphrase and confirm a non-secret fingerprint.

  The terminal is a first-class citizen: alongside the tray app, Clipp provides `clipp
  copy` and `clipp paste` -- think `pbcopy`/`pbpaste`, but network-enabled -- plus named
  registers (`clipp copy <name>`, `clipp ls`).
