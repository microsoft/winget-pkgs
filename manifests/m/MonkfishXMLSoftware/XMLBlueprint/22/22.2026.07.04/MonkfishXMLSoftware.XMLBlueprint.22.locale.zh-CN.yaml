Description: |-
  XMLBlueprint 是一款功能齐全的 XML 编辑器（或 XML IDE），支持创建和编辑
  - XML 文档
  - DTD
  - Relax NG 模式
  - Schematron
  - XML 模式
  - XSLT 样式表
  XMLBlueprint 包含众多智能编辑功能，可帮助您快速轻松地创建格式良好且有效的 XML。它支持 Unicode，这意味着您可以使用几乎任何语言来编辑和验证 XML 文档。
