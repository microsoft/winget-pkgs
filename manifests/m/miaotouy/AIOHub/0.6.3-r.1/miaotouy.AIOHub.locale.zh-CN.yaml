ShortDescription: AI 平台应用，提供多种实用的开发和日常工具，以及高可控性的 LLM 交互。
Description: |-
  一个基于 Tauri + Vue 3 + TypeScript 开发的桌面端枢纽应用，提供多种实用的开发和日常工具。

  🌟 旗舰功能：LLM 智能对话
  AIO Hub 的聊天功能是一个专为复杂任务和深度探索而设计的、高度可定制的对话式 AI 工作空间。
  🌐 开放的模型生态 (Open Model Ecosystem)
  无缝集成，灵活扩展。
  - 多服务商支持：原生支持 OpenAI, Anthropic (Claude), Google (Gemini), Cohere, DeepSeek 等多家主流 LLM 供应商。并且通过兼容 OpenAI API 的接口（如 Ollama, LM Studio, Llama.cpp），轻松接入和管理本地运行的语言模型。
  - 自定义端点：支持为所有已集成的服务类型（如 OpenAI, Claude, Gemini 等）添加自定义 API 端点，具备极高的可扩展性。
  - 可视化模型管理：在设置中可以集中管理所有模型的元数据，定义其能力（如视觉、工具使用），并在工具中根据任务需求（如“需要视觉能力”）进行智能筛选。
  🌳 双视图对话管理 (Dual-View Conversation Management)
  在传统的线性列表与创新的非线性图谱之间自由切换，满足不同场景的需求。
  - 传统线性视图 (Linear List View)
    - 极致性能：基于 @tanstack/vue-virtual 实现虚拟滚动，轻松处理包含数千条消息的超长会话，始终保持流畅。
    - 熟悉的体验：经典的自上而下消息流，符合直觉，上手零成本。
    - 消息导航器：配备了快速跳转（到顶部/底部）和新消息提示功能。
    - 精细化控制：消息的悬浮工具栏支持复制、编辑、重新生成、创建分支、上下文分析、禁用消息等多种功能，实现对会话的深度控制。
  - 非线性对话图谱 (Non-linear Conversation Graph)
    - 无限画布：由 Vue Flow + D3.js 驱动，将对话历史呈现为可交互的树状网络。
    - 双布局引擎：提供清晰层级的树状布局和动态物理模拟的力导向布局，并支持一键切换。
    - 高级节点操作：启用/禁用分支、查看详情、复制内容、删除子树。
    - 自由的结构重组：通过拖拽连接线“嫁接”分支，自由重组对话流，所有结构操作均支持撤销/重做。
    - 可视化辅助：内置小地图、缩放/平移控件和活动分支高亮，在复杂的对话网络中也能轻松导航。
  🛠️ 专业级上下文工程 (Prompt Engineering)
  完全掌控发送给模型的每一个 Token。
  - 上下文分析器：开发者级调试工具。清晰地查看最终发送给 LLM 的完整 Prompt、历史消息、Token 消耗和原始请求体。
  - 高级上下文注入：引入了声明式的消息注入策略，可以精确控制预设消息在上下文中的位置（如“倒数第二条”或“某个锚点之前”），并支持导入 SillyTavern 角色卡和预设，无缝复用社区资源。
  - 宏系统 (Macro System): 在 Prompt 中使用 {{user}}, {{time}}, {{random::...}} 等动态宏，构建强大的自动化工作流。
  - 智能体 (Agents): 智能体的核心是预设消息序列，它允许你将一系列 System, User, Assistant 消息（包括特殊的“用户档案”和“聊天历史”占位符）组合成一个可复用的模板。通过拖拽调整顺序、启用/禁用特定消息，可以构建出高度定制化的对话开场或上下文，并支持导入/导出和社区分享。
  - 动态智能体切换：与传统聊天应用中“一次会话绑定一个助手”的模式不同，AIO Hub 将会话与智能体彻底解耦。你可以在同一段对话中随时切换智能体，让“代码专家”帮你写代码，再无缝切换到“文档专家”帮你写注释，使对话能够围绕“任务”本身而非某个固定的“助手”展开。
  - 用户档案 (Personas): 预设多个用户身份（如“高级架构师”、“代码审查员”），随时切换，让 AI 更懂你的角色和需求。
  🖼️ 多模态交互 (Multi-modal Interaction)
  - 文件上传与引用：拖拽或粘贴图片、PDF、TXT 等文件到聊天窗口。文件将被资产管理器统一处理，方便在聊天中引用，以实现“总结这份 PDF”、“分析这张图表”等高级功能。
  - 视觉模型支持：完美配合 Gemini, Claude, GPT-5, Qwen-VL 等多模态模型的视觉识别能力。

  ✨ 核心亮点
  🖼️ 自由窗口管理
  打破传统布局限制。
  - 组件级分离：不仅是工具，连聊天输入框、对话区域都可以被拖拽成为独立的浮动窗口。
  - 状态同步：所有分离窗口共享同一个状态源，在一个窗口操作，所有窗口实时更新。
  - 记忆功能：自动记住所有窗口的位置和大小。
  🎨 极致视觉体验
  - 原生特效：支持 Windows Mica / Acrylic 和 macOS Vibrancy 毛玻璃特效。
  - 动态壁纸：支持视频/图片轮播壁纸，配合 CSS 混合模式 (Blend Modes)，打造沉浸式工作台。
  - 深度定制：内置 CSS 编辑器，支持实时修改应用样式的每一个细节。
  🧩 强大的插件系统
  - JavaScript 插件：轻量级 UI 扩展，即写即用。
  - Native 插件 (Rust): 高性能后端扩展，通过 DLL 动态加载。
  - Sidecar 插件：支持任意语言编写的独立进程插件。

  🚀 效率工具集
  📊 Git 仓库分析器 (Git Analyzer)
  基于 Rust git2-rs 的高性能分析工具
  - 无依赖：不依赖系统 Git 命令，直接读取 .git 数据库，速度极快。
  - 流式分析：采用流式传输技术，秒开大型仓库，实时渲染提交图表。
  - 多维可视化：贡献者热力图、提交频率图、代码行数统计。
  👁️ 智能 OCR (Smart OCR)
  多引擎融合的文字识别方案
  - 多引擎切换：支持 VLM (GPT-4o)、Windows Native (离线快)、Tesseract.js (纯前端)。
  - 智能切图：独创的长图切片算法，自动识别空白区域切割长截图，大幅提升识别率。
  - 批量处理：支持多图并发识别和结果导出。
  📦 资产管理器 (Asset Manager)
  应用级的资源中心
  - 统一索引：集中管理所有工具产生的图片、文档和媒体文件。
  - 自动去重：基于内容哈希 (SHA-256) 的自动去重机制，节省存储空间。
  - 高性能：Rust 后端驱动的快速索引和筛选，支持无限滚动。
  🎨 正则表达式应用器 (Regex Applier)
  双引擎正则处理工具
  - 实时预览：前端 JS 引擎提供毫秒级的输入反馈。
  - 批量处理：后端 Rust 引擎处理大规模文件修改，性能强劲。
  - 规则链：将多个正则替换组合成一条处理流水线 (Pipeline)。
  📝 富文本渲染引擎 (Rich Text Renderer)
  专为 LLM 流式输出打造的高性能渲染方案
  - 零闪烁流式渲染：采用增量 Diff 算法和 Patch 系统，完美解决流式输出时的抖动问题，带来打字机般的丝滑体验。
  - 深度混合排版：自研解析器，完美支持 Markdown 与任意深度 HTML 标签的混合嵌套。
  - 丰富的交互组件：
    - 代码块：集成 Monaco Editor，提供专业级的高亮、折叠和字体控制。
    - 思维链：原生支持 <think> 标签，以可折叠的动态组件展示 LLM 的思考过程。
    - 图表与公式：内置 Mermaid 图表（支持缩放/独立窗口）和 KaTeX 数学公式渲染。
  - MD 样式编辑器 (Style Editor):
    - 所见即所得：针对标题、段落、引用、代码等每一种 Markdown 元素提供独立的实时预览面板。
    - 全掌控：可精细调整字体、颜色、边距等 CSS 属性，打造独一无二的阅读体验。
    - 灵活性：支持一键启用/禁用自定义样式，或重置为系统默认，随心切换。
  🛠️ 更多实用工具
  - JSON 格式化：智能格式化和美化 JSON 数据，支持语法高亮和错误提示，可一键发送至聊天窗口进行分析。
  - Token 计算器：估算文本 Token 数，支持多种分词模型。
  - 颜色提取器：屏幕取色、图片色板分析。
  - 文本差异对比：基于 Monaco Editor 的专业级 Diff 工具。
  - 目录树生成：生成项目结构树，支持 .gitignore 过滤。
  - 以及更多工具……
ReleaseNotes: |-
  📌 版本概览
  v0.6.3-r.1 是 AIO Hub 在 0.6.x 系列中的首个发布候选版本，标志着本轮迭代已趋于稳定。自上一个 Beta 版本以来，我们完成了大量新功能开发、性能优化、测试覆盖与架构重构，并修复了数十个已知问题。此版本重点增强了本地文件操作安全管控、窗口自动化能力、应用内更新闭环、插件常驻进程支持，以及全面提升了工具模块的可靠性与可测试性。
  我们建议所有用户和开发者升级到此版本进行验证，并欢迎反馈任何问题。

  ✨ 新增功能
  🛡️ 本地文件操作器（AIO File Operator）
  - 引入全新的 AIO 本地文件操作器 工具，为 AI 智能体提供安全、受控的本地文件读写与目录管理能力。
  - 支持 8 种 Agent 可调用方法：读写、追加、删除、目录列表、路径存在检测、差异修改（Diff）等。
  - 集成 路径权限安全模式（白名单/黑名单），支持对特定目录设置“死区”（完全禁止）或“审批区”（必须审批）规则，灵活平衡安全性与可用性。
  - 支持旧版 Office 文档（.doc/.ppt/.xls）自动转换为现代格式（.docx/.pptx/.xlsx），确保兼容性。
  - 所有操作记录审计日志，支持配置覆盖策略、文件大小上限，并实现异步持久化存储。
  🔄 应用内更新闭环
  - 实现完整的应用内更新流程：检查更新 → 下载 → 安装 → 重启，无需跳转浏览器。
  - 新增 更新通道选择（稳定版 / 预发布版），用户可在设置中自由切换。
  - 稳定版走 Tauri Updater，预发布版从 GitHub Releases 获取最新版本，双重保障。
  - 下载过程显示进度条，支持手动下载兜底。
  🪟 窗口自动化助手（Window Automator）
  - 新增可视化动作流编辑器，支持后台点击、按键、延时、颜色判断、跳转、循环计数、日志、OCR 识别等 8 种步骤类型。
  - 引入 子流程/函数调用 机制，支持将常用步骤序列封装为可复用函数，支持形参定义、实参传递和返回值绑定。
  - 提供 步骤多选提取为函数、函数库 JSON 导入/导出功能，大幅提升自动化方案的模块化与复用性。
  - 支持 F10 全局快捷键 一键启停当前方案。
  - 内置截图取点弹窗，支持单点选色与区域框选，自动填充坐标。
  🔌 插件系统增强
  - Sidecar 常驻进程管理：支持 JSON-RPC 长连接，显著降低重复调用延迟，并支持主动事件推送。
  - 插件引入 平台与版本兼容性校验（host.platforms 字段），自动识别当前系统平台并给出兼容性提示，不影响加载。
  - 插件 SDK 新增 openDialog / saveDialog API，方便插件调用系统文件对话框。
  - 完善插件 UI 开发文档，支持纯 JavaScript、原生 DOM、iframe 嵌入等多种方案，降低开发门槛。
  🧪 测试基础设施
  - 为 15+ 核心工具模块 添加了完整的单元测试，覆盖 Agent 调用路径、参数适配、错误处理与边界情况。
  - 实现 ConfigManager 内存降级，在非 Tauri 环境（如 Vitest/Bun 脚本）下自动切换为内存存储，无需 Mock Tauri API，为所有工具提供开箱即用的测试能力。
  - 新增标准化 Mock 工具集和全面的 Tool Calling 测试套件（20+ 测试用例）。
  📄 文档解析与转写
  - 支持 PPTX 和 XLSX 文档 的解析与文本提取，并支持在模型支持视觉时将幻灯片/工作表拆分为图片附件参与上下文。
  - 扩展文档转换链路，使旧版 XLS 文件也能自动转换为 XLSX，与 DOC/PPT 保持一致。
  🧠 其他新特性
  - 强制重新转写所有附件：无视当前转写状态，一键重新发起所有附件的转写任务。
  - 工具调用功能说明弹窗：详细解释启用状态、自动批准、优先级和提示词宏的用法，帮助用户理解工具调用控制。
  - 搜索结果展示可配置：用户可在设置中自定义结果展示文件数和每文件匹配数，并支持超长行的智能裁切。
  - 拖放体验升级：通过本地 wry patch 扩展 Windows 拖放路径解析，支持 VSCode 等来源的绝对路径获取；同时全面支持 H5 原生文件拖放，提供双模式切换。
  - 版本更新通道选择：设置界面新增通道切换组件，支持稳定版/预发布版。

  🔧 改进与优化
  核心框架与工具
  - 统一 Agent 布尔参数解析：重构 12 个工具注册表，新增 parseAgentBoolean 等函数，统一处理字符串、数字、布尔值的参数转换，提升健壮性。
  - ConfigManager 增强：支持内存降级模式，便于测试；修复 settings.json 路径读取错误。
  - 目录树工具：默认过滤模式从 none 改为 gitignore，提升开箱即用体验。
  - Git 分析器：支持短哈希查询提交详情，无需提供完整 40 位 SHA。
  - 聊天话题命名：优化上下文清理策略，对 Base64 数据 URL 和超长代码块进行智能折叠和截断，提升命名准确性。
  UI/UX
  - AIO 文件操作器：重构组件结构，拆分安全配置面板和审计日志面板为独立组件，支持日志面板折叠与拖拽调整宽度，布局更灵活。
  - 拖放交互：实现 Tauri 拦截器禁用开关，支持 H5 原生拖放与 Tauri 拦截器自由切换，解决分离窗口内拖拽失效问题。
  - Smart OCR：自动为粘贴截图生成友好文件名，同名文件自动添加序号；结果面板支持点击分组切换选中图片，并自动展开滚动到对应分组，交互更流畅。
  - 窗口自动化：重构步骤编辑器为 Quicker 风格一体化布局，引入 VSCode 风格侧边栏与折叠面板，编辑体验大幅提升。
  构建与部署
  - 引入构建脚本，支持动态签名配置，无签名密钥时自动修改配置以支持无签名构建，CI 兼容性更好。
  - 支持本地构建（--local 参数）和版本号动态注入 Git 提交哈希，便于调试。
  - 优化 VMware 共享目录同步，提取公共脚本消除重复代码。
  - 统一各工作流构建命令，修复 YAML 格式问题。
  文档与规范
  - 重构插件开发文档，拆分为多篇独立指南，补充钩子系统、异步任务、持久型 Sidecar 等高级主题。
  - 新增工具测试覆盖规划文档，明确测试目标、原则和实施路线。
  - 更新 AGENTS.md，补充 VCP 协议说明、任务执行规范（偏差处理、文档回写）等，提升协作效率。

  🐛 修复的问题
  核心功能
  - 文本差异引擎：修复相同内容被误判为成功的问题。
  - Web Distillery：修复 cleanMode 参数在字符串 "false" 时被误判为 true 的问题。
  - 目录树：修复路径片段搜索时路径构建缺失当前节点名称的 bug。
  - 数据过滤器：修复 keepUnmatched 选项未正确生效的问题。
  - Rich Text Renderer：修复 <pre>/<code> 标签内空白丢失及内部标签解析问题；修复 diffAst 子节点从无到有时无法处理的问题。
  - VCP Connector：修复 internal_request_file 协议的跨平台路径转换和响应格式校验问题。
  - 聊天输入：修复插入文本后光标位置重置的 Bug，通过 nextTick 确保 DOM 更新后再设置光标。
  - 中断请求：修复主动停止请求的 URL 路径重复问题，并改为通过 Rust 代理发送，保持网络一致性。
  - SKILL.md 解析：增强 YAML 解析容错，当格式不规范时自动回退正则解析，提升安装成功率。
  - 插件管理器：修复文件拖放区域无法响应动态元素变化的问题，通过 watch 自动重新绑定监听器。
  - Sidecar 插件：修复常驻进程启动失败时的资源泄漏和死锁问题，优化锁作用域；修复应用退出时未清理残留进程的问题。
  - 配置管理：修复多处 settings.json 路径读取错误（Asset Manager、Config Manager、启动配置等）。
  性能与稳定性
  - Sidecar 常驻进程：支持指定工作目录，确保进程正确访问插件资源；优化重复启动逻辑，检测存活状态并复用。
  - OCR 引擎：为插件引擎实现零拷贝图片传输（通过文件路径），避免 base64 编解码开销，提升大图识别性能。
  - 应用退出：新增 kill_all() 方法，强制终止所有常驻进程，防止残留。
  其他
  - 拖放：修复分离窗口内 H5 原生拖放失效问题，通过新增 disable_drag_drop_handler 配置项恢复功能。
  - Git 分析器：修复短哈希无法查询提交详情的问题。
  - 话题命名：修复 Base64 数据 URL 干扰命名的问题，新增清理逻辑。

  开发者相关
  - 测试覆盖：新增 aio-file-operator、dir-search、directory-tree、data-filter、content-deduplicator、json-formatter、text-diff、token-calculator、web-distillery、knowledge-base、git-analyzer、ffmpeg-tools、skill-manager、tool-calling 等模块的单元测试，累计新增 100+ 测试文件。
  - 工具测试指南：新增《工具方法测试覆盖指南》和《解耦与测试方案》，帮助开发者快速编写 Agent 接口测试。
  - 构建脚本：新增 scripts/build.ts，支持动态签名配置；新增 scripts/generate-updater-manifest.ts 用于生成更新清单。
  - 文档更新：插件开发文档全面重构，新增钩子系统、异步任务、Sidecar 常驻进程等章节；知识库模块新增数据库化设计和检索模式调查文档。
  - 依赖升级：移除废弃的 vuedraggable，统一替换为 vue-draggable-next。
