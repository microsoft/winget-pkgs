ShortDescription: AI 平台应用，提供多种实用的开发和日常工具，以及高可控性的 LLM 交互。
Description: |-
  一个基于 Tauri + Vue 3 + TypeScript 开发的桌面端枢纽应用，提供多种实用的开发和日常工具。

  🌟 旗舰功能：LLM 智能对话
  AIO Hub 的聊天功能是一个专为复杂任务和深度探索而设计的、高度可定制的对话式 AI 工作空间。
  🌐 开放的模型生态 (Open Model Ecosystem)
  无缝集成，灵活扩展。
  - 多服务商支持：原生支持 OpenAI, Anthropic (Claude), Google (Gemini), Cohere, DeepSeek 等多家主流 LLM 供应商。并且通过兼容 OpenAI API 的接口（如 Ollama, LM Studio, Llama.cpp），轻松接入和管理本地运行的语言模型。
  - 自定义端点：支持为所有已集成的服务类型（如 OpenAI, Claude, Gemini 等）添加自定义 API 端点，具备极高的可扩展性。
  - 可视化模型管理：在设置中可以集中管理所有模型的元数据，定义其能力（如视觉、工具使用），并在工具中根据任务需求（如“需要视觉能力”）进行智能筛选。
  🌳 双视图对话管理 (Dual-View Conversation Management)
  在传统的线性列表与创新的非线性图谱之间自由切换，满足不同场景的需求。
  - 传统线性视图 (Linear List View)
    - 极致性能：基于 @tanstack/vue-virtual 实现虚拟滚动，轻松处理包含数千条消息的超长会话，始终保持流畅。
    - 熟悉的体验：经典的自上而下消息流，符合直觉，上手零成本。
    - 消息导航器：配备了快速跳转（到顶部/底部）和新消息提示功能。
    - 精细化控制：消息的悬浮工具栏支持复制、编辑、重新生成、创建分支、上下文分析、禁用消息等多种功能，实现对会话的深度控制。
  - 非线性对话图谱 (Non-linear Conversation Graph)
    - 无限画布：由 Vue Flow + D3.js 驱动，将对话历史呈现为可交互的树状网络。
    - 双布局引擎：提供清晰层级的树状布局和动态物理模拟的力导向布局，并支持一键切换。
    - 高级节点操作：启用/禁用分支、查看详情、复制内容、删除子树。
    - 自由的结构重组：通过拖拽连接线“嫁接”分支，自由重组对话流，所有结构操作均支持撤销/重做。
    - 可视化辅助：内置小地图、缩放/平移控件和活动分支高亮，在复杂的对话网络中也能轻松导航。
  🛠️ 专业级上下文工程 (Prompt Engineering)
  完全掌控发送给模型的每一个 Token。
  - 上下文分析器：开发者级调试工具。清晰地查看最终发送给 LLM 的完整 Prompt、历史消息、Token 消耗和原始请求体。
  - 高级上下文注入：引入了声明式的消息注入策略，可以精确控制预设消息在上下文中的位置（如“倒数第二条”或“某个锚点之前”），并支持导入 SillyTavern 角色卡和预设，无缝复用社区资源。
  - 宏系统 (Macro System): 在 Prompt 中使用 {{user}}, {{time}}, {{random::...}} 等动态宏，构建强大的自动化工作流。
  - 智能体 (Agents): 智能体的核心是预设消息序列，它允许你将一系列 System, User, Assistant 消息（包括特殊的“用户档案”和“聊天历史”占位符）组合成一个可复用的模板。通过拖拽调整顺序、启用/禁用特定消息，可以构建出高度定制化的对话开场或上下文，并支持导入/导出和社区分享。
  - 动态智能体切换：与传统聊天应用中“一次会话绑定一个助手”的模式不同，AIO Hub 将会话与智能体彻底解耦。你可以在同一段对话中随时切换智能体，让“代码专家”帮你写代码，再无缝切换到“文档专家”帮你写注释，使对话能够围绕“任务”本身而非某个固定的“助手”展开。
  - 用户档案 (Personas): 预设多个用户身份（如“高级架构师”、“代码审查员”），随时切换，让 AI 更懂你的角色和需求。
  🖼️ 多模态交互 (Multi-modal Interaction)
  - 文件上传与引用：拖拽或粘贴图片、PDF、TXT 等文件到聊天窗口。文件将被资产管理器统一处理，方便在聊天中引用，以实现“总结这份 PDF”、“分析这张图表”等高级功能。
  - 视觉模型支持：完美配合 Gemini, Claude, GPT-5, Qwen-VL 等多模态模型的视觉识别能力。

  ✨ 核心亮点
  🖼️ 自由窗口管理
  打破传统布局限制。
  - 组件级分离：不仅是工具，连聊天输入框、对话区域都可以被拖拽成为独立的浮动窗口。
  - 状态同步：所有分离窗口共享同一个状态源，在一个窗口操作，所有窗口实时更新。
  - 记忆功能：自动记住所有窗口的位置和大小。
  🎨 极致视觉体验
  - 原生特效：支持 Windows Mica / Acrylic 和 macOS Vibrancy 毛玻璃特效。
  - 动态壁纸：支持视频/图片轮播壁纸，配合 CSS 混合模式 (Blend Modes)，打造沉浸式工作台。
  - 深度定制：内置 CSS 编辑器，支持实时修改应用样式的每一个细节。
  🧩 强大的插件系统
  - JavaScript 插件：轻量级 UI 扩展，即写即用。
  - Native 插件 (Rust): 高性能后端扩展，通过 DLL 动态加载。
  - Sidecar 插件：支持任意语言编写的独立进程插件。

  🚀 效率工具集
  📊 Git 仓库分析器 (Git Analyzer)
  基于 Rust git2-rs 的高性能分析工具
  - 无依赖：不依赖系统 Git 命令，直接读取 .git 数据库，速度极快。
  - 流式分析：采用流式传输技术，秒开大型仓库，实时渲染提交图表。
  - 多维可视化：贡献者热力图、提交频率图、代码行数统计。
  👁️ 智能 OCR (Smart OCR)
  多引擎融合的文字识别方案
  - 多引擎切换：支持 VLM (GPT-4o)、Windows Native (离线快)、Tesseract.js (纯前端)。
  - 智能切图：独创的长图切片算法，自动识别空白区域切割长截图，大幅提升识别率。
  - 批量处理：支持多图并发识别和结果导出。
  📦 资产管理器 (Asset Manager)
  应用级的资源中心
  - 统一索引：集中管理所有工具产生的图片、文档和媒体文件。
  - 自动去重：基于内容哈希 (SHA-256) 的自动去重机制，节省存储空间。
  - 高性能：Rust 后端驱动的快速索引和筛选，支持无限滚动。
  🎨 正则表达式应用器 (Regex Applier)
  双引擎正则处理工具
  - 实时预览：前端 JS 引擎提供毫秒级的输入反馈。
  - 批量处理：后端 Rust 引擎处理大规模文件修改，性能强劲。
  - 规则链：将多个正则替换组合成一条处理流水线 (Pipeline)。
  📝 富文本渲染引擎 (Rich Text Renderer)
  专为 LLM 流式输出打造的高性能渲染方案
  - 零闪烁流式渲染：采用增量 Diff 算法和 Patch 系统，完美解决流式输出时的抖动问题，带来打字机般的丝滑体验。
  - 深度混合排版：自研解析器，完美支持 Markdown 与任意深度 HTML 标签的混合嵌套。
  - 丰富的交互组件：
    - 代码块：集成 Monaco Editor，提供专业级的高亮、折叠和字体控制。
    - 思维链：原生支持 <think> 标签，以可折叠的动态组件展示 LLM 的思考过程。
    - 图表与公式：内置 Mermaid 图表（支持缩放/独立窗口）和 KaTeX 数学公式渲染。
  - MD 样式编辑器 (Style Editor):
    - 所见即所得：针对标题、段落、引用、代码等每一种 Markdown 元素提供独立的实时预览面板。
    - 全掌控：可精细调整字体、颜色、边距等 CSS 属性，打造独一无二的阅读体验。
    - 灵活性：支持一键启用/禁用自定义样式，或重置为系统默认，随心切换。
  🛠️ 更多实用工具
  - JSON 格式化：智能格式化和美化 JSON 数据，支持语法高亮和错误提示，可一键发送至聊天窗口进行分析。
  - Token 计算器：估算文本 Token 数，支持多种分词模型。
  - 颜色提取器：屏幕取色、图片色板分析。
  - 文本差异对比：基于 Monaco Editor 的专业级 Diff 工具。
  - 目录树生成：生成项目结构树，支持 .gitignore 过滤。
  - 以及更多工具……
ReleaseNotes: |-
  核心亮点
  - 🧠 知识库系统 - 完整的 RAG 引擎，支持向量/全文/混合检索，为 LLM 提供持久化记忆能力
  - 🎨 媒体生成中心 - 对话化的多模态创作工作站，支持图像、音频、视频的 AI 生成与迭代
  - ⚡ 快捷动作系统 - 宏指令增强的输入栏，60+ 动态宏变量，兼容 SillyTavern 格式
  - 🔗 Deep Link 支持 - aiohub:// 协议集成，支持通过 URL 快速添加服务渠道
  - 🔍 内容查重工具 - 高性能的文件去重引擎，基于多级过滤漏斗和 Rust 后端
  - 🏗️ 架构重构 - Composables 模块化重组、错误处理规范化、存储性能优化
  🌟 新增核心功能
  1. 知识库系统 (Knowledge Base) - 完整的 RAG 引擎
  全新的知识库工具，为 LLM 提供持久化记忆和检索增强生成能力。
  - 多检索引擎支持：
    - 向量检索 (Vector) - 基于 Embedding 模型的语义相似度匹配
    - 全文检索 (Fulltext) - 基于 BM25 算法的关键词匹配
    - 混合检索 (Hybrid) - 结合向量与关键词的优势
    - 透镜系统 (Lens) - 基于标签和领域的过滤机制
  - 智能检索优化：
    - 查询预处理：文本清洗、分词、停用词过滤、Tag 自动提取
    - 自适应权重融合：根据知识库规模动态调整检索策略
    - 标签权重分级：区分核心标签与普通标签的检索待遇
    - 残差金字塔与偏振语义舵 (PSR) 高级算法
  - 向量缓存系统：
    - 双层缓存架构：本地内存缓存 + 全局跨窗口共享缓存
    - LRU 淘汰策略，支持配置缓存容量
    - 向量相似度缓存，减少重复 Embedding API 调用
    - Token 消耗统计与展示
  - 知识库管理：
    - CAIU (Context-Aware Information Unit) 条目管理
    - 标签池 (Tag Pool) 与标签海 (Tag Sea) 系统
    - 向量化任务队列与进度追踪
    - 实时监控面板：RAG 追踪、索引追踪、日志卡片
  - Chat 集成：
    - 知识库占位符编辑器：支持 static、dynamic 注入模式
    - 支持 static::all 模式一次性加载指定知识库的所有条目
    - 检索引擎可配置：在占位符、Agent 配置及全局设置中指定
    - 根据引擎智能判断是否需要向量化，避免不必要计算
  2. 媒体生成中心 (Media Generator) - 多模态创作工作站
  全功能媒体生成工作站，支持图像、音频、视频的 AI 生成与管理。
  - 对话化工作流：
    - 从扁平任务列表升级为基于节点树的对话模式
    - 支持多轮提示词迭代生成及上下文关联
    - 树形对话系统：支持分支切换、版本迭代、编辑历史
    - 虚拟滚动优化长列表性能
  - 多资产生成：
    - 一次生成多个媒体资产（如图像网格）
    - 支持图像网格、视频列表、音频列表布局
    - 分支选择器：列表预览模式，显示模型图标与媒体缩略图
  - 会话与任务管理：
    - 全局任务池：跨会话的任务追踪与管理
    - 智能分支关联：自动识别上下文，复用现有节点
    - 任务状态同步：持久化过程中的数据一致性保证
    - 会话草稿自动保存与跨窗口同步
  - 参数面板增强：
    - 连续对话开关：支持携带历史消息作为生成上下文
    - 模型能力适配：自动识别并同步连续对话开关状态
    - 视频时长、分辨率、音频质量等特定配置项
  - 提示词优化：
    - AI 辅助能力：通过 LLM 自动润色和扩充提示词
    - 动态选择模型并输入额外的风格或构图要求
    - 预设提示词随机刷新：20 条预设灵感库
  - 资产画廊：
    - 分页加载、无限滚动与搜索筛选
    - 生成参数查看：支持一键复刻参数进行二次创作 (Remix)
    - 媒体元数据嵌入：PNG Chunk 及通用文件尾部追加
    - 资产导入时自动持久化生成参数为本地 JSON
  - Suno 音乐生成集成：
    - 独立适配器：不依赖特定 ProviderType
    - 支持音乐生成、歌词生成、任务查询与轮询
    - 自定义模式和灵感模式支持
  3. 快捷动作系统 (Quick Actions) - 宏指令增强
  位于输入栏的指令增强系统，显著提升输入效率。
  - 快捷动作组管理：
    - 库管理功能：支持增删改查、克隆及批量管理
    - 导入导出：支持单文件 JSON 导出及多文件 ZIP 批量打包
    - 兼容酒馆 (SillyTavern) 格式导入
  - 多级关联：
    - 全局设置、智能体 (Agent) 和用户档案 (Profile) 多级绑定
    - 为特定智能体绑定快捷操作组
  - 平铺工具栏：
    - 参考 SillyTavern 设计，从二级菜单改为平铺工具栏
    - 支持平铺或按组分行两种布局模式
    - 异步预加载与按需加载逻辑
  - 宏引擎增强：
    - 60+ 动态宏：{{time}}, {{os}}, {{last_message}}, {{input}} 等
    - {{input}} 宏支持处理选中文字或全文
    - 模板编辑器支持通过 "{{ " 触发宏指令自动补全
    - 可视化宏选择面板
  4. Deep Link 支持 - URL 协议集成
  - aiohub:// 协议注册：
    - 支持 add-profile 和 providers 动作
    - 允许通过 URL 添加新的模型服务渠道
    - 自动推断提供商类型，提供友好的用户确认和引导
  - 事件监听：
    - 应用启动时监听来自原生插件或 single-instance 插件的 Deep Link 事件
    - 在 App.vue 中集成处理逻辑
  5. 内容查重工具 (Content Deduplicator)
  扫描目录并识别重复或相似的文本文件。
  - 多级过滤漏斗：
    - 文件类型过滤（跳过二进制文件）
    - 尺寸预过滤（基于文件大小差异）
    - 快速指纹（前/后 4KB 哈希）用于初步筛选
    - 规范化全文哈希，忽略格式差异
  - 预设配置：
    - 提供宽松、严格、代码、文档等模式
  - 可视化界面：
    - 左侧配置面板（路径选择、预设、高级选项）
    - 右侧结果面板（分组展示、搜索、筛选、排序、批量操作）
    - 文件内容对比视图
  - 后端实现：
    - Rust 后端实现文件收集、尺寸分桶、快速指纹、全文哈希
    - 集成 blake3 库用于高效哈希计算
  6. LLM 聊天增强
  - 附件占位符系统：
    - 引入 【file::assetId】 占位符
    - 允许用户控制转写内容在消息中的插入位置
    - 增强多模态模型的指向性
    - 设置项 autoInsertPlaceholder：开启后导入附件时自动插入占位符
    - AttachmentCard 右键菜单：支持插入和复制占位符
  - 搜索功能增强：
    - 多种匹配模式：精确、全部包含、任一包含
    - 后端匹配逻辑优化：引入 SearchMatcher 枚举
    - 前端集成：MiniSessionList, AgentsSidebar, SessionsSidebar 实现模式切换
  - 输入框增强：
    - CodeMirror 集成：搜索插件、中文本地化、快捷键优化
    - 本地路径转附件：支持 file:// 协议和 Windows 风格路径
    - 粘贴附件占位符 ID 同步：监听附件 ID 变化并自动更新
  - 消息渲染优化：
    - 历史消息中 【file::assetId】 占位符解析
    - 块级元素 Token 统计：代码块和工具调用的 Token 数量显示
    - Monaco 编辑器主题集成：Shiki 主题重命名与切换优化
  7. 转写工具增强 (Transcription)
  - 错误处理优化：
    - 错误详情查看功能：弹出详情弹窗
    - 错误信息截断：防止过长错误信息影响 UI
    - sanitizeErrorMessage 工具函数：清理敏感 base64 数据和过长内容
  - 工作台激活：
    - 添加转写任务时可激活工作台
    - 自动加载该任务的资产
  8. 更多 LLM 提供商支持
  - 新增提供商：
    - Azure OpenAI：支持资源名称、部署名称和 API 版本配置
    - NewAPI 聚合服务：为接入第三方 API 提供统一入口
    - DeepSeek, Groq, X.AI (Grok), SiliconFlow
  - 网络请求策略：
    - 新增 networkStrategy 配置项
    - 支持"自动"、"后端代理"或"原生请求"模式
    - 强制使用前端原生请求以提升性能
  - 代理行为配置：
    - 放宽证书校验：支持忽略无效证书
    - 强制 HTTP/1.1：解决协议不兼容问题
    - 强制模型列表获取走后端代理，绕过前端 CORS 限制

  🔧 架构优化与重构
  1. Composables 重构
  - 目录重组：将 14576 行代码的 composables 按功能分类到子目录
    - chat/ - 聊天核心逻辑
    - input/ - 输入框相关
    - session/ - 会话管理
    - settings/ - 设置管理
    - storage/ - 存储相关
    - ui/ - UI 相关
    - visualization/ - 可视化相关
    - features/ - 功能特性
  2. 错误处理与日志系统规范化
  - 模块化错误处理器：
    - 所有模块必须使用 createModuleErrorHandler(moduleName) 创建独立处理器
    - 禁止直接使用全局 errorHandler 单例
  - 使用模式：
    - wrapAsync / wrapSync 自动包装
    - 快捷方法：.error(), .warn() 等
    - handle 方法：支持静默处理、自定义消息、结构化上下文
  - 日志规范：
    - 模块化日志：使用 createModuleLogger(moduleName)
    - 结构化日志：第二个参数传递结构化 data 对象
    - 控制台折叠：大量数据日志默认折叠
  3. 存储性能优化
  - 二进制传输：
    - read_file_binary_raw 命令：直接返回 ArrayBuffer
    - 避免 IPC 序列化膨胀（3-4 倍）
  - 文本写入优化：
    - write_text_file_force 命令：直接接收 String 类型内容
    - 避免 Vec<u8> 转换为 number[]
  - 性能测试工具：
    - StoragePerformanceTester 组件
    - 多种方案对比测试
  4. LLM 代理重构
  - HTTP 服务器模式：
    - 基于 Axum 构建轻量级本地代理服务
    - 解决 IPC 序列化瓶颈
    - 前端直接请求本地代理端口
  - 代理配置增强：
    - 支持系统代理、手动指定代理及直连模式
    - 本地文件（local-file://）读取与注入逻辑优化
  5. 设置界面重构
  - LLM 服务配置：
    - 逻辑拆分为独立 Composable：useProfileEditor, useModelEditor, useConnectionTest
    - 网络配置项整合到可折叠面板
    - 新增网络设置摘要
  - 头像选择器增强：
    - 历史头像管理：删除功能、自动同步、"当前使用"标记
    - 存储路径解耦：storageSubdirectory prop
    - 事件处理统一：使用 update:modelValue

  🐛 Bug 修复与体验优化
  LLM 聊天
  - 修复 replacementType 默认值处理问题
  - 优化节点克隆元数据处理并修复响应式问题
  - 压缩节点删除逻辑优化：子节点提升挂载
  - 消息版本切换逻辑优化：移除等待时禁用限制
  - 粘贴 Base64 图像提取开关控制
  Git 分析器
  - 导出模块并发操作导致的重复加载问题修复
  - 支持导出时选择是否包含文件变更信息
  - 日期范围处理和格式化优化
  其他
  - RichTextRenderer 图片最大宽高限制优化
  - VcpToolNode 内容最大高度支持滚动
  - Worldbook 选择器和 PersonalitySection 初始化逻辑完善
  - SettingItemRenderer 修复多余闭合问题
