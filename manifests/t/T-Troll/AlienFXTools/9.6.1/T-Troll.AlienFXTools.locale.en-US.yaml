ReleaseNotes: |-
  Important! If you are using tools for the first time, please read the Beginner's guide and AlienFX-GUI readme to configure its concept and operation principle.
  Fan-SDK_V1.zip has binaries built against older fan control versions; use it only in case you know what you're doing (or have Aurora R7), Check the readme file inside the archive first to configure it to work!
  Changes in this release:
  Lights control SDK:
  - Some minor changes in color conversion to simplify code.
  AlienFX-GUI:
  - New: Accent color now can be used for gauges (including gradient gauges) and in Event Monitoring (using the "Default color" setting).
  - New: Detection schemes added for Alienware m18R1 and m18R2.
  - Minor changes in profile switch logic for faster profile change.
  - Bug fixed: UI hangs after Ambient effect stops in some cases.
ReleaseNotesUrl: https://github.com/T-Troll/alienfx-tools/releases/tag/9.6.1
