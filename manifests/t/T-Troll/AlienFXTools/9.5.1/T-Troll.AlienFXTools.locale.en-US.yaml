ReleaseNotes: |-
  Important! If you are using tools for the first time, please read the Beginner's guide and AlienFX-GUI readme to configure its concept and operation principle.
  Fan-SDK_V1.zip has binaries built against older fan control versions; use it only in case you know what you're doing (or have Aurora R7), Check the readme file inside the archive first to configure it to work!
  Changes in this release:
  AlienFX-GUI, AlienFan-GUI:
  - Tray tooltip reworked:
    - It now shows fan RPM percent instead of bare RPMs (a more compact view for longer descriptions).
    - Bug fixed: The tool crashed for a very long fan list (e.g., a desktop system with a lot of fans).
  AlienFX-GUI:
  - Bug fixed: The tool crashed if the first profile was active and removed using the "Profiles" tab's profile remove function.
  - Bug fixed: The tool crashed at start if an active profile was not found (e.g., after the situation described above). In this case, a new profile will be created (and can be deleted later at the "Profiles" tab).
