ReleaseNotes: |-
  Important! If you are using tools for the first time, please read the Beginner's guide and AlienFX-GUI readme to configure its concept and operation principle.
  Fan-SDK_V1.zip has binaries built against older fan control versions; use it only in case you know what you're doing (or have Aurora R7), Check the readme file inside the archive first to configure it to work!
  Changes in this release:
  All GUI tools:
  - Bug fixed: Incorrect working folder if the tool starts at Windows login. This provides some side effects like hardware detection glitches:
    - You should uncheck and check back "Start with Windows" in settings to update this setting.
    - After it, please open Task Scheduler and make sure the start entry is not doubled (it should not be, but it's better to check it).
  AlienFan-GUI:
  - Bug fixed: The tool does not show an error message if compatible hardware is not found.
  AlienFX-GUI:
  - Bug fixed: Tool crash at start if compatible fan/power hardware is not found.
