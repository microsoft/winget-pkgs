ReleaseNotes: |-
  What's new
  - Change mark unread behavior to only mark the latest mail in the current list when list is set to group by conversation #9545
  - Add "Reapply inbox rules" action to Settings > Email > Inbox rules #10461
  - Enforcing password change should apply to new users #10458
  - Allow navigating to Settings > Email > Undo send using Quick Actions #10492
  - Improvements to similar contact name comparison #10497
  - Ignore extra whitespace when comparing contacts for merging #10497
  - Too much empty space in the MailViewerHeader when the sender name isn't set #9547
  - Always pass id encoding when comparing ids of entities #10746
  - Update Request Size Limit Map #10523
  - Update Electron to v42.0.0

  Bugfixes
  - Incorrect counters caused by counter fixup while client is still syncing #10761
  - Index quick extend action does nothing on Free Accounts #10700
  - Search URL is not updated when viewing different mails in the list #10674
  - Cannot set offline range date more than 20 years from settings #10673
  - Uncaught Illegal key length error when entering incorrect Recovery Key #10602
  - Inbox rule priority not respected when "Never send it to spam" is unchecked #10598
  - Drafted email will not delete #10522
  - No contact found when viewing a contact list entry if the contact's email address has uppercase characters #10499
  - Invalid SpellCheckerDictionaryDownloadURL when updateUrl isn't set #10490
  - Spellchecker doesn't work on first launch until spellcheck language is changed #10487
  - ProgrammingError when loading mailDetailsBlob immediately after sending a draft #10476
  - Be able to properly undo deleted inline image #10468
  - Check for email count text is not correct #10467
  - [windows] EPERM, Permission denied error when setting Default mail handler #10435
  - Mac client update fails when the client is ran from a read-only volume #10185
  - Unset repository url error during custom desktop release #10465

