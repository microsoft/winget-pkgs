  - [web] Web Socket closed by SleepDetector when indexing a lot of large mails received on the same day #10973
  - Importing events with alarms setup for notifications and email can result and duplicated alarms #10972
  - Clicking open on attachment bubble in the mail editor downloads attachment #10915

