  - Allow clearing cache without clearing credentials #10919
  - Remove Local data's offline range section from setting #10917
  - Improve drag and drop indication #10914

  Bugfixes
  - BadRequestError when searching for contacts using OfflineDB #11050
  - repeatRules.excludedDates does not contain synthetic entries from altered instances when syncing external calendar #11034
