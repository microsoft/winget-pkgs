ReleaseNotes: |-
  New
  - Added a new Agent Inspector for viewing agent messages, tool calls, model details, cost, and latency.
  - Added caching recommendations for Agent Cache to help reduce latency and token usage for expensive agent calls.
  - Added an MCP traffic capture tool that automatically captures traffic only from applications launched from the current terminal session.
  - Added one-click MCP setup for supported IDEs and coding agents, making it easier to connect Fiddler without manual configuration.
  - Added a new Protobuf inspector.

  Fixed
  - Updated the MCP Setup Skill.
  - Updated the MCP core library.
  - Updated the list of models supported in the Debugging Assistant setup.
  - Updates for Windows Network Driver.
  - Updated third-party dependencies to mitigate potential security vulnerabilities.
