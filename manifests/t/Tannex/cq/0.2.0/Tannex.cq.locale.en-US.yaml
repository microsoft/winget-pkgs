ShortDescription: jq for COBOL - decode copybook-described EBCDIC records to JSON.
Description: cq parses a COBOL copybook and either prints the record layout (byte offset and length of every field) or decodes fixed-length EBCDIC records - for example a dataset streamed from z/OS through your Zowe config - into JSON. A built-in jq (-q) covers most filtering; pipe into real jq for anything else.
