ReleaseNotes: |-
  First official release of my fork of WiiBalanceWalker.
  Use VJoy.dll (optional) for interaction with VJoy as a virtual joystick (instead of WASD)

  Known issues:
  - Bluetooth stack BSOD when attempting to pair again after the balance board is already paired but in sleep mode, this is being looked into and will be resolved in later releases.

