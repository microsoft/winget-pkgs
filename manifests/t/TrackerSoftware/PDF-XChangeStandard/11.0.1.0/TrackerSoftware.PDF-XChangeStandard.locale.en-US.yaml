ShortDescription: This feature-rich virtual printer allows you to print-to-PDF to create fully compatible, text-searchable PDF files.
Description: PDF-XChange Printer Standard is a virtual printer that is used to convert industry-standard file formats to PDF. It's compatible with files from almost all Windows applications such as MS Word, Excel and AutoCAD. It features an optimized, hybrid engine that significantly increases the quality of conversion for images and image-based text characters, and prints to both GDI and XPS. PDF-XChange Printer Standard installs as a virtual printer that generates fully-compatible, industry-standard, native PDF files. It is used in the same manner as a standard printer - simply open files in their native application, select the option to Print and then select PDF-XChange Printer Standard from the list of available printers. The document will then be converted into PDF. You can also right-click web pages and click 'Convert to PDF' to convert web pages to PDF. There is a wide range of customizable settings available that can be used to enhance and edit converted documents, as detailed in the later chapters of this manual.
