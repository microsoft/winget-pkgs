ShortDescription: 这款功能丰富的虚拟打印机允许您通过打印到 PDF 的方式，创建完全兼容且可进行文本搜索的 PDF 文件。
Description: PDF-XChange Printer Standard 是一款用于将行业标准文件格式转换为 PDF 的虚拟打印机。它兼容几乎所有 Windows 应用程序的文件，如 MS Word、Excel 和 AutoCAD。它采用了优化的混合引擎，显著提高了图像和基于图像的文本字符的转换质量，并支持打印到 GDI 和 XPS。PDF-XChange Printer Standard 以虚拟打印机的形式安装，生成的 PDF 文件完全符合行业标准且具备原生特性。它的使用方法与标准打印机相同——只需在原生应用程序中打开文件，选择“打印”选项，然后从可用打印机列表中选择 PDF-XChange Printer Standard 即可。随后文档将被转换为 PDF。您还可以右键单击网页并点击“转换为 PDF”来将网页转换为 PDF。如本手册后续章节所述，软件提供了广泛的可自定义设置，可用于增强和编辑转换后的文档。
