ShortDescription: A simplified version of PDF-XChange Printer Standard virtual PDF printer.
Description: |-
  PDF-XChange Printer Lite is the lite version of PDF-XChange Printer Standard, which is used for the creation and virtual printing of industry-standard PDF files. PDF-XChange Printer Lite is compatible with files from almost all Windows applications such as MS Word, Excel and AutoCAD. It features an optimized, hybrid conversion engine that significantly increases the quality of conversion for images and image-based text characters and prints to both GDI and XPS. PDF-XChange Printer Lite installs as a virtual printer that generates fully-compatible, industry-standard, native PDF files. The files that it creates feature searchable text, which increases the efficiency of searching, selecting and editing files.
  Once you have installed PDF-XChange Printer Lite, and you are viewing documents in their native application, simply use the print feature in the software and select PDF-XChange Printer Lite as the printer to be used. Documents will then print to PDF. There are a range of adjustable settings that determine the parameters of printed documents, as detailed in the later chapters of this manual. PDF-XChange Printer Lite requires no additional 'plug-ins' or software. However, we recommend installing another of our products, PDF-XChange Editor, for the viewing and manipulation of files created using PDF-XChange Printer Lite. It's completely free, and the two products are designed to work in tandem.
