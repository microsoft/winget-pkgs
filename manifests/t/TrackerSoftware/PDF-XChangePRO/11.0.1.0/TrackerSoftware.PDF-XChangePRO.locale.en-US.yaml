ReleaseNotes: |-
  PDF-XChange Editor
  Bug fixes and other updates/enhancements:
  - Fixed a crash in the new Open/Save dialog box when creating a new folder in an unavailable network path. (49552)
  - Fixed a rare/infrequent crash on some dynamic XFA forms after changing their field values.
  - [installer] Fixed an issue where shortcuts were lost during an upgrade from the previous version.
  - [installer] Fixed an issue preventing migration of serial keys during updates from version 10.
  - Fixed the issues with the shell context menu after installation of version 11.
  - Fixed the issue with filtering comments. (49478)
  - Fixed the issue that caused "Error [IO subsystem]: Invalid access mode." when converting PDFs to MS Office formats.
  - Fixed an issue with the context menu position on some multi-monitor systems. (48467)
  - Fixed an issue with handling complex custom file filters, displayed by JS, in the new Open/Save Files dialog box. (49486)
  - Fixed several issues with the new 'Select Folder' dialog box. (49505)
  - Fixed an issue with the new custom 'Open File' dialog box when using double-click to open it. (49498)
  - Fixed an 'infinite' loop/proliferation in the 'Open Files' and 'Manage Places' dialog boxes. (49526)
  - Fixed an issue with handling the mouse wheel inside the document "Find" box. (49539)
  - Fixed an incorrect behaviour in the 'Go back (Alt+Left)' button in the new Open/Save Files dialog box. (49510)
  - Fixed an issue with the shortcut keys (Alt+Left/Right) after navigating via breadcrumb paths in the new Open/Save Files dialog box. (49554)
  - [installer] Fixed an issue with redrawing the progress text in the EXE installers.
  - Fixed the issue where a mouse click outside of the polyline/polygon context menu during annotation creation would cancel the annotation. (49475)
  - We switched back to using the system Open/Save/SelectFolder dialog box by default, instead of using the new one, because some popular features such as the QuickAccess/Recent items are missing in the new version. These will be added in a future release.
  - Replaced the 'Extension' column in the new Open/Save File dialog box with a more user-friendly 'Type' column. Also fixed some issues when handling the 'Show file extension' option. (49497)
  - Added the ability to authenticate local network shares in the new Open/Save Files dialog box. (49557)
  - Improved the handling of dates after 01.01.2030 in XFA files - now such dates are stored properly when set via the dropdown widget.
  - Flags NoZoom and NoRotate are now respected for only a limited subset of annotations.
