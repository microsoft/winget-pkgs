ShortDescription: All the features of PDF-XChange Editor Plus, PDF-Tools and PDF-XChange Standard in one economical bundle.
Description: |-
  The PDF-XChange PRO V11 bundle combines three of PDF-XChange's applications:
  - PDF-XChange Editor Plus – one of the fastest and most feature-rich applications used worldwide to create, view, edit and annotate PDF files.
  - PDF Tools – a dynamic and user-friendly solution for the batch-creation and manipulation of industry-standard PDF and image files. Featuring eighty-eight default tools, as well as the option to clone, edit and create fully-customizable tools, it’s the ideal software to compliment your existing PDF facilities.
  - PDF-XChange Standard – our virtual printer that is used to convert industry-standard file formats to PDF. It's compatible with files from almost all Windows applications such as MS Word, Excel and AutoCAD. It features an optimized, hybrid engine that significantly increases the quality of conversion for images and image-based text characters, and prints to both GDI and XPS.
  The combination of these products makes it possible to create, view, edit and print PDF files to the highest levels of quality.
