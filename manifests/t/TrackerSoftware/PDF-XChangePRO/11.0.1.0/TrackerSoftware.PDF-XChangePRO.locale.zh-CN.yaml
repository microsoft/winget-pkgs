ShortDescription: 将 PDF-XChange Editor Plus、PDF-Tools 和 PDF-XChange Standard 的所有功能整合进一个经济实惠的捆绑包中。
Description: |-
  PDF-XChange PRO V11 软件包整合了 PDF-XChange 的三款应用程序：
  - PDF-XChange Editor Plus —— 全球范围内用于创建、查看、编辑和注释 PDF 文件速度最快、功能最丰富的应用程序之一。此处可获取 PDF-XChange Editor 手册。
  - PDF Tools —— 一款动态且用户友好的解决方案，用于批量创建和处理行业标准的 PDF 及图像文件。它内置 88 种默认工具，并支持克隆、编辑和创建完全自定义的工具，是完善您现有 PDF 设施的理想软件。此处可获取 PDF-Tools 用户手册。
  - PDF-XChange Standard —— 我们的虚拟打印机，用于将行业标准的文件格式转换为 PDF。它兼容几乎所有 Windows 应用程序（如 MS Word、Excel 和 AutoCAD）的文件。它采用优化的混合引擎，显著提升了图像和基于图像的文字字符的转换质量，并支持打印到 GDI 和 XPS。此处可获取 PDF-XChange Standard 用户手册。
  这些产品的结合使得以最高质量水平创建、查看、编辑和打印 PDF 文件成为可能。
