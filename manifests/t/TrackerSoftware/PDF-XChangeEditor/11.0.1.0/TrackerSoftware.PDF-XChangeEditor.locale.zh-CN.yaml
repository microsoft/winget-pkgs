ShortDescription: 市场上体积最小、速度最快、功能最丰富的免费 PDF 查看器/编辑器。
Description: |-
  PDF-XChange Editor 是一款适用于 Windows 系统的快速、轻量且功能丰富的 PDF 查看、编辑和注释工具。它以高性能和广泛的功能著称，是 Adobe Acrobat 的强力替代方案。

  主要特性：
  - 编辑工具：直接编辑 PDF 文档中的文本和图像。
  - 注释与标记：提供丰富的工具用于高亮、添加评论、印章、形状和手写笔记。
  - OCR（光学字符识别）：将扫描文档转换为可搜索且可编辑的文本。
  - 表单创建与填写：创建、编辑并填写交互式 PDF 表单。
  - 安全特性：添加密码、涂黑敏感信息以及管理数字签名。
  - 自定义：高度可定制的界面和工具栏布局。
  - 低系统占用：以占用空间小、运行速度快著称，即使处理大型文件也是如此。
