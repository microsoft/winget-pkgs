ReleaseNotes: |-
  新功能
  - WebDAV 云同步 — 新增 WebDAV 云同步能力，并支持加密保存同步密钥，跨设备使用更方便
  - Redis Sentinel 连接 — 支持通过 Redis Sentinel 连接高可用 Redis 部署
  - 结构化筛选组合 — 数据筛选规则支持 AND / OR 组合，复杂筛选条件表达更灵活
  - 批量表导出 — 支持一次选择多张表进行导出，批量迁移和备份更高效
  - 表注释侧边栏显示 — 侧边栏可显示表注释，并在悬停时隐藏，浏览表结构时更容易识别对象
  - 补全接受快捷键 — 新增接受 SQL 补全的快捷键，编辑体验更顺手
  改进
  - 单元格详情编辑器 — 单元格详情编辑改用 CodeMirror，长文本和 SQL 内容编辑体验更好
  - 数据网格选择与复制 — 改进数据网格选择和复制行为，表格数据取用更稳定
  - SQL 高亮展示 — SQL 展示组件统一加入 Shiki 语法高亮，阅读查询和生成 SQL 更清晰
  - Redis 字体设置 — Redis 视图会遵循编辑器字体配置，显示风格更一致
  - SQL 补全排序 — 提升高频 SQL 关键字的补全排序，常用语句更容易选中
  - 表名复制入口 — 表右键菜单新增复制表名，并优化注释列宽度
  修复
  - 二进制值显示 — 二进制查询结果统一显示为十六进制，避免乱码或不可读内容 (contributed by @vvrfxyz)
  - 比较弹窗交互 — 比较类弹窗不再因点击外部区域而意外关闭
  - DuckDB Schema 展开 — DuckDB 主 schema 在侧边栏中会正确扁平展示
  - PostgreSQL URL 参数 — 兼容 MySQL 风格连接参数，减少迁移连接串时的失败
  - 应用更新代理 — 应用更新检查会使用系统代理，代理网络环境下更可靠
  - PostgreSQL / Oracle 分页 — 避免额外分页包装导致重复列名错误
  - MySQL 分页 — 避免 MySQL 查询因分页包装触发重复列问题
  - 表注释刷新 — 只有表注释真正变化时才刷新侧边栏树，减少不必要刷新
  - QQ 通知内容 — 移除 QQ 通知中的多余分隔符
  - PostgreSQL 数组显示 — 修复 PostgreSQL 数组值渲染异常
  - SQL 文件执行 — 执行 SQL 文件前会正确解码文件内容
  - MySQL 导出格式 — 规范化 MySQL 导出行格式，导出结果更稳定
  - PostgreSQL Agent 连接隔离 — PostgreSQL 兼容 Agent 连接会按当前数据库限定，避免元数据串库
  - 时间精度处理 — 规范化时间类型列精度，减少不同数据库间显示和传输差异
