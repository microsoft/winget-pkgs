ReleaseNotes: |-
  新功能
  - Doris / StarRocks 外部 Catalog — 侧边栏现在可以展示 Doris / StarRocks 的外部 catalog，并在数据预览、分页、导出和元数据查询中保留 catalog 上下文，方便浏览 Hive、Iceberg、Hudi、Paimon 等联邦数据源。(contributed by @zhuhaoh, closes #2721)
  - 达梦作业管理 — 新增达梦代理作业入口，支持查看作业、步骤、调度和历史，并可初始化作业环境、新建、启停、立即执行、停止、清理历史和删除作业。(closes #2876)
  - 达梦 Schema — 支持在达梦连接中新建 Schema。
  - Hive Kerberos — Hive 连接增加 Kerberos 配置项，支持 keytab、principal、krb5.conf 等连接参数。
  - SQL 脚本变量 — SQL 编辑器支持 @set 变量，并增加复制按钮，脚本复用更方便。(contributed by @onceMisery, related #2583)
  - AI 通用问答 — AI 面板新增通用问答模式，并支持通过斜杠命令切换 Action。(contributed by @lexmin0412)
  - Redis TTL 刷新 — Redis key 的 TTL 显示增加自动刷新倒计时。(contributed by @Abeautifulsnow)
  - 驱动缓存清理 — 驱动管理增加清理下载缓存能力，并保留页面内的更新提示。(closes #2826)
  - 可见数据库选择 — 新建数据库后会自动加入可见数据库并展示，减少手动刷新和选择步骤。(contributed by @eryajf, closes #2779)
  - 枚举字段元数据 — 后端统一返回 MySQL / PostgreSQL 枚举值元数据，前端枚举编辑不再依赖本地解析。(contributed by @onenewcode, closes #2742)
  改进
  - 数据网格 — 刷新数据时保留当前页；如果当前页因数据减少而不存在，会自动跳到最后一页。(contributed by @Abeautifulsnow, related #2619)
  - 跳转列搜索 — 跳转列支持展示字段注释，并可通过注释搜索字段。(contributed by @eryajf, closes #2914)
  - 查询超时操作 — 表和视图数据页的超时错误现在也会显示“修改查询超时时间”和“用 AI 修复”。
  - 调试日志 — 桌面端日志、导出内容和下载文件名改用本地时区，排查问题时不再混淆 UTC 时间。(contributed by @zorohu, closes #2777)
  - JSON 编辑提示 — 缩短格式化 JSON 编辑提示展示时间，并减少重复提示次数。(closes #2836)
  - OceanBase 默认端口 — OceanBase 默认连接端口调整为更常见的 ODP/OBProxy 2883。
  - Agent 文档 — 补充 Agent 版本 bump 规则和中文 README。
  修复
  - PostgreSQL 数据传输 — 目标端缺少 owner role 时可选择跳过或重归属，Web 传输也补齐 schema dependencies / objects 同步流程。(contributed by @ZhonFortune)
  - MongoDB Legacy — Legacy agent 支持创建和删除索引，修复旧 MongoDB 路径下索引管理不可用的问题。(contributed by @CN-Scars, closes #2911)
  - MongoDB 侧边栏搜索 — 搜索后 collection 子节点仍可正常展开。(contributed by @eryajf, closes #2899)
  - ZooKeeper — 根路径浏览不再隐藏 /zookeeper 系统节点，结果与 zkCli ls / 保持一致。(contributed by @CN-Scars, closes #2871)
  - Spark / Hive — 限制 Thrift fetch size，减少大结果集 FetchResults 失败。(contributed by @jischeng)
  - Cassandra — 连接支持 URL 参数，改善多数据中心场景下 localdatacenter 等参数配置。(contributed by @Tssshhhh)
  - MySQL / 兼容引擎 — 过滤 allowMultiQueries URL 参数，修复从 JDBC 配置复制连接串后测试连接失败；StarRocks / Doris / Manticore 等兼容引擎跳过 MySQL 专有初始化变量；MySQL 数值导出和建表注释拆分也更稳定。(contributed by @CN-Scars, @LwClick)
  - SQL Server — 修复 sql_variant 查询崩溃、表结构 DDL 缺少 IDENTITY、整数/浮点类型生成 DDL 时带 display width 的问题。(contributed by @gggaiitx)
  - Oracle / OceanBase / Vastbase / HANA — 优化 Oracle 当前用户对象列表查询、OceanBase 默认端口、Vastbase 元数据类型容错，以及 HANA 元数据 fallback 和 SQLScript 参数处理。
  - DuckDB — 修复 DuckDB worker 子进程关闭不可靠的问题。(contributed by @onceMisery, related #2718)
  - AI — 停止按钮现在会真正取消 agent stream，并修复历史消息编辑框宽度问题。(contributed by @Abeautifulsnow)
  - Redis — UTF-8 字符串编辑操作栏保持可见。
  - SQL 编辑 / 导航 — 保留关键字表名可正常跳转；expaste 生成 IN 列表时统一引用非 NULL 值。
  - Web MCP — Web 部署的 MCP 调用现在需要认证，避免未授权访问。(contributed by @eryajf, closes #2887)
  - Windows / Linux 窗口 — 修复无原生窗口装饰时顶部边框缺失。(contributed by @zipg)
  - 侧边栏定位 — “在侧边栏中定位”当前表更可靠，并改善虚拟列表滚动后的高亮表现。(contributed by @zorohu, related #2776)
  - UI 细节 — 修复 LightTooltip 箭头颜色与主体不一致的问题。(contributed by @ducheng1)
