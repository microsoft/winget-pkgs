ReleaseNotes: |-
  新功能
  - 瀚高数据库支持 — 新增瀚高（Highgo）数据库连接支持
  - 侧边栏显示函数和存储过程 — 数据库对象树新增函数（Functions）和存储过程（Procedures）节点
  - 连接名称自动生成 — 新建连接时名称留空将根据主机和数据库信息自动生成
  修复
  - 侧边栏树状态保持 — 修复删除表后树展开状态丢失、搜索后表子节点消失、嵌套置顶节点状态丢失等问题
  - 编辑器自动补全优化 — 修复输入标点符号后错误触发自动补全的问题
  - 编辑器保存行为修正 — 按上下文正确路由保存快捷键，对象源代码标签按上下文保存
  - 过期连接状态处理 — 修复连接断开后状态未正确更新的问题
  - OceanBase 兼容性 — OceanBase 连接使用裸 MySQL 协议选项以提升兼容性
  - MongoDB Shell 查询 — 支持 MongoDB shell 格式的 find 查询语法
  - JDBC URL 解析 — 支持解析 JDBC 连接 URL 自动填充连接信息
  - 表格表头对齐 — 修复水平滚动到末尾时表头与数据列未对齐的问题
  - Windows 插件兼容 — Windows 上优先使用 .bat 脚本启动 JDBC 驱动插件
