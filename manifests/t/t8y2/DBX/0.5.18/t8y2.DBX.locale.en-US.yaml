ReleaseNotes: |-
  新功能
  - Redis JSON 视图 — Redis 值自动识别 JSON，支持在 JSON 视图和原始内容之间切换，并提供高亮、折叠和自动换行
  - 对象时间信息 — 对象浏览器显示表/视图创建时间和更新时间，并支持正反排序，方便定位最近新增或变更的对象 (closes #398)
  - 复制 INSERT 不含主键 — 数据表格复制为 INSERT 时增加“不含主键”选项，跨环境导入自增主键数据更省心 (closes #400)
  - 转置查看编辑 — 转置查看支持直接编辑单元格，新增行后会自动定位到新行，回滚刷新后也会保持转置视图 (closes #401)
  - 表字段定位 — 在表信息字段列表中点击字段可定位到对应表头，宽表浏览更容易 (closes #389)
  - 侧边栏筛选增强 — 支持按节点类型筛选数据库树，并可配置隐藏指定前缀的表名，减少对象列表噪音
  - 活动标签定位 — 侧边栏可自动选中当前标签对应的数据库节点，切换表和连接时更容易保持上下文
  - AI 代码高亮 — AI 对话中的 SQL、Shell 等代码块支持 Shiki 高亮，阅读和复制更清晰
  - SQL 编辑器主题跟随 — SQL 编辑器支持亮色、暗色和跟随应用主题，减少手动切换
  改进
  - 启动和内存占用 — 优化查询结果缓存和启动资源加载，减少非活动标签保留的数据量，首次启动更轻量 (contributed by @SuLea-IT)
  - 系统托盘行为 — 支持配置是否保留系统托盘，并修复重新启动后窗口没有显示的问题
  - 默认浅色主题 — 新安装默认使用浅色主题，更贴近常见桌面应用默认体验
  - 单元格详情联动 — 单元格详情窗口会跟随左侧选中的单元格更新，方便用键盘快速对比长内容
  - 转置查看体验 — 优化转置视图切换和快捷键行为，宽表横向查看更顺手
  - SQL 补全收敛 — 在 SELECT * FROM t 等上下文中优先提示匹配的数据表/视图，减少无关关键字干扰
  - 内置 Agent 运行时 — 内置 JRE 对齐 Java 21，兼容新版 agent class 和 JDBC 驱动运行要求
  - 连接 URL 识别 — 连接配置中根据输入 URL 更稳定地解析 host，减少手动修正
  修复
  - MySQL 结果排序 — 修复查询结果点击排序按钮时生成 SQL 异常的问题 (closes #391)
  - 数据表工具栏布局 — 修复窄宽度下顶部工具栏内容可能互相遮挡的问题
  - 托盘偏好持久化 — 修复切换“不保留系统托盘”后配置状态和实际行为不一致的问题
  - 转置视图回滚 — 修复转置模式下点击回滚后视图被关闭的问题
  - 转置新增行定位 — 修复转置模式下新增行后没有自动滚动到新行的问题
