ReleaseNotes: |-
  新功能
  - 表结构密度控制 — 表结构编辑器新增紧凑、标准、舒适三档显示密度，适配不同屏幕和编辑习惯 (contributed by @serenez, closes #419)
  - 数据详情查看 — 数据网格新增单元格、整行、整列详情对话框，支持复制、图片预览和 JSON 格式化，查看复杂字段更方便 (contributed by @serenez, closes #528)
  - 二进制字段下载 — 数据网格支持下载二进制单元格内容，处理文件类数据更直接
  - 侧边栏定位标签 — 可从当前打开的标签快速定位到侧边栏对应节点，在多连接、多标签场景下更好找
  - Oracle 代理驱动配置 — 新增分层 Oracle agent profile，兼容更多 Oracle 版本与驱动场景
  改进
  - 表格加载性能 — 优化宽表渲染和表数据打开速度，大字段、多列结果集浏览更流畅
  - SQL 文件导入性能 — SQL 文件导入批处理更高效，大脚本执行等待更少
  - 标签与侧边栏导航 — 长表名、长视图名可横向浏览，打开标签支持溢出导航、菜单和连接分组着色 (contributed by @serenez, closes #260, closes #482)
  - 应用图标主题 — 新增黑色图标和 Logo 选项，并可同步到窗口、任务栏和托盘图标 (contributed by @serenez)
  - 对象排序体验 — 对象浏览器排序优先匹配基础名称，查找表和视图更自然
  修复
  - 便携版 JRE 目录 — 便携版会把 JRE 运行时和 agent 驱动保存到当前目录的 data/agents，离线拷贝和内网使用不再依赖用户目录 (closes #568)
  - 便携版更新提示 — 便携版不再显示应用内安装器入口，改为提示下载 ZIP 后覆盖当前目录 (closes #540)
  - NPM 全局命令入口 — 修复 CLI / MCP 包全局安装后 bin entrypoint 检测异常的问题 (contributed by @CN-Scars, closes #555)
  - MySQL JDBC URL 凭据 — 修复 MySQL / MariaDB JDBC URL 中 user、password 参数无法正确解析为连接凭据的问题 (contributed by @serenez, closes #491)
  - SQLite 数学函数 — 启用 SQLite 内置数学函数，FLOOR、CEIL、PI 等函数可正常查询 (contributed by @serenez, closes #548)
  - SQL Server 对象浏览器 — 修复 SQL Server 数据库节点无法打开对象浏览器的问题 (contributed by @serenez, closes #538)
  - GaussDB / openGauss 包查询 — 修复 Node 包侧对 GaussDB、openGauss 查询路由不正确的问题 (contributed by @CN-Scars, closes #543)
  - 查询会话稳定性 — 修复 DuckDB 查询会话复用、MySQL 多语句 session 状态、旧结果 payload 释放等问题
  - 数据网格交互 — 修复时间输入回车提交、行号背景、筛选字段重叠、抽屉宽度保持、字体缩放和复制 DDL 等细节问题
  - Redis TLS — 修复 Redis 不安全 TLS 连接场景的兼容性
  - 查询错误展示 — 修复查询错误状态下表格边框和 AI 修复入口位置不自然的问题
