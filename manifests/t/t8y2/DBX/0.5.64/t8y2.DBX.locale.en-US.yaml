ReleaseNotes: |-
  新功能
  - RabbitMQ 管理 — 新增完整的 RabbitMQ 消息队列管理能力，支持队列、消息、消费者、Virtual Host、Exchange、Binding、连接与通道、用户权限、策略及集群监控，并统一危险操作确认和只读连接保护。 (contributed by @Yann-Up)
  - 查询历史筛选 — 可按多个连接和数据库筛选查询历史，并组合使用关键字、执行类型、成功状态和时间范围；新增“当前连接”“全部连接”快捷切换和稳定的加载更多分页。 (contributed by @zorohu) (closes #2835)
  - AI 自定义提示词 — DB Assistant 支持始终生效的全局自定义指令，以及可按场景多选的提示词模板；配置加载失败时会明确阻止请求，避免静默遗漏用户指令。 (contributed by @Abeautifulsnow)
  - 数据库扩展管理 — PostgreSQL、OpenGauss 和 Kingbase 可在数据库节点下查看、安装和删除扩展，无需再手工执行扩展管理 SQL。 (contributed by @amwps290)
  - 冻结列 — 数据表和查询结果支持冻结到指定列、冻结多选列及取消冻结，Canvas 与 DOM 两种渲染模式均可在横向滚动时保持关键列可见。 (contributed by @gggaiitx)
  - 便携版自动更新 — Windows 便携版可在应用内下载并验证更新，退出后仅替换主程序，保留便携数据和配置；更新失败时自动恢复并支持 GitHub、R2、CNB 下载源。 (contributed by @wfion)
  - 连接类型分类 — 新建连接页面按关系型、时序、分析、文档、键值和消息队列等类别组织数据库，降低在 70 多种数据源中查找目标类型的成本。 (contributed by @eryajf) (closes #4198)
  - 结果表格字体 — 可为查询结果和表数据设置独立字体，并直接在视图选项中快捷切换字体和字号；设置同步应用于转置视图、单元格详情、批量编辑和 MongoDB JSON 预览。 (contributed by @ZhongYanZhiShi)
  - SQL 压缩 — 查询编辑器新增“压缩 SQL”，可将选中内容或整个文档压缩为单行，同时移除注释并正确保留字符串和引号标识符。 (contributed by @gggaiitx)
  - SQL Server 跨库补全 — SQL Server 查询可补全其他数据库中的 Schema、表和字段，改善跨数据库脚本编写体验。 (contributed by @zipg)
  - SQL Server 兼容驱动选择 — 连接信息中新增“自动 / 旧版兼容”驱动选择；仅在用户明确选择时下载并使用旧版驱动，避免 TLS 或登录错误触发错误的自动切换。 (contributed by @zipg)
  - ClickHouse URL 参数 — ClickHouse HTTP 连接会将自定义 URL 参数透传到全部查询和连接测试请求，可配置 SQL 方言、执行超时等会话级 Setting。 (contributed by @Staroon)
  - MySQL 函数补全 — 补充日期时间、条件、字符串等常用 MySQL 内置函数，并提供多语言说明，同时保留 LEFT JOIN 等关键字补全优先级。 (contributed by @xddcode) (closes #4099)
  - 侧边栏对象信息 — 可配置注释同级对齐、紧跟名称、显示对象大小或完全隐藏；兼容旧版设置，并支持 PostgreSQL 数据库大小及 MySQL、PostgreSQL、GaussDB、Kingbase、GBase 8a、SQL Server、Oracle、达梦和 ClickHouse 表大小。 (contributed by @zipg) (closes #4200)
  改进
  - 大文件导入 — CSV 改为有界流式解析，Excel 工作表和 shared strings 使用流式及受限缓存；PostgreSQL 增加 COPY 快速路径，Oracle 使用安全大小的 INSERT ALL 批次，显著降低大文件导入耗时和内存占用。 (contributed by @onceMisery)
  - Redis 全量 Key 性能 — “获取全部”期间使用非响应式缓冲和批量发布，百万级匹配 Key 的前端处理由约 13 秒缩短到约 3 秒，同时保留停止获取、Cluster Cursor 和二进制 Key 支持。 (contributed by @CN-Scars)
  - 表名搜索与复制 — 侧边栏表名搜索可忽略下划线、连字符和空格等分隔符，并支持直接复制多选表名。 (contributed by @Abeautifulsnow)
  - 结果行可读性 — 增强浅色和深色主题下交叉行背景对比度，并保持 Canvas、DOM 模式及悬浮、选中、编辑状态的视觉层级一致。 (contributed by @zipg) (closes #4180)
  - Redis 编辑体验 — AI 生成的 Redis 命令会发送到 Redis 控制台；补全和诊断可正确识别 OBJECT 子命令，复制二进制值时不再丢失控制字节。
  - 更新说明一致性 — GitHub、R2、CNB 等更新源统一使用完整发布说明，避免不同下载源的应用内更新对话框展示不同内容。
  - 导出与传输反馈 — 导出进度只统计用户实际选择的对象；达梦数据传输可正确按 Schema 列出数据库对象。
  - 连接导入 — 从 Navicat 导入连接时同步恢复 SSH 主机、端口、用户名、认证方式等隧道配置。
  - 文档与工具入口 — README 更新数据库支持数量为 70+，并明确桌面端、CLI 和 MCP Server 的使用范围。
  修复
  - PostgreSQL 临时表导出 — 批量脚本使用临时表且结果超过截断上限时，CSV/XLSX 完整导出会在同一专用连接中安全重放临时表初始化语句；底部行数改为显示“已加载”而非错误的精确总数。 (contributed by @zipg)
  - 编辑后滚动跳动 — 修复横向滚动后编辑单元格、再选择其他单元格时表格跳回首列的问题，DOM 和 Canvas 模式均会保持原有滚动位置。 (contributed by @zipg)
  - 单元格中文输入 — 修复 macOS 中文输入法在单元格详情中出现拼音累积、文字闪跳的问题，并在进入编辑时正确聚焦；窄窗口下工具栏按钮也能正常收起文案。 (contributed by @zipg) (closes #4102)
  - 反斜杠保存 — 修复 SQL Server、PostgreSQL 和 SQLite 系列在 DataGrid 编辑文本时重复转义反斜杠的问题，保持其他数据库现有转义规则不变。 (contributed by @zipg, @Abeautifulsnow) (closes #4181)
  - 大段 SQL 粘贴 — Windows WebView 截断大段剪贴板内容时，桌面端会在确认原生剪贴板前缀一致后补回缺失部分，可完整恢复超过 10,000 行的 SQL。 (contributed by @zipg)
  - SQL 文件兼容 — SQL 库导入统一支持 UTF-8、UTF-16 BOM 和 GBK 编码；打开只包含注释的 SQL 文件不再因越界访问导致应用退出。 (contributed by @zipg, @wang-zhengxin) (closes #4130)
  - SQL 语句解析 — 正确识别 MySQL ALTER TABLE … TRUNCATE PARTITION；同名 CTE 按查询作用域解析；参数提取不再误改触发器中的 NEW、OLD 伪记录。
  - 危险 SQL 预览 — 大型危险语句的执行确认仅生成有界预览，避免超大 SQL 导致确认弹框卡顿或高内存占用。
  - MySQL 连接兼容 — JDBC 连接超时正确转换为毫秒；不支持设置 group_concat_max_len 的兼容服务会跳过该设置继续连接；代理环境缺少完整元数据时恢复表级回退查询。 (contributed by @wbean) (closes #4189)
  - 虚谷旧版本 — 虚谷 12.0 缺少 ALL_COLUMNS.ON_NULL 时自动使用兼容元数据查询，恢复字段、主键加载和单元格编辑。 (contributed by @zipg)
  - Kingbase 兼容性 — MySQL 兼容模式可正确读取表和字段注释；普通用户加载表元数据时不再依赖高权限系统查询。 (contributed by @amwps290)
  - Oracle DIP 对象树 — 升级 Oracle DIP 对象缓存版本，避免左侧树继续显示升级前缓存中的不完整表和视图列表。 (contributed by @zipg)
  - 达梦系统 Schema — 可按配置显示达梦系统 Schema，修复 SYSDBA 等模式在对象树中缺失的问题。 (contributed by @zipg) (closes #4149)
  - 旧版 WebView 弹框 — 修复旧版 Windows WebView 下弹框高度计算、滚动及架构比较操作不可用的问题。 (contributed by @zipg) (closes #3973)
  - Windows 窗口边框 — Windows 自定义标题栏的顶部、左右和底部边框保持一致，最大化等状态下不再出现额外边线。 (contributed by @xddcode) (closes #4059)
  - MongoDB Shell 注释 — 聚合管道和 Shell JSON 参数允许包含行注释或块注释，不再因注释导致解析失败。 (contributed by @James-Leong) (closes #4142)
  - PostgreSQL 分区 DDL — 查看或复制 PostgreSQL 分区表 DDL 时包含分区键定义，避免生成不完整的建表语句。
  - IRIS 注释语句 — 对不支持独立注释语句的 IRIS 对象不再生成无效 SQL。
  - AI 模型刷新 — 新增或编辑 AI 配置后立即刷新可用模型选项，无需关闭并重新打开助手。
  - TRAE MCP 启动 — Windows 上为 TRAE 生成 MCP 配置时使用原生二进制入口，避免依赖 Node 包内部布局。
  - Kafka 连接兼容 — Bootstrap Servers 支持带协议前缀的地址，并可通过 ZooKeeper 发现 Kafka 1.1 等旧版集群的 Broker；后续主题、消息和管理操作会复用已解析配置，同时兼容 Agent 配置中的 UTF-8 BOM。 (contributed by @onceMisery)
  安装
  - 源码构建 — 最低 Rust 版本调整为 1.88.0。
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.64 拉取。
