ReleaseNotes: |-
  新功能
  - 驱动管理 — 将驱动管理提取为独立标签页，支持注册表缓存、版本/大小徽章展示、刷新按钮，合并 JDBC 和 Agent 驱动为统一的"驱动"标签
  - 数据库导出 — 支持将整个数据库导出为 SQL 文件
  - 数据库对比增强 — 新增选择性同步、交换按钮和执行进度显示，工具栏增加"对比数据库"和"对比数据"按钮
  - 多行选择与批量操作 — 数据表格支持多行选择，批量克隆、删除和复制，支持多行范围复制
  - Copy as INSERT — 支持将多行数据复制为 INSERT 语句
  - 克隆行 — 右键菜单新增"克隆行"功能 (closes #227)
  - 系统主题模式 — 新增跟随系统的主题模式
  - Redis 成员详情 — 新增 Redis 成员详情查看器，Sheet UI 组件及列表/集合 API
  - Schema 感知 SQL 补全 — SQL 编辑器支持带 schema 前缀的表名补全
  - SQL Server 补全 — 新增 SQL Server 关键字和语法自动补全
  - MySQL/Postgres 查询行数限制 — 支持设置查询结果最大行数
  改进
  - JVM 冷启动加速 — 新增 JVM 启动参数优化，复用守护进程避免重复 JVM 冷启动
  - AI 流式取消优化 — 使用 tokio::select 实现 AI 流式输出即时取消
  - 主题切换优化 — 通过抑制 CSS 过渡消除主题切换延迟
  - GitHub 代理竞速 — 驱动下载和注册表拉取并行竞速多个 GitHub 代理
  - AI 上下文加速 — 并行加载 schema 元数据以加快 AI 上下文构建
  - Redis 键扫描分页 — Redis 键扫描改为分页加载，优化大量键的浏览体验
  - 操作反馈 — 连接操作和 Redis 复制操作新增 toast 提示反馈
  - 历史记录分类与虚拟化 — 历史记录按类型分类并支持虚拟滚动
  - 侧边栏截断提示 — 截断的名称显示 tooltip，支持横向滚动 (closes #231)
  - Agent 事务批量提交 — 使用单次 execute_transaction RPC 实现批量提交
  修复
  - 结果标签页滚动 — 修复执行多条查询时结果标签页无法滚动的问题 (closes #245)
  - Schema 选择器预加载 — 修复 schema 选择器可见时选项未预加载的问题 (closes #244)
  - Elasticsearch HTTPS — 支持 Elasticsearch 的 HTTPS 和自签名证书连接
  - Windows JDBC 启动器 — 修复 Windows 上 JDBC 插件启动失败 (os error 193)
  - SQL Server 批处理语义 — 保留 CTE 和 DECLARE 语句的批处理语义
  - WHERE 过滤输入同步 — 修复 WHERE 过滤条件输入时未实时同步到 tab store
  - Oracle 查询路径 — 更新 rust-oracle 修复查询路径中的 bit vector 丢失问题
  - 侧边栏搜索排序 — 搜索结果按匹配分数排序
  - NOT NULL 验证 — 排除有默认值的列的 NOT NULL 校验
  - NULL 列 INSERT — 跳过 INSERT 中的 null 列以应用数据库默认值
  - 更新器版本显示 — 修复更新器显示错误的应用版本号和 release notes
  - SQL 补全过滤 — 修复 SQL 补全的表名过滤
  - SQL 安全分类 — 修复 SQL 风险分类、CTE 兄弟片段和子查询边界误判
  - 活动行高亮 — 数据表格高亮当前活动行，新增首页/末页分页按钮
