ReleaseNotes: |-
  新功能
  - 只读模式 — 所有数据库连接支持只读模式，降低误执行写入、删除或结构变更 SQL 的风险
  - 可见数据库 — 连接可指定要显示的数据库，侧边栏、MCP 和补全范围更聚焦，大实例浏览更轻量 (contributed by @eryajf, closes #932)
  - 数据网格 — 新增待提交变更 SQL 预览、多行转置、几何列地图图层预览，以及列级可排序能力 (contributed by @DengQingNian, @eryajf, @ptma)
  - Redis — 创建 key 支持 TTL、结构化条目输入、Stream 和 JSON 类型，常见 Redis 数据结构录入更完整 (contributed by @DengQingNian, closes #655)
  - 连接导入 — 支持从 DataGrip 导入连接配置，并改进 Navicat / DBeaver 导入兼容性，减少迁移连接时的手工录入 (contributed by @cl1107)
  - SQL 工具 — 新增 SQL Library 文件夹管理与本地同步，并支持可配置 SQL formatter
  - 查询结果 — 新增执行摘要视图和执行耗时显示，查询反馈更清晰
  - 数据库用户管理 — 新增数据库用户和权限管理入口，常见账号授权操作可在 DBX 内完成
  - AI — Claude 配置支持 API Key 与 Auth Token 两种认证方式，兼容 ANTHROPIC_AUTH_TOKEN、本地代理和第三方 Anthropic 兼容服务
  - 数据库能力 — 新增 Turso/libSQL、H2 文件连接、Access 账号密码配置、PostgreSQL sequence 对象，以及 Elasticsearch SQL 查询增强
  改进
  - SQL 补全 — 支持数据库限定符补全，优化大实例多库场景，并避免表别名场景下错误回退到表名建议
  - SQL 编辑器 — 支持保存 SQL 标签页光标和滚动位置，选区高亮更柔和，格式化作用范围更准确，SQL formatter 可离线使用
  - 数据网格体验 — 优化 Canvas 渲染清晰度、转置视图状态、隐藏列详情、复杂值展示、右键选择和滚动条稳定性
  - 侧边栏与标签页 — 优化侧边栏搜索、表注释匹配、标签页溢出滚动、小窗口工具栏收纳，以及经典模式下的活动标签提示
  - 连接配置 — 支持连接颜色选择、TiDB Cloud URL 自动启用 TLS、MongoDB SSH 场景空闲连接控制，以及 SSH/TLS 文件路径 ~ 展开
  - 快捷键 — 新增打开设置快捷键，支持清空快捷键，并优化 Windows 上快捷键标签宽度
  - AI 体验 — 改进 OpenAI reasoning model、代理 API 通道和本地 provider 图标显示
  - 调试与日志 — 新增面向用户的调试日志导出能力，方便排查连接和运行时问题
  - 文档与下载 — 增强离线驱动下载说明、驱动文档、SEO 元数据和 AI crawler 规则
  修复
  - SSH — 修复密钥注释编码导致加载失败，以及并发创建连接时重复 SSH tunnel 引发的连接不稳定 (contributed by @James-Leong)
  - Oracle — 修复 Oracle 11g 分页兼容问题，并在新版驱动遇到 listener 兼容错误时提示切换旧版内置驱动
  - MySQL / TiDB — 修复 TiDB Cloud 非 TLS 连接失败、预编译语句重试、连接 URL 参数处理和 session 变量保持问题 (contributed by @Sanjeever, closes #906)
  - MongoDB — 修复 ObjectId 过滤、副本集 URL 解析、Atlas SRV 连接、SQL 语义诊断误报，以及 Mongo shell 命令解析细节
  - Redis — 修复模糊搜索中 * 通配符处理、hash/zset/JSON 内容展示、zset 分数列宽度和命令历史持久化问题
  - Elasticsearch — SELECT * ... WHERE ... 会转换为 _search DSL，减少 ES SQL 限制导致的查询失败，并修复空结果展示 (contributed by @JinRudy)
  - SQLite / 文件连接 — 修复从文件打开 SQLite 时覆盖已有连接的问题
  - PostgreSQL — 修复 PG brace-style 数组文本编辑误判、数组单元格编辑，以及部分 schema / 树结构默认库选择问题
  - JDBC / 插件数据库 — 修复 Hive JDBC UnsupportedOperationException、IRIS max rows 改写、Trino SSL 参数、Goldendb 标识符引用、DuckDB 复杂值展示等兼容问题
  - 数据网格 — 修复画布选区边框、转置视图刷新、隐藏列详情、数组和复杂值展示、右键选择清理等结果集交互问题
  - 导入与文件 — 修复 SQL 文件编码 fallback、JSON UTF-8 BOM 导入、Navicat NCX 连接类型识别和端口回退
  - 稳定性 — 修复快捷键清空、SQL 补全弹窗重叠、连接错误清理、分组连接树节点更新、YashanDB recyclebin 对象隐藏等边界问题
