ReleaseNotes: |-
  新功能
  - 数据库例程补全 — SQL 补全现在会提示存储过程和函数，编写调用语句更方便
  - Redis 模糊搜索 — Redis Key 浏览支持模糊搜索开关，更容易在大量 key 中定位目标
  - 编辑器行选择 — 可以从 gutter 直接选择当前 SQL 行，快速执行或复制单行语句
  - 侧边栏折叠 — 新增侧边栏折叠入口，为查询和表格区域留出更多空间
  - 数据网格 Canvas 渲染 — 默认启用新的 Canvas 网格渲染器，并支持单元格详情面板布局
  - 空列隐藏 — 数据网格支持隐藏全为空值的列，宽表浏览更清爽
  - JOIN 条件建议 — SQL 编辑时可基于外键关系建议 JOIN 条件，减少手写关联条件的成本
  改进
  - 导出性能 — 表 CSV 导出改为 Rust 侧流式处理，并优化导出 UI 体验和性能
  - 网格性能 — 优化 Canvas 渲染缓存和后台标签页工作，降低大结果集浏览时的资源占用
  - AI 上下文 — AI 提示中包含 schema 注释，并限制响应输出长度，减少无关或过长回复
  - 深色主题 — 调整深色主题对比度，长时间使用更柔和
  - 网格提交状态 — 提交按钮会显示待提交数量，编辑状态更明确
  - Homebrew 文档 — 更新安装说明，继续使用官方 Homebrew Cask 路径 (contributed by @fraluc06)
  修复
  - Oracle 连接 — 支持 SYSDBA JDBC 连接，保留自定义 JDBC 端点，并修复未加引号元数据标识符规范化
  - Oracle 稳定性 — 兼容本地化连接关闭错误重试，降低连接被动断开后的失败率
  - MySQL / StarRocks — 修复 MySQL admin show 方言处理、StarRocks admin show 结果解析，以及 BIT 值在网格中的显示
  - MySQL 元数据 — 元数据连接失败时会使用默认数据库重试，减少 MySQL 8 等场景下对象列表为空的问题
  - JDBC 设置 — JDBC 驱动会遵守连接超时和查询执行设置，并显示自定义驱动的默认数据库
  - Dameng / Kingbase / openGauss — 修复达梦字段元数据去重与注释大小写、Kingbase agent IPv4 优先、openGauss 表结构编辑入口
  - MongoDB — 修复 URL 凭据规范化、受限数据库用户支持，以及原生驱动超时后的 legacy fallback
  - DuckDB — 修复 shorthand 查询返回行数据的问题
  - PostgreSQL — 修复继承表被误识别为分区表隐藏，以及 timestamptz 本地时区显示
  - SQL Server — 修复 CTE 查询执行时被错误包装的问题
  - 数据网格 — 修复只读结果提示、空结果滚动、刷新时结果保留、筛选后字段注释保留、查询错误后筛选栏可见性等问题
  - 侧边栏 — 修复对象组合并、范围选择顺序、可见名称排序、空数据库关闭入口等细节
  - 连接管理 — 修复连接尝试卡住、SSH 隧道保活、断开连接后标签页清理等问题
  - 数据对比 — MySQL 注释差异同步更准确，并支持同步时创建缺失的目标表
  - 表结构编辑器 — 复制预览 SQL 会记录历史，便于回溯操作
