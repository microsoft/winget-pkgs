ReleaseNotes: |-
  新功能
  - 数据库支持 — 新增 KWDB、rqlite、Apache IoTDB、达梦 DM8、etcd、Databend agent 等连接支持，覆盖更多数据库场景 (contributed by @sunny0826, closes #731)
  - 数据传输 — 支持 Hive 与 MongoDB 传输，并增强 MySQL 长文本、长二进制类型迁移保真
  - Redis — 新增一键获取全部 keys、命名空间增量合并，以及复制 Redis key 迁移 INSERT 语句
  - 数据网格 — 查询结果表头支持显示列数据类型，浏览结果时字段上下文更清晰 (closes #669)
  - 标签页 — 支持拖拽调整已打开标签页顺序，复杂查询工作区整理更方便 (contributed by @DengQingNian, closes #620)
  - 外观主题 — 新增自定义主题系统，并改进 PostgreSQL PL/pgSQL 高亮
  - 本地化 — 新增葡萄牙语（巴西）与意大利语界面语言选项
  改进
  - 侧边栏 — 数据库对象分组改为懒加载，降低大库浏览时的初始负担
  - 侧边栏多选 — 支持更安全的多连接清理、多选拖拽、空白处取消选中，并避免空分组名称误删分组
  - 数据网格体验 — 优化 Canvas 滚动、单元格状态渲染、列筛选入口、总行数统计和文本截断表现
  - 单元格详情 — 详情侧栏可调整大小，单元格/行/列详情弹窗布局、搜索与长文本展示更统一 (closes #528)
  - SQL 编辑器 — 选中 SQL 匹配高亮更柔和，补全优先推荐已引用表字段
  - 设置 — 支持关闭更新提醒，并打磨快捷键编辑控件
  - MCP / Node — 从用户 shell 环境检测 Node，减少 MCP 启动时找不到运行时的问题
  - Web 版 — 支持通过 HTTP 导入加密配置，增强离线与代理场景可用性
  修复
  - PostgreSQL / openGauss — 修复 pgvector 显示为空、内部 "char" 类型显示为 ASCII、schema 会话在事务中止后的恢复，以及 openGauss 索引查询兼容问题
  - MySQL — 修复导出 INSERT 多带库名、catalogless 元数据回退、全角文本编辑和 bit 字面量 SQL 导出
  - MongoDB — 支持 Atlas SRV 表单连接，并修复 getIndexes shell 命令
  - Redis — 修复 --insecure TLS 参数支持，以及命令面板和详情面板切换卡顿
  - SQL Server / DB2 / StarRocks / ClickHouse — 修复空间结果、分页兼容、标识符引用和数组字面量语法
  - Oracle / JDBC / DuckDB — 修复 Oracle-like MODIFY 合并、JDBC 方言处理、DuckDB 查询取消和 Atlas/agent 连接边界场景
  - 数据网格 — 修复粘贴被原生输入框截获、画布选区变黑、结构化筛选刷新丢失、bigint 精度丢失等问题
  - 侧边栏定位 — 修复版本更新后缓存过期时“在侧边栏中定位”只能定位到库、无法定位到表的问题 (closes #715)
  - 稳定性 — 修复多字节 UTF-8 截断 panic、where 过滤 unicode panic、时间类型默认值 SQL 生成等问题
