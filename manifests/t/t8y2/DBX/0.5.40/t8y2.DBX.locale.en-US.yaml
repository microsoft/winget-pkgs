ReleaseNotes: |-
  新功能
  - Dremio — 新增 Dremio JDBC 连接支持，支持 Legacy JDBC 与 Arrow Flight SQL 两种连接模式 (contributed by @SpencerZhang)
  - H2 — 支持 H2 split file URL 连接格式，便于打开拆分存储的 H2 数据库 (contributed by @orwenxiang)
  - InfluxDB — 连接配置支持 epoch 时间精度参数 (contributed by @ptma)
  - Nacos — 增强配置管理能力，支持命名空间列表、配置发布表单、应用名称查询、编辑器文本选择与 Tab 输入 (contributed by @eryajf)
  - SQL 参数查询 — 执行前可识别 SQL 模板参数并弹出参数输入框，支持字符串、数字、布尔值、NULL、原始 SQL 和历史值复用
  - 数据网格 — 选区状态栏新增 SUM、单元格数和行数汇总；批量编辑空输入可将选中单元格设为 SQL NULL；溢出单元格双击支持悬浮多行编辑器 (contributed by @linjianlin, @kkk000111999, @zipg)
  - 对象浏览器 — 数据库对象列表支持拖拽调整列宽，并可双击恢复默认列宽 (contributed by @linjianlin)
  - Redis — HASH Field/Value 支持列排序，SCAN page size 改为连接级配置，便于不同 Redis 环境独立调优 (contributed by @lexmin0412, @dal1wg)
  - ZooKeeper — 节点树改为真正按层懒加载，展开节点时再加载子节点，减少大树初始加载压力 (contributed by @onceMisery)
  - AI / MCP — 支持 Anthropic Messages 兼容自定义 AI 接口，设置页新增 OpenCode MCP 配置模板，并支持配置更新下载源 (contributed by @huangyemin, @lexmin0412, @eryajf)
  改进
  - 界面一致性 — 统一表单控件小圆角样式，优化连接配置弹窗布局、驱动管理 Tab 宽度、侧边栏注释字体渲染和主题切换交互 (contributed by @zipg)
  - 侧边栏 — 新增“展开全部”能力，定位表节点时可补载分页外的目标表，并改善吸顶遮挡与多选残留问题 (contributed by @eryajf, @zipg)
  - 查询体验 — 执行 SQL 前会提示先选择数据库，减少直接抛出 No database selected 的后端错误
  - SQL 库 — 启动时不再等待 SQL 库全文加载，SQL 正文改为按需读取，降低大量 SQL 文件导致白屏或连接列表空白的风险
  - SQL 格式化 — GaussDB/openGauss/Kingbase/Highgo/Vastbase/Redshift/QuestDB 等使用更合适的格式化方言，DDL/源码展示自动格式化更稳 (contributed by @kkk000111999)
  - 连接导入 — 标准/JDBC/deep link 导入时可正确解析连接名称；OceanBase NCX 导入可区分 MySQL 与 Oracle 模式 (contributed by @LwClick, @weihanhan)
  - 文档与模板 — 更新 Makefile 构建流程文档，并在 issue 模板中补充数据库类型和版本字段，便于问题定位 (contributed by @eryajf)
  - 多语言 — 新增英文 fallback，并补齐多语言缺失文案；zh-TW 补齐 MCP 设置页翻译 (contributed by @lexmin0412)
  修复
  - 数据网格 — 修复清空可空非文本列保存失败、Canvas 单元格文本提前截断、Oracle timestamp 字面量格式、单元格详情布局和列排序菜单顺序等问题 (contributed by @zipg)
  - MySQL / MariaDB — 文本主键编辑不再生成低效 BINARY 主键谓词；尾行注释场景下分页/count 不再失效；DDL 查询会健康检查连接；schema diff 降低 metadata 查询并发压力 (contributed by @zipg, @jischeng)
  - PostgreSQL — PostGIS 函数 search_path 包含 public schema，空字符串默认值显示与比较更准确，字段名高亮不再误判常见列名，旧版物化视图源码读取更稳 (contributed by @yehaonanxx, @zipg)
  - SQL Server — 修复 TOP 查询翻页重复第一页、SQL Server 2008 分页、二进制单元格显示，以及表结构保存时未修改外键误报的问题 (contributed by @zipg)
  - MongoDB — 默认库不再误影响认证库；集合名包含特殊字符时筛选查询预览语法正确；默认库相关认证逻辑同步兼容旧 agent
  - Redis — 搜索 key 时支持空 SCAN 批次继续加载，并对精确 key 搜索优先使用 EXISTS 快速判断 (contributed by @chenhbb)
  - SQLite / DuckDB — 连接不存在的数据库文件时不再静默创建空库，避免路径拼错后误以为连接成功 (contributed by @chenhbb)
  - Dameng / Doris / StarRocks / ClickHouse / Highgo / Kingbase / Xugu / Vastbase — 修复物化视图、索引、主键识别、标量 WITH 导出、nullable 元数据、视图/例程列表、类型规范化和角色授权 SQL 等数据库兼容问题 (contributed by @private20, @jischeng)
  - 连接稳定性 — 连接超时后的恢复更可靠，MySQL/PostgreSQL 基础语句与连接池关闭流程增加超时保护；过期连接请求不再残留错误提示 (contributed by @onceMisery, @zipg)
  - AI / Codex — Windows 下 Codex CLI、npm shim、nvm 路径解析更可靠；AI SQL 方言上下文和结构化 SQL 任务约束更准确 (contributed by @linjianlin, @Dreamescaper, @zipg, @Abeautifulsnow)
  - 桌面端 — 修复 macOS 全屏关闭窗口异常、AppImage 输入法模块加载、Windows npm 路径检测、WebDAV 自动定时同步和导入连接名称解码等问题 (contributed by @zipg, @asdlem, @linjianlin, @eryajf, @LwClick)
  - 表搜索与元数据 — 表名支持轻量模糊搜索，动态数据类型选项、数据库选择状态、结构编辑输入焦点等边界行为更稳定 (contributed by @LwClick)
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.40 拉取。
