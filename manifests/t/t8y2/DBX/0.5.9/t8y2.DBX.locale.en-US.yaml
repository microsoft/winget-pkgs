ReleaseNotes: |-
  新功能
  - SQL 编辑器自动补全增强 — 全面改进 SQL 编辑器的自动补全体验，支持更精确的关键字、表名、列名补全，新增 SQL 诊断提示功能
  - 列格式化 — 数据表格新增列格式化功能，支持对列数据进行自定义格式化显示
  修复
  - Schema 选项重复加载 — 修复 Schema 选项在切换时被重复加载的问题
