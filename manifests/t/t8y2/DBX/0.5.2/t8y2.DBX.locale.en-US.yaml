ReleaseNotes: |-
  新功能
  - JDBC 插件支持 — 新增可选的 JDBC 插件模块，支持通过 JDBC 驱动连接更多数据库类型
  - SQL 代码库 — 支持保存和管理常用 SQL 语句，存储在应用数据库中，随时复用
  - DataGrip 风格列过滤器 — 数据表格支持类似 DataGrip 的列过滤功能，快速筛选数据
  - 数据对比与结构同步 — 新增数据对比和表结构同步功能
  - 连接 URL 和 XLSX 导出 — 支持通过连接 URL 快速创建连接，支持导出数据为 XLSX 格式
  - 连接颜色标识 — 连接支持自定义颜色标识，方便区分不同环境
  - 表格剪贴板快捷键 — 数据表格支持复制粘贴等剪贴板快捷键操作
  - 布局偏好设置 — 支持自定义界面布局偏好
  - SSH 超时配置 — SSH 隧道连接支持配置超时时间
  改进
  - 界面外观优化 — 优化面板、标签页和应用整体外观布局
  修复
  - Redis 键表列对齐 — 修复 Redis 键表格列宽未对齐的问题
  - 连接状态同步 — 修复展开缓存树时连接状态未同步的问题
  - 连接对话框错误 — 修复连接对话框的错误提示问题
  - SQL 注释后查询检测 — 修复 SQL 注释后的结果查询未被正确检测的问题
  - 列过滤弹窗优化 — 优化列过滤弹窗的交互体验
  - 查询标签页持久化 — 修复未保存的查询标签页丢失的问题
  - 隐藏系统数据库对象 — 修复侧栏显示系统数据库对象的问题
  - 文件选择器行为 — 修复 Web 版文件选择器的行为不一致问题
