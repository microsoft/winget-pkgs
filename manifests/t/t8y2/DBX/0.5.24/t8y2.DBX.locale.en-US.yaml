ReleaseNotes: |-
  新功能
  - MongoDB 聚合与批量写入 — MongoDB 连接新增聚合查询、批量写入和 MCP 集成，处理文档数据与自动化场景更完整 (contributed by @Michaelxwb)
  - 连接超时可配置 — 每个连接都可以单独设置连接超时时间，面对慢网络、SSH 跳板或高延迟数据库时更容易调优 (contributed by @adntian)
  - 表结构编辑增强 — 表结构编辑器新增类型选择键盘导航、列宽调整，以及 MySQL / PostgreSQL / SQL Server 更多列属性支持，改表体验更顺手
  - 全局 UI 缩放 — 桌面端新增全局界面缩放设置与快捷键，在高分屏和不同显示器之间切换更舒服
  - 结果行数显示 — 查询结果状态栏新增总行数显示，查看分页结果时对整体数据量更有把握
  - 侧边栏紧凑模式 — 侧边栏新增紧凑对象显示模式，数据库对象较多时浏览更高效
  - 表信息面板搜索 — 表信息面板支持搜索列、索引、外键、触发器和 DDL，定位结构信息更快
  改进
  - 上下文菜单体验 — 多处右键菜单切换到更轻量的自定义实现，并支持子菜单，编辑器和数据网格交互更流畅
  - 设置对话框交互 — 设置窗口应用配置后可保持打开，连续调整多个选项更方便
  - SQL 自动补全性能 — 查询编辑器自动补全响应速度进一步优化，大 SQL 场景下更跟手
  - 保存 SQL 侧边栏清理 — 没有保存 SQL 时会自动隐藏对应节点，侧边栏更简洁
  - PostgreSQL 跨版本迁移 — 数据传输对 PostgreSQL 跨版本迁移场景做了更好的兼容与处理
  修复
  - 离线启动白屏 — 修复桌面端在无外网机器上可能出现的长时间白屏启动问题，并将 Geist 字体改为本地资源，离线启动更稳定
  - Windows 图标显示 — 刷新 Windows 应用与托盘图标资源，图标显示更一致
  - 连接空闲后重试 — 连接空闲断开后会自动重试元数据加载，恢复使用更平滑
  - 连接配置一致性 — 修复断开连接后配置丢失、执行前未重新加载配置等问题，连接行为更可靠
  - MySQL 连接与查询兼容性 — 修复 URL 连接后未正确选库、DESC 语句识别等兼容问题
  - 网格编辑与高亮 — 修复值编辑器、横向滚动冻结列、转置高亮、多选高亮等问题，数据网格编辑反馈更准确
  - 历史与交互细节 — 修复历史记录菜单操作、Agent/Ask 模式下拉宽度、连接对话框误关闭等界面问题
  - DuckDB 资源释放 — 关闭连接时会更及时释放 DuckDB 文件锁，重复打开数据库更顺畅
  - 数据库兼容性细节 — 修复 PostgreSQL search_path、达梦 Oracle 元数据、MongoDB 聚合保护等细节问题
