ReleaseNotes: |-
  新功能
  - ChromaDB — 新增 ChromaDB 向量数据库支持，扩展 DBX 的向量数据库连接与管理能力 (contributed by @lexmin0412)
  - MySQL — 支持通过 catalog= URL 参数访问 Paimon/Hive 等外部 catalog (contributed by @jischeng)
  - Nacos — 支持命名空间固定显示，并完善配置导出能力、配置格式处理，以及 SSH/代理链路下的管理 API 访问 (contributed by @eryajf)
  - Redis — Dashboard 新增折叠分组和统计卡片，实例概览信息更集中 (contributed by @dal1wg)
  - ClickHouse — 表列表支持展示表大小与注释，便于快速判断表规模和用途
  - 导出 — 新增表读取游标会话能力，并改进导出行数限制与进度统计，为大表导出提供更稳定的基础
  - AI — AI Assistant 输入框支持高度调整，并支持在 AI 回复期间继续输入；Codex CLI Provider 增强命令解析、环境变量处理与桌面端可靠性 (contributed by @eryajf, Oleksandr Liakhevych)
  - 文档 — 补齐当前支持的数据库列表，并新增 Connect PIP 相关文档
  改进
  - 数据网格 — 优化表格交互，横向滚动更顺滑，并减少滚动时误触发行加载的问题 (contributed by @zipg)
  - 侧边栏 — 表列表支持按分页大小加载，滚动条悬停显示更自然，已打开数据库通过图标状态提示，并移除固定快捷按钮以简化操作 (contributed by @zipg)
  - SQL 编辑器 — ORDER/GROUP 列补全保持可用，并修复前置括号导致的 SQL 关键字识别问题 (contributed by @ptma)
  - 连接与元数据 — MySQL 元数据查询使用当前数据库上下文，并对瞬时 metadata pool miss 增加重试，减少刷新时的偶发失败
  - 桌面端 — 改进 AppImage Wayland 启动体验，并让 macOS 托盘图标跟随系统主题自动反色 (contributed by @echocde, related #1780)
  - 发布流程 — 增加统一 release 脚本，并改进版本 tag 获取与 workflow 串行化，降低发布流程互相干扰的风险
  修复
  - PostgreSQL / 数据迁移 — 保留 bytea 迁移语义，并拆分 PostgreSQL 表 DDL，提升数据传输与结构迁移可靠性
  - OceanBase — Oracle 模式 schema 可在侧边栏正确展示，并在编辑连接时保留 Oracle 模式
  - Oracle — 修复表数据分页时 ROWID 导致重复列的问题，并支持 visible schema 过滤 (contributed by @zipg)
  - SQL Server — 修复 schema 树与对象创建的一致性、查询结果流式导出，以及补全占位符中的 null 类型转换
  - GaussDB / OpenGauss — MCP 连接改走桌面端 bridge，并修复 GaussDB 查询分页限制；同时禁用指定驱动的驱动管理入口
  - Vastbase — 兼容缺失 rolbypassrls 字段的角色元数据
  - TDengine — 修复表数据预览问题 (contributed by @zipg)
  - Doris / MySQL — 为去重查询分页注入确定性 ORDER BY，避免分页结果不稳定 (contributed by miracle)
  - SQLite 导入 — 修复从 Navicat NCX 导入 SQLite 连接时文件路径丢失的问题 (contributed by @YangYuS8, closes #1607)
  - Redis TTL 编辑 — 使用 click-outside 逻辑解决保存按钮与失焦的竞态，并恢复键盘和辅助技术触发保存的能力 (contributed by @lexmin0412)
  - Saved SQL — 修复嵌套目录中的 SQL 文件计数问题
  - UI — 修复驱动管理与首页重叠、保留驱动管理标签页状态，并优化侧边栏数据库吸顶效果 (contributed by @zipg)
  - 语法补全 — 修复 CAST 补全签名问题 (contributed by Spencer.Chang)
  - 构建警告 — 处理托盘图标主题、WebKit 渲染 workaround 与 AppImage backend override 相关的构建告警
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.39 拉取。
