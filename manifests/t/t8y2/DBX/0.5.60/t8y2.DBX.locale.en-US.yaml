ReleaseNotes: |-
  新功能
  - JDBCX 连接支持 — 可通过驱动商店自行安装 JDBCX Runtime 和目标数据库 JDBC 驱动，并使用 jdbcx: URL 建立连接；SQL Server、Oracle 隧道连接及连接导入场景也可正确识别。(contributed by @SpencerZhang)
  - MongoDB 文档浏览与快捷筛选 — 增强文档快捷筛选、嵌套对象表格查看、格式化 JSON 和字段搜索；文档编辑支持数组成员类型选择、原生 JSON 编辑及 Ctrl+F 查找。(contributed by @ColdSand803)
  - 查询编辑辅助工具 — SQL 编辑器新增查找、替换、删除空行和自动生成列表等常用文本处理能力。(contributed by @JeaceLiu)
  - SQL 库文件夹管理 — 保存 SQL 时可搜索现有文件夹，或直接输入名称创建新文件夹，并在创建失败时显示错误。(contributed by @lexmin0412) (closes #3785)
  - 自定义查询结果名称 — 支持在 SQL 前使用 -- Name: ... 注释为单语句或多语句查询结果指定名称，未命名结果继续沿用现有表名推导规则。(contributed by @serenez) (closes #3513)
  - DuckDB 视图编辑 — 支持读取并编辑 DuckDB 视图定义，原生连接和 Worker Isolation 模式均可通过现有“编辑视图”入口保存 CREATE OR REPLACE VIEW。(contributed by @CN-Scars) (closes #3752)
  - 虚谷可编程对象元数据 — 支持获取过程、函数、包、包体、触发器、序列和用户自定义类型，并展示对象编译有效性。(contributed by @mapan0424)
  - 自托管 AI 服务免密配置 — OpenAI Compatible 等无需鉴权的自托管服务可留空 API Key，配置校验只对实际需要鉴权的提供商强制密钥。(contributed by @eryajf) (closes #3805)
  改进
  - 数据网格显示偏好 — 多行转置和隐藏空列选项可持久化保存，重新打开应用后继续使用上次设置。(contributed by @eryajf) (closes #3704)
  - 驱动下载源选择 — Agent 和驱动下载会实际使用当前选择的官方、CNB 或 AtomGit 下载源，改善不同网络环境下的安装体验。(contributed by @eryajf) (closes #3705)
  - 大结果集与 PostgreSQL 性能 — 标签切换复用已有结果集大小估算，避免同步深遍历；PostgreSQL 结果类型改为每列只分类一次，减少大结果解码中的重复分配和字符串匹配。(contributed by @serenez)
  - Web 传输性能 — Web 和 Docker 部署的 API 响应启用 gzip 压缩，大型查询结果可显著减少网络传输量，同时保持 SSE 进度流不受影响。(contributed by @serenez)
  - 对象搜索与刷新 — 侧边栏搜索可覆盖所有已经连接但尚未展开的数据库；快速打开可搜索未预加载的对象，刷新快捷键也能直接刷新对象浏览器。(contributed by @ManjusriBuddha) (closes #3615)
  - 生产环境提示样式 — 降低明暗主题下生产环境水印的不透明度，同时保留顶部警示条和红色边线。(contributed by @zipg)
  修复
  - 数据网格筛选布局 — 修复长 WHERE/ORDER BY 条件展开后标签、文本和操作按钮重叠的问题；清空 WHERE 时会同时清除结构化规则、表头筛选和筛选角标。(contributed by @zipg)
  - 转置视图滚动状态 — 关闭单行或多行转置后恢复自定义横向滚动条、原有滚动位置和 Canvas 尺寸监听，错误结果恢复后也可正常重新挂载。(contributed by @serenez) (closes #3447)
  - 数据页状态保持 — 恢复标签时可重新加载字段注释而不重复查询数据；刷新数据页不再错误使用 SQL 结果行数，并保留该页已有分页大小和手动调整的列宽。(contributed by @zipg) (closes #3679, #2199)
  - 连接编辑与状态恢复 — 已打开的连接编辑草稿不会被后台保存快照覆盖；元数据请求恢复后会清除旧警告，且并发产生的新错误不会被较早请求误清除。(contributed by @zipg)
  - 新建数据库对话框 — 修复取消或关闭后，在侧边栏再次右键会反复弹出新建数据库对话框的问题，不影响现有建库和授权流程。(contributed by @xddcode) (closes #3793)
  - 本地 SQL 文件保存 — SQL 文件可正确保存到包含中文或其他 Unicode 字符的原生系统路径。
  - SQL 执行行为 — 快捷键执行遵循“当前语句/全部语句”设置和目标选择器；执行当前语句、强制当前语句或行号执行时不再丢失 /*+ ... */ 优化器提示。(contributed by @serenez) (closes #3569)
  - SQL Server CTE 更新行数 — 以 CTE 开头的单条 UPDATE、DELETE 等语句可正确报告影响行数，同时保持 CTE 查询、OUTPUT 和混合批次的现有结果集行为。(contributed by @serenez) (closes #3676)
  - MongoDB 聚合与类型保持 — aggregate(pipeline, options) 支持 explain、游标和完整命令选项，并提供更清晰的语法错误；写入时不再把外观类似日期的普通字符串误转成 BSON Date。(contributed by @onenewcode) (closes #3626)
  - MySQL 认证兼容 — 更新 MySQL 驱动实现，完善使用旧式 sha256_password 账户的连接兼容性。
  - PostgreSQL SSL 模式 — 统一桌面端、核心后端和 Node Core 对 disable、prefer、require、证书校验及 URL sslmode 的处理。
  - 日期时间默认格式 — 全局显示、导入和导出格式的下拉列表可单独选择“保持数据库原始值”或“自动识别”，无需重置整个设置页。(contributed by @onenewcode) (closes #3743)
  - AI 模型选择 — 新建 AI 会话时继续使用当前运行期间最近选择的模型；切换默认配置后，当前模型状态也会同步更新。(contributed by @Abeautifulsnow)
  - 编辑器设置稳定性 — 修复设置对话框初始化时的 TDZ 崩溃，恢复连接分组删除确认框及同一组件内的其他交互。(contributed by @Abeautifulsnow)
  - 对象浏览器稳定性 — 健康检查更新连接对象时不再触发约每 30 秒一次的无意义列表重载，真实数据库或 Schema 切换仍会正常刷新。(contributed by @zipg)
  - 执行计划错误提示 — Oracle 等数据库获取执行计划失败时保留后端返回的 ORA、Agent 等原始诊断，不再被通用空计划提示覆盖。
  安装
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.60 拉取。
