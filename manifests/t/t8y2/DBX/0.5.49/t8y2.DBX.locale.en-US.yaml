ReleaseNotes: |-
  新功能
  - Spark 驱动 — 新增 Apache Spark 数据库驱动，支持 Spark Thrift Server、catalog 配置、侧边栏浏览和表结构读取 (contributed by @jischeng)
  - Redis Value Viewer — Redis 值查看器支持 UTF-8、ASCII、Binary、Hex、Base64、JSON、Java Serialized 等多种展示格式，并改进复制、预览和成员详情 (contributed by @onenewcode, closes #2236)
  - SQL Files 面板 — SQL 文件夹支持刷新、定位、右键菜单、执行文件、路径复制和选择状态同步，管理本地 SQL 文件更方便 (contributed by @ahua8522)
  - ExPaste — SQL 编辑器新增将选区或剪贴板内容转换为 IN (...) 条件的 ExPaste 工具，并支持多语言文案和快捷键配置 (contributed by @zipg, closes #2425)
  - 数据网格 — 支持复制逐行 INSERT 语句、筛选字段搜索，并优化查询结果列宽展示 (contributed by @eryajf, @zipg)
  - SQL 编辑器 — 支持关闭 SQL snippets、配置行注释快捷键、优化限定表名补全，并默认优先使用 Fira Code 字体回退链。
  - 数据库能力 — PostgreSQL 支持批量表 cascade 操作，SQLite 支持 WSL UNC 网络路径，导入建表时可选择目标列类型。
  - AI 助手 — AI 提示可引用 SQL 库文件，便于把已有 SQL 内容作为上下文 (contributed by @zipg)
  - ER 图 — 可从图中的表卡片直接打开表数据。
  改进
  - SQL 补全 — 表别名建议会避开 SQL 关键字，并增强跨库列补全、子查询后的列补全、MySQL 动态变量和原生变量识别 (contributed by @eryajf, @miracle, closes #2736)
  - SQL 文件与标签 — 保存的 SQL 文件重命名后会同步更新已打开标签页标题，并优化 SQL 文件面板头部样式 (contributed by @jeeinn, closes #2648)
  - 界面细节 — 优化工具栏和历史筛选区溢出表现，驱动更新数量徽标改为圆点提示，侧边栏选中高亮更平整并减少重绘开销 (contributed by @zipg, @haipengno1)
  - AI 消息 — 推理内容展开/收起状态在消息之间保持一致，避免流式输出时反复跳变 (contributed by @Abeautifulsnow)
  - 超时提示 — SQL 执行超时时会展示更明确的可操作入口，并覆盖 agent RPC timeout 场景 (contributed by @zipg)
  - 连接树 — Dameng/Oracle 风格结构树会固定 schema 行，减少浏览层级时的跳动感 (contributed by @haipengno1)
  - 图标一致性 — 修正多处上传/下载图标语义不一致的问题 (contributed by @jeeinn)
  修复
  - SQLite / SQLCipher — 桌面端测试连接和实际连接会使用配置中的 SQLCipher key，并兼容旧版 SQLCipher 加密库 (contributed by @CN-Scars, closes #2713)
  - MongoDB GridFS — 文件页支持批量下载、分页浏览和更稳定的滚动布局，日期显示也更统一 (contributed by @ZionLin2016, closes #2711)
  - SQL Server — 连接回退支持 legacy encryption，并修复 TOP 查询分页排序使用暴露列名的问题 (contributed by @zipg)
  - MySQL — 连接初始化设置 group_concat_max_len，并修复 IPv6 地址带方括号时的 TCP 连接问题 (contributed by @gggaiitx)
  - Oracle / JDBC — Oracle 增加 GB18030 字符集回退、保留 PL/SQL block 结尾分隔符，JDBC 元数据通过 catalog 回退恢复主键信息 (contributed by @LwClick)
  - PostgreSQL — 外键信息会加载 referential actions，非校验 TLS 不再提前解析证书，导出时保留 JSON 转义。
  - Kingbase / GaussDB / SAP HANA / Elasticsearch — 修复 Kingbase 连接与元数据查询异常、GaussDB 存储过程分类、SAP HANA DO block 语句拆分，以及 Elasticsearch SQL 表别名解析 (contributed by @zipg)
  - SSH 隧道 — 兼容旧服务器所需的 hmac-sha1 和 SHA-1 ETM MAC 算法。
  - ZooKeeper — 阻止在根 znode 上错误创建路径 (contributed by @zipg)
  - JSON 格式化 — 值编辑器格式化 JSON 时保留大整数精度，避免数字被静默改写 (contributed by @gggaiitx, closes #2765)
  - SQL 编辑器 — 行首有空格或 tab 时仍显示左侧执行按钮，数据库拖拽和 routine 导出处理更稳定，SQL 库选中样式更清晰 (contributed by @zipg)
  - Linux 桌面 — DMABuf 禁用逻辑仅作用于 NVIDIA，避免 AMD/Wayland 环境出现 UI 卡顿。
  - 导出 — PostgreSQL JSON 转义保持原样，避免导出内容被二次处理。
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.49 拉取。
