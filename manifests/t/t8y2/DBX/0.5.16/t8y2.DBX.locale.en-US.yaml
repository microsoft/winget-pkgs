ReleaseNotes: |-
  新功能
  - 查询快捷键 — 新增快速执行查询的快捷键，减少鼠标操作，提高日常 SQL 编辑效率
  - MongoDB 视图模式记忆 — 记住 MongoDB 浏览器的视图模式偏好，切换集合后无需重复选择 (contributed by @baizhi958216)
  - 结果网格复制为 UPDATE — 支持将当前行内容快速复制为 UPDATE 语句，便于生成修改脚本
  - Redis 键浏览体验增强 — 优化 Redis key browser 的日常浏览与操作流程
  - 单元格详情编辑器 — 新增更适合编辑复杂内容的单元格详情视图
  - 表过滤面板可调整大小 — 支持拖拽调整表过滤区域尺寸，提升大表筛选时的可读性
  - AI 模型列表自动获取 — 在 AI 设置中自动拉取并选择可用模型，减少手动输入模型 ID 的出错率 (contributed by @Abeautifulsnow)
  - DBX 深链接 — 支持通过 dbx://connection/new 深链接打开应用并预填连接信息，便于从网页、文档或脚本快速发起连接 (contributed by @yavon007) (closes #347)
  改进
  - 无主键表编辑体验 — 改进无主键 SQL 表的编辑能力，并在插入行保存后自动刷新结果
  - 静默更新提醒 — 后台更新检查改为仅显示徽标提示，减少打断
  - SAP HANA 连接兼容性 — 支持 SAP HANA tenant routing，改善特定部署下的连接体验
  - SQL 缩放交互 — 优化编辑器缩放手感，让 SQL 阅读和演示更顺滑
  - MySQL 时区处理 — 保留会话时区设置，减少时间字段显示偏差
  - 工具栏提示稳定性 — 改进下拉菜单 tooltip 表现，减少悬浮提示丢失
  - Windows 桌面体验 — 提升任务栏和托盘图标可见性，并修复应用驻留托盘时双击桌面图标无法正确唤起窗口的问题
  修复
  - macOS 全屏标题栏间隙 — 修复 macOS 全屏模式下工具栏顶部留白异常的问题
  - 标签切换编辑丢失 — 修复切换标签页时未保存的行编辑内容可能丢失的问题 (closes #362)
  - MySQL DELIMITER 崩溃 — 修复 DELIMITER 跟在包含非 ASCII 注释的 SQL 后面时可能导致崩溃的问题 (closes #360)
  - 数据库树搜索结果保持 — 修复侧边栏搜索后数据库子节点状态无法正确保留的问题
  - SQL Server 事务控制 — 修复部分事务控制语句未按正确执行路径发送而导致失败的问题
  - SQL 编辑器查找 — 修复 SQL 编辑器中 Ctrl+F 的行为，改进查找替换体验
