ReleaseNotes: |-
  新功能
  - Claude Code CLI AI 提供商 — AI 助手新增 Claude Code CLI 集成，可配置模型与推理强度，并复用本地 CLI 登录环境。(contributed by @CN-Scars)
  - 多 AI 配置与模型管理 — 支持同时保存多套 AI 服务配置和模型，并可快速切换；折叠推理内容时显示推理字符数量。(contributed by @lexmin0412, @Abeautifulsnow)
  - 定时数据库备份 — 新增备份计划管理，可按计划自动执行数据库备份任务。(contributed by @CSXFanMeng)
  - 数据库创建与用户授权 — 增加数据库创建、用户创建和权限授权流程，并补充多语言界面。(contributed by @eryajf)
  - StarRocks 用户与权限管理 — 支持查看和管理 StarRocks 用户及权限。(contributed by @jischeng)
  - SQL Server 执行计划 — SQL 编辑器可获取并展示 SQL Server 查询执行计划。(contributed by @zipg)
  - PostgreSQL 服务监控 — 新增 PostgreSQL 服务仪表盘，展示连接、事务、缓存和数据库活动等实时指标。(contributed by @antwa)
  - MongoDB 文档能力 — 文档浏览器支持整篇 JSON 编辑；查询补全覆盖更多命令，并新增 distinct 操作。(contributed by @onenewcode, @jthanh8144)
  - Elasticsearch REST 与筛选 — 改进 REST 命令编辑体验，并为可视化查询增加更多筛选能力。(contributed by @zipg)
  - DuckDB Parquet 扩展 — 桌面端内置 DuckDB Parquet 扩展，无需额外下载即可查询 Parquet 文件。(contributed by @yuuuxt)
  - 标签页多行布局 — 编辑器设置新增多行标签栏选项，标签较多时可平铺展示。(contributed by @gggaiitx)
  - 全局日期与时间格式 — 支持统一配置日期、时间和日期时间显示格式；数据网格可根据字段时区格式化时间值。(contributed by @zipg, @ptma)
  - 数据网格生成值 — 新增生成单元格值能力，简化批量构造和填充数据。(contributed by @zipg)
  - 表字段信息增强 — 表结构详情展示字段默认值；对象浏览器可按字段注释搜索，条件建议中也会显示字段注释。(contributed by @LwClick, @zipg)
  - 驱动更新与下载源 — 驱动商店新增“可用更新”区域，Agent 下载目录支持多来源，提高驱动发现和更新体验。(contributed by @Abeautifulsnow, @eryajf)
  - SQL 执行诊断日志 — 新增可控制的 SQL 执行调试日志，方便定位数据库和驱动相关问题。(contributed by @Abeautifulsnow)
  改进
  - 数据网格模块化与性能 — 拆分网格工具栏、筛选器、详情预览、分页和交互运行时，低频界面按需加载，同时补充大量交互回归测试。
  - 数据页签识别 — 数据结果标题显示连接名称，便于区分来自不同连接的同名表。(contributed by @LwClick)
  - 侧边栏与对象导航 — 优化树节点运行时，元数据刷新时保留当前连接节点，并统一对象浏览器排序和表身份识别逻辑。(contributed by @serenez)
  - Kafka 管理体验 — 改进消息预览和管理界面的本地化文案。(contributed by @xddcode)
  - Redis 完整值查看 — 简化完整值对话框布局并保持内容居中，改善长文本和 RedisJSON 查看体验。(contributed by @SpencerZhang)
  修复
  - MongoDB 管道更新 — 支持以 aggregation pipeline 作为更新内容，避免数组形式更新被错误解析或拒绝。(contributed by @serenez)
  - MySQL 类型识别 — 正确区分文本与二进制字段，并恢复 ENUM、SET 结果列的类型识别。(contributed by @xddcode)
  - MySQL 无数据库连接 — 允许在未选择默认数据库时执行连接级查询，并兼容 Manticore 初始化会话的响应差异。(contributed by @xddcode, @serenez)
  - Kingbase 元数据与 DDL — 恢复表结构类型参数和表注释，修复 Schema 展开、MySQL 模式标识符引用及无效 varchar 长度导出。(contributed by @zipg)
  - SQL Server 数据与重连 — 保留高精度数值，数据库重新连接后恢复视图选择状态。(contributed by @serenez, @zipg)
  - Oracle 与虚谷超时 — 确保查询超时配置在 Oracle 和虚谷 Agent 执行链路中生效。(contributed by @Abeautifulsnow)
  - Oracle SQL 补全 — 恢复 Schema 限定表名的补全结果。(contributed by @serenez)
  - Agent 驱动升级 — 关闭相关连接后可正常升级驱动，不再被已释放的连接状态阻止。(contributed by @zipg)
  - 达梦兼容性 — 分页元数据中正确分类物化视图，导出 BIT 字段时生成数字字面量。(contributed by @zipg)
  - Doris 与 GBase 8a — Doris 元数据视图保留 Catalog 上下文；GBase 8a 使用数据库原生表 DDL。(contributed by @jischeng, @zipg)
  - GaussDB 查询 Schema — 允许清除当前查询 Schema，并正确同步查询上下文。(contributed by @zipg)
  - ZooKeeper 连接与查询 — 慢连接场景遵守超时设置，并在键浏览器中正确打开新查询。(contributed by @zipg)
  - 单行数据修改事务 — 单条数据修改不再被强制包裹在事务中，恢复连接设置和数据库默认行为。(contributed by @zipg)
  - PostgreSQL 侧边栏分页 — 优先展示根表，避免继承关系中的子表挤占分页结果。(contributed by @zipg)
  - 侧边栏主键元数据 — 加载表数据后保留主键信息，避免后续编辑失去正确的行定位条件。(contributed by @zipg)
  - ASE SQL 高亮 — 改进 SAP ASE 方言的 SQL 语义高亮。(contributed by @zipg)
  - 结果工具栏布局 — 修复查询结果工具栏发生垂直滚动和高度变化的问题，保持操作区域稳定。
  - 数据网格列名与自动宽度 — 调整列宽计算与拖拽边界，确保列名完整可见，同时限制自动计算的最大宽度，避免长字段名导致列宽过度扩张。
  - 数据网格表头布局 — 修复横向滚动时表头高度跳动，以及深层连接分组路径挤压编辑器工具栏的问题。(contributed by @LwClick, @serenez)
