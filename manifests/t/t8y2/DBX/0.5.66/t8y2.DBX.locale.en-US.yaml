ReleaseNotes: |-
  新功能
  - Oracle 能力 — 新增 TNS alias 连接方式，支持编辑 Oracle 触发器；OceanBase Oracle 兼容模式下也可查看视图、过程和函数等对象源码。
  - AI Agent 回合上限 — 可在“设置 → AI”中将单次 Agent 运行上限配置为 5–500 回合，默认值仍为 30。 (contributed by @Abeautifulsnow)
  - 快速打开 SQL 文件 — Ctrl/Cmd+P 现在可以搜索并直接打开 SQL 库和本地 SQL 文件。 (contributed by @yangqinlong)
  - 侧边栏连接过滤 — 新增“仅显示活跃连接”开关，连接较多时可快速隐藏未连接项目。 (contributed by @eryajf) (closes #4168)
  - 侧边栏注释布局 — 新增注释右侧对齐方式，空间不足时优先保留对象名称。 (contributed by @zipg)
  - 源码查看与搜索 — 可直接打开 PostgreSQL 等数据库的触发器定义；嵌入式只读源码视图也支持 Ctrl/Cmd+F 搜索。 (contributed by @zipg)
  - DDL 搜索导航 — 表属性的 DDL 搜索增加匹配数量、上一项/下一项导航，以及 Enter、Shift+Enter 循环跳转。 (contributed by @zipg)
  - 界面圆角 — “设置 → 外观”新增无圆角、小圆角和大圆角，默认使用大圆角，并统一按钮、输入框、菜单、弹窗及数据视图样式。 (contributed by @zipg)
  - r-nacos 兼容 — Nacos 管理支持连接 r-nacos，并补充对应部署镜像、端口和初始化说明。 (contributed by @eryajf) (closes #4061)
  改进
  - AI 流式回复 — AI 回复生成过程中即可实时呈现标题、表格、列表和代码高亮；尚未生成完整的代码块不会显示执行或应用操作，长回复渲染性能也得到优化。 (contributed by @TongEc)
  - AI 连接诊断 — 更准确地区分认证失败、配额不足、模型错误、安全拦截、空响应及 Gemini token 耗尽等问题，并提供可复制的详细诊断。 (contributed by @zipg)
  - 大字段表导入 — 优化 Excel/CSV 含数百个字段时的映射页面，减少页面卡顿和长时间等待。 (contributed by @DengQingNian) (closes #2980)
  - 新建连接选择器 — 保留网格或列表显示偏好，增强选中态，修复边缘边框裁切，并允许在配置页按 Escape 返回数据库选择页。 (contributed by @zipg, @xddcode)
  - 表属性面板 — 记住最后使用的 DDL、字段、索引、外键或触发器标签；选择字段名称文本时不再误触发列定位。 (contributed by @zipg)
  - Oracle 查询性能 — 减少查询结果展示前的表元数据等待，并在打开触发器标签时再加载可能包含大量源码的触发器定义，降低表结构页面的初始等待时间。
  - 原生菜单多语言 — Windows 托盘菜单和 macOS 应用菜单会跟随当前界面语言，无需重启。 (contributed by @Abeautifulsnow)
  - 界面缩放 — 移除容易导致界面难以操作的 200% 选项，界面选择上限调整为 175%。 (contributed by @zipg)
  修复
  - PostgreSQL 默认 TLS — 未显式配置 sslmode 时恢复为 prefer，先尝试 TLS、服务器不支持时再回退明文，修复升级后强制 SSL 服务器及部分代理连接失败的问题。 (contributed by @xddcode) (closes #3928, #4273)
  - PostgreSQL 查询兼容 — 自定义类型改用可读文本展示；多语句查询会正确显示后续语句错误；查询时优先使用编辑器选择的 schema。 (contributed by @wang-zhengxin) (closes #4171)
  - ClickHouse 查询 — 修复跨数据库查询时字段注释丢失，以及查询 system.settings 时分页 SQL 生成错误的问题。 (contributed by @Staroon, @wang-zhengxin) (closes #4315)
  - Elasticsearch 结果 — 正确区分精确总数和“至少 N 条”，避免分页总计错误；CAT API 结果可以在原始内容和结构化 JSON 之间切换。 (contributed by @onenewcode) (closes #4226)
  - MongoDB 精度 — 筛选 int64 字段时不再因 JavaScript 数字转换而丢失精度。 (contributed by @onceMisery)
  - MySQL 表结构 — 字段继承表级字符集或排序规则时不再误显示为字段级显式设置。
  - Kingbase 表结构 — 根据兼容模式使用正确的标识符引号，并在生成表 DDL 时保留 identity 列。
  - Oracle 数据与 schema — 修复无时区日期时间值转换、系统 schema 缺失，以及切换连接后未正确选择 schema 的问题。
  - 可编辑查询 — Oracle 和 PostgreSQL 的 FOR UPDATE 等行锁查询不再被误判为只读复杂查询；Agent 查询也会正确遵守配置的最大行数。
  - SQL 补全 — 按 Tab 时会等待已经发起但尚未完成的补全请求，避免候选稍晚返回时只插入缩进。
  - 驱动安装进度 — 同时安装或更新多个 Agent/JDBC 驱动时，各自显示正确的进度，不再互相覆盖。
  - Claude 集成 — 修复 Windows Claude Code CLI 通过 .cmd 启动时 MCP 配置被破坏的问题；Claude HTTP 请求也不再错误携带 [1m] 模型后缀。 (contributed by @zipg)
  - Windows WebView2 兼容 — 在 WebView2 沙箱初始化导致窗口无法加载的环境中，可通过 DBX_WEBVIEW2_NO_SANDBOX=1 启用兼容模式；默认行为保持不变。 (contributed by @James-Leong) (closes #4321)
  安装
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.66 拉取。
