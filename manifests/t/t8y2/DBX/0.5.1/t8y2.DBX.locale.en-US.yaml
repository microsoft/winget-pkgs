ReleaseNotes: |-
  新功能
  - 设置页关于标签 — 设置对话框新增"关于"标签页，方便查看版本信息
  - 数据库对象列表缓存 — 侧栏数据库对象列表支持缓存，减少重复查询，加速切换
  - 从分组菜单创建连接 — 侧栏分组右键菜单支持直接创建新连接
  - 编辑器 Tab 缩进 — SQL 编辑器支持 Tab 键缩进
  - Windows 绿色版压缩包 — 新增 Windows 便携版（ZIP），无需安装即可使用
  改进
  - 查询结果流式加载 — 查询结果使用流式传输并限制行数，提升大数据量查询的响应速度
  - 侧栏搜索性能优化 — 侧栏搜索匹配算法优化，过滤速度更快
  - 表格右键菜单增强 — 数据表格右键菜单功能增强
  - 数据表工具栏条件刷新 — 修复表数据编辑的工具栏，条件过滤和刷新不再丢失状态 (contributed by @rarnu)
  - AI 对话历史可切换 — AI 助手对话历史支持开关控制
  修复
  - SQL Server 编辑支持 — 修复 SQL Server 数据编辑相关问题
  - 更新后重启 — 修复应用更新后重启失败的问题
  - 表格翻页滚动位置 — 修复翻页后表格滚动位置未重置的问题
  - MySQL 事务编辑 — 修复 MySQL 事务编辑使用原始 SQL 执行的问题
  - 侧栏刷新保持展开 — 修复侧栏刷新后树节点展开状态丢失的问题
  - 标题栏双击切换 — 修复标题栏双击时窗口状态重复切换的问题 (#179)
  - 默认库过滤数据库树 — 修复默认数据库配置过滤数据库树显示的问题 (#175)
  - 标签文字被箭头遮挡 — 修复标签页滚动箭头与文字重叠的问题
  - 表格与弹窗布局 — 优化表格与 SQL 文件弹窗的布局显示
  - 事务状态位置 — 事务状态指示移至操作按钮旁边，更直观
  - WHERE/ORDER BY 条件 — 修复 WHERE 和 ORDER BY 输入框条件重复和状态丢失的问题
  - 默认数据库处理 — 统一默认数据库的处理逻辑
