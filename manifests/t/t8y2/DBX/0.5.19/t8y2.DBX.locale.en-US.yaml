ReleaseNotes: |-
  新功能
  - 批量数据对比 — 数据对比支持批量处理多张表，适合做跨环境核对和迁移验收
  - 可配置网格快捷键 — 数据表格新增复制、删除当前行等快捷键配置，常用编辑操作更顺手
  - SQL 语义诊断 — SQL 编辑器增加更细粒度的语义诊断，能更早发现语句问题
  - 结果面板折叠 — 查询编辑区支持折叠结果面板，写复杂 SQL 时可获得更专注的编辑空间
  - 对象浏览默认聚焦表 — 对象浏览器默认聚焦表列表，并让视图的右键菜单与侧边栏保持一致，常见浏览路径更直接
  - 结构编辑列排序 — 表结构编辑器支持调整字段顺序，做结构整理时不用再手写整段 DDL
  - 驱动存储占用明细 — 驱动管理页显示各运行时和组件的存储占用，清理空间更有依据
  - SQL 补全样式增强 — SQL 自动补全的图标和样式更清晰，区分对象类型时更直观
  改进
  - 大数据量内存占用 — 优化高密度表格、Redis 大列表/哈希/Stream 等场景的 DOM 与内存占用，长时间浏览更稳定 (contributed by @SuLea-IT)
  - 查询结果缓存回收 — 非活动标签页会更积极释放多结果集和后端会话，启动和切换后的内存压力更低 (contributed by @SuLea-IT)
  - 侧边栏展开稳定性 — 优化连接和对象树展开时的滚动表现，减少跳动感
  - 剪贴板复制容错 — 在受限环境下复制行为更稳，失败场景更少
  - 字段详情交互 — 单元格详情会先聚焦当前格子再打开，键盘和鼠标混合操作更连贯
  修复
  - 视图源码标签串页 — 修复视图“查看源码”可能复用同名数据标签页、结果看起来像打开表格的问题
  - 视图元数据分组 — 普通视图展开后只保留合理的字段信息，不再混入表专属的外键、触发器等分组
  - Schema 新查询上下文 — 修复从 schema 右键新建查询时没有自动带上对应 schema 的问题
  - 剪贴板复制流程 — 修复部分环境下复制链路不稳定的问题
  - PostgreSQL 表注释查询 — 修复查询表注释时尾逗号导致的 SQL 异常
  - 大整数显示与 AI 查询结果 — 修复 agent / 查询结果里的大整数可能被错误处理的问题
  - JSON 智能引号 — 修复表格 JSON 内容中智能引号导致的识别异常
  - MySQL / StarRocks 主键识别 — 修复部分 MySQL 兼容库和 StarRocks 场景下主键元数据识别不准的问题
  - Oracle 连接兼容性 — 修复部分 Oracle 环境连接描述符兼容性不足的问题
  - SQL Server 命名实例 — 修复 SQL Server 命名实例连接支持不完整的问题
  - 旧版 MySQL 例程元数据 — 修复旧版 MySQL 例程元数据读取兼容性问题
  - DB2 Schema 树加载 — 修复 DB2 在侧边栏 schema 模式下的对象加载问题
  - Mongo 鉴权库保持 — 修复 MongoDB 执行命令时鉴权数据库信息可能丢失的问题
  - Oracle 驱动提示 — 修复 Oracle 驱动配置提示没有准确匹配所选 profile 的问题
