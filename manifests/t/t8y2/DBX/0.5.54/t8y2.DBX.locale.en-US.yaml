ReleaseNotes: |-
  新功能
  - 批量数据导入 — 支持一次选择多个导入文件，并可从 Excel 工作簿中选择多个 Sheet，提升批量迁移和数据初始化效率。
  - 生产环境安全保护 — 可将连接标记为生产环境，并对数据修改、结构变更等高风险操作提供醒目标识和二次确认。(contributed by @wuxiemian)
  - 对象浏览 — 数据库对象可在右侧面板中查看属性、DDL 和源码；优化单击、双击和右键操作逻辑，减少标签页占用。(contributed by @gggaiitx)
  - 数据传输 — 新增人大金仓 Kingbase 数据传输支持。
  - Elasticsearch — REST 查询结果支持以结构化 JSON 形式展示，便于浏览和分析响应内容。(contributed by @onenewcode)
  - MySQL 执行计划 — 支持以标准表格形式展示 EXPLAIN 结果，便于分析查询访问方式、索引和扫描行数。(contributed by @onenewcode)
  - SQL 编辑器变量 — 支持配置 SQL 变量语法，适配不同数据库和脚本中的变量替换规则。(contributed by @onceMisery)
  - 表结构编辑 — 支持在本地持久化列顺序，重新打开表结构时保留用户调整后的字段排列。(contributed by @zipg)
  改进
  - 查询性能 — 优化查询结果加载和连接复用，减少重复的数据转换、连接获取与额外资源占用。(contributed by @onceMisery)
  - 连接稳定性 — 查询会话持续复用原有连接，避免长查询和多步骤操作期间连接上下文意外变化。
  - 数据导出 — XLSX 导出保留数字单元格类型，改善排序、计算和后续数据分析体验。
  - 查询结果工具栏 — 重新组织操作按钮和状态信息布局，提升常用操作的可发现性并减少界面拥挤。(contributed by @eryajf)
  - 对象快速打开 — 快速打开功能可索引按类别分组的数据库对象，覆盖更多非表对象。
  - SQL 文件执行 — MySQL 大型 SQL 文件采用流式读取和执行，降低大文件导入时的内存占用。
  - SQL 文件管理 — 同名 SQL 文件通过完整路径准确区分，避免打开、定位或操作错误文件。
  - Access — 支持连接加密的 Microsoft Access 数据库文件。
  - Redis — 优化自动刷新调度和 TTL 显示计算，并在稀疏 key 空间中继续扫描，避免过早结束结果加载。(contributed by @eryajf)
  - 表操作 — 对象浏览器增加安全的批量清空入口；清空表后自动刷新已打开的数据标签页。(contributed by @zipg)
  - 表结构界面 — 打开表结构编辑器时默认显示字段列表，减少常用操作的切换步骤。
  - Java 驱动兼容性 — 改善 JDBC 驱动加载和调用兼容性；托管 JRE 补充 Kerberos 所需模块，支持相关 Kafka 认证场景。(contributed by @zipg)
  - Agent 更新 — Agent Release 下载支持镜像源，改善部分网络环境下的更新可靠性。
  - 镜像发布 — Release 资源并行上传至镜像服务，缩短安装包同步等待时间。
  修复
  - SQL 编辑器 — 自动补全识别光标后已有的表别名，避免重复插入；修复列选择模式下出现额外光标的问题。(contributed by @serenez)
  - SQLite — 内存数据库持续复用原有连接，避免因新建连接而访问到不同的空数据库。
  - 旧版 macOS — 限定旧 WebView 兼容样式的作用范围，并修复 Intel Mac 旧系统中的界面样式异常。(contributed by @zipg)
  - 数据网格 — 单元格详情中的全选操作不再影响页面其他区域；插入数据时忽略空的生成列值，避免覆盖数据库默认生成逻辑。
  - 对象源码 — 保留存储过程、视图等数据库对象源码的原始格式，避免换行和缩进丢失。
  - MySQL Schema Diff — 字符串类型默认值保持正确的引用语义，避免生成错误的结构同步 SQL。
  - TDengine — 修复普通表和子表的数据行编辑功能。(contributed by @zipg)
  - Doris — 对象浏览过程中保留外部 Catalog 上下文，避免查询到错误的内部数据库。
  - DuckDB — 元数据加载包含列注释，使表结构和字段说明完整展示。
  - Web 服务 — 加固 JDBC 驱动上传校验和跨域配置，减少无效文件及不安全请求带来的风险。
  - 界面文案 — 图标主题提示根据不同操作系统精简展示，减少不适用的平台说明。(contributed by @zipg)
  > 国内下载：如果 GitHub 下载较慢，可从 CNB 镜像 下载桌面端安装包，Docker 镜像从 docker.cnb.cool/dbxio.com/dbx:0.5.54 拉取。
