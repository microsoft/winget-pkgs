ReleaseNotes: |-
  新功能
  - 批量编辑 — 数据网格新增基于选择区域的批量编辑动作，批量修改单元格更高效
  - SQL 补全 — 新增数据库方言相关建议，并在补全中显示字段注释，写 SQL 时上下文更完整
  - GBase 8s — 新增 GBase 8s 驱动配置，扩展国产数据库连接支持
  - Elasticsearch — 新增 Elasticsearch 命令补全，命令输入更顺手
  - 二进制数据 — 数据网格支持内联下载 BLOB / 二进制单元格内容
  - 断开连接处理 — 支持配置断开连接时标签页的处理方式，避免误清理正在查看的内容
  - MCP 配置 — 优化 MCP 默认配置和提示信息，首次接入更清晰
  改进
  - 数据导出 — 导出改为后台任务体验，支持进度查看、取消和批量大小设置；有主键表可使用更高效的 keyset 分页 (contributed by @DengQingNian)
  - 完整表导出 — 全量表导出路径改为流式处理，降低大表导出时的内存峰值
  - 数据网格性能 — Canvas 表格减少行对象分配，降低大结果集浏览时的前端内存占用
  - 网格加载 — 预加载数据网格组件，切换到结果视图更快
  - Doris 元数据 — 优化 Doris 元数据浏览速度，大库对象列表响应更快
  - 导入导出图标 — 修正导入/导出相关图标方向，并补齐导入菜单提示 (contributed by @DengQingNian)
  修复
  - CLI 安全默认值 — 修复 CLI 查询默认放行写 SQL 的问题，现在默认保持只读，需显式开启写入
  - SQL 补全 — 修复保留空白上下文时的补全解析问题
  - 表导出 — 修复导出分页、排序和边界场景，减少漏行或顺序异常风险
  - JDBC 连接 — 修复驱动 URL 参数分隔符处理，避免部分驱动连接参数拼接错误
  - openGauss — 字段元数据加载失败时更稳健，减少对象浏览失败
  - 数据网格 — 修复无元数据时表筛选入口不可用、BLOB 下载、单列滚动等问题
  - 侧边栏 — 修复连接搜索结果在连接前不可见，以及 MySQL 表对象重复显示
  - SQL Server — 修复分页时 TOP 与 DISTINCT 的位置，并保留存储过程 DDL 批处理
  - IRIS — 修复表预览分页语法，并跳过不适用的 schema 执行上下文
  - Elasticsearch — 改进本地 TLS 连接处理
  - OceanBase Oracle 模式 — 使用 Oracle JDBC URL 生成 agent 连接
  - Oracle — 修复 SYSDBA agent 连接支持
  - 驱动更新 — 跳过被阻止的驱动更新，避免重复失败提示
  - Docker Web 版 — 离线 agent zip 上传改为流式处理，降低上传大文件时的内存压力
