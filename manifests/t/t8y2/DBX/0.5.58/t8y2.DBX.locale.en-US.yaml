ReleaseNotes: |-
  新功能
  - 数据库信息与 SQL 执行标记 — 连接测试和连接详情可查看数据库产品、版本、字符集、驱动等信息；多语句执行后在编辑器中逐条标记成功或失败状态。(contributed by @shnno13)
  - 新标签页打开数据 — 支持通过右键菜单或 Alt/Option + Click 在新标签页打开表数据，并可自定义快捷键。(contributed by @eryajf) (closes #2141)
  - 双击刷新数据表 — 侧边栏支持双击数据表刷新内容，减少频繁打开菜单的操作。(contributed by @eryajf) (closes #3373)
  - 表结构字段插入位置 — 新增字段时可直接插入到当前选中列之后，便于调整大型表结构。(contributed by @onenewcode) (closes #3328)
  - 网格设置 NULL — 可通过单元格右键菜单将单个或批量选中的可编辑单元格设置为数据库 NULL。(contributed by @LwClick) (closes #3488)
  - Redis JSON 源码编辑 — String、Hash 和 RedisJSON 数据支持源码方式编辑、JSON 校验及紧凑保存，并保留高精度数字原文。(contributed by @onenewcode) (closes #3371)
  - MongoDB 单文档命令 — 查询编辑器支持 findOne、findOneAndUpdate、findOneAndReplace 和 findOneAndDelete，并正确展示查询或修改结果。(contributed by @jthanh8144)
  - 导出后打开目录 — 文件导出完成后可直接打开所在文件夹，便于快速定位导出结果。(contributed by @zipg)
  - 界面缩放微调 — 增加更细粒度的界面缩放档位，改善不同分辨率和显示密度下的使用体验。(contributed by @zipg)
  改进
  - 查询资源生命周期 — 优化结果缓存容量控制、过期及孤立缓存清理、查询取消、后台任务回收和页签关闭释放流程，降低长时间使用或大量结果页签带来的资源占用。
  - 连接分组识别 — 连接选择器复用完整分组路径信息，为不同分组下的同名连接显示分组标签。(contributed by @serenez) (closes #3416)
  - SQL 补全能力 — 改进逗号分隔及 JOIN 多表场景的别名补全，恢复结果字段建议，并为 PostgreSQL 保留字补全自动添加正确引用。(contributed by @zipg, @serenez)
  - SQL Server 结构变更 — 使用 GO 正确划分结构修改批次，避免一个批次失败导致后续独立变更无法执行。(contributed by @serenez) (closes #3408)
  - 数据网格交互 — 恢复转置后的滚动位置，避免一次粘贴触发重复处理，并稳定保存原始筛选状态。
  - 界面与无障碍 — 统一表属性编辑图标、优化右键菜单圆角和长选项截断，更新 Redis 复制图标及无障碍标签，并修正日语列名复制和行数文案。(contributed by @gggaiitx, @eryajf, @zipg) (closes #3473) (closes #3580)
  - AI 与导入界面 — 保持流式回答字体大小一致、稳定消息悬浮布局，并确保 SQL 导入对话框操作按钮始终可见。
  - 部署文档 — 新增 1Panel 部署指南、文档导航入口和 Docker Hub 镜像说明，改善自托管安装体验。
  修复
  - MongoDB 文档编辑 — 保留 ObjectId、数字和显式字符串 _id 的 BSON 类型，修复界面提交成功但文档未实际更新的问题；无匹配文档时现在会明确报错。(contributed by @serenez, @jthanh8144) (closes #3566)
  - MongoDB 日期复制 — 从集合数据复制 INSERT 命令时保留 BSON 日期类型和格式，避免日期退化为普通字符串。(contributed by @zipg)
  - SQL 格式化 — 使用 ClickHouse 方言保留 lambda 箭头，支持 ${} 与 #{} 占位符，并避免不完整的 EXPLAIN 选项错误切分 CTE 语句范围。(contributed by @serenez) (closes #3573) (closes #3571) (closes #3567)
  - 查询结果可编辑性 — 多结果集改为按各自语句判断可编辑性，并按数据库方言的大小写规则匹配主键，避免生成错误更新条件。(contributed by @zipg) (closes #3503)
  - 批量查询执行 — 修复“遇错继续”设置未被完整执行链路遵守的问题，并协调打开页签时的持久化定时器，减少状态覆盖。
  - Oracle 兼容模式 — 清除 Oracle、达梦和 OceanBase Oracle 查询模式时正确关闭结果游标及会话，并等待重置完成后再执行后续查询。(contributed by @zipg)
  - Oracle 与 OceanBase 行标识 — OceanBase Oracle 无主键表使用 ROWID 支持编辑，同时在 Oracle 表导出中排除内部合成的 ROWID 列。
  - Kingbase 兼容性 — PostgreSQL 目录模式优先解析所选业务 Schema；过滤不可连接数据库，并保留 SQL Server 兼容模式的自增元数据和字段注释。(contributed by @zipg)
  - Cnch 连接初始化 — 兼容 Cnch/ClickHouse MySQL 协议在连接初始化阶段的响应差异。(contributed by @zipg)
  - MySQL 数据编辑与监控 — 允许 BEFORE INSERT 触发器填充未提供的必填字段，并保留监控面板中的小数速率。(contributed by @zipg, @LwClick) (closes #3360)
  - Elasticsearch 数字精度 — 文档编辑和 JSON 数据处理不再通过 JavaScript Number 损失大整数或高精度数值。
  - 虚谷、达梦与 IRIS — 虚谷数据库生成原生字段类型修改 SQL；达梦执行计划正确返回结果行；IRIS 计数查询不再附加无效排序。
  - 数据库名称与侧边栏过滤 — 保留数据库名称的前导空格，并在侧边栏初始化时立即加载可见数据库和 Schema 过滤配置。(contributed by @zipg) (closes #3485)
  - SSH 隧道别名 — 修复隧道维护界面无法选择 SSH config 主机别名的问题。(contributed by @zipg)
  - Agent 连接恢复 — 数据库服务暂时不可用导致首次连接失败后，清理无有效会话的共享 runtime，使 Oracle、Kingbase 等数据库恢复后无需重启 DBX 即可重新连接。(contributed by @zipg)
  - MCP Runtime 一致性 — 安装、检测和启动 MCP Server 始终使用同一套 DBX 管理的 Node/npm runtime，并修复 MongoDB MCP 连接目标解析。(contributed by @CN-Scars)
  - 查询会话重置 — 正确传播 Schema 重置时关闭游标或会话产生的错误，避免静默继续使用旧会话。(contributed by @zipg)
