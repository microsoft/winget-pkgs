ReleaseNotes: |-
  新功能
  - MySQL 服务器监控 — 新增 MySQL/MariaDB 服务器指标仪表盘和进程列表，可查看连接、查询、流量等运行状态，并终止指定会话。(contributed by @antwa)
  - 查询结果来源范围 — 多语句执行结果现在显示对应的 SQL 源码范围，点击即可定位原语句，并正确保留选区和注释列位置。(contributed by @eryajf) (closes #3316)
  - DuckDB 远程目录 — DuckDB 连接支持初始化脚本，可浏览通过 ATTACH 挂载的远程 Catalog 和数据库。(contributed by @jing2uo) (closes #661, #2481)
  - 数据网格筛选 — 列筛选新增列表和范围模式，可更直观地筛选枚举值、数字、日期等数据。(contributed by @onenewcode) (closes #3266)
  - 单元格详情面板 — 改进长文本、JSON、图片及二进制数据的详情展示，提升复杂内容的阅读和操作体验。(contributed by @zipg) (closes #3288)
  - 文本导入编码 — CSV、TSV 和自定义分隔文本支持自动检测、UTF-8、GBK/GB18030、UTF-16 LE/BE；预览与正式导入复用相同编码，并通过流式转码支持大文件。(contributed by @zipg) (closes #3281)
  - 流式 TXT 导出 — 数据网格新增 TXT 格式导出，并通过后端流式处理降低大结果集的内存占用。(contributed by @Abeautifulsnow)
  - DDL 快速复制 — 表结构 DDL 页面新增复制按钮，可一键复制完整建表语句。(contributed by @antwa)
  - 编辑器快捷建表查询 — 从当前表创建新查询时自动填入 SELECT * FROM ...，新建查询页签后直接聚焦编辑器。(contributed by @Abeautifulsnow, @gggaiitx)
  - SSH 隧道测试 — SSH 隧道配置支持在保存前独立测试连接，便于排查认证、代理和网络问题。(contributed by @rainhan99)
  - 网格列宽密度 — 新增紧凑、标准、宽松三种列宽密度，并优化表格滚动和侧边栏响应速度。(contributed by @gggaiitx, @juvevood)
  - 达梦字符长度单位 — 表结构编辑支持保留 CHAR、VARCHAR 等字符类型的 BYTE/CHAR 长度单位。(contributed by @onenewcode) (closes #3318)
  改进
  - 查询超时时间 — 提高新建连接的默认查询超时时间，行数统计等辅助查询也会继承连接超时配置，减少大表操作过早中断。
  - SQL 自动补全 — 补充 Oracle 关键字与 MySQL 日期函数，并修复选择 Schema 后不继续提示表名的问题。(contributed by @zipg) (closes #3284)
  - 数据复制 — 即使主键列被隐藏，也可生成包含主键的 INSERT；MongoDB 复制 JSON 或 INSERT 时保留原始 BSON 类型和上下文。(contributed by @eryajf, @zipg) (closes #3265)
  - 表结构安全 — 关闭或切换未保存的表结构编辑器时增加确认，生成 DDL 时补充表注释。(contributed by @gggaiitx)
  - 导入与导出 — Web 端表数据上传改为流式处理；CSV 导出保留数据库 NULL 语义；Excel 导入正确识别 A1 之外单元格的日期样式。(contributed by @eryajf, @zipg) (closes #3263, #3276)
  - Schema 树性能 — 降低大型 Schema 树的内存占用，表名使用全部可用宽度，并保持分区表分页位于 Schema 根节点。(contributed by @onceMisery, @eryajf) (closes #2996)
  - Agent 运行时 — 多个数据库连接共享 Agent 运行时，离线安装包可正确导入内置 JRE，减少重复进程和离线启动失败。(contributed by @zipg)
  - Linux 安装渠道 — 文档新增星火应用商店和 AmberPM 安装方式。(contributed by @shenmo7192)
  修复
  - SQL Server 连接 — 显式端口不再被命名实例解析覆盖，并恢复新版 JRE 连接旧版 SQL Server 所需的 TLS RSA 密码套件。(contributed by @zipg)
  - Oracle 数据编辑 — 支持删除无主键可编辑查询中的记录，并修复 DDL 查看器中行注释导致的错误高亮。(contributed by @zipg)
  - MongoDB 数据类型 — JSON 外观的字符串编辑后不再被转换为对象；旧版 MongoDB 集合计数使用兼容接口，避免分页和统计异常。(contributed by @zipg, @CN-Scars) (closes #3310)
  - 达梦元数据 — 串行执行存在驱动锁限制的元数据查询，避免同时查看字段和 DDL 时发生并行锁错误。(contributed by @zipg) (closes #2270)
  - Kingbase MySQL 模式 — 正确引用 MySQL 兼容模式下的标识符，修复查看表数据时报错的问题。(contributed by @zipg) (closes #3249)
  - Doris 外部 Catalog — 查询外部 Catalog 表时生成完整的 catalog.database.table 限定名称。(contributed by @jischeng)
  - PostgreSQL 存储过程 — 无法获取标准 routine 签名时使用兼容回退逻辑，避免过程列表或源码加载失败。
  - Nacos 服务实例 — 禁用实例后保留在实例列表中，不再被误判为已删除。(contributed by @zipg) (closes #3259)
  - ZooKeeper 空节点 — 正确处理不包含数据的 znode，避免浏览节点时出错。
  - Turso 数据库筛选 — 隐藏不适用于 Turso 的可见数据库筛选配置。
  - BLOB 下载菜单 — 修复悬浮或滚动后下载菜单定位错误的问题。(contributed by @zipg)
  - Spark 连接图标 — 新建连接对话框正确显示 Spark 数据库图标。(contributed by @jischeng)
  - MCP SQL 执行 — 执行 SQL 时保留字符串字面量内容，避免格式处理改变实际查询语义。
  - 隧道配置恢复 — 从设置页返回连接编辑器后，已选择的 SSH 隧道配置不再丢失。
  - 导入弹窗布局 — 小尺寸窗口中保持表数据导入操作按钮可见。(contributed by @zipg) (closes #3267)
  - 网格视觉一致性 — 修复表头未使用区域的背景色，并改善滚动时的布局稳定性。
