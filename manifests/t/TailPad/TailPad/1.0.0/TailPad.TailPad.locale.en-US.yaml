ShortDescription: Multi-pane log viewer with live tail, FTP/SFTP support, multi-keyword search & grep, diff, and syntax highlighting. Built for devs and sysadmins who work with logs daily.
Description: |-
  TailPad is a desktop log viewer for Windows built for developers and system administrators.
  It supports multiple side-by-side panels, live file tailing with log rotation detection,
  FTP and SFTP remote file access, multi-keyword search and grep with per-keyword color highlighting,
  side-by-side diff comparison, and syntax highlighting.
  Files can be opened via drag and drop, the file picker, or directly from Windows Explorer.
