  新增
  - 使用 -m 选项来删除源文件当转换成功完成

  其它
  - 从此版本开始，Release 包将不再提供静态链接版本（除 Windows 外），taglib 将链接到系统库
  macOS 使用 HomeBrew 安装
  brew install taglib
  或者，直接安装 ncmdump，所需依赖会自动安装
  brew install ncmdump
  Linux 则依赖于发行版软件仓库支持，否则请参照官方文档编译安装
  # Ubuntu >= 25.04 || Debian >=13
  sudo apt install libtag2
  # Arch
  sudo pacman -S taglib
  taglib: 2.x
