# winget installer manifest — portable exe delivered inside a zip so the installed command is
# `celeborn` (winget derives a portable command name from the archived file, so the exe is named
# celeborn.exe inside celeborn-windows-x86_64.zip). Paste the ZIP asset's sha256 into InstallerSha256.
# NOTE: the .exe is UNSIGNED (no Authenticode cert wired) — winget/SmartScreen may flag it.
PackageIdentifier: ThotTechnologies.Celeborn
PackageVersion: 0.1.0
InstallerType: zip
NestedInstallerType: portable
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/cloud-dancer-labs/celeborn/releases/download/v0.1.0/celeborn-windows-x86_64.zip
    InstallerSha256: 68258EEE9110D8BF8052ACA4C40FFC6C82E90B0A8FB716A33CABC72D8CB53D22
    NestedInstallerFiles:
      - RelativeFilePath: celeborn.exe
        PortableCommandAlias: celeborn
ManifestType: installer
ManifestVersion: 1.6.0
