ShortDescription: Analyze fire control and smoke dissipation in various structures for fire protection and safety or investigation.
Description: |-
  PyroSim was designed to complement the Fire Dynamics Simulator (FDS) developed by NIST in the US. With state-of-the-art fire research facilities and personnel, they understand the calculations of fire simulation better than anyone.
  FDS is the engine powering fire simulations all over the world. PyroSim empowers more engineers to use this technology and elevates its capabilities.
  1. PyroSim provides graphical tools which automatically generate the text-only FDS input file.
  2. PyroSim imports CAD, enables advanced simulation management, and packages its own results manager.
  None of this is possible without FDS empowering car park jet fan simulations, sprinkler activation studies, and more.
  FDS is free for anyone to download. Do you need PyroSim? We think so. Consider the time not spent constructing your building geometry from scratch in a text editor. Consider the errors caught in real-time and brought to your attention.
  Thunderhead Engineering supports you every step of the way. Whether you want in-depth training or self-taught materials, you can learn performance-based design modeling with greater efficiency and proficiency. We design our software for anyone to learn, and our customers are delighted when our support team helps them succeed.
ReleaseNotes: |-
  This release of PyroSim has some powerful new features and improvements to existing capabilities. Download the new version to work more efficiently with CAD geometry and Mesh Refinement Zones!
  CAD Quality Adjustment
  For many years, PyroSim has supported importing CAD geometry. However, users do not always have access to concise models with relevant geometry. Often, there are many CAD objects that complicate and slow down PyroSim.
  PyroSim 2026.2 delivers CAD adjustment features that enable more efficient modeling workflows:
  - On import, you can specify Object Quality (See the Creating Geometry from CAD page). This reduces the number of triangles used to represent imported geometry.
  - After import, you can perform a similar operation upon any selected imported geometry. The new context-menu action allows users to Simplify Imported Geometry.

    Figure 1. Simplifying Imported Geometry
  - Best of all, you can set imported geometry to be ignored in an FDS simulation.

    Figure 2. Display Only
    Use this action to set an object in the model to Display Only and it will not be used in the FDS simulation. Generic Geometry is not converted to OBST or GEOM entries, but are available in Results (when PyroSim Geometry is active).
  Mesh Refinement Zone Enhancements
  PyroSim 2026.2 enhances the Mesh Refinement Zones workflow.
  - This update adds a filter to preview the meshes resulting from refinement zones in the Model View, called Show Mesh Refinement Preview. This adds two new filters to the Mesh filter toolbar.

    Figure 3. Using Show Mesh Refinement Preview
  - Expanded support for nested Mesh Refinement Zones makes them easier to use on building models with floor geometry.

    Figure 4. Nested Mesh Refinement Zones
  - Also, Meshes in the Object Tree now display the optimal level of information about effects of mesh refinement.

    Figure 5. Nested Mesh Refinement Zones with tree info
    When put all together, these changes make it easier to complete your individual workflow and work efficiently with Meshes in PyroSim 2026.2.
  Complete the updated example to experience these changes.
  Control Value Devices
  Users can now cleanly use math controls as inputs to other activation control logic, a long sought after feature.

  Figure 6. Editing Activation Controls
  - Now, Math Control output values can be written to a CSV file and also may be used as numeric inputs for other Mathematical and Custom Controls.
  - This will also help users work with Statistics Devices.
  HVAC 3D Modeling with Waypoints
  Prior to this release, HVAC Waypoints did not have a graphical representation (they were only supported as text entries in a table). Now, Waypoints and the duct paths are visible in the Model View.

  Figure 7. HVAC Waypoints in 2D Top View
  Door Activation Changes
  Behind the scenes changes to controlled activation of openings in PyroSim allow users to more seamlessly build models with doors opening during the simulation.

  Figure 8. Models with holes controlled by Activation work more seamlessly
  (Door closing controls still suffer from the initial state bug.)
  Results Integration with Pathfinder
  Results handling has improved the compatibility of PyroSim (FDS) results with Pathfinder in Results. Read more about the changes to Results in the Results Documentation.
