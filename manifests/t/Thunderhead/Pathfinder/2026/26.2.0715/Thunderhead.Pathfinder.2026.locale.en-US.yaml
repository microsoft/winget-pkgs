ShortDescription: Simulate pedestrian evacuation and general crowd movement in stadiums, hospitals, skyscrapers, public transit, and more.
Description: |-
  Pathfinder delivers agent-based simulation through an intuitive interface to output clear and detailed results.
  Each occupant in a Pathfinder model is aware of their surroundings and constantly recalculates their next step based on present information. These decisions are informed by academic research and validation testing. This process allows the Pathfinder simulation engine to model realistic human behavior.
  1. Thunderhead Engineering partners with leading researchers and hosts premier events to promote further development of pedestrian movement understanding.
  2. We validate and publish our own tests of Pathfinder against research data to ensure our tool can be trusted.
  Pathfinder scales to the size and complexity of your project. Simple experiments can be setup in minutes. Pathfinder also pushes past the limits of other tools with Monte Carlo sensitivity analysis, smoke contaminant exposure, social distance modeling, and more.
  Thunderhead Engineering supports you every step of the way. Whether you want in-depth training or self-taught materials, you can learn performance-based design modeling with greater efficiency and proficiency. We design our software for anyone to learn, and our customers are delighted when our support team helps them succeed.
ReleaseNotes: |-
  Section Boxes
  Section Boxes make it easier to focus on specific areas of a model by letting you define a 3D region of interest within a view. Instead of working with an entire building or floor, you can isolate the spaces, rooms, or circulation paths that matter for the task at hand, making complex models easier to navigate and review.

  Figure 1. Section Boxes
  This improves day-to-day workflows when setting up, inspecting, and validating Pathfinder models. By reducing visual clutter, section boxes help users quickly identify modeling issues, verify occupant paths, and examine key areas in greater detail without changing the underlying model or creating additional views.
  Imported CAD Simplification
  Many CAD models contain far more geometric detail than is necessary for evacuation analysis. Small architectural features and highly tessellated surfaces can increase model size, slow editing, and in some cases introduce geometry issues that require additional cleanup. The new CAD geometry simplification options available in Pathfinder 2026.2 reduce geometric complexity during import by automatically simplifying meshes to a user-defined tolerance.

  Figure 2. Simplify Imported CAD Geometry
  By preserving the overall shape of the model while reducing the number of triangles, this feature helps improve performance when working with large or highly detailed projects. Users can spend less time preparing imported geometry, navigate complex models more smoothly, and reduce the likelihood of modeling issues caused by overly detailed architectural content.
  Results Measurement Regions
  Measurement Regions are now created and managed directly in Results instead of Pathfinder. Previously, regions had to be defined before running a simulation, requiring the model to be re-run whenever a region needed to be added, removed, or adjusted. With this update, users can define and modify measurement regions during post-processing, making it much faster to explore different areas of interest without repeating simulations.

  Figure 3. A Measurement Region shown in Results
  This change streamlines result analysis by separating measurement setup from simulation execution, allowing users to iterate more quickly as project questions evolve. Existing models that contain Measurement Regions remain fully supported, and region data continues to be written to the same output files, ensuring compatibility with established workflows and any downstream tools that rely on this data.
  Maximum Elevator Wait Time
  Occupants can now be assigned a Maximum Elevator Wait Time in their Occupant Profile. If an elevator does not arrive within the specified time, occupants will stop waiting and continue using an alternate available route, such as a stair.
  This enhancement makes it easier to model realistic occupant decision-making in scenarios where elevator service is delayed or limited. By accounting for occupants who abandon long elevator waits, simulations can better represent evacuation behavior in buildings where multiple egress options are available, leading to more realistic movement patterns and evacuation time predictions.
