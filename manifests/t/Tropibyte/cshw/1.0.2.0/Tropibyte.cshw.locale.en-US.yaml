ShortDescription: A csh-style shell for Windows. Native Win32, real concurrency, plugin DLLs in C/C++, built-in AI. One ~14 MB binary, no runtime.
Description: |-
  cshw is a native Windows command shell with csh/tcsh-flavored syntax. Familiar Unix
  shell ergonomics meet first-class Win32 access -- no WSL, no Cygwin, no compatibility
  layer. 110+ builtin commands cover file ops, text processing (grep, sed, awk, sort
  with -t/-k, head/tail with -f), real concurrency primitives (coroutines, mutex,
  semaphore, barrier, channel), Win32 calls (rundllproc, winapi, dllimport), and
  built-in AI (OpenAI, Anthropic, Azure, Ollama, LM Studio). Runs your existing .bat,
  .cmd, and .ps1 scripts unchanged. Ships with a 20-chapter user guide.
