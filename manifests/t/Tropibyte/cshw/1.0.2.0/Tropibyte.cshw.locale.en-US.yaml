ReleaseNotes: |-
  v1.0.2-alpha adds full in-line cursor editing (left/right arrows, Home/End,
  Delete, mid-line backspace) and an Insert key toggle for overwrite mode. UP/DOWN
  history now matches bash/zsh behavior: walking past the most-recent entry with
  DOWN restores any text you'd started typing before the first UP.

  Earlier in the 1.0.x line: the `bugreport` command opens a pre-filled mail
  composer to bugs@tropibyte.com (v1.0.1), and a stale Visual-Studio-generated
  symbol that was making `version` always report "1.0.0" was fixed (v1.0.1).
