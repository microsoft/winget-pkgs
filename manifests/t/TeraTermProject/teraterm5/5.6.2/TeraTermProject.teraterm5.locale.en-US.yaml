ReleaseNotes: |-
  Tera Term (Ver 5.6.2), TTSSH (Ver 3.6.2)
  主な変更点
  - 受信した SSH2 パケットの長さを正しくチェックせずに処理する脆弱性を修正した。 (issue #1417, TTSSH2 のメモリ境界外アクセスの脆弱性)
  - XMODEMを使用したファイル送信中にCancelボタンを押下しても、受信側のXMODEMが停止しない不具合を修正した。 (issue #1408)
  - USB CDC-ACM を使用した高速なシリアル接続時に ZMODEM によるファイル受信が失敗する不具合を修正した。 (issue #1299)
  すべての変更については、変更履歴を確認してください。
  https://teratermproject.github.io/manual/5/ja/about/history.html#teraterm_5.6.2
  Major changes
  - Fixed a vulnerability where received SSH2 packet lengths were processed without proper validation. (issue #1417, TTSSH2 has out-of-bounds access vulnerability)
  - Fixed an issue where XMODEM transfers from the local host to a remote system did not stop on the receiver side when the Cancel button was pressed during file transmission. (issue #1408)
  - Fixed an issue where file reception via ZMODEM failed during high-speed serial communication using USB CDC-ACM. This bug was introduced in 5.5.1. (issue #1299)
  To check all changes, see the changelog.
  https://teratermproject.github.io/manual/5/en/about/history.html#teraterm_5.6.2
