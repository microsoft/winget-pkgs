ShortDescription: Free, open source, git-native API client. A local-first Postman alternative with a built-in MCP server.
Description: Tiger is an open source API client where every request is a plain text .tiger file stored in Git, so teams review API changes in pull requests. It works fully offline with no account, supports REST, SOAP and GraphQL, OAuth 2.0, client certificates, proxies, request chaining, pre/post-request scripts with assertions, environments with secrets, a collection runner and a performance runner, and imports Postman, Insomnia, Bruno, OpenAPI and curl. It also ships a Model Context Protocol (MCP) server so AI assistants can run requests from a collection.
