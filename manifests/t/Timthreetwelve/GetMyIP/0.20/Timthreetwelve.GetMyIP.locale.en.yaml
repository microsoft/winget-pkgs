ShortDescription: Shows IP address and geolocation information that is freely available from a user-selectable list of providers. Be advised that Get My IP cannot change the IP or Geolocation information returned from the provider.
Description: |-
  Shows IP address and geolocation information that is freely available from a user-selectable list of providers. Be advised that Get My IP cannot change the IP or Geolocation information returned from the provider.

  Also note that the «External (Public) IP Information» section only shows either the IPv4 or IPv6 address at a time. Switching which one is shown, requires changing «Settings» → «Application Settings» → «External IP information provider» back and forth.
