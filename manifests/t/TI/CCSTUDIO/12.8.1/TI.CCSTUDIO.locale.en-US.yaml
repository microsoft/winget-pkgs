InstallationNotes: |

  Adding extra arguments to the install can be done by using `--custom <arguments>` after `winget install TI.CCSSTUDIO` command.

  To only install specific tools for product families use the following arguments

      --enable-components <comma seperated list of components>

    NOTE
    See full list of components here https://software-dl.ti.com/ccs/esd/documents/ccs_installer-cli.html#-a-id-productfamilies-a-installable-product-families-br-

    NOTE
    All components are installed by default

    EXAMPLE
    To only install the components for the Hercules™ Safety MCUs and the C2000 real-time MCUs you would add the following

      --enable-components PF_HERCULES,PF_CC2X

  To install debug probe drivers add the following

    --install-BlackHawk true  # For Blackhawk debuggers

    --install-Segger true     # For Segger J-Link debug probes

  Full Example

    winget install TI.CCSSTUDIO --custom "--enable-components PF_HERCULES,PF_CC2X --install-BlackHawk true"

