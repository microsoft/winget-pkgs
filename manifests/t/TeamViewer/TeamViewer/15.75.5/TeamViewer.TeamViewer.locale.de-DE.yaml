ReleaseNotes: |-
  New Features
  - Erleben Sie das brandneue TeamViewer Remote!

  Improvements
  - Geben Sie uns gerne Feedback zu den neuesten und zukünftigen Verbesserungen der Benutzeroberfläche: An Umfrage teilnehmen

  Bugfixes
  - Behebung eines Fehlers, der dazu geführt hat, dass das Profilbild im Dialog nicht angezeigt wurde, wenn eine Bestätigung der Verbindung zu einem verwalteten Gerät erforderlich war.
  - Behebung eines Fehlers, der dazu geführt hat, dass die Zwischenablage manchmal nicht oder nur mit Verzögerung synchronisiert wurde.
  - Behebung eines Fehlers, der auftrat, wenn man über die Toolbar den entfernten Computer neustarten wollte, auf dem ein QuickSupport-Modul ohne Admin-Rechte installiert ist.
  - Es wurde ein Fehler behoben, der Benutzer daran hinderte, nach Abschluss einer kostenlosen Remote Session Feedback zu senden.
