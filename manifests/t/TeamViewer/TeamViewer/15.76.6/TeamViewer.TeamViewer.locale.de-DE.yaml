ReleaseNotes: |-
  New Features

  Improvements
  - Für Geräte, die sowohl im modernen (MDv2) als auch im klassischen (MDv1) System vorhanden sind, können Richtlinienänderungen ausschließlich am verwalteten Geräteeintrag im modernen (MDv2) System vorgenommen werden, um ein konsistentes Verhalten bei der Richtlinienzuweisung auf den verwalteten MDv2‑Geräten sicherzustellen.

  Bugfixes
  - Die Option „Einfacher Zugriff“ bleibt nun auch dann sichtbar und aktiviert, wenn kein Gerät ausgewählt ist.
  - Der Datumsbereichsfilter auf der Verbindungsprotokoll-Seite bleibt nun auch nach einem Neuladen der Seite erhalten.
  - Ein Problem wurde behoben, bei dem der Gerätestatus zwischen der Geräteliste und den globalen Suchergebnissen inkonsistent angezeigt wurde.
  - Ein Problem wurde behoben, bei dem der Join‑Button für den Supporter nicht reagierte, wenn der Endnutzer bereits eine Remote-Session gestartet hatte.
