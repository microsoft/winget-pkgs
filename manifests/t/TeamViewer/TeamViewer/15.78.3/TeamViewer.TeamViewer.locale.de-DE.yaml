ReleaseNotes: |-
  New Features
  - Es ist jetzt möglich, eine Service-Anfrage direkt von der Geräteseite in TeamViewer Remote zuzuweisen.
  - Die Ansicht zum Erstellen von Conditional Access-Regeln wurde optimiert und ist jetzt als Vollseitenansicht verfügbar. Unternehmensbasierte Conditional Access-Regeln (jetzt als interne Regeln bezeichnet) können auf einer einzigen Seite statt in mehreren Schritten erstellt werden.
  - Die Berechtigungen auf Feature-Ebene in Conditional Access wurden erweitert und umfassen nun: Chat, Virtuelle Monitore, verwaltenPort-Weiterleitung
  - Multitenancy mit Conditional Access ist jetzt verfügbar und ermöglicht Organisationen, Datenquellen über mehrere Unternehmen hinweg innerhalb eines einzigen Frameworks zu verwalten und sicher zu verbinden. Organisationen mit Zugriff auf sowohl Conditional Access als auch Multitenancy können Datenquellen über mehrere Einheiten hinweg steuern und Conditional Access-Regeln für externe Partner oder Tochterunternehmen erstellen.
  - Supporter erhalten nun automatisch eine zugewiesene virtuelle IP-Adresse für das Tunneling während des agentenlosen Zugriffs. Dadurch wird ein sicherer Zugriff ermöglicht, der auf den konfigurierten Port vom Gerät des Supporters beschränkt ist.
  - Es ist nun möglich, für alle ausgehenden Session-Zusammenfassungen zu konfigurieren, ob der Supporter und/oder der Remote-User die Protokollierung beenden können.
  - Die Schaltfläche „Dashboard“ wurde aus den Quick Actions in der In-Session-Toolbar entfernt. Die Funktionalität bleibt weiterhin über das Menü „Dateien & Extras“ verfügbar.
  - In TeamViewer Remote werden jetzt In‑App‑Benachrichtigungen angezeigt, wenn eine Service-Anfrage erstellt oder zugewiesen wird und wenn ein Endbenutzer mit einer aktiven Service-Anfrage online geht. Dies ermöglicht eine schnellere und reaktionsfähigere Bearbeitung von Service-Anfragen.

  Improvements
  - Mit TeamViewer Remote kann nun direkt auf der Geräteseite eine Verbindung zu einer Sitzung über die Windows-Authentifizierung hergestellt werden.
  - Es ist jetzt möglich, eine Sitzung direkt von der Geräteseite in TeamViewer Remote zu schließen.
  - Der UI-Schalter im Classic-Client ist jetzt für Admins mit Tensor-Lizenz sichtbar, um die frühzeitige Erkundung und das Onboarding der TeamViewer Remote Oberfläche zu ermöglichen.
  - Automatisch erstellte benutzerdefinierte Module und Rollout-Setup-Konfigurationen werden jetzt im Client herausgefiltert, wodurch die Benutzeroberfläche übersichtlicher bleibt und potenzielle Leistungseinbußen vermieden werden.
  - Die Gestaltung der Tooltips in der Benutzeroberfläche für die Port-Weiterleitung ist jetzt in allen Bereichen einheitlich und am Gesamtdesign von TeamViewer ausgerichtet.
  - Die Seite zur Geräteverwaltung in den Einstellungen wurde überarbeitet, um einen klareren Überblick über die Geräteberechtigungen zu bieten. Bei verwalteten Geräten eines Unternehmens werden interne Teammitglieder jetzt unter „Firma“ gruppiert, während externe User separat mit ihren jeweiligen Berechtigungen angezeigt werden.
  - Die Aktualisierung des Clients über Änderungen an Geräten und Gerätegruppen wurde verbessert.

  Bugfixes
  - Es wurde ein Problem behoben, bei dem das Starten einer Verbindung über einen Kontakt in der neuen Oberfläche nicht funktionierte. Verbindungen werden jetzt wie erwartet zuverlässig gestartet.
  - Ein Absturz wurde behoben, der nach einem Seitenwechsel während einer Remote Control‑Session beim Senden einer Chatnachricht innerhalb der Session auftreten konnte.
  - Es wurde ein Fehler behoben, durch den der Download von Session Insights-Daten im Client fehlschlug und stattdessen zum Web Client umgeleitet wurde.
