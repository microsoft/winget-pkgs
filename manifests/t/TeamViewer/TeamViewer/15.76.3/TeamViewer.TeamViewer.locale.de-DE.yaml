ReleaseNotes: |-
  New Features
  - User können jetzt KI-generierte Sitzungszusammenfassungen so konfigurieren, dass Daten nur protokolliert werden, wenn der Supporter die Zusammenfassung während der Sitzung auslöst. In diesem Modus können sowohl der Supporter als auch der Remote-User die Datenerfassung jederzeit beenden.

  Improvements
  - Das MSI-Paket installiert jetzt standardmäßig die neue Benutzeroberfläche sowohl für den vollständigen Client als auch für den Host. Ein neuer MSI-Befehlszeilenparameter ist verfügbar, um die klassische Benutzeroberfläche zu erzwingen.
  - TeamViewer Client-Module stehen jetzt standardmäßig als 64‑Bit-Versionen zum Download bereit. Für Systeme, die 64‑Bit nicht unterstützen, erfolgt der Download automatisch als 32‑Bit‑Version.
  - Unternehmensadministrator:innen mit TeamViewer Tensor können jetzt die neue Benutzeroberfläche für ausgewählte User-Gruppen aktivieren.
  - Eine neue TeamViewer Richtlinie wurde eingeführt, um die Nutzung des Verbindungsprotokolls TLS 1.3 durchzusetzen.
  - Es wurde ein Fehler behoben, der verhinderte, dass die TeamViewer-Anwendung von einem Nicht-Administrator-Konto als Administrator ausgeführt werden konnte.
  - Verbesserte Fehlerbehandlung bei fehlgeschlagenen Richtlinienzuweisungen auf Geräten. User erhalten nun ein klareres Feedback, wenn eine Richtlinie nicht angewendet werden kann.

  Bugfixes
  - Es wurde ein Fehler behoben, durch den das Profilbild im Bestätigungsdialog beim Herstellen einer Verbindung zu einem verwalteten Gerät nicht angezeigt wurde.
  - Ein Fehler wurde behoben, durch den Geräte in der Basisansicht doppelt angezeigt wurden.
