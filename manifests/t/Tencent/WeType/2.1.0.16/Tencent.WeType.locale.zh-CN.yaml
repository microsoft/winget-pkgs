ReleaseNotes: |-
  长按「右 Alt」试试语音输入，说完就能直接发
  - 自动去掉 "嗯、啊、那个" 等口水词
  - 智能加标点、分段落，省去手动排版
  - 长内容自动归纳分点，条理更清晰
  - 语序不通顺的地方，帮你理顺表达
  - 重复啰嗦的内容，自动精简合并
ReleaseNotesUrl: https://z.weixin.qq.com/web/change-log/153
InstallationNotes: |-
  请尽量使用输入法自带的更新功能。如果必须使用 WinGet 来更新，请运行：
      winget install Tencent.WeType --interactive --force
  或者
      winget install Tencent.WeType -i --force
  不指定 -i 或 --interactive 会导致更新需要重启系统后才能生效。
