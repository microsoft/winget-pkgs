ShortDescription: Work efficiently anytime, anywhere with Qclaw—just send a WeChat message.
Description: |-
  Work efficiently anytime, anywhere with a quick WeChat message—Qclaw has you covered.
  [Ready Out of the Box] Automatic deployment, ready to use upon launch. Supports Mac & Windows, comes with premium domestic large language models, and allows switching to custom models.
  [Direct WeChat Integration] Chat directly via WeChat for remote control: seamlessly linked to WeChat with zero configuration, enabling AI to work for you remotely anytime, anywhere.
  [Rich Ecosystem] Extensive Skills ecosystem: access the Skills marketplace, including ClawHub, GitHub, and more—use Skills on demand.
  [Understands Your Intent] Persistent memory, your personal Lobster: remembers your preferences and context, continuously learning to become an AI that understands you better over time.
  [Efficient Control] Local deployment for greater office productivity: directly operate files, browsers, and emails—not just chat.
