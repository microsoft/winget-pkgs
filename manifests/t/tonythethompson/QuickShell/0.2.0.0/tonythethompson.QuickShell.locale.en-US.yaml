ShortDescription: Open saved terminal directories and run commands from PowerToys Command Palette
Description: |
  Quick Shell is a PowerToys Command Palette extension that lets you save
  favorite project directories and launch them in Windows Terminal, PowerShell,
  PowerShell 7, or cmd — optionally running a command on open.

  After installing, open PowerToys Command Palette and run "Reload Command Palette Extension".
  For full Command Palette integration, MSIX install via scripts/deploy.ps1 is recommended.
Tags:
- command-palette
- commandline
- powershell
- quickshell
- terminal
- windows-commandpalette-extension
- windows-terminal
ReleaseNotes: |
  - Discover local git repositories and add them as workspaces
  - Workspaces with unified create/edit form, import, and export
  - Optional companion app and dev-server command on open
  - Terminal launch fixes for WSL/Ubuntu, Nushell, and Intelligent Terminal
  - Default terminal and profile settings now persist correctly
  - PowerToys Run plugin bundled in the installer
  - Refreshed logo, terminal profile icons, and home display settings
