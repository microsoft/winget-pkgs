ReleaseNotes: |-
  Install skiagram 0.1.1

  Install prebuilt binaries via shell script
  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/TanvirAnjumApurbo/skiagram/releases/download/v0.1.1/skiagram-installer.sh | sh

  Install prebuilt binaries via powershell script
  powershell -ExecutionPolicy Bypass -c "irm https://github.com/TanvirAnjumApurbo/skiagram/releases/download/v0.1.1/skiagram-installer.ps1 | iex"

  Install prebuilt binaries via Homebrew
  brew install TanvirAnjumApurbo/tap/skiagram

  Install prebuilt binaries into your npm project
  npm install skiagram@0.1.1

