ShortDescription: A local-first CLI and TUI that profiles where your AI coding agent's tokens went.
Description: skiagram is a local-first, single-binary Rust CLI and TUI that profiles where your AI coding agent's tokens actually went across Claude Code, Codex, Gemini CLI, and Copilot CLI, and why your context window is full. It deduplicates on-disk token counts, attributes thinking tokens, prices cache reads and cache creation separately, and offers drill-down views plus a flamegraph export. Nothing ever leaves your machine.
