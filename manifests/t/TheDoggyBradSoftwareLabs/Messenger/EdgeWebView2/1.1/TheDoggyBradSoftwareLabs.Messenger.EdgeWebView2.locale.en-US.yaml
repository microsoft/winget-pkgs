ReleaseNotes: |-
  ## Version Information

  Installer Version: 1.0
  Public Release Version: 1.0 (R2)
  Internal Codename Version: 1.1

  ## What changed?

  The application now detects if the domain is not messenger.com. If not, it will open an external
  browser.

  ## Known Issue

  If you login for the first time and Facebook thinks the login is suspicious, it will open
  facebook.com on an external browser. Confirm it there and attempt to relogin again using this app.
  This does not exist on v1.0 (R1) but it has the issue that external URLs open in the app.

  ## Introduction

  This application just uses messenger.com, running on EdgeWebView2.

  More:

  This application is created using Visual Studio 2026 under VB.NET.

  I created this application, because Facebook Messenger pulled out their "real" windows app. But,
  they rereleased a PWA one in the Microsoft Store. I recreated that PWA version into an actual webapp
  using EdgeWebView2.

  You may do whatever you want on this app or even on its source code under MIT License.

  Note: This application is unsigned and will not be maintained. But since, this is just an
  EdgeWebView2 application, just update your EdgeWebView2 for this app to be updated.
