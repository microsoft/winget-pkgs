ReleaseNotes: |-
  [1.6.1] - 2026-07-14

  Added
  - Weekly and monthly report cards on macOS and Windows, with tokens, API-value estimates, provider split, activity history, model breakdown, and island rank.
  - Codex reset cards and resilient usage refreshes with retry and last-known-data fallback.

  Changed
  - Codex now follows the single weekly quota returned by its API; Claude remains on 5-hour and weekly windows.
  - Model pricing data was refreshed on 2026-07-13.

  Removed
  - Auto-resume on both platforms and the obsolete Codex 5-hour quota alarm.

  Fixed
  - Lower idle CPU and more efficient session scans on Windows.
  - More reliable background quota tracking and fresh report windows on macOS.
