ReleaseNotes: |-
  [1.7.1] - 2026-07-16

  Added
  - Glow color choice for the ambient glow: Teal (the new default), Cobalt, Violet, Silver. Visual effects are now a two-mode choice: Vivid (glow + orbit sweep) or Calm (no ambient light).
  - Update prompt: the app checks the newest GitHub release at launch and every six hours; Windows keeps its in-app download-and-relaunch flow.

  Changed
  - Report cards v3 on both platforms: flat near-black base, a Claude-vs-Codex faction duel riding the true usage split, TOP-3 (weekly) / TOP-5 (monthly) model pies, and a rank footer with the lifetime total.
  - Single-subscription machines lay out solo automatically: the collapsed island splits logo and usage number across its flanks, and the panel shows the provider's mark in the freed half.
  - Codex token accounting: replayed usage deltas are skipped and archived sessions are scanned, so long-lived sessions no longer double-count.

  Fixed
  - Oversized session-log lines are skipped before parsing, keeping cost scans bounded; totals unchanged.
