ShortDescription: Kubernetes bulk port forwarding for local development.
Description: kubefwd is a command line utility for bulk forwarding Kubernetes services to your local workstation. Each service gets its own unique loopback IP (127.x.x.x), eliminating port conflicts. Access cluster services by name exactly as in-cluster with automatic /etc/hosts management.
