ShortDescription: A personal agentic-harness console — read-only finance/career/travel dashboards, a notification bus, and an interactive viz layer over your own corpus.
Description: |-
  Watchman renders live, deterministic views over your own data — finance, career, travel —
  through a CLI and a resident desktop console. Dashboards self-refresh from read-only
  command output; a notification bus delivers standing-agent signals; sample personas make
  it run out of the box. The installer is self-contained (bundled engine); the one
  prerequisite is uv, which manages the console's Python runtime on first launch.
