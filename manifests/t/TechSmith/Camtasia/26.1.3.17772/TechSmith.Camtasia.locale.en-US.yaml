ReleaseNotes: |-
  Feature Updates
  - Improved keyboard navigability in tool panels.
  - Improved screen reader accessibility of headings in Preferences.
  - Tool panels can now be resized using a keyboard-navigable control.
  - Updated color of folder icon in User Library tab for better visibility.
  - Grouped media now render a composite waveform considering all audio media within that group.
  - Added Long Path Aware to the manifest of Editor and Recorder.
  Performance Improvements
  - Improved performance for editing groups on the timeline.
  - Improved the project loading performance when timeline has lots of trec media with cursor data.
  Updates for IT Administrators
  - Updated cpp-httplib from 0.38.0 to 0.43.3.
  - Updated expat from 2.7.4 to 2.8.0.
  - Updated freetype from 2.13.3 to 2.14.3.
  - Updated harfbuzz from 13.0.1 to 14.2.0.
  - Updated libpng16 from 1.6.55 to 1.6.58.
  - Updated pango from 1.57.0 to 1.57.1.
  - Updated girepository from 2.86.3 to 2.88.0.
  - Updated pcre2-posix from 10.47.0 to 12.0.2.
  - Added new harfbuzz-gpu.dll.
  - Updated FFmpeg from 7.1.1 to 7.1.2.
  - Updated aom from 3.11.0 to 3.13.1.
  - Updated dav1d from 1.5.0 to 1.5.1.
  - Updated ogg from 1.3.5 to 1.3.6.
  - Updated SDL2 from 2.32.4 to 2.32.10.
  - Updated zlib from 1.3.1 to 1.3.2.
  - Updated Nalpeiron binaries to version 4.4.69.3.
  Bug Fixes
  - Fixed an issue which prevented some user submitted crash reports from being sent.
  - Fixed a potential memory leak when decoding HEVC or VP9 video.
  - Fixed a potential crash when trying to delete a range selection on a magnetic track.
  - Fixed a bug with the Properties Panel showing stale properties when only a caption is selected on the timeline.
  - Fixed an issue that could prevent the Opacity and Blur properties from being changed in the Background Removal effect.
  - Fixed an issue where larger Camtasia online projects may fail to open in Camtasia Editor.
  - Table of contents thumbnails are no longer created for Smart Player exports with no table of contents.
  - Fix resetting skew revert to revert just skew and not scale as well.
  - Fixed editing in Snagit with snagX file with Unicode characters.
  - Fixed a bug where grouped visual media could be cropped in some cases.
  - Fixed importing SnagX files with Unicode characters.
  - Localization fixes.
