ShortDescription: Dooble is a scientific browser. Minimal, cute, unusually stable, and available almost everyware.
Description: Dooble is a minimal, scientific, and stable Web browser.
- A Web browser!
- Anonymous tab headers.
- Apple Silicon.
- Application lock.
- Basic themes.
- Compact. 43,682 lines of source!
- Cookie consumer.
- Custom search engines.
- Custom style sheets.
- Disable JavaScript at the domain.
- Documented.
- Domain restrictions (blocker).
- Favorites.
- Floating digital clock.
- Floating minute history window.
- FreeBSD, Linux, MacOS, OS/2, OpenBSD, PiOS, Windows.
- Functional on a dual-core 1.0 GHz fanless computer.
- Gopher support.
- Great for ancient hardware!
- JavaScript Console.
- Many private windows.
- Multiple private instances, including downloads.
- Native graphing of data for scientific studies.
- Original implementations of AES-256, Threefish-256.
- Peek-a-boo. Zero-script.
- Portable.
- Qt LTS!
- Qt-only dependency.
- Raspberry PiOS!
- WebEngine (https://doc.qt.io/qt/qtwebengine-overview.html).
- Windows portable.
