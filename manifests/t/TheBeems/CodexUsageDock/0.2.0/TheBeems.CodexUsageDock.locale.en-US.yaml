ShortDescription: Show local Codex usage limits in the PowerToys Command Palette Dock.
Description: |-
  Codex Usage Dock shows the percentage remaining in the rolling five-hour and weekly Codex usage windows directly in the PowerToys Command Palette Dock. It also shows available earned resets and the credits balance when Codex provides them.

  The extension processes usage information locally. It requires PowerToys 0.100.0 or newer with Command Palette enabled, plus a standalone Codex CLI executable available on PATH or configured through CODEX_USAGE_DOCK_CODEX_PATH.
