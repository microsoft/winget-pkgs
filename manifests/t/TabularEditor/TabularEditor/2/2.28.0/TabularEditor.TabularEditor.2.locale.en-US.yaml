ReleaseNotes: |-
  > [!WARNING]
  >
  > There are breaking changes in Tabular Editor 2.27.0 regarding deployment of models through the
  > Tabular Editor CLI. By default, Shared Expressions are now no longer deployed, unless the `-S`
  > / `-SHARED` switch is specified.

  ## Improvements in 2.28.0

  - Updated NuGet packages including AMO/TOM to 19.112.0.

  ## Bugfixes in 2.28.0

  - Fixed a regression with C# scripts, which would not compile when using certain helper methods.
