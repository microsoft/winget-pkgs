  > `-SHARED` 开关，否则不再部署共享表达式。

  ## 2.28.0 中的改进

  - 更新了包括 AMO/TOM 在内的 NuGet 包至 19.112.0。

  ## 2.28.0 中的错误修复

  - 修复了 C# 脚本的回归问题，该问题导致在使用某些辅助方法时无法编译。见 #1322
