ShortDescription: 用于管理 Analysis Services 表格和 Power BI 模型的开源工具。
Description: >
  Tabular Editor 2.x 是一款免费、开源的工具，可让您轻松地在 Analysis Services 表格和 Power BI XMLA 模型
  （兼容性级别 1200 及更高版本）中操作和管理度量值、计算列、显示文件夹、透视和翻译。该工具完全使用 .NET
  WinForms (C#) 编写。
ReleaseNotes: |-
