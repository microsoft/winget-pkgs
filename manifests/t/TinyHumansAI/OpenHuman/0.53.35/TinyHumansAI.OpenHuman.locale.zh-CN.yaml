ShortDescription: 你的个人 AI 超级智能。私密、简单且极其强大。
Description: |-
  OpenHuman 是一个开源的 AI 助手，旨在成为你在各类工具中一切行为的记忆中枢与执行者。基于 Rust + Tauri 构建，并采用 GNU GPL3 许可证发布，它弥合了 AI 模型能力与其对你真实了解之间的鸿沟。
  全球范围内的每一个模型，无论数量多么庞大（超过 200 个），都面临同一个根本性局限：它们是无状态的。你输入一条提示，得到一个回复，上下文随即消失。即便是那些声称具备“记忆”功能的模型，也仅能存储几条简略要点。几条要点不过是一张便利贴，而非真正的智能。
  OpenHuman 通过一套冷静而深思熟虑的技术栈解决了这一问题：
  - 本地优先的记忆树（Memory Tree）。你连接的每一个数据源——Gmail、Slack、GitHub、Notion、你的个人笔记——都会流经一条确定性的处理管道：标准化为 Markdown 格式，切分为不超过 3k token 的片段，经过评分后折叠成按来源 / 主题 / 日期分类的摘要树。所有内容均存储在你本地设备的 SQLite 数据库中，没有向量“浓汤”式的黑箱。
  - 在其之上构建了一个类似 Obsidian 的知识库。AI 代理所推理使用的相同文本片段会以 .md 文件的形式存入一个你可以用 Obsidian 打开的“保险库”中，供你浏览、编辑和手动链接。灵感源自 Karpathy 的 obsidian-wiki 工作流。如果你无法直接阅读记忆内容，就无法真正信任它。
  - 支持 118+ 个第三方集成。一键 OAuth 登录 Gmail、GitHub、Slack、Notion、Stripe、日历、网盘、Linear、Jira 等——无需手动配置 API 密钥，也无需在插件市场中摸索。
  - 自动抓取（Auto-fetch）。每二十分钟，OpenHuman 会自动从所有活跃连接中拉取最新数据，并将其整合进记忆树，无需你主动操作，确保助手在今天早上就已经掌握明天所需的上下文。
  - 面向大数据设计的代理架构。智能的 token 压缩技术（TokenJuice）会在冗长的工具输出进入模型上下文之前对其进行压缩，因此扫描你过去六个月的邮件成本仅为个位数美元。自动模型路由机制将不同任务分配给最适合的模型——提示词 hint:reasoning 发往高性能前沿模型，hint:fast 路由至低成本模型，视觉任务交由视觉模型处理——全部包含在同一订阅中。通过 Ollama 可选的本地 AI 支持，使嵌入和摘要处理全程在设备端完成。
  - 开箱即用。完整的代理工具集默认集成：网络搜索、网页抓取器、完整编程工具包（文件系统、git、lint、test、grep）、浏览器与电脑控制、定时任务与调度、记忆工具、用于生成子代理的协调机制，以及原生语音支持——语音转文字输入（STT），文字转语音输出（TTS），角色口型同步，还有一个能加入 Google Meet 会议、将会议内容转录进你的记忆树并可在通话中发言的实时会议代理。无需“安装插件才能读取文件”这类繁琐步骤。
  - 简洁、以用户界面为先。清爽的桌面体验和简短的新手引导路径让你只需几次点击即可从安装过渡到使用运行中的代理——无需先行配置，也不需要命令行操作。代理拥有一个具象化的形象：一个会说话、能感知周围环境变化的桌面吉祥物，它可以作为真实参与者加入你的 Google Meet 会议，能跨数周记住你，在你停止输入后仍在后台持续思考。
  上述特性共同使 OpenHuman 成为一种与传统聊天机器人截然不同的存在。它是一个能够以低成本处理大量个人数据、持续且不断演进地理解你世界的 AI 代理，并能代表你主动采取行动。
