Description: >
  DisplayMagician is an open source tool for automatically configuring your displays and sound for a
  game or application from a single Windows Shortcut. DisplayMagician is designed to change your
  display profile, change audio devices, start extra programs and then run the game or application
  you want. It will even reset things back to the way they were for you once you've closed the game
  or application!
