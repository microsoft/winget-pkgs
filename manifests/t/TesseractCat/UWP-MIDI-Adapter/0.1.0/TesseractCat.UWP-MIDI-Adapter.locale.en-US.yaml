PackageIdentifier: TesseractCat.UWP-MIDI-Adapter
PackageVersion: 0.1.0
PackageLocale: en-US
Publisher: Tesseract Cat
PackageName: UWP → MM MIDI Adapter
PackageUrl: https://github.com/TesseractCat/UWP-Midi-Adapter
License: None stated (Freeware)
ShortDescription: Shim to address Windows' partial support for BLE LE MIDI.
Description: |-
  Recently, [the app's creator] purchased a BLE LE MIDI device (Korg Microkey Air). Windows "supports" BLE LE MIDI, but only through their new UWP MIDI (WinRT) interface.

  This is a small script that creates a tray icon, which lets you forward BLE MIDI inputs from WinRT to the older WinMM interface. It's designed to work with loopMIDI. Some programs support the new WinRT interface so this shouldn't be necessary for every program.

  So the process is：
  • Use loopMIDI to create a virtual MIDI device
  • Use this tool to redirect BLE MIDI to loopMIDI device
  • Success :)
