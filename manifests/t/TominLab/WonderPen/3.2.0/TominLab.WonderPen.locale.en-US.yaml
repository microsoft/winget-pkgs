ReleaseNotes: |-
  - Enhanced image export: very long documents can now be automatically split into multiple images when exported
  - Added support for B5, B6, and custom page sizes when exporting to PDF
  - Added underline support in the editor
  - Added two new typing effects: “Blooming Words” and “Ripple”
  - Keystroke sounds now support two modes: Fixed and Random
  - Added an image toolbar when an image is selected, with support for resizing, copying, saving as, and more
  - The quick input menu can now be customized, including which items to show and their order
  - The current one-click formatting scheme is now stored per library, allowing each library to use its own formatting scheme
  - Added support for QR code login. Please update the mobile app to the latest version to use this feature
  - Fixed an issue where data might not sync when editing in a floating window in some cases
  - Other minor improvements and bug fixes
