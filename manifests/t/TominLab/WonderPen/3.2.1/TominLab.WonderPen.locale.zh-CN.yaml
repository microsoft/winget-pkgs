ReleaseNotes: |-
  - 白板功能升级，支持缩放、连线等功能，可按住 Shift 框选批量选中卡片并移动或删除
  - 码字统计新增总览面板，集中展示当前写作会话、码字日历、热力图和累计码字曲线
  - 右边栏增加统计概览面板
  - 文档新增“资料”标记；被标记的文档及其子文档不会计入码字和写作时长统计
  - 编辑器新增分页符，默认关闭，可在设置 → 高级 → 快捷输入菜单中按需开启。分页符在导出为图片、PDF、Word 等格式时生效
  - 附件管理新增多选、全选、批量删除和“整理”面板，可按引用状态筛选附件并查看引用位置
  - 引用块支持通过 `>>` 等 Markdown 写法创建多层嵌套引用
  - 导出为图片时，可手动设置分页最大高度
  - 一些其他细节调整和改进
