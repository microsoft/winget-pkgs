ReleaseNotes: |-
  - Enhanced the whiteboard with zooming, connectors, and more. Hold Shift and drag to select multiple cards, then move or delete them in bulk
  - Added an overview panel to writing statistics, bringing together the current writing session, word-count calendar, heatmap, and cumulative word-count chart
  - Added a statistics overview panel to the right sidebar
  - Added a “Reference” designation for documents. Designated documents and their subdocuments are excluded from word-count and writing-duration statistics
  - Added page breaks to the editor. This feature is disabled by default and can be enabled as needed under Settings → Advanced → Quick Input Menu. Page breaks take effect when exporting to images, PDF, Word, and other formats
  - Added multi-select, select all, batch deletion, and an “Organize” panel to attachment management. You can filter attachments by reference status and view where they are referenced
  - Blockquotes now support multiple levels of nesting using Markdown syntax such as `>>`
  - Added an option to manually set the maximum page height when exporting as images
  - Various other refinements and improvements
