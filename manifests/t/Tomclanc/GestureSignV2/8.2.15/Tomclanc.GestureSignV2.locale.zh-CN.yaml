Description: GestureSign V2 是经典开源项目 GestureSign 的 Windows 11 重构版本，支持触控板手势、鼠标手势、手势轨迹、按应用设置动作、忽略规则、托盘控制，以及内置的 Kando 径向菜单快捷动作。
