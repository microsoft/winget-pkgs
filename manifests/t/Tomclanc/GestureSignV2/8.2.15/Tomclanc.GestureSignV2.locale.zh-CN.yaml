ReleaseNotes: |-
  将触控板边缘手势缩略图更新为更完整的触控板样式。
  为内置触控板和触摸屏边缘手势名称增加多语言适配。
  统一手势预览图标尺寸。
  隐藏高级导入、导出、备份和还原按钮。
  MSI 安装后开始菜单仅保留主程序快捷方式。
  修复 Daemon 资源绑定错误。
