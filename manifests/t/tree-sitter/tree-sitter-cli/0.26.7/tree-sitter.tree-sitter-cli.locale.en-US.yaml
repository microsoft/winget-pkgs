ShortDescription: The tree-sitter CLI is used to create, manage, test, and build tree-sitter parsers.
Tags:
  - tree-sitter
ReleaseNotes: |-
  ## Notable Changes

  * A regression in v0.26.6 with quantified alternations was fixed.
  * Release artifacts for the tree-sitter CLI are now published as zip archives (in addition to gzipped executables, which are planned for removal in a future minor release).

  ## What's Changed
  * fix: skip missing Makefile in version command by @tree-sitter-ci-bot[bot] in https://github.com/tree-sitter/tree-sitter/pull/5386
  * fix(wasm): pass target triple to clang (#5385) by @clason in https://github.com/tree-sitter/tree-sitter/pull/5390
  * chore(parser): return `NULL`, not `false`, for incomplete parse by @tree-sitter-ci-bot[bot] in https://github.com/tree-sitter/tree-sitter/pull/5398
  * fix(loader): link with libc on OpenBSD to compile parser by @tree-sitter-ci-bot[bot] in https://github.com/tree-sitter/tree-sitter/pull/5399
  * refactor(query): remove `alternative_is_immediate` by @tree-sitter-ci-bot[bot] in https://github.com/tree-sitter/tree-sitter/pull/5412
  * fix(query): don't add copies for quantifier steps outside alternations by @tree-sitter-ci-bot[bot] in https://github.com/tree-sitter/tree-sitter/pull/5414
  * revert allowing dashes in parser name by @tree-sitter-ci-bot[bot] in https://github.com/tree-sitter/tree-sitter/pull/5433
  * ci(release): publish zip archives by @clason in https://github.com/tree-sitter/tree-sitter/pull/5434
  * release v0.26.7 by @clason in https://github.com/tree-sitter/tree-sitter/pull/5435
