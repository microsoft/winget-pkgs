ReleaseNotes: |-
  更新内容
  1. 优化 每次 HTTPing/下载测速 完成后更快释放链接
     每一次 HTTPing 测速，或下载测速完成后，更快关闭链接并释放端口，避免占用/浪费网络资源
  国内用户可以从蓝奏云下载：https://xiu.lanzoub.com/b0742hkxe
