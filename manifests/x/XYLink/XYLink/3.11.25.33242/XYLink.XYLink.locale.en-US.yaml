ShortDescription: Provides video conferencing services to users.
Description: |-
  Xiaoyu Yilian delivers high-quality video conferencing services to mobile users anytime, anywhere. Every registered user automatically receives a dedicated personal cloud meeting room available 24/7. Users can effortlessly join a video conference simply by entering the cloud meeting number, enjoying features such as audio-video interaction, content sharing, meeting moderation, live streaming, recording, and on-demand playback.

  [Key Features]
  — Instant Meeting Setup, Join in 1 Second
    Invite via app notifications, WeChat, SMS, email, or link; start or join a video conference with one tap.
  — HD Quality Even on Weak Networks, Immersive Experience
    SVC flexible layered codec ensures superior packet-loss resistance, delivering full HD video without artifacts and highly authentic audio.
  — Easy Sharing, Efficient Collaboration
    Share your screen with one tap to synchronously display documents, images, and application interfaces; support interactive annotations and watermarks for enhanced security.
  — Breakout Sessions, Group Discussions
    Split large meetings into smaller sessions anytime and merge small sessions back into the main meeting with one tap; ideal for various online meetings and training scenarios.
  — Rich Applications, Innovative Business Capabilities
    Features include intelligent beauty filters, virtual backgrounds, digital nameplates, check-in, quizzes, voting, and instant messaging for innovative engagement.
  — Video Recording, Flexible Editing
    Record in HD with automatic or custom layouts; edit videos online, share with one tap, and control access scope.
  — Organization Directory, Full Coverage
    Create your own organization or enterprise independently, invite colleagues via WeChat, and support hierarchical role-based permissions.
  — Event Live Streaming, Interactive Participation
    Stream in HD, share with one tap; viewers can watch and interact without installing any client.
