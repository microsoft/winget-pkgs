ShortDescription: 为用户提供视频会议服务。
Description: |-
  小鱼易连可以随时随地为移动用户提供高质量的视频会议服务。每个注册用户都将自动获得一个专享的个人云会议室，7×24 小时可用。用户只需要输入云会议号码即可轻松加入视频会议，纵享音视频互动、内容共享、会议主持、直播、录制、点播等功能。

  【功能亮点】
  — 秒级组会，1 秒入会
    App 消息、微信、短信、邮件或链接邀请通知，一键开启或加入视频会议
  — 弱网高清，沉浸体验
    SVC 柔性分层编解码，超强网络抗丢包，全高清画质不花屏，声音高度还原
  — 便捷共享，高效协作
    一键共享屏幕，同步显示各类文档、图片、应用界面，交互式批注，加水印更安全
  — 会议拆分，分组讨论
    大会随时拆小会、小会一键合并大会，支持各类在线会议及培训等
  — 丰富应用，创新业务
    具有智能美颜、虚拟背景、电子铭牌、签到、答题、投票、即时消息等创新展现
  — 视频录制，随心剪辑
    高清录制，自动/自定义布局，在线视频剪辑，一键分享，范围可控
  — 单位通讯录，全员覆盖
    自主创建单位/企业，微信邀请同事加入，支持分级分权
  — 活动直播，参与互动
    高清直播，一键分享，无需安装客户端即可观看、互动
