PackageIdentifier: XiaoLan.CodexAccountSwitch
PackageVersion: 1.3.16
PackageLocale: zh-CN
ShortDescription: 无需重启开发工具，即可在本地管理并切换多个 AI 编程账号。
Description: |-
  面向 Codex 账户的本地优先、多账户可视化管理器
  基于 C++ / Win32 / WebView2 开发，兼具稳定性与运行速度。

  核心功能
  - 账户备份、切换、删除、重命名统一工作流
  - 批量操作（批量刷新、批量删除）
  - 备份包（ZIP 格式）导入/导出
  - 支持导入当前登录账户、手动粘贴 Token、OAuth 文件快速导入
  - 内置 OAuth 登录流程（回调监听器+手动提交回调 URL）
  - 额度看板，支持自动刷新（5 小时/7 天）、低额度告警及切换提示
  - API 代理服务（端口、超时时间、局域网访问、API 密钥、调度策略）
  - 流量日志与 Token 统计页面
  - 多语言界面与主题（自动/浅色/深色）

  Codex 客户端本地 API 代理，实现无缝换号
  - API 反向代理 - 启动服务
  - API 反向代理 - Codex 客户端使用本地反向代理模式
  - 无需重启即可完成账户无缝切换
  - 设置-账户-额度不足自动切换账户提示：启用该功能后，当额度不足时可自动换号，保障开发工作正常推进。
ReleaseNotes: |-
  优化
  - API 反代的默认模型与测试模型列表改为软件内置预设，不再请求上游 API 获取模型列表。
  修复
