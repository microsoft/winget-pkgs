ReleaseNotes: |-
  - feat(delegation): Checking a delegation's status with the wait time set to 0 now waits until the task finishes, so you get the result without polling.
  - perf(message): Streaming or switching one session no longer re-renders the others — multi-session layouts stay smooth.
  - fix(message): The streaming sub-agent card's "Sub-agent starting…" placeholder is now localized across all 10 languages.
  - fix(message): Ordered markdown lists now render their markers, and markers stay on the same line as the item text.
  - fix(message-input): Clipboard images can now be pasted into the input on Linux.
  - fix(goal): Codex goal updates now render as active cards.
  - fix(delegation): Reloaded conversations now show the correct delegation status and grouping.
