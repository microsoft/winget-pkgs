ReleaseNotes: |-
  - 功能(委派)：获取委派状态时，将等待时间设为 0 会一直等到任务结束，无需轮询即可拿到结果。
  - 性能(消息)：流式输出或切换某个会话时不再重新渲染其他会话，多会话布局更流畅。
  - 修复(消息)：流式子代理卡片的占位标题“子代理启动中…”已在全部 10 种语言中本地化。
  - 修复(消息)：有序 Markdown 列表现在能正确显示序号，且列表标记与条目文本保持在同一行。
  - 修复(消息输入)：现在可以在 Linux 上将剪贴板图片粘贴到输入框。
  - 修复(目标)：Codex 的目标更新现在会渲染为进行中的卡片。
  - 修复(委派)：重新加载的会话现在会显示正确的委派状态与分组。
