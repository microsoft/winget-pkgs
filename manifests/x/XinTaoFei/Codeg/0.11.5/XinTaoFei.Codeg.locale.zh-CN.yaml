ReleaseNotes: |-
  - 修复(MCP)：将配置的 MCP 服务器转发到 ACP 会话，stdio 经 PATH 解析、HTTP/SSE 按能力过滤。
  - 修复(MCP)：OpenCode 的 MCP 条目写入正确的配置文件（~/.config/opencode/opencode.json）。
  - 功能(设置)：本地 MCP 标签页新增刷新和新建 MCP 草稿表单。
  - 重构(ACP)：会话 external_id 与 fork 行写入移至后端。
  - 修复(聊天)：保留最后一段流式分片；首次打开会话直接跳到底部；窄面板下换行显示实时回合统计；会话配置下拉菜单限制在视口高度内。
