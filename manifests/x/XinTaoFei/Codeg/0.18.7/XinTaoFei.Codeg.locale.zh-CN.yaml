ReleaseNotes: |-
  - 功能(会话)：被委托的子会话现在以实时树状结构显示在侧边栏。 展开会话即可查看并打开它的子会话。
  - 功能(侧边栏)：现在可以选择侧边栏中「文件夹」和「聊天」哪个显示在上方。
  - 修复(聊天)：展开已编辑的文件时只显示改动的部分，不再铺出整个文件。
  - 修复(桌面)：修复了 Linux 窗口出现双标题栏的问题。
  - 修复(实时反馈)：修复了实时反馈会导致部分斜杠命令失效的问题。
  - 更新(ACP)：升级内置智能体，并新增 Claude Sonnet 5 支持。
