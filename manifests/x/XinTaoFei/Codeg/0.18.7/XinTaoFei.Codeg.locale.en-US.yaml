ReleaseNotes: |-
  - feat(conversations): Delegated sub-sessions now show as a live tree in the sidebar. Expand a chat to see and open its sub-sessions.
  - feat(sidebar): You can now choose whether Folders or Chat appears first in the sidebar.
  - fix(chat): Expanding an edited file now shows just the changed part instead of the whole file.
  - fix(desktop): Fixed a double title bar on Linux windows.
  - fix(feedback): Fixed Live Feedback breaking some slash commands.
