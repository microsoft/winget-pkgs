ReleaseNotes: |-
  - 功能(聊天)：内联渲染 Codex 生成的图片，并提供下载操作。
  - 功能(设置)：启用系统代理时必须填写代理地址。
  - 修复(聊天)：回合结束时不再重复追加助手回复。
  - 修复(聊天)：拖拽上传的文件不再泄漏到非活跃的会话标签页。
  - 修复(聊天)：会话加载失败时显示重新加载与新建会话的操作入口。
