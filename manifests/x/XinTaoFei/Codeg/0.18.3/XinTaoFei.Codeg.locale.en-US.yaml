ReleaseNotes: |-
  - feat(pi): Added first-class Pi agent support with pi-acp integration, session history parsing, delegation, provider setup, credentials, thinking level, and a dedicated settings panel.
  - feat(pi): Pi runtime can now be managed from Codeg with install/uninstall actions, live logs, workspace trust setup, and clearer missing-runtime prompts before launch.
  - feat(pi): Pi now works with Codeg-managed skills, experts, and Office Tools when using the default managed directory.
  - feat(composer): Added Experts and Office shortcuts to the "+" menu, with locked-state hints and safe Office template insertion.
  - polish(pi): Improved Pi provider names, provider coverage, and agent icon styling.
