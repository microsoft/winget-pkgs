ReleaseNotes: |-
  - feat(feedback): Live Feedback now keeps the agent checking your notes on its own. Once enabled, the agent periodically reads your mid-task notes and adjusts course — no need to remind it each turn.
  - fix(chat): Codex file edits now render as proper edit cards, with their diff and line-change stats instead of a generic tool entry.
  - fix(chat): Kimi Code task lists now render as a plan card, matching Claude Code, in both live streaming and history.
  - fix(acp): Codex permission prompts now show clearer request details — the relevant tool title, command/input, and working directory.
  - chore(acp): Bundled agents updated — Claude Code 0.53.0, Codex 1.0.2 (codex 0.142.4), Cline 3.0.33, CodeBuddy 2.114.0, and Kimi Code 0.20.2.
