ReleaseNotes: |-
  - 功能(实时反馈)：实时反馈开启后，智能体会自动查看你的留言。 开启后，智能体会定期读取你在任务中途写下的留言并据此调整方向，无需每轮手动提醒。
  - 修复(聊天)：Codex 的文件编辑现在渲染为标准编辑卡片，带 diff 和行数变更统计，不再是通用工具条目。
  - 修复(聊天)：Kimi Code 的任务清单现在渲染为计划卡片，与 Claude Code 一致，实时流式与历史记录均如此。
  - 修复(ACP)：Codex 权限弹窗现在显示更清晰的请求详情——相关工具标题、命令 / 输入和工作目录。
  - 更新(ACP)：内置智能体升级——Claude Code 0.53.0、Codex 1.0.2（内置 codex 0.142.4）、Cline 3.0.33、CodeBuddy 2.114.0、Kimi Code 0.20.2。
