ReleaseNotes: |-
  - 新增(终端)：默认 Shell 改由后端驱动选择 —— get_available_terminal_shells / probe_terminal_shell_path 提供与平台相关的可选项、安装状态及 resolve_shell() 兜底逻辑，设置界面按后端返回原样渲染；所有平台均支持自定义 Shell 路径输入。POSIX 层在 spawn 时区分 bash 家族 Shell 与 nu/xonsh/elvish 等非 bash Shell，避免后者因 -l -i / eval 等 bash 专属参数无法启动；新增字符串已覆盖全部 10 种语言。感谢 @Kwensiu 在 #127 中贡献初版实现。
  - 新增(聊天)：Read/Write 工具调用头部以及 Edit/ApplyPatch 差异头部中的文件路径现已可点击，复用既有的本地文件确认弹窗在工作区面板中打开；新文件场景下 Write/NotebookEdit 正文使用与新增差异行一致的绿色高亮渲染；
  - 新增(聊天)：消息中的行内代码块高度被限制并启用内部滚动，长代码片段不再把后续对话挤出可视区域；
  - 修复(对话框)：DialogContent 限制到视口高度并启用内部滚动，Git 重置提交消息限高 8rem 带独立滚动条，长消息或小视口下底部按钮始终可见。
