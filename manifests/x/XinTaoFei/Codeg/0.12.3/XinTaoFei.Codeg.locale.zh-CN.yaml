ReleaseNotes: |-
  - 修复(Web)：命令执行中的认证失败现在会作为业务错误返回，不再误判为 Web 会话失效，已登录的浏览器会话不会被登出。
  - 修复(数据库)：Tauri 调试构建现在使用独立的 codeg-dev.db，本地开发时不会和已安装的正式版共享同一个 SQLite 数据库。
  - 调整(桌宠)：桌宠精灵图动画节奏已重新对齐，待机、动作和审查等状态播放更自然。
