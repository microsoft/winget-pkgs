ReleaseNotes: |-
  - 功能(智能体)：Cursor 作为第 12 个编码智能体接入。 用订阅账号或 API Key 登录、选择模型，即可像其它智能体一样使用，支持完整会话历史、MCP 与委托。
  - 修复(聊天)：Grok 等嵌入式上下文智能体现在能正常处理图片。 粘贴的图片会显示为缩略图并出现在你发送的气泡中，重开会话也不会丢失。
  - 性能(聊天)：流式会话渲染更顺滑。 多项渲染优化减少了每次流式更新时的重复计算。
  - 修复(文件)：编辑器不再泄漏内存。 关闭文件标签或卸载 diff 编辑器时，Monaco model 会被正确释放。
  - 修复(聊天)：新会话输入框跟随所选智能体并在打开时聚焦。 输入框会与你选择的智能体保持同步，并在会话一打开就获得焦点，而不再等到 ACP 连接建立之后。
  - 修复(命令)：命令的运行状态在侧边栏重开后得以保留。 关闭再打开侧边栏时，命令会保留其运行状态与你的选择，而不会被重置。
  - 修复(工作台)：背景图打磨。 背景图现在会透过右侧栏头显示，不透明度滑块范围也更大——遮罩最高可达 99%，面板最低可至完全透明的 0%。
