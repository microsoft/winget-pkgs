ReleaseNotes: |-
  - feat(acp): Cursor joins as the 12th coding agent. Sign in with your subscription or an API key, pick a model, and use it like any other agent — with full session history, MCP, and delegation.
  - fix(chat): Images now work with Grok and other embedded-context agents. Pasted images show as thumbnails and appear in your sent bubbles, and they survive reopening a session.
  - perf(chat): Streaming conversations render more smoothly. Several rendering optimizations cut the work repeated on every streamed update.
  - fix(files): Editors no longer leak memory. Monaco models are released when file tabs close and when diff editors unmount.
  - fix(chat): The new-session composer tracks your agent and focuses on open. It stays in sync with the agent you pick and takes focus the moment a conversation opens, rather than waiting for the ACP connection.
  - fix(commands): A command's run state survives reopening the sidebar. Closing and reopening the sidebar keeps the command's run state and your selection instead of resetting them.
  - fix(workspace): Background-image refinements. The image now shows through the right sidebar header, and the opacity sliders reach further — the mask up to 99% and panels down to a fully transparent 0%.
