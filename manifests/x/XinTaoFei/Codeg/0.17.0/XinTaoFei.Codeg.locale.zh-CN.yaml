ReleaseNotes: |-
  - 功能(智能体)：新增内置智能体 Kimi Code（Moonshot 月之暗面）——支持 API Key 或 OAuth 登录、浏览并校验可用模型、管理其 MCP 服务器与技能，并可在历史记录中重新打开过往 Kimi 会话。
  - 功能(智能体)：新增内置智能体 CodeBuddy（腾讯）——自带登录面板、完整会话历史、技能与 MCP 委托；并支持通过自定义接入地址连接私有化（自托管）部署。
  - 修复(渲染)：CodeBuddy 与 Kimi Code 的子智能体和委托现在能正确显示——无论是运行过程中还是重新打开历史会话时；CodeBuddy 的内部子智能体记录也不再堆在历史列表里。
  - 修复(渲染)：从历史记录重新打开会话时，工具返回的图片（如读取图片或多页 PDF）现在会内联显示，与实时视图一致。
  - 修复(渲染)：Codex 的实时提问卡片与文件读取命令（cat/sed/head）现在会渲染为规范卡片，而非原始工具输出。
  - 修复(ACP)：智能体及其打开的终端现在都在会话的工作目录中运行（带 shell 兜底），文件路径解析符合预期。
  - 修复(分支)：输入框下方的分支选择器现在能为已有会话正确切换位于其他工作树的分支，不再拒绝或错误劫持检出。
  - 修复(自动化)：在「自动化」页面启动会话时，现在会自动返回工作区，而不再把会话开在整页「自动化」视图后面看不见。
  - 修复(ACP)：启用任意 codeg-mcp 功能（委托 / 反馈 / 提问 / 会话）时，OpenClaw 会话不再启动失败——codeg 现在会跳过它无法接受的 MCP 服务器。
  - 修复(聊天)：输入框上的配置、模型、模式选择器，悬停提示现在显示其所控制的设置名称。
  - 更新(ACP)：内置智能体升级——Claude Code 0.50.0、OpenClaw 2026.6.10、Hermes 0.17.0，Codex 改用 codex-acp 1.0.0 运行；新增智能体 CodeBuddy 2.109.3、Kimi Code 0.19.1。
