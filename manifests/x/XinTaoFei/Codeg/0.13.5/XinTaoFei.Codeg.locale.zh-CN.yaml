ReleaseNotes: |-
  - 功能(工作区)：Web 与远端工作区现在支持直接在文件树中上传和下载文件、文件夹，传输全程流式处理、无大小限制，并提供统一的进度对话框、支持取消，以及对上传和 zip 下载的安全校验加固。
  - 修复(ACP)：为 Codex Provider 配置的自定义接入地址现在能够正确生效。
  - 修复(设置)：Claude Opus 模型的占位符显示已修正。
