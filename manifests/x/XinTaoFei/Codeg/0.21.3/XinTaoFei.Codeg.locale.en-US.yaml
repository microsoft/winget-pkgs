ReleaseNotes: |-
  - feat(chat): Frosted message surfaces over your background image. With a workspace background image on, the surfaces inside chat messages — bubbles, capsules, cards, code headers, tables, and inline code — turn to one family of translucent frosted panels so the image shows through. Inline code also reads as a pill and tables as rounded, bordered cards.
  - fix(tabs): The new-conversation button sits neatly beside the tabs. It shares the tab row and stays right next to the last tab, and over a background image its hover frost and the strip's bottom border render cleanly.
