ReleaseNotes: |-
  - 修复(外观)：界面默认字体改为系统 UI 字体，不再使用等宽字体；编辑器字体也被限定在代码编辑器内。选择编辑器字体不会再影响应用的其他部分——会话正文、文件路径、工具调用参数、命令菜单和快捷键标签改为跟随界面字体与稳定的系统等宽字体。
  - 修复(聊天)：回合结束后，执行时长的提示框现在与输入框上方的实时计时器保持一致，采用相同的本地化“时 分 秒”格式，而不再是单独的“1.5m”/“30.0s”样式。
