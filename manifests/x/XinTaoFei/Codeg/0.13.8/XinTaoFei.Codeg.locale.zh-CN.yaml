ReleaseNotes: |-
  - 功能(文件夹)：右键文件夹 → 「设置默认代理」，绑定该文件夹新会话默认使用的代理。
  - 修复(标签)：草稿标签被自动替换时，继承上一个标签的代理，不再回落到全局默认。
  - 调整(依赖)：移除 @lobehub/icons，改为内联品牌 SVG，安装更小、冷启动更快。
