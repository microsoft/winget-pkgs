ReleaseNotes: |-
  - feat(delegation): Streamlined long-running delegation updates — repeated status checks are folded into one compact card per task, making busy multi-agent conversations easier to scan.
  - fix(delegation): Completed “still running” status checks now settle into a neutral checked state instead of looking like live spinners forever.
  - fix(parser): Claude Code slash commands that expand into prompts, such as /init, now appear as user turns so the surrounding assistant replies stay correctly separated.
  - docs(community): Refreshed the WeChat QR code images for both light and dark documentation assets.
