ReleaseNotes: |-
  - 功能(模型提供商)：每个提供商现在绑定到唯一的智能体类型，并自带模型配置 —— Claude Code 5 个槽位，Codex 和 Gemini 各 1 个。切换提供商时，URL、Key 和模型会一次性级联到对应智能体。
  - 功能(聊天)：聊天欢迎页焕新，新增光晕主视觉和随机使用小贴士。
  - 修复(模型提供商)：智能体类型创建后不可更改，绑定不匹配会直接报错，不再静默错配模型字段。
