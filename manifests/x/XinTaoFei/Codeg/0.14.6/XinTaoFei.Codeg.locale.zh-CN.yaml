ReleaseNotes: |-
  - 功能(模型)：新增对 Claude Opus 4.8 的支持——Anthropic 最新旗舰模型已可在 Claude Code 会话和委派流程中使用。
  - 修复(工作区)：相邻面板被收起时，对应的分隔条拖拽手柄会一并禁用，避免在隐藏的分隔条上误触拖动。
  - 杂项(acp)：更新内置智能体 CLI 版本——Claude Code 0.38.0、OpenCode 1.15.12、Gemini CLI 0.44.1。
