ReleaseNotes: |-
  - 修复(桌宠)：切换会话时桌宠能稳定保持 Running 状态，不再因为此前轮次结束或授权操作而卡在 Review 动画上。
  - 修复(桌宠)：在会话进行中打开桌宠窗口，会立即呈现当前真实状态，而不是停留在过时的 idle 姿势。
  - 功能(桌宠)：在外观设置里切换激活的桌宠角色后，正在显示的桌宠窗口会即时热替换形象，不再需要关闭重开才能生效。
  - 调整(桌宠)：跳跃动画按照重力曲线重新调速，滞空过程更贴近自然落体，体感更真实。
