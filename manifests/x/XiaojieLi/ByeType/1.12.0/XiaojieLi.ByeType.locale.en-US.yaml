PackageIdentifier: XiaojieLi.ByeType
PackageVersion: 1.12.0
PackageLocale: en-US
ShortDescription: A Markdown-driven AI voice input tool that uses multimodal large models to process raw audio directly.
Description: |-
  ByeType is a Markdown-driven AI voice input tool. By editing Markdown-formatted prompts, you can customize recognition rules, specialized vocabulary, and text optimization strategies, ensuring voice input aligns as closely as possible with your industry terminology and personal habits.
  Additionally, ByeType includes an AI-powered OCR feature (also driven by Markdown prompts), perfectly solving the issue of terminal AI-generated code being fragmented by line numbers, split screens, and line breaks, making it impossible to copy directly.
  Free and open-source, using your own API key—ByeType itself is free, does not handle your data, and sends voice inputs and screenshots directly to your chosen AI provider (such as Google or Alibaba Cloud Bailian). Supports macOS and Windows desktop platforms, as well as iPhone/iPad via iOS Shortcuts.
