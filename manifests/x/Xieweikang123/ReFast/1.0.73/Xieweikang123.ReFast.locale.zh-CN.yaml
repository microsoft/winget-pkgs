ReleaseNotes: |-
  Search UX improvements:
  - Filter prefixes: a/f/p/m/e (apps/files/plugins/memos/Everything)
  - Query history via Up/Down when input is empty; saved on successful launch
  - Vertical results grouped (Files / Everything / Other) with collapse; Everything defaults to 15 items
