ShortDescription: A refined fork of EarTrumpet with enhanced volume control, themes, and auto-updates
Description: |-
  BetterTrumpet is a refined fork of EarTrumpet, the beloved Windows volume mixer.
  Features include per-app volume control, a media popup with album art, 28+ built-in themes,
  volume profiles, undo/redo, CLI with 19 commands, crash reporting via Sentry,
  auto-updates with silent install, and a premium onboarding experience.
Tags:
- audio
- volume
- mixer
- sound
- music
- bettertrumpet
- eartrumpet
- windows
ReleaseNotes: |-
  - Fixed excessive CPU usage on track changes (thumbnail caching, event-driven album art theme)
  - Fixed peak meter stuttering caused by FPS limiter timing precision bug
  - Fixed flyout going blank when scrolling with many audio devices (GitHub #3)
  - Switched flyout to smooth pixel-based scrolling
  - Reduced tray icon animation and legacy player polling overhead
ReleaseNotesUrl: https://github.com/xammen/BetterTrumpet/releases/tag/v3.0.9
