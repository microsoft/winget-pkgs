ReleaseNotes: |-
  # 🛠️ Xenia Manager v3.4.2

  ## 📢Announcement

  This will very likely (unless there's a need for a hotfix) be the last version before the UI update.
  After being in development for 2 months, UI update is currently feature complete (Missing NVIDIA
  Settings since I want to have a proper library to interact with it, which I plan on adding alongside
  AMD Settings in a future update most likely Optimized Settings since that repository will go through
  a rework to use .TOML files instead of .JSON, which will help with maintenance and navigation via
  keyboard/gamepad which needs more time in the oven, currently there's just a proof of concept that
  it works, but needs to be integrated properly) and is in bugfixing stage. Once I merge the PR,
  expect the next Experimental release to be new v4.0.0 version with new UI. I have made it compatible
  with old v3 version (some settings might reset like Automatic Save Backup since they work a little
  bit differently, but it shouldn't require any migration or anything special like that). Feedback
  will be appreciated.

  ## 📝 Changelog

  ### ♻️ Refactor & UI Improvements

  - Replaced GitHub API fully to eliminate rate limits (9664029)

  Now it uses old way since the GitHub Raw/GitHub Pages being broken in some regions has been fixed by
  GitHub.

  ### 🔧 Maintenance & Chores

  - Updating Libraries (bb69067)

  Updated internal dependencies to newer stable versions to mitigate vulnerabilities.

  ## 🎉 Thank You

  Huge thanks to all contributors. 💛
