ReleaseNotes: |-
  ### ✨ 新增功能
  - 歌曲详情页新增收听次数卡片
  - 在「设置 - 高级」中新增清理无效歌曲功能

  ### 🛠 修复问题
  - 修复音频设备选择器、播放队列抽屉、字体选择器存在的内存泄露问题

  ### 🚀 优化与体验提升
  - 移除侧边栏的展开与折叠，调整为始终折叠状态
  - 移除设置中播放页相关的歌词设置，统一在播放页抽屉中调整
  - 更新 Rust 依赖库版本
  - 改进歌词及专辑艺术家信息读取逻辑
  - 优化部分页面间距
  - 为「从网络获取歌词」设置项添加说明
  - 调整主题配色设置样式，提升 UI 一致性

  - 调整默认设置：
    - 强制高亮歌词居中：默认启用
    - 歌词模糊效果：默认启用

  - 调整设置项名称：
    - 「提取当前播放的封面图作为主题配色」→「动态主题配色」
    - 「选择主题配色」→「更改主题配色」
    - 「手动指定音频输出设备」→「更改音频输出设备」
    - 「自定义艺术家分隔符」→「更改艺术家分隔符」
