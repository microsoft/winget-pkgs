ReleaseNotes: |-
  ### ✨ 新增功能
  - 新增主题模式「自动」，可自动跟随系统主题切换（#58）
  - 支持拖动歌单调整顺序
  - 更新说明对话框支持 Markdown 渲染

  ### 🛠 修复问题
  - 修复 Windows 媒体控制（SMTC）时间轴始终少 500ms 的问题
  - 修复部分按钮悬停时鼠标指针未显示为可点击状态的问题（flutter/flutter/issues/182466）
  - 尝试优化鼠标滚动后滚动条被阻塞的问题 （#63）

  ### 🚀 优化与体验提升
  - 优化 Linux 与 Windows 媒体服务性能
  - 优化「作为下一首播放」逻辑：当播放队列中已存在目标歌曲时，将其移动至下一首位置，而不是跳过（#59）
  - 提升部分界面可用性
  - 默认主题模式调整为「自动」
