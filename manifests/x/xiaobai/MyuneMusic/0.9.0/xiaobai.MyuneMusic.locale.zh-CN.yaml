ReleaseNotes: |-
  ### ✨ 新增功能
  - 重构了播放页动态背景功能，替换为流体背景
  - 支持控制歌词模糊强度 #86 #62
  - 支持播放页歌词弹性滚动
  - 支持10段eq调节 #50

  ### 🛠 修复问题
  - 修复部分输入框与快捷键冲突的问题 #76
  - 修复部分LX逐字歌词解析后的单词持续时长有误的问题
  - 修复逐字歌词因二次阿尔法混合导致颜色变脏的问题

  ### 🚀 优化与体验提升
  - 尽力而为的内存占用优化（力竭了）#60
  - 更改默认字体为可变字体，减少存储占用、提升字体清晰度
  - 重构音高与倍数调节悬浮窗口，与eq调节合并为一个对话框 #43
  - 优化字体选择交互 #80
  - 处理音频设备初始化失败自动回退 #86 #62
  - 优化动态颜色关闭时恢复默认颜色的逻辑
  - 自定义主题配色时，自动关闭动态主题配色
  - 禁用了只有单个时间戳的逐字歌词的动画
  - 改进进度条相关StreamSubscription的生命周期管理，避免内存泄漏
  - 优化歌曲元数据解析去重逻辑
  - 为艺术家、专辑、统计页面实现了懒加载以节省内存占用
