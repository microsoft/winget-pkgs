ReleaseNotes: |-
  ### ✨ 新增功能

  - 专辑详情页支持按音轨号排序
  - 为页面的切换添加了淡入淡出的动画
  - 支持播完当前队列后暂停 #85
  - 支持识别间奏及处理
  - 支持右键歌曲跳转到对应的歌手/专辑页
  - 支持右键歌曲跳转到对应的歌曲详情页

  ### 🛠 修复问题

  - 修复歌单页搜索状态下，播放上下文有误的问题
  - 修复更换可变字重后，顶部歌词视觉效果与原本存在差异的问题
  - 修复从专辑/歌手详情页播放时，播放队列抽屉封面图丢失的问题
  - 修复流体背景动画跳跃问题 #93
  - 修复部分页面封面图未被正确释放的问题

  ### 🚀 优化与体验提升

  - 改进"歌单扫描"功能 — 支持文件夹歌单选择扫描、支持普通歌单选择清理 #96
  - 弹性歌词滚动动画不再使用物理模拟，改为数学计算以减少性能占用
  - 调节了1万次弹性歌词滚动动画的视觉效果
  - 重构歌单页面右键菜单样式
  - 简化歌手/专辑页面的组件结构
  - 优化主题配色调节对话框的 UI 视觉效果 #82
  - 优化统计页面封面图资源释放机制
  - 引入路由导航功能并重构整体页面结构
  - 优化内存占用
  - 更改tooltip描述 "保存队列为歌单" -> "保存当前队列为歌单"
  - 剩下的忘了
