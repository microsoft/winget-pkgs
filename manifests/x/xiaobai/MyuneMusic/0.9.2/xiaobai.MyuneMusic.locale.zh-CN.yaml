ReleaseNotes: |-
  > Linux 用户在到更新此版本时，需要额外安装 keybinder-3.0 以使用全局快捷键

  ### ✨ 新增功能
  - 支持启用重放增益 (ReplayGain)
  - 支持启用平衡歌曲音量
  - 支持批量扫描并写入 ReplayGain 标签
  - 支持启用无缝队列，用于消除歌曲切换时的短暂间隙
  - 添加全局快捷键管理功能
  - 播放页支持启用自动调节歌词间距与字体大小
  - 支持歌曲右键菜单「添加到歌单」#101
  - 为竖屏下的歌单页面添加下拉菜单以支持歌单相关操作 #95

  ### 🛠 修复问题
  - 修复鼠标滚动后滚动条被阻塞的问题 #63
  - 修复全部歌曲页面下二次搜索才能播放音乐的问题 #75
  - 修复拖动进度条时的状态同步问题
  - 修复清理无效文件按钮状态不更新及其他问题 #99

  ### 🚀 优化与体验提升
  - 专辑/歌手列表从详情页返回时恢复滚动位置 #103
  - 重构底层音频库 #98
  - 大幅优化播放时的性能占用
  - 重构设置页面结构，按功能模块拆分为独立组件
  - 替换平滑滚动 flutter_web_scroll 为 silky_scroll
  - 优化设置面板的性能占用提示文案
  - 优化播放页动态缩放的效果
  - 优化歌词弹性滚动动画性能
  - 优化封面加载与路径处理 #104
  - 优化 SettingsProvider 异步初始化
  - 优化磁盘存储占用
  - 其他的忘了
