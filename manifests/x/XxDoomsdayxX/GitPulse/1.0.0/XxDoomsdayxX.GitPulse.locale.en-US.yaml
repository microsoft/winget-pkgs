PackageIdentifier: XxDoomsdayxX.GitPulse
PackageVersion: 1.0.0
PackageLocale: en-US
Publisher: XxDoomsdayxX
PackageName: GitPulse
License: MIT
ShortDescription: Always-on-top desktop widget that shows your GitHub repo sync status at a glance.
Description: |-
  GitPulse sits in the corner of your screen and watches your GitHub repositories.
  The moment a new commit lands on remote, the status dot turns red — so you know
  to pull before you start working. When you're in sync, it stays green.
  No browser tab, no notifications, no guessing.
