ReleaseNotes: |-
  This is a minor bug fix release with the following changes:
  - Fixed a regression which caused calls to an overloaded subprogram with the same name as an enclosing subprogram to be incorrectly reported as ambiguous (#1560).
  - Fixed reading scalar out and inout parameters in VHPI foreign subprograms (#1570).
  - Fix memory corruption when a record with unconstrained fields is allocated in a procedure (#1576).
  - Fixed a crash when using the 'stable attribute with a time expression referencing constants declared in a process (#1537).
  - Added binary package for Ubuntu 26.04.
  - Several other minor bugs were resolved (#1559, #1562, #1581, #1578).
  Special thank you to @bpadalino, @tmeissner, @Blebowski, @amb5l, @m42uko, @a-panella, @cmarqu, @albydnc, @johonkanen, and @augustofg for sponsoring me!
