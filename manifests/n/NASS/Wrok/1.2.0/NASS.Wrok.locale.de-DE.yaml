ShortDescription: Moderner, portabler WebView2-basierter Grok-Client mit Makro-Hotkeys, Boss-Taste, Medienansicht und Tray-Menü.
Description: |-
  Wrok ist ein moderner, portabler Client für grok.com auf Basis von WebView2. Er arbeitet
  vollständig ohne API-Zugriff und nutzt die reguläre Anmeldung im eingebetteten Browser.

  Funktionen:
  - Bis zu zehn frei belegbare Makros mit den Hotkeys Strg+1 bis Strg+0. Makrotexte können
    Variablen enthalten: {input} fragt vor dem Senden nach einem Wert, außerdem {date},
    {time}, {username} und {clipboard}.
  - Boss-Taste Strg+Leertaste blendet das Fenster sofort aus und wieder ein.
  - Medienansicht: Bilder und Videos aus Grok lassen sich in einem eigenen Fenster öffnen,
    das links auf voller Bildschirmhöhe erscheint, während Wrok den Rest einnimmt. Videos
    laufen im Endlos-Loop. Strg+Umschalt+P öffnet die kopierte Medienadresse, ohne Adresse
    das zuletzt geöffnete Medium.
  - Automatische Fensterminimierung nach einstellbarer Inaktivität.
  - Speichern von Fenstergröße, -position und Maximierungsstatus.
  - Automatische Anpassung an den Dark- bzw. Light-Mode von Windows, inklusive Tray-Symbol
    und Titelleiste.
  - Gezieltes Löschen der Browserdaten, wahlweise nur Cache oder alles.
  - Optionaler Start mit Windows.

  NASS e.K. und Wrok stehen in keiner Verbindung zu Grok, xAI oder X. Alle genannten
  Markennamen sind Eigentum der jeweiligen Inhaber und dienen nur der Beschreibung.
