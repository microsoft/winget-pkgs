ShortDescription: Modern, portable WebView2-based Grok client with macro hotkeys, a boss key, a media viewer and a tray menu.
Description: |-
  Wrok is a modern, portable client for grok.com built on WebView2. It works entirely
  without API access and uses the regular sign-in inside the embedded browser.

  Features:
  - Up to ten freely assignable macros on the hotkeys Ctrl+1 through Ctrl+0. Macro text may
    contain variables: {input} prompts for a value before sending, plus {date}, {time},
    {username} and {clipboard}.
  - Boss key Ctrl+Space instantly hides and restores the window.
  - Media viewer: images and videos from Grok open in a separate window, placed on the left
    at full screen height while Wrok fills the remaining space. Videos play in an endless
    loop. Ctrl+Shift+P opens a copied media address, or the last media item if none.
  - Automatic window minimization after a configurable idle period.
  - Window size, position and maximized state are remembered.
  - Automatic adaptation to the Windows dark and light modes, including tray icon and
    title bar.
  - Selective clearing of browsing data, either cache only or everything.
  - Optional start with Windows.

  NASS e.K. and Wrok are not affiliated with Grok, xAI or X. All trademarks mentioned are
  the property of their respective owners and are used for descriptive purposes only.
