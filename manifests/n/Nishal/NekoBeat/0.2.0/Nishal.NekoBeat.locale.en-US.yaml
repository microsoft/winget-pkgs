ShortDescription: A free, open-source music aggregator built with Rust
Description: |
  NekoBeat is a premium desktop music player that aggregates content from 
  YouTube, SoundCloud, and Spotify into one unified interface. Features include 
  10-band DSP equalizer, offline caching, synchronized lyrics, PiP miniplayer, 
  Discord Rich Presence, and Windows SMTC integration.
