ShortDescription: 一个用于 CLI 反代的项目，追求更高性能，更优调度
Description: |-
  一个注重高性能与调度的 API 转发服务

  特性
  - 开箱即用，支持 SQLite / PostgreSQL，并通过 sqlc 生成代码以优化查询性能
  - 冷启动/重启秒恢复状态
  - 跟随对话/定时同步额度，综合 5 小时与 7 天窗口的额度，重置时间和错误率评分，优先选择更优凭据，而不是随机选择
  - 单凭据每 Tier 隔离，一个模型不可用不会影响其他
  - 可以单独指定某模型的调用套餐类型（如 pro/free），也可指定调用顺序
  - 请求失败后自动触发基于 Retry-After 或指数退避的临时熔断
  - atomic 和 otter 缓存层，规避高延迟 SQL 操作
  - 支持自定义插件，可快速进行自己想要的请求改写(详见 plugin/readme.md)
  - 支持创建多个 Key 用于内部分发
  - 前端使用 Nuxt SSG 构建，且符合 MD3 风格
