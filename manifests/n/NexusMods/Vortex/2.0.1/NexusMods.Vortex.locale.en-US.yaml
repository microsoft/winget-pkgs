ShortDescription: Vortex is the new, modern mod manager from Nexus Mods.
Description: |-
  Vortex is the new, modern mod manager from Nexus Mods.
  It is designed to make modding your game as simple as possible for new users, while still providing enough control for more experienced veterans of the modding scene.
  Led by Tannin, the creator of Mod Organizer, Vortex takes the lessons learnt during the development of MO and Nexus Mod Manager to provide the most powerful and intuitive modding experience available.
