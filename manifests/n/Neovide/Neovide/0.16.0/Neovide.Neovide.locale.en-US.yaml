  Breaking Changes
  - g:neovide_theme changed its meaning. Now we automatically manage Neovim's background value by default,
    as long as the user has not set it explicitly. At the same time g:neovide_theme now controls the window theme rather
    than the old behavior.
  - g:neovide_background_color has been removed. It now has no effect.
    If you previously used it to control title bar or transparency-related appearance on macOS, migrate to g:neovide_opacity and,
    when/if needed, g:neovide_normal_opacity to achieve similar results.

  Compatibility Notes
  - g:neovide_show_border is now enabled by default.
    Users who relied on the old default appearance may want to set it to false explicitly.

