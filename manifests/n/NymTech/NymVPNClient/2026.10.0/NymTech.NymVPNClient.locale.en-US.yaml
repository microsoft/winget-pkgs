Description: >
  NymVPN is the most private way to be online. Open-source, cross-platform VPN client written in
  Rust. NymVPN routes traffic through Nym's decentralized mixnet for metadata-level anonymity, or
  over multi-hop AmneziaWG (WireGuard) for low-latency, censorship-resistant tunneling. Unlike
  conventional VPNs, no single node can correlate who you are with what you do.
