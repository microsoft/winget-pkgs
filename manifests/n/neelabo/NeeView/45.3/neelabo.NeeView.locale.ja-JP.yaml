ShortDescription: フォルダー内の画像を本のように閲覧できる画像ビューアーです。強力なカスタマイズが可能です。
Description: |-
  フォルダー内の画像を本のように閲覧できる画像ビューアーです。強力なカスタマイズが可能です。

  - 標準対応画像フォーマット (bmp, jpg, gif, tiff, png, ico, svg, WIC 対応画像)
  - 圧縮ファイル対応 (zip, rar, 7z, lzh, cbr, cbz, cb7, …)
  - 多重圧縮ファイル対応
  - PDF 対応
  - 動画対応
  - タッチ操作対応
  - マウスジェスチャー対応
  - キーカスタマイズ、ジェスチャ設定可能
  - ドラッグによる移動、回転、拡縮
  - ルーペモード
  - 見開き表示モード
  - フルスクリーンモード
  - スライドショー機能
  - Susie プラグイン対応
  - Web ブラウザからの画像ドロップ
  - スクリプトによるコマンド拡張
