PackageIdentifier: neelabo.NeeView
PackageVersion: "45.3"
PackageLocale: zh-CN
ShortDescription: 一款图像查看器，让您能够像翻阅书籍一样浏览文件夹和压缩文件中的图片，并提供强大的自定义功能。
Description: |-
  一款图像查看器，让您能够像翻阅书籍一样浏览文件夹及压缩文件中的图片。提供强大的自定义功能。

  - 支持的图像格式（bmp、jpg、gif、tiff、png、ico、WIC 图像）
  - 支持压缩文件（zip、rar、7z、lzh、cbr、cbz、cb7 等）
  - 支持递归解压压缩文件
  - 支持 PDF
  - 支持视频播放
  - 支持触摸操作
  - 支持鼠标手势
  - 可自定义按键与手势设置
  - 可通过拖拽实现移动、旋转和缩放
  - 放大镜模式
  - 对页模式
  - 全屏模式
  - 幻灯片放映
  - 支持 Susie 插件
  - 支持从网页浏览器拖放图像
  - 支持通过脚本扩展命令
