ReleaseNotes: |-
  A Windows-only fix for where the global content-addressable store is placed.
  Important
  On Windows, a machine that already ran nub has a stale store at %USERPROFILE%\.local\share
  ub\store. After upgrading, the next install re-populates the store under %LOCALAPPDATA% — a one-time re-download, no breakage. The old .local\share
  ub directory can be deleted. macOS and Linux are unaffected.
  Package manager
  On Windows, nub store path reported the content-addressable store under a Unix-style .local\share path (C:\Users\<user>\.local\share
  ub\store\v1) instead of %LOCALAPPDATA%
  ub\store, splitting the CAS store from the cache and virtual-store tiers that already sat under %LOCALAPPDATA%. The data-dir resolver now has a %LOCALAPPDATA% branch, so the Windows data root resolves to %LOCALAPPDATA%
  ub, matching the cache tier and Node's platform conventions. Unix and macOS behavior is unchanged. (#476, closes #451)

  What's Changed
  - fix(pm): resolve the global store dir under %LOCALAPPDATA% on Windows by @colinhacks in #476
