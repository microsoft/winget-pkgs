ReleaseNotes: |-
  A lockfile-compatibility fix plus documentation updates.
  Lockfile compatibility
  nub install failed with ERR_NUB_MANIFEST_PARSE ("invalid type: map, expected a string") on a valid pnpm-lock.yaml when a package's engines: field held a nested map instead of a string range. Some legacy packages (e.g. cordova-plugin-inappbrowser) put a nested cordovaDependencies map under engines, which pnpm preserves verbatim in the lockfile. Nub's lockfile parser now tolerates non-string engines values вЂ” keeping the string ranges and ignoring the nested extras вЂ” matching how it already parses package.json. (#439, fixes #417)

