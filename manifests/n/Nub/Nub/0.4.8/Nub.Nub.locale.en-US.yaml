ShortDescription: The all-in-one JavaScript toolkit that augments Node.js instead of trying to replace it.
Description: "An all-in-one toolkit for Node.js. One Rust binary to run your files and scripts, install dependencies, and manage Node itself вЂ” a Bun-like modern DX on top of the node you already have. There's no new runtime to adopt and no lock-in: every augmentation rides on Node's own public extension surfaces."
