ShortDescription: A small utility to calculate hashes of one or more files in bulk.
Description: |-
  HashMyFiles is small utility that allows you to calculate the hashes (MD5, SHA1, CRC32, SHA-256, SHA-512, SHA-384) of one or more files in your system. You can easily copy the hashes list into the clipboard, or save them into text/html/xml file.
  HashMyFiles can also be launched from the context menu of Windows Explorer, and display the hashes of the selected file or folder.
Moniker: hashmyfiles
ReleaseNotes: |-
  - Version 2.50:
    - Added 'Live Hashes Display' option. When it's turned on, HashMyFiles displays the hashes of
      every file immediately after they are calculated, instead of waiting until all files are
      processed.
    - Added new columns: 'Hash Start Time', 'Hash End Time', 'Hashing Duration'.
