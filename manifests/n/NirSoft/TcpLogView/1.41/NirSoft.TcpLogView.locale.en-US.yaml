ShortDescription: Simple utility that monitors the opened TCP connections on your system.
Description: 'TcpLogView is a simple utility that monitors the opened TCP connections on your system, and adds a new log line every time that a TCP connection is opened or closed. For every log line, the following information is displayed: Even Time, Event Type (Open, Close, Listen), Local Address, Remote Address, Remote Host Name, Local Port, Remote Port, Process ID, Process Name, and the country information of the Remote IP (Requires to download IP to country file separately.)'
Moniker: tcplogview
ReleaseNotes: |-
  - Version 1.41:
    - Added 'CaptureInterval' value to the .cfg file. This value determines the number of milliseconds that TcpLogView waits before taking the next TCP connections snapshot. The default interval is 100 milliseconds (In previous versions it was 250 milliseconds). You can manually decrease this value if you want to capture TCP connections opened for very short time.
