ShortDescription: Disable/enable context menu items of Explorer.
Description: |-
  ShellMenuView is a small utility that displays the list of static menu items that appeared in the context menu when you right-click a file/folder on Windows Explorer, and allows you to easily disable unwanted menu items.

  Notice: Some of the menu items in the context menu of Explorer are created dynamically using shell extensions. In these cases, you can use the ShellExView utility to disable them.
