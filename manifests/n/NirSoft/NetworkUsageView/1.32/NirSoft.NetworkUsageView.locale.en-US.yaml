ShortDescription: A tool for displaying network usage information on Windows.
Description: 'NetworkUsageView extracts and displays the network usage information stored in the SRUDB.dat database of Windows 8, Windows 10, and Windows 11. The network usage data is collected every hour by Windows operating systems and includes the following information: The name and description of the service or application, the name and SID of the user, the network adapter, and the total number of bytes sent and received by the specified service/application.'
