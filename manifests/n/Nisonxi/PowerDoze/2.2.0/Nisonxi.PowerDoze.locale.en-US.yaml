ReleaseNotes: 'Adds "auto-dim / lock on leave": when it detects you have stepped away for a while, it automatically dims or locks the screen to save power and protect your privacy (auto-exempt while watching video, in meetings, or running whitelisted apps). The analytics page now defaults to "all history" and shows long-term cumulative savings. Hardware monitoring stability and reading accuracy improved.'
