Description: "PowerDoze quietly fixes the annoying Windows power problems: it switches your PC's power mode by time, location, and what you're doing, stops the screen from sleeping mid-task, dims or locks the display when you step away, and keeps your desktop icon layout in order across monitor changes. It runs 100% locally with no account required for the free tier, works on both desktops and laptops, and can cut fan noise and electricity use without you babysitting power settings."
