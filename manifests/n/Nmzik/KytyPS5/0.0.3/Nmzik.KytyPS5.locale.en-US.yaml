ReleaseNotes: |-
  This is a work-in-progress 0.0.3 release.

  Some games have regressed. For broader game compatibility, although with some graphical issues, use
  version 0.0.2 for now.

  The new update includes stability improvements and graphical fixes:

  - Improved virtual memory allocation performance, resulting in faster game boot times
  - General emulator optimizations
  - New SRT shader-binding system
  - AMPR optimizations
  - Pthread fixes
  - New LibUlt ABIs
  - GUI update with a compatibility database sourced from the GitHub Releases section
