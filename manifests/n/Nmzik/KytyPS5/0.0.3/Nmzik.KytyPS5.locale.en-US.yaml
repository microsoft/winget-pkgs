ShortDescription: PlayStation 5 emulator for Windows
Description: |-
  KytyPS5 is a PlayStation 5 compatibility layer. The project is still in an early stage of
  development, so compatibility is limited and behavior may change quickly between builds.

  Current builds are for Windows only. Linux support is coming soon.

  The emulator has mainly been tested on NVIDIA GPUs. Support for other GPU vendors may be incomplete
  or unstable.

  The translation layer supports emulation of Zen 2/PS5-specific instructions, such as SSE4a, so
  KytyPS5 is expected to run on Intel CPUs as well.
