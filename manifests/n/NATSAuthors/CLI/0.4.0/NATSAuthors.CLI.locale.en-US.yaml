ShortDescription: A command line utility to interact with and manage NATS.
ReleaseNotes: |-
  Enhancements
  - Adds nats server watch api requests
  - Support for --window-size for stream backups
  - Report snapshot time in nats server watch jsz
  - Support fast batch ingest stream configuration (NATS Server 2.14)
  - When using nats via Claude Code render help and general UI in Markdown
  - Add some JSON output features to nats auth
  - Render account and user names in nats account info
  - Optimise expected responses for leader only jsz requests
  - Suoports waiting for replies till empty message received in nats req
  - Add nats service request command
  - Report issystem account in nats account info
  - Support publishing scheduled messages in nats pub (NATS Server 2.14)
  - Support durable sourcing and add nats consumer reset (NATS Server 2.14)
  Removals
  - Remove the experimental nats server run command
  Bug Fixes
  - Fix typo in flag description for stream command
  - Various bug fixes and quality improvements to pub and req commands
  - Various UX and help improvements
  - Subject name logged is not actual but a template in pub and req
  - Populate missing Raft group in stream/consumer check
  - When filtering on host/name force wait=1 for increased responsiveness in a few reports
  - Fix pub/req commands with piped stdin
  New Contributors
  - @ashumkin made their first contribution in #1601
  Full Changelog: v0.3.1...v0.4.0
