ReleaseNotes: |-
  Nx Meta VMS 6.1 to 6.2 Release Notes
  Nx Meta VMS 6.1.1.42649 R2
  R2 release of Nx Meta VMS for the VMS 6.1.1.
  For Server Plugin SDK usage instructions, see the readme.md file included within the
  metavms-server_plugin_sdk-6.1.1.42649-universal.zip archive.
  ATTENTION: These Release Notes show changes relative to Nx Meta VMS 6.1.0.42176 R7.
  NEW FEATURES
  General Features
  - AI Manager is added as a plugin. See more at https://www.networkoptix.com/nx-ai-manager.
  Server HTTP API
  Virtual Device Uploads (VMS-60188)
  - Added new chunk-based upload endpoints for virtual cameras in v4, replacing the deprecated
    legacy /api/downloads/... API:
    - GET /rest/v4/devices/{deviceId}/virtual/uploads: list active uploads for a virtual device.
    - POST /rest/v4/devices/{deviceId}/virtual/uploads: initiate one or more file uploads, providing
      file metadata (startTimeMs, durationMs, sizeB, md5, container, codec). Returns upload session
      details including uploadId, chunkSizeB, and fileId.
    - GET /rest/v4/devices/{deviceId}/virtual/uploads/{uploadId}: get upload status including
      uploadProgressPercent and archiveProgressPercent.
    - PUT /rest/v4/devices/{deviceId}/virtual/uploads/{uploadId}: upload a data chunk for an
      in-progress upload.
    - DELETE /rest/v4/devices/{deviceId}/virtual/uploads/{uploadId}: cancel an in-progress upload.
  Per-Item ETags for Resource Endpoints (VMS-60867)
  - Added etag field to individual resource responses across v1–v4. This enables external systems
    to check per-resource consistency without retrieving full collections. Affected resource types:
    devices, event rules, layouts, layout tours (v1) / showreels (v2+), lookup lists, servers,
    user groups, users, video walls, and web pages.
  Server Plugin SDK
  Vectorization Model Discovery (VMS-59576)
  - New IUtilityProvider6::supportedVectorizationModels() method returns a comma-separated list
    of supported image/text vectorization model names (e.g., "openai/clip-vit-large-patch14-336").
    Plugins can specify a vectorization model from this list in the EngineManifest and use it to
    generate and attach a vector to the track's best shot data.
  Server Data Directory Access (VMS-60205)
  - New IUtilityProvider::dataDir() method (IUtilityProvider7) returns the absolute path to the
    Server's Data Directory, or an empty string if it is absent.
  Client JS API
  N/A
  IMPROVEMENTS
  Server HTTP API
  Server Configuration
  - /rest/v{1-4}/servers endpoints: added loginLabel field to portForwardingConfigurations
    items, providing a custom label for the login field in UI.
  Site Settings (VMS-61136)
  - GET /rest/v4/site/settings and PATCH /rest/v4/site/settings: added mediaSendTimeoutS
    setting to configure the socket send timeout for HTTP media streaming.
  Authentication (VMS-60717)
  - POST /rest/v{3-4}/login/tickets: removed incorrect _strict and _ticket query parameters
    from the endpoint schema.
  Site Discovery (VMS-60742)
  - GET /rest/v{1-4}/site/other (and system/other in v1–v2): added _ticket query parameter.
  Analytics Integrations (VMS-61073)
  - DELETE /rest/v4/analytics/integrations/{id}: endpoint is now fully functional and can be used
    to remove SDK integrations from the Server.
  Showreels / Layout Tours (VMS-61201)
  - GET /rest/v4/showreels (and layoutTours in v1): the collection now returns all showreels to
    Power Users, not only those owned by the requesting user.
  Cloud Service Permissions (VMS-60027)
  - Cloud Service User can now read and subscribe to rest.v4.events.rules and
    rest.v4.lookupLists endpoints (previously required Power User permissions).
  Server Security
  - (VMS-61139) Default HTTP Server response header changed from Apache-style identification to
    {vmsName}/{vmsVersion}, eliminating false-positive Apache vulnerability alerts in security
    scanners.
  - (VMS-61202) TLS v1.1 removed from the list of supported TLS versions by default. Clients that
    relied on TLS 1.1 must upgrade to TLS 1.2 or later.
  - (VMS-61046) ECDSA certificates (e.g., from Let's Encrypt) are now accepted for server HTTPS.
    Previously, loading an ECDSA-based certificate failed with "Invalid key cipher (ECDSA)".
  Client JS API
  N/A
  Server Plugin SDK
  IUtilityProvider Interface Chain (VMS-59576, VMS-60205)
  - IUtilityProvider interface extended from v5 to v7 (non-breaking — plugins consume this
    interface, they do not implement it). New methods supportedVectorizationModels() (v6) and
    dataDir() (v7) are available; see NEW FEATURES above.
  - The previous alias IUtilityProvider5 = IUtilityProvider has been replaced: IUtilityProvider5
    is now a concrete class, and IUtilityProvider7 = IUtilityProvider is the new alias. Existing
    code using IUtilityProvider directly is unaffected.
  - Analytics plugin runtime names updated for clarity in the plugin settings UI (AIMP-1369).
  - On Windows with NVIDIA GPU: if GPU drivers or CUDA toolkit are not properly installed, users
    are now directed to the NVIDIA support page rather than being shown a non-functional NVIDIA
    runtime option; the NVIDIA runtime remains available when properly installed (AIMP-1374).
  SDK CHANGES BREAKING PLUGIN COMPILATION
  - Cloud Storage SDK (VMS-60334, VMS-55815): bucket-based addressing replaced with direct location URLs.
    - IBucketDescriptionList class and BucketDescription struct removed entirely.
    - IAsyncOperationHandler::onBucketDescriptionUpdated() callback removed.
    - New IMediaChunk interface added with startTimeMs(), durationMs(), and locationUrl().
    - IMediaChunkList::get() signature changed from
      bool get(int64_t*, int64_t*, int*) to const IMediaChunk* get().
    - IStreamWriter::locationUrl() added as a new pure virtual method, returning the physical
      storage location URL where data has been written.
    - IDeviceAgent::doCreateStreamReader() first parameter renamed from bucketUrl to
      locationUrl.
    - MediaChunk helper struct converted to a class implementing IMediaChunk:
      - Public fields (startPoint, durationMs, bucketId) replaced with private members accessed
        via virtual methods.
      - Time representation changed from std::chrono::system_clock::time_point /
        std::chrono::milliseconds to int64_t milliseconds.
      - bucketId (int) replaced with locationUrl (const char*).
  REST API BREAKING CHANGES
  - Old virtual camera endpoints deprecated in v3 and v4 in favor of the new virtual uploads API
    (VMS-60188):
    - PATCH /rest/v{3-4}/devices/{id}/virtual/consume
    - PATCH /rest/v{3-4}/devices/{id}/virtual/lock
    - PATCH /rest/v{3-4}/devices/{id}/virtual/prepare
    - GET /rest/v{3-4}/devices/{id}/virtual/status
  - GET /rest/v4/update/storage/{infoCategory} (VMS-61143): removed latest and specific enum
    values from the infoCategory path parameter. Only target and installed remain.
  - GET /rest/v4/update/info (VMS-61143): the type of the optional field packages.*.[].signature
    changed to base64 string.
  - Added insufficientStorage error code to the errorId enum across deprecated API endpoints.
  BUG FIXES
  Server HTTP API
  - GET /rest/v4/update/info (VMS-61143): fixed handler to return proper results when the
    version query parameter is specified.
  - GET /rest/v4/integrations and GET /rest/v4/integrations/{id} (VMS-60744): fixed permission
    enforcement — these endpoints now correctly require Power User permissions. Previously, any
    authenticated user could access them.
  - POST /rest/v4/events/generic (VMS-61105): fixed Internal HTTPS Request action to work
    correctly with the generic event endpoint.
  - /media/{deviceId}.{format} (VMS-60073): the deprecated APIv0 media endpoint now correctly
    honors the endPos query parameter. Previously it was ignored, causing the full recording to be
    returned instead of the requested range.
  - (VMS-60453) Server now accepts Content-Type: application/json; charset=utf-8 in request
    headers. Previously, the charset=utf-8 suffix caused the request to be rejected.
  Server Plugin SDK
  N/A
  Mediaserver
  - Fixed server crash (access violation) on Windows due to missing timeout configuration in the
    SOAP server (VMS-60764).
  - Fixed OEM license migration broken in 6.1.1 when migrating from a different VMS customization
    (VMS-61556).
  - OverlayFS is now recognized as a local partition type, enabling Mediaserver storage
    initialization in containerized environments (VMS-61641).
  - Fixed two-way audio issues on some devices (VMS-60524, VMS-61595).
  Client Applications
  - Fixed Desktop Client crash on disconnection following a system update (VMS-61453).
  - Fixed sites intermittently appearing as Unreachable in Desktop Client due to a cloud connect
    issue (VMS-61660).
  KNOWN ISSUES
  Desktop Client
  - No warning is shown if Object Action with Requirements is used when the action data is missing (VMS-60184).
  Analytics API
  - It is necessary to wait for ~1 second after enabling the Device Agent for Analytics API integration before starting to configure (change settings, disable, etc.) this new Device Agent. Otherwise, the Mediaserver might hang (VMS-58468).
  Stub, Analytics API integration
  - Stub, Analytics API integration currently generates objects from only one Device Agent per Mediaserver. For example, if you have two cameras running on one Mediaserver and Stub, Analytics API integration is enabled for both, analytics metadata is generated for only one of them (VMS-58466).
