ReleaseNotes: |-
  NoMachine makes available version 9.6.x providing fixes for issues found in previous releases affecting USB device handling, file transfer reliability and Kerberos authentication. Additionally, this update includes a patch to prevent possible XSS (Cross-Site Scripting) with browser sessions.
  Trouble Reports solved

  Here is the complete list of fixes released in version 9.6.3:
  TR12W11668 - Sometimes the USB camera name is not properly identified
  TR04X11801 - USB device forwarded to Linux may disconnect after 2 hours
  TR11W11636 - Copying a file from remote to a shared subfolder sometimes hangs
  TR05X11814 - Log rotation may ignore setting of the UsersDirectoryPath key
  TR04X11807 - Windows users may be unable to use Kerberos authentication with Enterprise Client
  TR05X11821 - Possible execution of an arbitrary XXS script during the login via web
  TR05X11822 - It may be not possible to connect to the desktop when SDDM login manager is used
