ReleaseNotes: |-
  NoMachine makes available version 9.8.2 to provide fixes for some issues affecting previous releases and prevent potential privilege escalations on the server side.
  Trouble Reports solved in version 9.8.2:
  TR05X11831 - Cut&paste of a file from remote to local Windows may result in an empty file Device Services
  TR07X11872 - Authentication may fail when creating new VNC desktops via web
  TR07X11876 - Keyboard input not working in Web Player embedded in Unreal Engine CEF
  TR06X11847 - Syslog support may not work on redhat-based Linux distributions
  TR08W11537 - Misleading message when using a SBS license with Small Business Terminal Server
  TR06X11862 - The subscription info process may hang when started during a NoMachine Service restart
  TR06X11869 - Possible escalation of privileges by impersonating the nx user
  TR06X11867 - Possible privilege escalation by arbitrary code injection in the 'nxserver --login' process
