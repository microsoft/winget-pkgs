ReleaseNotes: |-
  - Updated the user interface with a newly redesigned look and feel
  - Improved readability in Dark Mode
  - Added a timestamp watermark feature
  - Added 33%, 66%, and 150% zoom presets
  - Enhancement to remember separate colors for the last used drawing, text, and shape tools
  - Changed the thumbnail view button to always appear on the tab
  - Added a "Paste in New Tab" feature (Ctrl+Shift+V)
  - Added a “Delete File” option to the tab menu.
  - Fixed an issue where saved files were not added to the Recent Documents list
  - Improved usability of the Backspace key
  - Improved the Number Stamp so its text color automatically adapts to the background
  - Improved the ruler with automatic DPI detection
  - Improved the image editing tools to allow changing ruler units
  - Fixed an issue where the recorder icon was repeatedly added to the Windows taskbar settings
  - Fixed an issue where the print functionality was not working properly
