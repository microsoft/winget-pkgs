  > рџљ« Linux AppImage builds are experimental and does not support neodlp's browser intergration features due to it's sandboxed nature. Also, don't run the AppImage with portable (.home, .config) folders, it will break things (it is highly recommended to use native [deb, rpm, AUR] builds if possible for the full experiance, otherwise AppImages are good for trying out NeoDLP without installing)
  > вљ пёЏ MacOS ARM64 binary downloads are experimental and may not open on Apple Silicon Macs if downloaded from browser (You will get 'Damaged File' error) it's because the binaries are not signed (signing MacOS binaries requires 99$/year Apple Developer Account subscription, which I can't afford RN!) and Apple Silicon Macs don't allow unsigned apps (downloaded from browser) to be installed on the system. If you want to use NeoDLP on your Apple Silicon Macs, There are few ways you can bypass these restrictions:
  > 1. Using our automated Curl-Bash Installer (Recommended)
  > 2. You can also manually remove the .dmg file/.app folder from macOS quarantine using these commands: xattr -d com.apple.quarantine NeoDLP_x.x.x_aarch64.dmg (for .dmg file) -OR- xattr -r -d com.apple.quarantine /Applications/NeoDLP.app (for .app folder)
  > 3. Or you can compile NeoDLP from source in your Mac (Then you don't have to download the pre-compiled binaries at all, though it is a much longer process and is intended for advanced users only)
