ShortDescription: Open-source, model-agnostic AI pair programmer for the terminal.
Description: |-
  Mermaid is an open-source, model-agnostic AI pair programmer for the terminal.
  It works with Ollama (local), Anthropic, Gemini, OpenAI, Groq, OpenRouter, and
  any OpenAI-compatible endpoint, with native tool calling, subagents,
  computer-use tools, and a clean TUI.
