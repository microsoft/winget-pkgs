ShortDescription: Локальный OpenAI-совместимый прокси для Gemini CLI и Kiro в нативном Flutter-приложении
Description: |-
  KiCk поднимает у вас на устройстве локальный адрес в формате OpenAI и
  пересылает запросы в Gemini CLI через подключённые Google-аккаунты, а в Kiro
  через сессию AWS Builder ID. Приложение нужно для тех, кто хочет работать
  с Gemini CLI или Kiro без терминала, ручной настройки входа и отдельного
  локального сервера.
