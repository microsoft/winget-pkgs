ShortDescription: Sets your Windows desktop wallpaper to the current ADO sprint (e.g. 278.1).
Description: >-
  WhatSprintIsItWallpaper sets your Windows desktop wallpaper to a clean, dark image showing the
  current sprint and week (for example "278.1"), using the same offline date formula as
  whatsprintis.it. After a one-time install it keeps itself up to date automatically via a
  Windows Scheduled Task that runs at logon and once daily, so the number rolls over on its own
  every Saturday. No login, network, or Azure DevOps account required.
