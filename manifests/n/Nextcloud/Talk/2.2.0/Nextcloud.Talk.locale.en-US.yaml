ReleaseNotes: |-
  Fixes
  - Linux/Flatpak: status icon rendering, screen wake lock, IDLE detection access #1713
  - macOS: correct "Report a bug" window menu link #1736

  Changes
  - Built-in Talk in binaries is updated to v24.0.0 in both beta and stable release channels #1759
  - Update to Electron 41 #1709, #1710
  - Add scripts for Windows ARM build #1725
  - Add initial support for .overrides/ build customization with build config and styles #1741, #1743

  What's Changed
  - build(deps): bump to Electron 41 with workarounds for known issues on Wayland by @ShGKme in nextcloud/talk-desktop#1709
  - fix(scripts): support release on branch in addition to tag by @ShGKme in nextcloud/talk-desktop#1707
  - fix(linux/wayland): infinite load due to Chromium bug with ready-to-show by @ShGKme in nextcloud/talk-desktop#1710
  - chore(ISSUE_TEMPLATE): adjust to new "needs triage" label name and add types by @ShGKme in nextcloud/talk-desktop#1712
  - build(flatpak): fix status icon render, idle detection api, screen wake lock api access by @ShGKme in nextcloud/talk-desktop#1713
  - chore(deps-dev): Bump dotenv from 17.3.1 to 17.4.0 by @dependabot[bot] in nextcloud/talk-desktop#1714
  - build: add missing ghost dependencies and remove unused dependencies by @ShGKme in nextcloud/talk-desktop#1715
  - ci(deps): Bump peter-evans/create-pull-request from 8.1.0 to 8.1.1 in /.github/workflows by @dependabot[bot] in nextcloud/talk-desktop#1716
  - chore(deps-dev): Bump sass from 1.97.3 to 1.99.0 by @dependabot[bot] in nextcloud/talk-desktop#1717
  - build: update built-in Talk versions by @nextcloud-command in nextcloud/talk-desktop#1731
  - chore(deps-dev): Bump electron from 41.1.1 to 41.2.1 by @dependabot[bot] in nextcloud/talk-desktop#1724
  - build: add scripts for Windows ARM64 build by @aequivalent2 in nextcloud/talk-desktop#1725
  - ci(deps): Bump actions/setup-node from 6.3.0 to 6.4.0 in /.github/workflows by @dependabot[bot] in nextcloud/talk-desktop#1733
  - ci(deps): Bump webiny/action-conventional-commits from 1.3.1 to 1.4.2 in /.github/workflows by @dependabot[bot] in nextcloud/talk-desktop#1734
