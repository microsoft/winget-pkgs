  - build(deps): update dependencies by @ShGKme in nextcloud/talk-desktop#1761
  - build(deps): remove Nextcloud 33 styles, update 34 to v34.0.0, update Nextcloud 35 to latest master by @ShGKme in nextcloud/talk-desktop#1762
