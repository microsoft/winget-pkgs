ReleaseNotes: |-
  What's Changed

  All platforms
  - fix logger for stdout (@an-dr-eas-k, nextcloud/desktop#9975)
  - Fix settings dialog minimum size (@Rello, nextcloud/desktop#9982)
  - editLocally: evaluate lock-record DB call outside Q_ASSERT (@greatjourney589, nextcloud/desktop#9973)
  - fix: remove admin recall feature (@Rello, nextcloud/desktop#10017)
  - logs: change update channel log severity to info (@nilsding, nextcloud/desktop#10037)
  - discovery: do not sync shares with "Allow download and sync" unset (@nilsding, nextcloud/desktop#9963)
  - double background in settings navigation (@Rello, @nilsding, nextcloud/desktop#10046)

  macOS
  - Remove obsolete launch agent after installation (@i2h3, nextcloud/desktop#9976)
  - Fix File Provider Item Eviction (@i2h3, nextcloud/desktop#9981)
  - Apply eager content policy also to first item in nested hierarchies (@i2h3, nextcloud/desktop#10009)
  - fix: Refactor visitedDirectory handling in MaterializedEnumerationObserver (@Rello, nextcloud/desktop#10011)
  - Prevent duplicate database records for the same file provider item (@i2h3, nextcloud/desktop#10020)
  - fix(file-provider): detect lock changes during working set enumeration. (@camilasan, nextcloud/desktop#10002)
  - Fix Content Policy Inheritance for New Items (@i2h3, nextcloud/desktop#10038)
  - Disable file provider on macOS 13 Ventura (@i2h3, nextcloud/desktop#10021)
  - Preserve local creation and modification dates (@i2h3, nextcloud/desktop#10044)
