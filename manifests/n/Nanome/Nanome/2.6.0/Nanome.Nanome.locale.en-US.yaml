ReleaseNotes: |-
  New Features and Improvements
  - Scene Recording & Playback: record scenes (including their annotations) and play them back, including on the web viewer.
  - Residue Editor: one built-in tool for both residue mutations and rotamer (side-chain) edits, with improved handling of alternate locations.
  - MARA Tools: run MARA cheminformatics tools on a whole entry, a component, or your current selection right from the in-headset sidebar (VR + desktop); results and any molecular outputs come back as new structures without changing what you sent.
  - Rich Annotations: add custom text and sound annotations, with URLs supported inside text; annotations carry through scene duplication and playback.
  - Ligand Table View Presets: save and switch ligand-table layouts per Project, filter by numeric rating, and toggle a 3D tag per ligand.
  - Shared Selection: opt-in sharing of your selection with collaborators in your avatar color; following a user now shows their selection too.
  - XR Keyboard v2: real-time dictation and clipboard support in the in-headset keyboard.
  - Interactions: halogen-π interactions, ligand↔protein-only filtering, highlighting that networks across users, and show/hide toggles for pinned interaction labels.
  - Multi-model & trajectory: load multi-model MAE files, atom-count-aware frame limits, smoother large-trajectory playback, and per-frame surfaces when stepping through frames.
  - More new tools: Export to SMILES, TM-align protein–protein alignment, "Set as ligand" designation, direct distance filters, a redesigned color picker, chain-instance coloring, an in-app server switch (private cloud / on-prem), and a Loading Report that flags and auto-resolves fixable load issues.
  - Pointer highlight: flash a highlight around your pointer that broadcasts to collaborators so they can see where you're pointing.
  - Web App: sequence menu, multi-protein structure alignment, image export, scene-playback controls, .pdbqt loading, touch input for tablets and phones, Org role management, and structures now render visible on load. Viewers can step through models and make selections.

  Optimizations and Fixes
  - Rebuilt real-time collaboration networking: replaced Photon with a custom in-house networking stack for more reliable multi-user sessions. Foundational and invisible by design, it underpins all live collaboration going forward.
  - Large workspaces: level-of-detail rendering, a dynamic-resolution spatial grid, and faster large-molecule loading, with rendering improvements for Quest and Android.
  - Surfaces: surface and ESP computation now runs asynchronously in the background so it no longer stalls the session, plus a faster surface protocol and correct surfaces for disconnected atoms (waters, ions).
  - Networking efficiency: more efficient payload compression for large structures.
  - Network health: live high-ping indicators and better connection-loss recovery in both XR and web.
  - Performance safeguards: the load manager that hides very heavy structures to protect framerate now correctly counts passthrough and editable-model rendering against its budget.
  - Loading: cancellable structure loading with a progress bar, and a fix for loads that stalled on unknown workspaces.
  - Stability: eliminated multiple API and main-thread freezes (selection builder, menu scroll, workspace change) and cleaned up connection, token, and inter-entry handling.
  - Web App reliability: fixed the ~30-second disconnect/rejoin loop that occurred while a tab was backgrounded.
  - 60+ additional fixes across freezes, UI polish, workspace management, and rendering, plus a higher scene limit (now 50 per workspace) and faster, more accurate ring detection.
