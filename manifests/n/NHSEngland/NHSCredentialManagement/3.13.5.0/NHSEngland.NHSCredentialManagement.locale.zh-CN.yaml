ShortDescription: NHS 凭证管理服务
Description: |-
  NHS Smartcard Connect 是一款基于 CIS2 认证的新型护理身份服务（Care Identity Service）认证客户端。
  Smartcard Connect 作为包含 NHS 凭证管理（NHS Credential Management）版本 3 的软件包的一部分进行安装。它保留了旧版 NHS 凭证管理的所有既有功能，特别是使 Spine 应用程序无需依赖 Java 小程序即可运行的功能。这使得这些应用程序能够在 Edge 和 Chrome 等现代浏览器中使用，而不再需要 Internet Explorer 或以 IE 兼容模式运行的 Edge。配备 Smartcard Connect 的 NHS 凭证管理不再与传统的 NHS 身份代理（NHS Identity Agent）并列安装。
  使用 Internet Explorer 或以 IE 兼容模式运行的 Edge 的用户，将无法再像过去那样通过 Java 小程序与传统的身份代理进行通信。
