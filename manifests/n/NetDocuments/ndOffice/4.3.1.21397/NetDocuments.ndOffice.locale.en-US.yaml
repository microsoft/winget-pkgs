ShortDescription: NetDocuments is a cloud-based document, email, and records management service. NdOffice is used for integration with Microsoft Office applications.
ReleaseNotes: |-
  We are pleased to announce the General Availability (GA) release of ndOffice 4.3.1 on 6 March 2026.

  This patch release includes the following fixes:
  - Fixed an issue where converting documents to PDF in Outlook could display a conversion failure message in Microsoft 365 Office version 2512 or higher.
  - Fixed an issue where ndOffice’s Document Import was not consistently applying the indexpriority value on all calls. With this fix, all Document Import calls now correctly honor the indexpriority setting.
  Download the new version from the ndOffice product page, our Direct Downloads page, or from the links below:
  https://apps.netdocuments.com/apps/ndOffice/ndOfficeSetup.zip
  https://apps.netdocuments.com/apps/ndOffice/ndOfficeSetup.exe
  https://apps.netdocuments.com/apps/ndOffice/ndOfficeSetup.msi
  https://apps.netdocuments.com/apps/ndOffice/ndOfficeSetup-4.3.1.zip (Link to specific version)

  NOTE: After any ndOffice update has been completed, ndOffice will need to be started manually from the start menu and the user will need to log in again. Thereafter, ndOffice will start automatically with the user logged in until the next update or until they log out.
  Support and Feedback
  Please contact us with comments, questions, suggestions, and report issues.
  Submit a request via our support site or call the closest customer support center:
  - US customers, call 801-226-6882 or 866-NET DOCS (638-3627)
  - EU customers, call +44 2031 299324
  - AU customers, call +61 2 8310 4319
  When reporting an issue, please provide as much information as possible including:
  - A fully detailed description of the issue, including exact error messages or screenshots
  - Detailed steps to reproduce the issue
  - Error logs, if any
  We thank you for all of your input and feedback, and we appreciate you using NetDocuments and associated product features. We value you as a customer.
  The NetDocuments Team
