ShortDescription: A live, animated system monitor for the Windows terminal.
Description: |-
  glowfetch is a terminal user interface that reports your system at a glance and
  keeps updating in real time. It shows live CPU, memory, disk, and network meters,
  a per core load row, and rolling history graphs. Hardware detail such as the
  graphics card, display resolution, and battery is read natively through WMI.
