ShortDescription: Professional network monitor — LAN scanner, security audit, 5G modem and mesh router integration
Description: |-
  NetSentinel is a professional-grade network security scanner and monitor for Windows,
  targeting IT administrators, home lab users, and students learning network concepts.
  It replaces a collection of separate utilities with one integrated desktop application:

    • Device Inventory — ARP + mDNS + NetBIOS + DHCP scan; OUI fingerprinting identifies
      cameras, smart speakers, routers, and IoT sensors by MAC address
    • 5G Modem Monitor — live SINR, RSRP, RSRQ, band, and cell ID from ZTE MC889 modems;
      signal history logged alongside every speed test result
    • Mesh Router Monitor — TP-Link Deco XE75 node signal stats and topology;
      enriches device inventory with real hostnames from your mesh network
    • Hardware Integration — USB, serial, and GPIO device detection; extend the app
      with physical sensors and network hardware
    • Rogue Bridge Detector — captures 802.1D/RSTP BPDUs; flags devices stealing the
      Root Bridge role and causing periodic 15-45 second network outages
    • Broadcast Storm Analyser — measures broadcast/multicast rates in real time;
      identifies the flooding device with packet-level evidence
    • Speed Test — three-tier: Ookla CLI (1 Gbps+) then speedtest-cli (8 threads) then
      pure-Python (16 TCP streams); each result captures a full modem signal snapshot
    • Security Audit — SYN/UDP port scan, OS fingerprint, CVE lookup, TLS checker,
      credential test (SSH/SMB/FTP/Telnet), threat intelligence, and risk scorer
    • IoT Behavioral Baseline — learns normal traffic patterns; alerts when a device
      contacts unexpected hosts or starts scanning
    • What's Wrong? Diagnosis — symptom tiles trigger a sequenced scan; results
      delivered as plain-English findings with root-cause correlation
    • Log Hub — unified view: network RTT, 5G modem, mesh, syslog, and SNMP traps
    • Protocol Visualizer — animated ARP/DNS/TCP/DHCP/STP diagrams from real scan data
    • Lab Mode — guided CompTIA Network+/CCNA exercises with exportable HTML results
    • MQTT / Home Assistant — Discovery payloads, configurable broker, keychain credentials
    • REST API — read-only Flask API on localhost; API key stored in OS keychain
    • WiFi Heatmap — floor plan import, IDW interpolation, PNG export
    • Network Documentation — one-click HTML/Markdown snapshot of full network state
    • Automation Hooks — shell commands triggered by alert and scan events

  Most active scan features require Administrator privileges.
  Install Npcap (https://npcap.com) for STP, storm, ARP watch, and 802.11 monitor mode.
