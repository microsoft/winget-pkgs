ReleaseNotes: |-
  Known Issues in 6000.5.1f1
  - 6000.0.11f1: Crash on ProfilerMutexLock when closing a project with specific Assets (UUM-144371)
  - 6000.4.0a1: Crash on AnnotationManager::CanHideLODLabels when opening the Gizmos dropdown menu (UUM-144488)
  - 6000.4.0a2: Editor freezes when LoadSceneAsync is called in the same frame as destroying SpriteRenderer GameObjects (UUM-143745)
  - 6000.5.0a6: Crash on PhysicsCommandsPhysXBodySetPose when entering Play Mode in a specific project (UUM-143658)
  - Asset Importers: Editor crashes on "(Unity) WriteObjectToVector" when entering into the Play Mode (UUM-112617)
  - Text (TextMeshPro): Crash on UNITY_FT_Load_Glyph when generating multi-threaded Font Atlas in TMPro Font Asset Creator (UUM-125366)
  - : Crash on mdb_cursor_sibling when performing various actions in the Editor (UUM-141720)
  - : Crash on mono_log_write_logfile when more than one copy of bee_backend is running (UUM-142773)
  - : Crash with multiple stack traces when generating a Font Atlas (UUM-141061)
  6000.5.1f1 Release Notes
  Features
  - Netcode for Entities: Added support for overiding GhostComponentVariation defaults through baking code. Add the GhostVariantBakedOverride dynamic buffer, then use the Append... extension methods to set a new default variant for that prefab. Note: The IBaker.AppendToBuffer method does not support adding to the same buffer from two different bakers.
  Improvements
  - Editor: Improved diagnostics checks for LMDB MDB_BAD_RSLOT runtime errors. (UUM-110320)
  - Netcode for Entities: Removed the 'must be a serialized component' limitation from the GhostComponentVariation dropdown selection in the GhostAuthoringInspectionComponent, as non-serialized components already support things like PrefabType stripping, just not explicitly. Handling of invalid ComponentOverrides has also been improved.
  Fixes
  - 2D: Fixed an issue where padding did not apply equally along the entire boundary, mainly affecting full-rect sprites. (UUM-139518)
  - 2D: Fixed crash on ShaderPropertySheet::FindPropertyIndex when opening a specific project. (UUM-110537)
  - Animation: Fixed flickering loop calculation in Transition Preview. (UUM-132406)
  - Animation: Fixed selection highlight popping in a second instance of the Animation Window. (UUM-141891)
  - Bug Reporter: Fixed an issue where crash reports could include an outdated Editor.log attachment when Bug Reporter was opened by the Crash Handler. (UUM-143044)
  - DX12: Fixed by converting the foveated texture generation pass to unsafe. (UUM-111783)
  - Editor: Editor: Fixed an Editor hang when viewing the SerializedProperties of non-empty UXML assets. (UUM-144349)
  - Editor: Fixed a potential LMDB code path that could cause a memory leak. (UUM-138144)
  - Editor: Fixed an issue where duplicating a Build Profile would lose Player Settings overrides that were added but not yet otherwise edited. (UUM-141702)
  - Editor: Fixed bug where dragging groups in the blackboard sometimes collapsed the group during the drag operation. (UUM-131405)
  - Editor: Fixed forward and back mouse button input not working in the Linux Editor. (UUM-143528)
  - Editor: Fixed incorrect IMGUI drag sensitivity for numeric fields after the value changed. (UUM-139683)
  - Editor: Fixed issue where the InspectorWindow would throw if a new window opened or closed during RedrawFromNative. (UUM-141990)
  - Editor: Fixed the Inspector entering scroll mode when exiting dropdown menu selection and using Wacom device. (UUM-138133)
  - Editor: Updated Canvas Renderer icon. (UUM-142443)
  - Entities: "HashMap is full" exception when viewing prefabs in the Hierarchy window that contain additional entities created during baking. (UUM-143942)
  - Entities: Fixed a NullReferenceException that occurred when changing Entities preferences from the System window. (UUM-143256)
  - Entities: Fixed an issue where the Component-count and Dependency-count filters were incorrectly positioned in the search toolbar of the System window. (UUM-143244)
  - Graph Toolkit: Fixed an issue where right-clicking a variable node did not open its context menu. (UUM-143540)
  - Graphics: Delayed Renderer additions in Texture Streaming in order to avoid performance spikes. (UUM-140042)
  - IL2CPP: Fixed support for arrays of function pointers types. (UUM-143362)
  - IMGUI: Improved reporting of native memory allocations for IMGUI code. (UUM-126919)
  - Linux: Fixed bugs when building Windows Players and creating Visual Studio Solutions from Linux Editors. (UUM-140187)
  - Linux: Fixed empty publish section being shown. (UUM-143580)
  - Netcode for Entities: If two GhostGroup entities happened to contain children that shared the same ArchetypeChunk - and both group root entities were sent in the same snapshot, the snapshot data of the first child would be clobbered by the snapshot data of each successive child, leading to unrecoverable snapshot read errors.
  - Particles: Fixed URP Particle Lit and Simple Lit shaders to be properly lit in Deferred and Deferred+, when rendering against the background or with SSAO applied. (UUM-140364)
  - Physics: Fixed a crash inside Physics.RebuildBroadphaseRegions which could happen when the method would be called on physics scenes that are not using multi-box prunning broadphase. (UUM-144472)
  - Physics: Fixed an issue where calling Physics.RebuildBroadphaseRegions could end up excluding pre-existing Collider components from the newly generated broad-phase regions. (UUM-144472)
  - Profiler: Fixed issues with profiler screenshot capture rates/timings with Players using Build and Run/autoconnect to Profiler setting. (UUM-144511)
  - Search: Fixed an issue where the Saved Searches filter was cleared after docking or undocking the Search window. (UUM-141037)
  - Shadergraph: Fixed an issue where the gradient picker window would close when undoing or redoing a gradient change. (UUM-141977)
  - Shadergraph: Fixed an issue where the node search window did not close when the escape key was pressed. (UUM-143233)
  - UI Toolkit: Fixed assertion exceptions thrown when dragging a UXML asset into the UI Builder Hierarchy after editing a template instance in context. (UUM-144069)
  - UI Toolkit: Fixed Project Browser icon for SVGs imported as VectorImage. (UUM-141655)
  - UI Toolkit: Fixed the Accessing invalid property error that could be logged when UI Builder was refocused after a .uss file was edited and saved outside the Editor. (UUM-139792)
  - UI Toolkit: Fixed the UI Builder null reference exception when triggering an undo/redo right after existing context mode. (UUM-142693)
  - Web: Fixed setSelectionRange error on Web email input fields. (UUM-136581)
  - Windows: Fixed an issue where the Editor would log spurious "is a symbolic link" warnings on Windows for files using non-symlink NTFS reparse points. (UUM-141862)
  - XR: Fixed pre-existing memory leaks in VrsResources.DisposeResources(). (UUM-143173)
