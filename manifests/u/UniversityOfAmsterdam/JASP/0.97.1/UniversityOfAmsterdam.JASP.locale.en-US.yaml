ReleaseNotes: |-
  Important Fix
  - Fixed an issue where numbers over 4 significant figures where sometimes rounded off in the results in a rather misleading, perhaps wrong way. We're very sorry about that! It sneaked in during the adding of locale specific support. https://github.com/jasp-stats/jasp-issues/issues/4266 (Sum in descriptives gave the wrong value). This bug was only visible if you did not force all numbers in jasp to have a certain amount of decimals. PR: https://github.com/jasp-stats/jasp-desktop/pull/6252
  General Fixes
  - Fixed an issue where the Spanish R console placeholder displayed translated variable names that did not exist (Issue: https://github.com/jasp-stats/jasp-issues/issues/4274, PR: https://github.com/jasp-stats/jasp-desktop/pull/6223)
  - Fixed labelled datasets created before v0.97 that could no longer be loaded (Issue: https://github.com/jasp-stats/jasp-issues/issues/4283, PR: https://github.com/jasp-stats/jasp-desktop/pull/6227)
  - Fixed filters for categorical data in older JASP files that were broken in v0.97 (Issue: https://github.com/jasp-stats/jasp-issues/issues/4293, PR: https://github.com/jasp-stats/jasp-desktop/pull/6230)
  - Fixed incorrect scaling of the Output Panel "Remove Note" option when using display scaling other than 100% (PR: https://github.com/jasp-stats/jasp-desktop/pull/6220)
  - Fixed encoding and data preloading for repeated-measures cells (PR: https://github.com/jasp-stats/jasp-desktop/pull/6234)
  - Fixed an issue where graphs could not be copied and pasted into Microsoft Word on Windows MSIX installations (Issue: https://github.com/jasp-stats/jasp-issues/issues/4292, PRs: https://github.com/jasp-stats/jasp-desktop/pull/6236, https://github.com/jasp-stats/jasp-desktop/pull/6239)
  - Fixed the position of the custom context menu in the Results panel when zooming (PR: https://github.com/jasp-stats/jasp-desktop/pull/6243)
  - Added update notifications to the ribbon (PR: https://github.com/jasp-stats/jasp-desktop/pull/6251)
  - Fixed an issue where cast variables did not retain their type when used as a source variable (PR: https://github.com/jasp-stats/jasp-desktop/pull/6253)
  New Analysis
  - Added Distribution Comparison analysis (PR: https://github.com/jasp-stats/jaspDistributions/pull/226)
  Descriptives Fixes
  - Fixed an issue where the Raincloud Plot did not display all data points (Issue: https://github.com/jasp-stats/jasp-issues/issues/3971, PR: https://github.com/jasp-stats/jaspDescriptives/pull/464)
  Network Fixes
  - Updated EasyBGM (PRs: https://github.com/jasp-stats/jaspNetwork/pull/177, https://github.com/jasp-stats/jaspNetwork/pull/183)
  Full JASP Changelog: https://github.com/jasp-stats/jasp-desktop/compare/v0.97.0...v0.97.1
