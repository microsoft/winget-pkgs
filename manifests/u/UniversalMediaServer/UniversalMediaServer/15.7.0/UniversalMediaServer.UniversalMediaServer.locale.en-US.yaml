ReleaseNotes: |-
  flatten
  🎉 New features time! 🎉
  We added:
  - Option to flatten folder structure, so all files within subdirectories appear at the top level
  - Automatic thumbnails for Internet playlists
  - Lucene search for audio files
  - Support for webp thumbnails
  - A bunch of other updates and fixes
  There has also been a ton of work behind the scenes to make our release process faster, so now we should be able to release new versions more frequently.
  We recently lost our only project sponsor, so please consider joining the Sponsor tier on Patreon if that is within your means. We will link to your website with your logo on our front page and readme file. Our website got around 7 million unique hits in the last month.
  Full changelog:
  General
  - Added support for webp thumbnail images, see the Knowledge Base article https://support.universalmediaserver.com/guides/how-to-add-artwork
  - Added option to flatten folder structure to files only (thanks, @kibermaks!)
  - Added Lucene search capabilities for audio files
  - Added automatic thumbnails for Internet playlists
  - Update album art when it is changed on the drive
  - Fixed audio tracks database update failing
  - Fixed letters in episode numbers (e.g. S01E01a) breaking browsing of the parent directory (thanks, @callmepri2003!)
  - Fixed phrasing in attachment instructions (thanks, @sohamsharmadev-svg!)
  - Fixed development workflow on Windows, see the Knowledge Base article https://support.universalmediaserver.com/development/
  Translation updates via Crowdin
