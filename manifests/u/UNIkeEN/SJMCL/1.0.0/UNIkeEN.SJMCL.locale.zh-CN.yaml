ReleaseNotes: |-
  - 🔥 外观更新：
    - 全新设计的窗口标题栏与顶部导航栏，带来优雅、灵动、跨平台一致的视觉体验。#1444 #1446 #1453 #1464 #1482 @UNIkeEN @no6rainer
