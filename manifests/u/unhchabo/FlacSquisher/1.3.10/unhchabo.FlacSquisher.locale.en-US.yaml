ShortDescription: A utility to convert a Flac library to MP3, Opus or Ogg Vorbis format.
Description: >
  FlacSquisher converts a library of Flac files to MP3, Opus, or Ogg Vorbis format, maintaining the
  directory structure in the original library. That way, you can maintain your Flac files for home
  listening, and easily convert them to MP3, Opus, or Ogg format for mobile use, where storage space
  is more often tightly constrained.
