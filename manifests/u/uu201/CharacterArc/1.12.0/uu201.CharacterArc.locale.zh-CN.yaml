ReleaseNotes: |-
  1.12.0 - 2026-06-29
  Added
  - 章节编辑器查找替换：新增 Ctrl+F 唤起的查找浮窗，支持上一个/下一个、区分大小写、单条替换、全部替换；唤起时自动预填当前选中文本，已打开时再次按 Ctrl+F 会用新选区覆盖搜索词。查找浮窗固定在编辑器面板右上角，不再随正文滚动消失
  - 章节编辑器右键菜单：在正文区右键弹出自定义菜单，提供复制、剪切、粘贴、粘贴为纯文本、全选、查找等常用项；优先走 navigator.clipboard API，被拒时自动回退到 execCommand
  - 项目知识库世界状态库：项目知识库页面新增「世界状态库」区块，结构化展示状态补录与写作沉淀产出的角色状态、伏笔、角色关系、时间线、世界规则、倒计时；进入页面与切换项目时自动拉取，状态补录完成后自动刷新，并提供手动刷新按钮；characterId 自动映射为角色名展示，空态引导执行状态补录
  Changed
  - 番茄风向标切换榜单更顺滑：切换男频/女频时改用独立的 switching 态而非全量 loading，仅在内容容器上加渐隐过渡，避免整页骨架闪烁；刷新数据时优先保留当前所选榜单，减少视觉跳变
  - 番茄风向标卡片样式调优：摘要卡片改用 color-mix 混色背景与主题色边框，弱化原渐变的视觉过载，与卡片层级更协调
  Fixed
  - 章节编辑器查找替换若干 bug：
    - 修复匹配数始终显示为 0 的问题（editor.storage 非 Vue 响应式，改用本地 ref + transaction 事件同步）
    - 修复上一个/下一个不滚动到匹配位置的问题（用 coordsAtPos 精确定位匹配字符，手动平滑滚动编辑器容器）
    - 修复点击「替换」抛出 Applying a mismatched transaction 的问题（替换命令改用 TipTap 注入的 tr.insertText，避免 chain 与外部 dispatch 时序冲突）
    - 修复关闭搜索浮窗时编辑器跳回顶部的问题（清空命令 dispatch 前后保存并还原 scrollTop）
  - 公告远程拉取仍展示旧缓存：成功拉取但内容比本地兜底更旧时不再视为最新，改为 fallback 走本地公告判定 new / error 状态，避免发版后还反复弹出过期内容；同步修正 v1.6.0 历史公告中被错误剥离的书名号
