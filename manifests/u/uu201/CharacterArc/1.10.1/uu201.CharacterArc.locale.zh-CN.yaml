ReleaseNotes: |-
  1.10.1 - 2026-06-21
  Added
  - API 高级采样参数：设置页新增 temperature 和 top-p 控制，支持手动调节模型生成的随机性与采样范围
  Changed
  - AI 单次任务输出上限统一提升：applyReasoningSafeFloor 兜底 token 从 8000 提升至 26000，避免结构化结果被截断
  - 开发服务器端口自动选择：electron-vite dev 端口改为自动分配，避免端口冲突导致启动失败
  - 跨平台 CI 发布流水线：新增 macOS、Windows、Linux 三平台自动构建与发布工作流
  Fixed
  - AI 生成占位符校验失败：修复角色/组织 AI 生成时模型返回占位符文本导致结构化结果校验不通过
  - 组织头像徽章文字对比度：组织势力列表中头像首字母改为浅色底 + 原色文字方案，修复深色背景下文字看不清的问题
