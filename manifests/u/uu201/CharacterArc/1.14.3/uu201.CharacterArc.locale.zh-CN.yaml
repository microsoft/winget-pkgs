ReleaseNotes: |-
  1.14.3 - 2026-07-20
  Added
  - 标题栏深色模式切换：应用标题栏新增太阳 / 月亮图标按钮，可在任意页面快速切换深色与浅色模式，并沿用现有设置持久化
  Changed
  - 深色模式切换性能：标题栏切换只保存轻量应用设置，不再触发完整作品序列化、工作区同步与全量保存；同时合并重复主题变量绑定并抑制切换帧中的批量颜色过渡
  - 作品概览布局：移除大块主卡片和重复小卡片，改为作品信息、当前章节、创作数据带与重点内容列表组成的紧凑单页布局
  - 新建作品向导：移除左侧宣传区、重复项目摘要、简介提示卡和创建结果说明，统一为顶部步骤导航、单栏表单与固定底部操作区
  - 项目展示截图：更新项目中心、作品概览、章节创作与剧情线等文档截图，使展示内容与当前界面保持一致
  Fixed
  - 安装包项目归档导入：项目归档共享模块改为仅在主进程导出时延迟加载 Electron，避免安装包中的 Node worker 启动时因无法解析 electron 模块而导入失败
