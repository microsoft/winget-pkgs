Description: |-
  Untis ist die Komplettlösung für Stundenplanung, digitales Klassenbuch und Schulkommunikation
  - Digitales Klassenbuch und Sprechtage: Unterricht und Schultermine einfach online organisieren
  - Stunden- und Vertretungsplanung: Professionell erstellte Stundenpläne für alle Schularten
  - Schulkommunikation: Einfache Zusammenarbeit zwischen Lehrkräften, Eltern und Schüler*innen
Tags:
- bildung
ReleaseNotes: |-
  Verbesserungen/Änderungen:
  - Bei Verwendung der Funktion “Verfremden” wird nun eine erklärende Meldung angezeigt. (UN-7894)
  - Im XSD der allgemeinen XML-Schnittstelle wurden bei den Lehrkräften neue Felder für Eintrittsdatum, Austrittsdatum und die Stammschule hinzugefügt. (UN-9330)
  - In der Totaloptimierung werden nun zusätzliche Validierungsfehler angezeigt. (UN-9245)
  - Österreich: Anrechnungen werden nun im MDL-Blatt dargestellt. (UN-9067)
  - Mecklenburg-Vorpommern: Eine Schnittstelle zu SIP wurde implementiert. (UN-9288)
  - LUSD Hessen: Die verfügbaren Kursoptionen und Kursarten wurden erweitert. (UN-9393)
  Bug Fixes:
  - Abstürze:
    - In der Vertretungsplanung konnte es beim Ändern des Datums zu einem Absturz kommen. (UN-9357)
    - Bei Verwendung der Vorziehungen im Vertretungsvorschlag konnte ein Absturz auftreten. (UN-9380)
    - Bei der Stundenplanoptimierung mit Doppelstunden konnte es in der x64-Version zu Abstürzen kommen. (OPT-2651)
  - WebUntis: Eine Raumänderung konnte zu einer offenen Vertretung in Untis führen, obwohl sie zuvor geregelt war. (UN-9377)
  - Vertretungsplanung: Bei parallel liegenden Kursen konnte nicht ein einzelner dieser Kurse manuell auf Entfall gesetzt werden. (UN-9397)
  - Österreich:
    - Beim Monatswechsel in der MDL-Abrechnung konnte die Anzahl der ausgewählten Lehrkräfte falsch angezeigt werden. (UN-8886)
    - Die Schulbilanz konnte falsch sein, wenn zuvor Unterrichte gelöscht wurden. (UN-9803)
  - Wenn eine Lehrkraft zusätzlich zu einer Klausur in eine Betreuung eingetragen wurde, konnte ein irreführender Hinweis erscheinen. (UN-9404)
  - Bei Verlegungen wurde unter Umständen Meldung über kollidierende Klausuren angezeigt, obwohl keine Klausuren geplant waren. (UN-5565)
  - In der Stundenliste der Studenten kann nun im Seitenlayout eine Überschrift für jedes Element angezeigt werden. (UN-6087)
  - Es wurde ein Fehler behoben, durch den ausgeblendete Meldungen fälschlicherweise erneut angezeigt wurden. (UN-7419)
  - Das Einstellen der Sprache “Serbisch” hatte keine Auswirkung. (UN-9043)
  - Beim Öffnen einer Datei konnte fälschlicherweise eine Meldung zu unterschiedlichen Dislozierungskennzeichen angezeigt werden. (UN-9085)
  - Das Fenster "Totaloptimierung" konnte nicht mit der Strg-Taste in die Mitte des Bildschirms zurückgeholt werden. (UN-9219)
  - Beim Anpassen von Sondereinsätzen wird nun die Schülergruppe angezeigt, sofern eine eingetragen wurde. (UN-9317)
  - Nach dem Ausführen eines Importes werden nun alle zuvor geöffneten Fenster wieder angezeigt. (UN-9384)
  - Beim XML-Import wurde fälschlicherweise die “Id” anstelle des Fremdschlüssels als identifizierendes Merkmal verwendet. (UN-9435)
