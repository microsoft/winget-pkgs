ShortDescription: The Eden Nintendo Switch Emulator.
Description: |-
  Eden is a free and open-source (FOSS) Switch 1 emulator, derived from Yuzu and Sudachi - started by developer Camille LaVey. It's written in C++ with portability in mind, with builds for Windows, Linux, macOS, Android, FreeBSD and more.

  Use the MSVC build if you encounter graphical issues on other builds.
