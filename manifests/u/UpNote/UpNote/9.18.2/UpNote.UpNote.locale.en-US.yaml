ReleaseNotes: |-
  - New: You can now complete a to-do item and move it to the bottom of the list. This setting can be enabled in Settings → Editor → Move completed to-do items to the bottom.
  - Fixed an issue where clicking a linked note in the info panel did not navigate correctly if the note was in another workspace.
  - Improved formatting when block quotes and code blocks are used inside lists.
  - Improved performance when editing notes with many collapsible sections.
  - Improved reliability when editing and saving attachments.
  - Improved expand/collapse all sections to preserve the cursor position when possible.
