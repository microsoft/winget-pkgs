ReleaseNotes: |-
  OpenCPN 5.14.0 Released
  8 April, 2026
  FOR IMMEDIATE RELEASE
  The OpenCPN Development Team is proud to announce the release of OpenCPN Version 5.14.0.
  OpenCPN Version 5.14.0 is available for immediate download.
  This version is a service/maintenance release of OpenCPN.
  OpenCPN is a cross platform electronic navigation system (ECS) supporting a variety of cartography standards and hardware interface protocols. Versions are available for linux, Windows, Raspberry Pi, and MacOS computer architectures.
  Some features of OpenCPN include:
  Quilted Raster(RNC) and Vector(ENC) digital chart display.
  Support for MBTiles photo and geographical chart overlays.
  Industry standard GPS receiver interfacing, with "moving map" on-screen vessel tracking.
  AIS receiver interfacing with configurable target safety monitoring.
  Integrated Route, Track, and Waypoint database, with industry standard Import/Export capabilities.
  Tide and Current prediction, with on-screen overlay of predicted data.
  Broad International Language support.
  PlugIn architecture allowing on-going third-party functional enhancements.
  OpenCPN is released under the GPLV2 license. The executable program and its source code are available for immediate, free, and unlimited download from github.com.
  OpenCPN Version 5.14. series contains many new features and enhanced functions.
  New and upgraded features and capabilites:
  -Allow NMEA0183 sentences without Checksum.
  -Introduce and implement Plugin API 1.21 for multi functional plugin handling.
  -Correct fault in GPX file import with file name containing UTF-8 chars, Android.
  -DataMonitor: Filter selection bugfix and several feature updates.
  -DataMonitor: Add capability to replay DM recordings using the VDR plugin
  -Improve ENC sounding rendering performance.
  -Correct auto-follow behavior and other handling on touch screen interface.
  -Enable MMSI Properties dialog in options->ships for Android.
  -Refine the selection method for quilted charts.
  -Add N0183 sentence $xxTHS for true heading.
  -Fix RangeRingColours for Isolated Marks.
  -Improve tide station window.
  -Enable selection of tide/current graph by double-click.
  -Add tidal currents for the Baltic and North Sea.
  -Add Ticon tidal database for extended tide station support, including Mediterranean Sea.
  -Correct AIS ATON icon rendering logic.
  -Add a search ship name function to the AIS target list.
  -Refactor tooltips for the chart canvas.
  -Fix input of negative latitudes / longitudes.
  -Implement delayed AIS alert dialog and sound effect to reduce disruptive false alerts.
  -Improve AIS Alert deferral logic on repeated alerts
  -Streamline the rebuilding of the chart database
  -Remove deprecated option for COG/SOG estimation from position fixes
  -Correct AIS Query handling of message 14 Safety Broadcast Message
  We hope you enjoy the new features of OpenCPN Version 5.14.0, and look forward to your continued feedback.
  For Download links, plugins, documentation, and other useful information, visit our support website at:
  https://opencpn.org/
  The OpenCPN Development Team
  Dave Register, Lead Developer
