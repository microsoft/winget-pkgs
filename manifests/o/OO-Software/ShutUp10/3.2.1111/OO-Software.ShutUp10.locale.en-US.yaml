ShortDescription: O&O ShutUp10 is the free, portable antispy tool for Windows 10 and 11 that lets you control privacy, telemetry and AI data settings from a single interface.
Description: O&O ShutUp10 gives you full control over the privacy settings of Windows 10 and 11 from one clear interface with guided recommendations. You can disable telemetry, data collection, location services, advertising IDs and the data sharing of the latest Windows AI and cloud features. The free edition is portable and requires no installation. Version 3 was rebuilt on a modernized interface and adds controls for new Windows AI functions. Settings applied with the free edition can be reverted by Windows updates - the Premium edition adds automatic enforcement.
