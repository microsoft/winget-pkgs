ShortDescription: O&O ShutUp10 ist das kostenlose, portable Antispy-Tool für Windows 10 und 11, mit dem sich Privatsphäre-, Telemetrie- und KI-Dateneinstellungen zentral steuern lassen.
Description: O&O ShutUp10 gibt Ihnen über eine übersichtliche Oberfläche mit Empfehlungen die volle Kontrolle über die Privatsphäre-Einstellungen von Windows 10 und 11. Sie können Telemetrie, Datensammlung, Standortdienste, Werbe-IDs und die Datenweitergabe der neuen Windows-KI- und Cloud-Funktionen deaktivieren. Die kostenlose Edition ist portabel und erfordert keine Installation. Version 3 wurde mit einer modernisierten Oberfläche neu aufgebaut und ergänzt Steuerungen für neue Windows-KI-Funktionen. Mit der kostenlosen Edition gesetzte Einstellungen können durch Windows-Updates zurückgesetzt werden - die Premium-Edition ergänzt die automatische Durchsetzung.
