  - net: Honor proxy settings when uploading to 115/115 Open/PikPak OSS - by @Copilot and jyxjjj in https://github.com/OpenListTeam/OpenList/issues/2222 (f3428)
  - offline_download: Prevent infinite retry on status update failure - by @sdvcrx in https://github.com/OpenListTeam/OpenList/issues/2294 (12c9b)
  - server: Add missing return after error responses - by @Lanfei in https://github.com/OpenListTeam/OpenList/issues/2150 (9a2ba)
