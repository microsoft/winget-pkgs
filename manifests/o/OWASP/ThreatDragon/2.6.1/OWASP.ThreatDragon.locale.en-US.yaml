ReleaseNotes: |-
  What's Changed
  The main changes are two bug fixes:
  Desktop: CTRL-S in diagram editor does not save changes in spite of UI feedback
  PDF report generation of version 1.x models freezes the application
  Web application
  The web application is provided as a .tar.gz file or a .zip file
  along with SBOMs.
  Docker containers
  The docker images are available from Dockerhub:
  - For X86 platforms pull the image: docker pull --platform linux/x86_64 owasp/threat-dragon:v2.6.1
  - Alternatively for ARM64 platforms: docker pull --platform linux/arm64 owasp/threat-dragon:v2.6.1-arm64
