ReleaseNotes: |-
  Version 2.24.1 of SHOTPlus™ Tunnel, first offered to users on Tuesday, 16th June 2026.
  A notification will appear on start-up in SHOTPlus™ Tunnel

  For further information on updating SHOTPlus™, please contact the BlastIQ™ Support Team via support.blastiq.com.

  Important
  Product Database Migration
  This update will include changes affecting backwards compatibility.
  SHOTPlus™ Tunnel is being migrated to the BlastIQ™ product database, where products will be managed through the BlastIQ™ admin portal. Users will be able to access products by:
  - Utilising a product list filtered by country (called country lists), or
  - Utilising a product list associated with a BlastIQ™ site (called site lists).
  What does this mean for all users:
  - Users will be required to log in to BlastIQ™ to select their country or their site and load their product list.
  - During the migration period, SHOTPlus™ Tunnel will prompt users to resolve product conflicts in existing files, where they will select supported products to replace unsupported products.
  - There have been some changes to the user interface to facilitate these changes.
  The majority of these changes will affect users during the transition period. Once usage of SHOTPlus™ Tunnel replaces older versions, the requirement to address unsupported products should cease.
  Due to the above compatibility issues it is recommended that updates of SHOTPlus™ Tunnel are completed for all users, as soon as possible.
  Files created in SHOTPlus™ Tunnel 2.24.1 or greater will not be readable by older versions of SHOTPlus™ Tunnel.
  More information can be found here.

  New
  1. Users will be prompted to read and accept an End Users License Agreement, which replaces the Customer Experience Improvement Program agreement.
  2. Unsupported product names will be highlighted with a light red background and have a red cross icon.1
  3. Users will be prompted to select a country upon install, and will be able to switch countries via Edit > Available Resources > Change product list source.
  4. Users can now set BlastIQ™ site and resources via Tools > Products > Set site and resources from BlastIQ™.
  5. Users must log in to BlastIQ™ to retrieve either a country or site product list.
  6. Users can locally cache a BlastIQ™ product list for use in an offline environment.2
  7. New blank files will default to a country product list, until a BlastIQ™ site list is specified.
  8. Users have access to a tool to resolve product conflicts within SHOTPlus™.3
  9. Loading visualisation colours will default to BlastIQ™ display colours.4
  10. SHOTPlus™ Tunnel will automatically renew license activations.5
  11. Legacy browser support has been removed for BlastIQ™ Login Services.
  Information
  1. This will be present in a number of locations such as the hole table, loading visualisations, hole dialog boxes.
  2. To be able to access the cached list in an offline environment, users must log in to BlastIQ™ at least once prior. For more information, please refer to the "Instructions: Offline method" in this article.
  3. For more information about unsupported products and the product swap tool, please refer to this article.
  4. Users can toggle between BlastIQ™ colours or a custom colour palette for loading visualisations in the "Loading visualisation options" menu in "Blast Properties".
  5. SHOTPlus™ Tunnel will renew activations when users interact with BlastIQ™ including retrieving a product list from BlastIQ™.

  Improved
  1. Loading large files has been optimised to improve file loading times.
  2. License certificate handling has been improved.
  3. Fast Reports package has been updated.

  Fixed
  1. The wait cursor was not appearing consistently while background tasks were occurring.
  2. Importing Sandvik IREDES files was causing an error.
  3. SHOTPlus™ Underground was not creating all necessary folders on install, preventing users from selecting a BlastIQ™ site.
  4. Filtering on initiation product lists was case sensitive.
  5. Initiators were not persisting on file re-open.
  6. Due to a code inconsistency, some files were opening as blank.
  7. Detonators were incorrectly flagging as short.
  8. WebGen™ detonators were displaying a length.
  9. Users were unable to print reports in the EBS Firing Summary.
  10. Some WebGen™ 200 products were unavailable for product mapping during the Text Import process.
  11. In some instances, WebGen™ products were not being handled appropriately throughout the application.
  12. Applying loading was incorrectly causing EBS lead lengths to accumulate.
  13. Users were able to customise the main menu, which could cause it to disappear from view.
  14. User-defined delays in tie tool causing an unhandled exception.

  Deprecated
  1. The "Read fresh data from database" option in Tools > Products has been removed.
  2. "Load scheme" and "Save scheme" have been removed from the product list dialog box.
  3. Drilling costs have been deprecated from Project Costs.
  4. The AVI recording feature has been deprecated and removed from the toolbar, Project Overview, Breakout Visualisation, and Timing Visualisation tools. This decision was made due to the feature's age, instability, and the widespread availability of more robust screen recording solutions.
  5. The NCVIB server page in Program Settings has been removed as it referred to retired and inactive servers.
