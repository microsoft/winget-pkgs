ReleaseNotes: |-
  What's New in WebLogic Remote Console 3.0.4
  WebLogic Remote Console 3.0.4 continues to build on the changes first introduced in WebLogic Remote Console 3.0.0.
  NOTE: Occasionally, WebLogic Remote Console may be affected by security vulnerabilities, either directly or indirectly through WebLogic Server. To maintain the security of your systems, you should install the latest Desktop WebLogic Remote Console, or if you are using Hosted WebLogic Remote Console, install the latest applicable Critical Patch Update (CPU) or Critical Security Patch Update (CSPU) for WebLogic Server. For more information and a list of products affected in the latest patch, see Oracle Critical Security Patch Update Advisory - June 2026.
  Bug Fixes
  - Fixed issue where the JNDI Names column (in the Data Sources Summary table) was blank.
  - Fixed issue in Hosted WebLogic Remote Console where users could not delete certain items, including installed applications.
  - Fixed issue where users who were assigned the Deployer role could not test JDBC data sources.
