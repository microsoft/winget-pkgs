ReleaseNotes: |-
  What's New in WebLogic Remote Console 3.0.5
  - Added a log out confirmation dialog window when logging out of Hosted WebLogic Remote Console.
  - Improved the user and group policy UI for editing single-predicate conditions.
  Bug Fixes
  - Fixed behavior where Select All checkboxes would select all items but would not deselect items on the subsequent click.
  - Table customizations are persistent again. Addresses #90.
  NOTE: Occasionally, WebLogic Remote Console may be affected by security vulnerabilities, either directly or indirectly through WebLogic Server. To maintain the security of your systems, you should install the latest Desktop WebLogic Remote Console, or if you are using Hosted WebLogic Remote Console, install the latest applicable Critical Patch Update (CPU) or Critical Security Patch Update (CSPU) for WebLogic Server. For more information and a list of products affected in the latest patch, see Oracle Critical Security Patch Update Advisory - July 2026.
