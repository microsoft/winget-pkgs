ShortDescription: A clean, modern utility to back up and restore your Windhawk configuration and mods.
Description: >
  A modern, lightweight WPF utility to backup, review, and restore Windhawk mods, compiled engine
  binaries, and registry configurations with a native Windows 11 Fluent Design interface.
ReleaseNotes: |-
  # Release v1.0.0

  We are excited to release the initial stable version of Windhawk Backup Manager! This release brings
  a complete UI overhaul and bulletproof backend logic to make managing your Windhawk environment
  effortless.

  ### Key Features

  - Registry-Driven Listing: Pulls exact active mods straight from the registry without duplicates.
  - Smart Source Backup: Automatically selectively targets and backs up local mod source files (ModsSource).
  - Precision Binary Export: Bundles compiled engine binaries mapped accurately via LibraryFileName.
  - Fluent Design UI: WinUI3 style toggle switches, modern scrollbars, and dynamic mode transitions.
  - Safe Execution: Temporarily manages Windhawk service states to prevent file locking issues.
  - Theme Engine: Auto-detects System Light/Dark mode with native Win11 DWM titlebar styling.

  ### Downloads

  - Windhawk_Backup_Manager.exe (Recommended for direct execution)
  - Windhawk_Backup_Manager.ps1 (For script enthusiasts)

  --------------------

  Created by @osmanonurkoc
