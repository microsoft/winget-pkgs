ShortDescription: In-game overlay to supervise AI coding agents while you play.
Description: >-
  AFKode is an in-game overlay terminal for supervising AI coding agents
  (Claude Code, OpenCode, Codex) without leaving your game. Global hotkeys,
  a mini-HUD status pill with real agent state, hotkey approvals, a prompt
  palette, in-match do-not-disturb with a between-matches inbox, and
  agent-aware notifications. Built with Tauri and xterm.js for near-zero
  FPS impact.
