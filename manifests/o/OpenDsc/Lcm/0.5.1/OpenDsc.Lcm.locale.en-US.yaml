ShortDescription: A cross-platform Local Configuration Manager (LCM) service for continuous DSC monitoring and remediation.
Description: |-
  The OpenDsc Local Configuration Manager (LCM) is a cross-platform background service that continuously monitors and optionally remediates DSC configurations. It supports Monitor mode for detecting drift from desired state and Remediate mode for automatically applying corrections. The LCM also supports pull mode, allowing it to download configurations from the OpenDsc Pull Server with automatic updates, API key rotation, and compliance reporting.
