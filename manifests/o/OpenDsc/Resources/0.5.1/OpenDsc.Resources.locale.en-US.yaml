ShortDescription: A comprehensive set of built-in DSC resources for Windows and cross-platform management.
Description: |-
  OpenDsc Resources provides a comprehensive set of built-in DSC v3 resources for managing Windows and cross-platform systems. Includes resources for managing environment variables, local groups, services, scheduled tasks, user accounts, user rights, shortcuts, optional features, security policies, file system ACLs, SQL Server, files, directories, symbolic links, JSON values, XML elements, and ZIP archives.
