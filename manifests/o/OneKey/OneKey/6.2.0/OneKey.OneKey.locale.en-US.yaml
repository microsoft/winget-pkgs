ReleaseNotes: |-
  ✨ New Features
  - Added quick transfer options for faster transfers
  - Referral now supports custom invite codes
  - Added batch transfers with many-to-one and many-to-many support
  - Added AI-powered webpage translation to the built-in browser
  - Keyless Wallet now supports cloud sync
  - Added the Houdini cross-chain route to Swap
  - Added a network selector and token category filter to the Market homepage
  - Added profit and loss data to Market holdings
  - Added quick switching and search to the Market token details page
  - Added protocol switching to the DeFi recommendations section
  💎 Improvements
  - Enhanced Market performance, aligned the trade confirmation page with the Swap experience, and added a weekly option to candlestick chart quick filters
  - Enhanced the built-in browser experience with improved Pin tab interactions, dApp timeout prompts, and support for displaying unlisted dApp information in browsing history
  - Enhanced the Perps trading experience with a Help Center entry, zoom support for TradingView charts, layout refinements, and Unified Account enabled by default
  - Updated the Prime Paywall popup to display the subscription button directly and streamlined the sign-in flow
  - DeFi now automatically reserves gas fees when "Max" is selected for native tokens
  - Improved the desktop transaction history list
  - Removed the automatic biometric prompt from the extension unlock page
  - Delivered additional security improvements
  🐞 Bug Fixes
  - Fixed insufficient liquidity issues affecting stock tokens in Market
  - Fixed slow rendering of the BTC native token in Market
  - Fixed the Perps share popup incorrectly appearing outside the contracts module
  - Fixed an issue where desktop mode did not work for dApps on mobile
  - Fixed an issue causing video NFTs to auto-play when switching history tabs
  ✨ 新功能
  - 新增转账快捷选项，提升发送效率
  - 返佣功能支持自助自定义邀请码
  - 新增批量转账，支持多对一与多对多模式
  - 内置浏览器新增 AI 网页翻译功能
  - Keyless 钱包现已支持云端同步
  - Swap 新增 Houdini 跨链渠道
  - Market 首页新增网络选择器与代币分类筛选
  - Market 持仓页新增盈亏数据展示
  - Market 币种详情页支持快捷切换与搜索
  - DeFi 推荐区新增协议切换功能
  💎 改进
  - 优化 Market 性能；交易确认页体验与 Swap 对齐；K 线快捷时间新增周线选项
  - 优化内置浏览器体验，包括 Pin 标签交互、dApp 页面超时提示，以及历史记录展示未收录 DApp 信息
  - 优化 Perps 合约交易体验，包括新增帮助中心入口、TV 图表支持缩放、页面布局调整，以及默认统一账户
  - Prime Paywall 弹窗现可直接展示订阅按钮，优化登录引导流程
  - DeFi 主币点击"最大值"时将自动预留手续费
  - 优化桌面端交易历史列表展示与使用体验
  - 插件解锁页取消生物识别自动弹出
  - 多项安全体验优化
  🐞 问题修复
  - 修复 Market 股票代币流动性不足的问题
  - 修复 Market 中 BTC 主币渲染缓慢的问题
  - 修复 Perps 分享弹窗在非合约模块中错误弹出的问题
  - 修复移动端 dApp 桌面模式无效的问题
  - 修复切换历史记录时视频 NFT 自动播放的问题
