ReleaseNotes: |-
  ✨ New Features
  - Global search now supports settings
  - Added Exodus as a new Swap provider
  - Market watchlist now supports long-press actions and displays Perps assets
  - Borrow now supports direct repayment with collateral
  - Added support for Pendle PT in Earn
  - Added fee structure details to Perps
  - Perps order confirmation page now shows estimated savings
  💎 Improvements
  - Renamed Ripple to XRP Ledger
  - Optimized the exchange deposit flow
  - Optimized the token detail page by adding swap functionality and consolidating buy/sell entry points
  - Market: improved price change indicators and updated search results to a table layout
  - Market: updated the trending tokens list
  - Market: improved vertical scrolling on detail pages
  - Perps: enabling trading no longer requires repeated password entry
  - Perps: charts now save indicator and timezone settings
  - Added a sign-up option to the login dialog
  - Improved the tab-switching gesture on the Discover page
  🐞 Bug Fixes
  - Fixed an issue where hardware refund orders showed an incorrect status
  - Fixed a brief white screen when creating a wallet in the browser extension
  - Fixed an issue where the Android back button could exit the transfer flow
  - Fixed an issue where Perps deposits did not show Pending status
  - Fixed occasional K-line data sync issues in Perps
  - Fixed an issue where enabling trading on web still required setting a password in Perps
  - Fixed an issue where tabs could be hidden after resetting the app
  - Fixed a crash when creating a Keyless wallet on Android
  - Fixed an issue where the iOS theme did not follow system settings
  - Fixed overlapping content when switching fiat or language settings on web
  - Fixed an issue where the Market list on mobile would scroll back to the top after refresh
  - Fixed an issue where the third-party wallet connection popup did not close after a successful retry on web
  ✨ 新功能
  - 通用搜索支持搜索设置项
  - Swap 新增 Exodus 渠道
  - Market 观察列表新增长按快捷操作，并支持展示 Perps 资产
  - Borrow 支持直接使用抵押品还款
  - Earn 新增 Pendle PT 支持
  - Perps 新增费率结构说明
  - Perps 下单确认页新增预计节省金额展示
  💎 优化
  - Ripple 更名为 XRP Ledger
  - 优化交易所存入流程
  - 优化币种详情页，新增兑换功能并整合出入金入口
  - Market 优化涨跌幅背景色标识，搜索结果改为表格样式
  - Market 更新热门代币列表
  - Market 提升详情页纵向滑动体验
  - Perps 启用交易时无需重复输入密码
  - Perps 图表支持保存技术指标和时区设置
  - 登录弹窗新增注册入口
  - 优化发现页滑动切换 Tab 的体验
  🐞 问题修复
  - 修复硬件退款订单状态显示错误的问题
  - 修复浏览器扩展创建钱包时短暂白屏的问题
  - 修复安卓返回键在传输页面退出流程的问题
  - 修复 Perps 充值状态未显示 Pending 的问题
  - 修复 Perps 偶现 K 线数据不同步的问题
  - 修复 Perps 在 Web 端启用交易时仍要求设置密码的问题
  - 修复重置 App 后 Tab 被隐藏的问题
  - 修复安卓 Keyless 钱包创建时崩溃的问题
  - 修复 iOS 主题未跟随系统设置的问题
  - 修复 Web 端切换法币或语言设置时内容重叠的问题
  - 修复 Market 移动端刷新列表后自动回到顶部的问题
  - 修复 Web 端连接第三方钱包重试成功后弹窗未关闭的问题
