ReleaseNotes: |-
  ✨ New Features
  - Added support for connecting Ledger hardware wallets
  - Perps now supports Spot trading mode and more flexible chart-based order placement
  - Added Gas Account fee sponsorship
  - Added wallet overview and transaction notifications to the macOS menu bar
  - Added more cross-chain providers in Swap
  - Market now supports custom trade presets, token categories, liquidity pool info, and more BTC data
  - Added Bitrefill Widget for purchasing gift cards directly in the app
  💎 Improvements
  - Significantly improved mobile startup performance
  - Improved the onboarding flow and Browser search experience
  - Improved Market transaction history, asset price coverage, and address display when receiving from other exchanges
  - Streamlined the Perps trading enablement flow
  🐞 Bug Fixes
  - Fixed an issue where Perps chart data could pause
  - Fixed an issue where Linux clients could not fall back to manual installation after an upgrade failure
  - Fixed an issue where All Networks data on desktop did not refresh in time after cross-device transactions
  ✨ 新功能
  - 支持连接 Ledger 硬件钱包
  - Perps 新增现货交易模式，并支持更灵活的图表下单
  - 新增 Gas Account 手续费赞助功能
  - macOS 新增菜单栏钱包概览与交易通知
  - Swap 新增更多跨链交易渠道
  - Market 新增自定义交易设置、代币分类入口、流动性池信息与更多 BTC 数据
  - 新增 Bitrefill Widget，支持应用内购买礼品卡
  💎 改进
  - 大幅优化移动端启动性能
  - 优化新手引导与 Browser 搜索体验
  - 优化 Market 交易历史、资产价格与收款地址展示
  - 简化 Perps 交易启用流程
  🐞 问题修复
  - 修复 Perps 图表数据暂停的问题
  - 修复 Linux 客户端升级失败后的安装问题
  - 修复跨设备交易后桌面端数据未及时刷新的问题
