ReleaseNotes: |-
  ✨ New Features
  - Added Private Send, allowing assets to be sent privately through third-party providers at fixed rates
  - Added candlestick charts in Swap, so token trends can be viewed during token selection
  - Added Scale/TWAP advanced orders for spot and perps, automatically splitting large orders to help reduce slippage
  - Added KYT risk monitoring for Prime incoming transfers, helping identify source-of-funds risks for supported assets after receipt, including high-risk sources, sanctions exposure, and mixer-related activity
  - Added support for installing apps on Ledger devices
  💎 Improvements
  - Added HiFi as a Swap aggregator, and added estimated arrival times for Swap and Private Send providers
  - BTC can now automatically switch to a funded derivation address type
  - History now uses time-based pagination for faster loading
  - Improved Receive, Send, and global search for more consistent results, with empty result tabs hidden
  - Markets now highlights the on-chain Stocks section, with new stock data and gain/loss sorting
  - Improved cold-start performance for Perps and Swap; Perps portfolios now include spot data
  - Added one-click custom EVM network import from Chainlist with automatic field completion
  🐞 Bug Fixes
  - Hardened the private key display page with screenshot blocking, screen-recording protection, and background blur on iOS and Android
  - Removed unnecessary permissions such as microphone access on iOS and Android
  - Fixed sensitive response caching on iOS, desktop WebView permission handling, and external link allowlist issues
  - Fixed connection issues with some dApps, including Stargate.finance
  - Fixed ERC-681 token transfer amount parsing
  - Fixed an issue where the network selector could still show outdated balances after asset updates
  - Fixed background page jumping when creating a new tab from the built-in browser sidebar
  - Fixed an issue where Perps data could fail to load for about 15 minutes after reconnecting from a network interruption
  ✨ 新功能
  - 新增「隐私发送」，支持通过第三方服务商按固定汇率私密发送资产
  - Swap 支持 K 线行情，选币时可查看代币走势
  - 新增 Scale/TWAP 高级订单，支持现货与合约自动拆分大额订单，降低滑点
  - Prime 收款新增 KYT 风险监控，可在支持资产入账后检测资金来源风险，帮助识别高风险来源、制裁或混币关联风险
  - 支持为 Ledger 设备安装应用
  💎 改进
  - Swap 新增聚合服务商 HiFi，并支持显示 Swap 与「隐私发送」服务商预计到账时间
  - BTC 可自动切换到余额充足的派生地址类型
  - 历史记录改为按时间分页加载，速度更快
  - 优化接收、发送与全局搜索，结果更一致，并隐藏无结果标签页
  - 行情突出链上股票 Stocks 板块，新增股票数据与涨跌幅排序
  - 优化 Perps 与 Swap 冷启动速度，Perps 资产组合新增现货数据
  - 支持从 Chainlist 一键添加自定义 EVM 网络，并自动填充字段
  🐞 问题修复
  - 加固私钥展示页，支持 iOS/Android 防截屏、防录屏与后台模糊
  - 移除 iOS/Android 非必需的麦克风等权限
  - 修复 iOS 敏感响应缓存、桌面端 WebView 权限与外链白名单问题
  - 修复 Stargate.finance 等部分 dApp 无法连接 OneKey 的问题
  - 修复 ERC-681 代币转账金额解析问题
  - 修复网络选择器资产更新后仍显示旧余额的问题
  - 修复内置浏览器侧边栏新建标签页时背景页面跳动的问题
  - 修复 Perps 断网恢复后约 15 分钟数据不加载的问题
