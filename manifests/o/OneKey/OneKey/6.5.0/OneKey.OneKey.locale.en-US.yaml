ReleaseNotes: |-
  ✨ New Features
  - Added support for Trezor hardware wallets
  - Swap now supports trading tokenized stocks
  - Gas sponsor are now available for select Swap providers
  - Gas sponsor are now available for USDC deposits on Arbitrum in Perps
  - Added "Hot" and "New Listings" market tabs in Perps
  - Place orders directly on TradingView charts in Perps
  - Introduced portfolio margin mode in Perps
  - Added a dedicated Perps (futures) tab in Wallet
  - Quick actions added to DeFi positions for faster operations
  - Bulk transfers now support pasting addresses and amounts from spreadsheets
  - BTC addresses can now be searched by index
  💎 Improvements
  - Swap and Bridge are now unified, enabling seamless same-chain swaps and cross-chain transfers
  - Improved handling for Swap orders stuck in pending status for extended periods
  - Enhanced Perps mobile experience, including positions overview, empty states, UI interactions, and history access
  - USDC deposit status now auto-refreshes
  - Upgraded charting experience with lightweight charts, dashed-area styling, and saved interval preferences
  - Improved transaction status clarity on the transaction details page
  - Optimized performance with large transaction histories to reduce lag
  - Introduced tiered preloading and low-end device optimizations for smoother startup and runtime performance
  - BTC rebate exchange records can now be recovered on the current device
  - Linux desktop now uses WebUSB by default for hardware wallet connections
  🐞 Bug Fixes
  - Fixed an issue where the numeric keyboard did not automatically appear for Swap slippage and preset inputs
  - Fixed an issue where entering a contract from Wallet home favorites did not auto-select the corresponding token
  - Fixed an issue where stock tokens were incorrectly identified as DeFi tokens
  ✨ 新功能
  - 支持连接 Trezor 硬件钱包
  - Swap 现已支持代币化股票交易
  - 部分 Swap 渠道商支持 Gas 补贴
  - Perps 新增「热门」与「新上线」市场分类
  - Perps 支持在 TradingView 图表上直接画线下单
  - Perps 新增组合保证金模式
  - Perps 入金 USDC（Arbitrum）支持 Gas 补贴
  - 钱包新增 Perps（合约）独立入口
  - DeFi 持仓新增快捷操作入口，操作更高效
  - 批量转账支持从表格粘贴地址与金额
  - BTC 支持通过索引快速查找地址
  💎 改进
  - Swap 与 Bridge 已整合，同链兑换与跨链交易一步完成
  - 优化 Swap 长时间 Pending 状态提示
  - 优化 Perps 移动端体验（持仓概览、空状态、交互样式与历史入口）
  - USDC 入金状态支持自动刷新
  - 升级图表体验：新增轻量图表与虚线区域样式，并支持记忆周期设置
  - 优化交易详情页状态展示，更清晰直观
  - 优化海量历史记录场景性能，减少卡顿
  - 引入分级预加载与低端设备适配策略，提升启动与运行流畅度
  - 支持找回 BTC 返佣兑换记录至当前设备
  - Linux 桌面端默认改用 WebUSB 连接硬件钱包
  🐞 问题修复
  - 修复 Swap 滑点与预设输入未自动调起数字键盘的问题
  - 修复从钱包首页收藏进入合约时未自动选中对应代币的问题
  - 修复股票代币被误识别为 DeFi 代币的问题
