ShortDescription: macOS-style screen capture for Windows with drag-and-drop as the primary action.
Description: >-
  wsnap is a native Windows capture tool that makes drag-and-drop the primary action:
  capture a region, get a floating thumbnail, then drag it out as a real file (path in
  terminals, file in Explorer/chat/upload fields) or click to copy the path. Includes a
  minimal editor (arrow/rect/pen/text/mosaic/crop), on-device OCR (KO/EN), region GIF
  recording, scroll capture, and clipboard watch. PerMonitorV2 DPI-correct.
