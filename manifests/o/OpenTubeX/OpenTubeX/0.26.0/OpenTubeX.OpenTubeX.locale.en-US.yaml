ReleaseNotes: |-
  Highlights
  - When in fullscreen you can now throw your cursor in the bottom edges to hit the play/pause and fullscreen button
  - URLs passed in via CLI arguments are now opened in new tabs (#204)
  - Fixed a misalignment of the last updated info when auto-refresh is off
  - Improve performance of opening tabs a bit
  - Settings password is now hashed instead of stored in clear text
  - Support SponsorBlock Hook/Greetings category
  - Auto-refresh subscriptions can now be set per type
  - Opening a new blank tab no longer inherits the color of the currently active one
  - Support submitting SponsorBlock Highlight segments
  - Preserve video title and subtitles during a requested SABR reload
  - You now need to confirm before closing the app by default
  - The Quick Playback Speed Bar can now be customized
  - There is now a custom mini player when scrolling down
  - SponsorBlock labels are now shown when hovering over the seekbar
  - SponsorBlock Highlight is now handled in the player
  - Fixed tab dragging alignment while scrolling on the tab bar
  - New CTRL+(Shift)+Tab switcher
  - UI improvement: cards can now get wider on higher resolution screens (#199)
  - Add a sticky button in the top right of the description to close it
  - Auto-refresh subscriptions are now checked again when you get online again
  - Music videos and live streams are now always played back at 1x speed by default
  - The video category is now shown at the bottom of the description
  - Add a CTRL/CMD+F find bar
