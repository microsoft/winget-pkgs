ReleaseNotes: |-
  Highlights
  - Fix closing tabs with middle mouse button on Windows
  - Improve the appearance of the SABR backoff timer
  - Preserve tab titles while loading and use URL as placeholder instead of "Tab 5" etc
  - Add G player shortcut to toggle between 1x and the last playback speed
  - You can now translate OpenTubeX specific strings with our Weblate
  - OpenTubeX is now offered as a Flatpak
  - Importing subscriptions and watch history from a LibreTube backup is now supported
  - CTRL + R on the subscriptions page now reloads the subscriptions instead of the tab
  - Add an option to auto-refresh subscriptions
