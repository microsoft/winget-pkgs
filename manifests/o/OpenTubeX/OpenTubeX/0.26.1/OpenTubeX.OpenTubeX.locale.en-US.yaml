ReleaseNotes: |-
  Mostly a bug fix release for v0.26.0-beta

  Highlights
  - Tab previews are no longer captured when a tab is loading and now have a fallback to the video thumbnail
  - Support YouTube's collaborators feature
  - Enable middle-click autoscroll on Linux
  - Fixed a flickering issue with the new scroll mini player
  - Fixed a bug where videos would not play with SponsorBlock disabled (#214)
  - Fixed the full window mode making the player go away (#213)
