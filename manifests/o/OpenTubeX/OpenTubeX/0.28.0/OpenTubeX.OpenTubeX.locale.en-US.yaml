ReleaseNotes: |-
  Highlights
  - Fix: Preserve playback speed on SABR reload
  - RSS subscription fetching is no longer enforced with profiles that have more than 125 subscriptions
  - Right-clicking an unloaded tab now reveals an option to load it in the background
  - Fixed a formatting issue with videos that have more than 2 collaborators
  - The changelog of the new version can now show images and formats issue links better
  - Added an option to auto-refresh subscription posts
  - The auto-refresh toast now says which feed it refreshes and shows up on all tabs
  - Support YouTube's end screen annotations feature
  - New Ambient Mode for the player
  - When Auto Load is on comments are now loaded before the player is ready
  - Thumbnail size is now configurable
  - Chapters are now displayed in an overlay on the right in the player
  - The right click copy link options now include the playlist
  - Fixed an issue where all texts could briefly flash as an internal translation key
  - Sleep Timer (#231)
  - The history can now be auto-deleted or you can manually delete old entries (#234)
  - You can now hold the left mouse button or the space bar to double the current playback speed
  - Fast-forward through silence feature (#235)
  - Caption Appearance Controls and preferred locale setting (#232)
  - Improved player buttons with new animated Autoplay and Captions toggles
