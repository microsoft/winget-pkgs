ReleaseNotes: |-
  - Orb-to-Orb testing: configure Orbs to test to other Orbs on linked to your account. Useful for isolating network paths and seeing intra-network performance. Both Orbs must be on version 1.5+ to use this feature.
  - Wi-Fi details now included in-app. See detail view for connection details.
  - Improved performance and data rendering. Note: new app versions are compatible with older sensor versions, but new sensor versions are incompatible with older app versions. Additionally, users will lose 24 hours of history in-app only (data will continue to be available in Orb Cloud). History will begin storing in the new format and be available going forward after update.
  - New UI: designed for increased accessibility and readability.
  - New app settings: 1.) Increase contrast (on by default) displays the new UI with better readability 2.) reduce motion (off by default) disables the responsiveness radar.
  - Users can now continuously monitor networks on Android devices with the app closed or in the background. This feature must be enabled in the app settings.
