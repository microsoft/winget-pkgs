PackageIdentifier: OrbForge.Orb
PackageVersion: 1.5.3.0
PackageLocale: zh-CN
License: 专有软件
ShortDescription: 网络体验平台
Description: |-
  Orb 是一款智能应用程序和平台，旨在帮助您了解并优化您的互联网连接。与仅提供瞬间快照的传统测速不同，Orb 持续监控您的网络，为您提供真实互联网体验的全貌，而不仅仅是峰值速度。

  核心功能
  - 实时监控：Orb 持续监测您的网络连接，提供最新的洞察。
  - 全面指标：追踪互联网连接的响应速度、可靠性和网络速率。
  - 多平台支持：适用于 iOS、Android、macOS 和 Windows。
  - 多种探测器选择：通过个人设备进行监控，或设置专用 Orb 探测器以实现 24/7 全天候监控。
  - 历史数据：查看网络性能随时间变化的趋势和模式。
  - 实用建议：根据检测到的问题接收优化连接的建议。

  Orb 的工作原理
  Orb 通过部署“探测器”来持续监测您的网络连接。探测器可以是：
  1. 您设备上的 Orb 应用：当应用程序运行时，您的手机、平板电脑或电脑可以充当探测器。
  2. 专用设备：为了实现持续监控，您可以设置一台专用设备（如树莓派或备用手机）作为 Orb 探测器 24/7 全天候运行。您可以通过任何 Orb 应用访问该设备的信息。
  这些 Orb 探测器收集有关网络性能的数据并将其发送到 Orb 服务，后台会分析这些信息并通过 Orb 应用为您提供洞察。

  Orb 测量的内容
  Orb 追踪网络性能的三个关键方面：
  - 响应速度：您的网络对请求的响应有多快。
  - 可靠性：您的连接在无中断情况下的工作一致性。
  - 速度：数据在设备间传输的快慢。
  这些指标共同构成了您互联网体验的全面视图。

  Orb 评分
  Orb 测量各种指标并将其归类为 ⚡️响应速度、💎可靠性和 🕕速度，每项满分为 100 分，最后合并为您的综合 Orb 评分。

  Orb 评分标准
  Orb 评分采用 0-100 分制。90 分及以上代表卓越的体验；70 分以下则代表体验较差。
