ReleaseNotes: |-
  Highlights
  Flux v2.9.3 is a patch release. It fixes empty lines vanishing from rendered
  Helm chart manifests, HelmReleases being marked as tested when their Helm test
  hooks never ran, and spec.images entries that set only some image fields
  discarding the remaining fields already declared for the same image in the
  kustomization.yaml. The latter affects both kustomize-controller and the
  flux build|diff kustomization commands. Users are encouraged to upgrade for
  the best experience.
  ℹ️ Please follow the Upgrade Procedure for Flux v2.7+ for a smooth upgrade from Flux v2.6 to the latest version.
  Fixes:
  - Fix empty lines vanishing from rendered chart manifests (helm-controller)
  - Fix HasBeenTested for all corner cases, where a release could be marked as tested although its Helm test hooks never ran (helm-controller)
  - Fix a spec.images entry setting only some of the image fields discarding the remaining fields already declared for the same image in the kustomization.yaml at spec.path, e.g. overriding only newName produced an untagged image reference (kustomize-controller, flux CLI)
  Improvements:
  - Update fluxcd/pkg dependencies
  - Include source-watcher in the OCI flux-manifests artifact

  Components changelog
  - kustomize-controller v1.9.4
  - helm-controller v1.6.3

  CLI changelog
  - [release/v2.9.x] Include source-watcher to oci flux-manifests by @fluxcdbot in #5996
  - Update fluxcd/pkg dependencies by @fluxcdbot in #6006
  - Update toolkit components by @fluxcdbot in #6011
