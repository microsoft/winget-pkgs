ShortDescription: Windows GUI utility to hash files and folders, write sidecar hash files, and export results to CSV.
Description: FileHasher computes cryptographic hashes for individual files or whole folder trees, writes .sha256-style sidecar files, verifies existing sidecars, and exports results to CSV. It can optionally open .msi installer packages read-only and hash the files contained inside them individually. Ships as a signed, self-contained single executable; no .NET runtime install is required.
