  CLI Installation
  npm (Windows, macOS, Linux):
  npm install -g @fluxzy/cli
  Or run directly without installing:
  npx @fluxzy/cli start --llo
  Windows (winget):
  winget install Fluxzy.Fluxzy
  macOS (Homebrew):
  brew tap haga-rak/fluxzy
  brew install fluxzy
