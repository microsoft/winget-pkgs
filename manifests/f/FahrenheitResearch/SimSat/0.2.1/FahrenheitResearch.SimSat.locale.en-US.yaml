ShortDescription: Physically-based simulated satellite imagery from WRF model output - visible true-color, IR, water vapor, GeoColor, Sandwich, and derived fields, with a desktop studio, headless CLI, and Python bindings
Description: 'SimSat Studio - Physically-based simulated satellite imagery from WRF model output. SimSat renders what a geostationary weather satellite would see looking at your WRF run: NASA Blue Marble ground with terrain shadows and seasonal blending, a finite-disk sun with real twilight, volumetric clouds with multiple scattering, Cox-Munk water sun-glint — and synthetic thermal infrared through the same true-Kelvin enhancement pipeline the real GOES/Himawari products use. It ships as a desktop app (simsat_studio, Rust/egui/wgpu), a headless CLI, and a numpy-returning Python binding (import simsat).'
Moniker: simsat-studio
ReleaseNotes: |-
  SimSat v0.2.1
  This release improves terrain illumination, especially around twilight, while preserving the reviewed cloud appearance. It also makes CIMSS Style the recommended Band-13 presentation.
  Highlights
  - Corrected surface sunlight normalization. Removed an unintended second limb-darkening factor from land, water, and glint illumination, bringing surface and cloud solar energy onto the same basis.
  - Better low-sun terrain. The reviewed, tightly gated terrain recovery is enabled for finished visible products from civil twilight through low sun, then returns to exact identity by +12 degrees solar elevation.
  - Slightly brighter reviewed terrain default. Recommended Display and High Quality Visible now use a restrained, surface-only ground_gain=1.10; 1.0 remains the neutral override. Cloud radiance is not scaled by this control.
  - CPU/GPU visual parity. GPU rendering now supports the same post-light terrain controls as CPU rendering instead of disabling them during preview.
  - CIMSS Style is now Recommended for Band 13. Fresh Studio settings, IR product transitions, the Recommended preset, and the headless IR CLI select CIMSS. Natural grayscale and the other analysis palettes remain available.
  - Consistent controls everywhere. Twilight recovery can be enabled, disabled, and tuned in Studio, the CLI, Python, and the Rust API. Existing saved settings are preserved through Studio's normal migration choice.
  - Science data remains unchanged. IR palettes do not alter raw Kelvin values. Raw RGB reflectance, Sensor QA, thermal/derived products, and cloud-only layers retain neutral surface-display behavior.
  Validation
  - Owner-reviewed with the 1974 low-sun case and broader visible cases using the exact Windows executable below.
  - Engine: 568 passed, 2 ignored.
  - Studio: 65/65 passed.
  - Public CI passed Linux formatting, strict Clippy, full tests, Windows/macOS engine builds, and an installed-wheel generated-render smoke.
  - The release-artifact build passed all three Windows Studio, Linux CLI, and manylinux wheel jobs. The exact downloaded wheel rendered a generated 12 x 12 Band-13 scene in WSL; both Linux binaries passed --help, and the tar entries are executable mode 755.
  - Windows FileVersion/ProductVersion: 0.2.1.
