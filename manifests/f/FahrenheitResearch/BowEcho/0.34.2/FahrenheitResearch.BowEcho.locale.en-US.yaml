ShortDescription: Fast, free, native NEXRAD Level II radar viewer — live storm-scale radar in a single small download
Description: 'BowEcho — A fast, free, native NEXRAD Level II radar viewer. Live super-resolution base data, dealiased velocity, dual-pol, derived severe-weather products, synced multi-pane, and vertical cross-sections — in a single small download. BowEcho decodes raw NEXRAD Level II data straight from the public AWS archive and live chunk feed (no account, no API key) and renders it with a fast CPU rasterizer that preserves the native super-resolution pixel pattern. It is built in Rust for speed: products switch instantly, panning stays fluid, and first pixels from a fresh volume arrive in well under a second on typical connections.'
Moniker: bowecho
ReleaseNotes: |-
  BowEcho v0.34.2
  This release adds a full sounding-correction workflow, faster warning
  inspection, broader European alert coverage, and substantial radar, satellite,
  WoFS, and placefile improvements.
  Sounding correction lab
  - Added a separate, resizable, non-destructive correction lab for editable
    model soundings.
  - Correct thermal, moisture, and wind profiles independently, with
    variable-specific depth, domain, and blend shapes, including draggable custom
    profiles.
  - Added visible QC for supersaturation, dry instability, invalid states, and
    wind-seam kinks, plus an optional reversible dry convective adjustment.
  - Sounding plots, parcels, hodographs, and diagnostics update immediately from
    the corrected profile; Reset original restores the untouched source.
  - Save fingerprint-bound projects, export CSV or SPC/SHARPpy RAW, import RAW
    soundings, and run deterministic batch experiments over up to four correction
    fields.
  Warnings and Alerts
  - Clicking warning polygons now opens compact geo-anchored cards with every
    warning at that point, including wind, hail, tornado/damage tags, expiry,
    issuing office, dismiss controls, and links to full details.
  - Added automatic warning-source selection: NWS for operational US radars and
    official MeteoAlarm Atom/CAP feeds for supported European radar countries,
    with manual source and country selection available.
  - MeteoAlarm warnings include severity-aware accents, full details, and
    official CAP links. The anonymous public feeds do not provide polygon
    geometry, so BowEcho presents them honestly as list/detail warnings without
    inventing map placement; historical timeline sync remains NWS-only.
  - SPC mesoscale-discussion map clicks now open Alerts directly, and official MD
    graphics can be opened in a larger scrollable viewer with Fit, 100%, and
    10-400% zoom controls.
  Satellite and WoFS
  - Fixed cached GOES RGB composites bypassing the selected spacecraft or sector,
    which could produce convincing previews but empty map coverage.
  - Fixed inverse-grid indexing on very wide and antimeridian-crossing satellite
    domains so coverage remains reachable across the full frame.
  - Added Center on satellite coverage and clearer messages distinguishing an
    out-of-sector view from a transparent visible-light frame at night.
  - WoFS drapes now continue loading and syncing when the WoFS window is closed.
  - Added accurate ready/loading/unavailable/error states so stale or unvalidated
    frames are never labeled active.
  - Added a high-visibility mode that lifts low-alpha WoFS guidance without
    recoloring, repositioning, or filling transparent pixels.
  Downloaded placefiles
  - Added multi-file import for downloaded local placefiles, including .txt,
    uncommon extensions, and extensionless files.
  - Local sources persist in the Layers list and support the same enable, refresh,
    reload, and remove workflow as URL feeds.
  - Relative local sprite-sheet references resolve beside the placefile, with
    clearer load status and generation-safe refresh handling.
  Radar products and quality of life
  - Replaced abbreviation-heavy product chips with a categorized, full-name
    product browser covering base moments, velocity, volume/hail, dual-pol,
    precipitation, quality, texture, and simulation fields.
  - More products exposes the extended catalog; advanced sweep products
    compute lazily when selected, while KDP remains automatic when its source
    metadata are trustworthy.
  - Added one-click editing for the active radar product's color table under
    Custom > Appearance.
  - Added a sidebar collapse handle, direct Undo for workflow presets, and
    native-resolution sounding-board image capture.
  - Moved loop frame-count selection beside Load Loop for a clearer loading
    workflow.
  DWD radar
  - DWD now prefers quality-controlled polarimetric reflectivity, falls back
    through simpler filtered and raw variants when necessary, and enables
    available ZDR, RhoHV, and PhiDP moments by default.
  - Missing optional dual-pol products no longer prevent the base
    reflectivity/velocity volume from loading.
  Source notice
  European warnings are provided by EUMETNET members through the official
  MeteoAlarm public feeds and are used under
  CC BY 4.0.
