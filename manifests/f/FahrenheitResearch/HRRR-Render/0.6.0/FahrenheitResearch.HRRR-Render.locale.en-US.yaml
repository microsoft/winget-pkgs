ShortDescription: The world's fastest HRRR weather map renderer - Rust CLI tool
Description: The world's fastest HRRR (High Resolution Rapid Refresh) map renderer, written in pure Rust. Downloads HRRR GRIB2 data from NOAA's AWS S3 bucket using byte-range requests, parses GRIB2 format, and renders beautiful weather maps as PNG using rayon parallelism.
Moniker: hrrr-render
ReleaseNotes: |-
  HRRR Viewer v0.6.0
  Interactive HRRR weather model viewer with real-time rendering on Natural Earth base maps.
  What's New
  - Interactive GUI - Pan/zoom map viewer with cursor lat/lon and data readout
  - 55+ weather fields organized by category (Surface, Radar, Severe, Shear, Mesoscale, Moisture, Upper Air, Boundary Layer, Composites)
  - Animation loop - Play through forecast hours with configurable speed and range
  - GIF export - Save animation loops as animated GIFs
  - Frame caching - Previously viewed forecast hours load instantly
  - Run picker - Dropdown with last 24 model cycles
  Severe Weather Parameters
  SB/ML/MU CAPE & CIN, 0-3km CAPE, Lifted Index, SRH (0-1km, 0-3km), Effective Helicity, Critical Angle, Bunkers Storm Motion, Max Updraft Helicity (2-5km, 0-2km, 0-3km), Max Updraft/Downdraft Velocity, Relative Vorticity, Hail Size, Lightning Threat, ESP, and more.
