ShortDescription: 'Self-hosted NOAA Weather Wire Service (NWWS-OI) platform: strict parser, supervised ingest daemon, HTTP API + SSE. Rust core, Python bindings, 19x faster than pyIEM.'
Description: A self-hosted NOAA Weather Wire Service (NWWS-OI) platform in one static binary. Connects to the NWS's lowest-latency public text-product feed, parses every bulletin strictly (WMO headers, AWIPS/PIL, UGC, VTEC/HVTEC, segments, warning tags, polygons, storm motion), dedupes, archives, and serves it all back over a local HTTP API with a live Server-Sent Events stream. Rust core, Python bindings, CLI. NWWS-OI delivers warnings seconds after the WFO hits send — typically well ahead of the public CAP/REST mirrors.
