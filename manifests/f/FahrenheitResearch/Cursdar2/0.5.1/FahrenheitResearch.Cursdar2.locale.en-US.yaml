Description: 'cursdar2 is a CUDA-native NEXRAD workstation focused on fast live Level 2 ingest, responsive 2D/3D radar rendering, archive review, and warning-overlay analysis. It is being built as a standalone successor to cursdar: same GPU-first mentality, much cleaner operator workflow, and a repo that can evolve independently.'
Moniker: cursdar2
ReleaseNotes: |-
  This release ships the live-loop overhaul and compare-pane follow-through work.
  Highlights:
  - Unified bottom live-loop transport bar and scrub timeline
  - Progressive loop loading with newest-first backfill and visible progress states
  - Quad-pane loop playback now follows loop history instead of only current live data
  - Live-loop crash fixes around progressive loading, scrubbing, and view changes
  - Local-history loop refreshes on pan/zoom and product changes
  Known issue:
  - Loop play state does not always carry forward across every tilt/product change yet; that fix is next.
