ShortDescription: Discord bot that sends notifications for Fire Weather Warnings across the US
Description: A Discord bot that automatically sends notifications for fire weather alerts anywhere in the United States. The bot checks the National Weather Service every 60 seconds and posts alerts to your Discord channel with details about the alert type, affected area, severity, and expiration time.
Moniker: ffw-bot
ReleaseNotes: |-
  Download
  Download FireWeatherBot.exe below and double-click to run.
  On first run, it will ask for:
  1. Your Discord Bot Token
  2. Your Discord Channel ID
  Then it starts monitoring for fire weather alerts!
  v1.0.1: Window stays open on errors so you can see what went wrong.
  What it monitors
  - Red Flag Warning
  - Fire Weather Watch
  - Fire Warning
  - Extreme Fire Danger
  Commands
  - /test - Send a test alert
  - /status - Show bot status
  - /active - Show active alerts
  - /check - Manual check for new alerts
