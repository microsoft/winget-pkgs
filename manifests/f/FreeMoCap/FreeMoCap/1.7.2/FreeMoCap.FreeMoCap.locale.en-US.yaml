ReleaseNotes: |-
  Some big updates to our overall calibration pipeline!

  ### Calibration Pipeline Updates

  In FreeMoCap 1.7.0, we've updated our calibration process to use same multiprocessing parameters
  that apply to 2D pose estimation - which means calibration should now overall be a much faster
  process. The calibration process now saves out the annotated video tracks of the charuco board in a
  new charuco_annotated_videos folder, as well as the 2D and 3D Charuco board data.

  ### Ground Plane Calibration

  We've added the option for users to define the ground plane and origin of a particular recording
  by leaving the Charuco board flat on the ground for a few seconds at the start of calibration. This
  means that the reconstructed data will automatically come in with the subject oriented 'upwards' with
  their feet on the ground. Check out the documentation here for how to use this feature:
  https://freemocap.github.io/documentation/groundplane-calibration.html

  ### More Charuco boards!

  For awhile now, our default Charuco board has been a 7x5 grid. We've now added the option for users
  to print and use a 5x3 grid on their board instead.

  ### Calibration toml updates

  We've updated our output calibration toml with:

  1. A parameter in the metadata that lets you know whether a given calibration used the ground plane
  option. It will say groundplane_calibration = true if you did, and groundplane_calibration = false
  otherwise.
  2. Each camera output now has sections called the world_orientation and world_position - these are
  the real world orientations and positions of each camera in the 3D space.

  ## What's Changed

  - Add calibration diagnostics by @aaroncherian in #700
  - Update sample data hosting by @aaroncherian in #701
  - Patch: update deprecated pydantic dict in data saver models by @philipqueen in #711
  - Better ffmpeg missing behavior by @philipqueen in #704
  - Patch: update sample data for tests by @aaroncherian in #712
  - Charuco groundplane by @aaroncherian in #691
  - Update CONTRIBUTING.md by @paulmatthis in #725
  - Update anipose_camera_calibrator.py by @aaroncherian in #723
  - Update deprecated pydantic dict method by @emmanuel-ferdman in #721
  - fix charuco board saving by @aaroncherian in #728
  - Expose multiprocessing to batch processing by @philipqueen in #726
