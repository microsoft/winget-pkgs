ShortDescription: Submodule for 3DMark to detect PC configuration info.
Description: |-
  SystemInfo is a component used in many of Futuremark’s benchmarks to identify the hardware in your system. It does not collect any personally identifiable information. SystemInfo updates do not affect benchmark scores but you may need the latest version in order to obtain a valid score.

  The most recent versions of our currently supported benchmarks will prompt you to install new SystemInfo updates. Alternatively, you can update SystemInfo yourself from this page.
