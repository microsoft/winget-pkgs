ReleaseNotes: |-
  This is by far one of the biggest updates to Fishstrap we have done. Lots of features, lots of fixes, lots of... stuff.
  Might forget to list some stuff in fact, so bear with me.
  The most obvious change you'll notice is that we've changed icons! We won't go too into it, but I hope you guys like the new icons!
  Integrations

  Borderless Fullscreen (Vulkan)
  Allows you to use a fake version of Borderless Fullscreen while using the Vulkan Graphics API. It's not really "borderless fullscreen", but as close as possible.

  StatusDisplay for Discord RPC
  Added StatusDisplay support for Discord RPC. This now allows you to show what Roblox game you're playing instead of just showing you're playing Roblox.

  Appearance

  Windows Terminal Bootstrapper
  A bootstrapper theme inspired by the Windows Terminal. Prints lines to the console, just like a real terminal!

  Window Manipulation
  A really fun feature. Lets you modify attributes of the Roblox window, allowing you to set a custom icon and title.

  Bootstrapper

  Multi-Threaded Downloads
  Fishstrap now has multi-threaded downloads, which should lead to way shorter download times.

  Cleaner Tweaks
  Multiple tweaks to the cleaner, now allowing you to specify which directories you want to clean, and more flexible time durations.

  Deployment

  Custom Roblox Domain
  Caution
  BE CAREFUL AS TO WHAT DOMAIN YOU USE! This feature can cause unwanted side effects if a proper trusted domain isn't used.
  Lets you set a custom domain. This domain will be the one Fishstrap/Roblox uses to communicate back and forth. Can help with bypassing geo-restrictions and might possibly also help with latency.

  Miscellaneous

  Search Bar
  A handy search bar to help you find settings quickly. Currently, it's not fully fledged, but in coming updates, it should be able to find more settings more easily.

  Fixes
  - Fixed disabled GBS editor on first-time install. e4a0ba7
  - Cleaned up Multi-Instance warning. 3d8ff49
  - Fixed broken Discord RPC due to dead API. e776eaa
  - Relaxed restrictions on .mesh modifications. 10f5648
  - Fixed ViewModel warnings for TwentyFive dialog. 7b8efc4
  - Fixed live channel check. @RealMeddsam 614e482
  - Fixed private and reserve server types. @RealMeddsam df51fbd
  - Fixed UptimeEntry to use logMessage instead of entry. @RealMeddsam c085a79
  - Fixed warnings when running Studio and Player at the same time. @krampuszc 82e2409
  - Fixed switching accounts with BetterMatchmaking. 33e81d7
  - General fixes to BetterMatchmaking to increase reliability.
