ReleaseNotes: |-
  This is a somewhat minor update with a few experimental features. And a few bugfixes, of course.
  Additions
  Static Directory
  Switch from the version-xxx to a BinaryType model instead. This means that instead of every version of Roblox having a separate version hash, it will instead be put in a static directory.
  i.e. Instead of being something like "version-12345", it'll instead be listed as "WindowsPlayer". This should allow software to properly detect Roblox. (eg. AMD Adrenalin, NVIDIA Control Panel, etc.)
  Roblox (~2025) Bootstrapper theme
  A new bootstrapper theme! Based on the new look of the Roblox Installer.
  These features below will be under Bootstrapper -> Experimental
  BetterMatchmaking v1
  BetterMatchmaking (Name still pending...) is an alternative to the normal matchmaking process done by Roblox. It was made to prioritize optimal matchmaking settings, and nothing else. In practice, this should mean lower latencies, and being put in servers in your region more often.
  We use APIs provided by RoValra to figure out which servers to send you to. Please try out RoValra, It's great!
  Note
  We do not log your cookie, nor does it ever leave your PC. This is and will always be disabled by default.
  Roblox Cookie Access
  A feature that allows us to access your Roblox cookie. NO! WE ARE NOT LOGGING YOUR COOKIE! This just allows Fishstrap to access Roblox's APIs without any restrictions, which will prevent issues regarding connectivity to Roblox.
  Changes
  - Updated workflow. (Thanks again............ @Naveandice) #1126
  - Added a warning to the Multi-Instance option.
  Fixes
  - Fixed an issue that caused text to render invisible sometimes. #1099
