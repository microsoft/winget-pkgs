ShortDescription: Hablará records conversations, transcribes them locally and analyses emotions and communication styles with AI — no cloud required, no subscription.
Description: |-
  Hablará uses AI to analyse audio and text: emotions, communication styles, and contemplative reflection.

  CORE ANALYSES
  - Emotion detection from voice and text (Dual-Track: Audio + LLM)
  - Plutchik's Wheel of Emotions, Russell (Circumplex Model)
  - Tone Analysis across five dimensions
  - Topic Classification (7 categories)

  REFLECTION
  - Bible Impulse: 1–3 thematically matching Bible verses for your transcript
  - Prayer: AI-generated prayer tailored to content and emotion

  AI CHAT
  - Automatic conversation summary in the chat history
  - Contextual AI chat about your recordings
  - AI chat about the app and its concepts

  EXPORT
  - PDF export with transcription and analyses
  - Chat export in 5 formats (Markdown, TXT, PDF, HTML, DOCX)
  - Download recordings as WAV

  100% OFFLINE CAPABLE
  - Local transcription via whisper.cpp
  - Local AI via Ollama (free)
  - Your data stays on your device
  - No cloud required, no subscription fees

  FLEXIBLE LLM CHOICE
  - Ollama (default, local, free)
  - OpenAI (optional, cloud)
  - Anthropic Claude (optional, cloud)
  - Mistral (optional, cloud, EU data residency)

  PRIVACY & GDPR
  - API keys encrypted in Windows Credential Manager
  - Recordings stored locally
  - Configurable automatic deletion
  - Anonymous crash reporting with opt-in only (EU servers)

  For advanced psychological analyses (logical fallacies, NVC, cognitive distortions, four-sides model, transactional analysis, appraisal theory, regulatory focus, conversation analysis and coaching): Hablará Pro in the Microsoft Store.

  IMPORTANT: Not a substitute for professional advice. For self-reflection, not diagnosis. AI-generated analyses may be inaccurate (EU AI Act Art. 52).
