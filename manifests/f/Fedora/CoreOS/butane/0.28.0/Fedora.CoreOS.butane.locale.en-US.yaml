ReleaseNotes: |-
  Starting with this release, Butane binaries are signed with the Fedora 44
  key.
  Features
  - Stabilize OpenShift spec 4.22.0, targeting Ignition spec 3.6.0
  - Add OpenShift spec 4.23.0-experimental, targeting Ignition spec 3.7.0-experimental
  - Add systemd.quadlets section for embedding Podman Quadlet files (fcos 1.8.0-exp, fiot 1.1.0-exp, flatcar 1.2.0-exp, openshift 4.23.0-exp, r4e 1.2.0-exp)

  Misc. changes
  - Warn on root partition size is too small (fcos 1.3.0+)
  - Warn on root partition constrained by another partition (fcos 1.3.0+)
