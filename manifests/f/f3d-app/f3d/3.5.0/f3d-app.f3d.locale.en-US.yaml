ShortDescription: F3D is a fast and minimalist 3D viewer desktop application
Description: >-
  F3D is a fast and minimalist 3D viewer desktop application. It supports many file formats, from digital content to
  scientific datasets (including glTF, USD, STL, STEP, PLY, OBJ, FBX, Alembic), can show animations and support thumbnails and
  many rendering and texturing options including real time physically based rendering and raytracing.
