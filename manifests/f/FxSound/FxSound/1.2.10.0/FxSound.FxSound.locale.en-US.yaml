  10. Fixed output device not being applied through command line
  11. Fixed a delay blocking application load when minimizing to the system tray
  12. Fixed EQ band sliders not refreshing when switching number of bands (#521)
  13. Fixed user-set mute being overridden by FxSound
  14. Fixed icon visibility in ARM64 version
