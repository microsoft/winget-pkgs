ReleaseNotes: |-
  The following describes improvements made in the May 2026 update.
  Visual Refresh
  ZoomText has a fresh, new look. The desktop icon now features a brighter green background with a white “Z,” and updated graphics appear throughout the application, including the Startup Wizard. This refresh makes it easier to locate the ZoomText icon on the desktop.
  The refreshed design also aligns ZoomText with the updated branding used across JAWS and Fusion, creating a more consistent and recognizable experience across the Vispero product family.
  Improved Windows 11 Compatibility and Performance
  We continue to enhance ZoomText to keep pace with the latest Windows 11 updates (version 24H2 and later) and modern graphics technology. As part of this effort, ZoomText now uses an updated display adapter called Capture API, which helps reduce issues like black screens and delivers a more consistent and reliable viewing experience, especially on newer computers.
  Everything works automatically, so there is nothing to set up. ZoomText simply delivers the best possible experience for your system.
  Turkish Language Support Now Available in Fusion
  Fusion is now available in Turkish, expanding accessibility to a broader range of users.
  Other Enhancements
  - Live Text View settings can now be adjusted smoothly, with reduced screen flicker thanks to the new Capture API display adapter method.
  - The new Capture API display adapter option enhances screen sharing experiences by helping to prevent black screen issues.
  - Smooth Mouse Panning movement is improved with ZoomText’s Capture API option, providing smoother, more consistent motion in a single direction.
  - Magnification now updates seamlessly when switching from a lower to a higher screen resolution while ZoomText is running.
  - Performance is improved when switching between integrated and dedicated graphics on laptops, resulting in a smoother experience.
  - ZoomText fully supports three-display setups, automatically recognizing a third monitor and extending magnification across all screens.
  - Resolved an issue where the cursor enhancement remained on the screen after the Start menu was opened and then closed.
  - Focus tracking to JAWS-specific windows is now more reliable when using a combination of mouse and keyboard input in Fusion and ZoomText.
  - Keyboard navigation with CTRL+TAB correctly moves among Toolbar tabs in both ZoomText and Fusion.
  - AppReader now reads numbers more accurately on web pages, ensuring all digits are announced correctly.
  - Improved compatibility ensures that Microsoft Edge running in IE mode operates reliably alongside ZoomText.
  - The Live Text View button displays correctly in the Estonian version of ZoomText at higher DPI settings, improving usability in localized environments.
