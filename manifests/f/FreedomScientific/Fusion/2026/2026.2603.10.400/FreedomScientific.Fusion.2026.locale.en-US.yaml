ReleaseNotes: |-
  The following describes improvements made in the March 2026 update.
  Read Scanned PDFs and Image-Based Documents (OCR Support)
  Sometimes PDFs contain scanned images instead of real text. When this happens, Fusion cannot read the document because the text is not recognized as selectable content. AppReader cannot read it aloud, and Live Text View may not display any text. The new OCR (Optical Character Recognition) support solves this issue by recognizing text within these image-based documents, making previously inaccessible content readable. OCR is available in ZoomText Magnifier/Reader and Fusion.
  Key Capabilities
  - Full PDF processing: OCR processes an entire PDF, not just the visible page.
  - Mouse mode: Users can select and OCR any text visible on screen (for example, a screenshot sent in a Teams message), not just open documents.
  - Image file support: In addition to PDFs, image files can be recognized using OCR.
  - Camera support: Compatible with connected document cameras, allowing users to OCR printed paper documents.
  - Multi-language support: OCR can be set to recognize different languages (dependent on Windows language packs installed), helping it correctly map visuals to known words in that language.
  - Save results: The recognized text can be saved for later review or editing.
  Recognize text in a PDF document
  Fusion OCR offers two ways to recognize text in inaccessible PDF documents:
  - Automatic prompt: When you open an inaccessible PDF in Adobe Reader and then start AppReader, Fusion prompts you to run text recognition. Choose Yes to proceed. When processing is complete, AppReader opens in Ticker mode.
  - Via the OCR button: Click the lower half of the OCR button on the Tools toolbar, then select Open PDF Document. Choose your file and click OK. AppReader opens in Ticker mode and reads the recognized text.

  Navigation in AppReader's Ticker Mode
  Action Hotkey / Input Description
  Navigate by line CTRL+UP ARROW / CTRL+DOWN ARROW Moves the reading cursor up or down one line in the OCR ticker text.
  Navigate by page PAGE UP / PAGE DOWN Moves the reading cursor up or down by one page of OCR ticker text.
  Navigate by sentence LEFT ARROW / RIGHT ARROW Moves the reading cursor to the previous or next sentence. Sentence boundaries are determined using text heuristics.
  Navigate by paragraph UP ARROW / DOWN ARROW Moves the reading cursor to the previous or next paragraph. Paragraph boundaries are determined using text heuristics.
  Read the current word, line, sentence, or paragraph CTRL+ALT+SHIFT+ARROW KEYS Reads the current word (UP arrow), line (RIGHT arrow), sentence (DOWN arrow), or paragraph (LEFT arrow).
  Move to first or last word on current line HOME / END Moves the reading cursor to the first or last word on the current line.
  Start reading from clicked word LEFT MOUSE CLICK Clicking a word in the OCR ticker image starts reading from the selected word.
  More Ways to Access Picture Smart AI in Fusion
  Picture Smart AI analyzes an image and provides a description in the Results Viewer window. Previously, images could only be analyzed using JAWS hotkeys or Mouse Mode. In this Fusion release, new options in the Fusion interface make Picture Smart easier to use with a mouse, offering greater flexibility for low vision users.
  The Picture Smart button on the Tools toolbar provides quick access to the following options:

  - Use Mouse Mode (CAPS LOCK+CTRL+P): and drag to select the area of the image you want to analyze.
  - Use Active Window: Analyze the currently active window (the Fusion toolbar is excluded).
  - PEARL Camera or Scanner: Capture and analyze an image using the PEARL camera, a scanner, or a document camera.
  - Open Image File: Open and analyze an image file (JPG, JPEG, PNG, BMP, GIF, TIFF, or PCX).
  OCR Support Now Available in Fusion Camera
  The Camera feature allows you to use any document camera to magnify printed items. You can switch between Full and Docked screen views which allow you to see the camera image and your Windows desktop at the same time.
  The Camera toolbar now contains OCR functionality. This allows you to take a screen shot of the current camera image, process the image using OCR, and read the text in AppReader’s Ticker mode.
  To start OCR:
  1. If you are using a document camera, make sure it is connected to your computer.
  2. Position your document under the camera.
  3. On the Tools toolbar, click the Camera button, or press CAPS LOCK+CTRL+C.
     The Fusion Camera toolbar opens.

  4. Click the OCR button or press O.
     AppReader opens in Ticker mode and reads the recognized text.
  Transition from Freedom Scientific to Vispero
  You will begin to see the name Vispero appear throughout JAWS, ZoomText, and Fusion as we start transitioning from the Freedom Scientific brand. This release introduces the first phase of that change, and most product references previously labeled Freedom Scientific will now display Vispero.
  As part of this update, FSCompanion has also been renamed to Vispero Companion, and the FS Support Tool has been renamed to Support Tool.
  During the transition, you may still notice the Freedom Scientific name in some areas of the software and website. These remaining references will be updated over time.
  Please note that the Freedom Scientific name will continue to be used for certain hardware products, such as the Focus Braille Display, and these names are not affected by the change.
  Other Enhancements
  - When you choose Restart in the Exit dialog (ALT+F4), ZoomText restarts using your current settings, so any changes you made are retained.
  - When using Convenient OCR to scan an image, you can now cancel a scan and start another one without any issues.
  - When acquiring images from a scanner using Picture Smart or Convenient OCR, the Scanners and Cameras dialog now lets you choose between a Flatbed or Feeder, giving you more flexibility depending on how your scanner is set up.
  - Improved performance when selecting dropdown menus in Microsoft Access.
  - AppReader's App View and Text View both launch correctly when used in Acrobat Reader.
  - The ticker in AppReader's Text View now correctly highlights words at the end of the ticker when pressing CTRL+END.
  - The Voice Assistant "Getting Started" menu item has been renamed to "Help."
