ReleaseNotes: |-
  The following is a list of improvements made between the March 2026 release and the May 2026 update.
  Page Explorer Availability
  Page Explorer, accessed with INSERT+SHIFT+E, is an extension of Vispero Companion that quickly summarizes a web page, highlights important content and links, and provides helpful navigation tips so you can find what you need faster. This feature is now available to Home Annual users. In addition, Home users are no longer limited to 20 requests per week.
  This means more users can take advantage of Page Explorer, with fewer limits to worry about. You can now access detailed web page information when you need it most, without having to keep track of usage caps.
  Age Restrictions for AI Features
  To help ensure a safe and age-appropriate experience for all users, JAWS AI features, Picture Smart, Vispero Companion, and Page Explorer, now adapt based on the age set in your Vispero account.
  For users 18 and older, there is no change to how these features work.
  For younger users, the following adjustments apply:
  - Under 13 – Images are described with stricter safety limits, chat is not available, and no access to Vispero Companion or Page Explorer
  - Ages 13 to 17 – Images are described with safety limits in place, and chat is available with those same restrictions applied to responses
  These adjustments help ensure a safer and more appropriate experience for younger users and align with industry best practices for AI features.
  Refer to this Blog post for additional details on verifying the correct age is set in your Vispero account.
  Aria and Web
  - JAWS now supports HP Sure Click enterprise software using UIA (User Interface Automation). This support relies on our new native UIA support in web browsers, currently available as an Early Adopter Program feature and enabled by default in HP Sure Click. Any feedback regarding HP Sure Click support can be submitted through the Early Adopter Program dialog in the JAWS Options menu. Visit support.hpwolf.com/s/article/Enabling-Screen-Reader-Support-in-HP-Sure-Click-Enterprise for more information on turning on screen reader support in HP Sure Click.
  - When activating Forms Mode on a field that supports multiple selections, JAWS no longer changes the current selection.
  - When using LEFT or RIGHT ARROW in the Chrome address bar, JAWS now reads entered text correctly.
  - Improved performance when opening some international web pages in Chrome.
  - Improved reading of content that uses aria-describedby and aria-labelledby.
  - When adding a bookmark in Chrome and choosing a different folder, JAWS now correctly identifies the folder list as a tree view.
  - When switching between browser tabs, JAWS no longer repeats the tab title multiple times.
  - JAWS no longer repeats information while reading results in Gemini on the web.
  - Pressing ESC now exits Forms Mode in data grids.
  - JAWS now indicates when you move into an input field using the ARROW keys, similar to using TAB or SHIFT+TAB.
  - JAWS now clearly distinguishes between date pickers and date/time pickers.
  - In tables with interactive elements, titles are no longer announced twice while navigating.
  - Removed extra speech when selecting files to upload in Chrome.
  - The Untagged Graphical Links option now works correctly in Microsoft Edge using Internet Explorer mode.
  Microsoft Office
  - In Outlook (New), JAWS now correctly reads the selected message when using SHIFT+DOWN ARROW or SHIFT+UP ARROW.
  - In the latest Outlook (New) updates, pressing ALT+1 through ALT+5 now reads header information in an open message.
  - You can now use INSERT+Z to turn on Navigation Quick Keys in the Copilot pane in Word.
  WhatsApp
  - JAWS can now automatically read incoming WhatsApp messages. Use Quick Settings to turn this on or off.
  - The sound to indicate when someone is typing now works in locked chats.
  Braille
  - The Liblouis Braille translator has been updated to version 3.37.0 for improved Braille support.
  Other
  - Improved formatting of Picture Smart responses in the Results Viewer so elements like lists and tables are more accurately indicated by JAWS.
  - The keystroke for Page Explorer (INSERT+SHIFT+E) is now included in JAWS Hot Key Help (INSERT+H).
  - When tabbing in a Zoom meeting, JAWS no longer repeats the “INSERT+F1 for help” message for every control.
  - On systems that require a PIN at sign-in, JAWS no longer becomes unresponsive when selecting Forgot my PIN.
  - Improved compatibility with the Xplorer² application.
  - JAWS settings that include Flexible Web rules can now be exported successfully.
  - Updated the Support Tool to better handle large reports.
