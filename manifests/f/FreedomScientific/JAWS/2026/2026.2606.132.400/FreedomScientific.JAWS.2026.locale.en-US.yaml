ReleaseNotes: |-
  The following is a list of improvements made between the May 2026 release and the June 2026 update.
  More Time to Connect a Vispero Account (United States customers only)
  New users in the United States now have 30 days to create and sign in to a Vispero account while continuing to use JAWS, ZoomText, or Fusion. AI based features—Picture Smart, AI Labeler, Vispero Companion, and Page Explorer—will become available once an account is connected.
  This change provides more flexibility during setup and makes it easier to get started with the software.
  .NET 10 Framework Upgrade
  Many enterprise customers require software vendors to stay current with supported Microsoft technologies and security standards.
  With this release, we have upgraded our products to the .NET 10 framework, helping ensure:
  - Continued compatibility with modern enterprise environments
  - Improved long-term support and security compliance
  - Alignment with current Microsoft development standards
  Amazon WorkSpaces DCV Protocol Support
  DCV (Desktop Cloud Visualization) is Amazon’s new high-performance remote desktop and streaming technology for the WorkSpaces platform. JAWS now supports this protocol, helping ensure accessibility compatibility for users working in Amazon WorkSpaces environments. This is especially important for enterprises as well as remote workers relying on cloud hosted desktops and applications.
  Note: Using the CAPS Lock key as the JAWS Key currently does not work in an Amazon Workspaces session over DCV. It is recommended the INSERT Key be used when performing JAWS commands.
  Improved Reading of Special Unicode Text Characters
  Modern websites, social media platforms, and marketing emails increasingly use decorative Unicode text styles that imitate custom fonts. These characters often appear visually appealing but can create accessibility challenges because screen readers may not interpret them correctly.
  JAWS can now properly recognize and read many of these special characters as well as display them in Braille when reading web pages, HTML files, and PDF documents. If you need to turn off this detection, open Settings Center (INSERT+6), expand Web/HTML/PDFs > Reading, and clear the Translate Special Characters check box.
  For example, when encountering text like:
  𝓙𝓐𝓦𝓢 2026 𝓬𝓪𝓷 𝓷𝓸𝔀 𝓻𝓮𝓪𝓭 𝓽𝓱𝓲𝓼 𝓽𝓮𝔁𝓽

  𝓐𝓷𝓭 𝓪𝓵𝓼𝓸 𝓽𝓱𝓲𝓼 𝓽𝓮𝔁𝓽 𝓫𝓮𝓬𝓸𝓶𝓮𝓼 𝓪𝓬𝓬𝓮𝓼𝓼𝓲𝓫𝓵𝓮
  JAWS will now correctly read the content.
  Cloud Settings Sync (Early Adopter Program)
  You can now save your JAWS settings to the cloud and access them on any computer where you sign in with your Vispero account. This makes it much easier to keep your setup consistent without having to reconfigure JAWS each time. This also ensures your customizations remain safely stored and in situations your current computer becomes unusable.
  With Cloud Settings Sync, you can:
  - Sync your settings including application and default settings, dictionary entries, graphics labels, PlaceMarkers, flexible web rules, web page settings including custom labels, speech and sounds schemes, and voice profiles across multiple computers
  - Restore your settings after reinstalling JAWS or setting up a new device
  - Manually sync your settings at any time
  Things to Know
  - An internet connection is required to sync settings
  - The feature is only available in regions where Vispero accounts are supported
  - License information is not included in the cloud sync
  - As an Early Adopter feature, behavior and functionality may change in future updates
  Getting Started
  This feature is part of the Early Adopter Program, which provides access to new functionality that is still under active development. It is intended for users who want to try out upcoming features and provide feedback before they are fully released.
  1. Make sure you are signed in to your Vispero account. You can check this in the Account tab of the About dialog under the Help menu.
  2. Open the JAWS Options menu and choose Early Adopter Program.
  3. Select Cloud Settings Sync, then choose OK and restart JAWS.
  4. After JAWS restarts, choose Enable Sync when prompted to begin syncing your settings.
  Once enabled, any JAWS settings you change will automatically update in the cloud the next time JAWS restarts.
  You can also sync your settings at any time:
  1. Press ALT+U to open the Utilities menu.
  2. Open Sync and Transfer Settings > Cloud Settings.
  3. Press ENTER on Sync Now to immediately update your settings.
  Note: If you access your account through the Vispero portal website, there is also now a Cloud Settings option in the navigation menu. Here you can view and download your saved settings.
  Customizing What Gets Synced
  By default, all settings are synced. However, you can choose to exclude specific settings if needed.
  To customize:
  1. Press ALT+U to open the Utilities menu.
  2. Open Sync and Transfer Settings > Cloud Settings.
  3. Press ENTER on Manage Cloud Sync.
  4. Select Exclude settings from sync, then choose Customize sync exclusions.
  5. Select the check boxes for any settings you do not want to sync.
  6. Select OK to apply your changes, then select OK again to close the dialog.
  7. Use Sync Now to immediately update the cloud, or wait until the next restart. The settings you chose to exclude will remain only on your device.
  Using Cloud Settings on Multiple Devices
  If you use JAWS on more than one computer, you can easily share your settings between them.
  After enabling Cloud Settings Sync on another device, JAWS will notify you that cloud settings are available. You can then:
  - Choose Yes to load your saved settings
  - Choose No to keep the current device’s settings
  If JAWS detects differences between local and cloud settings during a sync, you can choose to:
  - Replace your current device settings with the cloud version
  - Replace the cloud settings with your current device settings
  - Merge both sets of settings
  - Skip syncing for now
  Turning Off Cloud Settings Sync
  If you decide you no longer want to save settings to the cloud:
  1. Press ALT+U to open the Utilities menu.
  2. Open Sync and Transfer Settings > Cloud Settings.
  3. Press ENTER on Manage Cloud Sync.
  4. Clear the Enable sync check box and select OK.
  5. Choose whether you want to keep or delete your cloud settings. For instance, if you use this feature on multiple devices and you are only turning off cloud sync on one, you might want to keep your cloud settings.
  Submitting Feedback
  To share feedback about your experience:
  1. Open the JAWS Options menu and choose Early Adopter Program.
  2. Select Send Feedback.
  3. Complete the form and choose Submit Feedback.
  Aria and Web
  - On web pages that update dynamically, the JAWS Virtual Cursor now refreshes more reliably as content changes.
  - Row and column headers in grids are now spoken while navigating with the Virtual Cursor off.
  - JAWS no longer reads excess page content in some instances when tabbing to various elements including buttons, check boxes, and radio buttons.
  - When encountering zero-space characters in edit fields, JAWS is no longer silent and now says “blank” so users continue to receive feedback as they navigate.
  - The Virtual Cursor now displays the currently selected value in date or date/time pickers without the need to activate Forms Mode to read them.
  - Improved JAWS reading alerts displayed when filling out forms on various websites.
  - After downloading a title from the NLS BARD website, JAWS focus now remains on the download link instead of unexpectedly jumping to the top of the page.
  Microsoft Office
  - In Outlook (Classic), the message indicating an email is from a source external to an organization has been shortened to “ext” on Braille displays to maximize space.
  - Visual highlighting is now supported in Outlook (New) when using the ARROW keys to read messages.
  WhatsApp
  - When pressing UP ARROW from the last message in the WhatsApp chat history, the previous message is now correctly spoken and displayed in Braille.
  Braille
  - For German users, JAWS now includes the latest updates to the RTFC German Braille translator.
  - Improved Braille navigation in Notepad when reading lines containing more than 150 characters.
  Other
  - JAWS no longer conflicts with the code folding keystrokes in Visual Studio Code.
  - When running JAWS and ZoomText together and not as Fusion, closing ZoomText no longer causes the account sign in or sign out menu options to become unavailable in JAWS.
  - For users who incorrectly specified their age as under 13 when creating a Vispero account, the sign in menu options will now remain available so they can still log in and adjust the age.
  - Improved visual tracking when navigating results in Vispero Companion with the Virtual Cursor.
