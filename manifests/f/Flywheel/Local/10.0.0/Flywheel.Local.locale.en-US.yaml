ReleaseNotes: |-
  <h1 id="whats-new-in-local-100">What’s New in Local 10.0</h1>

  <p>Local v10.0 is officially here! This milestone release is centered around making your development workflow more resilient and portable. We’ve taken one of our most popular add-ons—Cloud Backups—and rebuilt it as a core, native experience.</p>

  <h3 id="native-cloud-backups-no-add-on-required">Native Cloud Backups (No Add-on Required!)</h3>

  <p>Say goodbye to the extra steps. Cloud Backups are no longer an optional add-on that requires a separate installation nor a Local Hub account. Starting in v10.0, Cloud Backups are built directly into the core Local application, offering a faster, more reliable way to protect your work and move between machines.</p>

  <ul>
    <li>No Local Hub Account Needed: We’ve removed the requirement to sign in to Local Hub to use backups. Simply connect your provider and go.</li>
    <li>Google Drive &amp; Dropbox Integrations: Connect your preferred cloud storage provider directly within the app settings.</li>
    <li>Multi-Machine Harmony: Seamlessly move your projects from your office laptop to your personal setup. Backups are now optimized for “off-device” workflows, making it easier than ever to pick up right where you left off.</li>
    <li>All Your Backups in One View: Visit the Connect tab to see a new high-level dashboard of every backup across all your sites. No more clicking into individual site settings to see what’s stored in the cloud.</li>
    <li>Delete with Ease: You asked, we listened! You can now delete old or unnecessary backups directly from the Local interface to keep your cloud storage tidy.</li>
    <li>Simple Migration Flow for Add-on Users: If you’re a long-time Local developer who has made good use of the Cloud Backups add-on, never fear! An accompanying release to the Cloud Backups add-on makes migrating your sites to the new experience a breeze. Once complete, you’re free to delete the add-on from your machine.</li>
    <li>Extra Secure with Optional Passwords: Backups are stored safe and sound in your cloud storage provider and are only accessible using the cloud storage provider login. As an additional security measure, if you wish to secure backups at the site level with a custom recovery password, you can do so - just be careful to save this password as we can’t help you if you lose it!</li>
  </ul>

  <h2 id="fixes">Fixes</h2>

  <ul>
    <li>Local’s HTTP gateway now prefers IPv6 with an automatic fallback to IPv4 to prevent network timeouts.</li>
    <li>Fixed an issue where the restic and rclone binaries weren’t correctly marked as executable on Linux.</li>
    <li>Resolved several Windows-specific path issues involving spaces in binary paths.</li>
  </ul>

  <h2 id="updates">Updates</h2>

  <ul>
    <li><a href="https://nitropack.io/">Nitropack</a> is now part of the WP Engine family! Check it out in the waffle menu at the bottom of the left-hand navigation column to learn more.</li>
    <li>Updated Electron and other various 3rd-party dependencies to include the latest security fixes and improvements.</li>
  </ul>
