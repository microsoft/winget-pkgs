ReleaseNotes: |-
  What's Changed

  Fixed

  - Text alignment lost after calendar navigation — final fix (issue #63): two independent bugs were
    responsible. (1) Visual rendering (root cause): Tauri automatically injects a random 'nonce-...'
    into all CSP directives at runtime; per the CSP spec a nonce in style-src causes 'unsafe-inline'
    to be ignored, so TipTap's style="text-align: center" attributes were silently blocked by the
    browser every time alignment was applied or loaded — the data was saved correctly, only the
    rendering was stripped. Fixed by "dangerousDisableAssetCspModification": ["style-src"] in
    tauri.conf.json, preventing nonce injection into style-src while leaving script-src
    nonce-protected for Tauri's internal use. (2) Save loss: navigating from Day A to Day B with a
    pre-existing blank entry caused onSetContent(isEmpty=true) to call debouncedSave() with Day B's
    blank args, resetting the 500 ms timer and discarding any pending save for Day A. Fixed by
    flushing the current entry (cancel + immediate saveCurrentById) at the start of loadEntriesForDate
    before loading the new date; all signal reads use untrack() to prevent reactive loop. Additionally
    hardened all five save paths to read from editor.getHTML() directly rather than the SolidJS
    content() signal.

  [](https://sourceforge.net/projects/mini-diarium/files/v0.4.12/)
