ReleaseNotes: |-
  - support plocate and Everything #98
  - added word_count, char_count, encoding, has_bom, line_ending fields
  - added git-related fields
  - added blksize, atime_nsec, mtime_nsec, ctime_nsec fields
  - added symlink_target and is_broken_symlink fields
  - support extattrs and acl fields on Windows
  - support metadata extraction for FLAC, Ogg Vorbis, Opus, and several other formats
  - added mp3_comment, mp3_track, and mp3_disc fields
  - added .qml to the known source file extensions
  - optimized number of syscalls #175
  - fixed bugs related to grouping and subqueries
  Thanks to @akneni and @dsully for raising the issues that inspired these new feature ideas!
