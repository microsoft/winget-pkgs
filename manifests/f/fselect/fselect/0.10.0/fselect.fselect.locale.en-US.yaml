ReleaseNotes: |-
  - added is_sticky, atime, mtime, ctime, xattr_count and rdev fields
  - added support for POSIX and Windows ACLs (fields acl, default_acl, has_acl and has_default_acl, functions HAS_ACL_ENTRY, ACL_ENTRY, HAS_DEFAULT_ACL_ENTRY and DEFAULT_ACL_ENTRY)
  - added support for extended file attributes (fields extattrs and has_extattrs, function HAS_EXTATTR)
  - support Linux capabilities v2 and v3
  - support xattrs on Windows
  - added many EXIF fields
  - added datetime functions DAYNAME, DAYOFYEAR, DATE_ADD, DATE_SUB, DATE_DIFF, FROM_UNIXTIME, LAST_DAY
  - added a parameter to ROUND function
  - NO_COLOR env var handling is fixed to match the original intent
  - allow calling zero-arg functions (not only boolean) without parenthesis
  - a lot of bugs fixed, and stability greatly improved
