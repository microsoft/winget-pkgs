  - 修复：某些情况下新增库无反应（库路径选择兼容 file:// / UNC 等返回值）
  - 修复：所见模式代码块高亮层注释/引用斜体导致 Windows 下选区高亮错位（Refs #81）
  - 修复：#80 F2 重命名复用弹窗，并支持 ESC 关闭
  - 更新：内置插件「AI 小说引擎」v0.7.0：新增“严格遵循章节大纲”模式；世界设定与章节大纲支持文件夹；一键开坑完成页新增「生成第一章」按钮
