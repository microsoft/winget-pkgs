PackageIdentifier: fathah.HermesDesktop
PackageVersion: 0.6.1
PackageLocale: zh-CN
ShortDescription: Hermes Agent 的桌面伴侣
Description: |-
  Hermes Desktop 是一款原生的桌面应用程序，用于安装、配置并与 Hermes Agent 进行聊天——这是一款具备工具调用、多平台消息传递和闭环学习能力的自我进化的 AI 助手。
  无需手动管理命令行界面 (CLI)，该应用可在一个统一界面中引导您完成安装、提供商设置以及日常使用。它使用官方的 Hermes 安装脚本，将 Hermes 存储在 ~/.hermes 目录下，并为您提供涵盖聊天、会话、配置、记忆、技能、工具、计划任务、消息网关等功能的图形界面。
