ReleaseNotes: |-
  # ExifToolGui V6.3.12
  <h4> Updated May 8, 2026. Licensed under GNU General Public License v3.0</h4>

  <h4>Download EXE files for portable usage</h4>

  - ExiftoolGui.exe Executable for Win32
  - ExiftoolGui_X64.exe Executable for Win64

  Please **read** the Portable notes for more info on INI file usage and command line switches to control that. [Readme Portable.txt](../../blob/main/Docs/Readme%20Portable.txt)

  Notes: You should handle all requirements decribed here: [Requirements and preparations](../../blob/main/Docs/ExifToolGUI_V6.md#requirements-and-preparations)

  - Download and install ExifTool.exe. <b>Required</b>. See https://exiftool.org/install.html for more info.
  - Download and install WebView2Loader.dll. <b>Optional</b>. Needed if you want to use the OSM map.
  - Download and install Language DLL's. <b>Optional</b>. If you prefer GUI translated.
  - Download and install MAP files. <b>Optional</b>. Needed to provide additional info in the event of an exception.
  - Download and install an alternate (larger) GeoLocation DB. <b>Optional</b>. See https://exiftool.org/geolocation.html.


  <h4>Download Installer</h4>
  The installer should handle all requirements mentioned with the Portable version automatically.
  Depending on your Windows version the WIN32 or WIN64 files will be installed.
  Should you prefer the WIN32 files on a WIN64 windows, then you can add /Win32 as a parameter to the installer.

  It is recommended to choose the 'Setup install mode' 'Install for all users', if you have admin rights, and choose the 'full installation'.
  In the additional tasks you have the options to create a desktop icon (recommended), and to download and install the latest version of Exiftool.
  If 'by Phil Harvey' is chosen, the Exiftool zip file will be download and the distribution unzipped and renamed in the installation folder.
  If 'by Oliver Betz' is chosen, the latest installer will be downloaded and run after the installation of ExifToolGui.
  (It is recommended to choose 'Add to Path', so ExiftoolGui will be able to find ExifTool.exe)

  <h4>Release info.</h4>

  - Updated Japanese language. Thanks coolvito!
  - Improved support for HEIC images.
    - Exif and XMP tags can now be used in the filelist with readmode=internal.
    - Fixed issue with auto rotating previews.
    - Note: Windows 11 comes standard with the needed codec.
  - Added SubjectArea in the Regions tab. Thanks Steerpike!
  - Update MapTiler baselayers to V4, added Hybrid satellite, and fixed label sizes.
  - In the field definitions for the Filelist and the Workspace you can now specify the tags like this:
  <table>
  <tr><td>G0:G1:Tag</td><td>Exif:Ifd0:Make</td></tr>
  <tr><td>G1:Tag</td><td>Ifd0:Make</td></tr>
  <tr><td>G0:Tag</td><td>Exif:Make</td></tr>
  <tr><td>Tag</td><td>Make</td></tr>
  </table>

  - When adding a field to the FileList, or WorkSpace from the Metadata tab using right click it is always added as:<br>
  Thanks KarenBbla!
  <table>
  <tr><td>G1:Tag</td><td>Ifd0:Make</td></tr>
  </table>

  Fixes include:

  - Fixed Access violation error when changing styles. Thanks Gitoffthelawn!
  - For the complete info see the [changelog](../../blob/main/Docs/changelog.txt).<br>

  Frank
