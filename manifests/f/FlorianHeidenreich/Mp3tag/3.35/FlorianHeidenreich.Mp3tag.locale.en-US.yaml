ReleaseNotes: |-
  FIX: renaming folders using `_DIRECTORY` at 'Convert > Tag - Tag' or action 'Format value' when running under Wine could silently overwrite duplicate files. (#71358)
  NEW: added support for RF64 WAV files > 4GB.
  FIX: added a confirmation prompt when selecting an item from the Find window results list if there are unsaved tag changes and auto-save is disabled. (#71402)
  FIX: lists for tracks and files at Tag Sources result dialog did not always display their selection under Wine. (#71370)
  FIX: customize menu item from Tag Panel context menu opened wrong options dialog page (since v3.35-beta.2). (#71371)
  FIX: regression where decimal `BPM` values were no longer truncated to integers when writing MP4 tags, which resulted in a user-defined `TEMPO` field being written. (#71360)
  FIX: renaming folders using `_DIRECTORY` at 'Convert > Tag - Tag' or action 'Format value' was not supported when running under Wine. (#71358)
  CHG: disabled smart hiding of consecutive toolbar separators or leading and trailing spacers. (#71187)
  CHG: moved selected file-related configuration options to 'Options > Files'.
  FIX: MP4 atoms with empty content could not be modified or removed. (#71325)
  NEW: added configuration option for replacement of folder separator used when renaming files from tags (see 'Options > Files'). (#71287)
  FIX: writing and removing tags failed with error message if path name could not be determined by file handle (since v3.34.1). (#71348)
  CHG: prevent creation of subfolders at 'Convert > Tag - Filename' if field value contains backslash character `\`. (#6166, #71287)
  FIX: field `TITLE` was always imported as `Title` from Tag Sources. (#69700)
  CHG: MusicBrainz Tag Source: prefer `ALBUMARTIST` over `ARTIST` for search field.
  FIX: Discogs Tag Sources: prevent composer metadata from being carried over from the previous standard track into subtracks.
  CHG: Discogs Tag Sources: automatically remove disambiguation numbers from `ALBUMARTISTSORT`.
  CHG: Discogs Tag Sources: use Discogs convention of "Various" for various artists.
  CHG: minor adjustments to drawing of File List column header text. (#69015)
  FIX: after deleting the current directory from the Tag Panel directory field, navigating backward or forward via Alt+Left arrow and Alt+Right arrow still remembered the deleted directory. (#71282)
  NEW: added support for spacer items when configuring toolbars. (#71187)
  NEW: added format string helper button and menu to import cover and export cover action dialogs. (#71268)
  FIX: icons for helper buttons in various dialogs were too small and are drawn with artifacts in some resolutions when dark mode was enabled.
  FIX: menu items in the Utils context menu were incorrectly enabled while an operation was in progress.
  NEW: added support for docking Filter left and right of toolbars. (#71187)
  LNG: updated Brazilian Portuguese, Bulgarian, Catalan, Corsican, Italian, Norwegian, Polish, Simplified Chinese, Slovak, Spanish, Ukrainian, and Vietnamese translations.
