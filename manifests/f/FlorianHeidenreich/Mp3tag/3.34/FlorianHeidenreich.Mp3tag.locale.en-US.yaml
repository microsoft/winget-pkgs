ReleaseNotes: |-
  NEW: added option to write UTF-8 BOM for m3u8 playlists at 'Options > Playlist'.
  NEW: added support for a second Custom Toolbar. (#70953)
  CHG: moved 'View > Toolbar' and 'View > Customize toolbar...' to a separate 'Toolbars' submenu.
  CHG: moved 'View > Customize columns...' to a separate 'Columns' submenu that also allows for direct toggling of configured columns.
  CHG: added support for drag and drop and common keyboard shortcuts to toolbar customization.
  CHG: prevented options dialog from exceeding work area size when UI scaling is enabled. (#70902)
  NEW: added support for horizontal scrolling via Shift + mouse wheel where applicable. (#70731)
  NEW: added support for toolbar customization.
  NEW: added support for switching toolbar icons between default and original icon sets (see 'Options > Appearance').
  CHG: added higher resolution versions of original icons to allow for crisp quality when toolbar scaling or UI scaling is active.
  FIX: regression where unknown MP4 atoms were removed on rewrites if configuration option 'Options > Tags > Advanced > Reuse unmodified MP4 atoms' was not enabled. (#70725, #70928)
  NEW: added support for scaling user interface up to 200% (see 'Options > Appearance').
  CHG: modernised toolbar icons, menu icons, and other icons, added dedicated rendering of dark-mode icons, and improved quality of scaled toolbar icons.
  FIX: possible underflow at number of selected action groups in action groups dialog (mostly under Wine).
  FIX: file icons in first column of File List overlapped on the right column divider in dark mode on some systems. (#70775)
  NEW: added support for creating multiple field values using the multiple fields delimiter `\\` at action Guess Values. (#70759)
  FIX: regression where MP4 data atoms of type UTF-16 were truncated to first character when read (since v3.34-beta.3).
  FIX: regression where validation for MP4 data atoms of type UTF-8 was too strict and did not allow trailing NULLs anymore (since v3.31b). (#70746)
  NEW: added support for MP4 H.266 and VP9 video codecs.
  CHG: added a possible workaround for the shell extension not opening the main window in the foreground that happens with certain file managers. (#70745)
  CHG: added workaround for detection of available free space that failed with an error message for some file servers.
  CHG: added a keyboard access key to the preview buttons on various dialogs. (#65355, #70630)
  LNG: updated Brazilian Portuguese, Catalan, Corsican, Italian, Japanese, Simplified Chinese, Slovak, and Spanish translations.
