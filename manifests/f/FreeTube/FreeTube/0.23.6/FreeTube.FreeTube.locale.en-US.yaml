ReleaseNotes: |-
  Summary
  This release addresses the recent playback issues along with a number of long-standing bugs.
  A massive thanks to @LuanRT for diagnosing the root cause of the playback issues, and to @absidue for providing the fix.
  Fixes
  - Add shorts player parameters to help with 403s by @absidue in #7763
  - Fix HTTP 429 errors for auto-translated subtitles by @absidue in #7711
  - Move settings to more menu on smaller mobile devices by @ChunkyProgrammer in #7506
  - Support LockupView videos in the up next feed by @absidue in #7186
  - Local API: Add PO tokens to the caption URLs by @absidue in #7484
  - Fix getting community posts on subscription page by @ChunkyProgrammer in #7603
  - Increase PO token snapshot timeout from 3 to 10 seconds by @absidue in #7114
  - Fix search not working on mobile because of undefined ref by @MarmadileManteater in #6706
  - Fix variant selection when no variant's audio role marked as main by @PikachuEXE in #7571
  - Make sure description isn't null when extracting chapters from description by @ChunkyProgrammer in #7505
  - Fix deleted videos appears when another video added to another playlist by @PikachuEXE in #7681
  - Update single user playlist view to remove videos immediately on exit by @PikachuEXE in #7544
  - Bump shaka-player from 4.13.2 to 4.13.4 by @dependabot in #6868
  - Update electron-builder to 26.0.13 by @PikachuEXE and @absidue in #7206
  - Bump youtubei.js from 13.4.0 to 15.0.0 by @dependabot in #7701
  Full Changelog: v0.23.5-beta...v0.23.6-beta
