ReleaseNotes: |-
  🎁 New Features
  - WordPress Posts Support – WordPress integration now supports publishing to Posts in addition to Pages.
  - Cover Page Table Element – New table element in the cover page editor with rich text editing, row/column management, and per-cell styling.
  - Cover Page Divider Element – New divider element for horizontal and vertical lines with configurable style.
  - Two-Column Layout (Beta) – New image + text two-column layout mode for PDF and Word export.
  ⭐ Improvements
  - WordPress export preserves existing page title and status when updating.
  - WordPress export creates new pages as draft instead of auto-publishing.
  - WordPress export preserves user content outside the guide section when re-exporting.
  - Cover page editor: snap-to-grid when dragging elements (snaps to center, edges, and other elements).
  - Cover page editor: move elements with arrow keys.
  - Cover page editor: resize elements from all four edges.
  - Export settings UI reorganized for clarity with section dividers and scrollable content.
  - Export settings: custom CSS editor now uses monospace font.
  - Links in the editor are no longer stripped when saving.
  🔧 Bug Fixes
  - Fixed undo/redo not restoring the selected element correctly in the cover page editor.
  - Fixed keyboard delete accidentally removing elements while editing text in tables or content fields.
  - Fixed image alignment option being shown for formats where it didn't apply.
  - Step links now work correctly in WordPress export.
  - Notion export properly handles large chunks of text.
