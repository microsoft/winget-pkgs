ShortDescription: Easily create step-by-step guides and documentation of any process.
Description: |-
  Folge is a desktop tool to capture steps with every click of the mouse, customize screenshots, create annotations, and generate the final guide in HTML, Word Document, PDF, PowerPoint slides, and more.
  Main Features are:
  - Take screenshots of apps, any selected region, windows or fullscreen. Pause, adjust, and resume. Screenshots with every mouse click or keypress.
  - Give each step a name and description. Reorder them, hide them, and add new ones on the fly. Organize guides in projects.
  - Exports guides to HTML, PDF, DOC, PPT, JSON, Markdown files ready to share with others. And more formats to come.
Tags:
- guide
ReleaseNotes: |-
  🎁 New Features
  - Cover Page Editor for Word Export – The cover page editor, previously available for PDF only, now works for Word exports too. Build a custom front page using headings, paragraphs, images, tables (including borderless column layouts for side-by-side content), dividers, and spacers.
  - Hudu Processes – Publish a guide to Hudu as a Process checklist, where each step becomes a checklist item.
  - Multiple Accounts for Confluence and WordPress – Add, name, delete, and switch between multiple accounts. Each account keeps its own credentials, settings, and publish history.
  - New [[indexPadded]] Filename Placeholder – A new placeholder for image exports that zero-pads the step number based on the total step count (e.g. 001, 002 … 120), keeping exported files in the correct sort order.
  ⭐ Improvements
  - Cover Page Editor UI reworked: block list with reordering and inline renaming, and redesigned property panels for text, images, tables, cells, and dividers.
  - Export settings redesigned.
  - Automated annotations improved for faster and more accurate UI reading.
  🔧 Bug Fixes
  - Cover page editor undo now works correctly when deleting or replacing images.
  - Fixed element ordering in the cover page editor.
  - Word cover page export fixes.
  - Hudu process publishing fixes.
  - Confluence account switching fixes.
  - Folge now works better on smaller screens.
  - It is no longer possible to create an extra-small spotlight.
  - Hudu photo folders are now filtered out from the structure tree.
