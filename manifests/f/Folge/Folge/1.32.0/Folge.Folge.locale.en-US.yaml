ShortDescription: Easily create step-by-step guides and documentation of any process.
Description: |-
  Folge is a desktop tool to capture steps with every click of the mouse, customize screenshots, create annotations, and generate the final guide in HTML, Word Document, PDF, PowerPoint slides, and more.
  Main Features are:
  - Take screenshots of apps, any selected region, windows or fullscreen. Pause, adjust, and resume. Screenshots with every mouse click or keypress.
  - Give each step a name and description. Reorder them, hide them, and add new ones on the fly. Organize guides in projects.
  - Exports guides to HTML, PDF, DOC, PPT, JSON, Markdown files ready to share with others. And more formats to come.
Tags:
- guide
ReleaseNotes: |-
  🎁 New Features
  - Tooltip V2 – Completely redesigned tooltips with speech bubble and arrow pointer styles, independent tail color and width controls, and configurable border radius.
  - Step Number Arrows – Step numbers can now have an optional arrow pointing to a target, with configurable line width, color, and arrowhead size.
  - Spotlight – New annotation tool that dims the background and highlights specific areas, with adjustable opacity, border radius, and stroke.
  - Magnifier V2 – Redesigned magnifying glass with separate source and display areas, both resizable and movable.
  - Custom Watermark – Add a watermark image to exported step images with configurable position, opacity, scale, and padding.
  - Apply Styles Across Steps – Apply annotation style changes to all matching annotations across your entire guide in one click.
  - Toolbar Submenus – Annotation tools are now organized into groups with expandable submenus for a cleaner toolbar.
  ⭐ Improvements
  - Pre-capture overlay is now click-through for Active Window and Full Screen modes, allowing you to arrange windows before starting capture.
  - Clicked elements metadata parsing greatly improved on Mac.
  - Fit-to-zoom now centers the view correctly in Focused View.
  - Guide details (title, description) now autosave as you type.
  - Export Settings Templates UI improvements.
  🔧 Bug Fixes
  - Fixed timer option for simple capture mode.
