ShortDescription: Windows 11 grid launcher with hotkey activation
Description: |-
  Muu is a Windows 11 grid launcher that pops up at the mouse cursor
  position via a global hotkey (Win+Ctrl+Alt+M). It provides a 5x5
  grid for one-click app/folder launching plus a command-palette
  search supporting installed apps, files, web search, and an
  inline calculator. Keyboard navigation (arrow keys, Tab, Enter)
  is fully supported, and the window can be moved by dragging the
  center cell.
