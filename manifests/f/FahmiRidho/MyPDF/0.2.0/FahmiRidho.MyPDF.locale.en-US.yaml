ShortDescription: Local first PDF toolbox. Merge, arrange, split, compress, convert, OCR and more, fully offline.
Description: |-
  MyPDF is a small, fast desktop app that covers the everyday PDF workflow you
  would normally take to an online converter, except nothing ever leaves your
  machine. No uploads, no accounts, no limits, no tracking.
  Tools: merge, arrange (visual page organizer), split, pick pages, compress
  with full quality control, rotate, watermark, lock and unlock, PDF to images,
  images to PDF, Office to PDF, OCR with live progress, and text extraction.
  Most tools accept many files at once and run them as a batch.
  Requires Python 3.10+ with the pymupdf and pikepdf packages. Some features
  use optional free helpers: Ghostscript (stronger compression), LibreOffice
  (Office conversion) and Tesseract with ocrmypdf (OCR).
