ReleaseNotes: |-
  Ceiling 1.0.0 is the first stable Windows release.
  It monitors provider-reported capacity and reset windows, detects confirmed unexpected and banked resets, and offers Exact and Calm information modes with persistent history and charts.
  This release also includes Windows notification, taskbar-placement, credential-storage, browser-data, and Tauri capability hardening.
