ReleaseNotes: |-
  PuzzleTea v2.0.0 focuses on better puzzle difficulty control, easier puzzle-pack creation, and a smoother in-app creation flow.
  - Added Elo-backed difficulty generation across the puzzle catalog. Players can now target a 0..3000 difficulty instead of relying only on named presets.
  - Reworked Create into a richer puzzle picker. Choose from checked games, variants, and board sizes, set a target Elo, and optionally use a seed when exactly one puzzle leaf is selected.
  - Added in-app printable pack export. PuzzleTea can now build PDF packs from the TUI, with configurable title, header, footer copy, volume number, layout, seed, output paths, and optional JSONL output.
  - Added puzzletea new --difficulty <0..3000> for Elo-targeted CLI puzzle generation.
  - Added Elo-aware JSONL/PDF export metadata. Generated records can include target Elo, actual Elo, and confidence, and printed difficulty ordering prefers recorded Elo when available.
  - Added puzzletea export --spec <path> for generating printable packs from a JSON export spec.
  - Improved Ripple Effect generation with stronger cage shaping, fewer oversized/singleton cage issues, and more reliable difficulty scaling.
  - Updated daily puzzle selection to use the new variant-based generation path.
  - Refreshed README/game documentation links and regenerated preview GIFs for the updated UI and puzzle behavior.
