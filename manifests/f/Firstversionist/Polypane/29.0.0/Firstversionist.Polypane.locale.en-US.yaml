ReleaseNotes: |-
  **Polypane 29**
  Polypane 29 introduces a redesigned panel UI that feels more familiar, a new network panel for inspecting requests, a new snippet store for discovering and installing snippets, and a custom selectors overview in the outline panel, plus many other improvements and fixes. [Full release notes](https://polypane.app/blog/polypane-29-new-network-panel-snippet-store-and-chromium-148/)

  **New**

  - **New** Network panel
  - **New** Snippet store
  - **New** Panel: Switch to single-line with overflow tab bar
  - **New** Grid/Flex visualisations in Polypane Peek
  - **New** Outline panel: Custom selector overview
  - **New** Passkeys keychain integration on macOS
  - **New** Meta panel: WhatsApp preview
  - **New** Devtools panel: Inspect shared workers and service workers (Thanks Przemyslaw!)
  - **New** Snippets panel: live preview option (Thanks Kari!)
  - **New** Activated html-in-canvas API by default
  - **New** Chromium 148.0.7778.56

  **Improvements**

  - **Improved** Polypane Peek: iframes are now inspectable and can be selected
  - **Improved** Load performance for custom local domains (Thanks Mike!)
  - **Improved** Confirmation dialogs are now deduplicated when called multiple times in a row (Thanks Matija!)
  - **Improved** JSON viewer: Makes data available in the console as window.json
  - **Improved** Elements panel: A11y tab now links all labelledby elements (Thanks Eric!)
  - **Improved** Elements panel: A11y tab now shows aria-describedby value (Thanks Eric!)
  - **Improved** Elements panel: Stable references to elements for hot reloading dev servers (Thanks Matyáš!)
  - **Improved** Elements panel: Load new styles on injection by hot reload servers (Thanks Matyáš!)
  - **Improved** Elements panel: Toggle pseudo styles in style panel (Thanks Eric!)
  - **Improved** Elements panel: del key now removes element in tree view
  - **Improved** Console panel: new $$$() helper that also searches shadow DOM.
  - **Improved** Outline panel: Accessibility tree now shows a description as well as the referenced IDs (Thanks Eric!)
  - **Improved** Basic auth popup now follows the system design
  - **Improved** Form autofill: Ability to use a default email address (Thanks Tom!)
  - **Improved** Form autofill: Move lists matching the element to the top
  - **Improved** Find elements: cmd/ctrl + enter now shows element in Elements panel (Thanks Ricky!)
  - **Improved** Debug tools: Improve wording in Color contrast tool (Thanks Ana!)
  - **Improved** Snippets Editor: Improved layout when editing
  - **Improved** Traffic lights alignment on macOS 26 is now improved
  - **Improved** Session management: Add confirmation dialog before deleting session
  - **Improved** Pane resizing performance when you have a lot of panes open
  - **Improved** More deterministic page loading after click actions
  - **Improved** Integrations: new Marker.io logo

  **Fixes**

  - **Fix** Elements panel: Improve accessible name calculation labeled by elements with roles without accname (Thanks Eric!)
  - **Fix** Elements panel: Events badge was not visible in tree view (Thanks Ashlee!)
  - **Fix** Elements panel: Allow editing the color of an image-only background property
  - **Fix** Elements panel: Copy CSS for keyframes was missing the animation name
  - **Fix** Elements panel: Font weight wasn't accurate for contrast calculation in A11y tab
  - **Fix** Browse panel: Previous tab shortcut was not working (Thanks Matija!)
  - **Fix** Browse panel: New window from panel did not always create new tab
  - **Fix** Browse panel: New tab should focus access bar (Thanks Matija!)
  - **Fix** Browse panel: Add extension button did not work
  - **Fix** Full page screenshots: use correct viewport height when making screenshots
  - **Fix** Context menu: 'Save link as...' option did not work
  - **Fix** Outline panel: Prevent accessibility tree from collapsing focused elements
  - **Fix** Outline panel: Prevent double tooltips when hovering over elements
  - **Fix** Styles: Prevent React router from trashing styles on load (Thanks Nathan!)
  - **Fix** Console panel: Prevent extra white space in styled console messages
  - **Fix** 'No internet connection' warning is now aligned correctly
  - **Fix** Meta panel: The suggested file name now includes correct name
