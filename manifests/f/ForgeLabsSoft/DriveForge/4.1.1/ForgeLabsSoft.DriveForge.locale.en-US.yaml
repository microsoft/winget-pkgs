Description: |-
  DriveForge makes common but normally-complicated Windows disk tasks simple and safe:
  create bootable Windows or Linux USB drives, clone a running PC to another drive,
  back up and restore Windows to an image, recover deleted files, securely erase drives,
  and diagnose drive health. It is a single self-contained executable with no ads,
  no telemetry, and no accounts. Free and open source under the GPL-3.0.
