ShortDescription: Converts mixed-script Korean text into hangul-only text
Description: Gukhanmun converts Korean text written in mixed script, with hanja characters interleaved with hangul, into hangul-only text. It provides a Rust library and command-line tool with support for plain text, HTML, and Markdown formats.
