ShortDescription: Coding agent for DeepSeek models that runs in your terminal
Description: Terminal coding agent for DeepSeek V4. It runs from the deepseek command, streams reasoning blocks, edits local workspaces with approval gates, and includes an auto mode that chooses both model and thinking level per turn.
