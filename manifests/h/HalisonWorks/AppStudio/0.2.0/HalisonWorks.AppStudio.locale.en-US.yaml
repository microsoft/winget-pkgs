ShortDescription: Live JSX component viewer and packager — render any React file with zero setup.
Description: |-
  App Studio is a lightweight JSX component viewer for React developers.
  Paste or load a .jsx file and see it rendered live via runtime Babel with
  auto-resolved dependencies from esm.sh. Save canvases to a local library,
  reopen them later, and package any canvas as a standalone Windows installer.
