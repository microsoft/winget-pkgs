ReleaseNotes: |-
  Updated Features
  Disk reading errors tolerance
  Hex Editor Neo now correctly handles data reading errors when editing volumes or disks. Damaged sectors are now highlighted in hex editor windows. In addition, when an entire disk or volume is copied to a file (using the File » Save As command), bad blocks are skipped and the full save operation is completed. If there were any bad blocks, they are selected in an opened volume, and a spearate text map is created with addresses and sizes of each bad block range.
  Bug Fixes
  Broken text inserting (typing) in Text Pane in UTF-16 mode
  Typing text in insert mode into the Text Pane worked incorrectly if hex window was in in UTF-16 encoding.
  Fixed regression in checksum calculation
  This release fixes a regression in several checksum algorithms (notably, custom CRC) introduced in the previous release.
