ReleaseNotes: |-
  Updated Features
  Better visualization of long simple arrays in Info Pane
  Info pane now provides the description of a long simple array if the editor is in the middle of it. Previously, the description was missing in this case.
  Bug Fixes
  Ctrl+End does not work correctly on empty document
  Fixed incorrect behavior of Ctrl+End key combination on empty document.
  "Display cursor address on the left" option rendering bug
  Fixed broken rendering of main cursor's address in the address pane with option "Display cursor address on the left" enabled.
  Broken search with alignment > 1
  The editor could skip some search results when search was carried with alignment greater than one. This could happen if two matches overlapped, but the first match was unaligned. The editor also could fail to correctly find aligned matches when search was executed over multiple selection.
