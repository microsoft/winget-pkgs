ReleaseNotes: |-
  Bug Fixes
  Crash during font enumeration
  Hex Editor Neo could crash during font enumeration in Tools » Settings » Binary Editor settings page for certain combinations of installed fonts. Fixed.
  Anchor to Selection command did not respect the Single Selection mode
  A bug has been fixed that allowed the Anchor to Selection command to create multiple selections even when Single Selection mode was turned on.
