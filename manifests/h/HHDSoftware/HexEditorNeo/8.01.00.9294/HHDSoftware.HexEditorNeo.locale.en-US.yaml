ReleaseNotes: |-
  Updated Features
  Structure Viewer's Info Pane update
  Structure Viewer no longer shows individual elements of simple arrays in info pane. A single box representing a simple array itself is shown instead. This change saves the screen space.
  Bug Fixes
  Save may hang
  In some situations, the editor may hang during saving file changes. Fixed.
  Previous version settings are not loaded
  Version 8 could not load settings from version 7. Fixed.
  File size is not updated
  Changes to file size were not always reflected in the status bar. Fixed.
