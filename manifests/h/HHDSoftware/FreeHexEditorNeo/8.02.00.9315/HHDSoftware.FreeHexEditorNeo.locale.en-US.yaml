ReleaseNotes: |-
  Updated Features
  Preservation of editing history
  Editing history is now preserved after saving changes to encoded binary files (Intel HEX and Motorola S Records).
  Bug Fixes
  "Synchronize Windows" File Comparison window switch state is preserved
  The state of the "Synchronize Windows" switch is now correctly preserved.
  Improved crash reporting
  Built-in crash reporter is now able to catch and report more types of application errors.
  Open Hex/Insert Hex commands did not work
  This release fixes a regression in version 8 that broke support for encoded binary files (Intel HEX and Motorola S Records).
  Fixed endianness in disassemblers
  The disassembler now enforces correct endianness supported by selected architecture.
  Incorrect history grouping
  Fixed broken history grouping for "Insert" commands.
  Fixed Purge branches command
  History » Purge Branches command could not work as expected in certain situations.Fixed several bugs in search engine
  A bug in new version 8's search engine has been fixed. This is the core component that powers Find, Find All, Replace, Replace All and several other commands.
