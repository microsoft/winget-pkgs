Description: |-
  NoteDeck は Misskey とそのフォークに対応したデッキクライアントです。
  複数サーバーのタイムラインを効率よく閲覧でき、ローカル全文検索、AI 統合、localhost API など
  デスクトップネイティブならではの機能を備えています。
Tags:
- deck
- fediverse
- misskey
- social-media
ReleaseNotes: |-
  What's New
  新機能
  - MFM レンダリングを完全対応（引用・検索・数式）
  - PiP ウィンドウ: 任意カラムの PiP 化、複数ウィンドウ対応、デッキ復帰機能
  - リノート解除機能とボタンのハイライト表示
  パフォーマンス改善
  - Note Store にエビクション上限を追加しメモリ増加を防止
  - shiki の言語定義を遅延読み込みして初期化を高速化
  - 画像プロキシにサムネイルリサイズと WebP 変換を追加
  - 画面外カラムの DOM を遅延アンロードしてメモリを節約
  - TransitionGroup の FLIP 計算を除去しノート挿入を高速化
  バグ修正
  - サーバーAPIが空データを返した場合にOGPフォールバックが効かない問題を修正
  - サーバー検出を Rust 経由にして CORS ブロックを解消
  - キャッシュ表示時のスケルトンチラつきを解消
  - PiPボタンで常にカラム選択UIを表示する
  - useNoteList に上限を追加し全経路でノート件数を制限
  リファクタリング
  - テンプレート内の $emit() を setup の emit() に置換（Vapor モード準備）
