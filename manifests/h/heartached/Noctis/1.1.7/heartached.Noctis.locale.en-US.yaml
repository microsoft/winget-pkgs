ReleaseNotes: |-
  What's Changed
  🎉 New Features
  - Paste Apple Music URL or album ID for animated artwork search — when iTunes free-text /search misses an album (e.g. Bad Bunny's nadie sabe lo que va a pasar mañana), paste a music.apple.com/.../album/.../<id> URL or just the numeric ID into the new input on the Animated Artwork tab to route through /lookup?id= and find it deterministically
  - Search lyrics button on Metadata > Synced Lyrics tab — fetches synced lyrics from LRCLIB by track title + artist + duration, auto-fills the textbox, ticks Enable, and shows "Lyrics found" / "No Lyrics found" status next to the button
  - Join Discord button in Settings > About — sits next to Star on GitHub, opens the Noctis Discord server
  - Discord badge in README — gray DISCORD + blue JOIN SERVER pill alongside the existing License/Platform/.NET/Downloads/Build badges
  🔧 Bug Fixes
  - Metadata editor input borders invisible in light theme — made visible and properly themed
  - Inline playback bar on lyrics page showing stale album art + track title after returning from another view — fixed display state persistence
  - Lyrics page View Album navigation not participating in page history — fixed to use normal navigation flow
  - Album Back behavior from lyrics — Albums/Home → Lyrics → Album → Back now correctly returns to Lyrics instead of jumping to Albums
  - View Album from playback bar ⋯ menu — now uses same album navigation path as lyrics-page album link
  - Lyrics button toggle incorrectly returning to wrong page — clicking lyrics button on lyrics page correctly returns to previous page
  - Lyrics column blank flash on return to lyrics — refreshed active lyric position immediately and jumped to active line instead of delayed scroll
  - Main playback bar shrinking behind lyrics page — added CompactWhenLyricsPageActive="False" to main PlaybackBarView only
  - Lyrics page playback bar visibility state — cleaned up with separate mounted/visible/opacity/hit-test properties
  - Settings equalizer dropdown shifting — kept preset list stable (always including Custom), pinned ComboBox width, disabled hover scaling
  - Lyrics page "View Album" visual glitch — deferred album navigation one UI dispatcher turn so menu/flyout closes before page switch
  - Album-detail navigation chrome from Lyrics/playback controls — forced cover-flow state off and hid Library/Cover Flow toggle
  - Equalizer slider/preset lag — EQ changes were taking up to ~1s to become audible because VLC's default --file-caching=300ms buffer held pre-EQ-filtered audio. Reduced --file-caching, --live-caching, and --disc-caching to 50ms while leaving --clock-jitter at its 5000ms default so Bluetooth / high-latency endpoints stay stable
  - 3-dot menu shifting down on open in album-detail track rows — the default Button press-scale was momentarily shrinking the button bounds, moving the popup anchor between mousedown and mouseup. Pinned RenderTransform="scale(1)" and emptied transitions on the row 3-dot button so the anchor stays stable
  - Lyrics page 1:47 right-side timestamp inconsistent with 1:40 — left side had Margin="10,0,0,0" while the right side was flush against the slider edge. Added matching right margin for symmetry
  - Animated artwork preview textbox clipped at the top — fixed-Height="360" preview Border was overflowing the bottom-docked panel when the new URL textbox + caption took up extra vertical space. Switched to MaxHeight="360" with VerticalAlignment="Stretch"
  - README Home screenshot not rendering on GitHub — file on disk was Home.png (capital H) while README referenced home.png (lowercase). GitHub's filesystem is case-sensitive; renamed to match
  - Settings scan progress text — "Scanning Library 1900..." (with the live count + ellipsis) replaced with a clean "Scanning Library"
  ⚡ Performance
  - Equalizer application reworked — settings changes no longer run native VLC work directly on UI thread; EQ state updates immediately with coalesced background worker applying latest state
  🎨 UI Polish
  - All Back button labels — renamed from "Back to X" (Albums, Playlists, Lyrics, etc.) to single "Back" for clean consistency
  - "Back to Albums" button text clipping — resolved by renaming to single "Back" label
  - Playback bar mounted behind lyrics page — no longer detaches/reloads when leaving lyrics, keeps main app state intact
  - Lyrics-page playback bar — restored to original compact behavior so only app-wide player stays full-width
  - Apple Music URL input auto-hides when animated cover is set — the paste-URL textbox + caption disappear once an animated cover has been added and reappear when the user removes it
  - Search-lyrics status text — "Lyrics found" / "No Lyrics found" renders to the left of the Search lyrics button instead of being hidden behind a tooltip
  Full Changelog: v1.1.6...v1.1.7
