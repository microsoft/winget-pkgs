ReleaseNotes: |-
  What's Changed
  - Fixed audio stuttering on the first play after launching the app
  - Added a silent audio keep-alive that keeps the output device warm, so playback no longer starts against a cold USB audio interface or Bluetooth device
  - Keep-alive parks after 10 minutes of inactivity (laptops can still auto-sleep) and resumes automatically on playback
  - Ensured the volume slider always controls the music stream, never the silent keep-alive stream
  - Added environment overrides for audio troubleshooting (NOCTIS_KEEPALIVE, NOCTIS_KEEPALIVE_IDLE_MS)
