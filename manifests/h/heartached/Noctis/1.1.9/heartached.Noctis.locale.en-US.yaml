ReleaseNotes: |-
  What's Changed
  - Added contrast-aware accent foreground support for better readability with light accent colors
  - Improved accent-colored buttons, icons, toggles, and checkboxes across the app
  - Improved custom accent color picker layout and hover behavior in Settings
  - Added Apple Music-style animated lyrics with per-word highlighting and smooth transitions
  - Added blur and scaling effects for synced lyrics
  - Added animated artwork-based lyrics page backgrounds
  - Added Artwork background mode alongside Solid and Gradient modes
  - Added Windows taskbar thumbnail toolbar controls for Shuffle and Favorite
  - Added hover-to-open submenu support across menus
  - Added batch metadata editor with multi-track editing support
  - Added rename-by-pattern support with live preview and conflict detection
  - Added audio converter with ffmpeg integration and format conversion support
  - Added ReplayGain scanner and playback support
  - Added ReplayGain settings and live volume adjustment support
  - Added release type detection and metadata support
  - Added ListenBrainz scrobbling integration
  - Added release-type sections to Artist Detail pages
  - Added release-type filtering in Library Albums view
  - Added release type override controls in Metadata Editor
  - Added ListenBrainz account integration in Settings
  - Added experimental feature badges across audio tools and metadata dialogs
  - Improved queue popup readability and hover styling
  - Improved floating playback bar spacing across all major views
  - Improved album tile title layout consistency
  - Improved Lyrics panel layout, artist chip behavior, and readability
  - Improved Lyrics page background transitions and foreground readability
  - Improved Lossless badge icon styling
  - Improved taskbar toolbar icon visibility and consistency
  - Improved Lyrics panel alignment and spacing
  - Improved Favorites ordering so newly favorited items appear first
  - Improved playlist sorting and submenu hover behavior
  - Improved dialog layouts, button ordering, and pill-shaped controls
  - Improved Settings account card layouts and styling
  - Improved README feature list and documentation
  - Fixed invisible text and icons with light accent colors
  - Fixed queue popup text visibility in Light theme
  - Fixed content clipping behind the floating playback bar
  - Fixed album tile spacing inconsistencies
  - Fixed hover styling conflicts in queue rows
  - Fixed Lyrics page navigation flickering
  - Fixed unreadable Lyrics page timeline and metadata on light album covers
  - Fixed invisible labels in Lyrics background color picker
  - Fixed unreadable Remove Lyrics button styling in Metadata Editor
  - Fixed selection drift issues caused by recycled list containers
  - Fixed Search Lyrics button visibility with light accent colors
  - Fixed volume slider static and popping during drag
  - Improved Bluetooth playback stability by restoring VLC cache defaults
