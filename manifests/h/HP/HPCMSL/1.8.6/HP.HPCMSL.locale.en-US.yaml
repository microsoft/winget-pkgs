ShortDescription: A collection of powershell functions for managing HP BIOS, and streamlining the download and organization of Softpaq downloads.
ReleaseNotes: |-
  - [NEW] Adds Invoke-HPDisplayFactoryReset command.
  - [NEW] Adds Get-HPDisplayCalibrationReport command.
  - [NEW] Adds disconnected display firmware update support to Update-HPDisplayFirmware.
  - [NEW] Adds new properties to Get-HPDisplay and Set-HPDisplay.
  - [NEW] Adds more color presets to Get-HPDisplay and Set-HPDisplay.
  - [NEW] Adds Get-HpEpscBootlogEvidence command.
  - [NEW] Adds Get-HPEpscCerts command.
  - [NEW] Adds Invoke-HpEpscBootlogEvidenceValidation command.
  - [NEW] Adds -UsesOssIntegration, -Url, -ClientId, and -ClientSecret parameters to Get-HPPlatformCertificateData, Invoke-HPCertificateChainValidation, and Invoke-HPPlatformIntegrityCheck commands.
  - [NEW] Adds proxy support for commands utilitized in WXP BIOS Updates.
  - [UPDATED] Updated Get-SoftpaqList to use new data source.
  - [FIX] Fixes case sensitivity issue for Category parameter for 'Driver' value in Get-SoftpaqList.
  - [FIX] Fixes Install-HPDockWmiProvider new version check error.
  - [FIX] Fixes Get-HPBIOSUpdates -Latest -All Dependency error.
  - [FIX] Fixes Get-HPBIOSWindowsUpdate error for HP Z4 G4 Workstation Models with older BIOSes.
  - [FIX] Fixes timestamp check for validating if download is needed.
  - [FIX] Fixes multiple app registrations for toast notifications.
