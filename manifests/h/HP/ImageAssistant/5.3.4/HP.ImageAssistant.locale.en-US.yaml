ReleaseNotes: |-
  v5.3.4 (2026-02-13)
  Fixes an issue that caused certain SoftPaqs to be incorrectly included from Create Drivers Pack.
  Introduces support for the HP USB-C 100W G6 Dock model.

  v5.3.3 (2025-11-18)
  Addressed a security vulnerability.
  Resolved extraction issues to UNC paths.
  Added support for two additional Thunderbolt 4 G6 dock models.

  v5.3.2 (2025-04-25)
  Tackled path-related extraction problems.
  Enhanced USB device detection capabilities.

  v5.3.1 (2024-12-04)
  Improved Create Driver Pack functionality to support long path names.
  Updated file properties.

  v5.3.0 (2024-08-27)
  Introduced Windows 11 24H2 support (including ARM64).
  Removed CAB driver pack creation.
  Upgraded .NET Framework target to 4.8.
ReleaseNotesUrl: https://ftp.hp.com/pub/caps-softpaq/cmit/HPIA.html
InstallationNotes: |-
  The installer is a self-extractor. All binaries are extracted to the installation path you
  configured, which defaults to "C:\SWSetup\HPImageAssistant".

  Launch the main program "HPImageAssistant.exe" on your own.

  To uninstall, simply delete the installation folder (e.g. "C:\SWSetup\HPImageAssistant").
  If you used the default path, you can also remove the parent "C:\SWSetup" folder if it is
  otherwise empty.
