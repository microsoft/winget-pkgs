ReleaseNotes: |-
  Highlights
  Team Mode Reliability
  - Teammates that stop responding mid-task are now automatically detected and escalated to failed, sending a notification to the lead agent so the team session can recover rather than hang indefinitely.
  - The teammate prompt now instructs agents to end their turn immediately when asked to stand by, preventing provider-side LLM request timeouts (previously manifesting as "LLM request timed out after 300s") that would silently fail the agent.
  ACP Connection Fix
  - AionUi now auto-detects and clears corrupted bunx cache on startup. A known bun x issue could leave the temp cache in a broken state, permanently crashing ACP backends (Claude, Codex, CodeBuddy) on every retry. Affected users no longer need to manually clear the cache.
  Bug Fixes
  - Clicking "New Chat" while a preset assistant is active now reliably resets to the default agent without flickering or reverting on refresh.

  What's Changed
  - fix(acp): auto-detect and clear corrupted bunx cache on startup by @TCP404 in https://github.com/iOfficeAI/AionUi/pull/2451
  - fix(guid): use locationKey to reset assistant flag reliably by @piorpua in https://github.com/iOfficeAI/AionUi/pull/2460
  - fix(team): escalate silent agents to failed and stabilize team UI by @lixunqi12 in https://github.com/iOfficeAI/AionUi/pull/2425
  - fix(team): prevent 300s LLM timeout when teammates stand by by @lixunqi12 in https://github.com/iOfficeAI/AionUi/pull/2426
  New Contributors
  - @TCP404 made their first contribution in https://github.com/iOfficeAI/AionUi/pull/2451
  - @lixunqi12 made their first contribution in https://github.com/iOfficeAI/AionUi/pull/2425
