ReleaseNotes: |-
  What's New
  Features
  - Cursor Agent – Cursor Agent added as a built-in ACP backend (#1319).
  - WebUI – Remote access username can be changed (#1297);
  - Notifications – Agent task completion notifications with user message (#1185).
  - Guid – AionUi Skills Market toggle added on the guide page (#1343).
  - WebUI – Desktop WebUI preferences are persisted and restored on startup (#1127).
  - Tray – Tray menu updated with recent chats and task controls (#1187).
