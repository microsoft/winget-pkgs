ReleaseNotes: |-
  Highlights
  This release rolls up the changes from v2.1.29 and v2.1.30.
  Assistants are now a top-level entry with My / Official tabs
  - Assistants moved out of Settings into their own top-level sidebar entry (above Scheduled Tasks). The page is split into two tabs: My Assistants — your CLI and custom assistants, grouped and drag-reorderable (CLI agents stay pinned on top), with enable/disable filtering and a guided empty state — and Official Assistants — read-only templates you can browse and "copy to my assistants."
  - Official built-in assistants are now off by default instead of flooding every selection list, so your own CLI assistants aren't buried. (Existing setups are migrated automatically.)
  Settings revamp
  - Opening Settings now lands on the Agents tab. Skills and tools are split into separate entries, page headers follow one consistent paradigm, and the agent availability filter (All / Available / Unavailable) matches the assistant home tabs.
  - When no image-generation model is configured, the image settings now show an inline link straight to the Model config page.
  Slash command menu on the home page
  - The home-page input gained a slash (/) command menu — with a built-in /open, agent-provided commands, and your selected skills as fallback commands. Filtering uses substring matching with grouped highlights.
  Assistant thought-level defaults
  - Assistants can now set a default "thought level" in the editor (auto or fixed), and you can pick the thought level from the home-page model selector; the choice is sent through when starting a conversation.
  Bug Fixes
  - Fixed a bug where a configured OpenAI API key was silently ignored (the SDK expected apiKey but received api_key), causing calls to fall back to the environment variable instead of your rotation-list key. Also fixed a throttle timer leak and added missing image alt text.
  - Windows installer: hardened NSIS update failure handling so when a previous install can't be removed, the dialog names the blocking program/path instead of a generic E1002/E1003 error, with better log/Sentry correlation.
  - Scheduled task history is easier to manage: run titles now include the execution date, and you can batch-select and delete conversations from a task's history.
  - Assistant editor engine options now come from the managed agent runtime catalog, matching Agent Settings semantics (including unchecked agents), and unchecked built-in agents show an "unknown" availability status instead of defaulting to available.
  - Frontend logs now rotate by each message's date, so cross-day writes land under the correct dated log file.
  What's Changed
  - feat(assistant): promote assistants to a top-level sidebar entry with My / Official tabs by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3506
  - fix: show unchecked agents and rotate frontend logs by message date by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3507
  - fix(cron): improve scheduled task conversation history by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3510
  - fix(assistant): use management catalog for editor engines by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3511
  - chore: bump version to 2.1.29 by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3513
  - feat(assistant): add thought level defaults to assistant UI by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3522
  - docs(contributing): align PR template with contribution rules by @lornestack in https://github.com/iOfficeAI/AionUi/pull/3515
  - feat(settings): revamp settings — split skills/tools, unify page paradigm, agent filter & image-model link by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3520
  - fix(installer): harden Windows NSIS update failure handling by @tcp404 in https://github.com/iOfficeAI/AionUi/pull/3523
  - fix: wrong OpenAI SDK param name, throttle cleanup leak, missing alt text by @fix2015 in https://github.com/iOfficeAI/AionUi/pull/3512
  - feat(guid): add slash command menu by @kaizhou-lab in https://github.com/iOfficeAI/AionUi/pull/3524
  - chore: bump version to 2.1.30 by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3526
