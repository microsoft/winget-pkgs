ReleaseNotes: |-
  Highlights
  This is a hotfix release for a v2.1.36 regression — recommended for all Windows and Linux users.
  Bug Fixes
  - Fixed the titlebar minimize / maximize / close buttons doing nothing on Windows and Linux (a v2.1.36 regression). Update checks and app restart triggered from the UI were affected by the same underlying issue and are fixed too.
  - The team member "processing" timer no longer restarts from 0s when you open settings and come back, toggle fullscreen, or resize the window — it now shows the true elapsed time.
  What's Changed
  - fix(bridge): accept void-param invokes after JSON serialization by @IceyLiu in https://github.com/iOfficeAI/AionUi/pull/3611
  - fix(renderer): keep team elapsed timer continuous across remount by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3612
  - chore: bump version to 2.1.37 by @piorpua in https://github.com/iOfficeAI/AionUi/pull/3613
  Full Changelog: https://github.com/iOfficeAI/AionUi/compare/v2.1.36...v2.1.37
