ReleaseNotes: |-
  Highlights
  ⭐ Meet the AionUi Butler — your built-in assistant for AionUi itself
  This release bundles AionCore v0.1.31, which introduces a brand-new built-in assistant: the AionUi Butler. Instead of digging through settings menus, you can now just talk to it in plain language to manage AionUi itself — across three areas:
  - Configure — create and edit assistants, attach skills, manage MCP servers and LLM providers, and change app/UI settings, all by asking.
  - Diagnose — when something isn't working, the Butler can inspect your conversations, read logs, and check the health of your providers, scheduled tasks, teams, and MCP connections to tell you what went wrong.
  - Remote access — ask it to put your local WebUI online and it walks you through a one-click public link (via an automatic Cloudflare tunnel) — no networking knowledge needed, no jargon. It even sets everything up and verifies the link works before handing it to you.
  Just pick the AionUi Butler assistant and start chatting — it's the easiest way to set up, fix, and share your AionUi.
  Smarter Update Notifications
  - Updates no longer interrupt you with a blocking pop-up. New versions now appear as a quiet card in the bottom-right corner that you can dismiss or minimize and keep working.
  - Downloads are smarter: repeated download requests no longer pile up, you can truly cancel a download in progress, and an already-downloaded update is remembered so you don't have to fetch it again.
  Cleaner Model & Thinking Controls
  - The thinking-level (thought depth) selector now lives directly inside the header model menu for ACP and Aion CLI conversations, so picking a model and its reasoning level is one tidy step instead of two separate controls.
  Team Mode Reliability
  - Team conversations stay in sync more reliably: queued team messages are tracked correctly, and a turn's status clears properly when a teammate finishes.
  - When you upgrade a solo chat into a team, handoff messages now wait for the original conversation to finish its turn before being delivered, preventing dropped or out-of-order messages.
  Codex Image Handling
  - Images generated in Codex ACP conversations now display inline in tool cards and the View Steps summary, with a lightweight hover-to-download button. Oversized raw output is trimmed automatically so previews load cleanly.
  Bug Fixes
  - Fixed a wide empty gap that appeared above the list on the assistant management page.
