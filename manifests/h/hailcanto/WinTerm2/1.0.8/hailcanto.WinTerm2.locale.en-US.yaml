ShortDescription: Advanced terminal emulator for Windows, inspired by macOS iTerm2
Description: |-
  WinTerm2 is a modern terminal emulator designed specifically for Windows, inspired by the highly acclaimed design philosophy of iTerm2 on macOS. It offers multi-tab support, split panes, theme switching, search functionality, and delivers a smooth and visually appealing terminal experience powered by WebGL-accelerated rendering and ConPTY support.

  Highlights
  - Multi-tabs + multi-level nested splits
  - Floating panels (draggable and resizable)
  - Panel navigation via arrow keys + full-screen mode per panel
  - Double-click tab to rename
  - Synchronized input (broadcasts commands to all panels within the same tab)
  - Command palette (Ctrl+Shift+P for fuzzy command execution)
  - Layout presets (two-column, three-column, grid, etc., applied with one click)
  - Session save and restore (recovers layout and working directory after reopening)
  - Clickable file paths/URLs to open directly
  - Intelligent path recognition (supports Windows absolute paths, relative paths, WSL/Git Bash Unix-style paths)
  - Right-click context menu
  - Six carefully curated built-in themes
  - WebGL GPU-accelerated rendering
  - Full 256-color and TrueColor support
  - Correct display of Unicode 11, CJK characters, and Emojis
  - Support for iTerm2 image protocol
  - Adjustable window transparency
  - Bottom status bar (panel info + shortcut hints)
  - Search match count display
  - Automatic detection of PowerShell 7 / Windows PowerShell
