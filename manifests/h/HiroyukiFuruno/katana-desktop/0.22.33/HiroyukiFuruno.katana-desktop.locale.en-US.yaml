ReleaseNotes: |-
  🚀 Features
  - Interactive HTML browser view: Added browser-equivalent viewing for local .html / .htm files and web URLs, including CSS layout, JavaScript actions, form input, links, navigation, and reload inside the native document view.
  ✨ Improvements
  - Workspace file handling: HTML files now appear in the workspace and can be opened through the file picker or drag-and-drop while still respecting the normal workspace filter.
  🐛 Bug Fixes
  - Markdown-only tools stay scoped: HTML files are no longer treated as Markdown for diagnostics, formatting, or document export actions, reducing misleading messages for preview-only documents.
  🔧 System
  - Preview stability: HTML interaction and repaint checks now verify that updated controls and unchanged page content remain visible without overlapping or clipped text.
