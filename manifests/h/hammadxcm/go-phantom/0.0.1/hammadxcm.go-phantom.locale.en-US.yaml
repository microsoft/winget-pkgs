ShortDescription: Cross-platform input simulation tool for testing and automation
Description: Phantom is an open-source input simulation tool for developers and QA engineers. It generates realistic mouse movements, keyboard input, scrolling, and application switching for use in UI testing, screen-lock prevention, demo environments, and accessibility testing. Features include configurable simulation profiles, a TUI dashboard, global hotkeys, and a system tray interface.
