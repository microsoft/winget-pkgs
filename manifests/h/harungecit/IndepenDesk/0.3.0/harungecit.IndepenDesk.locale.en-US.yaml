ShortDescription: Independent virtual desktops per monitor for Windows - macOS-style Spaces behavior.
Description: IndepenDesk gives every monitor its own set of virtual desktops, like macOS "Displays have separate Spaces". Switching desktops only affects the monitor under the mouse cursor; other monitors are untouched. Includes per-monitor dynamic desktop counts, global desktop numbering, macOS-style slide animations, a Mission Control-like drag & drop overview, 8 UI languages and touchpad gesture integration.
