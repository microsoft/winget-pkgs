ReleaseNotes: |-
  PigeonPost v1.6.5
  🔒 Security
  - IP allowlist — restrict which client IP addresses may connect to the local API
  - Per-peer bearer token rotation — each peer gets its own token; the server owns token generation and rotation
  - Bearer token visibility toggle — show/hide the token in the UI
  ⚙️ API & Server
  - Configurable port — change from the default 2560 in Settings
  - Source IP logging — every incoming request is logged with its origin IP
  - File size limit — set a maximum upload size to protect disk space
  - Subfolder routing — incoming files land in a configurable subfolder, not just the root receive path
  🧹 UI Polish
  - Settings split into Basic / Advanced — advanced sections (Security, Keep Awake, Network, Webhook) are hidden behind a toggle; the toggle is pinned at the top of the Settings window
  - Feature visibility toggles — independently show or hide: Peers menu, Clipboard history, File transfer history, and each of the four stat cards (Files received, Clipboard sends, Clipboard reads, Uptime)
  - Dynamic window height — the main window resizes automatically based on which panels and stat cards are enabled (265 px base + increments per visible element)
  - Compact main window — removed the redundant "PigeonPost" title header; running-status indicator moved into the address card
  - Copyright & version footer moved from the main window to the Settings window, reducing main window height further
  - Stat cards aligned to address bar — fixed a phantom-gap bug caused by ColumnSpacing on hidden Width=0 columns; gaps are now computed dynamically
  - Clear button in the Clipboard history panel
  - Peers window — machine names and addresses no longer truncate (tooltip shows the full value); the "Saved peers" expander opens automatically when saved peers exist; window widened to 760 px
  📱 Companion App
  - iPhone & iPad — PigeonPost Companion is available on the App Store
  📖 Docs
  - README and wiki updated to cover all v1.6.5 features, UI layout changes, and the dynamic height formula
