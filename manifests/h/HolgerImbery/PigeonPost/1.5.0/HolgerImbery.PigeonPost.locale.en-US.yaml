ShortDescription: Windows 11 tray app exposing a local HTTP API for file and clipboard transfer from any network-connected device.
Description: |-
  PigeonPost is a lightweight Windows 11 tray application that exposes a simple
  local HTTP API for transferring files and clipboard content from any network-connected
  device to your Windows PC. Any HTTP-capable client can use it — automation tools
  like Android Tasker, command-line utilities like curl, scripts, or custom apps.
  No cloud service, no account, no setup beyond the app itself.

  Features:
  - Local HTTP API on port 2560 — receive files, read and write the clipboard
  - Bearer token authentication (optional)
  - mDNS/Bonjour auto-discovery for iOS companion app
  - Minimize to tray with live status indicator
  - Auto-update via GitHub Releases
  - Start with Windows option
