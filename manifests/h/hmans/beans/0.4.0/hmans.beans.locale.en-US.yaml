ShortDescription: A CLI-based, flat-file issue tracker for humans and robots.
Description: Beans is a CLI-based task management system that stores issues, bugs, and features as plain Markdown files in a .beans directory within your project. It keeps tasks alongside your code rather than in separate applications. Beans includes a built-in GraphQL engine for AI coding agents to query project context, an interactive terminal UI for managing tasks, and can generate Markdown roadmap documents.
