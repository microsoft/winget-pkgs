ShortDescription: 一款开源的字体设计工具。
Description: 一款用于生成个人字库（或图标字库）的开源创意工具。使用字玩，用户可以通过钢笔工具等图形编辑工具绘制字形，然后导出OTF字体文件。同时，字玩支持从图片中导入字形，也支持自定义字形组件功能，并提供了可编程脚本模块。字玩内嵌了一款用于测试的参数化字体模板，导入该模板，可以尝试体验字玩的参数化设计功能。字玩希望通过探索更多的创意，帮助字体（或图标）设计师或爱好者，简化设计流程，提高设计效率，为字体设计领域添砖加瓦。
