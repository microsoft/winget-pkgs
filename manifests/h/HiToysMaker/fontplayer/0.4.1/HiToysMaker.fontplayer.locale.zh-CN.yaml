ReleaseNotes: |-
  版本更新说明：
  1.  新增常用符号参数化模板雏形
  2.  修复Tauri端编辑过程中按删除键，直接跳回welcome页面的问题
  3.  修复钢笔组件横向翻转、纵向翻转开启时，编辑锚点时的bug
  4.  修复选中组件编辑时，mouseup后再点击空白处，会移动组件的问题
  5.  修复移动变换钢笔组件后，编辑模式下的问题问题
  6.  修复普通组件填充颜色后，线框也需要随之改变颜色的问题
  7.  修复多边形组件按回车键不闭合的问题
  8.  布局编辑界面，加上“使用骨架变化”切换按钮的限制条件，防止在无骨架的情况下出现bug
  9.  修复布局工具点击应用变换后，椭圆组件的位置变换bug
  10. 修复单击选择字形组件有时没效果的bug
  11. 修复钢笔工具开启编辑状态，拖拽锚点到边界框外的位置，关闭编辑工具后，钢笔工具边界框会跳动的问题
  12. 暂时禁用撤销重做功能：撤销重做模块目前存在诸多问题，每次引入新的功能后都会破坏原有逻辑，准备等工具成熟后整体重构
