ShortDescription: Detect, install, and keep AI coding CLIs up to date with one command
Description: A cross-platform CLI that reconciles your machine toward "every known AI coding CLI installed, working, and current" - installed tools get updated through the channel they were installed with, missing tools are installed after consent, and each tool is re-verified after the work.
