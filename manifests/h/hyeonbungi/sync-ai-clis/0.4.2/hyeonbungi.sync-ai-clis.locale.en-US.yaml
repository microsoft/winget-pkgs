ReleaseNotes: |-
  Release Notes
  Fixed
  - The Windows Get-FileHash fallback now accepts -LiteralPath as well as -Path. Codex's official install.ps1 verifies its downloaded archive with Get-FileHash -LiteralPath ..., so 0.4.1 could still fail in PowerShell environments where Microsoft.PowerShell.Utility was unavailable.
  Install sync-ai-clis 0.4.2
  Install prebuilt binaries via shell script
  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/hyeonbungi/sync-ai-clis/releases/download/v0.4.2/sync-ai-clis-installer.sh | sh
  Install prebuilt binaries via powershell script
  powershell -ExecutionPolicy Bypass -c "irm https://github.com/hyeonbungi/sync-ai-clis/releases/download/v0.4.2/sync-ai-clis-installer.ps1 | iex"
  Install prebuilt binaries via Homebrew
  brew install hyeonbungi/tap/sync-ai-clis
  Install prebuilt binaries into your npm project
  npm install sync-ai-clis@0.4.2
