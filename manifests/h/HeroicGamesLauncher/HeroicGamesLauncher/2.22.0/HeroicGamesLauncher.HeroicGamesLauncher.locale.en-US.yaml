ReleaseNotes: |-
  Hi!
  This new release of Heroic comes again with pretty exciting features like the ability to edit basically any game in your library, you can edit the game name, the Card and Cover images. As a bonus, now Sideloaded games also supports Cover images.
  Besides that, the new Console mode now supports some requested features like the ability to install and update or skip update for games and more.
  The new Deals screen also has some improvements like hiding the owned games and show wishlisted games.
  There are also several fixes, especially for Ubisoft titles from Epic games and more
  And some small but nice improvements to the Changelog modal: now it supports Videos! Check it out:
  Editing a Game
  drag.mp4
  New features in console mode
  Screencast_20260516_001503.mp4
