ReleaseNotes: |-
  Watch folder for changes

  If you are always adding files from the same folder as part of your workflow, you can now setup a folder for the program to watch and automatically add any new files to the list. Choose folder and setup file name pattern or regular expression to filter which files to add. You can also choose to include subfolders.

  Note: this feature is only availble for registered users.

  Change keyboard shortcut mappings

  You can now change the keyboard shortcut mappings to better suit your workflow. This allows for a more personalized and efficient use of the program. Keyboard shortcut configuration can be found in the settings window under the Keyboard Shortcuts tab.

  Configure default configuration for newly added methods

  When adding a new method, the program will load the configuration of the last used method of the same type. This can now be turned off in settings, so that am empty configuration is used instead.

  Full list of changes in version 4.21
  - Watch folder for new files and add them to the list automatically
  - Settings: Change keyboard shortcut mappings
  - Settings: Option to disable loading last used configuration when adding methods
  - Settings: Fixed changing field Word Separators not working properly
  - New tag: <SubFolder:1> will return the name of a folder within the same parent folder as the file. When used on folders, it will return the name of a subfolder within the folder
  - Timestamp method: Support changing created timestamp on macOS
  - Remove method: When using backwards mode with a remove count bigger than the available characters the program did nothing
  - Updated ExifTool
  - Faster first start after install on Windows
  - Various visual improvements
