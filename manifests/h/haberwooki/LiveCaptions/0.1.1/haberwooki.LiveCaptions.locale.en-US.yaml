ShortDescription: A live-captions overlay for Windows with local GPU transcription of system audio.
Description: |-
  A cross-app live-captions overlay for Windows. It captures your system audio and shows live
  transcription in an always-on-top overlay, transcribed locally with faster-whisper on your GPU
  (with automatic CPU fallback). It can also colour captions by speaker (live diarization) and save
  and search every session. Installs per-user with no admin rights; model weights download on first
  run.
Moniker: livecaptions
