ReleaseNotes: |-
  ## Stelliverse 5.0.10 — Cartes d'accès Pyam & partage de blueprints
  
  ### Cartes d'accès Pyam
  - Nouveau suivi des cartes d'accès **Pyam** (Executive Hangars), dans la page Contested Zones **et** dans l'overlay en jeu : coche tes 7 cartes, note ton stock de cartes rouge/bleue, et les vaisseaux déjà obtenus.
  - Partage : publie ton avancement par code et suis celui de ton groupe en direct — pratique pour préparer les sessions à plusieurs.
  
  ### Partage de blueprints
  - Tu peux maintenant partager ta collection de schémas par lien (juste les noms, rien de sensible).
  - En important le code d'un ami, tu vois ses schémas **et surtout ce qui te manque** par rapport à lui — idéal pour se répartir le craft en groupe.
  
  ### Blueprints — fiabilisation
  - Le rattachement des schémas au catalogue (en particulier **armures et composants**) a été encore consolidé : moins de doublons résiduels et de libellés restés en anglais à l'import.
  
  ### Confort
  - Les overlays utilisent désormais des barres de défilement au style de l'app, au lieu des barres système qui cassaient le rendu.
  
  ---
  Mise à jour automatique depuis l'app (Paramètres → Mises à jour), ou réinstallation propre via l'installeur ci-dessous.
