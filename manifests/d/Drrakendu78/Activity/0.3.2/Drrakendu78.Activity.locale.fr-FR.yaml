ReleaseNotes: |-
  ## What's New in v0.3.2
  
  ### Internationalisation
  - Synchronisation de **47 clés manquantes** dans les 30 fichiers de traduction
  - Toutes les langues supportées sont maintenant à jour
  
  ### Redémarrage intelligent
  - Popup de confirmation quand on active/désactive "Cacher l'icône de la barre des tâches"
  - Bouton "Redémarrer maintenant" ou "Plus tard" pour appliquer le changement
  
  ### Barre des tâches (System Tray)
  - Nouvelle option dans le menu du tray : **Cacher l'icône de la barre des tâches**
  - Toggle rapide sans passer par les paramètres
  
  ### Sécurité
  - Vérification d'intégrité **SHA-256** pour le système de mise à jour silencieuse
  - Changement de l'identifiant de l'application (`com.drrakendu78.activity`)
  
