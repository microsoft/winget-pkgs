ReleaseNotes: |-
  ## ✨ Ajustements majeurs
  ### Hub overlay plus libre et plus intelligent
  La v4.0.1 affine le travail de la refonte 4.0.0 avec un focus sur le hub overlay et sa tenue à l'écran.
  - Nouvelle option dans les réglages pour fixer le hub : haut centre, coins, gauche, droite ou mode libre
  - Le hub mémorise maintenant sa position manuelle quand il est déplacé
  - Double-clic sur le hub pour le recentrer rapidement
  - En mode libre, le dock s'oriente automatiquement selon la position du hub sur l'écran
  
  ### Meilleure compatibilité affichage / DPI
  Le hub et sa fenêtre Tauri s'adaptent mieux aux écrans avec mise à l'échelle Windows.
  - Dimensions logiques alignées entre frontend et backend
  - Recalcul dynamique de la taille réelle du hub
  - Meilleur clamp sur le moniteur actif pour éviter les débordements ou le contenu rogné
  - Meilleure tenue du hub sur les bords de l'écran en mode vertical
  
  ***
  ## Corrections
  - Synchronisation du preset de position entre la fenêtre principale et la webview overlay
  - Scroll vertical natif conservé quand le hub est docké sur un côté
  - Métadonnées de version alignées en 4.0.1 dans l'application, les manifests et l'updater
  - `latest.json` mis à jour avec la signature du setup `4.0.1`
  
