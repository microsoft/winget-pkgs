ReleaseNotes: |-
  ## 🪧 Améliorations
  
  - **Tableau de bord — Card Traduction** : reconnaît maintenant les sources de traduction personnalisées (ajoutées via la page Traduction). Affiche `Perso · <nom>` au lieu de retomber sur "SCEFRA" par défaut.
  - **Barre latérale** : email retiré sous le pseudo dans le profil utilisateur en bas de la sidebar (juste le nom maintenant).
  
  ## 🐛 Corrections
  
  - **Éditeur de bindings — détection des actions vides** : les inputs qui ne sont qu'un préfixe device sans bouton (`Js1`, `Js2_`, `Kb1`, `Mo1_`, etc.) sont désormais correctement détectés comme **non attribués**. Ils apparaissent maintenant dans le filtre "Actions vides" pour pouvoir être assignés.
  - **Éditeur de bindings — filtre par appareil** : quand un appareil spécifique est sélectionné, le toggle "Afficher les actions vides" est désormais respecté. Auparavant, les actions vides étaient toujours masquées dans ce mode.
  - **Éditeur de bindings — position après édition** : après modification d'une liaison, la ligne reste visible à sa position d'origine dans la liste, même si elle ne correspond plus au filtre courant. Plus besoin de scroller pour la retrouver. La row redevient soumise aux filtres normaux dès que tu changes un filtre/recherche.
  
  ***
