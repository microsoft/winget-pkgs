ReleaseNotes: |-
  ## ✨ Nouveautés
  
  **Tableau de bord d'accueil repensé**
  
  L'écran d'accueil affiche désormais un hub d'état dynamique avec :
  - **Statut serveurs RSI** en temps réel (Platform, Persistent Universe, Arena Commander) avec couleurs et incidents actifs. Click pour ouvrir la page officielle.
  - **Versions Star Citizen** détectées avec build/branche au survol (LIVE, PTU, EPTU, TECH-PREVIEW), et état de la traduction pour chacune. Click pour ouvrir la page Traduction.
  - **Carte Traduction** dynamique : `À jour` / `Mise à jour disponible` / `Partielle` / `Non installée`, avec la source réelle (SCEFRA / Circuspes / etc.).
  - **Carte Bindings** affiche enfin le bon compte de profils importés.
  - **Toutes les tuiles** (Traduction, Cache, Bindings) sont cliquables et amènent à leur page.
  - **Mini-lecteur d'ambiance** intégré : titre YouTube réel (nettoyé), prev/play/next, volume. Synchronisé avec les contrôles précédemment dans le header.
  - **Bouton principal du Hero** adapte son label selon l'état : `Installer la traduction` / `Mettre à jour la traduction` / `Traduction à jour`.
  
  **Indicateurs dans la barre latérale**
  
  Pastilles colorées à côté de :
  - `Traduction` (vert si à jour, ambre si maj dispo, rose si non installée)
  - `Mises à jour` (ambre quand une nouvelle version est dispo)
  
  **Programmes tiers — auto-launch et auto-close**
  
  Les programmes tiers configurés en `Auto` se lancent maintenant automatiquement aussi quand le RSI Launcher est ouvert manuellement (hors de StarTrad), et se ferment automatiquement quand le RSI Launcher se ferme.
  
  ## 🪧 Améliorations
  
  - **Statut serveurs RSI** : passage à l'API officielle cState (`status.robertsspaceindustries.com/index.json`), beaucoup plus fiable que le scraping HTML précédent.
  - **Card Bindings** : compte correctement le nombre de profils importés (LIVE + PTU + EPTU + TECH-PREVIEW combinés).
  - **Affichage instantané** au démarrage : cache local pour traduction, cache SC, serveurs RSI, bindings, versions — plus de "—" pendant 1-2s.
  - **Mini-lecteur** : remplace les contrôles audio du header, plus visible dans le tableau de bord.
  
  ## 🐛 Corrections
  
  - **Mise à jour automatique** : fix de l'erreur `os error 740 (ERROR_ELEVATION_REQUIRED)` qui empêchait l'install en mode utilisateur. L'application redémarre maintenant automatiquement en administrateur, installe la MAJ, puis se relance — sans avoir à cliquer "Installer" deux fois.
  - **Tooltips** : les tooltips (notamment celui des infos build/version sur le tableau de bord) ne sont plus tronqués quand ils dépassent leur conteneur.
  - **Encodage** : corrigés quelques toasts dont les accents étaient corrompus (`Chemin protÃ©gÃ©` → `Chemin protégé`).
  
