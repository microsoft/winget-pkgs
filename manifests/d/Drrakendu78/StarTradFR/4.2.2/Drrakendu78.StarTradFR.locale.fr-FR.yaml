ReleaseNotes: |-
  ## 🤝 Page Partenaires — refonte UX
  
  Suite directe de **4.2.1**, polish complet de la page Partenaires avec
  séparation propre des catégories et nouveaux comportements de navigation.
  
  ### Catégories séparées : Sponsors vs Sites
  
  La catégorie `sponsor` est désormais séparée en deux :
  - **Sponsors** — réservé aux vrais partenaires financiers / officiels
    (vide pour l'instant, header affiché avec un message d'empty state)
  - **Sites** — les 16 sites communautaires SC que StarTrad utilise au
    quotidien (Erkul, UEX, SCCrafter, SC Craft Tools, Schaulers, SC Cargo,
    AllSky Mining, Protixit, SCDB, Hauler, Finder Cstone, Verse Guide,
    SCMDB, SP Viewer, Star Citizen Wiki, PolyTool SC)
  
  Ordre des chips : `Tous · Organisations · Streamers · Discord · Sponsors · Sites`
  
  ### Reels visibles en mode catégorie unique
  
  Cliquer sur une chip de catégorie affiche désormais le reel correspondant
  en **mode wrap** (les cards descendent à la ligne automatiquement) au lieu
  du scroller horizontal — adapté à un affichage en grille quand on veut tout
  voir d'une catégorie.
  
  ### Detail panel : animations & UX
  
  - **Slide-out fluide** à la fermeture (220ms, cubic-bezier ease-in) — plus
    de disparition brutale
  - **Backdrop close** (clic sur la zone floutée) maintenant fonctionnel
    (le DragRegion ne bloque plus le clic)
  - **Touche Échap** pour fermer
  - Ligne "Partenaire depuis" masquée pour les sites/sponsors (pertinent
    uniquement pour les vrais partenaires)
  - Bouton "Visiter" adaptatif selon la catégorie (Voir sur RSI / Rejoindre
    le Discord / Voir la chaîne / Visiter)
  - Orgs avec discord lié : 2 boutons (RSI + Rejoindre le Discord) au lieu
    d'un seul
  
  ### Header des reels uniformisé
  
  Icônes monochromes (grise) dans un container neutre — fini les gradients
  colorés amber/rose/cyan/green qui rendaient l'ensemble bariolé. Look
  homogène et pro à travers les 6 catégories.
  
  ### Sponsors : favicons auto
  
  Les sites/sponsors sans logo défini récupèrent automatiquement leur
  favicon via le service Google `s2/favicons?sz=128`. Zéro config quand on
  ajoute un nouveau sponsor — son favicon apparaît tout seul.
  
  ### SponsorChip : embelli
  
  Chips plus dense (250px), background gradient subtil teinté par le `hue`
  du sponsor, barre d'accent verticale colorée à gauche, hover lift (-2px)
  + bordure plus claire. Look type carte Spotify/Netflix.
  
  ***
  
