ReleaseNotes: |-
  ## 🎮 Éditeur de bindings — refonte capture & mapping
  
  - **Capture native DirectInput** via `gilrs` : tes vJoy, HOTAS et sticks DirectInput (invisibles au navigateur) sont maintenant lus directement par l'app. Support jusqu'à **128 boutons** par device.
  - **Mapping dynamique js&lt;N&gt;** comme dans le jeu : le premier stick que tu presses devient `js1`, le deuxième différent `js2`, etc. Persisté par profil, stable entre sessions.
  - **Cards** affichées : sticks physiques par défaut sur `startrad_user_bindings_LIVE.xml`, vJoys du XML uniquement sur les profils importés (`layout_*_exported.xml`).
  - **Masquage par hardware** (œil sur la carte) : masquer MOZA / Keychron / HID Bluetooth resserre la numérotation pour que Sol-R [R] devienne `joystick:2` directement.
  - **Bluetooth HID host** : filtré automatiquement de la liste des joysticks (c'est l'adaptateur, pas un device de jeu).
  
  ## 🐛 Corrections
  
  - **Persistance du masquage** : les cards masquées et le dropdown "Lié à" tiennent maintenant entre F5 et redémarrages (race condition useEffect qui écrasait `localStorage` corrigée).
  - **Captures boutons** : check digital seul (`is_pressed`). Plus de flicker sur les boutons analog au repos (triggers / grips Sol-R).
  - **Bindings orphelins** : action référençant un slot `js<N>` qui n'existe plus chez toi → affichée "Non attribué" au lieu de "Joystick 6".
  - **Dédup hardware** : Windows énumère parfois un même stick via USB + HID (double entrée). Maintenant déduppé par nom normalisé.
  
  ## 🔧 Détails techniques
  
  - Module Rust `joystick_input.rs` (`gilrs 0.11`) — 2 commandes Tauri : `read_active_joystick_inputs` (polling) et `list_gilrs_joystick_devices` (énumération).
  - Resolver de capture : `gilrsSlot → cardId` persisté par profil. Au save, ajout automatique des `<options type="joystick" instance="N" Product="vJoy Device...">` nettoyés ensuite si auto-ajoutés par erreur (cleanup de la v4.1.5).
  
  ***
  
