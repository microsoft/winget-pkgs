ReleaseNotes: |-
  ## 🔧 Corrections
  
  ### 🎮 Éditeur de bindings
  - **Fix : la capture joystick respecte maintenant le périphérique lié au profil** : StarTrad ne se base plus uniquement sur le slot brut remonté par Windows/Chromium (`js1`, `js2`, `js4`, etc.).
  - **Correction des mappings vJoy / Joystick Gremlin** : quand un périphérique physique est lié à un joystick du profil, la liaison écrite dans le XML reprend le bon index Star Citizen.
  - **Support plus sûr pour les setups non Sol-R** : le mapping automatique Sol-R gauche/droite reste disponible, mais les autres périphériques passent par la correspondance de nom ou le sélecteur manuel `Lié à`.
  
