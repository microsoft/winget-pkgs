ReleaseNotes: |-
  # 🚀 StarTrad FR v3.3.4
  
  ## 🎮 Nouveautés
  
  - **Page Grilles Cargo** : Nouvelle page de référence pour optimiser le chargement de cargo par vaisseau (ratjack.net)
  
  ## ⚡ Performances & Optimisations
  
  - Chargement de l'application accéléré : imports statiques, animations allégées avec LazyMotion
  - Fetches parallélisés : actualités, statut RSI Launcher et playtime se chargent indépendamment sans bloquer l'interface
  - Mise en cache locale (actualités RSS, patch notes, statut RSI Launcher) — affichage instantané au relancement
  - Nettoyage des exports et fichiers inutilisés
  - Mise à jour CSP pour les grilles cargo
  
  ## 📥 Téléchargements
  
  - **StarTrad_FR_3.3.4_portable.exe** - Version portable ⭐
  - **StarTrad.FR_3.3.4_x64-setup.exe** - Installateur NSIS
  - **StarTrad.FR_3.3.4_x64_fr-FR.msi** - Installateur Windows classique
  
