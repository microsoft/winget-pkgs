ReleaseNotes: |-
  ## ✨ Nouveautés majeures
  
  ### Companion LAN
  La v4.0.2 ajoute un companion local accessible depuis un téléphone ou une tablette sur le même réseau.
  - Serveur LAN intégré côté Tauri
  - QR code de connexion depuis l'application
  - Pages mobiles dédiées : dashboard, traduction, infos et outils
  - Bridge temps réel entre le téléphone et l'application via WebSocket
  - Option pour conserver le même QR code entre les redémarrages
  
  ### Dashboard mobile
  Le dashboard companion permet de piloter les éléments principaux sans revenir au PC.
  - Contrôles du hub overlay
  - Suivi des overlays actifs
  - État du launcher et du service auto-check
  - Temps de jeu, traductions installées, backups et statistiques locales
  - Timer Contested Zone avec rendu plus stable
  
  ***
  ## Corrections
  
  - Correction du glitch visuel de la carte hangar qui se réanimait toutes les secondes
  - Ajustement du calcul et de l'affichage des jours d'utilisation
  - Affichage des backups locaux basé sur le vrai compteur système
  - Amélioration de la synchronisation companion entre l'application et les pages mobiles
  - Ajustements du hub overlay et de son état visuel
  - `latest.json` mis à jour avec la signature du setup `4.0.2`
  
  ***
