ReleaseNotes: |-
  ## 🔧 Corrections
  
  ### 🎵 Musique d'ambiance
  - **Fix : la musique ne se coupait plus en mode tray / fenêtre minimisée** : un early-return sur la ref de l'élément vidéo (qui n'est pas rendu en background) bloquait l'init du polling pause-on-minimize. La pause est maintenant pilotée indépendamment de la présence de la vidéo locale, et fonctionne dès que la fenêtre est cachée ou réduite
  - **La musique ne se coupe plus quand la fenêtre perd simplement le focus** : un user qui joue à Star Citizen en deuxième écran peut garder son ambiance audio active. La pause s'applique uniquement sur minimize / tray
  - **Volume par défaut abaissé de 50 % → 10 %** : plus discret au premier lancement. Une migration one-shot s'applique aux installations existantes au prochain démarrage (le slider personnel reste persistant si tu remontes le volume après)
  
  ***
