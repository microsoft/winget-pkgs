  File Chooser
  Introduce the OS native file chooser
  Improvements
  Connection Setup
  Create missing SSH configurations when mounting a database connection folder
  Mount database connection folders using drag and drop
  DB Support: Azure SQL
  Avoid multiple authentication prompts when working with Azure
  DB Support: Databricks
  Add support for streaming tables in Databricks
  Simplify connection setup for the authentication flows available in Databricks
  DB Support: Informix
  Make is possible to import data into temporary tables in Informix using @import
  Driver Manager
  Update template drivers
  Grid Component
  Add an action to copy grid selection as a Markdown table
  Installation/Update Installation
  Add an option to install DbVisualizer for the current user only
  Java
  Bundle Java 25 with installers
  Performance/Stability
  Improve application performance when working with many editor tabs
  Improve application startup time
  SQL Commander
  Add a predefined variable for current clipboard contents
  Quickly access recently used database connections in SQL Commander
  Bugs Fixed
  Auto-Completion
  "Fully Qualify Objects" may generate incorrect completions
  Incorrect suggestions or error when auto-completing columns in a derived table
  Connection Setup
  Driver type may be reset when editing multiple database connections
  DB Support: ClickHouse
  Error during connect when using the latest Clickhouse driver
  DB Support: Snowflake
  Error during connect when using the latest Snowflake driver
