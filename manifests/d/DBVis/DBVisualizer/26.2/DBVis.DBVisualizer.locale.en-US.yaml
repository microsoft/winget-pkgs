ReleaseNotes: |-
  New Features
  AI
  Contextual AI actions in SQL Commander
  Support for multiple vendors and models in the AI assistant
  App Logging
  Add audit logging for executed SQL statements
  DB Support: Amazon Athena
  Add basic support for Amazon Athena
  DB Support: InfluxDB
  Add basic support for InfluxDB
  Grid Component
  Add map visualization for geospatial data
  Notifications
  Introduce in-app notifications
  SQL Commander
  Add support for tab groups in SQL Commander
  Vim mode in SQL Commander
  Improvements
  AI
  Run query from the AI assistant
  Check for Update
  Implement in-app updates when checking for updates manually
  DB Support: Db2 z/OS
  Extract view DDL in Db2 z/OS
  DB Support: Hive
  Update the Apache Hive template to use the official standalone driver
  DB Support: SQL Server
  Mark non-online databases in the database objects tree for SQL Server
  Database Objects Tree
  Add quick search for database connections in the Databases tab
  Driver Manager
  Add support for Maven artifact classifiers
  Update template drivers
  Grid Component
  Improve the functionality, performance and UX of the quick filter in grids and trees
  SQL Commander
  Enhance the connection selector in SQL Commander to support search and hierarchies
  Implement smooth scrolling between editor tabs
  Security
  Add an option to accept and trust any certificate within a validation chain
  Value Viewer
  Add support for editing JSON values in the Value tab
  Add syntax highlighting for JSON and XML values in the Value tab
  Bugs Fixed
  DB Support: PostgreSQL
  MAINTAIN grant isn't displayed correctly in the Grants tab for PostgreSQL
  Database Objects Tree
  Possible error when removing a database connection
  OS Support: Linux
  SQL Editor
  Editor font isn't scaled correctly on Linux
  OS Support: Windows
  SQL Editor
  Editor loses input focus when activating rectangular selection on Windows
  OS Support: Windows
  Value Viewer
  International characters are not always displayed correctly in the Value tab on Windows
  Performance/Stability
  Possible error during application startup
  Workspace
  Maximized window may be restored on the wrong monitor
