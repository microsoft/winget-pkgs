ShortDescription: Expandable desktop folders for Windows 11.
Description: DeskRipple puts folder icons directly on your Windows 11 desktop — they sit behind your windows like native icons and expand into shortcut panels on hover or click, then collapse back to a single icon. Five expand styles (Grid, Fan, Column, Row, Ring), acrylic-blur panels, live desktop-grid snapping, and Per-Monitor V2 DPI awareness. Drag in .lnk shortcuts, .url web links, files, and Microsoft Store apps; DeskRipple keeps its own copy so a dock survives the original being moved or deleted. Dragging a desktop shortcut into a dock safely archives the original (it returns when you remove the entry or uninstall). Switch between named desktop profiles. Free during the public beta; a one-time paid version is planned later.
