ReleaseNotes: |-
  Highlights
  - Added an existing-worker import flow for shared skills, including a dedicated import modal and improved shared bundle UX in the app.
  - Improved OpenWork Share handling for long pasted skills, with wrapping fixes and new preview-wrap end-to-end coverage.
  Fixes & polish
  - Added guidance in-app when the Chrome control extension is missing to reduce setup friction.
  - Improved Den value-section CTA styling alignment and related landing polish.
  Packaging / ops
  - Bundled OpenCode for Den Render workers and stopped pinning stale worker OpenCode builds.
  - Updated Docker/dev stack wiring and release packaging metadata for v0.11.147.
