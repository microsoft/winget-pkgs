ReleaseNotes: |-
  Highlights
  - Added support for custom GitHub skill hub repositories so teams can point OpenWork at their own skill sources.
  - Improved session UX by preserving composer focus after Cmd+K actions and restoring the inline skill reload banner.
  Fixes & polish
  - Aligned worker status labels with worker names for clearer workspace status scanning.
  - Tightened app/server skill-hub wiring and session/dashboard behavior around extensions handling.
  Packaging / ops
  - Added a dedicated AUR validation workflow to catch packaging regressions earlier.
  - Bumped release versioning and package metadata to v0.11.163.
