ReleaseNotes: |-
  Highlights
  - Smooths session UX by reducing inline image churn, prioritizing common providers, and trimming redundant ChatGPT prompts in the session flow.
  - Routes in-app feedback to the team inbox and keeps the settings shell width more stable while users move through the app.
  Fixes & polish
  - Improves provider auth and status bar behavior across session and dashboard surfaces.
  - Tightens composer, message list, and session page behavior for long-running chats.
  - Refreshes package versions and lockfiles for the 0.11.150 release cut.
  Packaging / ops
  - Updates AUR packaging metadata for the 0.11.149 release window and carries it into this release branch.
  - Publishes the coordinated app, desktop, orchestrator, router, and server version bump to 0.11.150.
