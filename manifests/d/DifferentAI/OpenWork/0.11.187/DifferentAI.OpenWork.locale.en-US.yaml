ReleaseNotes: |-
  Highlights
  - Fixed Windows session and workspace scope detection so desktop/app flows compare paths consistently across standard, verbatim, and UNC-prefixed directories.
  - Improved app-side session handling to reduce workspace drift during Windows remote and local session transitions.
  Fixes & polish
  - Normalized Windows directory transport and stripped verbatim path prefixes before scope comparison.
  - Tightened session scope debugging and follow-up fixes that landed in the app context and utility layers.
  - Refreshed AUR packaging metadata and daily download stats included in this release window.
  Packaging / ops
  - Bumped all OpenWork package versions to 0.11.187 and updated lockfiles for the tagged release.
