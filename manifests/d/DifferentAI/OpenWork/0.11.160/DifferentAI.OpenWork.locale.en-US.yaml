ReleaseNotes: |-
  Highlights
  - Improved web UX across key surfaces, including a simplified Den auth screen, dynamic viewport-height handling, and cleaner session/task list indentation.
  - Landing download CTA now maps to detected OS/architecture, and share flow analytics bootstrap was stabilized for more reliable autocapture.
  Fixes & polish
  - Sidebar now correctly nests subagent sessions under their parent tasks.
  - AUR packaging fixes preserve SSH private key newline handling and include updated package metadata.
  - Workflow migration to Blacksmith landed, with corresponding CI/release workflow updates.
  Packaging / ops
  - Version bump to v0.11.160 across app, desktop, orchestrator, server, and opencode-router packages.
  - Lockfiles and release config were refreshed to keep package and build metadata consistent.
