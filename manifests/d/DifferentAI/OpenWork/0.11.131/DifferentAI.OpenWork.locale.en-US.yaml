ReleaseNotes: |-
  Highlights
  - Improved session UX for long runs with a unified status indicator, virtualized message rendering, and automatic context compaction.
  - Added persistent language selection in settings and tightened sidebar/workspace path handling.
  - Hardened cloud billing behavior for Polar subscription lookups in Den.
  Fixes & polish
  - Fixed blank transcripts that could appear after session virtualization updates.
  - Surfaced pending subagent prompts across sessions and improved editor/artifact file-open reliability.
  - Kept docs routes under /docs and fixed Safari mobile autoplay behavior on the landing hero.
  Packaging / ops
  - Hardened CI by preventing shell-injection paths in the opencode-agents workflow.
  - Added contributor and community-health docs (PR template, code of conduct, security/support/triage docs).
  - Published patch release v0.11.131 with updated lockfiles and package versions.
  Compare:
  https://github.com/different-ai/openwork/compare/v0.11.130...v0.11.131
