# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json

PackageIdentifier: Dargo.Dargo
PackageVersion: 1.0.0

# Portable installer — a single self-contained exe, no MSI, no
# installer sequence. winget copies it to its portable-apps folder
# and adds it to PATH under the shortcut alias below. Users just
# run `Dargo` after `winget install Dargo.Dargo` and the wizard opens.
InstallerType: portable
Commands:
  - Dargo

Installers:
  - Architecture: x64
    InstallerUrl: https://install.dargo.net/win/Dargo.exe
    # SHA-256 is the winget contract for supply-chain integrity —
    # the installer manifest cannot be merged without this pinned to
    # the exact bytes at InstallerUrl at PR-merge time. Bump this
    # AND PackageVersion in every release PR.
    #
    # HOW TO COMPUTE (replace `Dargo.exe` with the file you built):
    #     powershell "(Get-FileHash -Algorithm SHA256 Dargo.exe).Hash"
    # or (from a Linux dev box):
    #     sha256sum Dargo.exe | tr a-f A-F | cut -d' ' -f1
    InstallerSha256: 299F1DCB0479FB568A1072FC51834B0F5377CF68F1C59FA0A32E421E55B0D1D6

ManifestType: installer
ManifestVersion: 1.6.0
