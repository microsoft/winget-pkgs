ShortDescription: Turn your Windows PC into a personal cloud server.
Description: |
  Dargo turns a spare Windows 10 or 11 PC into a personal cloud server.
  A setup wizard walks you through installing Windows Subsystem for
  Linux (WSL 2) and a self-contained Ubuntu 24.04 environment, then
  connects the Dargo agent inside it to your account at my.dargo.net.
  After setup your device is reachable at your own <name>.mydargo.com
  URL through an encrypted outbound tunnel — no inbound firewall
  ports opened on your PC.

  You need a free account at my.dargo.net to complete setup. Register
  a "Bring Your Own Device" device from the portal, copy the install
  token it hands you, and paste it into the wizard when prompted.

