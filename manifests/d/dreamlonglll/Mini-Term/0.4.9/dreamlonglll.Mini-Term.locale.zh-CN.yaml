ShortDescription: 为 AI 时代打造的桌面终端管理器
Description: |-
  一个 AI 终端管理工具，支持多项目、多终端布局管理

  功能特性
  终端核心
  - 多标签管理 — 每个项目独立标签页，拖拽排序，状态图标一目了然
  - 递归分屏 — 横向 / 纵向任意嵌套分屏，Allotment 拖拽调整比例
  - 高性能渲染 — xterm.js v6 + WebGL 加速，自动降级为 Canvas
  - 10 万行滚动缓冲 — 拦截 CSI 3J（ED3）指令，Claude / Codex 等 TUI 清屏时保留上滚历史
  - 终端缓存 — 切换标签 / 分屏不重建 xterm 实例，已有内容不丢失
  - 复制粘贴 — Ctrl+Shift+C / Ctrl+Shift+V 快捷键 + 右键菜单，未选中时"复制"自动置灰；Windows 大段多行粘贴自动分块写入，防止 ConPTY 丢行
  - 长文本粘贴 — 剪贴板文本 ≥10 行或 ≥2000 字符时自动转存为临时 .txt 并粘贴带引号的文件路径，避免 AI 工具直接处理超长内容引发性能与 paste bracket 问题
  - 图片粘贴 — 剪贴板含截图时自动检测，通过 Win32 API 保存为临时 PNG 并粘贴带引号的路径，兼容 PinPix 等非标准格式
  - 文件拖拽 — 文件拖到终端自动插入带引号的绝对路径，兼容含空格的路径
  - 多 Shell 配置 — Windows（cmd / powershell / pwsh）、macOS（zsh / bash）、Linux（bash / sh）等，可自由增删
  AI 进程感知
  - 实时状态检测 — 500ms 轮询子进程名，自动识别 Claude / Codex，显示 idle / working / error 状态
  - 状态聚合 — 面板 → 标签页 → 项目逐层聚合，优先级 error > ai-working > ai-idle > idle
  - 完成提醒三件套 — AI 任务从 working → idle 时立刻触发：
    - 右下角 Toast 桌面通知（仅非活跃项目弹出，同项目去重）
    - 项目列表 DONE 徽章，点击清除
    - 任务栏闪烁（Windows）/ Dock 跳动（macOS），窗口失焦时才触发
    - 三个开关独立可配
  - 会话进出检测 — 命令 echo 识别进入 AI；双击 Ctrl+C / Ctrl+D 或 exit / quit / :quit / /logout 识别退出
  - 会话历史 — 读取本地 Claude / Codex 历史会话记录，右键复制恢复命令快速续接
  - AI 任务标记 — AI 会话内每次用户按 Enter 自动在 xterm 打点，标签右上角 ⚑ 按钮下拉展示历史提交列表，点击或 Ctrl+Shift+↑/↓ 在标记间跳转，目标行短暂高亮提示
  项目管理
  - 项目列表 — 左侧边栏管理多个项目目录，一键切换工作区，重启自动恢复上次激活项目
  - 拖拽添加项目 — 从资源管理器拖拽文件夹到项目列表即可快速添加，自动识别文件 / 文件夹 / 重复项目并给出视觉反馈
  - 嵌套分组 — 最多 3 级项目分组，拖拽排序，折叠 / 展开
  - 文件树 — 集成目录浏览器，嵌套 .gitignore 置灰（每层子目录的忽略规则与 !pattern 白名单都会生效，与 git 行为一致），notify 文件监听实时刷新
  - 文件操作 — 文件树内新建文件 / 文件夹、重命名、查看内容（二进制与超大文件友好提示）
  - VS Code 快捷打开 — 文件树右上角按钮一键用配置的 VS Code 可执行文件打开当前项目，路径可在「设置 → 系统设置 → 外部编辑器」自定义
  Git 集成
  - 文件状态 — 文件树显示 Git 状态颜色（修改 / 新增 / 删除 / 冲突）
  - 变更 Diff — 工作区文件变更的详细 Diff，Hunk 行级解析，并排 / 内联双视图
  - 提交历史 — 浏览仓库提交记录，游标分页加载（默认 30 条）
  - 提交 Diff — 查看任意提交的文件变更，逐文件切换
  - 分支信息 — 本地 / 远程分支列表
  - 源码控制面板 — VS Code 风格 Changes 面板，Staged / Changes / Untracked 分组展示，支持单文件和全量 stage / unstage / discard，Ctrl+Enter 快速提交，列表与树形视图切换
  - Pull / Push — 仓库行内按钮一键同步远端，支持刷新按钮重新加载提交记录与分支信息
  - 多仓库发现 — 自动扫描项目目录下所有 Git 仓库（递归 5 层，跳过 node_modules 等）
  外观与配置
  - Activity Bar 侧边栏 — 最左侧常驻 40px 图标栏，含 Projects / Sessions / Files / Git 四个面板开关，独立控制显隐，激活态蓝色竖条指示，状态持久化
  - 三种主题模式 — Auto（跟随系统）/ Light / Dark，深色基于 Warm Carbon 暖炭色调，自定义 CSS 变量体系
  - 字体独立调节 — UI 与终端字号分别可调（10-20px），终端可选是否跟随 UI 主题
  - 布局持久化 — 分屏比例、标签页、窗口大小 / 位置自动保存，重启恢复（tauri-plugin-window-state）
  - 关闭确认 — 关闭窗口前二次确认，并 flush 所有项目布局，避免误操作
  - 版本检查 — 启动时拉取 GitHub Release，标题栏显示新版本提示
  - 设置中心 — 统一的 SettingsModal 管理主题、字体、Shell、AI 通知等所有开关
ReleaseNotes: |-
  更新内容
  - release: 升级版本号至 v0.4.9 - 新增 SSH MCP Server：把 SSH 连接作为 MCP 工具暴露给终端内的 AI agent（Claude/Codex），提供 ssh_list_connections、ssh_exec，支持密码自动填充 / 私钥 / 跳板机、超时与审计日志 - SSH MCP 改为按项目关联授权：项目右键「关联 SSH」勾选连接即启用并限定可见范围 - sidecar 二进制抽成独立 mt-sidecars crate，经 Tauri externalBin 打包，新增 stage-sidecars 构建脚本 - README 同步至 v0.4.9：更新版本徽章、补充 SSH MCP 功能说明与多 crate 项目结构 - package.json、Cargo.toml、tauri.conf.json 与 Cargo.lock 版本号同步升级
  - refactor: sidecar 二进制抽成独立 mt-sidecars crate 并经 externalBin 打包 - 新建 src-tauri/mt-sidecars 独立 crate，迁入 miniterm-hook 与 mt-ssh-mcp，不依赖 tauri/tauri-build，避免单独构建触发主程序 externalBin 校验 - src-tauri/Cargo.toml 移除两个 [[bin]] 声明及随之外迁的 rmcp、tokio 依赖 - 新增 scripts/stage-sidecars.mjs 按 triple 构建并命名就位 sidecar，package.json 以 build-sidecars 替换 build-hook，release.yml 增加构建步骤，tauri.conf.json 声明 bundle.externalBin - .gitignore 忽略本机 SSH MCP 配置（.mcp.json、.codex/）及 sidecar、mt-core 构建产物 - 补充 .trellis 中 SSH MCP server、按项目隔离、sidecar 打包三个任务记录
  - feat: SSH MCP 连接授权改为按项目关联 - 移除连接级 agentAccessible 开关，所有 SSH 连接默认可被 MCP 工具访问，SshModal 去掉对应勾选框与连接行标签 - 项目右键菜单新增「关联 SSH」弹窗替代原「启用/停用 SSH MCP」，勾选连接即启用并限定范围、全不勾即停用，ProjectConfig 新增 sshConnectionIds 持久化范围 - mt-ssh-mcp sidecar 新增 --project-id 参数，按项目 sshConnectionIds 实时过滤可见连接，enable_ssh_mcp 把项目 id 写入 .mcp.json 与 Codex 注册的 args - mt-core config_reader 增读项目关联范围并新增 read_ssh_connections_for_project，后端 spec 同步函数名引用
  - docs: 新增后端 spec 记录 Agent 配置注入模式 - 新建 .trellis/spec/backend 规范层，收录 mt-core 共享 crate 约定与 BatchMode、stdio 等坑 - 新增 agent-config-injection 文档，固化「读-改-写 + 命名 marker 幂等」写外部 agent 配置文件的模式
  - feat: SSH 管理做成按项目隔离的 MCP Server，供终端 AI agent 调用 - 新增 mt-core 库 crate（不依赖 tauri），抽出 SshConnection 类型、SSH 提示词扫描、私钥临时副本处理、config.json 读取，供主程序与 sidecar 共用 - 新增 mt-ssh-mcp sidecar：基于 rmcp 的 stdio MCP server，提供 ssh_list_connections 与 ssh_exec 工具，支持密码 PTY 自动填充、私钥、跳板机、超时与输出封顶，并写审计日志 - SshConnection 新增 agentAccessible 开关，仅勾选的连接对 agent 可见，SshModal 表单加对应勾选框 - 新增 ssh_mcp_registry：项目右键菜单按项目启用/停用 SSH MCP，启用时幂等写入 Claude .mcp.json 与 Codex .codex/config.toml 并放行信任，停用时按 marker 精确移除 - ProjectConfig 新增 sshMcpEnabled 状态，prompt 工具新增 showAlert 提示框
