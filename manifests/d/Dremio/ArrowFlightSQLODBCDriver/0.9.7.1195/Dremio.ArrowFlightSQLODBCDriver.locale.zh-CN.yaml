ShortDescription: 连接到 Dremio 或任何其他公开 Arrow Flight SQL 端点的数据库。
Description: |-
  Apache Arrow Flight SQL 是由 Dremio 联合创建的一种现代开源协议，用于对数据库、数据仓库和数据湖屋等基于 SQL 的系统进行查询。
  下载开源的 Arrow Flight SQL ODBC 驱动程序，即可连接到 Dremio 或任何其他公开 Arrow Flight SQL 端点的数据库。
