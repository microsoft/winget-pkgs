Description: |-
  Apache Arrow Flight SQL is a modern open source protocol, co-created by Dremio, for querying SQL-based systems such as databases, data warehouses, and data lakehouses.
  Download the open source Arrow Flight SQL ODBC driver to connect to Dremio or any other database that exposes an Arrow Flight SQL endpoint.
