ShortDescription: Compare folders, Git repos, archives, FTP servers, and more - side by side or up to 16 sources at once.
Description: |-
  DirectCompare is a desktop file and folder comparison tool for Windows and Linux.

  Basic (free): 2-way directory comparison, exports (CSV, HTML, JSON), bookmarks,
  sessions, keyboard shortcuts, and themes. No time limit.

  Standard ($39/yr): Everything in Basic plus N-way comparison (3+ sources),
  Git integration, and archive support (ZIP, TAR, 7Z, RAR, ISO, CAB).

  Premium ($79/yr): Everything in Standard plus GitHub integration, FTP/SFTP,
  similarity search, 3-way merge editor, image comparison (dHash/aHash),
  and CSV/Excel comparison.

  Enterprise: All Premium features plus Admin Centre, collaborative workspaces,
  admin policies, registry toolkit, and priority support.

  Distributed as a single portable .exe - no installer, no dependencies, no DLLs required.
  A 30-day full-featured trial starts automatically on first launch.
