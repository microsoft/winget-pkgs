ShortDescription: Installiert APK-Dateien unter Windows Subsystem for Android einfach per Doppelklick.
Description: |
  Ein leichtes Tool für Windows 10/11, das die Installation von Android-APK-Dateien im Windows-Subsystem für Android (WSA) automatisiert, indem .apk-Anwendungen zugeordnet werden. Es verwaltet automatisch die Aktivierung von WSA, die ADB-Verbindung (localhost:58526) und gängige Installationsfehler, ganz ohne Werbung oder Unterbrechungen. Unterstützt mehrsprachige Benutzeroberflächen.
