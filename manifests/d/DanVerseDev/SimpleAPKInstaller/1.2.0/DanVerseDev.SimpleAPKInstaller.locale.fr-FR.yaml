ShortDescription: Installe facilement des fichiers APK sur Windows Subsystem for Android par double-clic.
Description: |
  Un outil léger pour Windows 10/11 qui automatise l’installation des fichiers APK Android dans le Sous-système Windows pour Android (WSA), en associant les applications .apk afin de les installer rapidement. Il gère automatiquement l’activation de WSA, la connectivité ADB (localhost:58526) et les erreurs d’installation courantes, le tout sans publicité ni interruptions. Prend en charge les interfaces multilingues.
