  أداة خفيفة لنظامي Windows 10/11 تقوم بأتمتة تثبيت ملفات APK الخاصة بأندرويد على نظام Windows Subsystem for Android (WSA)، مع ربط تطبيقات .apk لتثبيتها بسرعة. تدير تلقائيًا تشغيل WSA، والاتصال بـ ADB ‏(localhost:58526)، وأخطاء التثبيت الشائعة، دون إعلانات أو مقاطعات. تدعم الواجهات متعددة اللغات.
