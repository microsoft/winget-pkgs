ShortDescription: Instala archivos APK en Windows Subsystem for Android con un doble clic.
Description: |
  Una herramienta ligera para Windows 10/11 que automatiza la instalación de archivos APK de Android en el Subsistema de Windows para Android (WSA), asociando los archivos .apk con un lanzador personalizado. Maneja la activación de WSA, la conectividad ADB (localhost:58526) y errores comunes de instalación. Incluye una extensión de shell para mostrar los iconos reales de las aplicaciones APK en el Explorador de Archivos. Soporta interfaces multi-idioma.
