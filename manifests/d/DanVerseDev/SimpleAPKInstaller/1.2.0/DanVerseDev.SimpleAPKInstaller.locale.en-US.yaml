ShortDescription: Install APK files on Windows Subsystem for Android with double click.
Description: |
  A lightweight tool for Windows 10/11 that automates the installation of Android APK files into Windows Subsystem for Android (WSA) by associating .apk files with a custom batch-powered launcher. It handles WSA activation, ADB connectivity (localhost:58526), and common installation errors. Includes a shell extension to show real app icons for APK files in File Explorer. Supports multi-language interfaces.
