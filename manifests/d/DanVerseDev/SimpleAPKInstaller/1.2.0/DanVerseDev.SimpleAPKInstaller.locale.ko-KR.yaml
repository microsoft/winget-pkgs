ShortDescription: 더블 클릭만으로 Windows Subsystem for Android에 APK 파일을 쉽게 설치합니다.
Description: |
  Windows 10/11용 경량 도구로 Android APK 파일을 Windows Subsystem for Android(WSA)에 자동으로 설치합니다. .apk 앱을 연결하여 빠르게 설치할 수 있으며, WSA 실행, ADB 연결(localhost:58526), 일반적인 설치 오류를 자동으로 처리합니다. 광고나 중단 없이 사용할 수 있습니다. 다국어 인터페이스를 지원합니다。
