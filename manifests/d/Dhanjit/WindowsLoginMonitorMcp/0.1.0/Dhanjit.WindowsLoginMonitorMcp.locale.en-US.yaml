ShortDescription: Local OAuth 2.1 MCP server exposing this PC's login monitor (login log, Security events, phone-presence ping, ntfy push) to AI agents.
Description: |-
  A local-first Model Context Protocol (MCP) server that wraps the Windows
  Login Monitor on this PC. AI agents (Claude.ai, Claude Code, Cursor, any
  MCP 2025-06-18 / OAuth 2.1 compliant client) can read the login log, query
  recent Security events (4624/4801), check whether the phone is on the
  home LAN, and push notifications via ntfy.sh.

  You host it locally - the installer registers a scheduled task that runs
  the server on every logon at 127.0.0.1:8765. You expose it however you
  like: Cloudflare Tunnel, Tailscale Funnel, ngrok, Caddy + DDNS, or not
  at all if you only use it from Claude Code on the same PC.
