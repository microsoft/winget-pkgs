Description: DSWave 是一款多功能的信号捕获与分析软件，主要功能包括数字、模拟信号捕获、实时显示与测量，数字协议分析与调试，模拟信号计算、相位分析与频谱分析等。
ReleaseNotes: |-
  * 增加以下解码器：CAN-FD, I2S, 1-WIRE, ESPI, QSPI, SWD, MDIO, DMX512, TDM, WS2812B, SWIM, IR-RC5, IR-RC6, HDMI-CEC-V1.4, C2-INTERFACE
  * 增加 4 种快捷设置通道垂直分辨率的方法
  * 增加通道的自定义标签功能
  * 增加区域解码功能
  * 增加自动测量的刷新速度设置
  * 增加单次的触发和立即采集功能
  * 增加解码器的选项翻译功能
  * 优化添加自动测量的操作流程，增加任意排序功能
  * 优化函数编辑功能的交互流程
  * 优化 UART 解码器，增加波特率的容错
  * 优化 CAN 解码器，增加对不完整帧头的自动识别
  * 优化 SPI 解码器，完善帧起始位置的判断
  * 优化光标和测量的交互逻辑
  * 优化多通道波形之间的 Alpha 混合效果
  * 优化通道以及 Toggle 控件的显示效果
  * 优化 UI 的整体显示效果
  * 修复低速采样率下 FFT 波形刷新问题
  * 修复最小化后，弹出窗口无法操作的问题
  * 修复特殊操作流程下软件崩溃问题
