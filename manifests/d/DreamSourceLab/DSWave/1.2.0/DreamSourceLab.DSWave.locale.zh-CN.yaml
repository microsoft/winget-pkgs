Description: DSWave 是一款多功能的信号捕获与分析软件，主要功能包括数字、模拟信号捕获、实时显示与测量，数字协议分析与调试，模拟信号计算、相位分析与频谱分析等。
ReleaseNotes: |-
  *解码器总量增至 40 个，新增以下解码器： CALIPER, COUNTER, GUESS-BITRATE, IR-JVC, IR-SHARP, MIPI-RFFE, SBUS, STEPPER-MOTOR, WIEGAND, LIN, PS2, 24C02, DALI, DHT11, MODBUS, PWM, SPDIF, XY2-100, IR-NEC, IR-SIRC
  *增加解码结果列表查看（支持帧-项-数据三级查看）
  *增加解码器结果多层级导出 HTML，CSV 以及 TXT 文本
  *增加解码器结果搜索功能
  *增加解码结果波形化显示功能
  *增加 I2S 解码转为 WAV 音频播放功能
  *增加解码结果时钟和数据标记功能
  *增加解码数据缩略图下的鼠标详情展示功能
  *优化解码器结果项的颜色分配
  *优化密集波形的渲染性能
  *优化单次采集大存储深度的波形显示
  *增加数据记录仪下波形映射关系的图形化显示和设置
  *增加手动采样率和自动采样率切换功能
  *增加固定时基下的仅缩放功能
  *增加波形电压鼠标跟随测量
  *增加 I2C 解码器地址位数选择
  *增加全局窗口隐藏功能
  *修复初始状态数字阈值不生效的问题
  *修复配置文件拖放到软件报错问题
  *修复最小化界面之后弹出窗口失效问题
  *修复删除光标导致软件崩溃问题
  *修复模拟通道自定义探头倍数更新问题
  *修复数据记录仪模式保存文件载入不一致问题
  *修复时间轴缩放不一致问题
  *修复 dswb 文件再次打开自动测量结果失效的问题
  *修复其他 UI 及操作问题
