ShortDescription: Add two-factor authentication to Remote Desktop and local logons and credentialed UAC elevation prompts.
Description: |-
  Duo Authentication for Windows Logon adds Duo two-factor authentication to these Windows and Windows Server logon scenarios:
  - Local or domain account logins
  - Logins at the local console and/or incoming Remote Desktop (RDP) connections
  - Credentialed User Access Control (UAC) elevation requests (e.g. Right-click + "Run as administrator") in v4.1.0 and later
  Duo's Windows Logon client does not add a secondary authentication prompt to the following logon types:
  - Shift + right-click "Run as different user"
  - PowerShell "Enter-PSSession" or "Invoke-Command" cmdlets
  - Non-interactive logons (i.e. Log on as a Service, Log on as Batch, Scheduled Tasks, drive mappings, etc.)
  - Pre-Logon Access Providers (PLAPs) such as Windows Always On VPN
  - RDP Restricted Admin Mode
ReleaseNotes: |-
  - Beta of Offline Access for Passwordless OS Logon. Users log in securely via Bluetooth connection to a mobile device with Duo Mobile and platform biometric or PIN verification when the Windows system cannot contact Duo's service.
    - Adds the registry value PwlOfflineAvailable which overrides the Admin Panel setting to disable offline access for passwordless OS logon at the local endpoint.
  - Duo Mobile push requests now show the RDP application name specified in the Admin Panel.
  - Minor UI fixes for passwordless OS logon.
  - Corrects an issue where the ProvidersWhitelist registry value may not have persisted on upgrade via silent install.
  - Adds additional debug logging.
