ShortDescription: Speak instead of typing. Native voice dictation for Windows, macOS, and Linux.
Description: Dimmy is a cross-platform voice-transcription overlay. Record audio with a global hotkey, transcribe locally (whisper.cpp or Parakeet) or via cloud STT (Groq, OpenAI, Deepgram, Gemini), optionally clean up the text with an LLM, then paste it into the focused app. It also offers command mode (transform selected text in place), meeting recording with an LLM recap, and a custom dictionary.
