ShortDescription: Tempest Radar
Description: 'A self-hosted severe-weather console that combines your WeatherFlow Tempest station, NEXRAD radar (tile loops and raw Level 2 with WebGL rendering), NWS alerts, and news tickers in one themeable web dashboard. The v2 interface is a full-bleed MapLibre GL console — floating control dock, bottom timeline, collapsible telemetry drawer — with the radar rendered as a native GPU custom layer driven by the map''s own projection matrix (architecture modeled on the RadarOmega platform design: server-side decode → binary polar artifacts → catalog API → client WebGL with LUT color tables and a prefetching timeline). Runs anywhere Docker runs; open it from any browser on your network at http://<host>:5555.'
