ShortDescription: 面向专业影视创作者的行业标准定格动画软件
Description: |-
  Dragonframe 是面向专业影视创作者的行业标准定格动画软件，提供逐帧拍摄、精准相机/镜头控制、DMX 灯光自动化、运动设备集成以及高级合成工具，可制作高端动画作品。

  核心功能：
  - 帧拍摄与洋葱皮功能：可将实时取景画面与已拍摄帧融合，实现流畅的动作序列编排
  - 摄影工具：支持佳能/尼康/索尼数码单反相机控制，可调节 ISO/光圈/对焦，具备曝光裁切警告、宽高比参考线功能
  - DMX 灯光系统：支持基于关键帧的可编程灯光控制，最多可覆盖 512 个通道（需搭配 DDMX 硬件使用）
  - 运动控制：可同步摄像机架、轨道车、电动滑轨，实现复杂运镜效果
  - 音频与口型同步：配备多轨道时间轴，支持为角色对话分配音素，配套面部动画制作工具
  - 3D 工作流：支持立体成像、深度图功能，可与 Maya、Blender 软件集成
