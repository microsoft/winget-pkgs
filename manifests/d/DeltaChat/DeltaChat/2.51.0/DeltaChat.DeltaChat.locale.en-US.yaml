ReleaseNotes: |-
  Removed
  - Remove "Move to DeltaChat folder", in case you are using the option, a device message shows how to proceed
  - Remove "Only fetch from DeltaChat folder" option, the functionality is preserved for existing profiles
  - Remove "Delete Messages from Server" option, this is now up to the server: Chatmail handles that automatically, classic email servers used as relay often have lots of storage or options themselves
  - Remove "Show Email" options, all messages are shown by default, account sharing is anyway not supported
  Added
  - "Mark as Unread" menu item (and "as Read")
  - Add inline reply on notifications (Win, Mac)
  - Allow to submit "Edit Group" with "Enter"
  - Calls & channels are not experimental anymore (#6335)
  - Add window menu for MacOS (#6357)
  - Improve crash handling (#6341)
  - Click on call messages opens/focus call window (#6376)
  - WebXDC: add isAppSender, isBroadcast
  - Add option to force encryption (#6410)
  - Show imap folder if set (#6424)
  - Resend the last 10 messages to new broadcast channel member
  - Enable PQC (Post-Quantum Cryptography) support. We do not generate PQC keys yet, this step is needed for forward compatibility
  - Allow otherwise invalid TLS connections if the key is unchanged
  - Do not show "non delivered" notifications in broadcast channels
  - Adapt quota warning to automatic cleanup.
  - Improved avatar resolution
  Fixed
  - Use correct filename when dragging a file out (#6219)
  - Chat list switching between archive by itself (#6255)
  - Chat list: Ctrl + Space multiselect on Linux
  - Add counter for screenreaders (#6297)
  - Show channel description (#6283)
  - Enable sticker replies (#6278)
  - Detect images dropped with uppercase extensions (e.g. .JPG) (#6324)
  - Switch account in all SelectChat dialogs (#6279)
  - Mark visible messages as read after a programmatic scroll completes (#6329)
  - Show appropriate buttons when invite code is pasted to search field (#6330)
  - Hide apps for channels (#6336)
  - Create group/channel with description & image (#6314)
  - Resize reactions after image load (#6334)
  - Truncate author name in quotes (#6356)
  - Always show sent time in html email view(#6363)
  - Show rtl text in correct direction in mixed texts (#6379)
  - Qr code video is flipped for back camera (#6373)
  - Set default height smaller then screen height (#6385)
  - Adapt accountlist sidebar (#6380)
  - Reload settings after importing backup (#6396)
  Miscellaneous Tasks
  - Update translations (#6295)
  - Upgrade Electron to 41.7.1
  - Add burmese language (#6416)
  - Upgrade core to 2.51.0 (#6425)
  - Upgrade React zoom pan pinch (#6375)
  - Replace emoji mart (#6201)
  Other
  - HTML viewer: move Load Remote Images
  - Sticker folder rewrite (#6231)
  - change: remove open sticker folder button
  - fix: keep sticker picker open where appropriate
  - Add Device: move buttons to menu (#6126)
  Downloads
  https://download.delta.chat/desktop/v2.51.0/
