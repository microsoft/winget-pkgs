ReleaseNotes: |-
  What's Changed
  Right, so—long time no see. Or maybe not. Whatever, no one really gives a toss anyway, do they? Bet you're thinking, 'Right then, must be a massive update, yeah?' Wrong. Just a bunch of tinkering. That said, I did notice while hammering the thing myself—high concurrency, proper meltdown territory—memory and CPU were having a right old barney. All them base64 requests flying about, routing logic’s a proper mess, serialise this, serialise that, memory's just ballooning like it's got nowhere better to be. Luckily, Claude me stepped in. Sorted a load of memory bollocks under the Gemini router, cut down on the CPU spinning its wheels. If you're running a big ol’ pool of Gemini keys, give this version a spin—might save you a pretty penny on server bills. My Alipay's 13543******. Anyway, that's enough of that. Been slow lately—loads of non-critical bugs I just haven’t had the time for. Fancy lending a hand? Pop by the issues page, maybe I’ll chuck some AI credits your way. Right then, catch you next time.
  New Contributors
  - @yusnake made their first contribution in https://github.com/deanxv/done-hub/pull/52
