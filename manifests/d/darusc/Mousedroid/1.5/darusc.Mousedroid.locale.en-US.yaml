ShortDescription: Use your android phone as a mouse & keyboard
Description: >
  Mousedroid is a versatile, cross-platform application that turns your Android phone into a remote
  input peripheral. Control your PC or laptop with a precision touchpad, a full QWERTY keyboard, or
  a dedicated numpad. Whether you're navigating a media center from the couch or need an emergency
  mouse, Mousedroid works seamlessly over Wi-Fi, Bluetooth, or USB.
