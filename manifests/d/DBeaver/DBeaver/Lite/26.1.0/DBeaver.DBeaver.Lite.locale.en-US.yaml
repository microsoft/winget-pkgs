ReleaseNotes: |-
  Changes since 26.0.0:
  - Installation: added the ability to download and purchase DBeaver Lite from the Microsoft Store
  - AI assistant:
      - Added the ability to add, configure, and use external AI MCP servers and tools
      - The added tools can be used in AI Chat after the user confirmation
      - Permissions for MCP servers and specific AI tools can be configured in Preferences through the allowlist
      - Improved AI Chat performance when rendering long responses and SQL queries
      - SQL Suggestions improvements:
          - Added SQL context support for more accurate AI query suggestions
          - Suggestions are inserted into the script in a correct place and follow the existing script logic and formatting
      - Passed the read-only connection flag to the AI assistant context via the system prompt
      - Context sending was improved. This helps reduce token usage for the same operations
  - SQL Editor:
      - The SQL Execution Plan graph was redesigned
      - Added the ability to explain execution plans with AI directly in AI Chat
  - Data Editor:
      - Added the ability to manage query filters: save, rename, delete, and search for the needed filter
      - Added the ability to show multiple selected rows in the Text record mode
      - Added a group row striping option that allows rows to be colored by column values in the result grid
  - Data Transfer: the first page of the Data Export wizard was redesigned
  - Navigator: added indicators for connection view type (Simple, Advanced, or Custom)
  - Connectivity: added support for AWS Secret Manager
  - Third-party tools: Added the ability to import JetBrains database connections by pasting the datasource configuration text directly into the import wizard
  - New drivers:
      - Added a connector for Microsoft Fabric
      - Added support for the Valkey database
      - Added support for GizmoSQL
  - Driver updates:
      - Athena driver was updated to version 3.7.0
      - ClickHouse driver was updated to version 0.9.7
      - H2GIS driver was updated to the version 2.2.3
      - H2 driver was updated to version 2.4.240
      - InterSystems IRIS driver was updated to version 3.10.5
      - PostgreSQL driver was updated to version 42.7.11
      - Redshift driver was updated to version 2.2.6
      - Snowflake driver was updated to version 4.1.0
      - SQL Server driver was updated to version 13.4.0
  - Databases:
      - Athena: added the ability to connect using ODBC
      - BigQuery: added a new driver - BigQuery (Experimental)
      - CSV, JSON, Parquet, XLSX, XML drivers: Added support for grouping multiple data files into a single table
      - Oracle: added authentication with Microsoft Entra ID
      - Redshift: added the ability to connect using ODBC
      - Snowflake: added support for multi-factor authentication
      - TimescaleDB: added authentication with Microsoft Entra ID
