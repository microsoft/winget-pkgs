ReleaseNotes: |-
  EYE BACK!
  一、更新内容：
  【摘要】
  修复诸多痛点和痒点，是 稳定性 提升的一个 重要版本 。（好像鸽子的每个版本都是 重要版本）
  由于 MacOS 构建的一些问题，本版本不提供 MacOS universal 包，请自行根据具体机型选择 x86-64/arm64 版本
  【新特性】
  1. free eye 插件作为实验性功能回归！ （懒得扒拉具体的 commit 了，下同）
  【BUG 修复】
  拜 claude code 与 deepseek-v4-pro 所赐，修复大量 bug 如下（感谢梁圣让我们用上高速廉价稳定 token，梁圣的恩情还不完）
  1. 修复 HTTP 请求误入 HTTPS 代理端口(31181)时被以 HTTPS 协议转发的 bug。
  2. 修复部分跨域问题
  3. 缓解部分超时问题
  4. 增强了杀死占用端口进程的功能
  5. 修复部分乱码问题
  【优化】
  1. 修复浏览器报错提示 undefined 的问题
  2. 升级到 vue 3+antd 4 并修复若干由此带来的问题
  What's Changed
  - fix: install flatpak tooling on Ubuntu CI runners to fix spawn flatpak ENOENT by @cute-omega with @Copilot in https://github.com/docmirror/dev-sidecar/pull/593
  - Fix flatpak by @cute-omega in https://github.com/docmirror/dev-sidecar/pull/598
  - Add Microsoft Defender for DevOps workflow by @cute-omega in https://github.com/docmirror/dev-sidecar/pull/600
  - 修改版权日期为自动更新 by @afatcat-xie in https://github.com/docmirror/dev-sidecar/pull/603
  - Potential fix for code scanning alert no. 8: Unsafe shell command constructed from library input by @cute-omega in https://github.com/docmirror/dev-sidecar/pull/610
  - Test enhance by @cute-omega in https://github.com/docmirror/dev-sidecar/pull/619
  - Update README with link status and new entry by @zhaobokai341 in https://github.com/docmirror/dev-sidecar/pull/622
  - chore: migrate Vue 2 to Vue 3, Electron to v41, and update deps by @chengcheng84 in https://github.com/docmirror/dev-sidecar/pull/599
  - Harden macOS system-proxy service resolution to prevent apiInvoke toggle failures by @cute-omega with @Copilot in https://github.com/docmirror/dev-sidecar/pull/617
  - fix: add proper error code for proxy timeout and handle missing e.code in error template by @Jefsky in https://github.com/docmirror/dev-sidecar/pull/645
  - fix: style error and icon by @chengcheng84 in https://github.com/docmirror/dev-sidecar/pull/629
