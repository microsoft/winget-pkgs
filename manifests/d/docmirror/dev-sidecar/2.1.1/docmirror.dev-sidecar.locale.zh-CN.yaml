ReleaseNotes: |-
  一、更新内容：
  【摘要】
  修复 v2.1.0 中的问题，并修复了诸多安全漏洞，是 安全性 提升的一个 重要版本 。
  由于 MacOS 构建的一些问题，本版本不提供 MacOS universal 包，请自行根据具体机型选择 x86-64/arm64 版本
  【BUG 修复】
  修复安装根证书时图片无法加载的问题
  修复"点此去安装"按钮弹窗报错的问题
  修复 Windows 下点击安装提示"拒绝访问"的问题
  修复证书安装后保存设置时报"An object could not be cloned"的问题
  【优化】
  1. 根据 Red Hat Dependency Analysis Report 修复了诸多 CVE 安全漏洞
  2. 移除 uuid >=9.0.0 的 pnpm override，以修复 request@2.88.2 的 require('uuid/v4') 崩溃问题
  二、安装前请仔细阅读安装说明
  各平台安装说明
  三、贡献者列表
  非常感谢以下朋友们的贡献。
  - @cute-omega
  四、Full Changelog
  v2.1.0...v2.1.1
  五、里程碑：
  点击 2.1.1 Milestone 查看该版本合并的 PR 和关闭的 Issue。
