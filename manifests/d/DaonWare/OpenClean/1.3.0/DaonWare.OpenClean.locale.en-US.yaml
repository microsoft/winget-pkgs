InstallationNotes: OpenClean is free and open source. It requests administrator rights to clean system locations safely. Launch it from the Start menu. Optional Premium features (scheduled cleaning, batch uninstall, SMART detail readings, similar-image search, secure delete) can be unlocked in-app
