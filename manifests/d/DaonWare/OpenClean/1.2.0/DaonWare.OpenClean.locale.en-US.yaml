ShortDescription: Honest, open-source system cleaning for Windows — no telemetry, no dark patterns.
Description: OpenClean shows an honest picture of your Windows PC and cleans only what you choose - temp files, caches, startup entries, duplicates and more. No fake speed boosts, no invented problems, no account, no background service, and no telemetry. Every number you see is a real measurement. Free and open source; a portable single-file build runs from a USB stick with no installation and no .NET required
