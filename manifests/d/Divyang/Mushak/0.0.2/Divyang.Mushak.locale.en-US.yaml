ShortDescription: Lightweight Windows replacement for Logitech Options+ for the MX Master 2S.
Description: Mushak is a tiny, native Rust replacement for Logitech Options+ aimed at the MX Master 2S. It does button remapping, per-application profiles, HID++ 2.0 device control (SmartShift, DPI, hi-res/invert scrolling, battery), and start-with-Windows — from a system tray, with idle RAM well under 30 MB and no Electron or webview.
