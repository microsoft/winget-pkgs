Description: Devolutions Gateway offers a lightweight alternative to Apache Guacamole and traditional VPNs for organizations requiring secure access to remote network segments. Meant for small deployments, the standalone version is free to install and use (commercial and personal), and offers you a simple web interface as an external launcher to connect to internally hosted services via RDP, SSH, Telnet, VNC, or ARD!
ReleaseNotes: |-
  New features
  - Installer - Add certificate checks during installation so invalid certificate setups are caught earlier
  - Service - Add experimental Kerberos-based credential injection support (behind unstable option)
  Improvements
  - Service - Improve network scanning with better targeting and more consistent scan results
  - Service - Reject recording uploads when recording storage is full to prevent incomplete recordings
