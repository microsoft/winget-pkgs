ShortDescription: 全功能临床数据管理桌面应用
Description: |-
  DFexplore 是一款计算机应用程序，可用于录入、审核及修改受试者数据，并通过互联网将数据提交至研究协调站点的 DFdiscover 服务器。这类数据录入方式通常被称为电子数据采集（Electronic Data Capture，简称 EDC）。DFexplore 是 DFdiscover 临床试验管理系统的组成部分，该系统还支持通过纸质材料、扫描文档、传真收集数据，所有采集方式可在同一项研究中混用。普遍认为 EDC 的优势在于能够为数据采集人员提供即时帮助，从而让数据录入更完整、更准确，减少研究协调站点发出的数据疑问。
  为充分发挥上述优势，推动从纸质表单到 EDC 的过渡，DFexplore 的设计具备以下特点：
  - 导航直观，采用受试者档案夹的类比设计
  - 数据录入界面可与对应的纸质表单保持一致
  - 提供状态图标、颜色编码、消息提示、交互式编辑检查等多种形式的辅助功能
  - 设有疑问窗口，用于查看和回复研究协调站点发出的疑问
  - 设有原因窗口，用于解释异常数据值（从而避免产生疑问）
  - 设有缺失值窗口，用于使用标准缺失值代码标记对应字段
