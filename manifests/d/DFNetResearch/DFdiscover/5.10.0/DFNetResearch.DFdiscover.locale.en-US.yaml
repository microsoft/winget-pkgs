ReleaseNotes: |-
  The latest release of DFdiscover continues our commitment to providing a strong, flexible clinical data management platform with integrated ePRO. This version focuses on improvements that enhance usability, reinforce security, and strengthen patient engagement. This upgrade delivers immediate benefits with minimal adjustment, helping your team work faster and more confidently.
  Key highlights of the 5.10 release include:
  - ePRO Management: Elevate the clinical site experience with an ePRO management portal to help streamline DFengage participant onboarding & follow-up.
  - Field Navigation Taskbar: DFcollect and DFweb now optionally display ‘Previous’ and ‘Next’ buttons for field navigation, helpful for users on touchscreens.
  - Combine Repeating Forms in One Visit: Consolidate the subject binder by grouping repeating forms (such as Adverse Events, Concomitant Medications, or Medical History) into a single folder in DFexplore.
  - Setup Import Enhancements: Importing setup from Excel, JSON, or another study now allows merging with existing styles and modules through a conflict resolution dialog.
  - Security Enhancements: Various improvements have been made to ensure the security of the system and your data.
  See the Release Notes for details on all new features, improvements, and bug fixes, as well as information about upgrade steps, version compatibility, and known issues. The Release Highlights provide an overview of the key features and improvements, helping study teams and organizations make the most of the upgrade. The Documentation provides in-depth guides to using DFdiscover applications, and Downloads are available for desktop and server applications.
  View the full DFweb build history and the full DFcollect build history.
