ShortDescription: 一款将本地计算机中的纸质 CRF（病例报告表）扫描件提交至 DFdiscover 研究项目的桌面应用。
Description: |-
  DFsend 是一款桌面应用，可为需将本地电脑内的扫描版 PDF 研究文档通过互联网安全传输至 DFdiscover 研究服务器的用户提供相关功能，且无需用户直接访问特定研究数据库。
  DFsend 具备用户身份验证、加密及追踪功能，是替代传真或电子邮件方式向 DFdiscover 服务器发送研究病例报告表（CRF）的安全可靠方案。
