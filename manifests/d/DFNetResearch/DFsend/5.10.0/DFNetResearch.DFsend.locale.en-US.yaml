ShortDescription: A desktop app for submitting scanned paper CRFs from a local computer to a DFdiscover study.
Description: |-
  DFsend is a desktop application providing functionality for users who need to securely transmit scanned PDF study documents from a local computer to a DFdiscover study server, over the internet, without requiring direct access to a specific study database.
  DFsend includes user authentication, encryption and tracking and provides a safe and reliable alternative to faxing or emailing study CRFs to a DFdiscover server.
