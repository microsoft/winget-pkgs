ShortDescription: System-wide AI voice dictation — hold a hotkey, speak, get clean text.
Description: |-
  Prose is a system-wide voice dictation tool for Windows. Hold a hotkey, speak, and
  cleaned-up text is pasted into whatever app is focused.

  It transcribes with Groq Whisper, then removes filler words and fixes punctuation
  while preserving your exact wording — it will not swap your words for synonyms.

  Requires a free Groq API key, which Prose asks for on first launch. Your audio goes
  only to Groq; Prose has no backend and collects no telemetry.
