ReleaseNotes: |-
  Features
  - [Grading Pro] New Parallel Feature Line Creation capability.
  - [Grading Pro] Expanded Breakline Settings for greater control.
  - [Grading Pro] Create or Reference Objects directly from Imported Profiles.
  Enhancements
  - [Grading Pro] Support for Curved Feature Lines within Objects.
  - [Piping Engineer] Enhanced Piping Data Synchronization and Transaction Handling.
  - [Drawing Layers] Improved Layer Data Synchronization with Civil 3D.
  - [Style Helper] Improved Component Management with Parent/Child Row Separation.
  Bug Fixes
  - [Drawing Layers] Resolved crashes related to Layer States and layer deletion.
  - [Grading Pro] Fixed errors occurring in specific project scenarios.
  - [Piping Engineer] Addressed stability issues when opening certain files.
  - Dynamo package manager bug with DiCivil
  - Conflict with AutoCAD DiRootsOne logout session
  - Other minor bugs fixed.
