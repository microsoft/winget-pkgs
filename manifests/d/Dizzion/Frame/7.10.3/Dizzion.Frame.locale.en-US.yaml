ReleaseNotes: |-
  Added:
  - Upgrade Electron version (Chromium version is now 142.0.7444.235)
  - Add Create Snapshot shortcut (Ctrl + Shift + S). When enabled, it captures a snapshot of the window in focus and opens the system “Save As” dialog, allowing the user to choose the file name and location. The image is saved as a PNG file.
  - Redirect PrintScreen key into the session
  - Browser login now supports IAM
  - Add option to send hostname, username, and local IP address into the session
  Fixed:
  - Fix keyboard redirection issues on Linux
  - Fix issue where multiple browser windows could open in certain browser login scenarios
  - Fix issue where the local keyboard could become blocked if the app lost focus during session start
