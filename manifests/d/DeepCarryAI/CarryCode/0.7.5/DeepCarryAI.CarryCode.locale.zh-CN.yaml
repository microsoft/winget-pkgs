ShortDescription: 下一代人工智能代码智能体，为开发者赋能，助力实现高效编程、自动化代码生成与智能优化
Description: CarryCode 是一款原生运行于终端的 AI 编程智能体，可通过自然对话帮你完成代码编写、重构、调试与理解工作。它可连接 17 家以上大语言模型服务商（包括 OpenAI、Anthropic Claude、Google Gemini、OpenRouter、Ollama、vllm、智谱 GLM、月之暗面 KIMI、MiniMax、深度求索 DeepSeek、阿里通义千问 Claude 等），支持通过 MCP 协议实现功能扩展，兼容 Claude Code 的 SKILL 机制，支持将 AGENTS.md 作为项目规则文件，同时提供美观的终端界面，自带主题切换、语法高亮与代码差异预览功能。
