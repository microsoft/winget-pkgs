ReleaseNotes: |-
  🧭 Code graph: deeper, more languages, and actually used
  A fast-follow to v1.20.0's native code graph — driven by dogfooding it on Termpolis's own source, which surfaced real issues the unit tests couldn't.
  More languages (all native-free — regex rule sets, no new deps)
  - Deep (symbols + methods + call edges): now C#, Ruby, and Swift join TypeScript/JavaScript, Python, Go, Rust, and Java.
  - Surface (symbol discovery for code_search/code_explore; IaC dependencies are dot-paths, not calls, so edges are intentionally thin): Terraform and Bicep.
  Deeper — the three limitations, fixed
  - Class methods are now indexed, not just top-level symbols. On this repo that took the graph from 1,972 to 2,163 symbols and grew call edges 63% — so code_explore now resolves a component's render(), and blast-radius reaches method callers.
  - Typed-signature bug fixed (found by dogfooding): inline object types in TS parameter/return annotations were truncating functions to their signature line and losing every call below — recovered ~35% more edges on its own.
  - Less edge noise: an interface/type name is no longer resolved as a call target (you can't call an interface), removing a class of false edges.
  Agents actually reach for it
  The code_* tools were already exposed over MCP, but MCP tools are offered, not forced. Termpolis now nudges the agents it launches — via the invisible context primer — to prefer the code graph for structural questions (who-calls, blast-radius, where-defined) over grepping. Combined with the automatic, per-session background indexing, the graph builds and gets used with no clicks.
  Quality
  Every language, the method extraction, the noise fix, and the primer nudge ship with tests, and the fixes were verified on real source, not just snippets. Full suite green; lint + typecheck + build clean; coverage gate green.
  Full Changelog: https://github.com/codedev-david/termpolis/compare/v1.20.0...v1.20.1
