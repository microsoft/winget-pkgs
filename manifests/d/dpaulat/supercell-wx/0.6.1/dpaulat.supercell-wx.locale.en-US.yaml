ReleaseNotes: |-
  Supercell Wx v0.6.1
  v0.6.1 is primarily a maintenance release: stability fixes, provider reliability, and distribution polish. There are no major new UI features. The main user-facing addition is a hosted Flatpak remote for Linux.

  📦 Flatpak Remote (Linux)
  Linux users can now install and update Supercell Wx from a hosted Flatpak remote instead of downloading a one-shot .flatpak bundle each release. After adding the remote, updates are handled with flatpak update.
  See the Flatpak setup guide for install instructions, including stable and nightly remotes.
  — @dpaulat (#670)

  📡 Radar Site & Data Providers
  - TPBI → TDJT rename — Support for the West Palm Beach radar ID transition on August 3, 2026, with seamless data handoff across the cutover — @dpaulat (#668)
  - Alternate HTTP-based providers — Foundation for additional radar data sources via HTTP/ONDAS configuration and CLI options for alternate Level 2/Level 3 endpoints — @dpaulat (#662)

  Bug Fixes
  - Fix Level 2 coordinate computation for incomplete or malformed radar data (#664) — @dpaulat
  - Fix crash when destroying radar product views (#667) — @dpaulat
  - Fix provider refresh loops, empty listings, and related data-loading edge cases (#669) — @dpaulat
  - Treat ONDAS config redirects as errors instead of a successful load (#674) — @dpaulat
  - Reintroduce Ubuntu 22.04 GCC 11 build for x64 (#649) — @dpaulat

  Maintenance
  - Extract ProviderManager from RadarProductManager (#642) — @F1r3w477
  - Extract RadarCoordinateTable from RadarProductManager (#644) — @F1r3w477
  Thanks to @dpaulat and @F1r3w477 for the changes in this release.
