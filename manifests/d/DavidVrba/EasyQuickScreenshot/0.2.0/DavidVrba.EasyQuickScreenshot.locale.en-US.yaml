ShortDescription: Instant region screenshots for Windows — hotkey, crosshair, drag, done.
Description: |-
  A tiny (~600 KB) native Windows tray app. Press a hotkey, drag a rectangle, and the
  screenshot is on disk and your clipboard before you release the mouse. Quick mode overwrites
  one fixed file (shots/temp.png) so scripts and AI agents can always read your latest capture;
  save mode writes timestamped PNGs. No flash, no shutter, no folder bloat, no telemetry.
