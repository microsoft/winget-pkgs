ShortDescription: Single-file embedded database for AI agents
Description: AgentDB is a single-file embedded database purpose-built for AI agents. It combines SQL, Vector Search (HNSW), Full-Text Search, Hybrid Queries, and Memory Graphs in one portable file. Zero external dependencies.
