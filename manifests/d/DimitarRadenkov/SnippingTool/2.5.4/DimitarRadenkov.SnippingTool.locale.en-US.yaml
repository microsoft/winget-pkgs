ShortDescription: Open-source Windows snipping tool with OCR, screen recording, and annotation
Description: |-
  SnippingTool is a lightweight Windows screen capture and annotation tool.
  Press Print Screen to draw a region, annotate with arrows, shapes, text, blur,
  and numbered steps, then copy to clipboard, pin as a floating always-on-top window,
  or record your screen to MP4 (H.264) or AVI. Includes built-in OCR to extract text
  from any screenshot. No subscription, no telemetry.
