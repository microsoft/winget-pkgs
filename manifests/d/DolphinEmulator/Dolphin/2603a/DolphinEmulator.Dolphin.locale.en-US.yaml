InstallationNotes: |
  Dolphin Emulator has been installed as a portable app.

  - Launch from terminal: dolphin-emu
  - Dolphin.exe is located in:
    %LOCALAPPDATA%\Microsoft\WinGet\Packages\
    Look for a folder starting with "DolphinEmulator.Dolphin_"

  - To add Dolphin to the Start Menu, create a shortcut to Dolphin.exe and place it in:
    %APPDATA%\Microsoft\Windows\Start Menu\Programs
  - To add it to the Desktop, place the shortcut in:
    %USERPROFILE%\Desktop
