ShortDescription: Local-first memory vault every AI assistant can share over MCP
Description: |-
  EleSync is a privacy-focused, local-first memory vault that synchronizes AI
  assistant memory across clients. One folder of markdown files on your machine;
  Claude Desktop, ChatGPT (Developer Mode), Cursor, Windsurf, Zed, Cline, and any
  MCP-aware client read and write it live over stdio or Streamable HTTP.
  Cross-AI provenance, conflict detection, supersession history, scoped
  per-client views, at-rest encryption, and encrypted portable USB vaults.
  This standalone executable includes the CLI and the MCP server - no Python
  required.
