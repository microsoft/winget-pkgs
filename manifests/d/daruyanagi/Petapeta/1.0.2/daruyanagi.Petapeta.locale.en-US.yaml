ShortDescription: Paste copied images and text into File Explorer as files
Description: |-
  Petapeta is a tray-resident tool that watches the clipboard and lets you
  paste copied images and text straight into the desktop or any folder as
  files, using the standard Ctrl+V. Images become PNG files instantly;
  text becomes a .txt file only while File Explorer is in the foreground,
  so pasting into other apps stays plain text. Built with WinUI 3,
  self-contained (no runtime install needed).
