ReleaseNotes: |-
  新機能
  - 検索ボックス (#182) — ツールバー中央に検索ボックスを追加。クエリを入力すると X の検索結果がダイアログで表示され、タブ（最新/ユーザー/メディア等）の切り替えやクエリの編集もそのまま可能。「タイムラインとして追加」でフィルター設定込みの検索結果をタイムラインに固定できる
    - Ctrl+F / F3 でどこからでも検索ボックスにフォーカス（いいねのショートカットは Ctrl+L に変更）
    - 追加したクエリは保存され、次回以降サジェストとして表示（フィルター設定も保持）
  - 保存済み検索クエリの管理 (#184) — 設定から保存済みクエリを個別に削除可能
  - 設定にユーザーデータ管理ページを新設 (#187) — 設定ファイルのエクスポートと保存済み検索クエリを「ユーザーデータ管理」ページに集約し、Windows 11 風の「関連する設定」リンクを追加
